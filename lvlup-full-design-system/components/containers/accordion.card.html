<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);padding:24px}
.ds-row{display:flex;flex-wrap:wrap;gap:12px;align-items:stretch;margin-bottom:16px}
.ds-row > *{flex:1 1 100%}
.ds-cap{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:100%;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head><body><div id="root"></div>
<script type="text/babel">
  const { Accordion } = window.LvlupV0DesignSystem_5d0725;
  function Demo(){
    const items = [
      {
        title: "How is mastery calculated for a story point?",
        content: (
          <p style={{margin:0,color:'var(--text-secondary)',lineHeight:'var(--leading-md)'}}>
            Mastery blends your accuracy, confidence calibration, and spaced-recall
            performance. Reach <strong style={{color:'var(--text-primary)'}}>three correct
            attempts</strong> across separate sessions and the node turns from
            in-progress to mastered.
          </p>
        )
      },
      {
        title: "Can I retake an exam after results are released?",
        content: (
          <p style={{margin:0,color:'var(--text-secondary)',lineHeight:'var(--leading-md)'}}>
            Released exams are locked, but your teacher can open a
            <strong style={{color:'var(--text-primary)'}}> retake window</strong> from the
            grading review panel. Retake scores replace the original on your transcript.
          </p>
        )
      },
      {
        title: "What happens to my streak if I miss a day?",
        content: (
          <p style={{margin:0,color:'var(--text-secondary)',lineHeight:'var(--leading-md)'}}>
            A missed day pauses the flame rather than resetting it. You keep a
            <strong style={{color:'var(--text-primary)'}}> one-day grace</strong> per week,
            after which the streak count returns to zero on your next active session.
          </p>
        )
      }
    ];
    return (<div>
      <div className="ds-cap">Frequently asked — first item open</div>
      <div className="ds-row">
        <Accordion items={items} defaultOpen={0} />
      </div>
    </div>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
