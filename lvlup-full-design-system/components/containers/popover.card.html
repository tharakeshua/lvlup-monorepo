<!-- @dsCard group="Containers" viewport="700x300" name="Popover" subtitle="Floating panel" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);padding:24px}
.ds-row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start;margin-bottom:16px}
.ds-cap{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:100%;margin-bottom:4px}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head><body><div id="root"></div>
<script type="text/babel">
  const { Popover, Button } = window.LvlupV0DesignSystem_5d0725;

  function MenuRow({ icon, label }){
    return (
      <div className="nav-item" style={{cursor:'pointer'}}>
        <i data-lucide={icon} style={{width:16,height:16}}></i>
        <span>{label}</span>
      </div>
    );
  }

  function Menu(){
    return (
      <div style={{display:'flex',flexDirection:'column',gap:'var(--space-1)',minWidth:180}}>
        <div className="ds-cap" style={{margin:0,paddingBottom:'var(--space-1)'}}>Space</div>
        <MenuRow icon="layout-dashboard" label="Overview" />
        <MenuRow icon="git-branch" label="Story points" />
        <MenuRow icon="bar-chart-3" label="Progress" />
        <MenuRow icon="settings" label="Settings" />
      </div>
    );
  }

  function Demo(){
    React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
    return (
      <div>
        <div className="ds-cap">Popover with menu</div>
        <div className="ds-row">
          <Popover trigger={<Button variant="secondary" trailingIcon="chevron-down">Open menu</Button>}>
            <Menu />
          </Popover>
        </div>

        <div className="ds-cap">Spark trigger</div>
        <div className="ds-row">
          <Popover trigger={<Button variant="spark" leadingIcon="sparkles">Actions</Button>}>
            <div style={{display:'flex',flexDirection:'column',gap:'var(--space-1)',minWidth:180}}>
              <MenuRow icon="plus" label="New item" />
              <MenuRow icon="copy" label="Duplicate" />
              <MenuRow icon="archive" label="Archive" />
            </div>
          </Popover>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
