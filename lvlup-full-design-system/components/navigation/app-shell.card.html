<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>html,body,#root{height:100%}
body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}
.ds-cap{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:var(--tracking-caption);margin:0 0 var(--space-2)}
.ds-row{display:flex;flex-wrap:wrap;gap:var(--space-4);align-items:stretch}
.as-brand{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-5) var(--space-5) var(--space-4)}

.as-wordmark{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);color:var(--text-primary)}
.as-search{flex:1;max-width:420px}
.as-topbar-right{display:flex;align-items:center;gap:var(--space-3)}
.as-heading{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--weight-semibold);margin:0 0 var(--space-1)}
.as-sub{color:var(--text-secondary);font-size:var(--text-sm);margin:0 0 var(--space-6)}
.as-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4)}</style>
