<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);padding:24px}
.ds-cap{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:100%;margin-bottom:10px;letter-spacing:var(--tracking-caption)}
.topbar{display:flex;align-items:center;gap:var(--space-4);width:100%;padding:var(--space-3) var(--space-5);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);box-sizing:border-box}
.tenant{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);background:var(--brand-subtle);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);color:var(--brand-primary);font-family:var(--font-ui);font-weight:var(--weight-semibold);font-size:var(--text-sm);cursor:pointer;white-space:nowrap}
.tenant__mark{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:var(--radius-md);background:var(--brand-primary);color:var(--text-on-accent);font-family:var(--font-display);font-weight:var(--weight-bold);font-size:var(--text-xs)}
.topbar__search{flex:1;min-width:0;max-width:520px;margin:0 auto}
.topbar__right{display:flex;align-items:center;gap:var(--space-3);margin-left:auto}
.bell{position:relative;display:inline-flex}
.bell__dot{position:absolute;top:2px;right:2px;pointer-events:none}
.divider{width:1px;height:28px;background:var(--border-subtle)}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head><body><div id="root"></div>
<script type="text/babel">
  const { Input, IconButton, Avatar, Badge, Icon } = window.LvlupV0DesignSystem_5d0725;
  function Demo(){ return (<div>
    <div className="ds-cap">Application topbar — appshell__topbar</div>
    <div className="topbar appshell__topbar">
      <button className="tenant" type="button">
        <span className="tenant__mark">SA</span>

      </div>
      <div className="topbar__right">
        <span className="bell">
          <IconButton icon="bell" label="Notifications" />
          <span className="bell__dot"><Badge variant="spark" dot /></span>
        </span>
        <span className="divider" />
        <Avatar initials="SK" />
      </div>
    </div>
  </div>); }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
