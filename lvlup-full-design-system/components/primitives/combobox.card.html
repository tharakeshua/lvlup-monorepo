<!-- @dsCard group="Forms" viewport="700x340" name="Combobox" subtitle="Search input + filtered popover list" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);padding:24px}
.ds-row{display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;margin-bottom:16px}
.ds-col{display:flex;flex-direction:column;gap:8px;min-width:280px}
.ds-cap{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:100%;margin-bottom:4px}
.cb-field{position:relative}
.cb-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;display:flex}
.cb-input{padding-left:36px}
.cb-pop{margin-top:6px;padding:6px}
.cb-list{display:flex;flex-direction:column;gap:2px}
.cb-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-md);cursor:pointer;font-size:var(--text-sm);color:var(--text-secondary)}
.cb-item:hover{background:var(--bg-surface-sunken)}
.cb-item--active{background:var(--brand-subtle);color:var(--brand-primary);font-weight:var(--weight-medium)}
.cb-item .cb-i{color:var(--text-muted);display:flex}
.cb-item--active .cb-i{color:var(--brand-primary)}
.cb-check{margin-left:auto;color:var(--brand-primary);display:flex}
.cb-empty{padding:16px 10px;text-align:center;color:var(--text-muted);font-size:var(--text-sm)}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head><body><div id="root"></div>
<script type="text/babel">
  const { Input } = window.LvlupV0DesignSystem_5d0725;

  function Row({ icon, label, active, check }){
    return (
      <div className={"cb-item" + (active ? " cb-item--active" : "")}>
        <span className="cb-i"><i data-lucide={icon}></i></span>
        <span>{label}</span>
        {check && <span className="cb-check"><i data-lucide="check"></i></span>}
      </div>
    );
  }

  function Demo(){
    React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
    return (
      <div>
        <div className="ds-row">
          <div className="ds-col">
            <div className="ds-cap">Open · filtered on "sc"</div>
            <div className="cb-field">
              <span className="cb-icon"><i data-lucide="search"></i></span>
              <Input className="cb-input" defaultValue="sc" placeholder="Search subjects…" />
            </div>
            <div className="popover cb-pop">
              <div className="cb-list">
                <Row icon="binary" label="Data Structures" active check />
                <Row icon="git-branch" label="System Design" />
                <Row icon="brain-circuit" label="Behavioral Science" />
                <Row icon="function-square" label="Discrete Maths" />
              </div>
            </div>
          </div>

          <div className="ds-col">
            <div className="ds-cap">Empty · no matches</div>
            <div className="cb-field">
              <span className="cb-icon"><i data-lucide="search"></i></span>
              <Input className="cb-input" defaultValue="zxq" placeholder="Search subjects…" />
            </div>
            <div className="popover cb-pop">
              <div className="cb-empty">No subjects match "zxq".</div>
            </div>
          </div>
        </div>

        <div className="ds-cap">Idle · closed</div>
        <div className="ds-row">
          <div className="ds-col">
            <div className="cb-field">
              <span className="cb-icon"><i data-lucide="search"></i></span>
              <Input className="cb-input" placeholder="Search subjects…" />
            </div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
