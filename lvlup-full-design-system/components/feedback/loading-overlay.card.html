<!-- @dsCard group="Feedback" viewport="700x320" name="LoadingOverlay" subtitle="Spinner over content" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);padding:24px}
.ds-row{display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;margin-bottom:16px}
.ds-cap{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:100%;margin-bottom:8px}
.ds-col{flex:1;min-width:260px}
.ds-stage{position:relative;overflow:hidden}
.ds-skel{display:flex;flex-direction:column;gap:12px}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head><body><div id="root"></div>
<script type="text/babel">
  const { LoadingOverlay, Card, Skeleton } = window.LvlupV0DesignSystem_5d0725;

  function SkeletonContent(){
    return (
      <div className="ds-skel">
        <Skeleton variant="text" width="60%" height="20px" />
        <Skeleton variant="text" width="100%" height="14px" />
        <Skeleton variant="text" width="92%" height="14px" />
        <Skeleton variant="text" width="78%" height="14px" />
        <Skeleton variant="text" width="40%" height="14px" />
      </div>
    );
  }

  function Demo(){
    return (
      <div>
        <div className="ds-cap">Loading state — overlay + spinner over skeleton content</div>
        <div className="ds-row">
          <div className="ds-col">
            <Card className="ds-stage">
              <SkeletonContent />
              <LoadingOverlay />
            </Card>
          </div>
        </div>

        <div className="ds-cap">With label</div>
        <div className="ds-row">
          <div className="ds-col">
            <Card className="ds-stage">
              <SkeletonContent />
              <LoadingOverlay label="Loading your space…" />
            </Card>
          </div>
        </div>

        <div className="ds-cap">Loaded — content revealed (no overlay)</div>
        <div className="ds-row">
          <div className="ds-col">
            <Card className="ds-stage">
              <SkeletonContent />
            </Card>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
