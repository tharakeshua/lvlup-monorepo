<script type="text/babel">
  const { ContentRenderer } = window.LvlupV0DesignSystem_5d0725;
  const lesson = `
    <h3>Big-O of Binary Search</h3>
    <p>Binary search repeatedly halves the search interval, so a sorted array of
    <code>n</code> elements is resolved in logarithmic time. Each comparison
    discards half of the remaining candidates.</p>
    <blockquote>A halving strategy turns linear work into logarithmic work &mdash;
    the single most important idea behind efficient lookup.</blockquote>
    <p>The recurrence for the running time is solved below, and the loop body is:</p>
    <pre><code>while (lo &lt;= hi) {
  const mid = (lo + hi) >> 1;
  if (a[mid] === target) return mid;
  if (a[mid] &lt; target) lo = mid + 1;
  else hi = mid - 1;
}</code></pre>
  `;
  function Demo(){
    return (
      <div>
        <div className="ds-cap">html prop &mdash; rich lesson content</div>
        <div className="ds-row">
          <div className="ds-lesson">
            <ContentRenderer html={lesson} />
            <div className="ds-cap">display-font math expression</div>
            <div className="ds-math">T(n) = T(n/2) + O(1)  &rArr;  T(n) = O(log n)</div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
