<!-- @dsCard group="Assessment" viewport="740x480" name="QuestionCard" subtitle="MCQ with option states" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);padding:24px}
.ds-row{display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;margin-bottom:16px}
.ds-col{flex:1;min-width:300px}
.ds-cap{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:100%;margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head><body><div id="root"></div>
<script type="text/babel">
  const { QuestionCard, Option } = window.LvlupV0DesignSystem_5d0725;
  function Demo(){ return (<div>
    <div className="ds-row">
      <div className="ds-col">
        <div className="ds-cap">Answering — one selected</div>
        <QuestionCard type="Multiple choice" points={5} prompt="Which data structure offers O(1) average-case lookup by key?">
          <Option marker="A">Balanced binary search tree</Option>
          <Option marker="B" selected>Hash table</Option>
          <Option marker="C">Sorted array with binary search</Option>
          <Option marker="D">Doubly linked list</Option>
        </QuestionCard>
      </div>
      <div className="ds-col">
        <div className="ds-cap">After grading — correct &amp; incorrect</div>
        <QuestionCard type="Multiple choice" points={5} prompt="Which data structure offers O(1) average-case lookup by key?">
          <Option marker="A">Balanced binary search tree</Option>
          <Option marker="B" state="correct">Hash table</Option>
          <Option marker="C" selected state="incorrect">Sorted array with binary search</Option>
          <Option marker="D">Doubly linked list</Option>
        </QuestionCard>
      </div>
    </div>
  </div>); }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
