<!-- @dsCard group="Assessment" viewport="740x260" name="ManualOverrideControl" subtitle="Teacher score override" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);padding:24px}
.ds-row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:20px}
.ds-cap{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:100%;margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
.ds-score{font-family:var(--font-mono);font-size:13px;color:var(--text-secondary)}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head><body><div id="root"></div>
<script type="text/babel">
  const { ManualOverrideControl, Input, Button } = window.LvlupV0DesignSystem_5d0725;

  function OverrideField({ aiScore, defaultValue }){
    const [value, setValue] = React.useState(defaultValue);
    return (
      <div className="ds-row">
        <ManualOverrideControl label="Override score">
          <span className="ds-score">AI: {aiScore}/10</span>
          <Input
            type="number"
            min="0" max="10" step="0.5"
            value={value}
            onChange={(e) => setValue(e.target.value)}
            style={{ width: '72px' }}
          />
          <span className="ds-score">/ 10</span>
          <Button variant="spark" size="sm" leadingIcon="check">Apply</Button>
        </ManualOverrideControl>
      </div>
    );
  }

  function Demo(){
    return (
      <div>
        <div className="ds-cap">Human-in-the-loop override</div>
        <OverrideField aiScore="6.5" defaultValue="8" />

        <div className="ds-cap">Awaiting teacher input</div>
        <OverrideField aiScore="9.0" defaultValue="" />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
