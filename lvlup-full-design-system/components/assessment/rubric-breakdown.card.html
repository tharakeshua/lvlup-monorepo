<!-- @dsCard group="Assessment" viewport="740x400" name="RubricBreakdown" subtitle="Criteria scoring" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);padding:24px}
.ds-row{display:flex;flex-wrap:wrap;gap:12px;align-items:stretch;margin-bottom:16px}
.ds-col{display:flex;flex-direction:column;gap:0;flex:1 1 320px}
.ds-cap{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:100%;margin-bottom:6px;letter-spacing:var(--tracking-caption)}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head><body><div id="root"></div>
<script type="text/babel">
  const { RubricBreakdown } = window.LvlupV0DesignSystem_5d0725;

  const fullSpread = [
    { label: "Correctness", desc: "All edge cases handled; output matches spec exactly.", score: 4, max: 4 },
    { label: "Time Complexity", desc: "Optimal O(n log n) approach with clear justification.", score: 3, max: 4 },
    { label: "Code Clarity", desc: "Readable naming, but a few functions exceed one concern.", score: 2, max: 3 },
    { label: "Edge Handling", desc: "Empty input and overflow paths were not addressed.", score: 0, max: 3 },
  ];

  const conceptual = [
    { label: "Problem Framing", desc: "Restates the trade-offs and constraints precisely.", score: 5, max: 5 },
    { label: "Justification", desc: "Reasoning is sound but skips the failure mode.", score: 2, max: 4 },
    { label: "Communication", desc: "Clear, structured walkthrough of the approach.", score: 3, max: 3 },
    { label: "Originality", desc: "No novel insight beyond the reference solution.", score: 0, max: 2 },
  ];

  function Demo(){
    return (<div>
      <div className="ds-cap">Mixed scores — full · partial · zero</div>
      <div className="ds-row">
        <div className="ds-col">
          <RubricBreakdown criteria={fullSpread} />
        </div>
      </div>

      <div className="ds-cap">Conceptual rubric — second variant</div>
      <div className="ds-row">
        <div className="ds-col">
          <RubricBreakdown criteria={conceptual} />
        </div>
      </div>
    </div>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
