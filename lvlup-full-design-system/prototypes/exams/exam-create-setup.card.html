<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">

<style>
/* screen-local layout ONLY — Lyceum vars only, NO raw hex, NO :root token redefinition */
body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}
.shell{height:100vh}

/* topbar bits */
.tb-tenant{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-2);border:1px solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer}
.tb-tenant:hover{background:var(--bg-surface-sunken)}
.tb-tenant__code{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
.tb-search{flex:1;max-width:420px;display:flex;align-items:center;gap:var(--space-2);padding:0 var(--space-3);height:36px;border:1px solid var(--border-subtle);border-radius:var(--radius-md);color:var(--text-muted);background:var(--bg-surface-sunken)}
.tb-search input{border:none;background:transparent;outline:none;flex:1;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary)}
.tb-icon{display:grid;place-items:center;width:36px;height:36px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;position:relative}
.tb-icon:hover{background:var(--bg-surface-sunken);color:var(--text-primary)}
.tb-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:var(--radius-pill);background:var(--status-error);border:1.5px solid var(--bg-surface)}

/* page wrap */
.wrap{max-width:1200px;margin:0 auto;padding-bottom:96px}
.statebar{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;margin:var(--space-2) 0 var(--space-5)}
.statebar__label{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.seg{display:inline-flex;background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:2px}
.seg button{appearance:none;border:none;background:transparent;font-family:var(--font-ui);font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--text-secondary);padding:var(--space-1) var(--space-3);border-radius:var(--radius-pill);cursor:pointer;transition:background-color var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard)}
.seg button[aria-pressed="true"]{background:var(--bg-surface);color:var(--brand-primary);box-shadow:var(--shadow-e1)}

/* wizard header card */
.wizhead{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-5) var(--space-6);margin-bottom:var(--space-5)}
.wizhead__top{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);margin-bottom:var(--space-5)}
.wizhead h1{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-2xl);line-height:var(--leading-2xl);letter-spacing:-.02em;margin:0}
.wizhead__sub{font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-1)}

/* autosave chip */
.autosave{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);font-weight:var(--weight-medium);padding:var(--space-1) var(--space-3);border-radius:var(--radius-pill);border:1px solid var(--border-subtle);background:var(--bg-surface);transition:color var(--dur-fast) var(--ease-standard),background-color var(--dur-fast) var(--ease-standard)}
.autosave--saved{color:var(--status-success);background:var(--status-success-subtle);border-color:transparent}
.autosave--saving{color:var(--text-secondary)}
.autosave--error{color:var(--status-error);background:var(--status-error-subtle);border-color:transparent}
.autosave__time{font-family:var(--font-mono);font-size:var(--text-2xs)}
@keyframes spin{to{transform:rotate(360deg)}}
.mini-spin{width:13px;height:13px;border:2px solid var(--border-strong);border-top-color:var(--brand-primary);border-radius:var(--radius-pill);animation:spin .7s linear infinite}
@media (prefers-reduced-motion: reduce){.mini-spin{animation:none}}

/* stepper */
.stepper{display:flex;align-items:flex-start}
.stepper__step{display:flex;flex-direction:column;align-items:center;gap:var(--space-2);flex:0 0 auto;width:108px;text-align:center}
.stepper__node{width:34px;height:34px;border-radius:var(--radius-pill);display:grid;place-items:center;font-family:var(--font-mono);font-size:var(--text-sm);font-weight:var(--weight-medium);border:1px solid var(--border-strong);background:var(--bg-surface);color:var(--text-muted);transition:background-color var(--dur-base) var(--ease-entrance),border-color var(--dur-base) var(--ease-entrance),color var(--dur-base) var(--ease-entrance)}
.stepper__node--current{background:var(--brand-primary);border-color:var(--brand-primary);color:var(--text-on-accent);box-shadow:var(--ring-focus)}
.stepper__node--done{background:var(--status-success);border-color:var(--status-success);color:var(--text-on-accent)}
.stepper__node--locked{background:var(--bg-surface-sunken);border-color:var(--border-subtle);color:var(--text-muted)}
.stepper__label{font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--text-secondary);line-height:var(--leading-xs)}
.stepper__step--current .stepper__label{color:var(--text-primary);font-weight:var(--weight-semibold)}
.stepper__step--locked .stepper__label{color:var(--text-muted)}
.stepper__lockicon{display:inline-flex;vertical-align:-2px;margin-left:3px;color:var(--text-muted)}
.stepper__conn{flex:1 1 auto;height:2px;background:var(--border-subtle);margin-top:16px;border-radius:var(--radius-pill);transition:background-color var(--dur-base) var(--ease-entrance)}
.stepper__conn--done{background:var(--status-success)}

/* form layout */
.formcol{display:flex;flex-direction:column;gap:var(--space-5)}
.fcard{padding:var(--space-5) var(--space-6)}
.fcard__title{font-family:var(--font-ui);font-weight:var(--weight-semibold);font-size:var(--text-base);margin:0 0 var(--space-1)}
.fcard__hint{font-size:var(--text-xs);color:var(--text-muted);margin:0 0 var(--space-4)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)}
.frow--3{grid-template-columns:1fr 1fr 1fr}
@media (max-width:880px){.frow,.frow--3{grid-template-columns:1fr}}

/* chip-input */
.chipfield{display:flex;flex-wrap:wrap;gap:var(--space-2);align-items:center;border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);background:var(--bg-surface);min-height:42px}
.chipfield:focus-within{box-shadow:var(--ring-focus);border-color:var(--border-focus)}
.chipfield input{border:none;outline:none;background:transparent;flex:1;min-width:120px;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);padding:var(--space-1) 0}
.chip-x{display:inline-grid;place-items:center;margin-left:var(--space-1);cursor:pointer;opacity:.7}
.chip-x:hover{opacity:1}
@keyframes chipin{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.chip-anim{animation:chipin var(--dur-fast) var(--ease-entrance)}
@media (prefers-reduced-motion: reduce){.chip-anim{animation:none}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.shake{animation:shake .25s var(--ease-standard)}

/* multiselect (dropdown) */
.msel{position:relative}
.msel__control{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);min-height:42px;background:var(--bg-surface);cursor:pointer}
.msel__control:hover{border-color:var(--border-strong)}
.msel__control[data-open="true"]{box-shadow:var(--ring-focus);border-color:var(--border-focus)}
.msel__ph{color:var(--text-muted);font-size:var(--text-sm)}
.msel__caret{margin-left:auto;color:var(--text-muted);display:inline-flex}
.msel__menu{position:absolute;z-index:20;top:calc(100% + 6px);left:0;right:0;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);box-shadow:var(--shadow-e2);padding:var(--space-1);max-height:240px;overflow-y:auto}
.msel__opt{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);font-size:var(--text-sm);cursor:pointer}
.msel__opt:hover{background:var(--bg-surface-sunken)}
.msel__opt input{accent-color:var(--brand-primary)}
.msel__search{width:100%;border:none;border-bottom:1px solid var(--border-subtle);padding:var(--space-2) var(--space-3);outline:none;font-family:var(--font-ui);font-size:var(--text-sm);margin-bottom:var(--space-1)}

/* combobox results */
.cbox__menu{position:absolute;z-index:20;top:calc(100% + 6px);left:0;right:0;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);box-shadow:var(--shadow-e2);padding:var(--space-1);max-height:240px;overflow-y:auto}
.cbox__opt{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);font-size:var(--text-sm);cursor:pointer}
.cbox__opt:hover{background:var(--bg-surface-sunken)}
.cbox__opt-meta{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);margin-left:auto}

/* locked field affordance */
.lockrow{display:inline-flex;align-items:center;gap:var(--space-1);font-size:var(--text-2xs);color:var(--text-muted);font-weight:var(--weight-medium)}
.input-locked{opacity:.7}

/* sticky footer */
.footnav{position:sticky;bottom:0;left:0;right:0;background:var(--bg-surface);border-top:1px solid var(--border-subtle);box-shadow:var(--shadow-e2);padding:var(--space-4) var(--gutter-desktop);display:flex;align-items:center;gap:var(--space-3);z-index:30}
.footnav__inner{max-width:1200px;margin:0 auto;width:100%;display:flex;align-items:center;gap:var(--space-3)}
.footnav__spacer{flex:1}

/* domain note */
.privacy-note{display:flex;align-items:flex-start;gap:var(--space-2);font-size:var(--text-xs);color:var(--text-secondary);background:var(--bg-surface-sunken);border:1px dashed var(--border-subtle);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4)}
.privacy-note svg{color:var(--text-muted);flex:0 0 auto;margin-top:1px}

.req-star{color:var(--status-error)}
.u-mono{font-family:var(--font-mono)}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head><body><div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  const {
    Icon, Button, IconButton, Input, Select, Field, Card, Badge, Chip,
    Alert, Modal, EmptyState, Skeleton, ProgressBar, Breadcrumb, NavItem,
    Avatar, Toast, LoadingOverlay
  } = window.LvlupV0DesignSystem_5d0725;

  /* ---------------- static reference data (tenant-scoped reads) -------------- */
  const SUBJECTS = [
    { value: "", label: "Select a subject" },
    { value: "math", label: "Mathematics" },
    { value: "physics", label: "Physics" },
    { value: "cs", label: "Computer Science" },
    { value: "chem", label: "Chemistry" },
  ];
  const SESSIONS = [
    { value: "", label: "Optional" },
    { value: "2025-26", label: "2025–26" },
    { value: "2024-25", label: "2024–25" },
  ];
  const CLASSES = [
    { value: "g10a", label: "Grade 10 — A" },
    { value: "g10b", label: "Grade 10 — B" },
    { value: "g11s", label: "Grade 11 — Science" },
    { value: "g12s", label: "Grade 12 — Science" },
  ];
  const SECTIONS_BY_CLASS = {
    g10a: [{ value: "g10a-1", label: "10-A · Morning" }, { value: "g10a-2", label: "10-A · Afternoon" }],
    g10b: [{ value: "g10b-1", label: "10-B · Morning" }],
    g11s: [{ value: "g11s-1", label: "11-Sci · P" }, { value: "g11s-2", label: "11-Sci · Q" }],
    g12s: [{ value: "g12s-1", label: "12-Sci · P" }],
  };
  const SPACES = [
    { value: "sp_dsa_arr", label: "DSA — Arrays & Hashing", meta: "ZikR8x" },
    { value: "sp_dsa_gr", label: "DSA — Graphs", meta: "ZikR8x" },
    { value: "sp_sd", label: "System Design — Fundamentals", meta: "PDFq1O" },
    { value: "sp_lld", label: "LLD — Patterns", meta: "XTw3bL" },
  ];

  const STEPS = ["Setup", "Upload question paper", "Review", "Publish"];

  /* ---------------- Stepper (proposed Lyceum container, BEM-built) ---------- */
  function Stepper({ current, doneUpTo }) {
    return (
      <nav className="stepper" aria-label="Exam creation steps">
        {STEPS.map((label, i) => {
          const done = i < doneUpTo;
          const isCurrent = i === current && !done;
          const locked = i > current && i >= doneUpTo;
          const nodeMod = done ? "stepper__node--done" : isCurrent ? "stepper__node--current" : locked ? "stepper__node--locked" : "";
          const stepMod = isCurrent ? "stepper__step--current" : locked ? "stepper__step--locked" : "";
          const sr = done ? `${label}, completed` : isCurrent ? `${label}, current step` : `${label}, locked`;
          return (
            <React.Fragment key={label}>
              <div className={"stepper__step " + stepMod}
                   aria-current={isCurrent ? "step" : undefined}
                   aria-disabled={locked || undefined}>
                <div className={"stepper__node " + nodeMod} aria-hidden="true">
                  {done ? <Icon name="check" size={18} /> : (i + 1)}
                </div>
                <div className="stepper__label">
                  {label}
                  {locked && <span className="stepper__lockicon" aria-hidden="true"><Icon name="lock" size={11} /></span>}
                  <span className="u-sr-only">{sr}</span>
                </div>
              </div>
              {i < STEPS.length - 1 && <div className={"stepper__conn " + (i < doneUpTo ? "stepper__conn--done" : "")} aria-hidden="true" />}
            </React.Fragment>
          );
        })}
      </nav>
    );
  }

  /* ---------------- Autosave chip ------------------------------------------- */
  function AutosaveChip({ status, onRetry }) {
    let cls = "autosave", body;
    if (status === "saving") { cls += " autosave--saving"; body = (<><span className="mini-spin" aria-hidden="true" />Saving…</>); }
    else if (status === "error") { cls += " autosave--error"; body = (<><Icon name="alert-triangle" size={13} />Save failed
      <IconButton size="sm" icon={<Icon name="rotate-cw" size={13} />} label="Retry save" onClick={onRetry} /></>); }
    else { cls += " autosave--saved"; body = (<><Icon name="check" size={13} />Draft saved<span className="autosave__time">· 2s ago</span></>); }
    return <span className={cls} role="status" aria-live="polite">{body}</span>;
  }

  /* ---------------- Topic chip input ---------------------------------------- */
  function TopicInput({ topics, setTopics }) {
    const [val, setVal] = useState("");
    const [shakeKey, setShakeKey] = useState(0);
    const inputRef = useRef(null);
    function commit() {
      const t = val.trim();
      if (!t) return;
      if (topics.some(x => x.toLowerCase() === t.toLowerCase())) { setShakeKey(k => k + 1); return; }
      setTopics([...topics, t]); setVal("");
    }
    function onKey(e) {
      if (e.key === "Enter" || e.key === ",") { e.preventDefault(); commit(); }
      else if (e.key === "Backspace" && val === "" && topics.length) { setTopics(topics.slice(0, -1)); }
    }
    return (
      <div className={"chipfield" + (shakeKey ? " shake" : "")} key={shakeKey} onClick={() => inputRef.current && inputRef.current.focus()}>
        {topics.map(t => (
          <span className="chip chip-anim" key={t}>
            {t}
            <span className="chip-x" role="button" tabIndex={0} aria-label={"Remove topic " + t}
                  onClick={(e) => { e.stopPropagation(); setTopics(topics.filter(x => x !== t)); }}
                  onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); setTopics(topics.filter(x => x !== t)); } }}>
              <Icon name="x" size={12} />
            </span>
          </span>
        ))}
        <input ref={inputRef} value={val} onChange={e => setVal(e.target.value)} onKeyDown={onKey} onBlur={commit}
               placeholder={topics.length ? "" : "Add a topic and press Enter"} aria-label="Add topic" />
      </div>
    );
  }

  /* ---------------- Multi-select (classes / sections) ----------------------- */
  function MultiSelect({ options, selected, onChange, placeholder, disabled, ariaLabel }) {
    const [open, setOpen] = useState(false);
    const [q, setQ] = useState("");
    const ref = useRef(null);
    useEffect(() => {
      function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
      document.addEventListener("mousedown", onDoc);
      return () => document.removeEventListener("mousedown", onDoc);
    }, []);
    const filtered = options.filter(o => o.label.toLowerCase().includes(q.toLowerCase()));
    function toggle(v) { onChange(selected.includes(v) ? selected.filter(x => x !== v) : [...selected, v]); }
    const labelFor = v => (options.find(o => o.value === v) || {}).label || v;
    return (
      <div className="msel" ref={ref}>
        <div className="msel__control" data-open={open} role="button" tabIndex={disabled ? -1 : 0}
             aria-haspopup="listbox" aria-expanded={open} aria-label={ariaLabel} aria-disabled={disabled || undefined}
             onClick={() => !disabled && setOpen(o => !o)}
             onKeyDown={(e) => { if (!disabled && (e.key === "Enter" || e.key === " ")) { e.preventDefault(); setOpen(o => !o); } }}>
          {selected.length === 0
            ? <span className="msel__ph">{placeholder}</span>
            : selected.map(v => (
                <span className="chip" key={v}>{labelFor(v)}
                  <span className="chip-x" role="button" tabIndex={0} aria-label={"Remove " + labelFor(v)}
                        onClick={(e) => { e.stopPropagation(); toggle(v); }}><Icon name="x" size={12} /></span>
                </span>
              ))}
          {selected.length > 0 && <Badge variant="brand">{selected.length} selected</Badge>}
          <span className="msel__caret"><Icon name="chevron-down" size={16} /></span>
        </div>
        {open && (
          <div className="msel__menu" role="listbox" aria-multiselectable="true">
            <input className="msel__search" placeholder="Filter…" value={q} onChange={e => setQ(e.target.value)} aria-label="Filter options" />
            {filtered.length === 0 && <div className="msel__opt" aria-disabled="true" style={{ color: "var(--text-muted)" }}>No matches</div>}
            {filtered.map(o => (
              <label className="msel__opt" key={o.value} role="option" aria-selected={selected.includes(o.value)}>
                <input type="checkbox" checked={selected.includes(o.value)} onChange={() => toggle(o.value)} />
                {o.label}
              </label>
            ))}
          </div>
        )}
      </div>
    );
  }

  /* ---------------- Combobox (async LevelUp space search) ------------------- */
  function SpaceCombobox({ value, onChange }) {
    const [open, setOpen] = useState(false);
    const [q, setQ] = useState("");
    const ref = useRef(null);
    useEffect(() => {
      function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
      document.addEventListener("mousedown", onDoc);
      return () => document.removeEventListener("mousedown", onDoc);
    }, []);
    const selectedSpace = SPACES.find(s => s.value === value);
    if (selectedSpace) {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: "var(--space-2)" }}>
          <span className="chip chip--active">
            <Icon name="link-2" size={13} /> {selectedSpace.label}
            <span className="chip-x" role="button" tabIndex={0} aria-label="Unlink learning space"
                  onClick={() => onChange("")}><Icon name="x" size={12} /></span>
          </span>
          <span className="u-mono" style={{ fontSize: "var(--text-2xs)", color: "var(--text-muted)" }}>{selectedSpace.meta}</span>
        </div>
      );
    }
    const filtered = SPACES.filter(s => s.label.toLowerCase().includes(q.toLowerCase()));
    return (
      <div className="msel" ref={ref} role="combobox" aria-expanded={open} aria-haspopup="listbox">
        <input className="input" placeholder="Search learning spaces…" value={q}
               onChange={e => { setQ(e.target.value); setOpen(true); }} onFocus={() => setOpen(true)}
               aria-label="Search learning spaces" aria-autocomplete="list" />
        {open && (
          <div className="cbox__menu" role="listbox">
            {filtered.length === 0
              ? <div className="cbox__opt" aria-disabled="true" style={{ color: "var(--text-muted)" }}>No learning spaces found — this exam won't be linked.</div>
              : filtered.map(s => (
                  <div className="cbox__opt" role="option" key={s.value} aria-selected="false"
                       onClick={() => { onChange(s.value); setOpen(false); setQ(""); }}>
                    <Icon name="layers" size={15} /> {s.label}
                    <span className="cbox__opt-meta">{s.meta}</span>
                  </div>
                ))}
          </div>
        )}
      </div>
    );
  }

  /* ========================== APP ========================================== */
  function App() {
    const [view, setView] = useState("populated"); // populated | loading | empty | error | partial
    const [showInvalid, setShowInvalid] = useState(false); // partial demo
    const [discardOpen, setDiscardOpen] = useState(false);
    const [postPublish, setPostPublish] = useState(false);

    // form state
    const [title, setTitle] = useState("Unit 3 — Algebra Mid-term");
    const [subject, setSubject] = useState("math");
    const [topics, setTopics] = useState(["algebra", "quadratics"]);
    const [classes, setClasses] = useState(["g10a"]);
    const [sections, setSections] = useState([]);
    const [session, setSession] = useState("2025-26");
    const [examDate, setExamDate] = useState("2026-07-02");
    const [duration, setDuration] = useState("90");
    const [total, setTotal] = useState("50");
    const [passing, setPassing] = useState("18");
    const [linkedSpace, setLinkedSpace] = useState("sp_dsa_arr");

    const isPartial = view === "partial";
    const sectionOptions = classes.flatMap(c => SECTIONS_BY_CLASS[c] || []);

    // drop sections that no longer belong to a selected class
    useEffect(() => {
      const allowed = new Set(sectionOptions.map(o => o.value));
      if (sections.some(s => !allowed.has(s))) setSections(sections.filter(s => allowed.has(s)));
    }, [classes]); // eslint-disable-line

    // cross-field validation
    const totalNum = Number(total), passNum = Number(passing);
    const errors = {};
    if (isPartial) {
      if (!title.trim()) errors.title = "Title is required.";
      if (classes.length === 0) errors.classes = "Select at least one class.";
      if (!(totalNum > 0)) errors.total = "Total marks must be greater than 0.";
      if (!examDate) errors.examDate = "Exam date is required.";
    }
    if (passing !== "" && total !== "" && passNum > totalNum) errors.passing = "Passing marks can't exceed total marks.";
    const errorCount = Object.keys(errors).length;
    const continueDisabled = isPartial || errorCount > 0;

    // global keyboard: Esc closes discard
    useEffect(() => {
      function onKey(e) { if (e.key === "Escape" && discardOpen) setDiscardOpen(false); }
      window.addEventListener("keydown", onKey);
      return () => window.removeEventListener("keydown", onKey);
    }, [discardOpen]);

    const autosaveStatus = view === "loading" ? "saving" : view === "error" ? "error" : "saved";

    /* ----- sidebar nav ----- */
    const Sidebar = (
      <aside className="appshell__sidebar">
        <div className="sidebar__brand">
          <span className="sidebar__brand-mark">L</span>
          <span className="sidebar__brand-name">LevelUp</span>
        </div>
        <div className="sidebar__nav">
          <div className="sidebar__section-label">Teach</div>
          <NavItem icon="layout-dashboard" href="#">Dashboard</NavItem>
          <NavItem icon="users" href="#">Students</NavItem>
          <NavItem icon="graduation-cap" href="#">Classes</NavItem>
          <NavItem icon="file-check-2" href="#" active>Exams</NavItem>
          <NavItem icon="library" href="#">Spaces</NavItem>
          <div className="sidebar__section-label">Insights</div>
          <NavItem icon="bar-chart-3" href="#">Analytics</NavItem>
          <NavItem icon="settings" href="#">Settings</NavItem>
        </div>
      </aside>
    );

    /* ----- topbar ----- */
    const Topbar = (
      <header className="appshell__topbar">
        <div className="tb-tenant" role="button" tabIndex={0} aria-label="Switch tenant">
          <Avatar size="sm" initials="SU" />
          <span>Subhang Academy</span>
          <span className="tb-tenant__code">SUB001</span>
          <Icon name="chevrons-up-down" size={14} />
        </div>
        <div className="tb-search">
          <Icon name="search" size={16} />
          <input placeholder="Search exams, students, spaces…" aria-label="Search" />
          <span className="kbd">⌘K</span>
        </div>
        <div className="topbar__spacer" />
        <div className="tb-icon" role="button" tabIndex={0} aria-label="Notifications">
          <Icon name="bell" size={18} /><span className="tb-dot" />
        </div>
        <div className="tb-icon" role="button" tabIndex={0} aria-label="Profile">
          <Avatar size="sm" initials="SK" />
        </div>
      </header>
    );

    /* ----- form body (populated/partial) ----- */
    const Body = (
      <div className="formcol">
        {/* Exam details */}
        <Card className="fcard">
          <h2 className="fcard__title">Exam details</h2>
          <p className="fcard__hint">The identity of this exam. Everything here is editable until publish.</p>
          <div className="formcol">
            <Field label="Title" required htmlFor="f-title" error={errors.title}
                   hint={errors.title ? undefined : "e.g. Unit 3 — Algebra Mid-term"}>
              <Input id="f-title" value={title} onChange={e => setTitle(e.target.value)} error={!!errors.title}
                     aria-required="true" placeholder="e.g. Unit 3 — Algebra Mid-term" />
            </Field>
            <div className="frow">
              <Field label="Subject" required htmlFor="f-subject">
                <Select id="f-subject" options={SUBJECTS} value={subject} onChange={e => setSubject(e.target.value)} aria-required="true" />
              </Field>
              <Field label="Topics" htmlFor="f-topics"
                     hint="Tag the concepts this paper covers — used for analytics and weak-area insights.">
                <TopicInput topics={topics} setTopics={setTopics} />
              </Field>
            </div>
          </div>
        </Card>

        {/* Audience */}
        <Card className="fcard">
          <h2 className="fcard__title">Audience</h2>
          <p className="fcard__hint">Which classes and sections sit this exam. Scopes grading and analytics.</p>
          {view === "empty" ? (
            <EmptyState icon="users" title="No classes yet"
              body="Set up your classes and sections first, then come back to create this exam."
              action={<Button variant="secondary" leadingIcon={<Icon name="plus" size={16} />}>Set up classes</Button>} />
          ) : (
            <div className="formcol">
              <Field label="Classes" required htmlFor="f-classes" error={errors.classes}
                     hint={errors.classes ? undefined : (classes.length ? undefined : "Add at least one class to continue.")}>
                <MultiSelect ariaLabel="Classes (required)" options={CLASSES} selected={classes} onChange={setClasses}
                             placeholder="Select one or more classes" />
              </Field>
              <div className="frow">
                <Field label="Sections" htmlFor="f-sections"
                       hint={classes.length ? "Depends on selected classes." : "Select classes first."}>
                  <MultiSelect ariaLabel="Sections" options={sectionOptions} selected={sections} onChange={setSections}
                               disabled={classes.length === 0}
                               placeholder={classes.length ? "Select sections" : "Select classes first"} />
                </Field>
                <Field label="Academic session" htmlFor="f-session">
                  {postPublish ? (
                    <div className="input-locked">
                      <Select id="f-session" options={SESSIONS} value={session} disabled aria-disabled="true" />
                      <div className="lockrow" style={{ marginTop: 4 }} title="Locked after publish">
                        <Icon name="lock" size={11} /> Locked after publish
                      </div>
                    </div>
                  ) : (
                    <Select id="f-session" options={SESSIONS} value={session} onChange={e => setSession(e.target.value)} />
                  )}
                </Field>
              </div>
            </div>
          )}
        </Card>

        {/* Schedule & marks */}
        <Card className="fcard">
          <h2 className="fcard__title">Schedule &amp; marks</h2>
          <p className="fcard__hint">When it runs and how it's scored. Validated server-side on save.</p>
          <div className="formcol">
            <div className="frow">
              <Field label="Exam date" required htmlFor="f-date" error={errors.examDate}>
                {postPublish ? (
                  <div className="input-locked">
                    <Input id="f-date" type="date" value={examDate} disabled aria-disabled="true" />
                    <div className="lockrow" style={{ marginTop: 4 }} title="Locked after publish">
                      <Icon name="lock" size={11} /> Locked after publish
                    </div>
                  </div>
                ) : (
                  <Input id="f-date" type="date" value={examDate} onChange={e => setExamDate(e.target.value)}
                         error={!!errors.examDate} aria-required="true" />
                )}
              </Field>
              <Field label="Duration (min)" htmlFor="f-dur" hint="Optional">
                <Input id="f-dur" type="number" min="0" value={duration} onChange={e => setDuration(e.target.value)}
                       className="u-mono" placeholder="Optional" />
              </Field>
            </div>
            <div className="frow">
              <Field label="Total marks" required htmlFor="f-total" error={errors.total}>
                <Input id="f-total" type="number" min="1" value={total} onChange={e => setTotal(e.target.value)}
                       className="u-mono" error={!!errors.total} aria-required="true" />
              </Field>
              <Field label="Passing marks" required htmlFor="f-pass" error={errors.passing}
                     hint={errors.passing ? undefined : "Must be less than or equal to total marks."}>
                <Input id="f-pass" type="number" min="0" value={passing} onChange={e => setPassing(e.target.value)}
                       className="u-mono" error={!!errors.passing} aria-required="true" />
              </Field>
            </div>
          </div>
        </Card>

        {/* Reinforces */}
        <Card className="fcard">
          <h2 className="fcard__title">Reinforces (optional)</h2>
          <p className="fcard__hint">Optionally link this exam to a learning space to connect results back to mastery.</p>
          <Field label="LevelUp space" htmlFor="f-space">
            <SpaceCombobox value={linkedSpace} onChange={setLinkedSpace} />
          </Field>
          <div className="privacy-note" style={{ marginTop: "var(--space-4)" }}>
            <Icon name="shield-check" size={15} />
            <span>This link is one-way display metadata — it never exposes student space progress or LevelUp internals on this exam. No answer keys, rubrics, or grading data exist yet; drafts are never visible to students or parents.</span>
          </div>
        </Card>
      </div>
    );

    /* ----- main content per view ----- */
    let main;
    if (view === "permission") {
      main = (
        <EmptyState icon="shield-x" title="You don't have permission to create exams"
          body="Ask a tenant admin to grant exam-create access, or head back to the exams list."
          action={<Button variant="secondary" leadingIcon={<Icon name="arrow-left" size={16} />}>Back to Exams</Button>} />
      );
    } else if (view === "loading") {
      main = (
        <div style={{ position: "relative" }}>
          <div className="formcol">
            {[0, 1, 2, 3].map(i => (
              <Card className="fcard" key={i}>
                <Skeleton variant="text" width="32%" height="18px" />
                <div style={{ height: 12 }} />
                <Skeleton variant="text" width="100%" height="42px" />
                <div style={{ height: 12 }} />
                <Skeleton variant="text" width="60%" height="42px" />
              </Card>
            ))}
          </div>
          <LoadingOverlay />
        </div>
      );
    } else {
      main = (
        <React.Fragment>
          {view === "resume" && (
            <div style={{ marginBottom: "var(--space-5)" }}>
              <Alert variant="info" title="Resuming your draft.">Your last changes are restored. Keep going where you left off.</Alert>
            </div>
          )}
          {isPartial && errorCount > 0 && (
            <div style={{ marginBottom: "var(--space-5)" }} role="alert" aria-live="assertive" tabIndex={-1}>
              <Alert variant="error" title="A few details need attention before you continue.">
                {errorCount} field{errorCount > 1 ? "s" : ""} need attention. Your draft is still saved — fix these to continue.
              </Alert>
            </div>
          )}
          {view === "error" && (
            <div style={{ marginBottom: "var(--space-5)" }} role="alert">
              <Alert variant="error" title="Couldn't save your draft.">
                Your changes are kept locally — nothing is lost. Use the retry on the autosave chip above.
              </Alert>
            </div>
          )}
          {Body}
        </React.Fragment>
      );
    }

    const stepperDoneUpTo = view === "success" ? 1 : 0;

    return (
      <div className="appshell shell">
        {Sidebar}
        {Topbar}
        <main className="appshell__main">
          <div className="wrap">
            <Breadcrumb items={[{ label: "Exams", href: "#" }, { label: "New Exam" }]} />

            {/* demo state switcher (prototype only) */}
            <div className="statebar">
              <span className="statebar__label">State</span>
              <div className="seg" role="group" aria-label="Preview state">
                {[
                  ["populated", "Populated"], ["loading", "Loading"], ["resume", "Resume"],
                  ["empty", "Empty"], ["partial", "Partial"], ["error", "Error"],
                  ["success", "Success"], ["permission", "No-perm"],
                ].map(([k, lbl]) => (
                  <button key={k} aria-pressed={view === k} onClick={() => setView(k)}>{lbl}</button>
                ))}
              </div>
              {view !== "permission" && (
                <label style={{ display: "inline-flex", alignItems: "center", gap: "var(--space-2)", fontSize: "var(--text-xs)", color: "var(--text-secondary)" }}>
                  <input type="checkbox" checked={postPublish} onChange={e => setPostPublish(e.target.checked)} />
                  Post-publish re-entry (lock fields)
                </label>
              )}
            </div>

            {view !== "permission" && (
              <section className="wizhead">
                <div className="wizhead__top">
                  <div>
                    <h1>New Exam</h1>
                    <div className="wizhead__sub">Step 1 of 4 · Setup — record what this exam is before you upload the question paper.</div>
                  </div>
                  <AutosaveChip status={autosaveStatus} onRetry={() => setView("populated")} />
                </div>
                <Stepper current={view === "success" ? 1 : 0} doneUpTo={stepperDoneUpTo} />
              </section>
            )}

            {main}
          </div>
        </main>

        {/* sticky footer nav */}
        {view !== "permission" && (
          <div className="footnav">
            <div className="footnav__inner">
              <Button variant="danger" leadingIcon={<Icon name="trash-2" size={16} />} onClick={() => setDiscardOpen(true)}>Discard</Button>
              <div className="footnav__spacer" />
              <Button variant="secondary" leadingIcon={<Icon name="save" size={16} />}>Save draft</Button>
              <Button variant="primary" disabled={continueDisabled}
                      loading={view === "loading"}
                      trailingIcon={<Icon name="arrow-right" size={16} />}
                      onClick={() => { if (!continueDisabled) setView("success"); }}>
                Continue
              </Button>
            </div>
          </div>
        )}

        {/* discard confirm */}
        <Modal open={discardOpen} onClose={() => setDiscardOpen(false)} title="Discard draft?"
          footer={(<React.Fragment>
            <Button variant="ghost" onClick={() => setDiscardOpen(false)}>Keep editing</Button>
            <Button variant="danger" onClick={() => setDiscardOpen(false)}>Discard</Button>
          </React.Fragment>)}>
          This draft and its details will be removed. This can't be undone.
        </Modal>

        {/* success toast (advance) */}
        {view === "success" && (
          <div style={{ position: "fixed", right: 24, bottom: 92, zIndex: 60 }}>
            <Toast variant="success" title="Draft saved" body="Setup complete — Upload question paper is now unlocked." />
          </div>
        )}
        {view === "error" && (
          <div style={{ position: "fixed", right: 24, bottom: 92, zIndex: 60 }}>
            <Toast variant="error" title="Couldn't save your draft" body="Your changes are kept — retry?" />
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
