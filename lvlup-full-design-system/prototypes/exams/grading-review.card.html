  ];

  const TOTAL_Q = SEED.length;
  const MAX_SCORE = SEED.reduce((s,q)=>s+q.points,0);

  /* ----- copy maps ----- */
  const CONF_LABEL = { low:"Needs review", med:"Spot-check", high:"Auto-accepted" };
  const STATUS_BADGE = {
    needs_review:{cls:"review", icon:"alert-triangle", label:"Needs review"},
    graded:{cls:"graded", icon:"check", label:"AI graded"},
    overridden:{cls:"overridden", icon:"edit-3", label:"Overridden"},
    failed:{cls:"failed", icon:"x", label:"Failed"},
  };
  const FILTERS = [
    {key:"all", label:"All"},
    {key:"needs_review", label:"Needs review"},
    {key:"low_conf", label:"Low confidence"},
  ];

  function gradeFor(pct){ return pct>=85?"A":pct>=70?"B":pct>=55?"C":pct>=40?"D":"F"; }

  /* ============================ APP ============================ */
  function App(){
    const STATES = ["populated","loading","empty","error","partial"];
    const SLABELS = { populated:"Populated", loading:"Loading", empty:"Empty", error:"Error", partial:"Partial" };
    const [view, setView] = useState("populated");

    // grading state (live model)
    const [qs, setQs] = useState(() => SEED.map(q=>({...q})));
    const [focusId, setFocusId] = useState("qs_3");
    const [filter, setFilter] = useState("all");
    const [overrideId, setOverrideId] = useState(null);
    const [ovScore, setOvScore] = useState("");
    const [ovReason, setOvReason] = useState("");
    const [ovErr, setOvErr] = useState("");
    const [confirm, setConfirm] = useState(null); // 'approveAll' | 'markReviewed'
    const [showHelp, setShowHelp] = useState(false);
    const [toast, setToast] = useState(null);
    const [reviewed, setReviewed] = useState(false);
    const [page, setPage] = useState(1);
    const [zoom, setZoom] = useState(100);
    const [split, setSplit] = useState(45);
    const requireReason = true; // gradingConfig.requireOverrideReason
    const allowOverride = true; // gradingConfig.allowManualOverride
    const resultsReleased = true;

    const scrollRef = useRef(null);

    /* derived */
    const visible = qs
      .filter(q => filter==="all" ? true
        : filter==="needs_review" ? (q.status==="needs_review"||q.status==="failed")
        : (q.conf!=null && q.conf < T_REVIEW))
      .slice()
      .sort((a,b)=>{
        const rank = (q)=> q.status==="failed"?0 : q.status==="needs_review"?1 : (q.conf!=null && q.conf<T_AUTO?2:3);
        const r = rank(a)-rank(b);
        return r!==0 ? r : (a.qno-b.qno);
      });

    const reviewQ = visible.filter(q=>q.status==="needs_review"||q.status==="failed");
    const autoApproved = visible.filter(q=>q.status!=="needs_review"&&q.status!=="failed"&&q.conf!=null&&q.conf>=T_AUTO);
    const reviewList = visible.filter(q=>!(q.status!=="needs_review"&&q.status!=="failed"&&q.conf!=null&&q.conf>=T_AUTO));

    const gradedCount = qs.filter(q=>q.status==="graded"||q.status==="overridden").length;
    const needsCount = qs.filter(q=>q.status==="needs_review"||q.status==="failed").length;
    const totalScore = qs.reduce((s,q)=> s + (q.score!=null ? q.score : 0), 0);
    const pct = Math.round((totalScore/MAX_SCORE)*100);
    const grade = gradeFor(pct);
    const allDone = needsCount===0;

    const fireToast = (variant,title,body)=>{ setToast({variant,title,body}); };
    useEffect(()=>{ if(!toast) return; const t=setTimeout(()=>setToast(null),2600); return ()=>clearTimeout(t); },[toast]);

    /* lucide refresh */
    useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });

    /* keyboard cursor */
    const focusNextNeeds = (fromId)=>{
      const order = reviewList.map(q=>q.id);
      const next = reviewList.find(q=>(q.status==="needs_review"||q.status==="failed"));
      if(next) setFocusId(next.id);
    };

    const doApprove = (id)=>{
      setQs(prev=>prev.map(q=> q.id===id ? {...q, status:"graded"} : q));
      const q = qs.find(x=>x.id===id);
      fireToast("success", "Q"+(q?q.qno:"")+" approved", "AI score accepted");
      setTimeout(()=>focusNextNeeds(id),10);
    };
    const doRetry = (id)=>{
      const q = qs.find(x=>x.id===id);
      fireToast("info", "Retry queued", "Q"+(q?q.qno:"")+" re-running through grading");
    };
    const openOverride = (id)=>{
      const q = qs.find(x=>x.id===id); if(!q) return;
      setOverrideId(id); setOvScore(q.score!=null?String(q.score):""); setOvReason(""); setOvErr("");
    };
    const commitOverride = ()=>{
      const q = qs.find(x=>x.id===overrideId); if(!q) return;
      if(requireReason && !ovReason.trim()){ setOvErr("A reason is required to override (rubric-grounded)."); return; }
      const newScore = Math.max(0, Math.min(q.points, Number(ovScore)||0));
      setQs(prev=>prev.map(x=> x.id===overrideId ? {
        ...x, status:"overridden", originalScore:x.score, score:newScore,
        overriddenBy:"S. Verma", overriddenAt:"just now", reason:ovReason.trim()
      } : x));
      fireToast("success", "Q"+q.qno+" overridden", "Now "+newScore+" / "+q.points+" · audited");
      setOverrideId(null);
      setTimeout(()=>focusNextNeeds(overrideId),10);
    };

    /* global key handler */
    useEffect(()=>{
      if(view!=="populated" && view!=="partial") return;
      const onKey=(e)=>{
        const tag=(e.target.tagName||"").toLowerCase();
        const typing = tag==="input"||tag==="textarea"||tag==="select"||e.target.isContentEditable;
        if(e.key==="?"){ setShowHelp(v=>!v); return; }
        if(typing) return;
        const ids = reviewList.map(q=>q.id);
        const idx = ids.indexOf(focusId);
        if(e.key==="j"||e.key==="ArrowDown"){ e.preventDefault(); const n=ids[Math.min(ids.length-1,idx+1)]; if(n)setFocusId(n); }
        else if(e.key==="k"||e.key==="ArrowUp"){ e.preventDefault(); const n=ids[Math.max(0,idx-1)]; if(n)setFocusId(n); }
        else if(e.key==="a"){ const q=qs.find(x=>x.id===focusId); if(q&&(q.status==="needs_review"||q.status==="graded")) doApprove(focusId); }
        else if(e.key==="o"){ if(allowOverride){ const q=qs.find(x=>x.id===focusId); if(q) openOverride(focusId); } }
        else if(e.key==="r"){ const q=qs.find(x=>x.id===focusId); if(q&&(q.status==="failed"||q.status==="needs_review")) doRetry(focusId); }
        else if(e.key==="A"&&e.shiftKey){ setConfirm("approveAll"); }
        else if(e.key==="["){ setPage(p=>Math.max(1,p-1)); }
        else if(e.key==="]"){ setPage(p=>Math.min(SUB.pages,p+1)); }
        else if(e.key==="+"||e.key==="="){ setZoom(z=>Math.min(180,z+20)); }
        else if(e.key==="-"){ setZoom(z=>Math.max(60,z-20)); }
        else if(e.key==="0"){ setZoom(100); }
        else if(e.key==="Escape"){ setOverrideId(null); setShowHelp(false); setConfirm(null); }
      };
      window.addEventListener("keydown", onKey);
      return ()=>window.removeEventListener("keydown", onKey);
    },[view,focusId,qs,reviewList,allowOverride]);

    /* focusing a question → drive answer pane to its mapped page */
    useEffect(()=>{
      const q = qs.find(x=>x.id===focusId);
      if(q && q.pages && q.pages.length) setPage(q.pages[0]);
    },[focusId]);

    /* scroll focused card into view */
    useEffect(()=>{
      if(!scrollRef.current) return;
      const el = scrollRef.current.querySelector('[data-qid="'+focusId+'"]');
      if(el) el.scrollIntoView({block:"nearest", behavior:"smooth"});
    },[focusId,filter]);

    const confirmApproveAll = ()=>{
      const eligible = qs.filter(q=>q.status==="graded"&&q.conf!=null&&q.conf>=T_AUTO);
      setQs(prev=>prev.map(q=> (q.status==="graded"&&q.conf!=null&&q.conf>=T_AUTO)?{...q,status:"graded"}:q));
      fireToast("success", "Approved "+eligible.length+" questions", "Low-confidence questions kept for review");
      setConfirm(null);
    };
    const confirmMarkReviewed = ()=>{ setReviewed(true); setConfirm(null);
      fireToast("success", "Submission reviewed", resultsReleased?"Results already released to students":"Marked reviewed"); };
    const onMarkReviewed = ()=>{ if(needsCount>0){ setConfirm("markReviewed"); } else { confirmMarkReviewed(); } };

    const focusedQ = qs.find(q=>q.id===focusId);

    return (
      <div className="scene">
        <div className="appshell">
          <Sidebar/>
          <Topbar/>
          <main className="appshell__main">
            {/* breadcrumb + state segmented */}
            <div className="crumbbar">
              <Breadcrumb items={[
                {label:"Exams",href:"#"},
                {label:EXAM.title,href:"#"},
                {label:"Submissions",href:"#"},
                {label:SUB.rollNumber},
              ]}/>
              <div className="segrow">
                <span className="seg-label">State</span>
                <div className="seg" role="group" aria-label="Preview state">
                  {STATES.map(s=>(
                    <button key={s} aria-pressed={view===s} onClick={()=>setView(s)}>{SLABELS[s]}</button>
                  ))}
                </div>
              </div>
            </div>

            {view==="error" ? (
              <div style={{padding:"var(--space-12) var(--gutter-desktop)",maxWidth:560,margin:"0 auto"}}>
                <Alert variant="error" title="Couldn't load this submission">
                  It may have moved or you may not have access.
                  <div style={{marginTop:"var(--space-3)",display:"flex",gap:"var(--space-2)"}}>
                    <Button variant="primary" leadingIcon={<Icon name="rotate-ccw" size={15}/>}>Retry</Button>
                    <Button variant="ghost">Back to submissions</Button>
                  </div>
                </Alert>
              </div>
            ) : view==="empty" ? (
              <div style={{padding:"var(--space-16) var(--gutter-desktop)"}}>
                <EmptyState icon={<Icon name="scan-search" size={30}/>}
                  title="No graded questions yet"
                  body="Scouting hasn't mapped this sheet to questions yet."
                  action={<Button variant="secondary" leadingIcon={<Icon name="rotate-ccw" size={15}/>}>Re-run scouting</Button>}/>
              </div>
            ) : (
              <React.Fragment>
                {/* SUBMISSION HEADER (sticky) */}
                <div className="subhead">
                  {view==="loading" ? <HeaderSkeleton/> : (
                    <React.Fragment>
                      <div className="subhead__top">
                        <div>
                          <div className="subhead__id">
                            <Avatar initials={SUB.initials} size="lg"/>
                            <div>
                              <div className="subhead__name">{SUB.studentName}</div>
                              <div className="subhead__meta">{SUB.rollNumber} · {SUB.className} · exam {EXAM.title}</div>
                            </div>
                          </div>
                          <div className="result-summary">
                            <span className="result-score">{totalScore}<span className="denom"> / {MAX_SCORE}</span></span>
                            <span className="result-pct">{pct}%</span>
                            <GradePill grade={grade}/>
                            {needsCount>0 && (
                              <span className="needs-chip"><Icon name="alert-triangle" size={13}/>{needsCount} need review</span>
                            )}
                            {resultsReleased && (
                              <span className="released-chip"><Icon name="lock" size={11}/>Results released · 2d ago</span>
                            )}
                          </div>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"var(--space-2)"}}>
                          {reviewed ? (
                            <span className="pstatus pstatus--reviewed"><Icon name="check-circle" size={14}/>Reviewed · S. Verma</span>
                          ) : view==="partial" ? (
                            <span className="pstatus pstatus--partial"><Icon name="alert-triangle" size={14}/>Partially graded</span>
                          ) : (
                            <span className="pstatus pstatus--ready"><Icon name="inbox" size={14}/>Ready for review</span>
                          )}
                          <div className="subhead__actions">
                            <Button variant="secondary" size="sm" leadingIcon={<Icon name="check-check" size={15}/>}
                              onClick={()=>setConfirm("approveAll")}>Approve all</Button>
                            <Button variant={allDone?"primary":"secondary"} size="sm"
                              leadingIcon={<Icon name="clipboard-check" size={15}/>} onClick={onMarkReviewed}>Mark reviewed</Button>
                          </div>
                        </div>
                      </div>
                      <div className="subhead__progress">
                        <div className="progress-wrap">
                          <div className="progress-cap"><span>gradingProgress</span><span>{gradedCount} / {TOTAL_Q} graded</span></div>
                          <ProgressBar value={Math.round((gradedCount/TOTAL_Q)*100)} variant="success"/>
                        </div>
                        {allDone && !reviewed && (
                          <span className="pstatus pstatus--reviewed"><Icon name="check-circle" size={14}/>All questions reviewed</span>
                        )}
                      </div>
                    </React.Fragment>
                  )}
                </div>

                {/* WORKSPACE */}
                <div className="workspace" style={{"--split":split+"%"}}>
                  <AnswerPane loading={view==="loading"} page={page} setPage={setPage}
                    zoom={zoom} setZoom={setZoom} focusedQ={focusedQ}/>
                  <div className="divider" role="separator" aria-orientation="vertical"
                    aria-label="Resize panes" tabIndex={0}
                    onKeyDown={(e)=>{ if(e.key==="ArrowLeft")setSplit(s=>Math.max(40,s-3)); if(e.key==="ArrowRight")setSplit(s=>Math.min(65,s+3)); }}/>
                  <div className="reviewpane">
                    {/* toolbar */}
                    <div className="rqtoolbar">
                      <div className="rqtoolbar__group">
                        <span className="rqtoolbar__lbl">Filter</span>
                        {FILTERS.map(f=>{
                          const count = f.key==="all" ? qs.length
                            : f.key==="needs_review" ? needsCount
                            : qs.filter(q=>q.conf!=null&&q.conf<T_REVIEW).length;
                          return (
                            <button key={f.key} className="chip-btn" onClick={()=>setFilter(f.key)} aria-pressed={filter===f.key}>
                              <Chip active={filter===f.key}>{f.label}{f.key!=="all" && count>0 ? " · "+count : ""}</Chip>
                            </button>
                          );
                        })}
                      </div>
                      <div className="rqtoolbar__group">
                        <span className="sortsel"><Icon name="arrow-down-narrow-wide" size={13}/>Review priority</span>
                        <IconButton label="Keyboard shortcuts" size="sm" icon={<Icon name="keyboard" size={16}/>}
                          onClick={()=>setShowHelp(v=>!v)}/>
                      </div>
                      {showHelp && <HelpPopover onClose={()=>setShowHelp(false)}/>}
                    </div>

                    {/* scroll body */}
                    <div className="reviewpane__scroll" ref={scrollRef}
                      role="list" aria-label="Questions to review" aria-activedescendant={"qcard-"+focusId}>
                      {view==="loading" ? (
                        [0,1,2].map(i=><QCardSkeleton key={i}/>)
                      ) : (
                        <React.Fragment>
                          {view==="partial" && (
                            <Alert variant="warning" title="Some questions couldn't be graded automatically">
                              Failed questions are surfaced first. Retry them, or grade manually.
                            </Alert>
                          )}
                          {reviewList.length===0 && (
                            <Alert variant="success" title="All questions reviewed">
                              Nothing left in this filter. Mark the submission reviewed when ready.
                            </Alert>
                          )}

                          {reviewList.map(q=>(
                            <QuestionReviewCard key={q.id} q={q}
                              focused={q.id===focusId}
                              allowOverride={allowOverride}
                              onFocus={()=>setFocusId(q.id)}
                              onApprove={()=>doApprove(q.id)}
                              onOverride={()=>openOverride(q.id)}
                              onRetry={()=>doRetry(q.id)}
                              isOverriding={overrideId===q.id}
                              ovScore={ovScore} setOvScore={setOvScore}
                              ovReason={ovReason} setOvReason={setOvReason}
                              ovErr={ovErr} requireReason={requireReason}
                              onCommit={commitOverride} onCancel={()=>setOverrideId(null)}/>
                          ))}

                          {autoApproved.length>0 && (
                            <div className="autogroup">
                              <Accordion defaultOpen={-1} items={[{
                                title: (<span style={{display:"inline-flex",alignItems:"center",gap:"var(--space-2)",fontFamily:"var(--font-ui)",fontWeight:"var(--weight-medium)"}}>
                                  <Icon name="check-circle" size={16}/> {autoApproved.length} auto-approved (high confidence)
                                </span>),
                                content: (
                                  <div style={{display:"flex",flexDirection:"column",gap:"var(--space-3)"}}>
                                    {autoApproved.map(q=>(
                                      <div key={q.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"var(--space-3)",padding:"var(--space-2) 0",borderBottom:"1px solid var(--border-subtle)"}}>
                                        <div>
                                          <span className="qcard__qno">Q{q.qno} · {q.type}</span>
                                          <div style={{fontSize:"var(--text-sm)",color:"var(--text-secondary)",marginTop:2}}>{q.prompt.replace(/\$[^$]*\$/g,"…")}</div>
                                        </div>
                                        <div style={{display:"flex",alignItems:"center",gap:"var(--space-2)"}}>
                                          <ConfidenceBadge level="high" value={q.conf.toFixed(2)}/>
                                          <span className="scorebar__score" style={{fontSize:"var(--text-base)"}}>{q.score}<span className="denom"> / {q.points}</span></span>
                                          <Button variant="ghost" size="sm" onClick={()=>{setFocusId(q.id);}}>Expand</Button>
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                )
                              }]}/>
                            </div>
                          )}
                        </React.Fragment>
                      )}
                    </div>
                  </div>
                </div>
              </React.Fragment>
            )}
          </main>
        </div>

        {/* confirm dialogs */}
        <Modal open={confirm==="approveAll"} onClose={()=>setConfirm(null)} title="Approve AI-graded questions"
          footer={<React.Fragment>
            <Button variant="ghost" onClick={()=>setConfirm(null)}>Cancel</Button>
            <Button variant="primary" onClick={confirmApproveAll}>Approve {qs.filter(q=>q.status==="graded"&&q.conf!=null&&q.conf>=T_AUTO).length}</Button>
          </React.Fragment>}>
          Approve {qs.filter(q=>q.status==="graded"&&q.conf!=null&&q.conf>=T_AUTO).length} AI-graded questions for {SUB.rollNumber}?
          {" "}{needsCount} low-confidence / failed questions are excluded and stay for review.
        </Modal>

        <Modal open={confirm==="markReviewed"} onClose={()=>setConfirm(null)} title="Mark submission reviewed?"
          footer={<React.Fragment>
            <Button variant="ghost" onClick={()=>setConfirm(null)}>Cancel</Button>
            <Button variant="primary" onClick={confirmMarkReviewed}>Mark reviewed anyway</Button>
          </React.Fragment>}>
          {needsCount} questions still need review. Mark the submission reviewed anyway? This is discouraged — unreviewed AI scores will be finalized.
        </Modal>

        {/* toast */}
        {toast && (
          <div style={{position:"fixed",right:"var(--space-5)",bottom:"var(--space-5)",zIndex:50}} aria-live="polite">
            <Toast variant={toast.variant} title={toast.title} body={toast.body}/>
          </div>
        )}
      </div>
    );
  }

  /* ---------- Sidebar ---------- */
  function Sidebar(){
    return (
      <aside className="appshell__sidebar">
        <div className="sidebar__brand">
          <span className="sidebar__brand-mark">L</span>
          <span className="sidebar__brand-name">Lyceum</span>
        </div>
        <nav className="sidebar__nav" aria-label="Primary">
          <span className="sidebar__section-label">Teach</span>
          <NavItem icon="layout-dashboard" href="#">Dashboard</NavItem>
          <NavItem icon="users" href="#">Students</NavItem>
          <NavItem icon="book-open" href="#">Spaces</NavItem>
          <span className="sidebar__section-label" style={{marginTop:"var(--space-3)"}}>Assess</span>
          <NavItem icon="file-check-2" href="#" active>Exams</NavItem>
          <NavItem icon="scan-line" href="#">Scan intake</NavItem>
          <NavItem icon="bar-chart-3" href="#">Analytics</NavItem>
          <span className="sidebar__section-label" style={{marginTop:"var(--space-3)"}}>Admin</span>
          <NavItem icon="settings" href="#">Settings</NavItem>
        </nav>
        <div className="sb-foot">
          <Avatar size="sm" initials="SV"/>
          <div className="sb-foot__meta">
            <span className="sb-foot__name">S. Verma</span>
            <span className="sb-foot__role">role: grader</span>
          </div>
        </div>
      </aside>
    );
  }

  /* ---------- Topbar ---------- */
  function Topbar(){
    return (
      <header className="appshell__topbar">
        <div className="tenant" role="button" tabIndex={0}>
          <Icon name="building-2" size={15}/> Subhang Academy
          <span className="tenant__code">SUB001</span>
          <Icon name="chevrons-up-down" size={13}/>
        </div>
        <div className="tbsearch">
          <Icon name="search" size={15}/>
          <input placeholder="Go to submission, student…" aria-label="Search"/>
          <Kbd>⌘K</Kbd>
        </div>
        <div className="topbar__spacer"/>
        <div className="tb-icons">
          <span className="notif"><IconButton label="Notifications" icon={<Icon name="bell" size={18}/>}/><span className="notif__dot"/></span>
          <IconButton label="Help" icon={<Icon name="circle-help" size={18}/>}/>
          <Avatar size="sm" initials="SV"/>
        </div>
      </header>
    );
  }

  /* ---------- Answer-sheet pane ---------- */
  function AnswerPane({loading,page,setPage,zoom,setZoom,focusedQ}){
    const pages = [1,2,3,4];
    const mapped = focusedQ && focusedQ.pages ? focusedQ.pages : [];
    const focusRoute = focusedQ ? routeOf(focusedQ.conf==null?0:focusedQ.conf) : "low";
    return (
      <div className="answerpane">
        <div className="answerpane__toolbar">
          <span className="answerpane__pagelabel">
            {loading ? "—" : "Answer sheet · page "+page+" / "+SUB.pages}
            {!loading && focusedQ && <span style={{color:"var(--brand-primary)"}}> · mapped to Q{focusedQ.qno}</span>}
          </span>
          <div className="answerpane__zoom">
            <IconButton label="Zoom out" size="sm" icon={<Icon name="zoom-out" size={16}/>} onClick={()=>setZoom(z=>Math.max(60,z-20))}/>
            <span className="zval">{zoom}%</span>
            <IconButton label="Zoom in" size="sm" icon={<Icon name="zoom-in" size={16}/>} onClick={()=>setZoom(z=>Math.min(180,z+20))}/>
            <IconButton label="Reset zoom" size="sm" icon={<Icon name="maximize" size={16}/>} onClick={()=>setZoom(100)}/>
          </div>
        </div>

        <div className="answerpane__canvas">
          {loading ? (
            <div style={{width:"min(92%,520px)",aspectRatio:"1/1.34"}}><Skeleton width="100%" height="100%"/></div>
          ) : (
            <div className="sheet" style={{transform:"scale("+(zoom/100)+")"}}
              role="img" aria-label={"Answer sheet page "+page+" of "+SUB.pages+(focusedQ?", mapped to Q"+focusedQ.qno:"")}>
              <div className="sheet__ruled"/>
              <div className="sheet__hdr"><span>{SUB.rollNumber} · {EXAM.title}</span><span>p.{page}/{SUB.pages}</span></div>
              {[0,1,2,3].map(i=>(
                <div key={i} className="sheet__ink" style={{top:(80+i*34)+"px",width:(70-i*9)+"%"}}/>
              ))}
              {mapped.indexOf(page)>=0 && (
                <div className="sheet__map" style={{top:"64px",height:"170px",
                  borderColor:"var(--confidence-"+focusRoute+")",
                  background:"color-mix(in srgb, var(--confidence-"+focusRoute+") 9%, transparent)"}}>
                  <span className="sheet__maplabel" style={{background:"var(--confidence-"+focusRoute+")"}}>Q{focusedQ.qno}</span>
                </div>
              )}
            </div>
          )}
        </div>

        <div className="answerpane__nav">
          <IconButton label="Previous page" size="sm" icon={<Icon name="chevron-left" size={18}/>}
            onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={loading||page<=1}/>
          <div className="pagedots">
            {pages.map(p=>(
              <button key={p} className={"pagedot"+(mapped.indexOf(p)>=0?" mapped":"")} aria-current={page===p}
                onClick={()=>setPage(p)} aria-label={"Page "+p}>{p}</button>
            ))}
          </div>
          <IconButton label="Next page" size="sm" icon={<Icon name="chevron-right" size={18}/>}
            onClick={()=>setPage(p=>Math.min(SUB.pages,p+1))} disabled={loading||page>=SUB.pages}/>
        </div>

        <div className="thumbrail" aria-label="Page thumbnails">
          {loading ? pages.map(p=><Skeleton key={p} width={46} height={62}/>) :
            pages.map(p=>(
              <button key={p} className={"thumb"+(mapped.indexOf(p)>=0?" mapped":"")} aria-current={page===p}
                onClick={()=>setPage(p)} aria-label={"Thumbnail page "+p}>
                <span className="thumb__lines"/>
                <span className="thumb__n">{p}</span>
              </button>
            ))}
        </div>
      </div>
    );
  }

  /* ---------- one review card ---------- */
  function QuestionReviewCard(props){
    const { q, focused, allowOverride, onFocus, onApprove, onOverride, onRetry,
      isOverriding, ovScore, setOvScore, ovReason, setOvReason, ovErr, requireReason, onCommit, onCancel } = props;
    const isFailed = q.status==="failed";
    const route = q.conf==null ? "low" : routeOf(q.conf);
    const sb = STATUS_BADGE[q.status] || STATUS_BADGE.graded;

    return (
      <div data-qid={q.id} id={"qcard-"+q.id} role="listitem"
        className={"qcard"+(focused?" qcard--focused":"")+(q.status==="needs_review"||isFailed?" qcard--review":(route==="med"?" qcard--spot":""))}
        tabIndex={0} onClick={onFocus}
        aria-labelledby={"qh-"+q.id}>
        <div className="qcard__head">
          <div>
            <span className="qcard__qno">Q{q.qno} · {q.type} · {q.points} pts</span>
            <div className="qcard__title" id={"qh-"+q.id}>{q.prompt.replace(/\$[^$]*\$/g,"…").slice(0,60)}{q.prompt.length>60?"…":""}</div>
            <div className="qcard__statusrow">
              {q.conf!=null ? (
                <ConfidenceBadge level={route} value={q.conf.toFixed(2)}
                  className=""/>
              ) : (
                <span className="qbadge qbadge--failed"><Icon name="x" size={12}/>No AI result</span>
              )}
              {q.conf!=null && <span style={{fontFamily:"var(--font-ui)",fontSize:"var(--text-2xs)",color:"var(--text-muted)"}}>{CONF_LABEL[route]}</span>}
              <span className={"qbadge qbadge--"+sb.cls}><Icon name={sb.icon} size={12}/>{sb.label}</span>
              {q.mistake && q.mistake!=="—" && <span className="qbadge"><Icon name="tag" size={12}/>{q.mistake}</span>}
              {focused && <span className="qbadge" style={{color:"var(--brand-primary)",borderColor:"var(--border-focus)"}}><Icon name="crosshair" size={12}/>Focused · j/k</span>}
            </div>
          </div>
        </div>

        {isFailed ? (
          <div className="qcard__body">
            <Alert variant="error" title="AI grading unavailable">
              This question is queued for manual review (quota / circuit-breaker). A dead-letter entry was written.
            </Alert>
            <div className="qactions">
              <Button variant="secondary" size="sm" leadingIcon={<Icon name="rotate-ccw" size={15}/>} onClick={onRetry}>Retry</Button>
              {allowOverride && <Button variant="ghost" size="sm" leadingIcon={<Icon name="edit-3" size={15}/>} onClick={onOverride}>Grade manually</Button>}
              <span className="qactions__hint"><span className="kbd">r</span> retry</span>
            </div>
          </div>
        ) : (
          <div className="qcard__body">
            <div className="qprompt">{renderPrompt(q.prompt)}</div>

            {/* score + confidence bar */}
            <div className="scorebar">
              <span className="scorebar__score">
                {q.originalScore!=null && <span className="was">{q.originalScore}</span>}
                {q.score}<span className="denom"> / {q.points}</span>
              </span>
              <div className="confbar">
                <div className="confbar__track">
                  <div className={"confbar__fill confbar__fill--"+route} style={{width:Math.round((q.conf||0)*100)+"%"}}/>
                </div>
                <div className="confbar__cap"><span>AI confidence</span><span style={{fontFamily:"var(--font-mono)"}}>{(q.conf||0).toFixed(2)}</span></div>
              </div>
            </div>

            {/* rubric */}
            {q.rubric.length>0 && <RubricBreakdown criteria={q.rubric}/>}

            {/* feedback panel */}
            {q.feedback.length>0 && (
              <div className="feedpanel">
                {q.feedback.map((f,i)=>(
                  <div className="feedrow" key={i}>
                    <span className="feedrow__lbl">{f.lbl}</span>
                    <div style={{flex:1}}>
                      {f.sev && <span className={"feedrow__sev sev--"+f.sev}><Icon name={f.sev==="major"?"alert-triangle":"info"} size={11}/>{f.sev}</span>}
                      {f.sev?" ":""}{f.text}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* strengths / weaknesses / missing */}
            {(q.strengths.length||q.weaknesses.length||q.missing.length)>0 && (
              <DefinitionList items={[
                q.strengths.length && {term:"Strengths", value:q.strengths.join(" · ")},
                q.weaknesses.length && {term:"Weaknesses", value:q.weaknesses.join(" · ")},
                q.missing.length && {term:"Missing concepts", value:q.missing.join(" · ")},
              ].filter(Boolean)}/>
            )}

            {/* model answer — staff only */}
            <AnswerKeyLock title="Staff only — not shown to students">
              Model answer & rubric notes are stripped from student/parent payloads.
            </AnswerKeyLock>

            {/* override audit timeline (if overridden) */}
            {q.status==="overridden" && (
              <div>
                <div style={{fontFamily:"var(--font-mono)",fontSize:"var(--text-2xs)",color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:".05em",marginBottom:"var(--space-2)"}}>Override audit</div>
                <Timeline items={[
                  {time:"AI", label:"AI graded "+q.originalScore+" / "+q.points, variant:"muted"},
                  {time:q.overriddenAt, label:q.overriddenBy+" → "+q.score+" / "+q.points+" · "+q.reason, variant:"success"},
                ]}/>
              </div>
            )}

            {/* inline override editor */}
            {isOverriding ? (
              <div className="ov">
                <ManualOverrideControl label={"Override Q"+q.qno+" — non-destructive (keeps original AI score "+(q.originalScore!=null?q.originalScore:q.score)+" / "+q.points+")"}/>
                <div className="ov__row">
                  <div className="ov__scorefield">
                    <Field label="New score" required>
                      <Input type="number" min={0} max={q.points} value={ovScore}
                        onChange={(e)=>setOvScore(e.target.value)} aria-label="Override score"/>
                    </Field>
                  </div>
                  <div style={{flex:1,minWidth:240}}>
                    <Field label="Reason" required error={ovErr||undefined}>
                      <Textarea rows={2} value={ovReason} onChange={(e)=>setOvReason(e.target.value)}
                        placeholder="Why are you changing this score? (e.g. 'Awarded method marks per rubric C2')"
                        error={ovErr?true:undefined}/>
                    </Field>
                  </div>
                </div>
                <div className="ov__foot">
                  <Button variant="ghost" size="sm" onClick={onCancel}>Cancel <span className="kbd" style={{marginLeft:6}}>Esc</span></Button>
                  <Button variant="primary" size="sm" onClick={onCommit}>Save override <span className="kbd" style={{marginLeft:6}}>Enter</span></Button>
                </div>
              </div>
            ) : (
              <div className="qactions">
                <Button variant="primary" size="sm" leadingIcon={<Icon name="check" size={15}/>} onClick={onApprove}>Approve</Button>
                {allowOverride && <Button variant="secondary" size="sm" leadingIcon={<Icon name="edit-3" size={15}/>} onClick={onOverride}>Override</Button>}
                <Button variant="ghost" size="sm" leadingIcon={<Icon name="rotate-ccw" size={15}/>} onClick={onRetry}>Retry</Button>
                <span className="qactions__hint"><span className="kbd">a</span> approve · <span className="kbd">o</span> override · <span className="kbd">r</span> retry</span>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  /* render prompt with simple inline $math$ → styled span */
  function renderPrompt(p){
    const parts = p.split(/(\$[^$]*\$)/g);
    return parts.map((seg,i)=> seg.startsWith("$") && seg.endsWith("$")
      ? <span key={i} className="katex">{seg.slice(1,-1)}</span>
      : <span key={i}>{seg}</span>);
  }

  /* ---------- keyboard help ---------- */
  function HelpPopover({onClose}){
    const rows = [
      ["j / ↓","Focus next question"],["k / ↑","Focus previous"],
      ["a","Approve focused AI score"],["o","Open override"],["r","Retry failed / needs-review"],
      ["Enter","Commit override"],["Esc","Close / cancel"],
      ["[ / ]","Prev / next answer page"],["+ / − / 0","Zoom in / out / reset"],
      ["Shift+A","Approve all"],["?","Toggle this help"],
    ];
    return (
      <div className="helpover" role="dialog" aria-label="Keyboard shortcuts">
        <h3 className="helpover__title">Keyboard shortcuts</h3>
        {rows.map((r,i)=>(
          <div className="helprow" key={i}><span>{r[1]}</span><span className="kbd">{r[0]}</span></div>
        ))}
        <div style={{marginTop:"var(--space-3)",textAlign:"right"}}>
          <Button variant="ghost" size="sm" onClick={onClose}>Close</Button>
        </div>
      </div>
    );
  }

  /* ---------- skeletons ---------- */
  function HeaderSkeleton(){
    return (
      <div>
        <div style={{display:"flex",gap:"var(--space-3)",alignItems:"center"}}>
          <Skeleton variant="circle" width={48} height={48}/>
          <div style={{flex:1,maxWidth:360}}>
            <Skeleton width="50%" height={20}/>
            <div style={{height:8}}/>
            <Skeleton width="70%" height={12}/>
          </div>
        </div>
        <div style={{height:16}}/>
        <Skeleton width="40%" height={28}/>
        <div style={{height:16}}/>
        <Skeleton width="32%" height={10}/>
      </div>
    );
  }
  function QCardSkeleton(){
    return (
      <div className="qcard"><div style={{padding:"var(--space-4)"}}>
        <Skeleton width="30%" height={12}/>
        <div style={{height:10}}/>
        <Skeleton width="80%" height={16}/>
        <div style={{height:16}}/>
        <Skeleton width="100%" height={12}/>
        <div style={{height:6}}/>
        <Skeleton width="100%" height={12}/>
        <div style={{height:6}}/>
        <Skeleton width="60%" height={12}/>
      </div></div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
