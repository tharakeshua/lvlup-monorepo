<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
/* screen-local layout ONLY — Lyceum vars only, NO raw hex, NO :root token redefinition */
body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}
.scene{height:1024px;overflow:hidden}

/* ----- AppShell sidebar nav ----- */
.sb-scroll{flex:1;overflow-y:auto}
.sb-foot{padding:var(--space-3);border-top:1px solid var(--border-subtle);display:flex;align-items:center;gap:var(--space-3)}
.sb-foot__meta{display:flex;flex-direction:column;line-height:1.2}
.sb-foot__name{font-size:var(--text-sm);font-weight:var(--weight-medium)}
.sb-foot__role{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono)}

/* ----- Topbar ----- */
.tenant{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;background:var(--bg-surface)}
.tenant__code{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
.tbsearch{display:flex;align-items:center;gap:var(--space-2);flex:1;max-width:420px;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);color:var(--text-muted);background:var(--bg-surface-sunken);cursor:text}
.tbsearch input{border:0;background:transparent;flex:1;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);outline:none}
.tbsearch .kbd{margin-left:auto}
.tb-icons{display:flex;align-items:center;gap:var(--space-2)}
.notif{position:relative}
.notif__dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:var(--radius-pill);background:var(--status-error);border:2px solid var(--bg-surface)}

/* ----- page body ----- */
.page{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:var(--space-5)}

/* state segmented control */
.toprow{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);margin-bottom:var(--space-4);flex-wrap:wrap}
.segrow{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap}
.seg{display:inline-flex;background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:2px}
.seg button{font-family:var(--font-ui);font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--text-secondary);background:transparent;border:0;padding:var(--space-1) var(--space-3);border-radius:var(--radius-pill);cursor:pointer;transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard)}
.seg button[aria-pressed="true"]{background:var(--bg-surface);color:var(--brand-primary);box-shadow:var(--shadow-e1)}
.seg-label{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}

/* ----- header row ----- */
.shead{display:flex;align-items:flex-start;gap:var(--space-4);flex-wrap:wrap}
.shead__titlewrap{flex:1;min-width:0}
.s-title{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-2xl);line-height:var(--leading-2xl);letter-spacing:-0.02em;margin:0}
.s-sub{margin:var(--space-2) 0 0;font-size:var(--text-sm);color:var(--text-secondary);display:flex;flex-wrap:wrap;gap:var(--space-2);align-items:center}
.s-sub .mono{font-family:var(--font-mono);color:var(--text-primary)}
.s-sub__sep{color:var(--border-strong)}
.shead__rt{display:flex;align-items:center;gap:var(--space-3)}

/* status badge (icon + label, never color-only) */
.statusbadge{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-3);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-semibold);border:1px solid transparent;white-space:nowrap}
.statusbadge svg{width:14px;height:14px}
.sb--neutral{background:var(--bg-inset);color:var(--text-secondary);border-color:var(--border-strong)}
.sb--info{background:var(--status-info-subtle);color:var(--status-info)}
.sb--brand{background:var(--brand-subtle);color:var(--brand-primary)}
.sb--warning{background:var(--status-warning-subtle);color:var(--status-warning)}
.sb--success{background:var(--status-success-subtle);color:var(--status-success)}
.sb--error{background:var(--status-error-subtle);color:var(--status-error)}
.statusbadge--spin svg{animation:spin 1.4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ----- counts strip ----- */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--space-4)}
.kpi{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-4) var(--space-5);display:flex;flex-direction:column;gap:var(--space-2)}
.kpi__top{display:flex;align-items:center;justify-content:space-between;gap:var(--space-2)}
.kpi__label{font-size:var(--text-xs);font-weight:var(--weight-semibold);text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)}
.kpi__icon{display:grid;place-items:center}
.kpi__icon svg{width:16px;height:16px}
.kpi__icon--total{color:var(--text-muted)}
.kpi__icon--graded{color:var(--status-success)}
.kpi__icon--review{color:var(--status-warning)}
.kpi__icon--failed{color:var(--status-error)}
.kpi__icon--released{color:var(--brand-primary)}
.kpi__val{font-family:var(--font-mono);font-size:var(--text-2xl);font-weight:var(--weight-medium);line-height:1;letter-spacing:-0.01em}

/* ----- toolbar ----- */
.toolbar{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-3) var(--space-4);display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap}
.toolbar__search{display:flex;align-items:center;gap:var(--space-2);min-width:240px;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken)}
.toolbar__search svg{width:15px;height:15px;color:var(--text-muted)}
.toolbar__search input{border:0;background:transparent;flex:1;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);outline:none}
.toolbar__sp{flex:1}
.toolbar .select{min-width:180px;width:auto}
.livesync{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-3);border-radius:var(--radius-pill);font-family:var(--font-mono);font-size:var(--text-2xs);background:var(--status-success-subtle);color:var(--status-success);white-space:nowrap}
.livesync--err{background:var(--status-warning-subtle);color:var(--status-warning)}
.livedot{width:7px;height:7px;border-radius:var(--radius-pill);background:var(--status-success);animation:pulse 1.8s ease-in-out infinite}
.livesync--err .livedot{background:var(--status-warning);animation:none}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}

/* selection bar (appears when rows selected) */
.selbar{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;width:100%;padding-top:var(--space-3);margin-top:var(--space-1);border-top:1px dashed var(--border-subtle)}
.selbar__count{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--brand-primary)}
.selbar__count .mono{font-family:var(--font-mono)}

/* active filter chip row */
.filterchips{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}

/* ----- table ----- */
.tbl-wrap{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;position:relative}
.tbl-wrap .table{margin:0}
.table thead th.col-check,.table tbody td.col-check{width:44px;text-align:center}
.table thead th.col-sort{cursor:pointer;user-select:none}
.sorth{display:inline-flex;align-items:center;gap:var(--space-1)}
.sorth svg{width:13px;height:13px;color:var(--brand-primary)}
.qrow-click{cursor:pointer}
.qrow-click:hover{background:var(--bg-surface-sunken)}
.qrow-wash{animation:wash var(--dur-slow) var(--ease-standard)}
@keyframes wash{from{background:var(--status-warning-subtle)}to{background:transparent}}
.student{display:flex;align-items:center;gap:var(--space-3)}
.student__meta{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.student__name{font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-primary)}
.student__roll{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
.classcell{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary)}
.scannerchip{display:inline-flex;align-items:center;gap:4px;padding:1px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-2xs);font-weight:var(--weight-medium);background:var(--bg-inset);color:var(--text-secondary);border:1px solid var(--border-subtle)}
.scannerchip svg{width:11px;height:11px}
.progcell{display:flex;align-items:center;gap:var(--space-2);min-width:140px}
.progcell .progress{flex:1}
.progcell__txt{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);white-space:nowrap}
.scorecell{display:flex;align-items:center;gap:var(--space-3);justify-content:flex-end}
.scorecell__num{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-primary);white-space:nowrap}
.scorecell__pct{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
.scorecell__dash{font-family:var(--font-mono);color:var(--text-muted)}
.released-tick{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-2xs);font-weight:var(--weight-medium);color:var(--status-success)}
.released-tick svg{width:13px;height:13px}
.rowact{display:flex;align-items:center;gap:var(--space-2);justify-content:flex-end}
.dlqlink{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-2xs);font-family:var(--font-mono);color:var(--status-error);text-decoration:none;border-bottom:1px dotted var(--status-error)}
.dlqlink svg{width:12px;height:12px}
.eligible-off{opacity:.45}

/* row loading overlay (optimistic) */
.rowoverlay{position:absolute;inset:0;background:color-mix(in srgb, var(--bg-surface) 55%, transparent);display:grid;place-items:center;z-index:4}

/* pagination row */
.pagrow{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-top:1px solid var(--border-subtle)}
.pagrow__meta{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}

/* tooltip on disabled / hint */
.tipwrap{position:relative;display:inline-flex}
.tipwrap__bub{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);z-index:40;background:var(--text-primary);color:var(--text-on-accent);font-size:var(--text-2xs);line-height:1.4;padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);width:max-content;max-width:240px;box-shadow:var(--shadow-e2);opacity:0;pointer-events:none;transition:opacity var(--dur-fast) var(--ease-standard)}
.tipwrap:hover .tipwrap__bub,.tipwrap:focus-within .tipwrap__bub{opacity:1}

.modal-actions{display:flex;gap:var(--space-3);justify-content:flex-end}
.modal-blurb{font-size:var(--text-sm);color:var(--text-secondary);line-height:var(--leading-base)}
.modal-blurb strong{color:var(--text-primary)}

/* toast host */
.toasts{position:absolute;right:var(--space-6);bottom:var(--space-6);z-index:60;display:flex;flex-direction:column;gap:var(--space-3);max-width:360px}

/* empty-in-table */
.tblempty{padding:var(--space-10) var(--space-6)}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}

@media (prefers-reduced-motion: reduce){
  .seg button{transition:none}
  .livedot{animation:none}
  .statusbadge--spin svg{animation:none}
  .qrow-wash{animation:none}
}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head><body><div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  const {
    Button, IconButton, Chip,
    Modal, Alert, EmptyState, Skeleton, Select, Pagination,
    NavItem, Breadcrumb, Avatar, Kbd, Toast,
    ConfidenceBadge, GradePill, Checkbox
  } = window.LvlupV0DesignSystem_5d0725;

  /* refresh lucide glyphs after every render */
  function useLucide(){
    useEffect(function(){ if (window.lucide && window.lucide.createIcons) window.lucide.createIcons(); });
  }

  /* ============================================================= */
  /* Mock Exam doc (header context) — server-authoritative status  */
  /* ============================================================= */
  const EXAM = {
    examId: "exm_8KQ2dR4mN",
    title: "Physics — Unit III Mid-Term",
    status: "grading",            // mirrors Exam.status
    totalMarks: 50,
    passingMarks: 20,
  };

  /* SubmissionPipelineStatus → badge meta (icon + label, never color-only).
     ocr_* states never surfaced. */
  const PIPELINE = {
    uploaded:             { tone:"neutral", icon:"inbox",            label:"Uploaded" },
    scouting:             { tone:"brand",   icon:"loader",           label:"Scouting",          spin:true },
    scouting_failed:      { tone:"error",   icon:"x-circle",         label:"Scouting failed" },
    scouting_complete:    { tone:"info",    icon:"scan-text",        label:"Scouted" },
    grading:              { tone:"brand",   icon:"loader",           label:"Grading",           spin:true },
    grading_partial:      { tone:"warning", icon:"flag",             label:"Partially graded" },
    grading_failed:       { tone:"error",   icon:"x-circle",         label:"Grading failed" },
    grading_complete:     { tone:"success", icon:"check-circle",     label:"Grading complete" },
    finalization_failed:  { tone:"error",   icon:"x-circle",         label:"Finalization failed" },
    ready_for_review:     { tone:"warning", icon:"flag",             label:"Ready for review" },
    reviewed:             { tone:"success", icon:"check-circle",     label:"Reviewed" },
    manual_review_needed: { tone:"warning", icon:"flag",             label:"Needs review" },
    failed:               { tone:"error",   icon:"x-circle",         label:"Failed" },
  };

  const FILTERS = [
    { value:"all",                  label:"All statuses" },
    { value:"uploaded",             label:"Uploaded" },
    { value:"scouting",             label:"Scouting" },
    { value:"grading",              label:"Grading" },
    { value:"ready_for_review",     label:"Ready for review" },
    { value:"manual_review_needed", label:"Needs review" },
    { value:"failed",               label:"Failed" },
  ];

  /* a row is release-eligible iff reviewed | ready_for_review (and not already released) */
  function isEligible(r){ return !r.resultsReleased && (r.pipelineStatus === "ready_for_review" || r.pipelineStatus === "reviewed"); }
  function isFailed(r){ return r.pipelineStatus === "grading_failed" || r.pipelineStatus === "failed" || r.pipelineStatus === "finalization_failed" || r.pipelineStatus === "scouting_failed"; }

  /* seed Submission docs (drives every row) */
  function seed(){
    return [
      { id:"sub_01", name:"Aarav Rao",    roll:"R-01", cls:"X-A", initials:"AR", pipelineStatus:"grading_complete",     graded:9, total:9, score:41, max:50, grade:"B", resultsReleased:true,  released:"12 Jun", uploadSource:"web" },
      { id:"sub_02", name:"Bhavna Sen",   roll:"R-02", cls:"X-A", initials:"BS", pipelineStatus:"ready_for_review",     graded:9, total:9, score:38, max:50, grade:"C", resultsReleased:false, uploadSource:"scanner" },
      { id:"sub_03", name:"Chetan Iyer",  roll:"R-03", cls:"X-B", initials:"CI", pipelineStatus:"grading",              graded:6, total:9, uploadSource:"web" },
      { id:"sub_04", name:"Devika Bose",  roll:"R-04", cls:"X-B", initials:"DB", pipelineStatus:"manual_review_needed", graded:9, total:9, score:22, max:50, grade:"F", resultsReleased:false, confidence:"low", uploadSource:"scanner" },
      { id:"sub_05", name:"Esha Das",     roll:"R-05", cls:"X-A", initials:"ED", pipelineStatus:"grading_failed",       graded:0, total:9, dlq:"dlq_5f2a", uploadSource:"web" },
      { id:"sub_06", name:"Farhan Khan",  roll:"R-06", cls:"X-A", initials:"FK", pipelineStatus:"reviewed",             graded:9, total:9, score:46, max:50, grade:"A", resultsReleased:false, uploadSource:"web" },
      { id:"sub_07", name:"Gita Nair",    roll:"R-07", cls:"X-C", initials:"GN", pipelineStatus:"grading_partial",      graded:5, total:9, score:24, max:50, grade:"D", resultsReleased:false, uploadSource:"web" },
      { id:"sub_08", name:"Hari Menon",   roll:"R-08", cls:"X-C", initials:"HM", pipelineStatus:"scouting",             graded:0, total:9, uploadSource:"scanner" },
      { id:"sub_09", name:"Isha Verma",   roll:"R-09", cls:"X-B", initials:"IV", pipelineStatus:"grading_complete",     graded:9, total:9, score:35, max:50, grade:"C", resultsReleased:true, released:"12 Jun", uploadSource:"web" },
      { id:"sub_10", name:"Jay Pillai",   roll:"R-10", cls:"X-A", initials:"JP", pipelineStatus:"ready_for_review",     graded:9, total:9, score:31, max:50, grade:"C", resultsReleased:false, uploadSource:"web" },
    ];
  }

  /* ============================================================= */
  /* Presentational pieces                                          */
  /* ============================================================= */
  function StatusBadge(props){
    var m = PIPELINE[props.status] || PIPELINE.uploaded;
    return (
      <span className={"statusbadge sb--"+m.tone+(m.spin?" statusbadge--spin":"")} role="status">
        <i data-lucide={m.icon}></i>{m.label}
      </span>
    );
  }

  function Kpi(props){
    return (
      <div className="kpi">
        <div className="kpi__top">
          <span className="kpi__label">{props.label}</span>
          <span className={"kpi__icon kpi__icon--"+props.tone}><i data-lucide={props.icon}></i></span>
        </div>
        <div className="kpi__val">{props.value}</div>
      </div>
    );
  }

  function ScoreCell(props){
    var r = props.row;
    if (r.score == null) return <span className="scorecell__dash">—</span>;
    var pct = Math.round(r.score / r.max * 100);
    return (
      <div className="scorecell">
        <div style={{textAlign:"right"}}>
          <div className="scorecell__num">{r.score} / {r.max}</div>
          <div className="scorecell__pct">{pct}%</div>
        </div>
        <GradePill grade={r.grade} />
      </div>
    );
  }

  function ProgressCell(props){
    var r = props.row;
    if (isFailed(r)) return <span className="scorecell__dash">—</span>;
    var pct = r.total ? Math.round(r.graded / r.total * 100) : 0;
    var done = r.graded >= r.total && r.total > 0;
    var inflight = r.pipelineStatus === "grading" || r.pipelineStatus === "scouting";
    return (
      <div className="progcell">
        <div className="progress" role="progressbar"
             aria-valuenow={r.graded} aria-valuemin={0} aria-valuemax={r.total}
             aria-label={"Grading progress, "+r.graded+" of "+r.total+" questions"}>
          <div className={"progress__fill"+(done?" progress__fill--success":"")} style={{width:pct+"%"}}></div>
        </div>
        <span className="progcell__txt">{inflight ? (r.graded+"/"+r.total) : (done ? "9/9" : (r.graded+"/"+r.total))}</span>
      </div>
    );
  }

  /* ============================================================= */
  /* The cockpit body                                              */
  /* ============================================================= */
  function Queue(props){
    var state = props.state;                  // populated | loading | empty | error | partial
    useLucide();

    var rowsRef = useRef(seed());
    var st = useState(rowsRef.current); var rows = st[0], setRows = st[1];
    var fSt = useState("all"); var filter = fSt[0], setFilter = fSt[1];
    var qSt = useState(""); var query = qSt[0], setQuery = qSt[1];
    var selSt = useState({}); var sel = selSt[0], setSel = selSt[1];
    var sortSt = useState({ key:"roll", dir:"asc" }); var sort = sortSt[0], setSort = sortSt[1];
    var confSt = useState(null); var confirmOp = confSt[0], setConfirmOp = confSt[1];  // {type:'release'|'retry', ids:[]}
    var busySt = useState({}); var busy = busySt[0], setBusy = busySt[1];               // id → true (row overlay)
    var toastSt = useState([]); var toasts = toastSt[0], setToasts = toastSt[1];

    function pushToast(t){
      var id = Date.now()+Math.random();
      setToasts(function(prev){ return prev.concat([Object.assign({ _id:id }, t)]); });
      setTimeout(function(){ setToasts(function(prev){ return prev.filter(function(x){ return x._id!==id; }); }); }, 4200);
    }

    /* derive counts live from current rows */
    var counts = (function(){
      var c = { total:rows.length, graded:0, review:0, failed:0, released:0 };
      rows.forEach(function(r){
        if (r.resultsReleased) c.released++;
        if (r.pipelineStatus === "grading_complete" || r.pipelineStatus === "reviewed") c.graded++;
        if (r.pipelineStatus === "manual_review_needed" || r.pipelineStatus === "ready_for_review" || r.pipelineStatus === "grading_partial") c.review++;
        if (isFailed(r)) c.failed++;
      });
      return c;
    })();

    /* filtered + searched + sorted view */
    var view = rows.filter(function(r){
      if (filter !== "all"){
        if (filter === "failed"){ if (!isFailed(r)) return false; }
        else if (r.pipelineStatus !== filter) return false;
      }
      if (query){
        var q = query.toLowerCase();
        if (r.name.toLowerCase().indexOf(q) === -1 && r.roll.toLowerCase().indexOf(q) === -1) return false;
      }
      return true;
    }).slice().sort(function(a,b){
      var dir = sort.dir === "asc" ? 1 : -1;
      if (sort.key === "roll") return a.roll.localeCompare(b.roll) * dir;
      if (sort.key === "status") return a.pipelineStatus.localeCompare(b.pipelineStatus) * dir;
      if (sort.key === "score") return ((a.score||0) - (b.score||0)) * dir;
      return 0;
    });

    var eligibleIds = rows.filter(isEligible).map(function(r){ return r.id; });
    var failedIds = rows.filter(isFailed).map(function(r){ return r.id; });
    var selIds = Object.keys(sel).filter(function(k){ return sel[k]; });
    var selEligible = selIds.filter(function(id){ return eligibleIds.indexOf(id) !== -1; });
    var selFailed = selIds.filter(function(id){ return failedIds.indexOf(id) !== -1; });

    function toggleRow(id){ setSel(function(s){ var n = Object.assign({}, s); if (n[id]) delete n[id]; else n[id] = true; return n; }); }
    function toggleAll(){
      var allOn = eligibleIds.length > 0 && eligibleIds.every(function(id){ return sel[id]; });
      if (allOn) setSel({});
      else { var n = {}; eligibleIds.forEach(function(id){ n[id] = true; }); setSel(n); }
    }
    function clickSort(key){ setSort(function(s){ return { key:key, dir:(s.key===key && s.dir==="asc") ? "desc" : "asc" }; }); }
    function clearFilter(){ setFilter("all"); }

    /* --- bulk release (optimistic + reconciled by "snapshot") --- */
    function doRelease(ids){
      setConfirmOp(null);
      var b = {}; ids.forEach(function(id){ b[id] = true; }); setBusy(b);
      setTimeout(function(){
        setRows(function(prev){ return prev.map(function(r){ return ids.indexOf(r.id)!==-1 ? Object.assign({}, r, { resultsReleased:true, released:"20 Jun", pipelineStatus:"reviewed" }) : r; }); });
        setBusy({}); setSel({});
        pushToast({ variant:"success", title:"Released "+ids.length+" submissions.", body:"Students and parents can now see scores and feedback." });
      }, 900);
    }
    /* --- retry failed (optimistic → Grading) --- */
    function doRetry(ids){
      setConfirmOp(null);
      pushToast({ variant:"info", title:"Retrying "+ids.length+(ids.length===1?" submission…":" submissions…"), body:"RELMS re-enqueued; live snapshot will resolve the outcome." });
      setRows(function(prev){ return prev.map(function(r){ return ids.indexOf(r.id)!==-1 ? Object.assign({}, r, { pipelineStatus:"grading", graded:0, dlq:undefined, score:undefined, grade:undefined }) : r; }); });
      setSel(function(s){ var n = Object.assign({}, s); ids.forEach(function(id){ delete n[id]; }); return n; });
    }

    var allSelectChecked = eligibleIds.length > 0 && eligibleIds.every(function(id){ return sel[id]; });

    /* ---- keyboard: a = release selected eligible, r = retry selected failed (disabled while typing) ---- */
    useEffect(function(){
      function onKey(e){
        var tag = (e.target && e.target.tagName) || "";
        if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
        if (confirmOp) return;
        if (e.key === "a" && selEligible.length){ e.preventDefault(); setConfirmOp({ type:"release", ids:selEligible }); }
        if (e.key === "r" && selFailed.length){ e.preventDefault(); doRetry(selFailed); }
      }
      window.addEventListener("keydown", onKey);
      return function(){ window.removeEventListener("keydown", onKey); };
    });

    /* ===================== STATE: LOADING ===================== */
    if (state === "loading"){
      return (
        <div className="page">
          <Header counts={null} loading />
          <div className="kpis">
            {[0,1,2,3,4].map(function(i){ return (
              <div className="kpi" key={i}>
                <Skeleton width="56%" height="12px" />
                <Skeleton width="40%" height="28px" />
              </div>
            ); })}
          </div>
          <div className="tbl-wrap">
            <div style={{padding:"var(--space-4)"}}>
              {[0,1,2,3,4,5,6].map(function(i){ return (
                <div key={i} style={{display:"flex",alignItems:"center",gap:"var(--space-4)",padding:"var(--space-2) 0"}}>
                  <Skeleton variant="circle" width="32px" height="32px" />
                  <Skeleton width="160px" height="14px" />
                  <Skeleton width="60px" height="14px" />
                  <Skeleton width="120px" height="22px" />
                  <div style={{flex:1}} />
                  <Skeleton width="90px" height="20px" />
                  <Skeleton width="48px" height="28px" />
                </div>
              ); })}
            </div>
          </div>
        </div>
      );
    }

    /* ===================== STATE: EMPTY ===================== */
    if (state === "empty"){
      return (
        <div className="page">
          <Header counts={null} hideStatus />
          <div className="tbl-wrap" style={{boxShadow:"var(--shadow-e1)"}}>
            <div className="tblempty">
              <EmptyState icon="inbox"
                title="No submissions yet"
                body="Upload scanned answer sheets to start grading."
                action={<Button variant="primary" leadingIcon={<i data-lucide="upload"></i>}>Upload more</Button>} />
            </div>
          </div>
        </div>
      );
    }

    /* ===================== POPULATED / PARTIAL / ERROR ===================== */
    var streamError = state === "error";

    return (
      <div className="page">
        <Header counts={counts} />

        {/* pipeline-wide block banner — shown in error state */}
        {streamError && (
          <Alert variant="warning" title="Live updates interrupted — showing last known state">
            The realtime stream dropped. Data below is the last known snapshot; the queue will refresh once the connection is restored.
          </Alert>
        )}
        {state === "partial" && (
          <Alert variant="error" title="Grading paused — AI service unavailable">
            Affected submissions were moved to Needs review.{" "}
            <a href="#" className="dlqlink" style={{marginLeft:4}}><i data-lucide="external-link"></i>View in DLQ</a>
          </Alert>
        )}

        {/* counts strip */}
        <div className="kpis" aria-label="Submission counts">
          <Kpi label="Total"        tone="total"    icon="files"        value={counts.total} />
          <Kpi label="Graded"       tone="graded"   icon="check-circle" value={counts.graded} />
          <Kpi label="Needs review" tone="review"   icon="flag"         value={counts.review} />
          <Kpi label="Failed"       tone="failed"   icon="x-circle"     value={counts.failed} />
          <Kpi label="Released"     tone="released" icon="megaphone"    value={counts.released} />
        </div>

        {/* toolbar */}
        <div className="toolbar">
          <Select className="select" value={filter} onChange={function(e){ setFilter(e.target.value); }}
                  options={FILTERS} aria-label="Filter by pipeline status" />
          <label className="toolbar__search">
            <i data-lucide="search"></i>
            <input value={query} onChange={function(e){ setQuery(e.target.value); }}
                   placeholder="Search roll or name" aria-label="Search roll or name" />
          </label>
          {filter !== "all" && (
            <div className="filterchips">
              <button type="button" onClick={clearFilter}
                      aria-label={"Clear filter: "+((FILTERS.find(function(f){return f.value===filter;})||{}).label)}
                      style={{display:"inline-flex",border:0,background:"transparent",padding:0,cursor:"pointer"}}>
                <Chip active removable>{(FILTERS.find(function(f){return f.value===filter;})||{}).label}</Chip>
              </button>
            </div>
          )}
          <span className="toolbar__sp" />
          <span className={"livesync"+(streamError?" livesync--err":"")} aria-live="polite">
            <span className="livedot"></span>
            {streamError ? "reconnecting…" : "live · 14:32"}
          </span>

          {selIds.length > 0 && (
            <div className="selbar">
              <span className="selbar__count" aria-live="polite">
                <span className="mono">{selIds.length}</span> selected
              </span>
              <span className="toolbar__sp" />
              {selFailed.length > 0 && (
                <Button variant="ghost" leadingIcon={<i data-lucide="rotate-cw"></i>}
                        onClick={function(){ if (selFailed.length > 10) setConfirmOp({ type:"retry", ids:selFailed }); else doRetry(selFailed); }}>
                  Retry failed ({selFailed.length})
                </Button>
              )}
              <Button variant="secondary" disabled={selEligible.length === 0}
                      leadingIcon={<i data-lucide="megaphone"></i>}
                      onClick={function(){ if (selEligible.length) setConfirmOp({ type:"release", ids:selEligible }); }}>
                Release reviewed ({selEligible.length})
              </Button>
            </div>
          )}
        </div>

        {/* table */}
        <div className="tbl-wrap">
          {view.length === 0 ? (
            <div className="tblempty">
              <EmptyState icon="filter-x"
                title={"No submissions are "+((FILTERS.find(function(f){return f.value===filter;})||{label:"matching"}).label.toLowerCase())+"."}
                body="Try a different status or clear the active filter."
                action={<Button variant="ghost" leadingIcon={<i data-lucide="x"></i>} onClick={clearFilter}>Clear filter</Button>} />
            </div>
          ) : (
            <table className="table" role="table">
              <thead>
                <tr>
                  <th className="col-check" scope="col">
                    <Checkbox aria-label="Select all eligible" checked={allSelectChecked} onChange={toggleAll} />
                  </th>
                  <th className="col-sort" scope="col" aria-sort={sort.key==="roll"?(sort.dir==="asc"?"ascending":"descending"):"none"} onClick={function(){clickSort("roll");}}>
                    <span className="sorth">Student / Roll {sort.key==="roll" && <i data-lucide={sort.dir==="asc"?"arrow-up":"arrow-down"}></i>}</span>
                  </th>
                  <th scope="col">Class</th>
                  <th className="col-sort" scope="col" aria-sort={sort.key==="status"?(sort.dir==="asc"?"ascending":"descending"):"none"} onClick={function(){clickSort("status");}}>
                    <span className="sorth">Status {sort.key==="status" && <i data-lucide={sort.dir==="asc"?"arrow-up":"arrow-down"}></i>}</span>
                  </th>
                  <th scope="col">Progress</th>
                  <th className="col-sort num" scope="col" aria-sort={sort.key==="score"?(sort.dir==="asc"?"ascending":"descending"):"none"} onClick={function(){clickSort("score");}}>
                    <span className="sorth" style={{justifyContent:"flex-end"}}>Score {sort.key==="score" && <i data-lucide={sort.dir==="asc"?"arrow-up":"arrow-down"}></i>}</span>
                  </th>
                </tr>
              </thead>
              <tbody>
                {view.map(function(r){
                  var eligible = isEligible(r);
                  var failed = isFailed(r);
                  var selected = !!sel[r.id];
                  return (
                    <tr key={r.id} className="qrow-click" aria-selected={selected || undefined}
                        tabIndex={0}
                        onKeyDown={function(e){ if (e.key === "Enter"){ pushToast({ variant:"info", title:"Open grading review", body:r.name+" · "+r.roll }); } if (e.key === " " && eligible){ e.preventDefault(); toggleRow(r.id); } }}>
                      <td className="col-check" onClick={function(e){ e.stopPropagation(); }}>
                        {eligible ? (
                          <Checkbox aria-label={"Select "+r.name} checked={selected} onChange={function(){ toggleRow(r.id); }} />
                        ) : (
                          <span className="tipwrap eligible-off">
                            <Checkbox aria-label="Not eligible" disabled tabIndex={-1} />
                            <span role="tooltip" className="tipwrap__bub">Only Ready for review or Reviewed submissions can be released.</span>
                          </span>
                        )}
                      </td>
                      <td onClick={function(){ pushToast({ variant:"info", title:"Open grading review", body:r.name+" · "+r.roll }); }}>
                        <div className="student">
                          <Avatar size="sm" initials={r.initials} />
                          <div className="student__meta">
                            <span className="student__name">{r.name}</span>
                            <span className="student__roll">{r.roll}</span>
                          </div>
                          {r.uploadSource === "scanner" && (
                            <span className="scannerchip"><i data-lucide="scan-line"></i>scanner</span>
                          )}
                        </div>
                      </td>
                      <td className="classcell" onClick={function(){ pushToast({ variant:"info", title:"Open grading review", body:r.name }); }}>{r.cls}</td>
                      <td onClick={function(){ pushToast({ variant:"info", title:"Open grading review", body:r.name }); }}>
                        <div style={{display:"flex",alignItems:"center",gap:"var(--space-2)",flexWrap:"wrap"}}>
                          <StatusBadge status={r.pipelineStatus} />
                          {r.confidence && <ConfidenceBadge level={r.confidence} value="0.58" />}
                          {r.resultsReleased && (
                            <span className="released-tick"><i data-lucide="check-circle"></i>Released {r.released}</span>
                          )}
                        </div>
                      </td>
                      <td onClick={function(){ pushToast({ variant:"info", title:"Open grading review", body:r.name }); }}>
                        <ProgressCell row={r} />
                      </td>
                      <td className="num">
                        <div className="rowact">
                          {failed ? (
                            <React.Fragment>
                              {r.dlq && (
                                <span className="tipwrap">
                                  <a href="#" className="dlqlink" onClick={function(e){ e.stopPropagation(); }}><i data-lucide="external-link"></i>DLQ</a>
                                  <span role="tooltip" className="tipwrap__bub">Open this submission's error in the dead-letter queue.</span>
                                </span>
                              )}
                              <Button variant="ghost" size="sm" leadingIcon={<i data-lucide="rotate-cw"></i>}
                                      onClick={function(e){ e.stopPropagation(); doRetry([r.id]); }}>Retry</Button>
                            </React.Fragment>
                          ) : (
                            <ScoreCell row={r} />
                          )}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}

          {/* row-scoped optimistic overlay */}
          {Object.keys(busy).length > 0 && <div className="rowoverlay"><div className="spinner"></div></div>}

          {view.length > 0 && (
            <div className="pagrow">
              <span className="pagrow__meta">Showing {view.length} of {rows.length} submissions</span>
              <Pagination pages={3} current={1} />
            </div>
          )}
        </div>

        {/* confirm dialog — release */}
        <Modal open={!!confirmOp && confirmOp.type === "release"} onClose={function(){ setConfirmOp(null); }}
               title="Release results"
               footer={
                 <div className="modal-actions">
                   <Button variant="ghost" onClick={function(){ setConfirmOp(null); }}>Cancel</Button>
                   <Button variant="primary" leadingIcon={<i data-lucide="megaphone"></i>}
                           onClick={function(){ doRelease(confirmOp.ids); }}>Release</Button>
                 </div>
               }>
          <p className="modal-blurb">
            Release results for <strong>{confirmOp ? confirmOp.ids.length : 0} submissions</strong>? Students and parents
            will be able to see their scores and feedback once released.
          </p>
        </Modal>

        {/* confirm dialog — bulk retry > 10 */}
        <Modal open={!!confirmOp && confirmOp.type === "retry"} onClose={function(){ setConfirmOp(null); }}
               title="Retry grading"
               footer={
                 <div className="modal-actions">
                   <Button variant="ghost" onClick={function(){ setConfirmOp(null); }}>Cancel</Button>
                   <Button variant="primary" leadingIcon={<i data-lucide="rotate-cw"></i>}
                           onClick={function(){ doRetry(confirmOp.ids); }}>Retry</Button>
                 </div>
               }>
          <p className="modal-blurb">
            Re-enqueue grading for <strong>{confirmOp ? confirmOp.ids.length : 0} submissions</strong>? This re-runs RELMS
            for each; the live snapshot will resolve the true outcome.
          </p>
        </Modal>

        {/* toast host */}
        <div className="toasts">
          {toasts.map(function(t){ return <Toast key={t._id} variant={t.variant} title={t.title} body={t.body} />; })}
        </div>
      </div>
    );
  }

  /* ============================================================= */
  /* Header (h2 + status + Upload more)                            */
  /* ============================================================= */
  function Header(props){
    return (
      <div className="shead">
        <div className="shead__titlewrap">
          <h2 className="s-title">Submissions</h2>
          {!props.hideStatus && (
            <div className="s-sub">
              <span className="mono">{EXAM.totalMarks}</span> marks total
              <span className="s-sub__sep">·</span>
              pass at <span className="mono">{EXAM.passingMarks}</span>
              <span className="s-sub__sep">·</span>
              exam <span className="mono">{EXAM.examId}</span>
            </div>
          )}
        </div>
        <div className="shead__rt">
          {!props.hideStatus && !props.loading && (
            <span className="statusbadge sb--brand statusbadge--spin" role="status">
              <i data-lucide="loader"></i>Grading
            </span>
          )}
          <Button variant="primary" leadingIcon={<i data-lucide="upload"></i>}>Upload more</Button>
        </div>
      </div>
    );
  }

  /* ============================================================= */
  /* AppShell chrome + state switcher                              */
  /* ============================================================= */
  function App(){
    var STATES = ["populated","loading","empty","error","partial"];
    var LABELS = { populated:"Populated", loading:"Loading", empty:"Empty", error:"Error", partial:"Partial" };
    var s = useState("populated"); var state = s[0], setState = s[1];
    useLucide();

    return (
      <div className="scene">
        <div className="appshell">
          {/* Sidebar */}
          <aside className="appshell__sidebar">
            <div className="sidebar__brand">
              <span className="sidebar__brand-mark">L</span>
              <span className="sidebar__brand-name">Lyceum</span>
            </div>
            <nav className="sidebar__nav sb-scroll" aria-label="Primary">
              <span className="sidebar__section-label">Teach</span>
              <NavItem icon="layout-dashboard" href="#">Dashboard</NavItem>
              <NavItem icon="users" href="#">Students</NavItem>
              <NavItem icon="book-open" href="#">Spaces</NavItem>
              <span className="sidebar__section-label" style={{marginTop:"var(--space-3)"}}>Assess</span>
              <NavItem icon="file-check-2" href="#" active>Exams</NavItem>
              <NavItem icon="scan-line" href="#">Scan intake</NavItem>
              <NavItem icon="bar-chart-3" href="#">Analytics</NavItem>
              <span className="sidebar__section-label" style={{marginTop:"var(--space-3)"}}>Admin</span>
              <NavItem icon="settings" href="#">Settings</NavItem>
            </nav>
            <div className="sb-foot">
              <Avatar size="sm" initials="SV" />
              <div className="sb-foot__meta">
                <span className="sb-foot__name">S. Verma</span>
                <span className="sb-foot__role">role: exam_owner</span>
              </div>
            </div>
          </aside>

          {/* Topbar */}
          <header className="appshell__topbar">
            <div className="tenant" role="button" tabIndex={0}>
              <i data-lucide="building-2" style={{width:15,height:15}}></i>
              Subhang Academy
              <span className="tenant__code">SUB001</span>
              <i data-lucide="chevrons-up-down" style={{width:13,height:13,opacity:.6}}></i>
            </div>
            <div className="tbsearch">
              <i data-lucide="search" style={{width:15,height:15}}></i>
              <input placeholder="Search exams, students…" aria-label="Search" />
              <Kbd>⌘K</Kbd>
            </div>
            <div className="tb-icons">
              <span className="notif"><IconButton label="Notifications" icon={<i data-lucide="bell"></i>} /><span className="notif__dot"></span></span>
              <IconButton label="Help" icon={<i data-lucide="circle-help"></i>} />
              <Avatar size="sm" initials="SV" />
            </div>
          </header>

          {/* Main */}
          <main className="appshell__main">
            <div style={{maxWidth:1200,margin:"0 auto"}}>
              <div className="toprow">
                <Breadcrumb items={[{label:"Exams",href:"#"},{label:EXAM.title,href:"#"},{label:"Submissions"}]} />
                <div className="segrow">
                  <span className="seg-label">State</span>
                  <div className="seg" role="group" aria-label="Preview state">
                    {STATES.map(function(x){
                      return <button key={x} aria-pressed={state===x} onClick={function(){ setState(x); }}>{LABELS[x]}</button>;
                    })}
                  </div>
                </div>
              </div>
              <Queue state={state} key={state} />
            </div>
          </main>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
