<!-- @dsCard group="Exams" viewport="1280x820" name="Exams List" subtitle="Status-aware exam index · triage by pipeline state · filter/search/sort" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
/* screen-local layout ONLY — Lyceum vars only, NO raw hex, NO :root token redefinition */
body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}
.shell{height:1024px;overflow:hidden}

/* topbar bits */
.tb-tenant{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-2);border:1px solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-primary);background:var(--bg-surface)}
.tb-tenant__code{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
.tb-search{flex:1;max-width:420px;position:relative;display:flex;align-items:center}
.tb-search svg{position:absolute;left:var(--space-3);color:var(--text-muted);pointer-events:none}
.tb-search .input{padding-left:var(--space-8)}
.tb-kbd{position:absolute;right:var(--space-2);display:flex;gap:2px}
.tb-icon{display:grid;place-items:center;width:36px;height:36px;border-radius:var(--radius-md);color:var(--text-secondary);position:relative}
.tb-icon:hover{background:var(--bg-surface-sunken);color:var(--text-primary)}
.tb-dot{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:var(--radius-pill);background:var(--status-error);border:2px solid var(--bg-surface)}

/* page header */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);margin-bottom:var(--space-5)}
.page-head h1{font-size:var(--text-4xl);line-height:var(--leading-4xl)}
.page-sub{color:var(--text-secondary);font-size:var(--text-base);margin-top:var(--space-1)}

/* state segmented control */
.segmented{display:inline-flex;background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:3px;gap:2px}
.segmented button{font-size:var(--text-xs);font-weight:var(--weight-medium);font-family:var(--font-ui);color:var(--text-secondary);padding:var(--space-1) var(--space-3);border-radius:var(--radius-pill);line-height:1.6}
.segmented button[aria-pressed="true"]{background:var(--bg-surface);color:var(--brand-primary);box-shadow:var(--shadow-e1);font-weight:var(--weight-semibold)}
.seg-wrap{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4)}
.seg-wrap__label{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted)}

/* filter bar */
.filterbar{position:sticky;top:0;z-index:5;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-3) var(--space-4);display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;margin-bottom:var(--space-3)}
.fb-search{flex:1;min-width:240px;position:relative;display:flex;align-items:center}
.fb-search svg{position:absolute;left:var(--space-3);color:var(--text-muted);pointer-events:none}
.fb-search .input{padding-left:var(--space-8)}
.fb-select{display:flex;flex-direction:column;gap:2px}
.fb-select__lab{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted)}
.fb-sort{margin-left:auto}
.fb-select .select{min-width:148px}

/* active filter chips */
.activechips{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-3)}
.chip--filter{cursor:pointer}
.chip--filter:hover{border-color:var(--border-focus);color:var(--text-primary)}
.clearall{font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--brand-primary);padding:var(--space-1) var(--space-2);border-radius:var(--radius-md)}
.clearall:hover{background:var(--brand-subtle)}

/* table surface */
.tablewrap{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:visible}
.exam-table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
.exam-table thead th{text-align:left;font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border-subtle);white-space:nowrap;background:var(--bg-surface)}
.exam-table thead th.is-sortable{cursor:pointer;user-select:none}
.exam-table thead th.is-sortable:hover{color:var(--text-primary)}
.exam-table th .th-in{display:inline-flex;align-items:center;gap:4px}
.exam-table th .sort-ind{color:var(--brand-primary)}
.exam-table td{padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border-subtle);color:var(--text-secondary);vertical-align:middle}
.exam-table tbody tr:last-child td{border-bottom:none}
.exam-row{cursor:pointer;transition:background-color var(--dur-fast) var(--ease-standard)}
.exam-row:hover{background:var(--bg-surface-sunken)}
.exam-row:focus-visible{box-shadow:var(--ring-focus);outline:none}
.exam-row--attention td{box-shadow:inset 3px 0 0 var(--status-error)}
.exam-row--dim{opacity:.45;transition:opacity var(--dur-base) var(--ease-standard)}
.num{font-family:var(--font-mono);font-variant-numeric:tabular-nums;color:var(--text-primary)}

/* exam cell */
.exam-cell{display:flex;flex-direction:column;gap:3px;min-width:0;max-width:340px}
.exam-cell__title{font-family:var(--font-ui);font-weight:var(--weight-semibold);font-size:var(--text-sm);color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exam-cell__sub{font-size:var(--text-xs);color:var(--text-muted)}
.exam-cell__topics{display:flex;gap:4px;margin-top:2px;flex-wrap:wrap}
.topic-chip{font-size:var(--text-2xs);font-family:var(--font-ui);font-weight:var(--weight-medium);color:var(--text-secondary);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:1px var(--space-2);line-height:1.5}

/* classes cell */
.class-chips{display:flex;gap:var(--space-1);flex-wrap:wrap}
.class-chip{font-size:var(--text-2xs);font-family:var(--font-mono);font-weight:var(--weight-medium);color:var(--text-secondary);background:var(--bg-surface);border:1px solid var(--border-strong);border-radius:var(--radius-pill);padding:1px var(--space-2);line-height:1.6}

/* submissions cell */
.subs-cell{display:flex;flex-direction:column;gap:4px;min-width:118px}
.subs-cell__row{display:flex;align-items:center;justify-content:space-between;gap:var(--space-2)}
.subs-cell__count{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:var(--text-xs);color:var(--text-primary)}
.subs-cell__muted{font-size:var(--text-xs);color:var(--text-muted)}
.subs-bar{height:5px}
.subs-bar.indet .progress__fill{width:38% !important;animation:indet 1.3s var(--ease-standard) infinite}
@keyframes indet{0%{margin-left:-38%}100%{margin-left:100%}}

/* avg cell */
.avg-val{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:var(--text-sm);color:var(--text-primary)}
.avg-dash{font-family:var(--font-mono);color:var(--text-muted);cursor:help}

/* row actions */
.row-actions{display:flex;align-items:center;justify-content:flex-end;gap:var(--space-2)}
.review-btn{opacity:0;transition:opacity var(--dur-fast) var(--ease-standard)}
.exam-row:hover .review-btn,.exam-row:focus-within .review-btn{opacity:1}
.kebab-wrap{position:relative}
.kebab-menu{position:absolute;right:0;top:calc(100% + 4px);z-index:20;min-width:184px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);box-shadow:var(--shadow-e2);padding:var(--space-1);display:flex;flex-direction:column}
.kebab-menu button{display:flex;align-items:center;gap:var(--space-2);width:100%;text-align:left;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-secondary);padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);line-height:1.4}
.kebab-menu button:hover{background:var(--bg-surface-sunken);color:var(--text-primary)}
.kebab-menu button.is-danger{color:var(--status-error)}
.kebab-menu button.is-danger:hover{background:var(--status-error-subtle)}
.kebab-sep{height:1px;background:var(--border-subtle);margin:var(--space-1) 0}

/* needs-review flag inline */
.nr-flag{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-2xs);font-weight:var(--weight-semibold);color:var(--status-error);margin-top:3px}
.nr-flag svg{width:11px;height:11px}

/* footer / pagination row */
.table-foot{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-4);border-top:1px solid var(--border-subtle)}
.showing{font-size:var(--text-xs);color:var(--text-muted);font-family:var(--font-ui)}
.showing .num{font-family:var(--font-mono);color:var(--text-secondary)}

/* status badge icon sizing already from .badge svg */
.status-badge svg{width:12px;height:12px}

/* skeleton rows */
.sk-line{height:10px}

/* toast */
.toast-stack{position:absolute;right:var(--space-6);bottom:var(--space-6);z-index:80;display:flex;flex-direction:column;gap:var(--space-2)}
.toast-card{display:flex;align-items:center;gap:var(--space-3);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);box-shadow:var(--shadow-e3);padding:var(--space-3) var(--space-4);min-width:300px}
.toast-card__icon{display:grid;place-items:center;color:var(--status-success)}
.toast-card__txt{flex:1;font-size:var(--text-sm);color:var(--text-primary)}
.toast-card__undo{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--brand-primary);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm)}
.toast-card__undo:hover{background:var(--brand-subtle)}

/* hero spark CTA glow on hover */
.btn--spark{box-shadow:none;transition:box-shadow var(--dur-fast) var(--ease-standard),transform var(--dur-fast) var(--ease-standard)}
.btn--spark:hover{box-shadow:var(--glow-spark);transform:translateY(-1px)}

@media (prefers-reduced-motion: reduce){
  .btn--spark:hover{transform:none}
  .subs-bar.indet .progress__fill{animation:none}
}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head><body><div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  const {
    Button, IconButton, Icon, Input, Select, Field,
    Card, Modal, Badge, Chip, ProgressBar, Skeleton,
    EmptyState, Alert, Breadcrumb, NavItem, Avatar, Kbd
  } = window.LvlupV0DesignSystem_5d0725;

  /* ---------- status -> badge meta (icon + label, never color alone) ---------- */
  const STATUS = {
    draft:               { label: "Draft",            variant: undefined, icon: "pencil-line" },
    question_paper_uploaded:  { label: "Paper uploaded",  variant: "info",  icon: "file-up" },
    question_paper_extracted: { label: "Paper extracted", variant: "info",  icon: "scan-text" },
    published:           { label: "Published",        variant: "brand",   icon: "send" },
    grading:             { label: "Grading",          variant: "warning", icon: "loader" },
    completed:           { label: "Completed",        variant: "info",    icon: "check" },
    results_released:    { label: "Results released",  variant: "success", icon: "check-check" },
    archived:            { label: "Archived",         variant: undefined, icon: "archive" },
  };

  function StatusBadge({ status }) {
    const m = STATUS[status] || STATUS.draft;
    return (
      <span className={"badge status-badge" + (m.variant ? " badge--" + m.variant : "")}>
        <Icon name={m.icon} size={12} />
        {m.label}
      </span>
    );
  }

  /* ---------- seed data (tenant-scoped: tenant_subhang / SUB001) ---------- */
  const EXAMS = [
    { id:"ex_hist_term", title:"History Term Assessment", subject:"History",
      topics:["World Wars","Decolonisation"], classes:["12A","12B"], date:"02 Jun 2026",
      status:"grading", graded:19, total:31, avg:null, attention:true, needsReview:4, updated:5 },
    { id:"ex_calc_mid", title:"Calculus Midterm", subject:"Mathematics",
      topics:["Limits","Derivatives","Integrals"], classes:["10A","10B"], date:"12 Jun 2026",
      status:"grading", graded:24, total:30, avg:68, attention:false, needsReview:0, updated:1 },
    { id:"ex_orgchem", title:"Organic Chemistry Unit 4", subject:"Chemistry",
      topics:["Alkenes","Isomerism"], classes:["11C"], date:"09 Jun 2026",
      status:"completed", graded:28, total:28, avg:74, attention:false, needsReview:0, updated:3 },
    { id:"ex_bio_cell", title:"Biology — Cell Structure", subject:"Biology",
      topics:["Organelles","Membranes"], classes:["11A","11B"], date:"05 Jun 2026",
      status:"results_released", graded:33, total:33, avg:81, attention:false, needsReview:0, updated:8 },
    { id:"ex_phys_unit", title:"Physics Unit Test — Kinematics", subject:"Physics",
      topics:["Motion","Vectors"], classes:["10A"], date:null,
      status:"draft", graded:0, total:0, avg:null, attention:false, needsReview:0, updated:2 },
    { id:"ex_eng_lit", title:"English Literature — Poetry", subject:"English",
      topics:["Imagery","Meter"], classes:["12A"], date:"28 May 2026",
      status:"published", graded:0, total:0, avg:null, attention:false, needsReview:0, updated:9 },
    { id:"ex_geo_map", title:"Geography — Cartography Basics", subject:"Geography",
      topics:["Projections"], classes:["9A","9B","9C"], date:"24 May 2026",
      status:"question_paper_extracted", graded:0, total:0, avg:null, attention:false, needsReview:0, updated:11 },
    { id:"ex_cs_intro", title:"Computer Science — Algorithms I", subject:"Computer Science",
      topics:["Sorting","Big-O","Recursion"], classes:["11D"], date:"20 May 2026",
      status:"question_paper_uploaded", graded:0, total:0, avg:null, attention:false, needsReview:0, updated:14 },
  ];

  /* sort weights: attention first, then grading, then date desc */
  const ATTN_RANK = { grading:1, completed:2 };
  function sortExams(list, mode){
    const a = list.slice();
    if(mode==="attention"){
      a.sort((x,y)=>{
        if(x.attention!==y.attention) return x.attention?-1:1;
        const rx=ATTN_RANK[x.status]||9, ry=ATTN_RANK[y.status]||9;
        if(rx!==ry) return rx-ry;
        return (y.updated*-1)-(x.updated*-1);
      });
    } else if(mode==="date_new"){ a.sort((x,y)=> (y.date?1:0)-(x.date?1:0) || y.updated-x.updated); }
    else if(mode==="date_old"){ a.sort((x,y)=> (x.date?1:0)-(y.date?1:0) || y.updated-x.updated); }
    else if(mode==="updated"){ a.sort((x,y)=> x.updated-y.updated); }
    else if(mode==="title"){ a.sort((x,y)=> x.title.localeCompare(y.title)); }
    return a;
  }

  /* ---------- Sidebar nav ---------- */
  function SidebarNav(){
    const items = [
      { icon:"layout-dashboard", label:"Dashboard" },
      { icon:"graduation-cap",   label:"Spaces" },
      { icon:"users",            label:"Students" },
      { icon:"file-check-2",     label:"Exams", active:true },
      { icon:"bar-chart-3",      label:"Analytics" },
      { icon:"cpu",              label:"AI usage" },
      { icon:"settings",         label:"Settings" },
    ];
    return (
      <aside className="appshell__sidebar">
        <div className="sidebar__brand">
          <div className="sidebar__brand-mark">L</div>
          <div className="sidebar__brand-name">LevelUp</div>
        </div>
        <nav className="sidebar__nav" aria-label="Primary">
          <div className="sidebar__section-label">Teach</div>
          {items.map((it,i)=>(
            <a key={i} className="nav-item" href="#"
               aria-current={it.active ? "page" : undefined}>
              <Icon name={it.icon} size={18} />
              <span>{it.label}</span>
              {it.active && <span className="nav-item__badge"><span className="badge badge--warning">2</span></span>}
            </a>
          ))}
        </nav>
      </aside>
    );
  }

  /* ---------- Topbar ---------- */
  function Topbar(){
    return (
      <header className="appshell__topbar">
        <div className="tb-tenant">
          <Avatar initials="SA" size="sm" />
          <div>
            <div>Subhang Academy</div>
          </div>
          <span className="tb-tenant__code">SUB001</span>
          <Icon name="chevron-down" size={14} />
        </div>
        <div className="tb-search">
          <Icon name="search" size={16} />
          <input className="input" placeholder="Search students, exams, spaces…" aria-label="Global search" readOnly />
          <span className="tb-kbd"><Kbd>⌘</Kbd><Kbd>K</Kbd></span>
        </div>
        <div className="topbar__spacer" />
        <button className="tb-icon" aria-label="Notifications">
          <Icon name="bell" size={18} /><span className="tb-dot" />
        </button>
        <button className="tb-icon" aria-label="Help"><Icon name="help-circle" size={18} /></button>
        <Avatar initials="TS" size="sm" />
      </header>
    );
  }

  /* ---------- Submissions cell ---------- */
  function SubsCell({ ex }){
    if(ex.total===0){
      return <div className="subs-cell"><span className="subs-cell__muted">No submissions yet</span></div>;
    }
    const pct = Math.round((ex.graded/ex.total)*100);
    const indeterminate = ex.status==="grading" && ex.avg===null && ex.graded===0;
    return (
      <div className="subs-cell">
        <div className="subs-cell__row">
          <span className="subs-cell__count">{ex.graded}/{ex.total} graded</span>
        </div>
        <div className={"progress subs-bar" + (indeterminate ? " indet" : "")}
             role="progressbar"
             aria-label={ex.graded + " of " + ex.total + " submissions graded"}
             aria-valuenow={pct}>
          <div className={"progress__fill" + (pct>=100 ? " progress__fill--success" : "")}
               style={{ width: pct + "%" }} />
        </div>
        {ex.needsReview > 0 && (
          <span className="nr-flag"><Icon name="flag" size={11} /> Needs review</span>
        )}
      </div>
    );
  }

  /* ---------- Avg cell (em-dash + tooltip pre-grading) ---------- */
  function AvgCell({ ex }){
    if(ex.avg===null){
      return <span className="avg-dash"
        title={ex.status==="grading" ? "Stats update as grading completes" : "Available after grading"}>—</span>;
    }
    return <span className="avg-val">{ex.avg}%</span>;
  }

  /* ---------- Row kebab menu ---------- */
  function RowMenu({ ex, canCreate, onArchive, onDelete }){
    const [open,setOpen]=useState(false);
    const ref=useRef(null);
    useEffect(()=>{
      if(!open) return;
      const onDoc=(e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
      const onKey=(e)=>{ if(e.key==="Escape") setOpen(false); };
      document.addEventListener("mousedown",onDoc);
      document.addEventListener("keydown",onKey);
      return ()=>{ document.removeEventListener("mousedown",onDoc); document.removeEventListener("keydown",onKey); };
    },[open]);
    const stop=(e)=>e.stopPropagation();
    const isDraft = ex.status==="draft";
    return (
      <span className="kebab-wrap" ref={ref} onClick={stop}>
        <IconButton size="sm" label="Row actions"
          icon={<Icon name="more-vertical" size={16} />}
          onClick={(e)=>{ stop(e); setOpen(o=>!o); }} aria-expanded={open} />
        {open && (
          <div className="kebab-menu" role="menu">
            <button role="menuitem" onClick={(e)=>{ stop(e); setOpen(false); }}>
              <Icon name="eye" size={15} /> View exam
            </button>
            <button role="menuitem" onClick={(e)=>{ stop(e); setOpen(false); }}>
              <Icon name="list-checks" size={15} /> Review submissions
            </button>
            {canCreate && <div className="kebab-sep" />}
            {canCreate && isDraft && (
              <button role="menuitem" className="is-danger" onClick={(e)=>{ stop(e); setOpen(false); onDelete(ex); }}>
                <Icon name="trash-2" size={15} /> Delete draft
              </button>
            )}
            {canCreate && !isDraft && (
              <button role="menuitem" className="is-danger" onClick={(e)=>{ stop(e); setOpen(false); onArchive(ex); }}>
                <Icon name="archive" size={15} /> Archive
              </button>
            )}
          </div>
        )}
      </span>
    );
  }

  /* ---------- A single exam table row ---------- */
  function ExamRow({ ex, canCreate, dim, onArchive, onDelete }){
    const stop=(e)=>e.stopPropagation();
    const showReview = ex.total>0 && ex.status==="grading";
    return (
      <tr className={"exam-row" + (ex.attention ? " exam-row--attention" : "") + (dim ? " exam-row--dim" : "")}
          tabIndex={0} role="link" aria-label={"Open " + ex.title}>
        <td>
          <div className="exam-cell">
            <span className="exam-cell__title" title={ex.title}>{ex.title}</span>
            <span className="exam-cell__sub">{ex.subject}</span>
            <span className="exam-cell__topics">
              {ex.topics.slice(0,2).map((t,i)=><span key={i} className="topic-chip">{t}</span>)}
              {ex.topics.length>2 && <span className="topic-chip">+{ex.topics.length-2}</span>}
            </span>
          </div>
        </td>
        <td>
          <div className="class-chips">
            {ex.classes.slice(0,2).map((c,i)=><span key={i} className="class-chip">{c}</span>)}
            {ex.classes.length>2 && <span className="class-chip">+{ex.classes.length-2}</span>}
          </div>
        </td>
        <td><span className={ex.date ? "num" : "avg-dash"}>{ex.date || "—"}</span></td>
        <td><StatusBadge status={ex.status} /></td>
        <td><SubsCell ex={ex} /></td>
        <td className="num"><AvgCell ex={ex} /></td>
        <td>
          <div className="row-actions" onClick={stop}>
            {showReview && (
              <span className="review-btn">
                <Button variant="secondary" size="sm"
                  leadingIcon={<Icon name="list-checks" size={14} />}>Review</Button>
              </span>
            )}
            <RowMenu ex={ex} canCreate={canCreate} onArchive={onArchive} onDelete={onDelete} />
          </div>
        </td>
      </tr>
    );
  }

  /* ---------- Sort header cell ---------- */
  const SORT_COLS = {
    Exam:"title", Date:"date_new", Submissions:"attention", Avg:"avg"
  };
  function HeadCell({ label, sortable, activeMode, sortMode, dir, onSort }){
    const isActive = sortable && sortMode===activeMode;
    return (
      <th className={sortable ? "is-sortable" : ""}
          aria-sort={ sortable ? (isActive ? (dir==="asc"?"ascending":"descending") : "none") : undefined }
          onClick={ sortable ? ()=>onSort(activeMode) : undefined }>
        <span className="th-in">
          {label}
          {isActive && <Icon name={dir==="asc"?"chevron-up":"chevron-down"} size={13} className="sort-ind" />}
        </span>
      </th>
    );
  }

  /* ---------- Skeleton table body ---------- */
  function SkeletonBody(){
    return (
      <tbody>
        {Array.from({length:7}).map((_,i)=>(
          <tr key={i}>
            <td><div className="ds-col" style={{gap:"6px"}}>
              <Skeleton variant="text" width="62%" className="sk-line" />
              <Skeleton variant="text" width="38%" height="8px" />
            </div></td>
            <td><Skeleton variant="text" width="52px" height="18px" /></td>
            <td><Skeleton variant="text" width="68px" /></td>
            <td><Skeleton variant="text" width="84px" height="18px" /></td>
            <td><Skeleton variant="text" width="92px" /></td>
            <td><Skeleton variant="text" width="34px" /></td>
            <td><Skeleton variant="circle" width="24px" height="24px" /></td>
          </tr>
        ))}
      </tbody>
    );
  }

  /* ======================================================================= */
  function App(){
    const [stateMode,setStateMode]=useState("populated"); // populated|loading|empty|error|partial
    const [canCreate,setCanCreate]=useState(true);
    const [query,setQuery]=useState("");
    const [statusF,setStatusF]=useState("all");
    const [subjectF,setSubjectF]=useState("all");
    const [classF,setClassF]=useState("all");
    const [sortMode,setSortMode]=useState("attention");
    const [sortDir,setSortDir]=useState("desc");
    const [archived,setArchived]=useState({}); // id -> true (dimmed)
    const [confirm,setConfirm]=useState(null); // {ex, kind:'archive'|'delete'}
    const [toast,setToast]=useState(null);
    const liveRef=useRef(null);

    /* derive filtered list */
    const subjects = Array.from(new Set(EXAMS.map(e=>e.subject)));
    const classesAll = Array.from(new Set(EXAMS.flatMap(e=>e.classes)));

    let rows = EXAMS.filter(e=>{
      if(query){
        const q=query.toLowerCase();
        if(!(e.title.toLowerCase().includes(q) || e.subject.toLowerCase().includes(q))) return false;
      }
      if(statusF!=="all" && e.status!==statusF) return false;
      if(subjectF!=="all" && e.subject!==subjectF) return false;
      if(classF!=="all" && !e.classes.includes(classF)) return false;
      return true;
    });
    rows = sortExams(rows, sortMode);

    const activeFilters = [];
    if(statusF!=="all") activeFilters.push({ key:"status", label:"Status: "+(STATUS[statusF]?.label||statusF), clear:()=>setStatusF("all") });
    if(subjectF!=="all") activeFilters.push({ key:"subject", label:"Subject: "+subjectF, clear:()=>setSubjectF("all") });
    if(classF!=="all") activeFilters.push({ key:"class", label:"Class: "+classF, clear:()=>setClassF("all") });
    if(query) activeFilters.push({ key:"q", label:'“'+query+'”', clear:()=>setQuery("") });

    const clearAll=()=>{ setStatusF("all"); setSubjectF("all"); setClassF("all"); setQuery(""); };

    /* aria-live announcement */
    useEffect(()=>{
      if(liveRef.current && stateMode==="populated"){
        liveRef.current.textContent = "Showing " + rows.length + " of " + EXAMS.length + " exams";
      }
    },[rows.length, stateMode]);

    const onSort=(mode)=>{
      if(sortMode===mode){ setSortDir(d=>d==="asc"?"desc":"asc"); }
      else { setSortMode(mode); setSortDir(mode==="title"?"asc":"desc"); }
    };

    /* toast auto-dismiss */
    useEffect(()=>{
      if(!toast) return;
      const t=setTimeout(()=>setToast(null), 6000);
      return ()=>clearTimeout(t);
    },[toast]);

    const doArchive=(ex)=>{ setArchived(a=>({...a,[ex.id]:true})); setToast({ msg:"Exam archived", undo:()=>{ setArchived(a=>{const n={...a};delete n[ex.id];return n;}); setToast(null); } }); };
    const doDelete=(ex)=>{ setArchived(a=>({...a,[ex.id]:true})); setToast({ msg:"Draft deleted", undo:null }); };

    const isFilterEmpty = rows.length===0;
    const showFirstRunEmpty = stateMode==="empty";

    /* main body switch */
    function MainBody(){
      if(stateMode==="loading"){
        return (
          <div className="tablewrap">
            <table className="exam-table">
              <Thead/>
              <SkeletonBody/>
            </table>
          </div>
        );
      }
      if(stateMode==="error"){
        return (
          <div className="ds-col">
            <Alert variant="error" title="Couldn’t load exams.">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"16px",width:"100%"}}>
                <span>We hit a problem reaching the exam service. Your filters are preserved.</span>
                <Button variant="secondary" size="sm"
                  leadingIcon={<Icon name="refresh-cw" size={14} />}>Retry</Button>
              </div>
            </Alert>
          </div>
        );
      }
      if(showFirstRunEmpty){
        return (
          <div className="tablewrap">
            <EmptyState
              icon="file-plus-2"
              title="No exams yet"
              body="Create an exam to upload a question paper, let AutoGrade extract questions, and start grading."
              action={ canCreate
                ? <Button variant="spark" leadingIcon={<Icon name="plus" size={16} />}>Create your first exam</Button>
                : <span className="u-muted" style={{fontSize:"var(--text-sm)"}}>No exams have been created in this tenant yet.</span> }
            />
          </div>
        );
      }
      if(isFilterEmpty){
        return (
          <div className="tablewrap">
            <EmptyState
              icon="search-x"
              title="No exams match these filters"
              body="Try a different status, subject, or search term."
              action={ <Button variant="ghost" leadingIcon={<Icon name="x" size={16} />} onClick={clearAll}>Clear filters</Button> }
            />
          </div>
        );
      }
      /* populated / partial */
      return (
        <div className="tablewrap">
          {stateMode==="partial" && (
            <div style={{padding:"var(--space-3) var(--space-4)",borderBottom:"1px solid var(--border-subtle)"}}>
              <Alert variant="warning" title="Some stats are still updating">
                Exams mid-grading show an em-dash until grading completes. Rows needing a human are flagged and sorted to the top.
              </Alert>
            </div>
          )}
          <table className="exam-table">
            <Thead/>
            <tbody>
              {rows.map(ex=>(
                <ExamRow key={ex.id} ex={ex} canCreate={canCreate} dim={!!archived[ex.id]}
                  onArchive={(x)=>setConfirm({ex:x,kind:"archive"})}
                  onDelete={(x)=>setConfirm({ex:x,kind:"delete"})} />
              ))}
            </tbody>
          </table>
          <div className="table-foot">
            <Pager/>
            <span className="showing">Showing <span className="num">1–{rows.length}</span> of <span className="num">{EXAMS.length}</span></span>
          </div>
        </div>
      );
    }

    function Thead(){
      return (
        <thead>
          <tr>
            <HeadCell label="Exam"        sortable activeMode="title"     sortMode={sortMode} dir={sortDir} onSort={onSort} />
            <HeadCell label="Classes" />
            <HeadCell label="Date"        sortable activeMode="date_new"  sortMode={sortMode} dir={sortDir} onSort={onSort} />
            <HeadCell label="Status" />
            <HeadCell label="Submissions" sortable activeMode="attention" sortMode={sortMode} dir={sortDir} onSort={onSort} />
            <HeadCell label="Avg"         sortable activeMode="avg"       sortMode={sortMode} dir={sortDir} onSort={onSort} />
            <th aria-label="Actions" style={{width:"96px"}} />
          </tr>
        </thead>
      );
    }

    function Pager(){
      return (
        <nav className="pagination" aria-label="Pagination">
          <a className="pagination__item" aria-label="Previous"><Icon name="chevron-left" size={16} /></a>
          <a className="pagination__item" aria-current="page">1</a>
          <a className="pagination__item">2</a>
          <a className="pagination__item">3</a>
          <a className="pagination__item" aria-label="Next"><Icon name="chevron-right" size={16} /></a>
        </nav>
      );
    }

    return (
      <div className="shell appshell">
        <SidebarNav/>
        <Topbar/>
        <main className="appshell__main">
          <div style={{maxWidth:"1200px"}}>
            <Breadcrumb items={[{label:"Exams"}]} />

            <div className="page-head" style={{marginTop:"var(--space-3)"}}>
              <div>
                <h1>Exams</h1>
                <div className="page-sub">Manage and review every assessment in this tenant.</div>
              </div>
              {canCreate && (
                <Button variant="spark" leadingIcon={<Icon name="plus" size={16} />}>Create exam</Button>
              )}
            </div>

            {/* prototype state + role controls */}
            <div className="seg-wrap">
              <span className="seg-wrap__label">State</span>
              <div className="segmented" role="group" aria-label="Preview state">
                {[["populated","Populated"],["loading","Loading"],["empty","Empty"],["error","Error"],["partial","Partial"]].map(([v,l])=>(
                  <button key={v} aria-pressed={stateMode===v} onClick={()=>setStateMode(v)}>{l}</button>
                ))}
              </div>
              <span className="seg-wrap__label" style={{marginLeft:"var(--space-4)"}}>Role</span>
              <div className="segmented" role="group" aria-label="Preview role">
                <button aria-pressed={canCreate} onClick={()=>setCanCreate(true)}>Can create</button>
                <button aria-pressed={!canCreate} onClick={()=>setCanCreate(false)}>Read-only</button>
              </div>
            </div>

            {/* filter bar */}
            <div className="filterbar">
              <div className="fb-search">
                <Icon name="search" size={16} />
                <input className="input" placeholder="Search by title or subject"
                  aria-label="Search exams by title or subject"
                  value={query} onChange={(e)=>setQuery(e.target.value)} />
              </div>
              <div className="fb-select">
                <span className="fb-select__lab">Status</span>
                <Select value={statusF} onChange={(e)=>setStatusF(e.target.value)} aria-label="Filter by status"
                  options={[{value:"all",label:"All statuses"},
                    {value:"draft",label:"Draft"},
                    {value:"published",label:"Published"},
                    {value:"grading",label:"Grading"},
                    {value:"completed",label:"Completed"},
                    {value:"results_released",label:"Results released"},
                    {value:"archived",label:"Archived"}]} />
              </div>
              <div className="fb-select">
                <span className="fb-select__lab">Subject</span>
                <Select value={subjectF} onChange={(e)=>setSubjectF(e.target.value)} aria-label="Filter by subject"
                  options={[{value:"all",label:"All subjects"}].concat(subjects.map(s=>({value:s,label:s})))} />
              </div>
              <div className="fb-select">
                <span className="fb-select__lab">Class</span>
                <Select value={classF} onChange={(e)=>setClassF(e.target.value)} aria-label="Filter by class"
                  options={[{value:"all",label:"All classes"}].concat(classesAll.map(c=>({value:c,label:c})))} />
              </div>
              <div className="fb-select fb-sort">
                <span className="fb-select__lab">Sort</span>
                <Select value={sortMode} onChange={(e)=>{ setSortMode(e.target.value); setSortDir(e.target.value==="title"?"asc":"desc"); }} aria-label="Sort exams"
                  options={[{value:"attention",label:"Attention (default)"},
                    {value:"date_new",label:"Exam date · newest"},
                    {value:"date_old",label:"Exam date · oldest"},
                    {value:"updated",label:"Recently updated"},
                    {value:"title",label:"Title A–Z"}]} />
              </div>
            </div>

            {/* active filter chips */}
            {activeFilters.length>0 && (
              <div className="activechips">
                {activeFilters.map(f=>(
                  <span key={f.key} className="chip chip--filter" onClick={f.clear} role="button" tabIndex={0}
                    title="Remove filter">
                    {f.label}
                    <span className="chip__remove"><Icon name="x" size={12} /></span>
                  </span>
                ))}
                <button className="clearall" onClick={clearAll}>Clear all</button>
              </div>
            )}

            <MainBody/>

            <div className="u-sr-only" aria-live="polite" ref={liveRef} />
          </div>
        </main>

        {/* confirm dialog */}
        <Modal open={!!confirm}
          onClose={()=>setConfirm(null)}
          title={confirm?.kind==="delete" ? "Delete this draft?" : "Archive this exam?"}
          footer={
            <div style={{display:"flex",justifyContent:"flex-end",gap:"var(--space-2)"}}>
              <Button variant="ghost" onClick={()=>setConfirm(null)}>Cancel</Button>
              <Button variant="danger"
                leadingIcon={<Icon name={confirm?.kind==="delete"?"trash-2":"archive"} size={15} />}
                onClick={()=>{ const c=confirm; setConfirm(null); if(c){ c.kind==="delete"?doDelete(c.ex):doArchive(c.ex); } }}>
                {confirm?.kind==="delete" ? "Delete" : "Archive"}
              </Button>
            </div>
          }>
          {confirm?.kind==="delete"
            ? "This can’t be undone. The draft and any uploaded paper will be removed."
            : "It will be hidden from the active list, but submissions and results are kept."}
        </Modal>

        {/* toast */}
        {toast && (
          <div className="toast-stack">
            <div className="toast-card" role="status">
              <span className="toast-card__icon"><Icon name="check-circle" size={18} /></span>
              <span className="toast-card__txt">{toast.msg}</span>
              {toast.undo && <button className="toast-card__undo" onClick={toast.undo}>Undo</button>}
            </div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
