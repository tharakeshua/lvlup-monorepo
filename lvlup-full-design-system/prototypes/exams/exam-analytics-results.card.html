.ex-meta__sep{color:var(--border-strong)}
.ex-chips{display:flex;flex-wrap:wrap;gap:var(--space-2);margin-top:var(--space-3);align-items:center}
.cellmono{font-family:var(--font-mono);font-size:var(--text-xs)}
.exhead__rt{display:flex;align-items:flex-start;gap:var(--space-2)}
.hdr-actions{display:flex;align-items:center;gap:var(--space-2)}

/* status badge (icon + label, never color-only) */
.statusbadge{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-3);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-semibold);border:1px solid transparent;white-space:nowrap}

.sb--neutral{background:var(--bg-inset);color:var(--text-secondary);border-color:var(--border-strong)}

.sb--brand{background:var(--brand-subtle);color:var(--brand-primary)}
.sb--warning{background:var(--status-warning-subtle);color:var(--status-warning)}

.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--space-3)}
.kpi{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-2);transition:box-shadow var(--dur-fast) var(--ease-standard),transform var(--dur-fast) var(--ease-standard)}

.kpi__label{font-size:var(--text-2xs);font-weight:var(--weight-semibold);text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);display:inline-flex;align-items:center;gap:var(--space-1)}
.kpi__icon{color:var(--text-muted);display:grid;place-items:center}
.kpi__val{font-family:var(--font-mono);font-size:var(--text-xl);font-weight:var(--weight-medium);line-height:1;letter-spacing:-0.01em;font-variant-numeric:tabular-nums}

.kpi__sub{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);display:inline-flex;align-items:center;gap:var(--space-1)}

.kpi__flash{animation:flash var(--dur-fast) var(--ease-standard)}

.region__title{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);line-height:1.2;margin:0}

.vtoggle button[aria-pressed="true"]{background:var(--bg-surface);color:var(--brand-primary);box-shadow:var(--shadow-e1)}

/* distribution row grid 12 -> 7/5 */
.distrow{display:grid;grid-template-columns:7fr 5fr;gap:var(--space-4)}

.hist{display:flex;align-items:flex-end;gap:var(--space-2);height:200px;padding-top:var(--space-2);border-bottom:1px solid var(--border-subtle)}
.hist__col{flex:1;display:flex;flex-direction:column;align-items:center;gap:var(--space-1);min-width:0}
.hist__barwrap{width:100%;flex:1;display:flex;align-items:flex-end}
.hist__bar{width:100%;border-radius:var(--radius-sm) var(--radius-sm) 0 0;position:relative;transition:filter var(--dur-fast) var(--ease-standard);cursor:default;animation:grow var(--dur-slow) var(--ease-standard) both}
.hist__bar:hover{filter:brightness(1.06)}
.hist__bar:hover .hist__tip{opacity:1}
@keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
.hist__bar{transform-origin:bottom}
.hist__cnt{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-secondary)}
.hist__tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);z-index:40;background:var(--text-primary);color:var(--text-on-accent);font-family:var(--font-mono);font-size:var(--text-2xs);line-height:1.4;padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);width:max-content;box-shadow:var(--shadow-e2);opacity:0;pointer-events:none;transition:opacity var(--dur-fast) var(--ease-standard)}
.hist__xlabels{display:flex;gap:var(--space-2);margin-top:var(--space-2)}
.hist__xlbl{flex:1;text-align:center;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
.gband-a{background:var(--grade-a)}.gband-b{background:var(--grade-b)}.gband-c{background:var(--grade-c)}.gband-d{background:var(--grade-d)}.gband-f{background:var(--grade-f)}

/* grade distribution: stacked bar + legend */
.gstack{display:flex;width:100%;height:24px;border-radius:var(--radius-pill);overflow:hidden;background:var(--bg-inset)}
.gstack__seg{height:100%;transition:filter var(--dur-fast) var(--ease-standard)}
.gstack__seg:hover{filter:brightness(1.08)}
.glegend{display:flex;flex-direction:column;gap:var(--space-2);margin-top:var(--space-4)}
.glegend__row{display:flex;align-items:center;gap:var(--space-3);font-size:var(--text-sm)}
.glegend__dot{width:14px;height:14px;border-radius:var(--radius-sm);flex:0 0 auto}
.glegend__name{font-weight:var(--weight-medium);min-width:120px}
.glegend__cnt{font-family:var(--font-mono);color:var(--text-secondary)}
.glegend__pct{font-family:var(--font-mono);color:var(--text-muted);margin-left:auto}

/* insight strip — neutral staff styling (NOT spark — staff analytics) */
.insightstrip{display:flex;flex-direction:column;gap:var(--space-3)}
.scallout{display:flex;gap:var(--space-3);padding:var(--space-4);background:var(--bg-surface);border:1px solid var(--border-subtle);border-left:3px solid var(--brand-primary);border-radius:var(--radius-md);box-shadow:var(--shadow-e1)}

.scallout--warn .scallout__ic{background:var(--status-warning-subtle);color:var(--status-warning)}
.scallout__ic svg{width:18px;height:18px}
.scallout__title{font-size:var(--text-sm);font-weight:var(--weight-semibold)}
.scallout__body{font-size:var(--text-xs);color:var(--text-secondary);margin-top:2px}

.tbl-wrap{overflow:hidden;border-radius:var(--radius-md)}
.tbl-wrap .table{margin:0}
.sortbtn{display:inline-flex;align-items:center;gap:var(--space-1);background:transparent;border:0;font:inherit;font-weight:var(--weight-semibold);color:inherit;cursor:pointer;padding:0}

.qnum{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-muted);width:18px}

.diff{display:flex;flex-direction:column;gap:var(--space-1);min-width:128px}
.diff__band{font-size:var(--text-2xs);color:var(--text-secondary);font-weight:var(--weight-medium)}

.flagchip{display:inline-flex;align-items:center;gap:var(--space-1);padding:var(--space-1) var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-2xs);font-weight:var(--weight-semibold);background:var(--status-warning-subtle);color:var(--status-warning)}

.qexp{background:var(--bg-surface-sunken);border-top:1px solid var(--border-subtle)}

/* bottom two cards */
.bottomrow{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)}
.topicgrid{display:flex;flex-direction:column}
.topicrow{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) 0;border-top:1px solid var(--border-subtle)}
.topicrow:first-child{border-top:0}
.topicrow__name{flex:1;font-size:var(--text-sm);font-weight:var(--weight-medium)}
.topicrow__bar{width:120px}
.topicrow__pct{font-family:var(--font-mono);font-size:var(--text-sm);width:48px;text-align:right}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap}

/* export menu */
.menuwrap{position:relative}
.menu{position:absolute;top:calc(100% + 6px);right:0;z-index:30;min-width:220px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);box-shadow:var(--shadow-e2);padding:var(--space-1);display:flex;flex-direction:column}
.menu button{display:flex;align-items:center;gap:var(--space-3);width:100%;text-align:left;background:transparent;border:0;border-radius:var(--radius-sm);padding:var(--space-2) var(--space-3);font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);cursor:pointer}

.menu .menu__meta{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);margin-left:auto}

@media (prefers-reduced-motion: reduce){
  .enter,.hist__bar{animation:none}
  .kpi,.kpi__flash{transition:none;animation:none}
}
</style>

      { variant:"warn", icon:"flag", title:"Q7 is a poor discriminator (0.04)",

        body:"The Entropy topic averages 51% and contributes 15 at-risk students — the largest gap in this exam." }

  const STATUS_BADGE = {
    grading:          { tone:"brand",   icon:"sparkles",        label:"Grading" },
    completed:        { tone:"success", icon:"clipboard-check", label:"Completed" },
    results_released: { tone:"success", icon:"megaphone",       label:"Results released" }
  };

  function gradeOf(pct){ return pct>=80?"a":pct>=65?"b":pct>=50?"c":pct>=35?"d":"f"; }
  function difficultyBand(idx){ return idx>=0.75?"easy":idx>=0.55?"moderate":idx>=0.35?"hard":"very hard"; }

  /* ============================================================= */
  /* Small presentational pieces                                   */
  /* ============================================================= */
  function StatusBadge(props){
    var m = STATUS_BADGE[props.status] || STATUS_BADGE.completed;
    return (<span className={"statusbadge sb--"+m.tone}><i data-lucide={m.icon}></i>{m.label}</span>);
  }

  function InfoDot(props){
    return (
      <span className="infodot" tabIndex={0} role="img" aria-label={props.text}>
        <i data-lucide="info"></i>
        <span className="infodot__bub" role="tooltip">{props.text}</span>
      </span>
    );
  }

  function KpiCard(props){
    return (
      <div className={"kpi"+(props.flash?" kpi__flash":"")} tabIndex={0}>
        <div className="kpi__top">
          <span className="kpi__label">{props.label}{props.tip && <InfoDot text={props.tip} />}</span>
          <span className="kpi__icon"><i data-lucide={props.icon}></i></span>
        </div>
        <div className="kpi__val">{props.value}{props.denom!=null && <span className="denom">{" / "+props.denom}</span>}</div>
        {props.delta!=null
          ? <div className="kpi__sub up"><i data-lucide="trending-up" style={{width:11,height:11}}></i>{props.delta} {props.sub}</div>
          : (props.sub && <div className="kpi__sub">{props.sub}</div>)}
      </div>
    );

  /* ============================================================= */
  /* Charts                                                        */
  /* ============================================================= */
  function DistributionChart(props){
    var a = ANALYTICS.scoreDistribution;
    var max = Math.max.apply(null, a.buckets.map(function(b){return b.count;}));
    var [asTable, setAsTable] = useState(false);
    var summary = "Score distribution over "+a.bucketCount+" mark bands. Peak band 31–35 marks with 31 students; left tail (0–15) holds 13 students.";
    return (
      <div className="region enter d2">
        <div className="region__head">
          <div className="region__titlewrap">
            <h3 className="region__title">Score distribution</h3>
            <div className="region__sub">by marks, {a.bucketCount} bands</div>
          </div>
          <div className="vtoggle" role="group" aria-label="Chart view">
            <button aria-pressed={!asTable} onClick={function(){setAsTable(false);}}><i data-lucide="bar-chart-3"></i>Chart</button>
            <button aria-pressed={asTable} onClick={function(){setAsTable(true);}}><i data-lucide="table"></i>Table</button>
          </div>
        </div>
        {asTable ? (
          <div className="tbl-wrap"><DataTable
            columns={[
              {label:"Mark band", key:"range", render:function(r){return <span className="numcell">{r.range}</span>;}},
              {label:"Grade band", key:"band", render:function(r){return <GradePill grade={r.band.toUpperCase()} />;}},
              {label:"Students", key:"count", numeric:true, render:function(r){return <span className="numcell">{r.count}</span>;}}
            ]}
            rows={a.buckets} /></div>
        ) : (
          <div>
            <div className="hist" role="img" aria-label={summary}>
              {a.buckets.map(function(b,i){
                return (
                  <div className="hist__col" key={i}>
                    <div className="hist__barwrap">
                      <div className={"hist__bar gband-"+b.band} style={{height:(b.count/max*100)+"%",animationDelay:(i*24)+"ms"}}>
                        <span className="hist__tip">{b.range} marks · {b.count} students</span>
                      </div>
                    </div>
                    <span className="hist__cnt">{b.count}</span>
                  </div>
                );
              })}
            </div>
            <div className="hist__xlabels" aria-hidden="true">
              {a.buckets.map(function(b,i){return <span className="hist__xlbl" key={i}>{b.range}</span>;})}
            </div>
          </div>
        )}
        <p className="sr-only">{summary}</p>
      </div>
    );

  function GradeDistributionChart(props){
    var g = ANALYTICS.gradeDistribution;
    var total = g.reduce(function(s,x){return s+x.count;},0);
    var [asTable, setAsTable] = useState(false);
    var summary = "Grade distribution: " + g.map(function(x){return x.grade+" "+x.count;}).join(", ") + ".";
    return (
      <div className="region enter d2">
        <div className="region__head">
          <div className="region__titlewrap">
            <h3 className="region__title">Grade distribution</h3>
            <div className="region__sub"><span className="cellmono">{total}</span> graded</div>
          </div>
          <div className="vtoggle" role="group" aria-label="Chart view">
            <button aria-pressed={!asTable} onClick={function(){setAsTable(false);}}><i data-lucide="bar-chart-3"></i>Chart</button>
            <button aria-pressed={asTable} onClick={function(){setAsTable(true);}}><i data-lucide="table"></i>Table</button>
          </div>
        </div>
        {asTable ? (
          <div className="tbl-wrap"><DataTable
            columns={[
              {label:"Grade", key:"grade", render:function(r){return <GradePill grade={r.grade} />;}},
              {label:"Students", key:"count", numeric:true, render:function(r){return <span className="numcell">{r.count}</span>;}},
              {label:"Share", key:"pct", numeric:true, render:function(r){return <span className="numcell">{Math.round(r.count/total*100)}%</span>;}}
            ]}

        ) : (
          <div>
            <div className="gstack" role="img" aria-label={summary}>

              })}
            </div>
            <div className="glegend">
              {g.map(function(x,i){
                return (
                  <div className="glegend__row" key={i}>
                    <span className={"glegend__dot gband-"+x.band}></span>
                    <span className="glegend__name">Grade {x.grade}</span>
                    <span className="glegend__cnt">{x.count} students</span>
                    <span className="glegend__pct">{Math.round(x.count/total*100)}%</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        <p className="sr-only">{summary}</p>
      </div>
    );

  /* ============================================================= */
  /* Per-question item analysis                                    */
  /* ============================================================= */
  function QuestionTable(props){
    var [sortKey, setSortKey] = useState("order");
    var [sortDir, setSortDir] = useState("asc");
    var [open, setOpen] = useState({});
    var rows = ANALYTICS.questionAnalytics.slice().sort(function(a,b){
      var d = (a[sortKey]||0) - (b[sortKey]||0);
      if (sortKey==="order"||sortKey==="avg"||sortKey==="avgPct"||sortKey==="difficulty"||sortKey==="discrimination"){
        return sortDir==="asc"?d:-d;
      }
      return 0;
    });
    function toggleSort(k){
      if (sortKey===k){ setSortDir(sortDir==="asc"?"desc":"asc"); }
      else { setSortKey(k); setSortDir(k==="avgPct"||k==="discrimination"?"asc":"asc"); }
    }
    function ariaSort(k){ return sortKey===k ? (sortDir==="asc"?"ascending":"descending") : "none"; }
    function SortH(p){
      return (
        <button className="sortbtn" aria-sort={ariaSort(p.k)} onClick={function(){toggleSort(p.k);}}>
          {p.label}<i data-lucide={sortKey===p.k?(sortDir==="asc"?"arrow-up":"arrow-down"):"chevrons-up-down"}></i>
        </button>
      );
    }
    return (
      <div className="region enter d3">
        <div className="region__head">
          <div className="region__titlewrap">
            <h3 className="region__title">Per-question analysis</h3>
            <div className="region__sub">Sort by Avg % or Discrimination to surface weak items · expand a row for mistakes &amp; strengths</div>
          </div>
        </div>
        <div className="tbl-wrap">
          <table className="table">
            <thead>
              <tr>
                <th style={{width:18}}></th>
                <th><SortH k="order" label="#" /></th>
                <th>Question</th>
                <th className="num"><SortH k="avg" label="Avg" /></th>
                <th className="num"><SortH k="avgPct" label="Avg %" /></th>
                <th><SortH k="difficulty" label="Difficulty" /> <InfoDot text="Difficulty index: proportion of available marks earned; lower = harder." /></th>
                <th><SortH k="discrimination" label="Discrimination" /> <InfoDot text="Discrimination index: how well the item separates strong and weak students; below 0.10 is weak." /></th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {rows.map(function(q){
                var isOpen = !!open[q.questionId];
                var weak = q.discrimination < 0.10;
                var band = difficultyBand(q.difficulty);
                return (
                  <React.Fragment key={q.questionId}>
                    <tr aria-selected={isOpen||undefined}>
                      <td>
                        <button className="qrow-btn" aria-expanded={isOpen}
                          aria-label={(isOpen?"Collapse":"Expand")+" question "+q.order}
                          onClick={function(){var n=Object.assign({},open); n[q.questionId]=!isOpen; setOpen(n);}}>
                          <span className="qrow-btn__chev"><i data-lucide="chevron-right" style={{width:16,height:16}}></i></span>
                        </button>
                      </td>
                      <td><span className="qnum">{q.order}</span></td>
                      <td><div className="qtext" title={q.text}>{q.text}</div></td>
                      <td className="num"><span className="numcell">{q.avg.toFixed(1)}<span style={{color:"var(--text-muted)"}}>/{q.max}</span></span></td>
                      <td className="num"><span className="numcell">{q.avgPct}%</span></td>
                      <td>
                        <div className="diff">
                          <span className="diff__band">{band}</span>
                          <ProgressBar value={Math.round(q.difficulty*100)} variant={q.difficulty>=0.55?"success":undefined} />
                        </div>
                      </td>
                      <td>
                        <span className="row-flex" style={{display:"inline-flex",alignItems:"center",gap:"var(--space-2)"}}>
                          <span className="numcell">{q.discrimination.toFixed(2)}</span>
                          {weak && <span className="flagchip"><i data-lucide="alert-triangle"></i>weak</span>}
                        </span>
                      </td>
                      <td>{weak && <span className="flagchip" title="Flagged for review"><i data-lucide="flag"></i>review</span>}</td>
                    </tr>
                    {isOpen && (
                      <tr className="qexp">
                        <td colSpan={8} style={{padding:0}}>
                          <div className="qexp__grid">
                            <div>
                              <div className="qexp__h mistakes"><i data-lucide="x-circle" style={{width:14,height:14}}></i>Common mistakes</div>
                              <ul>
                                {q.commonMistakes.map(function(m,i){
                                  return <li key={i}><i data-lucide="minus" style={{color:"var(--status-error)"}}></i><span>{m.t}</span><span className="pct">{m.pct}%</span></li>;
                                })}
                              </ul>
                            </div>
                            <div>
                              <div className="qexp__h strengths"><i data-lucide="check-circle" style={{width:14,height:14}}></i>Common strengths</div>
                              <ul>
                                {q.commonStrengths.map(function(s,i){
                                  return <li key={i}><i data-lucide="plus" style={{color:"var(--status-success)"}}></i><span>{s.t}</span><span className="pct">{s.pct}%</span></li>;
                                })}
                              </ul>
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  /* ============================================================= */
  /* Bottom row: class breakdown + topic performance              */
  /* ============================================================= */
  function ClassBreakdown(){
    var cols = [
      {label:"Class", key:"className", render:function(r){return <span style={{fontWeight:"var(--weight-medium)",fontSize:"var(--text-sm)"}}>{r.className}</span>;}},
      {label:"Avg score", key:"avgScore", numeric:true, render:function(r){return <span className="numcell">{r.avgScore.toFixed(1)}<span style={{color:"var(--text-muted)"}}>/{EXAM.totalMarks}</span></span>;}},
      {label:"Pass rate", key:"passRate", numeric:true, render:function(r){return <span className="numcell">{r.passRate}%</span>;}},

    return (
      <div className="region enter d4">
        <div className="region__head"><div className="region__titlewrap"><h3 className="region__title">Class breakdown</h3></div></div>
        <div className="tbl-wrap"><DataTable columns={cols} rows={ANALYTICS.classBreakdown} /></div>
      </div>
    );

  function TopicPerformance(){

        <div className="region__head">
          <div className="region__titlewrap"><h3 className="region__title">Topic performance</h3></div>
        </div>

          {ANALYTICS.topicPerformance.map(function(t,i){

              <div className="topicrow" key={i}>

                <span className="topicrow__pct">{t.avgPct}%</span>
                {t.weakStudentCount>0

  /* ============================================================= */
  /* KPI row                                                       */
  /* ============================================================= */
  function KpiRow(props){
    var a = ANALYTICS;
    var f = props.flash;
    return (
      <div className="kpis enter d1" role="group" aria-label="Exam key metrics">
        <KpiCard label="Submissions" icon="users" value={a.gradedSubmissions} denom={a.totalSubmissions} sub="graded coverage" />
        <KpiCard label="Graded" icon="check-check" value={a.gradedSubmissions} sub="finalized scores" />
        <KpiCard label="Avg score" icon="gauge" value={a.avgScore} denom={EXAM.totalMarks} flash={f} />
        <KpiCard label="Avg %" icon="percent" value={a.avgPercentage+"%"} />
        <KpiCard label="Pass rate" icon="trophy" value={a.passRate+"%"} delta={a.passRateDelta+"%"} sub="vs session avg" tip={"Pass mark is "+EXAM.passingMarks+" of "+EXAM.totalMarks+" marks."} />
        <KpiCard label="Median" icon="align-center-horizontal" value={a.medianScore} />

  /* Main analytics body (success / partial)                       */

                <span className="scallout__ic"><i data-lucide={ic.icon}></i></span>

  /* ============================================================= */
  /* Empty state (copy adapts by status)                           */
  /* ============================================================= */
  function EmptyBody(props){
    var s = props.status;
    var body = s==="draft" || s==="published"
      ? "No submissions have been graded for this exam yet."
      : s==="grading"
        ? "Grading is in progress — analytics will appear as submissions complete."
        : "Class analytics are computed automatically once submissions are graded and results are reviewed. Head to Submissions to check grading progress.";
    return (
      <div style={{maxWidth:560,margin:"64px auto"}}>
        <EmptyState icon="bar-chart-3"
          title="Analytics aren't ready yet."
          body={body}

      </div>
    );

  /* ============================================================= */
  /* App                                                           */
  /* ============================================================= */
  function App(){
    var [state, setState] = useState("populated"); // populated | loading | empty | error | partial
    var [menuOpen, setMenuOpen] = useState(false);
    var [toast, setToast] = useState(null);
    var [exporting, setExporting] = useState(false);
    var [flash, setFlash] = useState(false);

    useLucide();

    var status = state === "partial" ? "grading"
               : state === "empty"   ? "grading"
               : EXAM.status;

    // close menu on outside click / Esc
    useEffect(function(){
      function onKey(e){ if (e.key === "Escape"){ setMenuOpen(false); } }
      function onClick(){ setMenuOpen(false); }
      window.addEventListener("keydown", onKey);
      if (menuOpen) window.addEventListener("click", onClick);
      return function(){ window.removeEventListener("keydown", onKey); window.removeEventListener("click", onClick); };
    }, [menuOpen]);

    // auto-dismiss toast
    useEffect(function(){
      if (!toast) return;
      var t = setTimeout(function(){ setToast(null); }, 3200);
      return function(){ clearTimeout(t); };
    }, [toast]);

    // simulate a live recompute on the Partial state: brief flash on Avg score
    useEffect(function(){
      if (state !== "partial") return;
      var t = setTimeout(function(){ setFlash(true); }, 600);
      var t2 = setTimeout(function(){ setFlash(false); }, 1100);
      return function(){ clearTimeout(t); clearTimeout(t2); };
    }, [state]);

    function doExport(kind){
      setMenuOpen(false);
      setExporting(true);
      setTimeout(function(){
        setExporting(false);
        setToast({ variant:"success", title:"Report ready", body:(kind==="pdf"?"PDF report":"CSV data")+" generated from the current snapshot." });
      }, 1000);
    }

    var EXAM_TABS = ["Questions","Submissions","Analytics","Settings"];

    return (
      <Shell state={state} setState={setState} status={status}
        menuOpen={menuOpen} onToggleMenu={function(e){ if(e) e.stopPropagation(); setMenuOpen(!menuOpen); }}
        onExport={doExport}>

        {/* Exam sub-tabs — Analytics active */}
        <div className="enter">
          <div className="extabs__list" role="tablist" aria-label="Exam sections">
            {EXAM_TABS.map(function(t,i){
              var active = t==="Analytics";
              return (
                <button key={i} role="tab" className="extab" aria-selected={active} tabIndex={active?0:-1}>
                  {t}
                  {t==="Submissions" && <span className="extab__count">{ANALYTICS.totalSubmissions}</span>}
                  {t==="Questions" && <span className="extab__count">8</span>}
                </button>
              );
            })}
          </div>
        </div>

        <div style={{marginTop:"var(--space-5)"}}>
          {state === "error" ? (
            <div className="enter">
              <Alert variant="error" title="Couldn't load analytics.">
                Check your connection and retry. The exam header and tabs stay usable.
                <div style={{marginTop:"var(--space-3)"}}>
                  <Button variant="secondary" size="sm" leadingIcon={<i data-lucide="refresh-cw"></i>}
                    onClick={function(){ setState("loading"); setTimeout(function(){ setState("populated"); }, 900); }}>Retry</Button>
                </div>
              </Alert>
            </div>
          ) : state === "loading" ? <LoadingBody />
            : state === "empty"   ? <EmptyBody status={status} />
            : <AnalyticsBody partial={state==="partial"} flash={flash} />}
        </div>

        {exporting && (
          <div className="overlay" aria-live="polite" style={{position:"absolute",inset:0,zIndex:55}}>
            <div className="spinner"></div>
          </div>
        )}

        {toast && (
          <div style={{position:"absolute",right:"var(--space-6)",bottom:"var(--space-6)",zIndex:60,minWidth:300}} role="status" aria-live="polite">
            <div style={{boxShadow:"var(--shadow-e3)",borderRadius:"var(--radius-md)"}}>
              <Alert variant={toast.variant} title={toast.title}>{toast.body}</Alert>
            </div>
          </div>
        )}
      </Shell>
    );
  }

  /* ============================================================= */
  /* AppShell chrome + header + state segmented control            */
  /* ============================================================= */
  function Shell(props){
    var STATES = ["populated","loading","empty","error","partial"];
    var LABELS = { populated:"Populated", loading:"Loading", empty:"Empty", error:"Error", partial:"Partial" };
    return (
      <div className="scene">
        <div className="appshell">
          {/* Sidebar */}
          <aside className="appshell__sidebar">
            <div className="sidebar__brand">
              <span className="sidebar__brand-mark">L</span>
              <span className="sidebar__brand-name">Lyceum</span>
            </div>
            <nav className="sidebar__nav sb-scroll" aria-label="Primary">
              <span className="sidebar__section-label">Teach</span>
              <NavItem icon="layout-dashboard" href="#">Dashboard</NavItem>
              <NavItem icon="users" href="#">Students</NavItem>
              <NavItem icon="book-open" href="#">Spaces</NavItem>
              <span className="sidebar__section-label" style={{marginTop:"var(--space-3)"}}>Assess</span>
              <NavItem icon="file-check-2" href="#" active>Exams</NavItem>
              <NavItem icon="scan-line" href="#">Scan intake</NavItem>
              <NavItem icon="bar-chart-3" href="#">Analytics</NavItem>
              <span className="sidebar__section-label" style={{marginTop:"var(--space-3)"}}>Admin</span>
              <NavItem icon="settings" href="#">Settings</NavItem>
            </nav>
            <div className="sb-foot">
              <Avatar size="sm" initials="SV" />
              <div className="sb-foot__meta">
                <span className="sb-foot__name">S. Verma</span>
                <span className="sb-foot__role">role: exam_owner</span>
              </div>
            </div>
          </aside>

          {/* Topbar */}
          <header className="appshell__topbar">
            <div className="tenant" role="button" tabIndex={0}>
              <i data-lucide="building-2" style={{width:15,height:15}}></i>
              Subhang Academy
              <span className="tenant__code">SUB001</span>
              <i data-lucide="chevrons-up-down" style={{width:13,height:13,opacity:.6}}></i>
            </div>
            <div className="tbsearch">
              <i data-lucide="search" style={{width:15,height:15}}></i>
              <input placeholder="Search exams, students…" aria-label="Search" />
              <Kbd>⌘K</Kbd>
            </div>
            <div className="tb-icons">
              <span className="notif"><IconButton label="Notifications" icon={<i data-lucide="bell"></i>} /><span className="notif__dot"></span></span>
              <IconButton label="Help" icon={<i data-lucide="circle-help"></i>} />
              <Avatar size="sm" initials="SV" />
            </div>
          </header>

          {/* Main */}
          <main className="appshell__main">
            <div style={{maxWidth:1200,margin:"0 auto",position:"relative"}}>
              <div className="flex-between" style={{marginBottom:"var(--space-4)"}}>
                <Breadcrumb items={[{label:"Exams",href:"#"},{label:EXAM.title}]} />
                <div className="segrow">
                  <span className="seg-label">State</span>
                  <div className="seg" role="group" aria-label="Preview state">
                    {STATES.map(function(s){
                      return <button key={s} aria-pressed={props.state===s} onClick={function(){props.setState(s);}}>{LABELS[s]}</button>;
                    })}
                  </div>
                </div>
              </div>

              {/* Exam header */}
              <div className="exhead enter" style={{marginBottom:"var(--space-5)"}}>
                <div className="exhead__in">
                  <div className="exhead__top">
                    <div className="exhead__titlewrap">
                      <h1 className="ex-title">{EXAM.title}</h1>
                      <p className="ex-meta">
                        <span>{EXAM.subject}</span><span className="ex-meta__sep">·</span>
                        <span className="mono">{EXAM.examDate}</span><span className="ex-meta__sep">·</span>
                        <span className="mono">{EXAM.totalMarks} marks</span><span className="ex-meta__sep">·</span>
                        <span>Pass <span className="mono">{EXAM.passingMarks}</span></span>
                      </p>
                      <div className="ex-chips">
                        <Chip>{EXAM.subject}</Chip>
                        <span className="cellmono" style={{color:"var(--text-muted)"}}>{EXAM.examId}</span>
                      </div>
                    </div>
                    <div className="exhead__rt">
                      <div className="hdr-actions">
                        <StatusBadge status={props.status} />
                        <div className="menuwrap" style={{position:"relative"}}>
                          <Button variant="primary" trailingIcon={<i data-lucide="chevron-down"></i>}
                            aria-haspopup="menu" aria-expanded={props.menuOpen}
                            onClick={props.onToggleMenu}>
                            <span style={{display:"inline-flex",alignItems:"center",gap:"var(--space-2)"}}><i data-lucide="download" style={{width:15,height:15}}></i>Export report</span>
                          </Button>
                          {props.menuOpen && (
                            <div className="menu" role="menu">
                              <button role="menuitem" onClick={function(){props.onExport("pdf");}}><i data-lucide="file-text" style={{width:16,height:16}}></i>PDF report<span className="menu__meta">.pdf</span></button>
                              <button role="menuitem" onClick={function(){props.onExport("csv");}}><i data-lucide="table" style={{width:16,height:16}}></i>CSV data<span className="menu__meta">.csv</span></button>
                            </div>
                          )}
                        </div>
                        <Button variant="secondary" trailingIcon={<i data-lucide="arrow-right"></i>}>Open submissions</Button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              {props.children}
            </div>
          </main>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
