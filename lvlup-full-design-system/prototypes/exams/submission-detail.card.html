<!-- @dsCard group="Exams" viewport="1280x820" name="Submission Detail / Result Summary" subtitle="Full teacher view vs sanitized AnswerKeyLock-gated student view" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
/* screen-local layout ONLY — Lyceum vars only, NO raw hex, NO :root token redefinition */
body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}
#root,.screen{height:100vh}
.screen{position:relative;overflow:hidden}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}

/* ---- topbar ---- */
.topbar__search-box{display:flex;align-items:center;gap:var(--space-2);background:var(--bg-inset);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);color:var(--text-muted);max-width:420px;flex:1}
.topbar__search-box input{border:none;background:transparent;outline:none;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);width:100%}
.topbar__spacer{flex:1}
.topbar__icons{display:flex;align-items:center;gap:var(--space-2)}
.tenantchip{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-3);border-radius:var(--radius-pill);background:var(--bg-inset);border:1px solid var(--border-subtle);font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--text-secondary)}
.tenantchip .mono{color:var(--text-muted)}

/* ---- page scaffold ---- */
.sd{display:flex;flex-direction:column;gap:var(--space-5);max-width:1200px;margin:0 auto;padding-bottom:var(--space-16)}

/* identity header */
.sdhead{display:flex;align-items:flex-start;gap:var(--space-4);padding:var(--space-5) var(--space-6);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);flex-wrap:wrap}
.sdhead__id{display:flex;align-items:center;gap:var(--space-4);min-width:0}
.sdhead__name{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-2xl);line-height:var(--leading-2xl);letter-spacing:-0.02em;margin:0}
.sdhead__sub{font-size:var(--text-sm);color:var(--text-secondary);display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;margin-top:var(--space-1)}
.sdhead__dot{width:3px;height:3px;border-radius:50%;background:var(--border-strong)}
.sdhead__actions{display:flex;align-items:center;gap:var(--space-2);margin-left:auto;flex-wrap:wrap}

/* body grid */
.sdbody{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:var(--space-5);align-items:start}
@media (max-width:1100px){.sdbody{grid-template-columns:1fr}}
.sdmain{display:flex;flex-direction:column;gap:var(--space-5);min-width:0}
.sdaside{display:flex;flex-direction:column;gap:var(--space-4);position:sticky;top:0}
@media (max-width:1100px){.sdaside{position:static;flex-direction:row;flex-wrap:wrap}.sdaside>*{flex:1 1 240px}}

/* ResultSummary card */
.rsum{display:flex;align-items:center;gap:var(--space-6);padding:var(--space-5) var(--space-6);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);flex-wrap:wrap}
.rsum__hero{display:flex;flex-direction:column;gap:var(--space-1);min-width:150px}
.rsum__nums{display:flex;align-items:baseline;gap:var(--space-2)}
.rsum__score{font-family:var(--font-mono);font-size:var(--text-4xl);line-height:1;font-weight:var(--weight-500);font-variant-numeric:tabular-nums;color:var(--text-primary)}
.rsum__of{font-family:var(--font-mono);font-size:var(--text-xl);color:var(--text-muted);font-variant-numeric:tabular-nums}
.rsum__cap{font-size:var(--text-xs);color:var(--text-muted)}
.rsum__div{width:1px;align-self:stretch;background:var(--border-subtle)}
.rsum__pct{display:flex;flex-direction:column;gap:var(--space-1)}
.rsum__pctnum{font-family:var(--font-mono);font-size:var(--text-2xl);font-weight:var(--weight-500);font-variant-numeric:tabular-nums}
.rsum__gradecell{display:flex;flex-direction:column;align-items:flex-start;gap:var(--space-2)}
.rsum__meta{display:flex;flex-direction:column;gap:var(--space-2);margin-left:auto;align-items:flex-end}
.rsum__metaline{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--text-secondary)}
.passchip{display:inline-flex;align-items:center;gap:var(--space-1);padding:var(--space-1) var(--space-3);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-semibold)}
.passchip--pass{background:var(--status-success-subtle);color:var(--status-success)}
.passchip--fail{background:var(--status-error-subtle);color:var(--status-error)}

/* per-question accordion row content */
.qrow{display:flex;align-items:center;gap:var(--space-3);width:100%}
.qrow__id{font-family:var(--font-mono);font-size:var(--text-sm);font-weight:var(--weight-500);color:var(--text-primary);min-width:34px;font-variant-numeric:tabular-nums}
.qrow__score{font-family:var(--font-mono);font-size:var(--text-sm);font-weight:var(--weight-500);color:var(--text-secondary);font-variant-numeric:tabular-nums}
.qrow__prompt{font-size:var(--text-sm);color:var(--text-secondary);font-weight:var(--weight-regular);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1;font-family:var(--font-ui)}
.qrow__badges{display:flex;align-items:center;gap:var(--space-2);margin-left:auto;flex:0 0 auto}
.overridechip{display:inline-flex;align-items:center;gap:var(--space-1);padding:var(--space-1) var(--space-2);border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);font-size:var(--text-2xs);font-weight:var(--weight-semibold)}

/* accordion expanded body */
.qexp{display:flex;flex-direction:column;gap:var(--space-5);padding-top:var(--space-2);max-width:720px}
.seclab{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:0.07em;text-transform:uppercase;color:var(--text-muted);margin:0 0 var(--space-2);display:flex;align-items:center;gap:var(--space-2)}
.fbgrid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)}
@media (max-width:640px){.fbgrid{grid-template-columns:1fr}}
.fblist{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:var(--space-2)}
.fblist li{display:flex;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-secondary)}
.fblist li svg{flex:0 0 auto;margin-top:2px}
.fb--strength svg{color:var(--status-success)}
.fb--weak svg{color:var(--status-warning)}
.fbbody{font-size:var(--text-sm);color:var(--text-secondary);line-height:var(--leading-base)}
.fbbody p{margin:0 0 var(--space-2)}

/* override timeline (read-only) */
.tl-wrap{display:flex;flex-direction:column;list-style:none;margin:0;padding:0}
.tl-entry{display:flex;gap:var(--space-3);padding:var(--space-3) 0;position:relative}
.tl-entry:not(:last-child)::before{content:"";position:absolute;left:13px;top:30px;bottom:-12px;width:2px;background:var(--border-subtle)}
.tl-dot{flex:0 0 auto;width:28px;height:28px;border-radius:var(--radius-pill);display:grid;place-items:center;border:1px solid var(--border-subtle);background:var(--bg-surface);color:var(--text-secondary);z-index:1}
.tl-dot--ai{background:var(--bg-inset)}
.tl-dot--override{background:var(--brand-subtle);border-color:var(--brand-muted);color:var(--brand-primary)}
.tl-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:var(--space-1)}
.tl-headline{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
.tl-change{font-family:var(--font-mono);font-size:var(--text-sm);font-weight:var(--weight-500);color:var(--text-primary);font-variant-numeric:tabular-nums;display:inline-flex;align-items:center;gap:var(--space-1)}
.tl-meta{font-size:var(--text-xs);color:var(--text-muted);display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
.tl-actor{display:inline-flex;align-items:center;gap:var(--space-1);color:var(--text-secondary);font-weight:var(--weight-medium)}
.tl-reason{font-size:var(--text-sm);color:var(--text-secondary);border-left:2px solid var(--border-subtle);padding-left:var(--space-3);margin-top:2px;font-style:italic}

/* answer-key locked (teacher model answer region) */
.akl{border:1px dashed var(--border-strong);border-radius:var(--radius-lg);background:var(--bg-inset);padding:var(--space-4)}
.akl__head{display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-2)}
.akl__title{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-primary)}
.akl__note{font-size:var(--text-xs);color:var(--text-muted);margin-bottom:var(--space-3);display:flex;align-items:center;gap:var(--space-1)}
.akl__model{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);font-size:var(--text-sm);color:var(--text-secondary);line-height:var(--leading-base)}

/* answer crop thumbs */
.crops{display:flex;gap:var(--space-3);flex-wrap:wrap}
.crop{width:120px;height:84px;border-radius:var(--radius-md);border:1px solid var(--border-subtle);background:var(--bg-surface-sunken);display:grid;place-items:center;color:var(--text-muted);position:relative;overflow:hidden}
.crop__tag{position:absolute;bottom:4px;left:4px;font-family:var(--font-mono);font-size:9px;color:var(--text-muted);background:var(--bg-surface);padding:1px 4px;border-radius:var(--radius-sm)}

/* aside panel rows */
.aprow{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding:var(--space-2) 0}
.aprow+.aprow{border-top:1px solid var(--border-subtle)}
.aprow__lab{font-size:var(--text-xs);color:var(--text-muted);display:flex;align-items:center;gap:var(--space-1)}
.aprow__val{font-family:var(--font-mono);font-size:var(--text-sm);font-weight:var(--weight-500);color:var(--text-primary);font-variant-numeric:tabular-nums}
.relchip{display:inline-flex;align-items:center;gap:var(--space-1);padding:var(--space-1) var(--space-3);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-semibold)}
.relchip--on{background:var(--status-success-subtle);color:var(--status-success)}
.relchip--off{background:var(--bg-inset);color:var(--text-secondary);border:1px solid var(--border-subtle)}
.confroll{display:flex;flex-direction:column;gap:var(--space-2)}
.confroll__row{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--text-secondary)}
.confroll__n{font-family:var(--font-mono);font-weight:var(--weight-500);color:var(--text-primary);margin-left:auto;font-variant-numeric:tabular-nums}
.confdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.confdot--high{background:var(--confidence-high)}
.confdot--med{background:var(--confidence-med)}
.confdot--low{background:var(--confidence-low)}
.costnote{font-size:var(--text-2xs);color:var(--text-muted);display:flex;align-items:center;gap:var(--space-1);margin-top:var(--space-2)}

/* KPI strip (released / student summary) */
.relsum{display:flex;flex-direction:column;gap:var(--space-2);align-items:center;text-align:center;padding:var(--space-6)}
.relsum__title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold)}
.relsum__score{font-family:var(--font-mono);font-size:var(--text-5xl);line-height:1;font-weight:var(--weight-500);font-variant-numeric:tabular-nums;margin:var(--space-2) 0}
.relsum__sub{font-size:var(--text-sm);color:var(--text-secondary)}

/* modal release summary */
.relmodal{display:flex;flex-direction:column;gap:var(--space-4)}
.relmodal__score{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-md)}
.relmodal__scoreval{font-family:var(--font-mono);font-size:var(--text-2xl);font-weight:var(--weight-500);font-variant-numeric:tabular-nums}
.relmodal__warn{font-size:var(--text-sm);color:var(--text-secondary);display:flex;gap:var(--space-2)}
.relmodal__warn svg{flex:0 0 auto;color:var(--status-info);margin-top:2px}

/* toast host */
.toast-host{position:absolute;right:var(--space-6);bottom:var(--space-12);z-index:60;display:flex;flex-direction:column;gap:var(--space-2);max-width:360px;animation:toastin var(--dur-base) var(--ease-entrance)}
@keyframes toastin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* skeleton helpers */
.skblock{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-5) var(--space-6);display:flex;flex-direction:column;gap:var(--space-3)}
.skrow{display:flex;align-items:center;gap:var(--space-3)}

/* prototype variant + state controls */
.protobar{position:absolute;left:var(--space-4);bottom:var(--space-4);z-index:50;display:flex;align-items:center;gap:var(--space-3);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);box-shadow:var(--shadow-e2);padding:var(--space-1) var(--space-2);flex-wrap:wrap;max-width:calc(100% - 2*var(--space-4))}
.protobar__lab{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);padding-left:var(--space-2)}
.seg{display:inline-flex;background:var(--bg-inset);border-radius:var(--radius-pill);padding:2px}
.seg button{font-family:var(--font-ui);font-size:var(--text-xs);font-weight:var(--weight-medium);border:none;background:transparent;color:var(--text-secondary);padding:var(--space-1) var(--space-3);border-radius:var(--radius-pill);cursor:pointer}
.seg button[aria-pressed="true"]{background:var(--brand-primary);color:var(--text-on-accent)}

.u-row{display:flex;align-items:center;gap:var(--space-2)}
.u-tip{font-size:var(--text-2xs);color:var(--text-muted)}
.sr-live{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

@media (prefers-reduced-motion: reduce){
  .toast-host{animation:none!important}
  *{transition:none!important}
}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head><body><div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  const {
    Icon, Button, IconButton, Card, Panel, Accordion, Modal, Tooltip,
    Avatar, Badge, Chip, Stat, EmptyState, Skeleton, Alert, Toast,
    NavItem, Breadcrumb, ContentRenderer, RubricBreakdown, ConfidenceBadge,
    GradePill, ManualOverrideControl, AnswerKeyLock
  } = window.LvlupV0DesignSystem_5d0725;

  /* ---------------- domain constants (real entity/field names) ---------------- */
  const EXAM = { title: "Algebra Midterm", subject: "Mathematics", totalMarks: 100, passingMarks: 40 };
  const STUDENT = { studentName: "Aanya Sharma", rollNumber: "24", className: "Class X-B", initials: "AS" };
  // EvaluationSettings.confidenceConfig
  const CONFIDENCE_THRESHOLD = 0.7;     // < → needs_review
  const AUTO_APPROVE_THRESHOLD = 0.9;   // > → auto-approved
  const TOTAL_Q = 12;

  function confMeta(v){
    if (v < CONFIDENCE_THRESHOLD) return { level:"low",  label:"Review",     route:"needs_review",   icon:"alert-circle" };
    if (v <= AUTO_APPROVE_THRESHOLD) return { level:"med", label:"Spot-check", route:"spot_check",      icon:"search-check" };
    return { level:"high", label:"Auto", route:"auto_approved", icon:"check-circle" };
  }

  // QuestionSubmission[] — evaluation.confidence, gradingStatus, manualOverride, mapping.imageUrls
  const QUESTIONS = [
    { order:1, score:8,  maxMarks:10, confidence:0.94, gradingStatus:"graded",
      prompt:"Solve for x: 3x − 7 = 2x + 5",
      rubric:[{label:"Correct isolation of x", desc:"Moves variable terms to one side", score:4, max:4},
              {label:"Arithmetic accuracy", desc:"No sign or computation errors", score:3, max:4},
              {label:"Final answer stated", desc:"x = 12 clearly boxed", score:1, max:2}],
      strengths:["Clean step-by-step isolation","Correct final value x = 12"],
      weaknesses:["Skipped writing the verification step"],
      feedback:"Solid algebraic manipulation. Show the substitution check to earn the final 2 marks next time.",
      modelAnswer:"3x − 7 = 2x + 5  ⇒  x = 12. Verify: 3(12)−7 = 29 = 2(12)+5 ✓" },
    { order:2, score:5,  maxMarks:10, confidence:0.58, gradingStatus:"needs_review",
      prompt:"Factorise: x² + 7x + 12",
      rubric:[{label:"Correct factor pair", desc:"Finds 3 and 4", score:3, max:5},
              {label:"Final factored form", desc:"(x+3)(x+4)", score:2, max:5}],
      strengths:["Identified the constant product 12"],
      weaknesses:["One factor sign was inverted","Did not expand to verify"],
      feedback:"The factor pair is close but the written form has a sign issue — re-check (x+3)(x+4).",
      modelAnswer:"x² + 7x + 12 = (x + 3)(x + 4)" },
    { order:3, score:10, maxMarks:10, confidence:0.88, gradingStatus:"graded", overridden:true,
      prompt:"A train travels 240 km in 3 h. Find average speed.",
      rubric:[{label:"Formula applied", desc:"speed = distance / time", score:4, max:4},
              {label:"Units & answer", desc:"80 km/h with units", score:6, max:6}],
      strengths:["Correct formula and units","Clean working shown"],
      weaknesses:[],
      feedback:"Fully correct. AI initially under-scored the units mark; restored on review.",
      modelAnswer:"speed = 240 / 3 = 80 km/h",
      override:{ originalScore:7, score:10, reason:"AI penalised correct units; full marks restored after re-read.",
                 overriddenBy:"Priya Rao", overriddenAt:"Today · 14:01" } }
  ];

  const SUMMARY = { totalScore:78, maxScore:100, percentage:78, questionsGraded:12, completedAt:"Today · 14:03" };
  const COST = { costUsd:"0.014", inputTok:"3.1k", outputTok:"1.1k" };

  function gradeFromPct(p){ return p>=90?"A":p>=80?"B":p>=65?"C":p>=50?"D":"F"; }

  /* ---------------- AppShell chrome ---------------- */
  function Shell({ children }){
    return (
      <div className="appshell">
        <aside className="appshell__sidebar">
          <div className="sidebar__brand">
            <span className="sidebar__brand-mark">L</span>
            <span className="sidebar__brand-name">Lyceum</span>
          </div>
          <nav className="sidebar__nav">
            <div className="sidebar__section-label">Teach</div>
            <NavItem icon="layout-dashboard">Dashboard</NavItem>
            <NavItem icon="users">Classes</NavItem>
            <NavItem icon="book-open">Spaces</NavItem>
            <NavItem icon="file-check-2" active badge="3">Exams</NavItem>
            <NavItem icon="bar-chart-3">Analytics</NavItem>
            <div className="sidebar__section-label">Manage</div>
            <NavItem icon="user-cog">Students</NavItem>
            <NavItem icon="settings">Settings</NavItem>
          </nav>
        </aside>
        <header className="appshell__topbar">
          <span className="tenantchip">Subhang Academy <span className="mono">SUB001</span></span>
          <div className="topbar__search-box">
            <Icon name="search" size={16} />
            <input placeholder="Jump to submission by roll or name…  ⌘K" aria-label="Search" />
          </div>
          <div className="topbar__spacer" />
          <div className="topbar__icons">
            <IconButton icon={<Icon name="bell" size={18} />} label="Notifications" />
            <IconButton icon={<Icon name="life-buoy" size={18} />} label="Help" />
            <Avatar initials="PR" />
          </div>
        </header>
        <main className="appshell__main">{children}</main>
      </div>
    );
  }

  /* ---------------- ResultSummary header ---------------- */
  function ResultSummary({ student, summary, graded, sanitized }){
    const grade = gradeFromPct(summary.percentage);
    const pass = summary.totalScore >= EXAM.passingMarks;
    return (
      <div className="rsum" role="region" aria-label="Result summary">
        <div className="rsum__hero">
          <div className="rsum__nums">
            <span className="rsum__score">{summary.totalScore}</span>
            <span className="rsum__of">/ {summary.maxScore}</span>
          </div>
          <div className="rsum__cap">{sanitized ? "Your score" : "Total score"}</div>
        </div>
        <div className="rsum__div" />
        <div className="rsum__pct">
          <span className="rsum__pctnum">{summary.percentage}%</span>
          <span className="rsum__cap">Percentage</span>
        </div>
        <div className="rsum__div" />
        <div className="rsum__gradecell">
          <GradePill grade={grade} />
          <span className={"passchip " + (pass ? "passchip--pass" : "passchip--fail")}>
            <Icon name={pass ? "check" : "x"} size={12} />
            {pass ? "PASS" : `BELOW PASS (${EXAM.passingMarks})`}
          </span>
        </div>
        {!sanitized && (
          <div className="rsum__meta">
            <div className="rsum__metaline"><Icon name="list-checks" size={13} /><span className="mono">{graded}/{TOTAL_Q}</span> graded</div>
            <div className="rsum__metaline"><Icon name="clock" size={13} /> Completed {summary.completedAt}</div>
          </div>
        )}
      </div>
    );
  }

  /* ---------------- per-question accordion trigger label ---------------- */
  function QTitle({ q, sanitized }){
    const cm = confMeta(q.confidence);
    return (
      <div className="qrow">
        <span className="qrow__id">Q{q.order}</span>
        <span className="qrow__score">{q.score}/{q.maxMarks}</span>
        <span className="qrow__prompt">{q.prompt}</span>
        <span className="qrow__badges">
          {!sanitized && (
            <ConfidenceBadge level={cm.level} value={cm.label} />
          )}
          {!sanitized && q.overridden && (
            <span className="overridechip"><Icon name="edit-3" size={11} /> Overridden</span>
          )}
          {!sanitized && q.gradingStatus === "needs_review" && (
            <span className="overridechip" style={{background:"var(--status-error-subtle)",color:"var(--status-error)"}}>
              <Icon name="flag" size={11} /> Needs review
            </span>
          )}
        </span>
      </div>
    );
  }

  /* ---------------- OverrideTimeline (read-only) ---------------- */
  function OverrideTimeline({ ov, maxMarks }){
    return (
      <div>
        <div className="seclab"><Icon name="history" size={13} /> Override audit · non-destructive</div>
        <ManualOverrideControl label="Manual override applied (read-only here — edit in grading review)" />
        <ol className="tl-wrap" style={{marginTop:"var(--space-3)"}} aria-label="Override audit timeline">
          <li className="tl-entry">
            <span className="tl-dot tl-dot--ai" aria-hidden="true"><Icon name="cpu" size={14} /></span>
            <div className="tl-body">
              <div className="tl-headline">
                <span className="tl-change"><span className="mono">{ov.originalScore}</span> / {maxMarks}</span>
                <Badge variant="info" icon={<Icon name="sparkles" size={11} />}>AI score</Badge>
              </div>
              <div className="tl-meta">Original AI evaluation · preserved</div>
            </div>
          </li>
          <li className="tl-entry">
            <span className="tl-dot tl-dot--override" aria-hidden="true"><Icon name="edit-3" size={14} /></span>
            <div className="tl-body">
              <div className="tl-headline">
                <span className="tl-change"><span className="mono">{ov.originalScore}</span><Icon name="arrow-right" size={13} /><span className="mono">{ov.score}</span> / {maxMarks}</span>
                <Badge variant="brand">Override</Badge>
              </div>
              <div className="tl-meta">
                <span className="tl-actor"><Icon name="user" size={12} /> {ov.overriddenBy}</span>
                <span>·</span><span>{ov.overriddenAt}</span>
              </div>
              <div className="tl-reason">“{ov.reason}”</div>
            </div>
          </li>
        </ol>
      </div>
    );
  }

  /* ---------------- expanded question body ---------------- */
  function QBody({ q, sanitized }){
    const cm = confMeta(q.confidence);
    return (
      <div className="qexp">
        <div>
          <div className="seclab"><Icon name="file-text" size={13} /> Question</div>
          <ContentRenderer math>{q.prompt}</ContentRenderer>
        </div>

        {/* answer crops — mapping.imageUrls (lazy on expand) */}
        <div>
          <div className="seclab"><Icon name="scan" size={13} /> Answer crop · mapping.imageUrls</div>
          <div className="crops">
            <div className="crop"><Icon name="image" size={20} /><span className="crop__tag">crop_p2_q{q.order}.jpg</span></div>
            <div className="crop"><Icon name="image" size={20} /><span className="crop__tag">crop_p3_q{q.order}.jpg</span></div>
          </div>
        </div>

        {!sanitized ? (
          <div>
            <div className="seclab"><Icon name="list-tree" size={13} /> Rubric breakdown · rubricBreakdown[]</div>
            <RubricBreakdown criteria={q.rubric} />
          </div>
        ) : null}

        <div className="fbgrid">
          <div>
            <div className="seclab"><Icon name="thumbs-up" size={13} /> Strengths</div>
            <ul className="fblist">
              {q.strengths.length ? q.strengths.map((s,i)=>(
                <li key={i} className="fb--strength"><Icon name="check" size={14} /><span>{s}</span></li>
              )) : <li style={{color:"var(--text-muted)"}}>—</li>}
            </ul>
          </div>
          <div>
            <div className="seclab"><Icon name="target" size={13} /> {sanitized ? "Where to improve" : "Weaknesses"}</div>
            <ul className="fblist">
              {q.weaknesses.length ? q.weaknesses.map((s,i)=>(
                <li key={i} className="fb--weak"><Icon name="alert-triangle" size={14} /><span>{s}</span></li>
              )) : <li style={{color:"var(--text-muted)"}}>None — full marks</li>}
            </ul>
          </div>
        </div>

        <div>
          <div className="seclab"><Icon name="message-square" size={13} /> Feedback · structuredFeedback</div>
          <ContentRenderer math className="fbbody"><p>{q.feedback}</p></ContentRenderer>
        </div>

        {/* override audit — teacher only */}
        {!sanitized && q.overridden && <OverrideTimeline ov={q.override} maxMarks={q.maxMarks} />}

        {/* model answer — STAFF ONLY: teacher sees it; student gets AnswerKeyLock */}
        {!sanitized ? (
          <div className="akl">
            <div className="akl__head">
              <Icon name="key-round" size={16} color="var(--text-secondary)" />
              <span className="akl__title">Model answer</span>
              <Tooltip>Staff only — never sent to students</Tooltip>
            </div>
            <div className="akl__note"><Icon name="eye-off" size={12} /> Staff only — not shown to students</div>
            <div className="akl__model">{q.modelAnswer}</div>
          </div>
        ) : (
          <AnswerKeyLock title="Model answers are not shared.">
            Your teacher reviews these against the marking scheme.
          </AnswerKeyLock>
        )}
      </div>
    );
  }

  /* ---------------- aside (teacher) ---------------- */
  function TeacherAside({ released, releaseInfo }){
    const counts = QUESTIONS.reduce((a,q)=>{ const l=confMeta(q.confidence).level; a[l]++; return a; }, {high:0,med:0,low:0});
    // pad rollup to feel like 12 graded questions
    const roll = { high:9, med:2, low:1 };
    return (
      <React.Fragment>
        <Panel title="Release status">
          <div className="aprow">
            <span className="aprow__lab"><Icon name="send" size={13} /> Visibility</span>
            {released
              ? <span className="relchip relchip--on"><Icon name="check-circle" size={12} /> Released</span>
              : <span className="relchip relchip--off"><Icon name="lock" size={12} /> Not released</span>}
          </div>
          {released ? (
            <React.Fragment>
              <div className="aprow"><span className="aprow__lab">Released</span><span className="aprow__val">{releaseInfo.at}</span></div>
              <div className="aprow"><span className="aprow__lab">By</span><span className="aprow__val" style={{fontFamily:"var(--font-ui)"}}>{releaseInfo.by}</span></div>
            </React.Fragment>
          ) : (
            <div className="u-tip" style={{paddingTop:"var(--space-2)"}}>Students &amp; parents can read this only after release.</div>
          )}
        </Panel>

        <Panel title="Confidence rollup">
          <div className="confroll">
            <div className="confroll__row"><span className="confdot confdot--high" /> High · auto-accepted <span className="confroll__n">{roll.high}</span></div>
            <div className="confroll__row"><span className="confdot confdot--med" /> Spot-check <span className="confroll__n">{roll.med}</span></div>
            <div className="confroll__row"><span className="confdot confdot--low" /> Review required <span className="confroll__n">{roll.low}</span></div>
          </div>
          <div className="costnote"><Icon name="eye-off" size={11} /> Confidence is staff-only — never shown to students.</div>
        </Panel>

        <Panel title="AI cost">
          <div className="aprow">
            <span className="aprow__lab"><Icon name="dollar-sign" size={13} /> Spend</span>
            <span className="aprow__val">${COST.costUsd}</span>
          </div>
          <div className="aprow">
            <span className="aprow__lab">Tokens</span>
            <span className="aprow__val">{COST.inputTok} in · {COST.outputTok} out</span>
          </div>
          <div className="costnote"><Icon name="shield" size={11} /> Visible to staff only.</div>
        </Panel>
      </React.Fragment>
    );
  }

  /* ---------------- aside (student/parent sanitized) ---------------- */
  function StudentAside(){
    return (
      <React.Fragment>
        <Card className="">
          <div className="relsum">
            <div className="relsum__title">Your result</div>
            <GradePill grade={gradeFromPct(SUMMARY.percentage)} />
            <div className="relsum__score">{SUMMARY.totalScore}<span style={{fontSize:"var(--text-xl)",color:"var(--text-muted)"}}>/{SUMMARY.maxScore}</span></div>
            <div className="relsum__sub">{SUMMARY.percentage}% · {SUMMARY.totalScore>=EXAM.passingMarks ? "Passed" : "Below pass"}</div>
          </div>
        </Card>
        <AnswerKeyLock title="Model answers are not shared.">
          You can review your teacher's feedback on each question below.
        </AnswerKeyLock>
      </React.Fragment>
    );
  }

  /* ---------------- loading skeleton ---------------- */
  function LoadingView(){
    return (
      <div className="sd">
        <div className="skblock">
          <div className="skrow"><Skeleton variant="circle" width="44px" height="44px" /><div style={{flex:1}}><Skeleton width="180px" height="20px" /><Skeleton width="120px" height="12px" style={{marginTop:8}} /></div></div>
        </div>
        <div className="sdbody">
          <div className="sdmain">
            <div className="skblock"><Skeleton width="40%" height="40px" /><Skeleton width="60%" height="14px" /></div>
            {[0,1,2,3,4,5].map(i=>(
              <div key={i} className="skblock" style={{padding:"var(--space-4) var(--space-5)"}}><Skeleton width="70%" height="16px" /></div>
            ))}
          </div>
          <div className="sdaside">
            <div className="skblock"><Skeleton width="60%" height="14px" /><Skeleton width="40%" height="14px" /></div>
            <div className="skblock"><Skeleton width="60%" height="14px" /><Skeleton width="50%" height="14px" /></div>
          </div>
        </div>
      </div>
    );
  }

  /* ---------------- main App ---------------- */
  function App(){
    const [variant, setVariant] = useState("teacher");   // teacher | student
    const [state, setState] = useState("populated");      // populated | loading | empty | partial | error
    const [released, setReleased] = useState(false);
    const [releaseInfo, setReleaseInfo] = useState({ at:"Today · 14:08", by:"Priya Rao" });
    const [modal, setModal] = useState(false);
    const [toast, setToast] = useState(null);
    const [openIdx, setOpenIdx] = useState(1); // low-confidence Q2 surfaced + expanded first
    const liveRef = useRef(null);

    const sanitized = variant === "student";
    // student variant only exists once released; force-released in that variant
    const effReleased = sanitized ? true : released;
    const needsReview = QUESTIONS.some(q => q.gradingStatus === "needs_review");

    useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });

    // keyboard: r = release (teacher, when allowed); Esc closes modal
    useEffect(()=>{
      function onKey(e){
        const tag = (e.target.tagName||"").toLowerCase();
        if (tag==="input"||tag==="textarea"||tag==="select") return;
        if (e.key==="Escape" && modal){ setModal(false); }
        if ((e.key==="r"||e.key==="R") && !sanitized && state==="populated" && !needsReview && !released){ setModal(true); }
      }
      window.addEventListener("keydown", onKey);
      return ()=> window.removeEventListener("keydown", onKey);
    }, [modal, sanitized, state, needsReview, released]);

    function doRelease(){
      setReleased(true);                       // optimistic flip
      setReleaseInfo({ at:"Today · 14:08", by:"Priya Rao" });
      setModal(false);
      setToast({ variant:"success", title:"Result released", body:`${STUDENT.studentName}'s result is now visible to students & parents.` });
      if (liveRef.current) liveRef.current.textContent = "Result released to students and parents.";
      setTimeout(()=> setToast(null), 3200);
    }

    const breadcrumb = (
      <Breadcrumb items={[
        { label:"Exams", href:"#" },
        { label:EXAM.title, href:"#" },
        { label:"Submissions", href:"#" },
        { label:STUDENT.studentName }
      ]} />
    );

    /* ------- header ------- */
    const header = (
      <div className="sdhead">
        <div className="sdhead__id">
          <Avatar initials={STUDENT.initials} size="lg" />
          <div>
            <h1 className="sdhead__name">{STUDENT.studentName}</h1>
            <div className="sdhead__sub">
              <span className="mono">Roll {STUDENT.rollNumber}</span>
              <span className="sdhead__dot" />
              <span>{STUDENT.className}</span>
              {!sanitized && <React.Fragment>
                <span className="sdhead__dot" />
                {state==="error"
                  ? <Badge variant="error" icon={<Icon name="x-circle" size={12} />}>Grading failed</Badge>
                  : state==="empty"
                  ? <Badge variant="info" icon={<Icon name="loader" size={12} />}>Grading…</Badge>
                  : (needsReview && state==="partial")
                  ? <Badge variant="warning" icon={<Icon name="flag" size={12} />}>Needs review</Badge>
                  : <Badge variant="success" icon={<Icon name="check-circle" size={12} />}>Reviewed</Badge>}
              </React.Fragment>}
            </div>
          </div>
        </div>
        {!sanitized && (
          <div className="sdhead__actions">
            <Button variant="secondary" leadingIcon={<Icon name="pen-line" size={16} />}>Open grading review</Button>
            {needsReview ? (
              <Tooltip>
                <Button variant="primary" disabled leadingIcon={<Icon name="lock" size={16} />}>Release results</Button>
              </Tooltip>
            ) : released ? (
              <Button variant="secondary" disabled leadingIcon={<Icon name="check-circle" size={16} />}>Released</Button>
            ) : (
              <Button variant="primary" leadingIcon={<Icon name="send" size={16} />} onClick={()=>setModal(true)}>Release results</Button>
            )}
          </div>
        )}
      </div>
    );

    /* ------- main column by state ------- */
    let mainCol;
    if (state==="loading"){
      return <Shell><div className="sr-live" aria-live="polite" ref={liveRef} /><div style={{marginBottom:"var(--space-4)"}}>{breadcrumb}</div><LoadingView /></Shell>;
    }
    if (state==="empty"){
      mainCol = (
        <Card>
          <EmptyState icon="loader" title="Grading in progress"
            body={`We're still grading ${STUDENT.studentName}'s answers. This page updates automatically.`}
            action={<Badge variant="info" dot icon={<Icon name="cpu" size={12} />}>pipelineStatus · grading</Badge>} />
        </Card>
      );
    } else if (state==="error"){
      mainCol = (
        <React.Fragment>
          <Alert variant="error" title="We couldn't load this submission.">
            Grading failed on the evaluation step. Open grading review to retry.
          </Alert>
          <Card>
            <EmptyState icon="alert-octagon" title="Grading failed"
              body="pipelineStatus · grading_failed. The pipeline error has been logged for this submission."
              action={<Button variant="secondary" leadingIcon={<Icon name="pen-line" size={16} />}>Open grading review</Button>} />
          </Card>
        </React.Fragment>
      );
    } else {
      // populated or partial — both render the full result + accordion
      const accItems = QUESTIONS.map((q)=>({
        title: <QTitle q={q} sanitized={sanitized} />,
        content: <QBody q={q} sanitized={sanitized} />
      }));
      mainCol = (
        <React.Fragment>
          {state==="partial" && !sanitized && (
            <Alert variant="warning" title="1 question still needs review">
              1 question still needs a human review before this result can be released. Release is disabled until it is resolved.
            </Alert>
          )}
          <ResultSummary student={STUDENT} summary={SUMMARY} graded={SUMMARY.questionsGraded} sanitized={sanitized} />
          <div>
            <div className="seclab" style={{marginBottom:"var(--space-3)"}}>
              <Icon name="list-checks" size={13} /> Per-question breakdown · <span className="mono">{SUMMARY.questionsGraded}/{TOTAL_Q}</span> graded
            </div>
            <Accordion defaultOpen={openIdx} items={accItems} />
          </div>
        </React.Fragment>
      );
    }

    return (
      <div className="screen">
        <Shell>
          <div className="sr-live" aria-live="polite" ref={liveRef} />
          <div style={{marginBottom:"var(--space-4)"}}>{breadcrumb}</div>
          <div className="sd">
            {header}
            {sanitized && (
              <Alert variant="info" title="What students & parents see">
                Sanitized released view — no model answers, AI confidence, cost, or override internals. Resolved via <span className="mono">AnswerKeyLock</span>, server-authoritative.
              </Alert>
            )}
            <div className="sdbody">
              <div className="sdmain">{mainCol}</div>
              <div className="sdaside">
                {(state==="populated"||state==="partial")
                  ? (sanitized ? <StudentAside /> : <TeacherAside released={effReleased} releaseInfo={releaseInfo} />)
                  : null}
              </div>
            </div>
          </div>
        </Shell>

        {/* Release confirmation modal */}
        <Modal open={modal} onClose={()=>setModal(false)} title="Release results to students & parents?"
          footer={
            <React.Fragment>
              <Button variant="ghost" onClick={()=>setModal(false)}>Cancel</Button>
              <Button variant="primary" leadingIcon={<Icon name="send" size={16} />} onClick={doRelease}>Release now</Button>
            </React.Fragment>
          }>
          <div className="relmodal">
            <div className="relmodal__score">
              <GradePill grade={gradeFromPct(SUMMARY.percentage)} />
              <span className="relmodal__scoreval">{SUMMARY.totalScore}/{SUMMARY.maxScore}</span>
              <span style={{color:"var(--text-secondary)",fontSize:"var(--text-sm)"}}>· {SUMMARY.percentage}% · {STUDENT.studentName}</span>
            </div>
            <div className="relmodal__warn">
              <Icon name="info" size={16} />
              <span>Students and parents will be able to see this result. <strong>resultsReleased</strong> and <strong>resultsReleasedAt/By</strong> are recorded as the audit trail. Model answers and confidence stay staff-only.</span>
            </div>
          </div>
        </Modal>

        {/* Toast host */}
        {toast && <div className="toast-host"><Toast variant={toast.variant} title={toast.title} body={toast.body} /></div>}

        {/* prototype controls */}
        <div className="protobar">
          <span className="protobar__lab">Variant</span>
          <div className="seg" role="group" aria-label="Variant">
            <button aria-pressed={variant==="teacher"} onClick={()=>setVariant("teacher")}>Teacher (full)</button>
            <button aria-pressed={variant==="student"} onClick={()=>{ setVariant("student"); setState("populated"); }}>Student (released)</button>
          </div>
          <span className="protobar__lab">State</span>
          <div className="seg" role="group" aria-label="State">
            {["populated","loading","empty","partial","error"].map(s=>(
              <button key={s} aria-pressed={state===s} disabled={sanitized && s!=="populated"}
                style={sanitized && s!=="populated" ? {opacity:.4,cursor:"not-allowed"} : null}
                onClick={()=> setState(s)}>{s[0].toUpperCase()+s.slice(1)}</button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
