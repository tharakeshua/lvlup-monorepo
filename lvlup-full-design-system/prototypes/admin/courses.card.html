<!-- @dsCard group="Admin" viewport="1280x860" name="Courses" subtitle="Content catalog · spaces · status & class mapping · lifecycle governance" -->
<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
html,body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);}
#root{min-height:100vh;}
.ax-shell{display:grid;grid-template-columns:264px 1fr;min-height:100vh;}
.ax-side{position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-5);background:var(--bg-surface);border-right:1px solid var(--border-subtle);padding:var(--space-5) var(--space-4);}
.ax-brand{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-1) var(--space-2);}
.ax-brand .mk{width:34px;height:34px;border-radius:var(--radius-md);background:var(--brand-primary);color:var(--text-on-accent);display:grid;place-items:center;font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);}
.ax-brand .nm{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-base);line-height:1.1;}
.ax-brand .sc{font-size:var(--text-2xs);color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;}
.ax-navgrp{display:flex;flex-direction:column;gap:2px;}
.ax-navlbl{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);padding:var(--space-2) var(--space-2) var(--space-1);}
.ax-nav{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--text-secondary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;position:relative;transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard);text-decoration:none;}
.ax-nav i{width:18px;height:18px;}
.ax-nav .ct{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.ax-nav:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.ax-nav.on{background:var(--brand-subtle);color:var(--brand-primary);font-weight:var(--weight-semibold);}
.ax-nav.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:58%;border-radius:var(--radius-pill);background:var(--brand-primary);}
.ax-side .foot{margin-top:auto;display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-4);border-top:1px solid var(--border-subtle);}
.ax-rs{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;}
.ax-rs i:last-child{margin-left:auto;}
.ax-uc{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2);border-radius:var(--radius-md);cursor:pointer;}
.ax-uc:hover{background:var(--bg-surface-sunken);}
.ax-uc .av{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.ax-uc .nm{font-size:var(--text-sm);font-weight:var(--weight-medium);line-height:1.1;}
.ax-uc .rl{font-size:var(--text-2xs);color:var(--text-muted);}
.ax-main{display:flex;flex-direction:column;min-width:0;}
.ax-top{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-8);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;top:0;z-index:20;}
.ax-bc{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-muted);}
.ax-bc b{color:var(--text-primary);font-weight:var(--weight-medium);}
.ax-top .sp{flex:1;}
.ax-search{display:flex;align-items:center;gap:var(--space-2);width:280px;max-width:32vw;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-muted);font-size:var(--text-sm);}
.ax-search kbd{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:0 var(--space-1);}
.ax-body{flex:1;overflow-y:auto;padding:var(--space-8);display:flex;flex-direction:column;gap:var(--space-6);width:100%;max-width:1264px;}
.ax-head{display:flex;align-items:flex-start;gap:var(--space-4);flex-wrap:wrap;}
.ax-head .tx{display:flex;flex-direction:column;gap:var(--space-1);}
.ax-h1{font-family:var(--font-display);font-size:var(--text-2xl);line-height:var(--leading-2xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);display:flex;align-items:center;gap:var(--space-3);}
.ax-sub{font-size:var(--text-sm);color:var(--text-secondary);}
.ax-head .ac{margin-left:auto;display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;}
.ax-mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.ax-muted{color:var(--text-muted);}
.ax-sec{color:var(--text-secondary);}
.ax-sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);font-family:var(--font-ui);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;border:1px solid transparent;transition:background var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard);}
.btn i{width:15px;height:15px;}
.btn--primary{background:var(--brand-primary);color:var(--text-on-accent);}
.btn--primary:hover{background:var(--brand-primary-hover);}
.btn--secondary{background:var(--bg-surface);color:var(--text-primary);border-color:var(--border-strong);}
.btn--secondary:hover{background:var(--bg-surface-sunken);}
.btn--ghost{background:transparent;color:var(--text-secondary);}
.btn--ghost:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.btn--danger{background:var(--status-error);color:var(--text-on-accent);}
.btn--danger:hover{filter:brightness(.94);}
.btn--sm{padding:var(--space-1) var(--space-3);font-size:var(--text-xs);}
.btn[disabled]{opacity:.5;cursor:not-allowed;}
.icon-btn{display:inline-grid;place-items:center;width:32px;height:32px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}
.icon-btn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.icon-btn i{width:17px;height:17px;}
/* coverage KPI strip */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4);}
.kpi{display:flex;flex-direction:column;gap:var(--space-2);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-4) var(--space-5);}
.kpi .kh{display:flex;align-items:center;gap:var(--space-2);color:var(--text-muted);font-size:var(--text-xs);font-weight:var(--weight-medium);}
.kpi .kh i{width:15px;height:15px;}
.kpi .kv{font-family:var(--font-mono);font-size:var(--text-2xl);font-weight:var(--weight-medium);font-variant-numeric:tabular-nums;line-height:1.1;}
.kpi .km{font-size:var(--text-xs);color:var(--text-secondary);}
.kpi .km b{font-weight:var(--weight-semibold);color:var(--status-success);}
/* toolbar */
.toolbar{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;}
.tb-search{display:flex;align-items:center;gap:var(--space-2);flex:1;min-width:260px;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);color:var(--text-muted);font-size:var(--text-sm);}
.tb-search i{width:16px;height:16px;}
.tb-search input{flex:1;border:none;outline:none;background:none;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);}
.tb-search:focus-within{border-color:var(--border-focus);box-shadow:var(--ring-focus);}
.tb-sel{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;}
.tb-sel i{width:15px;height:15px;}
.tb-sel.act{border-color:var(--brand-primary);color:var(--brand-primary);background:var(--brand-subtle);}
.seg{display:inline-flex;border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;margin-left:auto;}
.seg button{display:inline-grid;place-items:center;width:36px;height:34px;border:none;background:var(--bg-surface);color:var(--text-muted);cursor:pointer;}
.seg button i{width:16px;height:16px;}
.seg button.on{background:var(--brand-primary);color:var(--text-on-accent);}
.seg button:not(.on):hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
/* filter chips */
.fchips{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;}
.fchip{display:inline-flex;align-items:center;gap:var(--space-2);padding:2px var(--space-2) 2px var(--space-3);border-radius:var(--radius-pill);font-size:var(--text-2xs);background:var(--brand-subtle);color:var(--brand-primary);border:1px solid transparent;}
.fchip button{border:none;background:none;color:inherit;cursor:pointer;display:grid;place-items:center;padding:0;}
.fchip button i{width:12px;height:12px;}
/* table */
.tbl-wrap{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;}
table.tbl{width:100%;border-collapse:collapse;font-size:var(--text-sm);}
table.tbl th{text-align:left;padding:var(--space-3) var(--space-4);font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface-sunken);white-space:nowrap;}
table.tbl th button.sortbtn{display:inline-flex;align-items:center;gap:4px;border:none;background:none;color:inherit;font:inherit;letter-spacing:inherit;text-transform:inherit;cursor:pointer;padding:0;}
table.tbl th button.sortbtn i{width:13px;height:13px;}
table.tbl td{padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border-subtle);color:var(--text-primary);vertical-align:middle;}
table.tbl tr:last-child td{border-bottom:none;}
table.tbl tbody tr{transition:background var(--dur-fast) var(--ease-standard);cursor:pointer;}
table.tbl tbody tr:hover{background:var(--bg-surface-sunken);}
table.tbl tr.sel{background:var(--brand-subtle);}
table.tbl tr.sel:hover{background:var(--brand-subtle);}
table.tbl tr.pending{opacity:.6;}
.cell-course{display:flex;align-items:center;gap:var(--space-3);}
.cc-ic{width:32px;height:32px;border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-secondary);display:grid;place-items:center;flex:none;}
.cc-ic i{width:16px;height:16px;}
.cell-course .nm{font-weight:var(--weight-medium);line-height:1.15;}
.cell-course .ds{font-size:var(--text-2xs);color:var(--text-muted);max-width:30ch;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chk{appearance:none;width:16px;height:16px;border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);cursor:pointer;background:var(--bg-surface);display:inline-grid;place-items:center;}
.chk:checked{background:var(--brand-primary);border-color:var(--brand-primary);}
.chk:checked::after{content:"";width:9px;height:9px;background:var(--text-on-accent);clip-path:polygon(14% 52%,0 65%,40% 100%,100% 18%,86% 7%,38% 73%);}
.chk:focus-visible{box-shadow:var(--ring-focus);outline:none;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-medium);border:1px solid transparent;white-space:nowrap;}
.badge i{width:12px;height:12px;}
.badge.pub{background:var(--status-success-subtle);color:var(--status-success);}
.badge.draft{background:var(--bg-surface-sunken);color:var(--text-secondary);border-color:var(--border-strong);}
.badge.arc{background:var(--bg-surface-sunken);color:var(--text-muted);border-color:var(--border-strong);}
.badge.view{background:var(--status-info-subtle);color:var(--status-info);}
.type-badge{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-sm);font-size:var(--text-2xs);background:var(--bg-surface);border:1px solid var(--border-subtle);color:var(--text-secondary);white-space:nowrap;}
.type-badge i{width:12px;height:12px;}
.subj-badge{display:inline-flex;padding:2px var(--space-2);border-radius:var(--radius-sm);font-size:var(--text-2xs);border:1px solid var(--border-subtle);color:var(--text-secondary);white-space:nowrap;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-sm);font-size:var(--text-2xs);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);color:var(--text-secondary);white-space:nowrap;}
.chip-row{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.chip.na{color:var(--text-muted);font-style:italic;background:none;border-color:transparent;}
.cnt-pill{font-family:var(--font-mono);color:var(--text-secondary);}
/* pagination */
.pag{display:flex;align-items:center;gap:var(--space-3);justify-content:space-between;flex-wrap:wrap;}
.pag .nums{display:flex;align-items:center;gap:var(--space-1);}
.pag .pg{min-width:30px;height:30px;display:grid;place-items:center;border-radius:var(--radius-md);border:1px solid var(--border-subtle);background:var(--bg-surface);font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary);cursor:pointer;}
.pag .pg.on{background:var(--brand-primary);color:var(--text-on-accent);border-color:var(--brand-primary);}
/* panels & alerts */
.panel{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;}
.panel .ph{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-5);border-bottom:1px solid var(--border-subtle);}
.panel .ph .pt{font-size:var(--text-sm);font-weight:var(--weight-semibold);margin-right:auto;}
.panel .pb{padding:var(--space-5);}
.alert{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--border-subtle);font-size:var(--text-sm);background:var(--bg-surface);}
.alert i.lead{width:18px;height:18px;flex:none;margin-top:1px;}
.alert .ab{flex:1;}
.alert .at{font-weight:var(--weight-semibold);}
.alert.warn{border-color:var(--status-warning);background:var(--status-warning-subtle);}
.alert.warn i.lead{color:var(--status-warning);}
.alert.err{border-color:var(--status-error);background:var(--status-error-subtle);}
.alert.err i.lead{color:var(--status-error);}
.alert.info{border-color:var(--status-info);background:var(--status-info-subtle);}
.alert.info i.lead{color:var(--status-info);}
.alert .lnk{color:var(--brand-primary);font-weight:var(--weight-medium);cursor:pointer;white-space:nowrap;}
.sec-label{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);font-weight:var(--weight-semibold);letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);}
.sec-label i{width:14px;height:14px;}
/* bulk bar */
.bulkbar{position:sticky;bottom:var(--space-4);align-self:center;display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3) var(--space-2) var(--space-5);background:var(--bg-surface);border:1px solid var(--border-strong);border-radius:var(--radius-lg);box-shadow:var(--shadow-e3);z-index:10;}
.bulkbar .bn{font-size:var(--text-sm);font-weight:var(--weight-semibold);}
.bulkbar .sepl{width:1px;height:22px;background:var(--border-subtle);}
/* empty / skeleton */
.empty{display:flex;flex-direction:column;align-items:center;gap:var(--space-3);padding:var(--space-12) var(--space-6);text-align:center;}
.empty .ei{width:52px;height:52px;border-radius:var(--radius-lg);background:var(--bg-surface-sunken);display:grid;place-items:center;color:var(--text-muted);}
.empty .ei i{width:24px;height:24px;}
.empty .et{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.empty .eb{font-size:var(--text-sm);color:var(--text-secondary);max-width:42ch;}
.empty .ea{display:flex;gap:var(--space-2);margin-top:var(--space-2);}
.skl{background:var(--bg-surface-sunken);border-radius:var(--radius-sm);animation:shim 1.3s var(--ease-standard) infinite;}
@keyframes shim{0%,100%{opacity:1}50%{opacity:.5}}
/* drawer */
.dw-ov{position:fixed;inset:0;background:var(--ink-900);opacity:.42;z-index:40;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:480px;max-width:94vw;background:var(--bg-surface);border-left:1px solid var(--border-subtle);box-shadow:var(--shadow-e3);z-index:41;display:flex;flex-direction:column;}
.drawer .dh{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-5);border-bottom:1px solid var(--border-subtle);}
.drawer .dh .dt{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);margin-right:auto;line-height:1.2;}
.drawer .db{padding:var(--space-5);overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-5);flex:1;}
.drawer .df{display:flex;align-items:center;gap:var(--space-2);justify-content:flex-end;padding:var(--space-4) var(--space-5);border-top:1px solid var(--border-subtle);background:var(--bg-surface-sunken);}
.deflist{display:grid;grid-template-columns:auto 1fr;gap:var(--space-3) var(--space-5);font-size:var(--text-sm);}
.deflist dt{color:var(--text-muted);}
.deflist dd{color:var(--text-primary);text-align:right;margin:0;}
/* modal */
.overlay{position:fixed;inset:0;background:var(--ink-900);opacity:.42;z-index:40;}
.modal{position:fixed;inset:0;z-index:41;display:grid;place-items:center;padding:var(--space-6);}
.modal .box{width:100%;max-width:520px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-xl);box-shadow:var(--shadow-e3);overflow:hidden;max-height:88vh;display:flex;flex-direction:column;}
.modal .mh{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-5) var(--space-5) var(--space-4);border-bottom:1px solid var(--border-subtle);}
.modal .mh .mt{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);margin-right:auto;}
.modal .mh .ms{font-size:var(--text-sm);color:var(--text-secondary);margin-top:2px;}
.modal .mb{padding:var(--space-5);overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-4);}
.modal .mf{display:flex;align-items:center;gap:var(--space-2);justify-content:flex-end;padding:var(--space-4) var(--space-5);border-top:1px solid var(--border-subtle);background:var(--bg-surface-sunken);}
.field{display:flex;flex-direction:column;gap:var(--space-2);}
.field .fl{font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--text-secondary);}
.field .fl .req{color:var(--status-error);}
.field input,.field select,.field textarea{padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--border-focus);box-shadow:var(--ring-focus);}
.field .fh{font-size:var(--text-2xs);color:var(--text-muted);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);}
.menu{position:absolute;right:0;top:calc(100% + 4px);z-index:30;min-width:200px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);box-shadow:var(--shadow-e2);padding:var(--space-1);display:flex;flex-direction:column;}
.menu button{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border:none;background:none;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);text-align:left;border-radius:var(--radius-sm);cursor:pointer;}
.menu button:hover{background:var(--bg-surface-sunken);}
.menu button[disabled]{opacity:.45;cursor:not-allowed;}
.menu button.danger{color:var(--status-error);}
.menu button i{width:15px;height:15px;}
.menu .div{height:1px;background:var(--border-subtle);margin:var(--space-1) 0;}
.menu .mhint{font-size:var(--text-2xs);color:var(--text-muted);padding:var(--space-1) var(--space-3) var(--space-2);}
.relpos{position:relative;}
/* toast */

const L = window.LvlupV0DesignSystem_5d0725 || {};
const Button = ({children,leadingIcon,variant,size,disabled,onClick})=>

/* ---- Reusable admin shell (tokens-only frame; tenant surface) ---- */

          <Nav icon="bar-chart-3" label="Analytics" route="/analytics" active={active}/>

          <Nav icon="download" label="Data Export" route="/data-export" active={active}/>
          <Nav icon="settings" label="Settings" route="/settings" active={active}/></div>

      <div className="foot">
        <div className="ax-rs"><i data-lucide="building"></i><span>Switch tenant</span><i data-lucide="chevrons-up-down"></i></div>
        <div className="ax-uc"><div className="av">AK</div>
          <div><div className="nm">Anita Kapoor</div><div className="rl">Tenant Admin</div></div></div>

    <div className="ax-main">
      <header className="ax-top">

        <div className="sp"></div>

        <button className="icon-btn" aria-label="Toggle theme"><i data-lucide="sun"></i></button>

/* ---- status badge: icon + label, never color-only ---- */
function StatusBadge({status}){
  if(status==="published") return <span className="badge pub"><i data-lucide="check-circle-2"></i>Published</span>;
  if(status==="archived")  return <span className="badge arc"><i data-lucide="archive"></i>Archived</span>;
  return <span className="badge draft"><i data-lucide="circle-dashed"></i>Draft</span>;
}
const TYPE_ICON={learning:"book-open",practice:"dumbbell",assessment:"file-check",resource:"folder",hybrid:"layers"};
function TypeBadge({type}){
  return <span className="type-badge"><i data-lucide={TYPE_ICON[type]||"file"}></i>{type[0].toUpperCase()+type.slice(1)}</span>;
}

/* ---- sample catalog (server-authoritative stats; render-only) ---- */
const COURSES=[
  {id:"sp1",title:"Algebra I",desc:"Linear equations, inequalities & graphing",type:"learning",subject:"Mathematics",status:"published",classes:["7A","7B"],teachers:2,items:148,updated:"2 days ago",sp:14,students:62,completion:71},
  {id:"sp2",title:"Kinematics",desc:"Motion in one and two dimensions",type:"assessment",subject:"Physics",status:"draft",classes:[],teachers:1,items:36,updated:"5 hours ago",sp:6,students:0,completion:null},
  {id:"sp3",title:"Cell Biology",desc:"Structure & function of the cell",type:"learning",subject:"Biology",status:"published",classes:["8A","8C","8B"],teachers:2,items:122,updated:"1 week ago",sp:11,students:88,completion:64},
  {id:"sp4",title:"Intro to Python",desc:"Variables, loops & functions",type:"hybrid",subject:"Computer Science",status:"published",classes:["9A"],teachers:1,items:96,updated:"3 days ago",sp:9,students:31,completion:58},
  {id:"sp5",title:"Organic Chemistry Drills",desc:"Practice set — nomenclature & reactions",type:"practice",subject:"Chemistry",status:"published",classes:["9B"],teachers:1,items:74,updated:"4 days ago",sp:7,students:27,completion:49},
  {id:"sp6",title:"World History Reader",desc:"Source pack — 1900 to present",type:"resource",subject:"History",status:"archived",classes:[],teachers:1,items:18,updated:"3 weeks ago",sp:3,students:0,completion:null},
  {id:"sp7",title:"Trigonometry",desc:"Ratios, identities & the unit circle",type:"learning",subject:"Mathematics",status:"draft",classes:[],teachers:2,items:54,updated:"yesterday",sp:8,students:0,completion:null},
];
const COVERAGE=[
  {subject:"Mathematics",icon:"sigma",total:12,pub:9},
  {subject:"Physics",icon:"atom",total:8,pub:6},
  {subject:"Computer Science",icon:"code",total:6,pub:6},
  {subject:"Biology",icon:"dna",total:5,pub:4},
];

function RowMenu({status}){
  // server-authoritative ALLOWED_TRANSITIONS pre-disable (client UX only)
  const canPublish = status==="draft";
  const canArchive = status==="published" || status==="draft";
  const canRestore = status==="archived";
  return <div className="menu" role="menu" onClick={e=>e.stopPropagation()}>
    <button role="menuitem"><i data-lucide="panel-right-open"></i>View details</button>
    <button role="menuitem"><i data-lucide="users"></i>Reassign classes</button>
    <div className="div"></div>
    <button role="menuitem" disabled={!canPublish}><i data-lucide="upload-cloud"></i>Publish</button>
    {!canPublish && <div className="mhint">Only draft courses can be published.</div>}
    <div className="div"></div>
    {canRestore
      ? <button role="menuitem"><i data-lucide="undo-2"></i>Restore to draft</button>
      : <button role="menuitem" className="danger" disabled={!canArchive}><i data-lucide="archive"></i>Archive</button>}
  </div>;
}

function CoverageCard({c}){
  return <div className="kpi" role="group" aria-label={c.subject+": "+c.total+" total, "+c.pub+" published"}>
    <div className="kh"><i data-lucide={c.icon}></i><span>{c.subject}</span></div>
    <div className="kv">{c.total}</div>
    <div className="km"><b>{c.pub} published</b> · {c.total-c.pub} draft/archived</div>
  </div>;
}

function Screen(){

  const [view,setView]=React.useState("table");
  const [statusFilter,setStatusFilter]=React.useState("all");
  const [sel,setSel]=React.useState({});
  const [menuId,setMenuId]=React.useState(null);
  const [drawer,setDrawer]=React.useState(null);     // course object
  const [editMap,setEditMap]=React.useState(false);
  const [createOpen,setCreateOpen]=React.useState(false);
  const [confirmArchive,setConfirmArchive]=React.useState(false);
  const [toast,setToast]=React.useState(null);

  const rows = COURSES;
  const toggle=(id)=>setSel(s=>({...s,[id]:!s[id]}));
  const allOn = rows.length>0 && rows.every(r=>sel[r.id]);
  const toggleAll=()=>{ const n={}; if(!allOn) rows.forEach(r=>n[r.id]=true); setSel(n); };
  const selCount=Object.values(sel).filter(Boolean).length;
  const openDrawer=(c)=>{ setDrawer(c); setEditMap(false); };
  const fireToast=(msg)=>{ setToast(msg); };

  return <Shell active="/courses" crumb={["Home","Courses"]}>

    {/* Super-admin tenant-context banner (§5 / §8 tenant isolation) */}
    <div className="alert info" role="status">
      <i data-lucide="shield-alert" className="lead"></i>
      <div className="ab"><span className="at">Viewing as super-admin — tenant: Northwood Academy. </span>
        <span className="ax-sec">Every action here is scoped to this tenant and is audit-logged.</span></div>
      <span className="lnk">Exit tenant →</span>
    </div>

    {/* Page header */}
    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Courses</h1>
        <div className="ax-sub">Audit and govern every learning space in your academy — status, class mapping, and structure.</div></div>
      <div className="ac">
        <Button variant="primary" leadingIcon="plus" onClick={()=>setCreateOpen(true)}>New course</Button>
      </div>
    </div>

    {/* Subject coverage strip — server-authoritative counts (render-only), sorted by count desc */}
    <div className="kpi-grid" role="group" aria-label="Subject coverage">
      {COVERAGE.map(c=><CoverageCard key={c.subject} c={c}/>)}
    </div>

    {/* Toolbar */}
    <div className="toolbar" role="search">
      <label className="tb-search"><i data-lucide="search"></i>
        <input placeholder="Search courses by title, subject, or description" aria-label="Search courses"/></label>
      <button className="tb-sel"><i data-lucide="school"></i>All classes<i data-lucide="chevron-down"></i></button>
      <button className={"tb-sel"+(statusFilter!=="all"?" act":"")} onClick={()=>setStatusFilter(statusFilter==="all"?"published":"all")}>
        <i data-lucide="circle-dot"></i>{statusFilter==="all"?"All statuses":"Published"}<i data-lucide="chevron-down"></i></button>
      <button className="tb-sel"><i data-lucide="shapes"></i>All types<i data-lucide="chevron-down"></i></button>
      <div className="seg" role="group" aria-label="View mode">
        <button className={view==="table"?"on":""} aria-pressed={view==="table"} aria-label="Table view" onClick={()=>setView("table")}><i data-lucide="table-2"></i></button>
        <button className={view==="grouped"?"on":""} aria-pressed={view==="grouped"} aria-label="Grouped view" onClick={()=>setView("grouped")}><i data-lucide="layout-grid"></i></button>
      </div>
    </div>

    {/* Active filter chips (web) */}
    {statusFilter!=="all" &&
      <div className="fchips" aria-live="polite">
        <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Filters:</span>
        <span className="fchip">Status: Published<button aria-label="Remove status filter" onClick={()=>setStatusFilter("all")}><i data-lucide="x"></i></button></span>
      </div>}

    {/* Primary success state — DataTable (sort/filter/select/paginate) */}
    <div className="tbl-wrap">
      <table className="tbl" aria-label="Courses catalog">
        <thead>
          <tr>
            <th style={{width:40}}><input type="checkbox" className="chk" checked={allOn} onChange={toggleAll} aria-label="Select all courses on this page"/></th>
            <th scope="col" aria-sort="none"><button className="sortbtn">Course<i data-lucide="chevrons-up-down"></i></button></th>
            <th scope="col">Status</th>
            <th scope="col">Type</th>
            <th scope="col">Subject</th>
            <th scope="col">Classes</th>
            <th scope="col" aria-sort="none"><button className="sortbtn">Teachers<i data-lucide="chevrons-up-down"></i></button></th>
            <th scope="col" aria-sort="none"><button className="sortbtn">Items<i data-lucide="chevrons-up-down"></i></button></th>
            <th scope="col" aria-sort="descending"><button className="sortbtn">Updated<i data-lucide="chevron-down"></i></button></th>
            <th style={{width:48}}><span className="ax-sr">Actions</span></th>
          </tr>
        </thead>
        <tbody>
          {rows.map(r=>(
            <tr key={r.id} className={sel[r.id]?"sel":""} onClick={()=>openDrawer(r)} tabIndex="0"
                aria-label={r.title+", "+r.status} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();openDrawer(r);}}}>
              <td onClick={e=>e.stopPropagation()}><input type="checkbox" className="chk" checked={!!sel[r.id]} onChange={()=>toggle(r.id)} aria-label={"Select "+r.title}/></td>
              <td><div className="cell-course"><div className="cc-ic"><i data-lucide={TYPE_ICON[r.type]}></i></div>
                <div><div className="nm">{r.title}</div><div className="ds">{r.desc}</div></div></div></td>
              <td><StatusBadge status={r.status}/></td>
              <td><TypeBadge type={r.type}/></td>
              <td><span className="subj-badge">{r.subject}</span></td>

                ? <div className="chip-row">{r.classes.slice(0,2).map(c=><span className="chip" key={c}>{c}</span>)}{r.classes.length>2&&<span className="chip" title={r.classes.join(", ")}>+{r.classes.length-2}</span>}</div>
                : <span className="chip na">Not assigned</span>}</td>
              <td><span className="cnt-pill">{r.teachers}</span></td>
              <td><span className="cnt-pill">{r.items}</span></td>
              <td className="ax-sec">{r.updated}</td>
              <td className="relpos" style={{textAlign:"right"}} onClick={e=>e.stopPropagation()}>
                <button className="icon-btn" aria-label={"Actions for "+r.title} onClick={()=>setMenuId(menuId===r.id?null:r.id)}><i data-lucide="more-horizontal"></i></button>
                {menuId===r.id && <RowMenu status={r.status}/>}
              </td>
            </tr>))}
        </tbody>
      </table>
    </div>

    {/* Pagination */}
    <div className="pag">
      <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Showing <span className="ax-mono">1–7</span> of <span className="ax-mono">36</span> courses</span>
      <div className="nums">
        <button className="pg" aria-label="Previous page"><i data-lucide="chevron-left" style={{width:14,height:14}}></i></button>
        <button className="pg on" aria-current="page">1</button>
        <button className="pg">2</button>
        <button className="pg">3</button>
        <button className="pg" aria-label="Next page"><i data-lucide="chevron-right" style={{width:14,height:14}}></i></button>

      <button className="tb-sel">Rows: 25<i data-lucide="chevron-down"></i></button>

    {/* Floating selection bar — appears when ≥1 row selected; destructive = confirm-then-commit */}

        <Button variant="danger" size="sm" leadingIcon="archive" onClick={()=>setConfirmArchive(true)}>Archive</Button>
        <button className="icon-btn" aria-label="Clear selection" onClick={()=>setSel({})}><i data-lucide="x"></i></button>
      </div>}

    {/* ===== Secondary stacked examples: the spec's other distinctive §5 states ===== */}
    <div className="sec-label" style={{marginTop:"var(--space-4)"}}><i data-lucide="layers-2"></i>Other states (reference)</div>

    {/* Partial — class/teacher name resolution failed (§5 Partial) */}
    <div className="alert info" role="status">
      <i data-lucide="info" className="lead"></i>
      <div className="ab"><span className="at">Some class names couldn't be loaded. </span>
        <span className="ax-sec">Affected cells show the raw class id until resolution retries. Course data is unaffected.</span></div>
      <span className="lnk">Dismiss</span>
    </div>

    {/* Error — read failure (§5 Error; never a misleading empty state) */}
    <div className="alert err" role="alert">
      <i data-lucide="alert-octagon" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load courses. </span>
        <span className="ax-sec">The catalog service timed out. Check your connection, then try again.</span></div>
      <span className="lnk">Retry →</span>
    </div>

    {/* Feature-disabled (§5 / §7) */}
    <div className="alert warn" role="status">
      <i data-lucide="lock" className="lead"></i>
      <div className="ab"><span className="at">Courses aren't enabled for your academy. </span>
        <span className="ax-sec">Contact your platform administrator.</span></div>
    </div>

    {/* Permission-gated — staff read-only (write actions hidden, not just disabled) */}

      <i data-lucide="eye" className="lead"></i>
      <div className="ab"><span className="at">View-only access. </span>
        <span className="ax-sec">New course, lifecycle, and reassign actions are hidden for your role. Teachers author courses in the Teacher Portal.</span></div>
    </div>

    {/* Loading skeleton rows */}
    <div className="tbl-wrap" aria-busy="true" aria-label="Loading courses">
      <table className="tbl"><tbody>
        {[0,1,2].map(i=>(
          <tr key={i}>
            <td style={{width:40}}><div className="skl" style={{width:16,height:16,borderRadius:"var(--radius-sm)"}}></div></td>

            <td><div className="skl" style={{width:72,height:18,borderRadius:"var(--radius-sm)"}}></div></td>
            <td><div className="skl" style={{width:80,height:12}}></div></td>
            <td><div className="skl" style={{width:60,height:12}}></div></td>
            <td><div className="skl" style={{width:24,height:12}}></div></td>
            <td><div className="skl" style={{width:32,height:12}}></div></td>
            <td><div className="skl" style={{width:64,height:12}}></div></td>
            <td></td>
          </tr>))}

    <div className="panel"><div className="empty">
      <div className="ei"><i data-lucide="book-open"></i></div>
      <div className="et">No courses yet</div>
      <div className="eb">Courses are learning spaces your teachers build in the Teacher Portal. Create one here to map it to classes, or ask a teacher to publish theirs.</div>
      <div className="ea">
        <Button variant="primary" leadingIcon="plus">New course</Button>
        <Button variant="ghost" leadingIcon="external-link">Learn how teachers build courses</Button>
      </div>
    </div></div>

    {/* ===== Row-detail Drawer — DefinitionList of structure; admin "Edit mapping" reveals pickers ===== */}
    {drawer && <React.Fragment>
      <div className="dw-ov" onClick={()=>setDrawer(null)}></div>

              <dt>Story points</dt><dd className="ax-mono">{drawer.sp}</dd>
              <dt>Items</dt><dd className="ax-mono">{drawer.items}</dd>
              <dt>Enrolled students</dt><dd className="ax-mono">{drawer.students}</dd>

                </select>

              <div className="field"><label className="fl">Teachers</label>
                <select multiple style={{minHeight:64}} defaultValue={["Arjun Rao"]}>
                  <option>Arjun Rao</option><option>Priya Menon</option><option>Sara Lindqvist</option>
                </select></div>
            </React.Fragment>}
          </div>
          {/* answer keys never shown — surfaced by absence */}
          <div className="alert info" role="note"><i data-lucide="key-round" className="lead"></i>
            <div className="ab"><span className="ax-sec">Question content, rubrics, and answer keys are authored in the Teacher Portal and are never shown here.</span></div></div>
        </div>
        <div className="df">
          <Button variant="ghost" onClick={()=>setDrawer(null)}>Close</Button>
          {editMap && <Button variant="primary" leadingIcon="check" onClick={()=>{setEditMap(false);setDrawer(null);fireToast("Course mapping updated");}}>Save mapping</Button>}
        </div>
      </aside>
    </React.Fragment>}

    {/* ===== Create-course Modal — mirrors the space-create contract (create branch, no id) ===== */}
    {createOpen && <React.Fragment>
      <div className="overlay" onClick={()=>setCreateOpen(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label="New course">
        <div className="box">
          <div className="mh"><div><div className="mt">New course</div>
            <div className="ms">Creates a draft space. Teachers add story points and content from the Teacher Portal.</div></div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setCreateOpen(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="field"><label className="fl">Course title <span className="req">*</span></label><input placeholder="e.g. Algebra I"/></div>
            <div className="field"><label className="fl">Description</label><textarea rows="2" placeholder="One line on what this course covers"></textarea></div>
            <div className="g2">
              <div className="field"><label className="fl">Type</label><select><option>Learning</option><option>Practice</option><option>Assessment</option><option>Resource</option><option>Hybrid</option></select></div>
              <div className="field"><label className="fl">Subject <span className="req">*</span></label><select><option>Mathematics</option><option>Physics</option><option>Biology</option><option>Chemistry</option><option>Computer Science</option><option>History</option></select></div>
            </div>
            <div className="field"><label className="fl">Assign classes</label>
              <select multiple style={{minHeight:72}}>
                <option>7A</option><option>7B</option><option>8A</option><option>8B</option><option>9A</option><option>9B</option>
              </select>
              <div className="fh">Optional. You can map classes now or later. New courses start in Draft.</div></div>
            <div className="alert info" role="note"><i data-lucide="info" className="lead"></i>
              <div className="ab"><span className="ax-sec">Counts and completion are computed by the server once teachers add content — they aren't set here.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setCreateOpen(false)}>Cancel</Button>
            <Button variant="primary" leadingIcon="check" onClick={()=>{setCreateOpen(false);fireToast("Course created");}}>Create course</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

    {/* ===== ConfirmDialog — bulk archive (danger; explicit consequence; audit-logged) ===== */}
    {confirmArchive && <React.Fragment>
      <div className="overlay" onClick={()=>setConfirmArchive(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label="Archive this course">
        <div className="box" style={{maxWidth:440}}>
          <div className="mh"><div><div className="mt">Archive {selCount} course{selCount>1?"s":""}?</div></div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setConfirmArchive(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="alert warn" role="note"><i data-lucide="archive" className="lead"></i>
              <div className="ab"><span className="ax-sec">Selected courses will be hidden from students. Teachers can restore them to draft later. Already-archived courses are skipped. This action is logged.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setConfirmArchive(false)}>Keep course</Button>
            <Button variant="danger" leadingIcon="archive" onClick={()=>{setConfirmArchive(false);setSel({});fireToast(selCount+" archived");}}>Archive</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

    {/* Toast (sonner-style confirm) */}
    {toast && <div className="toast" role="status"><i data-lucide="check-circle-2"></i><span>{toast}</span>
      <button className="icon-btn" aria-label="Dismiss" onClick={()=>setToast(null)}><i data-lucide="x"></i></button></div>}

  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
