        <div className="ax-scopechip"><i data-lucide="globe"></i><span>Platform scope · All tenants</span></div>
        <div className="ax-search"><i data-lucide="search"></i><span>Find user…</span><kbd>⌘K</kbd></div>
        <button className="icon-btn" aria-label="Notifications, 2 unread"><i data-lucide="bell"></i></button>
      </header>
      <main id="main-content" className="ax-body">{children}</main>
    </div>
  </div>;
}

function Avatar({name,email}){
  const s=(name||email||"?").replace(/[^A-Za-z]/g,"");
  const init=(name?name.split(" ").map(w=>w[0]).slice(0,2).join(""):s.slice(0,2)).toUpperCase();
  return <div className="av" aria-hidden="true">{init}</div>;
}

function RowMenu({row,onAction,onClose}){
  const isSelf=row.uid===ME_UID;
  const isOtherSA=row.isSuperAdmin && !isSelf;
  // backend callables not shipped yet → reset/disable/impersonate disabled with tooltip (§4.3 / self-protection §8.4)
  const disableReason = isSelf ? "You cannot disable your own account" : "Backend action coming soon";
  const impReason = isSelf ? "You cannot impersonate yourself" : isOtherSA ? "Cannot impersonate another super admin" : "Backend action coming soon";
  return <div className="menu" role="menu" aria-label={"Actions for "+(row.displayName||row.email)} onClick={e=>e.stopPropagation()}>
    <button className="mi" role="menuitem" onClick={()=>onAction("open",row)}>
      <i data-lucide="log-in"></i>Open in tenant…</button>
    <div className="msep"></div>
    <div className="mlbl">Elevated · audited</div>
    <button className={"mi danger"+(true?" dis":"")} role="menuitem" aria-disabled="true" title={disableReason}>
      <i data-lucide={row.status==="disabled"?"user-check":"user-x"}></i>{row.status==="disabled"?"Re-enable account":"Disable account"}<span className="tip">soon</span></button>
    <button className="mi dis" role="menuitem" aria-disabled="true" title="Backend action coming soon">
      <i data-lucide="key-round"></i>Force password reset<span className="tip">soon</span></button>
    <button className={"mi danger"+((isSelf||isOtherSA)?" dis":"")} role="menuitem"
      aria-disabled={(isSelf||isOtherSA)||undefined}
      title={(isSelf||isOtherSA)?impReason:undefined}
      onClick={()=>{ if(!(isSelf||isOtherSA)) onAction("impersonate",row); }}>
      <i data-lucide="venetian-mask"></i>Impersonate-scope…{(isSelf||isOtherSA)&&<span className="tip">blocked</span>}</button>
  </div>;
}

function MembershipChips({memberships,onPivot}){
  if(!memberships.length) return <div className="chips"><span className="mchip none"><i data-lucide="circle-slash" style={{width:11,height:11}}></i>No active memberships</span></div>;
  return <div className="chips">{memberships.map(m=>
    <a key={m.tenantId} className="mchip" role="link" tabIndex="0"
       aria-label={"Open tenant "+m.tenantCode+" ("+m.role+")"} onClick={()=>onPivot(m)}>
      <span className="role">{m.role} @</span><span className="tc">{m.tenantCode}</span></a>)}</div>;
}

function Row({row,busy,onPivot,onMenuAction}){
  const [open,setOpen]=React.useState(false);
  React.useEffect(()=>{ if(!open) return; const h=()=>setOpen(false); window.addEventListener("click",h); return ()=>window.removeEventListener("click",h); },[open]);
  return <tr className={busy?"dim":undefined}>
    <td>
      <div className="uname"><Avatar name={row.displayName} email={row.email}/>
        <div className="nmw"><span className="pn">
          {row.isSuperAdmin && <span aria-hidden="true" style={{color:"var(--text-secondary)"}}>◆</span>}
          {row.displayName||<span className="ax-muted">—</span>}
          {row.isSuperAdmin && <span className="badge sa"><i data-lucide="shield"></i>Super Admin</span>}
          {row.status==="active"
            ? <span className="badge suc"><i data-lucide="check"></i>Active</span>
            : <span className="badge dis"><i data-lucide="ban"></i>Disabled</span>}
        </span></div></div>
    </td>
    <td><span className="uemail">{row.email}</span></td>
    <td><MembershipChips memberships={row.memberships} onPivot={onPivot}/></td>
    <td><span className="llt" title={row.lastAbs}>{row.last}</span></td>
    <td>
      <div className="rowact">
        <button className="icon-btn" aria-haspopup="menu" aria-expanded={open} aria-label={"Actions for "+(row.displayName||row.email)}
          onClick={e=>{e.stopPropagation();setOpen(o=>!o);}}>
          {busy?<i data-lucide="loader-2" className="spin"></i>:<i data-lucide="more-horizontal"></i>}</button>
        {open && <RowMenu row={row} onAction={(a,r)=>{setOpen(false);onMenuAction(a,r);}} onClose={()=>setOpen(false)}/>}
      </div>
    </td>
  </tr>;
}

function SkeletonRows(){
  return <tbody aria-busy="true">{[0,1,2,3,4].map(i=>
    <tr key={i}>
      <td><div className="uname"><div className="sk circ" style={{width:32,height:32}}></div>
        <div className="nmw"><div className="sk" style={{width:120,height:11}}></div><div className="sk" style={{width:80,height:9}}></div></div></div></td>
      <td><div className="sk" style={{width:160,height:11}}></div></td>
      <td><div className="sk" style={{width:140,height:18,borderRadius:"var(--radius-pill)"}}></div></td>
      <td><div className="sk" style={{width:52,height:11}}></div></td>
      <td><div className="sk circ" style={{width:24,height:24,marginLeft:"auto"}}></div></td>
    </tr>)}</tbody>;
}

/* ---- impersonate-scope modal: required tenant + reason + consent (§6/§7) ---- */
function ImpersonateModal({row,onClose,onConfirm}){
  const [tenant,setTenant]=React.useState(row.memberships[0]?row.memberships[0].tenantId:"");
  const [reason,setReason]=React.useState("");
  const [ack,setAck]=React.useState(false);
  React.useEffect(()=>{ const h=e=>{ if(e.key==="Escape") onClose(); }; window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h); },[onClose]);
  const code=(row.memberships.find(m=>m.tenantId===tenant)||{}).tenantCode||"—";
  const ready=tenant && reason.trim().length>0 && ack;
  return <div className="overlay" role="dialog" aria-modal="true" aria-labelledby="imp-t" onClick={onClose}>
    <div className="dlg" onClick={e=>e.stopPropagation()}>
      <div className="dh"><div className="ic danger"><i data-lucide="venetian-mask"></i></div>
        <div><div className="dt" id="imp-t">Enter a tenant as this user</div>
          <div className="helper" style={{marginTop:4}}>Acting as <b style={{color:"var(--text-primary)"}}>{row.email}</b></div></div></div>
      <div className="db">
        <div className="fld"><label htmlFor="imp-ten">Tenant</label>
          <select id="imp-ten" className="sel" value={tenant} onChange={e=>setTenant(e.target.value)}>
            {row.memberships.map(m=><option key={m.tenantId} value={m.tenantId}>{m.role} @ {m.tenantCode}</option>)}</select></div>
        <div className="fld"><label htmlFor="imp-rsn">Reason <span className="rq">(required)</span></label>
          <textarea id="imp-rsn" className="ta" placeholder="e.g. Investigating login failure — ticket No. 1234"
            value={reason} onChange={e=>setReason(e.target.value)}></textarea></div>
        <label className="gate"><input type="checkbox" checked={ack} onChange={e=>setAck(e.target.checked)}/>
          <span>I understand this session is time-boxed and audited.</span></label>
        <div className="helper">You will act inside <b style={{color:"var(--text-primary)"}}>{code}</b> only. Ends automatically in 30 min.</div>
      </div>
      <div className="df">
        <button className="btn sec" onClick={onClose}>Cancel</button>
        <button className="btn danger" disabled={!ready} onClick={()=>onConfirm(row,code)}>Start scoped session</button>
      </div>
    </div>
  </div>;
}

/* ---- open-in-tenant picker (>1 membership chooses which first, §6) ---- */
function OpenModal({row,onClose,onConfirm}){
  const [tenant,setTenant]=React.useState(row.memberships[0]?row.memberships[0].tenantId:"");
  React.useEffect(()=>{ const h=e=>{ if(e.key==="Escape") onClose(); }; window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h); },[onClose]);
  return <div className="overlay" role="dialog" aria-modal="true" aria-labelledby="opn-t" onClick={onClose}>
    <div className="dlg" onClick={e=>e.stopPropagation()}>
      <div className="dh"><div className="ic info"><i data-lucide="log-in"></i></div>
        <div><div className="dt" id="opn-t">Open which tenant?</div>
          <div className="helper" style={{marginTop:4}}>{row.email} holds {row.memberships.length} active memberships.</div></div></div>
      <div className="db">
        <div className="fld"><label htmlFor="opn-ten">Tenant</label>
          <select id="opn-ten" className="sel" value={tenant} onChange={e=>setTenant(e.target.value)}>
            {row.memberships.map(m=><option key={m.tenantId} value={m.tenantId}>{m.role} @ {m.tenantCode}</option>)}</select></div>
      </div>
      <div className="df">
        <button className="btn sec" onClick={onClose}>Cancel</button>
        <button className="btn sec" style={{borderColor:"var(--brand-primary)",color:"var(--brand-primary)"}} onClick={()=>onConfirm(row,tenant)}>Open tenant detail</button>
      </div>
    </div>
  </div>;
}

const COLS=[
  {k:"name",label:"Name",so:true},
  {k:"email",label:"Email"},
  {k:"mem",label:"Memberships"},
  {k:"last",label:"Last login",so:true},
  {k:"act",label:"",so:false},
];

function Screen(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const [q,setQ]=React.useState("a");          // primary success state seeds a query
  const [foc,setFoc]=React.useState(false);
  const [phase,setPhase]=React.useState("success"); // success | loading | refetch | empty | error
  const [busyUid,setBusyUid]=React.useState(null);
  const [impRow,setImpRow]=React.useState(null);
  const [openRow,setOpenRow]=React.useState(null);
  const [toast,setToast]=React.useState(null);
  const inputRef=React.useRef(null);

  React.useEffect(()=>{ inputRef.current && inputRef.current.focus(); },[]); // autofocus on mount (§3)
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  React.useEffect(()=>{ if(!toast) return; const t=setTimeout(()=>setToast(null),3200); return ()=>clearTimeout(t); },[toast]);

  const rows = q ? ROWS.filter(r=>(r.email||"").toLowerCase().startsWith(q.toLowerCase())||(r.displayName||"").toLowerCase().startsWith(q.toLowerCase())) : [];
  const showRows = phase==="success"||phase==="refetch";

  function pivot(m){ setToast({ok:true,t:"Opening "+m.tenantCode,b:"Navigating to tenant detail (page transition)."}); }
  function menuAction(a,row){
    if(a==="open"){ if(row.memberships.length>1) setOpenRow(row); else if(row.memberships.length===1) pivot(row.memberships[0]); else setToast({ok:false,t:"No tenant to open",b:"This user holds no active memberships."}); }
    if(a==="impersonate"){ setImpRow(row); }
  }

  return <Shell active="/users" crumb={["Platform","Users"]}>
    {/* PAGE HEADER — deliberately sparse: lookup tool, not a CRUD roster (§3) */}
    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Global Users</h1>
        <div className="ax-sub">Search and act on users across every tenant</div></div>
    </div>

    {/* ELEVATED-SCOPE BANNER — persistent on this route; cross-tenant + audited (§8.1) */}
    <div className="alert" role="status">
      <i data-lucide="shield-alert" className="lead"></i>
      <div className="ab"><span className="at">Cross-tenant view. </span>
        <span className="ax-sec">You are operating outside any single tenant — every action here is platform-level and written to the audit log.</span></div>
    </div>

    {/* SEARCH CARD */}
    <div className="card pad">
      <div className={"srch"+(foc?" foc":"")}>
        <i data-lucide="search"></i>
        <input ref={inputRef} type="text" value={q} aria-label="Search users by email or name"
          placeholder="Search by email or name…" autoComplete="off" spellCheck="false"
          onFocus={()=>setFoc(true)} onBlur={()=>setFoc(false)}
          onChange={e=>{ const v=e.target.value; setQ(v); setPhase(v.trim().length<1?"initial":(v==="zzz"?"empty":(v==="err"?"error":"success"))); }}/>
        {phase==="refetch" && <span className="statelbl">updating…</span>}
      </div>
      <div className="hint">Prefix match — searches the start of an email or display name.</div>
    </div>

    {/* RESULTS CARD */}
    <div className="panel" aria-label="User search results">
      {phase==="refetch" && <div className="shim" aria-hidden="true"></div>}
      <table className="utbl">
        <caption className="ax-sr">User search results</caption>
        <thead><tr>{COLS.map(c=>
          <th key={c.k} className={c.so?"so":undefined} scope="col"
              aria-sort={c.k==="name"?"ascending":(c.so?"none":undefined)}>
            {c.label}{c.so&&<i data-lucide={c.k==="name"?"chevron-up":"chevrons-up-down"}></i>}</th>)}</tr></thead>

        {phase==="loading" && <SkeletonRows/>}

        {phase==="initial" &&
          <tbody><tr><td colSpan="5"><div className="empty">
            <i data-lucide="user-circle-2"></i>
            <div className="et">Search the platform</div>
            <div className="eb">Type an email or name to find a user across every tenant.</div>
          </div></td></tr></tbody>}

        {phase==="empty" &&
          <tbody><tr><td colSpan="5"><div className="empty">
            <i data-lucide="search-x"></i>
            <div className="et">No users found</div>
            <div className="eb">Nothing matches “{q}”. Search matches the start of an email or name — try the full email.</div>
          </div></td></tr></tbody>}

        {phase==="error" &&
          <tbody><tr><td colSpan="5" style={{padding:"var(--space-5)"}}>
            <div className="alert err" role="alert">
              <i data-lucide="alert-octagon" className="lead"></i>
              <div className="ab"><span className="at">Couldn’t search users. </span>
                <span className="ax-sec">The lookup service is unavailable. Try again.</span></div>
              <button className="btn sec" onClick={()=>setPhase("success")}><i data-lucide="rotate-ccw"></i>Retry</button>
            </div></td></tr></tbody>}

        {showRows &&
          <tbody>{rows.map(r=>
            <Row key={r.uid} row={r} busy={busyUid===r.uid} onPivot={pivot} onMenuAction={menuAction}/>)}
          </tbody>}
      </table>

      <div className="pf">
        <span aria-live="polite">
          {showRows ? `Showing ${rows.length} result${rows.length===1?"":"s"}` : phase==="loading" ? "Searching…" : "—"}
          {phase==="refetch" && <span className="ax-muted"> (updating…)</span>}
        </span>
        {showRows && <nav className="pgn" aria-label="Pagination">
          <button className="pgbtn" disabled aria-label="Previous page">‹ Prev</button>
          <button className="pgbtn" onClick={()=>setPhase("refetch")}>Load more</button>
        </nav>}
      </div>
    </div>

    {/* ---------- secondary labelled state examples (so each §5 state is present) ---------- */}
    <div style={{marginTop:"var(--space-2)"}}>
      <div className="statelbl" style={{marginBottom:"var(--space-3)"}}>State reference · loading · empty · error</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"var(--space-4)"}}>
        <div className="panel">
          <div className="pf" style={{borderTop:"none",borderBottom:"1px solid var(--border-subtle)"}}><i data-lucide="loader-2" className="spin" style={{width:14,height:14}}></i>Loading (skeleton)</div>
          <table className="utbl"><SkeletonRows/></table>
        </div>
        <div className="panel">
          <div className="pf" style={{borderTop:"none",borderBottom:"1px solid var(--border-subtle)"}}><i data-lucide="search-x" style={{width:14,height:14}}></i>Empty (no matches)</div>
          <div className="empty" style={{padding:"var(--space-8)"}}>
            <i data-lucide="search-x"></i><div className="et">No users found</div>
            <div className="eb">Nothing matches “joanna”. Try the full email.</div></div>
        </div>
      </div>
    </div>

    {/* modals */}
    {impRow && <ImpersonateModal row={impRow} onClose={()=>setImpRow(null)}
      onConfirm={(r,code)=>{ setImpRow(null); setBusyUid(r.uid);
        setTimeout(()=>{ setBusyUid(null); setToast({ok:true,t:"Scoped session started · audit logged",b:"Operating in "+code+" as "+r.email+". Ends in 30 min."}); },700); }}/>}
    {openRow && <OpenModal row={openRow} onClose={()=>setOpenRow(null)}
      onConfirm={(r,tid)=>{ setOpenRow(null); const m=r.memberships.find(x=>x.tenantId===tid); pivot(m); }}/>}

    {/* toast */}
    {toast && <div className={"toast"+(toast.ok?"":" err")} role="status">
      <i data-lucide={toast.ok?"check-circle-2":"alert-triangle"}></i>
      <div><div className="tt">{toast.t}</div><div className="tb">{toast.b}</div></div></div>}
  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
