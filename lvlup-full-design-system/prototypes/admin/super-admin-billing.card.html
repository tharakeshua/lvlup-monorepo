.ax-search{display:flex;align-items:center;gap:var(--space-2);width:280px;max-width:32vw;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-muted);font-size:var(--text-sm);}

.ax-row{display:flex;align-items:center;gap:var(--space-3);}
.ax-col{display:flex;flex-direction:column;gap:var(--space-4);}

.badge.err{background:var(--status-error-subtle);color:var(--status-error);}

.alert{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--border-subtle);background:var(--bg-surface);font-size:var(--text-sm);}

.alert .ab{flex:1;}

.alert.info i.lead{color:var(--status-info);}
.alert.err{border-color:var(--status-error);background:var(--status-error-subtle);}
.alert.err i.lead{color:var(--status-error);}
.alert.warn{border-color:var(--status-warning);background:var(--status-warning-subtle);}

/* timeline */
.timeline{display:flex;flex-direction:column;gap:var(--space-4);}
.tl-row{display:flex;gap:var(--space-3);font-size:var(--text-sm);}
.tl-dot{width:9px;height:9px;border-radius:var(--radius-pill);background:var(--brand-primary);margin-top:5px;flex:none;}

.tbl .ug{display:flex;align-items:center;gap:var(--space-2);justify-content:flex-end;}

.chart .xl{font-size:var(--text-2xs);color:var(--text-muted);}
/* month switcher */
.mswitch{display:inline-flex;align-items:center;gap:var(--space-2);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:var(--space-1) var(--space-2);}
.mswitch .mlbl{display:inline-flex;align-items:center;gap:var(--space-2);padding:0 var(--space-2);font-size:var(--text-sm);font-weight:var(--weight-medium);}

/* buttons / inputs (fallback frame) */
.btn{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);font-family:inherit;font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;border:1px solid transparent;}

.btn[disabled]{opacity:.5;cursor:not-allowed;}
.icon-btn{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:1px solid var(--border-subtle);}
.icon-btn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.icon-btn[disabled]{opacity:.4;cursor:not-allowed;}
.icon-btn i{width:16px;height:16px;}
.lnk{color:var(--brand-primary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;display:inline-flex;align-items:center;gap:var(--space-1);}
.field{display:flex;flex-direction:column;gap:var(--space-2);}
.field label{font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-secondary);}
.field .hint{font-size:var(--text-xs);color:var(--text-muted);}
.inp,.sel{width:100%;box-sizing:border-box;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);color:var(--text-primary);font-family:inherit;font-size:var(--text-sm);}
.inp:focus,.sel:focus{outline:none;border-color:var(--border-focus);box-shadow:var(--ring-focus);}

.sw{display:inline-flex;align-items:center;gap:var(--space-2);cursor:pointer;}

.overlay{position:fixed;inset:0;background:var(--ink-900);opacity:.42;z-index:40;}
.modal{position:fixed;z-index:50;top:50%;left:50%;transform:translate(-50%,-50%);width:640px;max-width:92vw;max-height:88vh;overflow-y:auto;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-xl);box-shadow:var(--shadow-e3);}

.modal .mh{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-5);border-bottom:1px solid var(--border-subtle);}

@media (prefers-reduced-motion: reduce){*{transition-duration:.001ms !important;animation-duration:.001ms !important;}}

<script type="text/babel">
const L = window.LvlupV0DesignSystem_5d0725 || {};
const Button = L.Button || (({children,leadingIcon,trailingIcon,variant,disabled,onClick})=>
  <button className={"btn btn--"+(variant||"primary")} disabled={disabled} onClick={onClick}>
    {leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}{trailingIcon&&<i data-lucide={trailingIcon}></i>}</button>);

  return <a className={"ax-nav"+(active===route?" on":"")} aria-current={active===route?"page":undefined}>
    <i data-lucide={icon}></i><span>{label}</span>{count!=null&&<span className="ct">{count}</span>}</a>;
}

    <aside className="ax-side">
      <div className="ax-brand"><div className="mk">L</div>

        <div className="ax-navgrp"><div className="ax-navlbl">Control</div>
          <Nav icon="flag" label="Feature Flags" route="/feature-flags" active={active}/>
          <Nav icon="sliders-horizontal" label="Evaluation Presets" route="/presets" active={active}/>

}

/* status badge — always icon + label, never color alone */
function StatusBadge({status}){
  const m={active:["suc","check","Active"],trial:["inf","clock","Trial"],suspended:["warn","pause","Suspended"],expired:["err","x","Expired"],deactivated:["mut","slash","Deactivated"]};
  const [c,i,l]=m[status]||m.active;

              <div style={{marginTop:"var(--space-1)"}}><span className="lnk">Retry cost</span></div></div>

      </div>
    </React.Fragment>
    )}

    <EditModal open={edit} onClose={()=>setEdit(false)} onConfirm={()=>{ setEdit(false); setConfirm(true); }}/>
    <ConfirmDowngrade open={confirm} onClose={()=>{ setConfirm(false); setToast(true); }}/>
    <Toast show={toast}/>
  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
