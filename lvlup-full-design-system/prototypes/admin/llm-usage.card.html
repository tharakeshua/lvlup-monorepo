}

/* ---- server-authoritative rollup (render-only sample data) ---- */
const TREND=[["1",18],["2",31],["3",42],["4",27],["5",54],["6",38],["7",61],["8",47],["9",72],["10",55],["11",80],["12",63],["13",91],["14",46]];
const TREND_MAX=Math.max(...TREND.map(d=>d[1]));
const PURPOSE=[["Auto-grading",612.40,48,"219,540"],["Tutoring",321.10,25,"142,880"],["Question extraction",198.70,15,"71,210"],["Insights & at-risk",152.30,12,"48,563"]];
const MODEL=[["claude-opus (grading)",980.20,76,"364,100"],["claude-haiku (tutoring)",214.50,17,"94,820"],["claude-sonnet (extraction)",89.80,7,"23,273"]];
const PUR_MAX=Math.max(...PURPOSE.map(p=>p[1]));
const MOD_MAX=Math.max(...MODEL.map(m=>m[1]));
const TENANTS=[
  ["Acme High School","ACME01","active",41233,612.40,750,82],
  ["Riverside Academy","RIVR07","active",58910,438.95,600,73],
  ["Northwood Academy","NWA0421","active",29104,221.60,300,74],
  ["Summit Prep","SMMT02","trial",9870,84.20,null,null],
  ["Beacon College","BCN0033","active",61420,512.80,500,103],
  ["Cedar Grove School","CDR0099","suspended",4120,33.55,250,13],
];

const StatusBadge=({s})=>{
  if(s==="active") return <span className="badge suc"><i data-lucide="check-circle"></i>Active</span>;
  if(s==="trial") return <span className="badge inf"><i data-lucide="clock"></i>Trial</span>;
  return <span className="badge err"><i data-lucide="ban"></i>Suspended</span>;
};
const fmt$=n=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN=n=>n.toLocaleString("en-US");

const KPI=({icon,label,value,sub,skeleton})=>{
  if(skeleton) return <div className="card kpi"><div className="sk" style={{height:14,width:"56%"}}></div>
    <div className="sk" style={{height:30,width:"72%",marginTop:6}}></div><div className="sk" style={{height:12,width:"44%",marginTop:6}}></div></div>;
  return <div className="card kpi">
    <div className="lh"><i data-lucide={icon}></i><span>{label}</span></div>
    <div className="vv">{value}</div><div className="sub2">{sub}</div></div>;
};

function Screen(){
  const [monthIdx,setMonthIdx]=React.useState(0); // 0 = current month (June 2026)
  const [sortDir,setSortDir]=React.useState("desc");
  const [tenantFilter,setTenantFilter]=React.useState(null);
  const [busy,setBusy]=React.useState(false);
  const [toast,setToast]=React.useState(false);
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });

  const MONTHS=["June 2026","May 2026","April 2026"];
  const monthLabel=MONTHS[monthIdx]||"June 2026";
  const step=(d)=>{ const n=monthIdx+d; if(n<0||n>=MONTHS.length) return;
    setBusy(true); setMonthIdx(n); setTimeout(()=>setBusy(false),520); };
  const doExport=()=>{ setToast(true); setTimeout(()=>setToast(false),3200); };

  let rows=[...TENANTS];
  if(tenantFilter) rows=rows.filter(r=>r[0]===tenantFilter);
  rows.sort((a,b)=> sortDir==="desc"? b[4]-a[4] : a[4]-b[4]);

  return <Shell active="/llm-usage" crumb={["Platform","LLM Usage & Cost"]}>
    {/* PAGE HEADER */}
    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">LLM Usage &amp; Cost</h1>
        <div className="ax-sub">Platform-wide AI spend across all tenants.</div></div>
      <div className="ac">
        <button className="btn sec" onClick={doExport}><i data-lucide="download"></i>Export CSV</button>
      </div>
    </div>

    {/* CONTROL BAR (sticky) */}
    <div className="ctrl" role="toolbar" aria-label="Scope and time">
      <div className="step" role="group" aria-label="Month">
        <button className="ib" onClick={()=>step(1)} disabled={monthIdx>=MONTHS.length-1} aria-label="Previous month"><i data-lucide="chevron-left"></i></button>
        <span className="ml" aria-live="polite">{monthLabel}</span>
        <button className="ib" onClick={()=>step(-1)} disabled={monthIdx<=0} aria-label="Next month" title={monthIdx<=0?"No future data":undefined}><i data-lucide="chevron-right"></i></button>
      </div>
      <button className="sel" onClick={()=>setTenantFilter(tenantFilter?null:"Acme High School")} aria-label="Filter by tenant">
        <i data-lucide="building-2"></i><span>{tenantFilter||"All tenants"}</span><i data-lucide="chevron-down"></i></button>
      <button className="sel" aria-label="Filter by model"><i data-lucide="cpu"></i><span>All models</span><i data-lucide="chevron-down"></i></button>
      {tenantFilter && <div className="chips">
        <span className="chip">Tenant: {tenantFilter}<button onClick={()=>setTenantFilter(null)} aria-label="Remove tenant filter"><i data-lucide="x"></i></button></span>
      </div>}
      <div className="sp" style={{flex:1}}></div>
      <span className="cap"><i data-lucide="moon"></i>Aggregated nightly · last computed 2h ago</span>
    </div>

    {/* KPI ROW — server-authoritative, render-only */}
    <div className="ax-grid ax-g4">
      <KPI icon="dollar-sign" label="Monthly Cost" value="$1,284.50" sub="14 tenants with usage"/>
      <KPI icon="activity" label="Total API Calls" value="482,193" sub="across all tenants"/>
      <KPI icon="arrow-down-to-line" label="Input Tokens" value="91.4M" sub="total input"/>
      <KPI icon="arrow-up-from-line" label="Output Tokens" value="22.7M" sub="total output"/>
    </div>

    {/* TREND + BREAKDOWN */}
    <div className="ax-grid ax-gmain">
      <div className="panel">
        {busy && <div className="lov" aria-busy="true"><span className="lc"><i data-lucide="loader-2"></i>Loading {monthLabel}…</span></div>}
        <div className="ph"><span className="pt">Daily Cost Trend</span><span className="psc ax-mono">{monthLabel}</span></div>
        <div className="pb">
          <div className="chart" role="img" aria-label={"Daily LLM cost for "+monthLabel+". Peak $91 on day 13, low $18 on day 1."}>
            {TREND.map(([d,v])=><div className="col" key={d}>
              <div className="bar" style={{height:(v/TREND_MAX*100)+"%"}} title={"Day "+d+" · $"+v}></div>
              <span className="xl">{d}</span></div>)}
          </div>
          <div className="yax"><span>$0</span><span>$45</span><span>$91</span></div>
          <table className="ax-sr"><caption>Daily LLM cost for {monthLabel}</caption><thead><tr><th>Day</th><th>Cost (USD)</th></tr></thead>
            <tbody>{TREND.map(([d,v])=><tr key={d}><td>{d}</td><td>${v}</td></tr>)}</tbody></table>
        </div>
      </div>
      <div className="ax-col">
        <div className="card">
          <div className="sec-h"><span className="st">Cost by Task Type</span></div>
          <div className="brk">{PURPOSE.map(([l,c,p,calls])=><div className="r" key={l}>
            <div className="rt"><span className="rl">{l}</span><span className="rv">{fmt$(c)} ({p}%) · {calls} calls</span></div>
            <div className="track" role="progressbar" aria-label={l+": "+fmt$(c)+", "+p+" percent"} aria-valuenow={p} aria-valuemin="0" aria-valuemax="100">
              <div className="fill" style={{width:(c/PUR_MAX*100)+"%"}}></div></div></div>)}</div>
        </div>
        <div className="card">
          <div className="sec-h"><span className="st">Cost by Model</span></div>
          <div className="brk">{MODEL.map(([l,c,p,calls])=><div className="r" key={l}>
            <div className="rt"><span className="rl">{l}</span><span className="rv">{fmt$(c)} ({p}%) · {calls} calls</span></div>
            <div className="track" role="progressbar" aria-label={l+": "+fmt$(c)+", "+p+" percent"} aria-valuenow={p} aria-valuemin="0" aria-valuemax="100">
              <div className="fill" style={{width:(c/MOD_MAX*100)+"%"}}></div></div></div>)}</div>
        </div>
      </div>
    </div>

    {/* PER-TENANT TABLE — drill-through, budget bars, status+budget badges */}
    <div className="panel">
      {busy && <div className="lov" aria-busy="true"><span className="lc"><i data-lucide="loader-2"></i>Loading {monthLabel}…</span></div>}
      <div className="ph"><span className="pt">Per-Tenant Usage</span>
        <span className="psc">Sorted by cost, descending · each row is one tenant</span></div>
      <table className="tbl">
        <caption className="ax-sr">LLM usage by tenant for {monthLabel}, sorted by cost descending</caption>
        <thead><tr>
          <th scope="col">Tenant</th>
          <th scope="col">Status</th>
          <th scope="col" className="num">Calls</th>
          <th scope="col" className="num" aria-sort={sortDir==="desc"?"descending":"ascending"}>
            <button onClick={()=>setSortDir(sortDir==="desc"?"asc":"desc")}>Cost<i data-lucide={sortDir==="desc"?"chevron-down":"chevron-up"}></i></button></th>
          <th scope="col" className="num">Budget</th>
          <th scope="col" className="num" style={{minWidth:200}}>Usage</th>
        </tr></thead>
        <tbody>{rows.map(([name,code,status,calls,cost,budget,used])=><tr key={code} tabIndex="0"
          aria-label={"Open "+name+" AI usage detail"} title="Drill through to this tenant's AI usage (audited tenantOverride)">
          <td><div className="tn"><span className="tnn">{name}<i data-lucide="arrow-up-right"></i></span><span className="tnc">{code}</span></div></td>
          <td><StatusBadge s={status}/></td>
          <td className="num">{fmtN(calls)}</td>
          <td className="num">{fmt$(cost)}</td>
          <td className="num">{budget==null? <span className="ax-muted">—</span> : fmt$(budget)}</td>
          <td className="num">
            {used==null
              ? <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>No budget</span>
              : <div className="ubar">
                  <div className="ut"><div className="track">
                    <div className={"fill"+(used>=100?" err":used>=80?" warn":"")} style={{width:Math.min(used,100)+"%"}}></div></div></div>
                  <span className={"up"+(used>=100?" err":used>=80?" warn":"")}>
                    {(used>=80)&&<i data-lucide={used>=100?"alert-octagon":"alert-triangle"}></i>}{used}%</span>
                </div>}
          </td>
        </tr>)}</tbody>
      </table>
      <div className="pf">
        <span>Showing {rows.length} of 14 tenants · budgets are configured on each tenant record, observed here</span>
        <span className="ax-row" style={{gap:"var(--space-1)"}}>
          <button className="btn ghost sm" disabled><i data-lucide="chevron-left"></i>Prev</button>
          <span className="ax-mono ax-muted" style={{fontSize:"var(--text-xs)",padding:"0 var(--space-2)"}}>1 / 3</span>
          <button className="btn ghost sm"><i data-lucide="chevron-right"></i>Next</button>
        </span>
      </div>
    </div>

    {/* ============ SECONDARY STATE EXEMPLARS (spec §5) ============ */}
    <div className="statebar">Other states</div>

    {/* Partial / N+1 fallback warning */}
    <div className="alert warn" role="status">
      <i data-lucide="triangle-alert" className="lead"></i>
      <div className="ab"><span className="at">Showing partial data — 12 of 14 tenants rolled up. </span>
        <span className="ax-sec">The platform cost rollup is the authoritative source; per-tenant client aggregation is a fallback. Unrolled: SMMT02, CDR0099.</span></div>
    </div>

    {/* Error state */}
    <div className="alert err" role="alert">
      <i data-lucide="alert-circle" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load platform LLM usage. </span>
        <span className="ax-sec">getSummary timed out. This view reads a nightly cost rollup — if the problem persists, the aggregation job may not have run.</span></div>
      <button className="btn ghost sm act"><i data-lucide="rotate-cw"></i>Try again</button>
    </div>

    {/* Loading skeleton example */}
    <div className="ax-grid ax-g4">
      <KPI skeleton/><KPI skeleton/><KPI skeleton/><KPI skeleton/>
    </div>
    <div className="panel">
      <div className="ph"><span className="pt">Per-Tenant Usage</span><span className="psc ax-muted">Loading…</span></div>
      <div className="pb ax-col">
        {[0,1,2].map(i=><div key={i} className="ax-row" style={{gap:"var(--space-5)"}}>
          <div className="sk" style={{height:16,width:180}}></div>
          <div className="sk" style={{height:16,width:70}}></div>
          <div className="sk" style={{height:16,width:80,marginLeft:"auto"}}></div>
          <div className="sk" style={{height:16,width:80}}></div>
          <div className="sk" style={{height:16,width:120}}></div></div>)}
      </div>
    </div>

    {/* Empty state (zero-usage month) */}
    <div className="panel"><div className="empty">
      <div className="ec"><i data-lucide="dollar-sign"></i></div>
      <div className="et">No AI usage this month.</div>
      <div className="eb">No tenant recorded any LLM activity for {monthLabel}. Usage appears here once tenants use AI grading, tutoring, or question extraction. Cost data aggregates nightly.</div>
    </div></div>

    {/* RBAC note — this screen has no scoped variant; non-super-admins are blocked at the route */}
    <div className="alert" role="note" style={{background:"var(--bg-surface-sunken)"}}>
      <i data-lucide="shield-check" className="lead" style={{color:"var(--text-muted)"}}></i>
      <div className="ab"><span className="at">Super-admin only. </span>
        <span className="ax-sec">Tenant isolation is the hard boundary — only a super-admin reads cross-tenant cost. Tenant admins are redirected to their own AI Usage &amp; Cost screen. Server authorization (isSuperAdmin claim) is the real gate; this UI guard is UX-only. No prompts, completions, student answers, or answer keys are present in this payload.</span></div>
    </div>

    {toast && <div className="toast" role="status"><i data-lucide="check-circle"></i>
      <span>Exported {monthLabel} LLM usage ({rows.length} tenants).</span></div>}
  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
