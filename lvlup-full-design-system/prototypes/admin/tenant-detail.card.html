<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="utf-8">

<style>
html,body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);}
#root{min-height:100vh;}
.ax-shell{display:grid;grid-template-columns:264px 1fr;min-height:100vh;}
.ax-side{position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-5);background:var(--bg-surface);border-right:1px solid var(--border-subtle);padding:var(--space-5) var(--space-4);}
.ax-brand{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-1) var(--space-2);}
.ax-brand .mk{width:34px;height:34px;border-radius:var(--radius-md);background:var(--brand-primary);color:var(--text-on-accent);display:grid;place-items:center;font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);}
.ax-brand .nm{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-base);line-height:1.1;}
.ax-brand .sc{font-size:var(--text-2xs);color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;}
.ax-navgrp{display:flex;flex-direction:column;gap:2px;}
.ax-navlbl{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);padding:var(--space-2) var(--space-2) var(--space-1);}
.ax-nav{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--text-secondary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;position:relative;transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard);}
.ax-nav i{width:18px;height:18px;}
.ax-nav .ct{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.ax-nav:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.ax-nav.on{background:var(--brand-subtle);color:var(--brand-primary);font-weight:var(--weight-semibold);}
.ax-nav.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:58%;border-radius:var(--radius-pill);background:var(--brand-primary);}
.ax-side .foot{margin-top:auto;display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-4);border-top:1px solid var(--border-subtle);}
.ax-rs{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;}
.ax-rs i:last-child{margin-left:auto;}
.ax-uc{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2);border-radius:var(--radius-md);cursor:pointer;}
.ax-uc:hover{background:var(--bg-surface-sunken);}
.ax-uc .av{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.ax-uc .nm{font-size:var(--text-sm);font-weight:var(--weight-medium);line-height:1.1;}
.ax-uc .rl{font-size:var(--text-2xs);color:var(--text-muted);}
.ax-main{display:flex;flex-direction:column;min-width:0;}
.ax-top{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-8);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;top:0;z-index:20;}
.ax-bc{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-muted);}
.ax-bc b{color:var(--text-primary);font-weight:var(--weight-medium);}
.ax-top .sp{flex:1;}
.ax-search{display:flex;align-items:center;gap:var(--space-2);width:280px;max-width:32vw;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-muted);font-size:var(--text-sm);}
.ax-search kbd{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:0 var(--space-1);}
.ax-scope{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-8);background:var(--ink-900);color:var(--paper-100);font-size:var(--text-xs);}
.ax-scope i{color:var(--spark);width:15px;height:15px;}
.ax-scope .ex{margin-left:auto;display:inline-flex;align-items:center;gap:var(--space-1);color:var(--paper-100);cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
.ax-body{flex:1;overflow-y:auto;padding:var(--space-8);display:flex;flex-direction:column;gap:var(--space-6);width:100%;max-width:1200px;}
.ax-head{display:flex;align-items:flex-start;gap:var(--space-4);flex-wrap:wrap;}
.ax-head .tx{display:flex;flex-direction:column;gap:var(--space-1);}
.ax-h1{font-family:var(--font-display);font-size:var(--text-2xl);line-height:var(--leading-2xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);}
.ax-sub{font-size:var(--text-sm);color:var(--text-secondary);}
.ax-head .ac{margin-left:auto;display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;}
.ax-grid{display:grid;gap:var(--space-4);}
.ax-g2{grid-template-columns:1fr 1fr;}
.ax-g4{grid-template-columns:repeat(4,1fr);}
.ax-row{display:flex;align-items:center;gap:var(--space-3);}
.ax-col{display:flex;flex-direction:column;gap:var(--space-3);}
.ax-wrap{flex-wrap:wrap;}
.ax-mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.ax-muted{color:var(--text-muted);}.ax-sec{color:var(--text-secondary);}
.ax-sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.backlink{display:inline-flex;align-items:center;gap:var(--space-1);font-size:var(--text-sm);color:var(--text-secondary);background:none;border:none;cursor:pointer;padding:0;align-self:flex-start;}
.backlink:hover{color:var(--text-primary);}
.backlink i{width:15px;height:15px;}
.codepill{font-family:var(--font-mono);font-size:var(--text-xs);background:var(--bg-inset);color:var(--text-secondary);padding:2px var(--space-2);border-radius:var(--radius-sm);}
/* KPI */
.kpi{display:flex;flex-direction:column;gap:var(--space-2);}
.kpi .lh{display:flex;align-items:center;gap:var(--space-2);color:var(--text-muted);font-size:var(--text-xs);font-weight:var(--weight-medium);}
.kpi .lh i{width:15px;height:15px;}
.kpi .vv{font-family:var(--font-mono);font-size:var(--text-2xl);font-weight:var(--weight-medium);font-variant-numeric:tabular-nums;line-height:1.1;}
/* cards / panels */
.card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-5);}
.card.danger{border-color:var(--status-error);}
.panel{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;}
.panel .ph{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border-subtle);}
.panel .ph .pt{font-size:var(--text-base);font-weight:var(--weight-semibold);margin-right:auto;}
.panel .pb{padding:var(--space-5);}
.sec-h{display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-4);}
.sec-h .st{font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);margin-right:auto;}
.sec-h i{width:16px;height:16px;color:var(--text-muted);}
/* def list */
.deflist{display:grid;grid-template-columns:auto 1fr;gap:var(--space-3) var(--space-5);font-size:var(--text-sm);}
.deflist dt{color:var(--text-muted);}
.deflist dd{color:var(--text-primary);text-align:right;margin:0;}
/* badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-medium);border:1px solid transparent;}
.badge i{width:12px;height:12px;}
.badge.suc{background:var(--status-success-subtle);color:var(--status-success);}
.badge.inf{background:var(--status-info-subtle);color:var(--status-info);}
.badge.warn{background:var(--status-warning-subtle);color:var(--status-warning);}
.badge.err{background:var(--status-error-subtle);color:var(--status-error);}
.badge.neu{background:var(--bg-surface-sunken);color:var(--text-secondary);border-color:var(--border-subtle);}
/* feature chips */
.fgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-2);}
.fchip{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);border:1px solid var(--border-subtle);font-size:var(--text-sm);background:var(--bg-surface);}
.fchip i{width:15px;height:15px;flex:none;}
.fchip.on i{color:var(--status-success);}
.fchip.on{color:var(--text-primary);}
.fchip.off{color:var(--text-muted);background:var(--bg-surface-sunken);}
.fchip .ff{margin-left:auto;font-size:var(--text-2xs);text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);}
/* export chips (toggle buttons) */
.tchip{display:inline-flex;align-items:center;gap:6px;padding:var(--space-2) var(--space-3);border-radius:var(--radius-pill);font-size:var(--text-sm);background:var(--bg-surface);border:1px solid var(--border-subtle);color:var(--text-secondary);cursor:pointer;}
.tchip i{width:14px;height:14px;}
.tchip.sel{background:var(--brand-subtle);border-color:var(--brand-primary);color:var(--brand-primary);font-weight:var(--weight-medium);}
/* timeline */
.tl{display:flex;flex-direction:column;}
.tl .ti{display:flex;gap:var(--space-3);padding-bottom:var(--space-4);position:relative;}
.tl .ti::before{content:"";position:absolute;left:6px;top:18px;bottom:0;width:1px;background:var(--border-subtle);}
.tl .ti:last-child{padding-bottom:0;}
.tl .ti:last-child::before{display:none;}
.tl .dot{width:13px;height:13px;border-radius:var(--radius-pill);border:2px solid var(--bg-surface);background:var(--text-muted);flex:none;margin-top:3px;z-index:1;}
.tl .dot.err{background:var(--status-error);}
.tl .dot.suc{background:var(--status-success);}
.tl .dot.inf{background:var(--status-info);}
.tl .tc{display:flex;flex-direction:column;gap:2px;}
.tl .ta{font-size:var(--text-sm);font-weight:var(--weight-medium);display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;}
.tl .tm{font-size:var(--text-xs);color:var(--text-muted);}
.tl .tm b{color:var(--text-secondary);font-weight:var(--weight-medium);}
/* alert */
.alert{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--status-error);background:var(--status-error-subtle);font-size:var(--text-sm);}
.alert.inf{border-color:var(--status-info);background:var(--status-info-subtle);}
.alert i.lead{width:18px;height:18px;flex:none;margin-top:1px;}
.alert.err i.lead{color:var(--status-error);}
.alert.inf i.lead{color:var(--status-info);}
.alert .ab{flex:1;}.alert .at{font-weight:var(--weight-semibold);}
.lnk{color:var(--brand-primary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;background:none;border:none;padding:0;text-align:left;}
.icon-btn{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}
.icon-btn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
/* skeleton */
.sk{background:var(--bg-inset);border-radius:var(--radius-sm);}
.sk-row{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) 0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.sk{animation:pulse 1.5s var(--ease-standard) infinite;}
/* dialog */
.ov{position:fixed;inset:0;background:var(--ink-900);opacity:.5;z-index:40;}
.dlg{position:fixed;z-index:41;top:50%;left:50%;transform:translate(-50%,-50%);width:min(520px,92vw);max-height:88vh;overflow-y:auto;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-xl);box-shadow:var(--shadow-e3);}
.dlg .dh{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-5) var(--space-5) var(--space-3);}
.dlg .dh .di{width:34px;height:34px;border-radius:var(--radius-md);display:grid;place-items:center;flex:none;}
.dlg .dh .di.err{background:var(--status-error-subtle);color:var(--status-error);}
.dlg .dh .di.brd{background:var(--brand-subtle);color:var(--brand-primary);}
.dlg .dh i{width:18px;height:18px;}
.dlg .dh .dt{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.dlg .dh .dd{font-size:var(--text-sm);color:var(--text-secondary);margin-top:2px;}
.dlg .db{padding:0 var(--space-5) var(--space-4);display:flex;flex-direction:column;gap:var(--space-4);}
.dlg .df{display:flex;justify-content:flex-end;gap:var(--space-2);padding:var(--space-4) var(--space-5);border-top:1px solid var(--border-subtle);}
.field{display:flex;flex-direction:column;gap:var(--space-1);}
.field label{font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-secondary);}
.field .input,.field .select{width:100%;box-sizing:border-box;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);color:var(--text-primary);font-family:var(--font-ui);font-size:var(--text-sm);}
.field .input:focus,.field .select:focus{outline:none;border-color:var(--border-focus);box-shadow:var(--ring-focus);}
.field .input.mono{font-family:var(--font-mono);}
.hint{font-size:var(--text-xs);color:var(--text-muted);}
.conseq{background:var(--status-error-subtle);border:1px solid var(--status-error);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);font-size:var(--text-sm);color:var(--text-primary);}
.conseq b{font-weight:var(--weight-semibold);}
@media (prefers-reduced-motion: reduce){*{transition-duration:.001ms !important;animation-duration:.001ms !important;}.sk{animation:none;}}
</style>

const L = window.LvlupV0DesignSystem_5d0725 || {};
const Button = L.Button || (({children,leadingIcon,variant,disabled,onClick})=>
  <button className={"btn btn--"+(variant||"primary")} disabled={disabled} onClick={onClick}>
    {leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}</button>);

/* ---- Reusable admin shell (SUPER surface; scope bar = operating inside one tenant) ---- */
function AxShell({active,crumb,scope,children}){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const N = (icon,label,route,count)=> (
    <a className={"ax-nav"+(active===route?" on":"")} aria-current={active===route?"page":undefined} key={route}>
      <i data-lucide={icon}></i><span>{label}</span>{count!=null&&<span className="ct">{count}</span>}
    </a>);
  return (
    <div className="ax-shell">
      <aside className="ax-side">
        <div className="ax-brand"><div className="mk">L</div>
          <div><div className="nm">Auto-LevelUp</div><div className="sc">Platform · Super Admin</div></div></div>
        <nav aria-label="Primary" style={{display:"flex",flexDirection:"column",gap:"var(--space-5)"}}>
          <div className="ax-navgrp"><div className="ax-navlbl">Platform</div>
            {N("layout-dashboard","Overview","/")}{N("building-2","Tenants","/tenants")}
            {N("users","Global Users","/users")}{N("bar-chart-3","Platform Analytics","/analytics")}</div>
          <div className="ax-navgrp"><div className="ax-navlbl">Control</div>
            {N("flag","Feature Flags","/feature-flags")}{N("sliders-horizontal","Evaluation Presets","/presets")}
            {N("cpu","LLM Usage","/llm-usage")}{N("activity","System Health","/system")}{N("credit-card","Billing","/billing")}</div>
          <div className="ax-navgrp"><div className="ax-navlbl">Broadcast</div>{N("megaphone","Announcements","/announcements")}</div>
          <div className="ax-navgrp"><div className="ax-navlbl">Config</div>{N("settings","Settings","/settings")}</div>
        </nav>
        <div className="foot">
          <div className="ax-rs"><i data-lucide="globe"></i><span>All tenants</span><i data-lucide="chevrons-up-down"></i></div>
          <div className="ax-uc"><div className="av">SA</div>
            <div><div className="nm">Sam Avery</div><div className="rl">Super Admin</div></div></div>
        </div>
      </aside>
      <div className="ax-main">
        {scope && <div className="ax-scope"><i data-lucide="user-cog"></i><span>{scope}</span>
          <span className="ex"><i data-lucide="log-out" style={{width:13,height:13,color:"var(--paper-100)"}}></i>Exit tenant</span></div>}
        <header className="ax-top">
          <nav className="ax-bc" aria-label="Breadcrumb">{crumb.map((c,i)=>(
            <React.Fragment key={i}>{i>0&&<i data-lucide="chevron-right" style={{width:14,height:14}}></i>}
              {i===crumb.length-1?<b>{c}</b>:<span>{c}</span>}</React.Fragment>))}</nav>
          <div className="sp"></div>
          <div className="ax-search"><i data-lucide="search"></i><span>Search…</span><kbd>⌘K</kbd></div>
          <button className="icon-btn" aria-label="Notifications, 3 unread"><i data-lucide="bell"></i></button>
        </header>
        <main id="main-content" className="ax-body">{children}</main>
      </div>
    </div>);
}

/* ---- Edit dialog ---- */
function EditDialog({open,onClose,status,onStatus}){
  if(!open) return null;
  return (<>
    <div className="ov" onClick={onClose}></div>
    <div className="dlg" role="dialog" aria-modal="true" aria-labelledby="ed-t">
      <div className="dh"><div className="di brd"><i data-lucide="pencil"></i></div>
        <div><div className="dt" id="ed-t">Edit Tenant</div>
          <div className="dd">Profile and status are privilege-gated and audited server-side.</div></div></div>
      <div className="db">
        <div className="field"><label>Name</label><input className="input" defaultValue={TENANT.name}/></div>
        <div className="ax-grid ax-g2">
          <div className="field"><label>Contact email</label><input className="input" type="email" defaultValue={TENANT.contact.email}/></div>
          <div className="field"><label>Contact phone</label><input className="input" defaultValue={TENANT.contact.phone}/></div>
        </div>
        <div className="ax-grid ax-g2">
          <div className="field"><label>Contact person</label><input className="input" defaultValue={TENANT.contact.person}/></div>
          <div className="field"><label>Website</label><input className="input" type="url" defaultValue={"https://"+TENANT.contact.website}/></div>
        </div>
        <div className="field"><label>Status</label>
          <select className="select" value={status} onChange={e=>onStatus(e.target.value)}>
            <option value="active">Active</option><option value="trial">Trial</option>
            <option value="suspended">Suspended</option><option value="expired">Expired</option>
            <option value="deactivated">Deactivated</option>
          </select>
          <span className="hint">Suspended / Deactivated suspend memberships and are audited.</span>
        </div>
      </div>
      <div className="df"><Button variant="ghost" onClick={onClose}>Cancel</Button>
        <Button variant="primary" onClick={onClose}>Save Changes</Button></div>
    </div></>);
}

/* ---- Subscription dialog ---- */
function SubDialog({open,onClose}){
  if(!open) return null;
  return (<>
    <div className="ov" onClick={onClose}></div>
    <div className="dlg" role="dialog" aria-modal="true" aria-labelledby="sd-t">
      <div className="dh"><div className="di brd"><i data-lucide="credit-card"></i></div>
        <div><div className="dt" id="sd-t">Edit Plan & Limits</div>
          <div className="dd">Limits are the enforced quota source. Empty value means Unlimited.</div></div></div>
      <div className="db">
        <div className="field"><label>Plan</label>
          <select className="select" defaultValue="premium">
            <option value="trial">Trial</option><option value="basic">Basic</option>
            <option value="premium">Premium</option><option value="enterprise">Enterprise</option></select></div>
        <div className="ax-grid ax-g2">
          <div className="field"><label>Max students</label><input className="input mono" defaultValue="200"/></div>
          <div className="field"><label>Max teachers</label><input className="input mono" defaultValue="30"/></div>
          <div className="field"><label>Max spaces</label><input className="input mono" defaultValue="25"/></div>
          <div className="field"><label>Max exams / month</label><input className="input mono" placeholder="Unlimited"/></div>
        </div>
        <div className="field"><label>Expires</label><input className="input mono" type="date" defaultValue="2026-08-31"/></div>
        <span className="hint">Billing cycle, invoicing and Razorpay periods are managed in Billing.</span>
      </div>
      <div className="df"><Button variant="ghost" onClick={onClose}>Cancel</Button>
        <Button variant="primary" onClick={onClose}>Save Subscription</Button></div>
    </div></>);
}

/* ---- Deactivate confirm (type-to-confirm) ---- */
function DeactivateDialog({open,onClose,onConfirm}){
  const [typed,setTyped]=React.useState("");
  React.useEffect(()=>{ if(open) setTyped(""); },[open]);
  if(!open) return null;
  const ok = typed===TENANT.code;
  return (<>
    <div className="ov" onClick={onClose}></div>
    <div className="dlg" role="dialog" aria-modal="true" aria-labelledby="dd-t" aria-describedby="dd-d">
      <div className="dh"><div className="di err"><i data-lucide="triangle-alert"></i></div>
        <div><div className="dt" id="dd-t">Deactivate Tenant?</div></div></div>
      <div className="db">
        <div className="conseq" id="dd-d">This will suspend all user memberships for <b>{TENANT.name}</b> —
          {" "}<b className="ax-mono">{TENANT.stats.students}</b> students and <b className="ax-mono">{TENANT.stats.teachers}</b> teachers.
          Users lose access until the tenant is reactivated. Data is preserved.</div>
        <div className="field"><label htmlFor="confirmcode">Type <span className="ax-mono">{TENANT.code}</span> to confirm</label>
          <input id="confirmcode" className="input mono" autoFocus value={typed}
            onChange={e=>setTyped(e.target.value)} placeholder={TENANT.code} aria-describedby="dd-d"/></div>
      </div>
      <div className="df"><Button variant="ghost" onClick={onClose}>Cancel</Button>
        <Button variant="danger" disabled={!ok} onClick={onConfirm}>I understand — deactivate this tenant</Button></div>
    </div></>);
}

/* ---- Reactivate confirm (lighter) ---- */
function ReactivateDialog({open,onClose,onConfirm}){
  if(!open) return null;
  return (<>
    <div className="ov" onClick={onClose}></div>
    <div className="dlg" role="dialog" aria-modal="true" aria-labelledby="rd-t">
      <div className="dh"><div className="di brd"><i data-lucide="rotate-ccw"></i></div>
        <div><div className="dt" id="rd-t">Reactivate Tenant?</div>
          <div className="dd">Reactivating will restore all suspended memberships for {TENANT.name}.</div></div></div>
      <div className="df"><Button variant="ghost" onClick={onClose}>Cancel</Button>
        <Button variant="primary" onClick={onConfirm}>Reactivate Tenant</Button></div>
    </div></>);
}

function Toast({toast}){
  if(!toast) return null;
  return <div role="status" aria-live="polite" style={{position:"fixed",bottom:"var(--space-6)",left:"50%",transform:"translateX(-50%)",zIndex:50,
    display:"flex",alignItems:"center",gap:"var(--space-3)",padding:"var(--space-3) var(--space-4)",borderRadius:"var(--radius-md)",
    background:"var(--bg-surface)",border:"1px solid var(--border-subtle)",boxShadow:"var(--shadow-e3)",fontSize:"var(--text-sm)",maxWidth:"420px"}}>
    <i data-lucide={toast.icon} style={{width:18,height:18,color:"var("+toast.tone+")"}}></i><span>{toast.msg}</span></div>;
}

function Screen(){
  const [status,setStatus]=React.useState("active");
  const [edit,setEdit]=React.useState(false);
  const [sub,setSub]=React.useState(false);
  const [deact,setDeact]=React.useState(false);
  const [react,setReact]=React.useState(false);
  const [cols,setCols]=React.useState(["students","exams"]);
  const [fmt,setFmt]=React.useState("csv");
  const [exported,setExported]=React.useState(false);
  const [filter,setFilter]=React.useState("all");
  const [toast,setToast]=React.useState(null);
  const deactivated = status==="deactivated";

  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  React.useEffect(()=>{ if(toast){const id=setTimeout(()=>setToast(null),4200); return ()=>clearTimeout(id);} },[toast]);

  const toggleCol=(c)=> setCols(p=> p.includes(c)? p.filter(x=>x!==c): [...p,c]);
  const fire=(t)=>setToast(t);

  const rows = filter==="all"? AUDIT : AUDIT.filter(r=> r.cat[1].toLowerCase()===filter);

  return <AxShell active="/tenants" crumb={["Tenants", TENANT.name]}
      scope={"Operating in "+TENANT.name+" as Super Admin"}>

    <button className="backlink"><i data-lucide="arrow-left"></i>Back to Tenants</button>

    {/* Deactivated banner — only when status flips (aria-live) */}
    {deactivated && <div className="alert err" role="status" aria-live="polite">
      <i data-lucide="ban" className="lead"></i>
      <div className="ab"><span className="at">This tenant is deactivated. </span>
        <span className="ax-sec">All memberships are suspended. Edit and Export remain available; reactivate to restore access.</span></div>
    </div>}

    {/* Header row */}
    <div className="ax-head">
      <div className="tx">
        <div className="ax-row"><h1 className="ax-h1">{TENANT.name}</h1><Badge s={status}/>
          <span className="codepill">{TENANT.code}</span></div>
        <div className="ax-sub">{TENANT.email}</div>
      </div>
      <div className="ac">
        <Button variant="secondary" leadingIcon="pencil" onClick={()=>setEdit(true)}>Edit</Button>
        {deactivated
          ? <Button variant="primary" leadingIcon="rotate-ccw" onClick={()=>setReact(true)}>Reactivate Tenant</Button>
          : <Button variant="danger" leadingIcon="ban" onClick={()=>setDeact(true)}>Deactivate</Button>}
      </div>
    </div>

    {/* KPI strip — server-authoritative counts */}
    <div className="ax-grid ax-g4">
      <KPI icon="graduation-cap" label="Students" value={TENANT.stats.students}/>
      <KPI icon="users" label="Teachers" value={TENANT.stats.teachers}/>
      <KPI icon="file-check" label="Exams" value={TENANT.stats.exams}/>
      <KPI icon="layers" label="Spaces" value={TENANT.stats.spaces}/>
    </div>

    {/* Subscription + Contact */}
    <div className="ax-grid ax-g2">
      <div className="card">
        <div className="sec-h"><i data-lucide="credit-card"></i><span className="st">Subscription</span>
          <button className="lnk" onClick={()=>setSub(true)}>Edit Plan</button></div>
        <dl className="deflist">
          <dt>Plan</dt><dd><span className="badge neu">{TENANT.subscription.plan}</span></dd>
          <dt>Max Students</dt><dd className="ax-mono">{TENANT.subscription.maxStudents}</dd>
          <dt>Max Teachers</dt><dd className="ax-mono">{TENANT.subscription.maxTeachers}</dd>
          <dt>Max Spaces</dt><dd className="ax-mono">{TENANT.subscription.maxSpaces}</dd>
          <dt>Max Exams / Month</dt><dd>{TENANT.subscription.maxExams}</dd>
          <dt>Expires</dt><dd className="ax-mono">{TENANT.subscription.expires}</dd>
        </dl>
      </div>
      <div className="card">
        <div className="sec-h"><i data-lucide="contact"></i><span className="st">Contact Information</span></div>
        <dl className="deflist">
          <dt>Email</dt><dd>{TENANT.contact.email}</dd>
          <dt>Phone</dt><dd className="ax-mono">{TENANT.contact.phone}</dd>
          <dt>Contact Person</dt><dd>{TENANT.contact.person}</dd>
          <dt>Website</dt><dd>{TENANT.contact.website}</dd>
        </dl>
      </div>
    </div>

    {/* Features — icon + label + On/Off, never color-only */}
    <div className="card">
      <div className="sec-h"><i data-lucide="toggle-right"></i><span className="st">Features</span>
        <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Read-only · managed in Feature Flags</span></div>
      <div className="fgrid">
        {TENANT.features.map(([l,on])=> <div className={"fchip "+(on?"on":"off")} key={l}>
          <i data-lucide={on?"check":"minus"}></i><span>{l}</span><span className="ff">{on?"On":"Off"}</span></div>)}
      </div>
    </div>

    {/* Settings — secrets never rendered */}
    <div className="card">
      <div className="sec-h"><i data-lucide="settings-2"></i><span className="st">Settings</span></div>
      <dl className="deflist" style={{gridTemplateColumns:"auto 1fr auto 1fr"}}>
        <dt>Gemini Key Set</dt><dd><span className="badge suc"><i data-lucide="check"></i>Yes</span></dd>
        <dt>Default AI Model</dt><dd className="ax-mono">{TENANT.settings.model}</dd>
        <dt>Timezone</dt><dd className="ax-mono">{TENANT.settings.tz}</dd>
        <dt>Locale</dt><dd className="ax-mono">{TENANT.settings.locale}</dd>
      </dl>
    </div>

    {/* Lifecycle + Export */}
    <div className="ax-grid ax-g2">
      <div className="card danger">
        <div className="sec-h"><i data-lucide="shield-alert" style={{color:"var(--status-error)"}}></i>
          <span className="st">Tenant Lifecycle</span></div>
        <p className="ax-sec" style={{fontSize:"var(--text-sm)",margin:"0 0 var(--space-4)"}}>
          {deactivated
            ? "Reactivating will restore all suspended memberships."
            : "Deactivating will suspend all user memberships. Data is preserved and the tenant can be reactivated later."}</p>
        {deactivated
          ? <Button variant="primary" leadingIcon="rotate-ccw" onClick={()=>setReact(true)}>Reactivate Tenant</Button>
          : <Button variant="danger" leadingIcon="ban" onClick={()=>setDeact(true)}>Deactivate</Button>}
      </div>
      <div className="card">
        <div className="sec-h"><i data-lucide="download"></i><span className="st">Data Export</span></div>
        <p className="ax-muted" style={{fontSize:"var(--text-xs)",margin:"0 0 var(--space-3)"}}>Select collections and format. Produces a signed link valid for 1 hour.</p>
        <div className="ax-row ax-wrap" style={{marginBottom:"var(--space-4)"}}>
          {EXPORT_COLS.map(c=> <button key={c} className={"tchip"+(cols.includes(c)?" sel":"")}
            aria-pressed={cols.includes(c)} onClick={()=>toggleCol(c)}>
            <i data-lucide={cols.includes(c)?"check":"plus"}></i>{c}</button>)}
        </div>
        <div className="ax-row" style={{gap:"var(--space-3)"}}>
          <select className="select" style={{width:"120px"}} value={fmt} onChange={e=>setFmt(e.target.value)}>
            <option value="csv">CSV</option><option value="json">JSON</option></select>
          <Button variant="secondary" leadingIcon="download" disabled={cols.length===0}
            onClick={()=>{setExported(true); fire({icon:"check-circle",tone:"--status-success",msg:"Export ready — 1,284 records"});}}>Export</Button>
        </div>
        {exported && <div className="alert inf" role="status" aria-live="polite" style={{marginTop:"var(--space-4)"}}>
          <i data-lucide="file-down" className="lead"></i>
          <div className="ab"><button className="lnk">Download export (expires in 1 hour)</button>
            <div className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Signed link · {fmt.toUpperCase()} · {cols.length} collections</div></div></div>}
      </div>
    </div>

    {/* Audit Log */}
    <div className="panel">
      <div className="ph"><span className="pt">Audit Log</span>
        <select className="select" style={{width:"170px",padding:"var(--space-2) var(--space-3)",border:"1px solid var(--border-subtle)",borderRadius:"var(--radius-md)",background:"var(--bg-surface)",fontSize:"var(--text-sm)",fontFamily:"var(--font-ui)"}}
          aria-label="Filter audit by action" value={filter} onChange={e=>setFilter(e.target.value)}>
          <option value="all">All Actions</option><option value="update">Tenant Updated</option>
          <option value="lifecycle">Lifecycle</option><option value="billing">Billing</option>
          <option value="user">User</option></select></div>
      <div className="pb">
        {rows.length===0
          ? <div style={{textAlign:"center",padding:"var(--space-8) 0",color:"var(--text-secondary)"}}>
              <i data-lucide="scroll-text" style={{width:28,height:28,color:"var(--text-muted)"}}></i>
              <div style={{fontWeight:"var(--weight-semibold)",marginTop:"var(--space-2)"}}>No audit log entries yet</div>
              <div className="ax-muted" style={{fontSize:"var(--text-sm)"}}>Actions on this tenant will appear here.</div></div>
          : <ol className="tl" style={{listStyle:"none",margin:0,padding:0}}>
              {rows.map((r,i)=> <li className="ti" key={i}>
                <span className={"dot "+r.dot}></span>
                <div className="tc">
                  <div className="ta">{r.act}<span className={"badge "+r.cat[0]} style={{fontSize:"var(--text-2xs)"}}>
                    <i data-lucide="tag"></i>{r.cat[1]}</span></div>
                  <div className="tm">by <b>{r.by}</b> · {r.meta} · {r.t}</div>
                </div></li>)}
            </ol>}
      </div>
      {rows.length>0 && <div style={{padding:"var(--space-3) var(--space-5)",borderTop:"1px solid var(--border-subtle)"}}>
        <Button variant="ghost" leadingIcon="chevron-down">Load more</Button></div>}
    </div>

    {/* Secondary spec states (labelled examples) ---------------------------------- */}
    <div style={{borderTop:"1px dashed var(--border-subtle)",paddingTop:"var(--space-5)"}}>
      <div className="ax-muted" style={{fontFamily:"var(--font-mono)",fontSize:"var(--text-2xs)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"var(--space-3)"}}>
        Other states (§5) — reference renders</div>
      <div className="ax-grid ax-g2">
        {/* Tenant load error */}
        <div className="alert err" role="alert">
          <i data-lucide="circle-alert" className="lead"></i>
          <div className="ab"><span className="at">We couldn't load this tenant. </span>
            <button className="lnk">Try again</button></div>
        </div>
        {/* Not found EmptyState */}
        <div className="card" style={{textAlign:"center"}}>
          <i data-lucide="building-2" style={{width:28,height:28,color:"var(--text-muted)"}}></i>
          <div style={{fontWeight:"var(--weight-semibold)",marginTop:"var(--space-2)"}}>Tenant not found</div>
          <div className="ax-muted" style={{fontSize:"var(--text-sm)",marginBottom:"var(--space-3)"}}>This tenant may have been deleted or the ID is invalid.</div>
          <Button variant="secondary">View All Tenants</Button>
        </div>
      </div>
      {/* Loading skeleton row */}
      <div className="card" style={{marginTop:"var(--space-4)"}}>
        <div className="sk" style={{height:"14px",width:"180px",marginBottom:"var(--space-3)"}}></div>
        {[0,1,2].map(i=> <div className="sk-row" key={i}>
          <div className="sk" style={{width:"13px",height:"13px",borderRadius:"var(--radius-pill)"}}></div>
          <div className="sk" style={{height:"12px",flex:1}}></div>
          <div className="sk" style={{height:"12px",width:"90px"}}></div></div>)}
      </div>
    </div>

    <EditDialog open={edit} onClose={()=>setEdit(false)} status={status}
      onStatus={(v)=>{ setStatus(v==="expired"?"deactivated":v);
        setEdit(false); fire({icon:"check-circle",tone:"--status-success",msg:"Tenant updated"}); }}/>
    <SubDialog open={sub} onClose={()=>{ setSub(false); }}/>
    <DeactivateDialog open={deact} onClose={()=>setDeact(false)}
      onConfirm={()=>{ setStatus("deactivated"); setDeact(false);
        fire({icon:"ban",tone:"--status-error",msg:"Tenant deactivated — 160 memberships suspended"}); }}/>
    <ReactivateDialog open={react} onClose={()=>setReact(false)}
      onConfirm={()=>{ setStatus("active"); setReact(false);
        fire({icon:"check-circle",tone:"--status-success",msg:"Tenant reactivated — 160 memberships restored"}); }}/>
    <Toast toast={toast}/>
  </AxShell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
