<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="utf-8">

<style>
html,body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);}

.ax-brand .nm{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-base);line-height:1.1;}

.ax-navgrp{display:flex;flex-direction:column;gap:2px;}
.ax-navlbl{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);padding:var(--space-2) var(--space-2) var(--space-1);}
.ax-nav{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--text-secondary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;position:relative;transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard);text-decoration:none;}
.ax-nav i{width:18px;height:18px;}
.ax-nav .ct{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.ax-nav:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}

.ax-side .foot{margin-top:auto;display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-4);border-top:1px solid var(--border-subtle);}

.ax-rs i:last-child{margin-left:auto;}
.ax-uc{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2);border-radius:var(--radius-md);cursor:pointer;}
.ax-uc:hover{background:var(--bg-surface-sunken);}
.ax-uc .av{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.ax-uc .nm{font-size:var(--text-sm);font-weight:var(--weight-medium);line-height:1.1;}
.ax-uc .rl{font-size:var(--text-2xs);color:var(--text-muted);}
.ax-main{display:flex;flex-direction:column;min-width:0;}
.ax-top{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-8);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;top:0;z-index:20;}

.ax-top .sp{flex:1;}
.ax-search{display:flex;align-items:center;gap:var(--space-2);width:280px;max-width:32vw;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-muted);font-size:var(--text-sm);}
.ax-search kbd{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:0 var(--space-1);}
.ax-tchip{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);font-size:var(--text-xs);color:var(--text-secondary);background:var(--bg-surface-sunken);}
.ax-tchip i{width:14px;height:14px;}
.ax-tchip .code{font-family:var(--font-mono);color:var(--text-primary);}
.ax-body{flex:1;overflow-y:auto;padding:var(--space-8);display:flex;flex-direction:column;gap:var(--space-6);width:100%;max-width:1024px;margin:0 auto;}
.ax-head{display:flex;align-items:flex-start;gap:var(--space-4);flex-wrap:wrap;}
.ax-head .tx{display:flex;flex-direction:column;gap:var(--space-1);}
.ax-h1{font-family:var(--font-display);font-size:var(--text-2xl);line-height:var(--leading-2xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;}
.ax-sub{font-size:var(--text-sm);color:var(--text-secondary);}
.ax-mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.ax-muted{color:var(--text-muted);}
.ax-sec{color:var(--text-secondary);}
.ax-sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);font-family:var(--font-ui);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;border:1px solid transparent;transition:background var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard);}
.btn i{width:15px;height:15px;}
.btn--primary{background:var(--brand-primary);color:var(--text-on-accent);}
.btn--primary:hover{background:var(--brand-primary-hover);}
.btn--secondary{background:var(--bg-surface);color:var(--text-primary);border-color:var(--border-strong);}
.btn--secondary:hover{background:var(--bg-surface-sunken);}
.btn--ghost{background:transparent;color:var(--text-secondary);}
.btn--ghost:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.btn--danger{background:var(--status-error);color:var(--text-on-accent);}
.btn--danger:hover{filter:brightness(.94);}
.btn--sm{padding:var(--space-1) var(--space-3);font-size:var(--text-xs);}
.btn[disabled]{opacity:.5;cursor:not-allowed;}
.btn.loading{position:relative;color:transparent;pointer-events:none;}
.btn.loading::after{content:"";position:absolute;width:14px;height:14px;border:2px solid var(--text-on-accent);border-top-color:transparent;border-radius:var(--radius-pill);animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.icon-btn{display:inline-grid;place-items:center;width:32px;height:32px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}
.icon-btn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.icon-btn i{width:16px;height:16px;}
/* tabs */
.tabs{display:inline-flex;gap:var(--space-1);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:3px;flex-wrap:wrap;}
.tab{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-sm);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-secondary);cursor:pointer;border:none;background:none;transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard);}
.tab i{width:15px;height:15px;}
.tab.on{background:var(--bg-surface);color:var(--text-primary);font-weight:var(--weight-semibold);box-shadow:var(--shadow-e1);}
/* section / card */
.card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;}
.card .ch{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border-subtle);flex-wrap:wrap;}
.card .ch .ct{display:flex;flex-direction:column;gap:2px;margin-right:auto;}
.card .ch .ctt{font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);}
.card .ch .css{font-size:var(--text-xs);color:var(--text-muted);}
.card .ch .ca{display:flex;align-items:center;gap:var(--space-2);}
.card .cb{padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-4);}
/* form */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);}
.field{display:flex;flex-direction:column;gap:var(--space-2);}
.field .fl{font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--text-secondary);}
.field .fl .req{color:var(--status-error);}
.field input,.field select{padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);}
.field input:focus,.field select:focus{outline:none;border-color:var(--border-focus);box-shadow:var(--ring-focus);}
.field input[readonly]{background:var(--bg-surface-sunken);color:var(--text-secondary);cursor:default;}
.field input:disabled{background:var(--bg-surface-sunken);color:var(--text-muted);}
.field.bad input{border-color:var(--status-error);}
.field .fe{display:flex;align-items:center;gap:4px;font-size:var(--text-2xs);color:var(--status-error);}
.field .fe i{width:12px;height:12px;}
.field .fh{font-size:var(--text-2xs);color:var(--text-muted);}
.ro-row{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);}
.ro-val{font-size:var(--text-sm);color:var(--text-primary);}
.ro-inp{display:flex;align-items:center;gap:var(--space-2);}
.ro-inp input{flex:1;}
/* stat tiles */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-3);}
.stat{display:flex;flex-direction:column;gap:var(--space-1);padding:var(--space-4);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);}
.stat .sl{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-2xs);color:var(--text-muted);font-weight:var(--weight-medium);}
.stat .sl i{width:13px;height:13px;}
.stat .sv{font-family:var(--font-mono);font-size:var(--text-xl);font-weight:var(--weight-medium);font-variant-numeric:tabular-nums;}
/* alerts */
.alert{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--border-subtle);font-size:var(--text-sm);background:var(--bg-surface);}
.alert i.lead{width:18px;height:18px;flex:none;margin-top:1px;}
.alert .ab{flex:1;}
.alert .at{font-weight:var(--weight-semibold);}
.alert.info{border-color:var(--status-info);background:var(--status-info-subtle);}

.alert.warn{border-color:var(--status-warning);background:var(--status-warning-subtle);}
.alert.warn i.lead{color:var(--status-warning);}
.alert.err{border-color:var(--status-error);background:var(--status-error-subtle);}

.alert .lnk{color:var(--brand-primary);font-weight:var(--weight-medium);cursor:pointer;white-space:nowrap;}
/* badges / chips */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-medium);border:1px solid transparent;white-space:nowrap;}
.badge i{width:12px;height:12px;}
.badge.brd{background:var(--brand-subtle);color:var(--brand-primary);}
.badge.suc{background:var(--status-success-subtle);color:var(--status-success);}
.badge.mut{background:var(--bg-surface-sunken);color:var(--text-muted);border-color:var(--border-strong);}
/* filedrop + logo preview */
.brand-2col{display:grid;grid-template-columns:120px 1fr;gap:var(--space-4);align-items:start;}
.logo-tile{width:120px;height:120px;border-radius:var(--radius-lg);border:1px solid var(--border-subtle);background:var(--bg-surface-sunken);display:grid;place-items:center;overflow:hidden;}

.filedrop{display:flex;flex-direction:column;align-items:center;gap:var(--space-2);padding:var(--space-6);border:1.5px dashed var(--border-strong);border-radius:var(--radius-lg);background:var(--bg-surface-sunken);text-align:center;cursor:pointer;transition:border-color var(--dur-fast) var(--ease-standard),background var(--dur-fast) var(--ease-standard);}
.filedrop:hover,.filedrop:focus-visible{border-color:var(--border-focus);outline:none;}
.filedrop i{width:26px;height:26px;color:var(--text-muted);}
.filedrop .ft{font-size:var(--text-sm);font-weight:var(--weight-medium);}
.filedrop .fhi{font-size:var(--text-2xs);color:var(--text-muted);}
.upbar{display:flex;flex-direction:column;gap:var(--space-2);}
.upbar .ut{display:flex;align-items:center;justify-content:space-between;font-size:var(--text-2xs);color:var(--text-secondary);}
.bar-track{height:8px;border-radius:var(--radius-pill);background:var(--bg-inset);overflow:hidden;}
.bar-fill{height:100%;border-radius:var(--radius-pill);background:var(--brand-primary);transition:width var(--dur-base) var(--ease-standard);}
/* swatch picker */
.swatches{display:flex;gap:var(--space-3);flex-wrap:wrap;}
.swatch{display:flex;flex-direction:column;align-items:center;gap:var(--space-2);cursor:pointer;}
.swatch .dot{width:40px;height:40px;border-radius:var(--radius-md);border:2px solid var(--border-subtle);display:grid;place-items:center;color:var(--text-on-accent);transition:border-color var(--dur-fast) var(--ease-standard);}
.swatch .dot i{width:16px;height:16px;opacity:0;}
.swatch.on .dot{border-color:var(--text-primary);}
.swatch.on .dot i{opacity:1;}
.swatch .lbl{font-size:var(--text-2xs);color:var(--text-secondary);}
.sw-indigo{background:var(--brand-primary);}
.sw-spark{background:var(--spark);color:var(--ink-900);}
.sw-auto{background:var(--bg-inset);color:var(--text-secondary);}
.sw-sky{background:var(--sky-500);}
/* preview */
.preview-shell{border:1px solid var(--border-subtle);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg-surface);}
.preview-top{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);color:var(--text-on-accent);}
.preview-top .pl{width:28px;height:28px;border-radius:var(--radius-sm);background:var(--bg-surface);color:var(--text-primary);display:grid;place-items:center;font-family:var(--font-display);font-weight:var(--weight-semibold);}
.preview-top .pn{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-sm);}
.preview-body{padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3);}
.preview-btn{align-self:flex-start;color:var(--text-on-accent);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:var(--weight-medium);}
.preview-prog{height:8px;border-radius:var(--radius-pill);background:var(--bg-inset);overflow:hidden;}
.preview-prog .pf{height:100%;width:64%;border-radius:var(--radius-pill);}
/* switch */
.sw-row{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) 0;border-bottom:1px solid var(--border-subtle);}
.sw-row:last-child{border-bottom:none;}
.sw-row .swt{margin-right:auto;display:flex;flex-direction:column;gap:2px;}
.sw-row .swtt{font-size:var(--text-sm);font-weight:var(--weight-medium);}
.sw-row .swth{font-size:var(--text-2xs);color:var(--text-muted);}
.sw-row .state{font-size:var(--text-2xs);font-weight:var(--weight-semibold);color:var(--text-muted);min-width:24px;text-align:right;}
.toggle{appearance:none;width:38px;height:22px;border-radius:var(--radius-pill);background:var(--border-strong);position:relative;cursor:pointer;transition:background var(--dur-fast) var(--ease-standard);flex:none;}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:var(--radius-pill);background:var(--paper-50);transition:left var(--dur-fast) var(--ease-standard);}
.toggle:checked{background:var(--brand-primary);}
.toggle:checked::after{left:18px;}
.toggle:disabled{opacity:.45;cursor:not-allowed;}
.toggle:focus-visible{box-shadow:var(--ring-focus);outline:none;}
/* eval chips */
.dim-chip{display:inline-flex;align-items:center;gap:4px;padding:3px var(--space-3);border-radius:var(--radius-pill);font-size:var(--text-xs);border:1px solid var(--border-subtle);background:var(--bg-surface);color:var(--text-secondary);cursor:pointer;transition:background var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard);}
.dim-chip i{width:12px;height:12px;}
.dim-chip.on{background:var(--brand-subtle);border-color:var(--brand-primary);color:var(--brand-primary);font-weight:var(--weight-medium);}
.dim-row{display:flex;gap:var(--space-2);flex-wrap:wrap;}
/* skeleton */
.skl{background:var(--bg-surface-sunken);border-radius:var(--radius-sm);animation:shim 1.3s var(--ease-standard) infinite;}

/* empty */
.empty{display:flex;flex-direction:column;align-items:center;gap:var(--space-3);padding:var(--space-10) var(--space-6);text-align:center;}
.empty .ei{width:52px;height:52px;border-radius:var(--radius-lg);background:var(--bg-surface-sunken);display:grid;place-items:center;color:var(--text-muted);}
.empty .ei i{width:24px;height:24px;}
.empty .et{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.empty .eb{font-size:var(--text-sm);color:var(--text-secondary);max-width:40ch;}
/* masked key */
.keyfield{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);}
.keyfield .km{flex:1;font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-secondary);letter-spacing:.06em;}
/* modal */

.modal .box{width:100%;max-width:480px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-xl);box-shadow:var(--shadow-e3);overflow:hidden;display:flex;flex-direction:column;}
.modal .mh{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-5) var(--space-5) var(--space-4);border-bottom:1px solid var(--border-subtle);}
.modal .mh .mt{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);margin-right:auto;}
.modal .mb{padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-4);}
.modal .mf{display:flex;align-items:center;gap:var(--space-2);justify-content:flex-end;padding:var(--space-4) var(--space-5);border-top:1px solid var(--border-subtle);background:var(--bg-surface-sunken);}
/* toast */
.toast{position:fixed;bottom:var(--space-6);right:var(--space-6);z-index:50;display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);background:var(--bg-surface);border:1px solid var(--border-subtle);border-left:3px solid var(--status-success);border-radius:var(--radius-md);box-shadow:var(--shadow-e3);max-width:360px;}
.toast i.lead{width:18px;height:18px;color:var(--status-success);flex:none;margin-top:1px;}
.toast .tt{font-size:var(--text-sm);font-weight:var(--weight-medium);}
.toast .tb{font-size:var(--text-xs);color:var(--text-secondary);}
.sec-label{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);font-weight:var(--weight-semibold);letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);margin-top:var(--space-2);}
.sec-label i{width:14px;height:14px;}
@media (prefers-reduced-motion: reduce){*{transition-duration:.001ms !important;animation-duration:.001ms !important;}}

              <div className="fh">Stored server-side as a secret reference. It won't be shown again after you save.</div></div>
            <div className="alert info" role="note"><i data-lucide="shield" className="lead"></i>
              <div className="ab"><span className="ax-sec">We never display or log the key. This change is attributed to you and audit-logged.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setKeyModal(false)}>Cancel</Button>
            <Button variant="primary" leadingIcon="check" onClick={()=>{setKeyModal(false);setHasKey(true);fire("API key saved.","AI grading and chat are now active for "+TENANT+".");}}>Save key</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

    {/* ===== Remove key ConfirmDialog (destructive; explicit consequence + audit) ===== */}
    {removeKey && <React.Fragment>
      <div className="overlay" onClick={()=>setRemoveKey(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label="Remove Gemini API key">
        <div className="box" style={{maxWidth:440}}>
          <div className="mh"><div className="mt">Remove Gemini API key?</div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setRemoveKey(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="alert warn" role="note"><i data-lucide="alert-triangle" className="lead"></i>
              <div className="ab"><span className="ax-sec">AI grading and chat will stop working for {TENANT} until a new key is added. This action is logged.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setRemoveKey(false)}>Cancel</Button>
            <Button variant="danger" leadingIcon="trash-2" onClick={()=>{setRemoveKey(false);setHasKey(false);fire("API key removed.","AI grading and chat are paused until a new key is added.");}}>Remove key</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

    {/* ===== Neutral success toast (no celebration) ===== */}
    {toast && <div className="toast" role="status" aria-live="polite">
      <i data-lucide="check-circle-2" className="lead"></i>
      <div><div className="tt">{toast.tt}</div><div className="tb">{toast.tb}</div></div>
    </div>}

  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
