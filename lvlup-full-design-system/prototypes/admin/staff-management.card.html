    perms:{canManageUsers:true,canManageClasses:false,canViewAnalytics:true,canExportData:false,canManageSettings:false,canManageBilling:false}},
  {id:"u2",first:"Sam",last:"Lee",email:"sam.lee@northwood.edu",dept:"Front Office",status:"inactive",
    perms:{canManageUsers:false,canManageClasses:false,canViewAnalytics:false,canExportData:false,canManageSettings:false,canManageBilling:false}},
  {id:"u3",first:"Priya",last:"Nair",email:"priya.nair@northwood.edu",dept:"Coordination",status:"active",
    perms:{canManageUsers:true,canManageClasses:true,canViewAnalytics:true,canExportData:true,canManageSettings:true,canManageBilling:false}},
  {id:"u4",first:"Marcus",last:"Hale",email:"marcus.hale@northwood.edu",dept:"Examinations",status:"suspended",
    perms:{canManageUsers:false,canManageClasses:true,canViewAnalytics:true,canExportData:false,canManageSettings:false,canManageBilling:false}},
  {id:"me",first:"Anita",last:"Kapoor",email:"anita.kapoor@northwood.edu",dept:"Administration",status:"active",self:true,
    perms:{canManageUsers:true,canManageClasses:true,canViewAnalytics:true,canExportData:true,canManageSettings:true,canManageBilling:true}},

const teacherSeed = [
  {id:"t1",first:"Ravi",last:"Menon",email:"ravi.menon@northwood.edu",subjects:["Mathematics","Physics"],status:"active",
    perms:{canCreateExams:true,canEditRubrics:true,canManuallyGrade:true,canViewAllExams:false,canCreateSpaces:true,canManageContent:true,canViewAnalytics:true,canConfigureAi:false}},
  {id:"t2",first:"Elena",last:"Cruz",email:"elena.cruz@northwood.edu",subjects:["English","History"],status:"active",
    perms:{canCreateExams:true,canEditRubrics:false,canManuallyGrade:true,canViewAllExams:true,canCreateSpaces:false,canManageContent:true,canViewAnalytics:false,canConfigureAi:false}},
  {id:"t3",first:"Tobias",last:"Fern",email:"tobias.fern@northwood.edu",subjects:["Chemistry"],status:"inactive",
    perms:{canCreateExams:false,canEditRubrics:false,canManuallyGrade:false,canViewAllExams:false,canCreateSpaces:false,canManageContent:false,canViewAnalytics:false,canConfigureAi:false}},
];
const STATUS = {
  active:{cls:"suc",icon:"circle-check",label:"Active"},
  inactive:{cls:"neu",icon:"circle-slash",label:"Inactive"},
  suspended:{cls:"warn",icon:"octagon-alert",label:"Suspended"},
};
const countPerms = (perms, def)=> def.filter(p=>perms[p.key]).length;
const initials = (p)=> (p.first[0]+p.last[0]).toUpperCase();

/* ---- Switch (role=switch, aria-checked, bound label) ---- */
function PermRow({perm, on, onToggle, locked}){
  const id = "perm-"+perm.key;
  return (
    <div className={"permrow"+(locked?" dis":"")}>
      <label className="pl" htmlFor={id}>{perm.label}</label>
      {locked && <span className="lk" title="You can't grant a permission you don't have."><i data-lucide="lock"></i>Not held</span>}
      <input id={id} className="sw" type="checkbox" role="switch" aria-checked={on}
        checked={on} disabled={locked} aria-disabled={locked}
        aria-describedby={locked?id+"-r":undefined}
        onChange={onToggle}/>
      {locked && <span id={id+"-r"} className="ax-sr">You can't grant a permission you don't have.</span>}
    </div>);
}

/* ---- Permission editor dialog ---- */
function PermDialog({person, kind, onClose, onSave}){
  const def = kind==="teacher"?TEACHER_PERMS:STAFF_PERMS;
  const [draft,setDraft] = React.useState({...person.perms});
  const [saving,setSaving] = React.useState(false);
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const save = ()=>{ setSaving(true); setTimeout(()=>{ setSaving(false); onSave(draft); }, 600); };
  return (<>
    <div className="ovl" onClick={onClose}></div>
    <div className="dlg" role="dialog" aria-modal="true" aria-label={person.first+" "+person.last+" permissions"}>
      <div className="dh"><div style={{flex:1}}>
        <div className="dt">Edit Permissions — {person.first} {person.last}</div>
        <div className="dd">{kind==="teacher"?"Toggle what this teacher can do.":"Toggle what this staff member can do in your school."}</div>
      </div><button className="icon-btn" aria-label="Close" onClick={onClose}><i data-lucide="x"></i></button></div>
      <div className="db">
        <div className="permlist">
          {def.map(p=> <PermRow key={p.key} perm={p} on={!!draft[p.key]}
            locked={kind==="staff" && !SELF_HELD[p.key]}
            onToggle={()=>setDraft(d=>({...d,[p.key]:!d[p.key]}))}/>)}
        </div>
        <div className="alert" role="note" style={{borderColor:"var(--border-subtle)",background:"var(--bg-surface-sunken)"}}>
          <i data-lucide="shield" className="lead" style={{color:"var(--text-muted)"}}></i>
          <div className="ab ax-sec">Grants are server-authoritative. Saving calls <span className="ax-mono">syncMembershipClaims</span> so the change takes effect immediately and is written to the tenant audit log.</div>
        </div>
      </div>
      <div className="df">
        <button className="btn btn--secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn--primary" onClick={save} disabled={saving}>
          {saving?<><i data-lucide="loader" style={{animation:"sh 1s linear infinite"}}></i>Saving…</>:"Save Permissions"}</button>
      </div>
    </div>
  </>);
}

/* ---- Invite staff dialog ---- */
function InviteDialog({onClose, onCreate}){
  const [f,setF] = React.useState({first:"",last:"",email:"",phone:""});
  const [perms,setPerms] = React.useState({canViewAnalytics:true});
  const [saving,setSaving] = React.useState(false);
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email);
  const valid = f.first.trim() && f.last.trim() && emailOk;
  const create = ()=>{ setSaving(true); setTimeout(()=>{ setSaving(false); onCreate(f); }, 700); };
  return (<>
    <div className="ovl" onClick={onClose}></div>
    <div className="dlg" role="dialog" aria-modal="true" aria-label="Invite staff member">
      <div className="dh"><div style={{flex:1}}>
        <div className="dt">Invite Staff Member</div>
        <div className="dd">Create an administrative staff account for your school. They'll be able to sign in with their email.</div>
      </div><button className="icon-btn" aria-label="Close" onClick={onClose}><i data-lucide="x"></i></button></div>
      <div className="db">
        <div className="ax-grid" style={{gridTemplateColumns:"1fr 1fr"}}>
          <div className="field"><label htmlFor="if">First Name *</label>
            <input id="if" value={f.first} onChange={e=>setF({...f,first:e.target.value})} placeholder="Jane"/></div>
          <div className="field"><label htmlFor="il">Last Name *</label>
            <input id="il" value={f.last} onChange={e=>setF({...f,last:e.target.value})} placeholder="Doe"/></div>
        </div>
        <div className="field"><label htmlFor="ie">Email *</label>
          <input id="ie" value={f.email} onChange={e=>setF({...f,email:e.target.value})} placeholder="name@school.com"/>
          {f.email && !emailOk && <span className="helper" style={{color:"var(--status-error)"}}>Enter a valid email address.</span>}</div>
        <div className="field"><label htmlFor="ip">Phone</label>
          <input id="ip" value={f.phone} onChange={e=>setF({...f,phone:e.target.value})} placeholder="+91 98765 43210"/></div>
        <div>
          <div className="seclbl" style={{marginBottom:"var(--space-1)"}}>Permissions</div>
          <div className="helper" style={{marginBottom:"var(--space-2)"}}>Grant only what this person needs. You can change these any time.</div>
          <div className="permlist">
            {STAFF_PERMS.map(p=> <PermRow key={p.key} perm={p} on={!!perms[p.key]}
              locked={!SELF_HELD[p.key]}
              onToggle={()=>setPerms(d=>({...d,[p.key]:!d[p.key]}))}/>)}
          </div>
        </div>
      </div>
      <div className="df">
        <button className="btn btn--secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn--primary" onClick={create} disabled={!valid||saving}>
          {saving?<><i data-lucide="loader" style={{animation:"sh 1s linear infinite"}}></i>Creating…</>:"Create Staff"}</button>
      </div>
    </div>
  </>);
}

/* ---- Deactivate / Reactivate confirm (alertdialog) ---- */
function ConfirmDialog({person, action, onClose, onConfirm}){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const deact = action==="deactivate";
  const name = person.first+" "+person.last;
  return (<>
    <div className="ovl" onClick={onClose}></div>
    <div className="dlg" role="alertdialog" aria-modal="true" style={{width:"min(440px,92vw)"}}
      aria-label={(deact?"Deactivate ":"Reactivate ")+name}>
      <div className="dh"><i data-lucide={deact?"user-x":"user-check"} style={{width:22,height:22,color:deact?"var(--status-error)":"var(--status-success)",marginTop:2}}></i>
        <div style={{flex:1}}>
          <div className="dt">{deact?"Deactivate":"Reactivate"} {name}?</div>
          <div className="dd">{deact
            ? name+" will lose access to your school immediately and any active sessions will be signed out. You can reactivate them later."
            : name+" will regain access with their previous permissions."}</div>
        </div></div>
      <div className="df">
        <button className="btn btn--secondary" autoFocus onClick={onClose}>Cancel</button>
        <button className={"btn "+(deact?"btn--danger":"btn--primary")} onClick={onConfirm}>{deact?"Deactivate":"Reactivate"}</button>
      </div>
    </div>
  </>);
}

/* ---- Person row ---- */
function PersonRow({p, kind, onPerms, onMenu, menuOpen, onAction}){
  const st = STATUS[p.status];
  const total = kind==="teacher"?8:6;
  const n = countPerms(p.perms, kind==="teacher"?TEACHER_PERMS:STAFF_PERMS);
  const off = p.status!=="active";
  return (
    <li className="prow">
      <div className={"pav"+(off?" off":"")}>{initials(p)}</div>
      <div className="pbody">
        <div className="pname"><span>{p.first} {p.last}</span>
          <span className={"badge "+st.cls}><i data-lucide={st.icon}></i>{st.label}</span>
          {p.self && <span className="chip"><i data-lucide="user" style={{width:11,height:11}}></i>You</span>}
        </div>
        <div className="pmeta">
          <span>{p.email}</span><span className="dot"></span>
          {kind==="teacher"
            ? <span className="ax-row" style={{gap:"var(--space-1)"}}>{p.subjects.map(s=><span key={s} className="chip">{s}</span>)}</span>
            : <span>{p.dept}</span>}
          <span className="dot"></span>
          <span className="ax-row" style={{gap:"4px"}}><i data-lucide="key-round" style={{width:12,height:12,color:"var(--text-muted)"}}></i>
            <span className="ax-mono">{n}/{total}</span> permissions</span>
        </div>
      </div>
      <div className="pact">
        <button className="btn btn--secondary" onClick={()=>onPerms(p)}><i data-lucide="shield"></i>Permissions</button>
        <button className="icon-btn" aria-label={"Actions for "+p.first+" "+p.last} aria-haspopup="menu"
          aria-expanded={menuOpen} onClick={()=>onMenu(menuOpen?null:p.id)}><i data-lucide="ellipsis-vertical"></i>
          {menuOpen && (
            <div className="menu" role="menu" onClick={e=>e.stopPropagation()}>
              <button role="menuitem" onClick={()=>{onMenu(null);onPerms(p);}}><i data-lucide="shield-check"></i>Edit permissions</button>
              {p.status==="active"
                ? <button role="menuitem" className="dng" disabled={p.self}
                    title={p.self?"You can't deactivate your own account":undefined}
                    onClick={()=>{onMenu(null);onAction(p,"deactivate");}}><i data-lucide="user-x"></i>Deactivate</button>
                : <button role="menuitem" onClick={()=>{onMenu(null);onAction(p,"reactivate");}}><i data-lucide="user-check"></i>Reactivate</button>}
              <div className="sep"></div>
              <button role="menuitem" onClick={()=>{onMenu(null);onAction(p,"copy");}}><i data-lucide="link"></i>Copy invite link</button>
            </div>)}
        </button>
      </div>
    </li>);
}

/* ---- Main screen ---- */
function Screen(){
  const [tab,setTab] = React.useState("staff");
  const [query,setQuery] = React.useState("");
  const [staff,setStaff] = React.useState(staffSeed);
  const [teachers,setTeachers] = React.useState(teacherSeed);
  const [menu,setMenu] = React.useState(null);
  const [permFor,setPermFor] = React.useState(null);
  const [invite,setInvite] = React.useState(false);
  const [confirm,setConfirm] = React.useState(null);
  const [toast,setToast] = React.useState(null);
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  React.useEffect(()=>{ if(toast){ const t=setTimeout(()=>setToast(null),2600); return ()=>clearTimeout(t);} }, [toast]);

  const fire = (msg)=> setToast(msg);
  const kind = tab==="teacher"?"teacher":"staff";
  const rows = tab==="teacher"?teachers:staff;
  const setRows = tab==="teacher"?setTeachers:setStaff;
  const q = query.trim().toLowerCase();
  const filtered = rows.filter(p=> !q || (p.first+" "+p.last).toLowerCase().includes(q) || p.email.toLowerCase().includes(q));
  const seatLimit = true; // tenant at staff-seat cap → Invite disabled + banner

  const savePerms = (draft)=>{ setRows(rs=>rs.map(r=>r.id===permFor.id?{...r,perms:draft}:r)); setPermFor(null); fire("Permissions updated"); };
  const doConfirm = ()=>{
    const {person,action}=confirm;
    if(action==="deactivate"){ setRows(rs=>rs.map(r=>r.id===person.id?{...r,status:"inactive"}:r)); fire(person.first+" "+person.last+" deactivated"); }
    else { setRows(rs=>rs.map(r=>r.id===person.id?{...r,status:"active"}:r)); fire(person.first+" "+person.last+" reactivated"); }
    setConfirm(null);
  };
  const onAction = (p,action)=>{ if(action==="copy"){ fire("Invite link copied"); } else { setConfirm({person:p,action}); } };
  const createStaff = (f)=>{
    setStaff(s=>[{id:"new"+Date.now(),first:f.first,last:f.last,email:f.email,dept:"Unassigned",status:"active",
      perms:{canViewAnalytics:true}},...s]);
    setInvite(false); fire("Staff member "+f.first+" "+f.last+" invited");
  };

  return (
    <AxShell active="/staff" crumb="Staff & Permissions">
      <div className="ax-head">
        <div className="tx">
          <h1 className="ax-h1">Staff &amp; Permissions</h1>
          <div className="ax-sub">Invite teachers and administrators and control what each person can do in your school.</div>
        </div>
      </div>

      {/* QuotaWarningBanner — staff-seat limit reached (icon + label, not color-only) */}
      {seatLimit && (
        <div className="alert" role="status">
          <i data-lucide="triangle-alert" className="lead"></i>
          <div className="ab"><span className="at">You've reached your plan's staff-seat limit. </span>
            <span className="ax-sec">Contact your account owner to add more seats before inviting new staff.</span></div>
        </div>)}

      {/* Tabs */}
      <div role="tablist" aria-label="Staff cohorts" className="tabbar">
        <button role="tab" aria-selected={tab==="teacher"} className={"tabtrig"+(tab==="teacher"?" on":"")}
          onClick={()=>{setTab("teacher");setQuery("");setMenu(null);}}>Teachers <span className="ct">{teachers.length}</span></button>
        <button role="tab" aria-selected={tab==="staff"} className={"tabtrig"+(tab==="staff"?" on":"")}
          onClick={()=>{setTab("staff");setQuery("");setMenu(null);}}>Staff <span className="ct">{staff.length}</span></button>
      </div>

      {/* Toolbar */}
      <div className="tbar" role="search">
        <div className="srch">
          <i data-lucide="search"></i>
          <input value={query} onChange={e=>setQuery(e.target.value)}
            placeholder={tab==="teacher"?"Search teachers by name or email…":"Search staff by name or email…"}
            aria-label={tab==="teacher"?"Search teachers":"Search staff"}/>
          {query && <span className="clr" role="button" aria-label="Clear search" onClick={()=>setQuery("")}><i data-lucide="x" style={{width:15,height:15}}></i></span>}
        </div>
        {tab==="staff" && (
          <button className="btn btn--primary" disabled={seatLimit}
            title={seatLimit?"You've reached your plan's staff-seat limit":undefined}
            onClick={()=>setInvite(true)}><i data-lucide="plus"></i>Invite Staff</button>)}
      </div>

      {/* List region (one tab's content; switching never jumps layout) */}
      <ul className="ax-col" role="list" style={{gap:"var(--space-2)",listStyle:"none",margin:0,padding:0}} onClick={()=>menu&&setMenu(null)}>
        {filtered.length>0
          ? filtered.map(p=> <PersonRow key={p.id} p={p} kind={kind}
              menuOpen={menu===p.id} onMenu={setMenu}
              onPerms={(x)=>setPermFor(x)} onAction={onAction}/>)
          : q
            ? (<div className="empty">
                <div className="ei"><i data-lucide="search-x"></i></div>
                <div className="et">No matches</div>
                <div className="eb">No {tab==="teacher"?"teachers":"staff"} match &ldquo;{query}&rdquo;.</div>
                <button className="btn btn--ghost" onClick={()=>setQuery("")}>Clear search</button>
              </div>)
            : tab==="staff"
              ? (<div className="empty">
                  <div className="ei"><i data-lucide="user-cog"></i></div>
                  <div className="et">No staff members</div>
                  <div className="eb">Invite administrators and coordinators to help you run your school.</div>
                  <button className="btn btn--primary" disabled={seatLimit} onClick={()=>setInvite(true)}><i data-lucide="plus"></i>Invite Staff</button>
                </div>)
              : (<div className="empty">
                  <div className="ei"><i data-lucide="user-cog"></i></div>
                  <div className="et">No teachers found</div>
                  <div className="eb">Add teachers on the Users page, then manage their permissions here.</div>
                  <button className="btn btn--secondary"><i data-lucide="arrow-up-right"></i>Go to Users</button>
                </div>)}
      </ul>

      {/* ── Secondary stacked state examples (other §5 states present in markup) ── */}
      <div className="ax-col" style={{gap:"var(--space-3)",marginTop:"var(--space-4)"}}>
        <div className="seclbl">Other states (reference)</div>

        {/* Loading skeleton */}
        <div>
          <div className="helper" style={{marginBottom:"var(--space-2)"}}>Loading — skeleton rows (search &amp; Invite render present but disabled)</div>
          <div className="ax-col" style={{gap:"var(--space-2)"}}>
            <div className="skel"></div><div className="skel"></div><div className="skel"></div>
          </div>
        </div>

        {/* Inline retryable error */}
        <div>
          <div className="helper" style={{marginBottom:"var(--space-2)"}}>Error — list read failed (inline, retryable)</div>
          <div className="alert err" role="alert">
            <i data-lucide="circle-x" className="lead"></i>
            <div className="ab"><span className="at">Couldn't load staff. </span>
              <span className="ax-sec">The membership join could not be resolved.</span></div>
            <button className="btn btn--secondary" style={{padding:"var(--space-1) var(--space-3)"}}><i data-lucide="rotate-cw"></i>Retry</button>
          </div>
        </div>

        {/* Partial — permission join missing */}
        <div>
          <div className="helper" style={{marginBottom:"var(--space-2)"}}>Partial — legacy membership unlinked (count shows em-dash, not a misleading 0/6)</div>
          <li className="prow" style={{listStyle:"none"}}>
            <div className="pav off">RT</div>
            <div className="pbody">
              <div className="pname"><span>Rohan Tata</span>
                <span className="badge neu"><i data-lucide="circle-help"></i>Unresolved</span></div>
              <div className="pmeta"><span>rohan.tata@northwood.edu</span><span className="dot"></span><span>Logistics</span><span className="dot"></span>
                <span className="ax-row" style={{gap:"4px"}}><i data-lucide="key-round" style={{width:12,height:12,color:"var(--text-muted)"}}></i>
                <span className="ax-mono ax-muted">—</span> permissions</span></div>
            </div>
            <div className="pact"><button className="btn btn--secondary"><i data-lucide="shield"></i>Permissions</button></div>
          </li>
        </div>

        {/* Permission-gated / sub-admin role variant */}
        <div>
          <div className="helper" style={{marginBottom:"var(--space-2)"}}>Role variant — staff with <span className="ax-mono">canManageUsers</span> (view + edit a subset they hold; Invite/Deactivate hidden, un-held toggles disabled)</div>
          <div className="alert" role="note" style={{borderColor:"var(--border-subtle)",background:"var(--bg-surface-sunken)"}}>
            <i data-lucide="shield-half" className="lead" style={{color:"var(--text-muted)"}}></i>
            <div className="ab ax-sec">A sub-admin may only grant capabilities they themselves hold. Toggles for <span className="ax-mono">Manage Billing</span> appear locked with the tooltip &ldquo;You can't grant a permission you don't have.&rdquo; — no privilege escalation.</div>
          </div>
        </div>
      </div>

      {/* ── Dialogs (wired via state) ── */}
      {permFor && <PermDialog person={permFor} kind={kind} onClose={()=>setPermFor(null)} onSave={savePerms}/>}
      {invite && <InviteDialog onClose={()=>setInvite(false)} onCreate={createStaff}/>}
      {confirm && <ConfirmDialog person={confirm.person} action={confirm.action} onClose={()=>setConfirm(null)} onConfirm={doConfirm}/>}

      {/* Toast (polite live region) */}
      {toast && (<div className="toast" role="status"><i data-lucide="check-circle"></i><span>{toast}</span></div>)}
    </AxShell>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
