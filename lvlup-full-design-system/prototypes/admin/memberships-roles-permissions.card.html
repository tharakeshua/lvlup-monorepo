<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
html,body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);}
#root{min-height:100vh;}
.ax-shell{display:grid;grid-template-columns:264px 1fr;min-height:100vh;}
.ax-side{position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-5);background:var(--bg-surface);border-right:1px solid var(--border-subtle);padding:var(--space-5) var(--space-4);}
.ax-brand{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-1) var(--space-2);}
.ax-brand .mk{width:34px;height:34px;border-radius:var(--radius-md);background:var(--brand-primary);color:var(--text-on-accent);display:grid;place-items:center;font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);}
.ax-brand .nm{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-base);line-height:1.1;}
.ax-brand .sc{font-size:var(--text-2xs);color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;}
.ax-navgrp{display:flex;flex-direction:column;gap:2px;}
.ax-navlbl{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);padding:var(--space-2) var(--space-2) var(--space-1);}
.ax-nav{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--text-secondary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;position:relative;transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard);text-decoration:none;}
.ax-nav i{width:18px;height:18px;}
.ax-nav .ct{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.ax-nav:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.ax-nav.on{background:var(--brand-subtle);color:var(--brand-primary);font-weight:var(--weight-semibold);}
.ax-nav.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:58%;border-radius:var(--radius-pill);background:var(--brand-primary);}
.ax-side .foot{margin-top:auto;display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-4);border-top:1px solid var(--border-subtle);}
.ax-rs{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;}
.ax-rs i:last-child{margin-left:auto;}
.ax-uc{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2);border-radius:var(--radius-md);cursor:pointer;}
.ax-uc:hover{background:var(--bg-surface-sunken);}
.ax-uc .av{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.ax-uc .nm{font-size:var(--text-sm);font-weight:var(--weight-medium);line-height:1.1;}
.ax-uc .rl{font-size:var(--text-2xs);color:var(--text-muted);}
.ax-main{display:flex;flex-direction:column;min-width:0;}
.ax-top{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-8);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;top:0;z-index:20;}
.ax-bc{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-muted);}
.ax-bc b{color:var(--text-primary);font-weight:var(--weight-medium);}
.ax-top .sp{flex:1;}
.ax-search{display:flex;align-items:center;gap:var(--space-2);width:280px;max-width:32vw;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-muted);font-size:var(--text-sm);}
.ax-search kbd{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:0 var(--space-1);}
.ax-body{flex:1;overflow-y:auto;padding:var(--space-8);display:flex;flex-direction:column;gap:var(--space-6);width:100%;max-width:1264px;}
.ax-head{display:flex;align-items:flex-start;gap:var(--space-4);flex-wrap:wrap;}
.ax-head .tx{display:flex;flex-direction:column;gap:var(--space-1);}
.ax-h1{font-family:var(--font-display);font-size:var(--text-2xl);line-height:var(--leading-2xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);}
.ax-sub{font-size:var(--text-sm);color:var(--text-secondary);}
.ax-head .ac{margin-left:auto;display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;}
.ax-grid{display:grid;gap:var(--space-4);}
.ax-g4{grid-template-columns:repeat(4,1fr);}
.ax-row{display:flex;align-items:center;gap:var(--space-3);}
.ax-col{display:flex;flex-direction:column;gap:var(--space-3);}
.ax-mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.ax-muted{color:var(--text-muted);}
.ax-sec{color:var(--text-secondary);}
.ax-sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);font-family:var(--font-ui);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;border:1px solid transparent;transition:background var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard);}
.btn i{width:15px;height:15px;}
.btn--primary{background:var(--brand-primary);color:var(--text-on-accent);}
.btn--primary:hover{background:var(--brand-primary-hover);}
.btn--secondary{background:var(--bg-surface);color:var(--text-primary);border-color:var(--border-strong);}
.btn--secondary:hover{background:var(--bg-surface-sunken);}
.btn--ghost{background:transparent;color:var(--text-secondary);}
.btn--ghost:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.btn--danger{background:var(--status-error);color:var(--text-on-accent);}
.btn--danger:hover{filter:brightness(.94);}
.btn--sm{padding:var(--space-1) var(--space-3);font-size:var(--text-xs);}
.btn[disabled]{opacity:.5;cursor:not-allowed;}
.icon-btn{display:inline-grid;place-items:center;width:32px;height:32px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}
.icon-btn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.icon-btn i{width:17px;height:17px;}
/* tabs */
.tabs{display:inline-flex;gap:var(--space-1);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:3px;}
.tab{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-sm);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-secondary);cursor:pointer;border:none;background:none;transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard);}
.tab.on{background:var(--bg-surface);color:var(--text-primary);font-weight:var(--weight-semibold);box-shadow:var(--shadow-e1);}
.tab .pill{font-family:var(--font-mono);font-size:var(--text-2xs);background:var(--bg-inset);color:var(--text-muted);border-radius:var(--radius-pill);padding:0 var(--space-2);}
.tab.on .pill{background:var(--brand-subtle);color:var(--brand-primary);}
/* toolbar */
.toolbar{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;}
.tb-search{display:flex;align-items:center;gap:var(--space-2);flex:1;min-width:240px;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);color:var(--text-muted);font-size:var(--text-sm);}
.tb-search i{width:16px;height:16px;}
.tb-search input{flex:1;border:none;outline:none;background:none;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);}
.tb-search:focus-within{border-color:var(--border-focus);box-shadow:var(--ring-focus);}
.tb-sel{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;}
.tb-sel i{width:15px;height:15px;}
/* table */
.tbl-wrap{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:visible;}
table.tbl{width:100%;border-collapse:collapse;font-size:var(--text-sm);}
table.tbl th{text-align:left;padding:var(--space-3) var(--space-4);font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface-sunken);white-space:nowrap;}
table.tbl td{padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border-subtle);color:var(--text-primary);vertical-align:middle;}
table.tbl tr:last-child td{border-bottom:none;}
table.tbl tbody tr{transition:background var(--dur-slow) var(--ease-standard);}
table.tbl tbody tr:hover{background:var(--bg-surface-sunken);}
table.tbl tr.sel{background:var(--brand-subtle);}
table.tbl tr.sel:hover{background:var(--brand-subtle);}
table.tbl tr.dim td{color:var(--text-muted);}
table.tbl tr.flash{background:var(--bg-surface-sunken);}
table.tbl tr.you td{background:var(--bg-surface-sunken);}
.cell-name{display:flex;align-items:center;gap:var(--space-3);}
.av-sm{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-2xs);font-weight:var(--weight-semibold);flex:none;}
.cell-name .nm{font-weight:var(--weight-medium);line-height:1.15;display:flex;align-items:center;gap:var(--space-2);}
.cell-name .em{font-size:var(--text-2xs);color:var(--text-muted);}
.chk{appearance:none;width:16px;height:16px;border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);cursor:pointer;background:var(--bg-surface);display:inline-grid;place-items:center;flex:none;}
.chk:checked{background:var(--brand-primary);border-color:var(--brand-primary);}
.chk:checked::after{content:"";width:9px;height:9px;background:var(--text-on-accent);clip-path:polygon(14% 52%,0 65%,40% 100%,100% 18%,86% 7%,38% 73%);}
.chk:disabled{opacity:.4;cursor:not-allowed;}
.chk:focus-visible{box-shadow:var(--ring-focus);outline:none;}
/* role select (inline) */
.rsel{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-2) var(--space-1) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);font-size:var(--text-sm);color:var(--text-primary);cursor:pointer;}
.rsel:hover{border-color:var(--border-strong);}
.rsel i{width:14px;height:14px;color:var(--text-muted);}
.rsel.lock{background:var(--bg-surface-sunken);color:var(--text-secondary);cursor:not-allowed;}
.rsel.lock i.lk{color:var(--text-muted);}
.perm-link{display:inline-flex;align-items:center;gap:var(--space-1);font-size:var(--text-sm);color:var(--brand-primary);font-weight:var(--weight-medium);cursor:pointer;background:none;border:none;font-family:var(--font-ui);}
.perm-link i{width:14px;height:14px;}
.perm-link.muted{color:var(--text-muted);cursor:default;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-medium);border:1px solid transparent;white-space:nowrap;}
.badge i{width:12px;height:12px;}
.badge.suc{background:var(--status-success-subtle);color:var(--status-success);}
.badge.err{background:var(--status-error-subtle);color:var(--status-error);}
.badge.ina{background:var(--bg-surface-sunken);color:var(--text-muted);border-color:var(--border-strong);}
.badge.brd{background:var(--brand-subtle);color:var(--brand-primary);}
.badge.ink{background:var(--bg-inset);color:var(--text-secondary);border-color:var(--border-subtle);}
.tip{position:relative;display:inline-flex;}
.tip .tt{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--ink-900);color:var(--paper-100);font-size:var(--text-2xs);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity var(--dur-fast) var(--ease-standard);z-index:30;}
.tip:hover .tt,.tip:focus-within .tt{opacity:1;}
/* pagination */
.pag{display:flex;align-items:center;gap:var(--space-3);justify-content:space-between;flex-wrap:wrap;}
.pag .nums{display:flex;align-items:center;gap:var(--space-1);}
.pag .pg{min-width:30px;height:30px;display:grid;place-items:center;border-radius:var(--radius-md);border:1px solid var(--border-subtle);background:var(--bg-surface);font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary);cursor:pointer;}
.pag .pg.on{background:var(--brand-primary);color:var(--text-on-accent);border-color:var(--brand-primary);}
/* panels & alerts */
.panel{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;}
.panel .ph{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-5);border-bottom:1px solid var(--border-subtle);}
.panel .ph .pt{font-size:var(--text-sm);font-weight:var(--weight-semibold);margin-right:auto;}
.panel .pb{padding:var(--space-5);}
.alert{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--border-subtle);font-size:var(--text-sm);background:var(--bg-surface);}
.alert i.lead{width:18px;height:18px;flex:none;margin-top:1px;}
.alert .ab{flex:1;}
.alert .at{font-weight:var(--weight-semibold);}
.alert.warn{border-color:var(--status-warning);background:var(--status-warning-subtle);}
.alert.warn i.lead{color:var(--status-warning);}
.alert.err{border-color:var(--status-error);background:var(--status-error-subtle);}
.alert.err i.lead{color:var(--status-error);}
.alert.info{border-color:var(--status-info);background:var(--status-info-subtle);}
.alert.info i.lead{color:var(--status-info);}
.alert .lnk{color:var(--brand-primary);font-weight:var(--weight-medium);cursor:pointer;white-space:nowrap;}
.sec-label{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);font-weight:var(--weight-semibold);letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);}
.sec-label i{width:14px;height:14px;}
/* bulk bar */
.bulkbar{position:sticky;bottom:var(--space-4);align-self:center;display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3) var(--space-2) var(--space-5);background:var(--bg-surface);border:1px solid var(--border-strong);border-radius:var(--radius-lg);box-shadow:var(--shadow-e3);z-index:10;}
.bulkbar .bn{font-size:var(--text-sm);font-weight:var(--weight-semibold);}
.bulkbar .sepl{width:1px;height:22px;background:var(--border-subtle);}
/* empty / skeleton */
.empty{display:flex;flex-direction:column;align-items:center;gap:var(--space-3);padding:var(--space-12) var(--space-6);text-align:center;}
.empty .ei{width:52px;height:52px;border-radius:var(--radius-lg);background:var(--bg-surface-sunken);display:grid;place-items:center;color:var(--text-muted);}
.empty .ei i{width:24px;height:24px;}
.empty .et{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.empty .eb{font-size:var(--text-sm);color:var(--text-secondary);max-width:38ch;}
.empty .ea{display:flex;gap:var(--space-2);margin-top:var(--space-2);}
.skl{background:var(--bg-surface-sunken);border-radius:var(--radius-sm);animation:shim 1.3s var(--ease-standard) infinite;}
@keyframes shim{0%,100%{opacity:1}50%{opacity:.5}}
/* drawer */
.overlay{position:fixed;inset:0;background:var(--ink-900);opacity:.42;z-index:40;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:480px;max-width:94vw;background:var(--bg-surface);border-left:1px solid var(--border-subtle);box-shadow:var(--shadow-e3);z-index:41;display:flex;flex-direction:column;animation:slidein var(--dur-base) var(--ease-entrance);}
@keyframes slidein{from{transform:translateX(24px);opacity:.4}to{transform:translateX(0);opacity:1}}
.drawer .dh{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-5);border-bottom:1px solid var(--border-subtle);}
.drawer .db{padding:var(--space-5);overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:var(--space-5);}
.drawer .df{display:flex;align-items:center;gap:var(--space-2);justify-content:flex-end;padding:var(--space-4) var(--space-5);border-top:1px solid var(--border-subtle);background:var(--bg-surface-sunken);}
.drawer .av-lg{width:44px;height:44px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-sm);font-weight:var(--weight-semibold);flex:none;}
.deflist{display:grid;grid-template-columns:auto 1fr;gap:var(--space-2) var(--space-5);font-size:var(--text-sm);margin:0;}
.deflist dt{color:var(--text-muted);}
.deflist dd{color:var(--text-primary);text-align:right;margin:0;}
.dsec{display:flex;flex-direction:column;gap:var(--space-3);}
.dsec .dst{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);}
.field{display:flex;flex-direction:column;gap:var(--space-2);}
.field .fl{font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--text-secondary);}
.fselect{padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);}
.fselect:focus{outline:none;border-color:var(--border-focus);box-shadow:var(--ring-focus);}
.permrow{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) 0;border-bottom:1px solid var(--border-subtle);}
.permrow:last-child{border-bottom:none;}
.permrow .pl{font-size:var(--text-sm);flex:1;}
.permrow .ph2{font-size:var(--text-2xs);color:var(--text-muted);}
.sw{appearance:none;width:38px;height:22px;border-radius:var(--radius-pill);background:var(--border-strong);position:relative;cursor:pointer;flex:none;transition:background var(--dur-fast) var(--ease-standard);border:none;}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:var(--radius-pill);background:var(--paper-50);transition:transform var(--dur-fast) var(--ease-standard);}
.sw:checked{background:var(--brand-primary);}
.sw:checked::after{transform:translateX(16px);}
.sw:disabled{opacity:.45;cursor:not-allowed;}
.sw:focus-visible{box-shadow:var(--ring-focus);outline:none;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-sm);font-size:var(--text-2xs);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);color:var(--text-secondary);white-space:nowrap;}
.chip-row{display:flex;gap:4px;flex-wrap:wrap;}
/* modal */
.modal{position:fixed;inset:0;z-index:42;display:grid;place-items:center;padding:var(--space-6);}
.modal .box{width:100%;max-width:460px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-xl);box-shadow:var(--shadow-e3);overflow:hidden;display:flex;flex-direction:column;}
.modal .mh{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-5) var(--space-5) var(--space-4);}
.modal .mh .mt{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);margin-right:auto;}
.modal .mb{padding:0 var(--space-5) var(--space-4);display:flex;flex-direction:column;gap:var(--space-3);}
.modal .mf{display:flex;align-items:center;gap:var(--space-2);justify-content:flex-end;padding:var(--space-4) var(--space-5);border-top:1px solid var(--border-subtle);background:var(--bg-surface-sunken);}
/* matrix */
.mx{width:100%;border-collapse:collapse;font-size:var(--text-sm);}
.mx th,.mx td{padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border-subtle);text-align:center;}

/* ---- status badge: icon + label, never color-only ---- */
function StatusBadge({status}){
  if(status==="active") return <span className="badge suc"><i data-lucide="check-circle-2"></i>Active</span>;
  if(status==="suspended") return <span className="badge err"><i data-lucide="ban"></i>Suspended</span>;
  return <span className="badge ina"><i data-lucide="circle-pause"></i>Inactive</span>;
}
function RoleBadge({role,locked}){
  return <span className={"badge "+(locked?"ink":"ink")} style={{fontWeight:"var(--weight-medium)"}}>
    {locked&&<i data-lucide="lock"></i>}{role}</span>;
}

  {id:"u3",name:"Lena Fischer",email:"lena.fischer@northwood.edu",init:"LF",role:"Teacher",status:"active",stale:true,
   granted:{create_exams:true,edit_rubrics:false,manual_grade:true,view_all_exams:true,create_spaces:true,manage_content:false,view_analytics:true,configure_agents:false},

function Glyph({s}){
  if(s==="always") return <span className="gl always" aria-label="always"><i data-lucide="check-circle-2"></i></span>;
  if(s==="grant")  return <span className="gl grant" aria-label="grantable per member"><i data-lucide="circle-dot"></i></span>;
  return <span className="gl never" aria-label="never"><i data-lucide="minus"></i></span>;
}

function RowMenu({status}){
  return <div className="menu" role="menu" onClick={e=>e.stopPropagation()}>
    <button role="menuitem"><i data-lucide="sliders-horizontal"></i>Edit role &amp; permissions</button>
    <button role="menuitem"><i data-lucide="mail"></i>Resend invite</button>

  </div>;
}

function Drawer({member,onClose,onSuspend,onRoleChange}){
  const isTeacher=member.role==="Teacher";
  const perms=isTeacher?TEACHER_PERMS:STAFF_PERMS;
  const [granted,setGranted]=React.useState(member.granted);
  const [role,setRole]=React.useState(member.role);
  const changed=role!==member.role;
  const count=Object.values(granted).filter(Boolean).length;
  return <React.Fragment>
    <div className="overlay" onClick={onClose}></div>
    <aside className="drawer" role="dialog" aria-modal="true" aria-labelledby="dwr-name">
      <div className="dh">
        <div className="av-lg">{member.init}</div>
        <div style={{flex:1}}>
          <div id="dwr-name" style={{fontFamily:"var(--font-display)",fontSize:"var(--text-lg)",fontWeight:"var(--weight-semibold)"}}>{member.name}</div>
          <div className="ax-muted" style={{fontSize:"var(--text-xs)"}}>{member.email}</div>
          <div style={{marginTop:"var(--space-2)"}}><StatusBadge status={member.status}/></div>
        </div>
        <button className="icon-btn" aria-label="Close" onClick={onClose}><i data-lucide="x"></i></button>
      </div>
      <div className="db">
        <div className="dsec">
          <div className="dst">Membership</div>
          <dl className="deflist">
            <dt>UID</dt><dd className="ax-mono">{member.uid}</dd>
            <dt>Joined</dt><dd>{member.joined}</dd>
            <dt>Source</dt><dd>{member.source}</dd>
            <dt>Last active</dt><dd>{member.last}</dd>
            <dt>Linked classes</dt><dd>{member.classes.length?member.classes.join(", "):"—"}</dd>
          </dl>
        </div>

        <div className="dsec">
          <div className="dst">Role</div>
          <div className="field">
            <label className="fl" htmlFor="role-sel">Current role</label>
            <select id="role-sel" className="fselect" value={role} onChange={e=>setRole(e.target.value)}>
              {ROLE_OPTS.map(r=><option key={r} value={r}>{r}</option>)}
            </select>
          </div>
          {changed && <div className="alert warn" role="status">
            <i data-lucide="alert-triangle" className="lead"></i>
            <div className="ab"><span className="ax-sec">Changing {member.name.split(" ")[0]} to {role} re-provisions their access and signs them out of all sessions.</span></div>
          </div>}
        </div>

        <div className="dsec">
          <div className="dst">Permissions ({member.role}) · <span className="ax-mono">{count} of {perms.length}</span></div>
          <div>
            {perms.map(([k,label])=>(
              <label className="permrow" key={k}>
                <span className="pl">{label}</span>
                <input type="checkbox" className="sw" role="switch" aria-label={label}
                  checked={!!granted[k]} onChange={()=>setGranted(g=>({...g,[k]:!g[k]}))}/>
              </label>
            ))}
          </div>
          {member.stale && <div className="alert info" role="status">
            <i data-lucide="refresh-cw" className="lead"></i>
            <div className="ab"><span className="ax-sec">Access syncing — changes apply on next sign-in.</span></div>
          </div>}
        </div>

        <div className="dsec">
          <div className="dst">Managed classes &amp; spaces</div>
          <div className="chip-row">

function Screen(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const [tab,setTab]=React.useState("members");
  const [sel,setSel]=React.useState({});
  const [menuId,setMenuId]=React.useState(null);
  const [addOpen,setAddOpen]=React.useState(false);
  const [drawer,setDrawer]=React.useState(null);
  const [confirm,setConfirm]=React.useState(null); // {kind:'suspend'|'role', member}

  const selectable=MEMBERS.filter(m=>!m.self);
  const toggle=(id)=>setSel(s=>({...s,[id]:!s[id]}));
  const allOn=selectable.length>0 && selectable.every(r=>sel[r.id]);
  const toggleAll=()=>{ const n={}; if(!allOn) selectable.forEach(r=>n[r.id]=true); setSel(n); };

            <button role="menuitem"><i data-lucide="user"></i>Student</button>
            <button role="menuitem"><i data-lucide="users"></i>Parent</button>
          </div>}
        </div>
      </div>
    </div>

    {/* Tenant-isolation reminder (§8 rule 1) */}

      <i data-lucide="building" className="lead"></i>
      <div className="ab"><span className="ax-sec">You are managing access for <b className="ax-sec" style={{fontWeight:"var(--weight-semibold)"}}>Northwood Academy</b> only. Members of other tenants are never shown or editable here.</span></div>
    </div>

    {/* Tabs */}
    <div className="tabs" role="tablist" aria-label="Access views">
      <button role="tab" aria-selected={tab==="members"} className={"tab"+(tab==="members"?" on":"")} onClick={()=>setTab("members")}>Members<span className="pill">6</span></button>
      <button role="tab" aria-selected={tab==="roles"} className={"tab"+(tab==="roles"?" on":"")} onClick={()=>setTab("roles")}>Roles &amp; permissions</button>
    </div>

    {tab==="members" && <React.Fragment>
      {/* Toolbar */}

        <button className="tb-sel"><i data-lucide="filter"></i>Status: Active<i data-lucide="chevron-down"></i></button>
        <button className="tb-sel"><i data-lucide="download"></i>Export</button>
      </div>

      {/* Primary success state — members DataTable */}
      <div className="tbl-wrap">
        <table className="tbl" aria-label="Members directory">
          <thead><tr>
            <th style={{width:40}}><input type="checkbox" className="chk" checked={allOn} onChange={toggleAll} aria-label="Select all members"/></th>
            <th>Member</th><th>Role</th><th>Permissions</th><th>Status</th><th style={{width:48}}><span className="ax-sr">Actions</span></th>
          </tr></thead>
          <tbody>
            {MEMBERS.map(r=>{
              const total = r.role==="Teacher"?8 : r.role==="Staff"?6 : 0;
              const gc = Object.values(r.granted).filter(Boolean).length;
              return <tr key={r.id} className={(sel[r.id]?"sel ":"")+(r.status==="suspended"?"dim ":"")+(r.self?"you":"")}>
                <td>{r.self
                  ? <input type="checkbox" className="chk" disabled aria-label="You cannot select your own row"/>
                  : <input type="checkbox" className="chk" checked={!!sel[r.id]} onChange={()=>toggle(r.id)} aria-label={"Select "+r.name}/>}</td>
                <td><div className="cell-name"><div className="av-sm">{r.init}</div>
                  <div><div className="nm">{r.name}{r.self&&<span className="ax-muted" style={{fontSize:"var(--text-2xs)",fontWeight:"var(--weight-regular)"}}>(you)</span>}

                    <div className="em">{r.email}</div></div></div></td>
                <td>{r.self
                  ? <span className="tip"><span className="rsel lock"><i data-lucide="shield-check"></i>Admin<i data-lucide="lock" className="lk"></i></span>
                      <span className="tt">You can't change your own role or suspend yourself</span></span>
                  : <button className="rsel" onClick={()=>setDrawer(r)}><span>{r.role}</span><i data-lucide="chevron-down"></i></button>}</td>
                <td>{r.self
                  ? <span className="ax-sec">Full access</span>
                  : total>0
                    ? <button className="perm-link" onClick={()=>setDrawer(r)}>{gc} of {total}<i data-lucide="chevron-right"></i></button>

                <td><StatusBadge status={r.status}/></td>
                <td className="relpos" style={{textAlign:"right"}}>
                  {r.self

                        <button className="icon-btn" aria-label={"Actions for "+r.name} onClick={()=>setMenuId(menuId===r.id?null:r.id)}><i data-lucide="more-horizontal"></i></button>

                      </React.Fragment>}
                </td>
              </tr>;

          <button className="pg">2</button>
          <button className="pg">3</button>
          <button className="pg" aria-label="Next page"><i data-lucide="chevron-right" style={{width:14,height:14}}></i></button>
        </div>
        <button className="tb-sel">20 per page<i data-lucide="chevron-down"></i></button>

      {/* Floating bulk bar — destructive = confirm, not optimistic */}
      {selCount>0 &&
        <div className="bulkbar" role="region" aria-live="polite" aria-label={selCount+" selected"}>
          <span className="bn">{selCount} selected</span>
          <span className="sepl"></span>

        <span className="lnk">Retry →</span>
      </div>

      {/* Save error from ERROR_MESSAGES map (§5 / §7) */}
      <div className="alert err" role="alert">
        <i data-lucide="shield-x" className="lead"></i>
        <div className="ab"><span className="at">You don't have permission to make this change. </span>
          <span className="ax-sec">Your edit was rolled back. This action is checked again on the server.</span></div>
      </div>

      {/* Tenant suspended → reads work, writes disabled (§8 rule 9) */}
      <div className="alert warn" role="status">
        <i data-lucide="lock" className="lead"></i>
        <div className="ab"><span className="at">This tenant is suspended; changes are disabled. </span>
          <span className="ax-sec">You can still view members, but role and permission edits are read-only until reactivation.</span></div>
      </div>

      {/* staff-with-canManageUsers reduced view (§5 permission-gated) */}
      <div className="alert info" role="status">
        <i data-lucide="eye" className="lead"></i>
        <div className="ab"><span className="at">You have scoped access to members. </span>
          <span className="ax-sec">Roles above your own scope are locked, and permissions you don't hold yourself are hidden.</span></div>
      </div>

      {/* Loading skeleton (mirrors 8-row table) */}
      <div className="tbl-wrap" aria-busy="true" aria-label="Loading members">
        <table className="tbl"><tbody>
          {[0,1,2].map(i=>(
            <tr key={i}>
              <td style={{width:40}}><div className="skl" style={{width:16,height:16,borderRadius:"var(--radius-sm)"}}></div></td>
              <td><div className="cell-name"><div className="skl" style={{width:30,height:30,borderRadius:"var(--radius-pill)"}}></div><div className="skl" style={{width:170,height:12}}></div></div></td>
              <td><div className="skl" style={{width:88,height:24,borderRadius:"var(--radius-md)"}}></div></td>
              <td><div className="skl" style={{width:60,height:12}}></div></td>
              <td><div className="skl" style={{width:70,height:18,borderRadius:"var(--radius-pill)"}}></div></td>
              <td></td>
            </tr>))}
        </tbody></table>
      </div>

      {/* Empty — fresh tenant (§5 / §7) */}
      <div className="panel"><div className="empty">
        <div className="ei"><i data-lucide="user-round-plus"></i></div>
        <div className="et">Just you so far</div>
        <div className="eb">Add teachers, staff, and students to give them access to Northwood Academy.</div>
        <div className="ea"><Button variant="primary" leadingIcon="plus">Add member</Button></div>
      </div></div>

      {/* Empty — filtered (§5 / §7) */}
      <div className="panel"><div className="empty">
        <div className="ei"><i data-lucide="search-x"></i></div>
        <div className="et">No members match these filters</div>
        <div className="eb">Try a different search, role, or status.</div>
        <div className="ea"><Button variant="ghost" leadingIcon="x">Clear filters</Button></div>
      </div></div>

      {/* Access-denied panel (guard copy, verbatim) */}
      <div className="panel"><div className="empty">
        <div className="ei"><i data-lucide="shield-alert"></i></div>
        <div className="et">Access Denied</div>
        <div className="eb">You don't have permission to access this page.</div>
      </div></div>
    </React.Fragment>}

    {tab==="roles" && <React.Fragment>
      <div className="panel">
        <div className="ph"><span className="pt">Permission matrix</span>
          <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Canonical role catalog · super-admin is not a tenant role</span></div>
        <div style={{overflowX:"auto"}}>
          <table className="mx" aria-label="Permission matrix by role">
            <thead><tr>
              <th className="lead">Permission</th><th>Admin</th><th>Teacher</th><th>Staff</th><th>Student</th>
            </tr></thead>
            <tbody>
              {MATRIX.map(([perm,...cells])=>(
                <tr key={perm}>
                  <td className="lead">{perm}</td>
                  {cells.map((c,i)=><td key={i}><span className="tip"><Glyph s={c}/><span className="tt">{perm}: {c==="always"?"always":c==="grant"?"grantable per member":"never"}</span></span></td>)}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="legend">
          <span className="gl always"><i data-lucide="check-circle-2"></i>always</span>
          <span className="gl grant"><i data-lucide="circle-dot"></i>grantable per member</span>
          <span className="gl never"><i data-lucide="minus"></i>never</span>
        </div>
      </div>

      {/* Recent access changes — server-only audit, render-only Timeline (§8 rule 10) */}
      <div className="panel">
        <div className="ph"><span className="pt">Recent access changes</span>
          <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Audit log · server-authoritative</span></div>
        <div className="pb" style={{display:"flex",flexDirection:"column",gap:"var(--space-3)"}}>
          {[["check-circle-2","Asha Rao granted Manually grade","2h ago"],
            ["shield","Ravi Iyer role set to Staff","1d ago"],
            ["ban","Tomas Berg membership suspended","14d ago"]].map(([ic,lab,t])=>(
            <div className="ax-row" key={lab} style={{justifyContent:"space-between"}}>
              <span className="ax-row" style={{gap:"var(--space-2)"}}><i data-lucide={ic} style={{width:15,height:15,color:"var(--text-muted)"}}></i><span style={{fontSize:"var(--text-sm)"}}>{lab}</span></span>
              <span className="ax-mono ax-muted" style={{fontSize:"var(--text-xs)"}}>{t}</span>
            </div>
          ))}
        </div>
      </div>
    </React.Fragment>}

    {/* ===== Member editor Drawer (right sheet) ===== */}
    {drawer && <Drawer member={drawer} onClose={()=>setDrawer(null)}
      onSuspend={()=>setConfirm({kind:"suspend",member:{name:drawer.name,first:drawer.name.split(" ")[0]}})}
      onRoleChange={()=>setConfirm({kind:"role",member:{name:drawer.name,first:drawer.name.split(" ")[0]}})}/>}

    {/* ===== ConfirmDialog — suspend / role change (non-optimistic; explicit consequence) ===== */}
    {confirm && <React.Fragment>
      <div className="overlay" onClick={()=>setConfirm(null)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label={confirm.kind==="suspend"?"Suspend access":"Change role"}>
        <div className="box">
          <div className="mh"><div className="mt">{confirm.kind==="suspend"?"Suspend access?":"Change role?"}</div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setConfirm(null)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="alert warn" role="note"><i data-lucide="alert-triangle" className="lead"></i>
              <div className="ab"><span className="ax-sec">{confirm.kind==="suspend"
                ? confirm.member.first+" will be signed out immediately and can't sign in until you reactivate them."
                : "Changing "+confirm.member.first+"'s role re-provisions their access and signs them out of all sessions."} This action is logged.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setConfirm(null)}>{confirm.kind==="suspend"?"Keep active":"Cancel"}</Button>
            <Button variant="danger" leadingIcon={confirm.kind==="suspend"?"ban":"check"} onClick={()=>{setConfirm(null);setSel({});}}>{confirm.kind==="suspend"?"Suspend":"Change role"}</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
