        <button className="icon-btn" aria-label="Notifications, 3 unread"><i data-lucide="bell"></i></button>
      </header>
      <main id="main-content" className="ax-body">{children}</main>
    </div>
  </div>;
}

/* ---- KPI card (server-authoritative; render-only) ---- */
const KPI=({icon,label,value,sub,delta})=> (
  <div className="card kpi">
    <div className="lh"><i data-lucide={icon}></i><span>{label}</span></div>
    <div className="vv">{value}</div>
    {sub && <div className="sb">{sub}</div>}
    {delta && <div className={"delta "+delta.dir}><i data-lucide={delta.dir==="up"?"trending-up":"trending-down"}></i>{delta.label}</div>}
  </div>);

/* ---- status pill for tenants (icon + label, never color-only) ---- */
function TenantStatus({status}){
  if(status==="active")      return <span className="badge suc"><i data-lucide="check-circle-2"></i>Active</span>;
  if(status==="trial")       return <span className="badge inf"><i data-lucide="hourglass"></i>Trial</span>;
  if(status==="suspended")   return <span className="badge warn"><i data-lucide="pause-circle"></i>Suspended</span>;
  if(status==="expired")     return <span className="badge err"><i data-lucide="calendar-x"></i>Expired</span>;
  return <span className="badge mut"><i data-lucide="archive"></i>Deactivated</span>;
}

/* ---- sample data (cross-tenant; server-authoritative; render-only) ---- */
const TOP_TENANTS=[["Northwood Academy",312],["Brightpath School",268],["Cedar Grove",214],["Maple Ridge",176],["Lakeview Prep",131],["Oakhill",98]];
const TOP_MAX=312;
const PLANS=[["Free","s1",18,"42%"],["Starter","s2",14,"33%"],["Growth","s3",8,"19%"],["Enterprise","s4",3,"7%"]];
const ACTIVITY=[
  {ico:"building-2",cat:"Tenant created",catv:"suc",actor:"sam.avery@auto-levelup.com",tenant:"Lakeview Prep",ts:"2m ago"},
  {ico:"users",cat:"Users bulk imported",catv:"inf",actor:"a.kapoor@northwood.edu",tenant:"Northwood Academy",ts:"24m ago"},
  {ico:"pencil",cat:"Tenant updated",catv:"mut",actor:"sam.avery@auto-levelup.com",tenant:"Cedar Grove",ts:"1h ago"},
  {ico:"user-plus",cat:"User created",catv:"inf",actor:"j.morgan@brightpath.edu",tenant:"Brightpath School",ts:"3h ago"},
  {ico:"pause-circle",cat:"Tenant deactivated",catv:"warn",actor:"sam.avery@auto-levelup.com",tenant:"Oakhill",ts:"5h ago"},
  {ico:"rotate-ccw",cat:"Tenant reactivated",catv:"suc",actor:"sam.avery@auto-levelup.com",tenant:"Maple Ridge",ts:"yesterday"},
];
const RECENT_TENANTS=[
  {init:"LP",name:"Lakeview Prep",code:"LKP-0093",email:"admin@lakeview.edu",users:131,status:"active"},
  {init:"OH",name:"Oakhill",code:"OKH-0088",email:"ops@oakhill.org",users:98,status:"suspended"},
  {init:"BP",name:"Brightpath School",code:"BRP-0071",email:"admin@brightpath.edu",users:268,status:"active"},
  {init:"GS",name:"Greenfield Studio",code:"GRF-0064",email:"hello@greenfield.io",users:12,status:"trial"},
  {init:"WV",name:"Westvale College",code:"WVC-0052",email:"it@westvale.ac",users:0,status:"deactivated"},
];

function Screen(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const [signOutOpen,setSignOutOpen]=React.useState(false);
  const [refreshing,setRefreshing]=React.useState(false);
  const refresh=()=>{ setRefreshing(true); setTimeout(()=>setRefreshing(false),900); };

  return <Shell active="/" crumb={["Dashboard"]}>

    {/* Page header — h1 + signed-in role line + refresh + ghost Sign out (only mutation = ConfirmDialog) */}
    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Platform Overview</h1>
        <div className="ax-sub">Signed in as Sam Avery · Super admin</div></div>
      <div className="ac">
        <button className="icon-btn" aria-label="Refresh metrics" aria-busy={refreshing} onClick={refresh}>
          <i data-lucide="refresh-cw"></i></button>
        <Button variant="ghost" leadingIcon="log-out" onClick={()=>setSignOutOpen(true)}>Sign out</Button>
      </div>
    </div>

    {/* REGION A — KPI row (4-up). Cross-tenant totals, computed server-side by getSummary(scope:'platform'). */}
    <section aria-label="Platform totals">
      <div className="ax-grid ax-g4">
        <KPI icon="building-2" label="Total Tenants" value="43" sub="38 active · 4 trial"/>
        <KPI icon="users" label="Total Users" value="9,184" sub="Across all tenants"/>
        <KPI icon="file-check" label="Total Exams" value="1,627" sub="Across all tenants"/>
        <KPI icon="layers" label="Total Spaces" value="412" sub="Across all tenants"/>
      </div>
    </section>

    {/* REGION B — Growth & engagement (3-up). Delta = directional badge (icon + label), never color-only. */}
    <section aria-label="Growth and engagement">
      <div className="sec-label" style={{marginBottom:"var(--space-3)"}}><i data-lucide="trending-up"></i>Growth &amp; engagement</div>
      <div className="ax-grid ax-g3">
        <KPI icon="building" label="New Tenants" value="6" sub="this month" delta={{dir:"up",label:"12% vs last month"}}/>
        <KPI icon="user-check" label="Active Users (7d)" value="3,742" sub="Signed in within the last 7 days"/>
        <KPI icon="gauge" label="Engagement Rate" value="40.7%" sub="Active ÷ total users"/>
      </div>
    </section>

    {/* REGION C — Charts (2-up): Top Tenants by Users (bar) + Users by Plan (distribution). Token series + legend labels. */}
    <section aria-label="Distribution charts">
      <div className="ax-grid ax-g2">
        <div className="panel">
          <div className="ph"><span className="pt">Top Tenants by Users</span>
            <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Top 6 by user count</span></div>
          <div className="pb">
            <div className="chart" role="img" aria-label="Bar chart: top tenants by user count. Highest Northwood Academy 312 users, lowest Oakhill 98 users.">
              {TOP_TENANTS.map(([k,v])=> <div className="col" key={k}>
                <span className="vl">{v}</span><div className="bar" style={{height:Math.round(v/TOP_MAX*100)+"%"}}></div>
                <span className="xl">{k.split(" ")[0]}</span></div>)}
            </div>
            <table className="ax-sr"><caption>Top tenants by user count</caption><thead><tr><th>Tenant</th><th>Users</th></tr></thead>
              <tbody>{TOP_TENANTS.map(([k,v])=><tr key={k}><td>{k}</td><td>{v}</td></tr>)}</tbody></table>
          </div>
        </div>
        <div className="panel">
          <div className="ph"><span className="pt">Users by Plan</span>
            <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Tenant plan distribution</span></div>
          <div className="pb">
            <div className="plan-bar" role="img" aria-label="Plan distribution across tenants: Free 42 percent, Starter 33 percent, Growth 19 percent, Enterprise 7 percent.">
              {PLANS.map(([name,cls,,pct])=> <div className={"seg "+cls} key={name} style={{width:pct}}></div>)}
            </div>
            <div className="legend">
              {PLANS.map(([name,cls,n,pct])=> <div className="lg" key={name}>
                <span className={"sw "+cls}></span><span>{name}</span>
                <span className="lgn">{n}</span><span className="lgp">{pct}</span></div>)}
            </div>
            <table className="ax-sr"><caption>Tenants by plan</caption><thead><tr><th>Plan</th><th>Tenants</th><th>Share</th></tr></thead>
              <tbody>{PLANS.map(([name,,n,pct])=><tr key={name}><td>{name}</td><td>{n}</td><td>{pct}</td></tr>)}</tbody></table>
          </div>
        </div>
      </div>
    </section>

    {/* REGION D — Activity (cross-tenant audit feed) + Recent Tenants (rows name their tenant). */}
    <section aria-label="Activity and tenants">
      <div className="ax-grid ax-g2">
        <div className="panel">
          <div className="ph"><span className="pt">Recent Platform Activity</span>
            <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Cross-tenant audit log · read-only</span></div>
          <div className="pb" style={{paddingTop:"var(--space-2)",paddingBottom:"var(--space-2)"}}>
            <ul className="feed" role="list" style={{listStyle:"none",margin:0,padding:0}}>
              {ACTIVITY.map((a,i)=> <li className="it" key={i}>
                <div className="dot"><i data-lucide={a.ico}></i></div>
                <div className="ib">
                  <div className="ir"><span className="il">{a.cat}</span>
                    <span className={"badge "+a.catv}><i data-lucide="tag"></i>{a.cat.split(" ")[0]}</span></div>
                  <div className="im"><b>{a.actor}</b> · {a.tenant}</div>
                </div>
                <span className="ts">{a.ts}</span>
              </li>)}
            </ul>
          </div>
        </div>
        <div className="panel">
          <div className="ph"><span className="pt">Recent Tenants</span>
            <a className="lnk" href="#">View all →</a></div>
          <div className="pb" style={{paddingTop:"var(--space-2)",paddingBottom:"var(--space-3)"}}>
            <div className="tlist">
              {RECENT_TENANTS.map(t=> <a className="tr" href="#" key={t.code} aria-label={t.name+", "+t.users+" users, "+t.status}>
                <div className="tav">{t.init}</div>
                <div className="tb"><div className="tn">{t.name}</div>
                  <div className="tm ax-mono">{t.code} · {t.email}</div></div>
                <div className="ax-col" style={{alignItems:"flex-end",gap:"var(--space-1)"}}>
                  <span className="tu">{t.users} users</span><TenantStatus status={t.status}/></div>
              </a>)}
            </div>
          </div>
        </div>
      </div>
    </section>

    {/* REGION E — Quick actions (3-up navigational cards; read-only destinations, no confirm). */}
    <section aria-label="Quick actions">
      <div className="ax-grid ax-g3">
        <a className="card lk qa" href="#" role="button">
          <div className="qi"><i data-lucide="plus"></i></div>
          <div><div className="qt">Create Tenant</div><div className="qd">Provision a new organization</div></div>
          <span className="qg"><i data-lucide="chevron-right"></i></span></a>
        <a className="card lk qa" href="#" role="button">
          <div className="qi"><i data-lucide="activity"></i></div>
          <div><div className="qt">System Health</div><div className="qd">Monitor platform services</div></div>
          <span className="qg"><i data-lucide="chevron-right"></i></span></a>
        <a className="card lk qa" href="#" role="button">
          <div className="qi"><i data-lucide="settings"></i></div>
          <div><div className="qt">Settings</div><div className="qd">Platform configuration</div></div>
          <span className="qg"><i data-lucide="chevron-right"></i></span></a>
      </div>
    </section>

    {/* ===== Secondary stacked blocks: the spec's other §5 states (each present in markup) ===== */}
    <div className="sec-label" style={{marginTop:"var(--space-4)"}}><i data-lucide="layers-2"></i>Other states (reference)</div>

    {/* §5 Error — metrics query failed; KPIs render as — , not stale zeros. Try again refetches. */}
    <div className="alert err" role="alert">
      <i data-lucide="alert-octagon" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load platform metrics. </span>
        <span className="ax-sec">The analytics service is temporarily unavailable. KPIs show — until it recovers.</span></div>
      <span className="lnk">Try again →</span>
    </div>
    <div className="ax-grid ax-g4">
      {["Total Tenants","Total Users","Total Exams","Total Spaces"].map(l=>
        <div className="card kpi" key={l}><div className="lh"><i data-lucide="minus"></i><span>{l}</span></div>
          <div className="vv ax-muted">—</div><div className="sb ax-muted">Unavailable</div></div>)}
    </div>

    {/* §5 Partial — metrics loaded but the activity feed failed (independent queries). */}
    <div className="alert warn" role="status">
      <i data-lucide="triangle-alert" className="lead"></i>
      <div className="ab"><span className="at">Activity feed unavailable. </span>
        <span className="ax-sec">Platform metrics loaded normally; only the audit feed failed to load.</span></div>
      <span className="lnk">Retry feed →</span>
    </div>

    {/* §6 Background-refresh failure — non-blocking toast keeps last-good values. */}
    <div className="alert info" role="status">
      <i data-lucide="rotate-cw" className="lead"></i>
      <div className="ab"><span className="ax-sec">Couldn't refresh metrics — showing last known values.</span></div>
    </div>

    {/* §8 RBAC — defense-in-depth: super-admin is the only cross-tenant role; the server re-checks. */}
    <div className="alert info" role="note">
      <i data-lucide="shield-check" className="lead"></i>
      <div className="ab"><span className="at">Cross-tenant access is a privileged super-admin operation. </span>
        <span className="ax-sec">These aggregates are authorized and computed server-side; a tenant-admin never reaches this screen.</span></div>
    </div>

    {/* §5 Empty — fresh platform: charts and recent tenants replaced by an onboarding EmptyState. */}
    <div className="panel"><div className="empty">
      <div className="ei"><i data-lucide="building-2"></i></div>
      <div className="et">No tenants yet</div>
      <div className="eb">Once you provision your first organization, KPIs, charts, and the activity feed populate here.</div>
      <div className="ea"><Button variant="primary" leadingIcon="plus">Create your first tenant</Button></div>
    </div></div>

    {/* §5 Empty (quiet) — no recent activity in the feed. */}
    <div className="panel"><div className="empty quiet">
      <div className="ei"><i data-lucide="history"></i></div>
      <div className="et">No recent activity</div>
      <div className="eb">No platform activity in the last 24 hours.</div>
    </div></div>

    {/* §5 Loading — skeletons mirror the final grid (role="status"), no layout shift on resolve. */}
    <div role="status" aria-label="Loading platform overview">
      <div className="ax-grid ax-g4">
        {[0,1,2,3].map(i=> <div className="card kpi" key={i}>
          <div className="skl" style={{width:96,height:12}}></div>
          <div className="skl" style={{width:120,height:26,marginTop:"var(--space-1)"}}></div>
          <div className="skl" style={{width:140,height:12}}></div>
        </div>)}
      </div>
    </div>

    {/* ===== Sign out — the only mutation; lightweight ConfirmDialog before logout() ===== */}
    {signOutOpen && <React.Fragment>
      <div className="overlay" onClick={()=>setSignOutOpen(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label="Sign out of the control plane">
        <div className="box">
          <div className="mh"><div className="mt">Sign out of the control plane?</div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setSignOutOpen(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="alert info" role="note"><i data-lucide="log-out" className="lead"></i>
              <div className="ab"><span className="ax-sec">You'll end your super-admin session and return to the sign-in screen. Any unsaved work on other screens is not affected.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setSignOutOpen(false)}>Cancel</Button>
            <Button variant="danger" leadingIcon="log-out" onClick={()=>setSignOutOpen(false)}>Sign out</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
