<script type="text/babel">

/* ---- Reusable admin shell (tokens-only frame) ---- */

/* ---- status badge helper (icon + label, never color alone) ---- */
function StatusBadge({status}){
  if(status==="published") return <span className="sbadge pub"><i data-lucide="check-circle-2"></i>Published</span>;
  if(status==="archived") return <span className="sbadge arch"><i data-lucide="archive"></i>Archived</span>;
  return <span className="sbadge draft"><i data-lucide="circle-dashed"></i>Draft</span>;
}

/* ---- sample data (tenant: Northwood Academy — tenant isolation, no cross-tenant rows) ---- */
const SPACES = [
  {id:"spc_a1f3",title:"Algebra Foundations",subject:"Mathematics",type:"Learning",status:"published",rail:"var(--indigo-500)",desc:"Linear equations, factoring and graphing for the Year 8 algebra track.",sp:14,items:182,students:96,comp:62,classes:3,teachers:2,updated:"4d ago"},
  {id:"spc_b7c2",title:"Mechanics & Motion",subject:"Physics",type:"Practice",status:"published",rail:"var(--sky-500)",desc:"Kinematics drills and force diagrams aligned to the senior physics unit.",sp:9,items:120,students:64,comp:88,classes:2,teachers:1,updated:"1d ago"},
  {id:"spc_c4d9",title:"Organic Chemistry Primer",subject:"Chemistry",type:"Assessment",status:"draft",rail:"var(--green-500)",desc:"Reaction mechanisms and nomenclature. Awaiting first publish review.",sp:6,items:74,students:0,comp:null,classes:0,teachers:1,updated:"6h ago"},
  {id:"spc_d8e1",title:"Reading Comprehension",subject:"English",type:"Resource",status:"published",rail:"var(--marigold-500)",desc:"Passage analysis, inference practice and vocabulary in context.",sp:11,items:140,students:108,comp:45,classes:4,teachers:3,updated:"2d ago"},
  {id:"spc_e2f7",title:"World History 1900–1945",subject:"History",type:"Hybrid",status:"archived",rail:"var(--amber-500)",desc:"Interwar period and the World Wars. Retired after the curriculum refresh.",sp:8,items:96,students:31,comp:71,classes:1,teachers:1,updated:"38d ago"},
  {id:"spc_f9a4",title:"Intro to Programming",subject:"Computer Science",type:"Learning",status:"draft",rail:"var(--indigo-400)",desc:"Variables, control flow and functions in Python for absolute beginners.",sp:12,items:158,students:0,comp:null,classes:0,teachers:2,updated:"11h ago"},
];

function SpaceCard({sp, canManage, onAction, busy}){
  const [open,setOpen]=React.useState(false);
  const ref=React.useRef(null);
  React.useEffect(()=>{
    if(!open) return;
    const h=(e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h);
    return ()=>document.removeEventListener("mousedown",h);
  },[open]);
  return (
    <article className="scard" tabIndex="0" role="listitem" aria-label={sp.title+" — "+sp.status}>
      <span className="rail" style={{background:sp.rail}} aria-hidden="true"></span>
      {busy && <div className="cover"><span className="sp"><i data-lucide="loader-2"></i>Applying change…</span></div>}
      <div className="hd">
        <span className="ttl">{sp.title}</span>
        <div className="ovwrap" ref={ref}>
          <button className="ovbtn" aria-haspopup="menu" aria-expanded={open} aria-label={"Actions for "+sp.title} onClick={()=>setOpen(o=>!o)}><i data-lucide="more-horizontal"></i></button>
          {open && <div className="ovmenu" role="menu">
            <button role="menuitem" onClick={()=>setOpen(false)}><i data-lucide="external-link"></i>View in Teacher Portal</button>
            <button role="menuitem" onClick={()=>setOpen(false)}><i data-lucide="copy"></i>Copy space ID</button>
            {canManage && <><div className="osep"></div>
              {sp.status!=="published" && <button role="menuitem" onClick={()=>{setOpen(false);onAction("publish",sp);}}><i data-lucide="upload-cloud"></i>Publish</button>}
              {sp.status!=="archived" && <button role="menuitem" onClick={()=>{setOpen(false);onAction("archive",sp);}}><i data-lucide="archive"></i>Archive</button>}
              {sp.status==="archived" && <button role="menuitem" onClick={()=>{setOpen(false);onAction("restore",sp);}}><i data-lucide="rotate-ccw"></i>Restore to draft</button>}
              <button role="menuitem" onClick={()=>setOpen(false)}><i data-lucide="link"></i>Edit assignment</button></>}
          </div>}
        </div>
      </div>
      <div className="ax-row ax-wrap" style={{gap:"var(--space-2)"}}>
        <StatusBadge status={sp.status}/>
        <span className="tchip"><i data-lucide="shapes" style={{width:12,height:12}}></i>{sp.type}</span>
        <span className="tchip">{sp.subject}</span>
      </div>
      <p className="desc">{sp.desc}</p>
      <div className="div"></div>
      <div className="metrics">
        <div className="m"><span className="ml">Story points</span><span className="mv">{sp.sp}</span></div>
        <div className="m"><span className="ml">Items</span><span className="mv">{sp.items}</span></div>
        <div className="m"><span className="ml">Students</span><span className="mv">{sp.students||"—"}</span></div>
      </div>
      <div className="cmp">
        <div className="ch"><span className="cl">Avg. completion</span>
          <span className="cv">{sp.comp==null?<span className="ax-muted" title="Metrics unavailable">— No data</span>:sp.comp+"%"}</span></div>
        {sp.comp!=null
          ? <div className="btrack" role="progressbar" aria-label={"Average completion for "+sp.title} aria-valuenow={sp.comp} aria-valuemin="0" aria-valuemax="100">
              <div className={"bfill"+(sp.comp>=85?" full":"")} style={{width:sp.comp+"%"}}></div></div>
          : <div className="btrack" aria-hidden="true"></div>}
      </div>
      <div className="div"></div>
      <div className="foot">
        <span className="fi"><i data-lucide="school"></i>{sp.classes} classes</span><span className="sep"></span>
        <span className="fi"><i data-lucide="user-cog"></i>{sp.teachers} teachers</span><span className="sep"></span>
        <span className="fi"><i data-lucide="history"></i>Updated {sp.updated}</span>
      </div>
    </article>
  );
}

function SkeletonCard(){
  return <div className="skcard" aria-hidden="true">
    <div className="sk" style={{height:22,width:"70%"}}></div>
    <div className="ax-row" style={{gap:"var(--space-2)"}}><div className="sk" style={{height:18,width:76,borderRadius:"var(--radius-pill)"}}></div><div className="sk" style={{height:18,width:64,borderRadius:"var(--radius-pill)"}}></div></div>
    <div className="sk" style={{height:32,width:"100%"}}></div>
    <div className="sk" style={{height:1,width:"100%"}}></div>
    <div className="sk" style={{height:20,width:"55%"}}></div>
    <div className="sk" style={{height:8,width:"100%",borderRadius:"var(--radius-pill)"}}></div>
  </div>;
}

function TableView({rows, canManage}){
  return <div role="region" aria-label="Spaces table">
    <table className="tbl">
      <thead><tr>
        <th scope="col">Space</th><th scope="col">Status</th><th scope="col">Subject</th>
        <th scope="col" className="num">Story pts</th><th scope="col" className="num">Items</th><th scope="col" className="num">Students</th>
        <th scope="col">Avg completion</th><th scope="col" className="num">Classes</th><th scope="col">Updated</th><th scope="col"><span className="ax-sr">Actions</span></th>
      </tr></thead>
      <tbody>{rows.map(s=>(
        <tr key={s.id}>
          <td><div className="tt">{s.title}</div><span className="ax-muted" style={{fontSize:"var(--text-2xs)"}}>{s.type}</span></td>
          <td><StatusBadge status={s.status}/></td>
          <td className="ax-sec">{s.subject}</td>
          <td className="num">{s.sp}</td><td className="num">{s.items}</td><td className="num">{s.students||"—"}</td>
          <td>{s.comp==null?<span className="ax-muted">— No data</span>:<span className="minibar"><span className="bt"><span className="bf" style={{width:s.comp+"%"}}></span></span><span className="ax-mono" style={{fontSize:"var(--text-xs)"}}>{s.comp}%</span></span>}</td>
          <td className="num">{s.classes}</td>
          <td className="ax-muted" style={{fontSize:"var(--text-xs)"}}>{s.updated}</td>
          <td><button className="ovbtn" aria-label={"Actions for "+s.title}><i data-lucide="more-horizontal"></i></button></td>
        </tr>))}
      </tbody>
    </table>
  </div>;
}

const STATUS_OPTS=["All","Draft","Published","Archived"];
const TYPE_OPTS=["All","Learning","Practice","Assessment","Resource","Hybrid"];

function Screen(){
  const [view,setView]=React.useState("grid");
  const [status,setStatus]=React.useState("All");
  const [type,setType]=React.useState("All");
  const [query,setQuery]=React.useState("");
  const [readonly,setReadonly]=React.useState(false);
  const [confirm,setConfirm]=React.useState(null); // {kind, sp}
  const [busyId,setBusyId]=React.useState(null);
  const [toast,setToast]=React.useState(null);
  const canManage=!readonly;

  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  React.useEffect(()=>{ if(!toast) return; const t=setTimeout(()=>setToast(null),2600); return ()=>clearTimeout(t); },[toast]);

  const filtered = SPACES.filter(s=>
    (status==="All"||s.status===status.toLowerCase()) &&
    (type==="All"||s.type===type) &&
    (query.trim()===""||(s.title+" "+s.subject).toLowerCase().includes(query.trim().toLowerCase()))
  );
  const counts={
    total:SPACES.length,
    published:SPACES.filter(s=>s.status==="published").length,
    draft:SPACES.filter(s=>s.status==="draft").length,
    archived:SPACES.filter(s=>s.status==="archived").length,
  };
  const cleared = status==="All"&&type==="All"&&query.trim()==="";

  function requestAction(kind,sp){ setConfirm({kind,sp}); }
  function runConfirm(){
    const {kind,sp}=confirm; setConfirm(null); setBusyId(sp.id);
    setTimeout(()=>{ // server-authoritative — simulated round-trip
      setBusyId(null);
      const verb=kind==="publish"?"Published":kind==="archive"?"Archived":"Restored";
      const tail=kind==="restore"?" to draft":"";
      setToast(verb+' "'+sp.title+'"'+tail+".");
    },900);
  }
  const cfgCopy={
    publish:{t:'Publish "'+(confirm&&confirm.sp.title)+'"?',b:"Students in assigned classes will gain access to this space.",btn:"Publish",v:"primary"},
    archive:{t:'Archive "'+(confirm&&confirm.sp.title)+'"?',b:"It will be hidden from students. Existing progress and content are retained and can be restored.",btn:"Archive",v:"danger"},
    restore:{t:'Restore "'+(confirm&&confirm.sp.title)+'" to draft?',b:"It returns to draft and is removed from students until republished.",btn:"Restore",v:"primary"},
  };

  return <Shell active="/spaces" crumb={["Home","Spaces"]}>
    <div className="ax-head">
      <div className="tx">
        <h1 className="ax-h1">Learning Spaces</h1>
        <div className="ax-sub">All subject tracks across your academy · Northwood Academy</div>
      </div>
      <div className="ac">
        <button className="sel" onClick={()=>setReadonly(r=>!r)} aria-pressed={readonly} title="Preview the limited-staff (read-only) variant">
          <i data-lucide={readonly?"eye":"shield-check"}></i>{readonly?"Read-only staff view":"Tenant Admin view"}</button>
        {canManage && <Button variant="primary" leadingIcon="plus">New space</Button>}
      </div>
    </div>

    {/* RBAC note — write affordances hidden, not disabled, for limited staff */}
    {readonly && <div className="alert warn" role="status">
      <i data-lucide="lock" className="lead"></i>
      <div className="ab"><span className="at">Read-only access. </span>
        <span className="ax-sec">Your role can view spaces but not publish, archive, or reassign. Lifecycle actions are hidden, not just disabled.</span></div>
    </div>}

    {/* Toolbar — sticky */}
    <div className="tbar" role="search">
      <label className="tin">
        <i data-lucide="search"></i>
        <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search spaces by title or subject…" aria-label="Search spaces by title or subject"/>
      </label>
      <button className={"sel"+(status!=="All"?" act":"")} onClick={()=>setStatus(STATUS_OPTS[(STATUS_OPTS.indexOf(status)+1)%STATUS_OPTS.length])}>
        <span className="ax-muted">Status:</span> {status} <i data-lucide="chevron-down"></i></button>
      <button className={"sel"+(type!=="All"?" act":"")} onClick={()=>setType(TYPE_OPTS[(TYPE_OPTS.indexOf(type)+1)%TYPE_OPTS.length])}>
        <span className="ax-muted">Type:</span> {type} <i data-lucide="chevron-down"></i></button>
      <button className="sel"><span className="ax-muted">Class:</span> All <i data-lucide="chevron-down"></i></button>
      <div className="seg" role="group" aria-label="View toggle">
        <button aria-label="Grid view" aria-pressed={view==="grid"} onClick={()=>setView("grid")}><i data-lucide="layout-grid"></i></button>
        <button aria-label="Table view" aria-pressed={view==="table"} onClick={()=>setView("table")}><i data-lucide="list"></i></button>
      </div>
    </div>

    {/* Count strip — aria-live */}
    <div className="cstrip" aria-live="polite">
      {cleared
        ? <><b>{counts.total}</b> spaces<span className="dot"></span><b>{counts.published}</b> published<span className="dot"></span><b>{counts.draft}</b> draft<span className="dot"></span><b>{counts.archived}</b> archived</>
        : <><b>{filtered.length}</b> of <b>{counts.total}</b> spaces</>}
    </div>

    {/* RESULTS — success (grid or table) or filtered-empty */}
    {filtered.length===0
      ? <div className="empty">
          <div className="ei"><i data-lucide="filter-x"></i></div>
          <div className="et">No spaces match your filters</div>
          <div className="eb">Try a different status, type, or search term.</div>
          <Button variant="ghost" leadingIcon="x" onClick={()=>{setStatus("All");setType("All");setQuery("");}}>Clear filters</Button>
        </div>
      : view==="grid"
        ? <div className="ax-grid ax-g3" role="list" aria-label="Learning spaces">
            {filtered.map(s=><SpaceCard key={s.id} sp={s} canManage={canManage} busy={busyId===s.id} onAction={requestAction}/>)}
          </div>
        : <TableView rows={filtered} canManage={canManage}/>}

    {cleared && <div className="ax-row" style={{justifyContent:"center"}}>
      <Button variant="secondary" leadingIcon="chevron-down">Load more</Button>
    </div>}

    {/* ── Other spec'd states, shown as labelled reference blocks ── */}
    <div className="div" style={{height:1,background:"var(--border-subtle)",margin:"var(--space-2) 0"}}></div>
    <div className="sec-h"><span className="st">Other states</span><span className="sca">Loading · error · empty — rendered for spec coverage</span></div>

    {/* Loading skeleton grid */}
    <div>
      <div className="ax-muted" style={{fontSize:"var(--text-xs)",marginBottom:"var(--space-2)"}}>Loading (skeleton grid · aria-busy)</div>
      <div className="ax-grid ax-g3" aria-busy="true" aria-label="Loading spaces"><SkeletonCard/><SkeletonCard/><SkeletonCard/></div>
    </div>

    {/* Error */}
    <div>
      <div className="ax-muted" style={{fontSize:"var(--text-xs)",marginBottom:"var(--space-2)"}}>Error (listSpaces failed · filters persist)</div>
      <div className="alert" role="alert">
        <i data-lucide="alert-octagon" className="lead"></i>
        <div className="ab"><span className="at">Couldn't load spaces. </span>
          <span className="ax-sec">Request timed out. Check your connection and retry.</span></div>
        <Button variant="secondary" leadingIcon="refresh-cw">Retry</Button>
      </div>
    </div>

    {/* Empty — no spaces at all */}
    <div>
      <div className="ax-muted" style={{fontSize:"var(--text-xs)",marginBottom:"var(--space-2)"}}>Empty (no spaces in tenant)</div>
      <div className="empty">
        <div className="ei"><i data-lucide="layers"></i></div>
        <div className="et">No learning spaces yet</div>
        <div className="eb">Teachers create spaces in the Teacher Portal. Once published, they'll appear here for oversight.</div>
        <Button variant="secondary" leadingIcon="external-link">Open Teacher Portal</Button>
      </div>
    </div>

    {/* ConfirmDialog — lifecycle, audit-logged, explicit consequence copy */}
    {confirm && <>
      <div className="ov" onClick={()=>setConfirm(null)}></div>
      <div className="mdl" role="dialog" aria-modal="true" aria-labelledby="cfg-t">
        <div className="mbox">
          <div className="mt" id="cfg-t">{cfgCopy[confirm.kind].t}</div>
          <div className="mc">{cfgCopy[confirm.kind].b}</div>
          <div className="mc ax-muted" style={{fontSize:"var(--text-xs)"}}><i data-lucide="history" style={{width:12,height:12,verticalAlign:"-1px"}}></i> This action is recorded in the space's version history.</div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setConfirm(null)}>Cancel</Button>
            <Button variant={cfgCopy[confirm.kind].v} onClick={runConfirm}>{cfgCopy[confirm.kind].btn}</Button>
          </div>
        </div>
      </div>
    </>}

    {/* Toast */}
    {toast && <div className="toast" role="status"><i data-lucide="check-circle-2"></i>{toast}</div>}
  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
