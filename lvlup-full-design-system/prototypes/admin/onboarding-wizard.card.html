<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">

<style>
html,body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);}
#root{min-height:100vh;}
.ax-shell{display:grid;grid-template-columns:264px 1fr;min-height:100vh;}

.ax-brand{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-1) var(--space-2);}
.ax-brand .mk{width:34px;height:34px;border-radius:var(--radius-md);background:var(--brand-primary);color:var(--text-on-accent);display:grid;place-items:center;font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);}

.ax-navgrp{display:flex;flex-direction:column;gap:2px;}
.ax-navlbl{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);padding:var(--space-2) var(--space-2) var(--space-1);}

.ax-main{display:flex;flex-direction:column;min-width:0;}

.icon-btn{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}
.icon-btn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.ow-body{flex:1;overflow-y:auto;padding:var(--space-10) var(--space-8) var(--space-16);display:flex;justify-content:center;}
.ow-col{width:100%;max-width:720px;display:flex;flex-direction:column;gap:var(--space-8);}
.ow-hero{display:flex;flex-direction:column;gap:var(--space-2);}
.ow-h1{font-family:var(--font-display);font-size:var(--text-3xl);line-height:var(--leading-3xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);}

/* stepper (proposed foundation addition: Stepper) */
.stepper{display:flex;align-items:flex-start;gap:0;list-style:none;margin:0;padding:0;}
.stepper li{display:flex;align-items:center;flex:1;min-width:0;}

.snode .dot{width:32px;height:32px;border-radius:var(--radius-pill);display:grid;place-items:center;font-family:var(--font-mono);font-size:var(--text-sm);font-weight:var(--weight-semibold);border:1.5px solid var(--border-strong);background:var(--bg-inset);color:var(--text-muted);transition:background var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard),box-shadow var(--dur-instant) var(--ease-standard);}
.snode .dot i{width:16px;height:16px;}

.ow-ch{padding:var(--space-5) var(--space-6) var(--space-3);display:flex;flex-direction:column;gap:var(--space-1);}
.ow-ch h2{font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--weight-semibold);margin:0;}
.ow-ch .desc{font-size:var(--text-sm);color:var(--text-secondary);}
.ow-cc{padding:var(--space-2) var(--space-6) var(--space-5);display:flex;flex-direction:column;gap:var(--space-4);}
.ow-cf{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-6);border-top:1px solid var(--border-subtle);background:var(--bg-surface-sunken);}

.frow{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);}

.field input:focus{outline:none;border-color:var(--border-focus);box-shadow:var(--ring-focus);}

.field .ferr{display:flex;align-items:center;gap:4px;font-size:var(--text-xs);color:var(--status-error);}
.field .ferr i{width:13px;height:13px;}
.field .hint{font-size:var(--text-xs);color:var(--text-muted);}
.btn{display:inline-flex;align-items:center;gap:var(--space-2);font-family:var(--font-ui);font-size:var(--text-sm);font-weight:var(--weight-semibold);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);border:1px solid transparent;cursor:pointer;transition:background var(--dur-fast) var(--ease-standard);}
.btn i{width:16px;height:16px;}
.btn--primary{background:var(--brand-primary);color:var(--text-on-accent);}
.btn--primary:hover{background:var(--brand-primary-hover);}
.btn--secondary{background:var(--bg-surface);color:var(--text-secondary);border-color:var(--border-subtle);}
.btn--secondary:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.btn--ghost{background:none;color:var(--text-secondary);}

.btn--spark{background:var(--spark);color:var(--ink-900);box-shadow:var(--glow-spark);}

/* filedrop / swatches */
.filedrop{display:flex;flex-direction:column;align-items:center;gap:var(--space-2);padding:var(--space-6);border:1.5px dashed var(--border-strong);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-secondary);text-align:center;cursor:pointer;}
.filedrop:hover{border-color:var(--brand-primary);}
.filedrop i{width:24px;height:24px;color:var(--text-muted);}
.swatch{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);cursor:pointer;}
.swatch .sw{width:20px;height:20px;border-radius:var(--radius-sm);border:1px solid var(--border-subtle);}
.swatch .hx{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary);}
.preview{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);}
.preview .lg{width:28px;height:28px;border-radius:var(--radius-sm);display:grid;place-items:center;color:var(--text-on-accent);font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-sm);}
/* alert / banner */
.alert{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid;font-size:var(--text-sm);}
.alert i.lead{width:18px;height:18px;flex:none;margin-top:1px;}
.alert .ab{flex:1;}
.alert .at{font-weight:var(--weight-semibold);}
.alert.info{border-color:var(--status-info);background:var(--status-info-subtle);}
.alert.info i.lead{color:var(--status-info);}
.alert.error{border-color:var(--status-error);background:var(--status-error-subtle);}
.alert.error i.lead{color:var(--status-error);}
.alert.warn{border-color:var(--status-warning);background:var(--status-warning-subtle);}
.alert.warn i.lead{color:var(--status-warning);}
/* overlay */
.ovl{position:absolute;inset:0;background:color-mix(in srgb,var(--bg-surface) 72%,transparent);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--space-3);z-index:5;}
.spinner{width:26px;height:26px;border-radius:var(--radius-pill);border:2.5px solid var(--border-subtle);border-top-color:var(--brand-primary);animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* done */
.medallion{width:64px;height:64px;border-radius:var(--radius-pill);background:var(--status-success-subtle);border:1.5px solid var(--status-success);color:var(--status-success);display:grid;place-items:center;margin:0 auto;}
.medallion i{width:30px;height:30px;}
.deflist{display:grid;grid-template-columns:auto 1fr;gap:var(--space-3) var(--space-5);font-size:var(--text-sm);}
.deflist dt{color:var(--text-muted);}
.deflist dd{color:var(--text-primary);text-align:right;margin:0;}
.codebox{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);}
.codebox .cv{flex:1;font-family:var(--font-mono);font-size:var(--text-lg);font-weight:var(--weight-semibold);letter-spacing:.12em;color:var(--text-primary);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-medium);}
.badge i{width:12px;height:12px;}
.badge.suc{background:var(--status-success-subtle);color:var(--status-success);}
.badge.mut{background:var(--bg-inset);color:var(--text-muted);}
.expander{border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;}
.expander .eh{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-4);cursor:pointer;font-size:var(--text-sm);font-weight:var(--weight-medium);}
.expander .eh i{width:16px;height:16px;margin-left:auto;}
.expander .eb{padding:var(--space-2) var(--space-4) var(--space-4);border-top:1px solid var(--border-subtle);display:flex;flex-direction:column;gap:var(--space-3);}
.smallprint{font-size:var(--text-xs);color:var(--text-muted);text-align:center;}
.skel{background:var(--bg-inset);border-radius:var(--radius-sm);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.example-lbl{font-family:var(--font-mono);font-size:var(--text-2xs);text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);display:flex;align-items:center;gap:var(--space-2);margin-top:var(--space-2);}
.example-lbl::before{content:"";flex:1;height:1px;background:var(--border-subtle);}
.example-lbl::after{content:"";flex:1;height:1px;background:var(--border-subtle);}
/* modal */
.scrim{position:fixed;inset:0;background:color-mix(in srgb,var(--ink-900) 42%,transparent);display:grid;place-items:center;z-index:40;}
.dlg{width:420px;max-width:92vw;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e3);overflow:hidden;}
.dlg .dh{padding:var(--space-5) var(--space-5) var(--space-2);font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.dlg .db{padding:0 var(--space-5) var(--space-4);font-size:var(--text-sm);color:var(--text-secondary);}
.dlg .df{display:flex;justify-content:flex-end;gap:var(--space-2);padding:var(--space-3) var(--space-5);border-top:1px solid var(--border-subtle);background:var(--bg-surface-sunken);}
@media (prefers-reduced-motion: reduce){*{transition-duration:.001ms !important;animation-duration:.001ms !important;}}
</style>

<script type="text/babel">
const L = window.LvlupV0DesignSystem_5d0725 || {};

const TENANT = "Northwood Academy";
const TENANT_CODE = "NWA-0421";
const STEPS = ["School","Branding","Academic session","First class"];

/* reduced-chrome shell: dimmed sidebar + minimal topbar (no search / ⌘K / bell) */
function Shell({children}){
  const N=(icon,label)=>(<a className="ax-nav" aria-disabled="true" tabIndex={-1}><i data-lucide={icon}></i><span>{label}</span></a>);
  return <div className="ax-shell">
    <aside className="ax-side dim" aria-hidden="true">
      <div className="ax-brand"><div className="mk">L</div>
        <div><div className="nm">Auto-LevelUp</div><div className="sc">{TENANT} · Admin</div></div></div>
      <nav aria-label="Primary (locked during setup)" style={{display:"flex",flexDirection:"column",gap:"var(--space-5)"}}>
        <div className="ax-navgrp"><div className="ax-navlbl">Overview</div>{N("layout-dashboard","Dashboard")}{N("rocket","Onboarding")}</div>
        <div className="ax-navgrp"><div className="ax-navlbl">Management</div>{N("users","Users")}{N("school","Classes")}{N("file-check","Exams")}{N("layers","Spaces")}</div>
        <div className="ax-navgrp"><div className="ax-navlbl">Analytics</div>{N("bar-chart-3","Analytics")}{N("file-text","Reports")}</div>
        <div className="ax-navgrp"><div className="ax-navlbl">Configuration</div>{N("settings","Settings")}</div>
      </nav>
    </aside>
    <div className="ax-main">
      <header className="ax-top">
        <div className="ax-tident"><div className="ax-brand" style={{padding:0}}><div className="mk">L</div></div>
          <span className="nm">{TENANT}</span><span className="ax-codechip">{TENANT_CODE}</span></div>
        <div className="sp"></div>
        <button className="icon-btn" aria-label="Toggle theme"><i data-lucide="sun"></i></button>
        <div className="ax-uc"><div className="av">AK</div>
          <div><div className="nm">Anita Kapoor</div><div className="rl">Tenant Admin</div></div></div>
      </header>
      <main id="main-content" className="ow-body">{children}</main>
    </div>
  </div>;
}

function Stepper({current,completed}){
  return (<div>
    <ol className="stepper">
      {STEPS.map((lb,i)=>{
        const done=completed.includes(i), cur=i===current;
        const cls="snode"+(done?" done":"")+(cur?" cur":"")+(done?" clickable":"");
        return <li key={i}>
          <div className={cls} aria-current={cur?"step":undefined}
               title={done?("Step "+(i+1)+": "+lb+", completed"):cur?("Step "+(i+1)+": "+lb+", current"):("Step "+(i+1)+": "+lb+", upcoming")}>
            <div className="dot">{done?<i data-lucide="check"></i>:(i+1)}</div>
            <span className="lb">{lb}</span>
          </div>
          {i<STEPS.length-1 && <div className={"sconn"+(completed.includes(i)?" fill":"")}></div>}
        </li>;
      })}
    </ol>
    <div className="scount">Step {current+1} of 4 · {STEPS[current]}</div>
  </div>);
}

function Field({label,req,placeholder,hint,error,defaultValue,type}){
  const id="f-"+label.replace(/\s/g,"-").toLowerCase();
  return <div className="field">
    <label htmlFor={id}>{label}{req&&<span className="req"> *</span>}</label>
    <input id={id} type={type||"text"} placeholder={placeholder} defaultValue={defaultValue}
      className={error?"err":""} aria-required={req?"true":undefined} aria-invalid={error?"true":undefined}
      aria-describedby={error?id+"-err":undefined}/>
    {error && <div className="ferr" id={id+"-err"}><i data-lucide="alert-circle"></i>{error}</div>}
    {hint && !error && <div className="hint">{hint}</div>}
  </div>;
}

function StepSchool({errors}){
  return <>
    <Field label="School name" req placeholder="e.g. Springfield Academy" defaultValue={TENANT} error={errors.name}/>
    <Field label="Contact email" req type="email" placeholder="admin@school.edu" defaultValue="admin@northwood.edu" error={errors.email}/>
    <div className="frow">
      <Field label="Phone" placeholder="+91 98765 43210"/>
      <Field label="Website" type="url" placeholder="https://school.edu"/>
    </div>
  </>;
}
function StepBranding(){
  return <>
    <div className="alert info"><i data-lucide="info" className="lead"></i><div className="ab">
      Your brand colors style student- and parent-facing screens. The admin console keeps the standard theme.</div></div>
    <div className="field"><label>Logo</label>
      <div className="filedrop" tabIndex={0} role="button"><i data-lucide="upload-cloud"></i>
        <div>Drop a logo here, or browse</div>
        <div className="hint">PNG or SVG, up to 2 MB. Square works best.</div></div></div>
    <div className="frow">
      <div className="field"><label>Primary color</label>
        <div className="swatch"><span className="sw" style={{background:"var(--brand-primary)"}}></span><span className="hx">brand.primary</span></div></div>
      <div className="field"><label>Accent color</label>
        <div className="swatch"><span className="sw" style={{background:"var(--spark)"}}></span><span className="hx">spark</span></div></div>
    </div>
    <div className="field"><label className="ax-muted" style={{fontWeight:"var(--weight-regular)",fontSize:"var(--text-xs)"}}>Preview · student topbar</label>
      <div className="preview"><span className="lg" style={{background:"var(--brand-primary)"}}>N</span>
        <span style={{fontWeight:"var(--weight-semibold)"}}>{TENANT}</span></div></div>
  </>;
}
function StepSession({errors}){
  return <>
    <Field label="Session name" req placeholder="e.g. 2026-2027" defaultValue="2026-2027" error={errors.name}/>
    <div className="frow">
      <Field label="Start date" type="date"/>
      <Field label="End date" type="date" error={errors.end}/>
    </div>
  </>;
}
function StepClass({errors}){
  return <>
    <Field label="Class name" req placeholder="e.g. Class 10-A" error={errors.name}/>
    <div className="frow">
      <Field label="Grade" req placeholder="e.g. 10" error={errors.grade}/>
      <Field label="Section" placeholder="e.g. A"/>
    </div>
    <div className="hint ax-muted" style={{display:"flex",alignItems:"center",gap:6}}>
      <i data-lucide="link" style={{width:14,height:14}}></i>
      Auto-linked to the 2026-2027 academic session created in the previous step.</div>
  </>;
}

function Done({copied,onCopy,inviteOpen,setInviteOpen}){
  return <div className="ow-card"><div className="ow-cc" style={{padding:"var(--space-6) var(--space-6) var(--space-6)",gap:"var(--space-5)"}}>
    <div className="medallion"><i data-lucide="check"></i></div>
    <div style={{textAlign:"center"}}>
      <h2 style={{fontFamily:"var(--font-display)",fontSize:"var(--text-2xl)",fontWeight:"var(--weight-semibold)",margin:0}}>You're all set.</h2>
      <div className="ax-sec" style={{marginTop:"var(--space-2)"}}>{TENANT} is ready. Share your join code so staff and students can get in.</div>
    </div>
    <div>
      <div style={{fontSize:"var(--text-sm)",fontWeight:"var(--weight-semibold)",marginBottom:"var(--space-2)"}}>What we set up</div>
      <dl className="deflist">
        <dt>School</dt><dd>{TENANT}</dd>
        <dt>Academic session</dt><dd>2026-2027 <span className="badge suc"><i data-lucide="check"></i>Current</span></dd>
        <dt>First class</dt><dd><span className="badge mut"><i data-lucide="minus"></i>Not set up yet</span></dd>
      </dl>
      <div className="ax-muted" style={{fontSize:"var(--text-xs)",marginTop:"var(--space-2)"}}>First class — not set up yet · Add later in Settings.</div>
    </div>
    <div>
      <div style={{fontSize:"var(--text-sm)",fontWeight:"var(--weight-medium)",marginBottom:"var(--space-2)"}}>Your join code</div>
      <div className="codebox"><span className="cv">{TENANT_CODE}</span>
        <button className="icon-btn" onClick={onCopy} aria-label="Copy join code"><i data-lucide={copied?"check":"copy"}></i></button></div>
      <div className="ax-muted" style={{fontSize:"var(--text-xs)",marginTop:"var(--space-2)"}}>Staff and students enter this code on the sign-in screen to join {TENANT}.</div>
      <div aria-live="polite" className="ax-sr">{copied?"Join code copied":""}</div>
    </div>
    <div className="expander">
      <div className="eh" onClick={()=>setInviteOpen(!inviteOpen)} role="button" aria-expanded={inviteOpen}>
        <i data-lucide="user-plus" style={{width:16,height:16,marginLeft:0}}></i>Invite teachers now
        <i data-lucide={inviteOpen?"chevron-up":"chevron-down"}></i></div>
      {inviteOpen && <div className="eb">
        <div className="frow"><Field label="Name" placeholder="e.g. Ravi Menon"/><Field label="Email" type="email" placeholder="teacher@northwood.edu"/></div>
        <div style={{display:"flex",gap:"var(--space-2)"}}>
          <button className="btn btn--secondary"><i data-lucide="mail"></i>Send invite</button>
          <button className="btn btn--ghost">Skip — share the code instead</button></div>
      </div>}
    </div>
    <button className="btn btn--spark" style={{justifyContent:"center"}}><i data-lucide="arrow-right"></i>Go to dashboard</button>
  </div></div>;
}

function SkipDialog({onCancel,onConfirm}){
  return <div className="scrim" role="dialog" aria-modal="true" aria-labelledby="skd-h">
    <div className="dlg">
      <div className="dh" id="skd-h">Finish without a class?</div>
      <div className="db">You can add classes later in Management, but you'll need at least one before enrolling students.</div>
      <div className="df"><button className="btn btn--ghost" onClick={onCancel}>Cancel</button>
        <button className="btn btn--primary" onClick={onConfirm}>Finish anyway</button></div>
    </div>
  </div>;
}

function Screen(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  // resume state: School + Branding already completed; opens at Academic session
  const [step,setStep]=React.useState(2);
  const [completed,setCompleted]=React.useState([0,1]);
  const [saving,setSaving]=React.useState(false);
  const [done,setDone]=React.useState(false);
  const [copied,setCopied]=React.useState(false);
  const [inviteOpen,setInviteOpen]=React.useState(false);
  const [askSkip,setAskSkip]=React.useState(false);
  const errors={};

  const titles=[
    {h:"School information",d:"Confirm how your academy is identified across the platform."},
    {h:"Branding",d:"Add your logo and colors. These appear to your students and parents."},
    {h:"Academic session",d:"Create your current school year. Students, classes, and exams are organized under it."},
    {h:"Create your first class",d:"One class is enough to start enrolling students."},
  ];
  const isLast=step===3;

  function advance(){
    setSaving(true);
    setTimeout(()=>{ // simulates server-confirmed append to completedSteps, then advance
      setSaving(false);
      setCompleted(c=>c.includes(step)?c:[...c,step]);
      if(isLast){ setDone(true); } else { setStep(step+1); }
    },900);
  }
  function onContinue(){ if(isLast){ setAskSkip(false); advance(); } else advance(); }
  function onBack(){ if(step>0) setStep(step-1); }
  function onSkip(){ if(isLast){ setAskSkip(true); return; } setStep(step+1); }
  function onCopy(){ setCopied(true); setTimeout(()=>setCopied(false),2000); React.useEffect; }

  if(done) return <Shell>
    <div className="ow-col">
      <div className="ow-hero"><h1 className="ow-h1">Welcome to {TENANT}</h1></div>
      <Stepper current={3} completed={[0,1,2,3]}/>
      <Done copied={copied} onCopy={onCopy} inviteOpen={inviteOpen} setInviteOpen={setInviteOpen}/>
      <div className="smallprint">You can change all of this later in Settings.</div>
    </div>
  </Shell>;

  return <Shell>
    <div className="ow-col">
      <div className="ow-hero">
        <h1 className="ow-h1">Welcome to {TENANT}</h1>
        <div className="ow-sub">Let's get your academy set up — a few minutes, and you can change everything later.</div>
      </div>

      {/* RESUME state banner — completedSteps non-empty, not yet complete */}
      <div className="alert info" role="status"><i data-lucide="history" className="lead"></i>
        <div className="ab">Picking up where you left off.</div></div>

      <Stepper current={step} completed={completed}/>

      <div className="ow-card" aria-busy={saving?"true":undefined}>
        {saving && <div className="ovl" role="status"><div className="spinner"></div>
          <span className="ax-sec" style={{fontSize:"var(--text-sm)"}}>Saving…</span></div>}
        <div className="ow-ch"><h2>{titles[step].h}</h2><div className="desc">{titles[step].d}</div></div>
        <div className="ow-cc">
          {step===0 && <StepSchool errors={errors}/>}
          {step===1 && <StepBranding/>}
          {step===2 && <StepSession errors={errors}/>}
          {step===3 && <StepClass errors={errors}/>}
        </div>
        <div className="ow-cf">
          <button className="btn btn--ghost" onClick={onBack} disabled={step===0||saving}><i data-lucide="arrow-left"></i>Back</button>
          <div className="sp"></div>
          {step>0 && <button className="btn btn--secondary" onClick={onSkip} disabled={saving}>{isLast?"Skip":"Skip for now"}</button>}
          <button className="btn btn--primary" onClick={onContinue} disabled={saving}>
            {isLast?"Finish setup":"Continue"}<i data-lucide={isLast?"check":"chevron-right"}></i></button>
        </div>
      </div>

      <div className="smallprint">You can change all of this later in Settings.</div>

      {/* ──────────── Additional spec'd states (rendered as labelled examples) ──────────── */}
      <div className="example-lbl">Other states</div>

      {/* ERROR — callable rejected (VALIDATION_ERROR): banner + per-field errors */}
      <div className="ow-card">
        <div className="ow-ch"><h2 style={{fontSize:"var(--text-lg)"}}>School information</h2>
          <div className="desc">Error state · save rejected</div></div>
        <div className="ow-cc">
          <div className="alert error" role="alert"><i data-lucide="alert-triangle" className="lead"></i>
            <div className="ab"><span className="at">We couldn't save this step. </span>
              Check the highlighted fields and try again.</div></div>
          <Field label="School name" req defaultValue="" placeholder="e.g. Springfield Academy" error="Enter a school name."/>
          <Field label="Contact email" req defaultValue="admin@" error="Enter a valid contact email."/>
        </div>
      </div>

      {/* QUOTA / SUSPENDED governance banners */}
      <div className="alert warn"><i data-lucide="gauge" className="lead"></i><div className="ab">
        <span className="at">Class limit reached on the Starter plan. </span>
        Upgrade to add more classes, or continue without one for now.</div></div>
      <div className="alert error"><i data-lucide="shield-alert" className="lead"></i><div className="ab">
        <span className="at">This academy is currently suspended. </span>
        Contact your platform administrator before continuing setup.</div></div>

      {/* SUPER-ADMIN cross-tenant audited banner (tenant isolation) */}
      <div className="alert info"><i data-lucide="user-cog" className="lead"></i><div className="ab">
        You're editing {TENANT}'s onboarding as a super-admin. Changes are audited.</div></div>

      {/* LOADING skeleton — initial tenant subscription resolving */}
      <div className="ow-card">
        <div className="ow-ch"><div className="skel" style={{height:20,width:"40%"}}></div>
          <div className="skel" style={{height:13,width:"60%",marginTop:8}}></div></div>
        <div className="ow-cc">
          <div className="skel" style={{height:38}}></div>
          <div className="skel" style={{height:38}}></div>
          <div className="skel" style={{height:38,width:"60%"}}></div>
        </div>
      </div>

      {/* ALREADY-COMPLETE terminal (primary, not spark — celebration spent) */}
      <div className="ow-card"><div className="ow-cc" style={{flexDirection:"row",alignItems:"center",gap:"var(--space-4)"}}>
        <span className="badge suc"><i data-lucide="check-circle"></i>Set up</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:"var(--weight-semibold)"}}>Your academy is set up.</div>
          <div className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Join code <span className="ax-mono">{TENANT_CODE}</span></div></div>
        <button className="btn btn--primary"><i data-lucide="arrow-right"></i>Go to dashboard</button>
      </div></div>
    </div>

    {askSkip && <SkipDialog onCancel={()=>setAskSkip(false)} onConfirm={()=>{setAskSkip(false);advance();}}/>}
  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
