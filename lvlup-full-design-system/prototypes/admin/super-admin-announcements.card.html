  {id:"a3",title:"Updated data-processing policy",body:"Revised DPA terms take effect July 1. Review the updated processor list.",status:"published",audience:[{label:"All tenants",icon:"globe"}],author:"Sam Avery",sched:"Jun 18 09:00 → —"},
  {id:"a4",title:"Incident resolved — sign-in latency",body:"Elevated authentication latency on Jun 14 has been fully resolved.",status:"archived",audience:[{label:"All tenants",icon:"globe"}],author:"R. Okafor",sched:"Jun 14 11:20 → Jun 15 11:20"},
  {id:"a5",title:"Beta: parent weekly digest",body:"Opt-in weekly progress digest for parents is now in limited beta.",status:"draft",audience:[{label:"Northwood Academy",icon:"building-2"},{label:"Cedar High",icon:"building-2"}],author:"Sam Avery",sched:"—"},
];

const Th=({children,sortable,num})=> <th className={num?"num":""} scope="col" aria-sort={sortable?"none":undefined}>
  {sortable?<button type="button">{children}<i data-lucide="chevrons-up-down"></i></button>:children}</th>;

function RowActions({row,onEdit,onPublish,onArchive,onDelete,busy}){
  const [open,setOpen]=React.useState(false);
  return <div className="racts">
    {row.status==="draft" && <button className="lbtn" onClick={onEdit}><i data-lucide="pencil"></i>Edit</button>}
    {row.status==="draft" && <button className="lbtn suc" aria-busy={busy||undefined} onClick={onPublish}><i data-lucide="send"></i>Publish</button>}
    {row.status==="published" && <button className="lbtn warn" aria-busy={busy||undefined} onClick={onArchive}><i data-lucide="archive"></i>Archive</button>}
    <div style={{position:"relative"}}>
      <button className="icon-btn" aria-label="More actions" aria-haspopup="menu" aria-expanded={open} onClick={()=>setOpen(o=>!o)}><i data-lucide="more-horizontal"></i></button>
      {open && <div className="pop" role="menu" onMouseLeave={()=>setOpen(false)}>
        {row.status==="draft" && <button role="menuitem" onClick={()=>{setOpen(false);onEdit();}}><i data-lucide="pencil"></i>Edit draft</button>}
        <button role="menuitem" onClick={()=>{setOpen(false);}}><i data-lucide="copy"></i>Duplicate</button>
        <div className="sep"></div>
        <button role="menuitem" className="danger" onClick={()=>{setOpen(false);onDelete();}}><i data-lucide="trash-2"></i>Delete</button>
      </div>}
    </div>
  </div>;
}

const TABS=[["all","All"],["draft","Draft"],["published","Published"],["archived","Archived"]];

function Screen(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const [tab,setTab]=React.useState("all");
  const [compose,setCompose]=React.useState(null);   // null | {mode,row}
  const [confirm,setConfirm]=React.useState(null);    // null | {kind,row}
  const [toast,setToast]=React.useState(null);
  const [busyId,setBusyId]=React.useState(null);
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });

  const fire=(msg)=>{ setToast(msg); setTimeout(()=>setToast(null),2600); };
  const counts={all:ROWS.length,draft:ROWS.filter(r=>r.status==="draft").length,published:ROWS.filter(r=>r.status==="published").length,archived:ROWS.filter(r=>r.status==="archived").length};
  const rows=tab==="all"?ROWS:ROWS.filter(r=>r.status===tab);

  const doConfirm=()=>{
    const {kind,row}=confirm; setConfirm(null);
    setBusyId(row.id);
    setTimeout(()=>{ setBusyId(null);
      fire(kind==="publish"?"Announcement published.":kind==="archive"?"Announcement archived.":"Announcement deleted."); },650);
  };

  return <Shell active="/announcements">
    {/* scope context — platform-wide authorship, server-stamped */}
    <div className="alert info" role="note">
      <i data-lucide="globe" className="lead"></i>
      <div className="ab"><span className="at">Platform scope. </span>
        <span className="ax-sec">These notices are authored at platform scope and route to the audiences you target. Authorship, created date and status are server-stamped and audit-logged.</span></div>
    </div>

    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Platform announcements</h1>
        <div className="ax-sub">Compose and schedule platform-wide notices for tenants and staff.</div></div>
      <div className="ac">
        <button className="btn btn--spark" onClick={()=>setCompose({mode:"create"})}><i data-lucide="plus"></i>New announcement</button>
      </div>
    </div>

    {/* status tabs */}
    <div className="atabs" role="tablist" aria-label="Filter by status">
      {TABS.map(([k,lbl])=> <button key={k} role="tab" aria-selected={tab===k} className={"atab"+(tab===k?" on":"")} onClick={()=>setTab(k)}>
        {lbl}<span className="cc">{counts[k]}</span></button>)}
    </div>

    {/* PRIMARY success state — populated table */}
    <div className="panel">
      <table className="atbl">
        <thead><tr>
          <Th sortable>Title</Th><Th>Status</Th><Th>Audience</Th><Th>Author</Th><Th sortable>Schedule</Th>
          <th scope="col" className="num"><span className="ax-sr">Actions</span></th>
        </tr></thead>
        <tbody>
          {rows.map(r=> <tr key={r.id}>
            <td><div className="cell-title">{r.title}</div><div className="cell-body">{r.body}</div></td>
            <td><StatusBadge s={r.status}/></td>
            <td><div className="ax-row ax-wrap" style={{gap:"var(--space-1)"}}>
              {r.audience.map((a,i)=> <span className="chip" key={i}><i data-lucide={a.icon}></i>{a.label}</span>)}</div></td>
            <td className="ax-sec">{r.author}</td>
            <td className="ax-mono ax-sec" style={{fontSize:"var(--text-xs)"}}>{r.sched}</td>
            <td><RowActions row={r} busy={busyId===r.id}
              onEdit={()=>setCompose({mode:"edit",row:r})}
              onPublish={()=>setConfirm({kind:"publish",row:r})}
              onArchive={()=>setConfirm({kind:"archive",row:r})}
              onDelete={()=>setConfirm({kind:"delete",row:r})}/></td>
          </tr>)}
        </tbody>
      </table>
      <div className="tfoot"><span>Rows 1–{rows.length} of {rows.length}</span><span className="sp"></span>
        <button className="icon-btn" aria-label="Previous page" disabled><i data-lucide="chevron-left"></i></button>
        <button className="icon-btn" aria-label="Next page"><i data-lucide="chevron-right"></i></button></div>
    </div>

    {/* ---- secondary state examples (each spec'd §5 state present in markup) ---- */}
    <div className="ax-head" style={{marginTop:"var(--space-2)"}}>
      <div className="tx"><h2 className="ax-h1" style={{fontSize:"var(--text-lg)"}}>Other states</h2>
        <div className="ax-sub ax-muted">Loading, empty, error and permission-gated variants for review.</div></div>
    </div>

    {/* error banner — driven by error.details.code, NOT rendered as empty state */}
    <div className="alert err" role="alert">
      <i data-lucide="triangle-alert" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load announcements. </span>
        <span className="ax-sec">Too many requests — try again shortly.</span></div>
      <button className="lnk"><i data-lucide="rotate-cw" style={{width:13,height:13,verticalAlign:"-2px",marginRight:4}}></i>Retry</button>
    </div>

    <div className="ax-grid" style={{gridTemplateColumns:"1fr 1fr"}}>
      {/* loading skeleton rows */}
      <div className="panel">
        <table className="atbl">
          <thead><tr><Th>Title</Th><Th>Status</Th><Th sortable>Schedule</Th></tr></thead>
          <tbody>{[0,1,2,3,4].map(i=> <tr key={i}>
            <td><div className="sk" style={{width:"70%"}}></div><div className="sk" style={{width:"45%",marginTop:6,height:9}}></div></td>
            <td><div className="sk" style={{width:64,height:18,borderRadius:"var(--radius-pill)"}}></div></td>
            <td><div className="sk ax-mono" style={{width:96}}></div></td></tr>)}</tbody>
        </table>
      </div>
      {/* empty state */}
      <div className="panel">
        <div className="empty">
          <div className="ic"><i data-lucide="megaphone"></i></div>
          <div className="et">No platform announcements yet</div>
          <div className="eb">Compose your first platform-wide announcement to notify tenants and staff.</div>
          <button className="btn btn--spark" onClick={()=>setCompose({mode:"create"})}><i data-lucide="plus"></i>New announcement</button>
        </div>
      </div>
    </div>

    {/* permission-gated note: tenant admins never reach this surface */}
    <div className="alert info" role="note">
      <i data-lucide="shield-check" className="lead"></i>
      <div className="ab"><span className="at">Super-admin only. </span>
        <span className="ax-sec">Access to platform announcements is gated on <span className="ax-mono">isSuperAdmin</span> server-side. Tenant admins manage their own tenant-scoped announcements on a separate surface — actions they cannot perform are hidden, not merely disabled.</span></div>
    </div>

    {/* ===== compose / edit modal ===== */}
    {compose && <ComposeDialog mode={compose.mode} row={compose.row}
      onClose={()=>setCompose(null)}
      onSave={()=>{ setCompose(null); fire(compose.mode==="create"?"Draft created.":"Changes saved."); }}/>}

    {/* ===== confirm dialogs ===== */}
    {confirm && <ConfirmDialog data={confirm} onCancel={()=>setConfirm(null)} onConfirm={doConfirm}/>}

    {/* ===== toast ===== */}
    {toast && <div className="toast" role="status"><i data-lucide="check-circle"></i><span>{toast}</span></div>}
  </Shell>;
}

function ComposeDialog({mode,row,onClose,onSave}){
  const isEdit=mode==="edit";
  const [title,setTitle]=React.useState(isEdit?row.title:"");
  const [body,setBody]=React.useState(isEdit?row.body:"");
  const [scope,setScope]=React.useState("all");
  const [later,setLater]=React.useState(false);
  const [preview,setPreview]=React.useState(false);
  const titleRef=React.useRef(null);
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); titleRef.current && titleRef.current.focus(); },[]);
  React.useEffect(()=>{ const h=e=>e.key==="Escape"&&onClose(); window.addEventListener("keydown",h); return()=>window.removeEventListener("keydown",h); },[onClose]);
  const canSave=title.trim()&&body.trim();
  return <div className="scrim" onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
    <div className="dlg" role="dialog" aria-modal="true" aria-labelledby="cmp-t">
      <div className="dh"><div className="tx">
        <h2 id="cmp-t">{isEdit?"Edit announcement":"New announcement"}</h2>
        <div className="ds">{isEdit?"Update this draft.":"Saved as a draft. It reaches no one until you publish."}</div></div>
        <button className="icon-btn" aria-label="Close" onClick={onClose}><i data-lucide="x"></i></button></div>
      <div className="db">
        <div className="fld"><label htmlFor="f-title">Title <span className="req">*</span></label>
          <input id="f-title" ref={titleRef} className="in" maxLength={200} value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Scheduled maintenance window"/>
          <span className="hint">{title.length}/200</span></div>
        <div className="fld">
          <div className="ax-row" style={{justifyContent:"space-between"}}>
            <label htmlFor="f-body">Body <span className="req">*</span> <span className="ax-muted" style={{fontWeight:"var(--weight-regular)"}}>· markdown supported</span></label>
            <button className="lnk" type="button" onClick={()=>setPreview(p=>!p)}>{preview?"Edit":"Preview"}</button></div>
          {preview
            ? <div className="prev">{body||<span className="ax-muted">Nothing to preview yet.</span>}</div>
            : <textarea id="f-body" className="ta" maxLength={5000} value={body} onChange={e=>setBody(e.target.value)} placeholder="What do tenants and staff need to know?"></textarea>}
        </div>
        <div className="fld"><label htmlFor="f-aud">Audience</label>
          <select id="f-aud" className="se" value={scope} onChange={e=>setScope(e.target.value)}>
            <option value="all">All tenants</option>
            <option value="tenants">Specific tenants</option>
            <option value="role">By role</option>
          </select>
          {scope==="tenants" && <div className="ax-row ax-wrap" style={{gap:"var(--space-1)",marginTop:"var(--space-1)"}}>
            <span className="chip rm">Northwood Academy <i data-lucide="x"></i></span>
            <span className="chip rm">Cedar High <i data-lucide="x"></i></span>
            <span className="chip"><i data-lucide="plus"></i>Add tenant</span></div>}
          {scope==="role" && <div className="ax-row ax-wrap" style={{gap:"var(--space-1)",marginTop:"var(--space-1)"}}>
            <span className="chip rm">Tenant admins <i data-lucide="x"></i></span>
            <span className="chip rm">Teachers <i data-lucide="x"></i></span>
            <span className="chip"><i data-lucide="plus"></i>Add role</span></div>}
        </div>
        <div className="swrow"><div><div style={{fontWeight:"var(--weight-medium)",fontSize:"var(--text-sm)"}}>Schedule for later</div>
          <div className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Off publishes immediately when you publish.</div></div>
          <div className={"sw"+(later?" on":"")} role="switch" aria-checked={later} tabIndex="0" onClick={()=>setLater(l=>!l)}></div></div>
        <div className="dgrid">
          <div className="fld"><label htmlFor="f-pub">Publish at</label>
            <input id="f-pub" className="in ax-mono" type="text" disabled={!later} value={later?"Jun 25 2026 · 09:00":"On publish"} readOnly/></div>
          <div className="fld"><label htmlFor="f-exp">Expires at <span className="ax-muted" style={{fontWeight:"var(--weight-regular)"}}>· optional</span></label>
            <input id="f-exp" className="in ax-mono" type="text" placeholder="—" defaultValue=""/></div>
        </div>
      </div>
      <div className="df">
        <button className="btn btn--secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn--primary" disabled={!canSave} onClick={onSave}>{isEdit?"Save changes":"Create draft"}</button>
      </div>
    </div>
  </div>;
}

function ConfirmDialog({data,onCancel,onConfirm}){
  const {kind,row}=data;
  const cancelRef=React.useRef(null);
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); cancelRef.current && cancelRef.current.focus(); },[]);
  const map={
    publish:{t:"Publish announcement",b:<>This will be visible to <b>{row.audience.map(a=>a.label).join(", ")}</b> immediately. The change is audit-logged.</>,a:"Publish",cls:"btn--primary"},
    archive:{t:"Archive announcement",b:<>Archived announcements stop showing to recipients but stay in the record.</>,a:"Archive",cls:"btn--primary"},
    delete:{t:"Delete announcement",b:<>Delete <b>"{row.title}"</b>? This removes it from the platform. This can't be undone.</>,a:"Delete",cls:"btn--danger"},
  };
  const m=map[kind];
  return <div className="scrim" onMouseDown={e=>e.target===e.currentTarget&&onCancel()}>
    <div className="dlg cdlg" role="alertdialog" aria-modal="true" aria-labelledby="cf-t">
      <div className="dh"><div className="tx"><h2 id="cf-t">{m.t}</h2></div></div>
      <div className="db"><div className="ax-sec" style={{fontSize:"var(--text-sm)",lineHeight:"var(--leading-sm)"}}>{m.b}</div></div>
      <div className="df">
        <button ref={cancelRef} className="btn btn--secondary" onClick={onCancel}>Cancel</button>
        <button className={"btn "+m.cls} onClick={onConfirm}>{m.a}</button>
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
