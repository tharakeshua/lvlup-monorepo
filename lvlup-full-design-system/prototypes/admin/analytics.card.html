    <i data-lucide={icon}></i><span>{label}</span>{count!=null&&<span className="ct">{count}</span>}</a>;
}
function Shell({active,crumb,children}){
  return <div className="ax-shell">
    <aside className="ax-side">
      <div className="ax-brand"><div className="mk">L</div>
        <div><div className="nm">Auto-LevelUp</div><div className="sc">Northwood Academy · Admin</div></div></div>
      <nav aria-label="Primary" style={{display:"flex",flexDirection:"column",gap:"var(--space-5)"}}>
        <div className="ax-navgrp"><div className="ax-navlbl">Overview</div>
          <Nav icon="layout-dashboard" label="Dashboard" route="/" active={active}/>
          <Nav icon="rocket" label="Onboarding" route="/onboarding" active={active}/></div>
        <div className="ax-navgrp"><div className="ax-navlbl">Management</div>
          <Nav icon="users" label="Users" route="/users" active={active}/>
          <Nav icon="school" label="Classes" route="/classes" active={active}/>
          <Nav icon="shield-check" label="Staff & Permissions" route="/staff" active={active}/>
          <Nav icon="file-check" label="Exams" route="/exams" active={active}/>
          <Nav icon="layers" label="Spaces" route="/spaces" active={active}/>
          <Nav icon="book-open" label="Courses" route="/courses" active={active}/>
          <Nav icon="calendar-range" label="Academic Sessions" route="/academic-sessions" active={active}/>
          <Nav icon="megaphone" label="Announcements" route="/announcements" active={active}/></div>
        <div className="ax-navgrp"><div className="ax-navlbl">Analytics</div>
          <Nav icon="bar-chart-3" label="Analytics" route="/analytics" active={active}/>
          <Nav icon="file-text" label="Reports" route="/reports" active={active}/>
          <Nav icon="sparkles" label="AI Usage" route="/ai-usage" active={active}/></div>
        <div className="ax-navgrp"><div className="ax-navlbl">Configuration</div>
          <Nav icon="bell" label="Notifications" route="/notifications" active={active}/>
          <Nav icon="download" label="Data Export" route="/data-export" active={active}/>
          <Nav icon="settings" label="Settings" route="/settings" active={active}/></div>
      </nav>
      <div className="foot">
        <div className="ax-rs"><i data-lucide="building"></i><span>Switch tenant</span><i data-lucide="chevrons-up-down"></i></div>
        <div className="ax-uc"><div className="av">AK</div>
          <div><div className="nm">Anita Kapoor</div><div className="rl">Tenant Admin</div></div></div>
      </div>
    </aside>
    <div className="ax-main">
      <header className="ax-top">
        <nav className="ax-bc" aria-label="Breadcrumb">{crumb.map((c,i)=>(
          <React.Fragment key={i}>{i>0&&<i data-lucide="chevron-right" style={{width:14,height:14}}></i>}{i===crumb.length-1?<b>{c}</b>:<span>{c}</span>}</React.Fragment>))}</nav>
        <div className="sp"></div>
        {/* single-tenant context label — tenantAdmin belongs to ONE tenant, NOT a cross-tenant switcher */}
        <div className="ax-tenant"><i data-lucide="building-2"></i>Northwood Academy</div>
        <div className="ax-search"><i data-lucide="search"></i><span>Search…</span><kbd>⌘K</kbd></div>
        <button className="icon-btn" aria-label="Toggle theme"><i data-lucide="sun"></i></button>
        <button className="icon-btn" aria-label="Notifications, 3 unread"><i data-lucide="bell"></i></button>
      </header>
      <main id="main-content" className="ax-body">{children}</main>
    </div>
  </div>;
}

function ClassBarChart({title,sub,field,err,domId}){
  const max=Math.max(...CLASSES.map(c=>c[field]));
  const hi=CLASSES.reduce((a,c)=>c[field]>a[field]?c:a,CLASSES[0]);
  const lo=CLASSES.reduce((a,c)=>c[field]<a[field]?c:a,CLASSES[0]);
  const unit=field==="atRisk"?"":"%";
  return <div className="panel">
    <div className="ph"><span className="pt">{title}</span><span className="psub">{sub}</span></div>
    <div className="pb">
      <div className="chart" role="img"
        aria-label={title+". Highest "+hi.label+" "+hi[field]+unit+", lowest "+lo.label+" "+lo[field]+unit+"."}>
        {CLASSES.map(c=>(
          <div className="col" key={c.id} tabIndex="0" aria-label={c.label+", "+c[field]+unit}>
            <span className="vl">{c[field]}{unit}</span>
            <div className={"bar"+(err?" err":"")} style={{height:Math.round(c[field]/max*100)+"%"}}></div>
            <span className="xl">{c.label}</span>
          </div>))}
      </div>
      <table className="ax-sr"><caption>{title}</caption><thead><tr><th>Class</th><th>Value</th></tr></thead>
        <tbody>{CLASSES.map(c=><tr key={c.id}><td>{c.label}</td><td>{c[field]}{unit}</td></tr>)}</tbody></table>
    </div>
  </div>;
}

function Screen(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const [sel,setSel]=React.useState("10B");          // drill-down class (toggle, aria-pressed)
  const [exportOpen,setExportOpen]=React.useState(false);
  const [toast,setToast]=React.useState(null);       // null | "preparing" | "ready"
  const d=DRILL[sel];

  const doExport=(scope)=>{
    setExportOpen(false);
    setToast("preparing");
    setTimeout(()=>setToast("ready"),900);
  };
  const selectClass=(id)=> setSel(s=> s===id ? null : id);  // re-click deselects

  return <Shell active="/analytics" crumb={["Academy","Analytics"]}>

    {/* Page header */}
    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Analytics</h1>
        <div className="ax-sub">Student performance, progress, and at-risk indicators for Northwood Academy.</div></div>
      <div className="ac">
        <div className="relpos">
          <Button variant="secondary" leadingIcon="download" trailingIcon="chevron-down" onClick={()=>setExportOpen(o=>!o)}>Export</Button>
          {exportOpen && <div className="menu" role="menu">
            <div className="ml">Export report (PDF)</div>
            <button role="menuitem" onClick={()=>doExport("academy")}><i data-lucide="building-2"></i>Whole academy</button>
            <button role="menuitem" onClick={()=>doExport("class")}><i data-lucide="school"></i>Current class ({sel||"none selected"})</button>
            <div className="div"></div>
            <div className="ml" style={{textTransform:"none",letterSpacing:0}}><i data-lucide="shield" style={{width:12,height:12,verticalAlign:"-2px",marginRight:4}}></i>Audited · expires in 1 hour</div>
          </div>}
        </div>
        <button className="icon-btn" aria-label="Refresh analytics"><i data-lucide="refresh-cw"></i></button>
      </div>
    </div>

    {/* KPI ROW — 4 headline cards; values server-authoritative, labeled "as of" (§8 honest numbers) */}
    <div className="ax-grid ax-g4">
      <div className="card kpi"><div className="lh"><i data-lucide="file-check"></i><span>Avg Exam Score</span></div>
        <div className="vv">78%</div><div className="asof">as of 09:40, 20 Jun</div></div>
      <div className="card kpi"><div className="lh"><i data-lucide="layers"></i><span>Avg Space Completion</span></div>
        <div className="vv">64%</div><div className="asof">as of 09:40, 20 Jun</div></div>
      <div className="card kpi"><div className="lh"><i data-lucide="alert-triangle"></i><span>At-Risk Students</span></div>
        <div className="vv">12</div>
        <div className="sl" style={{color:"var(--status-error)"}}><i data-lucide="alert-triangle"></i><span>Needs attention</span></div></div>
      <div className="card kpi"><div className="lh"><i data-lucide="graduation-cap"></i><span>Total Students</span></div>
        <div className="vv">1,030</div><div className="asof">across 5 classes</div></div>
    </div>

    {/* CHARTS — exam performance + space completion by class */}
    <div className="ax-grid ax-g2">
      <ClassBarChart title="Exam performance by class" sub="Average exam score" field="exam"/>
      <ClassBarChart title="Space completion by class" sub="Average space completion" field="completion"/>
    </div>

    {/* AT-RISK & MASTERY */}
    <div className="ax-grid ax-g2">
      <ClassBarChart title="At-risk students by class" sub="Count of flagged students" field="atRisk" err={true}/>
      <div className="panel">
        <div className="ph"><span className="pt">Mastery distribution</span><span className="psub">1,030 story points tracked</span></div>
        <div className="pb ax-col">
          <div className="mseg" role="img" aria-label="Mastery distribution: not started 40%, in progress 38%, mastered 22%.">
            <span className="ns" style={{width:"40%"}}></span>
            <span className="ip" style={{width:"38%"}}></span>
            <span className="ms" style={{width:"22%"}}></span>
          </div>
          <div className="mleg">
            {MASTERY.map(m=>(
              <div className="li" key={m.key}>
                <span className={"dot "+m.key}></span>
                <i data-lucide={m.icon} style={{width:14,height:14,color:"var(--text-muted)"}}></i>
                <span className="ll">{m.label}</span>
                <span className="lv">{m.count} · {m.pct}%</span>
              </div>))}
          </div>
          <table className="ax-sr"><caption>Mastery distribution</caption><tbody>
            {MASTERY.map(m=><tr key={m.key}><td>{m.label}</td><td>{m.count}</td><td>{m.pct}%</td></tr>)}</tbody></table>
        </div>
      </div>
    </div>

    {/* INSIGHTS */}
    <div className="ax-col" style={{gap:"var(--space-3)"}}>
      <div className="sec-h"><span className="st">Insights</span>

              <span className="it">{n.title}</span>

        </div>))}

        <span className="sca">Select a class to view detailed analytics.</span></div>
      <div className="panel">
        <div className="ph"><span className="pt" style={{fontSize:"var(--text-sm)",marginRight:0}}>Class</span>

              <button key={c.id} className="chip" aria-pressed={sel===c.id} onClick={()=>selectClass(c.id)}>

          </div>
        </div>

        {d ? <div className="pb ax-col" style={{gap:"var(--space-5)"}}>
          {/* 4-up stat block with ProgressRing */}
          <div className="ax-grid ax-g4">
            <div className="dstat" style={{alignItems:"center",textAlign:"center"}}>
              <div className="dl">Exam Avg</div>
              <div className="ring" style={{"--pct":d.exam+"%"}}><span className="rv">{d.exam}%</span></div>
            </div>
            <div className="dstat"><div className="dl">Students</div><div className="dv">{d.students}</div></div>
            <div className="dstat"><div className="dl">At-Risk</div>
              <div className="dv" style={{color:d.atRisk>0?"var(--status-error)":"var(--status-success)"}}>{d.atRisk}</div>
              <span className={"atrisk "+(d.atRisk>0?"r":"o")} style={{alignSelf:"flex-start"}}>

            <div className="dstat"><div className="dl">Completion Rate</div><div className="dv">{d.completion}%</div></div>
          </div>

          {/* top / bottom performers */}
          <div className="ax-grid ax-g2">
            <div><div className="sec-label" style={{marginTop:0,marginBottom:"var(--space-2)"}}><i data-lucide="trophy"></i>Top performers</div>
              {d.top.map(([nm,in_,v])=>(
                <div className="prow" key={nm}><div className="av-sm">{in_}</div><span className="pn">{nm}</span><span className="pv hi">{v}%</span></div>))}
            </div>
            <div><div className="sec-label" style={{marginTop:0,marginBottom:"var(--space-2)"}}><i data-lucide="trending-down"></i>Needs improvement</div>
              {d.bottom.map(([nm,in_,v])=>(
                <div className="prow" key={nm}><div className="av-sm">{in_}</div><span className="pn">{nm}</span><span className="pv lo">{v}%</span></div>))}
            </div>
          </div>

          {/* at-risk roster — each row deep-links to /students/:id */}
          <div>
            <div className="sec-label" style={{marginTop:0,marginBottom:"var(--space-2)"}}><i data-lucide="user-x"></i>At-risk roster</div>
            <div className="ax-col" style={{gap:"var(--space-2)"}}>
              {d.roster.map(([nm,in_,roll,reasons])=>(
                <a className="rrow" key={nm} href="#" aria-label={"Open student "+nm}>
                  <div className="av-sm">{in_}</div>
                  <div><div className="rn">{nm}</div><div className="rr ax-mono">{roll}</div></div>
                  <div className="rar">
                    <span className="ax-sec" style={{fontSize:"var(--text-2xs)"}} title={reasons.join(", ")}>{reasons.join(" · ")}</span>
                    <span className="atrisk r" role="status"><i data-lucide="alert-triangle"></i>At Risk</span>
                    <i data-lucide="chevron-right" style={{width:16,height:16,color:"var(--text-muted)"}}></i>
                  </div>
                </a>))}
            </div>
          </div>
        </div>
        : <div className="empty">
            <div className="ei"><i data-lucide="mouse-pointer-click"></i></div>
            <div className="et">Select a class above to view detailed analytics</div>
            <div className="eb">Pick a class from the selector to see its top and bottom performers, completion rate, and at-risk roster.</div>
          </div>}
      </div>
    </div>

    {/* ===== Secondary stacked examples: the spec's other §5 states ===== */}
    <div className="sec-label"><i data-lucide="layers-2"></i>Other states (reference)</div>

    {/* PARTIAL — a class summary is stale / recomputing (§5 Partial · §8 honest numbers) */}
    <div className="alert info" role="status">
      <i data-lucide="clock" className="lead"></i>
      <div className="ab"><span className="at">This class summary is being recomputed — last updated 6 minutes ago. </span>
        <span className="ax-sec">Headline KPIs are labeled "as of" their snapshot time; stale values are never shown as live.</span></div>
    </div>

    {/* ERROR — query isError (§5 Error) */}
    <div className="alert err" role="alert">
      <i data-lucide="alert-circle" className="lead"></i>
      <div className="ab"><span className="at">Failed to load analytics. </span>
        <span className="ax-sec">An unexpected error occurred while loading analytics.</span></div>
      <span className="lnk">Try again →</span>
    </div>

    {/* PERMISSION-GATED — server re-checks membership; client gate never trusted alone (§5 · §8) */}
    <div className="alert err" role="alert">
      <i data-lucide="lock" className="lead"></i>
      <div className="ab"><span className="at">Analytics are restricted to academy administrators. </span>
        <span className="ax-sec">The server independently verifies your tenant-admin membership for this academy.</span></div>
    </div>

    {/* EMPTY — no insights yet (§5 Empty) */}
    <div className="panel"><div className="empty">
      <div className="ei"><i data-lucide="lightbulb"></i></div>
      <div className="et">No insights yet</div>
      <div className="eb">They appear as students complete exams and spaces.</div>
    </div></div>

    {/* LOADING skeleton — mirrors KPI + chart layout (§5 Loading) */}
    <div className="ax-grid ax-g4" aria-busy="true" aria-label="Loading analytics">
      {[0,1,2,3].map(i=>(
        <div className="card kpi" key={i}>
          <div className="skl" style={{width:120,height:11}}></div>
          <div className="skl" style={{width:84,height:26}}></div>
          <div className="skl" style={{width:96,height:10}}></div>

    <div className="ax-grid ax-g2" aria-hidden="true">
      {[0,1].map(i=>(
        <div className="panel" key={i}><div className="ph"><div className="skl" style={{width:180,height:13}}></div></div>
          <div className="pb"><div className="skl" style={{width:"100%",height:172,borderRadius:"var(--radius-md)"}}></div></div></div>))}
    </div>

    {/* Export toast (success path of the audited export side-effect) */}
    {toast && <div style={{position:"fixed",right:"var(--space-8)",bottom:"var(--space-8)",zIndex:60}}>
      {toast==="preparing"
        ? <div className="toast"><i data-lucide="loader" className="lead" style={{color:"var(--brand-primary)"}}></i>
            <span className="tt">Preparing report…</span></div>
        : <div className="toast suc"><i data-lucide="check-circle-2" className="lead"></i>
            <span className="tt">Report ready</span><span className="ta" onClick={()=>setToast(null)}>Download</span></div>}
    </div>}

  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
