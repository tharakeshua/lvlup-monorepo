          <Nav icon="settings" label="Settings" route="/settings" active={active}/></div>
      </nav>
      <div className="foot">
        <div className="ax-rs"><i data-lucide="building"></i><span>Switch tenant</span><i data-lucide="chevrons-up-down"></i></div>
        <div className="ax-uc"><div className="av">AK</div>
          <div><div className="nm">Anita Kapoor</div><div className="rl">Tenant Admin</div></div></div>
      </div>
    </aside>
    <div className="ax-main">
      <header className="ax-top">
        <nav className="ax-bc" aria-label="Breadcrumb">{crumb.map((c,i)=>(
          <React.Fragment key={i}>{i>0&&<i data-lucide="chevron-right" style={{width:14,height:14}}></i>}{i===crumb.length-1?<b>{c}</b>:<span>{c}</span>}</React.Fragment>))}</nav>
        <div className="sp"></div>
        <div className="ax-search"><i data-lucide="search"></i><span>Search…</span><kbd>⌘K</kbd></div>
        <button className="icon-btn" aria-label="Toggle theme"><i data-lucide="sun"></i></button>
        <button className="icon-btn" aria-label="Notifications, 3 unread"><i data-lucide="bell"></i></button>
      </header>
      <main id="main-content" className="ax-body">{children}</main>
    </div>
  </div>;
}

/* ---- data (server-authoritative counts; render-only) ---- */
const ROWS = [
  {id:"c1",name:"Mathematics 10A",grade:"10",section:"A",term:"T1 '26",teachers:2,students:31,status:"active"},
  {id:"c2",name:"Science 9B",grade:"9",section:"B",term:"T1 '26",teachers:1,students:28,status:"active"},
  {id:"c3",name:"English 8C",grade:"8",section:"C",term:"T1 '26",teachers:2,students:30,status:"active"},
  {id:"c4",name:"Social Studies 7A",grade:"7",section:"A",term:"T1 '26",teachers:1,students:26,status:"active"},
  {id:"c5",name:"Computer Science 11",grade:"11",section:"—",term:"T1 '26",teachers:3,students:22,status:"active"},
  {id:"c6",name:"Physics 12A",grade:"12",section:"A",term:"T1 '26",teachers:2,students:19,status:"active"},
  {id:"c7",name:"Mathematics 6B",grade:"6",section:"B",term:"T2 '25",teachers:1,students:33,status:"archived"},
];
const TEACHERS = [
  {id:"t1",name:"Rohan Mehta",meta:"Mathematics"},{id:"t2",name:"Priya Nair",meta:"Science"},
  {id:"t3",name:"David Okafor",meta:"English"},{id:"t4",name:"Lena Fischer",meta:"Comp Sci"},
  {id:"t5",name:"Sara Khan",meta:"Physics"},
];

function Cb({on}){ return <span className={"cb"+(on?" ck":"")} role="checkbox" aria-checked={on}>{on&&<i data-lucide="check"></i>}</span>; }

/* ---- entity picker (assign teachers/students) ---- */
function EntityPicker({items,selected,onToggle,searchPlaceholder}){
  return <div className="picker">
    <div className="ps"><i data-lucide="search"></i><input placeholder={searchPlaceholder} aria-label={searchPlaceholder}/></div>
    <div className="pl">{items.map(it=>{const on=selected.includes(it.id);return (
      <div className="prow" key={it.id} onClick={()=>onToggle(it.id)}><Cb on={on}/><span>{it.name}</span><span className="meta">{it.meta}</span></div>);})}</div>
  </div>;
}

/* ---- screen ---- */
function Screen(){
  const [sel,setSel] = React.useState([]);
  const [menu,setMenu] = React.useState(null);
  const [dialog,setDialog] = React.useState(null); // {kind, row}
  const [name,setName] = React.useState("");
  const [grade,setGrade] = React.useState("");
  const [picked,setPicked] = React.useState(["t1"]);
  const [busy,setBusy] = React.useState(false);

  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });

  const active = ROWS.filter(r=>r.status!=="archived"||true);
  const toggleRow = id => setSel(s=> s.includes(id)? s.filter(x=>x!==id): [...s,id]);
  const allOn = sel.length===ROWS.length;
  const toggleAll = ()=> setSel(allOn? [] : ROWS.map(r=>r.id));
  const openCreate = ()=>{ setName(""); setGrade(""); setDialog({kind:"create"}); };
  const close = ()=> setDialog(null);

  return <Shell active="/classes" crumb={["Home","Classes"]}>
    {/* QUOTA — near class limit: Create disabled + banner (server-authoritative). icon + label */}
    <div className="alert warn" role="status">
      <i data-lucide="triangle-alert" className="lead"></i>
      <div className="ab"><span className="at">You've reached your plan's class limit. </span>
        <span className="ax-sec">Contact your account owner to add more.</span></div>
      <span className="lnk">Review plan →</span>
    </div>

    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Classes &amp; Sections</h1>
        <div className="ax-sub">Manage your school's classes, sections, and cohorts.</div></div>
      <div className="ac">
        <span className="tip">
          <button className="btn btn--primary" disabled onClick={openCreate} aria-disabled="true">
            <i data-lucide="plus"></i>Create Class</button>
          <span className="tt">You've reached your plan's class limit</span>
        </span>
      </div>
    </div>

    {/* header summary KPIs — render-only */}
    <div className="ax-grid ax-g4">
      <div className="card kpi"><div className="lh"><i data-lucide="school"></i><span>Total classes</span></div><div className="vv">142</div></div>
      <div className="card kpi"><div className="lh"><i data-lucide="check-circle-2"></i><span>Active</span></div><div className="vv">137</div></div>
      <div className="card kpi"><div className="lh"><i data-lucide="archive"></i><span>Archived</span></div><div className="vv">5</div></div>
      <div className="card kpi"><div className="lh"><i data-lucide="user-x"></i><span>Unassigned</span></div><div className="vv">3</div></div>
    </div>

    {/* FILTER BAR */}
    <div className="ax-col">
      <div className="fbar">
        <div className="fsearch"><i data-lucide="search"></i><input placeholder="Search classes…" aria-label="Search classes"/></div>
        <div className="fsel" role="button"><i data-lucide="calendar-range"></i><span>All Terms</span><i data-lucide="chevron-down"></i></div>
        <div className="fsel" role="button"><i data-lucide="hash"></i><span>All Grades</span><i data-lucide="chevron-down"></i></div>
        <div className="fsel" role="button"><i data-lucide="user-round"></i><span>All Teachers</span><i data-lucide="chevron-down"></i></div>
      </div>
      <div className="fchips">
        <span className="chip">Term: T1 '26 <i data-lucide="x"></i></span>
        <span className="chip">Grade: 10 <i data-lucide="x"></i></span>
        <button className="btn btn--ghost btn--sm">Clear filters</button>
      </div>
    </div>

    {/* TABLE — success state */}
    <div className="panel">
      <table className="tbl" aria-label="Classes">
        <thead><tr>
          <th style={{width:40}}><span className="ax-sr">Select</span>
            <span onClick={toggleAll} role="checkbox" aria-checked={allOn} aria-label="Select all classes on page"><Cb on={allOn}/></span></th>
          <th><button className="sorth" aria-sort="ascending">Name <i data-lucide="chevron-up"></i></button></th>
          <th><button className="sorth" aria-sort="none">Grade <i data-lucide="chevrons-up-down"></i></button></th>
          <th><button className="sorth" aria-sort="none">Section <i data-lucide="chevrons-up-down"></i></button></th>
          <th>Term</th><th className="num">Teachers</th><th className="num">Students</th><th>Status</th>
          <th style={{width:48}}><span className="ax-sr">Actions</span></th>
        </tr></thead>
        <tbody>{ROWS.map(r=>{const on=sel.includes(r.id);return (
          <tr key={r.id} className={on?"sel":""}>
            <td><span onClick={()=>toggleRow(r.id)} role="checkbox" aria-checked={on} aria-label={"Select "+r.name}><Cb on={on}/></span></td>
            <td><a className="lnk" href="#">{r.name}</a></td>
            <td className="ax-mono">{r.grade}</td>
            <td className="ax-mono">{r.section}</td>
            <td><span className="chip">{r.term}</span></td>
            <td><span className="cell-cnt" onClick={()=>setDialog({kind:"teachers",row:r})} role="button" aria-label={r.teachers+" teachers, assign"}><i data-lucide="user-round"></i>{r.teachers}</span></td>
            <td><span className="cell-cnt" onClick={()=>setDialog({kind:"students",row:r})} role="button" aria-label={r.students+" students, enroll"}><i data-lucide="users"></i>{r.students}</span></td>
            <td>{r.status==="active"
              ? <span className="badge suc"><i data-lucide="check"></i>Active</span>
              : <span className="badge arc"><i data-lucide="archive"></i>Archived</span>}</td>
            <td style={{position:"relative"}}>
              <button className="icon-btn" aria-label={"Actions for "+r.name} onClick={()=>setMenu(menu===r.id?null:r.id)}><i data-lucide="more-horizontal"></i></button>
              {menu===r.id && <div className="menu" role="menu">
                <button onClick={()=>{setMenu(null);setName(r.name);setGrade(r.grade);setDialog({kind:"edit",row:r});}}><i data-lucide="pencil"></i>Edit</button>
                <button onClick={()=>{setMenu(null);setDialog({kind:"teachers",row:r});}}><i data-lucide="user-round"></i>Assign teachers</button>
                <button onClick={()=>{setMenu(null);setDialog({kind:"students",row:r});}}><i data-lucide="users"></i>Assign students</button>
                <button onClick={()=>setMenu(null)}><i data-lucide="external-link"></i>View detail</button>
                <hr/>
                <button className="dgr" onClick={()=>{setMenu(null);setDialog({kind:"archive",row:r});}}><i data-lucide="archive"></i>Archive</button>
              </div>}
            </td>
          </tr>);})}
        </tbody>
      </table>
      <div className="tfoot">
        <span>Rows per page</span>
        <span className="fsel" style={{padding:"2px var(--space-2)"}}><span className="ax-mono">25</span><i data-lucide="chevron-down"></i></span>
        <span className="ax-mono ax-muted">1–25 of 142</span>
        <span className="sp"></span>
        <div className="pg">
          <button className="pgb gh" aria-label="Previous page"><i data-lucide="chevron-left" style={{width:14,height:14}}></i></button>
          <button className="pgb on">1</button><button className="pgb">2</button><button className="pgb">3</button>
          <span className="pgb gh">…</span><button className="pgb">6</button>
          <button className="pgb gh" aria-label="Next page"><i data-lucide="chevron-right" style={{width:14,height:14}}></i></button>
        </div>
      </div>
    </div>

    {/* ---- SECONDARY STATE EXAMPLES (spec §5) ---- */}
    <div className="sec-h"><span className="st">Other states</span><span className="sca">Loading · empty · filtered-empty · error · partial — for reference</span></div>

    <div className="ax-grid" style={{gridTemplateColumns:"1fr 1fr"}}>
      {/* loading skeleton */}
      <div className="panel">
        <div style={{padding:"var(--space-4)"}}><div className="ax-muted" style={{fontSize:"var(--text-xs)",marginBottom:"var(--space-3)"}}>Loading (skeleton)</div>
          {[0,1,2,3].map(i=><div className="ax-row" key={i} style={{padding:"var(--space-2) 0",gap:"var(--space-4)"}}>
            <span className="sk" style={{width:16,height:16}}></span>
            <span className="sk" style={{flex:2}}></span><span className="sk" style={{flex:1}}></span>
            <span className="sk" style={{flex:1}}></span><span className="sk" style={{width:54}}></span></div>)}
        </div>
      </div>
      {/* error */}
      <div className="ax-col">
        <div className="alert err" role="alert"><i data-lucide="circle-x" className="lead"></i>
          <div className="ab"><span className="at">Couldn't load classes. </span><span className="ax-sec">The request did not complete.</span></div>
          <button className="btn btn--secondary btn--sm"><i data-lucide="rotate-cw"></i>Retry</button></div>
        {/* partial */}
        <div className="alert info" role="status"><i data-lucide="info" className="lead"></i>
          <div className="ab"><span className="at">Some teacher names couldn't load. </span><span className="ax-sec">Counts are still accurate.</span></div></div>
      </div>
    </div>

    <div className="ax-grid" style={{gridTemplateColumns:"1fr 1fr"}}>
      {/* cold-start empty */}
      <div className="empty">
        <div className="ei"><i data-lucide="school"></i></div>
        <div className="et">No classes yet</div>
        <div className="eb">Create your first class to start organizing teachers and students.</div>
        <button className="btn btn--primary"><i data-lucide="plus"></i>Create Class</button>
      </div>
      {/* filtered empty */}
      <div className="empty">
        <div className="ei"><i data-lucide="filter-x"></i></div>
        <div className="et">No classes match these filters.</div>
        <button className="btn btn--ghost">Clear filters</button>
      </div>
    </div>

    {/* RBAC note — read-only / staff variant: destructive actions hidden, not just disabled */}
    <div className="alert info" role="note"><i data-lucide="lock" className="lead"></i>
      <div className="ab"><span className="at">Staff view (read-only). </span>
        <span className="ax-sec">Create, edit, assign and archive controls are hidden without class-management permission. Drill-in stays available.</span></div></div>

    {/* ---- BULK ACTION BAR (≥1 selected) ---- */}
    {sel.length>0 && <div className="bulkbar" role="region" aria-label={sel.length+" selected"}>
      <span className="ct">{sel.length} selected</span>
      <span className="dv"></span>
      <button className="btn btn--danger btn--sm" onClick={()=>setDialog({kind:"bulkArchive"})}><i data-lucide="archive"></i>Archive Selected</button>
      <button className="btn btn--secondary btn--sm" onClick={()=>setDialog({kind:"bulkActivate"})}><i data-lucide="circle-check"></i>Activate Selected</button>
      <button className="icon-btn" aria-label="Clear selection" onClick={()=>setSel([])}><i data-lucide="x"></i></button>
    </div>}

    {/* ---- DIALOGS ---- */}
    {dialog && <div className="overlay" onClick={close}></div>}

    {dialog && (dialog.kind==="create"||dialog.kind==="edit") && <div className="modal" role="dialog" aria-modal="true" aria-label={dialog.kind==="create"?"Create Class":"Edit Class"}>
      <div className="mh"><div className="mt">{dialog.kind==="create"?"Create Class":"Edit Class"}</div>
        <div className="md">{dialog.kind==="create"?"Add a new class to your school.":"Update class details."}</div></div>
      <div className="mb">
        <div className="field"><label htmlFor="cn">Class Name <span className="req">*</span></label>
          <input id="cn" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Mathematics 10A"/></div>
        <div className="ax-grid" style={{gridTemplateColumns:"1fr 1fr"}}>
          <div className="field"><label>Grade <span className="req">*</span></label>
            <div className="selbox" tabIndex="0"><span>{grade?("Grade "+grade):"Select grade"}</span><i data-lucide="chevron-down"></i></div></div>
          <div className="field"><label>Section</label>
            <div className="selbox" tabIndex="0"><span className="ax-muted">Select section</span><i data-lucide="chevron-down"></i></div></div>
        </div>
        <div className="field"><label>Term</label>
          <div className="selbox" tabIndex="0"><span className="ax-muted">All Terms</span><i data-lucide="chevron-down"></i></div></div>
      </div>
      <div className="mf"><button className="btn btn--ghost" onClick={close}>Cancel</button>
        <button className="btn btn--primary" disabled={!name||!grade} onClick={close}>
          {dialog.kind==="create"?"Create":"Save Changes"}</button></div>
    </div>}

    {dialog && (dialog.kind==="teachers"||dialog.kind==="students") && <div className="modal" role="dialog" aria-modal="true" aria-label={dialog.kind==="teachers"?"Assign Teachers":"Assign Students"}>
      <div className="mh"><div className="mt">{dialog.kind==="teachers"?"Assign Teachers":"Assign Students"}</div>
        <div className="md">{dialog.kind==="teachers"
          ? ("Select teachers to assign to "+(dialog.row?dialog.row.name:"this class")+".")
          : ("Select students to enroll in "+(dialog.row?dialog.row.name:"this class")+".")}</div></div>
      <div className="mb">
        {dialog.kind==="teachers"
          ? <EntityPicker items={TEACHERS} selected={picked} onToggle={id=>setPicked(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id])} searchPlaceholder="Search teachers…"/>
          : <div className="picker"><div className="ps"><i data-lucide="search"></i><input placeholder="Search students…" aria-label="Search students"/></div>
              <div className="pl"><div className="empty" style={{padding:"var(--space-6)",border:"none",background:"none"}}><div className="eb">No students found.</div></div></div></div>}
        <div className="selchips">{dialog.kind==="teachers" && picked.map(id=>{const t=TEACHERS.find(x=>x.id===id);return t&&<span className="chip" key={id}>{t.name} <i data-lucide="x"></i></span>;})}</div>
      </div>
      <div className="mf"><button className="btn btn--ghost" onClick={close}>Cancel</button>
        <button className="btn btn--primary" onClick={close}>Save</button></div>
    </div>}

    {dialog && dialog.kind==="archive" && <div className="modal" role="alertdialog" aria-modal="true" aria-label="Archive class">
      <div className="mh"><div className="mt">Archive class?</div></div>
      <div className="mb"><div className="ax-sec" style={{fontSize:"var(--text-sm)"}}>
        Archive "{dialog.row?dialog.row.name:""}"? It will be hidden from active views. You can restore it later.</div></div>
      <div className="mf"><button className="btn btn--ghost" onClick={close}>Cancel</button>
        <button className="btn btn--danger" onClick={()=>{setBusy(false);close();}}><i data-lucide="archive"></i>Archive</button></div>
    </div>}

    {dialog && (dialog.kind==="bulkArchive"||dialog.kind==="bulkActivate") && <div className="modal" role="alertdialog" aria-modal="true" aria-label="Bulk status change">
      <div className="mh"><div className="mt">{dialog.kind==="bulkArchive"?("Archive "+sel.length+" class(es)?"):("Activate "+sel.length+" class(es)?")}</div></div>
      <div className="mb"><div className="ax-sec" style={{fontSize:"var(--text-sm)"}}>
        {dialog.kind==="bulkArchive"?"Archived classes are hidden from active views.":"Activated classes reappear in active views."}</div>
        <div className="ax-muted" style={{fontSize:"var(--text-xs)"}}>This action is recorded in the tenant audit log.</div></div>
      <div className="mf"><button className="btn btn--ghost" onClick={close}>Cancel</button>
        {dialog.kind==="bulkArchive"
          ? <button className="btn btn--danger" onClick={()=>{setSel([]);close();}}><i data-lucide="archive"></i>Archive</button>
          : <button className="btn btn--primary" onClick={()=>{setSel([]);close();}}><i data-lucide="circle-check"></i>Activate</button>}</div>
    </div>}
  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
