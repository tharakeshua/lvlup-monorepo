/* ---- Server-authoritative preset list (render-only) ---- */
const PRESETS=[
  {id:"p1",name:"Standard RELMS Rubric",description:"Balanced rubric for written long-answer grading.",isDefault:true,isPublic:true,
    dims:{clarity:1,accuracy:2,depth:1,grammar:0,relevance:1,critical:0},
    display:{strengths:true,key:true,priority:false}},
  {id:"p2",name:"Concise Feedback Rubric",description:"Short-form responses; rewards precision over length.",isDefault:false,isPublic:true,
    dims:{clarity:2,accuracy:1,depth:0,grammar:1,relevance:1,critical:0},
    display:{strengths:false,key:true,priority:true}},
  {id:"p3",name:"Critical Reasoning (STEM)",description:"Weights reasoning and accuracy for analytical subjects.",isDefault:false,isPublic:false,
    dims:{clarity:1,accuracy:2,depth:2,grammar:0,relevance:1,critical:3},
    display:{strengths:true,key:false,priority:true}},
  {id:"p4",name:"Language & Grammar Focus",description:"",isDefault:false,isPublic:false,legacy:true,
    dims:{clarity:1,accuracy:0,depth:0,grammar:0,relevance:0,critical:0},
    display:{strengths:false,key:false,priority:false}},
];

function DimChips({dims}){
  return <div className="dimset">
    {CATALOG.map(c=>{const w=dims[c.id]||0;const on=w>0;
      return <span key={c.id} className={"dim"+(on?"":" off")}>
        <i data-lucide={on?"check":"minus"}></i>{c.name}{on&&w!==1&&<span className="wt">{w}×</span>}</span>;})}
  </div>;
}
function Dots({display}){
  const row=(on,icon,label)=> <span className={"dot "+(on?"on":"off")}>
    <span className="pt"></span><i data-lucide={icon}></i>{label}{on?"":" off"}</span>;
  return <div className="dots">
    {row(display.strengths,"sparkle","Strengths")}
    {row(display.key,"key-round","Key takeaway")}
    {row(display.priority,"arrow-down-up","Priority sort")}
  </div>;
}

function PresetCard({p,onEdit,onDelete}){
  const enabledCount=CATALOG.filter(c=>(p.dims[c.id]||0)>0).length;
  return <article className="preset" role="group" aria-label={p.name}>
    <div className="ph">
      <div className="tt">
        <div className="nm">{p.name}
          {p.isDefault&&<span className="badge brd"><i data-lucide="star"></i>Default</span>}
          {p.isPublic&&<span className="badge suc"><i data-lucide="globe"></i>Public</span>}
          {p.legacy&&<span className="badge warn"><i data-lucide="triangle-alert"></i>Legacy rubric — re-save to update</span>}
        </div>
        {p.description&&<div className="ds">{p.description}</div>}
      </div>
      <div className="ax">
        <button className="icon-btn" aria-label="Edit preset" onClick={()=>onEdit(p)}><i data-lucide="pencil"></i></button>
        <button className="icon-btn dng" aria-label="Delete preset" onClick={()=>onDelete(p)}><i data-lucide="trash-2"></i></button>
      </div>
    </div>
    <div className="ax-col" style={{gap:"var(--space-2)"}}>
      <div className="ovl">Dimensions</div>
      <DimChips dims={p.dims}/>
      {enabledCount===0&&<div className="dot off" style={{color:"var(--status-warning)"}}>
        <i data-lucide="triangle-alert" style={{width:13,height:13}}></i>No dimensions enabled — grading will fall back to platform defaults.</div>}
    </div>
    <Dots display={p.display}/>
  </article>;
}

function SkeletonCard(){
  return <div className="preset" aria-hidden="true">
    <div className="ph"><div className="tt" style={{gap:"var(--space-2)",width:"100%"}}>
      <div className="sk" style={{height:20,width:200}}></div>
      <div className="sk" style={{height:14,width:300,borderRadius:"var(--radius-sm)"}}></div></div></div>
    <div className="dimset">{[64,72,56,80].map((w,i)=><div key={i} className="sk" style={{height:22,width:w}}></div>)}</div>
  </div>;
}

function Stepper({value,disabled,onChange}){
  return <div className={"stepper"+(disabled?" dis":"")}>
    <button type="button" aria-label="Decrease weight" disabled={disabled||value<=1} onClick={()=>onChange(Math.max(1,value-1))}>−</button>
    <span className="vv">{disabled?"–":value}</span>
    <button type="button" aria-label="Increase weight" disabled={disabled||value>=5} onClick={()=>onChange(Math.min(5,value+1))}>+</button>
  </div>;
}

function Drawer({open,editing,onClose,onSaved}){
  const blank={name:"",description:"",isDefault:false,isPublic:false,
    dims:{clarity:1,accuracy:2,depth:1,grammar:1,relevance:1,critical:0},
    display:{strengths:true,key:true,priority:false}};
  const [form,setForm]=React.useState(blank);
  const [nameErr,setNameErr]=React.useState(false);
  const [saving,setSaving]=React.useState(false);
  const [submitErr,setSubmitErr]=React.useState("");
  const nameRef=React.useRef(null);
  React.useEffect(()=>{
    if(open){
      setForm(editing?{name:editing.name,description:editing.description,isDefault:editing.isDefault,isPublic:editing.isPublic,
        dims:{...editing.dims},display:{...editing.display}}:blank);
      setNameErr(false);setSubmitErr("");setSaving(false);
      setTimeout(()=>nameRef.current&&nameRef.current.focus(),30);
    }
  },[open,editing]);
  if(!open) return null;
  const setDim=(id,w)=>setForm(f=>({...f,dims:{...f.dims,[id]:w}}));
  const toggleDim=(id)=>setForm(f=>({...f,dims:{...f.dims,[id]:(f.dims[id]||0)>0?0:1}}));
  const enabled=CATALOG.filter(c=>(form.dims[c.id]||0)>0);
  const totalW=enabled.reduce((s,c)=>s+(form.dims[c.id]||0),0)||1;
  const otherDefault=PRESETS.find(p=>p.isDefault && (!editing||p.id!==editing.id));
  const save=()=>{
    if(!form.name.trim()){setNameErr(true);nameRef.current&&nameRef.current.focus();return;}
    setSaving(true);setSubmitErr("");
    // server-authoritative, audited write via v1.identity.saveGlobalEvaluationPreset — simulate then re-read
    setTimeout(()=>{ setSaving(false); onSaved(); },650);
  };
  return <>
    <div className="scrim" onClick={()=>!saving&&onClose()}></div>
    <aside className="drawer" role="dialog" aria-modal="true" aria-labelledby="dw-title">
      <div className="dw-h">
        <div className="tt">
          <div className="ti" id="dw-title">{editing?'Edit "'+editing.name+'"':"Create preset"}</div>
          <div className="si">{editing?"Update this evaluation preset.":"Configure a reusable evaluation rubric."}</div>
        </div>
        <button className="icon-btn x" aria-label="Close" onClick={()=>!saving&&onClose()}><i data-lucide="x"></i></button>
      </div>
      <div className="dw-b">
        <div className="fld">
          <label htmlFor="f-name">Name <span className="req">*</span></label>
          <input id="f-name" ref={nameRef} value={form.name} placeholder="e.g. Standard RELMS Rubric"
            aria-invalid={nameErr} onChange={e=>{setForm(f=>({...f,name:e.target.value}));setNameErr(false);}}/>
          {nameErr&&<div className="err"><i data-lucide="alert-circle"></i>Preset name is required.</div>}
        </div>
        <div className="fld">
          <label htmlFor="f-desc">Description</label>
          <textarea id="f-desc" rows="2" placeholder="Optional — when to use this rubric"
            value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}></textarea>
        </div>

        <label className="chk"><input type="checkbox" checked={form.isDefault} onChange={e=>setForm(f=>({...f,isDefault:e.target.checked}))}/>
          <span className="ct"><span className="h">Set as default preset</span>
            <span className="s">Platform-wide fallback rubric. At most one default — server enforced.</span></span></label>
        {form.isDefault&&otherDefault&&<div className="alert warn" role="status" style={{marginTop:"calc(var(--space-2) * -1)"}}>
          <i data-lucide="info" className="lead"></i><div className="ab">This will replace "{otherDefault.name}" as the platform default.</div></div>}

        <label className="chk"><input type="checkbox" checked={form.isPublic} onChange={e=>setForm(f=>({...f,isPublic:e.target.checked}))}/>
          <span className="ct"><span className="h">Public (visible to all tenants)</span>
            <span className="s">Selectable by every tenant's grading config. Audited.</span></span></label>

        <div className="dpanel">
          <div className="pl">Display settings</div>
          <label className="chk"><input type="checkbox" checked={form.display.strengths} onChange={e=>setForm(f=>({...f,display:{...f.display,strengths:e.target.checked}}))}/>
            <span className="ct"><span className="h">Show strengths</span></span></label>
          <label className="chk"><input type="checkbox" checked={form.display.key} onChange={e=>setForm(f=>({...f,display:{...f.display,key:e.target.checked}}))}/>
            <span className="ct"><span className="h">Show key takeaway</span></span></label>
          <label className="chk"><input type="checkbox" checked={form.display.priority} onChange={e=>setForm(f=>({...f,display:{...f.display,priority:e.target.checked}}))}/>
            <span className="ct"><span className="h">Prioritize by importance</span></span></label>
        </div>

        <div className="dpanel">
          <div className="pl">Evaluation dimensions</div>
          {CATALOG.map(c=>{const w=form.dims[c.id]||0;const on=w>0;
            return <div key={c.id} className={"dimrow"+(on?"":" off")}>
              <input type="checkbox" checked={on} aria-label={"Enable "+c.name} onChange={()=>toggleDim(c.id)}/>
              <div className="nx"><span className="h">{c.name} <span className="ax-muted">— {c.description}</span></span></div>
              <Stepper value={on?w:1} disabled={!on} onChange={(nv)=>setDim(c.id,nv)}/>
            </div>;})}
          {enabled.length===0&&<div className="err" style={{color:"var(--status-warning)",fontSize:"var(--text-xs)"}}>
            <i data-lucide="triangle-alert" style={{width:12,height:12}}></i>No dimensions enabled — grading will fall back to platform defaults.</div>}
        </div>

        <div className="dpanel">
          <div className="pl">Preview · how this surfaces in results</div>
          <div className="rprev" role="img" aria-label="Rubric breakdown preview by weighted dimension">
            {enabled.length===0?<div className="ax-muted" style={{fontSize:"var(--text-sm)"}}>Enable a dimension to preview the rubric.</div>:
              enabled.map(c=><div key={c.id} className="rr">
                <span className="rl">{c.name}</span>
                <span className="rt"><span className="rf" style={{width:Math.round((form.dims[c.id]/totalW)*100)+"%"}}></span></span>
                <span className="rw">{form.dims[c.id]}×</span></div>)}
          </div>
        </div>

        {submitErr&&<div className="alert" role="alert"><i data-lucide="alert-circle" className="lead"></i>
          <div className="ab"><span className="at">Couldn't save preset. </span>{submitErr}</div></div>}
      </div>
      <div className="dw-f">
        <Button variant="ghost" disabled={saving} onClick={onClose}>Cancel</Button>
        <Button variant="primary" leadingIcon={saving?undefined:"check"} disabled={saving} onClick={save}>{saving?"Saving…":"Save preset"}</Button>
      </div>
    </aside>
  </>;
}

function ConfirmDelete({target,onClose,onConfirm}){
  const [busy,setBusy]=React.useState(false);
  const cancelRef=React.useRef(null);
  React.useEffect(()=>{ if(target){setBusy(false);setTimeout(()=>cancelRef.current&&cancelRef.current.focus(),30);} },[target]);
  if(!target) return null;
  const run=()=>{ setBusy(true); setTimeout(()=>{ setBusy(false); onConfirm(); },550); };
  return <>
    <div className="cd-scrim" onClick={()=>!busy&&onClose()}></div>
    <div className="cd" role="alertdialog" aria-modal="true" aria-labelledby="cd-title" aria-describedby="cd-body">
      <div className="ci"><i data-lucide="trash-2"></i></div>
      <div className="ct" id="cd-title">Delete preset?</div>
      <div className="cb" id="cd-body">Delete "{target.name}"? Tenants currently using it will fall back to their own rubric. This preset will be archived and hidden from new tenants.</div>
      <div className="cf">
        <Button variant="ghost" disabled={busy} onClick={onClose}><span ref={cancelRef} tabIndex={-1}>Cancel</span></Button>
        <Button variant="danger" leadingIcon={busy?undefined:"trash-2"} disabled={busy} onClick={run}>{busy?"Deleting…":"Delete"}</Button>
      </div>
    </div>
  </>;
}

function Screen(){
  const [loading,setLoading]=React.useState(false);
  const [drawer,setDrawer]=React.useState({open:false,editing:null});
  const [delTarget,setDelTarget]=React.useState(null);
  const [toast,setToast]=React.useState("");
  const [query,setQuery]=React.useState("");
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  React.useEffect(()=>{ if(toast){const t=setTimeout(()=>setToast(""),2600);return ()=>clearTimeout(t);} },[toast]);

  const rows=PRESETS.filter(p=>p.name.toLowerCase().includes(query.toLowerCase()));
  const defaults=PRESETS.filter(p=>p.isDefault).length;

  return <Shell active="/presets">
    <div className="ax-head">
      <div className="tx">
        <h1 className="ax-h1">Global Evaluation Presets</h1>
        <div className="ax-sub">Reusable AI-grading rubric presets available to every tenant. Mark one as the platform default and choose which presets are public.</div>
      </div>
      <div className="ac">
        <Button variant="primary" leadingIcon="plus" onClick={()=>setDrawer({open:true,editing:null})}>Create preset</Button>
      </div>
    </div>

    {/* List-load error state (secondary example — re-runs the read) */}
    <div className="alert" role="alert">
      <i data-lucide="alert-circle" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load evaluation presets. </span>
        <span className="ax-sec">The platform read endpoint returned an error.</span></div>
      <button className="lnk" onClick={()=>{setLoading(true);setTimeout(()=>setLoading(false),900);}}>Try again</button>
    </div>

    <div className="ax-toolbar">
      <div className="ax-inp"><i data-lucide="search"></i>
        <input placeholder="Search presets…" aria-label="Search presets" value={query} onChange={e=>setQuery(e.target.value)}/></div>
      <div className="ax-meta"><b>{PRESETS.length} presets</b> · {defaults} default</div>
    </div>

    {loading ? <div className="ax-col">{[0,1,2].map(i=><SkeletonCard key={i}/>)}</div>
      : rows.length===0 ?
        <div className="empty">
          <div className="ec"><i data-lucide="sliders-horizontal"></i></div>
          <div className="et">No global presets yet</div>
          <div className="eb">Create an evaluation preset to give tenants a consistent, ready-to-use grading rubric.</div>
          <Button variant="secondary" leadingIcon="plus" onClick={()=>setDrawer({open:true,editing:null})}>Create preset</Button>
        </div>
      : <div className="ax-col">
          {rows.map(p=><PresetCard key={p.id} p={p}
            onEdit={(pp)=>setDrawer({open:true,editing:pp})}
            onDelete={(pp)=>setDelTarget(pp)}/>)}
        </div>}

    <Drawer open={drawer.open} editing={drawer.editing}
      onClose={()=>setDrawer({open:false,editing:null})}
      onSaved={()=>{setDrawer({open:false,editing:null});setToast("Preset saved.");}}/>

    <ConfirmDelete target={delTarget}
      onClose={()=>setDelTarget(null)}
      onConfirm={()=>{setDelTarget(null);setToast("Preset deleted.");}}/>

    {toast&&<div className="toast" role="status"><i data-lucide="check-circle-2"></i>{toast}</div>}
  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
