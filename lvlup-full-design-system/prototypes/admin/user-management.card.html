          <Nav icon="sparkles" label="AI Usage" route="/ai-usage" active={active}/></div>
        <div className="ax-navgrp"><div className="ax-navlbl">Configuration</div>
          <Nav icon="bell" label="Notifications" route="/notifications" active={active}/>
          <Nav icon="download" label="Data Export" route="/data-export" active={active}/>
          <Nav icon="settings" label="Settings" route="/settings" active={active}/></div>
      </nav>
      <div className="foot">
        <div className="ax-rs"><i data-lucide="building"></i><span>Switch tenant</span><i data-lucide="chevrons-up-down"></i></div>
        <div className="ax-uc"><div className="av">AK</div>
          <div><div className="nm">Anita Kapoor</div><div className="rl">Tenant Admin</div></div></div>
      </div>
    </aside>
    <div className="ax-main">
      <header className="ax-top">
        <nav className="ax-bc" aria-label="Breadcrumb">{crumb.map((c,i)=>(
          <React.Fragment key={i}>{i>0&&<i data-lucide="chevron-right" style={{width:14,height:14}}></i>}{i===crumb.length-1?<b>{c}</b>:<span>{c}</span>}</React.Fragment>))}</nav>
        <div className="sp"></div>
        <div className="ax-search"><i data-lucide="search"></i><span>Search…</span><kbd>⌘K</kbd></div>
        <button className="icon-btn" aria-label="Toggle theme"><i data-lucide="sun"></i></button>
        <button className="icon-btn" aria-label="Notifications, 3 unread"><i data-lucide="bell"></i></button>
      </header>
      <main id="main-content" className="ax-body">{children}</main>
    </div>
  </div>;
}

/* ---- status helper: icon + label, never color-only ---- */
function StatusBadge({status}){
  if(status==="active") return <span className="badge suc"><i data-lucide="check-circle-2"></i>Active</span>;
  if(status==="archived") return <span className="badge arc"><i data-lucide="archive"></i>Archived</span>;
  return <span className="badge inv"><i data-lucide="mail"></i>Invited</span>;
}

/* ---- sample data (server-authoritative; render-only) ---- */

  {id:"t1",name:"Arjun Rao",email:"a.rao@northwood.edu",init:"AR",subjects:["Mathematics","Physics"],desig:"HOD",classes:3,status:"active"},
  {id:"t2",name:"Priya Menon",email:"p.menon@northwood.edu",init:"PM",subjects:["Biology"],desig:"Senior Teacher",classes:2,status:"active"},

];
const TABS=[
  {key:"teachers",label:"Teachers",count:24,singular:"teacher"},
  {key:"students",label:"Students",count:312,singular:"student"},
  {key:"parents",label:"Parents",count:198,singular:"parent"},
];

function RowMenu({role,status,onClose}){
  return <div className="menu" role="menu" onClick={e=>e.stopPropagation()}>
    <button role="menuitem"><i data-lucide="pencil"></i>Edit</button>
    {role!=="parents" && <button role="menuitem"><i data-lucide="layers"></i>Assign classes</button>}
    {role==="students" && <button role="menuitem"><i data-lucide="link"></i>Link parents</button>}
    {status==="invited" && <button role="menuitem"><i data-lucide="send"></i>Resend invite</button>}
    <div className="div"></div>
    {status==="archived"
      ? <button role="menuitem"><i data-lucide="undo-2"></i>Reactivate</button>
      : <button role="menuitem" className="danger"><i data-lucide="archive"></i>Archive</button>}
  </div>;
}

function Screen(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const [tab,setTab]=React.useState("teachers");
  const [sel,setSel]=React.useState({});
  const [menuId,setMenuId]=React.useState(null);
  const [createOpen,setCreateOpen]=React.useState(false);
  const [importOpen,setImportOpen]=React.useState(false);
  const [confirmOpen,setConfirmOpen]=React.useState(false);

  const meta=TABS.find(t=>t.key===tab);
  const rows = tab==="teachers"?TEACHERS : tab==="students"?STUDENTS : PARENTS;
  const switchTab=(k)=>{ setTab(k); setSel({}); setMenuId(null); };
  const toggle=(id)=>setSel(s=>({...s,[id]:!s[id]}));
  const allOn = rows.length>0 && rows.every(r=>sel[r.id]);
  const toggleAll=()=>{ const n={}; if(!allOn) rows.forEach(r=>n[r.id]=true); setSel(n); };
  const selCount=Object.values(sel).filter(Boolean).length;
  const addLabel = "Add "+meta.singular;

  return <Shell active="/users" crumb={["Home","Users"]}>

    {/* Page header */}
    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">User Management</h1>
        <div className="ax-sub">Manage teachers, students, and parents in Northwood Academy.</div></div>
      <div className="ac">
        <Button variant="secondary" leadingIcon="upload" onClick={()=>setImportOpen(true)}>Import CSV</Button>
        <Button variant="primary" leadingIcon="plus" onClick={()=>setCreateOpen(true)}>{addLabel}</Button>
      </div>
    </div>

    {/* Tabs — segmented role switch with live count pills */}
    <div className="tabs" role="tablist" aria-label="User roles">
      {TABS.map(t=>(
        <button key={t.key} role="tab" aria-selected={tab===t.key}
          aria-label={t.label+", "+t.count}
          className={"tab"+(tab===t.key?" on":"")} onClick={()=>switchTab(t.key)}>
          {t.label}<span className="pill">{t.count}</span></button>
      ))}
    </div>

    {/* Toolbar */}
    <div className="toolbar" role="search">
      <label className="tb-search"><i data-lucide="search"></i>
        <input placeholder={"Search "+meta.label.toLowerCase()+"…"} aria-label={"Search "+meta.label.toLowerCase()}/></label>
      <button className="tb-sel"><i data-lucide="filter"></i>Status: Active<i data-lucide="chevron-down"></i></button>
      {tab!=="parents" && <button className="tb-sel"><i data-lucide="school"></i>Class: All<i data-lucide="chevron-down"></i></button>}
      <button className="tb-sel"><i data-lucide="download"></i>Export view</button>
    </div>

    {/* Primary success state — DataTable */}
    <div className="tbl-wrap">
      <table className="tbl" aria-label={meta.label+" directory"}>
        <thead>
          {tab==="teachers" && <tr>
            <th style={{width:40}}><input type="checkbox" className="chk" checked={allOn} onChange={toggleAll} aria-label="Select all teachers on this page"/></th>
            <th>Name</th><th>Subjects</th><th>Designation</th><th>Classes</th><th>Status</th><th style={{width:48}}><span className="ax-sr">Actions</span></th>
          </tr>}
          {tab==="students" && <tr>
            <th style={{width:40}}><input type="checkbox" className="chk" checked={allOn} onChange={toggleAll} aria-label="Select all students on this page"/></th>
            <th>Name</th><th>Roll number</th><th>Grade</th><th>Class(es)</th><th>Parents</th><th>Status</th><th style={{width:48}}><span className="ax-sr">Actions</span></th>
          </tr>}
          {tab==="parents" && <tr>
            <th style={{width:40}}><input type="checkbox" className="chk" checked={allOn} onChange={toggleAll} aria-label="Select all parents on this page"/></th>
            <th>Name</th><th>Linked children</th><th>Status</th><th style={{width:48}}><span className="ax-sr">Actions</span></th>
          </tr>}
        </thead>
        <tbody>
          {tab==="teachers" && TEACHERS.map(r=>(
            <tr key={r.id} className={sel[r.id]?"sel":""}>
              <td><input type="checkbox" className="chk" checked={!!sel[r.id]} onChange={()=>toggle(r.id)} aria-label={"Select "+r.name}/></td>
              <td><div className="cell-name"><div className="av-sm">{r.init}</div><div><div className="nm">{r.name}</div><div className="em">{r.email}</div></div></div></td>
              <td><div className="chip-row">{r.subjects.map(s=><span className="chip" key={s}>{s}</span>)}</div></td>
              <td className="ax-sec">{r.desig}</td>
              <td><span className="cnt-pill">{r.classes}</span></td>
              <td><StatusBadge status={r.status}/></td>
              <td className="relpos" style={{textAlign:"right"}}>
                <button className="icon-btn" aria-label={"Actions for "+r.name} onClick={()=>setMenuId(menuId===r.id?null:r.id)}><i data-lucide="more-horizontal"></i></button>
                {menuId===r.id && <RowMenu role="teachers" status={r.status}/>}
              </td>
            </tr>))}
          {tab==="students" && STUDENTS.map(r=>(
            <tr key={r.id} className={sel[r.id]?"sel":""}>
              <td><input type="checkbox" className="chk" checked={!!sel[r.id]} onChange={()=>toggle(r.id)} aria-label={"Select "+r.name}/></td>
              <td><div className="cell-name"><div className="av-sm">{r.init}</div><div className="nm">{r.name}</div></div></td>
              <td className="ax-mono ax-sec">{r.roll}</td>
              <td className="ax-sec">{r.grade}</td>
              <td><div className="chip-row">{r.classes.map(c=><span className="chip" key={c}>{c}</span>)}</div></td>
              <td><span className="cnt-pill">{r.parents}</span></td>
              <td><StatusBadge status={r.status}/></td>
              <td className="relpos" style={{textAlign:"right"}}>
                <button className="icon-btn" aria-label={"Actions for "+r.name} onClick={()=>setMenuId(menuId===r.id?null:r.id)}><i data-lucide="more-horizontal"></i></button>
                {menuId===r.id && <RowMenu role="students" status={r.status}/>}
              </td>
            </tr>))}
          {tab==="parents" && PARENTS.map(r=>(
            <tr key={r.id} className={sel[r.id]?"sel":""}>
              <td><input type="checkbox" className="chk" checked={!!sel[r.id]} onChange={()=>toggle(r.id)} aria-label={"Select "+r.name}/></td>
              <td><div className="cell-name"><div className="av-sm">{r.init}</div><div><div className="nm">{r.name}</div><div className="em">{r.email}</div></div></div></td>
              <td><div className="chip-row">{r.children.map(c=><span className="chip" key={c}>{c}</span>)}</div></td>
              <td><StatusBadge status={r.status}/></td>
              <td className="relpos" style={{textAlign:"right"}}>
                <button className="icon-btn" aria-label={"Actions for "+r.name} onClick={()=>setMenuId(menuId===r.id?null:r.id)}><i data-lucide="more-horizontal"></i></button>
                {menuId===r.id && <RowMenu role="parents" status={r.status}/>}
              </td>
            </tr>))}
        </tbody>
      </table>
    </div>

    {/* Pagination */}
    <div className="pag">
      <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Showing <span className="ax-mono">1–25</span> of <span className="ax-mono">{meta.count}</span> {meta.label.toLowerCase()}</span>
      <div className="nums">
        <button className="pg" aria-label="Previous page"><i data-lucide="chevron-left" style={{width:14,height:14}}></i></button>
        <button className="pg on" aria-current="page">1</button>
        <button className="pg">2</button>
        <button className="pg">3</button>
        <button className="pg" aria-label="Next page"><i data-lucide="chevron-right" style={{width:14,height:14}}></i></button>
      </div>
      <button className="tb-sel">Rows: 25<i data-lucide="chevron-down"></i></button>
    </div>

    {/* Floating bulk action bar — appears when ≥1 row selected; destructive = confirm-then-commit */}
    {selCount>0 &&
      <div className="bulkbar" role="region" aria-live="polite" aria-label={selCount+" selected"}>
        <span className="bn">{selCount} selected</span>
        <span className="sepl"></span>
        <Button variant="danger" size="sm" leadingIcon="archive" onClick={()=>setConfirmOpen(true)}>Archive</Button>
        <Button variant="secondary" size="sm" leadingIcon="undo-2">Reactivate</Button>
        <button className="icon-btn" aria-label="Clear selection" onClick={()=>setSel({})}><i data-lucide="x"></i></button>
      </div>}

    {/* ===== Secondary stacked examples: the spec's other distinctive §5 states ===== */}
    <div className="sec-label" style={{marginTop:"var(--space-4)"}}><i data-lucide="layers-2"></i>Other states (reference)</div>

    {/* Partial import result Banner (§5 Partial) */}
    <div className="alert info" role="status">
      <i data-lucide="info" className="lead"></i>
      <div className="ab"><span className="at">Import complete — 284 imported · 12 skipped · 4 errors. </span>
        <span className="ax-sec">Successful rows were committed; failed rows were not.</span></div>
      <span className="lnk">View details →</span>
    </div>

    {/* Stale-claims propagation note (§5 / §8 rule 5) */}
    <div className="alert info" role="status">
      <i data-lucide="clock" className="lead"></i>
      <div className="ab"><span className="at">Class reassignment saved. </span>
        <span className="ax-sec">Access changes may take a moment to propagate as membership claims re-sync.</span></div>
    </div>

    {/* List-load error (§5 Error) */}
    <div className="alert err" role="alert">
      <i data-lucide="alert-octagon" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load students. </span>
        <span className="ax-sec">The directory service timed out. Your selection is preserved.</span></div>
      <span className="lnk">Retry →</span>
    </div>

    {/* Tenant-suspended read-only banner (§5 / §8 rule 8) */}
    <div className="alert warn" role="status">
      <i data-lucide="lock" className="lead"></i>
      <div className="ab"><span className="at">This academy is suspended. </span>
        <span className="ax-sec">User management is read-only until it's reactivated.</span></div>
    </div>

    {/* Permission-gated (staff.canManageUsers = false → actions hidden, not just disabled) */}
    <div className="alert info" role="status">
      <i data-lucide="eye" className="lead"></i>
      <div className="ab"><span className="at">You have view-only access to users. </span>
        <span className="ax-sec">Add, Import, Edit, Assign, Link, and bulk actions are hidden for your role.</span></div>
    </div>

    {/* Loading skeleton row example */}
    <div className="tbl-wrap" aria-busy="true" aria-label="Loading users">
      <table className="tbl"><tbody>
        {[0,1,2].map(i=>(
          <tr key={i}>
            <td style={{width:40}}><div className="skl" style={{width:16,height:16,borderRadius:"var(--radius-sm)"}}></div></td>
            <td><div className="cell-name"><div className="skl" style={{width:30,height:30,borderRadius:"var(--radius-pill)"}}></div><div className="skl" style={{width:160,height:12}}></div></div></td>
            <td><div className="skl" style={{width:120,height:12}}></div></td>
            <td><div className="skl" style={{width:80,height:12}}></div></td>
            <td><div className="skl" style={{width:48,height:12}}></div></td>
            <td><div className="skl" style={{width:64,height:18,borderRadius:"var(--radius-pill)"}}></div></td>
            <td></td>
          </tr>))}
      </tbody></table>
    </div>

    {/* Filtered-empty (distinct from true-empty; no onboarding CTA) */}
    <div className="panel"><div className="empty">
      <div className="ei"><i data-lucide="search-x"></i></div>
      <div className="et">No teachers match your filters</div>
      <div className="eb">Try a different search or clear your filters to see everyone.</div>
      <div className="ea"><Button variant="ghost" leadingIcon="x">Clear filters</Button></div>
    </div></div>

    {/* True-empty onboarding (§5 / §7) */}
    <div className="panel"><div className="empty">
      <div className="ei"><i data-lucide="user-plus"></i></div>
      <div className="et">No teachers yet</div>
      <div className="eb">Add your first teacher, or import a roster from CSV.</div>
      <div className="ea">
        <Button variant="primary" leadingIcon="plus">Add teacher</Button>
        <Button variant="secondary" leadingIcon="upload">Import CSV</Button>
      </div>
    </div></div>

    {/* ===== Create-user Modal (fields adapt by role; credentials NEVER rendered) ===== */}
    {createOpen && <React.Fragment>
      <div className="overlay" onClick={()=>setCreateOpen(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label={addLabel}>
        <div className="box">
          <div className="mh"><div><div className="mt">{addLabel}</div>
            <div className="ms">A welcome email with sign-in instructions is sent automatically.</div></div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setCreateOpen(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="g2">
              <div className="field"><label className="fl">Full name <span className="req">*</span></label><input placeholder="e.g. Arjun Rao"/></div>
              <div className="field bad"><label className="fl">Email <span className="req">*</span></label><input defaultValue="a.rao@northwood.edu"/>
                <div className="fe"><i data-lucide="alert-circle"></i>That email is already in use in this academy.</div></div>
            </div>
            {tab==="teachers" && <div className="g2">
              <div className="field"><label className="fl">Designation</label><select><option>Teacher</option><option>Senior Teacher</option><option>HOD</option></select></div>
              <div className="field"><label className="fl">Primary subject</label><select><option>Mathematics</option><option>Physics</option><option>Biology</option></select></div>
            </div>}
            {tab==="students" && <div className="g2">
              <div className="field"><label className="fl">Roll number <span className="req">*</span></label><input placeholder="NWA-2256"/>
                <div className="fh">A synthetic sign-in is generated for roll-number students.</div></div>
              <div className="field"><label className="fl">Class</label><select><option>8A</option><option>8C</option><option>7B</option></select></div>
            </div>}
            {tab==="parents" && <div className="field"><label className="fl">Link to child</label><select><option>Leah Fernandes</option><option>Omar Haddad</option></select></div>}
            <div className="alert info" role="note"><i data-lucide="shield" className="lead"></i>
              <div className="ab"><span className="ax-sec">Passwords are never shown here. The server delivers any temporary credential through a short-lived, out-of-band link.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setCreateOpen(false)}>Cancel</Button>
            <Button variant="primary" leadingIcon="check">Create {meta.singular}</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

    {/* ===== Two-phase CSV Import Dialog (FileDrop → dry-run validation) ===== */}
    {importOpen && <React.Fragment>
      <div className="overlay" onClick={()=>setImportOpen(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label={"Import "+meta.label.toLowerCase()}>
        <div className="box">
          <div className="mh"><div><div className="mt">Import {meta.label.toLowerCase()}</div>
            <div className="ms">Required columns: name, email{tab==="students"?", roll_number, class":""}. We validate before importing.</div></div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setImportOpen(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="filedrop"><i data-lucide="file-up"></i>
              <div className="ft">Drop a .csv file or browse</div>
              <div className="fhi">roster_2026.csv · 312 rows detected</div></div>
            <div className="alert warn" role="status"><i data-lucide="alert-triangle" className="lead"></i>
              <div className="ab"><span className="at">300 valid · 12 rows have errors. </span>
                <span className="ax-sec">Fix them in your CSV, or import the valid rows only.</span></div></div>
            <div className="tbl-wrap"><table className="tbl"><thead><tr><th>Row</th><th>Field</th><th>Message</th></tr></thead>
              <tbody>
                <tr><td className="ax-mono">14</td><td>email</td><td className="ax-sec">Duplicate of an existing student</td></tr>
                <tr><td className="ax-mono">29</td><td>roll_number</td><td className="ax-sec">Missing required value</td></tr>
                <tr><td className="ax-mono">57</td><td>class</td><td className="ax-sec">Class "9Z" not found in this academy</td></tr>
              </tbody></table></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setImportOpen(false)}>Cancel</Button>
            <Button variant="primary" leadingIcon="upload">Import 300 valid rows</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

    {/* ===== ConfirmDialog — bulk archive (never optimistic; explicit consequence copy) ===== */}
    {confirmOpen && <React.Fragment>
      <div className="overlay" onClick={()=>setConfirmOpen(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label="Archive selected">
        <div className="box" style={{maxWidth:440}}>
          <div className="mh"><div><div className="mt">Archive {selCount} {meta.singular}{selCount>1?"s":""}?</div></div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setConfirmOpen(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="alert warn" role="note"><i data-lucide="archive" className="lead"></i>
              <div className="ab"><span className="ax-sec">Archived {meta.singular}s are hidden from active views and lose portal access. You can reactivate them later. This action is logged.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setConfirmOpen(false)}>Cancel</Button>
            <Button variant="danger" leadingIcon="archive" onClick={()=>{setConfirmOpen(false);setSel({});}}>Archive {selCount}</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
