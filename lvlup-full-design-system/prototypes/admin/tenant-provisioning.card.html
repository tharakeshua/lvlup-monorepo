  </div>;
}

/* ---- status helper: icon + label + color, never color alone (§4 / §8) ---- */
function StatusBadge({status}){
  if(status==="active")      return <span className="badge suc"><i data-lucide="check-circle-2"></i>Active</span>;
  if(status==="trial")       return <span className="badge inf"><i data-lucide="clock"></i>Trial</span>;
  if(status==="suspended")   return <span className="badge warn"><i data-lucide="pause-circle"></i>Suspended</span>;
  if(status==="expired")     return <span className="badge err"><i data-lucide="x-circle"></i>Expired</span>;
  return <span className="badge mut"><i data-lucide="ban"></i>Deactivated</span>;
}

/* ---- sample data (server-authoritative TenantListItem projection; render-only) ---- */
const TENANTS=[
  {id:"t1",name:"Springfield High School",init:"SH",code:"SPRINGFIELD-HS",email:"admin@springfield.edu",plan:"premium",users:842,status:"active"},
  {id:"t2",name:"Riverdale Academy",init:"RA",code:"RIVERDALE",email:"head@riverdale.ac",plan:"trial",users:37,status:"trial"},
  {id:"t3",name:"Northwood Academy",init:"NW",code:"NWA-0421",email:"admin@northwood.edu",plan:"premium",users:496,status:"active"},
  {id:"t4",name:"Cedar Park Institute",init:"CP",code:"CEDARPARK",email:"ops@cedarpark.org",plan:"basic",users:118,status:"suspended"},
  {id:"t5",name:"Lakeside Collegiate",init:"LC",code:"LAKESIDE",email:"registrar@lakeside.edu",plan:"enterprise",users:2104,status:"active"},
  {id:"t6",name:"Maple Grove School",init:"MG",code:"MAPLEGROVE",email:"admin@maplegrove.edu",plan:"basic",users:64,status:"expired"},
  {id:"t7",name:"Old Harbor Prep",init:"OH",code:"OLDHARBOR",email:"info@oldharbor.edu",plan:"basic",users:0,status:"deactivated"},
];
const FILTERS=[
  {key:"all",label:"All",icon:"layout-list",count:142},
  {key:"active",label:"Active",icon:"check-circle-2",count:98},
  {key:"trial",label:"Trial",icon:"clock",count:21},
  {key:"suspended",label:"Suspended",icon:"pause-circle",count:9},
  {key:"expired",label:"Expired",icon:"x-circle",count:11},
  {key:"deactivated",label:"Deactivated",icon:"ban",count:3},
];
const COLS=[
  {key:"name",label:"Name"},{key:"code",label:"Code"},{key:"plan",label:"Plan"},
  {key:"users",label:"Users",numeric:true},{key:"status",label:"Status"},
];
const CODE_RE=/[^A-Z0-9-]/g;

function Screen(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const [filter,setFilter]=React.useState("all");
  const [query,setQuery]=React.useState("");
  const [sort,setSort]=React.useState({key:"users",dir:"desc"});
  const [createOpen,setCreateOpen]=React.useState(false);
  // create form state
  const [name,setName]=React.useState("");
  const [code,setCode]=React.useState("");
  const [email,setEmail]=React.useState("");
  const [person,setPerson]=React.useState("");
  const [plan,setPlan]=React.useState("trial");
  const [codeErr,setCodeErr]=React.useState(false);
  const [pending,setPending]=React.useState(false);

  // client-side filter/search/sort over the render-only projection (server is authoritative in prod)
  let rows=TENANTS.filter(r=>filter==="all"||r.status===filter);
  if(query.trim()){const q=query.toLowerCase();rows=rows.filter(r=>r.name.toLowerCase().includes(q)||r.code.toLowerCase().includes(q)||r.email.toLowerCase().includes(q));}
  rows=[...rows].sort((a,b)=>{const av=a[sort.key],bv=b[sort.key];const c=typeof av==="number"?av-bv:String(av).localeCompare(String(bv));return sort.dir==="asc"?c:-c;});

  const toggleSort=(k)=>setSort(s=>s.key===k?{key:k,dir:s.dir==="asc"?"desc":"asc"}:{key:k,dir:"asc"});
  const ariaSort=(k)=>sort.key!==k?"none":(sort.dir==="asc"?"ascending":"descending");
  const onCode=(e)=>{const v=e.target.value.toUpperCase().replace(CODE_RE,"");setCode(v);setCodeErr(false);};
  const closeCreate=()=>{setCreateOpen(false);setPending(false);setCodeErr(false);};
  const submit=()=>{
    setPending(true);
    // simulated transactional create: a known taken code surfaces the inline clash error (§6)
    setTimeout(()=>{ if(code==="RIVERDALE"){setPending(false);setCodeErr(true);} else { closeCreate(); } },650);
  };

  return <Shell active="/tenants" crumb={["Platform","Tenants"]}>

    {/* Degraded-platform notice (§5 Partial · read-only of platform config; create stays enabled) */}
    <div className="alert warn" role="status">
      <i data-lucide="server-cog" className="lead"></i>
      <div className="ab"><span className="at">Scheduled maintenance window 02:00–03:00 UTC. </span>
        <span className="ax-sec">Provisioning remains available; some analytics rollups may lag.</span></div>
    </div>

    {/* Page header */}
    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Tenants</h1>
        <div className="ax-sub">Provision and manage every organization on the platform.</div></div>
      <div className="ac">
        <Button variant="primary" leadingIcon="plus" onClick={()=>setCreateOpen(true)}>Create tenant</Button>
      </div>
    </div>

    {/* Optional header KPI strip (§4 proposed — pure composition, server-authoritative counts) */}
    <div className="ax-grid ax-g4">
      <div className="kpi"><div className="lh"><i data-lucide="building-2"></i><span>Total tenants</span></div><div className="vv">142</div></div>
      <div className="kpi"><div className="lh"><i data-lucide="check-circle-2"></i><span>Active</span></div><div className="vv">98</div></div>
      <div className="kpi"><div className="lh"><i data-lucide="clock"></i><span>Trial</span></div><div className="vv">21</div></div>
      <div className="kpi"><div className="lh"><i data-lucide="pause-circle"></i><span>Suspended</span></div><div className="vv">9</div></div>
    </div>

    {/* Toolbar — search (grows) + segmented status filter as a radiogroup */}
    <div className="toolbar">
      <label className="tb-search" role="search"><i data-lucide="search"></i>
        <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search by name, code, or email…" aria-label="Search tenants by name, code, or email"/></label>
      <div className="seg" role="radiogroup" aria-label="Filter by status">
        {FILTERS.map(f=>(
          <button key={f.key} role="radio" aria-checked={filter===f.key}
            className={filter===f.key?"on":""} onClick={()=>setFilter(f.key)}>
            <i data-lucide={f.icon}></i>{f.label}<span className="ct">{f.count}</span></button>
        ))}
      </div>
    </div>

    {/* PRIMARY SUCCESS STATE — sortable, server-paginated tenant table */}
    {rows.length>0 ? (
    <div className="tbl-wrap">
      <table className="tbl" aria-label="Tenants directory">
        <thead><tr>
          {COLS.map(c=>(
            <th key={c.key} aria-sort={ariaSort(c.key)} style={c.numeric?{textAlign:"right"}:null}>
              <button onClick={()=>toggleSort(c.key)} aria-label={"Sort by "+c.label}>
                {c.label}
                <i data-lucide={sort.key!==c.key?"chevrons-up-down":(sort.dir==="asc"?"chevron-up":"chevron-down")}></i>
              </button>
            </th>))}
          <th style={{width:72,textAlign:"right"}}><span className="ax-sr">Actions</span></th>
        </tr></thead>
        <tbody>
          {rows.map(r=>(
            <tr key={r.id}>
              <td><div className="cell-name"><div className="av-sm">{r.init}</div>
                <div><div className="nm">{r.name}</div><div className="em">{r.email}</div></div></div></td>
              <td><span className="code-chip">{r.code}</span></td>
              <td><span className="plan-chip">{r.plan}</span></td>
              <td className="ax-mono" style={{textAlign:"right"}}>{r.users.toLocaleString()}</td>
              <td><StatusBadge status={r.status}/></td>
              <td style={{textAlign:"right"}}>
                <a className="view" href="#" aria-label={"View "+r.name}>View<i data-lucide="arrow-up-right"></i></a>
              </td>
            </tr>))}
        </tbody>
      </table>
      {/* Pagination — server-cursor mode */}
      <div className="pag">
        <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Showing <span className="ax-mono">1–{rows.length}</span> of <span className="ax-mono">142</span></span>
        <div className="nums">
          <button className="pg" aria-label="Previous page"><i data-lucide="chevron-left" style={{width:14,height:14}}></i></button>
          <button className="pg on" aria-current="page">1</button>
          <button className="pg">2</button>
          <button className="pg">3</button>
          <span className="ax-muted ax-mono" style={{fontSize:"var(--text-xs)",padding:"0 4px"}}>…</span>
          <button className="pg">8</button>
          <button className="pg" aria-label="Next page"><i data-lucide="chevron-right" style={{width:14,height:14}}></i></button>
        </div>
        <button className="tb-sel">Rows per page: 20<i data-lucide="chevron-down"></i></button>
      </div>
    </div>
    ) : (
    /* Filtered-empty (§5 · reached when search/status yields zero rows) */
    <div className="tbl-wrap"><div className="empty">
      <div className="ei"><i data-lucide="search-x"></i></div>
      <div className="et">No tenants match your search</div>
      <div className="eb">Adjust your search terms or status filter.</div>
      <div className="ea"><Button variant="ghost" leadingIcon="x" onClick={()=>{setQuery("");setFilter("all");}}>Clear filters</Button></div>
    </div></div>
    )}

    {/* ===== Secondary stacked examples — the spec's other distinctive §5 states ===== */}
    <div className="sec-label"><i data-lucide="layers-2"></i>Other states (reference)</div>

    {/* Loading skeleton (§5 · 5–8 rows mirroring column widths; aria-busy) */}
    <div className="tbl-wrap" aria-busy="true" aria-label="Loading tenants">
      <table className="tbl"><tbody>
        {[0,1,2,3,4].map(i=>(
          <tr key={i}>
            <td><div className="cell-name"><div className="skl" style={{width:32,height:32,borderRadius:"var(--radius-md)"}}></div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}><div className="skl" style={{width:160,height:11}}></div><div className="skl" style={{width:110,height:9}}></div></div></div></td>
            <td><div className="skl" style={{width:96,height:16,borderRadius:"var(--radius-sm)"}}></div></td>
            <td><div className="skl" style={{width:64,height:16,borderRadius:"var(--radius-pill)"}}></div></td>
            <td style={{textAlign:"right"}}><div className="skl" style={{width:40,height:11,marginLeft:"auto"}}></div></td>
            <td><div className="skl" style={{width:74,height:18,borderRadius:"var(--radius-pill)"}}></div></td>
            <td style={{textAlign:"right"}}><div className="skl" style={{width:44,height:11,marginLeft:"auto"}}></div></td>
          </tr>))}
      </tbody></table>
    </div>

    {/* List-load error (§5 Error · status.error, server message, Try again) */}
    <div className="alert err" role="alert">
      <i data-lucide="alert-octagon" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load tenants. </span>
        <span className="ax-sec">The platform directory service timed out (request id req_8f21c). The last good page is shown above.</span></div>
      <button className="lnk">Try again →</button>
    </div>

    {/* Permission-gated variant (§5 · non-super-admin defense-in-depth; no retry, no create affordance) */}
    <div className="alert info" role="status">
      <i data-lucide="shield-x" className="lead"></i>
      <div className="ab"><span className="at">Access restricted. </span>
        <span className="ax-sec">The tenant control plane is available to platform super-admins only. Tenant-admins are scoped to a single organization and never see this cross-tenant list.</span></div>
    </div>

    {/* True-empty onboarding (§5 · distinct from filtered-empty) */}
    <div className="tbl-wrap"><div className="empty">
      <div className="ei"><i data-lucide="building-2"></i></div>
      <div className="et">No tenants yet</div>
      <div className="eb">Provision your first organization to bring it onto the platform.</div>
      <div className="ea"><Button variant="primary" leadingIcon="plus" onClick={()=>setCreateOpen(true)}>Create your first tenant</Button></div>
    </div></div>

    {/* ===== Create-tenant Modal — react-state form; no confirm step (§6); credentials never collected/rendered ===== */}
    {createOpen && <React.Fragment>
      <div className="overlay" onClick={closeCreate}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby="ct-title" aria-describedby="ct-desc">
        <div className="box">
          <div className="mh"><div><div className="mt" id="ct-title">Create tenant</div>
            <div className="ms" id="ct-desc">Provision a new organization. You'll be added as its first administrator.</div></div>
            <button className="icon-btn" aria-label="Close" onClick={closeCreate}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="field">
              <label className="fl" htmlFor="ct-name">Organization name <span className="req" aria-hidden="true">*</span></label>
              <input id="ct-name" value={name} onChange={e=>setName(e.target.value)} disabled={pending} aria-required="true" placeholder="e.g. Springfield High School"/>
            </div>
            <div className={"field"+(codeErr?" bad":"")}>
              <label className="fl" htmlFor="ct-code">Tenant code <span className="req" aria-hidden="true">*</span></label>
              <input id="ct-code" className="mono" value={code} onChange={onCode} disabled={pending} aria-required="true"
                aria-invalid={codeErr?"true":undefined} aria-describedby={codeErr?"ct-code-err":"ct-code-help"} placeholder="e.g. SPRINGFIELD-HS"/>
              {codeErr
                ? <div className="fe" id="ct-code-err" role="alert"><i data-lucide="alert-circle"></i>That tenant code is already taken. Choose another.</div>
                : <div className="fh" id="ct-code-help">Uppercase letters, numbers, and hyphens only. Must be unique across the platform.</div>}
            </div>
            <div className="field">
              <label className="fl" htmlFor="ct-email">Contact email <span className="req" aria-hidden="true">*</span></label>
              <input id="ct-email" type="email" value={email} onChange={e=>setEmail(e.target.value)} disabled={pending} aria-required="true" aria-describedby="ct-email-help" placeholder="admin@school.edu"/>
              <div className="fh" id="ct-email-help">The first administrator's email for this organization.</div>
            </div>
            <div className="field">
              <label className="fl" htmlFor="ct-person">Contact person</label>
              <input id="ct-person" value={person} onChange={e=>setPerson(e.target.value)} disabled={pending} placeholder="Jane Doe"/>
            </div>
            <div className="field">
              <label className="fl" htmlFor="ct-plan">Subscription plan</label>
              <select id="ct-plan" value={plan} onChange={e=>setPlan(e.target.value)} disabled={pending}>
                <option value="trial">Trial</option><option value="basic">Basic</option>
                <option value="premium">Premium</option><option value="enterprise">Enterprise</option>
              </select>
            </div>
            <div className="alert info" role="note"><i data-lucide="server" className="lead"></i>
              <div className="ab"><span className="ax-sec">Features, quotas, status, and the tenant code reservation are seeded server-side. Credentials and any secret keys are never shown here — this action is audit-logged.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={closeCreate} disabled={pending}>Cancel</Button>
            <Button variant="primary" leadingIcon={pending?"loader":"check"} disabled={pending} onClick={submit}>{pending?"Creating…":"Create tenant"}</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
