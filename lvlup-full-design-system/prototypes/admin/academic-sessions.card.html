<style>

.btn{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);font-family:var(--font-ui);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;border:1px solid transparent;transition:background var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard);}

.row-acts{display:flex;align-items:center;gap:var(--space-1);justify-content:flex-end;}

.chip{display:inline-flex;align-items:center;gap:5px;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-xs);background:var(--brand-subtle);color:var(--brand-primary);font-weight:var(--weight-medium);white-space:nowrap;}
.chip i{width:11px;height:11px;}
.chip .d{width:7px;height:7px;border-radius:var(--radius-pill);background:var(--brand-primary);}
/* pagination */
.pag{display:flex;align-items:center;gap:var(--space-3);justify-content:space-between;flex-wrap:wrap;}

.pag .pg.on{background:var(--brand-primary);color:var(--text-on-accent);border-color:var(--brand-primary);}
/* alerts */
.alert{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--border-subtle);font-size:var(--text-sm);background:var(--bg-surface);}
.alert i.lead{width:18px;height:18px;flex:none;margin-top:1px;}
.alert .ab{flex:1;}
.alert .at{font-weight:var(--weight-semibold);}
.alert.warn{border-color:var(--status-warning);background:var(--status-warning-subtle);}

.alert.err{border-color:var(--status-error);background:var(--status-error-subtle);}
.alert.err i.lead{color:var(--status-error);}
.alert.info{border-color:var(--status-info);background:var(--status-info-subtle);}

.sec-label{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);font-weight:var(--weight-semibold);letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);}
.sec-label i{width:14px;height:14px;}
/* empty / skeleton */
.panel{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;}
.empty{display:flex;flex-direction:column;align-items:center;gap:var(--space-3);padding:var(--space-12) var(--space-6);text-align:center;}
.empty .ei{width:52px;height:52px;border-radius:var(--radius-lg);background:var(--bg-surface-sunken);display:grid;place-items:center;color:var(--text-muted);}
.empty .ei i{width:24px;height:24px;}
.empty .et{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.empty .eb{font-size:var(--text-sm);color:var(--text-secondary);max-width:42ch;}
.empty .ea{display:flex;gap:var(--space-2);margin-top:var(--space-2);}
.skl{background:var(--bg-surface-sunken);border-radius:var(--radius-sm);animation:shim 1.3s var(--ease-standard) infinite;}

.overlay{position:fixed;inset:0;background:var(--ink-900);opacity:.42;z-index:40;}
.modal{position:fixed;inset:0;z-index:41;display:grid;place-items:center;padding:var(--space-6);}

.modal .mf{display:flex;align-items:center;gap:var(--space-2);justify-content:flex-end;padding:var(--space-4) var(--space-5);border-top:1px solid var(--border-subtle);background:var(--bg-surface-sunken);}
.field{display:flex;flex-direction:column;gap:var(--space-2);}

.modal-sec-h{font-size:var(--text-xs);font-weight:var(--weight-semibold);letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);}

.conseq{display:flex;flex-direction:column;gap:var(--space-2);margin-top:var(--space-2);}

          <Nav icon="file-text" label="Reports" route="/reports" active={active}/>
          <Nav icon="sparkles" label="AI Usage" route="/ai-usage" active={active}/></div>
        <div className="ax-navgrp"><div className="ax-navlbl">Configuration</div>
          <Nav icon="bell" label="Notifications" route="/notifications" active={active}/>
          <Nav icon="download" label="Data Export" route="/data-export" active={active}/>
          <Nav icon="settings" label="Settings" route="/settings" active={active}/></div>
      </nav>
      <div className="foot">
        <div className="ax-rs"><i data-lucide="building"></i><span>Switch tenant</span><i data-lucide="chevrons-up-down"></i></div>
        <div className="ax-uc"><div className="av">AK</div>
          <div><div className="nm">Anita Kapoor</div><div className="rl">Tenant Admin</div></div></div>
      </div>
    </aside>
    <div className="ax-main">
      <header className="ax-top">
        <nav className="ax-bc" aria-label="Breadcrumb">{crumb.map((c,i)=>(
          <React.Fragment key={i}>{i>0&&<i data-lucide="chevron-right" style={{width:14,height:14}}></i>}{i===crumb.length-1?<b>{c}</b>:<span>{c}</span>}</React.Fragment>))}</nav>
        <div className="sp"></div>
        <div className="ax-search"><i data-lucide="search"></i><span>Search…</span><kbd>⌘K</kbd></div>
        <button className="icon-btn" aria-label="Toggle theme"><i data-lucide="sun"></i></button>
        <button className="icon-btn" aria-label="Notifications, 3 unread"><i data-lucide="bell"></i></button>
      </header>
      <main id="main-content" className="ax-body">{children}</main>
    </div>
  </div>;
}

/* ---- status helper: icon + label, never color-only ---- */
function StatusBadge({status}){
  if(status==="active") return <span className="badge suc"><i data-lucide="circle-check"></i>Active</span>;
  return <span className="badge arc"><i data-lucide="archive"></i>Archived</span>;
}

/* ---- sample data: server-authoritative sessions (render-only). tenantId is server-derived, never surfaced. ---- */
const SESSIONS=[
  {id:"as_2526",name:"2025–2026",start:"01 Jun 2025",end:"31 May 2026",current:true, status:"active"},
  {id:"as_2425",name:"2024–2025",start:"01 Jun 2024",end:"31 May 2025",current:false,status:"archived"},
  {id:"as_2324",name:"2023–2024",start:"01 Jun 2023",end:"31 May 2024",current:false,status:"archived"},
  {id:"as_2223",name:"2022–2023",start:"01 Jun 2022",end:"31 May 2023",current:false,status:"archived"},
];
const CURRENT = SESSIONS.find(s=>s.current);

/* ---- rollover Configure → Review → Confirm dialog ---- */
function RolloverDialog({source,onClose}){
  const [name,setName]=React.useState("2026–2027");
  const [start,setStart]=React.useState("2026-06-01");
  const [end,setEnd]=React.useState("2027-05-31");
  const [copyClasses,setCopyClasses]=React.useState(true);
  const [copyTeachers,setCopyTeachers]=React.useState(true);
  const [promote,setPromote]=React.useState(true);
  const [confirm,setConfirm]=React.useState(false);
  const [busy,setBusy]=React.useState(false);
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const dateBad = end <= start;
  const nameBad = !name.trim();
  // dependency cascade: copyClasses is the parent
  const toggleParent=()=>{ const next=!copyClasses; setCopyClasses(next); if(!next){ setCopyTeachers(false); setPromote(false);} };
  const Opt=({checked,onClick,disabled,title,hint,child})=>(
    <div className={"opt"+(child?" child":"")+(checked?" checked":"")+(disabled?" disabled":"")}
      role="checkbox" aria-checked={checked} aria-disabled={disabled||undefined} tabIndex={disabled?-1:0}
      onClick={disabled?undefined:onClick}>
      <span className="cbx">{checked&&<i data-lucide="check"></i>}</span>
      <span><span className="ot">{title}</span>{hint&&<span className="oh">{hint}</span>}</span>
    </div>);
  const dlgName = name.trim()||"new session";
  return <React.Fragment>
    <div className="overlay" onClick={busy?undefined:onClose}></div>
    <div className="modal">
      <div className="box lg" role="dialog" aria-modal="true" aria-labelledby="ro-title" aria-describedby="ro-desc" aria-busy={busy||undefined}>
        {busy && <div className="dlg-busy" role="status" aria-label="Processing rollover"><div className="spin"></div></div>}
        <div className="mh"><div><div className="mt" id="ro-title">Roll Over Session</div>
          <div className="ms" id="ro-desc">Create a new academic session from «{source.name}» and carry forward your classes, teachers, and students.</div></div>
          <button className="icon-btn" aria-label="Close" disabled={busy} onClick={busy?undefined:onClose}><i data-lucide="x"></i></button></div>
        <div className="mb">
          {/* Configure — source session (read-only) */}
          <div>
            <div className="modal-sec-h" style={{marginBottom:"var(--space-2)"}}>Source session</div>
            <div className="src-block">
              <dl className="deflist">
                <dt>Name</dt><dd><span style={{display:"inline-flex",alignItems:"center",gap:"var(--space-2)"}}>{source.name}<span className="chip"><span className="d"></span>Current</span></span></dd>
                <dt>Date range</dt><dd className="ax-mono">{source.start} — {source.end}</dd>
              </dl>
            </div>
          </div>
          {/* new-session fields */}
          <div className="field">
            <label className="fl" htmlFor="ro-name">New Session Name <span className="req">*</span></label>
            <input id="ro-name" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. 2026–2027"/>
          </div>
          <div className="g2">
            <div className="field"><label className="fl" htmlFor="ro-start">Start Date</label><input id="ro-start" className="mono" type="date" value={start} onChange={e=>setStart(e.target.value)}/></div>
            <div className={"field"+(dateBad?" bad":"")}>
              <label className="fl" htmlFor="ro-end">End Date</label>
              <input id="ro-end" className="mono" type="date" value={end} onChange={e=>setEnd(e.target.value)} aria-invalid={dateBad||undefined} aria-describedby={dateBad?"ro-end-err":undefined}/>
              {dateBad && <div className="fe" id="ro-end-err"><i data-lucide="circle-alert"></i>End date must be after the start date.</div>}
            </div>
          </div>
          {/* options with dependency cascade */}
          <div>
            <div className="modal-sec-h" style={{marginBottom:"var(--space-2)"}}>What to carry forward</div>
            <Opt checked={copyClasses} onClick={toggleParent} title="Copy classes to the new session"/>
            <Opt child checked={copyTeachers} disabled={!copyClasses} onClick={()=>setCopyTeachers(v=>!v)}
              title="Copy teacher assignments" hint={!copyClasses?"Requires copying classes.":null}/>
            <Opt child checked={promote} disabled={!copyClasses} onClick={()=>setPromote(v=>!v)}
              title="Promote students" hint={copyClasses?"Increment grade and reassign to the new classes.":"Requires copying classes."}/>
          </div>
          {/* Review — live consequence preview (status.warning emphasis) */}
          <div className="alert warn" role="region" aria-live="polite" aria-label="What will happen">
            <i data-lucide="triangle-alert" className="lead"></i>
            <div className="ab">
              <span className="at">What will happen</span>
              <div className="conseq">
                <div className="ci"><i data-lucide="calendar-plus"></i><span>A new session «{dlgName}» will be created and set as the current session.</span></div>
                {copyClasses
                  ? <div className="ci"><i data-lucide="copy"></i><span>Active classes from «{source.name}» will be duplicated into the new session.</span></div>
                  : <div className="ci off"><i data-lucide="minus"></i><span>No classes will be copied.</span></div>}
                {copyClasses && copyTeachers && <div className="ci"><i data-lucide="user-check"></i><span>Teacher assignments will be preserved in the new classes.</span></div>}
                {copyClasses && promote && <div className="ci"><i data-lucide="graduation-cap"></i><span>Students will be promoted to the next grade and reassigned.</span></div>}
                <div className="ci"><i data-lucide="archive"></i><span>«{source.name}» will be archived.</span></div>
              </div>
            </div>
          </div>
        </div>
        <div className="mf">
          <Button variant="ghost" disabled={busy} onClick={busy?undefined:onClose}>Cancel</Button>
          {/* primary, NOT danger — rollover creates a year; consequence carried by copy + confirm gate */}
          <Button variant="primary" leadingIcon="rotate-ccw" disabled={busy||dateBad||nameBad} onClick={()=>setConfirm(true)}>
            {busy?"Processing…":"Start Rollover"}</Button>
        </div>
      </div>
    </div>

    {/* Confirm — final commit gate (audit-logged, roster-wide) */}
    {confirm && <React.Fragment>
      <div className="overlay" style={{opacity:.5}} onClick={busy?undefined:()=>setConfirm(false)}></div>
      <div className="modal">
        <div className="box sm" role="alertdialog" aria-modal="true" aria-labelledby="cf-title" aria-describedby="cf-desc">
          <div className="mh"><div className="mt" id="cf-title">Roll over to a new academic year?</div>
            <button className="icon-btn" aria-label="Close" disabled={busy} onClick={busy?undefined:()=>setConfirm(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="alert warn" role="note"><i data-lucide="triangle-alert" className="lead"></i>
              <div className="ab" id="cf-desc"><span className="ax-sec">This will create «{dlgName}», set it as the current session, and archive «{source.name}». Classes will be duplicated and students will be promoted to the next grade. This affects your entire roster and is not undone automatically.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" disabled={busy} onClick={()=>setConfirm(false)}>Cancel</Button>
            <Button variant="primary" leadingIcon="rotate-ccw" disabled={busy}
              onClick={()=>{ setBusy(true); /* idempotencyKey sent; counts are server-authoritative */ }}>
              {busy?"Processing…":"Roll over"}</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}
  </React.Fragment>;
}

/* ---- Create / Edit dialog ---- */
function SessionFormDialog({mode,session,onClose}){
  const isEdit = mode==="edit";
  const [name,setName]=React.useState(isEdit?session.name:"");
  const [start,setStart]=React.useState("2026-06-01");
  const [end,setEnd]=React.useState("2025-05-31"); // intentionally bad to show inline validation
  const [makeCurrent,setMakeCurrent]=React.useState(isEdit?session.current:false);
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const dateBad = end <= start;
  const nameBad = !name.trim();
  return <React.Fragment>
    <div className="overlay" onClick={onClose}></div>
    <div className="modal">
      <div className="box" role="dialog" aria-modal="true" aria-labelledby="sf-title" aria-describedby="sf-desc">
        <div className="mh"><div><div className="mt" id="sf-title">{isEdit?"Edit Academic Session":"Create Academic Session"}</div>
          <div className="ms" id="sf-desc">{isEdit?"Update session details.":"Add a new academic year or term."}</div></div>
          <button className="icon-btn" aria-label="Close" onClick={onClose}><i data-lucide="x"></i></button></div>
        <div className="mb">
          <div className="field">
            <label className="fl" htmlFor="sf-name">Session Name <span className="req">*</span></label>
            <input id="sf-name" autoFocus value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. 2025–2026"/>
          </div>
          <div className="g2">
            <div className="field"><label className="fl" htmlFor="sf-start">Start Date</label><input id="sf-start" className="mono" type="date" value={start} onChange={e=>setStart(e.target.value)}/></div>
            <div className={"field"+(dateBad?" bad":"")}>
              <label className="fl" htmlFor="sf-end">End Date</label>
              <input id="sf-end" className="mono" type="date" value={end} onChange={e=>setEnd(e.target.value)} aria-invalid={dateBad||undefined} aria-describedby={dateBad?"sf-end-err":undefined}/>
              {dateBad && <div className="fe" id="sf-end-err"><i data-lucide="circle-alert"></i>End date must be after the start date.</div>}
            </div>
          </div>
          <div className={"switch"+(makeCurrent?" on":"")} role="switch" aria-checked={makeCurrent} tabIndex={0} onClick={()=>setMakeCurrent(v=>!v)}>
            <span className="tk"></span><span className="sl">Set as current session</span>
          </div>
          {makeCurrent && <div className="alert info" role="note"><i data-lucide="info" className="lead"></i>
            <div className="ab"><span className="ax-sec">The current session is enforced server-side — making this current will demote the previous one in the same transaction.</span></div></div>}
        </div>
        <div className="mf">
          <Button variant="ghost" onClick={onClose}>Cancel</Button>
          <Button variant="primary" leadingIcon="check" disabled={dateBad||nameBad}>{isEdit?"Save Changes":"Create"}</Button>
        </div>
      </div>
    </div>
  </React.Fragment>;
}

function Screen(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const [rollover,setRollover]=React.useState(null);   // source session or null
  const [form,setForm]=React.useState(null);           // {mode, session}
  const [menuOpen,setMenuOpen]=React.useState(false);  // placeholder for any row popover

  return <Shell active="/academic-sessions" crumb={["Home","Academic Sessions"]}>

    {/* Partial-result warning (§5 Partial) — a prior rollover left students unassigned */}
    <div className="alert warn" role="status">
      <i data-lucide="triangle-alert" className="lead"></i>
      <div className="ab"><span className="at">3 students couldn't be auto-assigned to a class. </span>
        <span className="ax-sec">Assign them in Classes to complete the rollover.</span></div>
      <span className="lnk">Go to Classes →</span>
    </div>

    {/* Region A — page header */}
    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Academic Sessions</h1>
        <div className="ax-sub">Define and govern the academic years and terms your school runs on.</div></div>
      <div className="ac">
        <Button variant="primary" leadingIcon="plus" onClick={()=>setForm({mode:"create"})}>New Session</Button>
      </div>
    </div>

    {/* Region B — current-session KPI card (the one piece of visual emphasis) */}
    <div className="kpi-card">
      <div className="top">
        <div className="ico"><i data-lucide="calendar-range"></i></div>
        <span className="eyelet">Current session</span>
        <div style={{marginLeft:"auto"}}><span className="badge suc lg"><i data-lucide="circle-check"></i>Active</span></div>
      </div>
      <div>
        <div className="fig">{CURRENT.name}</div>
        <div className="dates">{CURRENT.start} — {CURRENT.end}</div>
      </div>
      <div className="divln"></div>
      <div className="acts">
        <Button variant="secondary" leadingIcon="pencil" onClick={()=>setForm({mode:"edit",session:CURRENT})}>Edit</Button>
        <Button variant="secondary" leadingIcon="rotate-ccw" onClick={()=>setRollover(CURRENT)}>Roll over</Button>
      </div>
    </div>

    {/* Region C — all-sessions DataTable */}
    <div className="tbl-wrap">
      <div className="tbl-head"><span className="pt">All sessions</span>
        <span className="ax-muted ax-mono" style={{fontSize:"var(--text-xs)"}}>{SESSIONS.length} total</span></div>
      <table className="tbl" aria-label="All academic sessions">
        <thead><tr>
          <th><button className="sort">Name<i data-lucide="chevrons-up-down"></i></button></th>
          <th><button className="sort">Start Date<i data-lucide="chevron-down"></i></button></th>
          <th>End Date</th>
          <th>Current</th>
          <th>Status</th>
          <th style={{textAlign:"right"}}><span className="ax-sr">Actions</span></th>
        </tr></thead>
        <tbody>
          {SESSIONS.map(s=>(
            <tr key={s.id}>
              <td><div className="nm-cell"><i data-lucide="calendar"></i>{s.name}</div></td>
              <td className="ax-mono ax-sec">{s.start}</td>
              <td className="ax-mono ax-sec">{s.end}</td>
              <td>{s.current
                ? <span className="chip"><span className="d"></span>Current</span>
                : <button className="btn btn--ghost btn--sm"><i data-lucide="circle-dot"></i>Set as current</button>}</td>
              <td><StatusBadge status={s.status}/></td>
              <td>
                <div className="row-acts">
                  <button className="icon-btn" aria-label={"Roll over "+s.name} onClick={()=>setRollover(s)}><i data-lucide="rotate-ccw"></i></button>
                  <button className="icon-btn" aria-label={"Edit "+s.name} onClick={()=>setForm({mode:"edit",session:s})}><i data-lucide="pencil"></i></button>
                </div>
              </td>
            </tr>))}
        </tbody>
      </table>
    </div>

    {/* Pagination */}
    <div className="pag">
      <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Showing <span className="ax-mono">1–4</span> of <span className="ax-mono">4</span> sessions</span>
      <div className="nums">
        <button className="pg" aria-label="Previous page"><i data-lucide="chevron-left" style={{width:14,height:14}}></i></button>
        <button className="pg on" aria-current="page">1</button>
        <button className="pg" aria-label="Next page"><i data-lucide="chevron-right" style={{width:14,height:14}}></i></button>
      </div>
    </div>

    {/* ===== Secondary stacked examples: the spec's other §5 states ===== */}
    <div className="sec-label" style={{marginTop:"var(--space-4)"}}><i data-lucide="layers-2"></i>Other states (reference)</div>

    {/* Loading skeleton (§5 Loading) */}
    <div className="tbl-wrap" aria-busy="true" aria-label="Loading sessions">
      <div className="tbl-head"><div className="skl" style={{width:120,height:13}}></div></div>
      <table className="tbl"><tbody>
        {[0,1,2].map(i=>(
          <tr key={i}>
            <td><div className="skl" style={{width:120,height:13}}></div></td>
            <td><div className="skl" style={{width:90,height:13}}></div></td>
            <td><div className="skl" style={{width:90,height:13}}></div></td>
            <td><div className="skl" style={{width:64,height:20,borderRadius:"var(--radius-pill)"}}></div></td>
            <td><div className="skl" style={{width:64,height:20,borderRadius:"var(--radius-pill)"}}></div></td>
            <td></td>
          </tr>))}
      </tbody></table>
    </div>

    {/* Empty (§5 Empty / §7) */}
    <div className="panel"><div className="empty">
      <div className="ei"><i data-lucide="calendar-x"></i></div>
      <div className="et">No academic sessions yet</div>
      <div className="eb">Create your first session to organize your school year — classes, exams, and rollover all key off it.</div>
      <div className="ea"><Button variant="primary" leadingIcon="plus" onClick={()=>setForm({mode:"create"})}>Create session</Button></div>
    </div></div>

    {/* Read error (§5 Error) */}
    <div className="alert err" role="alert">
      <i data-lucide="octagon-alert" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load academic sessions. </span>
        <span className="ax-sec">The service didn't respond. Your view is unchanged.</span></div>
      <span className="lnk">Retry →</span>
    </div>

    {/* Permission-gated read-only (§5 / §8 RBAC — mutating controls hidden, not disabled) */}
    <div className="alert info" role="status">
      <i data-lucide="eye" className="lead"></i>
      <div className="ab"><span className="at">You have view-only access to academic sessions. </span>
        <span className="ax-sec">New Session, Edit, Roll over, and Set as current are hidden for your role.</span></div>
    </div>

    {/* Dialogs */}
    {rollover && <RolloverDialog source={rollover} onClose={()=>setRollover(null)}/>}
    {form && <SessionFormDialog mode={form.mode} session={form.session} onClose={()=>setForm(null)}/>}

  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
