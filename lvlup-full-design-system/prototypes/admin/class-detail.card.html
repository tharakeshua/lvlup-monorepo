<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
html,body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);}
#root{min-height:100vh;}
.ax-shell{display:grid;grid-template-columns:264px 1fr;min-height:100vh;}
.ax-side{position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-5);background:var(--bg-surface);border-right:1px solid var(--border-subtle);padding:var(--space-5) var(--space-4);}
.ax-brand{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-1) var(--space-2);}
.ax-brand .mk{width:34px;height:34px;border-radius:var(--radius-md);background:var(--brand-primary);color:var(--text-on-accent);display:grid;place-items:center;font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);}
.ax-brand .nm{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-base);line-height:1.1;}
.ax-brand .sc{font-size:var(--text-2xs);color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;}
.ax-navgrp{display:flex;flex-direction:column;gap:2px;}
.ax-navlbl{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);padding:var(--space-2) var(--space-2) var(--space-1);}
.ax-nav{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--text-secondary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;position:relative;transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard);}
.ax-nav i{width:18px;height:18px;}
.ax-nav .ct{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.ax-nav:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.ax-nav.on{background:var(--brand-subtle);color:var(--brand-primary);font-weight:var(--weight-semibold);}
.ax-nav.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:58%;border-radius:var(--radius-pill);background:var(--brand-primary);}
.ax-side .foot{margin-top:auto;display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-4);border-top:1px solid var(--border-subtle);}
.ax-rs{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;}
.ax-rs i:last-child{margin-left:auto;}
.ax-uc{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2);border-radius:var(--radius-md);cursor:pointer;}
.ax-uc:hover{background:var(--bg-surface-sunken);}
.ax-uc .av{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.ax-uc .nm{font-size:var(--text-sm);font-weight:var(--weight-medium);line-height:1.1;}
.ax-uc .rl{font-size:var(--text-2xs);color:var(--text-muted);}
.ax-main{display:flex;flex-direction:column;min-width:0;}
.ax-top{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-8);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;top:0;z-index:20;}
.ax-bc{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-muted);}
.ax-bc b{color:var(--text-primary);font-weight:var(--weight-medium);}
.ax-bc a{color:var(--text-muted);cursor:pointer;}
.ax-bc a:hover{color:var(--text-secondary);}
.ax-top .sp{flex:1;}
.ax-search{display:flex;align-items:center;gap:var(--space-2);width:280px;max-width:32vw;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-muted);font-size:var(--text-sm);}
.ax-search kbd{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:0 var(--space-1);}
.ax-body{flex:1;overflow-y:auto;padding:var(--space-8);display:flex;flex-direction:column;gap:var(--space-6);width:100%;max-width:1232px;}
.ax-head{display:flex;align-items:flex-start;gap:var(--space-4);flex-wrap:wrap;}
.ax-head .tx{display:flex;flex-direction:column;gap:var(--space-2);}
.ax-h1{font-family:var(--font-display);font-size:var(--text-2xl);line-height:var(--leading-2xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);display:flex;align-items:center;gap:var(--space-3);}
.ax-sub{font-size:var(--text-sm);color:var(--text-secondary);}
.ax-head .ac{margin-left:auto;display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;}
.ax-grid{display:grid;gap:var(--space-4);}
.ax-g4{grid-template-columns:repeat(4,1fr);}
.ax-row{display:flex;align-items:center;gap:var(--space-3);}
.ax-col{display:flex;flex-direction:column;gap:var(--space-3);}
.ax-wrap{flex-wrap:wrap;}
.ax-mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.ax-muted{color:var(--text-muted);}
.ax-sec{color:var(--text-secondary);}
.ax-sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
/* back button */
.ax-back{display:inline-flex;align-items:center;gap:var(--space-1);font-size:var(--text-sm);color:var(--text-secondary);background:none;border:none;cursor:pointer;padding:var(--space-1) var(--space-2);border-radius:var(--radius-md);}
.ax-back:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.ax-back i{width:15px;height:15px;}
/* button */
.btn{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);font-family:var(--font-ui);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;border:1px solid transparent;transition:background var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard);white-space:nowrap;}
.btn i{width:15px;height:15px;}
.btn--primary{background:var(--brand-primary);color:var(--text-on-accent);}
.btn--primary:hover{background:var(--brand-primary-hover);}
.btn--secondary{background:var(--bg-surface);color:var(--text-primary);border-color:var(--border-strong);}
.btn--secondary:hover{background:var(--bg-surface-sunken);}
.btn--ghost{background:none;color:var(--text-secondary);}
.btn--ghost:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.btn--danger{background:var(--bg-surface);color:var(--status-error);border-color:var(--status-error);}
.btn--danger:hover{background:var(--status-error-subtle);}
.btn--sm{padding:var(--space-1) var(--space-3);font-size:var(--text-xs);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.icon-btn{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}
.icon-btn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.icon-btn i{width:17px;height:17px;}
/* card / kpi */
.card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-5);}
.kpi{display:flex;flex-direction:column;gap:var(--space-2);}
.kpi .lh{display:flex;align-items:center;gap:var(--space-2);color:var(--text-muted);font-size:var(--text-xs);font-weight:var(--weight-medium);}
.kpi .lh i{width:15px;height:15px;}
.kpi .vv{font-family:var(--font-mono);font-size:var(--text-2xl);font-weight:var(--weight-medium);font-variant-numeric:tabular-nums;line-height:1.1;}
.kpi .hint{font-size:var(--text-2xs);color:var(--text-muted);}
/* badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-medium);border:1px solid transparent;white-space:nowrap;}
.badge i{width:12px;height:12px;}
.badge.suc{background:var(--status-success-subtle);color:var(--status-success);}
.badge.warn{background:var(--status-warning-subtle);color:var(--status-warning);}
.badge.info{background:var(--status-info-subtle);color:var(--status-info);}
.badge.neut{background:var(--bg-surface-sunken);color:var(--text-secondary);border-color:var(--border-subtle);}
/* chip */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-2xs);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);color:var(--text-secondary);}
/* tabs */
.tabs{display:flex;gap:var(--space-1);border-bottom:1px solid var(--border-subtle);overflow-x:auto;}
.tab{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-3);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-secondary);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color var(--dur-fast) var(--ease-standard),border-color var(--dur-base) var(--ease-standard);}
.tab:hover{color:var(--text-primary);}
.tab[aria-selected="true"]{color:var(--brand-primary);border-bottom-color:var(--brand-primary);font-weight:var(--weight-semibold);}
.tab .cnt{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
/* panel + toolbar */
.panel{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;}
.toolbar{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border-subtle);flex-wrap:wrap;}
.tb-search{display:flex;align-items:center;gap:var(--space-2);flex:1;min-width:200px;max-width:320px;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-muted);font-size:var(--text-sm);}
.tb-search i{width:15px;height:15px;}
.tb-search input{border:none;background:none;outline:none;color:var(--text-primary);font-family:var(--font-ui);font-size:var(--text-sm);width:100%;}
/* table */
.tbl{width:100%;border-collapse:collapse;font-size:var(--text-sm);}
.tbl thead th{text-align:left;padding:var(--space-3) var(--space-5);font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface-sunken);white-space:nowrap;}
.tbl thead th.sortable{cursor:pointer;}
.tbl thead th .si{display:inline-flex;align-items:center;gap:4px;}
.tbl thead th .si i{width:12px;height:12px;}
.tbl tbody td{padding:var(--space-3) var(--space-5);border-bottom:1px solid var(--border-subtle);color:var(--text-primary);vertical-align:middle;}
.tbl tbody tr:last-child td{border-bottom:none;}
.tbl tbody tr:hover{background:var(--bg-surface-sunken);}
.tbl tbody tr.sel{background:var(--brand-subtle);}
.tbl tbody tr.pending{opacity:.55;}
.tbl .nm-cell{display:flex;align-items:center;gap:var(--space-3);}
.tbl .av{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-2xs);font-weight:var(--weight-semibold);flex:none;}
.cbx{width:16px;height:16px;accent-color:var(--brand-primary);cursor:pointer;}
.col-chk{width:40px;}
.col-act{width:48px;text-align:right;}
/* bulk bar */
.bulkbar{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-5);background:var(--ink-900);color:var(--paper-100);font-size:var(--text-sm);}
.bulkbar .sp{flex:1;}
.bulkbar .bn{font-family:var(--font-mono);}
.bulkbar .bb{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-3);border-radius:var(--radius-md);font-size:var(--text-xs);font-weight:var(--weight-medium);cursor:pointer;border:1px solid var(--border-strong);background:none;color:var(--paper-100);}
.bulkbar .bb i{width:13px;height:13px;}
.bulkbar .bb.dng{color:var(--red-200);border-color:var(--red-500);}
/* pagination */
.pgn{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-5);border-top:1px solid var(--border-subtle);font-size:var(--text-xs);color:var(--text-muted);}
.pgn .sp{flex:1;}
.pgn button{min-width:28px;height:28px;padding:0 var(--space-2);border-radius:var(--radius-sm);border:1px solid var(--border-subtle);background:var(--bg-surface);color:var(--text-secondary);font-family:var(--font-mono);font-size:var(--text-2xs);cursor:pointer;}
.pgn button.on{background:var(--brand-subtle);color:var(--brand-primary);border-color:var(--brand-primary);}
/* row menu popover */
.rowmenu{position:absolute;right:var(--space-5);min-width:184px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);box-shadow:var(--shadow-e3);padding:var(--space-1);z-index:40;}
.rowmenu button{display:flex;align-items:center;gap:var(--space-2);width:100%;padding:var(--space-2) var(--space-3);border:none;background:none;border-radius:var(--radius-sm);font-size:var(--text-sm);color:var(--text-primary);cursor:pointer;text-align:left;font-family:var(--font-ui);}
.rowmenu button:hover{background:var(--bg-surface-sunken);}
.rowmenu button.dng{color:var(--status-error);}
.rowmenu button:disabled{opacity:.5;cursor:not-allowed;}
.rowmenu button i{width:15px;height:15px;}
.rowmenu .div{height:1px;background:var(--border-subtle);margin:var(--space-1) 0;}
/* empty */
.empty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:var(--space-3);padding:var(--space-12) var(--space-6);}
.empty .ic{width:46px;height:46px;border-radius:var(--radius-lg);background:var(--bg-surface-sunken);display:grid;place-items:center;color:var(--text-muted);}
.empty .ic i{width:22px;height:22px;}
.empty .et{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.empty .eb{font-size:var(--text-sm);color:var(--text-secondary);max-width:380px;}
/* alert */
.alert{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid transparent;font-size:var(--text-sm);}
.alert i.lead{width:18px;height:18px;flex:none;margin-top:1px;}
.alert .ab{flex:1;}
.alert .at{font-weight:var(--weight-semibold);}
.alert.warn{border-color:var(--status-warning);background:var(--status-warning-subtle);}
.alert.warn i.lead{color:var(--status-warning);}
.alert.err{border-color:var(--status-error);background:var(--status-error-subtle);}
.alert.err i.lead{color:var(--status-error);}
.alert .lnk{color:var(--brand-primary);font-weight:var(--weight-medium);cursor:pointer;white-space:nowrap;}
.alert .rbtn{margin-left:auto;}
/* deflist (settings read) */
.deflist{display:grid;grid-template-columns:180px 1fr;gap:var(--space-3) var(--space-5);font-size:var(--text-sm);align-items:center;}
.deflist dt{color:var(--text-muted);}
.deflist dd{color:var(--text-primary);margin:0;}
/* settings form */
.field{display:flex;flex-direction:column;gap:var(--space-2);}
.field label{font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--text-secondary);}
.field input,.field select{padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);color:var(--text-primary);font-family:var(--font-ui);font-size:var(--text-sm);outline:none;}
.field input:focus,.field select:focus{border-color:var(--border-focus);box-shadow:var(--ring-focus);}
.sec-title{font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);}
/* skeleton */
.sk{background:var(--bg-surface-sunken);border-radius:var(--radius-sm);position:relative;overflow:hidden;}
.sk::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,var(--bg-inset),transparent);transform:translateX(-100%);animation:shimmer 1.4s infinite;}
@keyframes shimmer{100%{transform:translateX(100%);}}
/* modal */
.scrim{position:fixed;inset:0;background:var(--ink-900);opacity:.42;z-index:50;}
.modal{position:fixed;inset:0;z-index:51;display:grid;place-items:center;padding:var(--space-6);}
.modal .box{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-xl);box-shadow:var(--shadow-e3);width:100%;max-width:520px;display:flex;flex-direction:column;max-height:86vh;}
.modal .mh{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-5);border-bottom:1px solid var(--border-subtle);}
.modal .mh .mt{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.modal .mh .md{font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-1);}
.modal .mb{padding:var(--space-5);overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-4);}
.modal .mf{display:flex;align-items:center;justify-content:flex-end;gap:var(--space-2);padding:var(--space-4) var(--space-5);border-top:1px solid var(--border-subtle);}
.modal .danger-ic{width:36px;height:36px;border-radius:var(--radius-md);background:var(--status-error-subtle);color:var(--status-error);display:grid;place-items:center;flex:none;}
.modal .danger-ic i{width:18px;height:18px;}
/* combobox in modal */
.cbox{border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;}
.cbox .cf{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border-bottom:1px solid var(--border-subtle);color:var(--text-muted);font-size:var(--text-sm);}
.cbox .cf i{width:15px;height:15px;}
.cbox .copt{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);font-size:var(--text-sm);cursor:pointer;}
.cbox .copt:hover{background:var(--bg-surface-sunken);}
.cbox .copt .av{width:26px;height:26px;border-radius:var(--radius-pill);background:var(--bg-surface-sunken);color:var(--text-secondary);display:grid;place-items:center;font-size:var(--text-2xs);font-weight:var(--weight-semibold);}
.cbox .copt.on{background:var(--brand-subtle);}
.cbox .copt .rl{margin-left:auto;color:var(--brand-primary);}
.cbox .copt .rl i{width:16px;height:16px;}
.selchips{display:flex;flex-wrap:wrap;gap:var(--space-2);}
.filedrop{border:1.5px dashed var(--border-strong);border-radius:var(--radius-md);padding:var(--space-5);text-align:center;color:var(--text-muted);font-size:var(--text-sm);display:flex;flex-direction:column;align-items:center;gap:var(--space-2);}
.filedrop i{width:24px;height:24px;}
/* toast */
.toast{position:fixed;right:var(--space-6);bottom:var(--space-6);z-index:60;display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);background:var(--bg-surface);border:1px solid var(--border-subtle);border-left:3px solid var(--status-success);border-radius:var(--radius-md);box-shadow:var(--shadow-e3);font-size:var(--text-sm);max-width:380px;}
.toast i{width:17px;height:17px;color:var(--status-success);flex:none;margin-top:1px;}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);}
.statelbl{font-size:var(--text-2xs);font-family:var(--font-mono);color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:var(--space-2);}
.statelbl::before{content:"";flex:1;height:1px;background:var(--border-subtle);}
.statelbl::after{content:"";flex:1;height:1px;background:var(--border-subtle);}
@media (prefers-reduced-motion: reduce){*{transition-duration:.001ms !important;animation-duration:.001ms !important;}.sk::after{display:none;}}
</style>

/* ---- Students tab (select → bulk bar, row popover, pagination) ---- */

  const toggle=id=>setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  React.useEffect(()=>{const h=()=>setMenu(null);if(menu){document.addEventListener("click",h);return()=>document.removeEventListener("click",h);}},[menu]);
  if(students.length===0)return <EmptyStudents archived={archived} canManage={canManage}/>;
  return <div style={{position:"relative"}}>
    {sel.length>0 && <div className="bulkbar" role="region" aria-label="Bulk actions">
      <span className="bn">{sel.length} selected</span><div className="sp"></div>
      {canManage && !archived && <>
        <button className="bb"><i data-lucide="arrow-right-left"></i>Move…</button>
        <button className="bb dng" onClick={()=>{onRemove(sel);setSel([]);}}><i data-lucide="user-minus"></i>Remove</button>
      </>}
      <button className="bb" onClick={()=>setSel([])}><i data-lucide="x"></i>Clear</button>
    </div>}

        <th>Roll Number</th><th>Grade</th><th>Status</th><th className="col-act"></th>

      <tbody>{students.map(s=>(
        <tr key={s.id} className={(sel.includes(s.id)?"sel ":"")+(pendingIds.includes(s.id)?"pending":"")}>

/* ---- Add students modal ---- */
function AddStudentsModal({open,onClose,onConfirm}){
  const [picked,setPicked]=React.useState([]);
  React.useEffect(()=>{ if(open) setPicked([]); },[open]);
  if(!open) return null;
  const toggle=id=>setPicked(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  return <>
    <div className="scrim" onClick={onClose}></div>
    <div className="modal" role="dialog" aria-modal="true" aria-labelledby="add-t">
      <div className="box">
        <div className="mh"><div><div className="mt" id="add-t">Add students</div>
          <div className="md">Add students to Grade 9 — Section A. Their class access updates after they are saved.</div></div>
          <button className="icon-btn" style={{marginLeft:"auto"}} aria-label="Close" onClick={onClose}><i data-lucide="x"></i></button></div>
        <div className="mb">
          <div className="cbox"><div className="cf"><i data-lucide="search"></i><span>Search students not in this class…</span></div>
            {PICKER.map(p=>(<div key={p.id} className={"copt"+(picked.includes(p.id)?" on":"")} onClick={()=>toggle(p.id)}>
              <span className="av">{initials(p.name)}</span><div><div>{p.name}</div>
                <div className="ax-muted ax-mono" style={{fontSize:"var(--text-2xs)"}}>{p.roll}</div></div>
              {picked.includes(p.id)&&<span className="rl"><i data-lucide="check"></i></span>}</div>))}
          </div>
          {picked.length>0 && <div className="selchips">{picked.map(id=>{const p=PICKER.find(x=>x.id===id);
            return <span className="chip" key={id} style={{background:"var(--brand-subtle)",borderColor:"var(--brand-primary)",color:"var(--brand-primary)"}}>{p.name}
              <i data-lucide="x" style={{width:12,height:12,cursor:"pointer"}} onClick={()=>toggle(id)}></i></span>;})}</div>}
          <div className="statelbl">or import a roster</div>
          <div className="filedrop"><i data-lucide="upload-cloud"></i><span>Drop a CSV file or click to browse</span>
            <span className="ax-muted" style={{fontSize:"var(--text-2xs)"}}>Name, Roll Number, Email · idempotent, batched</span></div>
        </div>
        <div className="mf"><Button variant="ghost" onClick={onClose}>Cancel</Button>
          <Button variant="primary" leadingIcon="user-plus" disabled={picked.length===0}
            onClick={()=>onConfirm(picked)}>Add {picked.length>0?picked.length+" ":""}students</Button></div>
      </div>
    </div>
  </>;
}

      <KPI icon="layers" label="Spaces" value="4"/>
    </div>

    {/* Tabs + active panel */}
    <div className="panel">
      <div role="tablist" aria-label="Class sections" className="tabs" style={{padding:"0 var(--space-2)"}}>
        {tabs.map((t,i)=>(<button key={t.label} role="tab" id={"tab-"+i} aria-controls={"panel-"+i}
          aria-selected={tab===i} className="tab" onClick={()=>setTab(i)}>
          {t.label}{t.cnt!=null&&<span className="cnt">{t.cnt}</span>}</button>))}
      </div>

      {tab===0 && <div role="tabpanel" id="panel-0" aria-labelledby="tab-0">
        <div className="toolbar">
          <label className="tb-search"><i data-lucide="search"></i>
            <input placeholder="Search students…" aria-label="Search students"/></label>
          <div className="sp" style={{flex:1}}></div>
          {canManage && !archived && <>
            <Button variant="primary" leadingIcon="user-plus" onClick={()=>setAddOpen(true)}>Add students</Button>
            <Button variant="secondary" leadingIcon="upload">Import CSV</Button></>}
        </div>
        <StudentsTab archived={archived} canManage={canManage} students={students} onRemove={removeStudents} pendingIds={pending}/>
      </div>}

      {tab===1 && <div role="tabpanel" id="panel-1" aria-labelledby="tab-1">
        <div className="toolbar"><div style={{flex:1}}></div>
          {canManage && !archived && <Button variant="primary" leadingIcon="user-plus">Assign teacher</Button>}</div>
        <TeachersTab/>
      </div>}

      {tab===2 && <div role="tabpanel" id="panel-2" aria-labelledby="tab-2"><ExamsTab/></div>}
      {tab===3 && <div role="tabpanel" id="panel-3" aria-labelledby="tab-3"><SpacesTab/></div>}
      {tab===4 && <div role="tabpanel" id="panel-4" aria-labelledby="tab-4">
        <SettingsTab archived={archived} canManage={canManage} onToast={showToast}/></div>}
    </div>

    {/* ───────────── Secondary state gallery (the spec's other §5 states) ───────────── */}
    <div className="statelbl">Other states (per spec §5)</div>
    <div className="sub-grid">
      {/* partial-load error scoped to a tab */}
      <div className="card" style={{padding:0}}>
        <div className="toolbar" style={{borderBottom:"1px solid var(--border-subtle)"}}><span className="sec-title" style={{fontSize:"var(--text-sm)"}}>Partial load</span></div>
        <div style={{padding:"var(--space-5)"}}><div className="alert err" role="alert">
          <i data-lucide="circle-alert" className="lead"></i>
          <div className="ab"><span className="at">Couldn't load teachers. </span><span className="ax-sec">Other panels are unaffected.</span></div>
          <Button variant="secondary" size="sm" leadingIcon="rotate-cw">Retry</Button></div>
        </div>
      </div>
      {/* empty: no exams */}
      <div className="card" style={{padding:0}}>
        <div className="toolbar" style={{borderBottom:"1px solid var(--border-subtle)"}}><span className="sec-title" style={{fontSize:"var(--text-sm)"}}>Empty · Exams</span></div>
        <div className="empty" style={{padding:"var(--space-8) var(--space-6)"}}><div className="ic"><i data-lucide="file-check"></i></div>
          <div className="et" style={{fontSize:"var(--text-base)"}}>No exams linked</div>
          <div className="eb">Exams created for this class will appear here.</div></div>
      </div>
      {/* loading skeleton */}
      <div className="card" style={{padding:0}}>
        <div className="toolbar" style={{borderBottom:"1px solid var(--border-subtle)"}}><span className="sec-title" style={{fontSize:"var(--text-sm)"}}>Loading</span></div>
        <div style={{padding:"var(--space-5)",display:"flex",flexDirection:"column",gap:"var(--space-3)"}}>
          <div className="sk" style={{height:14,width:"40%"}}></div>
          {[0,1,2].map(i=>(<div key={i} className="ax-row" style={{gap:"var(--space-3)"}}>
            <div className="sk" style={{width:30,height:30,borderRadius:"var(--radius-pill)"}}></div>
            <div className="sk" style={{height:12,flex:1}}></div>
            <div className="sk" style={{height:12,width:64}}></div></div>))}
        </div>
      </div>
      {/* RBAC: staff without canManageUsers — write controls hidden, read-only notice */}
      <div className="card" style={{padding:0}}>
        <div className="toolbar" style={{borderBottom:"1px solid var(--border-subtle)"}}><span className="sec-title" style={{fontSize:"var(--text-sm)"}}>RBAC · Staff (no roster permission)</span></div>
        <div style={{padding:"var(--space-5)"}}><div className="alert info" role="status" style={{borderColor:"var(--status-info)",background:"var(--status-info-subtle)"}}>
          <i data-lucide="lock" className="lead" style={{color:"var(--status-info)"}}></i>
          <div className="ab"><span className="at">View only. </span>
            <span className="ax-sec">You don't have permission to change the roster. Add / Remove / Import controls are hidden.</span></div></div>
        </div>
      </div>
    </div>

    <AddStudentsModal open={addOpen} onClose={()=>setAddOpen(false)} onConfirm={addStudents}/>
    <ArchiveModal open={archOpen} onClose={()=>setArchOpen(false)} onConfirm={()=>{setArchOpen(false);setArchived(true);showToast("Archived Grade 9 — Section A.");}}/>

    {toast && <div className="toast" role="status"><i data-lucide="check-circle"></i><span>{toast}</span></div>}
  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
