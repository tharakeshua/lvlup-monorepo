<!-- @dsCard group="Admin" viewport="1280x820" name="Admin Dashboard ★" subtitle="Tenant home · KPIs · at-risk · quota & AI cost · read-only launch pad" -->
<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
html,body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);}
#root{min-height:100vh;}
.ax-shell{display:grid;grid-template-columns:264px 1fr;min-height:100vh;}
.ax-side{position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-5);background:var(--bg-surface);border-right:1px solid var(--border-subtle);padding:var(--space-5) var(--space-4);}
.ax-brand{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-1) var(--space-2);}
.ax-brand .mk{width:34px;height:34px;border-radius:var(--radius-md);background:var(--brand-primary);color:var(--text-on-accent);display:grid;place-items:center;font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);}
.ax-brand .nm{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-base);line-height:1.1;}
.ax-brand .sc{font-size:var(--text-2xs);color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;}
.ax-navgrp{display:flex;flex-direction:column;gap:2px;}
.ax-navlbl{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);padding:var(--space-2) var(--space-2) var(--space-1);}
.ax-nav{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--text-secondary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;position:relative;transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard);}
.ax-nav i{width:18px;height:18px;}
.ax-nav .ct{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.ax-nav:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.ax-nav.on{background:var(--brand-subtle);color:var(--brand-primary);font-weight:var(--weight-semibold);}
.ax-nav.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:58%;border-radius:var(--radius-pill);background:var(--brand-primary);}
.ax-side .foot{margin-top:auto;display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-4);border-top:1px solid var(--border-subtle);}
.ax-rs{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;}
.ax-rs i:last-child{margin-left:auto;}
.ax-uc{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2);border-radius:var(--radius-md);cursor:pointer;}
.ax-uc:hover{background:var(--bg-surface-sunken);}
.ax-uc .av{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.ax-uc .nm{font-size:var(--text-sm);font-weight:var(--weight-medium);line-height:1.1;}
.ax-uc .rl{font-size:var(--text-2xs);color:var(--text-muted);}
.ax-main{display:flex;flex-direction:column;min-width:0;}
.ax-top{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-8);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;top:0;z-index:20;}
.ax-bc{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-muted);}
.ax-bc b{color:var(--text-primary);font-weight:var(--weight-medium);}
.ax-top .sp{flex:1;}
.ax-search{display:flex;align-items:center;gap:var(--space-2);width:280px;max-width:32vw;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-muted);font-size:var(--text-sm);}
.ax-search kbd{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:0 var(--space-1);}
.ax-body{flex:1;overflow-y:auto;padding:var(--space-8);display:flex;flex-direction:column;gap:var(--space-6);width:100%;max-width:1264px;}
.ax-head{display:flex;align-items:flex-start;gap:var(--space-4);flex-wrap:wrap;}
.ax-head .tx{display:flex;flex-direction:column;gap:var(--space-1);}
.ax-h1{font-family:var(--font-display);font-size:var(--text-2xl);line-height:var(--leading-2xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);}
.ax-sub{font-size:var(--text-sm);color:var(--text-secondary);}
.ax-head .ac{margin-left:auto;display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;}
.ax-grid{display:grid;gap:var(--space-4);}
.ax-g6{grid-template-columns:repeat(6,1fr);}
.ax-gmain{grid-template-columns:2fr 1fr;align-items:start;}
.ax-row{display:flex;align-items:center;gap:var(--space-3);}
.ax-col{display:flex;flex-direction:column;gap:var(--space-3);}
.ax-mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.ax-muted{color:var(--text-muted);}
.ax-sec{color:var(--text-secondary);}
.ax-sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
/* KPI */
.kpi{display:flex;flex-direction:column;gap:var(--space-2);}
.kpi .lh{display:flex;align-items:center;gap:var(--space-2);color:var(--text-muted);font-size:var(--text-xs);font-weight:var(--weight-medium);}
.kpi .lh i{width:15px;height:15px;}
.kpi .vv{font-family:var(--font-mono);font-size:var(--text-2xl);font-weight:var(--weight-medium);font-variant-numeric:tabular-nums;line-height:1.1;}
.kpi .tr{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-xs);}
.kpi .tr i{width:13px;height:13px;}
/* mini bar chart */
.chart{display:flex;align-items:flex-end;gap:var(--space-3);height:180px;padding-top:var(--space-4);border-bottom:1px solid var(--border-subtle);}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:var(--space-2);height:100%;justify-content:flex-end;}
.chart .bar{width:100%;max-width:46px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:var(--brand-primary);}
.chart .vl{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-secondary);}
.chart .xl{font-size:var(--text-2xs);color:var(--text-muted);text-align:center;}
/* meter */
.meter{display:flex;flex-direction:column;gap:var(--space-2);}
.meter .mt{display:flex;align-items:baseline;justify-content:space-between;}
.meter .ml{font-size:var(--text-sm);color:var(--text-secondary);}
.meter .mv{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-primary);}
.bar-track{height:8px;border-radius:var(--radius-pill);background:var(--bg-inset);overflow:hidden;}
.bar-fill{height:100%;border-radius:var(--radius-pill);background:var(--brand-primary);}
.bar-fill.warn{background:var(--status-warning);}
.bar-fill.err{background:var(--status-error);}
.deflist{display:grid;grid-template-columns:auto 1fr;gap:var(--space-3) var(--space-5);font-size:var(--text-sm);}
.deflist dt{color:var(--text-muted);}
.deflist dd{color:var(--text-primary);text-align:right;margin:0;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-medium);border:1px solid transparent;}
.badge i{width:12px;height:12px;}
.badge.suc{background:var(--status-success-subtle);color:var(--status-success);}
.badge.brd{background:var(--brand-subtle);color:var(--brand-primary);}
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px var(--space-3);border-radius:var(--radius-pill);font-size:var(--text-xs);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);color:var(--text-secondary);}
.chip .d{width:7px;height:7px;border-radius:var(--radius-pill);background:var(--brand-primary);}
.chip.off{color:var(--text-muted);}
.chip.off .d{background:var(--border-strong);}
.card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-5);}
.card.lk{cursor:pointer;transition:box-shadow var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard);}
.card.lk:hover{box-shadow:var(--shadow-e2);border-color:var(--border-strong);}
.panel{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;}
.panel .ph{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border-subtle);}
.panel .ph .pt{font-size:var(--text-base);font-weight:var(--weight-semibold);margin-right:auto;}
.panel .pb{padding:var(--space-5);}
.panel .pf{padding:var(--space-3) var(--space-5);border-top:1px solid var(--border-subtle);color:var(--text-muted);font-size:var(--text-xs);}
.alert{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--status-warning);background:var(--status-warning-subtle);font-size:var(--text-sm);}
.alert i.lead{width:18px;height:18px;color:var(--status-warning);flex:none;margin-top:1px;}
.alert .ab{flex:1;}
.alert .at{font-weight:var(--weight-semibold);}
.sec-h{display:flex;align-items:baseline;gap:var(--space-3);margin-bottom:var(--space-3);}
.sec-h .st{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.sec-h .sca{font-size:var(--text-xs);color:var(--text-muted);}
.lnk{color:var(--brand-primary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;}
.icon-btn{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}
.icon-btn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
@media (prefers-reduced-motion: reduce){*{transition-duration:.001ms !important;animation-duration:.001ms !important;}}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head><body><div id="root"></div>
<script type="text/babel">
const L = window.LvlupV0DesignSystem_5d0725 || {};
const Button = L.Button || (({children,leadingIcon,variant})=> <button className={"btn btn--"+(variant||"primary")}>{leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}</button>);

function Nav({icon,label,route,active,count}){
  return <a className={"ax-nav"+(active===route?" on":"")} aria-current={active===route?"page":undefined}>
    <i data-lucide={icon}></i><span>{label}</span>{count!=null&&<span className="ct">{count}</span>}</a>;
}
function Shell({active,children}){
  return <div className="ax-shell">
    <aside className="ax-side">
      <div className="ax-brand"><div className="mk">L</div>
        <div><div className="nm">Auto-LevelUp</div><div className="sc">Northwood Academy · Admin</div></div></div>
      <nav aria-label="Primary" style={{display:"flex",flexDirection:"column",gap:"var(--space-5)"}}>
        <div className="ax-navgrp"><div className="ax-navlbl">Overview</div>
          <Nav icon="layout-dashboard" label="Dashboard" route="/" active={active}/></div>
        <div className="ax-navgrp"><div className="ax-navlbl">Management</div>
          <Nav icon="users" label="Users" route="/users" active={active}/>
          <Nav icon="school" label="Classes" route="/classes" active={active}/>
          <Nav icon="shield-check" label="Staff & Permissions" route="/staff" active={active}/>
          <Nav icon="file-check" label="Exams" route="/exams" active={active}/>
          <Nav icon="layers" label="Spaces" route="/spaces" active={active}/>
          <Nav icon="book-open" label="Courses" route="/courses" active={active}/>
          <Nav icon="calendar-range" label="Academic Sessions" route="/academic-sessions" active={active}/>
          <Nav icon="megaphone" label="Announcements" route="/announcements" active={active}/></div>
        <div className="ax-navgrp"><div className="ax-navlbl">Analytics</div>
          <Nav icon="bar-chart-3" label="Analytics" route="/analytics" active={active}/>
          <Nav icon="file-text" label="Reports" route="/reports" active={active}/>
          <Nav icon="sparkles" label="AI Usage" route="/ai-usage" active={active}/></div>
        <div className="ax-navgrp"><div className="ax-navlbl">Configuration</div>
          <Nav icon="bell" label="Notifications" route="/notifications" active={active}/>
          <Nav icon="download" label="Data Export" route="/data-export" active={active}/>
          <Nav icon="settings" label="Settings" route="/settings" active={active}/></div>
      </nav>
      <div className="foot">
        <div className="ax-rs"><i data-lucide="building"></i><span>Switch tenant</span><i data-lucide="chevrons-up-down"></i></div>
        <div className="ax-uc"><div className="av">AK</div>
          <div><div className="nm">Anita Kapoor</div><div className="rl">Tenant Admin</div></div></div>
      </div>
    </aside>
    <div className="ax-main">
      <header className="ax-top">
        <nav className="ax-bc" aria-label="Breadcrumb"><b>Dashboard</b></nav>
        <div className="sp"></div>
        <div className="ax-search"><i data-lucide="search"></i><span>Search…</span><kbd>⌘K</kbd></div>
        <button className="icon-btn" aria-label="Toggle theme"><i data-lucide="sun"></i></button>
        <button className="icon-btn" aria-label="Notifications, 3 unread"><i data-lucide="bell"></i></button>
      </header>
      <main id="main-content" className="ax-body">{children}</main>
    </div>
  </div>;
}

const KPI=({icon,label,value,trend})=> (
  <div className="card lk kpi" role="link" tabIndex="0">
    <div className="lh"><i data-lucide={icon}></i><span>{label}</span></div>
    <div className="vv">{value}</div>
    {trend && <div className="tr" style={{color:trend.tone}}><i data-lucide={trend.icon}></i><span>{trend.label}</span></div>}
  </div>);

const classes=[["8A",82],["7B",74],["8C",68],["6A",61],["7A",55],["6C",41]];
const meters=[["Students","142 / 200",71,"warn"],["Teachers","18 / 30",60,""],["Spaces","9 / 25",36,""],["Exams / month","47 / 50",94,"err"],["AI calls / month","6.2k / 10k",62,""]];
const features=[["Auto grade",true],["AI chat",true],["Parent portal",true],["Leaderboards",true],["Proctoring",false],["Custom branding",true],["Bulk import",true],["Webhooks",false]];

function Screen(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  return <Shell active="/">
    {/* QuotaWarningBanner — shown because Exams/month ≥ 90% (icon + label, not color-only) */}
    <div className="alert" role="status">
      <i data-lucide="triangle-alert" className="lead"></i>
      <div className="ab"><span className="at">You're approaching your Pro plan limit for Exams (47/50). </span>
        <span className="ax-sec">Upgrade or archive to free up space.</span></div>
      <span className="lnk">Review plan →</span>
    </div>

    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Dashboard</h1>
        <div className="ax-sub">Welcome back, Anita Kapoor</div>
        <div className="ax-sub ax-muted">Northwood Academy · Pro · <span className="badge suc"><i data-lucide="check"></i>Active</span></div></div>
    </div>

    {/* KPI row — six deep links; values server-authoritative (render-only) */}
    <div className="ax-grid ax-g6">
      <KPI icon="graduation-cap" label="Students" value="142"/>
      <KPI icon="users" label="Teachers" value="18"/>
      <KPI icon="school" label="Classes" value="12"/>
      <KPI icon="layers" label="Spaces" value="9"/>
      <KPI icon="file-check" label="Exams" value="47"/>
      <KPI icon="alert-triangle" label="At-Risk Students" value="6"
        trend={{icon:"trending-down",label:"Needs attention",tone:"var(--status-warning)"}}/>
    </div>

    {/* Class performance + AI cost / tenant info */}
    <div className="ax-grid ax-gmain">
      <div className="panel">
        <div className="ph"><span className="pt">Class Performance</span><span className="ax-sca ax-muted" style={{fontSize:"var(--text-xs)"}}>Average exam score by class</span></div>
        <div className="pb">
          <div className="chart" role="img" aria-label="Bar chart: average exam score by class. Highest 8A 82%, lowest 6C 41%.">
            {classes.map(([k,v])=> <div className="col" key={k}>
              <span className="vl">{v}</span><div className="bar" style={{height:v+"%"}}></div><span className="xl">{k}</span></div>)}
          </div>
          <table className="ax-sr"><caption>Average exam score by class</caption><thead><tr><th>Class</th><th>Score</th></tr></thead>
            <tbody>{classes.map(([k,v])=><tr key={k}><td>{k}</td><td>{v}%</td></tr>)}</tbody></table>
        </div>
      </div>
      <div className="ax-col">
        <div className="card">
          <div className="sec-h"><span className="st" style={{fontSize:"var(--text-base)"}}>AI Cost</span></div>
          <div className="ax-row" style={{justifyContent:"space-between"}}>
            <div className="ax-col" style={{gap:"2px"}}><span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Today's spend</span><span className="ax-mono" style={{fontSize:"var(--text-xl)"}}>$4.18</span></div>
            <div className="ax-col" style={{gap:"2px"}}><span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Today's calls</span><span className="ax-mono" style={{fontSize:"var(--text-xl)"}}>312</span></div>
          </div>
          <div style={{marginTop:"var(--space-4)"}}><span className="lnk">View AI usage →</span></div>
        </div>
        <div className="card">
          <div className="sec-h"><span className="st" style={{fontSize:"var(--text-base)"}}>Tenant Info</span></div>
          <dl className="deflist">
            <dt>Tenant code</dt><dd className="ax-mono">NWA-0421</dd>
            <dt>Plan</dt><dd>Pro</dd>
            <dt>Status</dt><dd><span className="badge suc"><i data-lucide="check"></i>Active</span></dd>
            <dt>Contact</dt><dd>admin@northwood.edu</dd>
          </dl>
        </div>
      </div>
    </div>

    {/* Subscription usage — quota meters; thresholds map to status tokens */}
    <div className="panel">
      <div className="ph"><span className="pt">Subscription usage</span>
        <span className="badge brd" style={{marginRight:"var(--space-3)"}}>Pro</span>
        <span className="lnk">View details →</span></div>
      <div className="pb"><div className="ax-grid" style={{gridTemplateColumns:"repeat(5,1fr)"}}>
        {meters.map(([l,v,p,t])=> <div className="meter" key={l}>
          <div className="mt"><span className="ml">{l}</span><span className="mv">{v}</span></div>
          <div className="bar-track" role="progressbar" aria-label={l+" quota: "+v+" used"} aria-valuenow={p} aria-valuemin="0" aria-valuemax="100">
            <div className={"bar-fill"+(t?" "+t:"")} style={{width:p+"%"}}></div></div>
        </div>)}
      </div></div>
      <div className="pf">Subscription expires 31 Aug 2026</div>
    </div>

    {/* Features */}
    <div className="panel">
      <div className="ph"><span className="pt">Features</span></div>
      <div className="pb"><div className="ax-row ax-wrap" style={{gap:"var(--space-2)",flexWrap:"wrap"}}>
        {features.map(([l,on])=> <span className={"chip"+(on?"":" off")} key={l}><span className="d"></span>{l}{on?"":" (off)"}</span>)}
      </div></div>
    </div>
  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
