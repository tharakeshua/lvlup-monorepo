  {id:"n5", grp:"Yesterday", type:"exam_results_released", title:"Exam results released", body:"Results for End-Term Physics (Grade 11) were released to students and parents.", time:"Yesterday", at:"19 Jun 2026, 16:20", read:true, url:"/exams"},
  {id:"n6", grp:"Earlier", type:"space_published",      title:"Space published",          body:"The space “Data Structures — Foundations” was published and assigned to 4 classes.", time:"3 days ago", at:"17 Jun 2026, 11:09", read:true, url:"/spaces"},
  {id:"n7", grp:"Earlier", type:"deadline_reminder",    title:"Deadline approaching",     body:"The submission window for Quarterly Chemistry closes in 24 hours for Grade 12.", time:"3 days ago", at:"17 Jun 2026, 09:00", read:true, url:"/exams"},
  {id:"n8", grp:"Earlier", type:"system_announcement",  title:"Scheduled maintenance",    body:"Platform maintenance is planned for 28 Jun, 02:00–04:00 local time. Brief read-only windows expected.", time:"5 days ago", at:"15 Jun 2026, 08:00", read:true, url:null},
];
const GROUPS = ["Today","Yesterday","Earlier"];

function NRow({n, onOpen, onMarkRead, busy}){
  const m = TYPE_MAP[n.type];
  return (
    <article className={"nrow"+(n.read?"":" unread")} role="article" tabIndex="0"
      aria-label={n.title+", "+n.time+(n.read?"":", unread")}
      onClick={()=>onOpen(n)}
      onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();onOpen(n);}}}>
      <div className={"nicon "+m.tone}><i data-lucide={m.icon}></i></div>
      <div className="nbody">
        <div className="ntop">
          <span className="ntitle">{n.title}</span>
          {!n.read && <span className="udot" aria-hidden="true"></span>}
          {!n.read && <span className="ax-sr">Unread</span>}
          {!n.read &&
            <button className="btn btn--ghost btn--sm markread"
              aria-label={"Mark “"+n.title+"” as read"}
              busy={busy?"true":undefined} disabled={busy}
              onClick={e=>{e.stopPropagation();onMarkRead(n.id);}}>
              {busy?<span className="spin"></span>:<i data-lucide="check"></i>}Mark read</button>}
        </div>
        <div className="nexcerpt">{n.body}</div>
        <div className="nmeta">
          <span className="ntime" title={n.at}>{n.time}</span>
          <span className={"tagbadge "+m.tone} aria-label={"Type: "+m.label}><i data-lucide={m.icon}></i>{m.label}</span>
        </div>
      </div>
    </article>
  );
}

function Screen(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const [items,setItems]=React.useState(SEED);
  const [tab,setTab]=React.useState("all");       // all | unread
  const [rowBusy,setRowBusy]=React.useState(null); // id mid-markRead
  const [allBusy,setAllBusy]=React.useState(false);
  const [toast,setToast]=React.useState(null);
  const live=React.useRef(null);

  const unreadCount = items.filter(i=>!i.read).length;
  const announce=(msg)=>{ if(live.current) live.current.textContent=msg; };

  const markRead=(id)=>{
    setRowBusy(id);
    setTimeout(()=>{ setItems(xs=>xs.map(x=>x.id===id?{...x,read:true}:x)); setRowBusy(null); announce("Marked as read"); },420);
  };
  const openRow=(n)=>{
    if(!n.read){ setItems(xs=>xs.map(x=>x.id===n.id?{...x,read:true}:x)); announce("Marked as read"); }
    /* would navigate to n.url via actionUrl; deep-link out, inbox changes nothing */
  };
  const markAll=()=>{
    if(unreadCount===0) return;
    setAllBusy(true);
    const cnt=unreadCount;
    setItems(xs=>xs.map(x=>({...x,read:true})));   // optimistic flip-in-place
    setTimeout(()=>{ setAllBusy(false); setToast({n:cnt}); announce("All marked as read"); setTimeout(()=>setToast(null),3200); },520);
  };

  const visible = tab==="unread" ? items.filter(i=>!i.read) : items;

  return <Shell active="/notifications" crumb={["Home","Notifications"]} unread={unreadCount}>

    {/* Page header — Mark all as read is GHOST/secondary (no hero CTA in admin chrome) */}
    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Notifications</h1>
        <div className="ax-sub">Updates addressed to you in this academy.</div></div>
      <div className="ac">
        <Button variant="secondary" leadingIcon={allBusy?null:"check-check"} busy={allBusy}
          disabled={unreadCount===0} onClick={markAll}>Mark all as read</Button>
      </div>
    </div>

    {/* Scope / domain note: tenant-isolated + recipient-scoped, server-derived */}
    <div className="alert info" role="note">
      <i data-lucide="shield" className="lead"></i>
      <div className="ab"><span className="ax-sec">This inbox shows only your own notifications in Northwood Academy. Scope is derived server-side from your claims — switching tenants re-scopes it entirely. Notifications are created by the system; you can read and mark them read, nothing else.</span></div>
    </div>

    {/* Filter Tabs — All / Unread (count chip) */}
    <div className="tabs" role="tablist" aria-label="Filter notifications">
      <button role="tab" aria-selected={tab==="all"} className={"tab"+(tab==="all"?" on":"")} onClick={()=>setTab("all")}>All</button>
      <button role="tab" aria-selected={tab==="unread"} aria-label={"Unread, "+unreadCount}
        className={"tab"+(tab==="unread"?" on":"")} onClick={()=>setTab("unread")}>Unread{unreadCount>0&&<span className="pill">{unreadCount}</span>}</button>
    </div>

    {/* live region for SR mark-read announcements */}
    <div ref={live} className="ax-sr" role="status" aria-live="polite"></div>

    {/* PRIMARY SUCCESS STATE — grouped reading list */}
    <div className="reading">
      {visible.length===0
        ? (tab==="unread"
            ? <div className="listcard"><div className="empty">
                <div className="ei"><i data-lucide="check-circle"></i></div>
                <div className="et">You're all caught up</div>
                <div className="eb">No unread notifications.</div>
                <div className="ea"><Button variant="ghost" leadingIcon="list" onClick={()=>setTab("all")}>View all</Button></div>
              </div></div>
            : <div className="listcard"><div className="empty">
                <div className="ei"><i data-lucide="inbox"></i></div>
                <div className="et">No notifications yet</div>
                <div className="eb">You're all caught up. New updates about imports, budgets, and student activity will appear here.</div>
              </div></div>)
        : <div className="listcard" role="feed" aria-label="Notifications">
            {GROUPS.map(g=>{
              const rows=visible.filter(n=>n.grp===g);
              if(rows.length===0) return null;
              return <React.Fragment key={g}>
                <h2 className="grp-h">{g}</h2>
                {rows.map(n=><NRow key={n.id} n={n} onOpen={openRow} onMarkRead={markRead} busy={rowBusy===n.id}/>)}
              </React.Fragment>;
            })}
            {/* Cursor pagination — Load more */}
            <div className="listfoot">
              <Button variant="ghost" leadingIcon="chevron-down">Load more</Button>
            </div>
          </div>}
    </div>

    {/* ===== Secondary stacked examples: this spec's other §5 states (present in markup) ===== */}
    <div className="sec-label" style={{marginTop:"var(--space-2)"}}><i data-lucide="layers-2"></i>Other states (reference)</div>

    {/* Loading skeleton — 5 rows on first load / filter change */}
    <div className="reading">
      <div className="listcard" aria-busy="true" aria-label="Loading notifications">
        <h2 className="grp-h">Loading</h2>
        {[0,1,2,3,4].map(i=>(
          <div className="nrow" key={i}>
            <div className="skl" style={{width:34,height:34,borderRadius:"var(--radius-md)"}}></div>
            <div className="nbody">
              <div className="skl" style={{width:i%2?180:220,height:13}}></div>
              <div className="skl" style={{width:i%2?320:420,height:11,marginTop:6}}></div>
              <div className="nmeta">
                <div className="skl" style={{width:64,height:10}}></div>
                <div className="skl" style={{width:88,height:16,borderRadius:"var(--radius-pill)"}}></div>
              </div>
            </div>
          </div>))}
      </div>
    </div>

    {/* Load error → InlineAlert banner (NOT empty state); code-driven copy + Retry */}
    <div className="reading">
      <div className="alert err" role="alert">
        <i data-lucide="alert-triangle" className="lead"></i>
        <div className="ab"><span className="at">Couldn't load notifications. </span>
          <span className="ax-sec">The service didn't respond. PERMISSION_DENIED → you don't have access to these notifications; RATE_LIMITED → try again shortly; TENANT_SUSPENDED → this academy is suspended.</span></div>
        <button className="lnk" aria-label="Retry loading notifications">Retry</button>
      </div>
    </div>

    {/* Empty — Unread filter (with View all ghost) */}
    <div className="reading">
      <div className="listcard"><div className="empty">
        <div className="ei"><i data-lucide="check-circle"></i></div>
        <div className="et">You're all caught up</div>
        <div className="eb">No unread notifications.</div>
        <div className="ea"><Button variant="ghost" leadingIcon="list">View all</Button></div>
      </div></div>
    </div>

    {/* Empty — All filter (no CTA; receiving surface) */}
    <div className="reading">
      <div className="listcard"><div className="empty">
        <div className="ei"><i data-lucide="inbox"></i></div>
        <div className="et">No notifications yet</div>
        <div className="eb">You're all caught up. New updates about imports, budgets, and student activity will appear here.</div>
      </div></div>
    </div>

    {/* Mobile variant — inline "Mark read" collapses to a trailing check IconButton (≥44px tap target) */}
    <div className="reading">
      <div className="sec-label" style={{marginBottom:"var(--space-2)"}}><i data-lucide="smartphone"></i>Mobile row — Mark read becomes a trailing icon button</div>
      <div className="listcard">
        <article className="nrow unread" role="article">
          <div className="nicon warn"><i data-lucide="alert-triangle"></i></div>
          <div className="nbody">
            <div className="ntop"><span className="ntitle">AI budget alert</span><span className="udot" aria-hidden="true"></span><span className="ax-sr">Unread</span></div>
            <div className="nexcerpt">Tenant spend reached 80% of the monthly cap.</div>
            <div className="nmeta"><span className="ntime">12 min ago</span><span className="tagbadge warn"><i data-lucide="alert-triangle"></i>Budget Alert</span></div>
          </div>
          <button className="icon-btn" style={{width:44,height:44,marginLeft:"auto",alignSelf:"center"}} aria-label="Mark as read"><i data-lucide="check"></i></button>
        </article>
      </div>
    </div>

    {/* Permission / access note — non-tenantAdmin never renders this screen (RequireAuth), stale token denied server-side */}
    <div className="reading">
      <div className="alert info" role="note">
        <i data-lucide="lock" className="lead"></i>
        <div className="ab"><span className="at">Tenant-admin only. </span>
          <span className="ax-sec">Any non-tenant-admin reaching /notifications is blocked at RequireAuth and this screen never renders. A stale token is denied server-side (PERMISSION_DENIED → error banner above).</span></div>
      </div>
    </div>

    {/* Success Toast — Mark all as read (server-authoritative markedCount) */}
    {toast && <div className="toastwrap">
      <div className="toast" role="status">
        <i data-lucide="check-circle"></i>
        <span>All caught up.</span>
        <span className="tc">{toast.n} marked</span>
      </div>
    </div>}

  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
