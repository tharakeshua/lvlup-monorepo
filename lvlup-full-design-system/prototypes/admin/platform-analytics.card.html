<script type="text/babel">
const L = window.LvlupV0DesignSystem_5d0725 || {};
const Button = L.Button || (({children,leadingIcon,trailingIcon,variant})=> <button className={"btn btn--"+(variant||"primary")}>{leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}{trailingIcon&&<i data-lucide={trailingIcon}></i>}</button>);

const RANGES = [["7d","Last 7 days"],["30d","Last 30 days"],["90d","Last 90 days"],["custom","Custom range…"]];

const KPI=({icon,label,value,delta,sub})=> (
  <div className="card kpi" role="group" aria-label={label+", "+value+(delta?", "+delta.aria:"")}>
    <div className="lh"><i data-lucide={icon}></i><span>{label}</span></div>
    <div className="vv">{value}</div>
    {delta && <div className="tr" style={{color:delta.tone}}><i data-lucide={delta.icon}></i><span>{delta.label}</span></div>}
    {sub && <div className="sub">{sub}</div>}
  </div>);

// signups area chart series (server-authoritative buckets, render-only)
const SIGNUPS=[18,26,22,31,28,40,44,38,52,49,61,58,72,68];
const ACTIVE=[3100,3260,3210,3380,3420,3540,3610,3580,3760,3700,3880,3920,4080,4210];
const RETAIN=[58,60,59,62,63,64,63,65,66,65,67,68,69,71];

function Area({data,stroke}){
  const w=300,h=120,mx=Math.max(...data),mn=Math.min(...data);
  const pts=data.map((v,i)=>[i/(data.length-1)*w, h-((v-mn)/(mx-mn||1))*h]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=line+` L ${w} ${h} L 0 ${h} Z`;
  return <svg className="chartsvg" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" role="img"
      aria-label="Signups over time, fourteen daily buckets, rising from 18 to 68 new signups per day.">
    {[0,.25,.5,.75,1].map(g=><line key={g} className="gln" x1="0" x2={w} y1={h*g} y2={h*g}/>)}
    <path d={area} fill={stroke} fillOpacity=".12"/>
    <path d={line} fill="none" stroke={stroke} strokeWidth="2"/>
    {pts.filter((_,i)=>i===pts.length-1).map((p,i)=><circle key={i} className="dot" cx={p[0]} cy={p[1]} r="3.5" stroke={stroke}/>)}
  </svg>;
}
function Line({a,b,sa,sb}){
  const w=300,h=120;
  const norm=(d)=>{const mx=Math.max(...d),mn=Math.min(...d);return d.map((v,i)=>[i/(d.length-1)*w, h-((v-mn)/(mx-mn||1))*h]);};
  const pa=norm(a),pb=norm(b);
  const path=(p)=>p.map((q,i)=>(i?"L":"M")+q[0].toFixed(1)+" "+q[1].toFixed(1)).join(" ");
  return <svg className="chartsvg" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" role="img"
      aria-label="Active users and retention over time. Active users rising from 3,100 to 4,210; retention rising from 58 percent to 71 percent.">
    {[0,.25,.5,.75,1].map(g=><line key={g} className="gln" x1="0" x2={w} y1={h*g} y2={h*g}/>)}
    <path d={path(pa)} fill="none" stroke={sa} strokeWidth="2"/>
    <path d={path(pb)} fill="none" stroke={sb} strokeWidth="2" strokeDasharray="4 3"/>
  </svg>;
}

const PLANS=[["Enterprise",5200,42,false],["Premium",3100,25,false],["Basic",2480,20,true],["Trial",1180,9,true],["None",520,4,true]];

const STATUS={
  active:{cls:"suc",icon:"circle-check",label:"Active"},
  trial:{cls:"inf",icon:"clock",label:"Trial"},
  suspended:{cls:"wrn",icon:"pause",label:"Suspended"},
  expired:{cls:"mut",icon:"circle-slash",label:"Expired"},
};
const TENANTS=[
  {id:"t_acme",name:"Acme Academy",code:"ACME-0118",students:820,teachers:210,total:1030,active:41,status:"active"},
  {id:"t_nwa",name:"Northwood Academy",code:"NWA-0421",students:712,teachers:148,total:860,active:38,status:"active"},
  {id:"t_brt",name:"Brightpath Institute",code:"BRT-0309",students:640,teachers:132,total:772,active:36,status:"active"},
  {id:"t_mer",name:"Meridian School",code:"MER-0512",students:498,teachers:96,total:594,active:29,status:"trial"},
  {id:"t_oak",name:"Oakridge Learning",code:"OAK-0244",students:410,teachers:88,total:498,active:33,status:"active"},
  {id:"t_sum",name:"Summit Tutorials",code:"SUM-0677",students:286,teachers:54,total:340,active:21,status:"suspended"},
  {id:"t_vrd",name:"Verdant College Prep",code:"VRD-0801",students:204,teachers:41,total:245,active:18,status:"expired"},
  {id:"t_lkv",name:"Lakeview Academy",code:"LKV-0356",students:178,teachers:36,total:214,active:27,status:"trial"},
];

function StatusBadge({s}){const c=STATUS[s];return <span className={"badge "+c.cls}><i data-lucide={c.icon}></i>{c.label}</span>;}

function Screen(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const [range,setRange]=React.useState("30d");
  const [rangeOpen,setRangeOpen]=React.useState(false);
  const [exportOpen,setExportOpen]=React.useState(false);
  const [toast,setToast]=React.useState(null);
  const [sort,setSort]=React.useState({key:"total",dir:"desc"});
  const [filter,setFilter]=React.useState("");

  const rangeLabel=RANGES.find(r=>r[0]===range)[1];
  const rows=React.useMemo(()=>{
    let r=TENANTS.filter(t=>(t.name+" "+t.code).toLowerCase().includes(filter.toLowerCase()));
    r=[...r].sort((a,b)=>{const av=a[sort.key],bv=b[sort.key];const c=typeof av==="number"?av-bv:String(av).localeCompare(String(bv));return sort.dir==="asc"?c:-c;});
    return r;
  },[sort,filter]);
  const onSort=(k)=>setSort(s=>({key:k,dir:s.key===k&&s.dir==="desc"?"asc":"desc"}));
  const caret=(k)=> sort.key===k? <i data-lucide={sort.dir==="desc"?"chevron-down":"chevron-up"}></i> : null;
  const doExport=(fmt)=>{setExportOpen(false);setToast({icon:"loader",tone:"var(--text-muted)",msg:"Preparing export… ("+fmt+", "+rangeLabel+")"});
    setTimeout(()=>setToast({icon:"circle-check",tone:"var(--status-success)",msg:"Export ready",action:"Download"}),900);};

  const col=(k,label,num)=> <th className={(num?"num ":"")+"sortable"} aria-sort={sort.key===k?(sort.dir==="asc"?"ascending":"descending"):"none"}
     onClick={()=>onSort(k)} tabIndex="0" onKeyDown={e=>{(e.key==="Enter"||e.key===" ")&&(e.preventDefault(),onSort(k));}}>
     <span className="ci">{label}{caret(k)}</span></th>;

  return <Shell active="/analytics">
    {/* PERF-NOTE banner — visible only on client-scan fallback builds (dev/staging); hidden in prod */}
    <div className="alert warn" role="status">
      <i data-lucide="triangle-alert" className="lead"></i>
      <div className="ab"><span className="at">Analytics are computed client-side in this build and may be slow or capped. </span>
        <span className="ax-sec">The server rollup is pending — counts shown are server-authoritative once it lands.</span></div>
      <button className="x" aria-label="Dismiss perf notice"><i data-lucide="x" style={{width:15,height:15}}></i></button>
    </div>

    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Platform Analytics</h1>
        <div className="ax-sub">Cross-tenant user and engagement analytics.</div></div>
      <div className="ac">
        <span className="chip"><i data-lucide="calendar"></i>{rangeLabel}</span>
        <div className="rel">
          <button className="ctl" aria-haspopup="listbox" aria-expanded={rangeOpen} onClick={()=>{setRangeOpen(o=>!o);setExportOpen(false);}}>
            <i data-lucide="calendar-range"></i><span>{rangeLabel}</span><i data-lucide="chevron-down"></i></button>
          {rangeOpen && <div className="menu" role="listbox" aria-label="Date range">
            {RANGES.map(([v,l])=><div key={v} role="option" aria-selected={range===v} className="mi" onClick={()=>{setRange(v);setRangeOpen(false);}}>
              <i data-lucide={range===v?"check":"circle"}></i>{l}</div>)}</div>}
        </div>
        <div className="rel">
          <Button variant="secondary" leadingIcon="download" trailingIcon="chevron-down" onClick={()=>{setExportOpen(o=>!o);setRangeOpen(false);}}>Export</Button>
          {exportOpen && <div className="menu" role="menu" aria-label="Export format">
            <div className="mh">Export {rangeLabel}</div>
            <div className="mi" role="menuitem" onClick={()=>doExport("CSV")}><i data-lucide="file-spreadsheet"></i>CSV</div>
            <div className="mi" role="menuitem" onClick={()=>doExport("JSON")}><i data-lucide="file-json"></i>JSON</div>
          </div>}
        </div>
        <button className="icon-btn" aria-label="Refresh analytics"><i data-lucide="refresh-cw"></i></button>
      </div>
    </div>

    {/* KPI ROW — server-authoritative; deltas carry direction in words, never color-only */}
    <div className="ax-grid ax-g4">
      <KPI icon="users" label="Total Users" value="12,480"
        delta={{icon:"trending-up",label:"▲ 6.2% vs last week",aria:"increased 6.2 percent versus last week",tone:"var(--status-success)"}}
        sub="Across 38 active tenants · as of 20 Jun, 09:40"/>
      <KPI icon="graduation-cap" label="Students" value="9,120"
        delta={{icon:"trending-up",label:"▲ 5.4% vs last week",aria:"increased 5.4 percent versus last week",tone:"var(--status-success)"}}
        sub="73% of users"/>
      <KPI icon="presentation" label="Teachers" value="3,360"
        delta={{icon:"trending-up",label:"▲ 1.1% vs last week",aria:"increased 1.1 percent versus last week",tone:"var(--status-success)"}}
        sub="27% of users"/>
      <KPI icon="building-2" label="Active Tenants" value="38"
        delta={{icon:"trending-down",label:"▼ 1 vs last month",aria:"decreased by one versus last month",tone:"var(--status-warning)"}}
        sub="of 44 total · 4,210 active 7d"/>
    </div>

    {/* TRENDS — two charts side by side; PARTIAL state shown on the second chart */}
    <div>
      <div className="sec-h"><span className="st">Trends</span><span className="sca">Signups & engagement over {rangeLabel.toLowerCase()}</span></div>
      <div className="ax-grid ax-g2">
        <div className="panel">
          <div className="ph"><span className="pt">Signups over time</span></div>
          <div className="pb">
            <div className="chartwrap"><Area data={SIGNUPS} stroke="var(--brand-primary)"/></div>
            <div className="xaxis"><span>22 May</span><span>05 Jun</span><span>20 Jun</span></div>
            <div className="legend"><span className="lg"><span className="sw" style={{background:"var(--brand-primary)"}}></span>New signups / day</span></div>
            <table className="ax-sr"><caption>New signups per day</caption><thead><tr><th>Day</th><th>Signups</th></tr></thead>
              <tbody>{SIGNUPS.map((v,i)=><tr key={i}><td>Day {i+1}</td><td>{v}</td></tr>)}</tbody></table>
          </div>
        </div>
        <div className="panel">
          <div className="ph"><span className="pt">Active users & retention</span></div>
          <div className="pb">
            {/* PARTIAL state — trend series stale while platformDailyRollup recomputes */}
            <div className="alert info" role="status" style={{marginBottom:"var(--space-3)"}}>
              <i data-lucide="info" className="lead"></i>
              <div className="ab"><span className="ax-sec">Trend data is being recomputed — last updated 14 minutes ago.</span></div>
            </div>
            <div className="chartwrap"><Line a={ACTIVE} b={RETAIN} sa="var(--brand-primary)" sb="var(--status-success)"/></div>
            <div className="xaxis"><span>22 May</span><span>05 Jun</span><span>20 Jun</span></div>
            <div className="legend">
              <span className="lg"><span className="sw" style={{background:"var(--brand-primary)"}}></span>Active users</span>
              <span className="lg"><span className="sw" style={{background:"var(--status-success)"}}></span>Retention %</span>
            </div>
            <table className="ax-sr"><caption>Active users and retention per day</caption><thead><tr><th>Day</th><th>Active users</th><th>Retention %</th></tr></thead>
              <tbody>{ACTIVE.map((v,i)=><tr key={i}><td>Day {i+1}</td><td>{v}</td><td>{RETAIN[i]}%</td></tr>)}</tbody></table>
          </div>
        </div>
      </div>
    </div>

    {/* PLAN MIX */}
    <div className="panel">
      <div className="ph"><span className="pt">Users by subscription plan</span><span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>12,480 users · 44 tenants</span></div>
      <div className="pb">
        {PLANS.map(([name,n,pct,alt])=>
          <div className="planrow" key={name}>
            <span className="pl">{name}</span>
            <div className="bar-track" role="progressbar" aria-label={name+" plan: "+n+" users, "+pct+" percent"} aria-valuenow={pct} aria-valuemin="0" aria-valuemax="100">
              <div className={"bar-fill"+(alt?" alt":"")} style={{width:pct+"%"}}></div></div>
            <span className="pv ax-mono">{n.toLocaleString()} · {pct}%</span>
          </div>)}
      </div>
    </div>

    {/* PER-TENANT COMPARISON — read-only; each row deep-links into /tenants/:id (which tenant is named per row) */}
    <div className="panel">
      <div className="ph">
        <span className="pt">Users by tenant</span>
        <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Sorted by total users, descending.</span>
        <div className="tfilter" style={{marginLeft:"var(--space-3)"}}>
          <i data-lucide="search"></i>
          <input placeholder="Filter tenants…" aria-label="Filter tenants" value={filter} onChange={e=>setFilter(e.target.value)}/>
        </div>
      </div>
      <div className="pb" style={{padding:0,overflowX:"auto"}}>
        <table className="tbl">
          <caption className="ax-sr">Cross-tenant user breakdown table.</caption>
          <thead><tr>
            {col("name","Tenant")}{col("code","Code")}{col("students","Students",true)}
            {col("teachers","Teachers",true)}{col("total","Total",true)}{col("active","Active %",true)}
            <th>Status</th><th aria-hidden="true"></th>
          </tr></thead>
          <tbody>
            {rows.length===0 && <tr><td colSpan="8" style={{padding:"var(--space-6)",textAlign:"center",color:"var(--text-muted)"}}>No tenants found.</td></tr>}
            {rows.map(t=>
              <tr className="lk" key={t.id} tabIndex="0" role="link" aria-label={"Open "+t.name+", "+t.total+" users"}>
                <td className="tn">{t.name}</td>
                <td><span className="codechip">{t.code}</span></td>
                <td className="num">{t.students.toLocaleString()}</td>
                <td className="num">{t.teachers.toLocaleString()}</td>
                <td className="num" style={{fontWeight:"var(--weight-semibold)"}}>{t.total.toLocaleString()}</td>
                <td className="num"><span className="actpct"><div className="bar-track sm"><div className="bar-fill" style={{width:t.active+"%"}}></div></div>{t.active}%</span></td>
                <td><StatusBadge s={t.status}/></td>
                <td className="num"><i data-lucide="chevron-right" className="go" style={{width:15,height:15}}></i></td>
              </tr>)}
          </tbody>
        </table>
      </div>
      <div className="pf">
        <span>Showing {rows.length} of 44 tenants</span>
        <div className="pager">
          <span className="pbtn" aria-disabled="true" role="button"><i data-lucide="chevron-left"></i>Previous page</span>
          <span className="ax-mono ax-muted">Page 1</span>
          <span className="pbtn" role="button" tabIndex="0">Next page<i data-lucide="chevron-right"></i></span>
        </div>
      </div>
    </div>

    {/* ── Secondary state examples (spec §5: loading / empty / error / permission-gated) ── */}
    <div className="sec-h" style={{marginTop:"var(--space-4)"}}><span className="st">States</span><span className="sca">Loading · empty · error · permission-gated</span></div>
    <div className="ax-grid ax-g2">
      <div className="panel">
        <div className="ph"><span className="pt">Loading (skeleton)</span></div>
        <div className="pb ax-col">
          <div className="ax-row" style={{gap:"var(--space-3)"}}>
            {[0,1,2,3].map(i=><div key={i} className="card kpi" style={{flex:1}}>
              <div className="sk" style={{height:10,width:"60%"}}></div>
              <div className="sk" style={{height:22,width:"50%"}}></div>
              <div className="sk" style={{height:9,width:"70%"}}></div></div>)}
          </div>
          {[0,1,2].map(i=><div key={i} className="ax-row" style={{gap:"var(--space-3)"}}>
            <div className="sk" style={{height:12,width:120}}></div>
            <div className="sk" style={{height:10,flex:1}}></div>
            <div className="sk" style={{height:12,width:80}}></div></div>)}
        </div>
      </div>
      <div className="panel">
        <div className="ph"><span className="pt">Empty</span></div>
        <div className="empty">
          <div className="gl"><i data-lucide="users"></i></div>
          <div className="et">No platform users yet</div>
          <div className="eb">Once tenants onboard students and teachers, signups, engagement, and per-tenant comparisons will appear here.</div>
        </div>
      </div>
    </div>
    <div className="ax-grid ax-g2">
      <div className="panel">
        <div className="ph"><span className="pt">Error</span></div>
        <div className="pb">
          <div className="alert err" role="alert">
            <i data-lucide="circle-alert" className="lead"></i>
            <div className="ab"><div className="at">Failed to load analytics</div>
              <div className="ax-sec">An unexpected error occurred while loading platform analytics.</div>
              <div style={{marginTop:"var(--space-2)"}}><Button variant="ghost" leadingIcon="rotate-cw">Try again</Button></div></div>
          </div>
        </div>
      </div>
      <div className="panel">
        <div className="ph"><span className="pt">Permission-gated (server re-check)</span></div>
        <div className="pb">
          <div className="alert err" role="alert">
            <i data-lucide="shield-x" className="lead"></i>
            <div className="ab"><div className="at">Restricted</div>
              <div className="ax-sec">Platform analytics are restricted to platform administrators. The server independently re-verifies super-admin; the client gate is never trusted alone.</div></div>
          </div>
        </div>
      </div>
    </div>

    {/* Export toast (audited side-effect) */}
    {toast && <div style={{position:"fixed",right:24,bottom:24,zIndex:50}}>
      <div className="toast"><i data-lucide={toast.icon} style={{color:toast.tone}}></i><span>{toast.msg}</span>
        {toast.action && <span className="lnk" style={{marginLeft:"var(--space-2)"}} onClick={()=>setToast(null)}>{toast.action}</span>}</div>
    </div>}
  </Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body></html>
