<!-- @dsCard group="Student" viewport="1280x820" name="Leaderboard" subtitle="Live ranked classmates · self-row pinned & highlighted" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  /* card-local LAYOUT ONLY — never redefine tokens, never a hex literal */
  body { margin:0; background: var(--bg-canvas); color: var(--text-primary); font-family: var(--font-ui); }
  html, body, #root, .appshell { height: 100%; }

  .lb-page { display: flex; flex-direction: column; gap: var(--space-6); max-width: 760px; margin: 0 auto; }

  /* Header + hero */
  .lb-head { display: flex; gap: var(--space-5); align-items: flex-start; justify-content: space-between; flex-wrap: wrap; }
  .lb-title { display: flex; align-items: center; gap: var(--space-3); }
  .lb-title__glyph { display: grid; place-items: center; width: 44px; height: 44px; border-radius: var(--radius-lg); background: var(--spark-subtle); color: var(--spark); flex: 0 0 auto; }
  .lb-h2 { font-family: var(--font-display); font-size: var(--text-3xl); line-height: var(--leading-3xl); font-weight: var(--weight-semibold); margin: 0; letter-spacing: var(--tracking-display); }
  .lb-sub { color: var(--text-secondary); font-size: var(--text-base); margin-top: var(--space-1); max-width: 42ch; }

  .lb-hero { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--shadow-e1); padding: var(--space-4) var(--space-5); min-width: 232px; display: flex; flex-direction: column; gap: var(--space-2); }
  .lb-hero__label { font-size: var(--text-2xs); font-weight: var(--weight-semibold); letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  .lb-hero__rank { font-family: var(--font-mono); font-size: var(--text-4xl); line-height: var(--leading-4xl); font-weight: var(--weight-semibold); color: var(--text-primary); }
  .lb-hero__row { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; }
  .lb-hero__delta { display: inline-flex; align-items: center; gap: var(--space-1); font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--status-success); }
  .lb-hero__tier { font-size: var(--text-xs); color: var(--text-secondary); }
  .lb-hero__unranked { font-size: var(--text-base); font-weight: var(--weight-semibold); color: var(--text-secondary); line-height: var(--leading-base); }

  /* Scope tabs */
  .lb-scope { display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap; justify-content: space-between; }
  .lb-tabs { display: inline-flex; gap: var(--space-1); background: var(--bg-surface-sunken); border: 1px solid var(--border-subtle); border-radius: var(--radius-pill); padding: var(--space-1); }
  .lb-tab { appearance: none; border: 0; background: transparent; cursor: pointer; font-family: var(--font-ui); font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-secondary); padding: var(--space-2) var(--space-4); border-radius: var(--radius-pill); min-height: 44px; display: inline-flex; align-items: center; gap: var(--space-2); transition: background-color var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard); }
  .lb-tab:hover { color: var(--text-primary); }
  .lb-tab[aria-selected="true"] { background: var(--bg-surface); color: var(--brand-primary); box-shadow: var(--shadow-e1); font-weight: var(--weight-semibold); }
  .lb-tab:focus-visible { outline: none; box-shadow: var(--ring-focus); }

  .lb-space-select { min-width: 220px; }

  /* List header */
  .lb-listhead { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); padding: 0 var(--space-1); }
  .lb-listhead__caps { font-size: var(--text-2xs); font-weight: var(--weight-semibold); letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  .lb-live { display: inline-flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs); color: var(--text-muted); }
  .lb-live__dot { width: 8px; height: 8px; border-radius: var(--radius-pill); background: var(--status-success); position: relative; flex: 0 0 auto; }
  .lb-live__dot::after { content: ""; position: absolute; inset: -4px; border-radius: var(--radius-pill); border: 2px solid var(--status-success); opacity: 0.5; animation: lb-pulse 1.8s var(--ease-standard) infinite; }
  .lb-live--paused .lb-live__dot { background: var(--text-muted); }
  .lb-live--paused .lb-live__dot::after { display: none; }
  @keyframes lb-pulse { 0% { transform: scale(0.6); opacity: 0.6; } 100% { transform: scale(1.6); opacity: 0; } }

  /* List card */
  .lb-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--shadow-e1); overflow: hidden; position: relative; }
  .lb-scroll { max-height: 372px; overflow-y: auto; scroll-behavior: smooth; }

  /* Row */
  .lb-row { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border-subtle); transition: background-color var(--dur-fast) var(--ease-standard), box-shadow var(--dur-fast) var(--ease-standard), transform var(--dur-fast) var(--ease-standard); }
  .lb-row:last-child { border-bottom: 0; }
  .lb-row:hover { background: var(--bg-surface-sunken); }
  .lb-row--top { background: var(--spark-subtle); }
  .lb-row--top:hover { background: var(--spark-subtle); box-shadow: var(--shadow-e1); }
  .lb-row--me { background: var(--bg-surface-sunken); box-shadow: inset 0 0 0 2px var(--brand-primary); border-bottom-color: transparent; scroll-margin: var(--space-4); }
  .lb-row--me + .lb-row { border-top: 1px solid var(--border-subtle); }

  .lb-rank { width: 40px; flex: 0 0 auto; display: inline-flex; align-items: center; gap: var(--space-1); font-family: var(--font-mono); font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--text-secondary); }
  .lb-rank--top { color: var(--spark); }
  .lb-medal { display: inline-flex; }
  .lb-name { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .lb-name__main { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
  .lb-name__text { font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lb-name__you { font-weight: var(--weight-semibold); }
  .lb-name__sub { font-size: var(--text-xs); color: var(--text-muted); }
  .lb-tier { font-size: var(--text-2xs); }

  .lb-delta { display: inline-flex; align-items: center; gap: 2px; font-size: var(--text-xs); font-weight: var(--weight-semibold); white-space: nowrap; }
  .lb-delta--up { color: var(--status-success); }
  .lb-delta--down { color: var(--text-secondary); }
  .lb-delta--same { color: var(--text-muted); }

  .lb-pts { flex: 0 0 auto; text-align: right; font-family: var(--font-mono); font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--text-primary); min-width: 84px; }
  .lb-pts__unit { font-size: var(--text-2xs); color: var(--text-muted); font-weight: var(--weight-regular); }

  .lb-gap { display: flex; align-items: center; justify-content: center; gap: var(--space-2); padding: var(--space-2); font-size: var(--text-xs); color: var(--text-muted); background: var(--bg-surface-sunken); border-bottom: 1px solid var(--border-subtle); letter-spacing: 0.2em; }

  .lb-nice { display: inline-flex; align-items: center; gap: var(--space-1); font-size: var(--text-2xs); font-weight: var(--weight-semibold); color: var(--spark); }

  /* Sticky self-row */
  .lb-sticky { position: sticky; bottom: 0; z-index: 2; display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); background: var(--bg-surface); border-top: 1px solid var(--border-strong); box-shadow: var(--shadow-e2); }
  .lb-sticky__btn { margin-left: auto; }

  /* Animation niceties (reduced-motion safe below) */
  .lb-row-anim { animation: lb-rowin var(--dur-base) var(--ease-entrance) both; }
  @keyframes lb-rowin { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* State preview blocks */
  .lb-states { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5); max-width: 1140px; margin: 0 auto; width: 100%; }
  .state-band { border: 1px dashed var(--border-strong); border-radius: var(--radius-lg); padding: var(--space-4); background: var(--bg-surface); }
  .eyebrow-state { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-bottom: var(--space-3); display: flex; align-items: center; gap: var(--space-2); }
  .state-divider { border: none; border-top: 1px solid var(--border-subtle); margin: var(--space-6) auto var(--space-2); max-width: 1140px; width: 100%; }
  .state-divider__cap { text-align: center; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-bottom: var(--space-4); }

  .skel-row { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border-subtle); }
  .skel-row:last-child { border-bottom: 0; }

  @media (prefers-reduced-motion: reduce) {
    .lb-row, .lb-tab, .lb-scroll { transition: none !important; scroll-behavior: auto !important; }
    .lb-row-anim { animation: none !important; }
    .lb-live__dot::after { animation: none !important; }
    .lb-countup { animation: none !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const LU = window.LvlupV0DesignSystem_5d0725;
  const {
    Button, IconButton, Icon, Input, Card, Avatar, Badge, Select,
    LevelBadge, EmptyState, Skeleton, Alert, Tooltip, NavItem, CommandPalette
  } = LU;

  const { useState, useEffect, useRef } = React;

  const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ---- CountUp for the hero rank + points (reduced-motion safe) ---- */
  function CountUp({ end, prefix }) {
    const [val, setVal] = useState(reduceMotion ? end : 0);
    useEffect(() => {
      if (reduceMotion) { setVal(end); return; }
      let raf, start;
      const dur = 700, from = 0;
      const step = (t) => {
        if (start == null) start = t;
        const p = Math.min(1, (t - start) / dur);
        const eased = 1 - Math.pow(1 - p, 3);
        setVal(from + (end - from) * eased);
        if (p < 1) raf = requestAnimationFrame(step); else setVal(end);
      };
      raf = requestAnimationFrame(step);
      return () => cancelAnimationFrame(raf);
    }, [end]);
    return <span className="lb-countup">{prefix || ""}{Math.round(val).toLocaleString()}</span>;
  }

  /* ---- realistic roster (own tenant, names + points only — no private data) ---- */
  const MEDALS = { 1: "crown", 2: "medal", 3: "medal" };
  const TIER = { 1: "Gold", 2: "Silver", 3: "Bronze" };

  const fullRoster = [
    { rank: 1,  name: "Priya Sharma",   initials: "PS", pts: 2480, prev: 1 },
    { rank: 2,  name: "Rahul Kapoor",   initials: "RK", pts: 2310, prev: 3 },
    { rank: 3,  name: "Aisha Mansoor",  initials: "AM", pts: 2180, prev: 2 },
    { rank: 4,  name: "Dev Patel",      initials: "DP", pts: 2025, prev: 4 },
    { rank: 5,  name: "Sara Ahmed",     initials: "SA", pts: 1960, prev: 6 },
    { rank: 6,  name: "Karan Mehta",    initials: "KM", pts: 1890, prev: 5 },
    { rank: 12, name: "Nisha Reddy",    initials: "NR", pts: 1305, prev: 13 },
    { rank: 13, name: "Arjun Nair",     initials: "AN", pts: 1268, prev: 12 },
    { rank: 14, name: "Aisha Khan",     initials: "AK", pts: 1240, prev: 16, me: true, climbed: 2, level: 7, tier: "Scholar" },
    { rank: 15, name: "Tara Joshi",     initials: "TJ", pts: 1192, prev: 15 },
    { rank: 16, name: "Vikram Bose",    initials: "VB", pts: 1140, prev: 14 },
  ];

  function rankDelta(r) {
    const d = (r.prev || r.rank) - r.rank;
    if (d > 0) return { dir: "up", n: d, icon: "arrow-up", label: "up " + d };
    if (d < 0) return { dir: "down", n: -d, icon: "arrow-down", label: "down " + (-d) };
    return { dir: "same", n: 0, icon: "minus", label: "holding steady" };
  }

  /* ======================= ROW ======================= */
  function Row({ r, index, showNice }) {
    const top = r.rank <= 3;
    const d = rankDelta(r);
    const ariaName = "Rank " + r.rank + ", " + (r.me ? "you, " + r.name : r.name) + ", " +
      r.pts.toLocaleString() + " points" + (top ? ", " + TIER[r.rank] : "") +
      (d.dir !== "same" ? ", " + d.label : "");
    return (
      <div
        className={"lb-row" + (top ? " lb-row--top" : "") + (r.me ? " lb-row--me" : "") + (reduceMotion ? "" : " lb-row-anim")}
        style={reduceMotion ? null : { animationDelay: (index * 45) + "ms" }}
        role="listitem"
        aria-label={ariaName}
        ref={r.me ? null : undefined}
        id={r.me ? "self-row" : undefined}
      >
        <span className={"lb-rank" + (top ? " lb-rank--top" : "")}>
          {top && <span className="lb-medal" aria-hidden="true"><Icon name={MEDALS[r.rank]} size={15}/></span>}
          {r.rank}
        </span>
        <Avatar initials={r.initials} size="sm"/>
        <div className="lb-name">
          <div className="lb-name__main">
            <span className={"lb-name__text" + (r.me ? " lb-name__you" : "")}>{r.name}</span>
            {r.me && <Badge variant="brand">You</Badge>}
            {top && <Badge variant="spark" icon={<Icon name="sparkles" size={11}/>}><span className="lb-tier">{TIER[r.rank]}</span></Badge>}
            {r.me && showNice && d.dir === "up" && <span className="lb-nice"><Icon name="sparkles" size={11}/> Nice climb!</span>}
          </div>
          {(r.me || d.dir !== "same") && (
            <span className={"lb-delta lb-delta--" + d.dir} aria-hidden="true">
              <Icon name={d.icon} size={12}/>{d.label}
            </span>
          )}
        </div>
        <div className="lb-pts">
          {r.pts.toLocaleString()} <span className="lb-pts__unit">pts</span>
        </div>
      </div>
    );
  }

  /* ======================= LIST (success) ======================= */
  function SuccessList({ rows, scopeLabel, live, onScrollToMe }) {
    const scrollRef = useRef(null);
    const [showSticky, setShowSticky] = useState(false);
    const me = rows.find((r) => r.me);

    useEffect(() => {
      const el = scrollRef.current;
      if (!el || !me) return;
      const check = () => {
        const self = el.querySelector("#self-row");
        if (!self) { setShowSticky(false); return; }
        const cr = el.getBoundingClientRect();
        const sr = self.getBoundingClientRect();
        const out = sr.bottom < cr.top + 8 || sr.top > cr.bottom - 8;
        setShowSticky(out);
      };
      check();
      el.addEventListener("scroll", check, { passive: true });
      return () => el.removeEventListener("scroll", check);
    }, [rows]);

    const scrollToMe = () => {
      const el = scrollRef.current;
      const self = el && el.querySelector("#self-row");
      if (self) self.scrollIntoView({ block: "center", behavior: reduceMotion ? "auto" : "smooth" });
    };

    return (
      <div className="lb-card">
        <div className="lb-scroll" ref={scrollRef} role="list" aria-label={scopeLabel + " rankings"}>
          {rows.map((r, i) => {
            const prev = rows[i - 1];
            const gap = prev && r.rank - prev.rank > 1;
            return (
              <React.Fragment key={r.name}>
                {gap && <div className="lb-gap" aria-hidden="true">· · ·</div>}
                <Row r={r} index={i} showNice={true}/>
              </React.Fragment>
            );
          })}
        </div>
        {showSticky && me && (
          <div className="lb-sticky">
            <span className="lb-rank">{me.rank}</span>
            <Avatar initials={me.initials} size="sm"/>
            <div className="lb-name">
              <div className="lb-name__main">
                <span className="lb-name__text lb-name__you">{me.name}</span>
                <Badge variant="brand">You</Badge>
              </div>
            </div>
            <div className="lb-pts">{me.pts.toLocaleString()} <span className="lb-pts__unit">pts</span></div>
            <Button className="lb-sticky__btn" variant="secondary" size="sm" onClick={scrollToMe}
              trailingIcon={<Icon name="arrow-down-to-line" size={14}/>}>Jump to my rank</Button>
          </div>
        )}
      </div>
    );
  }

  /* ======================= HERO ======================= */
  function Hero({ rank, climbed, tier, level, unranked }) {
    if (unranked) {
      return (
        <div className="lb-hero">
          <span className="lb-hero__label">Your standing</span>
          <div className="lb-hero__unranked">Not ranked yet — earn your first points to join the board 🎯</div>
        </div>
      );
    }
    return (
      <div className="lb-hero">
        <span className="lb-hero__label">Your standing</span>
        <div className="lb-hero__rank">#<CountUp end={rank}/></div>
        <div className="lb-hero__row">
          {level != null && <LevelBadge level={level} spark/>}
          {tier && <span className="lb-hero__tier">{tier} tier</span>}
        </div>
        <div className="lb-hero__delta">
          <Icon name="arrow-up" size={14}/> up {climbed} since yesterday
        </div>
      </div>
    );
  }

  /* ======================= SCOPE TABS ======================= */
  function ScopeTabs({ scope, setScope, spaceId, setSpaceId, hasClass }) {
    const tabs = [
      { key: "overall", label: "Overall", icon: "globe" },
      hasClass && { key: "class", label: "My Class", icon: "users" },
      { key: "space", label: "By Space", icon: "book-open" },
    ].filter(Boolean);
    return (
      <div className="lb-scope">
        <div className="lb-tabs" role="tablist" aria-label="Leaderboard scope">
          {tabs.map((t) => (
            <button key={t.key} role="tab" aria-selected={scope === t.key}
              className="lb-tab" onClick={() => setScope(t.key)}>
              <Icon name={t.icon} size={15}/> {t.label}
            </button>
          ))}
        </div>
        {scope === "space" && (
          <div className="lb-space-select">
            <Select value={spaceId} onChange={(e) => setSpaceId(e.target.value)} aria-label="Choose a space"
              options={[
                { value: "dsa", label: "Data Structures & Algorithms" },
                { value: "sd", label: "System Design" },
                { value: "lld", label: "Low-Level Design" },
                { value: "beh", label: "Behavioral" },
              ]}/>
          </div>
        )}
      </div>
    );
  }

  /* ======================= STATE PREVIEW BLOCKS ======================= */
  function LoadingBlock() {
    return (
      <div className="state-band" role="status" aria-busy="true" aria-label="Loading the leaderboard">
        <div className="eyebrow-state"><Icon name="loader" size={13}/> State: loading skeleton — “Loading the leaderboard…”</div>
        <div style={{ marginBottom: "var(--space-3)" }}>
          <Skeleton width="180px" height="0.7rem"/>
          <div style={{ height: "var(--space-2)" }}/>
          <Skeleton width="90px" height="2rem"/>
        </div>
        <div className="lb-card">
          {[0,1,2,3,4,5].map((i) => (
            <div className="skel-row" key={i}>
              <Skeleton variant="circle" width="22px" height="22px"/>
              <Skeleton variant="circle" width="32px" height="32px"/>
              <Skeleton width={(55 - i * 4) + "%"} height="0.8rem"/>
              <div style={{ marginLeft: "auto" }}><Skeleton width="60px" height="0.8rem"/></div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  function EmptyBlock() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="trophy" size={13}/> State: empty — no rankings yet for this scope</div>
        <EmptyState
          icon="trophy"
          title="No rankings yet"
          body="As you and your classmates earn points, you’ll show up here. Complete a story point to get on the board!"
          action={<Button variant="ghost" trailingIcon={<Icon name="arrow-right" size={16}/>}>Start learning</Button>}
        />
      </div>
    );
  }

  function UnrankedBlock() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="target" size={13}/> State: unranked self (others ranked) — no fake #0</div>
        <div className="lb-hero" style={{ marginBottom: "var(--space-4)" }}>
          <span className="lb-hero__label">Your standing</span>
          <div className="lb-hero__unranked">Not ranked yet — earn your first points to join the board 🎯</div>
        </div>
        <div className="lb-card">
          {fullRoster.slice(0, 3).map((r, i) => <Row key={r.name} r={r} index={i} showNice={false}/>)}
        </div>
      </div>
    );
  }

  function PartialBlock() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="layers" size={13}/> State: partial — level read failed, points-only (quiet)</div>
        <div className="lb-card">
          {fullRoster.slice(6, 9).map((r, i) => {
            const rr = { ...r, level: undefined, tier: undefined };
            return <Row key={rr.name} r={rr} index={i} showNice={false}/>;
          })}
        </div>
      </div>
    );
  }

  function ErrorBlock() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="alert-triangle" size={13}/> State: error (whole leaderboard) — never blame the learner</div>
        <EmptyState
          icon="cloud-off"
          title="We couldn’t load the leaderboard just now"
          body="Let’s try again — this one’s on us, not you."
          action={<Button variant="primary" leadingIcon={<Icon name="rotate-cw" size={16}/>}>Retry</Button>}
        />
      </div>
    );
  }

  function StaleBlock() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="wifi-off" size={13}/> State: stale / disconnected — keep last-known list</div>
        <Alert variant="info" title="Showing your last view — reconnecting…">
          Live updates paused for a moment. We’ll refresh your ranking the instant we’re back.
        </Alert>
        <div className="lb-listhead" style={{ margin: "var(--space-4) 0 var(--space-2)" }}>
          <span className="lb-listhead__caps">Overall rankings</span>
          <span className="lb-live lb-live--paused"><span className="lb-live__dot"/> Paused · reconnecting</span>
        </div>
        <div className="lb-card">
          {fullRoster.slice(0, 3).map((r, i) => <Row key={r.name} r={r} index={i} showNice={false}/>)}
        </div>
      </div>
    );
  }

  /* ======================= SIDEBAR / TOPBAR ======================= */
  function Sidebar() {
    const nav = [
      { icon: "home", label: "Home" },
      { icon: "book-open", label: "Spaces" },
      { icon: "file-check", label: "Exams" },
      { icon: "trending-up", label: "Progress" },
      { icon: "trophy", label: "Leaderboard", active: true },
      { icon: "award", label: "Achievements" },
    ];
    return (
      <aside className="appshell__sidebar">
        <div className="sidebar__brand">
          <span className="sidebar__brand-mark">L</span>
          <span className="sidebar__brand-name">LevelUp</span>
        </div>
        <div className="sidebar__section-label">Learning</div>
        <nav className="sidebar__nav">
          {nav.map((n) => (
            <NavItem key={n.label} icon={n.icon} active={n.active} href="#">{n.label}</NavItem>
          ))}
        </nav>
        <div className="sidebar__section-label">School</div>
        <nav className="sidebar__nav">
          <NavItem icon="users" href="#">Class · Grade 10-B</NavItem>
          <NavItem icon="life-buoy" href="#">Support</NavItem>
        </nav>
        <div style={{ marginTop: "auto", padding: "var(--space-4)" }}>
          <div style={{ display:"flex", alignItems:"center", gap:"var(--space-3)" }}>
            <Avatar initials="AK" size="sm"/>
            <div style={{ minWidth:0 }}>
              <div style={{ fontSize:"var(--text-sm)", fontWeight:"var(--weight-semibold)" }}>Aisha Khan</div>
              <div className="u-caption" style={{ color:"var(--text-muted)" }}>SUB001 · Student</div>
            </div>
          </div>
        </div>
      </aside>
    );
  }

  function Topbar({ onOpenPalette }) {
    return (
      <header className="appshell__topbar">
        <div className="topbar__search" style={{ display:"flex", alignItems:"center", gap:"var(--space-2)" }}>
          <Input placeholder="Search spaces, exams…  ⌘K" onFocus={onOpenPalette}/>
        </div>
        <div className="topbar__spacer"/>
        <Tooltip><IconButton icon={<Icon name="command" size={18}/>} label="Command palette (⌘K)" onClick={onOpenPalette}/></Tooltip>
        <IconButton icon={<Icon name="bell" size={18}/>} label="Notifications"/>
        <Avatar initials="AK" size="sm"/>
      </header>
    );
  }

  /* ======================= MAIN VIEW ======================= */
  function MainView() {
    const [scope, setScope] = useState("class");
    const [spaceId, setSpaceId] = useState("dsa");
    const liveRef = useRef(null);

    const scopeLabel = scope === "overall" ? "Overall" : scope === "class" ? "My Class"
      : ({ dsa: "Data Structures & Algorithms", sd: "System Design", lld: "Low-Level Design", beh: "Behavioral" }[spaceId]);

    // live-region announce on scope change (debounced via timeout)
    useEffect(() => {
      const id = setTimeout(() => {
        if (liveRef.current) liveRef.current.textContent = "Showing " + scopeLabel + " rankings. You are rank 14, up 2 since yesterday.";
      }, 400);
      return () => clearTimeout(id);
    }, [scope, spaceId]);

    return (
      <div className="lb-page">
        <span ref={liveRef} aria-live="polite" className="u-sr-only"/>

        {/* HEADER + HERO */}
        <div className="lb-head">
          <div>
            <div className="lb-title">
              <span className="lb-title__glyph" aria-hidden="true"><Icon name="trophy" size={24}/></span>
              <h1 className="lb-h2">Leaderboard</h1>
            </div>
            <p className="lb-sub">See how you’re tracking with your class — friendly competition, no pressure.</p>
          </div>
          <Hero rank={14} climbed={2} tier="Scholar" level={7}/>
        </div>

        {/* SCOPE TABS */}
        <ScopeTabs scope={scope} setScope={setScope} spaceId={spaceId} setSpaceId={setSpaceId} hasClass={true}/>

        {/* LIST HEADER */}
        <div style={{ display: "flex", flexDirection: "column", gap: "var(--space-3)" }}>
          <div className="lb-listhead">
            <span className="lb-listhead__caps">{scopeLabel} rankings</span>
            <span className="lb-live"><span className="lb-live__dot"/> Live</span>
          </div>
          <SuccessList rows={fullRoster} scopeLabel={scopeLabel} live/>
        </div>

        {/* STATE PREVIEWS */}
        <hr className="state-divider"/>
        <div className="state-divider__cap">Spec’d states surfaced (secondary previews)</div>
        <div className="lb-states">
          <LoadingBlock/>
          <EmptyBlock/>
          <UnrankedBlock/>
          <PartialBlock/>
          <ErrorBlock/>
          <StaleBlock/>
        </div>
      </div>
    );
  }

  /* ======================= SCREEN ======================= */
  function Screen() {
    const [palette, setPalette] = useState(false);

    useEffect(() => {
      const onKey = (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") { e.preventDefault(); setPalette(true); }
        if (e.key === "Escape") setPalette(false);
      };
      window.addEventListener("keydown", onKey);
      return () => window.removeEventListener("keydown", onKey);
    }, []);

    return (
      <div className="appshell" style={{ position: "relative" }}>
        <Sidebar/>
        <Topbar onOpenPalette={() => setPalette(true)}/>
        <main className="appshell__main" id="main">
          <a href="#main" className="u-sr-only">Skip to content</a>
          <MainView/>
        </main>

        {palette && (
          <div className="modal-scrim" onClick={() => setPalette(false)}>
            <div onClick={(e) => e.stopPropagation()} style={{ position:"absolute", top:"14%", left:"50%", transform:"translateX(-50%)", width:"min(560px, 90%)" }}>
              <CommandPalette
                placeholder="Search or jump to…"
                selected={0}
                items={[
                  { icon:"trophy", label:"Leaderboard — Overall", kbd:"↵" },
                  { icon:"users", label:"Leaderboard — My Class", kbd:"C" },
                  { icon:"book-open", label:"Leaderboard — By Space", kbd:"S" },
                  { icon:"trending-up", label:"View full progress", kbd:"P" },
                ]}
              />
            </div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body>
</html>
