<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store: Space Detail</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  /* card-local LAYOUT ONLY — never redefine tokens, never a hex literal */
  body { margin:0; background: var(--bg-canvas); color: var(--text-primary); font-family: var(--font-ui); }
  .frame { height: 820px; overflow: hidden; }
  .scroll { overflow-y: auto; height: 100%; }

  .page { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: var(--space-6); padding-bottom: var(--space-12); }

  .backrow { display: flex; align-items: center; }

  /* ---- Hero ---- */
  .hero { display: grid; grid-template-columns: 280px 1fr; gap: var(--space-6); background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: var(--space-6); box-shadow: var(--shadow-e1); }
  .hero__thumb { background: var(--bg-surface-sunken); border-radius: var(--radius-lg); display: grid; place-items: center; min-height: 200px; color: var(--text-muted); }
  .hero__body { display: flex; flex-direction: column; gap: var(--space-3); }
  .hero__tags { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
  .hero h1 { font-family: var(--font-display); font-size: var(--text-4xl); line-height: var(--leading-4xl); font-weight: var(--weight-semibold); margin: 0; }
  .hero__sub { color: var(--text-secondary); font-size: var(--text-base); line-height: var(--leading-base); margin: 0; max-width: 60ch; }
  .hero__ratingrow { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; margin-top: var(--space-1); font-size: var(--text-sm); color: var(--text-secondary); }
  .hero__ratingrow .u-num { font-family: var(--font-mono); color: var(--text-primary); font-weight: var(--weight-medium); }
  .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-strong); display: inline-block; }

  /* ---- 2-col ---- */
  .grid2 { display: grid; grid-template-columns: minmax(0,1fr) 320px; gap: var(--space-6); align-items: start; }
  .main { display: flex; flex-direction: column; gap: var(--space-8); max-width: 720px; }
  .aside { position: sticky; top: var(--space-4); display: flex; flex-direction: column; gap: var(--space-4); }

  .sec h2 { font-family: var(--font-display); font-size: var(--text-2xl); line-height: var(--leading-2xl); font-weight: var(--weight-semibold); margin: 0 0 var(--space-2); }
  .sec__sub { color: var(--text-muted); font-size: var(--text-sm); margin: 0 0 var(--space-4); }
  .sec__sub .u-num { font-family: var(--font-mono); color: var(--text-secondary); }

  /* ---- Syllabus list ---- */
  .syllabus { display: flex; flex-direction: column; gap: var(--space-2); }
  .sylrow { display: grid; grid-template-columns: 28px 1fr auto; gap: var(--space-3); align-items: center; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); }
  .sylrow__idx { font-family: var(--font-mono); font-size: var(--text-sm); color: var(--text-muted); text-align: center; }
  .sylrow__title { font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-primary); margin: 0; }
  .sylrow__meta { display: flex; align-items: center; gap: var(--space-2); margin-top: 2px; font-size: var(--text-xs); color: var(--text-muted); flex-wrap: wrap; }
  .sylrow__meta .u-num { font-family: var(--font-mono); }
  .sylrow__lock { display: inline-flex; align-items: center; gap: var(--space-1); font-size: var(--text-2xs); color: var(--text-muted); white-space: nowrap; cursor: help; }
  .sylrow__lock--open { color: var(--status-success); }

  /* ---- Price aside ---- */
  .price-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--shadow-e1); padding: var(--space-5); display: flex; flex-direction: column; gap: var(--space-4); }
  .price-row { display: flex; align-items: baseline; gap: var(--space-2); }
  .price-row__amt { font-family: var(--font-mono); font-size: var(--text-3xl); line-height: var(--leading-3xl); font-weight: var(--weight-semibold); color: var(--text-primary); }
  .price-row__strike { font-family: var(--font-mono); font-size: var(--text-base); color: var(--text-muted); text-decoration: line-through; }
  .price-cta { display: flex; flex-direction: column; gap: var(--space-2); }
  .price-div { height: 1px; background: var(--border-subtle); }
  .getlist { display: flex; flex-direction: column; gap: var(--space-2); margin: 0; padding: 0; list-style: none; }
  .getlist li { display: flex; align-items: flex-start; gap: var(--space-2); font-size: var(--text-sm); color: var(--text-secondary); }
  .getlist li .u-num { font-family: var(--font-mono); color: var(--text-primary); }
  .get-ico { color: var(--status-success); margin-top: 1px; flex: none; }
  .live { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }

  /* ---- Ratings ---- */
  .ratings { display: grid; grid-template-columns: 180px 1fr; gap: var(--space-6); align-items: center; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: var(--space-5); }
  .ratings__big { display: flex; flex-direction: column; align-items: center; gap: var(--space-1); text-align: center; }
  .ratings__avg { font-family: var(--font-mono); font-size: var(--text-5xl); line-height: var(--leading-5xl); font-weight: var(--weight-semibold); color: var(--text-primary); }
  .ratings__count { font-size: var(--text-xs); color: var(--text-muted); }
  .dist { display: flex; flex-direction: column; gap: var(--space-2); }
  .dist__row { display: grid; grid-template-columns: 64px 1fr 44px; gap: var(--space-3); align-items: center; }
  .dist__label { font-size: var(--text-xs); color: var(--text-secondary); display: inline-flex; align-items: center; gap: 4px; }
  .dist__label .u-num { font-family: var(--font-mono); }
  .dist__count { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); text-align: right; }

  .stars { display: inline-flex; align-items: center; gap: 2px; color: var(--spark-hover); }
  .stars--muted { color: var(--border-strong); }

  /* ---- Review cards ---- */
  .reviews { display: flex; flex-direction: column; gap: var(--space-3); }
  .review { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: var(--space-4); display: flex; gap: var(--space-3); }
  .review__body { flex: 1; display: flex; flex-direction: column; gap: var(--space-1); }
  .review__head { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
  .review__name { font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--text-primary); }
  .review__date { font-size: var(--text-2xs); color: var(--text-muted); font-family: var(--font-mono); margin-left: auto; }
  .review__text { font-size: var(--text-sm); color: var(--text-secondary); line-height: var(--leading-base); margin: var(--space-1) 0 0; }
  .review--pending { opacity: 0.65; }

  /* ---- Star input (radiogroup) ---- */
  .starinput { display: inline-flex; gap: var(--space-1); }
  .starbtn { background: none; border: 0; padding: 2px; cursor: pointer; color: var(--border-strong); line-height: 0; border-radius: var(--radius-sm); }
  .starbtn--on { color: var(--spark-hover); }
  .starbtn:focus-visible { outline: none; box-shadow: var(--ring-focus); }

  .reviewform { background: var(--bg-surface-sunken); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-3); }
  .reviewform__label { font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-primary); }
  .formfooter { display: flex; align-items: center; gap: var(--space-2); justify-content: flex-end; }

  /* ---- States gallery ---- */
  .eyebrow { font-family: var(--font-mono); font-size: var(--text-2xs); letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); margin: var(--space-2) 0 var(--space-3); display: flex; align-items: center; gap: var(--space-2); }
  .eyebrow::before { content: ""; height: 1px; width: var(--space-6); background: var(--border-subtle); }
  .states { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5); }
  .state-box { border: 1px dashed var(--border-strong); border-radius: var(--radius-lg); padding: var(--space-5); background: var(--bg-surface); }
  .state-box--full { grid-column: 1 / -1; }
  .state-cap { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin: 0 0 var(--space-3); }

  /* ---- Celebration burst (the ONE reserved moment) ---- */
  .burst-overlay { position: absolute; inset: 0; display: grid; place-items: center; background: var(--bg-surface); border-radius: var(--radius-lg); }
  @media (prefers-reduced-motion: no-preference) {
    .burst-pop { animation: pop var(--dur-base) var(--ease-entrance) both; }
    .spark-dot { animation: spark var(--dur-slow) var(--ease-exit) forwards; }
  }
  @keyframes pop { 0%{ transform: scale(0.7); opacity:0 } 60%{ transform: scale(1.08) } 100%{ transform: scale(1); opacity:1 } }
  @keyframes spark { 0%{ transform: translate(0,0) scale(1); opacity:1 } 100%{ transform: translate(var(--dx), var(--dy)) scale(0.2); opacity:0 } }
  .burst-ring { width: 96px; height: 96px; border-radius: 50%; background: var(--spark-subtle); display: grid; place-items: center; color: var(--spark); position: relative; }
  .spark-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; background: var(--spark); top: 50%; left: 50%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const LU = window.LvlupV0DesignSystem_5d0725;
  const { Icon, IconButton, Input, Textarea, Button, Badge, Chip, Avatar,
          ProgressBar, ContentRenderer, AnswerKeyLock, EmptyState, Skeleton,
          Alert, Toast, Tooltip, Pagination } = LU;
  const { useState, useEffect, useRef } = React;

  /* ================= seed data (warm, realistic) ================= */
  const SPACE = {
    title: "Calculus, Made Intuitive",
    subject: "Mathematics",
    labels: ["Beginner-friendly", "Visual proofs", "Self-paced"],
    avg: 4.6,
    reviews: 128,
    learners: 540,
    price: "₹999",
    strike: "₹1,499",
    lessons: 12,
    hours: "6h",
    descHtml: "<p>Limits, derivatives, and integrals don't have to feel like memorized rules. " +
      "This space rebuilds calculus from the <em>why</em> up — every idea anchored to a picture you can see " +
      "and a problem you can feel.</p>" +
      "<p>You'll start with the intuition behind a limit (<code>lim x→0</code>), watch a tangent line " +
      "become a derivative, and finish able to set up and solve real optimization problems with confidence. " +
      "Practice and gentle feedback are built into every step.</p>"
  };

  const SYLLABUS = [
    { title: "What a limit really means",        type: "Learning",   min: 22 },
    { title: "Continuity & the squeeze theorem", type: "Learning",   min: 28 },
    { title: "From tangent lines to derivatives",type: "Hybrid",     min: 34 },
    { title: "Rules of differentiation (drill)", type: "Practice",   min: 40 },
    { title: "Chain rule, unpacked",             type: "Learning",   min: 26 },
    { title: "Optimization in the real world",   type: "Practice",   min: 45 },
    { title: "Intro to the integral",            type: "Learning",   min: 30 },
    { title: "Checkpoint: putting it together",  type: "Assessment", min: 35 },
  ];
  const TYPE_ICON = { Learning:"book-open", Practice:"dumbbell", Hybrid:"layers", Assessment:"clipboard-check" };

  const DIST = [
    { star:5, pct:71, count:91 },
    { star:4, pct:18, count:23 },
    { star:3, pct:6,  count:8  },
    { star:2, pct:3,  count:4  },
    { star:1, pct:2,  count:2  },
  ];

  const REVIEWS = [
    { initials:"PR", name:"Priya R.", date:"3 weeks ago", rating:5, text:"I'd bounced off calculus twice before. The way limits are explained here finally made it click — I actually look forward to the next lesson." },
    { initials:"AK", name:"Arjun K.", date:"1 month ago", rating:5, text:"The optimization section alone was worth it. Real problems, gentle hints, no judgement when I got it wrong the first time." },
    { initials:"MS", name:"Meera S.", date:"1 month ago", rating:4, text:"Loved the visual proofs. I'd have liked a couple more practice sets on the chain rule, but overall genuinely excellent." },
  ];

  /* ================= small star helpers ================= */
  function StarsDisplay({ value, ariaLabel }){
    const full = Math.round(value);
    return (
      <span className="stars" role="img" aria-label={ariaLabel || ("Rated " + value + " out of 5")}>
        {[1,2,3,4,5].map(n => (
          <Icon key={n} name="star" size={16}
            className={n <= full ? "" : "stars--muted"}
            style={{ color: n <= full ? "var(--spark-hover)" : "var(--border-strong)" }} />
        ))}
      </span>
    );
  }

  /* keyboard-accessible radiogroup star input (§9) */
  function StarInput({ value, onChange }){
    const refs = useRef([]);
    const move = (n) => { const v = Math.max(1, Math.min(5, n)); onChange(v); const el = refs.current[v-1]; if (el) el.focus(); };
    const onKey = (e, n) => {
      if (e.key === "ArrowRight" || e.key === "ArrowUp") { e.preventDefault(); move(n+1); }
      else if (e.key === "ArrowLeft" || e.key === "ArrowDown") { e.preventDefault(); move(n-1); }
      else if (e.key === "Home") { e.preventDefault(); move(1); }
      else if (e.key === "End") { e.preventDefault(); move(5); }
    };
    return (
      <div className="starinput" role="radiogroup" aria-label="Rate this space, 1 to 5 stars">
        {[1,2,3,4,5].map(n => (
          <button key={n} type="button" ref={el => refs.current[n-1] = el}
            role="radio" aria-checked={value === n} aria-label={n + (n===1 ? " star" : " stars")}
            tabIndex={(value || 1) === n ? 0 : -1}
            className={"starbtn" + (n <= value ? " starbtn--on" : "")}
            onClick={() => onChange(n)} onKeyDown={(e)=>onKey(e,n)}>
            <Icon name="star" size={26} />
          </button>
        ))}
      </div>
    );
  }

  /* ================= syllabus rows ================= */
  function SyllabusList({ locked }){
    return (
      <div className="syllabus">
        {SYLLABUS.map((s, i) => (
          <div className="sylrow" key={i}>
            <span className="sylrow__idx">{i+1}</span>
            <div>
              <p className="sylrow__title">{s.title}</p>
              <div className="sylrow__meta">
                <span style={{display:"inline-flex",alignItems:"center",gap:"4px"}}>
                  <Icon name={TYPE_ICON[s.type]} size={12}/> {s.type}
                </span>
                <span className="dot"></span>
                <span><span className="u-num">~{s.min}</span> min</span>
              </div>
            </div>
            {locked ? (
              <span className="sylrow__lock" aria-label="Unlocks when you enrol" title="Unlocks when you enrol">
                <Icon name="lock" size={13}/> Unlocks when you enrol
              </span>
            ) : (
              <span className="sylrow__lock sylrow__lock--open" aria-label="Included with your enrolment">
                <Icon name="unlock" size={13}/> Included
              </span>
            )}
          </div>
        ))}
      </div>
    );
  }

  /* ================= ratings block ================= */
  function RatingsBlock(){
    return (
      <div className="ratings" role="group" aria-label="Rating summary">
        <div className="ratings__big">
          <div className="ratings__avg">{SPACE.avg}</div>
          <StarsDisplay value={SPACE.avg} ariaLabel={"Rated " + SPACE.avg + " out of 5"} />
          <div className="ratings__count"><span style={{fontFamily:"var(--font-mono)"}}>{SPACE.reviews}</span> reviews</div>
        </div>
        <div className="dist">
          {DIST.map(d => (
            <div className="dist__row" key={d.star}>
              <span className="dist__label"><span className="u-num">{d.star}</span><Icon name="star" size={11} style={{color:"var(--spark-hover)"}}/></span>
              <ProgressBar value={d.pct} variant="spark"
                aria-label={d.star + " stars, " + d.pct + "% of reviews (" + d.count + ")"} />
              <span className="dist__count">{d.count}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* ================= the "what you get" list ================= */
  function WhatYouGet(){
    const items = [
      <span>Lifetime access</span>,
      <span><span className="u-num">{SPACE.lessons}</span> guided lessons</span>,
      <span>Practice + feedback as you go</span>,
      <span>Backed by <span className="u-num">{SPACE.reviews}</span> learner reviews</span>,
    ];
    return (
      <ul className="getlist">
        {items.map((it,i)=>(
          <li key={i}><span className="get-ico"><Icon name="check-circle" size={16}/></span>{it}</li>
        ))}
      </ul>
    );
  }

  /* ================= AppShell frame ================= */
  function Sidebar(){
    const nav = [
      { icon:"graduation-cap", label:"My Learning" },
      { icon:"store", label:"Store", active:true },
      { icon:"shopping-cart", label:"Cart", badge:"2" },
      { icon:"user", label:"Profile" },
    ];
    return (
      <aside className="appshell__sidebar">
        <div className="sidebar__brand">
          <span className="sidebar__brand-mark">L</span>
          <span className="sidebar__brand-name">LevelUp</span>
        </div>
        <nav className="sidebar__nav">
          <span className="sidebar__section-label">Browse</span>
          {nav.map((n,i)=>(
            <a key={i} className="nav-item" href="#" aria-current={n.active ? "page" : undefined}>
              <Icon name={n.icon} size={18}/><span>{n.label}</span>
              {n.badge && <span className="nav-item__badge"><Badge variant="brand">{n.badge}</Badge></span>}
            </a>
          ))}
        </nav>
        <div style={{marginTop:"auto", padding:"var(--space-3)"}}>
          <a className="nav-item" href="#"><Icon name="settings" size={18}/><span>Settings</span></a>
        </div>
      </aside>
    );
  }
  function Topbar({ cartCount }){
    return (
      <header className="appshell__topbar">
        <div className="topbar__search">
          <Input placeholder="Search the store…" aria-label="Search the store" />
        </div>
        <div className="topbar__spacer"></div>
        <Button variant="ghost" leadingIcon={<Icon name="shopping-cart" size={18}/>}>
          Cart {cartCount > 0 && <Badge variant="brand">{cartCount}</Badge>}
        </Button>
        <span className="avatar avatar--sm" aria-label="Riya Nair">RN</span>
      </header>
    );
  }

  /* ================= Celebration burst (reserved moment) ================= */
  function CelebrationBurst(){
    const dots = [[-60,-40],[60,-50],[-50,50],[55,45],[0,-72],[-72,0],[72,8]];
    return (
      <div className="burst-overlay" role="status" aria-live="polite">
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"var(--space-3)"}}>
          <div className="burst-ring burst-pop">
            <Icon name="party-popper" size={40}/>
            {dots.map(([dx,dy],i)=>(
              <span key={i} className="spark-dot" style={{ "--dx": dx+"px", "--dy": dy+"px", animationDelay: (i*20)+"ms" }}></span>
            ))}
          </div>
          <div style={{fontFamily:"var(--font-display)",fontSize:"var(--text-xl)",fontWeight:"var(--weight-semibold)"}}>You're in! Let's start learning.</div>
        </div>
      </div>
    );
  }

  /* ================= Price aside (state-aware) ================= */
  function PriceAside({ mode, inCart, onBuy, onCart, enrolling, celebrate }){
    // mode: "buy" | "enrolled" | "signedout"
    return (
      <div className="price-card">
        {celebrate ? <div style={{position:"relative",minHeight:"160px"}}><CelebrationBurst/></div> : (
          <React.Fragment>
            {mode === "enrolled" ? (
              <React.Fragment>
                <div className="hero__tags">
                  <Badge variant="success" icon={<Icon name="check-circle" size={13}/>}>Enrolled</Badge>
                  <Chip><Icon name="infinity" size={12}/> Lifetime access</Chip>
                </div>
                <div className="price-cta">
                  <Button variant="primary" size="lg" block leadingIcon={<Icon name="play" size={18}/>}>Continue learning</Button>
                </div>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <div className="price-row">
                  <span className="price-row__amt">{SPACE.price}</span>
                  <span className="price-row__strike">{SPACE.strike}</span>
                </div>
                <div className="price-cta">
                  <Button variant="spark" size="lg" block loading={enrolling}
                    leadingIcon={!enrolling && <Icon name="sparkles" size={18}/>}
                    onClick={onBuy} aria-label="Buy now">
                    {enrolling ? "Enrolling…" : "Buy now"}
                  </Button>
                  {inCart ? (
                    <Button variant="secondary" block leadingIcon={<Icon name="check" size={16}/>} onClick={onCart}>
                      Remove from cart
                    </Button>
                  ) : (
                    <Button variant="secondary" block leadingIcon={<Icon name="shopping-cart" size={16}/>} onClick={onCart}>
                      Add to cart
                    </Button>
                  )}
                  {inCart && <div style={{textAlign:"center"}}><Chip active><Icon name="shopping-cart" size={12}/> In your cart</Chip></div>}
                  {mode === "signedout" &&
                    <div style={{fontSize:"var(--text-xs)",color:"var(--text-muted)",textAlign:"center"}}>
                      Sign in to enrol — it only takes a moment.
                    </div>}
                </div>
              </React.Fragment>
            )}
            <div className="price-div"></div>
            <div style={{fontFamily:"var(--font-mono)",fontSize:"var(--text-2xs)",textTransform:"uppercase",letterSpacing:"0.04em",color:"var(--text-muted)"}}>What you get</div>
            <WhatYouGet/>
          </React.Fragment>
        )}
      </div>
    );
  }

  /* ================= Review form ================= */
  function ReviewForm({ onClose, onSubmit }){
    const [rating, setRating] = useState(5);
    const [text, setText] = useState("");
    return (
      <div className="reviewform">
        <div className="reviewform__label" id="rateLabel">How would you rate this space?</div>
        <StarInput value={rating} onChange={setRating} />
        <Textarea rows={3} placeholder="What worked for you? What could be better? (optional)"
          value={text} onChange={(e)=>setText(e.target.value)} aria-label="Your review comment" />
        <div className="formfooter">
          <Button variant="ghost" onClick={onClose}>Cancel</Button>
          <Button variant="primary" leadingIcon={<Icon name="send" size={16}/>}
            onClick={()=>onSubmit(rating, text)}>Post review</Button>
        </div>
      </div>
    );
  }

  /* ================= Reviews section ================= */
  function ReviewsSection({ enrolled }){
    const [open, setOpen] = useState(false);
    const [pending, setPending] = useState(null); // optimistic review

    const submit = (rating, text) => {
      setPending({ initials:"RN", name:"Riya N.", date:"just now", rating, text: text || "(no comment)", pending:true });
      setOpen(false);
      // simulate server resolve
      setTimeout(()=> setPending(p => p ? {...p, pending:false, date:"just now"} : p), 1200);
    };

    return (
      <div className="sec" id="ratings">
        <h2>Ratings &amp; reviews</h2>
        <RatingsBlock/>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",margin:"var(--space-5) 0 var(--space-3)",gap:"var(--space-3)"}}>
          <div style={{fontSize:"var(--text-sm)",color:"var(--text-secondary)"}}>
            What learners are saying
          </div>
          {enrolled && !open && !pending &&
            <Button variant="secondary" leadingIcon={<Icon name="pen-line" size={16}/>} onClick={()=>setOpen(true)}>
              Share your experience
            </Button>}
          {enrolled && pending &&
            <Button variant="ghost" leadingIcon={<Icon name="pen-line" size={16}/>} onClick={()=>setOpen(true)}>
              Edit your review
            </Button>}
        </div>

        {open && <div style={{marginBottom:"var(--space-3)"}}><ReviewForm onClose={()=>setOpen(false)} onSubmit={submit} /></div>}

        <div className="reviews">
          {pending && (
            <div className={"review" + (pending.pending ? " review--pending" : "")}>
              <Avatar initials={pending.initials} />
              <div className="review__body">
                <div className="review__head">
                  <span className="review__name">{pending.name}</span>
                  <Badge variant="brand" icon={<Icon name="user" size={11}/>}>You</Badge>
                  {pending.pending
                    ? <span className="review__date"><Icon name="loader" size={11}/> posting…</span>
                    : <span className="review__date">{pending.date}</span>}
                </div>
                <StarsDisplay value={pending.rating}/>
                <p className="review__text">{pending.text}</p>
              </div>
            </div>
          )}
          {REVIEWS.map((r,i)=>(
            <div className="review" key={i}>
              <Avatar initials={r.initials} />
              <div className="review__body">
                <div className="review__head">
                  <span className="review__name">{r.name}</span>
                  <span className="review__date">{r.date}</span>
                </div>
                <StarsDisplay value={r.rating}/>
                <p className="review__text">{r.text}</p>
              </div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",justifyContent:"center",marginTop:"var(--space-4)"}}>
          <Pagination pages={5} current={1} />
        </div>
      </div>
    );
  }

  /* ================= Hero ================= */
  function Hero(){
    return (
      <div className="hero">
        <div className="hero__thumb" role="img" aria-label={SPACE.title}>
          <Icon name="book-open" size={56} aria-hidden="true"/>
        </div>
        <div className="hero__body">
          <div className="hero__tags">
            <Chip active><Icon name="sigma" size={12}/> {SPACE.subject}</Chip>
            {SPACE.labels.map((l,i)=><Chip key={i}>{l}</Chip>)}
          </div>
          <h1>{SPACE.title}</h1>
          <p className="hero__sub">Rebuild calculus from intuition up — see every idea, then practice it with gentle, instant feedback.</p>
          <div className="hero__ratingrow">
            <StarsDisplay value={SPACE.avg}/>
            <span className="u-num">{SPACE.avg}</span>
            <span className="dot"></span>
            <span><span className="u-num">{SPACE.reviews}</span> reviews</span>
            <span className="dot"></span>
            <span><span className="u-num">{SPACE.learners}</span> learners</span>
          </div>
        </div>
      </div>
    );
  }

  /* ================= Screen ================= */
  function Screen(){
    const [inCart, setInCart] = useState(false);
    const [cartCount, setCartCount] = useState(2);
    const [enrolling, setEnrolling] = useState(false);
    const [celebrate, setCelebrate] = useState(false);
    const [toast, setToast] = useState(null);
    const [liveMsg, setLiveMsg] = useState("");

    const showToast = (t) => { setToast(t); setTimeout(()=>setToast(null), 3200); };

    const onBuy = () => {
      setEnrolling(true);
      setLiveMsg("Enrolling…");
      setTimeout(()=>{
        setEnrolling(false);
        setCelebrate(true);
        setLiveMsg("You're enrolled");
        showToast({ variant:"success", title:"You're in! Let's start learning." });
        setTimeout(()=>setCelebrate(false), 2600);
      }, 1300);
    };
    const onCart = () => {
      if (inCart) { setInCart(false); setCartCount(c=>Math.max(0,c-1)); showToast({ variant:"info", title:"Removed from your cart" }); }
      else { setInCart(true); setCartCount(c=>c+1); showToast({ variant:"success", title:"Added to your cart", body:"Undo" }); }
    };

    return (
      <div className="appshell frame">
        <Sidebar/>
        <Topbar cartCount={cartCount}/>
        <main className="appshell__main scroll" role="main" aria-label="Space detail">
          <span className="live" aria-live="polite">{liveMsg}</span>
          <div className="page">

            <div className="backrow">
              <Button variant="ghost" leadingIcon={<Icon name="chevron-left" size={16}/>}>Back to Store</Button>
            </div>

            {/* ===== PRIMARY: success / not-enrolled ===== */}
            <Hero/>

            <div className="grid2">
              <div className="main">
                <div className="sec">
                  <h2>About this space</h2>
                  <ContentRenderer html={SPACE.descHtml} math />
                </div>

                <div className="sec">
                  <h2>What's inside</h2>
                  <p className="sec__sub"><span className="u-num">{SPACE.lessons}</span> lessons · about <span className="u-num">{SPACE.hours}</span> of learning</p>
                  <SyllabusList locked={true}/>
                  <div style={{marginTop:"var(--space-3)"}}>
                    <AnswerKeyLock title="Full lessons are gated">Unlocks when you enrol — your purchase opens every lesson, problem, and feedback step.</AnswerKeyLock>
                  </div>
                </div>

                <ReviewsSection enrolled={false}/>
              </div>

              <div className="aside">
                <PriceAside mode="buy" inCart={inCart} onBuy={onBuy} onCart={onCart}
                  enrolling={enrolling} celebrate={celebrate} />
              </div>
            </div>

            {/* ===== SECONDARY: spec'd states ===== */}
            <div className="eyebrow">Spec states (reference)</div>
            <div className="states">

              {/* Loading skeleton */}
              <div className="state-box state-box--full">
                <p className="state-cap">State: loading skeleton</p>
                <div className="grid2">
                  <div className="main">
                    <div className="hero" style={{gridTemplateColumns:"280px 1fr"}}>
                      <Skeleton variant="rect" width="100%" height="200px"/>
                      <div style={{display:"flex",flexDirection:"column",gap:"var(--space-3)"}}>
                        <Skeleton width="40%" height="14px"/>
                        <Skeleton width="80%" height="28px"/>
                        <Skeleton width="90%" height="14px"/>
                        <Skeleton width="55%" height="14px"/>
                      </div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:"var(--space-2)",marginTop:"var(--space-4)"}}>
                      {[0,1,2,3].map(i=><Skeleton key={i} width="100%" height="52px"/>)}
                    </div>
                  </div>
                  <div className="aside">
                    <div className="price-card">
                      <Skeleton width="50%" height="32px"/>
                      <Skeleton width="100%" height="44px"/>
                      <Skeleton width="100%" height="40px"/>
                      <div className="price-div"></div>
                      <Skeleton width="80%" height="14px"/>
                      <Skeleton width="70%" height="14px"/>
                    </div>
                  </div>
                </div>
              </div>

              {/* Empty — no reviews */}
              <div className="state-box">
                <p className="state-cap">State: empty · no reviews yet</p>
                <EmptyState icon="message-square-plus" title="No reviews yet"
                  body="Once you've spent time here, your honest take helps the next learner decide. You could be the first." />
              </div>

              {/* Empty — no syllabus preview */}
              <div className="state-box">
                <p className="state-cap">State: empty · no syllabus preview</p>
                <Alert variant="info" title="Curriculum details coming soon">
                  We're polishing the lesson outline for this space. The full curriculum unlocks the moment you enrol.
                </Alert>
              </div>

              {/* Error — load */}
              <div className="state-box">
                <p className="state-cap">State: error · failed load (distinct from empty)</p>
                <EmptyState icon="cloud-off" title="We couldn't load this space"
                  body="This might be a hiccup on our end. Let's try again."
                  action={<div style={{display:"flex",gap:"var(--space-2)"}}>
                    <Button variant="spark" leadingIcon={<Icon name="refresh-cw" size={16}/>}>Retry</Button>
                    <Button variant="ghost" leadingIcon={<Icon name="chevron-left" size={16}/>}>Back to Store</Button>
                  </div>} />
              </div>

              {/* Partial — reviews failed, buy path intact */}
              <div className="state-box">
                <p className="state-cap">State: partial · reviews failed (buy path intact)</p>
                <Alert variant="warning" title="Reviews didn't load">
                  Hero, syllabus and pricing are all here — only the reviews hiccuped. Buying still works.
                </Alert>
                <div style={{marginTop:"var(--space-3)"}}>
                  <Button variant="ghost" leadingIcon={<Icon name="refresh-cw" size={16}/>}>Retry reviews</Button>
                </div>
              </div>

              {/* In cart */}
              <div className="state-box">
                <p className="state-cap">State: success · in cart</p>
                <div className="aside" style={{position:"static"}}>
                  <PriceAside mode="buy" inCart={true} onBuy={()=>{}} onCart={()=>{}} />
                </div>
              </div>

              {/* Enrolled owner */}
              <div className="state-box">
                <p className="state-cap">State: success · enrolled owner</p>
                <div className="aside" style={{position:"static"}}>
                  <PriceAside mode="enrolled" inCart={false} onBuy={()=>{}} onCart={()=>{}} />
                </div>
              </div>

              {/* Enrolled owner — locks removed, write-review enabled */}
              <div className="state-box">
                <p className="state-cap">State: enrolled · syllabus unlocked + write review</p>
                <SyllabusList locked={false}/>
                <div style={{marginTop:"var(--space-3)"}}>
                  <Button variant="secondary" leadingIcon={<Icon name="pen-line" size={16}/>}>Share your experience</Button>
                </div>
              </div>

              {/* Signed-out */}
              <div className="state-box">
                <p className="state-cap">State: signed-out · buy prompts sign-in</p>
                <div className="aside" style={{position:"static"}}>
                  <PriceAside mode="signedout" inCart={false} onBuy={()=>{}} onCart={()=>{}} />
                </div>
              </div>

              {/* Celebration (the ONE reserved moment) */}
              <div className="state-box">
                <p className="state-cap">State: enrol complete · celebration burst (reserved moment)</p>
                <div style={{position:"relative",minHeight:"180px",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
                  <CelebrationBurst/>
                </div>
              </div>

              {/* Locked-node tooltip note */}
              <div className="state-box state-box--full">
                <p className="state-cap">State: locked syllabus node · hover affordance (web) / press (mobile)</p>
                <div className="sylrow">
                  <span className="sylrow__idx">3</span>
                  <div>
                    <p className="sylrow__title">From tangent lines to derivatives</p>
                    <div className="sylrow__meta">
                      <span style={{display:"inline-flex",alignItems:"center",gap:"4px"}}><Icon name="layers" size={12}/> Hybrid</span>
                      <span className="dot"></span><span><span className="u-num">~34</span> min</span>
                    </div>
                  </div>
                  <Tooltip label="Unlocks when you enrol">
                    <span className="sylrow__lock"><Icon name="lock" size={13}/> Unlocks when you enrol</span>
                  </Tooltip>
                </div>
                <p style={{fontSize:"var(--text-xs)",color:"var(--text-muted)",marginTop:"var(--space-3)"}}>
                  The gate is purely presentational — no item bodies, questions, or answer keys are ever fetched. Content is server-withheld until enrolment.
                </p>
              </div>

            </div>
          </div>

          {/* live toast (sonner-style) */}
          {toast && (
            <div style={{position:"fixed",right:"var(--space-6)",bottom:"var(--space-6)",zIndex:50,minWidth:"260px"}}>
              <Toast variant={toast.variant} title={toast.title} body={toast.body} />
            </div>
          )}
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body>
</html>
