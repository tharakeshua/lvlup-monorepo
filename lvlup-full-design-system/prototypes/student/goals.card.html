<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Goals & Planner</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  /* card-local LAYOUT ONLY — never redefine tokens, never a hex literal */
  body { margin:0; background: var(--bg-canvas); color: var(--text-primary); font-family: var(--font-ui); }
  html, body, #root, .appshell { height: 100%; }

  .goals { display: flex; flex-direction: column; gap: var(--space-6); max-width: 1200px; }

  /* HEADER */
  .gh { display: flex; align-items: flex-end; justify-content: space-between; gap: var(--space-4); }
  .gh__title { font-family: var(--font-display); font-size: var(--text-3xl); line-height: var(--leading-3xl); font-weight: var(--weight-semibold); margin: 0; letter-spacing: var(--tracking-display); }
  .gh__sub { color: var(--text-secondary); font-size: var(--text-base); margin-top: var(--space-1); }

  .card-surface { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--shadow-e1); }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

  /* STAT ROLLUP */
  .rollup { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-5); }
  .rollup-tile { padding: var(--space-5); display: flex; align-items: center; gap: var(--space-4); }
  .rollup-tile__icon { width: 44px; height: 44px; border-radius: var(--radius-md); display: grid; place-items: center; flex: 0 0 auto; }
  .rollup-tile__icon--active { background: var(--brand-subtle); color: var(--brand-primary); }
  .rollup-tile__icon--due { background: var(--status-info-subtle); color: var(--status-info); }
  .rollup-tile__icon--done { background: var(--status-success-subtle); color: var(--status-success); }
  .rollup-tile__num { font-family: var(--font-display); font-size: var(--text-3xl); font-weight: var(--weight-bold); line-height: 1; }
  .rollup-tile__label { font-size: var(--text-sm); color: var(--text-secondary); margin-top: 2px; }

  /* WEEK STRIP */
  .weekstrip { padding: var(--space-4) var(--space-5); display: flex; flex-direction: column; gap: var(--space-3); }
  .weekstrip__head { display: flex; align-items: center; justify-content: space-between; }
  .weekstrip__title { font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; }
  .weekstrip__rail { display: flex; gap: var(--space-2); overflow-x: auto; }
  .daycell { flex: 1 1 0; min-width: 72px; min-height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-1); padding: var(--space-2); border-radius: var(--radius-md); background: var(--bg-surface-sunken); border: 1px solid var(--border-subtle); cursor: pointer; font-family: var(--font-ui); transition: background-color var(--dur-fast) var(--ease-standard), border-color var(--dur-fast) var(--ease-standard); }
  .daycell:hover { background: var(--bg-inset); }
  .daycell:focus-visible { outline: var(--ring-focus); outline-offset: 2px; }
  .daycell[aria-pressed="true"] { background: var(--brand-subtle); border-color: var(--brand-primary); }
  .daycell--today { border-color: var(--brand-muted); }
  .daycell__dow { font-size: var(--text-2xs); font-weight: var(--weight-semibold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
  .daycell__num { font-family: var(--font-mono); font-size: var(--text-base); font-weight: var(--weight-semibold); color: var(--text-primary); }
  .daycell--today .daycell__num { color: var(--brand-primary); }
  .daycell__dots { display: flex; gap: 3px; height: 6px; }
  .daycell__dot { width: 6px; height: 6px; border-radius: 50%; background: var(--status-info); }
  .daycell__you { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--brand-primary); text-transform: uppercase; letter-spacing: 0.06em; }

  /* SECTION TITLES */
  .sec-title { font-family: var(--font-display); font-size: var(--text-xl); font-weight: var(--weight-semibold); margin: 0; }
  .sec-head { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); margin-bottom: var(--space-3); }

  /* GOAL CARDS GRID */
  .goalgrid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5); }
  .goalcard { padding: var(--space-5); display: flex; gap: var(--space-5); position: relative; overflow: visible; transition: box-shadow var(--dur-fast) var(--ease-standard), border-color var(--dur-fast) var(--ease-standard); }
  .goalcard:hover { box-shadow: var(--shadow-e2); border-color: var(--border-strong); }
  .goalcard:hover .goalcard__menu { opacity: 1; }
  .goalcard__ring-wrap { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: var(--space-2); }
  .ringbig { --ring-size: 92px; }
  .ringbig .ring__label { font-size: var(--text-sm); font-weight: var(--weight-semibold); }
  .goalcard__counts { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); }
  .goalcard__body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: var(--space-2); }
  .goalcard__title { font-family: var(--font-display); font-size: var(--text-lg); font-weight: var(--weight-semibold); }
  .goalcard__meta { display: flex; flex-wrap: wrap; gap: var(--space-2); align-items: center; }
  .goalcard__num-line { font-family: var(--font-mono); font-size: var(--text-sm); color: var(--text-secondary); margin-top: auto; }
  .goalcard__num-line strong { color: var(--text-primary); font-weight: var(--weight-semibold); }
  .goalcard__menu { position: absolute; top: var(--space-3); right: var(--space-3); opacity: 0; transition: opacity var(--dur-fast) var(--ease-standard); }

  /* dropdown menu */
  .ddmenu-wrap { position: relative; }
  .ddmenu { position: absolute; top: calc(100% + 4px); right: 0; min-width: 168px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); box-shadow: var(--shadow-e3); padding: var(--space-1); z-index: 30; display: flex; flex-direction: column; }
  .ddmenu__item { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm); border: none; background: none; cursor: pointer; font-family: var(--font-ui); font-size: var(--text-sm); color: var(--text-primary); text-align: left; }
  .ddmenu__item:hover { background: var(--bg-surface-sunken); }
  .ddmenu__item--danger { color: var(--status-error); }

  /* HISTORY */
  .history { display: grid; grid-template-columns: 1.1fr 1fr; gap: var(--space-5); }
  .histcol { padding: var(--space-5); }
  .heatmap { display: flex; flex-direction: column; gap: var(--space-2); }
  .heatmap__weeks { display: flex; gap: 5px; overflow-x: auto; }
  .heatmap__week { display: flex; flex-direction: column; gap: 5px; }
  .heatcell { width: 17px; height: 17px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); }
  .heatcell--l0 { background: var(--bg-inset); }
  .heatcell--l1 { background: var(--brand-muted); }
  .heatcell--l2 { background: var(--brand-primary); opacity: 0.7; }
  .heatcell--l3 { background: var(--brand-primary); }
  .heatcell:focus-visible { outline: var(--ring-focus); outline-offset: 1px; }
  .heatmap__legend { display: flex; align-items: center; gap: var(--space-2); font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); }
  .heatmap__legend-swatch { width: 13px; height: 13px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); }
  .streakline { display: flex; align-items: center; gap: var(--space-2); margin-top: var(--space-4); padding: var(--space-3); background: var(--spark-subtle); border-radius: var(--radius-md); color: var(--text-primary); font-size: var(--text-sm); }
  .streakline__flame { color: var(--spark); display: inline-flex; }
  .sessrow__head { display: flex; align-items: center; justify-content: space-between; }
  .sessmeta { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-secondary); }
  .sessmeta strong { color: var(--text-primary); }
  .sesssub { font-size: var(--text-xs); color: var(--text-muted); margin-top: 2px; }

  /* heat tooltip */
  .heatpop { position: absolute; z-index: 40; background: var(--ink-900); color: var(--warm-white); border-radius: var(--radius-md); padding: var(--space-2) var(--space-3); box-shadow: var(--shadow-e3); font-size: var(--text-xs); white-space: nowrap; pointer-events: none; transform: translate(-50%, calc(-100% - 10px)); }
  .heatpop .mono { color: var(--marigold-200); }

  /* CELEBRATION */
  .burst-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
  .burst-banner { position: fixed; top: var(--space-6); left: 50%; transform: translateX(-50%); z-index: 10000; pointer-events: none; }
  .burst-card { display: inline-flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-5); background: var(--spark); color: var(--ink-900); border-radius: var(--radius-pill); box-shadow: var(--glow-spark), var(--shadow-e3); font-weight: var(--weight-semibold); animation: bannerPop var(--dur-base) var(--ease-entrance); }
  @keyframes bannerPop { 0% { transform: translateX(-50%) scale(0.7); opacity: 0; } 60% { transform: translateX(-50%) scale(1.06); } 100% { transform: translateX(-50%) scale(1); opacity: 1; } }
  .spark-particle { position: absolute; width: 10px; height: 10px; border-radius: 50%; background: var(--marigold-500); box-shadow: var(--glow-spark); animation: sparkFly 900ms var(--ease-exit) forwards; }
  @keyframes sparkFly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; } }
  .spring-pop { animation: springPop 520ms cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes springPop { 0% { transform: scale(1); } 35% { transform: scale(1.12); } 70% { transform: scale(0.97); } 100% { transform: scale(1); } }
  .spark-ring { box-shadow: 0 0 0 3px var(--spark), var(--glow-spark) !important; }
  .listin { animation: fadeIn var(--dur-fast) var(--ease-entrance); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* COMPLETED / MILESTONE */
  .milestone { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); border-radius: var(--radius-md); background: var(--bg-surface-sunken); border: 1px solid var(--border-subtle); }
  .milestone__check { width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; background: var(--status-success-subtle); color: var(--status-success); flex: 0 0 auto; }
  .milestone__title { font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-secondary); }
  .milestone__when { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); margin-left: auto; }
  .completed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }

  /* MODAL form */
  .formgrid { display: flex; flex-direction: column; gap: var(--space-4); padding-bottom: var(--space-2); }
  .form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
  .startchip { display: inline-flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); background: var(--bg-surface-sunken); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); font-size: var(--text-sm); color: var(--text-secondary); }

  /* STATE PREVIEW */
  .states { display: flex; flex-direction: column; gap: var(--space-5); margin-top: var(--space-2); }
  .eyebrow-state { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.02em; margin-bottom: var(--space-2); display: flex; align-items: center; gap: var(--space-2); }
  .state-band { border: 1px dashed var(--border-strong); border-radius: var(--radius-lg); padding: var(--space-4); background: var(--bg-surface); }
  .state-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5); align-items: start; }
  .skel-goal { padding: var(--space-5); display: flex; gap: var(--space-5); }

  .toast-stack { position: fixed; bottom: var(--space-6); right: var(--space-6); z-index: 200; display: flex; flex-direction: column; gap: var(--space-3); }

  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  .divider { height: 1px; background: var(--border-subtle); margin: var(--space-2) 0; }

  @media (prefers-reduced-motion: reduce) {
    .goalcard, .daycell, .nav-item { transition: none !important; }
    .burst-card, .spark-particle, .spring-pop, .listin { animation: none !important; }
  }
</style>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="root"></div>
<script type="text/babel">
  const LU = window.LvlupV0DesignSystem_5d0725;
  const {
    Button, IconButton, Icon, Input, Select, Field, Textarea,
    Card, Section, Panel, Avatar, Badge, Chip, Stat, Timeline,
    EmptyState, Skeleton, Alert, Tooltip, NavItem, ProgressRing, ProgressBar,
    StreakFlame, Modal, Accordion, Toast
  } = LU;

  const { useState, useEffect, useRef, useCallback } = React;
  const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ============ TARGET TYPE META ============ */
  const TYPE_META = {
    spaces:       { label: "Spaces",   unit: "spaces",   icon: "layout-grid" },
    story_points: { label: "Sections", unit: "sections", icon: "git-branch" },
    items:        { label: "Items",    unit: "items",    icon: "list-checks" },
    exams:        { label: "Exams",    unit: "exams",    icon: "file-check" },
    minutes:      { label: "Minutes",  unit: "min",      icon: "timer" },
  };
  const TYPE_OPTIONS = [
    { value: "spaces", label: "Spaces" },
    { value: "story_points", label: "Sections" },
    { value: "items", label: "Items" },
    { value: "exams", label: "Exams" },
    { value: "minutes", label: "Study minutes" },
  ];

  /* ============ SEED DATA (server-authoritative currentCount — client never edits) ============ */
  const INITIAL_GOALS = [
    { id: "g1", title: "Finish the Math spaces", targetType: "spaces",  targetCount: 5,   currentCount: 3,   endDate: "2026-06-26", due: "Fri", proximity: "info" },
    { id: "g2", title: "Study this week",        targetType: "minutes", targetCount: 300, currentCount: 180, endDate: "2026-06-28", due: "Sun", proximity: "info", linear: true },
    { id: "g3", title: "Practice DSA items",     targetType: "items",   targetCount: 20,  currentCount: 18,  endDate: "2026-06-21", due: "tomorrow", proximity: "warning" },
    { id: "g4", title: "Wrap up Recursion",      targetType: "story_points", targetCount: 4, currentCount: 1, endDate: "2026-06-18", due: "past", proximity: "error" },
  ];
  const COMPLETED = [
    { id: "c1", title: "Pass 2 exams",          when: "Jun 14" },
    { id: "c2", title: "10 items in DSA",       when: "Jun 11" },
    { id: "c3", title: "Study 200 min last wk", when: "Jun 08" },
    { id: "c4", title: "Finish Arrays space",   when: "Jun 02" },
  ];
  /* 8 weeks of study sessions (most recent last). intensity 0..3 */
  const HEAT = [
    [0,1,2,1,0,0,0],[1,2,3,2,1,0,1],[2,1,0,1,2,3,1],[0,0,1,2,1,1,0],
    [1,2,2,1,3,2,1],[2,3,1,0,1,2,2],[0,1,2,3,2,1,0],[1,2,3,2,2,3,0],
  ];
  const HEAT_MIN = { 0: 0, 1: 20, 2: 45, 3: 75 };
  const SESSIONS = [
    { date: "Jun 19", time: "Fri", min: 45, items: 8, pts: 60, spaces: "Recursion, Arrays", variant: "success" },
    { date: "Jun 18", time: "Thu", min: 30, items: 5, pts: 40, spaces: "Sorting", variant: "success" },
    { date: "Jun 17", time: "Wed", min: 50, items: 9, pts: 70, spaces: "Hash Maps", variant: "success" },
    { date: "Jun 16", time: "Tue", min: 25, items: 4, pts: 30, spaces: "Trees", variant: "muted" },
  ];
  const WEEK = [
    { dow: "Mon", num: 16, due: 0 },
    { dow: "Tue", num: 17, due: 0 },
    { dow: "Wed", num: 18, due: 0, today: true },
    { dow: "Thu", num: 19, due: 0 },
    { dow: "Fri", num: 20, due: 1 },
    { dow: "Sat", num: 21, due: 2 },
    { dow: "Sun", num: 22, due: 1 },
  ];

  const dueChip = (g) => {
    if (g.proximity === "error")
      return <Badge variant="error" icon={<Icon name="flag" size={12}/>}>Past your date — finish strong</Badge>;
    if (g.proximity === "warning")
      return <Badge variant="warning" icon={<Icon name="alarm-clock" size={12}/>}>Due {g.due}</Badge>;
    return <Badge variant="info" icon={<Icon name="calendar" size={12}/>}>Due {g.due}</Badge>;
  };

  /* ============ COUNT-UP (mount only, reduced-motion safe) ============ */
  function CountUp({ end, dur }) {
    const [val, setVal] = useState(reduceMotion ? end : 0);
    useEffect(() => {
      if (reduceMotion) { setVal(end); return; }
      let raf, start; const d = dur || 600;
      const step = (t) => {
        if (start == null) start = t;
        const p = Math.min(1, (t - start) / d);
        setVal(end * (1 - Math.pow(1 - p, 3)));
        if (p < 1) raf = requestAnimationFrame(step); else setVal(end);
      };
      raf = requestAnimationFrame(step);
      return () => cancelAnimationFrame(raf);
    }, [end]);
    return <span className="mono">{Math.round(val).toLocaleString()}</span>;
  }

  /* ============ CELEBRATION — the ONE borrowed moment ============ */
  function CelebrationBurst({ active, anchor }) {
    if (!active || reduceMotion) return null;
    const particles = Array.from({ length: 14 }, (_, i) => {
      const ang = (i / 14) * Math.PI * 2;
      const r = 70 + (i % 3) * 24;
      return { dx: Math.cos(ang) * r + "px", dy: Math.sin(ang) * r + "px", delay: (i % 4) * 30 };
    });
    const style = anchor ? { position: "fixed", left: anchor.x, top: anchor.y, width: 0, height: 0 } : {};
    return (
      <div className="burst-overlay" aria-hidden="true">
        <div style={style}>
          {particles.map((p, i) => (
            <span key={i} className="spark-particle"
              style={{ "--dx": p.dx, "--dy": p.dy, animationDelay: p.delay + "ms" }}/>
          ))}
        </div>
      </div>
    );
  }
  function BurstBanner({ active }) {
    if (!active || reduceMotion) return null;
    return (
      <div className="burst-banner" aria-hidden="true">
        <div className="burst-card"><Icon name="party-popper" size={18}/> Goal met! You set it, you crushed it.</div>
      </div>
    );
  }

  /* ============ GOAL CARD ============ */
  function GoalCard({ g, celebrating, justInserted, onEdit, onRemove }) {
    const [menu, setMenu] = useState(false);
    const meta = TYPE_META[g.targetType];
    const pct = Math.min(100, Math.round((g.currentCount / g.targetCount) * 100));
    const done = g.currentCount >= g.targetCount || celebrating;
    const ringVal = done ? 100 : pct;
    const aLabel = g.currentCount + " of " + g.targetCount + " " + meta.unit + " · " + pct + "%";
    return (
      <div className={"card-surface goalcard" + (justInserted ? " listin" : "") + (celebrating ? " spark-ring" : "")}>
        <div className="goalcard__ring-wrap">
          <div className={"ring ringbig" + (celebrating ? " spring-pop" : "")}
            role="img" aria-label={aLabel}
            style={{ "--ring-pct": ringVal, "--ring-size": "92px" }}>
            <span className="ring__label">
              {done ? <Icon name="check" size={22}/> : <span className="mono">{pct}%</span>}
            </span>
          </div>
          <span className="goalcard__counts mono">{g.currentCount} / {g.targetCount}</span>
        </div>

        <div className="goalcard__body">
          <span className="goalcard__title">{g.title}</span>
          <div className="goalcard__meta">
            <Chip><Icon name={meta.icon} size={12}/> {meta.label}</Chip>
            {dueChip(g)}
          </div>
          {g.linear && (
            <div style={{ marginTop: "var(--space-1)" }}>
              <ProgressBar value={pct} variant="spark"/>
            </div>
          )}
          <span className="goalcard__num-line">
            <strong>{g.currentCount}</strong> of <strong>{g.targetCount}</strong> {meta.unit} done
          </span>
        </div>

        <div className="goalcard__menu ddmenu-wrap">
          <IconButton size="sm" icon={<Icon name="more-horizontal" size={18}/>}
            label={"Options for " + g.title}
            aria-haspopup="menu" aria-expanded={menu}
            onClick={() => setMenu(m => !m)}/>
          {menu && (
            <div className="ddmenu" role="menu" onMouseLeave={() => setMenu(false)}>
              <button className="ddmenu__item" role="menuitem" onClick={() => { setMenu(false); onEdit(g); }}>
                <Icon name="pencil" size={15}/> Edit goal
              </button>
              <button className="ddmenu__item ddmenu__item--danger" role="menuitem" onClick={() => { setMenu(false); onRemove(g); }}>
                <Icon name="trash-2" size={15}/> Remove
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ============ HEATMAP ============ */
  function Heatmap() {
    const [pop, setPop] = useState(null);
    const dows = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
    const baseNum = 1; /* week-1 monday date offset for labels */
    return (
      <div className="heatmap" style={{ position: "relative" }}>
        <div className="heatmap__weeks">
          {HEAT.map((week, wi) => (
            <div className="heatmap__week" key={wi}>
              {week.map((lvl, di) => {
                const min = HEAT_MIN[lvl];
                const label = dows[di] + " wk" + (wi+1) + " — " + (min ? min + " minutes studied" : "no study logged");
                return (
                  <div key={di} tabIndex={0} className={"heatcell heatcell--l" + lvl}
                    role="img" aria-label={label}
                    onMouseEnter={(e) => { const r = e.currentTarget.getBoundingClientRect(); setPop({ x: r.left + r.width/2, y: r.top, min, dow: dows[di], wi }); }}
                    onFocus={(e) => { const r = e.currentTarget.getBoundingClientRect(); setPop({ x: r.left + r.width/2, y: r.top, min, dow: dows[di], wi }); }}
                    onMouseLeave={() => setPop(null)}
                    onBlur={() => setPop(null)}/>
                );
              })}
            </div>
          ))}
        </div>
        <div className="heatmap__legend">
          Less
          <span className="heatmap__legend-swatch heatcell--l0"/>
          <span className="heatmap__legend-swatch heatcell--l1"/>
          <span className="heatmap__legend-swatch heatcell--l2"/>
          <span className="heatmap__legend-swatch heatcell--l3"/>
          More
        </div>
        {pop && (
          <div className="heatpop" style={{ left: pop.x, top: pop.y, position: "fixed" }} role="status">
            {pop.dow} · {pop.min ? <span className="mono">{pop.min} min studied</span> : "No study logged"}

        )}

          <span className="streakline__flame"><Icon name="flame" size={18}/></span>

      </div>

  /* ============ CREATE / EDIT MODAL ============ */
  function GoalModal({ open, mode, initial, onClose, onSave }) {
    const [title, setTitle] = useState("");
    const [type, setType] = useState("spaces");
    const [count, setCount] = useState("");
    const [endDate, setEndDate] = useState("");
    const [errors, setErrors] = useState({});

    useEffect(() => {
      if (open) {
        setTitle(initial ? initial.title : "");
        setType(initial ? initial.targetType : "spaces");
        setCount(initial ? String(initial.targetCount) : "");
        setEndDate(initial ? initial.endDate : "");
        setErrors({});
      }
    }, [open, initial]);

    const today = "2026-06-20";
    const submit = () => {
      const e = {};
      if (!title.trim()) e.title = "Give your goal a name.";
      if (!count || Number(count) < 1) e.count = "Aim for at least 1.";
      if (!endDate) e.date = "Pick a date in the future.";
      else if (endDate < today) e.date = "Pick a date in the future.";
      setErrors(e);
      if (Object.keys(e).length) return;
      onSave({ title: title.trim(), targetType: type, targetCount: Number(count), endDate });
    };

    return (
      <Modal open={open} onClose={onClose}
        title={mode === "edit" ? "Edit goal" : "Set a study goal"}
        footer={
          <React.Fragment>
            <Button variant="ghost" onClick={onClose}>Cancel</Button>
            <Button variant="spark" leadingIcon={<Icon name="target" size={15}/>} onClick={submit}>
              {mode === "edit" ? "Save changes" : "Set goal"}
            </Button>
          </React.Fragment>
        }>
        <div className="formgrid">
          <Field label="What are you aiming for?" required htmlFor="g-title" error={errors.title}>
            <Input id="g-title" value={title} error={!!errors.title}
              onChange={(e) => setTitle(e.target.value)}
              placeholder="e.g. Finish the Recursion space"
              aria-required="true" aria-describedby={errors.title ? "g-title-err" : undefined}/>
          </Field>

          <div className="form-row2">
            <Field label="Track by" required htmlFor="g-type"
              hint="Spaces, sections, items, exams, or study minutes.">
              <Select id="g-type" options={TYPE_OPTIONS} value={type}
                onChange={(e) => setType(e.target.value)} aria-required="true"/>
            </Field>
            <Field label="How many?" required htmlFor="g-count" error={errors.count}>
              <Input id="g-count" type="number" min="1" value={count} error={!!errors.count}
                onChange={(e) => setCount(e.target.value)} placeholder="e.g. 5"
                aria-required="true"/>
            </Field>
          </div>

          <div className="form-row2">
            <Field label="Starts" htmlFor="g-start" hint="Today — we start tracking now.">
              <span className="startchip" id="g-start">
                <Icon name="calendar-check" size={15}/> Thu, Jun 20
              </span>
            </Field>
            <Field label="By when?" required htmlFor="g-end" error={errors.date}>
              <Input id="g-end" type="date" min={today} value={endDate} error={!!errors.date}
                onChange={(e) => setEndDate(e.target.value)} aria-required="true"/>
            </Field>
          </div>
        </div>
      </Modal>
    );
  }

  /* ============ SCREEN ============ */
  function Screen() {
    const [goals, setGoals] = useState(INITIAL_GOALS);
    const [filterDay, setFilterDay] = useState(null);     /* null | day num */
    const [modal, setModal] = useState({ open: false, mode: "create", initial: null });
    const [confirm, setConfirm] = useState({ open: false, goal: null });
    const [toast, setToast] = useState(null);
    const [insertedId, setInsertedId] = useState(null);
    const [celebrateId, setCelebrateId] = useState(null);
    const [announce, setAnnounce] = useState("");
    const toastTimer = useRef(null);

    const flashToast = useCallback((t) => {
      setToast(t);
      if (toastTimer.current) clearTimeout(toastTimer.current);
      toastTimer.current = setTimeout(() => setToast(null), 2600);
    }, []);

    const activeCount = goals.length;
    const dueThisWeek = goals.filter(g => g.proximity !== "error").length;

    /* week-strip due map: Fri=20 has goals g1; tomorrow(Jun21)=g3; Sun(22)=g2 */
    const dueByNum = { 20: ["g1"], 21: ["g3"], 22: ["g2"] };
    const filtered = filterDay == null ? goals
      : goals.filter(g => (dueByNum[filterDay] || []).includes(g.id));

    const openCreate = () => setModal({ open: true, mode: "create", initial: null });
    const openEdit = (g) => setModal({ open: true, mode: "edit", initial: g });

    const handleSave = (data) => {
      if (modal.mode === "edit") {
        setGoals(gs => gs.map(g => g.id === modal.initial.id ? { ...g, ...data } : g));
        flashToast({ variant: "success", title: "Goal updated." });
      } else {
        const id = "new-" + Date.now();
        const newGoal = { id, ...data, currentCount: 0, due: "soon", proximity: "info", linear: data.targetType === "minutes" };
        setGoals(gs => [newGoal, ...gs]);
        setInsertedId(id);
        setTimeout(() => setInsertedId(null), 700);
        flashToast({ variant: "success", title: "Goal set — you’ve got this." });
      }
      setModal({ open: false, mode: "create", initial: null });
    };

    const handleRemoveConfirm = () => {
      const g = confirm.goal;
      setGoals(gs => gs.filter(x => x.id !== g.id));
      setConfirm({ open: false, goal: null });
      flashToast({ variant: "info", title: "Goal removed." });
    };

    /* THE celebratory moment — simulate a server-driven false→true completion of g3 (18→20 items) */
    const celebrateAnchor = useRef(null);
    const fireCelebration = () => {
      setGoals(gs => gs.map(g => g.id === "g3" ? { ...g, currentCount: g.targetCount } : g));
      setCelebrateId("g3");
      setAnnounce("Goal met! You set it, you crushed it. Practice DSA items is complete.");
      flashToast({ variant: "success", title: "Goal met! 🎉 You set it, you crushed it." });
      setTimeout(() => setCelebrateId(null), 2000);
    };

    return (
      <div className="appshell" style={{ position: "relative" }}>
        <Sidebar/>
        <Topbar/>
        <main className="appshell__main">
          <div aria-live="polite" className="sr-only">{announce}</div>

          <div className="goals">
            {/* HEADER */}
            <header className="gh">
              <div>
                <h1 className="gh__title">Your goals</h1>
                <p className="gh__sub">You set the pace.</p>
              </div>
              <Button variant="spark" leadingIcon={<Icon name="plus" size={16}/>} onClick={openCreate}>New goal</Button>
            </header>

            {/* STAT ROLLUP */}
            <div className="rollup">
              <div className="card-surface rollup-tile">
                <span className="rollup-tile__icon rollup-tile__icon--active"><Icon name="target" size={22}/></span>
                <div>
                  <div className="rollup-tile__num">{activeCount}</div>
                  <div className="rollup-tile__label">Active goals</div>
                </div>
              </div>
              <div className="card-surface rollup-tile">
                <span className="rollup-tile__icon rollup-tile__icon--due"><Icon name="calendar-clock" size={22}/></span>
                <div>
                  <div className="rollup-tile__num">{dueThisWeek}</div>
                  <div className="rollup-tile__label">Due this week</div>
                </div>
              </div>
              <div className="card-surface rollup-tile">
                <span className="rollup-tile__icon rollup-tile__icon--done"><Icon name="check-check" size={22}/></span>
                <div>
                  <div className="rollup-tile__num">{COMPLETED.length + (celebrateId ? 1 : 0)}</div>
                  <div className="rollup-tile__label">Completed</div>
                </div>
              </div>
            </div>

            {/* WEEK STRIP */}
            <div className="card-surface weekstrip">
              <div className="weekstrip__head">
                <span className="weekstrip__title">This week · tap a day to filter by due date</span>
                {filterDay != null && (
                  <Button variant="ghost" size="sm" trailingIcon={<Icon name="x" size={14}/>}
                    onClick={() => setFilterDay(null)}>Clear filter</Button>
                )}
              </div>
              <div className="weekstrip__rail" role="group" aria-label="Week of June 16">
                {WEEK.map(d => (
                  <button key={d.num}
                    className={"daycell" + (d.today ? " daycell--today" : "")}

              </span>
              <Button variant="spark" size="sm" leadingIcon={<Icon name="party-popper" size={14}/>}
                onClick={fireCelebration}>Simulate goal completion</Button>
            </div>

            {/* SPEC'D SECONDARY STATES */}
            <section className="states" aria-label="Additional states">
              <LoadingState/>
              <div className="state-grid">
                <EmptyGoalsState/>
                <EmptyHistoryState/>
              </div>
              <div className="state-grid">
                <ErrorState/>
                <PartialState/>
              </div>
              <SavingState/>
              <PermissionState/>
              <ReducedMotionState/>
            </section>
          </div>
        </main>

        {/* MODALS */}
        <GoalModal open={modal.open} mode={modal.mode} initial={modal.initial}
          onClose={() => setModal({ open: false, mode: "create", initial: null })}
          onSave={handleSave}/>
        <ConfirmRemove open={confirm.open} goal={confirm.goal}
          onClose={() => setConfirm({ open: false, goal: null })}
          onConfirm={handleRemoveConfirm}/>

        {/* CELEBRATION (borrowed) */}
        <BurstBanner active={!!celebrateId}/>
        <CelebrationBurst active={!!celebrateId} anchor={null}/>

        {/* TOAST */}
        {toast && (
          <div className="toast-stack" role="status" aria-live="polite">
            <Toast variant={toast.variant} title={toast.title} body={toast.body}/>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body>
</html>
