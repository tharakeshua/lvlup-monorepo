<!-- @dsCard group="Student" viewport="1280x820" name="Learning Content View" subtitle="Story-point viewer · ContentRenderer md+KaTeX · item nav" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Content View</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  /* card-local LAYOUT ONLY — never redefine tokens, never a hex literal */
  body { margin:0; background: var(--bg-canvas); color: var(--text-primary); font-family: var(--font-ui); }
  .shell { height: 820px; width: 1280px; overflow: hidden; position: relative; }
  .lc-main { display: flex; flex-direction: column; gap: var(--space-6); max-width: 1080px; margin: 0 auto; }
  .lc-header { display: flex; flex-direction: column; gap: var(--space-2); }
  .lc-h1 { font-family: var(--font-display); font-weight: var(--weight-semibold); font-size: var(--text-3xl); line-height: var(--leading-3xl); margin: 0; }
  .lc-sub { color: var(--text-secondary); font-size: var(--text-base); max-width: var(--reading-max); }
  .lc-headrow { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-6); }
  .lc-rail { display: flex; align-items: center; justify-content: space-between; gap: var(--space-4);
    background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
    padding: var(--space-3) var(--space-5); }
  .lc-rail__center { flex: 1; display: flex; justify-content: center; }
  .lc-nav { display: flex; flex-wrap: wrap; gap: var(--space-2); margin-bottom: var(--space-5); }
  .lc-numnode { width: 38px; height: 38px; border-radius: var(--radius-md); border: 1.5px solid var(--border-subtle);
    background: var(--bg-surface); display: grid; place-items: center; cursor: pointer; position: relative;
    font-family: var(--font-mono); font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-secondary);
    transition: border-color var(--dur-fast) var(--ease-standard), box-shadow var(--dur-fast) var(--ease-standard); }
  .lc-numnode:hover { border-color: var(--border-strong); }
  .lc-numnode[data-current="true"] { box-shadow: var(--ring-focus); border-color: var(--border-focus); }
  .lc-numnode[data-status="mastered"] { border-color: var(--mastery-mastered); color: var(--mastery-mastered); }
  .lc-numnode[data-status="partial"] { border-color: var(--status-warning); color: var(--status-warning); }
  .lc-numnode[data-status="incorrect"] { border-color: var(--status-error); color: var(--status-error); }
  .lc-numnode__dot { position: absolute; top: -5px; right: -5px; width: 14px; height: 14px; border-radius: 50%;
    display: grid; place-items: center; background: var(--bg-surface); }
  .lc-numnode__dot svg { width: 11px; height: 11px; stroke-width: 2.5; }
  .lc-item-meta { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-4); flex-wrap: wrap; }
  .lc-eyebrow { font-family: var(--font-mono); font-size: var(--text-2xs); letter-spacing: .06em; text-transform: uppercase;
    color: var(--text-muted); }
  .lc-actions { display: flex; align-items: center; gap: var(--space-3); margin-top: var(--space-5); flex-wrap: wrap; }
  .lc-itemfoot { display: flex; align-items: center; justify-content: space-between; margin-top: var(--space-5); }
  .lc-feedback { margin-top: var(--space-5); border-radius: var(--radius-lg); border: 1px solid var(--status-success);
    background: var(--status-success-subtle); padding: var(--space-4) var(--space-5); }
  .lc-feedback--warn { border-color: var(--status-warning); background: var(--status-warning-subtle); }
  .lc-feedback__head { display: flex; align-items: center; gap: var(--space-2); font-weight: var(--weight-semibold);
    color: var(--text-primary); margin-bottom: var(--space-2); }
  .lc-feedback__head svg { width: 18px; height: 18px; stroke-width: 2; }
  .lc-grow-head { font-size: var(--text-xs); font-weight: var(--weight-semibold); text-transform: uppercase;
    letter-spacing: .05em; color: var(--text-muted); margin: var(--space-4) 0 var(--space-1); }
  .lc-section-meta { display: flex; align-items: center; gap: var(--space-3); }
  .lc-states { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5); }
  .lc-state-tile { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
    padding: var(--space-5); }
  .lc-statelabel { font-family: var(--font-mono); font-size: var(--text-2xs); letter-spacing: .06em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: var(--space-3); display: block; }
  .lc-xpwrap { width: 240px; flex: 0 0 auto; }
  .lc-tutorbody { display: flex; flex-direction: column; gap: var(--space-3); }
  .lc-imgrow { display: flex; gap: var(--space-3); margin: var(--space-4) 0; }
  .lc-thumb { width: 120px; height: 80px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle);
    background: var(--bg-surface-sunken); display: grid; place-items: center; cursor: pointer; color: var(--text-muted); }
  .lc-thumb:hover { border-color: var(--border-strong); }
  .lc-lightbox-img { width: 480px; height: 320px; border-radius: var(--radius-md); background: var(--bg-surface-sunken);
    display: grid; place-items: center; color: var(--text-muted); }
  .lc-attempt { display: flex; align-items: center; justify-content: space-between; padding: var(--space-2) 0;
    border-bottom: 1px solid var(--border-subtle); font-size: var(--text-sm); }
  .lc-attempt:last-child { border-bottom: 0; }
  .lc-muted { color: var(--text-muted); }
  .lc-eyebrow-icon { display: inline-flex; align-items: center; gap: var(--space-1); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const LU = window.LvlupV0DesignSystem_5d0725;
  const {
    Button, IconButton, Icon, Field, Textarea, Radio,
    Card, Panel, Accordion, Drawer, Modal,
    Breadcrumb, NavItem, Badge, Chip, ProgressRing, Skeleton, EmptyState, Alert,
    StoryPointTrack, ContentRenderer, QuestionCard, Option,
    ConfidenceBadge, GradePill, RubricBreakdown, XPMeter, AnswerKeyLock, TutorChatBubble
  } = LU;
  const { useState } = React;

  /* ---- realistic data ---------------------------------------------------- */
  const NODES = [
    { state: "mastered",   label: "Big-O" },
    { state: "mastered",   label: "Arrays" },
    { state: "in-progress",label: "Hashing" },
    { state: "not-started",label: "Trees" },
    { state: "not-started",label: "Graphs" }
  ];

  // items in the open "Core ideas" section
  const ITEMS = [
    { status: "mastered" },   // material read
    { status: "mastered" },   // q correct
    { status: "partial"  },   // q partial
    { status: "current"  },   // current question (unattempted)
    { status: "incorrect"},   // q to revisit
    { status: "none"     },
    { status: "none"     }
  ];

  function statusMeta(s){
    if (s === "mastered")  return { icon: "check",          label: "complete" };
    if (s === "partial")   return { icon: "minus-circle",   label: "partial"  };
    if (s === "incorrect") return { icon: "rotate-ccw",     label: "revisit"  };
    return null;
  }

  function NumNode({ n, status, current, onClick }){
    const m = statusMeta(status);
    const label = "Item " + n + (m ? ", " + m.label : ", not started");
    return (
      <button className="lc-numnode" data-status={status} data-current={current}
              aria-label={label} aria-current={current ? "true" : undefined} onClick={onClick}>
        {n}
        {m && <span className="lc-numnode__dot"><Icon name={m.icon} size={11}/></span>}
      </button>
    );
  }

  /* ---- the live, primary section content --------------------------------- */
  function CoreIdeasSection({ openTutor, openLightbox }){
    const [current, setCurrent] = useState(3);     // 0-based → "Item 4 of 7"
    const [choice, setChoice] = useState(null);
    const [submitted, setSubmitted] = useState(false);
    const [aiLoading] = useState(false);
    const [showHistory, setShowHistory] = useState(false);

    const onSubmit = () => { if (choice != null) setSubmitted(true); };
    const tryAgain = () => { setSubmitted(false); setChoice(null); };

    return (
      <div>
        {/* numbered item navigator (roving group) */}
        <div className="lc-nav" role="group" aria-label="Items in Core ideas">
          {ITEMS.map((it, i) => (
            <NumNode key={i} n={i+1}
              status={i === current ? (submitted ? "mastered" : "current") : it.status}
              current={i === current}
              onClick={() => { setCurrent(i); }} />
          ))}
        </div>

        <Card>
          <div style={{padding:"var(--space-5)"}}>
            <div className="lc-item-meta">
              <span className="lc-eyebrow lc-eyebrow-icon"><Icon name="circle-help" size={13}/> Item 4 of 7</span>
              <Chip>Hashing</Chip>
              <Chip>Difficulty: medium</Chip>
            </div>

            <QuestionCard type="Single choice" points={2}
              prompt="A hash table stores n keys in m buckets with uniform hashing. What is the expected number of keys per bucket (the load factor α)?">
              <ContentRenderer math>
                <p style={{margin:"0 0 var(--space-4)"}}>Recall the load factor definition&nbsp;
                  <code>α = n / m</code>. Pick the expression for the average chain length under simple uniform hashing.</p>
              </ContentRenderer>

              {/* attachment thumbnail → lightbox */}
              <div className="lc-imgrow">
                <div className="lc-thumb" onClick={openLightbox} role="button" aria-label="Open diagram">
                  <Icon name="image" size={22}/>
                </div>
                <span className="lc-muted" style={{alignSelf:"center",fontSize:"var(--text-xs)"}}>
                  Tap the diagram to enlarge.
                </span>
              </div>

              {/* answer input — radio group; NO correctness shown before submit */}
              <div role="radiogroup" aria-label="Answer choices"
                   style={{display:"flex",flexDirection:"column",gap:"var(--space-2)"}}>
                {[
                  { k:"a", t:"α = m / n", marker:"A" },
                  { k:"b", t:"α = n / m", marker:"B" },
                  { k:"c", t:"α = n · m", marker:"C" },
                  { k:"d", t:"α = n − m", marker:"D" }
                ].map(o => (
                  <Option key={o.k} marker={o.marker}
                    selected={choice === o.k}
                    state={submitted ? (o.k === "b" ? "correct" : (choice === o.k ? "incorrect" : undefined)) : undefined}
                    onClick={() => !submitted && setChoice(o.k)}>
                    {o.t}
                  </Option>
                ))}
              </div>
            </QuestionCard>

            {/* feedback only AFTER submit — server-returned, never the raw key */}
            {submitted && (
              <div className={"lc-feedback" + (choice === "b" ? "" : " lc-feedback--warn")} role="status" aria-live="polite">
                <div className="lc-feedback__head">
                  {choice === "b"
                    ? <><Icon name="check-circle" size={18} style={{color:"var(--status-success)"}}/> Nice — that's right.</>
                    : <><Icon name="alert-triangle" size={18} style={{color:"var(--status-warning)"}}/> You're close. Let's look at this part again.</>}
                </div>
                <ContentRenderer math>
                  <p style={{margin:0}}>The load factor <code>α = n / m</code> is exactly the expected chain
                  length under simple uniform hashing — each of the <code>n</code> keys is equally likely to land
                  in any of the <code>m</code> buckets.</p>
                </ContentRenderer>
              </div>
            )}

            {/* actions */}
            <div className="lc-actions">
              {!submitted
                ? <Button variant="spark" leadingIcon={<Icon name="send" size={16}/>}
                          onClick={onSubmit} disabled={choice == null} loading={aiLoading}>
                    {aiLoading ? "Reading your answer…" : "Submit answer"}
                  </Button>
                : <Button variant="secondary" leadingIcon={<Icon name="rotate-ccw" size={16}/>} onClick={tryAgain}>
                    Try again
                  </Button>}
              <Button variant="ghost" leadingIcon={<Icon name="sparkles" size={16}/>} onClick={openTutor}>
                Ask the tutor
              </Button>
              <Button variant="ghost" leadingIcon={<Icon name="history" size={16}/>}
                      onClick={() => setShowHistory(v => !v)}>
                History
              </Button>
            </div>

            {/* attempt history (expandable) */}
            {showHistory && (
              <div style={{marginTop:"var(--space-4)",borderTop:"1px solid var(--border-subtle)",paddingTop:"var(--space-3)"}}>
                <div className="lc-attempt"><span className="lc-muted">Attempt 1 · 2 days ago</span>
                  <span style={{display:"inline-flex",alignItems:"center",gap:"var(--space-2)"}}>
                    <Icon name="minus-circle" size={14} style={{color:"var(--status-warning)"}}/> Partial</span></div>
                <div className="lc-attempt lc-muted">No attempts yet today — give it a try when you're ready.</div>
              </div>
            )}
          </div>
        </Card>

        {/* per-item prev/next */}
        <div className="lc-itemfoot">
          <Button variant="ghost" size="sm" leadingIcon={<Icon name="chevron-left" size={16}/>}
                  disabled={current === 0} onClick={() => setCurrent(c => Math.max(0, c-1))}>Previous</Button>
          <Button variant="ghost" size="sm" trailingIcon={<Icon name="chevron-right" size={16}/>}
                  disabled={current === ITEMS.length-1} onClick={() => setCurrent(c => Math.min(ITEMS.length-1, c+1))}>Next</Button>
        </div>
      </div>
    );
  }

  /* ---- a material section (ContentRenderer) ------------------------------ */
  function MaterialSectionBody(){
    return (
      <div>
        <div className="lc-nav" role="group" aria-label="Items in Foundations">
          <NumNode n={1} status="mastered" current={true} />
          <NumNode n={2} status="mastered" />
          <NumNode n={3} status="none" />
        </div>
        <Card>
          <div style={{padding:"var(--space-5)"}}>
            <div className="lc-item-meta">
              <span className="lc-eyebrow lc-eyebrow-icon"><Icon name="book-open" size={13}/> Reading · Item 1 of 3</span>
              <Chip active>Material</Chip>
            </div>
            <ContentRenderer math>
              <h3 style={{marginTop:0}}>Why hashing is fast</h3>
              <p>A hash function maps a key to a bucket index in <code>O(1)</code> time. With a good function and a
              load factor near <code>α = 0.75</code>, lookups stay close to constant time:</p>
              <blockquote>Expected probes for a successful search ≈ <code>1 + α/2</code>.</blockquote>
              <p>Compare that to scanning an array, which costs <code>O(n)</code> in the worst case.</p>
            </ContentRenderer>
            <div className="lc-actions">
              <Button variant="spark" leadingIcon={<Icon name="check" size={16}/>}>Mark as read</Button>
            </div>
          </div>
        </Card>
      </div>
    );
  }

  /* ---- secondary state tiles --------------------------------------------- */
  function StateTiles(){
    return (
      <div className="lc-states">
        {/* Loading */}
        <div className="lc-state-tile">
          <span className="lc-statelabel">State: loading (skeleton)</span>
          <div style={{display:"flex",gap:"var(--space-2)",marginBottom:"var(--space-4)"}}>
            {[1,2,3,4].map(i => <Skeleton key={i} width="38px" height="38px"/>)}
          </div>
          <Skeleton height="96px" style={{borderRadius:"var(--radius-lg)",marginBottom:"var(--space-3)"}}/>
          <Skeleton width="70%"/>
        </div>

        {/* Empty */}
        <div className="lc-state-tile">
          <span className="lc-statelabel">State: empty (no items)</span>
          <EmptyState icon="inbox" title="Nothing here yet"
            body="This lesson doesn't have any content yet. We'll let you know when it's ready."
            action={<Button variant="secondary" size="sm">Back to Data Structures</Button>} />
        </div>

        {/* Error */}
        <div className="lc-state-tile">
          <span className="lc-statelabel">State: error (items failed to load)</span>
          <Alert variant="error" title="We couldn't load this lesson">
            Something hiccuped on our end. Give it another go.
          </Alert>
          <div style={{marginTop:"var(--space-3)"}}>
            <Button variant="secondary" size="sm" leadingIcon={<Icon name="refresh-cw" size={15}/>}>Retry</Button>
          </div>
        </div>

        {/* Partial: AI eval in flight */}
        <div className="lc-state-tile">
          <span className="lc-statelabel">State: partial (AI evaluation in flight)</span>
          <p className="lc-muted" style={{fontSize:"var(--text-sm)",marginTop:0}}>
            One subjective answer is being read by the tutor; the rest of the lesson stays interactive.
          </p>
          <Button variant="spark" loading leadingIcon={<Icon name="loader" size={16}/>}>Reading your answer…</Button>
        </div>

        {/* Locked answer key */}
        <div className="lc-state-tile">
          <span className="lc-statelabel">State: locked (answer key sealed)</span>
          <AnswerKeyLock title="Answers stay sealed.">
            You'll see feedback the moment you submit — the key is server-only and never sent to your device.
          </AnswerKeyLock>
        </div>

        {/* Incorrect feedback variant */}
        <div className="lc-state-tile">
          <span className="lc-statelabel">State: feedback — not quite yet</span>
          <div className="lc-feedback lc-feedback--warn" role="status">
            <div className="lc-feedback__head" style={{color:"var(--status-error)"}}>
              <Icon name="rotate-ccw" size={18}/> Not quite yet — let's work through it.
            </div>
            <p style={{margin:0,fontSize:"var(--text-sm)"}}>
              Re-check the definition of α, then try again. The tutor can walk you through it.
            </p>
            <div style={{display:"flex",gap:"var(--space-2)",marginTop:"var(--space-3)"}}>
              <Button variant="secondary" size="sm">Try again</Button>
              <Button variant="ghost" size="sm">Ask the tutor</Button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ---- AI feedback panel (for subjective items) -------------------------- */
  function AiFeedbackPanel(){
    return (
      <Panel title="Your answer was reviewed"
        actions={<div style={{display:"flex",gap:"var(--space-2)",alignItems:"center"}}>
          <ConfidenceBadge level="high"/><GradePill grade="B" /></div>}>
        <p style={{marginTop:0}}>You explained the load factor clearly and tied it to chaining. Tighten the worst-case
          discussion and you're there.</p>
        <div className="lc-grow-head">What you did well</div>
        <p style={{margin:0}}>Correctly defined α = n/m and linked it to expected chain length.</p>
        <div className="lc-grow-head">Where to grow</div>
        <p style={{margin:0}}>Mention what happens when α grows large and resizing kicks in.</p>
        <div className="lc-grow-head">Worth revisiting</div>
        <p style={{margin:"0 0 var(--space-4)"}}>Open addressing vs. separate chaining trade-offs.</p>
        <RubricBreakdown criteria={[
          { label:"Correct definition", desc:"States α = n/m", score:2, max:2 },
          { label:"Reasoning",          desc:"Links to chain length", score:2, max:2 },
          { label:"Edge cases",         desc:"Discusses resizing", score:1, max:2 }
        ]}/>
      </Panel>
    );
  }

  function Screen(){
    const [tutorOpen, setTutorOpen] = useState(false);
    const [lightboxOpen, setLightboxOpen] = useState(false);

    return (
      <div className="shell">
        <div className="appshell">
          {/* Sidebar */}
          <aside className="appshell__sidebar">
            <div className="sidebar__brand">
              <span className="sidebar__brand-mark">L</span>
              <span className="sidebar__brand-name">LevelUp</span>
            </div>
            <nav className="sidebar__nav">
              <NavItem icon="layout-dashboard" href="#">Dashboard</NavItem>
              <NavItem icon="library" href="#" active>Spaces</NavItem>
              <NavItem icon="target" href="#">Practice</NavItem>
              <NavItem icon="trophy" href="#" badge={<Badge variant="spark" dot/>}>Achievements</NavItem>
              <div className="sidebar__section-label">Subjects</div>
              <NavItem icon="binary" href="#">Data Structures</NavItem>
              <NavItem icon="network" href="#">System Design</NavItem>
              <NavItem icon="messages-square" href="#">Behavioral</NavItem>
            </nav>
          </aside>

          {/* Topbar */}
          <header className="appshell__topbar">
            <div className="topbar__spacer"></div>
            <Chip><span className="lc-eyebrow-icon"><Icon name="command" size={13}/> K</span></Chip>
            <IconButton icon={<Icon name="bell" size={18}/>} label="Notifications" />
            <span style={{display:"inline-flex",alignItems:"center",gap:"var(--space-2)",fontSize:"var(--text-sm)",fontWeight:"var(--weight-medium)"}}>
              <span className="avatar avatar--sm">AR</span> Aanya
            </span>
          </header>

          {/* Main */}
          <main className="appshell__main">
            <div className="lc-main">
              <Breadcrumb items={[
                { label:"Spaces", href:"#" },
                { label:"Data Structures", href:"#" },
                { label:"Hashing & hash tables" }
              ]}/>

              {/* header + XP hint */}
              <div className="lc-headrow">
                <div className="lc-header">
                  <h1 className="lc-h1">Hashing &amp; hash tables</h1>
                  <p className="lc-sub">Welcome back, Aanya. Let's keep the momentum — work through each piece at
                    your own pace. Every attempt counts, and mistakes are just the next step.</p>
                </div>
                <div className="lc-xpwrap">
                  <XPMeter level={6} xp={340} next={500} />
                  <div className="lc-eyebrow" style={{marginTop:"var(--space-2)",textAlign:"right"}}>
                    +20 XP per item · finish the lesson for a bonus
                  </div>
                </div>
              </div>

              {/* StoryPointTrack rail with prev/next */}
              <div className="lc-rail">
                <Button variant="ghost" size="sm" leadingIcon={<Icon name="chevron-left" size={16}/>}>Prev SP</Button>
                <div className="lc-rail__center"><StoryPointTrack nodes={NODES}/></div>
                <span className="lc-eyebrow" style={{whiteSpace:"nowrap"}}>3 / 5</span>
                <Button variant="ghost" size="sm" trailingIcon={<Icon name="chevron-right" size={16}/>}>Next SP</Button>
              </div>

              {/* Sections — accordion. First section open by default with the live navigator */}
              <Accordion defaultOpen={0} items={[
                {
                  title: (
                    <span className="lc-section-meta">
                      <ProgressRing value={71} size={28} label="" />
                      <span>Core ideas</span>
                      <Badge variant="success" icon={<Icon name="circle-dot" size={12}/>}>5/7 done</Badge>
                    </span>
                  ),
                  content: <CoreIdeasSection openTutor={() => setTutorOpen(true)} openLightbox={() => setLightboxOpen(true)} />
                },
                {
                  title: (
                    <span className="lc-section-meta">
                      <ProgressRing value={67} size={28} label="" />
                      <span>Foundations</span>
                      <Badge variant="success" icon={<Icon name="circle-dot" size={12}/>}>2/3 done</Badge>
                    </span>
                  ),
                  content: <MaterialSectionBody />
                },
                {
                  title: (
                    <span className="lc-section-meta">
                      <ProgressRing value={100} size={28} label={<Icon name="check" size={13}/>} />
                      <span>Collision handling</span>
                      <Badge variant="success" icon={<Icon name="check" size={12}/>}>All done</Badge>
                    </span>
                  ),
                  content: <AiFeedbackPanel />
                },
                {
                  title: (
                    <span className="lc-section-meta">
                      <ProgressRing value={0} size={28} label="" />
                      <span>Other items</span>
                      <Badge icon={<Icon name="circle" size={12}/>}>0/2 done</Badge>
                    </span>
                  ),
                  content: <p className="lc-muted" style={{margin:0,fontSize:"var(--text-sm)"}}>
                    No items in this section yet — check back soon.</p>
                }
              ]}/>

              {/* states gallery */}
              <div>
                <div className="lc-statelabel" style={{marginBottom:"var(--space-3)"}}>Other lesson states (for review)</div>
                <StateTiles />
              </div>

              {/* footer SP rail */}
              <div className="lc-rail">
                <Button variant="secondary" leadingIcon={<Icon name="chevron-left" size={16}/>}>Previous story point</Button>
                <div className="lc-rail__center"></div>
                <Button variant="primary" trailingIcon={<Icon name="chevron-right" size={16}/>}>Next story point</Button>
              </div>
            </div>
          </main>
        </div>

        {/* Tutor Drawer (right) */}
        <Drawer open={tutorOpen} onClose={() => setTutorOpen(false)} title="Ask the tutor">
          <div className="lc-tutorbody">
            <span className="lc-eyebrow lc-eyebrow-icon"><Icon name="anchor" size={13}/> Keyed to: Item 4 — load factor</span>
            <TutorChatBubble from="tutor" author="Tutor">
              Hi Aanya! The load factor compares how many keys you have to how many buckets. Want a hint on which symbol is on top?
            </TutorChatBubble>
            <TutorChatBubble from="user" author="You">
              Is it the number of keys divided by buckets?
            </TutorChatBubble>
            <TutorChatBubble from="tutor" author="Tutor">
              Exactly the right instinct — keys on top, buckets on the bottom. Now match that to one of the options.
            </TutorChatBubble>
            <Field label="Your message">
              <Textarea rows={2} placeholder="Ask anything about this item…" />
            </Field>
            <Button variant="spark" block leadingIcon={<Icon name="send" size={16}/>}>Send</Button>
          </div>
        </Drawer>

        {/* Image lightbox Modal */}
        <Modal open={lightboxOpen} onClose={() => setLightboxOpen(false)} title="Hash table with chaining"
          footer={<Button variant="secondary" onClick={() => setLightboxOpen(false)}>Close</Button>}>
          <div className="lc-lightbox-img"><Icon name="image" size={40}/></div>
          <p className="lc-muted" style={{fontSize:"var(--text-sm)",marginBottom:0}}>
            Each bucket points to a linked list of colliding keys. Esc to close.
          </p>
        </Modal>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body>
</html>
