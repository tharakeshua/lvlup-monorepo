<!-- @dsCard group="Student" viewport="1280x860" name="Progress & Analytics" subtitle="Subject mastery · trends · at-risk with next steps" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress & Analytics</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  /* card-local LAYOUT ONLY — never redefine tokens, never a hex literal */
  body { margin:0; background: var(--bg-canvas); color: var(--text-primary); font-family: var(--font-ui); }
  html, body, #root, .appshell { height: 100%; }

  .page { display:flex; flex-direction:column; gap: var(--space-6); max-width: 1200px; }

  .ph__title { font-family: var(--font-display); font-size: var(--text-4xl); line-height: var(--leading-4xl); font-weight: var(--weight-medium); margin:0; letter-spacing: var(--tracking-display); }
  .ph__updated { font-size: var(--text-xs); color: var(--text-muted); font-family: var(--font-mono); display:inline-flex; align-items:center; gap: var(--space-1); }
  .ph__sub { color: var(--text-secondary); font-size: var(--text-base); margin-top: var(--space-2); }

  /* hero */
  .hero { display:grid; grid-template-columns: 280px 1fr; gap: var(--space-6); align-items:stretch; }
  .hero__ring { display:flex; flex-direction:column; align-items:center; justify-content:center; gap: var(--space-3); text-align:center; }
  .hero__ring-cap { font-size: var(--text-xs); color: var(--text-muted); max-width: 22ch; }
  .hero__ring-label { font-family: var(--font-display); font-size: var(--text-lg); font-weight: var(--weight-semibold); }
  .kpi-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4); }
  .kpi { background: var(--bg-surface); border:1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--shadow-e1); padding: var(--space-4) var(--space-5); display:flex; flex-direction:column; gap: var(--space-2); }
  .kpi__top { display:flex; align-items:center; gap: var(--space-2); color: var(--text-secondary); }
  .kpi__icon { display:grid; place-items:center; width:28px; height:28px; border-radius: var(--radius-md); background: var(--brand-subtle); color: var(--brand-primary); flex:0 0 auto; }
  .kpi__icon--spark { background: var(--spark-subtle); color: var(--spark); }
  .kpi__val { font-family: var(--font-mono); font-size: var(--text-3xl); line-height:1; font-variant-numeric: tabular-nums; color: var(--text-primary); }

  /* charts */
  .charts { display:grid; grid-template-columns: 1fr 1fr; gap: var(--space-6); }
  .chart-card { background: var(--bg-surface); border:1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--shadow-e1); padding: var(--space-5); display:flex; flex-direction:column; gap: var(--space-4); }
  .chart-card__head { display:flex; align-items:flex-start; justify-content:space-between; gap: var(--space-3); }
  .chart-card__title { font-size: var(--text-base); font-weight: var(--weight-semibold); }
  .chart-card__cap { font-size: var(--text-xs); margin-top:2px; display:inline-flex; align-items:center; gap: var(--space-1); }
  .chart-card__cap--up { color: var(--status-success); }
  .chart-card__cap--flat { color: var(--text-muted); }
  .seg { display:inline-flex; background: var(--bg-inset); border-radius: var(--radius-pill); padding:2px; gap:0; }
  .seg__btn { border:none; background:transparent; font-size: var(--text-xs); font-weight: var(--weight-medium); color: var(--text-secondary); padding: var(--space-1) var(--space-3); border-radius: var(--radius-pill); min-height: 28px; cursor:pointer; transition: background-color var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard); }
  .seg__btn[aria-pressed="true"] { background: var(--bg-surface); color: var(--text-primary); box-shadow: var(--shadow-e1); font-weight: var(--weight-semibold); }

  .bars { display:flex; align-items:flex-end; gap: var(--space-2); height:150px; padding: var(--space-3); background: var(--bg-surface-sunken); border-radius: var(--radius-md); }
  .bars__col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap: var(--space-2); height:100%; }
  .bars__bar { width:100%; max-width:28px; border-radius: var(--radius-sm) var(--radius-sm) 0 0; background: var(--brand-primary); transition: height var(--dur-slow) var(--ease-entrance); }
  .bars__bar--spark { background: var(--spark); }
  .bars__lbl { font-size: var(--text-2xs); color: var(--text-muted); font-family: var(--font-mono); }

  /* mastery grid */
  .mgrid { background: var(--bg-surface); border:1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--shadow-e1); overflow:hidden; }
  .mgrid__head, .mgrid__row { display:grid; grid-template-columns: 1.4fr 1.6fr 1.6fr 1fr; gap: var(--space-4); align-items:center; padding: var(--space-3) var(--space-5); }
  .mgrid__head { background: var(--bg-surface-sunken); font-size: var(--text-2xs); font-weight: var(--weight-semibold); letter-spacing:0.06em; text-transform:uppercase; color: var(--text-muted); border-bottom:1px solid var(--border-subtle); }
  .mgrid__row { border-top:1px solid var(--border-subtle); cursor:pointer; transition: box-shadow var(--dur-fast) var(--ease-standard), background-color var(--dur-fast) var(--ease-standard); }
  .mgrid__row:first-of-type { border-top:none; }
  .mgrid__row:hover { background: var(--bg-surface-sunken); box-shadow: var(--shadow-e1); }
  .mgrid__subj { font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--text-primary); }
  .mbar { display:flex; align-items:center; gap: var(--space-3); }
  .mbar__track { flex:1; height:8px; border-radius: var(--radius-pill); background: var(--bg-inset); overflow:hidden; }
  .mbar__fill { height:100%; border-radius: var(--radius-pill); background: var(--brand-primary); }
  .mbar__fill--spark { background: var(--spark); }
  .mbar__num { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-secondary); min-width:34px; text-align:right; }
  .mdot { display:inline-flex; align-items:center; gap: var(--space-2); font-size: var(--text-xs); font-weight: var(--weight-medium); }
  .mdot__o { width:12px; height:12px; border-radius:50%; flex:0 0 auto; }
  .mdot--mastered .mdot__o { background: var(--mastery-mastered); }
  .mdot--progress .mdot__o { background: var(--mastery-in-progress); }
  .mdot--notstarted .mdot__o { background: var(--mastery-not-started); border:1px solid var(--border-strong); }

  .two { display:grid; grid-template-columns: 1fr 1fr; gap: var(--space-6); align-items:stretch; }
  .chips { display:flex; flex-wrap:wrap; gap: var(--space-2); }
  .chip-block { display:flex; flex-direction:column; gap: var(--space-3); }
  .chip-block__label { display:flex; align-items:center; gap: var(--space-2); font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--text-secondary); }
  .next-stack { display:flex; flex-direction:column; gap: var(--space-3); }
  .insight-cta { margin-top: var(--space-2); }

  .insights-list { display:grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }

  /* exam/space rows */
  .ring-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4); }
  .ring-tile { background: var(--bg-surface); border:1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--shadow-e1); padding: var(--space-4); display:flex; flex-direction:column; align-items:center; gap: var(--space-2); text-align:center; }
  .ring-tile__name { font-size: var(--text-sm); font-weight: var(--weight-semibold); }
  .ring-tile__meta { font-size: var(--text-xs); color: var(--text-muted); }

  .space-row { display:grid; grid-template-columns: 1.6fr 130px 1.8fr auto; gap: var(--space-4); align-items:center; padding: var(--space-4) var(--space-5); border-radius: var(--radius-md); border:1px solid var(--border-subtle); background: var(--bg-surface); cursor:pointer; text-decoration:none; color:inherit; transition: box-shadow var(--dur-fast) var(--ease-standard), transform var(--dur-fast) var(--ease-standard); }
  .space-row:hover { box-shadow: var(--shadow-e2); transform: translateY(-1px); }
  .space-row__title { font-size: var(--text-sm); font-weight: var(--weight-semibold); }
  .space-row__meta { font-size: var(--text-xs); color: var(--text-muted); font-family: var(--font-mono); }
  .space-row__chev { color: var(--text-muted); display:inline-flex; justify-self:end; transition: transform var(--dur-fast) var(--ease-standard); }
  .space-row:hover .space-row__chev { transform: translateX(3px); color: var(--text-secondary); }
  .rows-stack { display:flex; flex-direction:column; gap: var(--space-3); }

  .kpi-strip3 { display:grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4); }

  /* table cells */
  .tbl-exam { font-weight: var(--weight-semibold); font-size: var(--text-sm); }
  .tbl-sub { font-size: var(--text-xs); color: var(--text-muted); }
  .review-link { display:inline-flex; align-items:center; gap: var(--space-1); color: var(--brand-primary); font-weight: var(--weight-semibold); font-size: var(--text-sm); }

  /* state preview bands */
  .eyebrow-state { font-family: var(--font-mono); font-size:11px; color: var(--text-muted); margin-bottom: var(--space-3); display:flex; align-items:center; gap: var(--space-2); }
  .state-band { border:1px dashed var(--border-strong); border-radius: var(--radius-lg); padding: var(--space-4); background: var(--bg-surface); }
  .state-grid { display:grid; grid-template-columns:1fr 1fr; gap: var(--space-6); }
  .skel-card { background: var(--bg-surface); border:1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: var(--space-4) var(--space-5); display:flex; flex-direction:column; gap: var(--space-3); }

  .divider { height:1px; background: var(--border-subtle); border:none; margin: var(--space-2) 0; }
  .sr-table { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

  @media (prefers-reduced-motion: reduce) {
    .bars__bar, .space-row, .space-row__chev, .mgrid__row, .seg__btn { transition:none !important; }
    .countup { animation:none !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const LU = window.LvlupV0DesignSystem_5d0725;
  const {
    Button, IconButton, Icon, Input, Card, Section, Panel, Tabs, Avatar, Badge, Chip,
    ProgressRing, ProgressBar, DataTable, Timeline, Stat, GradePill, SubmissionCard,
    StreakFlame, AtRiskBadge, InsightCard, EmptyState, Skeleton, Alert, Tooltip,
    CommandPalette, NavItem
  } = LU;

  const { useState, useEffect, useRef } = React;
  const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ---- CountUp (mount only, reduced-motion safe) ---- */
  function CountUp({ end, suffix }) {
    const [val, setVal] = useState(reduceMotion ? end : 0);
    useEffect(() => {
      if (reduceMotion) return;
      let raf, start; const dur = 700;
      const step = (t) => {
        if (start == null) start = t;
        const p = Math.min(1, (t - start) / dur);
        const eased = 1 - Math.pow(1 - p, 3);
        setVal(end * eased);
        if (p < 1) raf = requestAnimationFrame(step); else setVal(end);
      };
      raf = requestAnimationFrame(step);
      return () => cancelAnimationFrame(raf);
    }, [end]);
    return <span className="countup">{Math.round(val)}{suffix || ""}</span>;
  }

  function KpiCard({ icon, spark, label, value, suffix, sub, ariaText }) {
    return (
      <div className="kpi" role="group" aria-label={ariaText}>
        <div className="kpi__top">
          <span className={"kpi__icon" + (spark ? " kpi__icon--spark" : "")}><Icon name={icon} size={16}/></span>
          <span style={{ fontSize:"var(--text-sm)", fontWeight:"var(--weight-medium)" }}>{label}</span>
        </div>
        <div className="kpi__val" aria-hidden="true"><CountUp end={value} suffix={suffix}/></div>
        {sub && <div className="u-caption" style={{ color:"var(--text-muted)" }}>{sub}</div>}
      </div>
    );
  }

  /* ---- SimpleBarChart (composed; tokens only) ---- */
  const TREND_DATA = {
    accuracy: {
      "4w":  { labels:["W1","W2","W3","W4"], values:[66,71,69,76], summary:"Accuracy over the last 4 weeks, trending up from 66 to 76 percent." },
      "12w": { labels:["W1","W3","W5","W7","W9","W11","W12"], values:[61,64,63,68,70,72,76], summary:"Accuracy over the last 12 weeks, trending up from 61 to 76 percent." },
      "all": { labels:["Jan","Feb","Mar","Apr","May","Jun"], values:[54,58,62,66,71,76], summary:"Accuracy across all time, trending up from 54 to 76 percent." },
    },
    completion: {
      "4w":  { labels:["W1","W2","W3","W4"], values:[40,44,46,52], summary:"Completion over the last 4 weeks, trending up from 40 to 52 percent." },
      "12w": { labels:["W1","W3","W5","W7","W9","W11","W12"], values:[33,36,39,42,47,50,52], summary:"Completion over the last 12 weeks, trending up from 33 to 52 percent." },
      "all": { labels:["Jan","Feb","Mar","Apr","May","Jun"], values:[18,27,35,41,47,52], summary:"Completion across all time, trending up from 18 to 52 percent." },
    },
  };

  function RangeToggle({ value, onChange, idBase }) {
    const opts = [["4w","4w"],["12w","12w"],["all","All"]];
    return (
      <div className="seg" role="group" aria-label="Trend range">
        {opts.map(([v,l]) => (
          <button key={v} className="seg__btn" aria-pressed={value===v}
            onClick={() => onChange(v)}>{l}</button>
        ))}
      </div>
    );
  }

  function SimpleBarChart({ series, spark }) {
    const max = Math.max(...series.values, 1);
    return (
      <>
        <div className="bars" role="img" aria-label={series.summary}>
          {series.values.map((v, i) => (
            <div className="bars__col" key={series.labels[i] + i}>
              <div className={"bars__bar" + (spark ? " bars__bar--spark" : "")}
                style={{ height: reduceMotion ? (v/max*100)+"%" : (v/max*100)+"%" }}
                title={series.labels[i] + ": " + v + "%"}/>
              <span className="bars__lbl">{series.labels[i]}</span>
            </div>
          ))}
        </div>
        {/* off-screen data table for screen readers */}
        <table className="sr-table">
          <caption>{series.summary}</caption>
          <thead><tr><th>Period</th><th>Percent</th></tr></thead>
          <tbody>{series.values.map((v,i)=>(<tr key={i}><td>{series.labels[i]}</td><td>{v}%</td></tr>))}</tbody>
        </table>
      </>
    );
  }

  function TrendCard({ title, metric, spark }) {
    const [range, setRange] = useState("12w");
    const series = TREND_DATA[metric][range];
    const first = series.values[0], last = series.values[series.values.length-1];
    const delta = last - first;
    return (
      <div className="chart-card">
        <div className="chart-card__head">
          <div>
            <div className="chart-card__title">{title}</div>
            <div className={"chart-card__cap " + (delta>0 ? "chart-card__cap--up" : "chart-card__cap--flat")}>
              {delta>0
                ? <><Icon name="trending-up" size={13}/> Up {delta} pts — nice ↗</>
                : <><Icon name="minus" size={13}/> Holding steady</>}
            </div>
          </div>
          <RangeToggle value={range} onChange={setRange} idBase={metric}/>
        </div>
        <SimpleBarChart series={series} spark={spark}/>
      </div>
    );
  }

  /* ---- Mastery dot (icon + text, never color alone) ---- */
  function MasteryDot({ state }) {
    const map = {
      mastered:   { cls:"mdot--mastered",   icon:"check-circle", label:"Mastered" },
      progress:   { cls:"mdot--progress",   icon:"loader",       label:"Getting there" },
      notstarted: { cls:"mdot--notstarted", icon:"circle",       label:"Not started yet" },
    };
    const m = map[state];
    return <span className={"mdot " + m.cls}><span className="mdot__o"/><Icon name={m.icon} size={13}/> {m.label}</span>;
  }

  const SUBJECTS = [
    { subject:"Data Structures & Algorithms", examAvg:82, completion:64, state:"mastered" },
    { subject:"System Design",                examAvg:71, completion:42, state:"progress",  spark:true },
    { subject:"Low-Level Design",             examAvg:88, completion:100, state:"mastered" },
    { subject:"Calculus",                     examAvg:48, completion:31, state:"progress" },
    { subject:"Behavioral Interview",         examAvg:0,  completion:0,  state:"notstarted" },
  ];

  function MasteryGrid() {
    return (
      <div className="mgrid" role="table" aria-label="Where you stand by subject">
        <div className="mgrid__head" role="row">
          <span role="columnheader">Subject</span>
          <span role="columnheader">Exam average</span>
          <span role="columnheader">Space completion</span>
          <span role="columnheader">Mastery</span>
        </div>
        {SUBJECTS.map((s) => (
          <div className="mgrid__row" role="row" key={s.subject} tabIndex={0}
               onClick={()=>{}} aria-label={s.subject + ": " + (s.state==="mastered"?"mastered":s.state==="progress"?"getting there":"not started yet")}>
            <span className="mgrid__subj" role="cell">{s.subject}</span>
            <span className="mbar" role="cell">
              <span className="mbar__track"><span className={"mbar__fill" + (s.spark?" mbar__fill--spark":"")} style={{ width: s.examAvg+"%" }}/></span>
              <span className="mbar__num">{s.state==="notstarted" ? "—" : s.examAvg+"%"}</span>
            </span>
            <span className="mbar" role="cell">
              <span className="mbar__track"><span className={"mbar__fill" + (s.spark?" mbar__fill--spark":"")} style={{ width: s.completion+"%" }}/></span>
              <span className="mbar__num">{s.state==="notstarted" ? "—" : s.completion+"%"}</span>
            </span>
            <span role="cell"><MasteryDot state={s.state}/></span>
          </div>
        ))}
      </div>
    );
  }

  /* ====================== OVERALL TAB ====================== */
  function OverallTab() {
    return (
      <div style={{ display:"flex", flexDirection:"column", gap:"var(--space-6)" }}>
        {/* HERO */}
        <section aria-label="Overall score and key stats" className="hero">
          <Card>
            <div className="hero__ring">
              <ProgressRing value={74} size={140} label="74%"/>
              <div className="hero__ring-label">Overall score</div>
              <div className="hero__ring-cap">across your spaces and exams</div>
            </div>
          </Card>
          <div className="kpi-grid">
            <KpiCard icon="file-check" label="Avg exam score" value={78} suffix="%" sub="9 / 12 exams" ariaText="Average exam score: 78 percent, 9 of 12 exams"/>
            <KpiCard icon="book-open" label="Space completion" value={59} suffix="%" sub="2 / 4 spaces done" ariaText="Space completion: 59 percent, 2 of 4 spaces done"/>
            <KpiCard icon="target" label="Accuracy" value={76} suffix="%" sub="up 9 pts this month" ariaText="Accuracy: 76 percent"/>
            <KpiCard icon="flame" spark label="Current streak" value={6} suffix="d" sub="best: 11d" ariaText="Current streak: 6 days"/>
            <KpiCard icon="trophy" label="Points earned" value={1840} suffix="" sub="of 3,100 available" ariaText="Points earned: 1840 of 3100"/>
            <div className="kpi" role="group" aria-label="Keep your streak going">
              <div className="kpi__top">
                <span className="kpi__icon kpi__icon--spark"><Icon name="flame" size={16}/></span>
                <span style={{ fontSize:"var(--text-sm)", fontWeight:"var(--weight-medium)" }}>Streak</span>
              </div>
              <div style={{ marginTop:"var(--space-1)" }}><StreakFlame days={6}/></div>
              <div className="u-caption" style={{ color:"var(--text-muted)" }}>one more day beats your record</div>
            </div>
          </div>
        </section>

        {/* TRENDS */}
        <section aria-label="Trends over time" className="charts">
          <TrendCard title="Accuracy over time" metric="accuracy"/>
          <TrendCard title="Completion over time" metric="completion" spark/>
        </section>

        {/* MASTERY BY SUBJECT */}
        <Section title="Where you stand by subject">
          <MasteryGrid/>
          <div className="u-caption" style={{ color:"var(--text-muted)", marginTop:"var(--space-3)", display:"flex", gap:"var(--space-4)", flexWrap:"wrap" }}>
            <span style={{ display:"inline-flex", alignItems:"center", gap:"var(--space-1)" }}><Icon name="check-circle" size={13}/> Mastered</span>
            <span style={{ display:"inline-flex", alignItems:"center", gap:"var(--space-1)" }}><Icon name="loader" size={13}/> Getting there</span>
            <span style={{ display:"inline-flex", alignItems:"center", gap:"var(--space-1)" }}><Icon name="circle" size={13}/> Not started yet</span>
          </div>
        </Section>

        {/* STRENGTHS/GROWTH + NEXT STEP */}
        <div className="two">
          <Card>
            <div className="chip-block">
              <div className="chip-block__label"><Icon name="thumbs-up" size={15}/> You're strong in</div>
              <div className="chips">
                <Chip active><Icon name="check" size={12}/> Arrays</Chip>
                <Chip active><Icon name="check" size={12}/> Dynamic Programming</Chip>
                <Chip active><Icon name="check" size={12}/> Design Patterns</Chip>
                <Chip active><Icon name="check" size={12}/> Sorting</Chip>
              </div>
              <hr className="divider"/>
              <div className="chip-block__label"><Icon name="sprout" size={15}/> Let's revisit</div>
              <div className="chips">
                <Badge variant="warning" icon={<Icon name="rotate-ccw" size={12}/>}>Calculus limits</Badge>
                <Badge variant="warning" icon={<Icon name="rotate-ccw" size={12}/>}>Graph traversal</Badge>
                <Badge variant="warning" icon={<Icon name="rotate-ccw" size={12}/>}>Big-O analysis</Badge>
              </div>
              <div className="u-caption" style={{ color:"var(--text-muted)" }}>Tap a topic to jump into a focused practice set.</div>
            </div>
          </Card>

          <Card>
            <div className="next-stack">
              <div style={{ display:"flex", alignItems:"center", gap:"var(--space-2)" }}>
                <AtRiskBadge level="watch">Let's get you some support 🌱</AtRiskBadge>
              </div>
              <div className="u-caption" style={{ color:"var(--text-secondary)" }}>
                A couple of small things would lift your trajectory. Here's your next move:
              </div>
              <InsightCard icon="calculator" title="Calculus has been tricky lately">
                Your recent Calculus accuracy dipped to 48%. A 15-min practice set could turn that around.
                <div className="insight-cta"><Button variant="spark" size="sm" trailingIcon={<Icon name="arrow-right" size={14}/>}>Practice now</Button></div>
              </InsightCard>
              <InsightCard icon="calendar-clock" title="System Design has been quiet for 5 days">
                A quick win is the best way back in — pick up where you left off.
                <div className="insight-cta"><Button variant="secondary" size="sm" trailingIcon={<Icon name="arrow-right" size={14}/>}>Pick up a space</Button></div>
              </InsightCard>
            </div>
          </Card>
        </div>

        {/* INSIGHTS */}
        <Section title="Suggested for you" actions={<Button variant="ghost" size="sm" trailingIcon={<Icon name="chevron-right" size={14}/>}>View all</Button>}>
          <div className="insights-list">
            <InsightCard icon="lightbulb" title="Review Graphs before Thursday">
              Your Graph traversal accuracy is at 61%. A short refresher in DSA could lift it before your Graphs exam.
            </InsightCard>
            <InsightCard icon="trending-up" title="You're 5 sections from finishing System Design">
              You've completed 42% — finishing the next two story points would push it over the halfway mark.
            </InsightCard>
          </div>
        </Section>
      </div>
    );
  }

  /* ====================== EXAMS TAB ====================== */
  function ExamsTab() {
    const [sortDesc, setSortDesc] = useState(true);
    const rows = [
      { exam:"DSA · Mid-unit Quiz",        sub:"Data Structures & Algorithms", date:"Jun 18, 2026", score:"42 / 50", pct:84, grade:"A" },
      { exam:"System Design · Caching",     sub:"System Design",                date:"Jun 16, 2026", score:"31 / 40", pct:78, grade:"B" },
      { exam:"LLD · SOLID Principles",      sub:"Low-Level Design",             date:"Jun 12, 2026", score:"45 / 50", pct:90, grade:"A" },
      { exam:"Calculus · Limits Test",      sub:"Calculus",                     date:"Jun 9, 2026",  score:"24 / 50", pct:48, grade:"D" },
      { exam:"DSA · Recursion Check",       sub:"Data Structures & Algorithms", date:"Jun 4, 2026",  score:"29 / 40", pct:73, grade:"C" },
    ];
    const sorted = [...rows].sort((a,b)=> sortDesc ? b.pct-a.pct : a.pct-b.pct);
    const columns = [
      { label:"Exam", key:"exam", render:(r)=>(<div><div className="tbl-exam">{r.exam}</div><div className="tbl-sub">{r.sub}</div></div>) },
      { label:"Date", key:"date", render:(r)=>(<span className="u-mono" style={{ fontSize:"var(--text-xs)", color:"var(--text-secondary)" }}>{r.date}</span>) },
      { label:"Score", key:"score", numeric:true, render:(r)=>(<span className="u-mono" style={{ fontSize:"var(--text-sm)" }}>{r.score}</span>) },
      { label:"Grade", key:"grade", render:(r)=>(<GradePill grade={r.grade}/>) },
      { label:"", key:"review", render:()=>(<a href="#" onClick={(e)=>e.preventDefault()} className="review-link">Review <Icon name="arrow-right" size={14}/></a>) },
    ];
    return (
      <div style={{ display:"flex", flexDirection:"column", gap:"var(--space-6)" }}>
        <section aria-label="Exam KPIs" className="kpi-strip3">
          <KpiCard icon="file-check" label="Exams done" value={9} suffix="" sub="of 12 assigned" ariaText="Exams done: 9 of 12"/>
          <KpiCard icon="target" label="Avg exam %" value={78} suffix="%" sub="across all subjects" ariaText="Average exam percentage: 78"/>
          <KpiCard icon="award" label="Marks obtained" value={326} suffix="" sub="of 418 available" ariaText="Marks obtained: 326 of 418"/>
        </section>

        <Section title="By subject">
          <div className="ring-grid">
            {[["Data Structures",82,false],["System Design",71,true],["Low-Level Design",88,false],["Calculus",48,false]].map(([n,v,sp])=>(
              <div className="ring-tile" key={n}>
                <ProgressRing value={v} size={72} label={v+"%"}/>
                <div className="ring-tile__name">{n}</div>
                <div className="ring-tile__meta">{n==="Calculus"?"2 exams":"3 exams"}</div>
              </div>
            ))}
          </div>
        </Section>

        <Section title="Your exams" actions={
          <Button variant="ghost" size="sm" onClick={()=>setSortDesc(!sortDesc)}
            leadingIcon={<Icon name={sortDesc?"arrow-down":"arrow-up"} size={14}/>}>
            Sort by score
          </Button>
        }>
          <Card>
            <DataTable columns={columns} rows={sorted}/>
          </Card>
        </Section>
      </div>
    );
  }

  /* ====================== SPACES TAB ====================== */
  function SpacesTab() {
    const spaces = [
      { title:"Data Structures & Algorithms", status:"In progress", variant:"brand",   pct:64, pts:"768 / 1,200", sections:"8 / 12 sections" },
      { title:"System Design",                status:"In progress", variant:"warning",  pct:42, pts:"378 / 900",   sections:"4 / 9 sections", spark:true },
      { title:"Low-Level Design",             status:"Completed",   variant:"success",  pct:100, pts:"1,000 / 1,000", sections:"10 / 10 sections" },
      { title:"Behavioral Interview",         status:"Not started", variant:"",         pct:0,  pts:"0 / 600",     sections:"0 / 6 sections" },
    ];
    return (
      <div style={{ display:"flex", flexDirection:"column", gap:"var(--space-6)" }}>
        <section aria-label="Spaces KPIs" className="kpi-strip3">
          <KpiCard icon="layout-grid" label="Spaces done" value={2} suffix="" sub="of 4 assigned" ariaText="Spaces done: 2 of 4"/>
          <KpiCard icon="book-open" label="Avg completion" value={59} suffix="%" sub="across your spaces" ariaText="Average completion: 59 percent"/>
          <KpiCard icon="trophy" label="Points earned" value={1840} suffix="" sub="of 3,100 available" ariaText="Points earned: 1840 of 3100"/>
        </section>

        <Section title="By subject">
          <div className="ring-grid">
            {[["DSA",64,false],["System Design",42,true],["Low-Level Design",100,false],["Behavioral",0,false]].map(([n,v,sp])=>(
              <div className="ring-tile" key={n}>
                <ProgressRing value={v} size={72} label={v===100?"✓":v+"%"}/>
                <div className="ring-tile__name">{n}</div>
                <div className="ring-tile__meta">{v===0?"not started":v===100?"completed":"in progress"}</div>
              </div>
            ))}
          </div>
        </Section>

        <Section title="Your spaces">
          <div className="rows-stack">
            {spaces.map((s)=>(
              <a className="space-row" key={s.title} href="#" onClick={(e)=>e.preventDefault()} aria-label={s.title + ", " + s.status + ", " + s.pct + " percent"}>
                <div>
                  <div className="space-row__title">{s.title}</div>
                  <div className="space-row__meta">{s.sections}</div>
                </div>
                <Badge variant={s.variant || undefined} icon={<Icon name={s.status==="Completed"?"check":s.status==="In progress"?"zap":"circle"} size={12}/>}>{s.status}</Badge>
                <div style={{ display:"flex", alignItems:"center", gap:"var(--space-3)" }}>
                  <div style={{ flex:1 }}><ProgressBar value={s.pct} variant={s.spark?"spark":s.pct===100?"success":undefined}/></div>
                  <span className="space-row__meta">{s.pts} pts</span>
                </div>
                <span className="space-row__chev"><Icon name="chevron-right" size={18}/></span>
              </a>
            ))}
          </div>
        </Section>
      </div>
    );
  }

  /* ====================== STATE PREVIEW BLOCKS ====================== */
  function LoadingState() {
    return (
      <div className="state-band" role="status" aria-busy="true" aria-label="Loading your progress">
        <div className="eyebrow-state"><Icon name="loader" size={13}/> State: loading skeleton — “Loading your progress…”</div>
        <div className="hero" style={{ marginBottom:"var(--space-4)" }}>
          <div className="skel-card" style={{ alignItems:"center" }}>
            <Skeleton variant="circle" width="120px" height="120px"/>
            <Skeleton width="55%" height="0.9rem"/>
          </div>
          <div className="kpi-grid">
            {[0,1,2,3,4,5].map(i=>(
              <div className="skel-card" key={i}>
                <Skeleton width="60%" height="0.7rem"/>
                <Skeleton width="40%" height="1.6rem"/>
              </div>
            ))}
          </div>
        </div>
        <div className="charts">
          <div className="skel-card"><Skeleton width="45%" height="1rem"/><Skeleton width="100%" height="140px"/></div>
          <div className="skel-card"><Skeleton width="45%" height="1rem"/><Skeleton width="100%" height="140px"/></div>
        </div>
      </div>
    );
  }

  function EmptyStateBlock() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="sparkles" size={13}/> State: empty (new learner) — warm, never bare zeros</div>
        <EmptyState
          icon="sprout"
          title="Your progress story starts here."
          body="As you complete spaces and take exams, this page fills with your trends, strengths, and milestones. Let's get the first one on the board."
          action={<Button variant="primary" leadingIcon={<Icon name="compass" size={16}/>}>Explore your spaces</Button>}
        />
      </div>
    );
  }

  function PartialState() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="layers" size={13}/> State: partial — trends unavailable, falling back to real activity</div>
        <div className="chart-card">
          <div className="chart-card__head">
            <div className="chart-card__title">Recent activity</div>
          </div>
          <div className="u-caption" style={{ color:"var(--text-muted)" }}>Showing recent activity — full trends arrive as you complete more.</div>
          <Timeline items={[
            { time:"Jun 18", label:"Scored 84% on DSA Mid-unit Quiz", variant:"success" },
            { time:"Jun 16", label:"Completed System Design · Caching story point" },
            { time:"Jun 12", label:"Scored 90% on LLD · SOLID Principles", variant:"success" },
            { time:"Jun 9",  label:"Scored 48% on Calculus · Limits Test", variant:"muted" },
          ]}/>
        </div>
      </div>
    );
  }

  function SpacesErrorState() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="alert-triangle" size={13}/> State: partial — Spaces tab failed, others fine</div>
        <Alert variant="warning" title="We couldn't load your spaces just now">
          Your overall and exam progress are still here.{" "}
          <a href="#" onClick={(e)=>e.preventDefault()} style={{ color:"var(--brand-primary)", fontWeight:"var(--weight-semibold)" }}>Retry</a>
        </Alert>
      </div>
    );
  }

  function ErrorState() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="cloud-off" size={13}/> State: error (whole summary) — never blame the learner</div>
        <EmptyState
          icon="cloud-off"
          title="We couldn't load your progress just now."
          body="Let's try again — this one's on us, not you."
          action={<Button variant="primary" leadingIcon={<Icon name="rotate-cw" size={16}/>}>Retry</Button>}
        />
      </div>
    );
  }

  function OnTrackState() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="target" size={13}/> State: not at-risk — calm “on track” variant of the next-step card</div>
        <Card>
          <div style={{ display:"flex", alignItems:"center", gap:"var(--space-3)" }}>
            <Badge variant="success" icon={<Icon name="target" size={13}/>}>You're on track 🎯</Badge>
            <span className="u-caption" style={{ color:"var(--text-secondary)" }}>Keep doing what you're doing — your trajectory looks great.</span>
          </div>
        </Card>
      </div>
    );
  }

  /* ---- Sidebar (composed from CSS classes) ---- */
  function Sidebar() {
    const nav = [
      { icon:"layout-dashboard", label:"Dashboard" },
      { icon:"book-open", label:"My Spaces" },
      { icon:"trending-up", label:"Progress", active:true },
      { icon:"file-check", label:"Exams" },
      { icon:"award", label:"Achievements" },
    ];
    return (
      <aside className="appshell__sidebar">
        <div className="sidebar__brand">
          <span className="sidebar__brand-mark">L</span>
          <span className="sidebar__brand-name">LevelUp</span>
        </div>
        <div className="sidebar__section-label">Learning</div>
        <nav className="sidebar__nav">
          {nav.map((n)=>(<NavItem key={n.label} icon={n.icon} active={n.active} href="#">{n.label}</NavItem>))}
        </nav>
        <div className="sidebar__section-label">School</div>
        <nav className="sidebar__nav">
          <NavItem icon="users" href="#">Class · Grade 10-B</NavItem>
          <NavItem icon="life-buoy" href="#">Support</NavItem>
        </nav>
        <div style={{ marginTop:"auto", padding:"var(--space-4)" }}>
          <div style={{ display:"flex", alignItems:"center", gap:"var(--space-3)" }}>
            <Avatar initials="AK" size="sm"/>
            <div style={{ minWidth:0 }}>
              <div style={{ fontSize:"var(--text-sm)", fontWeight:"var(--weight-semibold)" }}>Aisha Khan</div>
              <div className="u-caption" style={{ color:"var(--text-muted)" }}>SUB001 · Student</div>
            </div>
          </div>
        </div>
      </aside>
    );
  }

  function Topbar({ onOpenPalette }) {
    return (
      <header className="appshell__topbar">
        <div className="topbar__search" style={{ display:"flex", alignItems:"center", gap:"var(--space-2)" }}>
          <Input placeholder="Search spaces, exams…  ⌘K" onFocus={onOpenPalette}/>
        </div>
        <div className="topbar__spacer"/>
        <Tooltip><IconButton icon={<Icon name="command" size={18}/>} label="Command palette (⌘K)" onClick={onOpenPalette}/></Tooltip>
        <IconButton icon={<Icon name="bell" size={18}/>} label="Notifications"/>
        <Avatar initials="AK" size="sm"/>
      </header>
    );
  }

  function Screen() {
    const [palette, setPalette] = useState(false);
    useEffect(() => {
      const onKey = (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") { e.preventDefault(); setPalette(true); }
        if (e.key === "Escape") setPalette(false);
      };
      window.addEventListener("keydown", onKey);
      return () => window.removeEventListener("keydown", onKey);
    }, []);

    return (
      <div className="appshell" style={{ position:"relative" }}>
        <Sidebar/>
        <Topbar onOpenPalette={()=>setPalette(true)}/>
        <main className="appshell__main">
          <a href="#main" className="u-sr-only">Skip to content</a>
          <div className="page" id="main">
            {/* HEADER */}
            <div>
              <div style={{ display:"flex", alignItems:"baseline", gap:"var(--space-3)", flexWrap:"wrap" }}>
                <h1 className="ph__title">Your progress</h1>
                <span className="ph__updated"><Icon name="clock" size={13}/> Last updated 2h ago</span>
              </div>
              <p className="ph__sub">You've grown a lot this month — here's the full picture. 🎯</p>
            </div>

            {/* TABS: Overall · Exams · Spaces */}
            <Tabs
              defaultIndex={0}
              items={[
                { label:"Overall", content:<OverallTab/> },
                { label:"Exams",   content:<ExamsTab/> },
                { label:"Spaces",  content:<SpacesTab/> },
              ]}
            />

            {/* ---- Secondary: other spec'd states surfaced for review ---- */}
            <Section title="Other states (for review)">
              <div style={{ display:"flex", flexDirection:"column", gap:"var(--space-6)" }}>
                <LoadingState/>
                <div className="state-grid">
                  <EmptyStateBlock/>
                  <ErrorState/>
                </div>
                <div className="state-grid">
                  <PartialState/>
                  <OnTrackState/>
                </div>
                <SpacesErrorState/>
              </div>
            </Section>

            <div style={{ height:"var(--space-6)" }}/>
          </div>
        </main>

        {/* Command palette (⌘K) */}
        {palette && (
          <div className="modal-scrim" onClick={()=>setPalette(false)}>
            <div onClick={(e)=>e.stopPropagation()} style={{ position:"absolute", top:"14%", left:"50%", transform:"translateX(-50%)", width:"min(560px, 90%)" }}>
              <CommandPalette
                placeholder="Search or jump to…"
                selected={0}
                items={[
                  { icon:"trending-up", label:"Progress overview", kbd:"↵" },
                  { icon:"file-check", label:"Exams tab", kbd:"E" },
                  { icon:"layout-grid", label:"Spaces tab", kbd:"S" },
                  { icon:"calculator", label:"Practice: Calculus", kbd:"P" },
                ]}
              />
            </div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Screen/>);
</script>
</body>
</html>
