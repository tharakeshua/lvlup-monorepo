<!-- @dsCard group="Parent" viewport="1440x940" name="My Children" subtitle="Linked children roster" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* card-only global reset — OUTSIDE markers, composer ignores this */
body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}

/* ==SPA-STYLE:children-roster== */
.v-children-roster{max-width:var(--content-max);margin:0 auto;display:flex;flex-direction:column;gap:var(--space-8)}

.v-children-roster .pagehead{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap}
.v-children-roster .pagehead h1{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-4xl);line-height:var(--leading-4xl);letter-spacing:-.02em;margin:0}
.v-children-roster .pagehead__sub{font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-2);display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
.v-children-roster .pagehead__sub .u-mono{font-family:var(--font-mono);color:var(--text-muted)}
.v-children-roster .pagehead__sub .dot{width:3px;height:3px;border-radius:var(--radius-pill);background:var(--border-strong)}

.v-children-roster .roster{display:flex;flex-direction:column;gap:var(--space-6)}

/* child card */
.v-children-roster .ccard{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden}
.v-children-roster .ccard--watch{border-color:var(--status-warning);box-shadow:var(--shadow-e1),inset 4px 0 0 var(--status-warning)}
.v-children-roster .ccard__head{display:flex;align-items:flex-start;gap:var(--space-4);padding:var(--space-5) var(--space-6) var(--space-4)}
.v-children-roster .ccard__id{flex:1 1 auto;min-width:0}
.v-children-roster .ccard__namerow{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap}
.v-children-roster .ccard__name{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-2xl);line-height:var(--leading-2xl);letter-spacing:-.01em;color:var(--text-primary);margin:0}
.v-children-roster .ccard__meta{font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-1);display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
.v-children-roster .ccard__meta .dot{width:3px;height:3px;border-radius:var(--radius-pill);background:var(--border-strong)}
.v-children-roster .ccard__avgpill{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:var(--space-1)}
.v-children-roster .ccard__avgcap{font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}

/* metric row */
.v-children-roster .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4);padding:0 var(--space-6) var(--space-5)}
.v-children-roster .metric{display:flex;flex-direction:column;gap:var(--space-2)}
.v-children-roster .metric__label{font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.v-children-roster .metric__val{font-family:var(--font-mono);font-size:var(--text-xl);font-weight:var(--weight-medium);color:var(--text-primary);line-height:1}
.v-children-roster .metric__prog{margin-top:var(--space-1)}
.v-children-roster .metric__flame{display:flex;align-items:center;gap:var(--space-2)}

/* recent exams */
.v-children-roster .recent{padding:0 var(--space-6) var(--space-5);border-top:1px solid var(--border-subtle);margin-top:var(--space-1);padding-top:var(--space-4)}
.v-children-roster .recent__cap{font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-mono);margin-bottom:var(--space-3)}
.v-children-roster .examrow{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding:var(--space-2) 0;border-top:1px solid var(--border-subtle)}
.v-children-roster .examrow:first-of-type{border-top:none}
.v-children-roster .examrow__name{font-size:var(--text-sm);color:var(--text-primary);min-width:0}
.v-children-roster .examrow__sub{font-size:var(--text-2xs);color:var(--text-muted);margin-top:1px}

/* actions */
.v-children-roster .ccard__foot{display:flex;flex-wrap:wrap;gap:var(--space-3);padding:var(--space-4) var(--space-6) var(--space-5);border-top:1px solid var(--border-subtle);background:var(--bg-surface-sunken)}

.v-children-roster .u-mono{font-family:var(--font-mono)}
/* ==/SPA-STYLE== */
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { Icon, Button, Avatar, Badge, Stat, ProgressBar, GradePill, StreakFlame,
  AtRiskBadge, NavItem, IconButton, EmptyState, Skeleton, Alert } = window.LvlupV0DesignSystem_5d0725;

function go(hash){ if(hash) window.location.hash = hash; }

/* ---------- sample data (server-derived, released-only) ---------- */
const CHILDREN = [
  { id:'aarav', name:'Aarav Sharma', initials:'AS', grade:'Grade 9', school:'Beacon Hill Academy',
    avg:82, completion:78, streak:12, examsTaken:14, atRisk:false,
    exams:[
      { id:'ex_midterm', name:'Midterm — DSA', grade:'A', score:'88%' },
      { id:'ex_unit_m',  name:'Unit Test — Mathematics', grade:'B', score:'79%' },
      { id:'ex_quiz_p',  name:'Quiz — Physics', grade:'B', score:'81%' },
    ] },
  { id:'diya', name:'Diya Sharma', initials:'DS', grade:'Grade 7', school:'Beacon Hill Academy',
    avg:61, completion:44, streak:0, examsTaken:9, atRisk:true,
    exams:[
      { id:'ex_unit_sci', name:'Unit Test — Science', grade:'D', score:'58%' },
      { id:'ex_quiz_m',   name:'Quiz — Mathematics', grade:'C', score:'66%' },
      { id:'ex_essay_en', name:'Essay — English', grade:'C', score:'63%' },
    ] },
];

/* ---------- child card ---------- */
function ChildCard({ c }){
  const headingId = 'child-'+c.id;
  return (
    <section className={'ccard'+(c.atRisk?' ccard--watch':'')} aria-labelledby={headingId}>
      <div className="ccard__head">
        <Avatar initials={c.initials} size="lg"/>
        <div className="ccard__id">
          <div className="ccard__namerow">
            <h2 className="ccard__name" id={headingId}>{c.name}</h2>
            {c.atRisk && <AtRiskBadge level="watch">Watch</AtRiskBadge>}
          </div>
          <div className="ccard__meta">
            <span>{c.grade}</span><span className="dot" aria-hidden="true"></span>
            <span>{c.school}</span>
          </div>
        </div>
        <div className="ccard__avgpill">
          <span className="ccard__avgcap">Exam avg</span>
          <GradePill grade={c.avg>=85?'A':c.avg>=75?'B':c.avg>=65?'C':'D'} score={c.avg+'%'}/>
        </div>
      </div>

      <div className="metrics" role="group" aria-label={c.name+' performance metrics'}>
        <div className="metric">
          <span className="metric__label">Exam average</span>
          <span className="metric__val">{c.avg}%</span>
        </div>
        <div className="metric">
          <span className="metric__label">Spaces complete</span>
          <span className="metric__val">{c.completion}%</span>
          <div className="metric__prog"><ProgressBar value={c.completion} variant={c.completion>=70?'success':undefined}/></div>
        </div>
        <div className="metric">
          <span className="metric__label">Current streak</span>
          <span className="metric__flame"><StreakFlame days={c.streak}/></span>
        </div>
        <div className="metric">
          <span className="metric__label">Exams taken</span>
          <span className="metric__val">{c.examsTaken}</span>
        </div>
      </div>

      <div className="recent">
        <div className="recent__cap">Recent exams · released only</div>
        {c.exams.map(e=>(
          <div className="examrow" key={e.id}>
            <div className="examrow__name">
              {e.name}
              <div className="examrow__sub">Score released by teacher</div>
            </div>
            <GradePill grade={e.grade} score={e.score}/>
          </div>
        ))}
      </div>

      <div className="ccard__foot">
        <Button variant="primary" size="sm" leadingIcon={<Icon name="trending-up" size={15}/>}
          onClick={()=>go('#/children/'+c.id+'/progress')}>Progress</Button>
        <Button variant="secondary" size="sm" leadingIcon={<Icon name="clipboard-check" size={15}/>}
          onClick={()=>go('#/children/'+c.id+'/results')}>Results</Button>
        <Button variant="ghost" size="sm" leadingIcon={<Icon name="orbit" size={15}/>}
          onClick={()=>go('#/progress')}>Space progress</Button>
      </div>
    </section>
  );
}

/* ==SPA-VIEW:children-roster== */
function ChildrenView(){
  return (
    <div className="v-children-roster">
      <div className="pagehead">
        <div>
          <h1>My Children</h1>
          <div className="pagehead__sub">
            <span className="u-mono">{CHILDREN.length}</span> linked
            <span className="dot" aria-hidden="true"></span>
            Beacon Hill Academy
            <span className="dot" aria-hidden="true"></span>
            <span className="u-mono">BHA-204</span>
          </div>
        </div>
        <Button variant="secondary" leadingIcon={<Icon name="git-compare" size={16}/>}
          onClick={()=>go('#/compare')}>Compare children</Button>
      </div>

      <div className="roster" role="list">
        {CHILDREN.map(c=> <ChildCard key={c.id} c={c}/> )}
      </div>
    </div>
  );
}
/* ==/SPA-VIEW== */

/* ==PARENT-SHELL (verbatim, do not edit)== */
function ParentShell(props){
  const a = props.active;
  return (
    <div className="appshell" style={{height:'100vh'}}>
      <aside className="appshell__sidebar">
        <div className="sidebar__brand"><div className="sidebar__brand-mark">B</div><div className="sidebar__brand-name">Beacon Hill</div></div>
        <nav className="sidebar__nav" aria-label="Primary">
          <div className="sidebar__section-label">Overview</div>
          <NavItem icon="layout-dashboard" href="#/" active={a==='dashboard'}>Dashboard</NavItem>
          <NavItem icon="alert-triangle" href="#/alerts" active={a==='alerts'} badge={<Badge variant="error">1</Badge>}>Alerts</NavItem>
          <NavItem icon="megaphone" href="#/announcements" active={a==='announcements'}>Announcements</NavItem>
          <div className="sidebar__section-label">My Children</div>
          <NavItem icon="users" href="#/children" active={a==='children'}>Children</NavItem>
          <NavItem icon="trending-up" href="#/children/aarav/progress" active={a==='progress'}>Progress</NavItem>
          <NavItem icon="clipboard-check" href="#/children/aarav/results" active={a==='results'}>Exam Results</NavItem>
          <NavItem icon="orbit" href="#/progress" active={a==='spaces'}>Space Progress</NavItem>
          <NavItem icon="git-compare" href="#/compare" active={a==='compare'}>Compare</NavItem>
          <div className="sidebar__section-label">Account</div>
          <NavItem icon="bell" href="#/notifications" active={a==='notifications'}>Notifications</NavItem>
          <NavItem icon="settings" href="#/settings" active={a==='settings'}>Settings</NavItem>
        </nav>
      </aside>
      <header className="appshell__topbar">
        <button className="chip" aria-haspopup="menu"><Avatar initials="BH" size="sm"/>Beacon Hill Academy<Icon name="chevron-down" size={14}/></button>
        <button className="chip" aria-haspopup="menu"><Avatar initials="AS" size="sm"/>Aarav Sharma<Icon name="chevron-down" size={14}/></button>
        <div style={{flex:1}}></div>
        <IconButton icon={<Icon name="bell" size={20}/>} label="Notifications"/>
        <IconButton icon={<Icon name="sun" size={20}/>} label="Toggle theme"/>
        <Avatar initials="AS"/>
      </header>
      <main className="appshell__main" id="main">{props.children}</main>
    </div>
  );
}

function App(){ return (<ParentShell active="children"><ChildrenView/></ParentShell>); }
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
