<!-- @dsCard group="Parent" viewport="1440x940" name="Exam Result Detail" subtitle="Per-question structured feedback" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* body/global reset — card-only, OUTSIDE the SPA markers */
body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}

/* ==SPA-STYLE:child-exam-result-detail== */
.v-child-exam-result-detail{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:var(--space-6)}

.v-child-exam-result-detail .erd-back{display:inline-flex;align-items:center;gap:var(--space-2);align-self:flex-start;padding:var(--space-1) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);color:var(--text-secondary);font-family:var(--font-ui);font-size:var(--text-sm);cursor:pointer;transition:border-color var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard)}
.v-child-exam-result-detail .erd-back:hover{border-color:var(--border-strong);color:var(--text-primary)}
.v-child-exam-result-detail .erd-back:focus-visible{outline:none;box-shadow:var(--ring-focus)}

/* header card */
.v-child-exam-result-detail .erd-head{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-6)}
.v-child-exam-result-detail .erd-head__top{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4)}
.v-child-exam-result-detail .erd-head__title{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-2xl);line-height:var(--leading-2xl);letter-spacing:-.01em;margin:0}
.v-child-exam-result-detail .erd-head__meta{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-2)}
.v-child-exam-result-detail .erd-head__meta .u-mono{font-family:var(--font-mono);color:var(--text-muted)}
.v-child-exam-result-detail .erd-head__dot{color:var(--border-strong)}

.v-child-exam-result-detail .erd-overall{margin-top:var(--space-5)}
.v-child-exam-result-detail .erd-overall__row{display:flex;align-items:baseline;justify-content:space-between;gap:var(--space-3);margin-bottom:var(--space-2)}
.v-child-exam-result-detail .erd-overall__lab{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-mono);color:var(--text-muted)}
.v-child-exam-result-detail .erd-overall__val{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-primary)}
.v-child-exam-result-detail .erd-head__cta{margin-top:var(--space-5);display:flex;gap:var(--space-3);flex-wrap:wrap}

/* released-only note */
.v-child-exam-result-detail .erd-note{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);background:var(--status-info-subtle);border:1px solid var(--status-info);color:var(--text-secondary);font-size:var(--text-sm)}
.v-child-exam-result-detail .erd-note__ico{color:var(--status-info);flex:0 0 auto}

/* question card */
.v-child-exam-result-detail .erd-q{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-4)}
.v-child-exam-result-detail .erd-q__head{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);flex-wrap:wrap}
.v-child-exam-result-detail .erd-q__headL{display:flex;align-items:center;gap:var(--space-2);min-width:0}
.v-child-exam-result-detail .erd-q__no{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-muted)}
.v-child-exam-result-detail .erd-q__type{display:inline-flex}
.v-child-exam-result-detail .erd-q__prompt{font-size:var(--text-base);line-height:var(--leading-base);color:var(--text-primary)}

.v-child-exam-result-detail .erd-ans{padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle)}
.v-child-exam-result-detail .erd-ans__lbl{font-size:var(--text-2xs);text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-mono);color:var(--text-muted);margin-bottom:var(--space-1)}
.v-child-exam-result-detail .erd-ans__val{font-size:var(--text-sm);color:var(--text-primary);line-height:var(--leading-sm)}

.v-child-exam-result-detail .erd-score__row{display:flex;align-items:baseline;justify-content:space-between;gap:var(--space-3);margin-bottom:var(--space-2)}
.v-child-exam-result-detail .erd-score__lab{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-primary)}
.v-child-exam-result-detail .erd-score__nums{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary)}

.v-child-exam-result-detail .erd-rubric__cap{font-size:var(--text-2xs);text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-mono);color:var(--text-muted);margin-bottom:var(--space-2)}

.v-child-exam-result-detail .erd-sw{display:flex;flex-direction:column;gap:var(--space-3)}
.v-child-exam-result-detail .erd-sw__group{display:flex;flex-direction:column;gap:var(--space-2)}
.v-child-exam-result-detail .erd-sw__lab{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--text-secondary)}
.v-child-exam-result-detail .erd-sw__lab--good{color:var(--status-success)}
.v-child-exam-result-detail .erd-sw__lab--work{color:var(--status-warning)}
.v-child-exam-result-detail .erd-sw__chips{display:flex;flex-wrap:wrap;gap:var(--space-2)}

.v-child-exam-result-detail .erd-q__foot{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;padding-top:var(--space-3);border-top:1px solid var(--border-subtle)}
.v-child-exam-result-detail .erd-confnote{font-size:var(--text-xs);color:var(--text-secondary);display:inline-flex;align-items:center;gap:var(--space-2)}

.v-child-exam-result-detail .u-mono{font-family:var(--font-mono)}

@media (prefers-reduced-motion: reduce){.v-child-exam-result-detail .erd-back{transition:none}}
/* ==/SPA-STYLE== */
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { Icon, Button, Badge, Chip, ProgressBar, GradePill, RubricBreakdown,
  ConfidenceBadge, Avatar, IconButton, NavItem } = window.LvlupV0DesignSystem_5d0725;

function go(hash){ if(hash) window.location.hash = hash; }

/* ==PARENT-SHELL (verbatim, do not edit)== */
function ParentShell(props){
  const a = props.active;
  return (
    <div className="appshell" style={{height:'100vh'}}>
      <aside className="appshell__sidebar">
        <div className="sidebar__brand"><div className="sidebar__brand-mark">B</div><div className="sidebar__brand-name">Beacon Hill</div></div>
        <nav className="sidebar__nav" aria-label="Primary">
          <div className="sidebar__section-label">Overview</div>
          <NavItem icon="layout-dashboard" href="#/" active={a==='dashboard'}>Dashboard</NavItem>
          <NavItem icon="alert-triangle" href="#/alerts" active={a==='alerts'} badge={<Badge variant="error">1</Badge>}>Alerts</NavItem>
          <NavItem icon="megaphone" href="#/announcements" active={a==='announcements'}>Announcements</NavItem>
          <div className="sidebar__section-label">My Children</div>
          <NavItem icon="users" href="#/children" active={a==='children'}>Children</NavItem>
          <NavItem icon="trending-up" href="#/children/aarav/progress" active={a==='progress'}>Progress</NavItem>
          <NavItem icon="clipboard-check" href="#/children/aarav/results" active={a==='results'}>Exam Results</NavItem>
          <NavItem icon="orbit" href="#/progress" active={a==='spaces'}>Space Progress</NavItem>
          <NavItem icon="git-compare" href="#/compare" active={a==='compare'}>Compare</NavItem>
          <div className="sidebar__section-label">Account</div>
          <NavItem icon="bell" href="#/notifications" active={a==='notifications'}>Notifications</NavItem>
          <NavItem icon="settings" href="#/settings" active={a==='settings'}>Settings</NavItem>
        </nav>
      </aside>
      <header className="appshell__topbar">
        <button className="chip" aria-haspopup="menu"><Avatar initials="BH" size="sm"/>Beacon Hill Academy<Icon name="chevron-down" size={14}/></button>
        <button className="chip" aria-haspopup="menu"><Avatar initials="AS" size="sm"/>Aarav Sharma<Icon name="chevron-down" size={14}/></button>
        <div style={{flex:1}}></div>
        <IconButton icon={<Icon name="bell" size={20}/>} label="Notifications"/>
        <IconButton icon={<Icon name="sun" size={20}/>} label="Toggle theme"/>
        <Avatar initials="AS"/>
      </header>
      <main className="appshell__main" id="main">{props.children}</main>
    </div>
  );
}

/* ---------- server-authoritative, released payload (no answer key) ---------- */
const EXAM = {
  title: "Midterm — Data Structures",
  subject: "DSA",
  child: "Aarav Sharma",
  releasedOn: "Jun 12, 2026",
  grade: "B+",
  score: 41, total: 50, percent: 82,
};

const QUESTIONS = [
  {
    n: 1, type: "Multiple choice", score: 6, max: 6,
    prompt: "Which data structure gives O(1) average-case lookup by key?",
    your: "Hash table",
    verdict: "correct",
    rubric: [
      { label: "Correct selection", desc: "Identifies hash table", score: 4, max: 4 },
      { label: "Justification", desc: "Average-case reasoning", score: 2, max: 2 },
    ],
    strengths: ["Right concept", "Clear reasoning"],
    weaknesses: [],
    mistake: "none",
    confidence: "high",
  },
  {
    n: 2, type: "Short answer", score: 4, max: 6,
    prompt: "Explain when a balanced BST is preferable to a hash table.",
    your: "When you need sorted order or range queries, a BST keeps keys ordered so you can traverse ranges, which a hash table can't do efficiently.",
    verdict: "partial",
    rubric: [
      { label: "Identifies ordering benefit", desc: "Sorted traversal / range", score: 2, max: 2 },
      { label: "Notes worst-case bounds", desc: "Guaranteed O(log n)", score: 1, max: 2 },
      { label: "Precise terminology", desc: "balanced / amortized", score: 1, max: 2 },
    ],
    strengths: ["Range-query insight", "Concrete example"],
    weaknesses: ["Missed worst-case guarantee"],
    mistake: "incomplete",
    confidence: "high",
  },
  {
    n: 3, type: "Free response", score: 5, max: 8,
    prompt: "Trace the steps to detect a cycle in a directed graph and state the time complexity.",
    your: "Use DFS and if you revisit a node that's still on the stack there's a cycle. It's O(n).",
    verdict: "partial",
    rubric: [
      { label: "Correct algorithm", desc: "DFS + recursion stack", score: 3, max: 3 },
      { label: "Complexity stated", desc: "O(V + E), not O(n)", score: 1, max: 3 },
      { label: "Edge handling", desc: "Back-edge definition", score: 1, max: 2 },
    ],
    strengths: ["Right approach (DFS)"],
    weaknesses: ["Complexity imprecise", "Edge cases thin"],
    mistake: "conceptual",
    confidence: "low",
  },
  {
    n: 4, type: "Multiple choice", score: 6, max: 6,
    prompt: "What is the worst-case time to insert into a binary heap of n elements?",
    your: "O(log n)",
    verdict: "correct",
    rubric: [
      { label: "Correct selection", desc: "Identifies O(log n)", score: 4, max: 4 },
      { label: "Reasoning", desc: "Sift-up height argument", score: 2, max: 2 },
    ],
    strengths: ["Accurate", "Good height intuition"],
    weaknesses: [],
    mistake: "none",
    confidence: "high",
  },
];

function pct(got, max){ return Math.round((got / max) * 100); }

const VERDICT = {
  correct: { variant: "success", icon: "check-circle", label: "Correct" },
  partial: { variant: "warning", icon: "circle-dashed", label: "Partial credit" },
  review:  { variant: "error",   icon: "compass",       label: "Needs review" },
};
const MISTAKE = {
  none:        { variant: "success", icon: "check",        label: "No mistake" },
  incomplete:  { variant: "warning", icon: "minus-circle", label: "Incomplete" },
  conceptual:  { variant: "error",   icon: "brain",        label: "Conceptual gap" },
  calculation: { variant: "warning", icon: "calculator",   label: "Calculation slip" },
};

function QuestionCard({ q }){
  const v = VERDICT[q.verdict];
  const m = MISTAKE[q.mistake];
  const p = pct(q.score, q.max);
  return (
    <section className="erd-q" aria-labelledby={"q"+q.n+"-h"}>
      <div className="erd-q__head">
        <div className="erd-q__headL">
          <span className="erd-q__no">Q{q.n}</span>
          <span className="erd-q__type"><Chip>{q.type}</Chip></span>
        </div>
        <Badge variant={v.variant} icon={<Icon name={v.icon} size={12}/>}>{v.label}</Badge>
      </div>

      <h3 className="erd-q__prompt" id={"q"+q.n+"-h"}>{q.prompt}</h3>

      <div className="erd-ans">
        <div className="erd-ans__lbl">Your child's answer</div>
        <div className="erd-ans__val">{q.your}</div>
      </div>

      <div>
        <div className="erd-score__row">
          <span className="erd-score__lab"><Icon name="target" size={15}/> Score</span>
          <span className="erd-score__nums">{q.score} / {q.max} · {p}%</span>
        </div>
        <ProgressBar value={p} variant={p>=80?'success':undefined}
          aria-label={"Question "+q.n+" score "+q.score+" of "+q.max+", "+p+" percent"}/>
      </div>

      <div>
        <div className="erd-rubric__cap">Rubric breakdown</div>
        <RubricBreakdown criteria={q.rubric}/>
      </div>

      <div className="erd-sw">
        {q.strengths.length>0 && (
          <div className="erd-sw__group">
            <span className="erd-sw__lab erd-sw__lab--good"><Icon name="sparkles" size={14}/> Strengths</span>
            <div className="erd-sw__chips">
              {q.strengths.map((s,i)=><Chip key={i}><Icon name="check" size={12}/> {s}</Chip>)}
            </div>
          </div>
        )}
        {q.weaknesses.length>0 && (
          <div className="erd-sw__group">
            <span className="erd-sw__lab erd-sw__lab--work"><Icon name="compass" size={14}/> To improve</span>
            <div className="erd-sw__chips">
              {q.weaknesses.map((w,i)=><Chip key={i}><Icon name="arrow-up-right" size={12}/> {w}</Chip>)}
            </div>
          </div>
        )}
      </div>

      <div className="erd-q__foot">
        <Badge variant={m.variant} icon={<Icon name={m.icon} size={12}/>}>{m.label}</Badge>
        <ConfidenceBadge level={q.confidence}
          value={q.confidence==='high' ? 'High confidence' :
                 q.confidence==='med' ? 'Medium confidence' : 'Low confidence'}/>
        {q.confidence==='low' && (
          <span className="erd-confnote"><Icon name="user-check" size={14}/> A teacher reviews low-confidence items.</span>
        )}
      </div>
    </section>
  );
}

/* ==SPA-VIEW:child-exam-result-detail== */
function ExamResultDetailView(){
  return (
    <div className="v-child-exam-result-detail">
      <button className="erd-back" onClick={()=>go('#/children/aarav/results')}>
        <Icon name="arrow-left" size={16}/> Back to Aarav's results
      </button>

      {/* header */}
      <header className="erd-head">
        <div className="erd-head__top">
          <div>
            <h1 className="erd-head__title">{EXAM.title}</h1>
            <div className="erd-head__meta">
              <span>{EXAM.child}</span>
              <span className="erd-head__dot">·</span>
              <span>{EXAM.subject}</span>
              <span className="erd-head__dot">·</span>
              <span>Released <span className="u-mono">{EXAM.releasedOn}</span></span>
            </div>
          </div>
          <GradePill grade={EXAM.grade} score={EXAM.percent + "%"}/>
        </div>

        <div className="erd-overall">
          <div className="erd-overall__row">
            <span className="erd-overall__lab">Overall score</span>
            <span className="erd-overall__val">{EXAM.score} / {EXAM.total} · {EXAM.percent}%</span>
          </div>
          <ProgressBar value={EXAM.percent} variant="success"
            aria-label={"Overall score "+EXAM.score+" of "+EXAM.total+", "+EXAM.percent+" percent"}/>
        </div>

        <div className="erd-head__cta">
          <Button variant="secondary" leadingIcon={<Icon name="download" size={16}/>}
            onClick={()=>go('#/children/aarav/results/ex_midterm')}>Download PDF</Button>
          <Button variant="ghost" trailingIcon={<Icon name="arrow-right" size={16}/>}
            onClick={()=>go('#/children/aarav/progress')}>View Aarav's progress</Button>
        </div>
      </header>

      {/* released-only / no-answer-key note */}
      <div className="erd-note" role="note">
        <span className="erd-note__ico"><Icon name="shield-check" size={18}/></span>
        <span>Scores are server-graded and shown only after release. <strong>Answer key is not shown to parents.</strong></span>
      </div>

      {/* per-question feedback */}
      {QUESTIONS.map(q => <QuestionCard key={q.n} q={q}/>)}
    </div>
  );
}
/* ==/SPA-VIEW== */

function App(){ return (<ParentShell active="results"><ExamResultDetailView/></ParentShell>); }
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
