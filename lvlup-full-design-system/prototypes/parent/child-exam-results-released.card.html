<!-- @dsCard group="Parent" viewport="1440x940" name="Exam Results" subtitle="Released submissions · per-exam summary" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* card-only global resets — OUTSIDE the SPA markers (composer ignores these) */
body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}

/* ==SPA-STYLE:child-exam-results-released== */
.v-child-exam-results-released{max-width:var(--content-max);margin:0 auto;display:flex;flex-direction:column;gap:var(--space-6)}

/* page header */
.v-child-exam-results-released .pagehead{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap}
.v-child-exam-results-released .pagehead h1{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-4xl);line-height:var(--leading-4xl);letter-spacing:-.02em;margin:0}
.v-child-exam-results-released .pagehead__sub{font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-2);display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
.v-child-exam-results-released .pagehead__sub .u-mono{font-family:var(--font-mono);color:var(--text-muted)}

/* domain banner — answer keys never shown */
.v-child-exam-results-released .domainbar{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);background:var(--bg-surface-sunken)}
.v-child-exam-results-released .domainbar__ico{flex:0 0 auto;width:32px;height:32px;border-radius:var(--radius-md);display:grid;place-items:center;background:var(--bg-surface);color:var(--text-secondary);border:1px solid var(--border-subtle)}
.v-child-exam-results-released .domainbar__txt{font-size:var(--text-sm);color:var(--text-secondary)}
.v-child-exam-results-released .domainbar__txt b{color:var(--text-primary);font-weight:var(--weight-semibold)}

/* filter chips */
.v-child-exam-results-released .filters{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
.v-child-exam-results-released .filters__lab{font-size:var(--text-xs);color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;margin-right:var(--space-1)}

/* surface card chrome */
.v-child-exam-results-released .listcard{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden}
.v-child-exam-results-released .listcard__head{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding:var(--space-5) var(--space-5) var(--space-3)}
.v-child-exam-results-released .listcard__title{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);line-height:var(--leading-lg);letter-spacing:-.01em;margin:0}
.v-child-exam-results-released .listcard__count{font-size:var(--text-xs);color:var(--text-secondary);font-family:var(--font-mono)}
.v-child-exam-results-released .listcard__body{padding:0 var(--space-4) var(--space-4)}

/* accordion row header layout */
.v-child-exam-results-released .exhead{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);width:100%}
.v-child-exam-results-released .exhead__left{display:flex;align-items:center;gap:var(--space-3);min-width:0;flex-wrap:wrap}
.v-child-exam-results-released .exhead__name{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-child-exam-results-released .exhead__date{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-muted)}
.v-child-exam-results-released .exhead__right{display:flex;align-items:center;gap:var(--space-4);flex:0 0 auto}
.v-child-exam-results-released .exhead__bar{width:120px}
.v-child-exam-results-released .exhead__bar .u-pct{display:block;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);margin-top:2px;text-align:right}

/* expanded summary body */
.v-child-exam-results-released .exsum{display:flex;flex-direction:column;gap:var(--space-4)}
.v-child-exam-results-released .exsum__scores{display:flex;align-items:center;gap:var(--space-5);flex-wrap:wrap}
.v-child-exam-results-released .exsum__marks{font-family:var(--font-mono);font-size:var(--text-base);color:var(--text-secondary)}
.v-child-exam-results-released .exsum__marks b{color:var(--text-primary);font-weight:var(--weight-semibold)}
.v-child-exam-results-released .exsum__div{color:var(--border-strong);margin:0 var(--space-2)}
.v-child-exam-results-released .exsum__comment{border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);padding:var(--space-4) var(--space-5)}
.v-child-exam-results-released .exsum__comment-head{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-2xs);text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-mono);color:var(--text-muted);margin-bottom:var(--space-2)}
.v-child-exam-results-released .exsum__comment-body{font-size:var(--text-sm);color:var(--text-primary);line-height:var(--leading-sm)}
.v-child-exam-results-released .exsum__eyebrow{font-size:var(--text-2xs);text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-mono);color:var(--text-muted);margin-bottom:var(--space-2)}
.v-child-exam-results-released .exsum__foot{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);flex-wrap:wrap;padding-top:var(--space-1)}
.v-child-exam-results-released .exsum__source{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}

/* states rail */
.v-child-exam-results-released .staterail{display:flex;flex-wrap:wrap;gap:var(--space-5)}
.v-child-exam-results-released .statemini{flex:1 1 320px;min-width:300px;display:flex;flex-direction:column;gap:var(--space-2)}
.v-child-exam-results-released .statemini__body{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:var(--space-4);min-height:140px;display:flex;flex-direction:column;gap:var(--space-3);justify-content:center}
.v-child-exam-results-released .sk-row{display:flex;align-items:center;gap:var(--space-3)}
.v-child-exam-results-released .u-caption{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.v-child-exam-results-released .u-mono{font-family:var(--font-mono)}
/* ==/SPA-STYLE== */
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const LU = window.LvlupV0DesignSystem_5d0725;
const { Icon, Button, IconButton, Avatar, Badge, Chip, Accordion, ProgressBar,
  GradePill, ConfidenceBadge, RubricBreakdown, EmptyState, Skeleton, Alert, NavItem } = LU;
const { useState } = React;

function go(hash){ if(hash) window.location.hash = hash; }

/* ==PARENT-SHELL (verbatim, do not edit)== */
function ParentShell(props){
  const a = props.active;
  return (
    <div className="appshell" style={{height:'100vh'}}>
      <aside className="appshell__sidebar">
        <div className="sidebar__brand"><div className="sidebar__brand-mark">B</div><div className="sidebar__brand-name">Beacon Hill</div></div>
        <nav className="sidebar__nav" aria-label="Primary">
          <div className="sidebar__section-label">Overview</div>
          <NavItem icon="layout-dashboard" href="#/" active={a==='dashboard'}>Dashboard</NavItem>
          <NavItem icon="alert-triangle" href="#/alerts" active={a==='alerts'} badge={<Badge variant="error">1</Badge>}>Alerts</NavItem>
          <NavItem icon="megaphone" href="#/announcements" active={a==='announcements'}>Announcements</NavItem>
          <div className="sidebar__section-label">My Children</div>
          <NavItem icon="users" href="#/children" active={a==='children'}>Children</NavItem>
          <NavItem icon="trending-up" href="#/children/aarav/progress" active={a==='progress'}>Progress</NavItem>
          <NavItem icon="clipboard-check" href="#/children/aarav/results" active={a==='results'}>Exam Results</NavItem>
          <NavItem icon="orbit" href="#/progress" active={a==='spaces'}>Space Progress</NavItem>
          <NavItem icon="git-compare" href="#/compare" active={a==='compare'}>Compare</NavItem>
          <div className="sidebar__section-label">Account</div>
          <NavItem icon="bell" href="#/notifications" active={a==='notifications'}>Notifications</NavItem>
          <NavItem icon="settings" href="#/settings" active={a==='settings'}>Settings</NavItem>
        </nav>
      </aside>
      <header className="appshell__topbar">
        <button className="chip" aria-haspopup="menu"><Avatar initials="BH" size="sm"/>Beacon Hill Academy<Icon name="chevron-down" size={14}/></button>
        <button className="chip" aria-haspopup="menu"><Avatar initials="AS" size="sm"/>Aarav Sharma<Icon name="chevron-down" size={14}/></button>
        <div style={{flex:1}}></div>
        <IconButton icon={<Icon name="bell" size={20}/>} label="Notifications"/>
        <IconButton icon={<Icon name="sun" size={20}/>} label="Toggle theme"/>
        <Avatar initials="AS"/>
      </header>
      <main className="appshell__main" id="main">{props.children}</main>
    </div>
  );
}

/* ---------- released-only sample data (server-derived, read-only) ---------- */
const SUBJECTS = ['All','DSA','Mathematics','Physics'];

const RESULTS = [
  { id:'ex_midterm', title:'Mid-term · Data Structures', subject:'DSA', date:'12 Jun 2026',
    grade:'B', pct:78, score:39, max:50, gradedBy:'med',
    comment:'A confident paper — recursion and traversal questions were strong. A couple of complexity-analysis steps slipped; reviewing Big-O on tree operations will tidy those up.',
    rubric:[
      { label:'Concepts', desc:'Core data-structure reasoning', score:16, max:20 },
      { label:'Application', desc:'Applied to traversal problems', score:14, max:18 },
      { label:'Analysis', desc:'Complexity / Big-O steps', score:9, max:12 },
    ]},
  { id:'ex_algebra', title:'Unit Test · Algebra', subject:'Mathematics', date:'04 Jun 2026',
    grade:'A', pct:88, score:44, max:50, gradedBy:'high',
    comment:'Strong, methodical work — clean working shown on every multi-step question and accurate throughout. A standout paper.',
    rubric:[
      { label:'Method', desc:'Sets up each problem correctly', score:18, max:20 },
      { label:'Accuracy', desc:'Final answers correct', score:14, max:15 },
      { label:'Presentation', desc:'Clear, legible working', score:12, max:15 },
    ]},
  { id:'ex_kinematics', title:'Quiz · Kinematics', subject:'Physics', date:'28 May 2026',
    grade:'C', pct:64, score:16, max:25, gradedBy:'review',
    comment:'A fair effort — equations of motion are understood. Watch unit conversions; a few answers were right in method but off by a factor from cm/m mixups.',
    rubric:[
      { label:'Setup', desc:'Chooses the right equation', score:8, max:10 },
      { label:'Units & accuracy', desc:'Conversion and final values', score:8, max:15 },
    ]},
];

const GRADED_BY = {
  high:   'Auto-graded',
  med:    'Auto-graded · teacher spot-checked',
  review: 'Reviewed by the teacher',
};

const GRADE_PROGRESS_VARIANT = (pct)=> pct>=85 ? 'success' : pct>=70 ? undefined : 'warning';

/* ---------- expanded per-exam summary ---------- */
function ExamSummary({ r }){
  return (
    <div className="exsum">
      <div className="exsum__scores">
        <GradePill grade={r.grade} score={r.pct + '%'}/>
        <span className="exsum__marks"><b>{r.score}</b> / {r.max} marks<span className="exsum__div">·</span>Released {r.date}</span>
      </div>

      <div className="exsum__comment">
        <div className="exsum__comment-head"><Icon name="message-square-text" size={12}/> Overall comment</div>
        <div className="exsum__comment-body">{r.comment}</div>
      </div>

      <div>
        <div className="exsum__eyebrow">Rubric breakdown</div>
        <RubricBreakdown criteria={r.rubric}/>
      </div>

      <div className="exsum__foot">
        <div className="exsum__source">
          <ConfidenceBadge level={r.gradedBy} value={GRADED_BY[r.gradedBy]}/>
          <span style={{display:'inline-flex',alignItems:'center',gap:'var(--space-1)',fontSize:'var(--text-xs)',color:'var(--text-muted)'}}>
            <Icon name="lock" size={12}/> Answer key not shown
          </span>
        </div>
        <Button variant="secondary" size="sm" trailingIcon={<Icon name="arrow-right" size={15}/>}
          onClick={()=>go('#/children/aarav/results/' + r.id)}>View full feedback</Button>
      </div>
    </div>
  );
}

/* ---------- primary screen ---------- */
/* ==SPA-VIEW:child-exam-results-released== */
function ExamResultsView(){
  const [subject,setSubject]=useState('All');
  const filtered = subject==='All' ? RESULTS : RESULTS.filter(r=>r.subject===subject);

  const accItems = filtered.map(r=>({
    title:(
      <div className="exhead">
        <div className="exhead__left">
          <span className="exhead__name">{r.title}</span>
          <Badge variant="info" icon={<Icon name="book" size={12}/>}>{r.subject}</Badge>
          <span className="exhead__date">{r.date}</span>
        </div>
        <div className="exhead__right">
          <div className="exhead__bar">
            <ProgressBar value={r.pct} variant={GRADE_PROGRESS_VARIANT(r.pct)}/>
            <span className="u-pct">{r.pct}%</span>
          </div>
          <GradePill grade={r.grade} score={r.pct + '%'}/>
        </div>
      </div>
    ),
    content: <ExamSummary r={r}/>,
  }));

  return (
    <div className="v-child-exam-results-released">

      <div className="pagehead">
        <div>
          <h1>Exam Results — Aarav Sharma</h1>
          <div className="pagehead__sub">
            Released results only · Grade 9 · <span className="u-mono">DSA · Mathematics · Physics</span>
          </div>
        </div>
        <Button variant="ghost" trailingIcon={<Icon name="arrow-right" size={16}/>}
          onClick={()=>go('#/children/aarav/progress')}>View progress</Button>
      </div>

      <div className="domainbar" role="note">
        <span className="domainbar__ico"><Icon name="shield-check" size={16}/></span>
        <span className="domainbar__txt">
          <b>Answer keys are never shown to parents.</b> You see only released grades, scores and the teacher's comments — unreleased work stays hidden.
        </span>
      </div>

      <div className="filters" role="group" aria-label="Filter by subject">
        <span className="filters__lab">Subjects</span>
        {SUBJECTS.map(s=>(
          <Chip key={s} active={subject===s} onClick={()=>setSubject(s)}
            aria-pressed={subject===s}>{s}</Chip>
        ))}
      </div>

      <section className="listcard" aria-labelledby="exres-title">
        <div className="listcard__head">
          <h2 className="listcard__title" id="exres-title">Released submissions</h2>
          <span className="listcard__count" aria-live="polite">{filtered.length} result{filtered.length===1?'':'s'}</span>
        </div>
        <div className="listcard__body">
          {filtered.length > 0 ? (
            <Accordion defaultOpen={0} items={accItems}/>
          ) : (
            <EmptyState icon="clipboard-x" title="No released results yet"
              body={'No released ' + (subject==='All'?'':subject+' ') + "results for Aarav yet. Results appear here the moment a teacher releases them — nothing is shown before then."}
              action={<Button variant="ghost" leadingIcon={<Icon name="trending-up" size={16}/>}
                onClick={()=>go('#/children/aarav/progress')}>See progress instead</Button>}/>
          )}
        </div>
      </section>

      {/* spec'd secondary states (loading / empty / error) */}
      <section aria-labelledby="states-title">
        <h2 className="listcard__title" id="states-title" style={{marginBottom:'var(--space-3)'}}>States</h2>
        <div className="staterail">
          <div className="statemini">
            <span className="u-caption">Loading (skeleton)</span>
            <div className="statemini__body">
              <div className="sk-row"><Skeleton variant="text" width="45%" height={14}/><div style={{flex:1}}/><Skeleton variant="text" width="64px" height={22}/></div>
              <div className="sk-row"><Skeleton variant="text" width="55%" height={14}/><div style={{flex:1}}/><Skeleton variant="text" width="64px" height={22}/></div>
              <div className="sk-row"><Skeleton variant="text" width="40%" height={14}/><div style={{flex:1}}/><Skeleton variant="text" width="64px" height={22}/></div>
            </div>
          </div>

          <div className="statemini">
            <span className="u-caption">Empty — no released results</span>
            <div className="statemini__body">
              <EmptyState icon="clipboard-x" title="No released results yet"
                body="Results appear here the moment a teacher releases them — nothing is shown before then."/>
            </div>
          </div>

          <div className="statemini">
            <span className="u-caption">Error — per section, with retry</span>
            <div className="statemini__body">
              <Alert variant="error" title="Couldn't load exam results">
                Something went wrong fetching released results.
                <div style={{marginTop:'var(--space-3)'}}><Button variant="ghost" size="sm" leadingIcon={<Icon name="refresh-cw" size={14}/>}>Retry</Button></div>
              </Alert>
            </div>
          </div>
        </div>
      </section>

    </div>
  );
}
/* ==/SPA-VIEW== */

function App(){ return (<ParentShell active="results"><ExamResultsView/></ParentShell>); }
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
