<style>
/* card-only global reset — composer ignores anything outside the SPA markers */
body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}
html,body,#root,.appshell{height:100%}

/* ==SPA-STYLE:child-progress== */
.v-child-progress{display:flex;flex-direction:column;gap:var(--space-6);max-width:var(--content-max)}

/* selector + header */
.v-child-progress .cp-selector{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap}
.v-child-progress .cp-selector__label{font-size:var(--text-xs);font-family:var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.v-child-progress .cp-head{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap}
.v-child-progress .cp-head__id{display:flex;align-items:center;gap:var(--space-3)}
.v-child-progress .cp-head__name{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-4xl);line-height:var(--leading-4xl);letter-spacing:-.02em;margin:0}
.v-child-progress .cp-head__sub{font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-2);display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
.v-child-progress .cp-head__sub .u-mono{font-family:var(--font-mono);color:var(--text-muted)}

/* stat strip */
.v-child-progress .cp-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4)}
.v-child-progress .cp-stat{position:relative}
.v-child-progress .cp-stat .stat{height:100%}
.v-child-progress .cp-stat__cap{font-size:var(--text-2xs);color:var(--text-muted);margin-top:var(--space-2);display:flex;align-items:center;gap:var(--space-1)}
.v-child-progress .cp-stat__cap--warn{color:var(--status-warning)}
.v-child-progress .cp-stat__cap .u-mono{font-family:var(--font-mono)}

/* generic card chrome */
.v-child-progress .cp-card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1)}
.v-child-progress .cp-card__head{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-3);padding:var(--space-5) var(--space-5) var(--space-3)}
.v-child-progress .cp-card__title{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);line-height:var(--leading-lg);letter-spacing:-.01em;margin:0}
.v-child-progress .cp-card__sub{font-size:var(--text-xs);color:var(--text-secondary);margin-top:2px}
.v-child-progress .cp-card__body{padding:var(--space-2) var(--space-5) var(--space-5)}

/* two-column strengths/weaknesses */
.v-child-progress .cp-two{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6);align-items:stretch}
.v-child-progress .cp-sw{display:flex;flex-direction:column;gap:var(--space-3)}
.v-child-progress .cp-sw__label{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-secondary)}
.v-child-progress .cp-sw__label--strong{color:var(--status-success)}
.v-child-progress .cp-sw__label--weak{color:var(--status-warning)}
.v-child-progress .cp-chips{display:flex;flex-wrap:wrap;gap:var(--space-2)}

/* trends grouped bar chart */
.v-child-progress .cp-chart{padding:var(--space-2) var(--space-5) var(--space-5)}
.v-child-progress .cp-bars{display:flex;align-items:flex-end;gap:var(--space-3);height:180px;padding:var(--space-4);background:var(--bg-surface-sunken);border-radius:var(--radius-md)}
.v-child-progress .cp-bars__col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:var(--space-2);height:100%}
.v-child-progress .cp-bars__stack{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center;gap:var(--space-1)}
.v-child-progress .cp-bars__bar{width:50%;max-width:22px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:var(--brand-primary);transition:height var(--dur-slow) var(--ease-entrance)}
.v-child-progress .cp-bars__bar--spark{background:var(--spark)}
.v-child-progress .cp-bars__lbl{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);text-align:center}
.v-child-progress .cp-bars__val{font-size:var(--text-2xs);font-family:var(--font-mono);color:var(--text-secondary)}
.v-child-progress .cp-legend{display:flex;gap:var(--space-4);flex-wrap:wrap;margin-top:var(--space-3);font-size:var(--text-2xs);color:var(--text-muted)}
.v-child-progress .cp-legend__item{display:inline-flex;align-items:center;gap:var(--space-2)}
.v-child-progress .cp-legend__swatch{width:12px;height:12px;border-radius:var(--radius-sm)}
.v-child-progress .cp-legend__swatch--brand{background:var(--brand-primary)}
.v-child-progress .cp-legend__swatch--spark{background:var(--spark)}

/* subject breakdown */
.v-child-progress .cp-subjects{display:flex;flex-direction:column;gap:var(--space-4);padding:var(--space-2) var(--space-5) var(--space-5)}
.v-child-progress .cp-subj{display:grid;grid-template-columns:1.4fr 3fr auto;gap:var(--space-4);align-items:center}
.v-child-progress .cp-subj__name{font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-primary)}
.v-child-progress .cp-subj__num{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-secondary);min-width:42px;text-align:right}

/* recommendations */
.v-child-progress .cp-recs{display:flex;flex-direction:column;gap:var(--space-3);padding:var(--space-2) var(--space-5) var(--space-5)}
.v-child-progress .cp-rec{display:flex;gap:var(--space-3);padding:var(--space-4);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken)}
.v-child-progress .cp-rec__ico{flex:0 0 auto;width:32px;height:32px;border-radius:var(--radius-md);display:grid;place-items:center;background:var(--brand-subtle);color:var(--brand-primary)}
.v-child-progress .cp-rec__main{flex:1;min-width:0}
.v-child-progress .cp-rec__title{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-primary)}
.v-child-progress .cp-rec__body{font-size:var(--text-xs);color:var(--text-secondary);margin-top:2px;line-height:var(--leading-sm)}

/* timeline exam rows */
.v-child-progress .cp-acts{display:flex;flex-direction:column;padding:0 var(--space-5) var(--space-3)}
.v-child-progress .cp-act{display:flex;align-items:center;gap:var(--space-3);width:100%;text-align:left;background:transparent;border:none;border-top:1px solid var(--border-subtle);padding:var(--space-4) var(--space-2);cursor:pointer;color:inherit;font-family:var(--font-ui);transition:background-color var(--dur-fast) var(--ease-standard)}
.v-child-progress .cp-act:first-child{border-top:none}
.v-child-progress .cp-act:hover{background:var(--bg-surface-sunken)}
.v-child-progress .cp-act:focus-visible{outline:none;box-shadow:var(--ring-focus);border-radius:var(--radius-sm)}
.v-child-progress .cp-act__ico{flex:0 0 auto;width:30px;height:30px;border-radius:var(--radius-md);display:grid;place-items:center;background:var(--bg-surface-sunken);color:var(--text-secondary)}
.v-child-progress .cp-act__ico--ok{background:var(--status-success-subtle);color:var(--status-success)}
.v-child-progress .cp-act__ico--warn{background:var(--status-warning-subtle);color:var(--status-warning)}
.v-child-progress .cp-act__main{flex:1;min-width:0}
.v-child-progress .cp-act__label{font-size:var(--text-sm);color:var(--text-primary)}
.v-child-progress .cp-act__time{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);margin-top:2px}
.v-child-progress .cp-act__chev{flex:0 0 auto;color:var(--text-muted)}

.v-child-progress .u-mono{font-family:var(--font-mono)}
.v-child-progress .cp-srtable{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

@media (prefers-reduced-motion: reduce){
  .v-child-progress .cp-bars__bar,.v-child-progress .cp-act{transition:none}
}
/* ==/SPA-STYLE== */
</style>

<body><div id="root"></div>
<script type="text/babel">
const { Icon, Button, IconButton, Avatar, Badge, Chip, Tabs, Alert,
  Stat, ProgressBar, NavItem } = window.LvlupV0DesignSystem_5d0725;
const { useState } = React;
const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

function go(hash){ if(hash) window.location.hash = hash; }

/* ---------- per-child sample data (server-derived, released-only) ---------- */
const CHILDREN = {
  aarav: {
    id:'aarav', name:'Aarav Sharma', initials:'AS', grade:9, avg:82, streak:12,
    spaces:78, examsTaken:9, spacesDone:'2 / 3', atRisk:false,
    strengths:['Arrays & Hashing','Dynamic Programming','Linear Equations'],
    weaknesses:['Graph Traversal','Trigonometry'],
    trend:{ labels:['Feb','Mar','Apr','May','Jun','Jul'], values:[71,74,78,76,80,84],
            summary:'Last 6 released exam scores for Aarav Sharma, trending up from 71 to 84 percent.' },
    subjects:[ {name:'DSA',pct:84}, {name:'Mathematics',pct:80}, {name:'Physics',pct:79} ],
    activity:[
      {id:'e1',kind:'exam',ico:'clipboard-check',tone:'ok',label:'Scored 84% on DSA · Mid-term',time:'Jul 12, 2026',href:'#/children/aarav/results/ex_midterm'},
      {id:'e2',kind:'space',ico:'orbit',tone:'',label:'Completed Mathematics · Quadratics story point',time:'Jul 9, 2026',href:'#/children/aarav/results'},
      {id:'e3',kind:'exam',ico:'clipboard-check',tone:'ok',label:'Scored 79% on Physics · Unit Test',time:'Jul 4, 2026',href:'#/children/aarav/results/ex_midterm'},
    ],
  },
  diya: {
    id:'diya', name:'Diya Sharma', initials:'DS', grade:7, avg:61, streak:0,
    spaces:44, examsTaken:6, spacesDone:'1 / 3', atRisk:true,
    riskReasons:['Average dropped below 65% over the last 3 released exams','No activity streak — inactive 8 days','Space completion stalled at 44%'],
    strengths:['Fractions','Reading Comprehension'],
    weaknesses:['Algebra Basics','Chemical Reactions','Grammar'],
    trend:{ labels:['Feb','Mar','Apr','May','Jun','Jul'], values:[68,64,61,59,62,58],
            summary:'Last 6 released exam scores for Diya Sharma, trending down from 68 to 58 percent.' },
    subjects:[ {name:'Mathematics',pct:54}, {name:'Science',pct:61}, {name:'English',pct:67} ],
    activity:[
      {id:'e1',kind:'exam',ico:'clipboard-check',tone:'warn',label:'Scored 58% on Mathematics · Mid-term',time:'Jul 11, 2026',href:'#/children/diya/results/ex_midterm'},
      {id:'e2',kind:'exam',ico:'clipboard-check',tone:'',label:'Scored 67% on English · Unit Test',time:'Jul 3, 2026',href:'#/children/diya/results/ex_midterm'},
      {id:'e3',kind:'space',ico:'orbit',tone:'',label:'Paused Science · Acids & Bases space',time:'Jun 28, 2026',href:'#/children/diya/results'},
    ],
  },
};

/* generic, rule-based guidance (NOT AI / not student-specific) */
const GUIDANCE = {
  aarav:[
    { ico:'trending-up', title:'Keep the momentum on DSA', body:'Aarav is above class average. A short weekly practice set helps consolidate Graph Traversal, the one soft spot.' },
    { ico:'flame', title:'Protect the streak', body:'A 12-day streak correlates with steady scores. A 15-minute daily session keeps it alive over the holidays.' },
  ],
  diya:[
    { ico:'life-buoy', title:'Prioritise Algebra Basics', body:'Released results show Algebra as the largest gap. A focused revision block before the next unit can lift the average.' },
    { ico:'calendar-clock', title:'Re-establish a routine', body:'Activity has paused for 8 days. Short, regular sessions tend to recover momentum faster than long catch-ups.' },
    { ico:'message-circle', title:'Consider a check-in with the teacher', body:'When average dips below 65%, a quick conversation with the subject teacher often surfaces a specific fix.' },
  ],
};

/* ---------- trend chart (composed, tokens only) ---------- */
function TrendChart({ series, spark }){
  const max = Math.max(...series.values, 100);
  return (
    <div className="cp-chart">
      <div className="cp-bars" role="img" aria-label={series.summary}>
        {series.values.map((v,i)=>(
          <div className="cp-bars__col" key={series.labels[i]+i}>
            <span className="cp-bars__val" aria-hidden="true">{v}%</span>
            <div className="cp-bars__stack">
              <div className={"cp-bars__bar"+(spark?" cp-bars__bar--spark":"")}
                   style={{height:(v/max*100)+'%'}} title={series.labels[i]+': '+v+'%'}/>
            </div>
            <span className="cp-bars__lbl">{series.labels[i]}</span>
          </div>
        ))}
      </div>
      <div className="cp-legend">
        <span className="cp-legend__item"><span className={"cp-legend__swatch "+(spark?"cp-legend__swatch--spark":"cp-legend__swatch--brand")}/> Released exam score</span>
        <span className="cp-legend__item"><Icon name="info" size={12}/> Released results only · last 6 exams</span>
      </div>
      <table className="cp-srtable">
        <caption>{series.summary}</caption>
        <thead><tr><th>Exam period</th><th>Score</th></tr></thead>
        <tbody>{series.values.map((v,i)=>(<tr key={i}><td>{series.labels[i]}</td><td>{v}%</td></tr>))}</tbody>
      </table>
    </div>
  );
}

/* ==SPA-VIEW:child-progress== */
function ChildProgressView(){
  const [childId,setChildId] = useState('aarav');
  const c = CHILDREN[childId];
  const guidance = GUIDANCE[childId];

  const Body = (
    <div style={{display:'flex',flexDirection:'column',gap:'var(--space-6)',marginTop:'var(--space-5)'}}>

      {/* header */}
      <div className="cp-head">
        <div className="cp-head__id">
          <Avatar initials={c.initials} size="lg"/>
          <div>
            <h1 className="cp-head__name">{c.name}</h1>
            <div className="cp-head__sub">
              Grade {c.grade} · Beacon Hill Academy <span className="u-mono">BHA-204</span>
              {c.atRisk
                ? <Badge variant="warning" icon={<Icon name="alert-triangle" size={12}/>}>Watch</Badge>
                : <Badge variant="success" icon={<Icon name="check" size={12}/>}>On track</Badge>}
            </div>
          </div>
        </div>
        <Button variant="secondary" leadingIcon={<Icon name="download" size={16}/>} onClick={()=>go('#/children/'+c.id+'/results')}>Download report</Button>
      </div>

      {/* at-risk banner */}
      {c.atRisk && (
        <Alert variant="error" title={c.name + ' needs attention'}>
          <div style={{marginBottom:'var(--space-2)'}}>The nightly review flagged this child based on released results and activity:</div>
          <ul style={{margin:0,paddingLeft:'var(--space-5)',display:'flex',flexDirection:'column',gap:'var(--space-1)'}}>
            {c.riskReasons.map((r,i)=>(<li key={i} style={{fontSize:'var(--text-sm)'}}>{r}</li>))}
          </ul>
        </Alert>
      )}

      {/* stat strip */}
      <div className="cp-stats" role="group" aria-label="Key metrics for this child">
        <div className="cp-stat" aria-label={"Overall score: "+c.avg+" percent"}>
          <Stat label="Overall score" value={c.avg+'%'}/>
          <div className="cp-stat__cap"><Icon name="server" size={12}/> released results only</div>
        </div>
        <div className="cp-stat" aria-label={"Exams taken: "+c.examsTaken}>
          <Stat label="Exams taken" value={String(c.examsTaken)}/>
          <div className="cp-stat__cap"><Icon name="clipboard-check" size={12}/> graded &amp; released</div>
        </div>
        <div className="cp-stat" aria-label={"Spaces completed: "+c.spacesDone}>
          <Stat label="Spaces completed" value={c.spacesDone}/>
          <div className="cp-stat__cap"><Icon name="orbit" size={12}/> <span className="u-mono">{c.spaces}%</span> overall</div>
        </div>
        <div className="cp-stat" aria-label={"Current streak: "+c.streak+" days"}>
          <Stat label="Current streak" value={c.streak+'d'}/>
          <div className={"cp-stat__cap"+(c.streak===0?" cp-stat__cap--warn":"")}>
            {c.streak===0 ? <><Icon name="alert-triangle" size={12}/> inactive — no streak</> : <><Icon name="flame" size={12}/> active daily</>}
          </div>
        </div>
      </div>

      {/* strengths vs weaknesses */}
      <section className="cp-card" aria-labelledby={"sw-"+c.id}>
        <div className="cp-card__head">
          <div>
            <h2 className="cp-card__title" id={"sw-"+c.id}>Strengths &amp; areas to watch</h2>
            <div className="cp-card__sub">Derived from released exam topics — answer keys are never shown to parents.</div>
          </div>
        </div>
        <div className="cp-card__body cp-two">
          <div className="cp-sw">
            <div className="cp-sw__label cp-sw__label--strong"><Icon name="thumbs-up" size={15}/> Strong in</div>
            <div className="cp-chips">
              {c.strengths.map(s=>(<Chip key={s} active><Icon name="check" size={12}/> {s}</Chip>))}
            </div>
          </div>
          <div className="cp-sw">
            <div className="cp-sw__label cp-sw__label--weak"><Icon name="target" size={15}/> Needs work</div>
            <div className="cp-chips">
              {c.weaknesses.map(w=>(<Badge key={w} variant="warning" icon={<Icon name="x" size={12}/>}>{w}</Badge>))}
            </div>
          </div>
        </div>
      </section>

      {/* trends */}
      <section className="cp-card" aria-labelledby={"tr-"+c.id}>
        <div className="cp-card__head">
          <div>
            <h2 className="cp-card__title" id={"tr-"+c.id}>Performance trends</h2>
            <div className="cp-card__sub">Last 6 released exam scores</div>
          </div>
          <Badge variant={c.atRisk?'warning':'success'} icon={<Icon name={c.atRisk?'trending-down':'trending-up'} size={12}/>}>
            {c.atRisk?'Trending down':'Trending up'}
          </Badge>
        </div>
        <TrendChart series={c.trend} spark={c.atRisk}/>
      </section>

      {/* subject breakdown */}
      <section className="cp-card" aria-labelledby={"sb-"+c.id}>
        <div className="cp-card__head">
          <div>
            <h2 className="cp-card__title" id={"sb-"+c.id}>Subject breakdown</h2>
            <div className="cp-card__sub">Released exam average per subject</div>
          </div>
        </div>
        <div className="cp-subjects">
          {c.subjects.map(s=>(
            <div className="cp-subj" key={s.name} aria-label={s.name+': '+s.pct+' percent'}>
              <span className="cp-subj__name">{s.name}</span>
              <ProgressBar value={s.pct} variant={s.pct>=80?'success':s.pct<60?'warning':undefined}/>
              <span className="cp-subj__num">{s.pct}%</span>
            </div>
          ))}
        </div>
      </section>

      {/* recommendations — generic guidance */}
      <section className="cp-card" aria-labelledby={"rec-"+c.id}>
        <div className="cp-card__head">
          <div>
            <h2 className="cp-card__title" id={"rec-"+c.id}>Recommendations</h2>
            <div className="cp-card__sub">Generic guidance · rule-based, not personalised AI advice</div>
          </div>
          <Badge variant="info" icon={<Icon name="info" size={12}/>}>Generic guidance</Badge>
        </div>
        <div className="cp-recs">
          {guidance.map((g,i)=>(
            <div className="cp-rec" key={i}>
              <span className="cp-rec__ico"><Icon name={g.ico} size={16}/></span>
              <div className="cp-rec__main">
                <div className="cp-rec__title">{g.title}</div>
                <div className="cp-rec__body">{g.body}</div>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* recent activity timeline */}
      <section className="cp-card" aria-labelledby={"act-"+c.id}>
        <div className="cp-card__head">
          <div>
            <h2 className="cp-card__title" id={"act-"+c.id}>Recent activity</h2>
            <div className="cp-card__sub">Released results &amp; space milestones</div>
          </div>
          <Button variant="ghost" size="sm" trailingIcon={<Icon name="arrow-right" size={15}/>} onClick={()=>go('#/children/'+c.id+'/results')}>All results</Button>
        </div>
        <div className="cp-acts">
          {c.activity.map(a=>(
            <button className="cp-act" key={a.id} onClick={()=>go(a.href)} aria-label={a.label+' · '+a.time}>
              <span className={"cp-act__ico"+(a.tone?" cp-act__ico--"+a.tone:"")}><Icon name={a.ico} size={15}/></span>
              <span className="cp-act__main">
                <span className="cp-act__label">{a.label}</span>
                <span className="cp-act__time">{a.time}</span>
              </span>
              <span className="cp-act__chev"><Icon name="chevron-right" size={18}/></span>
            </button>
          ))}
        </div>
      </section>

    </div>
  );

  return (
    <div className="v-child-progress">
      <div className="cp-selector">
        <span className="cp-selector__label">Viewing</span>
        <Tabs
          pill
          defaultIndex={0}
          onChange={(i)=>setChildId(i===0?'aarav':'diya')}
          items={[
            { label:'Aarav', content:Body },
            { label:'Diya',  content:Body },
          ]}
        />
      </div>
    </div>
  );
}
/* ==/SPA-VIEW== */

/* ==PARENT-SHELL (verbatim, do not edit)== */
function ParentShell(props){
  const a = props.active;
  return (
    <div className="appshell" style={{height:'100vh'}}>
      <aside className="appshell__sidebar">
