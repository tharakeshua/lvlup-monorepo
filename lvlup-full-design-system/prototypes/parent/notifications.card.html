<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* card-only global resets (composer ignores these — kept OUTSIDE the SPA markers) */
body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}

/* ==SPA-STYLE:notifications== */
.v-notifications{max-width:var(--reading-max);margin:0 auto;display:flex;flex-direction:column;gap:var(--space-6)}

/* page header */
.v-notifications .pagehead{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap}
.v-notifications .pagehead__l{min-width:0}
.v-notifications .pagehead h1{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-4xl);line-height:var(--leading-4xl);letter-spacing:-.02em;margin:0;display:flex;align-items:center;gap:var(--space-3)}
.v-notifications .pagehead__sub{font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-2);display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
.v-notifications .pagehead__sub .u-mono{font-family:var(--font-mono);color:var(--text-muted)}

/* filter chip row */
.v-notifications .filterrow{display:flex;align-items:center;gap:var(--space-2)}
.v-notifications .fchip{display:inline-flex;align-items:center;gap:var(--space-2);border:1px solid var(--border-subtle);background:var(--bg-surface);color:var(--text-secondary);font-family:var(--font-ui);font-size:var(--text-sm);font-weight:var(--weight-medium);padding:var(--space-2) var(--space-4);border-radius:var(--radius-pill);cursor:pointer;transition:background-color var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard)}
.v-notifications .fchip:hover{color:var(--text-primary);border-color:var(--border-strong)}
.v-notifications .fchip:focus-visible{outline:none;box-shadow:var(--ring-focus)}
.v-notifications .fchip--on{background:var(--brand-subtle);border-color:var(--brand-primary);color:var(--text-primary)}

/* feed card */
.v-notifications .feed{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden}

/* notification row */
.v-notifications .nrow{display:flex;align-items:flex-start;gap:var(--space-3);width:100%;text-align:left;background:transparent;border:none;border-top:1px solid var(--border-subtle);padding:var(--space-4) var(--space-5) var(--space-4) var(--space-3);cursor:pointer;color:inherit;font-family:var(--font-ui);transition:background-color var(--dur-fast) var(--ease-standard)}
.v-notifications .nrow:first-child{border-top:none}
.v-notifications .nrow:hover{background:var(--bg-surface-sunken)}
.v-notifications .nrow:focus-visible{outline:none;box-shadow:var(--ring-focus);border-radius:var(--radius-sm)}
.v-notifications .nrow--unread{background:var(--bg-surface-sunken)}
.v-notifications .nrow__dotcol{flex:0 0 auto;width:10px;display:flex;justify-content:center;padding-top:14px}
.v-notifications .ndot{width:8px;height:8px;border-radius:var(--radius-pill);background:var(--brand-primary)}
.v-notifications .nrow__chip{flex:0 0 auto;width:34px;height:34px;border-radius:var(--radius-md);display:grid;place-items:center;background:var(--bg-surface-sunken);color:var(--text-secondary)}
.v-notifications .nrow__chip--warn{background:var(--status-warning-subtle);color:var(--status-warning)}
.v-notifications .nrow__chip--info{background:var(--status-info-subtle);color:var(--status-info)}
.v-notifications .nrow__chip--ok{background:var(--status-success-subtle);color:var(--status-success)}
.v-notifications .nrow__main{flex:1 1 auto;min-width:0}
.v-notifications .nrow__title{font-size:var(--text-sm);color:var(--text-primary);line-height:var(--leading-sm)}
.v-notifications .nrow--read .nrow__title{font-weight:var(--weight-regular);color:var(--text-secondary)}
.v-notifications .nrow--unread .nrow__title{font-weight:var(--weight-semibold)}
.v-notifications .nrow__meta{display:flex;align-items:center;gap:var(--space-2);margin-top:var(--space-1);flex-wrap:wrap}
.v-notifications .nrow__time{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
.v-notifications .nrow__act{display:inline-flex;align-items:center;gap:var(--space-1);font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--brand-primary)}
.v-notifications .nrow__right{flex:0 0 auto;display:flex;align-items:center;padding-top:var(--space-1);color:var(--text-muted)}

/* empty host */
.v-notifications .feed__empty{padding:var(--space-10) var(--space-5)}

@media (prefers-reduced-motion: reduce){.v-notifications .nrow{transition:none}}
/* ==/SPA-STYLE== */
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { Icon, Button, IconButton, Avatar, Badge, Chip, EmptyState, AtRiskBadge, NavItem } = window.LvlupV0DesignSystem_5d0725;
const { useState } = React;

function go(h){ if(h) window.location.hash = h; }

/* ---- type registry: icon + tone + deep-link (released-only, recipient-scoped) ---- */
const TYPE = {
  'exam-result':  { icon:'graduation-cap', tone:'ok',   action:'View results',      href:'#/children/aarav/results/ex_midterm' },
  'at-risk':      { icon:'alert-triangle', tone:'warn',  action:'View alerts',       href:'#/alerts' },
  'announcement': { icon:'megaphone',      tone:'info',  action:'View announcement', href:'#/announcements' },
  'digest':       { icon:'mail',           tone:'info',  action:'Open progress',     href:'#/progress' },
};

/* ---- seed feed (server-derived, reverse-chron) ---- */
const SEED = [
  { id:'n1', type:'exam-result',  read:false, title:'Midterm results released for Aarav — "Data Structures".', time:'2h ago' },
  { id:'n2', type:'at-risk',      read:false, title:'Diya Sharma was flagged at-risk by the nightly review.',   time:'5h ago', risk:true },
  { id:'n3', type:'announcement', read:false, title:'Parent–Teacher Meeting announced for Grade 9.',            time:'1d ago' },
  { id:'n4', type:'exam-result',  read:true,  title:'Unit Test results released for Diya — "Mathematics".',     time:'2d ago' },
  { id:'n5', type:'digest',       read:true,  title:'Your weekly progress digest for Aarav and Diya is ready.', time:'3d ago' },
  { id:'n6', type:'announcement', read:true,  title:'Beacon Hill Academy posted a holiday calendar update.',    time:'5d ago' },
];

/* ==SPA-VIEW:notifications== */
function NotificationsView(){
  const [items,setItems] = useState(SEED);
  const [filter,setFilter] = useState('all'); // all | unread

  const unread = items.filter(n=>!n.read).length;
  const markRead = (id)=> setItems(prev=>prev.map(n=> n.id===id ? {...n, read:true} : n));
  const markAll  = ()=> setItems(prev=>prev.map(n=> ({...n, read:true})));
  const openRow  = (n)=>{ markRead(n.id); go(TYPE[n.type].href); };

  const shown = filter==='unread' ? items.filter(n=>!n.read) : items;

  return (
    <div className="v-notifications">

      <div className="pagehead">
        <div className="pagehead__l">
          <h1>Notifications {unread>0 && <Badge variant="brand">{unread} new</Badge>}</h1>
          <div className="pagehead__sub">
            <Icon name="server" size={14}/> Updates about Aarav and Diya · released results only · school <span className="u-mono">BHA-204</span>
          </div>
        </div>
        <Button variant="ghost" leadingIcon={<Icon name="check-check" size={16}/>} disabled={unread===0} onClick={markAll}>Mark all read</Button>
      </div>

      <div className="filterrow" role="group" aria-label="Filter notifications">
        <button type="button" className={'fchip'+(filter==='all'?' fchip--on':'')} aria-pressed={filter==='all'} onClick={()=>setFilter('all')}>
          <Icon name="inbox" size={14}/> All <span className="u-mono" style={{fontFamily:'var(--font-mono)',color:'var(--text-muted)'}}>{items.length}</span>
        </button>
        <button type="button" className={'fchip'+(filter==='unread'?' fchip--on':'')} aria-pressed={filter==='unread'} onClick={()=>setFilter('unread')}>
          <Icon name="circle-dot" size={14}/> Unread {unread>0 && <Badge variant="brand">{unread}</Badge>}
        </button>
      </div>

      <div className="feed" aria-live="polite">
        {shown.length===0 ? (
          <div className="feed__empty">
            <EmptyState icon="check-circle-2" title="You're all caught up"
              body="No unread notifications about Aarav or Diya right now."/>
          </div>
        ) : (
          <ul role="list" style={{margin:0,padding:0,listStyle:'none'}}>
            {shown.map(n=>{
              const t = TYPE[n.type];
              const label = (n.read?'':'Unread — ')+n.title+' '+t.action+'. '+n.time;
              return (
                <li key={n.id} role="listitem">
                  <button type="button" className={'nrow '+(n.read?'nrow--read':'nrow--unread')} aria-label={label} onClick={()=>openRow(n)}>
                    <span className="nrow__dotcol" aria-hidden="true">{!n.read && <span className="ndot"/>}</span>
                    <span className={'nrow__chip nrow__chip--'+t.tone} aria-hidden="true"><Icon name={t.icon} size={17}/></span>
                    <span className="nrow__main">
                      <span className="nrow__title">{n.title}</span>
                      <span className="nrow__meta">
                        {n.risk && <AtRiskBadge level="watch">Watch</AtRiskBadge>}
                        <span className="nrow__time">{n.time}</span>
                        <span className="nrow__act">{t.action} <Icon name="arrow-right" size={13}/></span>
                      </span>
                    </span>
                    <span className="nrow__right" aria-hidden="true"><Icon name="chevron-right" size={18}/></span>
                  </button>
                </li>
              );
            })}
          </ul>
        )}
      </div>

    </div>
  );
}
/* ==/SPA-VIEW== */

/* ==PARENT-SHELL (verbatim)== */
function ParentShell(props){
  const a = props.active;
  return (
    <div className="appshell" style={{height:'100vh'}}>
      <aside className="appshell__sidebar">
        <div className="sidebar__brand"><div className="sidebar__brand-mark">B</div><div className="sidebar__brand-name">Beacon Hill</div></div>
        <nav className="sidebar__nav" aria-label="Primary">
          <div className="sidebar__section-label">Overview</div>
          <NavItem icon="layout-dashboard" href="#/" active={a==='dashboard'}>Dashboard</NavItem>
          <NavItem icon="alert-triangle" href="#/alerts" active={a==='alerts'} badge={<Badge variant="error">1</Badge>}>Alerts</NavItem>
          <NavItem icon="megaphone" href="#/announcements" active={a==='announcements'}>Announcements</NavItem>
          <div className="sidebar__section-label">My Children</div>
          <NavItem icon="users" href="#/children" active={a==='children'}>Children</NavItem>
          <NavItem icon="trending-up" href="#/children/aarav/progress" active={a==='progress'}>Progress</NavItem>
          <NavItem icon="clipboard-check" href="#/children/aarav/results" active={a==='results'}>Exam Results</NavItem>
          <NavItem icon="orbit" href="#/progress" active={a==='spaces'}>Space Progress</NavItem>
          <NavItem icon="git-compare" href="#/compare" active={a==='compare'}>Compare</NavItem>
          <div className="sidebar__section-label">Account</div>
          <NavItem icon="bell" href="#/notifications" active={a==='notifications'}>Notifications</NavItem>
          <NavItem icon="settings" href="#/settings" active={a==='settings'}>Settings</NavItem>
        </nav>
      </aside>
      <header className="appshell__topbar">
        <button className="chip" aria-haspopup="menu"><Avatar initials="BH" size="sm"/>Beacon Hill Academy<Icon name="chevron-down" size={14}/></button>
        <button className="chip" aria-haspopup="menu"><Avatar initials="AS" size="sm"/>Aarav Sharma<Icon name="chevron-down" size={14}/></button>
        <div style={{flex:1}}></div>
        <IconButton icon={<Icon name="bell" size={20}/>} label="Notifications"/>
        <IconButton icon={<Icon name="sun" size={20}/>} label="Toggle theme"/>
        <Avatar initials="AS"/>
      </header>
      <main className="appshell__main" id="main">{props.children}</main>
    </div>
  );
}

function App(){ return (<ParentShell active="notifications"><NotificationsView/></ParentShell>); }
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
