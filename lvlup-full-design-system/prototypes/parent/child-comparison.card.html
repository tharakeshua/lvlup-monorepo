<!-- @dsCard group="Parent" viewport="1440x940" name="Child Comparison" subtitle="Side-by-side across children" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* card-only global resets (composer ignores these) */
body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}

/* ==SPA-STYLE:child-comparison== */
.v-child-comparison{max-width:var(--content-max);margin:0 auto;display:flex;flex-direction:column;gap:var(--space-8)}

/* page header */
.v-child-comparison .pagehead{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap}
.v-child-comparison .pagehead h1{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-4xl);line-height:var(--leading-4xl);letter-spacing:-.02em;margin:0}
.v-child-comparison .pagehead__sub{font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-2);display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
.v-child-comparison .pagehead__sub .u-mono{font-family:var(--font-mono);color:var(--text-muted)}

/* card chrome */
.v-child-comparison .dcard{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1)}
.v-child-comparison .dcard__head{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-3);padding:var(--space-5) var(--space-5) var(--space-3)}
.v-child-comparison .dcard__title{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);line-height:var(--leading-lg);letter-spacing:-.01em;margin:0}
.v-child-comparison .dcard__sub{font-size:var(--text-xs);color:var(--text-secondary);margin-top:2px}
.v-child-comparison .dcard__body{padding:0 var(--space-5) var(--space-5)}

/* two child columns */
.v-child-comparison .kids{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6);align-items:stretch}
.v-child-comparison .kid{display:flex;flex-direction:column;gap:var(--space-4);align-items:flex-start;text-align:left;width:100%;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-5);cursor:pointer;color:inherit;font-family:var(--font-ui);transition:box-shadow var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard)}
.v-child-comparison .kid:hover{box-shadow:var(--shadow-e2);border-color:var(--border-strong)}
.v-child-comparison .kid:focus-visible{outline:none;box-shadow:var(--ring-focus)}
.v-child-comparison .kid__id{display:flex;align-items:center;gap:var(--space-3);width:100%}
.v-child-comparison .kid__name{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-xl);line-height:var(--leading-xl);letter-spacing:-.01em;color:var(--text-primary)}
.v-child-comparison .kid__grade{font-size:var(--text-xs);color:var(--text-muted);font-family:var(--font-mono);margin-top:2px}
.v-child-comparison .kid__flag{margin-left:auto}
.v-child-comparison .kid__ring{display:flex;align-items:center;gap:var(--space-5);width:100%}
.v-child-comparison .kid__ringmeta{display:flex;flex-direction:column;gap:var(--space-1)}
.v-child-comparison .kid__ringlab{font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.v-child-comparison .kid__ringnote{font-size:var(--text-xs);color:var(--text-secondary);display:flex;align-items:center;gap:var(--space-1)}
.v-child-comparison .kid__chev{margin-left:auto;color:var(--text-muted)}

/* comparison table best-cell */
.v-child-comparison .cmpcell{display:inline-flex;align-items:center;gap:var(--space-2);font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-primary)}
.v-child-comparison .cmpcell--best{background:var(--status-success-subtle);color:var(--status-success);border-radius:var(--radius-pill);padding:2px var(--space-3);font-weight:var(--weight-semibold)}
.v-child-comparison .cmpcell--best .lucide{color:var(--status-success)}
.v-child-comparison .cmprow-lab{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-primary);font-weight:var(--weight-medium)}
.v-child-comparison .cmprow-lab .lucide{color:var(--text-muted)}

/* grouped bar chart */
.v-child-comparison .legend{display:flex;align-items:center;gap:var(--space-4);font-size:var(--text-xs);color:var(--text-secondary)}
.v-child-comparison .legend__item{display:inline-flex;align-items:center;gap:var(--space-2)}
.v-child-comparison .legend__sw{width:12px;height:12px;border-radius:var(--radius-sm)}
.v-child-comparison .legend__sw--a{background:var(--brand-primary)}
.v-child-comparison .legend__sw--b{background:var(--spark)}
.v-child-comparison .barchart{display:flex;flex-direction:column;gap:var(--space-5);padding-top:var(--space-4)}
.v-child-comparison .barrow{display:grid;grid-template-columns:140px 1fr;align-items:center;gap:var(--space-4)}
.v-child-comparison .barrow__name{font-size:var(--text-sm);color:var(--text-primary);font-weight:var(--weight-medium)}
.v-child-comparison .bargroup{display:flex;flex-direction:column;gap:var(--space-2)}
.v-child-comparison .barline{display:flex;align-items:center;gap:var(--space-3)}
.v-child-comparison .barline__who{flex:0 0 44px;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
.v-child-comparison .barline__track{flex:1 1 auto;height:14px;border-radius:var(--radius-pill);background:var(--bg-surface-sunken);overflow:hidden}
.v-child-comparison .barline__fill{height:100%;border-radius:var(--radius-pill)}
.v-child-comparison .barline__fill--a{background:var(--brand-primary)}
.v-child-comparison .barline__fill--b{background:var(--spark)}
.v-child-comparison .barline__val{flex:0 0 40px;text-align:right;font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-primary);font-weight:var(--weight-medium)}

.v-child-comparison .dcard__stamp{display:inline-flex;align-items:center;gap:var(--space-1);font-size:var(--text-2xs);color:var(--text-muted)}
.v-child-comparison .dcard__stamp .u-mono{font-family:var(--font-mono)}
.v-child-comparison .u-mono{font-family:var(--font-mono)}

@media (prefers-reduced-motion: reduce){.v-child-comparison .kid{transition:none}}
/* ==/SPA-STYLE== */
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { Icon, Button, Avatar, Badge, AtRiskBadge, ProgressRing, DataTable } = window.LvlupV0DesignSystem_5d0725;

function go(hash){ if(hash) window.location.hash = hash; }

/* ---------- sample data (server-derived, released-only, read-only) ---------- */
const KIDS = [
  { id:'aarav', name:'Aarav Sharma', initials:'AS', grade:'Grade 9', avg:82, atRisk:false },
  { id:'diya',  name:'Diya Sharma',  initials:'DS', grade:'Grade 7', avg:61, atRisk:true  },
];

/* metric rows — `best` marks which column is the best performer (server-computed) */
const METRICS = [
  { key:'avg',     icon:'percent',          label:'Avg score',        aarav:'82%', diya:'61%',   best:'aarav' },
  { key:'exams',   icon:'clipboard-check',  label:'Exams taken',      aarav:'6',   diya:'4',     best:null    },
  { key:'spaces',  icon:'orbit',            label:'Spaces completed', aarav:'78%', diya:'44%',   best:'aarav' },
  { key:'streak',  icon:'flame',            label:'Streak (days)',    aarav:'12',  diya:'0',     best:'aarav' },
  { key:'risk',    icon:'shield-check',     label:'At-risk',          aarav:'No',  diya:'Watch', best:'aarav' },
];

/* per-subject averages (released graded activity only) */
const SUBJECTS = [
  { name:'Mathematics', aarav:79, diya:58 },
  { name:'Science',     aarav:84, diya:63 },
  { name:'English',     aarav:80, diya:66 },
];

/* ---------- best-aware cell ---------- */
function Cmp(props){
  if(props.best){
    return <span className="cmpcell cmpcell--best"><Icon name="check" size={14}/>{props.children}<span style={{fontSize:'var(--text-2xs)',fontWeight:'var(--weight-medium)'}}>Best</span></span>;
  }
  return <span className="cmpcell">{props.children}</span>;
}

/* ==SPA-VIEW:child-comparison== */
function CompareView(){
  const columns = [
    { label:'Metric', key:'label', render:(row)=>(<span className="cmprow-lab"><Icon name={row.icon} size={15}/>{row.label}</span>) },
    { label:'Aarav', key:'aarav', numeric:true, render:(row)=>(<Cmp best={row.best==='aarav'}>{row.aarav}</Cmp>) },
    { label:'Diya',  key:'diya',  numeric:true, render:(row)=>(<Cmp best={row.best==='diya'}>{row.diya}</Cmp>) },
  ];
  return (
    <div className="v-child-comparison">

      <div className="pagehead">
        <div>
          <h1>Compare Children</h1>
          <div className="pagehead__sub">
            <span>Side-by-side · released results only · answer keys never shown.</span>
            <span className="dcard__stamp"><Icon name="server" size={12}/> Updated <span className="u-mono">2h ago</span></span>
          </div>
        </div>
        <Button variant="ghost" trailingIcon={<Icon name="arrow-right" size={16}/>} onClick={()=>go('#/children')}>View all children</Button>
      </div>

      {/* two child columns */}
      <div className="kids" role="group" aria-label="Children being compared">
        {KIDS.map(k=>(
          <button key={k.id} className="kid"
            onClick={()=>go('#/children/'+k.id+'/progress')}
            aria-label={k.name + ', ' + k.grade + ', average ' + k.avg + ' percent' + (k.atRisk?', watch — needs attention':', not at risk') + '. View progress.'}>
            <div className="kid__id">
              <Avatar initials={k.initials} size="lg"/>
              <div>
                <div className="kid__name">{k.name}</div>
                <div className="kid__grade">{k.grade}</div>
              </div>
              {k.atRisk
                ? <span className="kid__flag"><AtRiskBadge level="watch">Watch</AtRiskBadge></span>
                : <span className="kid__flag"><Badge variant="success" icon={<Icon name="check" size={12}/>}>On track</Badge></span>}
            </div>
            <div className="kid__ring">
              <ProgressRing value={k.avg} label={k.avg+'%'} size={120}/>
              <div className="kid__ringmeta">
                <span className="kid__ringlab">Avg score</span>
                <span className="kid__ringnote"><Icon name="server" size={12}/> released results</span>
              </div>
              <span className="kid__chev"><Icon name="chevron-right" size={18}/></span>
            </div>
          </button>
        ))}
      </div>

      {/* metric comparison table */}
      <section className="dcard" aria-labelledby="cmp-title">
        <div className="dcard__head">
          <div>
            <h2 className="dcard__title" id="cmp-title">Metric comparison</h2>
            <div className="dcard__sub">Best performer per metric is highlighted · server-computed, not recalculated here</div>
          </div>
          <span className="dcard__stamp"><Icon name="git-compare" size={12}/> Aarav vs Diya</span>
        </div>
        <div className="dcard__body">
          <DataTable columns={columns} rows={METRICS}/>
          <div className="legend" style={{marginTop:'var(--space-4)'}}>
            <span className="legend__item"><span className="cmpcell cmpcell--best" style={{padding:'2px 8px'}}><Icon name="check" size={12}/>Best</span> leading child</span>
            <span className="legend__item"><Icon name="server" size={12}/> released-only metrics</span>
          </div>
        </div>
      </section>

      {/* grouped bar chart — subject averages */}
      <section className="dcard" aria-labelledby="subj-title">
        <div className="dcard__head">
          <div>
            <h2 className="dcard__title" id="subj-title">Subject averages</h2>
            <div className="dcard__sub">Average across released graded activity · per subject</div>
          </div>
          <div className="legend">
            <span className="legend__item"><span className="legend__sw legend__sw--a"></span> Aarav</span>
            <span className="legend__item"><span className="legend__sw legend__sw--b"></span> Diya</span>
          </div>
        </div>
        <div className="dcard__body">
          <div className="barchart" role="img" aria-label="Subject averages, Aarav vs Diya. Mathematics: Aarav 79 percent, Diya 58. Science: Aarav 84, Diya 63. English: Aarav 80, Diya 66. Aarav leads in every subject.">
            {SUBJECTS.map((s,i)=>(
              <div className="barrow" key={i}>
                <span className="barrow__name">{s.name}</span>
                <div className="bargroup">
                  <div className="barline">
                    <span className="barline__who">Aarav</span>
                    <span className="barline__track"><span className="barline__fill barline__fill--a" style={{width:s.aarav+'%'}}></span></span>
                    <span className="barline__val">{s.aarav}%</span>
                  </div>
                  <div className="barline">
                    <span className="barline__who">Diya</span>
                    <span className="barline__track"><span className="barline__fill barline__fill--b" style={{width:s.diya+'%'}}></span></span>
                    <span className="barline__val">{s.diya}%</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div className="dcard__stamp" style={{marginTop:'var(--space-4)'}}>
            <Icon name="info" size={12}/> Requires <span className="u-mono">≥2</span> children — satisfied. View per-child detail via
            <Button variant="ghost" size="sm" trailingIcon={<Icon name="arrow-up-right" size={13}/>} onClick={()=>go('#/children/aarav/results')}>Exam results</Button>
          </div>
        </div>
      </section>

    </div>
  );
}
/* ==/SPA-VIEW== */

/* ==PARENT-SHELL (verbatim, do not edit)== */
function ParentShell(props){
  const a = props.active;
  return (
    <div className="appshell" style={{height:'100vh'}}>
      <aside className="appshell__sidebar">
        <div className="sidebar__brand"><div className="sidebar__brand-mark">B</div><div className="sidebar__brand-name">Beacon Hill</div></div>
        <nav className="sidebar__nav" aria-label="Primary">
          <div className="sidebar__section-label">Overview</div>
          <NavItem icon="layout-dashboard" href="#/" active={a==='dashboard'}>Dashboard</NavItem>
          <NavItem icon="alert-triangle" href="#/alerts" active={a==='alerts'} badge={<Badge variant="error">1</Badge>}>Alerts</NavItem>
          <NavItem icon="megaphone" href="#/announcements" active={a==='announcements'}>Announcements</NavItem>
          <div className="sidebar__section-label">My Children</div>
          <NavItem icon="users" href="#/children" active={a==='children'}>Children</NavItem>
          <NavItem icon="trending-up" href="#/children/aarav/progress" active={a==='progress'}>Progress</NavItem>
          <NavItem icon="clipboard-check" href="#/children/aarav/results" active={a==='results'}>Exam Results</NavItem>
          <NavItem icon="orbit" href="#/progress" active={a==='spaces'}>Space Progress</NavItem>
          <NavItem icon="git-compare" href="#/compare" active={a==='compare'}>Compare</NavItem>
          <div className="sidebar__section-label">Account</div>
          <NavItem icon="bell" href="#/notifications" active={a==='notifications'}>Notifications</NavItem>
          <NavItem icon="settings" href="#/settings" active={a==='settings'}>Settings</NavItem>
        </nav>
      </aside>
      <header className="appshell__topbar">
        <button className="chip" aria-haspopup="menu"><Avatar initials="BH" size="sm"/>Beacon Hill Academy<Icon name="chevron-down" size={14}/></button>
        <button className="chip" aria-haspopup="menu"><Avatar initials="AS" size="sm"/>Aarav Sharma<Icon name="chevron-down" size={14}/></button>
        <div style={{flex:1}}></div>
        <IconButton icon={<Icon name="bell" size={20}/>} label="Notifications"/>
        <IconButton icon={<Icon name="sun" size={20}/>} label="Toggle theme"/>
        <Avatar initials="AS"/>
      </header>
      <main className="appshell__main" id="main">{props.children}</main>
    </div>
  );
}

const { IconButton, NavItem } = window.LvlupV0DesignSystem_5d0725;

function App(){ return (<ParentShell active="compare"><CompareView/></ParentShell>); }
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
