<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}
.appshell__main{overflow:auto}

/* ==SPA-STYLE:performance-alerts== */
.v-performance-alerts{display:flex;flex-direction:column;gap:var(--space-8);max-width:var(--content-max);margin:0 auto}

.v-performance-alerts .pa-head{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap}
.v-performance-alerts .pa-head__title{font-family:var(--font-display);font-size:var(--text-4xl);line-height:var(--leading-4xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);margin:0}
.v-performance-alerts .pa-head__sub{font-size:var(--text-base);color:var(--text-secondary);margin:var(--space-2) 0 0}
.v-performance-alerts .pa-head__meta{display:flex;align-items:center;gap:var(--space-3);margin-top:var(--space-3);flex-wrap:wrap}
.v-performance-alerts .pa-lastupd{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--text-muted)}
.v-performance-alerts .pa-lastupd .u-mono{font-family:var(--font-mono)}
.v-performance-alerts .pa-servertag{display:inline-flex;align-items:center;gap:var(--space-1);font-size:var(--text-2xs);font-family:var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:var(--tracking-caption);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:1px var(--space-2)}
.v-performance-alerts .pa-dot{color:var(--text-muted)}

.v-performance-alerts .pa-filters{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
.v-performance-alerts .pa-filters__lbl{font-size:var(--text-2xs);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:var(--tracking-caption);color:var(--text-muted);margin-right:var(--space-1)}

.v-performance-alerts .pa-list{display:flex;flex-direction:column;gap:var(--space-3);list-style:none;margin:0;padding:0}
.v-performance-alerts .pa-row{display:flex;align-items:center;gap:var(--space-4);width:100%;text-align:left;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-4) var(--space-5);cursor:pointer;color:inherit;font-family:var(--font-ui);transition:box-shadow var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard)}
.v-performance-alerts .pa-row:hover{box-shadow:var(--shadow-e2);border-color:var(--border-strong)}
.v-performance-alerts .pa-row:focus-visible{outline:none;box-shadow:var(--ring-focus)}
.v-performance-alerts .pa-row__ico{flex:0 0 auto;width:40px;height:40px;border-radius:var(--radius-md);display:grid;place-items:center;background:var(--bg-surface-sunken);color:var(--text-secondary)}
.v-performance-alerts .pa-row__ico--err{background:var(--status-error-subtle);color:var(--status-error)}
.v-performance-alerts .pa-row__ico--warn{background:var(--status-warning-subtle);color:var(--status-warning)}
.v-performance-alerts .pa-row__ico--info{background:var(--status-info-subtle);color:var(--status-info)}
.v-performance-alerts .pa-row__ico--ok{background:var(--status-success-subtle);color:var(--status-success)}
.v-performance-alerts .pa-row__main{flex:1 1 auto;min-width:0}
.v-performance-alerts .pa-row__title{font-size:var(--text-base);font-weight:var(--weight-medium);color:var(--text-primary);display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;line-height:var(--leading-base)}
.v-performance-alerts .pa-row__meta{font-size:var(--text-sm);color:var(--text-secondary);margin-top:2px}
.v-performance-alerts .pa-row__meta .u-mono{font-family:var(--font-mono);color:var(--text-primary)}
.v-performance-alerts .pa-row__sev{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-2xs);font-weight:var(--weight-medium);padding:1px var(--space-2);border-radius:var(--radius-pill);text-transform:uppercase;letter-spacing:var(--tracking-caption)}
.v-performance-alerts .pa-row__sev--err{color:var(--status-error);background:var(--status-error-subtle)}
.v-performance-alerts .pa-row__sev--warn{color:var(--status-warning);background:var(--status-warning-subtle)}
.v-performance-alerts .pa-row__sev--info{color:var(--status-info);background:var(--status-info-subtle)}
.v-performance-alerts .pa-row__sev--ok{color:var(--status-success);background:var(--status-success-subtle)}
.v-performance-alerts .pa-row__act{flex:0 0 auto}
.v-performance-alerts .pa-row__chev{flex:0 0 auto;color:var(--text-muted)}

.v-performance-alerts .pa-empty{background:var(--bg-surface);border:1px dashed var(--border-strong);border-radius:var(--radius-lg);padding:var(--space-6);display:flex;justify-content:center}

.v-performance-alerts .pa-states__grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--space-5)}
.v-performance-alerts .pa-states__mini{border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3)}
.v-performance-alerts .pa-skelrow{display:flex;align-items:center;gap:var(--space-3)}
.v-performance-alerts .pa-skelrow__col{flex:1;display:flex;flex-direction:column;gap:var(--space-2)}
.v-performance-alerts .u-caption{font-size:var(--text-2xs);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:var(--tracking-caption);color:var(--text-muted)}

@media (prefers-reduced-motion: reduce){.v-performance-alerts .pa-row{transition:none}}
/* ==/SPA-STYLE== */
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { Icon, Button, IconButton, Avatar, Badge, Chip, Skeleton, Alert, EmptyState,
  AtRiskBadge, NavItem } = window.LvlupV0DesignSystem_5d0725;
const { useState } = React;

function go(hash){ if(hash) window.location.hash = hash; }

/* ==PARENT-SHELL (verbatim, do not edit)== */
function ParentShell(props){
  const a = props.active;
  return (
    <div className="appshell" style={{height:'100vh'}}>
      <aside className="appshell__sidebar">
        <div className="sidebar__brand"><div className="sidebar__brand-mark">B</div><div className="sidebar__brand-name">Beacon Hill</div></div>
        <nav className="sidebar__nav" aria-label="Primary">
          <div className="sidebar__section-label">Overview</div>
          <NavItem icon="layout-dashboard" href="#/" active={a==='dashboard'}>Dashboard</NavItem>
          <NavItem icon="alert-triangle" href="#/alerts" active={a==='alerts'} badge={<Badge variant="error">1</Badge>}>Alerts</NavItem>
          <NavItem icon="megaphone" href="#/announcements" active={a==='announcements'}>Announcements</NavItem>
          <div className="sidebar__section-label">My Children</div>
          <NavItem icon="users" href="#/children" active={a==='children'}>Children</NavItem>
          <NavItem icon="trending-up" href="#/children/aarav/progress" active={a==='progress'}>Progress</NavItem>
          <NavItem icon="clipboard-check" href="#/children/aarav/results" active={a==='results'}>Exam Results</NavItem>
          <NavItem icon="orbit" href="#/progress" active={a==='spaces'}>Space Progress</NavItem>
          <NavItem icon="git-compare" href="#/compare" active={a==='compare'}>Compare</NavItem>
          <div className="sidebar__section-label">Account</div>
          <NavItem icon="bell" href="#/notifications" active={a==='notifications'}>Notifications</NavItem>
          <NavItem icon="settings" href="#/settings" active={a==='settings'}>Settings</NavItem>
        </nav>
      </aside>
      <header className="appshell__topbar">
        <button className="chip" aria-haspopup="menu"><Avatar initials="BH" size="sm"/>Beacon Hill Academy<Icon name="chevron-down" size={14}/></button>
        <button className="chip" aria-haspopup="menu"><Avatar initials="AS" size="sm"/>Aarav Sharma<Icon name="chevron-down" size={14}/></button>
        <div style={{flex:1}}></div>
        <IconButton icon={<Icon name="bell" size={20}/>} label="Notifications"/>
        <IconButton icon={<Icon name="sun" size={20}/>} label="Toggle theme"/>
        <Avatar initials="AS"/>
      </header>
      <main className="appshell__main" id="main">{props.children}</main>
    </div>
  );
}

/* ---- sample data (server-derived; nightly review + analytics; released-only) ---- */
const ALERTS = [
  { id:'al1', child:'diya', sev:'err', ico:'alert-triangle', sevLabel:'At risk',
    title:'Diya is at risk', badge:'watch',
    meta:'Declining scores · 0-day streak · 44% space completion',
    actLabel:'View progress', actIco:'trending-up', href:'#/children/diya/progress' },
  { id:'al2', child:'diya', sev:'warn', ico:'circle-alert', sevLabel:'Low score',
    title:'Diya — Mathematics', badge:null,
    meta:'Released exam score 48% · below 60% threshold',
    actLabel:'View results', actIco:'clipboard-check', href:'#/children/aarav/results' },
  { id:'al3', child:'diya', sev:'warn', ico:'bar-chart-2', sevLabel:'Low completion',
    title:'Diya — Science space', badge:null,
    meta:'44% complete · pace behind class average',
    actLabel:'View space', actIco:'orbit', href:'#/progress' },
  { id:'al4', child:'diya', sev:'info', ico:'clock', sevLabel:'No activity',
    title:'Diya — 0-day streak', badge:null,
    meta:'No learning activity recorded in the last 7 days',
    actLabel:'View progress', actIco:'trending-up', href:'#/children/diya/progress' },
  { id:'al5', child:'aarav', sev:'ok', ico:'check-circle', sevLabel:'On track',
    title:'Aarav is on track', badge:null,
    meta:'82% average · 12-day streak · 78% space completion',
    actLabel:'View progress', actIco:'trending-up', href:'#/children/aarav/progress' },
];

const FILTERS = [
  { id:'all',   label:'All' },
  { id:'aarav', label:'Aarav' },
  { id:'diya',  label:'Diya' },
];

/* ==SPA-VIEW:performance-alerts== */
function AlertsView(){
  const [filter, setFilter] = useState('all');
  const rows = ALERTS.filter(function(r){ return filter==='all' || r.child===filter; });
  const actionable = ALERTS.filter(function(r){ return r.sev!=='ok'; }).length;

  return (
    <div className="v-performance-alerts">

      <header className="pa-head">
        <div>
          <h1 className="pa-head__title">Alerts</h1>
          <p className="pa-head__sub">Performance alerts across your children, derived from the nightly review.</p>
          <div className="pa-head__meta">
            <span className="pa-lastupd"><Icon name="clock" size={13}/>Updated <span className="u-mono">6 hours ago</span></span>
            <span className="pa-dot">·</span>
            <span className="pa-servertag"><Icon name="server" size={10}/>Nightly</span>
            <span className="pa-dot">·</span>
            <Badge variant="error"><Icon name="alert-triangle" size={12}/> {actionable} need attention</Badge>
          </div>
        </div>
        <Button variant="secondary" leadingIcon={<Icon name="refresh-cw" size={16}/>} onClick={function(){ go('#/alerts'); }}>Refresh</Button>
      </header>

      <div className="pa-filters" role="group" aria-label="Filter alerts by child">
        <span className="pa-filters__lbl">Child</span>
        {FILTERS.map(function(f){
          return <Chip key={f.id} active={filter===f.id} aria-pressed={filter===f.id}
            onClick={function(){ setFilter(f.id); }}>{f.label}</Chip>;
        })}
      </div>

      {rows.length>0 ? (
        <ul className="pa-list" role="list">
          {rows.map(function(r){
            return (
              <li key={r.id} role="listitem">
                <button className="pa-row" onClick={function(){ go(r.href); }}
                  aria-label={r.title+' — '+r.sevLabel+'. '+r.meta}>
                  <span className={'pa-row__ico pa-row__ico--'+r.sev} aria-hidden="true"><Icon name={r.ico} size={20}/></span>
                  <span className="pa-row__main">
                    <span className="pa-row__title">
                      {r.title}
                      {r.badge==='watch' && <AtRiskBadge level="watch">At-risk</AtRiskBadge>}
                      <span className={'pa-row__sev pa-row__sev--'+r.sev}><Icon name={r.ico} size={11}/>{r.sevLabel}</span>
                    </span>
                    <span className="pa-row__meta">{r.meta}</span>
                  </span>
                  <span className="pa-row__act">
                    <Button variant="ghost" size="sm" trailingIcon={<Icon name={r.actIco} size={15}/>}
                      onClick={function(e){ e.stopPropagation(); go(r.href); }}>{r.actLabel}</Button>
                  </span>
                  <span className="pa-row__chev" aria-hidden="true"><Icon name="chevron-right" size={18}/></span>
                </button>
              </li>
            );
          })}
        </ul>
      ) : (
        <div className="pa-empty">
          <EmptyState icon="shield-check"
            title={'No alerts for '+(filter==='aarav'?'Aarav':'Diya')}
            body="Nothing flagged right now. We'll surface anything the nightly review picks up."/>
        </div>
      )}

      {/* ---- States rail (spec'd readiness / empty / error variants) ---- */}
      <section aria-labelledby="pa-states-title">
        <h2 className="pa-head__title" id="pa-states-title" style={{fontSize:'var(--text-xl)',marginBottom:'var(--space-2)'}}>States</h2>
        <div className="pa-states__grid">

          <div className="pa-states__mini">
            <span className="u-caption">Loading · skeleton</span>
            <div className="pa-skelrow"><Skeleton variant="circle" width="40px" height="40px"/><div className="pa-skelrow__col"><Skeleton width="48%"/><Skeleton width="68%" height="0.6rem"/></div><Skeleton width="96px"/></div>
            <div className="pa-skelrow"><Skeleton variant="circle" width="40px" height="40px"/><div className="pa-skelrow__col"><Skeleton width="40%"/><Skeleton width="56%" height="0.6rem"/></div><Skeleton width="96px"/></div>
          </div>

          <div className="pa-states__mini">
            <span className="u-caption">Empty · no alerts (happy path)</span>
            <EmptyState icon="shield-check" title="All clear — no alerts"
              body="Neither child is flagged by the nightly review right now."/>
          </div>

          <div className="pa-states__mini">
            <span className="u-caption">Empty · filtered child on track</span>
            <EmptyState icon="check-circle" title="No alerts for Aarav"
              body="Aarav is on track. Nothing needs your attention."/>
          </div>

          <div className="pa-states__mini">
            <span className="u-caption">Error · alerts read failed</span>
            <Alert variant="error" title="Couldn't load alerts">
              Something went wrong fetching alerts.
              <div style={{marginTop:'var(--space-3)'}}><Button variant="secondary" size="sm" leadingIcon={<Icon name="refresh-cw" size={14}/>} onClick={function(){ go('#/alerts'); }}>Retry</Button></div>
            </Alert>
          </div>

        </div>
      </section>

    </div>
  );
}
/* ==/SPA-VIEW== */

function App(){ return (<ParentShell active="alerts"><AlertsView/></ParentShell>); }
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
