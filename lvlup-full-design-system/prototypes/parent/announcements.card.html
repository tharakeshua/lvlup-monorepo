<!-- @dsCard group="Parent" viewport="1440x940" name="Announcements" subtitle="School & class announcements (read)" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* card-only global resets (composer ignores these) */
body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}

/* ==SPA-STYLE:announcements== */
.v-announcements{max-width:var(--reading-max);margin:0 auto;display:flex;flex-direction:column;gap:var(--space-6)}

/* page header */
.v-announcements .pagehead{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap}
.v-announcements .pagehead h1{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-4xl);line-height:var(--leading-4xl);letter-spacing:-.02em;margin:0}
.v-announcements .pagehead__sub{font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-2)}
.v-announcements .pagehead__sub .u-mono{font-family:var(--font-mono);color:var(--text-muted)}

/* filter chips */
.v-announcements .filters{display:flex;flex-wrap:wrap;gap:var(--space-2)}

/* featured / pinned card */
.v-announcements .acard{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1)}
.v-announcements .feat{border:1px solid var(--border-strong);box-shadow:var(--shadow-e2);position:relative;overflow:hidden}
.v-announcements .feat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brand-primary)}
.v-announcements .feat__pad{padding:var(--space-5) var(--space-6)}
.v-announcements .feat__tags{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-3)}
.v-announcements .feat__title{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-2xl);line-height:var(--leading-2xl);letter-spacing:-.01em;margin:0}
.v-announcements .feat__meta{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--text-secondary);margin-top:var(--space-2)}
.v-announcements .feat__meta .u-mono{font-family:var(--font-mono);color:var(--text-muted)}
.v-announcements .feat__body{font-size:var(--text-sm);line-height:var(--leading-base);color:var(--text-secondary);margin-top:var(--space-4);max-width:var(--reading-max)}

/* recency group */
.v-announcements .grouplabel{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin:var(--space-2) 0 var(--space-2) var(--space-1)}

/* feed accordion */
.v-announcements .feed{display:flex;flex-direction:column}
.v-announcements .acc-item{border-top:1px solid var(--border-subtle)}
.v-announcements .acc-item:first-child{border-top:none}
.v-announcements .acc-trigger{display:flex;align-items:flex-start;gap:var(--space-3);width:100%;text-align:left;background:transparent;border:none;padding:var(--space-4) var(--space-5);cursor:pointer;color:inherit;font-family:var(--font-ui);transition:background-color var(--dur-fast) var(--ease-standard)}
.v-announcements .acc-trigger:hover{background:var(--bg-surface-sunken)}
.v-announcements .acc-trigger:focus-visible{outline:none;box-shadow:var(--ring-focus);border-radius:var(--radius-sm)}
.v-announcements .acc-cat{flex:0 0 auto;width:32px;height:32px;border-radius:var(--radius-md);display:grid;place-items:center;margin-top:2px}
.v-announcements .acc-cat--school{background:var(--status-info-subtle);color:var(--status-info)}
.v-announcements .acc-cat--class{background:var(--brand-subtle);color:var(--brand-primary)}
.v-announcements .acc-cat--exam{background:var(--status-success-subtle);color:var(--status-success)}
.v-announcements .acc-main{flex:1 1 auto;min-width:0}
.v-announcements .acc-tags{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-1)}
.v-announcements .acc-title{font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-primary);line-height:var(--leading-sm)}
.v-announcements .acc-meta{font-size:var(--text-xs);color:var(--text-secondary);margin-top:2px}
.v-announcements .acc-meta .u-mono{font-family:var(--font-mono);color:var(--text-muted)}
.v-announcements .acc-excerpt{font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--space-1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:520px}
.v-announcements .acc-chev{flex:0 0 auto;color:var(--text-muted);margin-top:var(--space-1);transition:transform var(--dur-fast) var(--ease-standard)}
.v-announcements .acc-chev--open{transform:rotate(90deg)}
.v-announcements .acc-panel{padding:0 var(--space-5) var(--space-5) calc(var(--space-5) + 32px + var(--space-3));font-size:var(--text-sm);line-height:var(--leading-base);color:var(--text-secondary)}
.v-announcements .acc-panel p{margin:0 0 var(--space-3)}
.v-announcements .acc-panel__cta{margin-top:var(--space-2)}

/* states rail */
.v-announcements .staterail{display:flex;flex-wrap:wrap;gap:var(--space-5);margin-top:var(--space-4)}
.v-announcements .statemini{flex:1 1 300px;min-width:280px;display:flex;flex-direction:column;gap:var(--space-2)}
.v-announcements .statemini__body{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:var(--space-4);min-height:140px;display:flex;flex-direction:column;gap:var(--space-3);justify-content:center}
.v-announcements .sk-row{display:flex;align-items:center;gap:var(--space-3)}
.v-announcements .u-caption{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.v-announcements .u-mono{font-family:var(--font-mono)}

@media (prefers-reduced-motion: reduce){
  .v-announcements .acc-trigger,.v-announcements .acc-chev{transition:none}
}
/* ==/SPA-STYLE== */
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { Icon, Button, IconButton, Avatar, Badge, Chip, Skeleton, Alert, EmptyState, NavItem } = window.LvlupV0DesignSystem_5d0725;
const { useState } = React;

function go(hash){ if(hash) window.location.hash = hash; }

/* ==PARENT-SHELL (verbatim, do not edit)== */
function ParentShell(props){
  const a = props.active;
  return (
    <div className="appshell" style={{height:'100vh'}}>
      <aside className="appshell__sidebar">
        <div className="sidebar__brand"><div className="sidebar__brand-mark">B</div><div className="sidebar__brand-name">Beacon Hill</div></div>
        <nav className="sidebar__nav" aria-label="Primary">
          <div className="sidebar__section-label">Overview</div>
          <NavItem icon="layout-dashboard" href="#/" active={a==='dashboard'}>Dashboard</NavItem>
          <NavItem icon="alert-triangle" href="#/alerts" active={a==='alerts'} badge={<Badge variant="error">1</Badge>}>Alerts</NavItem>
          <NavItem icon="megaphone" href="#/announcements" active={a==='announcements'}>Announcements</NavItem>
          <div className="sidebar__section-label">My Children</div>
          <NavItem icon="users" href="#/children" active={a==='children'}>Children</NavItem>
          <NavItem icon="trending-up" href="#/children/aarav/progress" active={a==='progress'}>Progress</NavItem>
          <NavItem icon="clipboard-check" href="#/children/aarav/results" active={a==='results'}>Exam Results</NavItem>
          <NavItem icon="orbit" href="#/progress" active={a==='spaces'}>Space Progress</NavItem>
          <NavItem icon="git-compare" href="#/compare" active={a==='compare'}>Compare</NavItem>
          <div className="sidebar__section-label">Account</div>
          <NavItem icon="bell" href="#/notifications" active={a==='notifications'}>Notifications</NavItem>
          <NavItem icon="settings" href="#/settings" active={a==='settings'}>Settings</NavItem>
        </nav>
      </aside>
      <header className="appshell__topbar">
        <button className="chip" aria-haspopup="menu"><Avatar initials="BH" size="sm"/>Beacon Hill Academy<Icon name="chevron-down" size={14}/></button>
        <button className="chip" aria-haspopup="menu"><Avatar initials="AS" size="sm"/>Aarav Sharma<Icon name="chevron-down" size={14}/></button>
        <div style={{flex:1}}></div>
        <IconButton icon={<Icon name="bell" size={20}/>} label="Notifications"/>
        <IconButton icon={<Icon name="sun" size={20}/>} label="Toggle theme"/>
        <Avatar initials="AS"/>
      </header>
      <main className="appshell__main" id="main">{props.children}</main>
    </div>
  );
}

/* ==SPA-VIEW:announcements== */
/* ---------- sample data (server-authoritative, read-only) ---------- */
const FEATURED = {
  id:'ann_ptm', cat:'school', catLabel:'School',
  title:'Parent-Teacher Meeting — June 28',
  author:"Principal's Office", date:'12 Jun 2026',
  body:"You're invited to the term-end Parent-Teacher Meeting on Saturday, June 28, from 9:00 AM to 1:00 PM in the main academic block. Slots are allotted per class; your assigned time will appear under Notifications. Please bring your school code BHA-204 for check-in. Teachers will discuss released results and term progress only — no new assessments are scheduled during this window."
};

const FEED = [
  { id:'ann_dsa', group:'This week', cat:'exam', catLabel:'Exam',
    title:'Grade 9 DSA unit exam results released',
    author:'Mr. Rao', date:'18 Jun 2026',
    excerpt:'Results for the Data Structures unit test are now available for your child.',
    body:[
      "Results for the Grade 9 Data Structures & Algorithms unit test have been released and are now visible on each child's Exam Results page.",
      "Only released, summary-level scores are shown to parents. Answer keys and per-question solutions remain with the class teacher and are not published here."
    ],
    cta:{ label:'View released results', hash:'#/children/aarav/results/ex_midterm' } },
  { id:'ann_annualday', group:'This week', cat:'class', catLabel:'Class',
    title:'Annual Day rehearsals',
    author:'Ms. Kapoor', date:'17 Jun 2026',
    excerpt:'Rehearsals begin next week; participation is optional and after school hours.',
    body:[
      "Annual Day rehearsals for Grade 9 sections begin Monday and run after regular school hours through the week.",
      "Participation is optional. Students taking part should be picked up by 5:30 PM. No academic sessions are affected."
    ] },
  { id:'ann_library', group:'Earlier', cat:'school', catLabel:'School',
    title:'Library timings updated for summer term',
    author:'Library Desk', date:'10 Jun 2026',
    excerpt:'The library will now open 8:00 AM–4:00 PM on all working days.',
    body:[
      "The school library has revised its hours for the summer term and will operate from 8:00 AM to 4:00 PM on all working days.",
      "Borrowed titles may be renewed once at the front desk."
    ] },
  { id:'ann_fees', group:'Earlier', cat:'school', catLabel:'School',
    title:'Fee receipt portal maintenance window',
    author:'Accounts Office', date:'06 Jun 2026',
    excerpt:'The receipts portal will be briefly unavailable this Sunday morning.',
    body:[
      "The online fee receipt portal will be unavailable for scheduled maintenance this Sunday from 6:00 AM to 8:00 AM.",
      "No action is required from parents. Existing receipts remain valid."
    ] }
];

const FILTERS = [
  { key:'all', label:'All', icon:'list' },
  { key:'school', label:'School', icon:'school' },
  { key:'class', label:'Class', icon:'users' },
  { key:'exam', label:'Exam', icon:'clipboard-check' }
];

const CAT_ICON = { school:'school', class:'users', exam:'clipboard-check' };
const CAT_BADGE = { school:'info', class:'brand', exam:'success' };

function FilterChips({active, onChange}){
  return (
    <div className="filters" role="group" aria-label="Filter announcements by category">
      {FILTERS.map(f=>(
        <Chip key={f.key} active={active===f.key} aria-pressed={active===f.key}
          onClick={()=>onChange(f.key)}>
          <Icon name={f.icon} size={13}/> {f.label}
        </Chip>
      ))}
    </div>
  );
}

function FeaturedCard(){
  return (
    <section className="acard feat" aria-labelledby="feat-title">
      <div className="feat__pad">
        <div className="feat__tags">
          <Badge variant="spark" icon={<Icon name="pin" size={12}/>}>Pinned</Badge>
          <Badge variant={CAT_BADGE[FEATURED.cat]} icon={<Icon name={CAT_ICON[FEATURED.cat]} size={12}/>}>{FEATURED.catLabel}</Badge>
        </div>
        <h2 className="feat__title" id="feat-title">{FEATURED.title}</h2>
        <div className="feat__meta">
          <Icon name="user" size={13}/> {FEATURED.author}
          <span aria-hidden="true">·</span>
          <span className="u-mono">{FEATURED.date}</span>
        </div>
        <p className="feat__body">{FEATURED.body}</p>
      </div>
    </section>
  );
}

function FeedAccordion({items, openId, onToggle}){
  let lastGroup = null;
  const out = [];
  items.forEach(it=>{
    if(it.group !== lastGroup){
      lastGroup = it.group;
      out.push(<div key={'g_'+it.group} className="grouplabel">{it.group}</div>);
    }
    const isOpen = openId === it.id;
    const panelId = 'panel_'+it.id;
    out.push(
      <div className="acard" key={it.id}>
        <div className="acc-item">
          <button className="acc-trigger" aria-expanded={isOpen} aria-controls={panelId}
            onClick={()=>onToggle(it.id)}>
            <span className={'acc-cat acc-cat--'+it.cat}><Icon name={CAT_ICON[it.cat]} size={16}/></span>
            <span className="acc-main">
              <span className="acc-tags">
                <Badge variant={CAT_BADGE[it.cat]} icon={<Icon name={CAT_ICON[it.cat]} size={11}/>}>{it.catLabel}</Badge>
              </span>
              <span className="acc-title">{it.title}</span>
              <span className="acc-meta"><Icon name="user" size={11}/> {it.author} <span aria-hidden="true">·</span> <span className="u-mono">{it.date}</span></span>
              {!isOpen && <span className="acc-excerpt">{it.excerpt}</span>}
            </span>
            <span className={'acc-chev'+(isOpen?' acc-chev--open':'')}><Icon name="chevron-right" size={18}/></span>
          </button>
          {isOpen && (
            <div className="acc-panel" id={panelId} role="region" aria-label={it.title}>
              {it.body.map((p,i)=><p key={i}>{p}</p>)}
              {it.cta && (
                <div className="acc-panel__cta">
                  <Button variant="ghost" size="sm" trailingIcon={<Icon name="arrow-right" size={15}/>}
                    onClick={()=>go(it.cta.hash)}>{it.cta.label}</Button>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    );
  });
  return <div className="feed">{out}</div>;
}

function StatesRail(){
  return (
    <section aria-labelledby="states-title">
      <h2 className="grouplabel" id="states-title" style={{fontSize:'var(--text-2xs)'}}>States reference</h2>
      <div className="staterail">
        <div className="statemini">
          <span className="u-caption">Loading</span>
          <div className="statemini__body">
            <Skeleton variant="text" width="50%" height={14}/>
            <div className="sk-row"><Skeleton variant="circle" width={28} height={28}/><Skeleton variant="text" width="70%" height={12}/></div>
            <div className="sk-row"><Skeleton variant="circle" width={28} height={28}/><Skeleton variant="text" width="60%" height={12}/></div>
          </div>
        </div>
        <div className="statemini">
          <span className="u-caption">Empty — none</span>
          <div className="statemini__body">
            <EmptyState icon="megaphone" title="No announcements yet"
              body="When Beacon Hill posts updates, they'll appear here."/>
          </div>
        </div>
        <div className="statemini">
          <span className="u-caption">Empty — filtered</span>
          <div className="statemini__body">
            <EmptyState icon="filter" title="No Exam announcements"
              body="Try a different category or clear the filter."/>
          </div>
        </div>
        <div className="statemini">
          <span className="u-caption">Error</span>
          <div className="statemini__body">
            <Alert variant="error" title="Couldn't load announcements">
              Something went wrong fetching this feed.
              <div style={{marginTop:'var(--space-3)'}}><Button variant="ghost" size="sm" leadingIcon={<Icon name="refresh-cw" size={14}/>}>Retry</Button></div>
            </Alert>
          </div>
        </div>
      </div>
    </section>
  );
}

function AnnouncementsView(){
  const [filter, setFilter] = useState('all');
  const [openId, setOpenId] = useState('ann_dsa');

  const featVisible = filter==='all' || filter===FEATURED.cat;
  const feed = FEED.filter(it => filter==='all' || it.cat===filter);
  const toggle = (id)=> setOpenId(prev=> prev===id ? null : id);
  const isEmpty = !featVisible && feed.length===0;

  return (
    <div className="v-announcements">
      <div className="pagehead">
        <div>
          <h1>Announcements</h1>
          <div className="pagehead__sub">Updates from Beacon Hill Academy · <span className="u-mono">BHA-204</span></div>
        </div>
        <Button variant="ghost" trailingIcon={<Icon name="arrow-right" size={16}/>} onClick={()=>go('#/notifications')}>Notifications</Button>
      </div>

      <FilterChips active={filter} onChange={setFilter}/>

      {isEmpty ? (
        <div className="acard" style={{padding:'var(--space-8)'}}>
          <EmptyState icon="filter" title="No announcements in this category"
            body="Try a different category or clear the filter."
            action={<Button variant="secondary" size="sm" leadingIcon={<Icon name="x" size={14}/>} onClick={()=>setFilter('all')}>Clear filter</Button>}/>
        </div>
      ) : (
        <React.Fragment>
          {featVisible && <FeaturedCard/>}
          <FeedAccordion items={feed} openId={openId} onToggle={toggle}/>
        </React.Fragment>
      )}

      <StatesRail/>
    </div>
  );
}
/* ==/SPA-VIEW== */

function App(){ return (<ParentShell active="announcements"><AnnouncementsView/></ParentShell>); }
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
