<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* layout only — slug-prefixed, no token redefs, no hex */
.capture-review__scroll{ position:absolute; inset:0; bottom:76px; overflow-y:auto; padding:var(--space-4); }
.capture-review__header{ display:flex; align-items:flex-start; gap:var(--space-3); margin-bottom:var(--space-4); }
.capture-review__htext{ min-width:0; }
.capture-review__exam{ font-family:var(--font-display); font-size:var(--text-lg); font-weight:var(--weight-semibold);
  color:var(--text-primary); line-height:var(--leading-tight); }
.capture-review__meta{ font-size:var(--text-xs); color:var(--text-secondary); margin-top:var(--space-1); }
.capture-review__count{ font-family:var(--font-mono); font-size:var(--text-2xs); color:var(--text-muted);
  text-transform:uppercase; letter-spacing:.06em; margin-top:var(--space-1); }

.capture-review__grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:var(--space-3); }
.capture-review__tile{ position:relative; aspect-ratio:3/4; border-radius:var(--radius-md);
  border:1px solid var(--border-subtle); background:var(--bg-surface-sunken); overflow:hidden;
  display:flex; align-items:center; justify-content:center; cursor:pointer; min-height:44px;
  transition:border-color var(--dur-fast) var(--ease-standard), box-shadow var(--dur-fast) var(--ease-standard); }
.capture-review__tile:hover{ border-color:var(--border-strong); box-shadow:var(--shadow-e1); }
.capture-review__tile:focus-visible{ outline:none; box-shadow:var(--ring-focus); }
.capture-review__tile-ico{ color:var(--brand-muted); }
.capture-review__page-no{ position:absolute; left:var(--space-2); bottom:var(--space-2); }
.capture-review__tile-remove{ position:absolute; top:var(--space-1); right:var(--space-1); z-index:2; }

.capture-review__hint{ display:flex; align-items:flex-start; gap:var(--space-2);
  margin-top:var(--space-4); padding:var(--space-3); border-radius:var(--radius-md);
  background:var(--bg-surface-sunken); border:1px solid var(--border-subtle);
  font-size:var(--text-xs); color:var(--text-secondary); line-height:var(--leading-normal); }
.capture-review__hint-ico{ color:var(--text-muted); flex:0 0 auto; margin-top:2px; }
.capture-review__offline{ display:flex; align-items:flex-start; gap:var(--space-2);
  margin-top:var(--space-3); padding:var(--space-3); border-radius:var(--radius-md);
  background:var(--status-warning-subtle); border:1px solid var(--status-warning);
  font-size:var(--text-xs); color:var(--text-primary); line-height:var(--leading-normal); }
.capture-review__offline-ico{ color:var(--status-warning); flex:0 0 auto; margin-top:2px; }

.capture-review__empty{ display:flex; flex-direction:column; align-items:center; text-align:center;
  gap:var(--space-3); padding:var(--space-12) var(--space-4); color:var(--text-secondary); }
.capture-review__empty-ico{ color:var(--text-muted); }
.capture-review__empty-title{ font-family:var(--font-display); font-size:var(--text-base);
  font-weight:var(--weight-semibold); color:var(--text-primary); }

.capture-review__bar{ position:absolute; left:0; right:0; bottom:0; z-index:5;
  display:flex; align-items:center; gap:var(--space-3); padding:var(--space-3) var(--space-4);
  background:var(--bg-surface); border-top:1px solid var(--border-subtle); box-shadow:var(--shadow-e2); }
.capture-review__bar-count{ flex:1; min-width:0; }
.capture-review__bar-n{ font-family:var(--font-display); font-size:var(--text-base);
  font-weight:var(--weight-semibold); color:var(--text-primary); }
.capture-review__bar-help{ font-size:var(--text-2xs); color:var(--status-error); margin-top:2px; }

/* fullscreen viewer */
.capture-review__viewer{ display:flex; flex-direction:column; gap:var(--space-3); width:min(330px,82vw); }
.capture-review__viewer-head{ display:flex; align-items:center; justify-content:space-between; gap:var(--space-2); }
.capture-review__viewer-counter{ font-family:var(--font-mono); font-size:var(--text-xs); color:var(--text-secondary); }
.capture-review__viewer-stage{ position:relative; display:flex; align-items:center; justify-content:center;
  aspect-ratio:3/4; border-radius:var(--radius-lg); border:1px solid var(--border-subtle);
  background:var(--bg-surface-sunken); }
.capture-review__viewer-bigico{ color:var(--brand-muted); }
.capture-review__viewer-nav{ position:absolute; top:50%; transform:translateY(-50%); }
.capture-review__viewer-nav--l{ left:var(--space-2); }
.capture-review__viewer-nav--r{ right:var(--space-2); }
.capture-review__viewer-strip{ display:flex; gap:var(--space-2); overflow-x:auto; padding-bottom:var(--space-1); }
.capture-review__thumb{ flex:0 0 auto; width:48px; height:64px; border-radius:var(--radius-sm);
  border:1px solid var(--border-subtle); background:var(--bg-surface-sunken); cursor:pointer;
  display:flex; align-items:center; justify-content:center; position:relative; }
.capture-review__thumb--active{ border-color:var(--brand-primary); box-shadow:var(--ring-focus); }
.capture-review__thumb-ico{ color:var(--text-muted); }
.capture-review__thumb-no{ position:absolute; bottom:2px; right:3px; font-family:var(--font-mono);
  font-size:var(--text-2xs); color:var(--text-muted); }

/* phone frame */
.ph{ width:390px; margin:24px auto; height:844px; position:relative; display:flex; flex-direction:column;
  border:1px solid var(--border-strong); border-radius:var(--radius-xl); overflow:hidden;
  background:var(--bg-canvas); box-shadow:var(--shadow-e2); }
.ph__top{ height:52px; flex:0 0 auto; display:flex; align-items:center; gap:var(--space-3);
  padding:0 var(--space-4); background:var(--bg-surface); border-bottom:1px solid var(--border-subtle); }
.ph__brand{ display:flex; align-items:center; gap:var(--space-2); }
.ph__mark{ width:26px; height:26px; border-radius:var(--radius-sm); background:var(--brand-primary);
  color:var(--text-on-accent); display:flex; align-items:center; justify-content:center; }
.ph__title{ font-family:var(--font-display); font-size:var(--text-sm); font-weight:var(--weight-semibold);
  color:var(--text-primary); }
.ph__spacer{ flex:1; }
.ph__body{ flex:1; overflow:hidden; position:relative; }
.ph__tabs{ flex:0 0 auto; }
.capture-review__states{ display:flex; flex-wrap:wrap; gap:var(--space-4); justify-content:center;
  padding:0 var(--space-4) var(--space-12); }
.capture-review__statecap{ font-family:var(--font-mono); font-size:var(--text-2xs); color:var(--text-muted);
  text-align:center; margin-bottom:var(--space-2); text-transform:uppercase; letter-spacing:.06em; }
body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);}
</style>
</head><body><div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const LU = window.LvlupV0DesignSystem_5d0725;
const { Button, IconButton, Icon, Modal, Badge, Tabbar } = LU;

const MOCK_IMAGES = [
  { id:'p1', name:'page-01.jpg' },
  { id:'p2', name:'page-02.jpg' },
  { id:'p3', name:'page-03.jpg' },
  { id:'p4', name:'page-04.jpg' },
];

function PageViewer({ images, index, onIndex, onClose, onRemove }){
  const n = images.length;
  useEffect(()=>{
    const h = (e)=>{
      if(e.key==='Escape') onClose();
      else if(e.key==='ArrowLeft') onIndex(Math.max(0,index-1));
      else if(e.key==='ArrowRight') onIndex(Math.min(n-1,index+1));
    };
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  },[index,n,onClose,onIndex]);
  const cur = images[index] || {};
  return (
    <Modal open={true} onClose={onClose}
      title={<span className="capture-review__viewer-head">
        <span>Page {index+1}</span>
        <IconButton icon="x" label="Close viewer" size="sm" onClick={onClose} />
      </span>}
      footer={<Button variant="danger" size="sm" leadingIcon={<Icon name="trash-2" size={15}/>}
        onClick={()=>onRemove(cur.id)}>Remove page</Button>}>
      <div className="capture-review__viewer">
        <div className="capture-review__viewer-counter">Page {index+1} of {n} · {cur.name}</div>
        <div className="capture-review__viewer-stage">
          <Icon name="file-image" size={64} className="capture-review__viewer-bigico" />
          {index>0 &&
            <span className="capture-review__viewer-nav capture-review__viewer-nav--l">
              <IconButton icon="chevron-left" label="Previous page" solid onClick={()=>onIndex(index-1)} />
            </span>}
          {index<n-1 &&
            <span className="capture-review__viewer-nav capture-review__viewer-nav--r">
              <IconButton icon="chevron-right" label="Next page" solid onClick={()=>onIndex(index+1)} />
            </span>}
        </div>
        <div className="capture-review__viewer-strip">
          {images.map((im,i)=>(
            <button key={im.id} type="button" aria-label={'Go to page '+(i+1)}
              className={'capture-review__thumb'+(i===index?' capture-review__thumb--active':'')}
              onClick={()=>onIndex(i)}>
              <Icon name="file-image" size={18} className="capture-review__thumb-ico" />
              <span className="capture-review__thumb-no">{i+1}</span>
            </button>
          ))}
        </div>
      </div>
    </Modal>
  );
}

function ReviewView({ nav, params, ctx }){
  ctx = ctx || {};
  const examId = (params && params.examId) || (ctx.selectedExam && ctx.selectedExam.id) || 'EX1';
  const studentId = (params && params.studentId) || (ctx.selectedStudent && ctx.selectedStudent.id) || 'ST1';
  const examName = (ctx.selectedExam && ctx.selectedExam.name) || 'Calculus Midterm';
  const studentName = (ctx.selectedStudent && ctx.selectedStudent.name) || 'Aanya Rao';

  const ctxImages = (ctx.images && ctx.images.length) ? ctx.images : null;
  const [local, setLocal] = useState(ctxImages || MOCK_IMAGES);
  const images = ctxImages || local;

  const [viewer, setViewer] = useState(-1);
  const online = ctx.online ? ctx.online() !== false : true;
  const count = images.length;

  function applyRemove(id){
    const next = (imgs)=> imgs.filter(i=>i.id!==id);
    if(ctx.setImages) ctx.setImages(next);
    setLocal(prev=> next(prev));
    if(ctx.toast) ctx.toast({ variant:'info', title:'Page removed', body:'Remaining pages keep their order.' });
  }
  function removeAt(id){
    const idx = images.findIndex(i=>i.id===id);
    applyRemove(id);
    if(viewer>=0){
      const newLen = count-1;
      if(newLen<=0) setViewer(-1);
      else if(viewer>=newLen) setViewer(newLen-1);
      else if(idx<viewer) setViewer(viewer-1);
    }
  }
  function submit(){
    if(count===0) return;
    nav.go('#/scan/e/'+examId+'/s/'+studentId+'/done');
  }

  return (
    <>
      <div className="capture-review__scroll">
        <div className="capture-review__header">
          <IconButton icon="arrow-left" label="Back to capture" size="sm" onClick={()=>nav.back()} />
          <div className="capture-review__htext">
            <div className="capture-review__exam">{examName}</div>
            <div className="capture-review__meta">{studentName}</div>
            <div className="capture-review__count">{count} {count===1?'page':'pages'} captured</div>
          </div>
        </div>

        {count===0 ? (
          <div className="capture-review__empty">
            <Icon name="image-off" size={40} className="capture-review__empty-ico" />
            <div className="capture-review__empty-title">No pages yet</div>
            <div>Go back to capture and add at least one answer-sheet page.</div>
            <Button variant="secondary" size="sm" leadingIcon={<Icon name="camera" size={15}/>}
              onClick={()=>nav.back()}>Capture pages</Button>
          </div>
        ) : (
          <>
            <div className="capture-review__grid">
              {images.map((im,i)=>(
                <div key={im.id} className="capture-review__tile" role="button" tabIndex={0}
                  aria-label={'Open page '+(i+1)+' '+im.name}
                  onClick={()=>setViewer(i)}
                  onKeyDown={(e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); setViewer(i); } }}>
                  <Icon name="file-image" size={30} className="capture-review__tile-ico" />
                  <span className="capture-review__page-no"><Badge>{i+1}</Badge></span>
                  <span className="capture-review__tile-remove" onClick={(e)=>e.stopPropagation()}>
                    <IconButton icon="x" label={'Remove page '+(i+1)} size="sm" solid
                      onClick={()=>removeAt(im.id)} />
                  </span>
                </div>
              ))}
            </div>

            <div className="capture-review__hint">
              <Icon name="info" size={15} className="capture-review__hint-ico" />
              <span>Pages upload in the order shown. Remove and re-capture any blurry or duplicate page before submitting.</span>
            </div>

            {!online &&
              <div className="capture-review__offline">
                <Icon name="wifi-off" size={15} className="capture-review__offline-ico" />
                <span>You are offline. Pages are saved on this device and will upload automatically when you reconnect.</span>
              </div>}
          </>
        )}
      </div>

      <div className="capture-review__bar">
        <div className="capture-review__bar-count">
          <div className="capture-review__bar-n">{count} {count===1?'page':'pages'}</div>
          {count===0 && <div className="capture-review__bar-help">Add at least one page</div>}
        </div>
        <Button variant="primary" size="lg" disabled={count===0}
          leadingIcon={<Icon name={online?'send':'cloud-off'} size={16}/>}
          onClick={submit}>
          {online ? 'Submit to AutoGrade' : 'Queue for upload'}
        </Button>
      </div>

      {viewer>=0 && images[viewer] &&
        <PageViewer images={images} index={viewer}
          onIndex={setViewer} onClose={()=>setViewer(-1)} onRemove={removeAt} />}
    </>
  );
}

/* ---------- standalone Demo (phone frame + mock nav/ctx) ---------- */
function PhoneFrame({ children }){
  return (
    <div className="ph">
      <div className="ph__top">
        <div className="ph__brand">
          <span className="ph__mark"><Icon name="scan-line" size={16} /></span>
          <span className="ph__title">AutoGrade Scan</span>
        </div>
        <span className="ph__spacer" />
        <IconButton icon="settings" label="Settings" size="sm" />
      </div>
      <div className="ph__body">{children}</div>
      <div className="ph__tabs">
        <Tabbar items={[
          { icon:'camera', label:'Scan', active:true },
          { icon:'list', label:'Queue' },
          { icon:'history', label:'History' },
        ]} />
      </div>
    </div>
  );
}

function Demo(){
  const [images, setImages] = useState(MOCK_IMAGES);
  const [online] = useState(true);
  const ctx = {
    scanner:{ name:'Ravi Menon', initials:'RM', school:'Sunrise Public School', code:'SUB001' },
    selectedExam:{ id:'EX1', name:'Calculus Midterm' },
    selectedStudent:{ id:'ST1', name:'Aanya Rao' },
    images,
    setImages:(fn)=>setImages(prev=>fn(prev)),
    online:()=>online,
    toast:(t)=>console.log('toast',t),
  };
  const nav = { go:(h)=>console.log('go',h), back:()=>console.log('back') };
  const params = { examId:'EX1', studentId:'ST1' };

  return (
    <div>
      <PhoneFrame>
        <ReviewView nav={nav} params={params} ctx={ctx} />
      </PhoneFrame>

      <div className="capture-review__states">
        <div>
          <div className="capture-review__statecap">Empty — submit disabled</div>
          <div className="ph" style={{height:'420px'}}>
            <div className="ph__body">
              <ReviewView nav={nav} params={params}
                ctx={{ ...ctx, images:[], setImages:()=>{} }} />
            </div>
          </div>
        </div>
        <div>
          <div className="capture-review__statecap">Offline — queue for upload</div>
          <div className="ph" style={{height:'420px'}}>
            <div className="ph__body">
              <ReviewView nav={nav} params={params}
                ctx={{ ...ctx, images:MOCK_IMAGES.slice(0,2), setImages:()=>{}, online:()=>false }} />
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
