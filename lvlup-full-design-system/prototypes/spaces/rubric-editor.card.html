<!-- @dsCard group="Spaces" viewport="1280x820" name="Rubric Editor ★" subtitle="4 scoring modes · scope inheritance" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
html,body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);}
#root{min-height:100vh;}
*{box-sizing:border-box;}
/* ---- app shell ---- */
.sx{display:grid;grid-template-columns:248px 1fr;min-height:100vh;}
.sx-side{position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-5);background:var(--bg-surface);border-right:1px solid var(--border-subtle);padding:var(--space-5) var(--space-4);}
.sx-brand{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-1) var(--space-2);}
.sx-brand .mk{width:34px;height:34px;border-radius:var(--radius-md);background:var(--brand-primary);color:var(--text-on-accent);display:grid;place-items:center;font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);}
.sx-brand .nm{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-base);line-height:1.1;}
.sx-brand .sc{font-size:var(--text-2xs);color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;}
.sx-navgrp{display:flex;flex-direction:column;gap:2px;}
.sx-navlbl{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);padding:var(--space-2) var(--space-2) var(--space-1);}
.sx-nav{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--text-secondary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;position:relative;text-decoration:none;}
.sx-nav i{width:18px;height:18px;}
.sx-nav .ct{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.sx-nav:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.sx-nav.on{background:var(--brand-subtle);color:var(--brand-primary);font-weight:var(--weight-semibold);}
.sx-nav.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:58%;border-radius:var(--radius-pill);background:var(--brand-primary);}
.sx-side .foot{margin-top:auto;display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-4);border-top:1px solid var(--border-subtle);}
.sx-uc{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2);border-radius:var(--radius-md);}
.sx-uc .av{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.sx-uc .nm{font-size:var(--text-sm);font-weight:var(--weight-medium);line-height:1.1;}
.sx-uc .rl{font-size:var(--text-2xs);color:var(--text-muted);}
.sx-main{display:flex;flex-direction:column;min-width:0;height:100vh;}
.sx-top{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-6);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;top:0;z-index:20;}
.sx-bc{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-muted);}
.sx-bc i{width:14px;height:14px;}
.sx-bc a{color:var(--text-muted);text-decoration:none;cursor:pointer;}
.sx-bc a:hover{color:var(--brand-primary);}
.sx-bc b{color:var(--text-primary);font-weight:var(--weight-medium);}
.sx-top .sp{flex:1;}
.sx-search{display:flex;align-items:center;gap:var(--space-2);width:240px;max-width:28vw;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-muted);font-size:var(--text-sm);}
.sx-search i{width:15px;height:15px;}
.sx-icbtn{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}
.sx-icbtn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.sx-icbtn i{width:18px;height:18px;}
.sx-scroll{flex:1;overflow-y:auto;}
/* ---- editor tab strip ---- */
.tabstrip{display:flex;align-items:center;gap:var(--space-1);padding:0 var(--space-6);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;top:59px;z-index:15;}
.tab{padding:var(--space-3) var(--space-3);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-secondary);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;display:inline-flex;align-items:center;gap:6px;}
.tab i{width:15px;height:15px;}
.tab:hover{color:var(--text-primary);}
.tab.on{color:var(--brand-primary);border-bottom-color:var(--brand-primary);font-weight:var(--weight-semibold);}
/* ---- page header ---- */
.col{max-width:1180px;margin:0 auto;padding:var(--space-5) var(--space-6) var(--space-12);display:flex;flex-direction:column;gap:var(--space-4);}
.phead h1{margin:0;font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);}
.phead .sub{font-size:var(--text-sm);color:var(--text-secondary);margin-top:3px;}
/* ---- inheritance chain bar (sticky) ---- */
.ichain{position:sticky;top:104px;z-index:12;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-3) var(--space-4);display:flex;align-items:center;gap:var(--space-4);flex-wrap:wrap;}
.chain{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;}
.cnode{display:inline-flex;align-items:center;gap:6px;padding:5px var(--space-3);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-medium);border:1px solid var(--border-subtle);background:var(--bg-surface-sunken);color:var(--text-secondary);cursor:pointer;}
.cnode i{width:13px;height:13px;}
.cnode .lvl{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.cnode.inherited{}
.cnode.here{background:var(--brand-subtle);border-color:var(--brand-primary);color:var(--brand-primary);font-weight:var(--weight-semibold);}
.cnode.over{background:var(--spark-subtle);border-color:var(--spark);color:var(--spark);font-weight:var(--weight-semibold);}
.cnode.locked{cursor:not-allowed;opacity:.75;}
.carrow{color:var(--text-muted);display:grid;place-items:center;}
.carrow i{width:14px;height:14px;}
.ichain .sp{flex:1;}
.scopechip{display:inline-flex;align-items:center;gap:6px;padding:5px var(--space-3);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-semibold);background:var(--brand-primary);color:var(--text-on-accent);}
.scopechip i{width:13px;height:13px;}
.linkbtn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-ui);font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--text-secondary);background:none;border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:5px var(--space-3);cursor:pointer;}
.linkbtn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.linkbtn[disabled]{opacity:.45;cursor:not-allowed;}
.linkbtn i{width:14px;height:14px;}
/* ---- two-col grid ---- */
.grid{display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:var(--space-5);align-items:start;}
@media (max-width:1100px){.grid{grid-template-columns:1fr;}}
/* ---- panel/card ---- */
.panel{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-5);min-width:0;}
.seclbl{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-2xs);font-weight:var(--weight-semibold);text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin:0 0 var(--space-2);}
.seclbl .ln{flex:1;height:1px;background:var(--border-subtle);}
.seclbl .mono{font-family:var(--font-mono);text-transform:none;letter-spacing:0;color:var(--text-muted);}
/* ---- scoring-mode radiogroup ---- */
.modes{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);}
@media (max-width:560px){.modes{grid-template-columns:1fr;}}
.mode{position:relative;text-align:left;display:flex;flex-direction:column;gap:4px;padding:var(--space-4);border:1.5px solid var(--border-subtle);border-radius:var(--radius-lg);background:var(--bg-surface);cursor:pointer;font-family:var(--font-ui);}
.mode:hover{border-color:var(--border-strong);background:var(--bg-surface-sunken);}
.mode .mh{display:flex;align-items:center;gap:var(--space-2);}
.mode .mi{width:30px;height:30px;border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-secondary);display:grid;place-items:center;flex:none;}
.mode .mi i{width:16px;height:16px;}
.mode .mt{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-primary);}
.mode .md{font-size:var(--text-2xs);color:var(--text-muted);line-height:var(--leading-2xs);}
.mode .chk{margin-left:auto;width:18px;height:18px;border-radius:var(--radius-pill);border:1.5px solid var(--border-strong);display:grid;place-items:center;flex:none;color:transparent;}
.mode .chk i{width:12px;height:12px;}
.mode.on{border-color:var(--brand-primary);background:var(--brand-subtle);}
.mode.on .mi{background:var(--brand-muted);color:var(--brand-primary);}
.mode.on .chk{border-color:var(--brand-primary);background:var(--brand-primary);color:var(--text-on-accent);}
.mode:focus-visible{outline:none;box-shadow:var(--ring-focus);border-color:var(--border-focus);}
/* ---- accordion rows ---- */
.acc{border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;}
.acc+.acc{margin-top:var(--space-2);}
.acc-hd{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-4);background:var(--bg-surface-sunken);cursor:pointer;border:none;width:100%;font-family:var(--font-ui);color:var(--text-primary);}
.acc-hd .tt{font-size:var(--text-sm);font-weight:var(--weight-semibold);}
.acc-hd .mono{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.acc-hd .sp{flex:1;}
.acc-hd .cv{color:var(--text-muted);display:grid;place-items:center;transition:transform var(--dur-fast) var(--ease-standard);}
.acc-hd .cv i{width:16px;height:16px;}
.acc-hd[aria-expanded="true"] .cv{transform:rotate(180deg);}
.acc-body{padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3);animation:accin var(--dur-fast) var(--ease-entrance);}
@keyframes accin{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.rowdel{flex:none;color:var(--text-muted);background:none;border:none;cursor:pointer;display:grid;place-items:center;padding:6px;border-radius:var(--radius-sm);}
.rowdel:hover{color:var(--status-error);background:var(--status-error-subtle);}
.rowdel i{width:15px;height:15px;}
/* ---- fields ---- */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3) var(--space-4);}
.fgrid.thirds{grid-template-columns:2fr 1fr 1fr;}
.fld{display:flex;flex-direction:column;gap:6px;min-width:0;}
.fld.col2{grid-column:1 / -1;}
.fld label{font-size:var(--text-xs);font-weight:var(--weight-semibold);color:var(--text-secondary);display:flex;align-items:center;gap:5px;}
.fld label .req{color:var(--status-error);}
.fld .help{font-size:var(--text-2xs);color:var(--text-muted);font-weight:var(--weight-regular);}
.fld .ferr{font-size:var(--text-2xs);color:var(--status-error);display:flex;align-items:center;gap:4px;}
.fld .ferr i{width:12px;height:12px;}
.in{width:100%;font-family:var(--font-ui);font-size:var(--text-sm);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);color:var(--text-primary);}
.in:focus{outline:none;border-color:var(--border-focus);box-shadow:var(--ring-focus);}
.in:disabled{background:var(--bg-surface-sunken);color:var(--text-muted);}
.in.mono{font-family:var(--font-mono);}
.in.err{border-color:var(--status-error);}
textarea.in{min-height:72px;resize:vertical;line-height:var(--leading-sm);}
.sel{width:100%;font-family:var(--font-ui);font-size:var(--text-sm);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);color:var(--text-primary);cursor:pointer;}
.sel:focus{outline:none;border-color:var(--border-focus);box-shadow:var(--ring-focus);}
.sel:disabled{background:var(--bg-surface-sunken);color:var(--text-muted);cursor:not-allowed;}
/* effective-scope chip on a field */
.fromchip{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-2xs);font-weight:var(--weight-medium);color:var(--text-muted);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:1px var(--space-2);}
.fromchip i{width:10px;height:10px;}
/* ---- level rows (criteria) ---- */
.lvls{display:flex;flex-direction:column;gap:var(--space-2);}
.lvl{display:grid;grid-template-columns:70px 1fr 2fr auto;gap:var(--space-2);align-items:center;}
.lvl .lhd{font-size:var(--text-2xs);font-weight:var(--weight-semibold);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}
/* ---- add row ---- */
.addrow{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-ui);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--brand-primary);background:none;border:1px dashed var(--border-strong);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);cursor:pointer;justify-content:center;width:100%;}
.addrow:hover{background:var(--brand-subtle);border-color:var(--brand-primary);}
.addrow i{width:15px;height:15px;}
.addsm{width:auto;padding:6px var(--space-3);font-size:var(--text-xs);}
/* ---- switch ---- */
.swrow{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) 0;}
.swrow .swt{font-size:var(--text-sm);font-weight:var(--weight-medium);}
.swrow .swd{font-size:var(--text-2xs);color:var(--text-muted);}
.swrow .sp{flex:1;}
.sw{width:40px;height:22px;border-radius:var(--radius-pill);background:var(--border-strong);border:none;cursor:pointer;position:relative;flex:none;transition:background var(--dur-fast) var(--ease-standard);}
.sw.on{background:var(--brand-primary);}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--bg-surface);transition:transform var(--dur-fast) var(--ease-standard);}
.sw.on::after{transform:translateX(18px);}
/* ---- slider ---- */
.slrow{display:flex;align-items:center;gap:var(--space-3);}
.slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:var(--radius-pill);background:var(--bg-surface-sunken);outline:none;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--brand-primary);border:2px solid var(--bg-surface);box-shadow:var(--shadow-e1);cursor:pointer;}
.slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--brand-primary);border:2px solid var(--bg-surface);cursor:pointer;}
.pctbox{width:84px;}
/* ---- answer-key lock ---- */
.keylock{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border:1px dashed var(--border-strong);border-radius:var(--radius-md);background:var(--bg-surface-sunken);}
.keylock .kic{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--bg-surface);border:1px solid var(--border-subtle);color:var(--text-secondary);display:grid;place-items:center;flex:none;}
.keylock .kic i{width:16px;height:16px;}
.keylock .kt{font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.keylock .kb{font-size:var(--text-2xs);color:var(--text-muted);margin-top:2px;line-height:var(--leading-2xs);}
/* ---- banners ---- */
.banner{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--border-subtle);background:var(--bg-surface-sunken);font-size:var(--text-sm);}
.banner i.lead{width:18px;height:18px;flex:none;margin-top:1px;}
.banner .bt{font-weight:var(--weight-semibold);font-size:var(--text-xs);}
.banner .bb{color:var(--text-secondary);font-size:var(--text-xs);margin-top:2px;line-height:var(--leading-xs);}
.banner .bact{margin-top:var(--space-2);}
.banner.info i.lead{color:var(--status-info);}
.banner.info{border-color:var(--status-info);background:var(--status-info-subtle);}
.banner.warn{border-color:var(--status-warning);background:var(--status-warning-subtle);}
.banner.warn i.lead{color:var(--status-warning);}
.banner.err{border-color:var(--status-error);background:var(--status-error-subtle);}
.banner.err i.lead{color:var(--status-error);}
.banner ul{margin:var(--space-2) 0 0;padding-left:var(--space-5);color:var(--text-secondary);font-size:var(--text-xs);display:flex;flex-direction:column;gap:3px;}
.banner ul b{color:var(--text-primary);font-weight:var(--weight-semibold);}
/* ---- empty inside accordion ---- */
.subempty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:var(--space-2);padding:var(--space-6) var(--space-4);}
.subempty .ic{width:40px;height:40px;border-radius:var(--radius-pill);background:var(--bg-surface);border:1px solid var(--border-subtle);color:var(--text-muted);display:grid;place-items:center;}
.subempty .ic i{width:19px;height:19px;}
.subempty .t{font-size:var(--text-sm);font-weight:var(--weight-semibold);}
.subempty .b{font-size:var(--text-2xs);color:var(--text-muted);}
/* ---- preview rail ---- */
.rail{position:sticky;top:104px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e2);padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-4);}
.rail-hd{display:flex;align-items:center;gap:var(--space-2);}
.rail-hd .tt{font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);}
.rail-hd .sp{flex:1;}
.rail-hd .tag{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.pv-crit{display:flex;flex-direction:column;gap:var(--space-3);}
.pv-row{display:flex;flex-direction:column;gap:5px;}
.pv-row .pvh{display:flex;align-items:baseline;gap:var(--space-2);font-size:var(--text-xs);}
.pv-row .pvh .nm{font-weight:var(--weight-semibold);color:var(--text-primary);}
.pv-row .pvh .sp{flex:1;}
.pv-row .pvh .sc{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary);}
.pv-row .pvh .wt{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.pvbar{height:8px;border-radius:var(--radius-pill);background:var(--bg-surface-sunken);overflow:hidden;}
.pvbar span{display:block;height:100%;border-radius:var(--radius-pill);background:var(--brand-primary);}
.pv-total{border-top:1px solid var(--border-subtle);padding-top:var(--space-3);position:relative;}
.pv-total .tot{display:flex;align-items:baseline;gap:var(--space-2);}
.pv-total .tot .lbl{font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.pv-total .tot .sp{flex:1;}
.pv-total .tot .big{font-family:var(--font-mono);font-size:var(--text-lg);font-weight:var(--weight-semibold);color:var(--text-primary);}
.pvtrack{position:relative;height:12px;border-radius:var(--radius-pill);background:var(--bg-surface-sunken);margin-top:var(--space-2);overflow:visible;}
.pvtrack .fill{position:absolute;left:0;top:0;bottom:0;border-radius:var(--radius-pill);background:var(--status-success);}
.pvtrack .passline{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--spark);}
.pvtrack .passline::after{content:"";position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--spark);}
.passlbl{display:flex;align-items:center;gap:5px;font-size:var(--text-2xs);font-family:var(--font-mono);color:var(--spark);margin-top:6px;}
.passlbl i{width:11px;height:11px;}
.gradepill{display:inline-flex;align-items:center;gap:6px;padding:3px var(--space-3);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-semibold);background:var(--status-success-subtle);color:var(--status-success);}
.gradepill i{width:13px;height:13px;}
/* ---- footer actions ---- */

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { Icon } = window.LvlupV0DesignSystem_5d0725;
const I = (name, size) => <Icon name={name} size={size || 16} />;

const MODES = [
  ["criteria_based","Criteria Based","Traditional rubric with criteria and levels","list-checks"],
  ["dimension_based","Dimension Based","AI evaluation dimensions with weights and scoring scales","sliders-horizontal"],
  ["holistic","Holistic","Single overall score with guidance text","gauge"],
  ["hybrid","Hybrid","Combination of criteria and holistic scoring","layers"],
];
const PRIORITY = [["HIGH","High"],["MEDIUM","Medium"],["LOW","Low"]];

/* ---------- sidebar nav ---------- */
function Nav({icon,label,count,active}){
  return <a className={"sx-nav"+(active?" on":"")} aria-current={active?"page":undefined}>
    {I(icon,18)}<span>{label}</span>{count!=null&&<span className="ct">{count}</span>}</a>;
}

/* ---------- save chip ---------- */
function SaveChip({status}){
  const map={
    saved:{cls:"saved",icon:"check-circle-2",label:"Saved · just now"},
    saving:{cls:"saving",icon:null,label:"Saving…"},
    dirty:{cls:"dirty",icon:"circle-dot",label:"Unsaved changes"},
    failed:{cls:"failed",icon:"alert-circle",label:"Save failed — retry"},
  };
  const c=map[status];
  return <span className={"chip "+c.cls} role="status" aria-live="polite">
    {c.icon?I(c.icon,12):<span className="spin" aria-hidden="true"></span>}{c.label}</span>;
}

/* ---------- switch ---------- */
function Sw({checked,onChange,title,desc,id}){
  return <div className="swrow">
    <div><div className="swt">{title}</div>{desc&&<div className="swd">{desc}</div>}</div>
    <div className="sp"></div>
    <button id={id} className={"sw"+(checked?" on":"")} role="switch" aria-checked={checked}
      aria-label={title} onClick={()=>onChange(!checked)}></button>
  </div>;
}

/* ---------- from-scope chip ---------- */
function From({scope}){
  return <span className="fromchip" title={"Effective value supplied by "+scope}>{I("git-fork",10)}from: {scope}</span>;
}

/* ---------- criterion accordion row ---------- */
function CriterionRow({c,open,onToggle,onRemove,onAddLevel,onRemoveLevel,readOnly}){
  return <div className="acc">
    <button className="acc-hd" aria-expanded={open} onClick={onToggle}>
      {I("list-checks",16)}<span className="tt">{c.name||"Untitled criterion"}</span>
      <span className="mono">· max {c.max} · ×{c.weight}</span>
      <span className="sp"></span>
      {!readOnly && <span className="rowdel" role="button" tabIndex={0} aria-label={"Remove criterion "+c.name}
        onClick={(e)=>{e.stopPropagation();onRemove();}}>{I("trash-2",15)}</span>}
      <span className="cv">{I("chevron-down",16)}</span>
    </button>
    {open && <div className="acc-body" role="region" aria-label={"Criterion "+c.name}>
      <div className="fgrid thirds">
        <div className="fld">
          <label>Name <span className="req" aria-hidden="true">*</span></label>
          <input className={"in"+(c.dup?" err":"")} defaultValue={c.name} disabled={readOnly}
            aria-invalid={c.dup} aria-describedby={c.dup?"dup-"+c.id:undefined}/>
          {c.dup && <div className="ferr" id={"dup-"+c.id}>{I("alert-circle",12)}Names must be unique</div>}
        </div>
        <div className="fld">
          <label>Max Points</label>
          <input className="in mono" defaultValue={c.max} inputMode="numeric" disabled={readOnly} aria-label="Max points"/>
        </div>
        <div className="fld">
          <label>Weight</label>
          <input className="in mono" defaultValue={c.weight} inputMode="decimal" disabled={readOnly} aria-label="Weight"/>
        </div>
        <div className="fld col2">
          <label>Description</label>
          <input className="in" defaultValue={c.desc} disabled={readOnly}/>
        </div>
      </div>
      <div>
        <div className="seclbl" style={{margin:"var(--space-1) 0 var(--space-2)"}}>Levels<span className="ln"></span></div>
        <div className="lvls">
          <div className="lvl"><span className="lhd">Score</span><span className="lhd">Label</span><span className="lhd">Description</span><span></span></div>
          {c.levels.map((lv,i)=>
            <div className="lvl" key={i}>
              <input className="in mono" defaultValue={lv.score} disabled={readOnly} aria-label={"Level "+(i+1)+" score"}/>
              <input className="in" defaultValue={lv.label} disabled={readOnly} aria-label={"Level "+(i+1)+" label"}/>
              <input className="in" defaultValue={lv.desc} disabled={readOnly} aria-label={"Level "+(i+1)+" description"}/>
              {!readOnly && <button className="rowdel" aria-label={"Remove level "+lv.label}
                onClick={()=>onRemoveLevel(i)}>{I("x",15)}</button>}
            </div>)}
        </div>
        {!readOnly && <button className="addrow addsm" style={{marginTop:"var(--space-2)"}} onClick={onAddLevel}>
          {I("plus",15)}Add level</button>}
      </div>
    </div>}
  </div>;
}

/* ---------- dimension accordion row ---------- */
function DimensionRow({d,open,onToggle,onRemove,readOnly,onToggleEnabled}){
  return <div className="acc">
    <button className="acc-hd" aria-expanded={open} onClick={onToggle}>
      {I("sliders-horizontal",16)}<span className="tt">{d.name}</span>
      <span className="mono">· {d.priority} · ×{d.weight} · /{d.scale}</span>
      <span className="sp"></span>
      {!d.enabled && <span className="fromchip">{I("eye-off",10)}disabled</span>}
      {!readOnly && <span className="rowdel" role="button" tabIndex={0} aria-label={"Remove dimension "+d.name}
        onClick={(e)=>{e.stopPropagation();onRemove();}}>{I("trash-2",15)}</span>}
      <span className="cv">{I("chevron-down",16)}</span>
    </button>
    {open && <div className="acc-body" role="region" aria-label={"Dimension "+d.name}>
      <div className="fgrid thirds">
        <div className="fld">
          <label>Name <span className="req" aria-hidden="true">*</span></label>
          <input className="in" defaultValue={d.name} disabled={readOnly}/>
        </div>
        <div className="fld">
          <label>Priority</label>
          <select className="sel" defaultValue={d.priority} disabled={readOnly} aria-label="Priority">
            {PRIORITY.map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </select>
        </div>
        <div className="fld">
          <label>Weight</label>
          <input className="in mono" defaultValue={d.weight} inputMode="decimal" disabled={readOnly}/>
        </div>
        <div className="fld">
          <label>Scoring Scale</label>
          <input className="in mono" defaultValue={d.scale} inputMode="numeric" disabled={readOnly} aria-label="Scoring scale"/>
        </div>
        <div className="fld col2">
          <label>Description</label>
          <input className="in" defaultValue={d.desc} disabled={readOnly}/>
        </div>
        <div className="fld col2">
          <label>Prompt Guidance
            <span className="help" title="Injected into the AI evaluator prompt at grade time">{I("info",11)} fed to the AI evaluator</span></label>
          <textarea className="in" defaultValue={d.prompt} disabled={readOnly}
            aria-label="Prompt guidance — injected into the AI evaluator prompt at grade time"/>
        </div>
      </div>
      <Sw checked={d.enabled} onChange={()=>onToggleEnabled&&onToggleEnabled()} title="Enabled"
        desc="Disabled dimensions are excluded from the weighted total."/>
    </div>}
  </div>;
}

/* ---------- live preview rail ---------- */
function PreviewRail({mode,passing,criteria}){
  const sample = criteria.length ? criteria : [
    {name:"Correctness",weight:2,score:8,max:10},
    {name:"Reasoning",weight:1.5,score:6,max:10},
    {name:"Clarity",weight:1,score:9,max:10},
  ];
  const wTot = sample.reduce((a,c)=>a+(Number(c.weight)||1)*(Number(c.max)||10),0);
  const wGot = sample.reduce((a,c)=>a+(Number(c.weight)||1)*(Number(c.score!=null?c.score:Math.round((c.max||10)*0.7))),0);
  const pct = Math.round((wGot/wTot)*100);
  const passed = pct>=passing;
  return <aside className="rail" aria-label="Live rubric preview">
    <div className="rail-hd">{I("eye",17)}<span className="tt">Live preview</span>
      <span className="sp"></span><span className="tag">RubricBreakdown</span></div>
    <div className="pv-crit" aria-live="polite">
      {sample.map((c,i)=>{
        const s = c.score!=null?c.score:Math.round((c.max||10)*0.7);
        const w=Math.round((s/(c.max||10))*100);
        return <div className="pv-row" key={i}>
          <div className="pvh"><span className="nm">{c.name||"Criterion "+(i+1)}</span>
            <span className="sp"></span>
            <span className="sc">{s}/{c.max||10}</span><span className="wt">×{c.weight||1}</span></div>
          <div className="pvbar"><span style={{width:w+"%"}}></span></div>
        </div>;})}
    </div>
    <div className="pv-total">
      <div className="tot"><span className="lbl">Weighted total</span><span className="sp"></span>
        <span className="big">{pct}%</span></div>
      <div className="pvtrack">
        <div className="fill" style={{width:pct+"%"}}></div>
        <div className="passline" style={{left:passing+"%"}} aria-hidden="true"></div>
      </div>
      <div className="passlbl">{I("flag",11)}Pass line @ {passing}%</div>
      <div style={{marginTop:"var(--space-3)"}}>
        <span className="gradepill">{I(passed?"check-circle-2":"x-circle",13)}{passed?"PASS":"FAIL"} · this is exactly how graders & students see it</span>
      </div>
    </div>
    <div className="keylock">
      <div className="kic">{I("lock",16)}</div>
      <div>
        <div className="kt">Model answer is evaluator-only</div>
        <div className="kb">Students never see it unless you enable “Show model answer” and results are released.</div>
      </div>
    </div>
  </aside>;
}

/* ---------- main screen ---------- */
function Screen(){
  // variants: default | inherited | empty | invalid | loading | failed | tenant-admin
  const [variant,setVariant]=useState("default");
  const [mode,setMode]=useState("criteria_based");
  const [pendingMode,setPendingMode]=useState(null);
  const [passing,setPassing]=useState(40);
  const [showModel,setShowModel]=useState(false);
  const [save,setSave]=useState("saved");
  const [confirm,setConfirm]=useState(null);   // 'mode' | 'reset'
  const [toast,setToast]=useState(null);
  const [openCrit,setOpenCrit]=useState(0);
  const [openDim,setOpenDim]=useState(0);
  const saveTimer=useRef(null);

  const [criteria,setCriteria]=useState([
    {id:1,name:"Correctness",max:10,weight:2,desc:"Reaches the correct result via valid steps.",
      levels:[{score:0,label:"Missing",desc:"No valid attempt."},{score:5,label:"Partial",desc:"Right approach, arithmetic slip."},{score:10,label:"Excellent",desc:"Fully correct and justified."}]},
    {id:2,name:"Reasoning",max:10,weight:1.5,desc:"Explains why each step preserves equality.",
      levels:[{score:0,label:"Missing",desc:"No reasoning shown."},{score:5,label:"Partial",desc:"Some steps explained."},{score:10,label:"Excellent",desc:"Every step justified."}]},
  ]);
  const [dims,setDims]=useState([
    {id:1,name:"Accuracy",priority:"HIGH",weight:2,scale:10,enabled:true,desc:"Numerical and conceptual correctness.",prompt:"Reward fully correct solutions; deduct for arithmetic or sign errors."},
    {id:2,name:"Communication",priority:"MEDIUM",weight:1,scale:10,enabled:true,desc:"Clarity of written explanation.",prompt:"Favor clear, ordered reasoning a peer could follow."},
  ]);
  const nextC=useRef(3), nextD=useRef(3);

  const isInherited = variant==="inherited";
  const isEmpty = variant==="empty";
  const isInvalid = variant==="invalid";
  const isLoading = variant==="loading";
  const isFailed = variant==="failed";
  const isTenant = variant==="tenant-admin";
  const readOnly = isInherited;
  const valid = !isInvalid;
  const effSave = isFailed ? "failed" : save;

  // mark criteria 1 & 2 duplicate-named in invalid variant
  const critView = isEmpty ? [] : criteria.map((c,i)=>({...c, dup: isInvalid && i<2}));

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });

  const markDirty=()=>{ if(readOnly) return; if(!valid){ setSave("dirty"); return; }
    setSave("dirty"); clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{ setSave("saving"); setTimeout(()=>setSave("saved"),700); },2000); };

  const requestMode=(v)=>{ if(v===mode||readOnly) return;
    // switching away from criteria with data → confirm
    if((mode==="criteria_based"||mode==="hybrid") && criteria.length && v==="holistic"){
      setPendingMode(v); setConfirm("mode"); return; }
    setMode(v); markDirty(); };
  const confirmMode=()=>{ setMode(pendingMode); setPendingMode(null); setConfirm(null); markDirty(); };

  const handleSave=()=>{ if(!valid) return;
    clearTimeout(saveTimer.current); setSave("saving");
    setTimeout(()=>{ setSave("saved");
      setToast({k:"ok",t:"Rubric saved",b:"Applied to Space default · resolveRubric updated."});
      setTimeout(()=>setToast(null),2800); },700); };

  const retrySave=()=>{ setVariant("default"); handleSave(); };

  const overrideHere=()=>{ setVariant("default"); setSave("dirty"); };

  const showCriteria = mode==="criteria_based"||mode==="hybrid";
  const showDims = mode==="dimension_based";
  const showHolistic = mode==="holistic"||mode==="hybrid";

  // inheritance node states by variant
  const nodes = isTenant
    ? [["Tenant default","here","layers-3"],["Space","inherited","layers"],["Story point","inherited","git-branch"],["Item","inherited","file-text"]]
    : isInherited
      ? [["Tenant default","over","layers-3"],["Space","inherited","layers"],["Story point","inherited","git-branch"],["Item","inherited","file-text"]]
      : [["Tenant default","inherited","layers-3"],["Space","here","layers"],["Story point","inherited","git-branch"],["Item","inherited","file-text"]];
  const editingLabel = isTenant ? "Tenant default" : "Space default";

  return <div className="sx">
    {/* ===== sidebar ===== */}
    <aside className="sx-side">
      <div className="sx-brand"><div className="mk">L</div>
        <div><div className="nm">Auto-LevelUp</div><div className="sc">Northwood · Teacher</div></div></div>
      <nav aria-label="Primary" style={{display:"flex",flexDirection:"column",gap:"var(--space-5)"}}>
        <div className="sx-navgrp"><div className="sx-navlbl">Teach</div>
          <Nav icon="layout-dashboard" label="Dashboard"/>
          <Nav icon="school" label="Classes" count="6"/>
          <Nav icon="layers" label="Spaces" count="9" active/>
          <Nav icon="file-check" label="Exams" count="4"/>
          <Nav icon="graduation-cap" label="Students"/></div>
        <div className="sx-navgrp"><div className="sx-navlbl">Insights</div>
          <Nav icon="bar-chart-3" label="Analytics"/>
          <Nav icon="sparkles" label="AI tutor"/></div>
      </nav>
      <div className="foot"><div className="sx-uc"><div className="av">RM</div>
        <div><div className="nm">Rohan Mehta</div>
          <div className="rl">{isTenant?"Tenant admin":"Teacher · Owner"}</div></div></div></div>
    </aside>

    {/* ===== main ===== */}
    <div className="sx-main">
      <header className="sx-top">
        <nav className="sx-bc" aria-label="Breadcrumb">
          <a>Spaces</a>{I("chevron-right",14)}<a>Algebra I</a>{I("chevron-right",14)}<b>Edit</b>
        </nav>
        <div className="sp"></div>
        <div className="sx-search">{I("search",15)}<span>Search spaces…</span></div>
        <button className="sx-icbtn" aria-label="Notifications">{I("bell",18)}</button>
      </header>

      {/* tab strip */}
      <nav className="tabstrip" aria-label="Space editor sections">
        <button className="tab">{I("layout-grid",15)}Overview</button>
        <button className="tab">{I("git-branch",15)}Story Points</button>
        <button className="tab">{I("list",15)}Items</button>
        <button className="tab on" aria-current="page">{I("scale",15)}Rubric</button>
        <button className="tab">{I("settings",15)}Settings</button>
      </nav>

      <div className="sx-scroll"><div className="col">
        {/* page header */}
        <div className="phead">
          <h1>Rubric</h1>
          <div className="sub">Define how open-ended answers are scored by AI and reviewers.</div>
        </div>

        {/* inheritance chain bar */}
        <div className="ichain">
          <div className="chain" role="list" aria-label="Inheritance chain">
            {nodes.map(([lbl,st,ic],i)=><React.Fragment key={lbl}>
              <span className={"cnode "+st} role="listitem"
                aria-current={st==="here"?"true":undefined}
                title={st==="here"?"Editing here":st==="over"?"Defined here (overrides parent)":"Inherited"}>
                {I(st==="over"?"sparkles":st==="here"?"pencil":ic,13)}
                {lbl}
                <span className="lvl">{st==="over"?"defined":st==="here"?"editing":"inherit"}</span>
              </span>
              {i<nodes.length-1 && <span className="carrow">{I("chevron-right",14)}</span>}
            </React.Fragment>)}
          </div>
          <div className="sp"></div>
          <span className="scopechip">{I("target",13)}Editing: {editingLabel}</span>
          {!isInherited && <span className="ovbadge" title="This scope defines its own rubric">{I("sparkles",11)}Overridden</span>}
          <button className="linkbtn" disabled={isInherited} onClick={()=>setConfirm("reset")}>
            {I("rotate-ccw",14)}Reset to inherited</button>
        </div>

        {/* inherited banner */}
        {isInherited && <div className="banner info" role="status">
          <span className="lead">{I("git-fork",18)}</span>
          <div style={{flex:1}}>
            <div className="bt">This Space inherits the Tenant default rubric</div>
            <div className="bb">Fields below show the resolved rubric (read-only). Override to define a Space-specific rubric;
              until you edit, nothing is written.</div>
            <div className="bact"><button className="btn btn--primary" onClick={overrideHere}>{I("pencil",16)}Override here</button></div>
          </div>
        </div>}

        {/* tenant note for non-admins viewing tenant scope */}
        {isTenant && <div className="banner info" role="status">
          <span className="lead">{I("shield",18)}</span>
          <div style={{flex:1}}>
            <div className="bt">Editing the tenant-wide default</div>
            <div className="bb">This rubric is the fallback for every space, story point, and item that has not overridden it.
              Only a tenant admin can edit this scope.</div>
          </div>
        </div>}

        {/* validation summary */}
        {isInvalid && <div className="banner err" role="alert" tabIndex={-1}>
          <span className="lead">{I("alert-circle",18)}</span>
          <div style={{flex:1}}>
            <div className="bt">Fix 2 issues before saving</div>
            <ul>
              <li><b>Passing percentage must be between 0 and 100.</b> Currently 140.</li>
              <li>Two criteria share the same name — names must be unique.</li>
            </ul>
          </div>
        </div>}

        {/* two-col grid */}
        <div className="grid">
          {/* ---- editor column ---- */}
          <div className="panel">
            {/* scoring mode radiogroup */}
            <div>
              <div className="seclbl">Scoring mode<span className="ln"></span>
                <span className="mono">UnifiedRubric.scoringMode</span></div>
              {isLoading
                ? <div className="modes">{[0,1,2,3].map(i=><div key={i} className="sk" style={{height:96,borderRadius:"var(--radius-lg)"}}></div>)}</div>
                : <div className="modes" role="radiogroup" aria-label="Scoring mode">
                    {MODES.map(([v,t,d,ic])=>{
                      const on=mode===v;
                      return <button key={v} type="button" className={"mode"+(on?" on":"")}
                        role="radio" aria-checked={on} disabled={readOnly}
                        onClick={()=>requestMode(v)}>
                        <div className="mh">
                          <span className="mi">{I(ic,16)}</span>
                          <span className="mt">{t}</span>
                          <span className="chk">{I("check",12)}</span>
                        </div>
                        <span className="md">{d}</span>
                        {on && <span className="sr">Selected</span>}
                      </button>;
                    })}
                  </div>}
            </div>

            {/* mode-specific body */}
            {isLoading
              ? <div style={{display:"flex",flexDirection:"column",gap:"var(--space-2)"}}>
                  {[0,1,2].map(i=><div key={i} className="sk" style={{height:52,borderRadius:"var(--radius-md)"}}></div>)}
                </div>
              : <>
                {showCriteria && <div>
                  <div className="seclbl">Criteria<span className="ln"></span>
                    <span className="mono">criteria[] · {critView.length}</span></div>
                  {critView.length===0
                    ? <div className="banner" style={{borderStyle:"dashed"}}>
                        <span className="lead">{I("list-plus",18)}</span>
                        <div style={{flex:1}}>
                          <div className="bt">No criteria yet</div>
                          <div className="bb">Add one or apply a preset to get started. Each new criterion seeds 3 levels (Missing / Partial / Excellent).</div>
                        </div>
                      </div>
                    : critView.map((c,i)=>
                        <CriterionRow key={c.id} c={c} open={openCrit===i} readOnly={readOnly}
                          onToggle={()=>setOpenCrit(openCrit===i?-1:i)}
                          onRemove={()=>{setCriteria(criteria.filter(x=>x.id!==c.id));markDirty();}}
                          onAddLevel={()=>{ setCriteria(criteria.map(x=>x.id===c.id?{...x,levels:[...x.levels,{score:0,label:"New level",desc:""}]}:x)); markDirty(); }}
                          onRemoveLevel={(li)=>{ setCriteria(criteria.map(x=>x.id===c.id?{...x,levels:x.levels.filter((_,j)=>j!==li)}:x)); markDirty(); }}/>)}
                  {!readOnly && <button className="addrow" style={{marginTop:"var(--space-2)"}}
                    onClick={()=>{ const id=nextC.current++; setCriteria([...criteria,{id,name:"New criterion",max:10,weight:1,desc:"",
                      levels:[{score:0,label:"Missing",desc:""},{score:5,label:"Partial",desc:""},{score:10,label:"Excellent",desc:""}]}]);
                      setOpenCrit(criteria.length); if(isEmpty) setVariant("default"); markDirty(); }}>
                    {I("plus",15)}Add criterion</button>}
                </div>}

                {showDims && <div>
                  <div className="seclbl">Evaluation dimensions<span className="ln"></span>
                    <span className="mono">dimensions[] · {dims.length}</span></div>
                  {dims.filter(d=>d.enabled).length===0 && <div className="banner warn" role="status" style={{marginBottom:"var(--space-2)"}}>
                    <span className="lead">{I("alert-triangle",18)}</span>
                    <div style={{flex:1}}><div className="bt">No enabled dimension</div>
                      <div className="bb">AI grading will fall back to holistic until at least one dimension is enabled.</div></div>
                  </div>}
                  {dims.length===0
                    ? <div className="subempty"><div className="ic">{I("sliders-horizontal",19)}</div>
                        <div className="t">No evaluation dimensions</div>
                        <div className="b">AI grading falls back to holistic until you add at least one enabled dimension.</div></div>
                    : dims.map((d,i)=>
                        <DimensionRow key={d.id} d={d} open={openDim===i} readOnly={readOnly}
                          onToggle={()=>setOpenDim(openDim===i?-1:i)}
                          onToggleEnabled={()=>{ setDims(dims.map(x=>x.id===d.id?{...x,enabled:!x.enabled}:x)); markDirty(); }}
                          onRemove={()=>{setDims(dims.filter(x=>x.id!==d.id));markDirty();}}/>)}
                  {!readOnly && <button className="addrow" style={{marginTop:"var(--space-2)"}}
                    onClick={()=>{ const id=nextD.current++; setDims([...dims,{id,name:"New dimension",priority:"MEDIUM",weight:1,scale:10,enabled:true,desc:"",prompt:""}]);
                      setOpenDim(dims.length); markDirty(); }}>
                    {I("plus",15)}Add dimension</button>}
                </div>}

                {showHolistic && <div>
                  <div className="seclbl">Holistic scoring<span className="ln"></span>
                    <span className="mono">holisticGuidance</span></div>
                  <div className="fgrid">
                    <div className="fld">
                      <label>Max Score</label>
                      <input className="in mono" defaultValue="100" inputMode="numeric" disabled={readOnly}
                        onChange={markDirty} aria-label="Holistic max score"/>
                    </div>
                    <div className="fld col2">
                      <label>Guidance</label>
                      <textarea className="in" disabled={readOnly} onChange={markDirty}
                        defaultValue="Assign a single overall score reflecting correctness, reasoning, and clarity together. Reserve the top band for fully justified, correct solutions."/>
                    </div>
                  </div>
                </div>}

                {/* shared settings */}
                <div>
                  <div className="seclbl">Shared settings<span className="ln"></span>
                    <span className="mono">applies in all modes</span></div>
                  <div className="fld">
                    <label htmlFor="pass">Passing Percentage
                      <From scope="Space"/></label>
                    <div className="slrow">
                      <input id="pass" className="slider" type="range" min="0" max="100" value={isInvalid?100:passing}
                        disabled={readOnly}
                        onChange={e=>{setPassing(Number(e.target.value));markDirty();}}
                        aria-valuemin={0} aria-valuemax={100} aria-valuenow={passing} aria-label="Passing percentage"/>
                      <input className={"in mono pctbox"+(isInvalid?" err":"")} value={isInvalid?"140":passing+"%"}
                        disabled={readOnly} aria-label="Passing percentage exact value"
                        onChange={e=>{const n=parseInt(e.target.value,10); if(!isNaN(n))setPassing(Math.max(0,Math.min(100,n)));markDirty();}}/>
                    </div>
                    {isInvalid
                      ? <div className="ferr">{I("alert-circle",12)}Passing percentage must be between 0 and 100.</div>
                      : <div className="help">Pass/fail line against the weighted total (default 40).</div>}
                  </div>
                  <div className="fld" style={{marginTop:"var(--space-2)"}}>
                    <label>Evaluator Guidance
                      <span className="help">{I("info",11)} steers the AI grader & human reviewer</span></label>
                    <textarea className="in" disabled={readOnly} onChange={markDirty}
                      defaultValue="Grade on demonstrated understanding, not formatting. Give partial credit for valid approaches with minor slips."/>
                  </div>
                  <div className="fld" style={{marginTop:"var(--space-2)"}}>
                    <label>Model Answer
                      <span className="fromchip">{I("lock",10)}evaluator-only</span></label>
                    <textarea className="in" disabled={readOnly} onChange={markDirty}
                      defaultValue="3x − 7 = 11 → 3x = 18 → x = 6. Accept any equivalent inverse-operation sequence."/>
                  </div>
                  <div className="keylock" style={{marginTop:"var(--space-2)"}}>
                    <div className="kic">{I("shield-check",16)}</div>
                    <div>
                      <div className="kt">Answer-key boundary</div>
                      <div className="kb">Model answer guides the evaluator. Students never see it unless you enable it below
                        <b style={{color:"var(--text-secondary)"}}> and</b> results are released. <code style={{fontFamily:"var(--font-mono)"}}>saveItem</code> stores
                        student-facing keys in a server-only subcollection.</div>
                    </div>
                  </div>
                  <Sw checked={showModel} onChange={v=>{setShowModel(v);markDirty();}}
                    title="Show model answer to students"
                    desc="Only after results are released; off by default."/>
                </div>

                {/* action bar */}
                <div className="actbar">
                  <SaveChip status={effSave}/>
                  <span className="sp"></span>
                  <button className="btn btn--secondary" disabled={readOnly}>{I("import",16)}Apply from preset</button>
                  <button className="btn btn--primary" disabled={!valid||readOnly||effSave==="saving"} onClick={handleSave}>
                    {effSave==="saving"?<span className="spin" aria-hidden="true"></span>:I("check",16)}
                    {effSave==="saving"?"Saving…":"Save Rubric"}</button>
                </div>
              </>}
          </div>

          {/* ---- preview rail ---- */}
          {isLoading
            ? <aside className="rail"><div className="sk" style={{height:18,width:"50%"}}></div>
                {[0,1,2].map(i=><div key={i} className="sk" style={{height:34,borderRadius:"var(--radius-md)"}}></div>)}
                <div className="sk" style={{height:54,borderRadius:"var(--radius-md)"}}></div></aside>
            : <PreviewRail mode={mode} passing={isInvalid?100:passing}
                criteria={showCriteria?critView:[]}/>}
        </div>
      </div></div>
    </div>

    {/* confirm dialog */}
    {confirm && <>
      <div className="scrim" onClick={()=>setConfirm(null)}></div>
      <div className="dialog" role="alertdialog" aria-modal="true" aria-labelledby="cf-t" aria-describedby="cf-b">
        <div className="confirm-body">
          <div className="cic">{I("alert-triangle",19)}</div>
          <div>
            {confirm==="mode"
              ? <><div className="ct" id="cf-t">Switch to Holistic?</div>
                  <div className="cb" id="cf-b">Switching to Holistic will discard {criteria.length} criteria when you save. Your data is kept in memory until then. Continue?</div></>
              : <><div className="ct" id="cf-t">Reset to inherited?</div>
                  <div className="cb" id="cf-b">This removes the Space-level rubric and falls back to the Tenant default. The “Overridden” marker is cleared. Continue?</div></>}
          </div>
        </div>
        <div className="dialog-foot">
          <button className="btn btn--ghost" autoFocus onClick={()=>{setConfirm(null);setPendingMode(null);}}>Cancel</button>
          {confirm==="mode"
            ? <button className="btn btn--primary" onClick={confirmMode}>Switch mode</button>
            : <button className="btn btn--primary" onClick={()=>{setConfirm(null);setVariant("inherited");setSave("saved");
                setToast({k:"ok",t:"Reset to inherited",b:"This Space now uses the Tenant default rubric."});setTimeout(()=>setToast(null),2600);}}>Reset rubric</button>}
        </div>
      </div>
    </>}

    {/* toast */}
    {toast && <div className={"toast "+(toast.k==="ok"?"ok":"bad")} role="status">
      <span className="lead">{I(toast.k==="ok"?"sparkles":"alert-circle",18)}</span>
      <div><div className="tt">{toast.t}</div><div className="tb">{toast.b}</div></div>
      {toast.k!=="ok" && <button className="retry" onClick={retrySave}>Retry</button>}
    </div>}

    {/* save-failed toast for the failed variant */}
    {isFailed && !toast && <div className="toast bad" role="alert">
      <span className="lead">{I("alert-circle",18)}</span>
      <div><div className="tt">Couldn’t save the rubric</div>
        <div className="tb">Your changes are kept — retry.</div></div>
      <button className="retry" onClick={retrySave}>Retry</button>
    </div>}

    {/* demo state switcher (card chrome) */}
    <div className="demo" role="group" aria-label="Preview states">
      <span className="dl">state</span>
      {[["default","Defined-here"],["inherited","Inherited"],["empty","Empty criteria"],
        ["invalid","Validation error"],["loading","Loading"],["failed","Save failed"],["tenant-admin","Tenant default"]].map(([v,l])=>
        <button key={v} className={variant===v?"on":""}
          onClick={()=>{setVariant(v);setSave(v==="failed"?"failed":v==="default"||v==="empty"?"dirty":"saved");
            if(v==="inherited"||v==="tenant-admin")setPassing(40);}}>{l}</button>)}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Screen/>);
</script>
</body>
</html>
