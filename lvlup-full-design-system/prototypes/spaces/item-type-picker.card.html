<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { Icon } = window.LvlupV0DesignSystem_5d0725;
const I = (name, size) => <Icon name={name} size={size || 16} />;

/* ===== dimmed parent shell ===== */

const Q_AUTO=[
  {id:"mcq",label:"MCQ",icon:"circle-dot",desc:"One correct answer from a list.",kw:"multiple choice single radio",dq:"{ options[], correctIndex: 0 }"},
  {id:"mcaq",label:"MCAQ",icon:"list-checks",desc:"Several correct answers; set min/max.",kw:"multi answer checkbox select",dq:"{ options[], correctIndices: [] }"},
  {id:"true-false",label:"True / False",icon:"toggle-left",desc:"A single binary choice.",kw:"binary yes no boolean",dq:"{ correct: true }"},
  {id:"numerical",label:"Numerical",icon:"hash",desc:"A number, with optional tolerance and unit.",kw:"number numeric value",dq:"{ correctAnswer: 0, tolerance: 0 }"},
  {id:"fill-blanks",label:"Fill in the Blanks",icon:"text-cursor-input",desc:"Type the missing words.",kw:"cloze gap typing",dq:"{ blanks: [] }"},
  {id:"fill-blanks-dd",label:"Fill Blanks (Dropdown)",icon:"chevrons-down-up",desc:"Pick the missing words from menus.",kw:"cloze dropdown select gap",dq:"{ blanks: [{options:[]}] }"},
  {id:"matching",label:"Matching",icon:"arrow-left-right",desc:"Match items in the left column to the right.",kw:"pair connect drag link",dq:"{ pairs: [] }"},
  {id:"jumbled",label:"Jumbled / Ordering",icon:"arrow-down-up",desc:"Put shuffled items in the correct order.",kw:"order sort sequence drag arrange",dq:"{ order: [] }"},
  {id:"group-options",label:"Group Options",icon:"group",desc:"Sort items into the correct groups.",kw:"categorize bucket classify sort",dq:"{ groups: [] }"},
];
const Q_AI=[
  {id:"text",label:"Short Text",icon:"type",desc:"A short exact answer; accepts alternatives.",kw:"short answer text alternatives",mode:"ai",dq:"{ guidance: '', accepted: [] }"},
  {id:"paragraph",label:"Paragraph",icon:"pilcrow",desc:"An open essay, scored by AI against your guidance.",kw:"essay long open writing prose",mode:"ai",dq:"{ guidance: '', maxWords: 0 }"},
  {id:"code",label:"Code",icon:"braces",desc:"Code run against test cases, plus AI review.",kw:"program tests run compile language",mode:"both",dq:"{ language, tests: [], rubric }"},
  {id:"audio",label:"Audio Response",icon:"mic",desc:"A spoken answer, transcribed and AI-scored.",kw:"spoken voice speaking recording",mode:"ai",dq:"{ guidance: '', maxSeconds: 120 }"},
  {id:"image_evaluation",label:"Image Evaluation",icon:"image",desc:"Learner uploads images; AI evaluates them.",kw:"photo upload picture vision diagram",mode:"ai",dq:"{ guidance: '', maxImages: 3 }"},
  {id:"chat_agent_question",label:"Chat Agent",icon:"message-square",desc:"A guided conversation against your objectives.",kw:"chat conversation tutor dialogue agent",mode:"ai",dq:"{ objectives: [], agentId }",needsAgent:true},
];
const MATERIALS=[
  {id:"text",label:"Text",icon:"file-text",desc:"Plain written content.",kw:"markdown note written prose"},
  {id:"video",label:"Video",icon:"play-circle",desc:"Embed a video by URL.",kw:"youtube embed media watch url"},
  {id:"pdf",label:"PDF",icon:"file-down",desc:"Link a PDF, optionally downloadable.",kw:"document attachment download file"},
  {id:"link",label:"Link",icon:"link",desc:"An external resource.",kw:"url website external bookmark"},
  {id:"interactive",label:"Interactive",icon:"mouse-pointer-click",desc:"Embed a tool or simulation.",kw:"embed widget simulation iframe tool"},
  {id:"story",label:"Story",icon:"book-marked",desc:"Long-form narrative with blocks.",kw:"narrative chapters long form"},
  {id:"rich",label:"Rich Content",icon:"layout-template",desc:"Structured article with media blocks.",kw:"article blocks structured media mixed"},
];

/* grading badge mapping */
function GBadge({mode}){
  if(mode==="ai") return <span className="gbadge ai" title="Scored by AI, may take a moment">{I("sparkles",11)}AI</span>;
  if(mode==="both") return <span className="gbadge both" title="Test cases run instantly, plus AI review">{I("zap",11)}Auto + AI</span>;
  if(mode==="material") return <span className="gbadge muted" title="Not graded — reference material">{I("book-open",11)}Material</span>;
  return <span className="gbadge auto" title="Graded instantly, server-side">{I("zap",11)}Auto</span>;
}

/* ===== type tile ===== */
function Tile({t,kind,mode,onPick,refFn,idx}){
  const disabled=t.needsAgent; // chat_agent_question gated by feature flag
  const accName=t.label+", "+(mode==="ai"?"AI-graded":mode==="both"?"auto and AI-graded":mode==="material"?"material":"auto-graded")+" "+(kind==="m"?"material":"question")+(disabled?", disabled":"");
  const icCls=mode==="ai"||mode==="both"?"ai":kind==="m"?"m":"q";
  return <button type="button" className={"tile"+(disabled?" disabled":"")}
    role="gridcell" aria-label={accName} aria-disabled={disabled||undefined}
    ref={refFn} data-idx={idx}
    onClick={()=>!disabled&&onPick(t,kind,mode)}>
    <div className="tile-top">
      <span className={"tile-ic "+icCls}>{I(t.icon,17)}</span>
      <span className="tile-lb">{t.label}</span>
    </div>
    <div className="tile-desc">{t.desc}</div>
    <div className="tile-foot">
      <GBadge mode={mode}/>
      {disabled && <span className="tip" style={{marginLeft:"auto"}}>
        <span className="tnote">{I("lock",11)}Locked</span>
        <span className="bub" role="tooltip">Configure an agent in the Agent Config tab on this space first.</span>
      </span>}
    </div>
  </button>;
}

/* ===== section block ===== */
function SectionBlock({label,count,children}){
  return <section>
    <div className="sechd">
      <span className="lb">{label}</span><span className="ct">· {count}</span><span className="rule"></span>
    </div>
    <div className="grid" role="grid" aria-label={label}>{children}</div>
  </section>;
}

/* ===== the picker modal ===== */
function PickerModal({onClose,onPick,onBank}){
  const [top,setTop]=useState("question"); // question | material
  const [q,setQ]=useState("");
  const searchRef=useRef(null);
  useEffect(()=>{ if(searchRef.current) searchRef.current.focus(); },[]);
  useEffect(()=>{
    const h=e=>{ if(e.key==="Escape") onClose(); };
    window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h);
  },[]);

  const match=t=>{
    const s=q.trim().toLowerCase(); if(!s) return true;
    return (t.label+" "+t.desc+" "+(t.kw||"")).toLowerCase().includes(s);
  };
  const qAuto=Q_AUTO.filter(match), qAi=Q_AI.filter(match), mats=MATERIALS.filter(match);

  const showQ=top==="question";
  const showM=top==="material";
  const visibleQ=(showQ?qAuto.length+qAi.length:0);
  const visibleM=(showM?mats.length:0);
  const nothing=(showQ&&visibleQ===0)||(showM&&visibleM===0);

  return <>
    <div className="scrim" onClick={onClose}></div>
    <div className="pmodal" role="dialog" aria-modal="true" aria-labelledby="pm-title">
      <div className="pm-head">
        <button className="sx-icbtn x" aria-label="Close — Esc" onClick={onClose}>{I("x",18)}</button>
        <h2 className="pm-title" id="pm-title">Add an item</h2>
        <p className="pm-sub">Choose what you want to create. You can change the details on the next step.</p>
        <div className="pm-searchrow">
          <div className="searchbox">
            {I("search",16)}
            <input ref={searchRef} value={q} onChange={e=>setQ(e.target.value)}
              placeholder="Search types — e.g. essay, code, video…" aria-label="Search item types"/>
            {q && <button className="clr" aria-label="Clear search" onClick={()=>setQ("")}>{I("x",13)}</button>}
          </div>
          <div className="seg" role="tablist" aria-label="Item category">
            <button role="tab" aria-selected={showQ} className={showQ?"on":""} onClick={()=>setTop("question")}>
              {I("help-circle",14)}Question <span className="sc">15</span></button>
            <button role="tab" aria-selected={showM} className={showM?"on":""} onClick={()=>setTop("material")}>
              {I("file-text",14)}Material <span className="sc">7</span></button>
          </div>
        </div>
      </div>

      <div className="pm-body">
        {nothing
          ? <div className="empty">
              <div className="ec">{I("search-x",22)}</div>
              <div className="et">Nothing matches "{q}"</div>
              <div className="eb">Try a broader word, or browse all types.</div>
              <div className="ehint">Closest matches: <b>essay → Paragraph</b> · <b>ordering → Jumbled</b> · <b>drag → Matching</b></div>
              <button className="btn btn--secondary" onClick={()=>setQ("")}>{I("x",15)}Clear search</button>
            </div>
          : <>
            {showQ && qAuto.length>0 &&
              <SectionBlock label="Questions · Auto-graded" count={qAuto.length}>
                {qAuto.map((t,i)=><Tile key={t.id} t={t} kind="q" mode="auto" onPick={onPick} idx={i}/>)}
              </SectionBlock>}
            {showQ && qAi.length>0 &&
              <SectionBlock label="Questions · AI-graded" count={qAi.length}>
                {qAi.map((t,i)=><Tile key={t.id} t={t} kind="q" mode={t.mode} onPick={onPick} idx={i}/>)}
              </SectionBlock>}
            {showM && mats.length>0 &&
              <SectionBlock label="Materials" count={mats.length}>
                {mats.map((t,i)=><Tile key={t.id} t={t} kind="m" mode="material" onPick={onPick} idx={i}/>)}
              </SectionBlock>}

            {showQ &&
              <div className="banner">
                <span className="lead">{I("library",18)}</span>
                <span className="sp">Reuse a question you've already written — bank originals stay intact.</span>
                <button className="btn btn--ghost btn--sm" onClick={onBank}>{I("import",15)}Pick from question bank{I("arrow-right",15)}</button>
              </div>}
          </>}
      </div>

      <div className="pm-foot">
        <span className="note">{I("shield-check",13)} Answer keys are added in the editor and stored server-side — never here.</span>
        <span className="sp"></span>
        <span className="note"><kbd>↑↓←→</kbd> move · <kbd>Enter</kbd> select · <kbd>Esc</kbd> close</span>
        <button className="btn btn--secondary" onClick={onClose}>Cancel</button>
      </div>
    </div>
  </>;
}

/* ===== screen ===== */
function Screen(){
  const [open,setOpen]=useState(true);
  const [toast,setToast]=useState(null);
  const [live,setLive]=useState("");

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  useEffect(()=>{ if(toast){const t=setTimeout(()=>setToast(null),3000);return ()=>clearTimeout(t);} },[toast]);

  /* selecting a type: closes picker, forward-pushes to item-editor with seeded draft.
     The picker performs NO writes — defaultQuestionData(qt) seeds the editor draft. */
  const pick=(t,kind,mode)=>{
    setOpen(false);
    setLive("Opening editor — "+t.label);
  };
  const bank=()=>{
    /* error path: question-bank handoff failing surfaces a toast; picker stays open */
    setToast({title:"Couldn't open the question bank.",body:"Try again."});
    setLive("Couldn't open the question bank. Try again.");
  };

  return <>
    <Shell>
      <div className="sx-scroll">
        <div className="sx-col">
          <div className="csh">
            <h2>Content</h2><span className="cnt">· Quadratics · 5 items</span>
            <div className="act">
              <button className="btn btn--primary" onClick={()=>setOpen(true)}>{I("plus",15)}Add Item</button>
            </div>
          </div>
          {/* dimmed parent content rows for context */}
          <div className="ghostnode"><span className="gi">{I("circle-dot",16)}</span><span className="gt">Solve x² − 4 = 0</span><span className="gm">mcq · 5 pts</span></div>
          <div className="ghostnode"><span className="gi">{I("file-text",16)}</span><span className="gt">Factoring recap</span><span className="gm">material · text</span></div>
          <div className="ghostnode"><span className="gi">{I("hash",16)}</span><span className="gt">Identify the vertex</span><span className="gm">numerical · 5 pts</span></div>
          <div className="ghostnode"><span className="gi">{I("braces",16)}</span><span className="gt">Implement quadratic_roots()</span><span className="gm">code · 12 pts</span></div>
          <div className="ghostnode"><span className="gi">{I("pilcrow",16)}</span><span className="gt">Explain the discriminant</span><span className="gm">paragraph · 10 pts</span></div>
        </div>
      </div>
    </Shell>

    <div className="srlive" aria-live="polite">{live}</div>

    {open && <PickerModal onClose={()=>setOpen(false)} onPick={pick} onBank={bank}/>}

    {toast && <div className="toast" role="alert">
      <span>{I("alert-circle",18)}</span>
      <span><span className="ta">{toast.title}</span> {toast.body}</span>
    </div>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Screen/>);
</script>
</body>
</html>
