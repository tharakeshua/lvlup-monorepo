<!-- @dsCard group="Spaces" viewport="1280x820" name="Space Purchase / Checkout" subtitle="Demo checkout · idempotent purchase" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../styles.css">
  <style>
    html,body{margin:0}
    body{background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}
    .stage{position:relative;min-height:820px;overflow:hidden}
    .num{font-family:var(--font-mono)}

    /* ---- platform (B2C) shell: slim topbar, NO sidebar ---- */
    .plat{display:flex;flex-direction:column;min-height:820px}
    .plat__top{display:flex;align-items:center;gap:var(--space-4);height:60px;
      padding:0 var(--space-6);border-bottom:1px solid var(--border-subtle);
      background:var(--bg-surface);box-shadow:var(--shadow-e0)}
    .plat__brand{display:flex;align-items:center;gap:var(--space-2);font-family:var(--font-display);
      font-weight:var(--weight-semibold);font-size:var(--text-lg);color:var(--text-primary)}
    .plat__brand .lockup{position:absolute;left:50%;transform:translateX(-50%)}
    .plat__spacer{flex:1}
    .plat__body{flex:1;display:flex;justify-content:center;padding:var(--space-8) var(--space-6) var(--space-12)}
    .checkout{width:100%;max-width:980px}

    .crumbrow{margin-bottom:var(--space-4)}
    .h1{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--weight-semibold);
      letter-spacing:var(--tracking-display);margin:0 0 var(--space-6)}

    /* ---- two-column grid (lg) ---- */
    .cgrid{display:grid;grid-template-columns:minmax(0,58fr) minmax(0,42fr);gap:var(--space-8);align-items:start}
    .col-pay{position:sticky;top:var(--space-6)}

    .ctitle{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);
      text-transform:uppercase;letter-spacing:var(--tracking-caption);color:var(--text-muted);
      font-weight:var(--weight-semibold);margin:0 0 var(--space-4)}

    /* ---- line-item space card (compact) ---- */
    .lineitem{display:flex;gap:var(--space-4);align-items:flex-start}
    .cover{flex:none;width:120px;height:84px;border-radius:var(--radius-md);overflow:hidden;
      background:var(--brand-muted);display:flex;align-items:center;justify-content:center;
      color:var(--text-on-accent);border:1px solid var(--border-subtle)}
    .li-main{min-width:0;flex:1}
    .li-title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);
      margin:0 0 var(--space-1);line-height:var(--leading-lg)}
    .li-by{font-size:var(--text-sm);color:var(--text-secondary);margin:0 0 var(--space-2)}
    .li-chips{display:flex;flex-wrap:wrap;gap:var(--space-2)}

    .divline{height:1px;background:var(--border-subtle);margin:var(--space-5) 0}

    /* ---- definition / totals rows ---- */
    .sum{display:grid;gap:var(--space-3)}
    .sumrow{display:flex;align-items:baseline;justify-content:space-between;gap:var(--space-4)}
    .sumrow__term{font-size:var(--text-sm);color:var(--text-secondary)}
    .sumrow__val{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-primary)}
    .totrow{display:flex;align-items:baseline;justify-content:space-between;gap:var(--space-4);
      padding-top:var(--space-4);border-top:1px solid var(--border-strong)}
    .totrow__term{font-size:var(--text-base);font-weight:var(--weight-semibold);color:var(--text-primary)}
    .totrow__val{font-family:var(--font-mono);font-size:var(--text-xl);font-weight:var(--weight-semibold);color:var(--text-primary)}

    .skelrow{display:flex;justify-content:space-between;gap:var(--space-4)}

    /* ---- payment method radios ---- */
    .methods{display:grid;gap:var(--space-3);margin:var(--space-4) 0}
    .method{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);
      border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);cursor:pointer}
    .method[data-sel="true"]{border-color:var(--brand-primary);background:var(--brand-subtle)}
    .method[data-disabled="true"]{cursor:not-allowed;background:var(--bg-surface-sunken);opacity:.85}
    .method__body{flex:1;min-width:0}
    .method__head{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
    .method__label{font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-primary)}
    .method__label--muted{color:var(--text-muted)}
    .method__hint{font-size:var(--text-xs);color:var(--text-secondary);margin-top:2px}

    .paybar{margin-top:var(--space-5);display:grid;gap:var(--space-3)}
    .keychip-row{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
    .keychip{font-family:var(--font-mono);font-size:var(--text-2xs)}
    .pay-foot{font-size:var(--text-xs);color:var(--text-muted);display:flex;align-items:center;gap:var(--space-2)}

    .cardbox{position:relative}

    /* footer trust row */
    .trust{display:flex;align-items:center;gap:var(--space-5);flex-wrap:wrap;margin-top:var(--space-8);
      padding-top:var(--space-5);border-top:1px solid var(--border-subtle);
      font-size:var(--text-xs);color:var(--text-muted)}
    .trust a{color:var(--text-secondary);text-decoration:none}
    .trust__item{display:flex;align-items:center;gap:var(--space-2)}

    /* success confirmation */
    .confirm{display:grid;gap:var(--space-4);place-items:center;text-align:center;padding:var(--space-6) 0}
    .confirm__badge{width:64px;height:64px;border-radius:var(--radius-pill);background:var(--spark-subtle);
      display:flex;align-items:center;justify-content:center;color:var(--spark)}
    .confirm__title{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--weight-semibold);margin:0}
    .confirm__txn{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-secondary)}

    /* spring pop + marigold burst */
    @keyframes springpop{0%{transform:scale(.6);opacity:0}55%{transform:scale(1.14)}100%{transform:scale(1);opacity:1}}
    .pop{animation:springpop var(--dur-base) var(--ease-entrance)}
    .burst{position:absolute;inset:0;pointer-events:none}
    .burst i{position:absolute;left:50%;top:42%;width:7px;height:7px;border-radius:var(--radius-pill);
      background:var(--spark);transform-origin:center;opacity:0;animation:fly var(--dur-slow) var(--ease-exit) forwards}
    @keyframes fly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.4)}}
    @media (prefers-reduced-motion: reduce){.pop{animation:none}.burst{display:none}}

    /* state switcher (prototype only) */
    .stateswitch{position:absolute;top:var(--space-3);left:50%;transform:translateX(-50%);z-index:60;
      display:flex;flex-wrap:wrap;gap:var(--space-1);background:var(--bg-surface);border:1px solid var(--border-subtle);
      border-radius:var(--radius-pill);padding:var(--space-1);box-shadow:var(--shadow-e2);max-width:96%}
    .stateswitch button{border:0;background:transparent;font-family:var(--font-ui);font-size:var(--text-2xs);
      font-weight:var(--weight-medium);color:var(--text-secondary);padding:var(--space-1) var(--space-3);
      border-radius:var(--radius-pill);cursor:pointer;white-space:nowrap}
    .stateswitch button[data-on="true"]{background:var(--brand-primary);color:var(--text-on-accent)}

    .toast-host{position:fixed;bottom:var(--space-5);right:var(--space-5);z-index:90;max-width:380px}
    .empty-wrap{display:flex;justify-content:center;padding-top:var(--space-12)}
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const {
      Button, IconButton, Icon, Avatar, Badge, Chip, Alert, Toast,
      Card, Breadcrumb, Skeleton, EmptyState, LoadingOverlay, Modal, Tooltip, Radio
    } = window.LvlupV0DesignSystem_5d0725;

    /* ---- mock store space (platform_public catalog) ---- */
    const SPACE = {
      spaceId: "spc_dp1_pub",
      title: "Dynamic Programming, End to End",
      author: "by A. Rao · Lyceum Originals",
      price: 49.00,
      currency: "USD",
      storyPoints: 7,
      items: 142,
      level: "Intermediate",
      hours: 12
    };
    const IDEMPOTENCY_KEY = "idmp_9f3c1a72-4be0-47d2-9a18-purchase";

    function money(amount, currency){
      try {
        return new Intl.NumberFormat("en-US",{style:"currency",currency}).format(amount);
      } catch(e){ return currency + " " + amount.toFixed(2); }
    }

    function Burst(){
      const bits = Array.from({length:12});
      return (
        <div className="burst" aria-hidden="true">
          {bits.map((_,i)=>{
            const ang = (i/bits.length)*Math.PI*2;
            const dx = Math.cos(ang)*72 + "px";
            const dy = Math.sin(ang)*72 + "px";
            return <i key={i} style={{"--dx":dx,"--dy":dy,animationDelay:(i*8)+"ms"}}/>;
          })}
        </div>
      );
    }

    function OrderSummary({scn, total}){
      if(scn==="loading"){
        return (
          <div>
            <div className="lineitem">
              <Skeleton width="120px" height="84px"/>
              <div className="li-main" style={{display:"grid",gap:"var(--space-2)"}}>
                <Skeleton width="78%" height="1.1rem"/>
                <Skeleton width="46%"/>
                <Skeleton width="60%"/>
              </div>
            </div>
            <div className="divline"></div>
            <div className="sum">
              <div className="skelrow"><Skeleton width="30%"/><Skeleton width="18%"/></div>
              <div className="skelrow"><Skeleton width="34%"/><Skeleton width="16%"/></div>
              <div className="skelrow"><Skeleton width="22%"/><Skeleton width="22%"/></div>
            </div>
          </div>
        );
      }
      return (
        <div>
          <div className="lineitem">
            <div className="cover" role="img" aria-label={"Cover for "+SPACE.title}>
              <Icon name="layers" size={28}/>
            </div>
            <div className="li-main">
              <h3 className="li-title">{SPACE.title}</h3>
              <p className="li-by">{SPACE.author}</p>
              <div className="li-chips">
                <Chip><Icon name="git-branch" size={13}/>&nbsp;<span className="num">{SPACE.storyPoints}</span>&nbsp;story points</Chip>
                <Chip><Icon name="file-text" size={13}/>&nbsp;<span className="num">{SPACE.items}</span>&nbsp;items</Chip>
                <Chip><Icon name="signal" size={13}/>&nbsp;{SPACE.level}</Chip>
              </div>
            </div>
          </div>

          <div className="divline"></div>

          <dl className="sum">
            <div className="sumrow"><dt className="sumrow__term">Subtotal</dt>
              <dd className="sumrow__val" style={{margin:0}}>{money(SPACE.price, SPACE.currency)}</dd></div>
            <div className="sumrow"><dt className="sumrow__term">Tax (est.)</dt>
              <dd className="sumrow__val" style={{margin:0}}>{money(0, SPACE.currency)}</dd></div>
            <div className="totrow">
              <dt className="totrow__term">Total</dt>
              <dd className="totrow__val" style={{margin:0}}
                  aria-label={"Total: forty-nine US dollars"}>{money(total, SPACE.currency)}</dd>
            </div>
          </dl>
        </div>
      );
    }

    function Methods({method, setMethod, locked}){
      const Dot = ({on}) => (
        <span aria-hidden="true" style={{flex:"none",marginTop:"2px",color: on?"var(--brand-primary)":"var(--text-muted)"}}>
          <Icon name={on?"circle-dot":"circle"} size={18}/>
        </span>
      );
      return (
        <div className="methods" role="radiogroup" aria-label="Payment method">
          <div className="method" data-sel={method==="demo"}
               role="radio" aria-checked={method==="demo"} tabIndex={0}
               onClick={()=>!locked && setMethod("demo")}>
            <Dot on={method==="demo"}/>
            <div className="method__body">
              <div className="method__head">
                <span className="method__label">Demo checkout (no charge)</span>
                <Badge variant="info" icon={<Icon name="flask-conical" size={12}/>}>Demo</Badge>
              </div>
              <div className="method__hint">Records your enrollment without charging a card.</div>
            </div>
          </div>

          <div className="method" data-disabled="true" data-sel={false}
               role="radio" aria-checked={false} aria-disabled="true">
            <span aria-hidden="true" style={{flex:"none",marginTop:"2px",color:"var(--text-muted)"}}>
              <Icon name="credit-card" size={18}/>
            </span>
            <div className="method__body">
              <div className="method__head">
                <span className="method__label method__label--muted">Credit / debit card</span>
                <Badge icon={<Icon name="clock" size={12}/>}>Coming soon</Badge>
              </div>
              <div className="method__hint">A payment gateway is part of the rebuild.</div>
            </div>
          </div>
        </div>
      );
    }

    /* primary CTA varies by scenario */
    function PayCTA({scn, busy, total, onPay, onOpen}){
      if(scn==="enrolled"){
        return (
          <Button variant="primary" block size="lg"
            leadingIcon={<Icon name="play" size={18}/>} onClick={onOpen}>
            Open in My Spaces
          </Button>
        );
      }
      const disabled = scn==="partial";
      const label = SPACE.price===0 ? "Enroll for free (demo)" : "Pay " + money(total, SPACE.currency);
      return (
        <Button variant="spark" block size="lg" disabled={disabled} loading={busy}
          leadingIcon={!busy && <Icon name="lock" size={18}/>}
          onClick={onPay}>
          {busy ? "Processing…" : label}
        </Button>
      );
    }

    function Screen(){
      // scenarios: ready | loading | empty | loaderror | partial | enrolled | processing | decline | success | b2b
      const [scn,setScn] = useState("ready");
      const [method,setMethod] = useState("demo");
      const [busy,setBusy] = useState(false);
      const [overlay,setOverlay] = useState(false);
      const [confirmLeave,setConfirmLeave] = useState(false);
      const [toast,setToast] = useState(null);
      const [pop,setPop] = useState(false);

      const total = SPACE.price;
      const isProcessing = scn==="processing" || overlay;

      useEffect(()=>{
        setBusy(scn==="processing");
        setOverlay(scn==="processing");
        if(scn==="success"){ setPop(true); const t=setTimeout(()=>setPop(false),900); return ()=>clearTimeout(t); }
      },[scn]);

      function doPay(){
        setBusy(true); setOverlay(true);
        setTimeout(()=>{
          setBusy(false); setOverlay(false);
          setScn("success");
          setToast({variant:"success", title:"You're enrolled in "+SPACE.title+" 🎉",
            body:"Opening your space…"});
        }, 1300);
      }
      function retry(){
        // SAME idempotency key — never double-charge
        setScn("ready");
        setTimeout(doPay, 60);
      }

      const top = (
        <header className="plat__top">
          <Button variant="ghost" size="sm" leadingIcon={<Icon name="arrow-left" size={16}/>}>Back to store</Button>
          <div className="plat__brand lockup"><Icon name="graduation-cap" size={20}/> Auto-LevelUp</div>
          <div className="plat__spacer"></div>
          <IconButton icon={<Icon name="search" size={18}/>} label="Search the store"/>
          <Avatar initials="JK" size="sm"/>
        </header>
      );

      /* ---- EMPTY CART scenario: whole body is EmptyState ---- */
      if(scn==="empty"){
        return (
          <div className="stage">
            <StateSwitch scn={scn} setScn={x=>{setScn(x);setToast(null);setConfirmLeave(false);}}/>
            <div className="plat">
              {top}
              <div className="plat__body">
                <div className="empty-wrap">
                  <EmptyState icon="shopping-cart"
                    title="Nothing to check out yet"
                    body="Browse the store to find a space worth owning."
                    action={<Button variant="primary" leadingIcon={<Icon name="store" size={16}/>}>Browse the store</Button>}/>
                </div>
              </div>
            </div>
          </div>
        );
      }

      const showSuccessPanel = scn==="success";

      return (
        <div className="stage">
          <StateSwitch scn={scn} setScn={x=>{setScn(x);setToast(null);setConfirmLeave(false);setOverlay(false);}}/>

          <div className="plat">
            {top}
            <div className="plat__body">
              <div className="checkout">
                <div className="crumbrow">
                  <Breadcrumb items={[
                    {label:"Store", href:"#"},
                    {label:SPACE.title, href:"#"},
                    {label:"Checkout"}
                  ]}/>
                </div>
                <h1 className="h1">Checkout</h1>

                {/* B2B (tenant member) gate — not a purchaser */}
                {scn==="b2b" && (
                  <Card>
                    <Alert variant="info" title="Spaces are assigned by your school">
                      Your account gets spaces through enrollment, not purchase. Head to your spaces to keep learning.
                    </Alert>
                    <div style={{marginTop:"var(--space-4)"}}>
                      <Button variant="primary" leadingIcon={<Icon name="book-open" size={16}/>}>Go to my spaces</Button>
                    </div>
                  </Card>
                )}

                {scn!=="b2b" && (
                  <div className="cgrid">
                    {/* ---------- ORDER SUMMARY ---------- */}
                    <Card>
                      <h2 className="ctitle"><Icon name="receipt" size={14}/> Order summary</h2>

                      {scn==="loaderror" ? (
                        <Alert variant="error" title="We couldn't load this space">
                          Try again or head back to the store. <span className="num">(error.details.code: NOT_FOUND)</span>
                          <div style={{display:"flex",gap:"var(--space-2)",marginTop:"var(--space-3)"}}>
                            <Button variant="primary" size="sm" leadingIcon={<Icon name="rotate-ccw" size={14}/>}
                              onClick={()=>setScn("ready")}>Try again</Button>
                            <Button variant="ghost" size="sm">Back to store</Button>
                          </div>
                        </Alert>
                      ) : (
                        <OrderSummary scn={scn} total={total}/>
                      )}
                    </Card>

                    {/* ---------- PAYMENT (sticky) ---------- */}
                    <div className="col-pay">
                      <Card>
                        <div className="cardbox" aria-busy={isProcessing}>
                          {pop && <Burst/>}
                          {showSuccessPanel ? (
                            <div className={"confirm"+(pop?" pop":"")}>
                              <div className="confirm__badge"><Icon name="party-popper" size={30}/></div>
                              <h2 className="confirm__title">Enrolled!</h2>
                              <p style={{margin:0,color:"var(--text-secondary)",fontSize:"var(--text-sm)"}}>
                                You now own “{SPACE.title}.”
                              </p>
                              <div className="confirm__txn">Transaction <span className="num">txn_7Fa92Kd1Qe</span></div>
                              <Button variant="primary" leadingIcon={<Icon name="play" size={16}/>}>Open the space</Button>
                              <p style={{margin:0,fontSize:"var(--text-xs)",color:"var(--text-muted)"}}>Redirecting to My Spaces…</p>
                            </div>
                          ) : (
                            <div>
                              <h2 className="ctitle"><Icon name="credit-card" size={14}/> Payment</h2>

                              {scn==="loading" ? (
                                <div style={{display:"grid",gap:"var(--space-3)"}}>
                                  <Skeleton height="3rem"/>
                                  <Skeleton height="3rem"/>
                                  <Skeleton height="2.6rem"/>
                                </div>
                              ) : (
                                <div>
                                  {/* honest rebuild-gap notice */}
                                  <Alert variant="info" title="Demo checkout">
                                    Real card payments aren't connected yet — this records your enrollment without
                                    charging a card. A payment gateway is part of the rebuild.
                                  </Alert>

                                  {/* partial / unavailable */}
                                  {scn==="partial" && (
                                    <div style={{marginTop:"var(--space-3)"}}>
                                      <Alert variant="warning" title="Not available for purchase right now">
                                        This space isn't published to the store at the moment. (server:
                                        <span className="num"> failed-precondition</span>)
                                      </Alert>
                                    </div>
                                  )}

                                  {/* already enrolled */}
                                  {scn==="enrolled" && (
                                    <div style={{marginTop:"var(--space-3)"}}>
                                      <Alert variant="success" title="You already own this space">
                                        No need to pay again — jump straight back in.
                                      </Alert>
                                    </div>
                                  )}

                                  {/* decline */}
                                  {scn==="decline" && (
                                    <div style={{marginTop:"var(--space-3)"}} role="alert">
                                      <Alert variant="error" title="Payment didn't go through">
                                        No charge was made — you can safely try again. We reuse the same one-time key,
                                        so you're never charged twice.
                                        <div style={{marginTop:"var(--space-3)"}}>
                                          <Button variant="primary" size="sm"
                                            leadingIcon={<Icon name="rotate-ccw" size={14}/>}
                                            onClick={retry}>Try again</Button>
                                        </div>
                                      </Alert>
                                    </div>
                                  )}

                                  <Methods method={method} setMethod={setMethod} locked={isProcessing}/>

                                  <div className="paybar">
                                    <PayCTA scn={scn} busy={busy} total={total}
                                      onPay={doPay} onOpen={()=>{}}/>

                                    <div className="keychip-row">
                                      <Tooltip content="Safe to retry — we use a one-time key so you're never charged twice.">
                                        <Chip className="keychip">
                                          <Icon name="shield-check" size={13}/>&nbsp;idempotencyKey {IDEMPOTENCY_KEY.slice(0,12)}…
                                        </Chip>
                                      </Tooltip>
                                    </div>
                                    <div className="pay-foot">
                                      <Icon name="lock" size={13}/> Secure demo · no card stored
                                    </div>
                                  </div>
                                </div>
                              )}

                              {overlay && (
                                <React.Fragment>
                                  <LoadingOverlay/>
                                  <span className="u-sr-only" role="status">Processing payment…</span>
                                </React.Fragment>
                              )}
                            </div>
                          )}
                        </div>
                      </Card>
                    </div>
                  </div>
                )}

                {/* footer trust row */}
                {scn!=="b2b" && (
                  <div className="trust">
                    <span className="trust__item"><Icon name="shield" size={14}/> Demo environment — no real charge</span>
                    <a href="#">Refund &amp; terms</a>
                    <a href="#">Support</a>
                    <span className="trust__item" style={{marginLeft:"auto"}}>
                      <Icon name="repeat" size={14}/> api.levelup.purchaseSpace · idempotent (write tier)
                    </span>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* leave-during-processing guard */}
          <Modal open={confirmLeave} onClose={()=>setConfirmLeave(false)} title="Leave checkout?"
            footer={
              <div style={{display:"flex",gap:"var(--space-3)",justifyContent:"flex-end",width:"100%"}}>
                <Button variant="secondary" onClick={()=>setConfirmLeave(false)}>Stay</Button>
                <Button variant="danger" onClick={()=>setConfirmLeave(false)}>Leave anyway</Button>
              </div>
            }>
            <p style={{margin:0,fontSize:"var(--text-sm)",color:"var(--text-secondary)"}}>
              Your payment is still processing — leave anyway? We won't charge you twice if you come back.
            </p>
          </Modal>

          {/* demo: trigger the leave-guard from the processing state */}
          {scn==="processing" && (
            <div style={{position:"fixed",bottom:"var(--space-5)",left:"var(--space-5)",zIndex:90}}>
              <Button variant="ghost" size="sm" leadingIcon={<Icon name="arrow-left" size={14}/>}
                onClick={()=>setConfirmLeave(true)}>Try to leave (guard demo)</Button>
            </div>
          )}

          {toast && (
            <div className="toast-host">
              <Toast variant={toast.variant} title={toast.title} body={toast.body}/>
            </div>
          )}
        </div>
      );
    }

    function StateSwitch({scn,setScn}){
      const opts = [
        ["ready","Ready"],["loading","Loading"],["empty","Empty cart"],
        ["loaderror","Load error"],["partial","Unavailable"],["enrolled","Already enrolled"],
        ["processing","Processing"],["decline","Decline"],["success","Success"],["b2b","B2B gate"]
      ];
      return (
        <div className="stateswitch" role="tablist" aria-label="Prototype states">
          {opts.map(([k,l])=>(
            <button key={k} data-on={scn===k} onClick={()=>setScn(k)}>{l}</button>
          ))}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Screen/>);
    if(window.lucide) window.lucide.createIcons();
  </script>
</body>
</html>
