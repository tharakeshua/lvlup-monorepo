<!-- @dsCard group="Spaces" viewport="1280x820" name="Reviews & Ratings" subtitle="Store reviews · write & read" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../styles.css">
  <style>
    html,body{margin:0;height:100%}
    body{background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}
    #root{height:100vh}

    .rv-topbar__spacer{flex:1}
    .rv-search{position:relative;flex:0 1 300px;display:flex;align-items:center}
    .rv-search .rv-search__icon{position:absolute;left:var(--space-3);display:flex;color:var(--text-muted)}
    .rv-search input{padding-left:var(--space-8)}

    .rv-main{display:flex;flex-direction:column;gap:var(--space-5);max-width:1100px}
    .rv-mono{font-family:var(--font-mono)}
    .rv-muted{color:var(--text-muted);font-size:var(--text-sm)}

    /* demo state switcher (not production chrome) */
    .rv-statebar{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap}
    .rv-toggle{display:inline-flex;background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:2px;flex-wrap:wrap}
    .rv-toggle button{display:flex;align-items:center;gap:var(--space-1);height:30px;padding:0 var(--space-3);border:0;background:transparent;color:var(--text-secondary);font-family:var(--font-ui);font-size:var(--text-xs);border-radius:var(--radius-sm);cursor:pointer}
    .rv-toggle button[aria-pressed="true"]{background:var(--bg-surface);color:var(--text-primary);box-shadow:var(--shadow-e1)}

    /* section heading */
    .rv-section-head{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap}
    .rv-h2{font-family:var(--font-display);font-size:var(--text-3xl);line-height:var(--leading-3xl);font-weight:var(--weight-semibold);margin:0;letter-spacing:var(--tracking-display)}
    .rv-h2-sub{font-size:var(--text-sm);color:var(--text-secondary);margin-top:2px}

    /* aggregate panel */
    .rv-agg{display:grid;grid-template-columns:360px 1fr;gap:var(--space-6);align-items:center}
    .rv-agg-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--space-2);text-align:center;border-right:1px solid var(--border-subtle);padding-right:var(--space-6)}
    .rv-hero-num{font-family:var(--font-mono);font-size:var(--text-5xl);line-height:1;color:var(--text-primary);font-weight:var(--weight-semibold);transition:opacity var(--dur-slow) var(--ease-standard)}
    .rv-hero-out{font-family:var(--font-display);font-size:var(--text-lg);color:var(--text-secondary)}
    .rv-hero-stars{display:inline-flex;align-items:center;gap:2px}
    .rv-hero-count{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-secondary)}

    /* star glyph row (display) */
    .rv-stars{display:inline-flex;align-items:center;gap:2px;line-height:0}
    .rv-star{position:relative;display:inline-block;color:var(--border-strong)}
    .rv-star__fill{position:absolute;top:0;left:0;overflow:hidden;color:var(--spark);white-space:nowrap}

    /* distribution rows */
    .rv-dist{display:flex;flex-direction:column;gap:var(--space-3);min-width:0}
    .rv-dist-row{display:grid;grid-template-columns:54px 1fr 48px;align-items:center;gap:var(--space-3)}
    .rv-dist-label{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-sm);color:var(--text-secondary);justify-content:flex-end}
    .rv-dist-label .rv-star{color:var(--spark)}
    .rv-dist-pct{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-secondary);text-align:right}
    .rv-dist-pct.is-zero{color:var(--text-muted)}

    /* controls row */
    .rv-controls{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap}
    .rv-control{display:flex;flex-direction:column;gap:4px;min-width:170px}
    .rv-control-lbl{font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
    .rv-controls__spacer{flex:1}
    .rv-showing{font-size:var(--text-xs);color:var(--text-muted)}

    /* review list */
    .rv-list{display:flex;flex-direction:column;gap:var(--space-4);max-width:760px}
    .rv-card{position:relative;display:flex;flex-direction:column;gap:var(--space-3)}
    .rv-card--own{border-left:3px solid var(--spark);background:var(--spark-subtle)}
    .rv-card-head{display:flex;align-items:flex-start;gap:var(--space-3)}
    .rv-card-id{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
    .rv-card-name{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
    .rv-card-name strong{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-primary)}
    .rv-card-meta{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--text-muted)}
    .rv-card-date{cursor:help}
    .rv-card-body{font-size:var(--text-sm);line-height:var(--leading-md);color:var(--text-primary);white-space:pre-wrap}
    .rv-card-foot{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3)}
    .rv-helpful{display:inline-flex;align-items:center;gap:var(--space-1)}
    .rv-helpful--on{color:var(--spark)}

    /* own-review pin spark burst */
    .rv-badge-wrap{position:relative;display:inline-flex}
    @keyframes rv-spark{0%{transform:scale(.5);opacity:0}45%{transform:scale(1.3);opacity:1}100%{transform:scale(2.2);opacity:0}}
    .rv-spark-burst{position:absolute;inset:-6px;border-radius:var(--radius-pill);box-shadow:var(--glow-spark);background:var(--spark-subtle);pointer-events:none;animation:rv-spark var(--dur-slow) var(--ease-standard) forwards}
    @keyframes rv-pop{0%{transform:scale(.7)}55%{transform:scale(1.12)}100%{transform:scale(1)}}
    .rv-pop{animation:rv-pop var(--dur-base) var(--ease-entrance)}
    @media (prefers-reduced-motion: reduce){.rv-spark-burst{display:none}.rv-pop{animation:none}.rv-hero-num{transition:none}}

    /* skeleton blocks */
    .rv-skelcard{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-3)}
    .rv-skel-head{display:flex;gap:var(--space-3);align-items:center}
    .rv-skel-dist{display:flex;flex-direction:column;gap:var(--space-3)}

    /* star input (modal) */
    .rv-starinput{display:inline-flex;align-items:center;gap:var(--space-1)}
    .rv-starinput button{all:unset;cursor:pointer;display:inline-grid;place-items:center;width:44px;height:44px;border-radius:var(--radius-sm);color:var(--border-strong)}
    .rv-starinput button.is-on{color:var(--spark)}
    .rv-starinput button:focus-visible{outline:var(--ring-focus)}
    .rv-rating-value{margin-left:var(--space-2);font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-secondary)}
    .rv-form-field{display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-4)}
    .rv-form-lbl{font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-primary)}
    .rv-form-req{color:var(--status-error)}
    .rv-counter{align-self:flex-end;font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-muted)}
    .rv-counter.is-over{color:var(--status-error)}

    .rv-toasts{position:fixed;right:var(--space-5);bottom:var(--space-5);z-index:60;display:flex;flex-direction:column;gap:var(--space-2)}
    .rv-loadmore{display:flex;justify-content:center;padding-top:var(--space-2)}
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const {
      Button, IconButton, Icon, Input, Textarea, Select, Card, Panel, Section, Modal,
      Badge, Chip, Avatar, ProgressBar, EmptyState, Skeleton, Alert, Toast, Breadcrumb, Kbd, NavItem
    } = window.LvlupV0DesignSystem_5d0725;

    /* ---------- display star row (fractional fill) ---------- */
    function StarsDisplay({ value, size=16, label }){
      const pct = Math.max(0, Math.min(100, (value/5)*100));
      const glyphs = "★★★★★";
      return (
        <span className="rv-stars" role="img" aria-label={label || (value+" out of 5")}>
          <span className="rv-star" style={{fontSize:size+"px",letterSpacing:"2px"}} aria-hidden="true">
            {glyphs}
            <span className="rv-star__fill" style={{width:pct+"%",fontSize:size+"px",letterSpacing:"2px"}}>{glyphs}</span>
          </span>
        </span>
      );
    }

    /* ---------- interactive star input (radiogroup) ---------- */
    function StarsInput({ value, onChange, error }){
      const [hover, setHover] = useState(0);
      const shown = hover || value;
      function onKey(e){
        if (e.key==="ArrowRight" || e.key==="ArrowUp"){ e.preventDefault(); onChange(Math.min(5,(value||0)+1)); }
        else if (e.key==="ArrowLeft" || e.key==="ArrowDown"){ e.preventDefault(); onChange(Math.max(1,(value||1)-1)); }
        else if (e.key==="Home"){ e.preventDefault(); onChange(1); }
        else if (e.key==="End"){ e.preventDefault(); onChange(5); }
      }
      return (
        <div role="radiogroup" aria-label="Rating, 1 to 5 stars" className="rv-starinput"
             onKeyDown={onKey} onMouseLeave={()=>setHover(0)}>
          {[1,2,3,4,5].map(n => (
            <button type="button" key={n} role="radio"
              aria-checked={value===n}
              aria-label={n+" of 5 stars"}
              tabIndex={ (value===n) || (!value && n===1) ? 0 : -1 }
              className={n<=shown ? "is-on" : ""}
              onMouseEnter={()=>setHover(n)}
              onClick={()=>onChange(n)}>
              <Icon name="star" size={28} />
            </button>
          ))}
          <span className="rv-rating-value" aria-hidden="true">{value ? value+" of 5" : "Not rated"}</span>
        </div>
      );
    }

    /* ---------- review card ---------- */
    function ReviewCard({ r, own, onHelpful, onEdit, gated, popped }){
      return (
        <Card className={"rv-card" + (own ? " rv-card--own" : "")}>
          {own && <span style={{position:"absolute",top:"var(--space-4)",right:"var(--space-4)"}}/>}
          <div className="rv-card-head">
            <Avatar initials={r.initials} size="sm"/>
            <div className="rv-card-id">
              <div className="rv-card-name">
                <strong>{r.name}</strong>
                <StarsDisplay value={r.rating} size={14} label={r.rating+" out of 5"}/>
                {r.verified && (
                  <Badge variant="success" icon={<Icon name="badge-check" size={12}/>}>&nbsp;Verified learner</Badge>
                )}
                {own && (
                  <span className={"rv-badge-wrap" + (popped ? " rv-pop" : "")}>
                    {popped && <span className="rv-spark-burst"/>}
                    <Badge variant="spark" icon={<Icon name="user" size={12}/>}>&nbsp;Your review</Badge>
                  </span>
                )}
              </div>
              <div className="rv-card-meta">
                <span className="rv-card-date" title={r.absolute}>{r.date}</span>
              </div>
            </div>
          </div>
          {r.comment
            ? <div className="rv-card-body">{r.comment}</div>
            : <div className="rv-muted" style={{fontStyle:"italic"}}>Rated {r.rating} of 5 — no written review.</div>}
          <div className="rv-card-foot">
            <Button variant="ghost" size="sm"
              disabled={gated}
              className={r.helpfulOn ? "rv-helpful--on" : ""}
              leadingIcon={<Icon name="thumbs-up" size={15}/>}
              onClick={()=>!gated && onHelpful(r.id)}
              title={gated ? "Sign in to vote" : undefined}
              aria-pressed={!!r.helpfulOn}>
              Helpful (<span className="rv-mono">{r.helpful}</span>)
            </Button>
            {own && (
              <Button variant="secondary" size="sm" leadingIcon={<Icon name="pencil" size={14}/>} onClick={onEdit}>Edit</Button>
            )}
          </div>
        </Card>
      );
    }

    /* ---------- data ---------- */
    const SPACE = { title:"Algorithms & Data Structures", id:"sp_8744" };
    const AGG = { average:4.6, total:312, dist:{5:221,4:56,3:19,2:9,1:7} };

    const SEED_REVIEWS = [
      { id:"rv_01", initials:"PM", name:"Priya M.", rating:4, verified:true,
        date:"3 days ago", absolute:"Jun 17, 2026", helpful:24, helpfulOn:false,
        comment:"The graph-theory track finally made BFS and DFS click for me. Worked examples are paced well; I'd have liked one more hard practice set on shortest paths, but the auto-grading caught my off-by-one bugs instantly." },
      { id:"rv_02", initials:"DT", name:"Dev T.", rating:5, verified:true,
        date:"1 week ago", absolute:"Jun 13, 2026", helpful:41, helpfulOn:true,
        comment:"Best interview-prep space I've worked through. The timed module test is brutal in a good way — felt close to the real thing." },
      { id:"rv_03", initials:"AR", name:"Aisha R.", rating:3, verified:false,
        date:"2 weeks ago", absolute:"Jun 6, 2026", helpful:8, helpfulOn:false,
        comment:"Solid foundations but the sorting unit moves fast. Good value if you already know Big-O notation going in." },
      { id:"rv_04", initials:"KS", name:"Karthik S.", rating:5, verified:true,
        date:"3 weeks ago", absolute:"May 30, 2026", helpful:15, helpfulOn:false,
        comment:"" },
      { id:"rv_05", initials:"LN", name:"Lena N.", rating:2, verified:true,
        date:"1 month ago", absolute:"May 19, 2026", helpful:5, helpfulOn:false,
        comment:"Content is fine but I hit a few items where the hint didn't match the question. Reported them; otherwise the tutor was helpful." },
    ];

    const SORT_OPTS = [
      { value:"helpful", label:"Most helpful" },
      { value:"recent",  label:"Most recent" },
      { value:"highest", label:"Highest rated" },
      { value:"lowest",  label:"Lowest rated" },
    ];
    const FILTER_OPTS = [
      { value:"all", label:"All stars" },
      { value:"5", label:"5 stars" },
      { value:"4", label:"4 stars" },
      { value:"3", label:"3 stars" },
      { value:"2", label:"2 stars" },
      { value:"1", label:"1 star" },
    ];

    /* ---------- chrome ---------- */
    function Sidebar(){
      return (
        <aside className="appshell__sidebar">
          <div className="sidebar__brand">
            <span className="sidebar__brand-mark">L</span>
            <span className="sidebar__brand-name">Lyceum</span>
          </div>
          <nav className="sidebar__nav" aria-label="Primary">
            <div className="sidebar__section-label">Workspace</div>
            <NavItem icon="layout-dashboard" href="#">Dashboard</NavItem>
            <NavItem icon="library" href="#" active>Spaces</NavItem>
            <NavItem icon="file-text" href="#">Exams</NavItem>
            <NavItem icon="users" href="#">Students</NavItem>
            <NavItem icon="graduation-cap" href="#">Classes</NavItem>
            <div className="sidebar__section-label">Insights</div>
            <NavItem icon="bar-chart-3" href="#">Analytics</NavItem>
            <NavItem icon="store" href="#">Store</NavItem>
          </nav>
        </aside>
      );
    }
    function Topbar(){
      return (
        <header className="appshell__topbar">
          <Breadcrumb items={[{label:"Spaces", href:"#"}, {label:SPACE.title, href:"#"}, {label:"Reviews"}]}/>
          <div className="rv-topbar__spacer"/>
          <div className="rv-search">
            <span className="rv-search__icon"><Icon name="search" size={16}/></span>
            <Input placeholder="Search or jump to…" aria-label="Global search" readOnly/>
          </div>
          <Kbd>⌘K</Kbd>
          <IconButton icon={<Icon name="bell" size={18}/>} label="Notifications"/>
          <Avatar initials="SK" size="sm"/>
        </header>
      );
    }

    function Screen(){
      const [demo, setDemo] = useState("default"); // default | loading | empty | error | partial | gated | anon
      const [viewer, setViewer] = useState("reviewed"); // eligibility maps from demo for permission rows

      const [reviews, setReviews] = useState(SEED_REVIEWS);
      const [sort, setSort] = useState("helpful");
      const [filter, setFilter] = useState("all");
      const [listFade, setListFade] = useState(false);

      const [modalOpen, setModalOpen] = useState(false);
      const [editMode, setEditMode] = useState(false);
      const [ratingInput, setRatingInput] = useState(0);
      const [commentInput, setCommentInput] = useState("");
      const [ratingErr, setRatingErr] = useState(false);
      const [saveErr, setSaveErr] = useState(false);
      const [saving, setSaving] = useState(false);

      const [ownReview, setOwnReview] = useState(null); // {id,...} once posted/edited
      const [popOwn, setPopOwn] = useState(false);
      const [heroNum, setHeroNum] = useState(AGG.average);
      const [agg, setAgg] = useState(AGG);

      const [toasts, setToasts] = useState([]);
      const [live, setLive] = useState("");

      function pushToast(t){ const id=Date.now()+Math.random(); setToasts(p=>[...p,{id,...t}]); setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),3600); }

      /* permission model driven by the preview state */
      // eligibility: 'reviewed' | 'eligible' | 'gated' (auth not enrolled) | 'anon'
      const eligibility =
        demo==="gated" ? "gated" :
        demo==="anon"  ? "anon" :
        ownReview || demo==="default" ? (ownReview ? "reviewed" : "eligible") :
        "eligible";
      const isReviewed = !!ownReview;
      const canVote = !(eligibility==="anon");

      /* sorting + filtering (aggregate unaffected) */
      const filtered = reviews.filter(r => filter==="all" ? true : r.rating===Number(filter));
      const sorted = [...filtered].sort((a,b)=>{
        if (sort==="helpful") return b.helpful - a.helpful;
        if (sort==="highest") return b.rating - a.rating;
        if (sort==="lowest")  return a.rating - b.rating;
        return 0; // recent: keep seeded order (newest first)
      });
      // pin own review to top regardless of sort
      const ordered = ownReview
        ? [ownReview, ...sorted.filter(r=>r.id!==ownReview.id)]
        : sorted;

      function changeSort(v){ setListFade(true); setTimeout(()=>setListFade(false), 180); setSort(v); }
      function changeFilter(v){ setListFade(true); setTimeout(()=>setListFade(false), 180); setFilter(v); }

      function openWrite(){
        setEditMode(false);
        setRatingInput(0); setCommentInput(""); setRatingErr(false); setSaveErr(false);
        setModalOpen(true);
      }
      function openEdit(){
        setEditMode(true);
        setRatingInput(ownReview ? ownReview.rating : 0);
        setCommentInput(ownReview ? ownReview.comment : "");
        setRatingErr(false); setSaveErr(false);
        setModalOpen(true);
      }

      function submitReview(failFirst){
        if (!ratingInput){ setRatingErr(true); return; }
        setRatingErr(false); setSaving(true); setSaveErr(false);
        setTimeout(()=>{
          if (failFirst){
            setSaving(false); setSaveErr(true);
            pushToast({variant:"error", title:"Couldn't save your review — try again."});
            return;
          }
          const firstReview = !ownReview;
          const next = {
            id:"rv_me", initials:"SK", name:"You", rating:ratingInput, verified:true,
            date:"just now", absolute:"Jun 20, 2026", helpful:0, helpfulOn:false,
            comment:commentInput.trim(),
          };
          setOwnReview(next);
          setSaving(false); setModalOpen(false);
          // optimistic hero nudge, then reconcile (slow correction)
          const guess = ((agg.average*agg.total)+ratingInput)/(agg.total+(firstReview?1:0));
          setHeroNum(Math.round(guess*10)/10);
          setTimeout(()=>setHeroNum(4.6), 360); // reconcile to trigger-recomputed value
          if (firstReview){
            setAgg(a=>({...a, total:a.total+1, dist:{...a.dist,[ratingInput]:a.dist[ratingInput]+1}}));
            setPopOwn(true); setTimeout(()=>setPopOwn(false), 700);
            pushToast({variant:"success", title:"Review posted", body:"Thanks for sharing — you've earned a voice."});
            setLive("Your review was posted. You rated this space "+ratingInput+" out of 5.");
          } else {
            pushToast({variant:"success", title:"Changes saved"});
            setLive("Your review was updated to "+ratingInput+" out of 5.");
          }
        }, 700);
      }

      function toggleHelpful(id){
        setReviews(rs => rs.map(r => r.id===id ? {...r, helpfulOn:!r.helpfulOn, helpful:r.helpful+(r.helpfulOn?-1:1)} : r));
      }

      /* ---------- aggregate panel ---------- */
      const distRows = (a) => [5,4,3,2,1].map(star => {
        const c = a.dist[star] || 0;
        const pct = a.total ? Math.round((c/a.total)*100) : 0;
        return (
          <div className="rv-dist-row" key={star}>
            <span className="rv-dist-label">
              <span className="rv-mono">{star}</span>
              <span className="rv-star" style={{fontSize:"13px"}} aria-hidden="true">★</span>
            </span>
            <ProgressBar value={pct} variant="spark" aria-label={star+" stars, "+pct+"% of reviews"}/>
            <span className={"rv-dist-pct"+(pct===0?" is-zero":"")}>{pct}%</span>
          </div>
        );
      });

      const isEmpty = demo==="empty";
      const aggregatePanel = (
        <Panel title="Overall rating">
          {isEmpty ? (
            <div className="rv-agg">
              <div className="rv-agg-hero">
                <div className="rv-hero-num" aria-hidden="true">—</div>
                <div className="rv-hero-out">/5</div>
                <StarsDisplay value={0} size={18} label="Not yet rated"/>
                <div className="rv-hero-count rv-mono">0 reviews</div>
              </div>
              <div className="rv-dist" aria-hidden="true">
                {[5,4,3,2,1].map(s=>(
                  <div className="rv-dist-row" key={s}>
                    <span className="rv-dist-label"><span className="rv-mono">{s}</span><span className="rv-star" style={{fontSize:"13px"}}>★</span></span>
                    <ProgressBar value={0} variant="spark"/>
                    <span className="rv-dist-pct is-zero">0%</span>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div className="rv-agg">
              <div className="rv-agg-hero">
                <div className="rv-hero-num" aria-hidden="true">{heroNum.toFixed(1)}</div>
                <div className="rv-hero-out">out of 5</div>
                <StarsDisplay value={agg.average} size={18} label={agg.average+" out of 5"}/>
                <div className="rv-hero-count rv-mono">{agg.total} reviews</div>
              </div>
              <div className="rv-dist">{distRows(agg)}</div>
            </div>
          )}
        </Panel>
      );

      /* ---------- write CTA / gating ---------- */
      let ctaRegion;
      if (demo==="anon"){
        ctaRegion = null; // hidden entirely for anonymous browsers
      } else if (eligibility==="gated"){
        ctaRegion = (
          <Alert variant="info" title="Enroll to leave a review">
            <div style={{marginTop:"var(--space-2)"}}>
              <Button variant="primary" size="sm" leadingIcon={<Icon name="shopping-cart" size={14}/>}>Enroll · ₹1,499</Button>
            </div>
          </Alert>
        );
      } else if (isReviewed){
        ctaRegion = (
          <Button variant="spark" leadingIcon={<Icon name="pencil" size={16}/>} onClick={openEdit}>Edit your review</Button>
        );
      } else {
        ctaRegion = (
          <Button variant="spark" leadingIcon={<Icon name="star" size={16}/>} onClick={openWrite}>Write a review</Button>
        );
      }

      /* ---------- controls ---------- */
      const controls = (
        <div className="rv-controls">
          <div className="rv-control">
            <span className="rv-control-lbl" id="rv-sort-lbl">Sort</span>
            <Select aria-labelledby="rv-sort-lbl" options={SORT_OPTS} value={sort} onChange={e=>changeSort(e.target.value)}/>
          </div>
          <div className="rv-control">
            <span className="rv-control-lbl" id="rv-filter-lbl">Filter</span>
            <Select aria-labelledby="rv-filter-lbl" options={FILTER_OPTS} value={filter} onChange={e=>changeFilter(e.target.value)}/>
          </div>
          <div className="rv-controls__spacer"/>
          <span className="rv-showing rv-mono">
            Showing {ordered.length} of {agg.total} {filter!=="all" ? "("+filter+"★ filter)" : ""}
          </span>
        </div>
      );

      /* ---------- review list body ---------- */
      let listBody;
      if (demo==="loading"){
        listBody = (
          <div className="rv-list" aria-busy="true">
            {Array.from({length:3}).map((_,i)=>(
              <div className="rv-skelcard" key={i}>
                <div className="rv-skel-head"><Skeleton variant="circle" width="36px" height="36px"/><div style={{flex:1}}><Skeleton variant="text" width="40%"/></div></div>
                <Skeleton variant="text" width="90%"/>
                <Skeleton variant="text" width="70%"/>
                <Skeleton variant="text" width="120px"/>
              </div>
            ))}
          </div>
        );
      } else if (demo==="error"){
        listBody = (
          <Alert variant="error" title="Couldn't load reviews. Retry.">
            <div style={{marginTop:"var(--space-2)"}}>
              <Button variant="ghost" size="sm" leadingIcon={<Icon name="refresh-cw" size={14}/>} onClick={()=>setDemo("default")}>Retry</Button>
            </div>
          </Alert>
        );
      } else if (isEmpty){
        listBody = (
          <EmptyState icon="message-square-plus" title="No reviews yet"
            body={eligibility==="anon" || eligibility==="gated"
              ? "No reviews yet — enroll to be the first to share your experience."
              : "Be the first to review this space."}
            action={(eligibility==="anon"||eligibility==="gated")
              ? <Button variant="primary" leadingIcon={<Icon name="shopping-cart" size={16}/>}>Enroll · ₹1,499</Button>
              : <Button variant="spark" leadingIcon={<Icon name="star" size={16}/>} onClick={openWrite}>Write the first review</Button>}/>
        );
      } else {
        listBody = (
          <React.Fragment>
            <div className="rv-list" style={{opacity:listFade?0:1, transition:"opacity var(--dur-fast) var(--ease-standard)"}}>
              {ordered.map(r => (
                <ReviewCard key={r.id} r={r}
                  own={ownReview && r.id===ownReview.id}
                  popped={popOwn && ownReview && r.id===ownReview.id}
                  gated={!canVote}
                  onHelpful={toggleHelpful}
                  onEdit={openEdit}/>
              ))}
            </div>
            <div className="rv-loadmore">
              {demo==="partial"
                ? <Button variant="secondary" loading disabled>Loading more…</Button>
                : <Button variant="secondary" leadingIcon={<Icon name="chevron-down" size={16}/>}
                    onClick={()=>pushToast({variant:"info", title:"Loading next page…"})}>
                    Load more reviews
                  </Button>}
            </div>
          </React.Fragment>
        );
      }

      /* ---------- char counter ---------- */
      const CAP = 1500;
      const over = commentInput.length > CAP;

      return (
        <div className="appshell">
          <Sidebar/>
          <Topbar/>
          <main className="appshell__main">
            {/* demo-state switcher — not production chrome */}
            <div className="rv-main" style={{maxWidth:1100}}>
              <div className="rv-statebar" role="group" aria-label="Preview state">
                <span className="rv-mono" style={{fontSize:"var(--text-xs)",color:"var(--text-muted)"}}>Preview state:</span>
                <div className="rv-toggle">
                  {[["default","Enrolled reader"],["loading","Loading"],["partial","Partial / load-more"],["empty","Empty"],["error","Load error"],["gated","Auth, not enrolled"],["anon","Anonymous browser"]].map(([k,lbl])=>(
                    <button key={k} aria-pressed={demo===k} onClick={()=>{ setDemo(k); }}>{lbl}</button>
                  ))}
                </div>
              </div>
            </div>

            <div className="rv-main">
              <div className="rv-section-head">
                <div>
                  <h2 className="rv-h2">Reviews</h2>
                  <div className="rv-h2-sub">
                    What real learners thought of <strong>{SPACE.title}</strong>
                  </div>
                </div>
                {ctaRegion}
              </div>

              {aggregatePanel}

              {!isEmpty && demo!=="loading" && demo!=="error" && controls}

              {listBody}
            </div>
          </main>

          {/* ---------- write / edit modal ---------- */}
          <Modal open={modalOpen} onClose={()=>setModalOpen(false)}
            title={editMode ? "Edit your review" : "Review this space"}
            footer={
              <React.Fragment>
                <Button variant="ghost" onClick={()=>setModalOpen(false)}>Cancel</Button>
                {/* helper to demonstrate the save-error path */}
                <Button variant="secondary" onClick={()=>submitReview(true)} disabled={saving}>Simulate save error</Button>
                <Button variant="spark" loading={saving} onClick={()=>submitReview(false)}>
                  {editMode ? "Save changes" : "Post review"}
                </Button>
              </React.Fragment>
            }>
            <div style={{minWidth:480,maxWidth:560}}>
              {saveErr && (
                <div style={{marginBottom:"var(--space-4)"}}>
                  <Alert variant="error" title="Couldn't save your review — try again.">
                    Your text is kept below — just retry.
                  </Alert>
                </div>
              )}
              <div className="rv-form-field">
                <label className="rv-form-lbl">Your rating <span className="rv-form-req">*</span></label>
                <StarsInput value={ratingInput} onChange={(v)=>{ setRatingInput(v); setRatingErr(false); }}/>
                {ratingErr && <span className="field__error" role="alert">Pick a star rating to continue.</span>}
              </div>
              <div className="rv-form-field">
                <label className="rv-form-lbl" htmlFor="rv-comment">Your review <span className="rv-muted">(optional)</span></label>
                <Textarea id="rv-comment" rows={5}
                  placeholder="What worked, what didn't, who is this for?"
                  value={commentInput} onChange={e=>setCommentInput(e.target.value)}
                  error={over}/>
                <span className={"rv-counter"+(over?" is-over":"")}>{commentInput.length} / {CAP}</span>
              </div>
              <div className="rv-muted" style={{display:"flex",alignItems:"center",gap:"var(--space-2)"}}>
                <Icon name="info" size={13}/> One review per learner — posting again updates your existing review.
              </div>
            </div>
          </Modal>

          {/* aria-live announcer */}
          <div aria-live="polite" style={{position:"absolute",width:1,height:1,overflow:"hidden",clip:"rect(0 0 0 0)"}}>{live}</div>

          {/* toasts */}
          <div className="rv-toasts" role="status" aria-live="polite">
            {toasts.map(t => <Toast key={t.id} variant={t.variant} title={t.title} body={t.body}/>)}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Screen/>);
    if (window.lucide) window.lucide.createIcons();
  </script>
</body>
</html>
