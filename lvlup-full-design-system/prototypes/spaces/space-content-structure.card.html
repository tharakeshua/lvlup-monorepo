<!-- @dsCard group="Spaces" viewport="1280x820" name="Content Structure ★" subtitle="StoryPoint track · sortable items · split add" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
html,body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);}
#root{min-height:100vh;}
*{box-sizing:border-box;}
/* ---- app shell ---- */
.sx{display:grid;grid-template-columns:248px 1fr;min-height:100vh;}
.sx-side{position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-5);background:var(--bg-surface);border-right:1px solid var(--border-subtle);padding:var(--space-5) var(--space-4);}
.sx-brand{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-1) var(--space-2);}
.sx-brand .mk{width:34px;height:34px;border-radius:var(--radius-md);background:var(--brand-primary);color:var(--text-on-accent);display:grid;place-items:center;font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);}
.sx-brand .nm{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-base);line-height:1.1;}
.sx-brand .sc{font-size:var(--text-2xs);color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;}
.sx-navgrp{display:flex;flex-direction:column;gap:2px;}
.sx-navlbl{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);padding:var(--space-2) var(--space-2) var(--space-1);}
.sx-nav{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--text-secondary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;position:relative;text-decoration:none;transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard);}
.sx-nav i{width:18px;height:18px;}
.sx-nav .ct{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.sx-nav:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.sx-nav.on{background:var(--brand-subtle);color:var(--brand-primary);font-weight:var(--weight-semibold);}
.sx-nav.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:58%;border-radius:var(--radius-pill);background:var(--brand-primary);}
.sx-side .foot{margin-top:auto;display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-4);border-top:1px solid var(--border-subtle);}
.sx-uc{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2);border-radius:var(--radius-md);cursor:pointer;}
.sx-uc:hover{background:var(--bg-surface-sunken);}
.sx-uc .av{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.sx-uc .nm{font-size:var(--text-sm);font-weight:var(--weight-medium);line-height:1.1;}
.sx-uc .rl{font-size:var(--text-2xs);color:var(--text-muted);}
.sx-main{display:flex;flex-direction:column;min-width:0;height:100vh;}
.sx-top{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-6);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;top:0;z-index:20;}
.sx-bc{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-muted);}
.sx-bc i{width:14px;height:14px;}
.sx-bc b{color:var(--text-primary);font-weight:var(--weight-medium);}
.sx-top .sp{flex:1;}
.sx-search{display:flex;align-items:center;gap:var(--space-2);width:240px;max-width:28vw;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-muted);font-size:var(--text-sm);}
.sx-search i{width:15px;height:15px;}
.sx-search kbd{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:0 var(--space-1);}
.sx-icbtn{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}
.sx-icbtn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.sx-icbtn i{width:18px;height:18px;}
/* editor sub-header (sticky) */
.sx-sub{position:sticky;top:0;z-index:15;background:var(--bg-surface);border-bottom:1px solid var(--border-subtle);padding:var(--space-4) var(--space-6) 0;}
.sx-subrow{display:flex;align-items:center;gap:var(--space-3);}
.sx-back{display:inline-grid;place-items:center;width:32px;height:32px;border-radius:var(--radius-md);border:1px solid var(--border-subtle);background:var(--bg-surface);color:var(--text-secondary);cursor:pointer;flex:none;}
.sx-back:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.sx-back i{width:16px;height:16px;}
.sx-titlewrap{display:flex;flex-direction:column;gap:3px;min-width:0;}
.sx-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);line-height:1.1;}
.sx-titlemeta{display:flex;align-items:center;gap:var(--space-2);}
.sx-stat{display:inline-flex;align-items:center;gap:5px;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-2xs);font-weight:var(--weight-semibold);text-transform:uppercase;letter-spacing:.06em;background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);color:var(--text-secondary);}
.sx-stat i{width:12px;height:12px;}
.sx-typelabel{font-size:var(--text-xs);color:var(--text-muted);}
.sx-headact{margin-left:auto;display:flex;align-items:center;gap:var(--space-2);}
.sx-save-chip{display:inline-flex;align-items:center;gap:6px;font-size:var(--text-xs);color:var(--text-muted);margin-right:var(--space-2);}
.sx-save-chip i{width:13px;height:13px;}
.sx-save-chip.dirty{color:var(--spark);}
.sx-tabs{display:flex;gap:var(--space-1);margin-top:var(--space-4);}
.sx-tab{padding:var(--space-2) var(--space-3);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;display:inline-flex;align-items:center;gap:6px;background:none;border-top:none;border-left:none;border-right:none;}
.sx-tab i{width:15px;height:15px;}
.sx-tab:hover{color:var(--text-primary);}
.sx-tab.on{color:var(--brand-primary);border-bottom-color:var(--brand-primary);font-weight:var(--weight-semibold);}
/* scroll body + reading column */
.sx-scroll{flex:1;overflow-y:auto;}
.sx-col{max-width:1200px;margin:0 auto;padding:var(--space-6) var(--space-6) calc(var(--space-24) + var(--space-8));display:flex;flex-direction:column;gap:var(--space-5);}
/* content section head */
.csh{display:flex;align-items:center;gap:var(--space-3);}
.csh h2{margin:0;font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.csh .cnt{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-muted);}
.csh .act{margin-left:auto;display:flex;align-items:center;gap:var(--space-2);}
/* split button (Add as type) */
.split{display:inline-flex;align-items:stretch;border-radius:var(--radius-md);box-shadow:var(--shadow-e1);}
.split .main{border-radius:var(--radius-md) 0 0 var(--radius-md);}
.split .caret{border-radius:0 var(--radius-md) var(--radius-md) 0;border-left:1px solid var(--brand-primary-hover);padding-left:var(--space-2);padding-right:var(--space-2);}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-ui);font-size:var(--text-sm);font-weight:var(--weight-semibold);border-radius:var(--radius-md);border:1px solid transparent;cursor:pointer;padding:var(--space-2) var(--space-3);transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard);white-space:nowrap;}
.btn i{width:15px;height:15px;}
.btn--primary{background:var(--brand-primary);color:var(--text-on-accent);}
.btn--primary:hover{background:var(--brand-primary-hover);}
.btn--secondary{background:var(--bg-surface);color:var(--text-secondary);border-color:var(--border-subtle);}
.btn--secondary:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.btn--ghost{background:none;color:var(--text-secondary);}
.btn--ghost:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.btn--danger{background:var(--status-error);color:var(--text-on-accent);}
.btn--danger:hover{filter:brightness(.94);}
.btn--spark{background:var(--spark);color:var(--text-on-accent);box-shadow:var(--glow-spark);}
.btn--spark:hover{background:var(--spark-hover);}
.btn--sm{padding:5px var(--space-2);font-size:var(--text-xs);font-weight:var(--weight-medium);}
/* dropdown menu */
.menu{position:absolute;top:calc(100% + 6px);right:0;z-index:40;min-width:184px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);box-shadow:var(--shadow-e3);padding:var(--space-1);}
.menu button{display:flex;align-items:center;gap:var(--space-2);width:100%;text-align:left;padding:var(--space-2) var(--space-2);border-radius:var(--radius-sm);background:none;border:none;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);cursor:pointer;}
.menu button:hover{background:var(--bg-surface-sunken);}
.menu button i{width:15px;height:15px;color:var(--text-muted);}
.menu .mh{font-size:var(--text-2xs);text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:var(--space-2) var(--space-2) var(--space-1);font-weight:var(--weight-semibold);}
.relwrap{position:relative;}
/* ---- track ---- */
.track{display:flex;flex-direction:column;gap:var(--space-3);}
.node{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;transition:box-shadow var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard);}
.node.lifted{box-shadow:var(--shadow-e2);border-color:var(--border-focus);}
.drop-line{height:2px;border-radius:var(--radius-pill);background:var(--border-focus);margin:2px var(--space-3);}
.noderow{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);}
.grip{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:var(--radius-md);color:var(--text-muted);cursor:grab;background:none;border:none;flex:none;}
.grip:hover{background:var(--bg-surface-sunken);color:var(--text-secondary);}
.grip:active{cursor:grabbing;}
.grip i{width:16px;height:16px;}
.chev{display:inline-grid;place-items:center;width:28px;height:28px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;flex:none;transition:transform var(--dur-fast) var(--ease-standard);}
.chev:hover{background:var(--bg-surface-sunken);}
.chev i{width:18px;height:18px;}
.chev.open{transform:rotate(90deg);}
.node-idx{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-muted);font-variant-numeric:tabular-nums;flex:none;}
.node-title{font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.node-type{display:inline-flex;align-items:center;gap:5px;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-2xs);font-weight:var(--weight-semibold);border:1px solid var(--border-subtle);background:var(--bg-surface-sunken);color:var(--text-secondary);flex:none;}
.node-type i{width:11px;height:11px;}
.node-type.assess{background:var(--brand-subtle);color:var(--brand-primary);border-color:transparent;}
.statbadges{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;margin-left:var(--space-1);}
.sb{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-secondary);font-variant-numeric:tabular-nums;}
.sb i{width:11px;height:11px;color:var(--text-muted);}
.sb.diff{font-family:var(--font-ui);text-transform:capitalize;color:var(--text-muted);}
.node-spacer{flex:1;}
.rowact{display:flex;align-items:center;gap:2px;flex:none;}
.iact{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:var(--radius-md);color:var(--text-muted);cursor:pointer;background:none;border:none;}
.iact:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.iact.danger:hover{background:var(--status-error-subtle);color:var(--status-error);}
.iact i{width:16px;height:16px;}
/* expand region */
.expand{display:grid;grid-template-rows:0fr;transition:grid-template-rows var(--dur-base) var(--ease-standard);}
.expand.open{grid-template-rows:1fr;}
.expand>.inner{overflow:hidden;}
.nodebody{border-top:1px solid var(--border-subtle);background:var(--bg-surface-sunken);padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-4);}
/* section group */
.secgrp{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;}
.sechead{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);}
.sechead .lb{font-size:var(--text-2xs);font-weight:var(--weight-semibold);text-transform:uppercase;letter-spacing:.09em;color:var(--text-secondary);}
.sechead .ct{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.sechead .gact{margin-left:auto;display:flex;gap:var(--space-1);}
.irow{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border-bottom:1px solid var(--border-subtle);}
.irow:last-child{border-bottom:none;}
.irow:hover{background:var(--bg-surface-sunken);}
.irow.sel{background:var(--brand-subtle);}
.cbx{width:18px;height:18px;border-radius:var(--radius-sm);border:1.5px solid var(--border-strong);background:var(--bg-surface);display:inline-grid;place-items:center;cursor:pointer;flex:none;}
.cbx.on{background:var(--brand-primary);border-color:var(--brand-primary);color:var(--text-on-accent);}
.cbx i{width:12px;height:12px;opacity:0;}
.cbx.on i{opacity:1;}
.igrip{display:inline-grid;place-items:center;width:24px;height:24px;color:var(--text-muted);cursor:grab;background:none;border:none;flex:none;}
.igrip:hover{color:var(--text-secondary);}
.igrip i{width:15px;height:15px;}
.ichev{display:inline-grid;place-items:center;width:24px;height:24px;color:var(--text-secondary);cursor:pointer;background:none;border:none;flex:none;transition:transform var(--dur-fast) var(--ease-standard);}
.ichev.open{transform:rotate(90deg);}
.ichev i{width:15px;height:15px;}
.itype-ic{display:inline-grid;place-items:center;width:26px;height:26px;border-radius:var(--radius-md);flex:none;}
.itype-ic.q{background:var(--brand-subtle);color:var(--brand-primary);}
.itype-ic.m{background:var(--status-info-subtle);color:var(--status-info);}
.itype-ic i{width:14px;height:14px;}
.ititle{font-size:var(--text-sm);font-weight:var(--weight-medium);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.itype-lb{font-size:var(--text-2xs);color:var(--text-muted);text-transform:capitalize;flex:none;}
.irow .sp{flex:1;}
.irowact{display:flex;gap:2px;flex:none;}
/* inline item preview */
.ipreview{display:grid;grid-template-rows:0fr;transition:grid-template-rows var(--dur-base) var(--ease-standard);}
.ipreview.open{grid-template-rows:1fr;}
.ipreview>.in{overflow:hidden;}
.ipreview .pad{padding:var(--space-3) var(--space-3) var(--space-3) calc(var(--space-6) + var(--space-3));background:var(--bg-surface-sunken);border-bottom:1px solid var(--border-subtle);}
.content{font-size:var(--text-sm);color:var(--text-primary);line-height:var(--leading-base);}
.content .mono{font-family:var(--font-mono);}
/* answer key lock */
.keylock{display:flex;align-items:center;gap:var(--space-2);margin-top:var(--space-2);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);border:1px dashed var(--border-strong);background:var(--bg-surface);font-size:var(--text-xs);color:var(--text-secondary);}
.keylock>span:first-child{color:var(--text-muted);flex:none;}
.keylock b{color:var(--text-primary);font-weight:var(--weight-semibold);}
/* empty section line */
.emptysec{font-size:var(--text-xs);color:var(--text-muted);font-style:italic;padding:var(--space-3);}
/* bulk bar */
.bulkbar{position:sticky;bottom:0;display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);border:1px solid var(--brand-primary);background:var(--brand-subtle);box-shadow:var(--shadow-e2);}
.bulkbar .ct{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--brand-primary);}
.bulkbar .ct b{font-family:var(--font-mono);}
.bulkbar .sp{flex:1;}
/* import button */
.importbtn{display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:var(--space-2) var(--space-3);border:1.5px dashed var(--border-strong);border-radius:var(--radius-md);background:var(--bg-surface);color:var(--text-secondary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;}
.importbtn:hover{border-color:var(--border-focus);background:var(--brand-subtle);color:var(--brand-primary);}
.importbtn i{width:15px;height:15px;}
/* select (native styled) */
.selwrap{position:relative;}
.sel{appearance:none;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:6px var(--space-6) 6px var(--space-3);cursor:pointer;}
.sel:focus{outline:none;border-color:var(--border-focus);box-shadow:var(--ring-focus);}
.selwrap>span{position:absolute;right:var(--space-2);top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;}
/* empty / error variants */
.empty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:var(--space-3);padding:var(--space-12) var(--space-4);border:1.5px dashed var(--border-subtle);border-radius:var(--radius-lg);background:var(--bg-surface);}
.empty .ec{width:48px;height:48px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;}
.empty .ec i{width:22px;height:22px;}
.empty .et{font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);}
.empty .eb{font-size:var(--text-sm);color:var(--text-muted);max-width:380px;}
.alert{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--status-error);background:var(--status-error-subtle);font-size:var(--text-sm);}
.alert .lead{color:var(--status-error);flex:none;margin-top:1px;display:inline-flex;}
.alert .at{font-weight:var(--weight-semibold);}
.alert .sp{flex:1;}
.sk{background:var(--bg-surface-sunken);border-radius:var(--radius-sm);}
.sk.line{height:12px;}
.banner{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--status-info);background:var(--status-info-subtle);font-size:var(--text-sm);}
.banner .lead{color:var(--status-info);flex:none;margin-top:1px;display:inline-flex;}
/* variant captions */
.vcap{font-family:var(--font-mono);font-size:var(--text-2xs);text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding-top:var(--space-2);border-top:1px dashed var(--border-subtle);margin-top:var(--space-2);}
.vgrid{display:flex;flex-direction:column;gap:var(--space-3);}
/* ---- overlays ---- */
.scrim{position:fixed;inset:0;background:rgba(20,18,16,.42);z-index:60;animation:fade var(--dur-fast) var(--ease-standard);}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{position:fixed;top:0;right:0;height:100vh;width:640px;max-width:92vw;background:var(--bg-surface);border-left:1px solid var(--border-subtle);box-shadow:var(--shadow-e3);z-index:70;display:flex;flex-direction:column;animation:slidein var(--dur-slow) var(--ease-entrance);}
.sheet.sm{width:480px;}
@keyframes slidein{from{transform:translateX(100%)}to{transform:translateX(0)}}
.sheet-head{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border-subtle);}
.sheet-head h3{margin:0;font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.sheet-head .sub{font-size:var(--text-xs);color:var(--text-muted);}
.sheet-head .x{margin-left:auto;}
.sheet-body{flex:1;overflow-y:auto;padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-4);}
.sheet-foot{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-4) var(--space-5);border-top:1px solid var(--border-subtle);}
.sheet-foot .sp{flex:1;}
.fld{display:flex;flex-direction:column;gap:var(--space-2);}
.fld>label{font-size:var(--text-sm);font-weight:var(--weight-medium);display:flex;align-items:center;gap:6px;}
.fld>label .req{color:var(--status-error);}
.fld .hint{font-size:var(--text-xs);color:var(--text-muted);}
.inp{width:100%;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);}
.inp:focus{outline:none;border-color:var(--border-focus);box-shadow:var(--ring-focus);}
textarea.inp{resize:vertical;min-height:96px;line-height:var(--leading-sm);font-family:var(--font-mono);}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:560px;max-width:92vw;max-height:84vh;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e3);z-index:70;display:flex;flex-direction:column;overflow:hidden;animation:pop var(--dur-base) var(--ease-entrance);}
.modal.confirm{width:440px;}
@keyframes pop{from{opacity:0;transform:translate(-50%,-46%)}to{opacity:1;transform:translate(-50%,-50%)}}
.modal-head{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-5) var(--space-5) var(--space-3);}
.modal-head .wic{width:38px;height:38px;border-radius:var(--radius-md);display:grid;place-items:center;flex:none;background:var(--status-error-subtle);color:var(--status-error);}
.modal-head .wic i{width:19px;height:19px;}
.modal-head h3{margin:0;font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);}
.modal-head p{margin:4px 0 0;font-size:var(--text-sm);color:var(--text-secondary);}
.modal-body{padding:0 var(--space-5) var(--space-4);overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-2);}
.modal-foot{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-4) var(--space-5);border-top:1px solid var(--border-subtle);}
.modal-foot .sp{flex:1;}
.bankrow{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);}
.bankrow .bt{font-size:var(--text-sm);font-weight:var(--weight-medium);}
.bankrow .bm{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);}
/* toast */
.toast{position:fixed;bottom:var(--space-6);left:50%;transform:translateX(-50%);z-index:90;display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);background:var(--bg-surface);border:1px solid var(--border-subtle);box-shadow:var(--shadow-e3);font-size:var(--text-sm);animation:toastup var(--dur-base) var(--ease-entrance);}
.toast>span:first-child{flex:none;}
.toast.success>span:first-child{color:var(--status-success);}
.toast.error>span:first-child{color:var(--status-error);}
@keyframes toastup{from{opacity:0}to{opacity:1}}
.srlive{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);}
@media (prefers-reduced-motion: reduce){
  .sheet,.modal,.toast,.scrim{animation:none;}
  .chev,.ichev,.expand,.ipreview{transition:none;}
}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { Icon } = window.LvlupV0DesignSystem_5d0725;

/* lucide icon via the core Icon component (no raw <i data-lucide>) */
const I = (name, size) => <Icon name={name} size={size || 16} />;

/* ===== shell ===== */
function Nav({icon,label,route,active,count}){
  return <a className={"sx-nav"+(active===route?" on":"")} aria-current={active===route?"page":undefined}>
    {I(icon,18)}<span>{label}</span>{count!=null&&<span className="ct">{count}</span>}</a>;
}
function Shell({children}){
  return <div className="sx">
    <aside className="sx-side">
      <div className="sx-brand"><div className="mk">L</div>
        <div><div className="nm">Auto-LevelUp</div><div className="sc">Northwood · Teacher</div></div></div>
      <nav aria-label="Primary" style={{display:"flex",flexDirection:"column",gap:"var(--space-5)"}}>
        <div className="sx-navgrp"><div className="sx-navlbl">Teach</div>
          <Nav icon="layout-dashboard" label="Dashboard" route="/" active="/spaces"/>
          <Nav icon="school" label="Classes" route="/classes" active="/spaces" count="6"/>
          <Nav icon="layers" label="Spaces" route="/spaces" active="/spaces" count="9"/>
          <Nav icon="file-check" label="Exams" route="/exams" active="/spaces" count="4"/>
          <Nav icon="graduation-cap" label="Students" route="/students" active="/spaces"/></div>
        <div className="sx-navgrp"><div className="sx-navlbl">Insights</div>
          <Nav icon="bar-chart-3" label="Analytics" route="/analytics" active="/spaces"/>
          <Nav icon="sparkles" label="AI tutor" route="/tutor" active="/spaces"/></div>
      </nav>
      <div className="foot">
        <div className="sx-uc"><div className="av">RM</div>
          <div><div className="nm">Rohan Mehta</div><div className="rl">Teacher · Owner</div></div></div>
      </div>
    </aside>
    <div className="sx-main">
      <header className="sx-top">
        <nav className="sx-bc" aria-label="Breadcrumb">
          <span>Spaces</span>{I("chevron-right",14)}<b>Algebra I — Foundations</b>
        </nav>
        <div className="sp"></div>
        <div className="sx-search">{I("search",15)}<span>Search…</span><kbd>⌘K</kbd></div>
        <button className="sx-icbtn" aria-label="Notifications, 2 unread">{I("bell",18)}</button>
      </header>
      {children}
    </div>
  </div>;
}

function SubHeader({tab,onTab,dirty,saving,savedAt,onPublish}){
  const tabs=[
    {id:"settings",label:"Settings",icon:"settings"},
    {id:"content",label:"Content",icon:"book-open"},
    {id:"rubric",label:"Rubric",icon:"clipboard-check"},
    {id:"agents",label:"Agents",icon:"bot"},
    {id:"history",label:"History",icon:"history"},
  ];
  return <div className="sx-sub">
    <div className="sx-subrow">
      <button className="sx-back" aria-label="Back to Spaces">{I("arrow-left",16)}</button>
      <div className="sx-titlewrap">
        <h1 className="sx-title">Algebra I — Foundations</h1>
        <div className="sx-titlemeta">
          {/* status: never color-only — icon + text; changes only after callable resolves */}
          <span className="sx-stat">{I("circle-dashed",12)}Draft</span>
          <span className="sx-typelabel">· learning</span>
        </div>
      </div>
      <div className="sx-headact">
        <span className={"sx-save-chip"+(dirty?" dirty":"")} aria-live="polite">
          {saving ? <>{I("loader",13)}Saving…</>
            : dirty ? <>{I("dot",13)}Unsaved changes</>
            : <>{I("check",13)}Saved {savedAt}</>}
        </span>
        <button className="btn btn--secondary">{I("eye",15)}Preview</button>
        {/* Publish — the ONLY spark CTA allowed on this screen (legal draft→published transition) */}
        <button className="btn btn--spark" onClick={onPublish}>{I("rocket",15)}Publish</button>
      </div>
    </div>
    <div className="sx-tabs" role="tablist" aria-label="Space editor sections">
      {tabs.map(t=>
        <button key={t.id} role="tab" aria-selected={tab===t.id}
          className={"sx-tab"+(tab===t.id?" on":"")} onClick={()=>onTab(t.id)}>
          {I(t.icon,15)}{t.label}</button>)}
    </div>
  </div>;
}

/* ===== data ===== */
const SP_TYPES=[
  {value:"standard",label:"Standard",icon:"book-open"},
  {value:"practice",label:"Practice",icon:"dumbbell"},
  {value:"quiz",label:"Quiz",icon:"list-checks"},
  {value:"timed_test",label:"Timed Test",icon:"timer"},
];
const ASSESS=new Set(["quiz","timed_test"]);

const INITIAL=[
  {id:"sp_01",title:"Linear Equations",type:"standard",difficulty:"medium",
   stats:{items:12,q:8,m:4,pts:40},
   sections:[
     {id:"sec_un",title:"Unsectioned",items:[
       {id:"it_01",title:"Solve 2x + 5 = 13",kind:"q",sub:"mcq"},
       {id:"it_02",title:"Slope-intercept form",kind:"m",sub:"text"},
     ]},
   ]},
  {id:"sp_02",title:"Quadratics",type:"timed_test",difficulty:"hard",
   stats:{items:10,q:9,m:1,pts:55},
   sections:[
     {id:"sec_warm",title:"Warm-up",items:[
       {id:"it_10",title:"Solve x² − 4 = 0",kind:"q",sub:"mcq",timed:true},
       {id:"it_11",title:"Factoring recap",kind:"m",sub:"text"},
       {id:"it_12",title:"Identify the vertex",kind:"q",sub:"numeric",timed:true},
     ]},
     {id:"sec_core",title:"Unsectioned",items:[
       {id:"it_13",title:"Quadratic formula derivation",kind:"q",sub:"short-answer",timed:true},
       {id:"it_14",title:"Discriminant cases",kind:"q",sub:"mcq",timed:true},
     ]},
   ]},
  {id:"sp_03",title:"Systems of Equations",type:"practice",difficulty:"easy",
   stats:{items:7,q:5,m:2,pts:25},sections:[]},
  {id:"sp_04",title:"Inequalities",type:"standard",difficulty:"medium",
   stats:{items:9,q:6,m:3,pts:30},sections:[]},
  {id:"sp_05",title:"Unit Review — Timed",type:"quiz",difficulty:"hard",
   stats:{items:15,q:15,m:0,pts:75},sections:[]},
];

const fmtSub=s=>(s||"").replace(/[-_]/g," ");
const typeMeta=t=>SP_TYPES.find(x=>x.value===t)||SP_TYPES[0];

/* ===== checkbox ===== */
function Cbx({on,onClick,label}){
  return <button className={"cbx"+(on?" on":"")} role="checkbox" aria-checked={on}
    aria-label={label} onClick={onClick}>{on && I("check",12)}</button>;
}

/* ===== item row ===== */
function ItemRow({it,selected,onSelect,onEdit,onDelete}){
  const [open,setOpen]=useState(it.id==="it_10");
  return <>
    <div className={"irow"+(selected?" sel":"")}>
      <Cbx on={selected} onClick={onSelect} label={"Select "+it.title}/>
      <button className="igrip" aria-label="Drag to reorder">{I("grip-vertical",15)}</button>
      <button className={"ichev"+(open?" open":"")} aria-expanded={open} aria-label="Toggle details"
        onClick={()=>setOpen(!open)}>{I("chevron-right",15)}</button>
      <span className={"itype-ic "+it.kind}>{I(it.kind==="q"?"help-circle":"file-text",14)}</span>
      <span className="ititle">{it.title||"Untitled"}</span>
      <span className="itype-lb">{fmtSub(it.sub)}</span>
      <span className="sp"></span>
      <div className="irowact">
        <button className="iact" aria-label="Edit" onClick={onEdit}>{I("pencil",16)}</button>
        <button className="iact danger" aria-label="Delete" onClick={onDelete}>{I("trash-2",16)}</button>
      </div>
    </div>
    <div className={"ipreview"+(open?" open":"")}>
      <div className="in"><div className="pad">
        <div className="content">
          {it.kind==="q"
            ? <>Prompt: <span className="mono">x² − 4 = 0</span> — find all real roots. Worth <span className="mono">5</span> pts.</>
            : <>Markdown + KaTeX material rendered via <span className="mono">ContentRenderer</span>. Recap of difference of squares: <span className="mono">a² − b² = (a−b)(a+b)</span>.</>}
        </div>
        {/* Answer-key isolation: timed_test correct answers are SERVER-ONLY — never rendered on preview */}
        {it.timed && <div className="keylock">
          {I("lock",15)}
          <span><b>Answer key stored securely.</b> Open the editor to view or edit. Reorder &amp; move preserve the stripped key.</span>
        </div>}
      </div></div>
    </div>
  </>;
}

/* ===== section group ===== */
function SectionGroup({sec,sp,sel,toggleSel,onItemEdit,onAddItem,onItemDelete}){
  return <div className="secgrp">
    <div className="sechead">
      <span className="lb">{sec.title.toUpperCase()}</span>
      <span className="ct">· {sec.items.length} items</span>
      <div className="gact">
        <button className="btn btn--ghost btn--sm" onClick={()=>onAddItem(sp,"q")}>{I("plus",15)}Question</button>
        <button className="btn btn--ghost btn--sm" onClick={()=>onAddItem(sp,"m")}>{I("plus",15)}Material</button>
      </div>
    </div>
    {sec.items.length===0
      ? <div className="emptysec">No items in this section yet.</div>
      : sec.items.map(it=>
        <ItemRow key={it.id} it={it} selected={sel.has(it.id)}
          onSelect={()=>toggleSel(it.id)} onEdit={()=>onItemEdit(it)} onDelete={()=>onItemDelete(it)}/>)}
  </div>;
}

/* ===== story point node ===== */
function Node({sp,idx,expanded,onToggle,onEdit,onDelete,onPreview,onItemEdit,onItemDelete,onAddItem,
               sel,toggleSel,clearSel,onMove,onBulkDelete,onImport,loadingItems}){
  const m=typeMeta(sp.type);
  const selInNode=[...sel].filter(id=>sp.sections.some(s=>s.items.some(i=>i.id===id)));
  return <div className="node">
    <div className="noderow">
      <button className="grip" aria-label="Drag to reorder">{I("grip-vertical",16)}</button>
      <button className={"chev"+(expanded?" open":"")} aria-expanded={expanded}
        aria-label="Expand story point" onClick={onToggle}>{I("chevron-right",18)}</button>
      <span className="node-idx">{idx+1}.</span>
      <span className="node-title">{sp.title}</span>
      <span className={"node-type"+(ASSESS.has(sp.type)?" assess":"")}>
        {I(m.icon,11)}{sp.type.replace("_"," ")}</span>
      <div className="statbadges">
        <span className="sb">{I("layers",11)}{sp.stats.items} items</span>
        <span className="sb">{I("help-circle",11)}{sp.stats.q} Q</span>
        <span className="sb">{I("file-text",11)}{sp.stats.m} M</span>
        <span className="sb">{I("award",11)}{sp.stats.pts} pts</span>
        <span className="sb diff">{sp.difficulty}</span>
      </div>
      <span className="node-spacer"></span>
      <div className="rowact">
        {ASSESS.has(sp.type) &&
          <button className="iact" aria-label="Preview as student" onClick={onPreview}>{I("eye",16)}</button>}
        <button className="iact" aria-label="Story point settings" onClick={onEdit}>{I("settings-2",16)}</button>
        <button className="iact danger" aria-label="Delete story point" onClick={onDelete}>{I("trash-2",16)}</button>
      </div>
    </div>
    <div className={"expand"+(expanded?" open":"")}>
      <div className="inner"><div className="nodebody">
        {loadingItems
          ? <div className="secgrp"><div className="sechead"><span className="lb">Loading items…</span></div>
              <div style={{padding:"var(--space-3)",display:"flex",flexDirection:"column",gap:"var(--space-2)"}}>
                <div className="sk line" style={{width:"70%"}}></div>
                <div className="sk line" style={{width:"55%"}}></div></div></div>
          : sp.sections.length===0
            ? <div className="secgrp"><div className="sechead">
                <span className="lb">UNSECTIONED</span><span className="ct">· 0 items</span>
                <div className="gact">
                  <button className="btn btn--ghost btn--sm" onClick={()=>onAddItem(sp,"q")}>{I("plus",15)}Question</button>
                  <button className="btn btn--ghost btn--sm" onClick={()=>onAddItem(sp,"m")}>{I("plus",15)}Material</button>
                </div></div>
                <div className="emptysec">No items in this section yet.</div></div>
            : sp.sections.map(sec=>
                <SectionGroup key={sec.id} sec={sec} sp={sp} sel={sel} toggleSel={toggleSel}
                  onItemEdit={onItemEdit} onAddItem={onAddItem} onItemDelete={onItemDelete}/>)}
        {selInNode.length>0 &&
          <div className="bulkbar" aria-live="polite">
            <span className="ct"><b>{selInNode.length}</b> selected</span>
            <span className="sp"></span>
            <button className="btn btn--danger btn--sm" onClick={onBulkDelete}>{I("trash-2",15)}Delete</button>
            <div className="selwrap">
              <select className="sel" onChange={e=>{if(e.target.value){onMove(e.target.value);e.target.value="";}}} aria-label="Move selected to story point" defaultValue="">
                <option value="" disabled>Move to…</option>
                {INITIAL.filter(s=>s.id!==sp.id).map(s=><option key={s.id} value={s.title}>{s.title}</option>)}
              </select>{I("chevron-down",15)}
            </div>
            <button className="btn btn--ghost btn--sm" onClick={clearSel}>Clear</button>
          </div>}
        <button className="importbtn" onClick={onImport}>{I("import",15)}Import from Bank</button>
      </div></div>
    </div>
  </div>;
}

/* ===== sheets / modals ===== */
function ItemSheet({item,onClose}){
  return <>
    <div className="scrim" onClick={onClose}></div>
    <aside className="sheet" role="dialog" aria-modal="true" aria-label="Item editor">
      <div className="sheet-head">
        <div><h3>{item.title||"New question"}</h3><div className="sub">mcq · 5 pts · Quadratics</div></div>
        <button className="sx-icbtn x" aria-label="Close editor" onClick={onClose}>{I("x",18)}</button>
      </div>
      <div className="sheet-body">
        <div className="fld"><label>Title <span className="req">*</span></label>
          <input className="inp" defaultValue={item.title} placeholder="Question title"/></div>
        <div className="fld"><label>Prompt (Markdown + KaTeX)</label>
          <textarea className="inp" defaultValue={"Solve $x^2 - 4 = 0$ for all real roots."}></textarea></div>
        {item.timed && <div className="banner">
          <span className="lead">{I("shield-check",18)}</span>
          <span>This item belongs to a <b>timed_test</b>. The correct answer was re-merged via <span style={{fontFamily:"var(--font-mono)"}}>getItemForEdit</span> for editing here; on save the UI guards against overwriting a stripped key with blanks.</span>
        </div>}
        <div className="fld"><label>Points</label>
          <input className="inp" style={{maxWidth:120,fontFamily:"var(--font-mono)"}} defaultValue="5"/></div>
      </div>
      <div className="sheet-foot">
        <span style={{fontSize:"var(--text-xs)",color:"var(--text-muted)"}}>Esc to close · changes autosave</span>
        <span className="sp"></span>
        <button className="btn btn--secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn--primary" onClick={onClose}>{I("check",15)}Save item</button>
      </div>
    </aside>
  </>;
}

function SpSheet({sp,onClose}){
  return <>
    <div className="scrim" onClick={onClose}></div>
    <aside className="sheet sm" role="dialog" aria-modal="true" aria-label="Story point settings">
      <div className="sheet-head">
        <div><h3>{sp.title}</h3><div className="sub">Story point configuration</div></div>
        <button className="sx-icbtn x" aria-label="Close" onClick={onClose}>{I("x",18)}</button>
      </div>
      <div className="sheet-body">
        <div className="fld"><label>Title</label><input className="inp" defaultValue={sp.title}/></div>
        <div className="fld"><label>Type</label>
          <div className="selwrap"><select className="sel" style={{width:"100%"}} defaultValue={sp.type}>
            {SP_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
          </select>{I("chevron-down",15)}</div>
          <span className="hint">Quiz &amp; Timed Test reveal assessment config and student preview. The legacy "test" type is dropped.</span></div>
        <div className="fld"><label>Difficulty</label>
          <div className="selwrap"><select className="sel" style={{width:"100%"}} defaultValue={sp.difficulty}>
            <option>easy</option><option>medium</option><option>hard</option>
          </select>{I("chevron-down",15)}</div></div>
      </div>
      <div className="sheet-foot">
        <span className="sp"></span>
        <button className="btn btn--secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn--primary" onClick={onClose}>{I("check",15)}Save</button>
      </div>
    </aside>
  </>;
}

function BankModal({onClose,onImport}){
  const rows=[
    {id:"b1",t:"Solve linear system by substitution",m:"mcq · bank/algebra · 5 pts"},
    {id:"b2",t:"Graph the parabola y = x² − 2x",m:"numeric · bank/algebra · 8 pts"},
    {id:"b3",t:"Word problem: projectile height",m:"short-answer · bank/word-problems · 10 pts"},
  ];
  const [picked,setPicked]=useState(new Set(["b1"]));
  const tog=id=>setPicked(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  return <>
    <div className="scrim" onClick={onClose}></div>
    <div className="modal" role="dialog" aria-modal="true" aria-label="Import from question bank">
      <div className="modal-head">
        <div className="wic" style={{background:"var(--brand-subtle)",color:"var(--brand-primary)"}}>{I("import",19)}</div>
        <div><h3>Import from Bank</h3><p>Select items to copy into this story point. Identity-preserving — bank originals stay intact.</p></div>
      </div>
      <div className="modal-body">
        {rows.map(r=><div className="bankrow" key={r.id}>
          <Cbx on={picked.has(r.id)} onClick={()=>tog(r.id)} label={"Select "+r.t}/>
          <div><div className="bt">{r.t}</div><div className="bm">{r.m}</div></div>
        </div>)}
      </div>
      <div className="modal-foot">
        <span style={{fontSize:"var(--text-xs)",color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>{picked.size} selected</span>
        <span className="sp"></span>
        <button className="btn btn--secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn--primary" onClick={()=>onImport(picked.size)}>{I("import",15)}Import {picked.size}</button>
      </div>
    </div>
  </>;
}

function ConfirmModal({cfg,onClose,onConfirm}){
  return <>
    <div className="scrim" onClick={onClose}></div>
    <div className="modal confirm" role="alertdialog" aria-modal="true" aria-label={cfg.title}>
      <div className="modal-head">
        <div className="wic">{I("alert-triangle",19)}</div>
        <div><h3>{cfg.title}</h3><p>{cfg.body}</p></div>
      </div>
      <div className="modal-foot">
        <span className="sp"></span>
        <button className="btn btn--secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn--danger" onClick={onConfirm}>{I("trash-2",15)}{cfg.cta}</button>
      </div>
    </div>
  </>;
}

/* ===== loading skeleton track ===== */
function SkeletonTrack(){
  return <div className="track" aria-hidden="true">
    {[0,1,2].map(i=><div className="node" key={i}><div className="noderow">
      <div className="sk" style={{width:30,height:30,borderRadius:"var(--radius-md)"}}></div>
      <div className="sk" style={{width:28,height:28,borderRadius:"var(--radius-md)"}}></div>
      <div className="sk line" style={{width:180}}></div>
      <div className="sk line" style={{width:90}}></div>
      <span className="node-spacer"></span>
      <div className="sk line" style={{width:130}}></div>
    </div></div>)}
  </div>;
}

/* ===== screen ===== */
function Screen(){
  const [tab,setTab]=useState("content");
  const [expanded,setExpanded]=useState(new Set(["sp_02"]));
  const [sel,setSel]=useState(new Set(["it_10","it_12","it_13"]));
  const [itemSheet,setItemSheet]=useState(null);
  const [spSheet,setSpSheet]=useState(null);
  const [bank,setBank]=useState(false);
  const [confirm,setConfirm]=useState(null);
  const [addMenu,setAddMenu]=useState(false);
  const [toast,setToast]=useState(null);
  const [live,setLive]=useState("");

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  useEffect(()=>{ if(toast){const t=setTimeout(()=>setToast(null),2600);return ()=>clearTimeout(t);} },[toast]);

  const flash=(variant,msg)=>{setToast({variant,msg});setLive(msg);};
  const toggleExp=id=>setExpanded(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleSel=id=>setSel(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const clearSel=()=>setSel(new Set());

  return <Shell>
    <SubHeader tab={tab} onTab={setTab}
      dirty={false} saving={false} savedAt="2m ago"
      onPublish={()=>flash("success","Space published.")}/>
    <div className="sx-scroll">
      <div className="sx-col">

        {/* section head with split add */}
        <div className="csh">
          <h2>Story Points</h2><span className="cnt">({INITIAL.length})</span>
          <div className="act">
            {/* SplitButton: primary Add + attached caret menu of types */}
            <div className="relwrap">
              <div className="split">
                <button className="btn btn--primary main" onClick={()=>flash("success","Story point added.")}>
                  {I("plus",15)}Add</button>
                <button className="btn btn--primary caret" aria-label="Add as type" aria-haspopup="menu"
                  aria-expanded={addMenu} onClick={()=>setAddMenu(!addMenu)}>{I("chevron-down",15)}</button>
              </div>
              {addMenu && <div className="menu" role="menu">
                <div className="mh">Add as type…</div>
                {SP_TYPES.map(t=><button key={t.value} role="menuitem"
                  onClick={()=>{setAddMenu(false);flash("success","Story point added.");}}>
                  {I(t.icon,15)}{t.label}</button>)}
              </div>}
            </div>
          </div>
        </div>

        {/* the track (success / populated state) */}
        <div className="track">
          {INITIAL.map((sp,i)=>
            <Node key={sp.id} sp={sp} idx={i}
              expanded={expanded.has(sp.id)} onToggle={()=>toggleExp(sp.id)}
              onEdit={()=>setSpSheet(sp)}
              onDelete={()=>setConfirm({title:'Delete "'+sp.title+'"?',
                body:"This will also delete all items within it. This action cannot be undone.",cta:"Delete story point",
                done:()=>flash("success","Deleted.")})}
              onPreview={()=>flash("success","Opening student preview…")}
              onItemEdit={(it)=>setItemSheet(it)}
              onItemDelete={(it)=>setConfirm({title:'Delete "'+(it.title||"Untitled")+'"?',
                body:"This action cannot be undone.",cta:"Delete item",done:()=>flash("success","Deleted.")})}
              onAddItem={(s,kind)=>setItemSheet({id:"new",title:"",kind,sub:kind==="q"?"mcq":"text",timed:s.type==="timed_test"})}
              sel={sel} toggleSel={toggleSel} clearSel={clearSel}
              onMove={(target)=>{const n=sel.size;clearSel();flash("success","Moved "+n+" items to "+target+".");}}
              onBulkDelete={()=>setConfirm({title:"Delete "+sel.size+" item(s)?",
                body:"This action cannot be undone.",cta:"Delete items",
                done:()=>{const n=sel.size;clearSel();flash("success","Deleted "+n+" items.");}})}
              onImport={()=>setBank(true)}
              loadingItems={false}/>)}
        </div>

        {/* ---- adjacent labelled state variants (spec §5) ---- */}
        <div className="vgrid">
          <div className="vcap">State · loading (skeleton track)</div>
          <SkeletonTrack/>

          <div className="vcap">State · error (failed listStoryPoints — retry)</div>
          <div className="alert" role="alert">
            <span className="lead">{I("alert-circle",18)}</span>
            <div className="sp"><span className="at">Couldn't load this space's content.</span> Check your connection and try again.</div>
            <button className="btn btn--secondary btn--sm">{I("refresh-cw",15)}Retry</button>
          </div>

          <div className="vcap">State · empty (no story points yet)</div>
          <div className="empty">
            <div className="ec">{I("list",22)}</div>
            <div className="et">No story points yet</div>
            <div className="eb">Build your learning path by adding the first story point.</div>
            <button className="btn btn--primary" onClick={()=>flash("success","Story point added.")}>
              {I("plus",15)}Add Story Point</button>
          </div>

          <div className="vcap">State · permission-gated (view-only access)</div>
          <div className="banner">
            <span className="lead">{I("eye",18)}</span>
            <span>You have view-only access to this space. Drag, add, delete and move are hidden; rows expand for preview only.</span>
          </div>
        </div>

      </div>
    </div>

    {/* drag / bulk announcements live region */}
    <div className="srlive" aria-live="assertive">{live}</div>

    {/* overlays */}
    {itemSheet && <ItemSheet item={itemSheet} onClose={()=>setItemSheet(null)}/>}
    {spSheet && <SpSheet sp={spSheet} onClose={()=>setSpSheet(null)}/>}
    {bank && <BankModal onClose={()=>setBank(false)} onImport={(n)=>{setBank(false);flash("success","Imported "+n+" items.");}}/>}
    {confirm && <ConfirmModal cfg={confirm} onClose={()=>setConfirm(null)}
      onConfirm={()=>{const d=confirm.done;setConfirm(null);d&&d();}}/>}

    {toast && <div className={"toast "+toast.variant} role="status">
      {I(toast.variant==="success"?"check-circle-2":"alert-circle",18)}{toast.msg}</div>}
  </Shell>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Screen/>);
</script>
</body>
</html>
