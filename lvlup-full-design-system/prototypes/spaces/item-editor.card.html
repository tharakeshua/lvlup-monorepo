<!-- @dsCard group="Spaces" viewport="1280x820" name="Item Editor ★" subtitle="Sheet · per-type editors · answer-key lock" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
html,body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);}
#root{min-height:100vh;}
*{box-sizing:border-box;}
/* ---- app shell (parent Space editor, dimmed beneath the sheet) ---- */
.sx{display:grid;grid-template-columns:248px 1fr;min-height:100vh;}
.sx-side{position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-5);background:var(--bg-surface);border-right:1px solid var(--border-subtle);padding:var(--space-5) var(--space-4);}
.sx-brand{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-1) var(--space-2);}
.sx-brand .mk{width:34px;height:34px;border-radius:var(--radius-md);background:var(--brand-primary);color:var(--text-on-accent);display:grid;place-items:center;font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);}
.sx-brand .nm{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-base);line-height:1.1;}
.sx-brand .sc{font-size:var(--text-2xs);color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;}
.sx-navgrp{display:flex;flex-direction:column;gap:2px;}
.sx-navlbl{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);padding:var(--space-2) var(--space-2) var(--space-1);}
.sx-nav{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--text-secondary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;position:relative;text-decoration:none;}
.sx-nav i{width:18px;height:18px;}
.sx-nav .ct{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.sx-nav:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.sx-nav.on{background:var(--brand-subtle);color:var(--brand-primary);font-weight:var(--weight-semibold);}
.sx-nav.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:58%;border-radius:var(--radius-pill);background:var(--brand-primary);}
.sx-side .foot{margin-top:auto;display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-4);border-top:1px solid var(--border-subtle);}
.sx-uc{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2);border-radius:var(--radius-md);}
.sx-uc .av{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.sx-uc .nm{font-size:var(--text-sm);font-weight:var(--weight-medium);line-height:1.1;}
.sx-uc .rl{font-size:var(--text-2xs);color:var(--text-muted);}
.sx-main{display:flex;flex-direction:column;min-width:0;height:100vh;}
.sx-top{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-6);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;top:0;z-index:20;}
.sx-bc{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-muted);}
.sx-bc i{width:14px;height:14px;}
.sx-bc a{color:var(--text-muted);text-decoration:none;cursor:pointer;}
.sx-bc a:hover{color:var(--brand-primary);}
.sx-bc b{color:var(--text-primary);font-weight:var(--weight-medium);}
.sx-top .sp{flex:1;}
.sx-search{display:flex;align-items:center;gap:var(--space-2);width:240px;max-width:28vw;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-muted);font-size:var(--text-sm);}
.sx-search i{width:15px;height:15px;}
.sx-icbtn{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}
.sx-icbtn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.sx-icbtn i{width:18px;height:18px;}
/* ---- dimmed parent body (the content tree behind the sheet) ---- */
.sx-scroll{flex:1;overflow-y:auto;}
.sx-col{max-width:1200px;margin:0 auto;padding:var(--space-5) var(--space-6) var(--space-12);display:flex;flex-direction:column;gap:var(--space-4);}
.ghosthd{display:flex;align-items:center;gap:var(--space-3);}
.ghosthd h1{margin:0;font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);}
.ghosthd .sub{font-size:var(--text-sm);color:var(--text-muted);}
.ghosthd .sp{flex:1;}
.tree{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;}
.tree-sp{padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:var(--space-3);font-weight:var(--weight-semibold);font-size:var(--text-sm);background:var(--bg-surface-sunken);}
.tree-sp i{width:16px;height:16px;color:var(--text-muted);}
.tree-sp .ct{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);font-weight:var(--weight-regular);}
.tree-row{padding:var(--space-3) var(--space-4) var(--space-3) var(--space-8);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:var(--space-3);font-size:var(--text-sm);cursor:pointer;}
.tree-row:last-child{border-bottom:none;}
.tree-row:hover{background:var(--bg-surface-sunken);}
.tree-row.sel{background:var(--brand-subtle);}
.tree-row .tic{width:26px;height:26px;border-radius:var(--radius-sm);background:var(--bg-surface-sunken);color:var(--text-secondary);display:grid;place-items:center;flex:none;}
.tree-row.sel .tic{background:var(--brand-muted);color:var(--brand-primary);}
.tree-row .tic i{width:14px;height:14px;}
.tree-row .tt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tree-row .typ{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.tree-row .pts{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
/* ---- overlays ---- */
.scrim{position:fixed;inset:0;background:rgba(20,18,15,.46);z-index:40;animation:fin var(--dur-base) var(--ease-standard);}
@keyframes fin{from{opacity:0;}to{opacity:1;}}
/* right sheet */
.sheet{position:fixed;top:0;right:0;height:100vh;width:min(640px,96vw);background:var(--bg-surface);border-left:1px solid var(--border-subtle);box-shadow:var(--shadow-e3);z-index:50;display:flex;flex-direction:column;animation:slidein var(--dur-base) var(--ease-entrance);}
@keyframes slidein{from{transform:translateX(28px);opacity:.3;}to{transform:translateX(0);opacity:1;}}
.sheet-head{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;top:0;z-index:5;}
.sheet-head .hcrumb{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);margin-bottom:2px;display:flex;align-items:center;gap:5px;}
.sheet-head .hcrumb i{width:12px;height:12px;}
.sheet-head h2{margin:0;font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);}
.sheet-head .hsp{flex:1;}
/* save-status chip — icon + text, never color alone */
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-2xs);font-weight:var(--weight-semibold);border:1px solid var(--border-subtle);background:var(--bg-surface-sunken);color:var(--text-secondary);flex:none;transition:color var(--dur-fast) var(--ease-standard),background var(--dur-fast) var(--ease-standard);}
.chip i{width:12px;height:12px;}
.chip.saved{background:var(--status-success-subtle);color:var(--status-success);border-color:var(--status-success);}
.chip.saving{background:var(--status-warning-subtle);color:var(--status-warning);border-color:var(--status-warning);}
.chip.dirty{background:var(--spark-subtle);color:var(--spark);border-color:var(--spark);}
.chip.failed{background:var(--status-error-subtle);color:var(--status-error);border-color:var(--status-error);}
.spin{width:11px;height:11px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;}
@keyframes sp{to{transform:rotate(360deg);}}
.sheet-body{flex:1;overflow-y:auto;padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-5);}
.sheet-foot{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-4) var(--space-5);border-top:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;bottom:0;}
.sheet-foot .hint{font-size:var(--text-xs);color:var(--text-muted);display:inline-flex;align-items:center;gap:6px;}
.sheet-foot .sp{flex:1;}
/* field group */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3) var(--space-4);}
.fgrid.thirds{grid-template-columns:1fr 1fr 1fr;}
.fld{display:flex;flex-direction:column;gap:6px;}
.fld.col2{grid-column:1 / -1;}
.fld label{font-size:var(--text-xs);font-weight:var(--weight-semibold);color:var(--text-secondary);display:flex;align-items:center;gap:5px;}
.fld label .req{color:var(--status-error);}
.fld .help{font-size:var(--text-2xs);color:var(--text-muted);}
.fld .ferr{font-size:var(--text-2xs);color:var(--status-error);display:flex;align-items:center;gap:4px;}
.fld .ferr i{width:12px;height:12px;}
.lockchip{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:var(--text-2xs);font-weight:var(--weight-medium);color:var(--text-muted);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:1px var(--space-2);}
.lockchip i{width:11px;height:11px;}
/* section label */
.seclbl{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-2xs);font-weight:var(--weight-semibold);text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin:0 0 var(--space-1);}
.seclbl .ln{flex:1;height:1px;background:var(--border-subtle);}
/* banners */
.banner{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--border-subtle);background:var(--bg-surface-sunken);font-size:var(--text-sm);}
.banner i.lead{width:18px;height:18px;flex:none;margin-top:1px;}
.banner .bt{font-weight:var(--weight-semibold);font-size:var(--text-xs);}
.banner .bb{color:var(--text-secondary);font-size:var(--text-xs);margin-top:2px;line-height:var(--leading-xs);}
.banner.warn{border-color:var(--status-warning);background:var(--status-warning-subtle);}
.banner.warn i.lead{color:var(--status-warning);}
.banner.err{border-color:var(--status-error);background:var(--status-error-subtle);}
.banner.err i.lead{color:var(--status-error);}
.banner.info i.lead{color:var(--status-info);}
.banner ul{margin:var(--space-2) 0 0;padding-left:var(--space-5);color:var(--text-secondary);font-size:var(--text-xs);display:flex;flex-direction:column;gap:3px;}
.banner ul b{color:var(--text-primary);font-weight:var(--weight-semibold);}
/* per-type sub-editor card */
.subed{border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3);}
.subed-hd{display:flex;align-items:center;gap:var(--space-2);}
.subed-hd .tt{font-size:var(--text-sm);font-weight:var(--weight-semibold);}
.subed-hd .sp{flex:1;}
.subed-hd .mono{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
/* option row */
.opt{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);}
.opt.correct{border-color:var(--status-success);background:var(--status-success-subtle);}
.opt .grip{cursor:grab;color:var(--text-muted);display:grid;place-items:center;width:20px;padding-top:6px;flex:none;}
.opt .grip:hover{color:var(--text-secondary);}
.opt .grip i{width:15px;height:15px;}
.opt .obody{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0;}
.opt .orow{display:flex;align-items:center;gap:var(--space-2);}
.opt .mark{flex:none;display:inline-flex;align-items:center;gap:6px;font-size:var(--text-2xs);font-weight:var(--weight-medium);color:var(--text-secondary);cursor:pointer;border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:3px var(--space-2);background:var(--bg-surface);white-space:nowrap;}
.opt.correct .mark{border-color:var(--status-success);color:var(--status-success);background:var(--status-success-subtle);}
.opt .mark i{width:13px;height:13px;}
.opt .ex{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-ui);background:none;border:none;padding:0;cursor:pointer;text-align:left;display:inline-flex;align-items:center;gap:4px;}
.opt .ex i{width:12px;height:12px;}
.opt .del{flex:none;color:var(--text-muted);background:none;border:none;cursor:pointer;display:grid;place-items:center;padding:6px;border-radius:var(--radius-sm);}
.opt .del:hover{color:var(--status-error);background:var(--status-error-subtle);}
.opt .del i{width:15px;height:15px;}
.in{width:100%;font-family:var(--font-ui);font-size:var(--text-sm);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);color:var(--text-primary);}
.in:focus{outline:none;border-color:var(--border-focus);box-shadow:var(--ring-focus);}
.in.mono{font-family:var(--font-mono);}
.in.err{border-color:var(--status-error);}
.sel{width:100%;font-family:var(--font-ui);font-size:var(--text-sm);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);color:var(--text-primary);cursor:pointer;}
.sel:focus{outline:none;border-color:var(--border-focus);box-shadow:var(--ring-focus);}
.sel:disabled{background:var(--bg-surface-sunken);color:var(--text-muted);cursor:not-allowed;}
/* switch row */
.swrow{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) 0;}
.swrow .swt{font-size:var(--text-sm);font-weight:var(--weight-medium);}
.swrow .swd{font-size:var(--text-2xs);color:var(--text-muted);}
.swrow .sp{flex:1;}
.sw{width:40px;height:22px;border-radius:var(--radius-pill);background:var(--border-strong);border:none;cursor:pointer;position:relative;flex:none;transition:background var(--dur-fast) var(--ease-standard);}
.sw.on{background:var(--brand-primary);}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--bg-surface);transition:transform var(--dur-fast) var(--ease-standard);}
.sw.on::after{transform:translateX(18px);}
/* chips combobox */
.combo{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:var(--space-2);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);min-height:40px;}
.tagchip{display:inline-flex;align-items:center;gap:5px;padding:3px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-2xs);font-weight:var(--weight-medium);background:var(--brand-subtle);color:var(--brand-primary);}
.tagchip .x{cursor:pointer;display:grid;place-items:center;}
.tagchip .x i{width:11px;height:11px;}
.combo .tin{flex:1;min-width:80px;border:none;background:none;outline:none;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);padding:3px;}
.combo .tin::placeholder{color:var(--text-muted);}
/* add button */
.addrow{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-ui);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--brand-primary);background:none;border:1px dashed var(--border-strong);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);cursor:pointer;justify-content:center;}
.addrow:hover{background:var(--brand-subtle);border-color:var(--brand-primary);}
.addrow i{width:15px;height:15px;}
/* empty sub-editor */
.subempty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:var(--space-2);padding:var(--space-6) var(--space-4);}
.subempty .ic{width:40px;height:40px;border-radius:var(--radius-pill);background:var(--bg-surface);border:1px solid var(--border-subtle);color:var(--text-muted);display:grid;place-items:center;}
.subempty .ic i{width:19px;height:19px;}
.subempty .t{font-size:var(--text-sm);font-weight:var(--weight-semibold);}
.subempty .b{font-size:var(--text-2xs);color:var(--text-muted);}
/* content renderer editor */
.cre{border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;background:var(--bg-surface);}
.cre-bar{display:flex;align-items:center;gap:2px;padding:var(--space-2);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface-sunken);}
.cre-bar button{width:28px;height:28px;border-radius:var(--radius-sm);border:none;background:none;color:var(--text-secondary);cursor:pointer;display:grid;place-items:center;}
.cre-bar button:hover{background:var(--bg-surface);color:var(--text-primary);}
.cre-bar button i{width:15px;height:15px;}
.cre-bar .sep{width:1px;height:18px;background:var(--border-subtle);margin:0 4px;}
.cre-bar .sp{flex:1;}
.cre-bar .mtag{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);padding-right:var(--space-2);display:inline-flex;align-items:center;gap:4px;}
.cre-bar .mtag i{width:12px;height:12px;}
.cre-area{min-height:96px;padding:var(--space-3);font-family:var(--font-ui);font-size:var(--text-sm);line-height:var(--leading-sm);color:var(--text-primary);outline:none;}
.cre-area .mono{font-family:var(--font-mono);background:var(--bg-surface-sunken);border-radius:var(--radius-sm);padding:1px 5px;}
/* attachments */
.filedrop{border:1.5px dashed var(--border-strong);border-radius:var(--radius-md);background:var(--bg-surface-sunken);padding:var(--space-5);display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;cursor:pointer;}
.filedrop:hover{border-color:var(--brand-primary);background:var(--brand-subtle);}
.filedrop .ic{width:34px;height:34px;border-radius:var(--radius-pill);background:var(--bg-surface);border:1px solid var(--border-subtle);color:var(--text-secondary);display:grid;place-items:center;}
.filedrop .ic i{width:17px;height:17px;}
.filedrop .t{font-size:var(--text-sm);font-weight:var(--weight-medium);}
.filedrop .b{font-size:var(--text-2xs);color:var(--text-muted);}
/* upload queue */
.uq{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);}
.uq .uic{width:30px;height:30px;border-radius:var(--radius-sm);background:var(--bg-surface-sunken);color:var(--text-secondary);display:grid;place-items:center;flex:none;}
.uq .uic i{width:15px;height:15px;}
.uq .ub{flex:1;min-width:0;}
.uq .un{font-size:var(--text-xs);font-weight:var(--weight-medium);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.uq .um{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.uq .prog{height:4px;border-radius:var(--radius-pill);background:var(--bg-surface-sunken);overflow:hidden;margin-top:4px;}
.uq .prog span{display:block;height:100%;background:var(--brand-primary);border-radius:var(--radius-pill);}
.uq .ust{font-size:var(--text-2xs);font-weight:var(--weight-semibold);display:inline-flex;align-items:center;gap:4px;flex:none;}
.uq .ust i{width:13px;height:13px;}
.uq .ust.done{color:var(--status-success);}
.uq .ust.up{color:var(--status-warning);}
.uq .udel{flex:none;color:var(--text-muted);background:none;border:none;cursor:pointer;display:grid;place-items:center;padding:5px;border-radius:var(--radius-sm);}
.uq .udel:hover{color:var(--status-error);background:var(--status-error-subtle);}
.uq .udel i{width:14px;height:14px;}
/* answer key lock */
.keylock{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border:1px dashed var(--border-strong);border-radius:var(--radius-md);background:var(--bg-surface);}
.keylock .kic{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--bg-surface-sunken);color:var(--text-secondary);display:grid;place-items:center;flex:none;}
.keylock .kic i{width:16px;height:16px;}
.keylock .kt{font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.keylock .kb{font-size:var(--text-2xs);color:var(--text-muted);margin-top:2px;line-height:var(--leading-2xs);}
.keylock .klnk{font-size:var(--text-2xs);font-weight:var(--weight-medium);color:var(--brand-primary);background:none;border:none;cursor:pointer;padding:0;margin-top:4px;}
/* accordion section */
.acc{border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;}
.acc-hd{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-4);background:var(--bg-surface-sunken);cursor:pointer;border:none;width:100%;font-family:var(--font-ui);color:var(--text-primary);}
.acc-hd .tt{font-size:var(--text-sm);font-weight:var(--weight-semibold);}
.acc-hd .sp{flex:1;}
.acc-hd .cv{color:var(--text-muted);display:grid;place-items:center;transition:transform var(--dur-fast) var(--ease-standard);}

.acc-hd[aria-expanded="true"] .cv{transform:rotate(180deg);}
.acc-body{padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3);}
/* footer buttons */

/* skeleton */
.sk{background:var(--bg-surface-sunken);border-radius:var(--radius-sm);position:relative;overflow:hidden;}
.sk::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,var(--bg-surface),transparent);animation:shim 1.3s infinite;}
@keyframes shim{from{transform:translateX(-100%);}to{transform:translateX(100%);}}
/* confirm dialog */
.dialog{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:60;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e3);width:min(460px,94vw);display:flex;flex-direction:column;animation:dpop var(--dur-base) var(--ease-entrance);}
@keyframes dpop{from{transform:translate(-50%,-46%);opacity:0;}to{transform:translate(-50%,-50%);opacity:1;}}
.confirm-body{padding:var(--space-5);display:flex;gap:var(--space-3);}
.confirm-body .cic{width:38px;height:38px;border-radius:var(--radius-pill);background:var(--spark-subtle);color:var(--spark);display:grid;place-items:center;flex:none;}
.confirm-body .cic i{width:19px;height:19px;}
.confirm-body .ct{font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);}
.confirm-body .cb{font-size:var(--text-sm);color:var(--text-secondary);margin-top:4px;line-height:var(--leading-sm);}
.dialog-foot{display:flex;justify-content:flex-end;gap:var(--space-2);padding:var(--space-4) var(--space-5);border-top:1px solid var(--border-subtle);}
/* toast */
.toast{position:fixed;bottom:var(--space-6);right:var(--space-6);z-index:70;display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);background:var(--bg-surface);border:1px solid var(--border-subtle);box-shadow:var(--shadow-e3);max-width:360px;animation:tin var(--dur-base) var(--ease-entrance);}
.toast i.lead{width:18px;height:18px;flex:none;margin-top:1px;}
.toast.ok{border-color:var(--status-success);}
.toast.ok i.lead{color:var(--status-success);}
.toast.bad{border-color:var(--status-error);}
.toast.bad i.lead{color:var(--status-error);}
.toast .tt{font-size:var(--text-sm);font-weight:var(--weight-semibold);}
.toast .tb{font-size:var(--text-xs);color:var(--text-muted);}
.toast .retry{margin-left:auto;color:var(--brand-primary);font-weight:var(--weight-medium);font-size:var(--text-xs);background:none;border:none;cursor:pointer;}
@keyframes tin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
/* demo switcher */

.demo .dl{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);padding:0 var(--space-2);}
.demo button{font-family:var(--font-ui);font-size:var(--text-2xs);font-weight:var(--weight-medium);border:none;background:none;color:var(--text-secondary);border-radius:var(--radius-pill);padding:5px var(--space-3);cursor:pointer;}
.demo button.on{background:var(--brand-primary);color:var(--text-on-accent);}
.sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
@media (prefers-reduced-motion: reduce){*{transition-duration:.001ms !important;animation-duration:.001ms !important;}}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { Icon, Button } = window.LvlupV0DesignSystem_5d0725;
const I = (name, size) => <Icon name={name} size={size || 16} />;

/* 15 question types + 7 material types for the type Selects */
const QUESTION_TYPES = [
  ["mcq","Multiple choice (single)"],["mcaq","Multiple choice (multi)"],["true-false","True / False"],
  ["numerical","Numerical"],["text","Short text"],["paragraph","Paragraph (AI-graded)"],
  ["code","Code"],["fill-blanks","Fill in the blanks"],["fill-blanks-dd","Fill in the blanks (dropdown)"],
  ["matching","Matching pairs"],["jumbled","Jumbled / reorder"],["audio","Audio response (AI-graded)"],
  ["image_evaluation","Image evaluation (AI-graded)"],["group-options","Group options"],
  ["chat_agent_question","Chat agent (AI-graded)"],
];
const ITEM_TYPES = [
  ["question","Question"],["material","Material"],["interactive","Interactive"],
  ["assessment","Assessment"],["discussion","Discussion"],["project","Project"],["checkpoint","Checkpoint"],
];
const DIFFICULTY = [["easy","Easy"],["medium","Medium"],["hard","Hard"]];
const SECTIONS = [["sp2","Story Point 2 · Linear Equations"],["sp3","Story Point 3 · Solving for x"],["sp4","Story Point 4 · Word Problems"]];
const BLOOMS = [["remember","Remember"],["understand","Understand"],["apply","Apply"],["analyze","Analyze"],["evaluate","Evaluate"],["create","Create"]];

/* ---------- dimmed parent: Space editor Content tree ---------- */
function Nav({icon,label,count,active}){
  return <a className={"sx-nav"+(active?" on":"")} aria-current={active?"page":undefined}>
    {I(icon,18)}<span>{label}</span>{count!=null&&<span className="ct">{count}</span>}</a>;
}
function ParentShell(){
  const items=[
    {ic:"list-checks",t:"Solve 3x − 7 = 11",typ:"mcq",pts:"2",sel:true},
    {ic:"text",t:"What is a linear equation?",typ:"paragraph",pts:"5"},
    {ic:"hash",t:"Evaluate 5(x+2) at x=3",typ:"numerical",pts:"3"},
    {ic:"file-text",t:"Reading — Inverse operations",typ:"material",pts:"—"},
  ];
  return <div className="sx" aria-hidden="true">
    <aside className="sx-side">
      <div className="sx-brand"><div className="mk">L</div>
        <div><div className="nm">Auto-LevelUp</div><div className="sc">Northwood · Teacher</div></div></div>
      <nav aria-label="Primary" style={{display:"flex",flexDirection:"column",gap:"var(--space-5)"}}>
        <div className="sx-navgrp"><div className="sx-navlbl">Teach</div>
          <Nav icon="layout-dashboard" label="Dashboard"/>
          <Nav icon="school" label="Classes" count="6"/>
          <Nav icon="layers" label="Spaces" count="9" active/>
          <Nav icon="file-check" label="Exams" count="4"/>
          <Nav icon="graduation-cap" label="Students"/></div>
        <div className="sx-navgrp"><div className="sx-navlbl">Insights</div>
          <Nav icon="bar-chart-3" label="Analytics"/>
          <Nav icon="sparkles" label="AI tutor"/></div>
      </nav>
      <div className="foot"><div className="sx-uc"><div className="av">RM</div>
        <div><div className="nm">Rohan Mehta</div><div className="rl">Teacher · Owner</div></div></div></div>
    </aside>
    <div className="sx-main">
      <header className="sx-top">
        <nav className="sx-bc" aria-label="Breadcrumb">
          <a>Spaces</a>{I("chevron-right",14)}<a>Algebra I</a>{I("chevron-right",14)}<b>Content</b>
        </nav>
        <div className="sp"></div>
        <div className="sx-search">{I("search",15)}<span>Search spaces…</span></div>
        <button className="sx-icbtn" aria-label="Notifications">{I("bell",18)}</button>
      </header>
      <div className="sx-scroll"><div className="sx-col">
        <div className="ghosthd">
          <h1>Algebra I — Content</h1><div className="sp"></div>
          <span className="sub">4 story points · 28 items</span>
        </div>
        <div className="tree">
          <div className="tree-sp">{I("git-branch",16)}Story Point 2 — Linear Equations
            <span className="ct">4 items · 12 pts</span></div>
          {items.map((it,i)=>
            <div key={i} className={"tree-row"+(it.sel?" sel":"")}>
              <div className="tic">{I(it.ic,14)}</div>
              <span className="tt">{it.t}</span>
              <span className="typ">{it.typ}</span>
              <span className="pts">{it.pts} pts</span>
            </div>)}
        </div>
      </div></div>
    </div>
  </div>;
}

/* ---------- save-status chip ---------- */
function SaveChip({status}){
  const map={
    saved:{cls:"saved",icon:"check-circle-2",label:"Saved · just now"},
    saving:{cls:"saving",icon:null,label:"Saving…"},
    dirty:{cls:"dirty",icon:"circle-dot",label:"Unsaved changes"},
    failed:{cls:"failed",icon:"alert-circle",label:"Save failed — retry"},
  };
  const c=map[status];
  return <span className={"chip "+c.cls} role="status" aria-live="polite">
    {c.icon?I(c.icon,12):<span className="spin" aria-hidden="true"></span>}{c.label}</span>;
}

/* ---------- switch ---------- */
function Sw({checked,onChange,title,desc,id}){
  return <div className="swrow">
    <div><div className="swt">{title}</div>{desc&&<div className="swd">{desc}</div>}</div>
    <div className="sp"></div>
    <button id={id} className={"sw"+(checked?" on":"")} role="switch" aria-checked={checked}
      aria-label={title} onClick={()=>onChange(!checked)}></button>
  </div>;
}

/* ---------- ContentRenderer editor (md + KaTeX surface) ---------- */
function ContentEditor(){
  return <div className="cre">
    <div className="cre-bar" role="toolbar" aria-label="Content formatting">
      <button aria-label="Bold">{I("bold",15)}</button>
      <button aria-label="Italic">{I("italic",15)}</button>
      <button aria-label="Code">{I("code",15)}</button>
      <span className="sep"></span>
      <button aria-label="Bulleted list">{I("list",15)}</button>
      <button aria-label="Link">{I("link",15)}</button>
      <button aria-label="Insert math (KaTeX)">{I("sigma",15)}</button>
      <button aria-label="Insert image">{I("image",15)}</button>
      <span className="sp"></span>
      <span className="mtag">{I("function-square",12)}Markdown + KaTeX</span>
    </div>
    <div className="cre-area" contentEditable suppressContentEditableWarning aria-label="Content">
      Solve the linear equation below for <span className="mono">x</span>. Show that applying inverse
      operations to both sides preserves equality:  $3x - 7 = 11$.
    </div>
  </div>;
}

/* ---------- MCQ option row ---------- */
function OptionRow({idx,opt,marked,onMark,onDel,letter}){
  return <div className={"opt"+(marked?" correct":"")}>
    <span className="grip" role="button" tabIndex={0}
      aria-label={"Reorder option "+letter} aria-roledescription="sortable">{I("grip-vertical",15)}</span>
    <div className="obody">
      <div className="orow">
        <input className="in" defaultValue={opt.text} aria-label={"Option "+letter+" text"}/>
        <button className="mark" role="radio" aria-checked={marked} onClick={onMark}
          aria-label={marked?"Marked correct":"Mark correct"}>
          {I(marked?"check-circle-2":"circle",13)}{marked?"Correct":"Mark correct"}</button>
        <button className="del" onClick={onDel} aria-label={"Remove option "+letter}>{I("trash-2",15)}</button>
      </div>
      <button className="ex">{I("plus",12)}Add explanation (optional)</button>
    </div>
  </div>;
}

/* ---------- per-type sub-editor: MCQ (registry-dispatched) ---------- */
function McqEditor({empty,onAdd,correctIdx,setCorrectIdx,shuffle,setShuffle,options,setOptions}){
  return <div className="subed">
    <div className="subed-hd">
      {I("list-checks",16)}<span className="tt">Options</span>
      <span className="sp"></span>
      <span className="mono">questionType: mcq · exactly-one-correct</span>
    </div>
    {empty
      ? <div className="subempty">
          <div className="ic">{I("list-plus",19)}</div>
          <div className="t">No options yet — add at least 2.</div>
          <div className="b">A single-choice question needs ≥ 2 options with exactly one marked correct.</div>
          <button className="addrow" onClick={onAdd} style={{marginTop:"var(--space-2)"}}>{I("plus",15)}Add option</button>
        </div>
      : <>
          {options.map((o,i)=>
            <OptionRow key={o.id} idx={i} opt={o} letter={String.fromCharCode(65+i)}
              marked={correctIdx===i} onMark={()=>setCorrectIdx(i)}
              onDel={()=>setOptions(options.filter((_,j)=>j!==i))}/>)}
          <button className="addrow" onClick={onAdd}>{I("plus",15)}Add option</button>
          <Sw checked={shuffle} onChange={setShuffle} title="Shuffle options"
            desc="Randomize option order per student attempt."/>
        </>}
  </div>;
}

/* ---------- timed-test answer key lock skeleton (loading merge) ---------- */
function KeyLockBlock({loading}){
  return <div className="subed">
    <div className="subed-hd">{I("shield-check",16)}<span className="tt">Answer key</span>
      <span className="sp"></span><span className="mono">getItemForEdit · timed_test</span></div>
    {loading
      ? <div style={{display:"flex",flexDirection:"column",gap:"var(--space-2)"}}>
          {[0,1,2].map(i=><div key={i} className="sk" style={{height:46,borderRadius:"var(--radius-md)"}}></div>)}
        </div>
      : <div className="keylock">
          <div className="kic">{I("lock",16)}</div>
          <div>
            <div className="kt">Answer key is protected (server-only)</div>
            <div className="kb">The correct answer lives in the answerKeys subcollection. It is re-merged for editing
              and never reaches a preview or a student. Editing here is gated by the timed-test guard.</div>
            <button className="klnk">{I("eye",11)} Reveal for editing</button>
          </div>
        </div>}
  </div>;
}

/* ---------- main screen ---------- */
function Screen(){
  // demo variant: default | loading | empty | invalid | timed | failed
  const [variant,setVariant]=useState("default");

  const [open,setOpen]=useState(true);
  const [itemType]=useState("question");          // immutable post-create
  const [qType,setQType]=useState("mcq");
  const [pendingQType,setPendingQType]=useState(null);
  const [difficulty,setDifficulty]=useState("medium");
  const [section,setSection]=useState("sp2");
  const [blooms,setBlooms]=useState("apply");
  const [save,setSave]=useState("saved");
  const [shuffle,setShuffle]=useState(true);
  const [correctIdx,setCorrectIdx]=useState(1);
  const [classOpen,setClassOpen]=useState(true);
  const [confirm,setConfirm]=useState(null);       // 'unsaved' | 'qtype'
  const [toast,setToast]=useState(null);
  const [topics,setTopics]=useState(["algebra","linear-equations"]);
  const [labels,setLabels]=useState(["graded"]);
  const [options,setOptions]=useState([
    {id:1,text:"x = 4"},{id:2,text:"x = 6"},{id:3,text:"x = 9"},{id:4,text:"x = 18"},
  ]);
  const nextId=useRef(5);
  const saveTimer=useRef(null);

  const isEmpty = variant==="empty";
  const isInvalid = variant==="invalid" || isEmpty;
  const isTimed = variant==="timed";
  const isLoadingMerge = variant==="loading";
  const effSave = variant==="failed" ? "failed" : save;
  const valid = !isInvalid;

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });

  // 2s debounced autosave (validity-gated)
  const markDirty=()=>{ if(!valid) { setSave("dirty"); return; }
    setSave("dirty"); clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{ setSave("saving"); setTimeout(()=>setSave("saved"),700); },2000); };

  // ⌘/Ctrl+Enter saves; Esc closes (guarded if dirty)
  useEffect(()=>{
    const h=(e)=>{
      if((e.metaKey||e.ctrlKey)&&e.key==="Enter"){ e.preventDefault(); handleSave(); }
      if(e.key==="Escape") tryClose();
    };
    window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h);
  });

  const handleSave=()=>{
    if(!valid) return;
    clearTimeout(saveTimer.current);
    setSave("saving"); setTimeout(()=>{ setSave("saved");
      setToast({k:"ok",t:"Item saved",b:"Answer key stripped to server-only storage."});
      setTimeout(()=>setToast(null),2600); },700);
  };
  const tryClose=()=>{ if(effSave==="dirty"||effSave==="failed"){ setConfirm("unsaved"); } else { setOpen(false); } };

  const requestQType=(v)=>{ if(v===qType) return;
    // changing type with configured data resets questionData -> confirm
    setPendingQType(v); setConfirm("qtype"); };
  const confirmQType=()=>{ setQType(pendingQType); setPendingQType(null); setConfirm(null);
    setOptions([{id:1,text:""},{id:2,text:""}]); setCorrectIdx(-1); setVariant("empty"); markDirty(); };

  const addOption=()=>{ const id=nextId.current++;
    setOptions(o=>[...o,{id,text:""}]); if(variant==="empty") setVariant("default"); markDirty(); };

  const addTag=(set,list,e)=>{ if(e.key==="Enter"&&e.target.value.trim()){
    set([...list,e.target.value.trim().toLowerCase().replace(/\s+/g,"-")]); e.target.value=""; markDirty(); } };

  const retrySave=()=>{ setVariant("default"); handleSave(); };

  return <>
    <ParentShell/>

    {open && <>
      <div className="scrim" onClick={tryClose}></div>
      <aside className="sheet" role="dialog" aria-modal="true" aria-labelledby="ie-title">

        {/* ===== sticky header ===== */}
        <div className="sheet-head">
          <button className="sx-icbtn" aria-label="Back to content" onClick={tryClose}>{I("arrow-left",18)}</button>
          <div style={{minWidth:0}}>
            <div className="hcrumb">{I("git-branch",12)}Story Point 2 · Linear Equations · Item 01</div>
            <h2 id="ie-title">Edit Question</h2>
          </div>
          <span className="hsp"></span>
          <SaveChip status={effSave}/>
        </div>

        {/* ===== scrolling body ===== */}
        <div className="sheet-body">

          {/* timed-test answer-key warning banner */}
          {isTimed && <div className="banner warn" role="status">
            <span className="lead">{I("shield-alert",18)}</span>
            <div style={{flex:1}}>
              <div className="bt">This is a timed-test question</div>
              <div className="bb">The correct answer is stored in protected server storage and is shown here only
                for editing — it is never sent to students. Saving with blanks will not overwrite the stored key.</div>
            </div>
          </div>}

          {/* validation summary (role=alert) */}
          {isInvalid && <div className="banner err" role="alert">
            <span className="lead">{I("alert-circle",18)}</span>
            <div style={{flex:1}}>
              <div className="bt">Fix {isEmpty?"2":"3"} issue{isEmpty?"":"s"} before saving</div>
              <ul>
                {isEmpty
                  ? <><li>Add at least 2 options</li><li>Mark at least one option correct</li></>
                  : <><li><b>Title is required</b></li><li>Mark at least one option correct</li><li>All blanks need a correct answer</li></>}
              </ul>
            </div>
          </div>}

          {/* ── SHARED FIELDS ── */}
          <div>
            <div className="seclbl">Item<span className="ln"></span></div>
            <div className="fgrid">
              <div className="fld col2">
                <label htmlFor="f-title">Title <span className="req" aria-hidden="true">*</span>
                  <span className="sr">required</span></label>
                <input id="f-title" className={"in"+(variant==="invalid"?" err":"")}
                  aria-invalid={variant==="invalid"} aria-describedby={variant==="invalid"?"f-title-err":undefined}
                  defaultValue={variant==="invalid"?"":"Solve a one-variable linear equation"}
                  placeholder="Short, descriptive title" onChange={markDirty}/>
                {variant==="invalid" && <div className="ferr" id="f-title-err">{I("alert-circle",12)}Title is required</div>}
              </div>
              <div className="fld">
                <label htmlFor="f-itype">Type
                  <span className="lockchip">{I("lock",11)}locked after create</span></label>
                <select id="f-itype" className="sel" value={itemType} disabled aria-readonly="true">
                  {ITEM_TYPES.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </select>
              </div>
              <div className="fld">
                <label htmlFor="f-qtype">Question type</label>
                <select id="f-qtype" className="sel" value={qType} onChange={e=>requestQType(e.target.value)}>
                  {QUESTION_TYPES.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </select>
              </div>
              <div className="fld">
                <label htmlFor="f-diff">Difficulty</label>
                <select id="f-diff" className="sel" value={difficulty}
                  onChange={e=>{setDifficulty(e.target.value);markDirty();}}>
                  {DIFFICULTY.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </select>
              </div>
              <div className="fld">
                <label htmlFor="f-pts">Base points</label>
                <input id="f-pts" className="in mono" defaultValue="2" inputMode="numeric"
                  aria-label="Base points" onChange={markDirty}/>
              </div>
              <div className="fld col2">
                <label>Content <span className="help">· markdown + KaTeX, one renderer for authoring & student view</span></label>
                <ContentEditor/>
              </div>
            </div>
          </div>

          {/* ── PER-TYPE SUB-EDITOR ── */}
          <div>
            <div className="seclbl">Answer configuration · {qType}<span className="ln"></span></div>
            {isTimed || isLoadingMerge
              ? <KeyLockBlock loading={isLoadingMerge}/>
              : <McqEditor empty={isEmpty} onAdd={addOption}
                  correctIdx={correctIdx} setCorrectIdx={(i)=>{setCorrectIdx(i);markDirty();}}
                  shuffle={shuffle} setShuffle={(v)=>{setShuffle(v);markDirty();}}
                  options={options} setOptions={(o)=>{setOptions(o);markDirty();}}/>}
          </div>

          {/* ── CLASSIFICATION (collapsible) ── */}
          <div className="acc">
            <button className="acc-hd" aria-expanded={classOpen} onClick={()=>setClassOpen(o=>!o)}>
              {I("tags",16)}<span className="tt">Classification</span>
              <span className="sp"></span><span className="cv">{I("chevron-down",16)}</span>
            </button>
            {classOpen && <div className="acc-body">
              <div className="fgrid">
                <div className="fld">
                  <label htmlFor="f-sec">Section</label>
                  <select id="f-sec" className="sel" value={section}
                    onChange={e=>{setSection(e.target.value);markDirty();}}>
                    {SECTIONS.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                  </select>
                </div>
                <div className="fld">
                  <label htmlFor="f-bloom">Bloom's level</label>
                  <select id="f-bloom" className="sel" value={blooms}
                    onChange={e=>{setBlooms(e.target.value);markDirty();}}>
                    {BLOOMS.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                  </select>
                </div>
              </div>
              <div className="fld">
                <label>Topics</label>
                <div className="combo">
                  {topics.map((t,i)=><span key={t} className="tagchip">{t}
                    <span className="x" role="button" aria-label={"Remove "+t}
                      onClick={()=>{setTopics(topics.filter((_,j)=>j!==i));markDirty();}}>{I("x",11)}</span></span>)}
                  <input className="tin" placeholder="Add topic…" aria-label="Add topic"
                    onKeyDown={e=>addTag(setTopics,topics,e)}/>
                </div>
              </div>
              <div className="fld">
                <label>Labels</label>
                <div className="combo">
                  {labels.map((t,i)=><span key={t} className="tagchip">{t}
                    <span className="x" role="button" aria-label={"Remove "+t}
                      onClick={()=>{setLabels(labels.filter((_,j)=>j!==i));markDirty();}}>{I("x",11)}</span></span>)}
                  <input className="tin" placeholder="Add label…" aria-label="Add label"
                    onKeyDown={e=>addTag(setLabels,labels,e)}/>
                </div>
              </div>
            </div>}
          </div>

          {/* ── ATTACHMENTS ── */}
          <div>
            <div className="seclbl">Attachments<span className="ln"></span></div>
            <div className="filedrop" role="button" tabIndex={0} aria-label="Upload attachment">
              <div className="ic">{I("upload-cloud",17)}</div>
              <div className="t">Drop files or click to upload</div>
              <div className="b">Image, PDF, or audio · up to 20 MB each</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"var(--space-2)",marginTop:"var(--space-2)"}}>
              <div className="uq">
                <div className="uic">{I("image",15)}</div>
                <div className="ub"><div className="un">number-line-diagram.png</div>
                  <div className="um">image/png · 248 KB</div></div>
                <span className="ust done">{I("check-circle-2",13)}Uploaded</span>
                <button className="udel" aria-label="Remove number-line-diagram.png">{I("trash-2",14)}</button>
              </div>
              <div className="uq">
                <div className="uic">{I("file-text",15)}</div>
                <div className="ub"><div className="un">worked-solution.pdf</div>
                  <div className="prog"><span style={{width:"64%"}}></span></div></div>
                <span className="ust up">{I("loader",13)}64%</span>
                <button className="udel" aria-label="Cancel upload">{I("x",14)}</button>
              </div>
            </div>
          </div>
        </div>

        {/* ===== sticky footer ===== */}
        <div className="sheet-foot">
          <span className="hint">{I("command",13)} ⌘/Ctrl + Enter to save</span>
          <span className="sp"></span>
          <button className="btn btn--ghost" onClick={tryClose}>Cancel</button>
          <button className="btn btn--primary" disabled={effSave==="saving"||!valid} onClick={handleSave}>
            {effSave==="saving"?<span className="spin" aria-hidden="true"></span>:I("check")}
            {effSave==="saving"?"Saving…":"Save"}</button>
        </div>
      </aside>
    </>}

    {/* re-open when closed (card affordance) */}
    {!open && <div className="dialog" role="dialog" aria-label="Item editor closed">
      <div className="confirm-body"><div className="cic">{I("check-circle-2",19)}</div>
        <div><div className="ct">Sheet closed</div>
          <div className="cb">The item editor sheet was dismissed.</div></div></div>
      <div className="dialog-foot"><Button variant="primary" onClick={()=>{setOpen(true);setSave("saved");}}>Reopen editor</Button></div>
    </div>}

    {/* ConfirmDialog */}
    {confirm && <>
      <div className="scrim" style={{zIndex:55}}></div>
      <div className="dialog" role="alertdialog" aria-modal="true" aria-labelledby="cf-t" aria-describedby="cf-b">
        <div className="confirm-body">
          <div className="cic">{I("alert-triangle",19)}</div>
          <div>
            {confirm==="unsaved"
              ? <><div className="ct" id="cf-t">Unsaved changes</div>
                  <div className="cb" id="cf-b">You have unsaved changes. Are you sure you want to close?</div></>
              : <><div className="ct" id="cf-t">Change question type?</div>
                  <div className="cb" id="cf-b">Changing question type will reset the question's configuration. Continue?</div></>}
          </div>
        </div>
        <div className="dialog-foot">
          {confirm==="unsaved" ? <>
            <Button variant="ghost" autoFocus onClick={()=>setConfirm(null)}>Keep editing</Button>
            <Button variant="danger" onClick={()=>{setConfirm(null);setOpen(false);}}>Discard & close</Button>
            <button className="btn btn--primary" onClick={()=>{setConfirm(null);handleSave();setOpen(false);}}>Save & close</button>
          </> : <>
            <Button variant="ghost" autoFocus onClick={()=>{setConfirm(null);setPendingQType(null);}}>Cancel</Button>
            <button className="btn btn--primary" onClick={confirmQType}>Reset & change</button>
          </>}
        </div>
      </div>
    </>}

    {/* toast */}
    {toast && <div className={"toast "+(toast.k==="ok"?"ok":"bad")} role="status">
      <span className="lead">{I(toast.k==="ok"?"check-circle-2":"alert-circle",18)}</span>
      <div><div className="tt">{toast.t}</div><div className="tb">{toast.b}</div></div>
      {toast.k!=="ok" && <button className="retry" onClick={retrySave}>Retry</button>}
    </div>}

    {/* demo state switcher (card chrome — not part of the screen) */}
    <div className="demo" role="group" aria-label="Preview states">
      <span className="dl">state</span>
      {[["default","Default"],["loading","Loading merge"],["empty","Empty (new)"],
        ["invalid","Validation error"],["timed","Timed-test key"],["failed","Save failed"]].map(([v,l])=>
        <button key={v} className={variant===v?"on":""}
          onClick={()=>{setVariant(v);setOpen(true);setSave(v==="failed"?"failed":v==="default"?"saved":"dirty");}}>{l}</button>)}
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Screen/>);
</script>
</body>
</html>
