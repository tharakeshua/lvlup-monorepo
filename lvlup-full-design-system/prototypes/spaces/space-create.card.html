<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
/* screen-local LAYOUT-ONLY rules — Lyceum vars only, NO raw hex, NO :root redefinition */
html,body{margin:0}
body{background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}
.shell{height:820px;overflow:hidden;position:relative}

/* ---- dimmed parent /spaces screen behind the modal ---- */
.bg-screen{filter:saturate(.92)}
.tb-tenant{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-2);border:1px solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-primary);background:var(--bg-surface)}
.tb-tenant__code{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
.tb-search{flex:1;max-width:420px;position:relative;display:flex;align-items:center}
.tb-search svg{position:absolute;left:var(--space-3);color:var(--text-muted);pointer-events:none}
.tb-search .input{padding-left:var(--space-8)}
.tb-kbd{position:absolute;right:var(--space-2);display:flex;gap:2px}
.tb-icon{display:grid;place-items:center;width:36px;height:36px;border-radius:var(--radius-md);color:var(--text-secondary)}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);margin-bottom:var(--space-5)}
.page-head h1{font-size:var(--text-4xl);line-height:var(--leading-4xl)}
.page-sub{color:var(--text-secondary);font-size:var(--text-base);margin-top:var(--space-1)}
.space-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4)}

/* ---- scrim + modal positioning ---- */
.scrim{position:absolute;inset:0;background:rgba(15,18,32,.46);display:flex;align-items:flex-start;justify-content:center;padding-top:var(--space-12);z-index:50;animation:scrimIn var(--dur-base) var(--ease-entrance)}
@keyframes scrimIn{from{opacity:0}to{opacity:1}}
.dialog{width:640px;max-width:92vw;max-height:720px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e3);display:flex;flex-direction:column;overflow:hidden;animation:panelIn var(--dur-base) var(--ease-entrance)}
@keyframes panelIn{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}

/* ---- dialog header ---- */
.dlg-head{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-6) var(--space-6) var(--space-4)}
.dlg-head__txt{flex:1;min-width:0}
.dlg-title{font-family:var(--font-display);font-size:var(--text-xl);line-height:var(--leading-xl);font-weight:var(--weight-semibold);color:var(--text-primary);margin:0}
.dlg-sub{font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-1)}
.dlg-sep{height:1px;background:var(--border-subtle)}

/* ---- scrollable body ---- */
.dlg-body{padding:var(--space-5) var(--space-6);overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-5)}
.fld{display:flex;flex-direction:column;gap:var(--space-2)}
.fld__lab{display:flex;align-items:center;gap:var(--space-1);font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-primary)}
.fld__opt{font-weight:var(--weight-regular);color:var(--text-muted);font-size:var(--text-xs)}
.fld__req{color:var(--status-error);font-weight:var(--weight-bold)}
.fld__help{font-size:var(--text-xs);color:var(--text-muted);line-height:var(--leading-xs);transition:opacity var(--dur-instant) var(--ease-standard)}
.fld__err{display:flex;align-items:center;gap:var(--space-1);font-size:var(--text-xs);color:var(--status-error);font-weight:var(--weight-medium)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)}
.counter{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);text-align:right;font-variant-numeric:tabular-nums}
.counter--over{color:var(--status-error)}

/* ---- access reveal block ---- */
.access-block{display:flex;flex-direction:column;gap:var(--space-4);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);padding:var(--space-4);overflow:hidden;animation:revealIn var(--dur-base) var(--ease-standard)}
@keyframes revealIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* ---- entity picker ---- */
.picker{display:flex;flex-direction:column;gap:var(--space-2);position:relative}
.picker__field{display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-2);min-height:42px;padding:var(--space-2);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);cursor:text}
.picker__field:focus-within{border-color:var(--border-focus);box-shadow:var(--ring-focus)}
.picker__input{flex:1;min-width:120px;border:none;outline:none;background:transparent;font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-primary);padding:var(--space-1)}
.picker__menu{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:30;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);box-shadow:var(--shadow-e2);padding:var(--space-1);max-height:208px;overflow-y:auto}
.picker__opt{display:flex;align-items:center;gap:var(--space-2);width:100%;text-align:left;padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-secondary);line-height:1.4}
.picker__opt:hover,.picker__opt.is-active{background:var(--bg-surface-sunken);color:var(--text-primary)}
.picker__opt-meta{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
.picker__opt .check{margin-left:auto;color:var(--brand-primary)}
.picker__sk{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3)}
.teacher-tag{display:inline-flex;align-items:center;gap:var(--space-1);padding:2px 8px 2px 2px;background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);font-size:var(--text-xs);color:var(--text-primary)}
.teacher-tag button{display:grid;place-items:center;color:var(--text-muted);border-radius:var(--radius-pill)}
.teacher-tag button:hover{color:var(--status-error)}

/* ---- label tokenizer ---- */
.lbl-tags{display:flex;flex-wrap:wrap;gap:var(--space-2)}

/* ---- footer ---- */
.dlg-foot{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding:var(--space-4) var(--space-6);border-top:1px solid var(--border-subtle);background:var(--bg-surface)}
.dlg-foot__note{font-size:var(--text-xs);color:var(--text-muted)}
.dlg-foot__actions{display:flex;align-items:center;gap:var(--space-3)}

/* ---- prototype state switcher (chrome, not part of screen) ---- */
.proto-bar{position:absolute;top:var(--space-3);left:50%;transform:translateX(-50%);z-index:90;display:flex;align-items:center;gap:var(--space-3);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);box-shadow:var(--shadow-e2);padding:var(--space-1) var(--space-2)}
.proto-bar__lab{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);padding-left:var(--space-2)}
.segmented{display:inline-flex;background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:3px;gap:2px}
.segmented button{font-size:var(--text-xs);font-weight:var(--weight-medium);font-family:var(--font-ui);color:var(--text-secondary);padding:var(--space-1) var(--space-3);border-radius:var(--radius-pill);line-height:1.6}
.segmented button[aria-pressed="true"]{background:var(--bg-surface);color:var(--brand-primary);box-shadow:var(--shadow-e1);font-weight:var(--weight-semibold)}

/* ---- toast ---- */
.toast-stack{position:absolute;right:var(--space-6);bottom:var(--space-6);z-index:120}
.toast-card{display:flex;align-items:center;gap:var(--space-3);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);box-shadow:var(--shadow-e3);padding:var(--space-3) var(--space-4);min-width:320px}
.toast-card__icon{display:grid;place-items:center;color:var(--spark)}
.toast-card__txt{flex:1;font-size:var(--text-sm);color:var(--text-primary)}

.btn--spark{transition:box-shadow var(--dur-fast) var(--ease-standard),transform var(--dur-fast) var(--ease-standard)}
.btn--spark:hover{box-shadow:var(--glow-spark);transform:translateY(-1px)}

@media (prefers-reduced-motion: reduce){
  .scrim,.dialog,.access-block{animation:none}
  .btn--spark:hover{transform:none}
}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  const {
    Button, IconButton, Icon, Input, Textarea, Select, Field, Badge, Chip,
    Avatar, AvatarGroup, Skeleton, EmptyState, Alert, Breadcrumb, Kbd, SpaceCard
  } = window.LvlupV0DesignSystem_5d0725;

  /* ---- closed enums (verbatim from SpaceSettingsPanel) ---- */
  const SPACE_TYPES = [
    { value:"learning",   label:"Learning",   desc:"Sequenced lessons and story points students work through to learn new material." },
    { value:"practice",   label:"Practice",   desc:"Drills and repeatable question sets for reinforcement — light on new content." },
    { value:"assessment", label:"Assessment", desc:"Graded checkpoints; results feed dashboards and at-risk detection." },
    { value:"resource",   label:"Resource",   desc:"A reference library of materials with no required progression." },
    { value:"hybrid",     label:"Hybrid",     desc:"Mixes lessons, practice, and graded items in one space." },
  ];
  const ACCESS_TYPES = [
    { value:"class_assigned", label:"Class Assigned", desc:"Visible only to the classes and teachers you assign below." },
    { value:"tenant_wide",    label:"Tenant Wide",    desc:"Visible to every class in your tenant — no assignment needed." },
    { value:"public_store",   label:"Public Store",   desc:"Listed on the public store after you publish (set pricing later)." },
  ];

  /* ---- tenant-scoped mock options (tenant_subhang / SUB001) ---- */
  const CLASS_OPTIONS = [
    { id:"cls_7b", label:"Grade 7B", meta:"28 students" },
    { id:"cls_8a", label:"Grade 8A", meta:"31 students" },
    { id:"cls_9c", label:"Grade 9C", meta:"26 students" },
    { id:"cls_10a",label:"Grade 10A", meta:"30 students" },
    { id:"cls_11b",label:"Grade 11B", meta:"24 students" },
  ];
  const TEACHER_OPTIONS = [
    { id:"tch_self", name:"Tara Sen (you)", initials:"TS", meta:"Owner" },
    { id:"tch_rao",  name:"Anil Rao",       initials:"AR", meta:"Mathematics" },
    { id:"tch_iyer", name:"Meera Iyer",     initials:"MI", meta:"Science" },
    { id:"tch_dey",  name:"Sandeep Dey",    initials:"SD", meta:"Mathematics" },
  ];
  const SESSION_OPTIONS = [
    { value:"as_2526", label:"2025–26 (active)" },
    { value:"as_2425", label:"2024–25" },
    { value:"as_2324", label:"2023–24" },
  ];

  /* ---- parent /spaces screen, dimmed behind the modal ---- */
  const BG_SPACES = [
    { title:"Algebra Foundations", description:"Linear equations, factoring, and graphing for Grade 9.", points:12, progress:64, spark:false },
    { title:"Organic Chemistry Lab", description:"Reaction mechanisms and named reactions practice set.", points:8, progress:38, spark:false },
    { title:"World History — Modern Era", description:"From industrialisation to the post-war order.", points:15, progress:81, spark:true },
  ];

  function SidebarNav(){
    const items = [
      { icon:"layout-dashboard", label:"Dashboard" },
      { icon:"graduation-cap",   label:"Spaces", active:true },
      { icon:"users",            label:"Students" },
      { icon:"file-check-2",     label:"Exams" },
      { icon:"bar-chart-3",      label:"Analytics" },
      { icon:"settings",         label:"Settings" },
    ];
    return (
      <aside className="appshell__sidebar" aria-hidden="true">
        <div className="sidebar__brand">
          <div className="sidebar__brand-mark">L</div>
          <div className="sidebar__brand-name">LevelUp</div>
        </div>
        <nav className="sidebar__nav">
          <div className="sidebar__section-label">Teach</div>
          {items.map((it,i)=>(
            <a key={i} className="nav-item" href="#" aria-current={it.active?"page":undefined} tabIndex={-1}>
              <Icon name={it.icon} size={18} /><span>{it.label}</span>
            </a>
          ))}
        </nav>
      </aside>
    );
  }

  function Topbar(){
    return (
      <header className="appshell__topbar" aria-hidden="true">
        <div className="tb-tenant">
          <Avatar initials="SA" size="sm" />
          <div>Subhang Academy</div>
          <span className="tb-tenant__code">SUB001</span>
          <Icon name="chevron-down" size={14} />
        </div>
        <div className="tb-search">
          <Icon name="search" size={16} />
          <input className="input" placeholder="Search students, exams, spaces…" tabIndex={-1} readOnly />
          <span className="tb-kbd"><Kbd>⌘</Kbd><Kbd>K</Kbd></span>
        </div>
        <div className="topbar__spacer" />
        <button className="tb-icon" tabIndex={-1} aria-label="Notifications"><Icon name="bell" size={18} /></button>
        <Avatar initials="TS" size="sm" />
      </header>
    );
  }

  function BackdropSpaces(){
    return (
      <div className="shell appshell bg-screen">
        <SidebarNav/>
        <Topbar/>
        <main className="appshell__main">
          <div style={{maxWidth:"1200px"}}>
            <Breadcrumb items={[{label:"Spaces"}]} />
            <div className="page-head" style={{marginTop:"var(--space-3)"}}>
              <div>
                <h1>Spaces</h1>
                <div className="page-sub">Build and assign learning &amp; assessment spaces.</div>
              </div>
              <Button variant="spark" leadingIcon={<Icon name="plus" size={16} />} tabIndex={-1}>New space</Button>
            </div>
            <div className="space-grid">
              {BG_SPACES.map((s,i)=>(
                <SpaceCard key={i} title={s.title} description={s.description} points={s.points} progress={s.progress} spark={s.spark} />
              ))}
            </div>
          </div>
        </main>
      </div>
    );
  }

  /* ---- EntityPicker: Combobox-driven multi-select (classes -> chips, teachers -> avatars) ---- */
  function EntityPicker({ kind, options, selected, onToggle, loading, error, onRetry, empty }){
    const [open,setOpen]=useState(false);
    const [q,setQ]=useState("");
    const ref=useRef(null);
    useEffect(()=>{
      if(!open) return;
      const onDoc=(e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
      document.addEventListener("mousedown",onDoc);
      return ()=>document.removeEventListener("mousedown",onDoc);
    },[open]);

    const sel = options.filter(o=>selected.includes(o.id ?? o.value));
    const filtered = options.filter(o=>{
      const name = (o.label || o.name || "").toLowerCase();
      return name.includes(q.toLowerCase());
    });

    return (
      <div className="picker" ref={ref}>
        {error ? (
          <Alert variant="error" title={"Couldn’t load " + kind + "."}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"var(--space-4)",width:"100%"}}>
              <span>Your other selections are kept — you can still create the space.</span>
              <Button variant="ghost" size="sm" leadingIcon={<Icon name="refresh-cw" size={14} />} onClick={onRetry}>Retry</Button>
            </div>
          </Alert>
        ) : (
        <>
          {/* selected chips / avatars */}
          {kind==="classes" && sel.length>0 && (
            <div className="lbl-tags">
              {sel.map(o=>(
                <span key={o.id} className="chip chip--brand" style={{display:"inline-flex",alignItems:"center",gap:"4px"}}>
                  {o.label}
                  <button aria-label={"Remove " + o.label} onClick={()=>onToggle(o.id)} className="chip__remove">
                    <Icon name="x" size={12} />
                  </button>
                </span>
              ))}
            </div>
          )}
          {kind==="teachers" && sel.length>0 && (
            <div style={{display:"flex",alignItems:"center",gap:"var(--space-3)",flexWrap:"wrap"}}>
              <AvatarGroup>
                {sel.map(o=><Avatar key={o.id} initials={o.initials} size="sm" />)}
              </AvatarGroup>
              <div style={{display:"flex",gap:"var(--space-2)",flexWrap:"wrap"}}>
                {sel.map(o=>(
                  <span key={o.id} className="teacher-tag">
                    {o.name}
                    {o.id!=="tch_self" && (
                      <button aria-label={"Remove " + o.name} onClick={()=>onToggle(o.id)}><Icon name="x" size={12} /></button>
                    )}
                  </span>
                ))}
              </div>
            </div>
          )}

          {/* combobox input */}
          <div className="picker__field" onClick={()=>setOpen(true)}>
            <Icon name={kind==="classes" ? "school" : "user-plus"} size={16} />
            <input className="picker__input"
              placeholder={kind==="classes" ? "Search classes…" : "Search teachers…"}
              aria-label={kind==="classes" ? "Search and add classes" : "Search and add teachers"}
              value={q} onChange={(e)=>{ setQ(e.target.value); setOpen(true); }}
              onFocus={()=>setOpen(true)} />
            <Icon name="chevron-down" size={16} />
          </div>

          {open && (
            <div className="picker__menu" role="listbox" aria-multiselectable="true">
              {loading && Array.from({length:4}).map((_,i)=>(
                <div className="picker__sk" key={i}>
                  {kind==="teachers" && <Skeleton variant="circle" width="20px" height="20px" />}
                  <Skeleton variant="text" width={i%2?"58%":"72%"} />
                </div>
              ))}
              {!loading && empty && (
                <div style={{padding:"var(--space-2)"}}>
                  <EmptyState icon="inbox"
                    title={kind==="classes" ? "No classes yet" : "Only you are assigned"}
                    body={kind==="classes"
                      ? "Create one in Roster, or choose Tenant Wide access."
                      : "You’re the implicit owner; add teachers once they’re on your classes."} />
                </div>
              )}
              {!loading && !empty && filtered.length===0 && (
                <div className="picker__opt" aria-disabled="true">No matches for “{q}”.</div>
              )}
              {!loading && !empty && filtered.map(o=>{
                const id=o.id ?? o.value;
                const on=selected.includes(id);
                const locked = kind==="teachers" && id==="tch_self";
                return (
                  <button key={id} role="option" aria-selected={on}
                    className="picker__opt"
                    onClick={()=>{ if(!locked) onToggle(id); }}
                    aria-disabled={locked}>
                    {kind==="teachers" && <Avatar initials={o.initials} size="sm" />}
                    <span>{o.label || o.name}</span>
                    <span className="picker__opt-meta">{o.meta}</span>
                    {on && <span className="check"><Icon name="check" size={15} /></span>}
                  </button>
                );
              })}
            </div>
          )}
        </>
        )}
      </div>
    );
  }

  /* ======================================================================= */
  function App(){
    // prototype state: default | loading | error | denied  (drives picker async + create failure + permission gate)
    const [proto,setProto]=useState("default");
    const denied = proto==="denied";

    const [title,setTitle]=useState("Trigonometry — Term 2");
    const [titleTouched,setTitleTouched]=useState(false);
    const [type,setType]=useState("learning");
    const [subject,setSubject]=useState("Mathematics");
    const [desc,setDesc]=useState("");
    const [access,setAccess]=useState("class_assigned");
    const [classes,setClasses]=useState(["cls_8a","cls_9c"]);
    const [teachers,setTeachers]=useState(["tch_self"]);
    const [session,setSession]=useState("as_2526");
    const [labelInput,setLabelInput]=useState("");
    const [labels,setLabels]=useState(["trigonometry","term-2"]);
    const [saving,setSaving]=useState(false);
    const [createErr,setCreateErr]=useState(false);
    const [toast,setToast]=useState(false);
    const [closed,setClosed]=useState(false);
    const [discard,setDiscard]=useState(false);
    const titleRef=useRef(null);

    const DESC_MAX=600;
    const pickerLoading = proto==="loading";
    const pickerError = proto==="error";
    const showCreateErr = createErr;

    // sync the "create failed" demo state with the proto switch
    useEffect(()=>{ setCreateErr(false); },[proto]);

    const typeMeta = SPACE_TYPES.find(t=>t.value===type);
    const accessMeta = ACCESS_TYPES.find(a=>a.value===access);
    const titleEmpty = !title.trim();
    const titleError = titleTouched && titleEmpty;
    const overLimit = desc.length>DESC_MAX;
    const canSubmit = !titleEmpty && !overLimit && !saving;

    const dirty = title!=="" || subject!=="" || desc!=="" || labels.length>0 || classes.length>0;

    function commitLabel(raw){
      const t=raw.trim().replace(/,$/,"").trim();
      if(t && !labels.includes(t)) setLabels(l=>[...l,t]);
      setLabelInput("");
    }
    function onLabelKey(e){
      if(e.key==="Enter" || e.key===","){ e.preventDefault(); commitLabel(labelInput); }
      else if(e.key==="Backspace" && labelInput==="" && labels.length){ setLabels(l=>l.slice(0,-1)); }
    }

    function toggle(setter, list, id){
      setter(list.includes(id) ? list.filter(x=>x!==id) : [...list,id]);
    }

    function submit(){
      setTitleTouched(true);
      if(titleEmpty){ titleRef.current && titleRef.current.focus(); return; }
      setSaving(true);
      setCreateErr(false);
      // simulate saveSpace (id omitted => create). proto==="error" rejects.
      setTimeout(()=>{
        setSaving(false);
        if(proto==="error"){
          // roll back optimistic nav, reopen with values preserved, surface inline error
          setCreateErr(true);
          titleRef.current && titleRef.current.focus();
        } else {
          setClosed(true);   // optimistic close + route to /spaces/:id/edit
          setToast(true);
        }
      },900);
    }

    function attemptClose(){ if(dirty) setDiscard(true); else setClosed(true); }

    useEffect(()=>{
      if(!toast) return;
      const t=setTimeout(()=>setToast(false),5200);
      return ()=>clearTimeout(t);
    },[toast]);

    // global keys: Esc dismiss (guarded), Cmd/Ctrl+Enter submit
    useEffect(()=>{
      const onKey=(e)=>{
        if(closed) return;
        if(denied){ if(e.key==="Escape") setClosed(true); return; }
        if(e.key==="Escape"){ if(discard){ setDiscard(false); } else attemptClose(); }
        if((e.metaKey||e.ctrlKey) && e.key==="Enter"){ e.preventDefault(); if(canSubmit) submit(); }
      };
      document.addEventListener("keydown",onKey);
      return ()=>document.removeEventListener("keydown",onKey);
    });

    const classesEmpty = false; // toggle in EmptyState demo via picker if needed

    return (
      <div className="shell appshell">
        {/* prototype state switcher */}
        <div className="proto-bar" role="group" aria-label="Preview state">
          <span className="proto-bar__lab">State</span>
          <div className="segmented">
            {[["default","Default"],["loading","Pickers loading"],["error","Create failed"],["denied","No permission"]].map(([v,l])=>(
              <button key={v} aria-pressed={proto===v} onClick={()=>{ setProto(v); setClosed(false); }}>{l}</button>
            ))}
          </div>
        </div>

        <BackdropSpaces/>

        {/* permission-gated: deep-linked to /spaces/new without create permission */}
        {!closed && denied && (
          <div className="scrim" onMouseDown={(e)=>{ if(e.target===e.currentTarget) setClosed(true); }}>
            <div className="dialog" style={{width:"440px"}} role="alertdialog" aria-modal="true"
                 aria-labelledby="pg-title" onMouseDown={(e)=>e.stopPropagation()}>
              <div className="dlg-head">
                <div className="dlg-head__txt">
                  <h2 className="dlg-title" id="pg-title">Create a new space</h2>
                </div>
                <IconButton size="sm" label="Close" icon={<Icon name="x" size={18} />} onClick={()=>setClosed(true)} />
              </div>
              <div className="dlg-sep" />
              <div className="dlg-body">
                <Alert variant="error" title="You don’t have permission to create spaces.">
                  Ask a tenant admin to grant the create permission, or to set one up for you.
                </Alert>
              </div>
              <div className="dlg-foot" style={{justifyContent:"flex-end"}}>
                <Button variant="secondary" onClick={()=>setClosed(true)}>Cancel</Button>
              </div>
            </div>
          </div>
        )}

        {!closed && !denied && (
          <div className="scrim" onMouseDown={(e)=>{ if(e.target===e.currentTarget) attemptClose(); }}>
            <div className="dialog" role="dialog" aria-modal="true"
                 aria-labelledby="cs-title" aria-describedby="cs-sub"
                 onMouseDown={(e)=>e.stopPropagation()}>
              {/* header */}
              <div className="dlg-head">
                <div className="dlg-head__txt">
                  <h2 className="dlg-title" id="cs-title">Create a new space</h2>
                  <div className="dlg-sub" id="cs-sub">Name it and pick where it lives — you can refine everything else in the editor.</div>
                </div>
                <IconButton size="sm" label="Close" icon={<Icon name="x" size={18} />} onClick={attemptClose} />
              </div>
              <div className="dlg-sep" />

              {/* body */}
              <div className="dlg-body">
                {showCreateErr && (
                  <Alert variant="error" title="Couldn’t create the space.">
                    Your details are saved here — try again. (saveSpace rejected; navigation rolled back.)
                  </Alert>
                )}

                {/* Title (required) */}
                <div className="fld">
                  <label className="fld__lab" htmlFor="cs-title-in">
                    Title <span className="fld__req" aria-hidden="true">*</span>
                    <span className="u-sr-only">(required)</span>
                  </label>
                  <Input id="cs-title-in" ref={titleRef} value={title}
                    placeholder="e.g. Algebra I — Semester 1"
                    error={titleError}
                    aria-invalid={titleError || undefined}
                    aria-describedby={titleError ? "cs-title-err" : "cs-title-help"}
                    onChange={(e)=>setTitle(e.target.value)}
                    onBlur={()=>setTitleTouched(true)}
                    onKeyDown={(e)=>{ if(e.key==="Enter"){ e.preventDefault(); if(canSubmit) submit(); } }} />
                  {titleError
                    ? <div className="fld__err" id="cs-title-err" aria-live="polite"><Icon name="alert-circle" size={13} /> Give your space a title to continue.</div>
                    : <div className="fld__help" id="cs-title-help">Shown on cards and dashboards.</div>}
                </div>

                {/* Type + Subject grid */}
                <div className="grid-2">
                  <div className="fld">
                    <label className="fld__lab" htmlFor="cs-type">Type</label>
                    <Select id="cs-type" value={type} onChange={(e)=>setType(e.target.value)}
                      options={SPACE_TYPES.map(t=>({value:t.value,label:t.label}))} />
                    <div className="fld__help" key={type} aria-live="polite">{typeMeta.desc}</div>
                  </div>
                  <div className="fld">
                    <label className="fld__lab" htmlFor="cs-subject">
                      Subject <span className="fld__opt">(optional)</span>
                    </label>
                    <Input id="cs-subject" value={subject} placeholder="e.g. Mathematics"
                      onChange={(e)=>setSubject(e.target.value)} />
                    <div className="fld__help">Used for filtering and analytics grouping.</div>
                  </div>
                </div>

                {/* Description */}
                <div className="fld">
                  <label className="fld__lab" htmlFor="cs-desc">
                    Description <span className="fld__opt">(optional)</span>
                  </label>
                  <Textarea id="cs-desc" rows={3} value={desc}
                    placeholder="Briefly describe what students will learn or do here."
                    error={overLimit}
                    aria-describedby="cs-desc-count"
                    onChange={(e)=>setDesc(e.target.value)} />
                  <div className={"counter" + (overLimit ? " counter--over" : "")} id="cs-desc-count" aria-live="polite">
                    {desc.length}/{DESC_MAX}
                  </div>
                </div>

                {/* Access */}
                <div className="fld">
                  <label className="fld__lab" htmlFor="cs-access">Access</label>
                  <Select id="cs-access" value={access} onChange={(e)=>setAccess(e.target.value)}
                    options={ACCESS_TYPES.map(a=>({value:a.value,label:a.label}))} />
                  <div className="fld__help" key={access} aria-live="polite">{accessMeta.desc}</div>

                  {access==="class_assigned" && (
                    <div className="access-block">
                      <div className="fld">
                        <span className="fld__lab"><Icon name="school" size={14} /> Classes</span>
                        <EntityPicker kind="classes" options={CLASS_OPTIONS}
                          selected={classes} loading={pickerLoading} error={pickerError}
                          onRetry={()=>setProto("default")}
                          onToggle={(id)=>toggle(setClasses,classes,id)} />
                      </div>
                      <div className="fld">
                        <span className="fld__lab"><Icon name="users" size={14} /> Teachers</span>
                        <EntityPicker kind="teachers" options={TEACHER_OPTIONS}
                          selected={teachers} loading={pickerLoading} error={pickerError}
                          onRetry={()=>setProto("default")}
                          onToggle={(id)=>toggle(setTeachers,teachers,id)} />
                        <div className="fld__help">You’re the implicit owner even if no other teacher is added.</div>
                      </div>
                    </div>
                  )}
                </div>

                {/* Labels */}
                <div className="fld">
                  <label className="fld__lab" htmlFor="cs-labels">
                    Labels <span className="fld__opt">(optional)</span>
                  </label>
                  {labels.length>0 && (
                    <div className="lbl-tags">
                      {labels.map((l,i)=>(
                        <span key={i} className="chip" style={{display:"inline-flex",alignItems:"center",gap:"4px"}}>
                          {l}
                          <button aria-label={"Remove " + l} className="chip__remove"
                            onClick={()=>setLabels(arr=>arr.filter((_,j)=>j!==i))}>
                            <Icon name="x" size={12} />
                          </button>
                        </span>
                      ))}
                    </div>
                  )}
                  <Input id="cs-labels" value={labelInput}
                    placeholder="e.g. algebra, semester-1, honors"
                    onChange={(e)=>setLabelInput(e.target.value)}
                    onKeyDown={onLabelKey}
                    onBlur={()=>{ if(labelInput.trim()) commitLabel(labelInput); }} />
                  <div className="fld__help">Press comma or Enter to add a label.</div>
                </div>

                {/* Academic session */}
                <div className="fld">
                  <label className="fld__lab" htmlFor="cs-session">Academic session</label>
                  <Select id="cs-session" value={session} onChange={(e)=>setSession(e.target.value)}
                    options={SESSION_OPTIONS} />
                  <div className="fld__help">Defaults to your active session.</div>
                </div>
              </div>

              {/* footer */}
              <div className="dlg-foot">
                <span className="dlg-foot__note">You can change all of this later.</span>
                <div className="dlg-foot__actions">
                  <Button variant="secondary" onClick={attemptClose} disabled={saving}>Cancel</Button>
                  <Button variant="spark" onClick={submit} loading={saving} disabled={!canSubmit}
                    leadingIcon={saving ? undefined : <Icon name="arrow-right" size={16} />}>
                    {saving ? "Creating…" : "Create space"}
                  </Button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* discard confirm (guards dirty close) */}
        {discard && (
          <div className="scrim" style={{paddingTop:"var(--space-20)"}} onMouseDown={(e)=>{ if(e.target===e.currentTarget) setDiscard(false); }}>
            <div className="dialog" style={{width:"420px"}} role="alertdialog" aria-modal="true" aria-labelledby="dc-t">
              <div className="dlg-head">
                <div className="dlg-head__txt">
                  <h2 className="dlg-title" id="dc-t">Discard this new space?</h2>
                  <div className="dlg-sub">You’ve started filling this in. Closing now won’t save anything.</div>
                </div>
              </div>
              <div className="dlg-foot" style={{justifyContent:"flex-end",borderTop:"none"}}>
                <Button variant="secondary" onClick={()=>setDiscard(false)}>Keep editing</Button>
                <Button variant="danger" onClick={()=>{ setDiscard(false); setClosed(true); }}>Discard</Button>
              </div>
            </div>
          </div>
        )}

        {/* reopen affordance once optimistically closed (success path) */}
        {closed && !toast && (
          <div className="scrim" style={{background:"transparent",pointerEvents:"none"}}>
            <div style={{pointerEvents:"auto",alignSelf:"center",textAlign:"center",background:"var(--bg-surface)",border:"1px solid var(--border-subtle)",borderRadius:"var(--radius-lg)",boxShadow:"var(--shadow-e2)",padding:"var(--space-6)"}}>
              <div style={{color:"var(--text-secondary)",fontSize:"var(--text-sm)",marginBottom:"var(--space-3)"}}>
                Dialog closed → routed to <span style={{fontFamily:"var(--font-mono)"}}>/spaces/:id/edit</span>
              </div>
              <Button variant="secondary" leadingIcon={<Icon name="rotate-ccw" size={15} />} onClick={()=>setClosed(false)}>Reopen modal</Button>
            </div>
          </div>
        )}

        {/* success toast (spark-tinted) */}
        {toast && (
          <div className="toast-stack">
            <div className="toast-card" role="status">
              <span className="toast-card__icon"><Icon name="sparkles" size={18} /></span>
              <span className="toast-card__txt">Space created — let’s add some story points.</span>
            </div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
