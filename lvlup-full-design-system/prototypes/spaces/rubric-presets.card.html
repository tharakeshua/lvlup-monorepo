/* ================= row overflow menu ================= */
function RowMenu({ p, role, onAction, onClose }){
  const ref = useRef(null);
  useEffect(()=>{
    const onDoc=(e)=>{ if(ref.current && !ref.current.contains(e.target)) onClose(); };
    const onKey=(e)=>{ if(e.key==="Escape") onClose(); };
    document.addEventListener("mousedown",onDoc); document.addEventListener("keydown",onKey);
    return ()=>{ document.removeEventListener("mousedown",onDoc); document.removeEventListener("keydown",onKey); };
  },[onClose]);
  const canDelete = !p.isDefault && (p.owned || role==="tenantAdmin");
  return (
    <div className="menu" role="menu" ref={ref} aria-label={"Actions for "+p.name}>
      <button role="menuitem" className="menu__item" onClick={()=>{onClose();onAction("preview",p);}}>
        <Icon name="eye" size={15} /> Preview rubric
      </button>
      <button role="menuitem" className="menu__item" onClick={()=>{onClose();onAction("apply",p);}}>
        <Icon name="copy-plus" size={15} /> Apply (clone)…
      </button>
      <div className="menu__sep" />
      {p.isDefault ? (
        <button role="menuitem" className="menu__item" onClick={()=>{onClose();onAction("duplicate",p);}}>
          <Icon name="copy" size={15} /> Duplicate to tenant
        </button>
      ) : (
        <button role="menuitem" className="menu__item" disabled={!p.owned && role!=="tenantAdmin"}
          onClick={()=>{ if(p.owned||role==="tenantAdmin"){onClose();onAction("edit",p);} }}>
          <Icon name="pencil" size={15} /> Edit
        </button>
      )}
      <button role="menuitem" className="menu__item" onClick={()=>{onClose();onAction("duplicate",p);}}>
        <Icon name="copy" size={15} /> Duplicate
      </button>
      <div className="menu__sep" />
      <button role="menuitem" className="menu__item menu__item--danger" disabled={!canDelete}
        onClick={()=>{ if(canDelete){onClose();onAction("delete",p);} }}>
        <Icon name="trash-2" size={15} /> Delete
      </button>
      {p.isDefault && <div className="menu__reason">System defaults are platform-seeded and read-only here.</div>}
      {!p.isDefault && !p.owned && role!=="tenantAdmin" &&
        <div className="menu__reason">Only the author ({p.author}) or an admin can edit or delete.</div>}
    </div>
  );
}

/* ================= count cell text ================= */
function countText(p){
  if(p.countKind==="holistic") return "—";
  return p.count + " " + (p.countKind==="dim" ? "dim" : "crit");
}

/* ================= create/edit sheet ================= */
function EditSheet({ initial, onClose, onSaved }){
  const isNew = !initial.id;
  const isDup = initial._dup;
  const [name,setName] = useState(initial.name||"");
  const [desc,setDesc] = useState(initial.desc||"");
  const [cat,setCat] = useState(initial.category||"essay");
  const [mode,setMode] = useState(initial.mode||"criteria_based");
  const [qtypes,setQtypes] = useState(initial.qtypes||["essay"]);
  const [holistic,setHolistic] = useState(initial.holistic||"Award full credit for a thorough, well-reasoned response that addresses every part of the prompt.");
  const [pass,setPass] = useState(initial.pass!=null?initial.pass:60);
  const [modelAns,setModelAns] = useState("");
  const seedCrit = (initial.rubric&&initial.rubric.length) ? initial.rubric.map(c=>({label:c.label,max:c.max})) : [{label:"Accuracy",max:10},{label:"Clarity",max:10}];
  const [crit,setCrit] = useState(seedCrit);
  const [touched,setTouched] = useState(false);
  const [saving,setSaving] = useState(false);
  const [save,setSave] = useState(initial.id?"saved":"dirty");
  const [tab,setTab] = useState(0); // 0 metadata, 1 rubric

  const closeBtn = useRef(null);
  useEffect(()=>{ closeBtn.current && closeBtn.current.focus(); },[]);
  useEffect(()=>{
    const onKey=(e)=>{ if(e.key==="Escape" && !saving) onClose(); };
    document.addEventListener("keydown",onKey); return ()=>document.removeEventListener("keydown",onKey);
  },[onClose,saving]);

  const markDirty=()=>{ setSave("dirty"); };
  const nameErr = touched && !name.trim();
  const critErr = touched && (mode==="criteria_based"||mode==="hybrid") && crit.filter(c=>c.label.trim()).length===0;
  const passErr = touched && (pass<0||pass>100);

  const totalMax = crit.reduce((s,c)=>s+(Number(c.max)||0),0);

  const usesCriteria = mode==="criteria_based"||mode==="hybrid";
  const usesDimension = mode==="dimension_based";
  const usesHolistic = mode==="holistic"||mode==="hybrid";

  const addCrit=()=>{ setCrit([...crit,{label:"",max:10}]); markDirty(); };
  const setCritAt=(i,k,v)=>{ const n=[...crit]; n[i]={...n[i],[k]:v}; setCrit(n); markDirty(); };
  const delCrit=(i)=>{ setCrit(crit.filter((_,j)=>j!==i)); markDirty(); };

  const submit=()=>{
    setTouched(true);
    if(!name.trim()) return;
    if(usesCriteria && crit.filter(c=>c.label.trim()).length===0) { setTab(1); return; }
    if(pass<0||pass>100) return;
    setSaving(true); setSave("saving");
    setTimeout(()=>{
      setSaving(false); setSave("saved");
      onSaved({
        id: initial.id || ("rp_"+Math.random().toString(16).slice(2,6)),
        created: isNew||isDup,
        name: name.trim(),
        category: cat,
        mode,
        countKind: usesDimension?"dim":(usesHolistic&&!usesCriteria?"holistic":"crit"),
        count: usesHolistic&&!usesCriteria?0:crit.filter(c=>c.label.trim()).length,
      });
    }, 900);
  };

  const SaveChip=()=>{
    const map = {saved:["saved","check","Saved just now"],saving:["saving","loader","Saving…"],dirty:["dirty","circle-dot","Unsaved changes"],failed:["failed","alert-triangle","Save failed — retry"]};
    const [cls,icon,txt]=map[save];
    return <span className={"savepill "+cls}><Icon name={icon} size={13} />{txt}</span>;
  };

  return (
    <>
      <div className="scrim" onClick={()=>!saving && onClose()} />
      <aside className="sheet" role="dialog" aria-modal="true" aria-label={isNew?"New rubric preset":"Edit rubric preset"}>
        <div className="sheet__head">
          <div>
            <h2 className="sheet__title">{isNew?"New preset":(isDup?"Duplicate to tenant":"Edit preset")}</h2>
            <div className="sheet__sub">{isDup?"Creates a mutable tenant copy authored by you.":"Reusable across spaces, story points, items & exams."}</div>
          </div>
          <div className="sheet__x">
            <IconButton ref={closeBtn} icon={<Icon name="x" size={18} />} label="Close" onClick={()=>!saving&&onClose()} />
          </div>
        </div>

        <div style={{padding:"0 var(--space-5)",borderBottom:"1px solid var(--border-subtle)"}}>
          <div style={{display:"flex",gap:"var(--space-1)"}}>
            {["Metadata","Rubric"].map((t,i)=>(
              <button key={t} onClick={()=>setTab(i)}
                style={{padding:"var(--space-3) var(--space-2)",border:"none",background:"none",cursor:"pointer",
                  fontFamily:"var(--font-ui)",fontSize:"var(--text-sm)",fontWeight:"var(--weight-semibold)",
                  color: tab===i?"var(--brand-primary)":"var(--text-secondary)",
                  borderBottom: tab===i?"2px solid var(--brand-primary)":"2px solid transparent"}}>
                {t}{i===1 && critErr ? " ⚠" : ""}
              </button>
            ))}
          </div>
        </div>

        <div className="sheet__body">
          {saving && <div className="overlay" style={{position:"absolute",inset:0,zIndex:5,display:"grid",placeItems:"center",background:"rgba(20,18,28,.06)"}}><span className="spinner" /></div>}

          {tab===0 && (
            <>
              <div className="fld">
                <label className="fld__lab" htmlFor="rp-name">Name <span className="req">*</span></label>
                <input id="rp-name" className="input" value={name} placeholder="e.g. Essay — IELTS Band"
                  aria-invalid={nameErr||undefined}
                  onChange={(e)=>{setName(e.target.value);markDirty();}} style={nameErr?{borderColor:"var(--status-error)"}:null} />
                {nameErr && <div className="fld__err"><Icon name="alert-circle" size={13} /> Name is required.</div>}
              </div>

              <div className="grid-2">
                <div className="fld">
                  <label className="fld__lab" htmlFor="rp-cat">Category</label>
                  <Select id="rp-cat" value={cat} onChange={(e)=>{setCat(e.target.value);markDirty();}}
                    options={CATEGORIES.filter(c=>c.value!=="all")} />
                </div>
                <div className="fld">
                  <label className="fld__lab" htmlFor="rp-pass">Passing % <span className="fld__opt">(0–100)</span></label>
                  <input id="rp-pass" type="number" className="input crit__max" value={pass} min={0} max={100}
                    style={passErr?{borderColor:"var(--status-error)"}:null}
                    onChange={(e)=>{setPass(Number(e.target.value));markDirty();}} />
                  {passErr && <div className="fld__err"><Icon name="alert-circle" size={13} /> Passing percentage must be 0–100.</div>}
                </div>
              </div>

              <div className="fld">
                <label className="fld__lab" htmlFor="rp-desc">Description <span className="fld__opt">optional</span></label>
                <textarea id="rp-desc" className="textarea" rows={2} value={desc} placeholder="When should graders reach for this rubric?"
                  onChange={(e)=>{setDesc(e.target.value);markDirty();}} />
              </div>

              <div className="fld">
                <span className="fld__lab">Applicable question types</span>
                <div className="qt-wrap">
                  {QTYPES.map(qt=>(
                    <button key={qt} className="qt" aria-pressed={qtypes.includes(qt)}
                      onClick={()=>{ setQtypes(qtypes.includes(qt)?qtypes.filter(x=>x!==qt):[...qtypes,qt]); markDirty(); }}>
                      {qt.replace(/_/g," ")}
                    </button>
                  ))}
                </div>
              </div>
            </>
          )}

          {tab===1 && (
            <>
              <div className="fld">
                <span className="fld__lab">Scoring mode</span>
                <div className="modeseg" role="radiogroup" aria-label="Scoring mode">
                  {Object.keys(MODE).map(k=>(
                    <button key={k} className="modeopt" role="radio" aria-checked={mode===k} aria-pressed={mode===k}
                      onClick={()=>{setMode(k);markDirty();}}>
                      <span className="modeopt__t"><Icon name={MODE[k].icon} size={13} />{MODE[k].label}</span>
                    </button>
                  ))}
                </div>
                <div className="fld__help">Only the active mode's fields persist — criteria for Criteria/Hybrid, dimensions for Dimension, holistic guidance for Holistic/Hybrid.</div>
              </div>

              {usesCriteria && (
                <div className="critgrp">
                  <span className="fld__lab">Criteria</span>
                  {crit.map((c,i)=>(
                    <div className="crit" key={i}>
                      <input className="input" value={c.label} placeholder={"Criterion "+(i+1)} aria-label={"Criterion "+(i+1)+" label"}
                        onChange={(e)=>setCritAt(i,"label",e.target.value)} />
                      <input className="input crit__max" type="number" value={c.max} min={0} aria-label={"Criterion "+(i+1)+" max points"}
                        onChange={(e)=>setCritAt(i,"max",Number(e.target.value))} />
                      <button className="crit__del" aria-label={"Remove criterion "+(i+1)} onClick={()=>delCrit(i)}><Icon name="x" size={16} /></button>
                    </div>
                  ))}
                  {critErr && <div className="fld__err"><Icon name="alert-circle" size={13} /> Add at least one criterion.</div>}
                  <div style={{display:"flex",alignItems:"center",gap:"var(--space-3)"}}>
                    <Button variant="ghost" size="sm" leadingIcon={<Icon name="plus" size={14} />} onClick={addCrit}>Add criterion</Button>
                    <div className="crit__total" style={{marginLeft:"auto"}}>Total: {totalMax} pts</div>
                  </div>
                </div>
              )}

              {usesDimension && (
                <div className="critgrp">
                  <span className="fld__lab">Dimensions</span>
                  {crit.map((c,i)=>(
                    <div className="crit" key={i}>
                      <input className="input" value={c.label} placeholder={"Dimension "+(i+1)} aria-label={"Dimension "+(i+1)+" label"}
                        onChange={(e)=>setCritAt(i,"label",e.target.value)} />
                      <input className="input crit__max" type="number" value={c.max} min={0} aria-label={"Dimension "+(i+1)+" max band"}
                        onChange={(e)=>setCritAt(i,"max",Number(e.target.value))} />
                      <button className="crit__del" aria-label={"Remove dimension "+(i+1)} onClick={()=>delCrit(i)}><Icon name="x" size={16} /></button>
                    </div>
                  ))}
                  <div style={{display:"flex"}}>
                    <Button variant="ghost" size="sm" leadingIcon={<Icon name="plus" size={14} />} onClick={addCrit}>Add dimension</Button>
                  </div>
                </div>
              )}

              {usesHolistic && (
                <div className="fld">
                  <label className="fld__lab" htmlFor="rp-hol">Holistic guidance</label>
                  <textarea id="rp-hol" className="textarea" rows={3} value={holistic}
                    onChange={(e)=>{setHolistic(e.target.value);markDirty();}} />
                </div>
              )}

              <div className="fld">
                <label className="fld__lab" htmlFor="rp-model">Reference answer <span className="fld__opt">(staff-only)</span></label>
                <textarea id="rp-model" className="textarea" rows={2} value={modelAns} placeholder="Optional model response for graders — never shown to students."
                  onChange={(e)=>{setModelAns(e.target.value);markDirty();}} />
                <div className="fld__help">Presets are staff-only and never reach a student, so no answer-key stripping applies here.</div>
              </div>
            </>
          )}
        </div>

        <div className="sheet__foot">
          <SaveChip />
          <div className="spacer" />
          <Button variant="ghost" onClick={()=>!saving&&onClose()}>Cancel</Button>
          <Button variant="spark" loading={saving} leadingIcon={!saving?<Icon name="check" size={16} />:null} onClick={submit}>
            {isNew||isDup?"Create preset":"Save changes"}
          </Button>
        </div>
      </aside>
    </>
  );
}

/* ================= confirm delete ================= */
function ConfirmDelete({ p, onCancel, onConfirm }){
  const ref=useRef(null);
  useEffect(()=>{ ref.current && ref.current.focus();
    const onKey=(e)=>{ if(e.key==="Escape") onCancel(); };
    document.addEventListener("keydown",onKey); return ()=>document.removeEventListener("keydown",onKey);
  },[onCancel]);
  return (
    <div className="cd-scrim" onClick={(e)=>{ if(e.target.classList.contains("cd-scrim")) onCancel(); }}>
      <div className="cd" role="alertdialog" aria-modal="true" aria-labelledby="cd-t" aria-describedby="cd-b">
        <div className="cd__icon"><Icon name="trash-2" size={20} /></div>
        <h3 className="cd__title" id="cd-t">Delete “{p.name}”?</h3>
        <p className="cd__body" id="cd-b">This preset is used by <b style={{fontFamily:"var(--font-mono)"}}>{p.usage}</b> items. Deleting it won't change existing rubrics — they keep their copied criteria — but it can no longer be applied to new content.</p>
        <div className="cd__foot">
          <Button ref={ref} variant="ghost" onClick={onCancel}>Keep it</Button>
          <Button variant="danger" onClick={()=>onConfirm(p)}>Delete preset</Button>
        </div>
      </div>
    </div>
  );
}

/* ================= main screen ================= */
function Screen(){
  const [proto,setProto] = useState("default"); // default | loading | empty | error | partial
  const [role,setRole] = useState("teacher");   // teacher | tenantAdmin
  const [rows,setRows] = useState(SEED);
  const [q,setQ] = useState("");
  const [cat,setCat] = useState("all");
  const [sortKey,setSortKey] = useState("updated");
  const [sortDir,setSortDir] = useState("desc");
  const [menuFor,setMenuFor] = useState(null);
  const [editFor,setEditFor] = useState(null);
  const [previewFor,setPreviewFor] = useState(null);
  const [confirmFor,setConfirmFor] = useState(null);
  const [flashId,setFlashId] = useState(null);
  const [toasts,setToasts] = useState([]);

  const pushToast=(kind,msg,undo)=>{
    const id=Math.random().toString(16).slice(2);
    setToasts(t=>[...t,{id,kind,msg,undo}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), undo?6000:3200);
  };

  const sortBy=(k)=>{ if(sortKey===k){ setSortDir(d=>d==="asc"?"desc":"asc"); } else { setSortKey(k); setSortDir(k==="name"?"asc":"desc"); } };

  const filtered = useMemo(()=>{
    let r = rows.filter(p=>
      (cat==="all"||p.category===cat) &&
      (!q.trim()||p.name.toLowerCase().includes(q.trim().toLowerCase()))
    );
    r=[...r].sort((a,b)=>{
      let av,bv;
      if(sortKey==="name"){av=a.name.toLowerCase();bv=b.name.toLowerCase();}
      else if(sortKey==="usage"){av=a.usage||0;bv=b.usage||0;}
      else {av=a.updated;bv=b.updated;}
      const c = av<bv?-1:av>bv?1:0;
      return sortDir==="asc"?c:-c;
    });
    return r;
  },[rows,q,cat,sortKey,sortDir]);

  const onAction=(act,p)=>{
    if(act==="edit") setEditFor(p);
    else if(act==="preview") setPreviewFor(p);
    else if(act==="duplicate") setEditFor({...p, id:null, name:p.name+" (copy)", _dup:true, qtypes:["essay"]});
    else if(act==="apply") { pushToast("ok","Applied “"+p.name+"” — opening editor to override…"); }
    else if(act==="delete") setConfirmFor(p);
  };

  const onSaved=(res)=>{
    setEditFor(null);
    setRows(rs=>{
      const idx=rs.findIndex(x=>x.id===res.id);
      if(idx<0){
        return [{...SEED[1], ...res, code:"rp_"+res.id.slice(-4), updated:"Jun 20, 2026", isDefault:false, owned:true, author:"You", usage:0, rubric:SEED[1].rubric}, ...rs];
      }
      const n=[...rs]; n[idx]={...n[idx], ...res, updated:"Jun 20, 2026"}; return n;
    });
    setFlashId(res.id);
    setTimeout(()=>setFlashId(null),700);
    pushToast("ok","Preset saved.");
  };

  const onConfirmDelete=(p)=>{
    setConfirmFor(null);
    setRows(rs=>rs.filter(x=>x.id!==p.id));
    pushToast("ok","Deleted “"+p.name+"”.", ()=>{ setRows(rs=>[p,...rs]); });
  };

  const SortableTh=({k,label,num})=>(
    <th className={num?"num":""} aria-sort={sortKey===k?(sortDir==="asc"?"ascending":"descending"):"none"}>
      <button className={"th-sort"+(sortKey===k?" on":"")} onClick={()=>sortBy(k)}>
        {label}<Icon name={sortKey===k?(sortDir==="asc"?"arrow-up":"arrow-down"):"chevrons-up-down"} size={13} />
      </button>
    </th>
  );

  const isEmpty = proto==="empty";
  const systemDefaults = SEED.filter(p=>p.isDefault);

  return (
    <div className="shell appshell">
      <div className="proto-bar" role="group" aria-label="Prototype state">
        <span className="proto-bar__lab">State</span>
        <div className="proto-seg">
          {[["default","Default"],["loading","Loading"],["partial","Partial"],["empty","Empty"],["error","Error"]].map(([v,l])=>(
            <button key={v} aria-pressed={proto===v} onClick={()=>setProto(v)}>{l}</button>
          ))}
        </div>
        <span className="proto-bar__lab" style={{paddingLeft:"var(--space-2)"}}>Role</span>
        <div className="proto-seg">
          {[["teacher","teacher"],["tenantAdmin","admin"]].map(([v,l])=>(
            <button key={v} aria-pressed={role===v} onClick={()=>setRole(v)}>{l}</button>
          ))}
        </div>
      </div>

      <SidebarNav/>
      <Topbar/>

      <main className="appshell__main">
        <div className="rp-main">
          <div className="rp-crumb">
            <Breadcrumb items={[{label:"Library",href:"#"},{label:"Rubric Presets"}]} />
          </div>

          <div className="rp-scroll">
            <div className="rp-col">
              {/* header */}
              <div className="page-head">
                <div>
                  <h1>Rubric Presets</h1>
                  <div className="page-sub">Reusable grading templates for your tenant. Apply them to spaces, story points, items, and exams.</div>
                </div>
                <div className="head-actions">
                  <div className="rp-headsearch">
                    <Icon name="search" size={16} />
                    <input className="input" placeholder="Search presets…" aria-label="Search presets"
                      value={q} onChange={(e)=>setQ(e.target.value)} />
                  </div>
                  <div className="rp-cat">
                    <Select aria-label="Category" value={cat} onChange={(e)=>setCat(e.target.value)} options={CATEGORIES} />
                  </div>
                  <Button variant="spark" leadingIcon={<Icon name="plus" size={16} />}
                    onClick={()=>setEditFor({id:null, name:"", category:"essay", mode:"criteria_based"})}>New preset</Button>
                </div>
              </div>

              {/* result count */}
              {proto==="default"||proto==="partial" ? (
                <div className="rp-count"><b>{filtered.length}</b> preset{filtered.length===1?"":"s"}{(q||cat!=="all")?" matching filters":""} · sorted by {sortKey} {sortDir==="asc"?"↑":"↓"}</div>
              ) : null}

              {/* ===== ERROR ===== */}
              {proto==="error" && (
                <div className="rp-panel"><div className="errwrap">
                  <div style={{maxWidth:440,textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:"var(--space-3)"}}>
                    <div className="cd__icon" style={{background:"var(--status-error-subtle)",color:"var(--status-error)"}}><Icon name="wifi-off" size={20} /></div>
                    <div style={{fontFamily:"var(--font-display)",fontSize:"var(--text-lg)",fontWeight:"var(--weight-semibold)"}}>Couldn't load rubric presets</div>
                    <div style={{fontSize:"var(--text-sm)",color:"var(--text-secondary)"}}>Check your connection and try again.</div>
                    <Button variant="secondary" leadingIcon={<Icon name="rotate-ccw" size={15} />}
                      onClick={()=>{ setProto("default"); pushToast("ok","Presets loaded."); }}>Retry</Button>
                  </div>
                </div></div>
              )}

              {/* ===== LOADING ===== */}
              {proto==="loading" && (
                <div className="rp-panel">
                  <table className="rpt" aria-hidden="true">
                    <thead><tr>
                      <th>Name</th><th>Scoring mode</th><th className="num">Criteria</th><th>Category</th><th className="num">Usage</th><th>Updated</th><th></th>
                    </tr></thead>
                    <tbody>
                      {Array.from({length:6}).map((_,i)=>(
                        <tr key={i}>
                          <td><div className="cell-name"><span className="sk" style={{width:28,height:28,borderRadius:"var(--radius-md)"}} /><span className="sk" style={{width:160}} /></div></td>
                          <td><span className="sk" style={{width:80,height:20,borderRadius:"var(--radius-pill)"}} /></td>
                          <td className="num"><span className="sk" style={{width:48}} /></td>
                          <td><span className="sk" style={{width:70,height:20,borderRadius:"var(--radius-pill)"}} /></td>
                          <td className="num"><span className="sk" style={{width:30}} /></td>
                          <td><span className="sk" style={{width:80}} /></td>
                          <td><span className="sk" style={{width:20,height:20}} /></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {/* ===== EMPTY ===== */}
              {isEmpty && (
                <div className="rp-panel" style={{padding:"var(--space-12) var(--space-6)"}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center"}}>
                    <div className="cell-name__icon" style={{width:48,height:48}}><Icon name="clipboard-list" size={24} /></div>
                    <h2 style={{fontFamily:"var(--font-display)",fontSize:"var(--text-xl)",fontWeight:"var(--weight-semibold)",margin:"var(--space-4) 0 var(--space-2)"}}>No presets yet</h2>
                    <p style={{fontSize:"var(--text-sm)",color:"var(--text-secondary)",maxWidth:480,lineHeight:"var(--leading-sm)",margin:0}}>
                      Build a rubric once and reuse it everywhere. Presets seed the rubric your spaces, story points, and exams inherit — author it here, override it locally when you need to.
                    </p>
                    <div style={{marginTop:"var(--space-4)"}}>
                      <Button variant="spark" leadingIcon={<Icon name="plus" size={16} />}
                        onClick={()=>setEditFor({id:null,name:"",category:"essay",mode:"criteria_based"})}>Create your first preset</Button>
                    </div>
                    <div className="sys-list">
                      <div className="sys-list__lab">Start from a system default</div>
                      {systemDefaults.map(p=>(
                        <div className="sys-row" key={p.id}>
                          <span className="sys-lock"><Icon name="lock" size={12} /> System default</span>
                          <span className="sys-row__name">{p.name}</span>
                          <ScoringModeBadge mode={p.mode} />
                          <Button variant="ghost" size="sm" onClick={()=>setEditFor({...p,id:null,name:p.name+" (copy)",_dup:true,qtypes:["essay"]})}>Duplicate</Button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* ===== DEFAULT / PARTIAL TABLE ===== */}
              {(proto==="default"||proto==="partial") && (
                <div className="rp-panel">
                  <table className="rpt">
                    <thead><tr>
                      <SortableTh k="name" label="Name" />
                      <th>Scoring mode</th>
                      <th className="num">Criteria</th>
                      <th>Category</th>
                      <SortableTh k="usage" label="Usage" num />
                      <SortableTh k="updated" label="Updated" />
                      <th><span className="sr-only">Actions</span></th>
                    </tr></thead>
                    <tbody>
                      {filtered.length===0 ? (
                        <tr><td colSpan={7} style={{textAlign:"center",padding:"var(--space-8)",color:"var(--text-muted)",fontSize:"var(--text-sm)"}}>
                          No presets match “{q}”.
                        </td></tr>
                      ) : filtered.map(p=>(
                        <tr key={p.id} className={flashId===p.id?"flash":""}>
                          <td>
                            <div className="cell-name">
                              <span className="cell-name__icon"><Icon name={MODE[p.mode].icon} size={15} /></span>
                              <div>
                                <div className="cell-name__t">{p.name}</div>
                                <div className="cell-name__sub">{p.code}{p.isDefault?" · system":" · by "+p.author}</div>
                              </div>
                            </div>
                          </td>
                          <td><ScoringModeBadge mode={p.mode} /></td>
                          <td className="cell-num">{countText(p)}</td>
                          <td><span className="cat-chip"><Icon name="tag" size={12} />{CAT_LABEL[p.category]}</span></td>
                          <td>
                            {p.isDefault ? (
                              <span className="sys-lock" title="System default, read-only" aria-label="System default, read-only"><Icon name="lock" size={12} /> System default</span>
                            ) : (proto==="partial" && (p.id==="rp_sys_holistic")) ? (
                              <span className="usage-skel" aria-label="Usage count aggregating" title="Aggregating…" />
                            ) : (
                              <span className="cell-usage" title={"Used by "+p.usage+" spaces / story points / items / exams (inherited or applied)."}>{p.usage}</span>
                            )}
                          </td>
                          <td className="cell-updated">{p.updated}</td>
                          <td className="cell-actions">
                            <IconButton size="sm" icon={<Icon name="more-horizontal" size={16} />} label={"Actions for "+p.name}
                              onClick={()=>setMenuFor(menuFor===p.id?null:p.id)} />
                            {menuFor===p.id && <RowMenu p={p} role={role} onAction={onAction} onClose={()=>setMenuFor(null)} />}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {/* pagination */}
              {(proto==="default"||proto==="partial") && filtered.length>0 && (
                <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:"var(--space-2)",fontSize:"var(--text-xs)",color:"var(--text-muted)"}}>
                  <span style={{fontFamily:"var(--font-mono)"}}>1–{filtered.length} of {filtered.length}</span>
                  <IconButton size="sm" icon={<Icon name="chevron-left" size={15} />} label="Previous page" disabled />
                  <span style={{fontFamily:"var(--font-mono)",padding:"0 var(--space-1)"}}>1</span>
                  <IconButton size="sm" icon={<Icon name="chevron-right" size={15} />} label="Next page" disabled />
                </div>
              )}
            </div>
          </div>
        </div>
      </main>

      {/* overlays */}
      {editFor && <EditSheet initial={editFor} onClose={()=>setEditFor(null)} onSaved={onSaved} />}
      {previewFor && <PreviewSheet p={previewFor} onClose={()=>setPreviewFor(null)} onApply={(p)=>{ setPreviewFor(null); onAction("apply",p); }} />}
      {confirmFor && <ConfirmDelete p={confirmFor} onCancel={()=>setConfirmFor(null)} onConfirm={onConfirmDelete} />}

      {/* toasts */}
      <div className="toaststack">
        {toasts.map(t=>(
          <div key={t.id} className={"tt "+t.kind}>
            <span className="tt__icon"><Icon name={t.kind==="ok"?"check":"alert-triangle"} size={14} /></span>
            <span className="tt__body">{t.msg}</span>
            {t.undo && <button className="tt__undo" onClick={()=>{ t.undo(); setToasts(ts=>ts.filter(x=>x.id!==t.id)); }}>Undo</button>}
          </div>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Screen/>);
</script>
</body>
</html>
