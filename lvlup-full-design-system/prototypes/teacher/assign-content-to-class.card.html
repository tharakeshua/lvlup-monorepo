<!-- @dsCard group="Teacher" viewport="1280x820" name="Assign Content to Class" subtitle="Route a space/exam to classes · the bridge write surface" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}
  .page{display:flex;flex-direction:column;gap:var(--space-8);max-width:var(--content-max);width:100%;margin:0 auto}
  .page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-6)}
  .page-head h1{font-family:var(--font-display);font-size:var(--text-4xl);line-height:var(--leading-4xl);font-weight:var(--weight-semibold);margin:0;color:var(--text-primary);letter-spacing:var(--tracking-display)}
  .page-sub{margin-top:var(--space-2);color:var(--text-secondary);font-size:var(--text-base);line-height:var(--leading-base)}
  .page-sub .u-mono{color:var(--text-muted)}
  .num,.u-mono{font-family:var(--font-mono)}
  .u-caption{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em}

  /* assign flow: stepper column + sticky review aside */
  .assign-grid{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:var(--space-8);align-items:start}
  .step{position:relative;padding:var(--space-5) var(--space-6);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);background:var(--bg-surface)}
  .step__head{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-2)}
  .step__idx{flex:none;width:28px;height:28px;border-radius:var(--radius-pill);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:var(--text-xs);font-weight:var(--weight-semibold);background:var(--brand-subtle);color:var(--brand-primary)}
  .step__idx--done{background:var(--status-success-subtle);color:var(--status-success)}
  .step__title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);margin:0}
  .step__helper{color:var(--text-secondary);font-size:var(--text-sm);margin:0}
  .step__opt{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;margin-left:var(--space-2)}

  .picker-facets{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;margin-bottom:var(--space-4)}
  .picker-search{flex:1 1 220px;min-width:180px}
  .picker-list{display:flex;flex-direction:column;border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden}
  .picker-row{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-4);background:var(--bg-surface);border:none;border-bottom:1px solid var(--border-subtle);width:100%;text-align:left;cursor:pointer;font:inherit;color:inherit}
  .picker-row:last-child{border-bottom:none}
  .picker-row:hover{background:var(--bg-surface-sunken)}
  .picker-row[aria-selected="true"]{background:var(--brand-subtle)}
  .picker-row[aria-disabled="true"]{opacity:.55;cursor:not-allowed}
  .picker-row .radio-dot{flex:none;width:18px;height:18px;border-radius:var(--radius-pill);border:2px solid var(--border-strong);display:flex;align-items:center;justify-content:center}
  .picker-row[aria-selected="true"] .radio-dot{border-color:var(--brand-primary)}
  .picker-row[aria-selected="true"] .radio-dot::after{content:"";width:8px;height:8px;border-radius:var(--radius-pill);background:var(--brand-primary)}
  .picker-main{display:flex;flex-direction:column;gap:4px;min-width:0;flex:1}
  .picker-main strong{font-size:var(--text-sm);font-weight:var(--weight-medium)}
  .picker-meta{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}

  .selected-summary{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);background:var(--brand-subtle);border:1px solid var(--brand-muted);border-radius:var(--radius-md);margin-top:var(--space-4)}
  .selected-summary .ico{flex:none;width:32px;height:32px;border-radius:var(--radius-md);background:var(--bg-surface);display:flex;align-items:center;justify-content:center;color:var(--brand-primary)}

  .class-combo{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;padding:var(--space-2) var(--space-3);border:1px solid var(--border-strong);border-radius:var(--radius-md);background:var(--bg-surface);min-height:44px}
  .combo-grow{flex:1;min-width:120px;border:none;outline:none;background:none;font:inherit;color:var(--text-primary);padding:var(--space-1)}
  .roster-line{display:flex;align-items:center;gap:var(--space-2);margin-top:var(--space-3);color:var(--text-muted);font-size:var(--text-sm)}

  .sched-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4) var(--space-5)}
  .sched-grid .col-span{grid-column:1 / -1}
  .vis-options{display:flex;flex-direction:column;gap:var(--space-3)}
  .vis-opt{display:flex;gap:var(--space-3);align-items:flex-start;padding:var(--space-3) var(--space-4);border:1px solid var(--border-subtle);border-radius:var(--radius-md);cursor:pointer}
  .vis-opt--on{border-color:var(--brand-primary);background:var(--brand-subtle)}
  .vis-opt__body strong{display:flex;align-items:center;font-size:var(--text-sm);font-weight:var(--weight-medium)}
  .vis-opt__body span.desc{display:block;font-size:var(--text-xs);color:var(--text-secondary);margin-top:2px}

  .review-aside{position:sticky;top:var(--space-2);display:flex;flex-direction:column;gap:var(--space-4)}
  .review-card{padding:var(--space-5) var(--space-6)}
  .review-card h3{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);margin:0 0 var(--space-4)}
  .whosee{display:flex;align-items:baseline;gap:var(--space-2);padding:var(--space-4);background:var(--bg-surface-sunken);border-radius:var(--radius-md);margin:var(--space-4) 0}
  .whosee .big{font-family:var(--font-mono);font-size:var(--text-3xl);font-weight:var(--weight-semibold);color:var(--text-primary);line-height:1}
  .footer-bar{display:flex;align-items:center;gap:var(--space-3);justify-content:flex-end;padding-top:var(--space-4);border-top:1px solid var(--border-subtle);flex-wrap:wrap}
  .footer-bar .kbdhint{margin-right:auto;color:var(--text-muted);font-size:var(--text-xs);display:flex;align-items:center;gap:var(--space-2)}

  .states-grid{display:flex;flex-wrap:wrap;gap:var(--space-6)}
  .state-mini{flex:1 1 280px;min-width:260px;display:flex;flex-direction:column;gap:var(--space-3)}
  .state-mini .card,.state-mini .empty,.state-mini .alert{margin:0}
  .skl-rows{display:flex;flex-direction:column;gap:var(--space-4)}
  .skl-row{display:flex;align-items:center;gap:var(--space-4)}
  .deflist-inline dt{color:var(--text-muted);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.05em;margin-top:var(--space-3)}
  .deflist-inline dd{margin:2px 0 0;font-size:var(--text-sm);color:var(--text-primary)}
  .deflist-inline dd:first-of-type{margin-top:0}
</style>
</head><body><div id="root"></div>
<script type="text/babel">
const { Icon, Button, IconButton, Input, Select, Field,
  Card, Section, Drawer, Modal,
  DataTable, EmptyState, Skeleton, Avatar, Badge, Chip,
  Alert, NavItem, AnswerKeyLock } = window.LvlupV0DesignSystem_5d0725;
const { useState } = React;

function Shell(props){
  return (
    <div className="appshell" style={{height:'100vh', position:'relative'}}>
      <aside className="appshell__sidebar">
        <div className="sidebar__brand"><div className="sidebar__brand-mark">L</div><div className="sidebar__brand-name">Lyceum</div></div>
        <nav className="sidebar__nav" aria-label="Primary">
          <div className="sidebar__section-label">Overview</div>
          <NavItem icon="layout-dashboard" href="/" active={props.active==='dashboard'}>Dashboard</NavItem>
          <div className="sidebar__section-label">People</div>
          <NavItem icon="book-open" href="/classes" active={props.active==='classes'}>Classes</NavItem>
          <NavItem icon="users" href="/students" active={props.active==='students'}>Students</NavItem>
          <div className="sidebar__section-label">Content</div>
          <NavItem icon="share-2" href="/assign" active={props.active==='assign'}>Assign content</NavItem>
          <NavItem icon="clipboard-list" href="/assignments" active={props.active==='assignments'}>Assignments</NavItem>
          <div className="sidebar__section-label">Analytics</div>
          <NavItem icon="bar-chart-3" href="/analytics/classes" active={props.active==='analytics-classes'}>Class analytics</NavItem>
          <NavItem icon="file-bar-chart-2" href="/analytics/exams" active={props.active==='analytics-exams'}>Exam analytics</NavItem>
          <NavItem icon="orbit" href="/analytics/spaces" active={props.active==='analytics-spaces'}>Space analytics</NavItem>
          <NavItem icon="flask-conical" href="/analytics/tests" active={props.active==='analytics-tests'}>Test analytics</NavItem>
          <NavItem icon="alert-triangle" href="/analytics/at-risk" active={props.active==='analytics-at-risk'} badge={<Badge variant="error">4</Badge>}>At-risk</NavItem>
          <div className="sidebar__section-label">System</div>
          <NavItem icon="file-text" href="/exams" active={props.active==='exams'}>Exams</NavItem>
          <NavItem icon="megaphone" href="/announcements" active={props.active==='announcements'}>Announcements</NavItem>
          <NavItem icon="bell" href="/notifications" active={props.active==='notifications'}>Notifications</NavItem>
          <NavItem icon="settings" href="/settings" active={props.active==='settings'}>Settings</NavItem>
        </nav>
      </aside>
      <header className="appshell__topbar">
        <button className="chip" aria-haspopup="menu"><Avatar initials="SA" size="sm"/>Subhang Academy<Icon name="chevron-down" size={14}/></button>
        <div className="topbar__search"><button className="input" style={{display:'flex',alignItems:'center',justifyContent:'space-between',color:'var(--text-muted)',textAlign:'left'}}><span>Search classes, students, exams…</span><span className="kbd">Cmd K</span></button></div>
        <div className="topbar__spacer"></div>
        <IconButton icon={<Icon name="bell" size={20}/>} label="Notifications"/>
        <IconButton icon={<Icon name="sun" size={20}/>} label="Toggle theme"/>
        <Avatar initials="TS"/>
      </header>
      <main className="appshell__main" id="main">{props.children}</main>
    </div>
  );
}

const CONTENT = [
  { id:'sp_alg', kind:'space', title:'Algebra Basics', type:'Practice', status:'Published', statusVar:'success' },
  { id:'ex_u3',  kind:'exam',  title:'Unit 3 Exam — Quadratics', type:'Assessment', status:'Published', statusVar:'success' },
  { id:'sp_geo', kind:'space', title:'Coordinate Geometry', type:'Learning', status:'Published', statusVar:'success' },
  { id:'ex_mid', kind:'exam',  title:'Mid-Term Diagnostic', type:'Assessment', status:'Scheduled', statusVar:'info' },
  { id:'sp_drf', kind:'space', title:'Trigonometry Drills', type:'Practice', status:'Draft', statusVar:'warning', disabled:true, reason:'Publish in Spaces before assigning.' },
];

function KindBadge({kind}){
  return kind==='exam'
    ? <Badge variant="brand" icon={<Icon name="file-text" size={12}/>}>Exam</Badge>
    : <Badge variant="info" icon={<Icon name="orbit" size={12}/>}>Space</Badge>;
}
function StatusBadge({status,variant}){
  const ic = status==='Published' ? 'check-circle-2' : status==='Scheduled' ? 'clock' : 'pencil';
  return <Badge variant={variant} icon={<Icon name={ic} size={12}/>}>{status}</Badge>;
}

function App(){
  const [open, setOpen] = useState(true);
  const [picked, setPicked] = useState('ex_u3');
  const [classes, setClasses] = useState([
    { id:'c10a', label:'Class 10-A', students:32 },
    { id:'c10b', label:'Class 10-B', students:29 },
  ]);
  const [visibility, setVisibility] = useState('class_assigned');
  const [confirm, setConfirm] = useState(false);

  const selected = CONTENT.find(c=>c.id===picked);
  const totalStudents = classes.reduce((n,c)=>n+c.students,0);
  const broadening = visibility==='tenant_wide';

  function tryAssign(){
    if(broadening) setConfirm(true);
    else setOpen(false);
  }

  function onKey(e){
    if((e.metaKey||e.ctrlKey) && e.key==='Enter'){ e.preventDefault(); if(selected&&classes.length) tryAssign(); }
  }

  return (
    <Shell active="assign">
      <div className="page">
        <div className="page-head">
          <div>
            <h1>Assign content</h1>
            <p className="page-sub">Route a published space or exam to one or more classes — set access, an optional window, and visibility. <span className="u-mono">Server-authoritative · last synced 2 min ago</span></p>
          </div>
          <Button variant="spark" leadingIcon={<Icon name="share-2" size={16}/>} onClick={()=>setOpen(true)}>New assignment</Button>
        </div>

        <Section title="Recent assignments" actions={<Button variant="ghost" size="sm" trailingIcon={<Icon name="arrow-up-right" size={14}/>}>View all</Button>}>
          <Card style={{padding:0,overflow:'hidden'}}>
            <DataTable
              columns={[
                { label:'Content', key:'content', render:(r)=>(<div style={{display:'flex',alignItems:'center',gap:'var(--space-2)'}}><KindBadge kind={r.kind}/><span style={{fontWeight:'var(--weight-medium)',fontSize:'var(--text-sm)'}}>{r.title}</span></div>) },
                { label:'Classes', key:'classes', render:(r)=>(<span style={{display:'flex',gap:'var(--space-1)',flexWrap:'wrap'}}>{r.classes.map(c=><Chip key={c}>{c}</Chip>)}</span>) },
                { label:'Visibility', key:'vis', render:(r)=>(<span style={{fontSize:'var(--text-sm)'}}>{r.vis}</span>) },
                { label:'Window', key:'win', numeric:true, render:(r)=>(<span className="u-mono" style={{color:r.win==='Always'?'var(--text-muted)':'var(--text-primary)'}}>{r.win}</span>) },
                { label:'Assigned', key:'when', numeric:true, render:(r)=>(<span className="u-mono" style={{color:'var(--text-muted)'}}>{r.when}</span>) },
              ]}
              rows={[
                { kind:'space', title:'Coordinate Geometry', classes:['10-A','10-C'], vis:'Class-assigned', win:'Always', when:'2d ago' },
                { kind:'exam',  title:'Unit 2 Exam',          classes:['10-A','10-B'], vis:'Class-assigned', win:'Mar 14 – 16', when:'5d ago' },
                { kind:'space', title:'Number Theory Primer', classes:['All classes'], vis:'Tenant-wide', win:'Always', when:'1w ago' },
              ]}
            />
          </Card>
        </Section>

        <Section title="States">
          <div className="states-grid">
            <div className="state-mini">
              <span className="u-caption">Loading · list reads</span>
              <Card style={{padding:'var(--space-4)'}}>
                <div className="skl-rows">
                  {[0,1,2].map(i=>(
                    <div className="skl-row" key={i}>
                      <Skeleton variant="circle" width={18} height={18}/>
                      <div style={{flex:1,display:'flex',flexDirection:'column',gap:6}}>
                        <Skeleton variant="text" width="60%" height={12}/>
                        <Skeleton variant="text" width="38%" height={10}/>
                      </div>
                    </div>
                  ))}
                </div>
              </Card>
            </div>
            <div className="state-mini">
              <span className="u-caption">Empty · nothing to assign</span>
              <Card style={{padding:'var(--space-2)'}}>
                <EmptyState icon="inbox" title="Nothing to assign yet" body="Published spaces and exams show up here. Build one in Spaces or Exams first." action={<div style={{display:'flex',gap:'var(--space-2)'}}><Button variant="ghost" size="sm">Go to Spaces</Button><Button variant="ghost" size="sm">Go to Exams</Button></div>}/>
              </Card>
            </div>
            <div className="state-mini">
              <span className="u-caption">Empty · teacher, no classes</span>
              <Card style={{padding:'var(--space-2)'}}>
                <EmptyState icon="users" title="No managed classes" body="You don't manage any classes yet. Ask an admin to add you to a class."/>
              </Card>
            </div>
            <div className="state-mini">
              <span className="u-caption">Error · load failed</span>
              <Alert variant="error" title="Couldn't load spaces and exams">
                <div style={{display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
                  <span>The content list failed to load. Your changes weren't saved.</span>
                  <div><Button variant="secondary" size="sm" leadingIcon={<Icon name="rotate-ccw" size={14}/>}>Retry</Button></div>
                </div>
              </Alert>
            </div>
            <div className="state-mini">
              <span className="u-caption">Partial · no class selected</span>
              <Alert variant="info" title="Select at least one class to continue">
                Pick a target class in step 2 — Assign stays disabled until then.
              </Alert>
            </div>
            <div className="state-mini">
              <span className="u-caption">Permission · class skipped</span>
              <Alert variant="warning" title="1 class was skipped">
                Class 11-B is outside your managed classes and was excluded from this assignment.
              </Alert>
            </div>
            <div className="state-mini">
              <span className="u-caption">Admin only · tenant-wide</span>
              <Alert variant="warning" title="Tenant-wide visibility">
                Tenant-wide assignment makes this visible to every student in the organisation, not just your classes.
              </Alert>
            </div>
            <div className="state-mini">
              <span className="u-caption">Success · toast</span>
              <Card style={{padding:'var(--space-4)',display:'flex',alignItems:'center',gap:'var(--space-3)'}}>
                <Icon name="check-circle-2" size={18}/>
                <span style={{flex:1,fontSize:'var(--text-sm)'}}>Assigned <strong>“Unit 3 Exam”</strong> to <span className="u-mono">2</span> classes.</span>
                <Button variant="ghost" size="sm">Undo</Button>
              </Card>
            </div>
          </div>
        </Section>
      </div>

      {/* ── The assign flow lives in a right Drawer (opens at rest) ── */}
      <Drawer open={open} onClose={()=>setOpen(false)} side="right" title="Assign content">
        <div onKeyDown={onKey} style={{display:'flex',flexDirection:'column',gap:'var(--space-5)'}} role="region" aria-label="Assign content steps">
          <p className="step__helper" style={{marginTop:'calc(-1 * var(--space-2))'}}>Adding to <strong>Class 10-A</strong> · <span className="u-mono" style={{color:'var(--text-muted)'}}>tenant Subhang Academy</span></p>

          <div className="assign-grid">
            <div style={{display:'flex',flexDirection:'column',gap:'var(--space-5)'}}>

              {/* Step 1 — Content */}
              <div className="step" aria-current="step">
                <div className="step__head">
                  <span className="step__idx step__idx--done"><Icon name="check" size={14}/></span>
                  <h2 className="step__title">Content</h2>
                </div>
                <p className="step__helper" style={{marginBottom:'var(--space-4)'}}>Pick a published space or exam to assign. Author content in Spaces or Exams.</p>
                <div className="picker-facets">
                  <div style={{width:140}}>
                    <Select options={[{value:'all',label:'Type · All'},{value:'space',label:'Space'},{value:'exam',label:'Exam'}]} defaultValue="all" aria-label="Filter by type"/>
                  </div>
                  <div style={{width:150}}>
                    <Select options={[{value:'all',label:'Status · All'},{value:'published',label:'Published'},{value:'scheduled',label:'Scheduled'}]} defaultValue="all" aria-label="Filter by status"/>
                  </div>
                  <div className="picker-search"><Input placeholder="Search spaces and exams…" aria-label="Search spaces and exams"/></div>
                </div>
                <div className="picker-list" role="listbox" aria-label="Assignable content">
                  {CONTENT.map(c=>(
                    <button key={c.id} className="picker-row" role="option"
                      aria-selected={picked===c.id}
                      aria-disabled={c.disabled||undefined}
                      aria-label={c.title+' · '+c.kind+' · '+c.status}
                      onClick={()=>{ if(!c.disabled) setPicked(c.id); }}>
                      <span className="radio-dot" aria-hidden="true"></span>
                      <span className="picker-main">
                        <strong>{c.title}</strong>
                        <span className="picker-meta">
                          <KindBadge kind={c.kind}/>
                          <span className="u-caption" style={{textTransform:'none',color:'var(--text-secondary)'}}>{c.type}</span>
                          <StatusBadge status={c.status} variant={c.statusVar}/>
                          {c.disabled && <span style={{fontSize:'var(--text-2xs)',color:'var(--status-warning)'}}>{c.reason}</span>}
                        </span>
                      </span>
                    </button>
                  ))}
                </div>
                {selected && (
                  <div className="selected-summary">
                    <span className="ico"><Icon name={selected.kind==='exam'?'file-text':'orbit'} size={18}/></span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:'var(--weight-medium)',fontSize:'var(--text-sm)'}}>{selected.title}</div>
                      <div className="picker-meta"><KindBadge kind={selected.kind}/><StatusBadge status={selected.status} variant={selected.statusVar}/></div>
                    </div>
                    {selected.kind==='exam' && <Badge variant="info" icon={<Icon name="lock" size={12}/>}>Answer key protected</Badge>}
                  </div>
                )}
              </div>

              {/* Step 2 — Classes */}
              <div className="step">
                <div className="step__head">
                  <span className="step__idx">2</span>
                  <h2 className="step__title">Classes</h2>
                </div>
                <p className="step__helper" style={{marginBottom:'var(--space-4)'}}>Choose which class(es) get access.</p>
                <div className="class-combo" role="combobox" aria-expanded="false" aria-label="Select classes">
                  {classes.map(c=>(
                    <Chip key={c.id} removable onRemove={()=>setClasses(classes.filter(x=>x.id!==c.id))}>{c.label}</Chip>
                  ))}
                  <input className="combo-grow" placeholder={classes.length?'':'Select classes…'} aria-label="Add a class"/>
                </div>
                <div style={{display:'flex',gap:'var(--space-2)',marginTop:'var(--space-3)',flexWrap:'wrap'}}>
                  <Chip>10-A</Chip><Chip>10-B</Chip><Chip>10-C</Chip><Chip>11-A</Chip>
                  <Button variant="ghost" size="sm" leadingIcon={<Icon name="plus" size={14}/>}>New class</Button>
                </div>
                <div className="roster-line">
                  <Icon name="users" size={15}/>
                  <span><span className="u-mono" style={{color:'var(--text-primary)'}}>{totalStudents}</span> students across <span className="u-mono" style={{color:'var(--text-primary)'}}>{classes.length}</span> classes will be in scope.</span>
                </div>
              </div>

              {/* Step 3 — Schedule & visibility */}
              <div className="step">
                <div className="step__head">
                  <span className="step__idx">3</span>
                  <h2 className="step__title">Schedule &amp; visibility<span className="step__opt">optional</span></h2>
                </div>
                <p className="step__helper" style={{marginBottom:'var(--space-4)'}}>Optionally set when this becomes available and who can see it.</p>
                <div className="sched-grid">
                  <Field label="Available from">
                    <Input type="date" defaultValue="2026-06-22" aria-label="Available from"/>
                  </Field>
                  <Field label="Available until">
                    <Input type="date" aria-label="Available until"/>
                  </Field>
                  <div className="col-span">
                    <div className="field__label" style={{marginBottom:'var(--space-2)'}}>Visibility</div>
                    <div className="vis-options" role="radiogroup" aria-label="Visibility">
                      <label className={"vis-opt"+(visibility==='class_assigned'?' vis-opt--on':'')}>
                        <input type="radio" name="vis" checked={visibility==='class_assigned'} onChange={()=>setVisibility('class_assigned')}/>
                        <span className="vis-opt__body"><strong>Class-assigned</strong><span className="desc">only students in the selected classes</span></span>
                      </label>
                      <label className={"vis-opt"+(visibility==='tenant_wide'?' vis-opt--on':'')}>
                        <input type="radio" name="vis" checked={visibility==='tenant_wide'} onChange={()=>setVisibility('tenant_wide')}/>
                        <span className="vis-opt__body"><strong>Tenant-wide<span className="step__opt">admin</span></strong><span className="desc">every student in this organisation</span></span>
                      </label>
                    </div>
                    {broadening && (
                      <div style={{marginTop:'var(--space-3)'}} role="alert">
                        <Alert variant="warning" title="Tenant-wide visibility">
                          Tenant-wide assignment makes this visible to every student in the organisation, not just your classes.
                        </Alert>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>

            {/* Review aside */}
            <aside className="review-aside" aria-label="Review">
              <Card className="review-card">
                <h3>Review</h3>
                <dl className="deflist-inline">
                  <dt>Content</dt>
                  <dd>{selected ? selected.title : <span style={{color:'var(--text-muted)'}}>Not selected</span>}</dd>
                  <dt>Classes</dt>
                  <dd>{classes.length ? classes.map(c=>c.label).join(', ') : <span style={{color:'var(--text-muted)'}}>Select at least one</span>}</dd>
                  <dt>Availability</dt>
                  <dd className="u-mono">Jun 22 — always</dd>
                  <dt>Visibility</dt>
                  <dd>{broadening ? 'Tenant-wide' : 'Class-assigned'}</dd>
                </dl>
                <div className="whosee" aria-live="polite">
                  <span className="big">{broadening ? '410' : totalStudents}</span>
                  <span style={{color:'var(--text-secondary)',fontSize:'var(--text-sm)'}}>
                    students across <span className="u-mono" style={{color:'var(--text-primary)'}}>{broadening?'14':classes.length}</span> classes will gain access
                  </span>
                </div>
                <p className="step__helper" style={{fontSize:'var(--text-xs)'}}>Visibility follows <span className="u-mono">canAccessSpace</span> — students see this only where their class intersects the assignment.</p>
                {selected && selected.kind==='exam' && (
                  <div style={{marginTop:'var(--space-4)'}}>
                    <AnswerKeyLock title="Answer key protected">Assigning an exam never reveals or edits its answer key — it stays server-only.</AnswerKeyLock>
                  </div>
                )}
              </Card>

              <div className="footer-bar">
                <span className="kbdhint"><span className="kbd">Cmd</span><span className="kbd">↵</span></span>
                <Button variant="ghost" onClick={()=>setOpen(false)}>Cancel</Button>
                <Button variant="spark" leadingIcon={<Icon name="share-2" size={16}/>} disabled={!selected||!classes.length} onClick={tryAssign}>Assign</Button>
              </div>
            </aside>
          </div>
        </div>
      </Drawer>

      {/* ConfirmDialog — only for visibility-broadening (tenant-wide) */}
      <Modal open={confirm} onClose={()=>setConfirm(false)} title="Assign to all classes in this tenant?"
        footer={<><Button variant="ghost" onClick={()=>setConfirm(false)}>Cancel</Button><Button variant="spark" onClick={()=>{setConfirm(false);setOpen(false);}}>Assign tenant-wide</Button></>}>
        <p style={{margin:0,color:'var(--text-secondary)',fontSize:'var(--text-sm)',lineHeight:'var(--leading-base)'}}>
          Every student in <strong>Subhang Academy</strong> will be able to see <strong>{selected?selected.title:'this content'}</strong>. This broadens visibility beyond your classes.
        </p>
      </Modal>
    </Shell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
