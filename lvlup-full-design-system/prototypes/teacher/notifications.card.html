<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* screen-local layout only — Lyceum vars only, NO raw hex, NO :root redefinition */
body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}

.notif{max-width:var(--reading-max);margin:0 auto;display:flex;flex-direction:column;gap:var(--space-6)}

/* page header */
.pagehead{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap}
.pagehead h1{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-4xl);line-height:var(--leading-4xl);letter-spacing:-.02em;margin:0}
.pagehead__sub{font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-2)}
.pagehead__sub .u-mono{color:var(--text-muted)}

/* toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap;position:sticky;top:0;background:var(--bg-canvas);padding-bottom:var(--space-1);z-index:2}
.toolbar__type{min-width:200px}
.fpills{display:inline-flex;gap:var(--space-1);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:var(--space-1)}
.fpill{display:inline-flex;align-items:center;gap:var(--space-2);border:none;background:transparent;color:var(--text-secondary);font-family:var(--font-ui);font-size:var(--text-sm);font-weight:var(--weight-medium);padding:var(--space-2) var(--space-4);border-radius:var(--radius-pill);cursor:pointer;transition:background-color var(--dur-fast) var(--ease-standard)}
.fpill:hover{color:var(--text-primary)}
.fpill:focus-visible{outline:none;box-shadow:var(--ring-focus)}
.fpill--on{background:var(--bg-surface);color:var(--text-primary);box-shadow:var(--shadow-e1)}

/* feed card */
.feed{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden}
.feed__group{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);background:var(--bg-surface-sunken);padding:var(--space-2) var(--space-5);border-top:1px solid var(--border-subtle);position:sticky;top:0}
.feed__group:first-child{border-top:none}

/* arrival pill */
.arrival{display:flex;align-items:center;justify-content:center;gap:var(--space-2);width:100%;border:none;background:var(--status-info-subtle);color:var(--status-info);font-family:var(--font-ui);font-size:var(--text-xs);font-weight:var(--weight-medium);padding:var(--space-2) var(--space-4);cursor:pointer}
.arrival:focus-visible{outline:none;box-shadow:var(--ring-focus)}

/* notification row */
.nrow{display:flex;align-items:flex-start;gap:var(--space-3);width:100%;text-align:left;background:transparent;border:none;border-top:1px solid var(--border-subtle);padding:var(--space-3) var(--space-4) var(--space-3) var(--space-3);cursor:pointer;color:inherit;font-family:var(--font-ui);transition:background-color var(--dur-fast) var(--ease-standard)}
.nrow:hover{background:var(--bg-surface-sunken)}
.nrow:focus-visible{outline:none;box-shadow:var(--ring-focus)}
.nrow--unread{background:var(--bg-surface-sunken)}
.nrow__dotcol{flex:0 0 auto;width:10px;display:flex;justify-content:center;padding-top:14px}
.ndot{width:8px;height:8px;border-radius:var(--radius-pill);background:var(--text-muted)}
.ndot--warn{background:var(--status-warning)}
.ndot--err{background:var(--status-error)}
.ndot--info{background:var(--status-info)}
.ndot--ok{background:var(--status-success)}
.nrow__chip{flex:0 0 auto;width:32px;height:32px;border-radius:var(--radius-pill);display:grid;place-items:center;background:var(--bg-surface-sunken);color:var(--text-secondary)}
.nrow__chip--warn{background:var(--status-warning-subtle);color:var(--status-warning)}
.nrow__chip--err{background:var(--status-error-subtle);color:var(--status-error)}
.nrow__chip--info{background:var(--status-info-subtle);color:var(--status-info)}
.nrow__chip--ok{background:var(--status-success-subtle);color:var(--status-success)}
.nrow__main{flex:1 1 auto;min-width:0}
.nrow__title{font-size:var(--text-sm);color:var(--text-primary);line-height:var(--leading-sm)}
.nrow--read .nrow__title{font-weight:var(--weight-medium);color:var(--text-secondary)}
.nrow--unread .nrow__title{font-weight:var(--weight-semibold)}
.nrow__body{font-size:var(--text-xs);color:var(--text-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nrow__body .u-mono{font-family:var(--font-mono);color:var(--text-muted)}
.nrow__right{flex:0 0 auto;display:flex;align-items:center;gap:var(--space-1);padding-top:2px}
.nrow__time{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);white-space:nowrap}

/* feed footer */
.feed__foot{display:flex;align-items:center;justify-content:center;padding:var(--space-4)}
.feed__endcap{font-size:var(--text-xs);color:var(--text-muted);text-align:center;padding:var(--space-4)}

/* states rail */
.states{display:flex;flex-direction:column;gap:var(--space-4)}
.states__grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-4)}
.mini{border:1px dashed var(--border-subtle);border-radius:var(--radius-lg);padding:var(--space-4);background:var(--bg-surface)}
.u-caption{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:var(--space-3);display:block}
.sk-row{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) 0}

@media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head><body><div id="root"></div>
<script type="text/babel">
const { Icon, Button, IconButton, Select, Badge, EmptyState, Skeleton, Alert, Toast, Avatar, Section } = window.LvlupV0DesignSystem_5d0725;
const { useState, useEffect } = React;

/* ---- shared app shell ---- */
function Shell(props){
  return (
    <div className="appshell" style={{height:'100vh', position:'relative'}}>
      <aside className="appshell__sidebar">
        <div className="sidebar__brand"><div className="sidebar__brand-mark">L</div><div className="sidebar__brand-name">Lyceum</div></div>
        <nav className="sidebar__nav" aria-label="Primary">
          <div className="sidebar__section-label">Overview</div>
          <NavItem icon="layout-dashboard" href="/" active={props.active==='dashboard'}>Dashboard</NavItem>
          <div className="sidebar__section-label">People</div>
          <NavItem icon="book-open" href="/classes" active={props.active==='classes'}>Classes</NavItem>
          <NavItem icon="users" href="/students" active={props.active==='students'}>Students</NavItem>
          <div className="sidebar__section-label">Content</div>
          <NavItem icon="share-2" href="/assign" active={props.active==='assign'}>Assign content</NavItem>
          <NavItem icon="clipboard-list" href="/assignments" active={props.active==='assignments'}>Assignments</NavItem>
          <div className="sidebar__section-label">Analytics</div>
          <NavItem icon="bar-chart-3" href="/analytics/classes" active={props.active==='analytics-classes'}>Class analytics</NavItem>
          <NavItem icon="file-bar-chart-2" href="/analytics/exams" active={props.active==='analytics-exams'}>Exam analytics</NavItem>
          <NavItem icon="orbit" href="/analytics/spaces" active={props.active==='analytics-spaces'}>Space analytics</NavItem>
          <NavItem icon="flask-conical" href="/analytics/tests" active={props.active==='analytics-tests'}>Test analytics</NavItem>
          <NavItem icon="alert-triangle" href="/analytics/at-risk" active={props.active==='analytics-at-risk'} badge={<Badge variant="error">4</Badge>}>At-risk</NavItem>
          <div className="sidebar__section-label">System</div>
          <NavItem icon="file-text" href="/exams" active={props.active==='exams'}>Exams</NavItem>
          <NavItem icon="megaphone" href="/announcements" active={props.active==='announcements'}>Announcements</NavItem>
          <NavItem icon="bell" href="/notifications" active={props.active==='notifications'}>Notifications</NavItem>
          <NavItem icon="settings" href="/settings" active={props.active==='settings'}>Settings</NavItem>
        </nav>
      </aside>
      <header className="appshell__topbar">
        <button className="chip" aria-haspopup="menu"><Avatar initials="SA" size="sm"/>Subhang Academy<Icon name="chevron-down" size={14}/></button>
        <div className="topbar__search"><button className="input" style={{display:'flex',alignItems:'center',justifyContent:'space-between',color:'var(--text-muted)',textAlign:'left'}}><span>Search classes, students, exams…</span><span className="kbd">Cmd K</span></button></div>
        <div className="topbar__spacer"></div>
        <IconButton icon={<Icon name="bell" size={20}/>} label="Notifications"/>
        <IconButton icon={<Icon name="sun" size={20}/>} label="Toggle theme"/>
        <Avatar initials="TS"/>
      </header>
      <main className="appshell__main" id="main" role="main">{props.children}</main>
    </div>
  );
}
const NavItem = window.LvlupV0DesignSystem_5d0725.NavItem;

/* ---- notification type registry (icon + tone) ---- */
const TYPE = {
  student_at_risk:      {icon:'flag',            tone:'warn', label:'Student at risk',   url:'/analytics/at-risk'},
  submission_graded:    {icon:'check-circle-2',  tone:'ok',   label:'Submission graded', url:'/exams'},
  grading_complete:     {icon:'check-circle-2',  tone:'ok',   label:'Grading complete',  url:'/exams'},
  exam_results_released:{icon:'send',            tone:'info', label:'Results released',  url:'/exams'},
  new_exam_assigned:    {icon:'file-plus',       tone:'info', label:'New exam assigned', url:'/exams'},
  new_space_assigned:   {icon:'orbit',           tone:'info', label:'New space assigned',url:'/spaces'},
  space_published:      {icon:'book-open',       tone:'info', label:'Space published',   url:'/spaces'},
  deadline_reminder:    {icon:'clock',           tone:'warn', label:'Deadline reminder', url:'/assignments'},
  bulk_import_complete: {icon:'download',        tone:'ok',   label:'Import complete',   url:'/students'},
  ai_budget_alert:      {icon:'triangle-alert',  tone:'warn', label:'AI budget alert',   url:'/settings'},
  system_announcement:  {icon:'megaphone',       tone:'info', label:'Announcement',      url:'/announcements'},
};

const TYPE_OPTIONS = [
  {value:'all', label:'All types'},
  {value:'student_at_risk', label:'Student at risk'},
  {value:'submission_graded', label:'Submission graded'},
  {value:'grading_complete', label:'Grading complete'},
  {value:'exam_results_released', label:'Results released'},
  {value:'new_exam_assigned', label:'New exam assigned'},
  {value:'new_space_assigned', label:'New space assigned'},
  {value:'space_published', label:'Space published'},
  {value:'deadline_reminder', label:'Deadline reminder'},
  {value:'bulk_import_complete', label:'Import complete'},
  {value:'ai_budget_alert', label:'AI budget alert'},
  {value:'system_announcement', label:'Announcement'},
];

/* ---- sample feed (recipient-scoped, server-created, reverse-chron) ---- */
const SEED = [
  {id:'n1', type:'student_at_risk',      title:'Aarav Sharma flagged as at-risk', body:'2 reasons · Class 10-A · Tap to review', time:'6h ago', group:'Today', read:false},
  {id:'n2', type:'grading_complete',     title:'Grading complete: Midterm',        body:'28 of 28 submissions graded · Class 10-A', time:'9h ago', group:'Today', read:false},
  {id:'n3', type:'ai_budget_alert',      title:'AI usage at 80% of this month’s budget', body:'Class analytics generation · review usage', time:'11h ago', group:'Today', read:false},
  {id:'n4', type:'exam_results_released',title:'Results released: Unit Test 3',     body:'Visible to students now', time:'Yesterday', group:'Yesterday', read:true},
  {id:'n5', type:'submission_graded',    title:'Submission graded: Priya Menon',   body:'System Design · score 84%', time:'Yesterday', group:'Yesterday', read:true},
  {id:'n6', type:'deadline_reminder',    title:'Deadline approaching: Recursion Set', body:'Due in 2 days · Class 9-B', time:'Yesterday', group:'Yesterday', read:true},
  {id:'n7', type:'space_published',      title:'Space published: Linked Lists',    body:'12 story points · DSA track', time:'3 days ago', group:'Earlier', read:true},
  {id:'n8', type:'bulk_import_complete', title:'Student import complete',          body:'142 added · 3 skipped', time:'4 days ago', group:'Earlier', read:true},
  {id:'n9', type:'system_announcement',  title:'Platform maintenance window scheduled', body:'Sunday 02:00–04:00 IST', time:'6 days ago', group:'Earlier', read:true},
];

function NotifRow({n, onOpen}){
  const t = TYPE[n.type];
  const an = (n.read?'':'Unread: ')+n.title+', '+n.time;
  return (
    <button type="button" className={'nrow '+(n.read?'nrow--read':'nrow--unread')} aria-label={an} onClick={()=>onOpen(n)}>
      <span className="nrow__dotcol" aria-hidden="true">{!n.read && <span className={'ndot ndot--'+t.tone}/>}</span>
      <span className={'nrow__chip nrow__chip--'+t.tone} aria-hidden="true"><Icon name={t.icon} size={16}/></span>
      <span className="nrow__main">
        <span className="nrow__title">{n.title}</span>
        {n.body && <span className="nrow__body" dangerouslySetInnerHTML={{__html:n.body.replace(/(\d[\d,%]*|\d+ of \d+)/g,'<span class="u-mono">$1</span>')}}/>}
      </span>
      <span className="nrow__right">
        <span className="nrow__time">{n.time}</span>
        <span onClick={e=>e.stopPropagation()}>
          <IconButton icon={<Icon name="more-horizontal" size={16}/>} label={'Actions for '+n.title} size="sm"/>
        </span>
      </span>
    </button>
  );
}

function App(){
  const [items,setItems] = useState(SEED);
  const [filter,setFilter] = useState('all'); // all | unread
  const [type,setType] = useState('all');
  const [toast,setToast] = useState(null);
  const [showArrival,setShowArrival] = useState(true);

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  useEffect(()=>{ if(toast){ const id=setTimeout(()=>setToast(null),2600); return ()=>clearTimeout(id);} },[toast]);

  const unread = items.filter(n=>!n.read).length;
  const total = items.length;

  let view = items;
  if(filter==='unread') view = view.filter(n=>!n.read);
  if(type!=='all') view = view.filter(n=>n.type===type);

  const open = (n)=>{ // deep-link + optimistic mark-read
    if(!n.read) setItems(items.map(x=>x.id===n.id?{...x,read:true}:x));
  };
  const markAll = ()=>{ setItems(items.map(x=>({...x,read:true}))); setToast({variant:'success',title:'All notifications marked as read.'}); };

  const groups = ['Today','Yesterday','Earlier'];

  return (
    <Shell active="notifications">
      <div className="notif">

        {/* page header */}
        <div className="pagehead">
          <div>
            <h1>Notifications</h1>
            <p className="pagehead__sub" aria-live="polite">
              {unread>0
                ? <span><span className="u-mono">{unread}</span> unread · <span className="u-mono">{total}</span> total</span>
                : <span>You're all caught up · <span className="u-mono">{total}</span> total</span>}
              {' · '}
              <span title="Server-authoritative count from the RTDB unread mirror">Last updated <span className="u-mono">just now</span></span>
            </p>
          </div>
          <Button variant="spark" disabled={unread===0} onClick={markAll} title={unread===0?'No unread notifications':'Mark all read'} leadingIcon={<Icon name="check-check" size={16}/>}>Mark all read</Button>
        </div>

        {/* toolbar */}
        <div className="toolbar">
          <div className="fpills" role="tablist" aria-label="Read filter">
            <button role="tab" aria-selected={filter==='all'} className={'fpill '+(filter==='all'?'fpill--on':'')} onClick={()=>setFilter('all')}>All</button>
            <button role="tab" aria-selected={filter==='unread'} className={'fpill '+(filter==='unread'?'fpill--on':'')} onClick={()=>setFilter('unread')}>
              Unread {unread>0 && <Badge variant="error">{unread}</Badge>}
            </button>
          </div>
          <div className="toolbar__type">
            <Select aria-label="Filter by type" value={type} onChange={e=>setType(e.target.value)} options={TYPE_OPTIONS}/>
          </div>
        </div>

        {/* feed */}
        <div className="feed">
          {showArrival && (
            <button type="button" className="arrival" aria-live="polite" onClick={()=>setShowArrival(false)}>
              <Icon name="arrow-up" size={14}/> <span className="u-mono">1</span> new notification — refresh
            </button>
          )}
          {view.length===0 ? (
            filter==='unread'
              ? <div style={{padding:'var(--space-6)'}}><EmptyState icon="inbox" title="You're all caught up" body="No unread notifications. Switch to All to see your history." action={<Button variant="secondary" onClick={()=>setFilter('all')}>Show all</Button>}/></div>
              : <div style={{padding:'var(--space-6)'}}><EmptyState icon="filter-x" title={'No '+(TYPE[type]?TYPE[type].label:'')+' notifications'} body="Nothing here for this type yet." action={<Button variant="secondary" onClick={()=>setType('all')}>Clear filter</Button>}/></div>
          ) : (
            groups.map(g=>{
              const rows = view.filter(n=>n.group===g);
              if(rows.length===0) return null;
              return (
                <div key={g} role="group" aria-label={g}>
                  <div className="feed__group">{g}</div>
                  <ul role="feed" aria-label={g+' notifications'} style={{listStyle:'none',margin:0,padding:0}}>
                    {rows.map(n=>(<li key={n.id}><NotifRow n={n} onOpen={open}/></li>))}
                  </ul>
                </div>
              );
            })
          )}
          <div className="feed__foot">
            <Button variant="secondary" size="sm" leadingIcon={<Icon name="chevron-down" size={14}/>}>Load older</Button>
          </div>
        </div>

        {/* ---- STATES RAIL ---- */}
        <Section title="States">
          <div className="states__grid">

            <div className="mini">
              <span className="u-caption">Loading · skeleton rows</span>
              {[0,1,2].map(i=>(
                <div key={i} className="sk-row">
                  <Skeleton variant="circle" width={32} height={32}/>
                  <div style={{flex:1}}>
                    <Skeleton variant="text" width="60%" height={12}/>
                    <div style={{height:6}}/>
                    <Skeleton variant="text" width="40%" height={10}/>
                  </div>
                  <Skeleton variant="text" width={40} height={10}/>
                </div>
              ))}
            </div>

            <div className="mini">
              <span className="u-caption">Empty · no notifications at all</span>
              <EmptyState icon="bell-off" title="Nothing to review" body="When something needs your attention — a student flagged, grading finished, or results released — it'll show up here."/>
            </div>

            <div className="mini">
              <span className="u-caption">Empty · unread filter, none unread</span>
              <EmptyState icon="inbox" title="You're all caught up" body="No unread notifications. Switch to All to see your history." action={<Button variant="secondary" size="sm">Show all</Button>}/>
            </div>

            <div className="mini">
              <span className="u-caption">Error · list load failed</span>
              <Alert variant="error" title="Couldn't load notifications">
                Something went wrong fetching your feed. Check your connection and try again.
                <div style={{marginTop:'var(--space-3)'}}><Button variant="secondary" size="sm" leadingIcon={<Icon name="rotate-cw" size={14}/>}>Retry</Button></div>
              </Alert>
            </div>

            <div className="mini">
              <span className="u-caption">Partial · pagination failed (loaded rows intact)</span>
              <Alert variant="warning" title="Couldn't load older notifications">
                <div style={{marginTop:'var(--space-3)'}}><Button variant="secondary" size="sm" leadingIcon={<Icon name="rotate-cw" size={14}/>}>Retry</Button></div>
              </Alert>
            </div>

            <div className="mini">
              <span className="u-caption">Exhausted · end-cap</span>
              <div className="feed__endcap">You've reached the start of your notifications.</div>
            </div>

            <div className="mini">
              <span className="u-caption">Realtime · new-arrival pill</span>
              <div className="arrival" style={{borderRadius:'var(--radius-md)'}}><Icon name="arrow-up" size={14}/> <span className="u-mono">2</span> new notifications — refresh</div>
            </div>

            <div className="mini">
              <span className="u-caption">Offline · queued action</span>
              <Alert variant="info" title="You're offline">
                Showing cached notifications. Mark-read actions will sync when you reconnect.
              </Alert>
            </div>

          </div>
        </Section>
      </div>

      {/* toast layer (Mark all read confirmation) */}
      {toast && (
        <div style={{position:'absolute',right:'var(--space-6)',bottom:'var(--space-6)',zIndex:50}}>
          <Toast variant={toast.variant} title={toast.title}/>
        </div>
      )}
    </Shell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
