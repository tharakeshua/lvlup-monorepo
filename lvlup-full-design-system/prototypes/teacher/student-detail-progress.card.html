<script type="text/babel">
const { Icon, Button, IconButton, Avatar, Panel, Section, Card, Tabs, Badge, Chip,
  Stat, ProgressRing, ProgressBar, DefinitionList, Timeline, EmptyState, Alert, Skeleton, Tooltip,
  GradePill, RubricBreakdown, StoryPointTrack, XPMeter, StreakFlame, LevelBadge,
  AtRiskBadge, InsightCard, Toast, NavItem } = window.LvlupV0DesignSystem_5d0725;
const { useState, useEffect } = React;

function Shell(props){
  return (
    <div className="appshell" style={{height:'100vh', position:'relative'}}>
      <aside className="appshell__sidebar">
        <div className="sidebar__brand"><div className="sidebar__brand-mark">L</div><div className="sidebar__brand-name">Lyceum</div></div>
        <nav className="sidebar__nav" aria-label="Primary">
          <div className="sidebar__section-label">Overview</div>
          <NavItem icon="layout-dashboard" href="/" active={props.active==='dashboard'}>Dashboard</NavItem>
          <div className="sidebar__section-label">People</div>
          <NavItem icon="book-open" href="/classes" active={props.active==='classes'}>Classes</NavItem>
          <NavItem icon="users" href="/students" active={props.active==='students'}>Students</NavItem>
          <div className="sidebar__section-label">Content</div>
          <NavItem icon="share-2" href="/assign" active={props.active==='assign'}>Assign content</NavItem>
          <NavItem icon="clipboard-list" href="/assignments" active={props.active==='assignments'}>Assignments</NavItem>
          <div className="sidebar__section-label">Analytics</div>
          <NavItem icon="bar-chart-3" href="/analytics/classes" active={props.active==='analytics-classes'}>Class analytics</NavItem>
          <NavItem icon="file-bar-chart-2" href="/analytics/exams" active={props.active==='analytics-exams'}>Exam analytics</NavItem>
          <NavItem icon="orbit" href="/analytics/spaces" active={props.active==='analytics-spaces'}>Space analytics</NavItem>
          <NavItem icon="flask-conical" href="/analytics/tests" active={props.active==='analytics-tests'}>Test analytics</NavItem>
          <NavItem icon="alert-triangle" href="/analytics/at-risk" active={props.active==='analytics-at-risk'} badge={<Badge variant="error">4</Badge>}>At-risk</NavItem>
          <div className="sidebar__section-label">System</div>
          <NavItem icon="file-text" href="/exams" active={props.active==='exams'}>Exams</NavItem>
          <NavItem icon="megaphone" href="/announcements" active={props.active==='announcements'}>Announcements</NavItem>
          <NavItem icon="bell" href="/notifications" active={props.active==='notifications'}>Notifications</NavItem>
          <NavItem icon="settings" href="/settings" active={props.active==='settings'}>Settings</NavItem>
        </nav>
      </aside>
      <header className="appshell__topbar">
        <button className="chip" aria-haspopup="menu"><Avatar initials="SA" size="sm"/>Subhang Academy<Icon name="chevron-down" size={14}/></button>
        <div className="topbar__search"><button className="input" style={{display:'flex',alignItems:'center',justifyContent:'space-between',color:'var(--text-muted)',textAlign:'left'}}><span>Search classes, students, exams…</span><span className="kbd">Cmd K</span></button></div>
        <div className="topbar__spacer"></div>
        <IconButton icon={<Icon name="bell" size={20}/>} label="Notifications"/>
        <IconButton icon={<Icon name="sun" size={20}/>} label="Toggle theme"/>
        <Avatar initials="TS"/>
      </header>
      <main className="appshell__main" id="main">{props.children}</main>
    </div>
  );
}

/* ---- sample data (server-authoritative; rendered, never recomputed) ---- */
const SUBJECTS = [
  { label:'Mathematics', value:88 },
  { label:'Physics', value:79 },
  { label:'Chemistry', value:71 },
  { label:'Biology', value:64 },
  { label:'English', value:83 },
];

const EXAMS = [
  { id:'ex_2291', title:'Term 1 — Mathematics Unit Test', date:'14 Jun 2026', grade:'A', score:46, max:50, released:true },
  { id:'ex_2287', title:'Physics — Kinematics Quiz', date:'07 Jun 2026', grade:'B', score:31, max:40, released:true },
  { id:'ex_2280', title:'Chemistry — Periodic Trends', date:'29 May 2026', grade:'C', score:22, max:35, released:true },
  { id:'ex_2274', title:'Biology — Cell Biology Mid-unit', date:'21 May 2026', grade:null, score:null, max:30, released:false },
];

function ExamRow({ ex }){
  const [open, setOpen] = useState(false);
  if(!ex.released){
    return (
      <div className="exam-row exam-row--muted">
        <div className="exam-row__head" style={{cursor:'default'}}>
          <Icon name="lock" size={16}/>
          <div>
            <div className="exam-row__title">{ex.title}</div>
            <div className="exam-row__meta">Results not released</div>
          </div>
          <div className="spacer"></div>
          <Badge variant="warning" icon={<Icon name="eye-off" size={12}/>}>Not released</Badge>
        </div>
      </div>
    );
  }
  return (
    <div className="exam-row">
      <button className="exam-row__head" aria-expanded={open} onClick={()=>setOpen(o=>!o)}>
        <Icon name={open?'chevron-down':'chevron-right'} size={16}/>
        <div>
          <div className="exam-row__title">{ex.title}</div>
          <div className="exam-row__meta u-mono">{ex.date}</div>
        </div>
        <div className="spacer"></div>
        <GradePill grade={ex.grade}/>
        <span className="exam-row__score">{ex.score}/{ex.max}</span>
      </button>
      {open && (
        <div className="exam-row__body">
          <RubricBreakdown criteria={[
            { label:'Conceptual accuracy', desc:'Correctness of stated method & result', score:18, max:20 },
            { label:'Working shown', desc:'Steps justify the final answer', score:14, max:15 },
            { label:'Notation & units', desc:'Consistent symbols and units', score:14, max:15 },
          ]}/>
          <div style={{display:'flex',justifyContent:'flex-end'}}>
            <Button variant="ghost" size="sm" trailingIcon={<Icon name="arrow-up-right" size={14}/>}>Open in grading</Button>
          </div>
        </div>
      )}
    </div>
  );
}

function OverviewTab(){
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'var(--space-6)'}}>
      <div className="ovw-grid">
        <Card>
          <div style={{padding:'var(--space-4)'}}>
            <div className="cluster-label">Performance overview</div>
            <div className="rings">
              <div className="ring-wrap">
                <ProgressRing value={74} size={92} label="74%" />
                <span className="ring-wrap__cap" role="img" aria-label="Overall score 74 percent">Overall</span>
              </div>
              <div className="ring-wrap">
                <ProgressRing value={81} size={92} label="81%" />
                <span className="ring-wrap__cap" role="img" aria-label="Exam average 81 percent">Exams</span>
              </div>
              <div className="ring-wrap">
                <ProgressRing value={62} size={92} label="62%" />
                <span className="ring-wrap__cap" role="img" aria-label="Space completion 62 percent">Spaces</span>
              </div>
            </div>
          </div>
        </Card>
        <Card>
          <div style={{padding:'var(--space-4)',display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
            <div>
              <div className="cluster-label"><Icon name="trending-up" size={14}/> Strengths</div>
              <div className="chip-cluster">
                <Chip className="chip--good">Algebra</Chip>
                <Chip className="chip--good">Mechanics</Chip>
                <Chip className="chip--good">Reading comprehension</Chip>
              </div>
            </div>
            <div>
              <div className="cluster-label"><Icon name="trending-down" size={14}/> Needs improvement</div>
              <div className="chip-cluster">
                <Chip className="chip--bad">Stoichiometry</Chip>
                <Chip className="chip--bad">Genetics</Chip>
              </div>
            </div>
          </div>
        </Card>
      </div>
      <Section title="Subject performance">
        <div className="bars" role="list">
          {SUBJECTS.map(s=>(
            <div className="bar-row" role="listitem" key={s.label}>
              <span>{s.label}</span>
              <ProgressBar value={s.value} variant={s.value>=80?'success':undefined}/>
              <span className="bar-row__val">{s.value}%</span>
            </div>
          ))}
        </div>
      </Section>
    </div>
  );
}

function AutoGradeTab(){
  return (
    <Section title="Exam history">
      <div style={{display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
        {EXAMS.map(ex=> <ExamRow ex={ex} key={ex.id}/>)}
      </div>
    </Section>
  );
}

function SpaceBlock({ name, pct, nodes, xp, level, next, streak }){
  return (
    <div className="space-block">
      <div className="space-block__head">
        <h3 className="space-block__name">{name}</h3>
        <span className="space-block__pct">{pct}% complete</span>
      </div>
      <ProgressBar value={pct} variant="spark"/>
      <StoryPointTrack nodes={nodes}/>
      <div className="legend" aria-hidden="false">
        <span className="legend__item"><span className="legend__swatch sw-not"></span> Not started</span>
        <span className="legend__item"><span className="legend__swatch sw-prog"></span> In progress</span>
        <span className="legend__item"><span className="legend__swatch sw-mast"></span> Mastered</span>
      </div>
      <div className="gami-strip">
        <span className="gami-strip__label">Gamification (read-only)</span>
        <XPMeter level={level} xp={xp} next={next}/>
        <StreakFlame days={streak}/>
        <LevelBadge level={level}/>
      </div>
    </div>
  );
}

function LevelUpTab(){
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
      <SpaceBlock name="Algebra Foundations" pct={86} xp={740} level={4} next={900} streak={9}
        nodes={[
          { state:'mastered', label:'Linear equations' },
          { state:'mastered', label:'Inequalities' },
          { state:'mastered', label:'Quadratics' },
          { state:'in-progress', label:'Functions' },
          { state:'not-started', label:'Sequences' },
        ]}/>
      <SpaceBlock name="Forces & Motion" pct={52} xp={410} level={2} next={600} streak={9}
        nodes={[
          { state:'mastered', label:'Displacement' },
          { state:'in-progress', label:'Acceleration' },
          { state:'not-started', label:'Newton’s laws' },
          { state:'locked', label:'Momentum' },
        ]}/>
    </div>
  );
}

function InsightsTab(){
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
      <InsightCard icon="trending-down" title="Slipping in Chemistry">Exam scores in Chemistry fell from 78% to 63% over the last three assessments. Consider a targeted Stoichiometry review.</InsightCard>
      <InsightCard icon="clock" title="Inconsistent activity">No learning-space activity recorded in the last 6 days, ending a prior 9-day streak.</InsightCard>
      <InsightCard icon="target" title="Strong in Algebra">Mastered all Algebra Foundations story points ahead of the class median.</InsightCard>
    </div>
  );
}

function App(){
  const [toast, setToast] = useState(null);
  const [busy, setBusy] = useState(false);
  const [live, setLive] = useState('');

  function generate(){
    if(busy) return;
    setBusy(true); setLive('Generating report');
    setTimeout(()=>{ setBusy(false); setLive('Report ready'); setToast('ready'); }, 1400);
  }

  const overviewItems = [
    { label:'Overview', content:<OverviewTab/> },
    { label:'AutoGrade', content:<AutoGradeTab/> },
    { label:'LevelUp', content:<LevelUpTab/> },
    { label:'Insights', content:<InsightsTab/> },
  ];

  return (
    <Shell active="students">
      <div className="page">
        <a href="#main" className="sr-only">Skip to content</a>
        <div className="breadcrumb-row" aria-label="Breadcrumb">
          <a href="/students">People</a><Icon name="chevron-right" size={14}/>
          <a href="/students">Students</a><Icon name="chevron-right" size={14}/>
          <span style={{color:'var(--text-primary)'}}>Aanya Rao</span>
        </div>

        <div className="page__head">
          <h1 className="page__title">Student report</h1>
          <p className="page__sub">Per-student read-only progress across exams and learning spaces · server-authoritative.</p>
        </div>

        {/* A. Identity header */}
        <Panel>
          <div className="idhead">
            <div className="idhead__left">
              <Avatar initials="AR" size="lg" aria-hidden="true"/>
              <div style={{minWidth:0}}>
                <h2 className="idhead__name">
                  Aanya Rao
                  <Tooltip>
                    <span aria-label="At risk: low exam average, zero streak"><AtRiskBadge level="watch">At risk</AtRiskBadge></span>
                  </Tooltip>
                </h2>
                <div className="idhead__meta">
                  <span className="u-mono">Roll 24</span><span className="dot"></span>
                  <span>Grade 9</span><span className="dot"></span>
                  <span>Sec B</span><span className="dot"></span>
                  <span>Class 9B — Science</span><span className="dot"></span>
                  <span style={{display:'inline-flex',alignItems:'center',gap:'4px'}}><Icon name="circle-check" size={13}/> Active</span><span className="dot"></span>
                  <span className="u-mono">Enrolled 12 Jan 2026</span>
                </div>
              </div>
            </div>
            <div className="idhead__actions">
              <Button variant="ghost" leadingIcon={<Icon name="pencil" size={15}/>}>Edit student</Button>
              <Button variant="spark" loading={busy} disabled={busy}
                leadingIcon={!busy && <Icon name="file-down" size={16}/>}
                onClick={generate}
                aria-busy={busy || undefined}>
                {busy ? 'Generating…' : 'Generate report'}
              </Button>
            </div>
          </div>
        </Panel>

        {/* B. Score KPI row */}
        <div>
          <div className="kpi-grid">
            <Stat label="Overall score" value="74%" delta="60% exam · 40% space" trend="up"/>
            <Stat label="Exam average" value="81%" delta="6 exams" trend="up"/>
            <Stat label="Space completion" value="62%" delta="5/8 spaces" trend="up"/>
            <Stat label="Current streak" value="9d" delta="consecutive active days" trend="up"/>
          </div>
          <div className="updated" style={{marginTop:'var(--space-2)',justifyContent:'space-between'}}>
            <span className="updated"><Icon name="refresh-cw" size={12}/> Last updated 12 minutes ago</span>
            <span className="server-tag"><Icon name="server" size={11}/> server-computed</span>
          </div>
        </div>

        {/* C. At-risk panel (isAtRisk) */}
        <Alert variant="warning" title="Flagged at-risk">
          <div style={{display:'flex',flexDirection:'column',gap:'var(--space-2)'}}>
            <span>This student was flagged by the nightly review. Reasons:</span>
            <div className="chip-cluster">
              <Chip>Low exam average</Chip>
              <Chip>Declining trend</Chip>
              <Chip>Zero streak</Chip>
            </div>
            <span style={{fontSize:'var(--text-xs)',color:'var(--text-muted)'}}>Detected by automated rules — last run 20 Jun 02:00. Review the evidence before acting.</span>
          </div>
        </Alert>

        {/* D. Tabbed body */}
        <Tabs items={overviewItems} defaultIndex={0}/>

        {/* States rail */}
        <Section title="States">
          <div className="states-rail">
            <div className="state-mini">
              <span className="u-caption">Loading</span>
              <Card><div style={{padding:'var(--space-4)',display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
                <div style={{display:'flex',gap:'var(--space-3)',alignItems:'center'}}>
                  <Skeleton variant="circle" width="44px" height="44px"/>
                  <div style={{flex:1,display:'flex',flexDirection:'column',gap:'6px'}}>
                    <Skeleton width="60%"/><Skeleton width="40%"/>
                  </div>
                </div>
                <div className="sk-grid">
                  <Skeleton height="48px"/><Skeleton height="48px"/>
                  <Skeleton height="48px"/><Skeleton height="48px"/>
                </div>
              </div></Card>
            </div>

            <div className="state-mini">
              <span className="u-caption">Empty (no summary)</span>
              <Card><EmptyState icon="inbox" title="No progress data yet"
                body="This student hasn’t been assessed yet. Once they complete an exam or a learning space, their progress and report will appear here."/>
              </Card>
            </div>

            <div className="state-mini">
              <span className="u-caption">Error (summary load)</span>
              <Card><div style={{padding:'var(--space-3)'}}>
                <Alert variant="error" title="Couldn’t load progress">
                  <div style={{display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
                    <span>The progress summary failed to load.</span>
                    <div><Button variant="secondary" size="sm" leadingIcon={<Icon name="rotate-cw" size={14}/>}>Retry</Button></div>
                  </div>
                </Alert>
              </div></Card>
            </div>

            <div className="state-mini">
              <span className="u-caption">Partial (exam history)</span>
              <Card><div style={{padding:'var(--space-3)'}}>
                <Alert variant="info" title="Couldn’t load exam history">
                  <div style={{display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
                    <span>Other regions loaded fine.</span>
                    <div><Button variant="ghost" size="sm" leadingIcon={<Icon name="rotate-cw" size={14}/>}>Retry</Button></div>
                  </div>
                </Alert>
              </div></Card>
            </div>

            <div className="state-mini">
              <span className="u-caption">Permission denied (out-of-scope)</span>
              <Card><EmptyState icon="shield-x" title="Can’t open this student"
                body="This student isn’t in a class you manage, or no longer exists."/>
              </Card>
            </div>

            <div className="state-mini">
              <span className="u-caption">Generate report — disabled (no data)</span>
              <Card><div style={{padding:'var(--space-4)',display:'flex',alignItems:'center',gap:'var(--space-3)'}}>
                <Button variant="spark" disabled leadingIcon={<Icon name="file-down" size={16}/>}>Generate report</Button>
                <span style={{fontSize:'var(--text-xs)',color:'var(--text-muted)'}}>No progress data to report yet</span>
              </div></Card>
            </div>
          </div>
        </Section>
      </div>

      {/* live region for report generation */}
      <div aria-live="polite" className="sr-only">{live}</div>

      {/* report-ready toast */}
      {toast==='ready' && (
        <div style={{position:'absolute',right:'var(--space-6)',bottom:'var(--space-6)',zIndex:50}}>
          <Toast variant="success" title="Progress report ready" body="Signed PDF link valid for 1 hour.">
            <Button variant="ghost" size="sm" onClick={()=>setToast(null)}>Download again</Button>
          </Toast>
        </div>
      )}
    </Shell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if (window.lucide && window.lucide.createIcons) { window.lucide.createIcons(); }
</script></body></html>
