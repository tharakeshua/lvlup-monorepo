<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}
  .appshell__main{overflow:auto}
  .page{display:flex;flex-direction:column;gap:var(--space-8);max-width:var(--content-max);margin:0 auto}
  .page__head{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4)}
  .page__title{font-family:var(--font-display);font-size:var(--text-4xl);line-height:var(--leading-4xl);font-weight:var(--weight-semibold);margin:0;letter-spacing:var(--tracking-display)}
  .page__sub{font-family:var(--font-ui);font-size:var(--text-base);color:var(--text-secondary);margin:var(--space-2) 0 0}
  .page__meta{display:flex;align-items:center;gap:var(--space-3);margin-top:var(--space-3);flex-wrap:wrap}
  .countcap{font-size:var(--text-sm);color:var(--text-secondary)}
  .countcap .num{font-family:var(--font-mono);color:var(--text-primary);font-weight:var(--weight-medium)}
  .lastupd{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--text-muted)}
  .lastupd .num{font-family:var(--font-mono)}
  .servertag{display:inline-flex;align-items:center;gap:var(--space-1);font-size:var(--text-2xs);font-family:var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:var(--tracking-caption);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:1px var(--space-2)}
  .dot-sep{color:var(--text-muted)}
  .toolbar{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap}
  .toolbar__filters{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap}
  .toolbar__filters .select{min-width:160px}
  .toolbar__field{display:flex;flex-direction:column;gap:var(--space-1)}
  .toolbar__lbl{font-size:var(--text-2xs);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:var(--tracking-caption);color:var(--text-muted)}
  .toolbar__search{position:relative;flex:1 1 280px;min-width:240px}
  .toolbar__search .input{padding-left:var(--space-10);width:100%}
  .toolbar__search-icon{position:absolute;left:var(--space-3);top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;display:flex}
  .bulkbar{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-4);background:var(--brand-subtle);border:1px solid var(--border-subtle);border-radius:var(--radius-lg)}
  .bulkbar__count{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-primary);display:flex;align-items:center;gap:var(--space-2)}
  .bulkbar__count .num{font-family:var(--font-mono)}
  .bulkbar__spacer{flex:1}
  .bulkbar__actions{display:flex;align-items:center;gap:var(--space-2)}
  .tablewrap{border:1px solid var(--border-subtle);border-radius:var(--radius-lg);background:var(--bg-surface);overflow:hidden;box-shadow:var(--shadow-e1)}
  .tablewrap .table{margin:0}
  .table th{white-space:nowrap}
  .selcol{width:36px}
  .menucol{width:44px;text-align:right}
  .stcell{display:flex;align-items:center;gap:var(--space-3)}
  .stcell__name{font-weight:var(--weight-medium);color:var(--text-primary);line-height:1.2;display:inline-flex;align-items:center;gap:var(--space-2)}
  .stcell__id{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);margin-top:2px}
  .classcell{color:var(--text-secondary);font-size:var(--text-sm)}
  .scorecell{font-family:var(--font-mono);font-size:var(--text-sm);font-weight:var(--weight-medium)}
  .chiprow{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
  .rchip{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-xs);font-weight:var(--weight-medium);padding:2px var(--space-2);border-radius:var(--radius-pill);border:1px solid var(--border-subtle);white-space:nowrap}
  .rchip svg{flex:none}
  .rchip--error{color:var(--status-error);background:var(--status-error-subtle);border-color:var(--status-error-subtle)}
  .rchip--warning{color:var(--status-warning);background:var(--status-warning-subtle);border-color:var(--status-warning-subtle)}
  .rchip--info{color:var(--status-info);background:var(--status-info-subtle);border-color:var(--status-info-subtle)}
  .trendcell{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);font-weight:var(--weight-medium)}
  .trend--up{color:var(--status-success)}
  .trend--down{color:var(--status-error)}
  .trend--flat{color:var(--text-muted)}
  .trend--na{color:var(--text-muted)}
  .lastcell{display:flex;flex-direction:column;gap:2px}
  .lastcell__time{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-secondary)}
  .lastcell__flag{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted)}
  .rowlink{color:inherit;text-decoration:none;display:flex;align-items:center;gap:var(--space-3)}
  .rowlink:hover .stcell__name{color:var(--brand-primary)}
  .iconbtn-bare{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:var(--space-1);display:inline-flex;border-radius:var(--radius-sm)}
  .iconbtn-bare:hover{color:var(--text-primary);background:var(--bg-surface-sunken)}
  .iconbtn-bare:focus-visible{outline:2px solid var(--border-focus);outline-offset:2px}
  .followed{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-2xs);font-family:var(--font-mono);color:var(--status-info);background:var(--status-info-subtle);border-radius:var(--radius-pill);padding:1px var(--space-2);margin-left:var(--space-2)}
  .rowmeta{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-4);border-top:1px solid var(--border-subtle)}
  .rowmeta__count{font-size:var(--text-sm);color:var(--text-muted)}
  .rowmeta__count .num{font-family:var(--font-mono);color:var(--text-secondary)}
  .states__grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--space-5)}
  .states__mini{border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3)}
  .skelrow{display:flex;align-items:center;gap:var(--space-3)}
  .skelrow__col{flex:1;display:flex;flex-direction:column;gap:var(--space-2)}
  .u-caption{font-size:var(--text-2xs);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:var(--tracking-caption);color:var(--text-muted)}
  .composewrap{display:flex;flex-direction:column;gap:var(--space-4)}
  .compose-to{font-size:var(--text-sm);color:var(--text-secondary)}
  .compose-to .num{font-family:var(--font-mono);color:var(--text-primary)}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { Icon, Button, IconButton, Input, Select, Checkbox, Field,
  Card, Section, Drawer, Modal, Popover, Tooltip,
  DataTable, EmptyState, Skeleton, Pagination, Avatar, Badge, Chip, ProgressBar,
  Alert, NavItem, AtRiskBadge } = window.LvlupV0DesignSystem_5d0725;
const { useState } = React;

function Shell(props){
  return (
    <div className="appshell" style={{height:'100vh', position:'relative'}}>
      <aside className="appshell__sidebar">
        <div className="sidebar__brand"><div className="sidebar__brand-mark">L</div><div className="sidebar__brand-name">Lyceum</div></div>
        <nav className="sidebar__nav" aria-label="Primary">
          <div className="sidebar__section-label">Overview</div>
          <NavItem icon="layout-dashboard" href="/" active={props.active==='dashboard'}>Dashboard</NavItem>
          <div className="sidebar__section-label">People</div>
          <NavItem icon="book-open" href="/classes" active={props.active==='classes'}>Classes</NavItem>
          <NavItem icon="users" href="/students" active={props.active==='students'}>Students</NavItem>
          <div className="sidebar__section-label">Content</div>
          <NavItem icon="share-2" href="/assign" active={props.active==='assign'}>Assign content</NavItem>
          <NavItem icon="clipboard-list" href="/assignments" active={props.active==='assignments'}>Assignments</NavItem>
          <div className="sidebar__section-label">Analytics</div>
          <NavItem icon="bar-chart-3" href="/analytics/classes" active={props.active==='analytics-classes'}>Class analytics</NavItem>
          <NavItem icon="file-bar-chart-2" href="/analytics/exams" active={props.active==='analytics-exams'}>Exam analytics</NavItem>
          <NavItem icon="orbit" href="/analytics/spaces" active={props.active==='analytics-spaces'}>Space analytics</NavItem>
          <NavItem icon="flask-conical" href="/analytics/tests" active={props.active==='analytics-tests'}>Test analytics</NavItem>
          <NavItem icon="alert-triangle" href="/analytics/at-risk" active={props.active==='analytics-at-risk'} badge={<Badge variant="error">4</Badge>}>At-risk</NavItem>
          <div className="sidebar__section-label">System</div>
          <NavItem icon="file-text" href="/exams" active={props.active==='exams'}>Exams</NavItem>
          <NavItem icon="megaphone" href="/announcements" active={props.active==='announcements'}>Announcements</NavItem>
          <NavItem icon="bell" href="/notifications" active={props.active==='notifications'}>Notifications</NavItem>
          <NavItem icon="settings" href="/settings" active={props.active==='settings'}>Settings</NavItem>
        </nav>
      </aside>
      <header className="appshell__topbar">
        <button className="chip" aria-haspopup="menu"><Avatar initials="SA" size="sm"/>Subhang Academy<Icon name="chevron-down" size={14}/></button>
        <div className="topbar__search"><button className="input" style={{display:'flex',alignItems:'center',justifyContent:'space-between',color:'var(--text-muted)',textAlign:'left'}}><span>Search classes, students, exams…</span><span className="kbd">Cmd K</span></button></div>
        <div className="topbar__spacer"></div>
        <IconButton icon={<Icon name="bell" size={20}/>} label="Notifications"/>
        <IconButton icon={<Icon name="sun" size={20}/>} label="Toggle theme"/>
        <Avatar initials="TS"/>
      </header>
      <main className="appshell__main" id="main">{props.children}</main>
    </div>
  );
}

// ---- reason vocabulary (humanized from the rule engine's AtRiskReason enum) ----
const REASONS = {
  low_exam_score:        { label:'Low score',          icon:'alert-triangle', tone:'error'   },
  declining_performance: { label:'Declining',          icon:'trending-down',  tone:'warning' },
  low_space_completion:  { label:'Low completion',     icon:'bar-chart-2',    tone:'warning' },
  zero_streak:           { label:'No recent activity', icon:'clock',          tone:'warning' },
  no_recent_activity:    { label:'No recent activity', icon:'clock',          tone:'warning' },
};
function reasonMeta(key){
  if (REASONS[key]) return REASONS[key];
  // forward-compat: humanized title-case fallback, neutral info chip
  return { label:key.replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();}), icon:'tag', tone:'info' };
}
function ReasonChip(props){
  var m = reasonMeta(props.k);
  return (
    <span className={'rchip rchip--'+m.tone} aria-label={'Reason: '+m.label}>
      <Icon name={m.icon} size={12}/>{m.label}
    </span>
  );
}

function TrendCell(props){
  var t = props.t;
  if (t==='up')   return <span className="trendcell trend--up"><Icon name="arrow-up-right" size={15}/><span className="u-mono">Improving</span></span>;
  if (t==='down') return <span className="trendcell trend--down"><Icon name="arrow-down-right" size={15}/><span className="u-mono">Declining</span></span>;
  if (t==='flat') return <span className="trendcell trend--flat"><Icon name="minus" size={15}/><span className="u-mono">Stable</span></span>;
  return <span className="trendcell trend--na" aria-label="Trend unavailable"><span className="u-mono">—</span></span>;
}

// ---- sample roster (server-authoritative; ordered by the summary's severity signal) ----
const ROSTER = [
  { id:'stu_8841', name:'Aisha Khan',     initials:'AK', cls:'10-A', score:38, reasons:['low_exam_score','declining_performance'], trend:'down', last:'2d ago', flagged:'Flagged 14d' },
  { id:'stu_2207', name:'Rohan Mehta',    initials:'RM', cls:'10-B', score:null, reasons:['zero_streak'],                            trend:'na',  last:'9d ago', flagged:'Flagged 9d' },
  { id:'stu_5613', name:'Sara Iqbal',     initials:'SI', cls:'9-C',  score:24, reasons:['low_exam_score','low_space_completion'],    trend:'up',  last:'1d ago', flagged:'Flagged 11d', followed:true },
  { id:'stu_4490', name:'Devansh Rao',    initials:'DR', cls:'10-A', score:33, reasons:['low_space_completion'],                     trend:'down', last:'3d ago', flagged:'Flagged 6d' },
  { id:'stu_7028', name:'Meera Nair',     initials:'MN', cls:'9-B',  score:36, reasons:['declining_performance'],                    trend:'down', last:'4d ago', flagged:'Flagged 5d' },
  { id:'stu_3155', name:'Kabir Anand',    initials:'KA', cls:'10-B', score:null, reasons:['zero_streak','low_space_completion'],     trend:'na',  last:'12d ago', flagged:'Flagged 12d' },
  { id:'stu_9902', name:'Tanvi Desai',    initials:'TD', cls:'9-C',  score:39, reasons:['low_space_completion'],                     trend:'flat', last:'2d ago', flagged:'Flagged 4d' },
  { id:'stu_6677', name:'Yusuf Sheikh',   initials:'YS', cls:'9-B',  score:31, reasons:['low_exam_score'],                          trend:'up',  last:'1d ago', flagged:'Flagged 8d' },
];

function App(){
  const [sel, setSel] = useState({ stu_8841:true, stu_5613:true, stu_4490:true });
  const [cls, setCls] = useState('all');
  const [reason, setReason] = useState('all');
  const [sort, setSort] = useState('severity');
  const [followedRows, setFollowedRows] = useState({ stu_5613:true });
  const [composeOpen, setComposeOpen] = useState(false);
  const [confirmOpen, setConfirmOpen] = useState(false);

  const selIds = Object.keys(sel).filter(function(k){ return sel[k]; });
  const selCount = selIds.length;
  const allOnPage = ROSTER.every(function(r){ return sel[r.id]; });

  function toggle(id){ setSel(function(s){ var n=Object.assign({},s); n[id]=!n[id]; return n; }); }
  function toggleAll(){ if(allOnPage){ setSel({}); } else { var n={}; ROSTER.forEach(function(r){ n[r.id]=true; }); setSel(n); } }
  function clearSel(){ setSel({}); }
  function markFollowed(){ var n=Object.assign({},followedRows); selIds.forEach(function(id){ n[id]=true; }); setFollowedRows(n); setConfirmOpen(false); }

  const columns = [
    { label:'', key:'sel', className:'selcol', render:function(r){
        return <Checkbox checked={!!sel[r.id]} onChange={function(){ toggle(r.id); }} aria-label={'Select '+r.name}/>;
      }},
    { label:'Student', key:'student', render:function(r){
        return (
          <a className="rowlink" href={'/students/'+r.id+'/report'} aria-label={'Open '+r.name+', at risk, flagged. '+r.flagged}>
            <Avatar initials={r.initials} size="sm"/>
            <span><span className="stcell__name"><AtRiskBadge level="watch">At-risk</AtRiskBadge>{r.name}{followedRows[r.id] && <span className="followed"><Icon name="check" size={10}/>Followed up</span>}</span><span className="stcell__id">{r.id}</span></span>
          </a>
        );
      }},
    { label:'Class', key:'cls', render:function(r){ return <span className="classcell">{r.cls}</span>; }},
    { label:'Score', key:'score', numeric:true, sortable:true, render:function(r){
        return <span className="scorecell" aria-label={r.score==null?'Score unavailable':r.score+' percent'}>{r.score==null ? '—' : r.score+'%'}</span>;
      }},
    { label:'Reasons', key:'reasons', render:function(r){
        return <div className="chiprow">{r.reasons.map(function(k,i){ return <ReasonChip key={i} k={k}/>; })}</div>;
      }},
    { label:'Trend', key:'trend', render:function(r){ return <TrendCell t={r.trend}/>; }},
    { label:'Last active', key:'last', sortable:true, render:function(r){
        return <span className="lastcell"><time className="lastcell__time">{r.last}</time><span className="lastcell__flag">{r.flagged}</span></span>;
      }},
    { label:'', key:'menu', className:'menucol', render:function(r){
        return <button className="iconbtn-bare" aria-label={'Actions for '+r.name} title="Open student · Message · Mark followed-up · Generate report"><Icon name="more-horizontal" size={18}/></button>;
      }},
  ];

  return (
    <Shell active="analytics-at-risk">
      <div className="page">

        {/* ---- Page header ---- */}
        <header className="page__head">
          <div>
            <h1 className="page__title">At-risk students</h1>
            <p className="page__sub">Flagged by the nightly review. Sorted by severity.</p>
            <div className="page__meta">
              <span className="countcap"><span className="num">12</span> of <span className="num">184</span> students</span>
              <span className="dot-sep">·</span>
              <Tooltip><span className="lastupd"><Icon name="clock" size={13}/>Updated <span className="num">6 hours ago</span></span></Tooltip>
              <span className="servertag"><Icon name="server" size={10}/>Nightly</span>
            </div>
          </div>
          <Button variant="secondary" leadingIcon={<Icon name="refresh-cw" size={16}/>}>Refresh</Button>
        </header>

        {/* ---- Filter / toolbar row ---- */}
        <Section>
          <div className="toolbar" role="search">
            <div className="toolbar__filters">
              <label className="toolbar__field"><span className="toolbar__lbl">Class</span>
                <Select aria-label="Filter by class" value={cls} onChange={function(e){ setCls(e.target.value); }}
                  options={[{value:'all',label:'All classes'},{value:'10-A',label:'10-A'},{value:'10-B',label:'10-B'},{value:'9-B',label:'9-B'},{value:'9-C',label:'9-C'}]}/>
              </label>
              <label className="toolbar__field"><span className="toolbar__lbl">Reason</span>
                <Select aria-label="Filter by reason" value={reason} onChange={function(e){ setReason(e.target.value); }}
                  options={[{value:'all',label:'All reasons'},{value:'low_exam_score',label:'Low score'},{value:'declining_performance',label:'Declining'},{value:'low_space_completion',label:'Low completion'},{value:'zero_streak',label:'No recent activity'}]}/>
              </label>
              <label className="toolbar__field"><span className="toolbar__lbl">Sort</span>
                <Select aria-label="Sort roster" value={sort} onChange={function(e){ setSort(e.target.value); }}
                  options={[{value:'severity',label:'Severity'},{value:'score',label:'Lowest score'},{value:'last',label:'Least recently active'},{value:'flagged',label:'Longest flagged'}]}/>
              </label>
            </div>
            <div className="toolbar__search">
              <span className="toolbar__search-icon"><Icon name="search" size={16}/></span>
              <input className="input" placeholder="Search by name" aria-label="Search by name"/>
            </div>
          </div>
        </Section>

        {/* ---- BulkActionBar (visible: rows selected) ---- */}
        {selCount > 0 &&
          <div className="bulkbar" role="region" aria-label="Bulk actions">
            <span className="bulkbar__count"><Icon name="check-square" size={16}/><span className="num">{selCount}</span> selected</span>
            <span className="bulkbar__spacer"></span>
            <div className="bulkbar__actions">
              <Button variant="secondary" size="sm" leadingIcon={<Icon name="mail" size={15}/>} onClick={function(){ setComposeOpen(true); }}>Message</Button>
              <Button variant="secondary" size="sm" leadingIcon={<Icon name="check-circle" size={15}/>} onClick={function(){ selCount>10 ? setConfirmOpen(true) : markFollowed(); }}>Mark followed-up</Button>
              <Button variant="secondary" size="sm" leadingIcon={<Icon name="file-down" size={15}/>}>Generate report</Button>
              <IconButton icon={<Icon name="x" size={16}/>} label="Clear selection" onClick={clearSel}/>
            </div>
          </div>}

        {/* ---- Roster table ---- */}
        <div className="tablewrap">
          <DataTable columns={columns} rows={ROSTER} aria-label="At-risk students"/>
          <div className="rowmeta">
            <span className="rowmeta__count"><span className="num">8</span> of <span className="num">12</span> flagged students shown</span>
            <Pagination pages={3} current={1}/>
          </div>
        </div>

        {/* ---- States rail ---- */}
        <Section title="States">
          <div className="states__grid">

            <div className="states__mini">
              <span className="u-caption">Loading · skeleton</span>
              <div className="skelrow"><Skeleton variant="circle" width="28px" height="28px"/><div className="skelrow__col"><Skeleton width="58%"/><Skeleton width="34%" height="0.6rem"/></div><Skeleton width="44px"/><Skeleton width="64px"/></div>
              <div className="skelrow"><Skeleton variant="circle" width="28px" height="28px"/><div className="skelrow__col"><Skeleton width="46%"/><Skeleton width="40%" height="0.6rem"/></div><Skeleton width="44px"/><Skeleton width="64px"/></div>
              <div className="skelrow"><Skeleton variant="circle" width="28px" height="28px"/><div className="skelrow__col"><Skeleton width="62%"/><Skeleton width="30%" height="0.6rem"/></div><Skeleton width="44px"/><Skeleton width="64px"/></div>
            </div>

            <div className="states__mini">
              <span className="u-caption">Empty · no one at risk (happy path)</span>
              <EmptyState icon="shield-check" title="No students at risk — nice."
                body="No one in your classes is currently flagged by the nightly review. We'll surface anyone who starts slipping."/>
            </div>

            <div className="states__mini">
              <span className="u-caption">Empty · no filter matches</span>
              <EmptyState icon="filter-x" title="No students match these filters"
                body="Try clearing the class or reason filter."
                action={<Button variant="secondary" size="sm">Clear filters</Button>}/>
            </div>

            <div className="states__mini">
              <span className="u-caption">Empty · teacher has no classes</span>
              <EmptyState icon="users" title="No classes assigned"
                body="You don't manage any classes in this tenant yet. Ask your admin to assign you a class."/>
            </div>

            <div className="states__mini">
              <span className="u-caption">Error · roster read failed</span>
              <Alert variant="error" title="Couldn't load at-risk students">
                Something went wrong fetching the flagged roster.
                <div style={{marginTop:'var(--space-3)'}}><Button variant="secondary" size="sm" leadingIcon={<Icon name="refresh-cw" size={14}/>}>Retry</Button></div>
              </Alert>
            </div>

            <div className="states__mini">
              <span className="u-caption">Partial · some classes failed to load</span>
              <Alert variant="warning" title="Some classes couldn't be loaded">
                This list may be incomplete.
              </Alert>
              <span className="u-caption">Access denied · out-of-scope ?classId</span>
              <Alert variant="error" title="Access denied">You don't have access to this class.</Alert>
            </div>

          </div>
        </Section>

      </div>

      {/* ---- Message compose drawer (controlled) ---- */}
      <Drawer open={composeOpen} onClose={function(){ setComposeOpen(false); }} title="Message students">
        <div className="composewrap">
          <p className="compose-to">Sending to <span className="num">{selCount}</span> selected student{selCount===1?'':'s'} via the notification path.</p>
          <Field label="Subject" required>
            <Input placeholder="Checking in on your progress"/>
          </Field>
          <Field label="Message" hint="A supportive nudge — this won't change anyone's at-risk status.">
            <textarea className="textarea" rows={5} placeholder="Hi — I noticed you've fallen a little behind. Let's find a time to catch up."></textarea>
          </Field>
          <div style={{display:'flex',gap:'var(--space-2)',justifyContent:'flex-end'}}>
            <Button variant="ghost" onClick={function(){ setComposeOpen(false); }}>Cancel</Button>
            <Button variant="spark" leadingIcon={<Icon name="send" size={16}/>} onClick={function(){ setComposeOpen(false); }}>Send message</Button>
          </div>
        </div>
      </Drawer>

      {/* ---- Confirm: large bulk follow-up ---- */}
      <Modal open={confirmOpen} onClose={function(){ setConfirmOpen(false); }}
        title={'Mark '+selCount+' students as followed-up?'}
        footer={<><Button variant="ghost" onClick={function(){ setConfirmOpen(false); }}>Cancel</Button><Button variant="primary" onClick={markFollowed}>Mark followed-up</Button></>}>
        This notes that you've reached out. It won't remove anyone from the at-risk list — that happens automatically when their next nightly review improves.
      </Modal>

    </Shell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
