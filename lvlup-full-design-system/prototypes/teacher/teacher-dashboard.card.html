/* screen-local layout only — Lyceum vars only, NO raw hex, NO :root redefinition */
body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui)}

.dash{max-width:var(--content-max);margin:0 auto;display:flex;flex-direction:column;gap:var(--space-8)}

/* page header */

.pagehead h1{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-4xl);line-height:var(--leading-4xl);letter-spacing:-.02em;margin:0}

.kpi .stat{height:100%}
.kpi__cap{font-size:var(--text-2xs);color:var(--text-muted);margin-top:var(--space-2);display:flex;align-items:center;gap:var(--space-1)}

.rightcol{display:flex;flex-direction:column;gap:var(--space-6)}

.dcard__foot{padding:var(--space-3) var(--space-5) var(--space-4);border-top:1px solid var(--border-subtle)}
.dcard__stamp{display:inline-flex;align-items:center;gap:var(--space-1);font-size:var(--text-2xs);color:var(--text-muted)}
.dcard__stamp .u-mono{font-family:var(--font-mono)}

.attn-list{display:flex;flex-direction:column}
.attn-row{display:flex;align-items:center;gap:var(--space-3);width:100%;text-align:left;background:transparent;border:none;border-top:1px solid var(--border-subtle);padding:var(--space-4) var(--space-5);cursor:pointer;color:inherit;font-family:var(--font-ui);transition:background-color var(--dur-fast) var(--ease-standard)}
.attn-row:first-child{border-top:none}
.attn-row:hover{background:var(--bg-surface-sunken)}

.attn-row__ico{flex:0 0 auto;width:32px;height:32px;border-radius:var(--radius-md);display:grid;place-items:center;background:var(--bg-surface-sunken);color:var(--text-secondary)}

.attn-row__meta .u-mono{font-family:var(--font-mono)}
.attn-row__chev{flex:0 0 auto;color:var(--text-muted)}

/* notifications rows */
.notif-list{display:flex;flex-direction:column}
.notif-row{display:flex;align-items:flex-start;gap:var(--space-3);width:100%;text-align:left;background:transparent;border:none;border-top:1px solid var(--border-subtle);padding:var(--space-3) var(--space-5);cursor:pointer;color:inherit;font-family:var(--font-ui);transition:background-color var(--dur-fast) var(--ease-standard)}
.notif-row:first-child{border-top:none}
.notif-row:hover{background:var(--bg-surface-sunken)}
.notif-row:focus-visible{outline:none;box-shadow:var(--ring-focus);border-radius:var(--radius-sm)}
.notif-row__dot{flex:0 0 auto;width:8px;height:8px;border-radius:var(--radius-pill);margin-top:6px;background:var(--brand-primary)}
.notif-row__dot--read{background:var(--border-strong)}
.notif-row__main{flex:1 1 auto;min-width:0}
.notif-row__title{font-size:var(--text-sm);color:var(--text-primary);line-height:var(--leading-sm)}

.notif-row__time{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);margin-top:2px}

/* ai usage */
.ai-stats{display:flex;gap:var(--space-6);padding:0 var(--space-5) var(--space-4)}
.ai-budget{padding:0 var(--space-5) var(--space-5)}
.ai-budget__row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:var(--space-2)}
.ai-budget__lab{font-size:var(--text-xs);color:var(--text-secondary)}
.ai-budget__val{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-primary)}

/* my classes grid */

.classtile{display:flex;flex-direction:column;gap:var(--space-3);text-align:left;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-4);cursor:pointer;color:inherit;font-family:var(--font-ui);transition:box-shadow var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard)}
.classtile:hover{box-shadow:var(--shadow-e2);border-color:var(--border-strong)}
.classtile:focus-visible{outline:none;box-shadow:var(--ring-focus)}
.classtile__top{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-2)}
.classtile__name{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-base);line-height:var(--leading-base);letter-spacing:-.01em;color:var(--text-primary)}
.classtile__code{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);margin-top:2px}
.classtile__metrics{display:flex;align-items:center;gap:var(--space-4);margin-top:auto}
.classtile__metric{display:flex;flex-direction:column;gap:2px}
.classtile__mlabel{font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.classtile__mval{font-family:var(--font-mono);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-primary)}

/* states rail */
.staterail{display:flex;flex-wrap:wrap;gap:var(--space-5)}
.statemini{flex:1 1 280px;min-width:260px;display:flex;flex-direction:column;gap:var(--space-2)}
.statemini__body{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:var(--space-4);min-height:120px;display:flex;flex-direction:column;gap:var(--space-3)}

.u-mono{font-family:var(--font-mono)}
.u-caption{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}

@media (prefers-reduced-motion: reduce){.attn-row,.notif-row,.classtile{transition:none}}

/* ---------- regions ---------- */
function AttentionCard(){
  return (
    <section className="dcard" aria-labelledby="attn-title">

        <div>
          <h2 className="dcard__title" id="attn-title">Attention needed</h2>

        {ATTENTION.map(r=>(
          <li key={r.id} role="listitem">
            <button className="attn-row" onClick={()=>go(r.href)} aria-label={r.name + ' — ' + r.meta}>
              <span className={'attn-row__ico attn-row__ico--'+r.tone}><Icon name={r.ico} size={16}/></span>
              <span className="attn-row__main">
                <span className="attn-row__name">

                  {r.badge===true && <AtRiskBadge>At risk</AtRiskBadge>}
                  {r.badge==='watch' && <AtRiskBadge level="watch">Watch</AtRiskBadge>}
                  {r.kind==='lowclass' && <GradePill grade="D" score="58%"/>}

              <span className="attn-row__chev"><Icon name="chevron-right" size={18}/></span>

}

function NotificationsCard(){
  const [items,setItems]=useState(NOTIFS);
  const markRead=(id)=>setItems(prev=>prev.map(n=>n.id===id?{...n,unread:false}:n));
  return (
    <section className="dcard" aria-labelledby="notif-title">
      <div className="dcard__head">
        <h2 className="dcard__title" id="notif-title">Recent</h2>
        <Badge variant="brand">{items.filter(n=>n.unread).length} new</Badge>
      </div>
      <ul className="notif-list" role="list" style={{margin:0,padding:0,listStyle:'none'}}>
        {items.map(n=>(
          <li key={n.id} role="listitem">
            <button className="notif-row" onClick={()=>markRead(n.id)} aria-label={(n.unread?'Unread. ':'')+n.title+' '+n.time}>
              <span className={'notif-row__dot'+(n.unread?'':' notif-row__dot--read')} aria-label={n.unread?'Unread':undefined}></span>
              <span className="notif-row__main">
                <span className={'notif-row__title'+(n.unread?'':' notif-row__title--read')}>{n.title}</span>
                <span className="notif-row__time">{n.time}</span>
              </span>
            </button>
          </li>
        ))}
      </ul>
      <div className="dcard__foot">
        <Button variant="ghost" size="sm" trailingIcon={<Icon name="arrow-right" size={15}/>} onClick={()=>go('/notifications')}>View all</Button>
      </div>
    </section>
  );
}

          </div>
          <div className="kpi" aria-label="Average class performance: 74 percent">
            <Stat label="Avg class performance" value="74%" delta="2.1%" trend="up"/>
            <div className="kpi__cap"><Icon name="server" size={12}/> last updated <span className="u-mono">14 min ago</span></div>
          </div>
          <div className="kpi" aria-label="Submissions awaiting review: 23">
            <Stat label="Submissions awaiting review" value="23"/>
            <div className="kpi__cap"><Icon name="file-text" size={12}/> across <span className="u-mono">4</span> exams</div>
          </div>
        </div>

        <Alert variant="warning" title="AI usage at 69% of budget">
          AI usage is at <span className="u-mono">69%</span> of this month's budget. <span style={{color:'var(--text-muted)'}}>Visible to tenant admins only.</span>
        </Alert>

        <div className="cols">
          <AttentionCard/>
          <div className="rightcol">
            <NotificationsCard/>
            <AiUsageCard/>
          </div>
        </div>

        <section aria-labelledby="classes-title">
          <div className="dcard__head" style={{padding:'0 0 var(--space-4)'}}>
            <div>
              <h2 className="dcard__title" id="classes-title" style={{fontSize:'var(--text-xl)'}}>My classes</h2>
              <div className="dcard__sub"><span className="u-mono">8</span> classes in this tenant</div>
            </div>
            <Button variant="ghost" size="sm" trailingIcon={<Icon name="arrow-right" size={15}/>} onClick={()=>go('/classes')}>All classes</Button>
          </div>
          <div className="classgrid" role="list">
            {CLASSES.map(c=>(
              <button key={c.id} className="classtile" role="listitem" onClick={()=>go('/classes/'+c.id)}
                aria-label={c.name + ', ' + c.students + ' students, average ' + c.avg + ' percent' + (c.atRisk? ', ' + c.atRisk + ' at risk':'')}>
                <div className="classtile__top">
                  <div>
                    <div className="classtile__name">{c.name}</div>
                    <div className="classtile__code">{c.code}</div>
                  </div>
                  {c.atRisk>0 && <Chip><Icon name="alert-triangle" size={12}/> {c.atRisk} at risk</Chip>}
                </div>
                <div className="classtile__metrics">
                  <div className="classtile__metric">
                    <span className="classtile__mlabel">Students</span>
                    <span className="classtile__mval">{c.students}</span>
                  </div>
                  <div className="classtile__metric">
                    <span className="classtile__mlabel">Avg</span>
                    <span className="classtile__mval">{c.avg}%</span>
                  </div>
                </div>
              </button>
            ))}
          </div>
        </section>

        <StatesRail/>

      </div>
    </Shell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
