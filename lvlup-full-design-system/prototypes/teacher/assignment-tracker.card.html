<script type="text/babel">

const { useState, useRef } = React;

/* ---------- Shell ---------- */
function Shell(props){

          <div className="sidebar__section-label">Content</div>

          <div className="sidebar__section-label">System</div>
          <NavItem icon="file-text" href="/exams" active={props.active==='exams'}>Exams</NavItem>
          <NavItem icon="megaphone" href="/announcements" active={props.active==='announcements'}>Announcements</NavItem>
          <NavItem icon="bell" href="/notifications" active={props.active==='notifications'}>Notifications</NavItem>
          <NavItem icon="settings" href="/settings" active={props.active==='settings'}>Settings</NavItem>
        </nav>
      </aside>
      <header className="appshell__topbar">
        <button className="chip" aria-haspopup="menu"><Avatar initials="SA" size="sm"/>Subhang Academy<Icon name="chevron-down" size={14}/></button>

        <div className="topbar__spacer"></div>
        <IconButton icon={<Icon name="bell" size={20}/>} label="Notifications"/>
        <IconButton icon={<Icon name="sun" size={20}/>} label="Toggle theme"/>
        <Avatar initials="TS"/>
      </header>
      <main className="appshell__main" id="main">{props.children}</main>
    </div>
  );
}

/* ---------- Cell state vocabulary ---------- */
const CELL = {
  'not-started':   {icon:'circle',          cls:'ic-ns',   label:'Not started'},
  'in-progress':   {icon:'circle-dashed',   cls:'ic-ip',   label:'In progress'},
  'mastered':      {icon:'check-circle-2',  cls:'ic-ma',   label:'Mastered'},
  'not-submitted': {icon:'circle',          cls:'ic-ns',   label:'Not submitted'},
  'submitted':     {icon:'send',            cls:'ic-sub',  label:'Submitted'},
  'grading':       {icon:'loader',          cls:'ic-sub',  label:'Grading'},
  'graded':        {icon:'square-check',    cls:'ic-grd',  label:'Graded'},
  'overdue':       {icon:'alert-triangle',  cls:'ic-over', label:'Overdue'},
  'pending':       {icon:'more-horizontal', cls:'ic-pend', label:'Loading'},
};

/* ---------- Columns (assigned content) ---------- */
const COLS = [
  {id:'sp-alg',  group:'spaces', title:'Algebra II',    sub:'Space',     type:'space'},
  {id:'sp-cell', group:'spaces', title:'Cell Biology',  sub:'Space',     type:'space'},
  {id:'sp-fra',  group:'spaces', title:'Fractions',     sub:'Space',     type:'space'},
  {id:'ex-mid',  group:'exams',  title:'Midterm',       sub:'Due May 3', type:'exam'},
  {id:'ex-u3',   group:'exams',  title:'Unit 3 Quiz',   sub:'Due May 9', type:'exam'},
];

function c(state, extra){ return Object.assign({state, assigned:'Apr 12', due:'May 3', last:'2 days ago'}, extra||{}); }
const ROWS = [
  {id:'s1', name:'Aanya Rao',   roll:'R-204', initials:'AR', done:6, total:7, atRisk:false,
    cells:{'sp-alg':c('mastered'),'sp-cell':c('in-progress',{pct:62}),'sp-fra':c('mastered'),
      'ex-mid':c('graded',{grade:'B',score:84,last:'May 2'}),'ex-u3':c('submitted',{last:'May 8'})}},
  {id:'s2', name:'Dev Kumar',   roll:'R-211', initials:'DK', done:2, total:7, atRisk:true, reasons:'Low activity · 2 overdue items',
    cells:{'sp-alg':c('not-started'),'sp-cell':c('not-started'),'sp-fra':c('in-progress',{pct:18}),
      'ex-mid':c('overdue',{last:'—'}),'ex-u3':c('grading',{pct:41,last:'May 8'})}},
  {id:'s3', name:'Mira Shah',   roll:'R-198', initials:'MS', done:7, total:7, atRisk:false,
    cells:{'sp-alg':c('mastered'),'sp-cell':c('mastered'),'sp-fra':c('mastered'),
      'ex-mid':c('graded',{grade:'A',score:91,last:'May 2'}),'ex-u3':c('graded',{grade:'A',score:88,last:'May 8'})}},
  {id:'s4', name:'Rohan Patel', roll:'R-220', initials:'RP', done:4, total:7, atRisk:false,
    cells:{'sp-alg':c('in-progress',{pct:74}),'sp-cell':c('mastered'),'sp-fra':c('not-started'),
      'ex-mid':c('submitted',{last:'May 1'}),'ex-u3':c('pending')}},
  {id:'s5', name:'Sara Iyer',   roll:'R-187', initials:'SI', done:3, total:7, atRisk:true, reasons:'Stalled on Algebra II · 1 overdue exam',
    cells:{'sp-alg':c('in-progress',{pct:31}),'sp-cell':c('in-progress',{pct:55}),'sp-fra':c('mastered'),
      'ex-mid':c('overdue',{last:'—'}),'ex-u3':c('not-submitted',{last:'—'})}},
  {id:'s6', name:'Vihaan Nair', roll:'R-176', initials:'VN', done:5, total:7, atRisk:false,
    cells:{'sp-alg':c('mastered'),'sp-cell':c('in-progress',{pct:48}),'sp-fra':c('mastered'),
      'ex-mid':c('graded',{grade:'C',score:72,last:'May 2'}),'ex-u3':c('submitted',{last:'May 8'})}},
];

const FOOT = {
  'sp-alg':'3 of 6 · 0 overdue', 'sp-cell':'2 of 6 · 0 overdue', 'sp-fra':'4 of 6 · 0 overdue',
  'ex-mid':'3 of 6 · 2 overdue', 'ex-u3':'2 of 6 · 0 overdue',
};

function CellGlyph({state, score, grade, pct}){
  const meta = CELL[state] || CELL.pending;
  return (
    <span style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
      <span className={"at-cell__ic "+meta.cls}><Icon name={meta.icon} size={18}/></span>
      <span className={"at-cell__lbl "+meta.cls}>{meta.label}</span>
      {score!=null && <span className="at-cell__score"><GradePill grade={grade} score={score}/></span>}
      {score==null && pct!=null && <span className="at-cell__score">{pct}%</span>}
    </span>
  );
}

function App(){
  const [axis, setAxis] = useState('students');
  const [statusF, setStatusF] = useState('any');
  const [classF, setClassF] = useState('all');
  const [contentF, setContentF] = useState('all');
  const [query, setQuery] = useState('');
  const [pop, setPop] = useState(null);
  const [toast, setToast] = useState(false);
  const wrapRef = useRef(null);

  const rows = ROWS.filter(r => !query || r.name.toLowerCase().includes(query.toLowerCase()));
  const shown = rows.length, total = ROWS.length;
  const cleared = statusF==='any' && classF==='all' && contentF==='all' && !query;

  function openCell(e, row, col){
    const wrap = wrapRef.current.getBoundingClientRect();
    const btn = e.currentTarget.getBoundingClientRect();
    let x = btn.left - wrap.left + btn.width/2 - 140;
    let y = btn.bottom - wrap.top + 6;
    x = Math.max(8, Math.min(x, wrap.width - 288));
    setPop({row, col, x, y});
  }

  const popData = pop ? pop.row.cells[pop.col.id] : null;
  const popMeta = popData ? (CELL[popData.state]||CELL.pending) : null;

  return (
    <Shell active="assignments">
      <div className="at-main" onClick={()=>pop&&setPop(null)}>

        {/* HEADER */}
        <div className="at-headrow">
          <div>
            <h1 className="at-title">Assignment Tracker</h1>
            <p className="at-sub">Who has — and hasn't — done what, across your classes.</p>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'var(--space-2)'}}>
            <Button variant="ghost" leadingIcon={<Icon name="download" size={16}/>} onClick={()=>setToast(true)}>Export CSV</Button>
            <span className="at-meta"><Icon name="server" size={12}/> Server data · Last updated 6 min ago</span>
          </div>
        </div>

        {/* AGGREGATE STRIP */}
        <div className="at-stats">
          <Stat label="Assigned" value="35" delta="5 content items" trend="up"/>
          <Stat label="Completed" value="61%" delta="vs 54% last week" trend="up"/>
          <Stat label="Overdue" value="4" delta="2 students" trend="down"/>
        </div>

        {/* FILTER BAR */}
        <div className="at-filterbar" role="search" aria-label="Filter assignments">
          <Select className="at-fb-select" aria-label="Class" value={classF} onChange={e=>setClassF(e.target.value)}
            options={[{value:'all',label:'All my classes'},{value:'g8a',label:'Grade 8 · Section A'},{value:'g8b',label:'Grade 8 · Section B'},{value:'g9a',label:'Grade 9 · Section A'}]}/>
          <Select className="at-fb-select" aria-label="Content" value={contentF} onChange={e=>setContentF(e.target.value)}
            options={[{value:'all',label:'All content'},{value:'sp-alg',label:'Spaces · Algebra II'},{value:'sp-cell',label:'Spaces · Cell Biology'},{value:'ex-mid',label:'Exams · Midterm'},{value:'ex-u3',label:'Exams · Unit 3 Quiz'}]}/>
          <Select className="at-fb-select" aria-label="Status" value={statusF} onChange={e=>setStatusF(e.target.value)}
            options={[{value:'any',label:'Any status'},{value:'not-started',label:'Not started'},{value:'in-progress',label:'In progress'},{value:'mastered',label:'Mastered'},{value:'not-submitted',label:'Not submitted'},{value:'submitted',label:'Submitted'},{value:'grading',label:'Grading'},{value:'graded',label:'Graded'},{value:'overdue',label:'Overdue'}]}/>
          <span className="at-seg" role="group" aria-label="Axis">
            <span className="at-seg__lbl">Axis</span>
            <button className={"at-seg__btn"+(axis==='students'?' at-seg__btn--active':'')} aria-pressed={axis==='students'} onClick={()=>setAxis('students')}>Students</button>
            <button className={"at-seg__btn"+(axis==='classes'?' at-seg__btn--active':'')} aria-pressed={axis==='classes'} onClick={()=>setAxis('classes')}>Classes</button>
          </span>
          <span className="at-fb-spacer"></span>
          <Input className="at-fb-search" placeholder="Search students or content" aria-label="Search students or content" value={query} onChange={e=>setQuery(e.target.value)}/>
          <span className="at-count">Showing {shown} of {total}</span>
          <Button className="at-clear" variant="ghost" size="sm" disabled={cleared}
            onClick={()=>{setStatusF('any');setClassF('all');setContentF('all');setQuery('');}}>Clear</Button>
        </div>

        {/* LEGEND */}
        <div className="at-legend" aria-label="State legend">
          <span className="at-leg"><span className="at-leg__ic ic-ns"><Icon name="circle" size={14}/></span>Not started</span>
          <span className="at-leg"><span className="at-leg__ic ic-ip"><Icon name="circle-dashed" size={14}/></span>In progress</span>
          <span className="at-leg"><span className="at-leg__ic ic-ma"><Icon name="check-circle-2" size={14}/></span>Mastered</span>
          <span className="at-leg__sep"></span>
          <span className="at-leg"><span className="at-leg__ic ic-sub"><Icon name="send" size={14}/></span>Submitted</span>
          <span className="at-leg"><span className="at-leg__ic ic-sub"><Icon name="loader" size={14}/></span>Grading</span>
          <span className="at-leg"><span className="at-leg__ic ic-grd"><Icon name="square-check" size={14}/></span>Graded</span>
          <span className="at-leg__sep"></span>
          <span className="at-leg"><span className="at-leg__ic ic-over"><Icon name="alert-triangle" size={14}/></span>Overdue · past the due date with no completed submission</span>
          <span className="at-fb-spacer"></span>
          <Tooltip><span className="at-leg" style={{cursor:'help'}}><Icon name="info" size={13}/> Scores appear once results are released</span></Tooltip>
        </div>

        {/* MATRIX */}
        <div className="at-matrixwrap" ref={wrapRef}>
          <div className="at-scroll">
            <table className="at-grid" role="grid" aria-label="Assignment completion matrix">
              <thead>
                <tr role="row">
                  <th className="at-grpcell" rowSpan={2} scope="col">{axis==='students'?'Student':'Class'}</th>
                  <th className="at-grouphd at-grouphd--spaces" colSpan={3} scope="colgroup"><Icon name="orbit" size={12} style={{verticalAlign:'-2px',marginRight:4}}/>Spaces</th>
                  <th className="at-grouphd at-grouphd--exams" colSpan={2} scope="colgroup"><Icon name="file-text" size={12} style={{verticalAlign:'-2px',marginRight:4}}/>Exams</th>
                  <th className="at-grouphd" rowSpan={2} scope="col">Row rollup</th>
                </tr>
                <tr role="row">
                  {COLS.map(col=>(
                    <th key={col.id} className="at-colhd" role="columnheader" scope="col">
                      {col.title}<div className="at-colhd__sub">{col.sub}</div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map(row=>(
                  <tr key={row.id} role="row">
                    <th className="at-rowhd" role="rowheader" scope="row">
                      <span className="at-name">
                        <Avatar initials={row.initials} size="sm"/>
                        <span className="at-name__txt">
                          <span className="at-name__nm">{row.name}</span>
                          <span className="at-name__roll">{row.roll}</span>
                        </span>
                      </span>
                    </th>
                    {COLS.map(col=>{
                      const cell = row.cells[col.id];
                      const m = CELL[cell.state]||CELL.pending;
                      const aria = row.name+' — '+col.title+': '+m.label
                        + (cell.score!=null?', scored '+cell.score:'')
                        + (col.type==='exam'?', due '+cell.due:'');
                      return (
                        <td key={col.id} className="at-cell" role="gridcell">
                          <button className="at-cellbtn" aria-label={aria}
                            onClick={(e)=>{e.stopPropagation();openCell(e,row,col);}}>
                            <CellGlyph state={cell.state} score={cell.score} grade={cell.grade} pct={cell.pct}/>
                          </button>
                        </td>
                      );
                    })}
                    <td className="at-rollcell" role="gridcell">
                      <span className="at-roll">
                        <span className="at-roll__frac">{row.done}/{row.total}</span>
                        <ProgressBar value={Math.round(row.done/row.total*100)} variant={row.done===row.total?'success':undefined}/>
                        {row.atRisk && <AtRiskBadge level="watch" aria-label={'At risk — flagged by nightly review: '+row.reasons}>At risk</AtRiskBadge>}
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr className="at-foot" role="row">
                  <th className="at-rowhd" role="rowheader" scope="row">Column rollup</th>
                  {COLS.map(col=>(<td key={col.id} role="gridcell">{FOOT[col.id]}</td>))}
                  <td className="at-rollcell" role="gridcell"><span className="u-mono" style={{fontSize:'var(--text-2xs)',color:'var(--text-muted)'}}>14/30 · 4 overdue</span></td>
                </tr>
              </tfoot>
            </table>
          </div>

          {/* CELL POPOVER (controlled, positioned) */}
          {pop && popData && (
            <div className="at-pop" style={{left:pop.x, top:pop.y}} role="dialog" aria-label="Cell detail" onClick={e=>e.stopPropagation()}>
              <div className="at-pop__hd">{pop.row.name} · {pop.col.title}</div>
              <div className="at-pop__sub">{pop.col.group==='spaces'?'Learning space':'Exam'}</div>
              <DefinitionList items={[
                {term:'State', value:<span style={{display:'inline-flex',alignItems:'center',gap:6}}><span className={popMeta.cls}><Icon name={popMeta.icon} size={14}/></span>{popMeta.label}</span>},
                {term:'Score', value: popData.score!=null
                  ? <GradePill grade={popData.grade} score={popData.score}/>
                  : <span className="u-mono" style={{color:'var(--text-muted)'}}>{popData.state==='grading'?'not yet graded':'not released'}</span>},
                {term:'Assigned', value:<span className="u-mono">{popData.assigned}</span>},
                {term:'Due', value:<span className="u-mono">{popData.due}</span>},
                {term:'Last activity', value:<span className="u-mono">{popData.last}</span>},
              ]}/>
              <div className="at-pop__acts">
                <Button size="sm" variant="secondary" leadingIcon={<Icon name="user" size={14}/>}>Open student</Button>
                {pop.col.type==='exam' && <Button size="sm" variant="ghost" leadingIcon={<Icon name="clipboard-check" size={14}/>}>Open grading</Button>}
              </div>
            </div>
          )}
        </div>

        {/* PAGINATION */}
        <div style={{display:'flex',justifyContent:'flex-end'}}>
          <Pagination pages={5} current={1}/>
        </div>

        {/* STATES RAIL */}
        <Section title="States">
          <div className="at-states">
            <div className="at-state">
              <span className="u-caption">Loading (skeleton matrix)</span>
              {[0,1,2].map(i=>(
                <div className="at-skelrow" key={i}>
                  <Skeleton variant="circle" width="28px" height="28px"/>
                  <Skeleton width="90px"/>
                  <Skeleton variant="circle" width="20px" height="20px"/>
                  <Skeleton variant="circle" width="20px" height="20px"/>
                  <Skeleton variant="circle" width="20px" height="20px"/>
                </div>
              ))}
            </div>

            <div className="at-state">
              <span className="u-caption">Partial — exam status failed</span>
              <Alert variant="warning" title="Exam status couldn't be loaded">
                Completion for spaces is still shown. <a href="#" style={{color:'var(--brand-primary)'}}>Retry</a>
              </Alert>
            </div>

            <div className="at-state">
              <span className="u-caption">Empty — nothing assigned</span>
              <EmptyState icon="clipboard-list" title="Nothing assigned yet"
                body="Assign a space or exam to a class to start tracking completion."
                action={<Button size="sm" variant="secondary">Go to Classes</Button>}/>
            </div>

            <div className="at-state">
              <span className="u-caption">Empty — no classes managed</span>
              <EmptyState icon="users" title="No classes to track"
                body="You don't manage any classes yet. Once a class is assigned to you, its assignments appear here."/>
            </div>

            <div className="at-state">
              <span className="u-caption">Empty — filtered to nothing</span>
              <EmptyState icon="filter-x" title="No assignments match these filters."
                action={<Button size="sm" variant="ghost">Clear filters</Button>}/>
            </div>

            <div className="at-state">
              <span className="u-caption">Error — whole screen</span>
              <Alert variant="error" title="Couldn't load the assignment tracker.">
                <div style={{marginTop:'var(--space-2)'}}><Button size="sm" variant="secondary" leadingIcon={<Icon name="rotate-cw" size={14}/>}>Retry</Button></div>
              </Alert>
            </div>

            <div className="at-state">
              <span className="u-caption">Pending cell ≠ not-started</span>
              <div style={{display:'flex',gap:'var(--space-3)',alignItems:'center'}}>
                <span style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                  <span className="ic-pend"><Icon name="more-horizontal" size={18}/></span>
                  <span className="at-cell__lbl ic-pend">Loading</span>
                </span>
                <span className="u-caption" style={{flex:1}}>Unresolved cells show a neutral glyph — never a false "Not started".</span>
              </div>
            </div>

            <div className="at-state">
              <span className="u-caption">Score gating · permission-gated</span>
              <div style={{display:'flex',flexDirection:'column',gap:'var(--space-2)'}}>
                <span style={{fontSize:'var(--text-xs)',color:'var(--text-secondary)'}}>Results not released — status without score:</span>
                <span style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:'var(--text-xs)'}}>
                  <span className="ic-grd"><Icon name="square-check" size={14}/></span>Graded · <span className="u-mono" style={{color:'var(--text-muted)'}}>not released</span>
                </span>
                <span style={{fontSize:'var(--text-xs)',color:'var(--text-muted)'}}>Teacher without grading permission: cell popover shows "Open student" only.</span>
              </div>
            </div>
          </div>
        </Section>

      </div>

      {/* EXPORT TOAST */}
      {toast && (
        <div style={{position:'absolute',right:'var(--space-6)',bottom:'var(--space-6)',zIndex:60}} onClick={()=>setToast(false)}>
          <Toast variant="success" title="Exported 6 rows" body="Filtered matrix saved as CSV."/>
        </div>
      )}
    </Shell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
