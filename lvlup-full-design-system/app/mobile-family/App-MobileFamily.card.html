<!-- @dsCard group="App-MobileFamily" viewport="390x844" name="Mobile Family — App" subtitle="Interactive SPA · hash-routed · learner + parent" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Family — App</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  /* ============ App-MobileFamily shell — LAYOUT ONLY, Lyceum vars only, zero hex ============ */
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg-canvas); color: var(--text-primary); font-family: var(--font-ui);
         display: flex; align-items: center; justify-content: center; }
  #root { height: 100%; width: 100%; }

  .mf-app { height: 100%; width: 100%; max-width: 390px; margin: 0 auto; display: flex; flex-direction: column;
            background: var(--bg-canvas); position: relative; overflow: hidden; }

  /* ---- top bar ---- */
  .mf-topbar { flex: 0 0 auto; height: 56px; display: flex; align-items: center; gap: var(--space-2);
               padding: 0 var(--space-4); background: var(--bg-surface); border-bottom: 1px solid var(--border-subtle); }
  .mf-topbar__title { font-family: var(--font-display); font-weight: var(--weight-semibold); font-size: var(--text-lg);
                      margin: 0; flex: 1 1 auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mf-topbar__spark { display: inline-flex; align-items: center; gap: 3px; font-family: var(--font-mono);
                      font-size: var(--text-xs); color: var(--spark); font-weight: var(--weight-semibold); margin-right: var(--space-1); }
  .mf-iconbtn { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px;
                border-radius: var(--radius-md); border: none; background: transparent; color: var(--text-secondary);
                cursor: pointer; position: relative; }
  .mf-iconbtn:hover { background: var(--bg-surface-sunken); color: var(--text-primary); }
  .mf-iconbtn__dot { position: absolute; top: 7px; right: 8px; width: 8px; height: 8px; border-radius: var(--radius-pill);
                     background: var(--status-error); border: 2px solid var(--bg-surface); }
  .mf-childchip { display: inline-flex; align-items: center; gap: var(--space-1); padding: 3px 8px 3px 3px;
                  border-radius: var(--radius-pill); border: 1px solid var(--border-subtle); background: var(--bg-surface-sunken);
                  font-size: var(--text-xs); font-weight: var(--weight-medium); color: var(--text-primary); cursor: pointer;
                  margin-right: var(--space-1); font-family: var(--font-ui); }

  /* ---- main scroll region ---- */
  .mf-main { flex: 1 1 auto; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  .mf-main--full { flex: 1 1 auto; overflow-y: auto; overflow-x: hidden; }
  .mf-view { padding: var(--space-4) var(--space-4) var(--space-12); display: flex; flex-direction: column;
             gap: var(--space-5); min-height: 100%; box-sizing: border-box; width: 100%; }
  .mf-view * { box-sizing: border-box; }

  /* ---- bottom tab bar ---- */
  .mf-tabbar { flex: 0 0 auto; display: flex; background: var(--bg-surface); border-top: 1px solid var(--border-subtle);
               padding: var(--space-1) var(--space-1) calc(var(--space-2) + env(safe-area-inset-bottom)); }
  .mf-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: var(--space-1) 0;
            background: none; border: none; color: var(--text-muted); font-size: var(--text-2xs);
            font-weight: var(--weight-medium); font-family: var(--font-ui); cursor: pointer; }
  .mf-tab svg { width: 22px; height: 22px; stroke-width: 2; }
  .mf-tab[aria-current="page"] { color: var(--brand-primary); }

  /* ---- role / child sheets ---- */
  .mf-sheet { display: flex; flex-direction: column; gap: var(--space-3); }
  .mf-roleopt { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-4);
                border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); background: var(--bg-surface);
                cursor: pointer; text-align: left; width: 100%; font-family: var(--font-ui); color: var(--text-primary); }
  .mf-roleopt[aria-current="true"] { border-color: var(--brand-primary); background: var(--brand-subtle); }
  .mf-roleopt__icon { width: 40px; height: 40px; flex: 0 0 auto; border-radius: var(--radius-md); display: flex;
                      align-items: center; justify-content: center; background: var(--brand-subtle); color: var(--brand-primary); }
  .mf-roleopt__t { font-weight: var(--weight-semibold); font-size: var(--text-base); }
  .mf-roleopt__s { font-size: var(--text-xs); color: var(--text-muted); }

  /* ---- FAB (learner tutor) ---- */
  .mf-fab { position: absolute; right: var(--space-4); bottom: calc(76px + env(safe-area-inset-bottom)); width: 52px; height: 52px;
            border-radius: var(--radius-pill); background: var(--brand-primary); color: var(--text-on-accent); border: none;
            display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-e2); cursor: pointer; z-index: 20; }

  /* ---- not-found stub ---- */
  .mf-notfound { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-4);
                 padding: var(--space-12) var(--space-6); text-align: center; min-height: 60%; color: var(--text-secondary); }
  .mf-notfound h2 { font-family: var(--font-display); margin: 0; color: var(--text-primary); }

  /* ============ injected per-view scoped CSS below ============ */
  /* ===== achievements ===== */
/* achievements — mobile-scoped (shell frame dropped, single-column reflow) */

[data-view="achievements"] .ach { display: flex; flex-direction: column; gap: var(--space-6); max-width: 100%; }

/* ---- header row ---- */
[data-view="achievements"] .ach-head { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-6); flex-wrap: wrap; }
[data-view="achievements"] .ach-head__title { font-family: var(--font-display); font-size: var(--text-3xl); line-height: var(--leading-3xl); font-weight: var(--weight-semibold); margin: 0; letter-spacing: var(--tracking-display); }
[data-view="achievements"] .ach-head__sub { color: var(--text-secondary); font-size: var(--text-base); margin-top: var(--space-1); }
[data-view="achievements"] .ach-head__sub .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
[data-view="achievements"] .ach-head__new { color: var(--spark-hover); font-weight: var(--weight-semibold); }

[data-view="achievements"] .ach-back { all: unset; cursor: pointer; display: inline-flex; align-items: center; gap: var(--space-1); font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-secondary); margin-bottom: var(--space-2); }
[data-view="achievements"] .ach-back:focus-visible { outline: none; box-shadow: var(--ring-focus); border-radius: var(--radius-sm); }

[data-view="achievements"] .level-strip { display: flex; align-items: center; gap: var(--space-4); background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--shadow-e1); padding: var(--space-4) var(--space-5); }
[data-view="achievements"] .level-strip__xp { min-width: 200px; }
[data-view="achievements"] .level-strip__sep { width: 1px; align-self: stretch; background: var(--border-subtle); }

/* ---- chip filter ---- */
[data-view="achievements"] .ach-chips { display: flex; flex-wrap: wrap; gap: var(--space-2); }
[data-view="achievements"] .ach-chips button { all: unset; cursor: pointer; }
[data-view="achievements"] .ach-chips button:focus-visible { outline: none; box-shadow: var(--ring-focus); border-radius: var(--radius-pill); }
[data-view="achievements"] .chip-count { font-family: var(--font-mono); font-variant-numeric: tabular-nums; opacity: 0.85; margin-left: 4px; }

/* ---- badge grid ---- */
[data-view="achievements"] .ach-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4); }

[data-view="achievements"] .badge-card { position: relative; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--shadow-e1); padding: var(--space-5) var(--space-4) var(--space-4); display: flex; flex-direction: column; align-items: center; gap: var(--space-3); text-align: center; cursor: pointer; transition: box-shadow var(--dur-fast) var(--ease-standard), transform var(--dur-fast) var(--ease-standard); width: 100%; }
[data-view="achievements"] .badge-card:hover { box-shadow: var(--shadow-e2); transform: translateY(-2px); }
[data-view="achievements"] .badge-card:focus-visible { outline: none; box-shadow: var(--ring-focus); }
[data-view="achievements"] .badge-card--new { border-color: var(--spark); box-shadow: var(--glow-spark); }

[data-view="achievements"] .badge-card__new-dot { position: absolute; top: var(--space-3); right: var(--space-3); display: inline-flex; align-items: center; gap: 4px; font-size: var(--text-2xs); font-weight: var(--weight-semibold); letter-spacing: 0.06em; text-transform: uppercase; color: var(--spark-hover); background: var(--spark-subtle); border-radius: var(--radius-pill); padding: 2px var(--space-2); }
[data-view="achievements"] .badge-card__title { font-family: var(--font-display); font-size: var(--text-lg); font-weight: var(--weight-semibold); margin: 0; line-height: var(--leading-lg); }
[data-view="achievements"] .badge-card__labels { display: flex; gap: var(--space-2); flex-wrap: wrap; justify-content: center; }
[data-view="achievements"] .badge-card__date { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); font-variant-numeric: tabular-nums; }
[data-view="achievements"] .badge-card__prog { width: 100%; display: flex; flex-direction: column; gap: var(--space-2); margin-top: auto; }
[data-view="achievements"] .badge-card__prog-num { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-secondary); font-variant-numeric: tabular-nums; display: flex; align-items: center; justify-content: space-between; }
[data-view="achievements"] .badge-card__remain { font-size: var(--text-sm); color: var(--text-secondary); }
[data-view="achievements"] .badge-card__remain strong { color: var(--text-primary); font-weight: var(--weight-semibold); }
[data-view="achievements"] .badge-card__remain--indet { font-family: var(--font-mono); }

/* override the medal grayscale on hover for locked = still subtle, keep label readable */
[data-view="achievements"] .badge-card .achievement { width: auto; gap: 0; }

/* spark celebration burst */
[data-view="achievements"] .burst { position: absolute; inset: 0; pointer-events: none; display: grid; place-items: center; overflow: visible; }
[data-view="achievements"] .burst__spark { position: absolute; width: 8px; height: 8px; border-radius: 50%; background: var(--spark); opacity: 0; }
@keyframes achievements-burstOut { 0% { transform: translate(0,0) scale(0.4); opacity: 1; } 100% { transform: translate(var(--bx), var(--by)) scale(0); opacity: 0; } }
@keyframes achievements-medalPop { 0% { transform: scale(0.8); } 55% { transform: scale(1.14); } 100% { transform: scale(1); } }
[data-view="achievements"] .burst--on .burst__spark { animation: achievements-burstOut var(--dur-slow) var(--ease-exit) forwards; }
[data-view="achievements"] .badge-card--popping .badge-card__medal { animation: achievements-medalPop var(--dur-base) var(--ease-entrance); }

/* state band scaffolding */
[data-view="achievements"] .eyebrow-state { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.02em; margin-bottom: var(--space-3); display: flex; align-items: center; gap: var(--space-2); }
[data-view="achievements"] .state-band { border: 1px dashed var(--border-strong); border-radius: var(--radius-lg); padding: var(--space-4); background: var(--bg-surface); }
[data-view="achievements"] .state-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }

[data-view="achievements"] .skel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4); }
[data-view="achievements"] .skel-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: var(--space-5) var(--space-4); display: flex; flex-direction: column; align-items: center; gap: var(--space-3); }

/* detail popover — scrim reuses .modal-scrim (token-correct background) */
[data-view="achievements"] .ach-detail { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); box-shadow: var(--shadow-e3); width: min(480px, 92%); padding: var(--space-6); position: relative; }
[data-view="achievements"] .ach-detail__close { position: absolute; top: var(--space-3); right: var(--space-3); }
[data-view="achievements"] .ach-detail__head { display: flex; gap: var(--space-4); align-items: center; margin-bottom: var(--space-4); }
[data-view="achievements"] .ach-detail__title { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: var(--weight-semibold); margin: 0; }
[data-view="achievements"] .ach-detail__crit { background: var(--bg-surface-sunken); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); font-size: var(--text-sm); color: var(--text-secondary); }
[data-view="achievements"] .ach-detail__crit strong { color: var(--text-primary); }
[data-view="achievements"] .ach-detail__row { display: flex; gap: var(--space-2); flex-wrap: wrap; margin: var(--space-4) 0; }

[data-view="achievements"] .divider { height: 1px; background: var(--border-subtle); border: none; margin: var(--space-3) 0; }
[data-view="achievements"] .u-mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

[data-view="achievements"] .live-region { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }

@media (prefers-reduced-motion: reduce) {
  [data-view="achievements"] .badge-card, [data-view="achievements"] .badge-card .achievement { transition: none !important; }
  [data-view="achievements"] .burst--on .burst__spark, [data-view="achievements"] .badge-card--popping .badge-card__medal { animation: none !important; }
  [data-view="achievements"] .badge-card--new .badge-card__medal { box-shadow: var(--glow-spark); border-radius: 50%; }
}

/* ---------- mobile overrides (390px single-column) ---------- */
[data-view="achievements"] .ach-grid { grid-template-columns: repeat(2, 1fr) !important; gap: var(--space-3); }
[data-view="achievements"] .skel-grid { grid-template-columns: repeat(2, 1fr) !important; gap: var(--space-3); }
[data-view="achievements"] .state-grid-2 { grid-template-columns: 1fr !important; }
[data-view="achievements"] .ach-head { flex-direction: column; gap: var(--space-4); }
[data-view="achievements"] .level-strip { width: 100%; flex-wrap: wrap; }
[data-view="achievements"] .level-strip__xp { min-width: 0; flex: 1; }
[data-view="achievements"] .ach-chips { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
[data-view="achievements"] .ach-detail { width: min(480px, 92%); padding: var(--space-5); }

  /* ===== ai-tutor-chat ===== */
/* ---- full chat page two-column layout --------------------------------- */
[data-view="ai-tutor-chat"] .tc-page { display: grid; grid-template-columns: 280px 1fr; gap: var(--space-6); height: 100%; }
[data-view="ai-tutor-chat"] .tc-rail { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
  display: flex; flex-direction: column; overflow: hidden; }
[data-view="ai-tutor-chat"] .tc-rail__head { padding: var(--space-4) var(--space-4) var(--space-3); display: flex; flex-direction: column; gap: var(--space-3);
  border-bottom: 1px solid var(--border-subtle); }
[data-view="ai-tutor-chat"] .tc-rail__title { font-family: var(--font-display); font-weight: var(--weight-semibold); font-size: var(--text-lg); margin: 0; }
[data-view="ai-tutor-chat"] .tc-rail__list { padding: var(--space-2); display: flex; flex-direction: column; gap: var(--space-1); overflow-y: auto; flex: 1; }
[data-view="ai-tutor-chat"] .tc-srow { text-align: left; width: 100%; background: var(--bg-surface); border: 1px solid transparent;
  border-left: 3px solid transparent; border-radius: var(--radius-md); padding: var(--space-3); cursor: pointer;
  display: flex; flex-direction: column; gap: var(--space-1); font-family: var(--font-ui);
  transition: background-color var(--dur-fast) var(--ease-standard), border-color var(--dur-fast) var(--ease-standard); }
[data-view="ai-tutor-chat"] .tc-srow:hover { background: var(--bg-surface-sunken); }
[data-view="ai-tutor-chat"] .tc-srow[data-active="true"] { background: var(--brand-subtle); border-left-color: var(--brand-primary); }
[data-view="ai-tutor-chat"] .tc-srow__top { display: flex; align-items: center; justify-content: space-between; gap: var(--space-2); }
[data-view="ai-tutor-chat"] .tc-srow__name { font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--text-primary); }
[data-view="ai-tutor-chat"] .tc-srow__preview { font-size: var(--text-xs); color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
[data-view="ai-tutor-chat"] .tc-srow__meta { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); }

[data-view="ai-tutor-chat"] .tc-conv { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
  display: flex; flex-direction: column; overflow: hidden; max-width: 100%; }
[data-view="ai-tutor-chat"] .tc-conv__head { padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--border-subtle);
  display: flex; flex-direction: column; gap: var(--space-3); }
[data-view="ai-tutor-chat"] .tc-conv__headrow { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); }
[data-view="ai-tutor-chat"] .tc-conv__h1 { font-family: var(--font-display); font-weight: var(--weight-semibold); font-size: var(--text-xl); margin: 0; }
[data-view="ai-tutor-chat"] .tc-conv__ctx { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
[data-view="ai-tutor-chat"] .tc-thread { flex: 1; overflow-y: auto; padding: var(--space-5); display: flex; flex-direction: column; gap: var(--space-3); }
[data-view="ai-tutor-chat"] .tc-composer { border-top: 1px solid var(--border-subtle); padding: var(--space-3) var(--space-4) var(--space-4);
  display: flex; flex-direction: column; gap: var(--space-2); }
[data-view="ai-tutor-chat"] .tc-composer__row { display: flex; align-items: flex-end; gap: var(--space-2); }
[data-view="ai-tutor-chat"] .tc-composer__row .textarea { flex: 1; resize: none; min-height: 44px; }
[data-view="ai-tutor-chat"] .tc-helper { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs); color: var(--text-muted); }
[data-view="ai-tutor-chat"] .tc-helper svg { width: 14px; height: 14px; }

/* ---- bubbles / thread bits -------------------------------------------- */
[data-view="ai-tutor-chat"] .tc-turn { display: flex; gap: var(--space-2); align-items: flex-end; }
[data-view="ai-tutor-chat"] .tc-turn--tutor { justify-content: flex-start; }
[data-view="ai-tutor-chat"] .tc-turn--user { justify-content: flex-end; }
[data-view="ai-tutor-chat"] .tc-botglyph { width: 30px; height: 30px; border-radius: var(--radius-pill); background: var(--brand-subtle);
  color: var(--brand-primary); display: grid; place-items: center; flex: 0 0 auto; }
[data-view="ai-tutor-chat"] .tc-botglyph svg { width: 17px; height: 17px; }
[data-view="ai-tutor-chat"] .tc-bubblewrap { max-width: 78%; display: flex; flex-direction: column; }
[data-view="ai-tutor-chat"] .tc-bubblewrap--user { align-items: flex-end; }
[data-view="ai-tutor-chat"] .tc-bubble-err { border-left: 3px solid var(--status-error); padding-left: var(--space-3); }
[data-view="ai-tutor-chat"] .tc-retry { display: flex; align-items: center; gap: var(--space-1); margin-top: var(--space-1);
  font-size: var(--text-xs); color: var(--status-error); background: none; border: none; cursor: pointer;
  font-family: var(--font-ui); padding: 0; }
[data-view="ai-tutor-chat"] .tc-retry svg { width: 13px; height: 13px; }

/* ---- StreamingDots (reduced-motion aware) ----------------------------- */
[data-view="ai-tutor-chat"] .tc-dots { display: inline-flex; align-items: center; gap: 5px; padding: var(--space-3) var(--space-4); }
[data-view="ai-tutor-chat"] .tc-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
  animation: ai-tutor-chat-tc-bounce 1.2s var(--ease-standard) infinite; }
[data-view="ai-tutor-chat"] .tc-dots span:nth-child(2) { animation-delay: .18s; }
[data-view="ai-tutor-chat"] .tc-dots span:nth-child(3) { animation-delay: .36s; }
[data-view="ai-tutor-chat"] .tc-thinking-text { display: none; font-size: var(--text-sm); color: var(--text-secondary); padding: var(--space-3) var(--space-4); }
@keyframes ai-tutor-chat-tc-bounce { 0%,80%,100% { opacity:.3; transform: translateY(0); } 40% { opacity:1; transform: translateY(-3px); } }
@media (prefers-reduced-motion: reduce) {
  [data-view="ai-tutor-chat"] .tc-dots { display: none; }
  [data-view="ai-tutor-chat"] .tc-thinking-text { display: block; }
  [data-view="ai-tutor-chat"] .tc-panel { animation: none !important; }
}

[data-view="ai-tutor-chat"] .tc-newreply { align-self: center; display: inline-flex; align-items: center; gap: var(--space-1);
  background: var(--bg-surface); border: 1px solid var(--border-strong); border-radius: var(--radius-pill);
  padding: var(--space-1) var(--space-3); font-size: var(--text-xs); color: var(--text-secondary);
  cursor: pointer; box-shadow: var(--shadow-e1); font-family: var(--font-ui); }
[data-view="ai-tutor-chat"] .tc-newreply svg { width: 13px; height: 13px; }

[data-view="ai-tutor-chat"] .tc-starter { display: flex; flex-wrap: wrap; gap: var(--space-2); justify-content: center; margin-top: var(--space-4); }
[data-view="ai-tutor-chat"] .tc-starter button { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-pill);
  padding: var(--space-2) var(--space-4); font-size: var(--text-sm); color: var(--text-secondary); cursor: pointer;
  font-family: var(--font-ui); transition: border-color var(--dur-fast) var(--ease-standard); }

[data-view="consumer-profile"] .stat-ic { display: grid; place-items: center; width: 28px; height: 28px; border-radius: var(--radius-md); background: var(--brand-subtle); color: var(--brand-primary); flex: 0 0 auto; }
[data-view="consumer-profile"] .stat-ic--spark { background: var(--spark-subtle); color: var(--spark); }
[data-view="consumer-profile"] .stat-lab { font-size: var(--text-sm); font-weight: var(--weight-medium); }
[data-view="consumer-profile"] .stat-big { font-family: var(--font-mono); font-size: var(--text-3xl); line-height: 1.1; font-weight: var(--weight-semibold); }
[data-view="consumer-profile"] .stat-sub { font-size: var(--text-2xs); color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

/* RECEIPTS — sort control + total row */

[data-view="consumer-profile"] .receipt-total { margin-top: var(--space-3); padding: var(--space-3) var(--space-4); background: var(--bg-surface-sunken); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); font-size: var(--text-sm); color: var(--text-secondary); text-align: right; }
[data-view="consumer-profile"] .mono { font-family: var(--font-mono); }
[data-view="consumer-profile"] .num-cell { font-family: var(--font-mono); font-weight: var(--weight-medium); color: var(--text-primary); }
[data-view="consumer-profile"] .sort-th { background: none; border: none; padding: 0; margin: 0; font: inherit; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; font-size: var(--text-2xs); font-weight: var(--weight-semibold); cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
[data-view="consumer-profile"] .sort-th:focus-visible { outline: none; box-shadow: var(--ring-focus); border-radius: var(--radius-sm); }
[data-view="consumer-profile"] .sort-chev { display: inline-flex; transition: transform var(--dur-fast) var(--ease-standard); color: var(--text-secondary); }
[data-view="consumer-profile"] .sort-chev.desc { transform: rotate(0deg); } [data-view="consumer-profile"] .sort-chev.asc { transform: rotate(180deg); }
[data-view="consumer-profile"] .txn-id { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-secondary); }
[data-view="consumer-profile"] .copy-btn { background: none; border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); width: 26px; height: 26px; display: grid; place-items: center; cursor: pointer; color: var(--text-muted); transition: color var(--dur-fast) var(--ease-standard), border-color var(--dur-fast) var(--ease-standard); }
[data-view="consumer-profile"] .copy-btn:hover { color: var(--brand-primary); border-color: var(--border-strong); }
[data-view="consumer-profile"] .copy-btn:focus-visible { outline: none; box-shadow: var(--ring-focus); }
[data-view="consumer-profile"] .open-link { display: inline-flex; align-items: center; gap: 4px; color: var(--brand-primary); font-weight: var(--weight-medium); text-decoration: none; font-size: var(--text-sm); }
[data-view="consumer-profile"] .open-link:hover { text-decoration: underline; }
[data-view="consumer-profile"] .open-link.disabled { color: var(--text-muted); pointer-events: none; }

/* JOIN-A-SCHOOL panel — stacks on phone */
[data-view="consumer-profile"] .join { border: 1px dashed var(--border-strong); border-radius: var(--radius-lg); background: var(--bg-surface); padding: var(--space-5) var(--space-6); display: flex; flex-direction: column; align-items: stretch; gap: var(--space-4); }
[data-view="consumer-profile"] .join-ic { display: grid; place-items: center; width: 44px; height: 44px; border-radius: var(--radius-md); background: var(--brand-subtle); color: var(--brand-primary); flex: 0 0 auto; }

/* DANGER zone — rows stack on phone */

[data-view="consumer-profile"] .danger__row { display: flex; flex-direction: column; align-items: stretch; gap: var(--space-3); padding: var(--space-4) var(--space-6); }
[data-view="consumer-profile"] .danger__row + .danger__row { border-top: 1px solid var(--border-subtle); }
[data-view="consumer-profile"] .danger__label { font-weight: var(--weight-semibold); font-size: var(--text-sm); }
[data-view="consumer-profile"] .danger__hint { color: var(--text-muted); font-size: var(--text-xs); margin-top: 2px; }

/* state preview scaffolding */
[data-view="consumer-profile"] .eyebrow-state { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.02em; margin-bottom: var(--space-3); display: flex; align-items: center; gap: var(--space-2); }
[data-view="consumer-profile"] .state-band { border: 1px dashed var(--border-strong); border-radius: var(--radius-lg); padding: var(--space-5); background: var(--bg-surface-sunken); }

/* skeleton helpers — collapse on phone */

[data-view="consumer-profile"] .skel-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: var(--space-5); display: flex; flex-direction: column; gap: var(--space-3); }
[data-view="consumer-profile"] .skel-row { display: flex; gap: var(--space-4); align-items: center; padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border-subtle); }

/* mobile receipt cards (stacked list) */
[data-view="consumer-profile"] .mreceipts { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: var(--space-3); max-width: 100%; }
[data-view="consumer-profile"] .mreceipt { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); box-shadow: var(--shadow-e1); padding: var(--space-4); }

[data-view="consumer-profile"] .mreceipt__kv { display: flex; justify-content: space-between; gap: var(--space-3); margin-top: var(--space-2); font-size: var(--text-xs); color: var(--text-secondary); }
[data-view="consumer-profile"] .mreceipt__foot { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); margin-top: var(--space-3); padding-top: var(--space-3); border-top: 1px solid var(--border-subtle); }

[data-view="consumer-profile"] .confirm-typed { margin-top: var(--space-4); }

/* toast (in-view, top-right of the phone column) */
[data-view="consumer-profile"] .mf-toast { position: fixed; right: var(--space-4); top: var(--space-4); z-index: 50; width: min(360px, calc(100vw - var(--space-8))); }

@media (prefers-reduced-motion: reduce) {
  [data-view="consumer-profile"] .enter { animation: none !important; opacity: 1 !important; transform: none !important; }
  [data-view="consumer-profile"] .sort-chev, [data-view="consumer-profile"] .copy-btn, [data-view="consumer-profile"] .open-link { transition: none !important; }
}

  /* ===== exam-results-view ===== */
[data-view="exam-results-view"] .stage { padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-6); }
[data-view="exam-results-view"] .eyebrow { font-family: var(--font-mono); font-size: var(--text-2xs); letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--space-2); }
[data-view="exam-results-view"] .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }

/* mobile topbar */

[data-view="exam-results-view"] .tb-back { display: inline-flex; align-items: center; gap: var(--space-2); padding: var(--space-1) var(--space-3);

/* ── VERDICT HERO ── */

[data-view="exam-results-view"] .hero__row { display: flex; align-items: center; justify-content: center; gap: var(--space-5);
  flex-wrap: wrap; margin-bottom: var(--space-4); }
[data-view="exam-results-view"] .hero__ringwrap { display: flex; align-items: center; gap: var(--space-4); }
[data-view="exam-results-view"] .hero__ring { --ring-size: 132px; }
[data-view="exam-results-view"] .hero__ring .ring__label { font-size: var(--text-3xl); font-family: var(--font-mono);
  font-weight: var(--weight-semibold); color: var(--text-primary); }
[data-view="exam-results-view"] .hero__verdict { display: flex; flex-direction: column; align-items: flex-start; gap: var(--space-3);
  text-align: left; max-width: 100%; }
[data-view="exam-results-view"] .hero__h2 { font-family: var(--font-display); font-size: var(--text-2xl); line-height: var(--leading-2xl);
  font-weight: var(--weight-semibold); margin: 0; }
[data-view="exam-results-view"] .hero__marks { font-family: var(--font-mono); font-size: var(--text-base); color: var(--text-secondary); }
[data-view="exam-results-view"] .hero__marks .div { color: var(--border-strong); margin: 0 var(--space-2); }
[data-view="exam-results-view"] .hero__sub { font-size: var(--text-sm); color: var(--text-muted); }
[data-view="exam-results-view"] .hero__cta { display: flex; align-items: center; justify-content: center; gap: var(--space-3);

/* dignified count-up — NOT a celebration (no burst on this surface) */

@keyframes exam-results-view-fade-in {

  100% { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) { [data-view="exam-results-view"] .fade-in { animation: none; } }

/* ── per-question review ── */
[data-view="exam-results-view"] .qhead { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); width: 100%; }
[data-view="exam-results-view"] .qhead__left { display: flex; align-items: center; gap: var(--space-3); min-width: 0; flex-wrap: wrap; }

  font-family: var(--font-mono); color: var(--text-muted); }
[data-view="exam-results-view"] .scan__thumb { position: relative; border: 1px solid var(--border-subtle); border-radius: var(--radius-md);
  background: var(--bg-surface-sunken); overflow: hidden; cursor: zoom-in; padding: 0; display: block;
  width: 100%; }
[data-view="exam-results-view"] .scan__thumb:hover { border-color: var(--border-strong); }

[data-view="exam-results-view"] .scan__paper { aspect-ratio: 4 / 3; background:

[data-view="exam-results-view"] .scan__ink { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--ink-900); }

[data-view="exam-results-view"] .grow-lbl { font-size: var(--text-xs); color: var(--text-secondary); }

[data-view="exam-results-view"] .override-row { display: inline-flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md); background: var(--brand-subtle); color: var(--brand-primary);
  font-size: var(--text-xs); font-weight: var(--weight-semibold); }

/* footer actions */
[data-view="exam-results-view"] .footer-actions { display: flex; gap: var(--space-3); flex-wrap: wrap; justify-content: center;
  padding-top: var(--space-2); }

/* lightbox image */

[data-view="exam-results-view"] .lb__paper { aspect-ratio: 3 / 4; max-height: 520px; background:

[data-view="exam-results-view"] .tiles { grid-template-columns: 1fr !important; }

[data-view="exam-results-view"] .hero__row { flex-direction: column; }

  /* ===== gamification-xp-streaks ===== */

          )}
          <span className="goalcard__num-line">
            <strong>{g.currentCount}</strong> of <strong>{g.targetCount}</strong> {meta.unit} done
          </span>
        </div>

        <div className="goalcard__menu ddmenu-wrap">
          <IconButton size="sm" icon={<Icon name="more-horizontal" size={18}/>}
            label={"Options for " + g.title}
            aria-haspopup="menu" aria-expanded={menu}
            onClick={() => setMenu(m => !m)}/>
          {menu && (
            <div className="ddmenu" role="menu" onMouseLeave={() => setMenu(false)}>
              <button className="ddmenu__item" role="menuitem" onClick={() => { setMenu(false); onEdit(g); }}>
                <Icon name="pencil" size={15}/> Edit goal
              </button>
              <button className="ddmenu__item ddmenu__item--danger" role="menuitem" onClick={() => { setMenu(false); onRemove(g); }}>
                <Icon name="trash-2" size={15}/> Remove
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ============ HEATMAP ============ */
  function Heatmap() {
    const [pop, setPop] = useState(null);
    const dows = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
    return (
      <div className="heatmap" style={{ position: "relative" }}>
        <div className="heatmap__weeks">
          {HEAT.map((week, wi) => (
            <div className="heatmap__week" key={wi}>
              {week.map((lvl, di) => {
                const min = HEAT_MIN[lvl];
                const label = dows[di] + " wk" + (wi+1) + " — " + (min ? min + " minutes studied" : "no study logged");
                return (
                  <div key={di} tabIndex={0} className={"heatcell heatcell--l" + lvl}
                    role="img" aria-label={label}
                    onMouseEnter={(e) => { const r = e.currentTarget.getBoundingClientRect(); setPop({ x: r.left + r.width/2, y: r.top, min, dow: dows[di], wi }); }}
                    onFocus={(e) => { const r = e.currentTarget.getBoundingClientRect(); setPop({ x: r.left + r.width/2, y: r.top, min, dow: dows[di], wi }); }}
                    onMouseLeave={() => setPop(null)}
                    onBlur={() => setPop(null)}/>
                );
              })}
            </div>
          ))}
        </div>
        <div className="heatmap__legend">
          Less
          <span className="heatmap__legend-swatch heatcell--l0"/>
          <span className="heatmap__legend-swatch heatcell--l1"/>
          <span className="heatmap__legend-swatch heatcell--l2"/>
          <span className="heatmap__legend-swatch heatcell--l3"/>
          More
        </div>
        {pop && (
          <div className="heatpop" style={{ left: pop.x, top: pop.y, position: "fixed" }} role="status">
            {pop.dow} · {pop.min ? <span className="mono">{pop.min} min studied</span> : "No study logged"}
          </div>
        )}
        <div className="streakline">
          <span className="streakline__flame"><Icon name="flame" size={18}/></span>
          You studied <strong style={{ margin: "0 4px" }}>6 of the last 7 days</strong> — keep the spark going.
        </div>
      </div>
    );
  }

  /* ============ SESSIONS TIMELINE ============ */
  function SessionTimeline() {
    return (
      <Timeline items={SESSIONS.map(s => ({
        time: s.date,
        variant: s.variant,
        label: (
          <div className="sessrow">
            <div className="sessrow__head">
              <span style={{ fontWeight: "var(--weight-semibold)", color: "var(--text-primary)" }}>{s.time}</span>
              <span className="sessmeta">
                <strong className="mono">{s.min} min</strong> · {s.items} items · {s.pts} pts
              </span>
            </div>
            <div className="sesssub">{s.spaces}</div>
          </div>
        ),
      }))}/>

  /* ============ CREATE / EDIT MODAL ============ */
  function GoalModal({ open, mode, initial, onClose, onSave }) {
    const [title, setTitle] = useState("");
    const [type, setType] = useState("spaces");
    const [count, setCount] = useState("");
    const [endDate, setEndDate] = useState("");
    const [errors, setErrors] = useState({});

    useEffect(() => {
      if (open) {
        setTitle(initial ? initial.title : "");
        setType(initial ? initial.targetType : "spaces");
        setCount(initial ? String(initial.targetCount) : "");
        setEndDate(initial ? initial.endDate : "");
        setErrors({});
      }
    }, [open, initial]);

    const today = "2026-06-20";
    const submit = () => {
      const e = {};
      if (!title.trim()) e.title = "Give your goal a name.";
      if (!count || Number(count) < 1) e.count = "Aim for at least 1.";
      if (!endDate) e.date = "Pick a date in the future.";
      else if (endDate < today) e.date = "Pick a date in the future.";
      setErrors(e);
      if (Object.keys(e).length) return;
      onSave({ title: title.trim(), targetType: type, targetCount: Number(count), endDate });
    };

    return (
      <Modal open={open} onClose={onClose}
        title={mode === "edit" ? "Edit goal" : "Set a study goal"}
        footer={
          <React.Fragment>
            <Button variant="ghost" onClick={onClose}>Cancel</Button>
            <Button variant="spark" leadingIcon={<Icon name="target" size={15}/>} onClick={submit}>
              {mode === "edit" ? "Save changes" : "Set goal"}
            </Button>
          </React.Fragment>
        }>
        <div className="formgrid">
          <Field label="What are you aiming for?" required htmlFor="g-title" error={errors.title}>
            <Input id="g-title" value={title} error={!!errors.title}
              onChange={(e) => setTitle(e.target.value)}
              placeholder="e.g. Finish the Recursion space"
              aria-required="true" aria-describedby={errors.title ? "g-title-err" : undefined}/>
          </Field>

          <div className="form-row2">
            <Field label="Track by" required htmlFor="g-type"
              hint="Spaces, sections, items, exams, or study minutes.">
              <Select id="g-type" options={TYPE_OPTIONS} value={type}
                onChange={(e) => setType(e.target.value)} aria-required="true"/>
            </Field>
            <Field label="How many?" required htmlFor="g-count" error={errors.count}>
              <Input id="g-count" type="number" min="1" value={count} error={!!errors.count}
                onChange={(e) => setCount(e.target.value)} placeholder="e.g. 5"
                aria-required="true"/>
            </Field>
          </div>

          <div className="form-row2">
            <Field label="Starts" htmlFor="g-start" hint="Today — we start tracking now.">
              <span className="startchip" id="g-start">
                <Icon name="calendar-check" size={15}/> Thu, Jun 20
              </span>
            </Field>
            <Field label="By when?" required htmlFor="g-end" error={errors.date}>
              <Input id="g-end" type="date" min={today} value={endDate} error={!!errors.date}
                onChange={(e) => setEndDate(e.target.value)} aria-required="true"/>
            </Field>
          </div>
        </div>
      </Modal>
    );
  }

  /* ============ CONFIRM DELETE MODAL ============ */
  function ConfirmRemove({ open, goal, onClose, onConfirm }) {
    return (
      <Modal open={open} onClose={onClose} title="Remove this goal?"
        footer={
          <React.Fragment>
            <Button variant="ghost" onClick={onClose}>Keep it</Button>
            <Button variant="danger" leadingIcon={<Icon name="trash-2" size={15}/>} onClick={onConfirm}>Remove</Button>
          </React.Fragment>
        }>
        <p style={{ margin: 0, color: "var(--text-secondary)", fontSize: "var(--text-sm)", lineHeight: "var(--leading-sm)" }}>
          {goal ? <span><strong style={{ color: "var(--text-primary)" }}>“{goal.title}”</strong> will be removed from your planner. Your study history stays.</span> : null}
        </p>
      </Modal>
    );
  }

  /* ============ SECONDARY STATE BLOCKS ============ */

    return (
      <div className="state-band" role="status" aria-busy="true" aria-label="Loading your goals">
        <div className="eyebrow-state"><Icon name="loader" size={13}/> State: loading skeleton — no numbers until real data lands</div>
        <div className="rollup" style={{ marginBottom: "var(--space-5)" }}>
          {[0,1,2].map(i => (
            <div key={i} className="card-surface rollup-tile">
              <Skeleton variant="circle" width="44px" height="44px"/>
              <div style={{ flex: 1 }}>
                <Skeleton width="40%" height="1.6rem"/>
                <Skeleton width="60%" height="0.7rem" style={{ marginTop: 6 }}/>
              </div>
            </div>
          ))}
        </div>
        <div className="goalgrid">
          {[0,1].map(i => (
            <div key={i} className="card-surface skel-goal">
              <Skeleton variant="circle" width="92px" height="92px"/>
              <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 8 }}>
                <Skeleton width="70%" height="1.1rem"/>

                <Skeleton width="55%" height="0.8rem"/>
              </div>
            </div>
          ))}
        </div>
      </div>

  function EmptyGoalsState() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="inbox" size={13}/> State: empty (no goals) — history can still render; empty is per-region</div>
        <div className="card-surface" style={{ padding: "var(--space-6)" }}>
          <EmptyState icon="target"
            title="Set your first goal"
            body="Goals are yours to choose. Pick a target and a date — we'll track the rest while you learn."
            action={<Button variant="spark" leadingIcon={<Icon name="plus" size={15}/>}>Create a goal</Button>}/>
        </div>
      </div>
    );
  }
  function EmptyHistoryState() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="calendar-off" size={13}/> State: empty history — gentle, never an error (new learner)</div>
        <div className="card-surface" style={{ padding: "var(--space-5)" }}>
          <EmptyState icon="calendar"
            title="Your study days will show up here"
            body="Complete a few items and watch this fill in."/>
        </div>
      </div>
    );
  }
  function ErrorState() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="alert-triangle" size={13}/> State: error (goals read failed) — distinct from empty, retry + recovery</div>
        <Alert variant="error" title="Couldn’t load your goals">
          Something hiccuped on our end — your goals are safe.{" "}
          <a href="#" onClick={(e)=>e.preventDefault()} style={{ color: "var(--brand-primary)", fontWeight: "var(--weight-medium)" }}>Try again</a>
        </Alert>
      </div>
    );
  }
  function PartialState() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="git-pull-request-draft" size={13}/> State: partial — goals loaded, history region degrades alone (warning tone)</div>
        <Alert variant="warning" title="Couldn’t load your study history">
          Your goals above are up to date. We just couldn’t reach your study days.{" "}
          <a href="#" onClick={(e)=>e.preventDefault()} style={{ color: "var(--brand-primary)", fontWeight: "var(--weight-medium)" }}>Try again</a>
        </Alert>
      </div>
    );
  }
  function SavingState() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="loader" size={13}/> State: saving — optimistic insert, ring at 0/target while saveStudyGoal resolves</div>
        <div className="card-surface goalcard" style={{ maxWidth: "100%" }}>
          <div className="goalcard__ring-wrap">
            <div className="ring ringbig" role="img" aria-label="0 of 5 spaces · 0%" style={{ "--ring-pct": 0, "--ring-size": "92px" }}>
              <span className="ring__label"><span className="mono">0%</span></span>
            </div>
            <span className="goalcard__counts mono">0 / 5</span>
          </div>
          <div className="goalcard__body">
            <span className="goalcard__title">Finish the Graphs space</span>
            <div className="goalcard__meta">
              <Chip><Icon name="layout-grid" size={12}/> Spaces</Chip>
              <Badge variant="info" icon={<Icon name="loader" size={12}/>}>Saving…</Badge>
            </div>
            <span className="goalcard__num-line"><strong>0</strong> of <strong>5</strong> spaces done</span>
          </div>
        </div>
      </div>
    );
  }
  function PermissionState() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="user-round" size={13}/> State: role-gated — B2C consumer sees identical layout; “Exams” target hidden (no exam source)</div>
        <div className="card-surface" style={{ padding: "var(--space-4)", display: "flex", gap: "var(--space-3)", flexWrap: "wrap", alignItems: "center" }}>
          <span style={{ fontSize: "var(--text-sm)", color: "var(--text-secondary)" }}>Track-by options for this learner:</span>
          <Chip active><Icon name="layout-grid" size={12}/> Spaces</Chip>
          <Chip active><Icon name="git-branch" size={12}/> Sections</Chip>
          <Chip active><Icon name="list-checks" size={12}/> Items</Chip>
          <Chip active><Icon name="timer" size={12}/> Minutes</Chip>
          <Chip><Icon name="file-check" size={12}/> Exams · unavailable</Chip>
        </div>
      </div>
    );
  }
  function ReducedMotionState() {
    return (
      <div className="state-band">
        <div className="eyebrow-state"><Icon name="accessibility" size={13}/> State: reduced-motion goal-met — no burst, static spark badge + live text</div>
        <div className="card-surface" style={{ padding: "var(--space-4)", display: "flex", alignItems: "center", gap: "var(--space-3)" }}>
          <span className="milestone__check"><Icon name="check" size={18}/></span>
          <div>
            <div style={{ fontWeight: "var(--weight-semibold)" }}>Goal met! You set it, you crushed it.</div>
            <div className="u-caption" style={{ color: "var(--text-muted)" }}>Announced via aria-live, no particles. Ring snaps to 100%.</div>
          </div>
          <Badge variant="spark" icon={<Icon name="sparkles" size={12}/>} style={{ marginLeft: "auto" }}>Completed</Badge>
        </div>
      </div>

  /* ============ VIEW BODY ============ */
  function ViewBody(props){
    const nav = props.nav; const params = props.params || {}; const role = props.role;
    const child = props.child; const setChild = props.setChild;

    const [goals, setGoals] = useState(INITIAL_GOALS);
    const [filterDay, setFilterDay] = useState(null);     /* null | day num */
    const [modal, setModal] = useState({ open: false, mode: "create", initial: null });
    const [confirm, setConfirm] = useState({ open: false, goal: null });
    const [toast, setToast] = useState(null);
    const [insertedId, setInsertedId] = useState(null);
    const [celebrateId, setCelebrateId] = useState(null);
    const [announce, setAnnounce] = useState("");
    const toastTimer = useRef(null);

    const flashToast = useCallback((t) => {
      setToast(t);
      if (toastTimer.current) clearTimeout(toastTimer.current);
      toastTimer.current = setTimeout(() => setToast(null), 2600);
    }, []);

    const activeCount = goals.length;
    const dueThisWeek = goals.filter(g => g.proximity !== "error").length;

    /* week-strip due map: Fri=20 has goals g1; tomorrow(Jun21)=g3; Sun(22)=g2 */
    const dueByNum = { 20: ["g1"], 21: ["g3"], 22: ["g2"] };
    const filtered = filterDay == null ? goals
      : goals.filter(g => (dueByNum[filterDay] || []).includes(g.id));

    const openCreate = () => setModal({ open: true, mode: "create", initial: null });
    const openEdit = (g) => setModal({ open: true, mode: "edit", initial: g });

    const handleSave = (data) => {
      if (modal.mode === "edit") {
        setGoals(gs => gs.map(g => g.id === modal.initial.id ? { ...g, ...data } : g));
        flashToast({ variant: "success", title: "Goal updated." });
      } else {
        const id = "new-" + Date.now();
        const newGoal = { id, ...data, currentCount: 0, due: "soon", proximity: "info", linear: data.targetType === "minutes" };
        setGoals(gs => [newGoal, ...gs]);
        setInsertedId(id);
        setTimeout(() => setInsertedId(null), 700);
        flashToast({ variant: "success", title: "Goal set — you’ve got this." });
      }
      setModal({ open: false, mode: "create", initial: null });
    };

    const handleRemoveConfirm = () => {
      const g = confirm.goal;
      setGoals(gs => gs.filter(x => x.id !== g.id));
      setConfirm({ open: false, goal: null });
      flashToast({ variant: "info", title: "Goal removed." });
    };

    /* THE celebratory moment — simulate a server-driven false→true completion of g3 (18→20 items) */
    const fireCelebration = () => {
      setGoals(gs => gs.map(g => g.id === "g3" ? { ...g, currentCount: g.targetCount } : g));
      setCelebrateId("g3");
      setAnnounce("Goal met! You set it, you crushed it. Practice DSA items is complete.");
      flashToast({ variant: "success", title: "Goal met! 🎉 You set it, you crushed it." });
      setTimeout(() => setCelebrateId(null), 2000);
    };

    return (
      <div className="mf-view" data-view="goals">
        <div aria-live="polite" className="sr-only">{announce}</div>

        <div className="goals">
          {/* HEADER */}
          <header className="gh">
            <Button variant="ghost" size="sm" leadingIcon={<Icon name="arrow-left" size={15}/>} onClick={() => nav('#/learner/progress')}>Progress</Button>
            <div>
              <h1 className="gh__title">Your goals</h1>
              <p className="gh__sub">You set the pace.</p>
            </div>
            <Button variant="spark" leadingIcon={<Icon name="plus" size={16}/>} onClick={openCreate}>New goal</Button>
          </header>

          {/* STAT ROLLUP */}
          <div className="rollup">
            <div className="card-surface rollup-tile">
              <span className="rollup-tile__icon rollup-tile__icon--active"><Icon name="target" size={22}/></span>
              <div>
                <div className="rollup-tile__num">{activeCount}</div>
                <div className="rollup-tile__label">Active goals</div>
              </div>
            </div>
            <div className="card-surface rollup-tile">
              <span className="rollup-tile__icon rollup-tile__icon--due"><Icon name="calendar-clock" size={22}/></span>
              <div>
                <div className="rollup-tile__num">{dueThisWeek}</div>
                <div className="rollup-tile__label">Due this week</div>
              </div>
            </div>
            <div className="card-surface rollup-tile">
              <span className="rollup-tile__icon rollup-tile__icon--done"><Icon name="check-check" size={22}/></span>
              <div>
                <div className="rollup-tile__num">{COMPLETED.length + (celebrateId ? 1 : 0)}</div>
                <div className="rollup-tile__label">Completed</div>
              </div>
            </div>
          </div>

          {/* WEEK STRIP */}
          <div className="card-surface weekstrip">
            <div className="weekstrip__head">
              <span className="weekstrip__title">This week · tap a day to filter by due date</span>
              {filterDay != null && (
                <Button variant="ghost" size="sm" trailingIcon={<Icon name="x" size={14}/>}
                  onClick={() => setFilterDay(null)}>Clear filter</Button>
              )}
            </div>
            <div className="weekstrip__rail" role="group" aria-label="Week of June 16">
              {WEEK.map(d => (
                <button key={d.num}
                  className={"daycell" + (d.today ? " daycell--today" : "")}
                  aria-pressed={filterDay === d.num}
                  aria-label={d.dow + ", Jun " + d.num + (d.due ? " — " + d.due + " goal" + (d.due > 1 ? "s" : "") + " due" : " — no goals due") + (d.today ? ", today" : "")}
                  onClick={() => setFilterDay(filterDay === d.num ? null : (d.due ? d.num : d.num))}>
                  <span className="daycell__dow">{d.dow}</span>
                  <span className="daycell__num mono">{d.num}</span>
                  <span className="daycell__dots">
                    {Array.from({ length: d.due }, (_, i) => <span key={i} className="daycell__dot"/>)}
                  </span>
                  {d.today && <span className="daycell__you">◉ You</span>}
                </button>
              ))}
            </div>
          </div>

          {/* ACTIVE GOALS */}
          <section aria-labelledby="active-h">
            <div className="sec-head">
              <h2 className="sec-title" id="active-h">Active goals</h2>
              {filterDay != null && (
                <span className="u-caption" style={{ color: "var(--text-muted)", fontFamily: "var(--font-mono)" }}>
                  Filtered · due Jun {filterDay}
                </span>
              )}
            </div>
            {filtered.length ? (
              <div className="goalgrid">
                {filtered.map(g => (
                  <GoalCard key={g.id} g={g}
                    celebrating={celebrateId === g.id}
                    justInserted={insertedId === g.id}
                    onEdit={openEdit}
                    onRemove={(goal) => setConfirm({ open: true, goal })}/>
                ))}
              </div>
            ) : (
              <div className="card-surface" style={{ padding: "var(--space-5)" }}>
                <EmptyState icon="calendar-search"
                  title="No goals due that day"
                  body={"Nothing's due on Jun " + filterDay + " — pick another day or clear the filter."}
                  action={<Button variant="ghost" size="sm" onClick={() => setFilterDay(null)}>Clear filter</Button>}/>
              </div>
            )}
          </section>

          {/* STUDY HISTORY */}
          <section aria-labelledby="hist-h">
            <div className="sec-head">
              <h2 className="sec-title" id="hist-h">Study history</h2>
              <span className="u-caption" style={{ color: "var(--text-muted)", fontFamily: "var(--font-mono)" }}>last 8 weeks</span>
            </div>
            <div className="history">
              <div className="card-surface histcol">
                <div style={{ fontSize: "var(--text-sm)", fontWeight: "var(--weight-semibold)", color: "var(--text-secondary)", marginBottom: "var(--space-3)" }}>
                  Your study days
                </div>
                <Heatmap/>
              </div>
              <div className="card-surface histcol">
                <div style={{ fontSize: "var(--text-sm)", fontWeight: "var(--weight-semibold)", color: "var(--text-secondary)", marginBottom: "var(--space-4)" }}>
                  Recent sessions
                </div>
                <SessionTimeline/>
              </div>
            </div>
          </section>

          {/* COMPLETED GOALS */}
          <section aria-labelledby="done-h">
            <Accordion defaultOpen={-1} items={[{
              title: <span style={{ display: "inline-flex", alignItems: "center", gap: "var(--space-2)" }}>
                <Icon name="party-popper" size={16}/> Done and dusted · {COMPLETED.length} completed
              </span>,
              content: (
                <div style={{ paddingTop: "var(--space-2)" }}>
                  <div className="completed-grid">
                    {COMPLETED.map(c => (
                      <div className="milestone" key={c.id}>
                        <span className="milestone__check"><Icon name="check" size={16}/></span>
                        <span className="milestone__title">{c.title}</span>
                        <span className="milestone__when mono">{c.when}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{ marginTop: "var(--space-3)" }}>
                    <Button variant="ghost" size="sm" trailingIcon={<Icon name="arrow-right" size={14}/>}>See all</Button>
                  </div>
                </div>
              ),
            }]}/>
          </section>

          {/* DEMO: trigger the one celebratory moment (server-driven completion) */}
          <div style={{ display: "flex", gap: "var(--space-3)", flexWrap: "wrap", alignItems: "center" }}>
            <span className="eyebrow-state" style={{ margin: 0 }}>
              <Icon name="sparkles" size={13}/> The one celebratory moment (server flips completed false→true):
            </span>
            <Button variant="spark" size="sm" leadingIcon={<Icon name="party-popper" size={14}/>}
              onClick={fireCelebration}>Simulate goal completion</Button>
          </div>

          {/* SPEC'D SECONDARY STATES */}
          <section className="states" aria-label="Additional states">
            <LoadingState/>
            <div className="state-grid">
              <EmptyGoalsState/>
              <EmptyHistoryState/>
            </div>
            <div className="state-grid">
              <ErrorState/>
              <PartialState/>
            </div>
            <SavingState/>
            <PermissionState/>
            <ReducedMotionState/>
          </section>
        </div>

  const { Button, IconButton, Icon, Input, Textarea, Select, Checkbox, Radio, Switch, Slider, FileDrop, Field, Card, Section, Panel, Tabs, Accordion, Drawer, Modal, Popover, Tooltip, DataTable, DefinitionList, Stat, Timeline, EmptyState, Skeleton, Pagination, Avatar, AvatarGroup, Badge, Chip, ProgressBar, ProgressRing, Toast, Alert, LoadingOverlay, NavItem, Breadcrumb, Kbd, SpaceCard, StoryPointTrack, StoryPointNode, ContentRenderer, QuestionCard, TimerBar, ConfidenceBadge, GradePill, RubricBreakdown, ManualOverrideControl, SubmissionCard, ScanFrame, UploadQueueItem, XPMeter, StreakFlame, LevelBadge, LeaderboardRow, Achievement, AtRiskBadge, InsightCard, TutorChatBubble, AnswerKeyLock } = LU;

  function ViewBody(props){
    const nav = props.nav; const params = props.params || {}; const role = props.role;
    const child = props.child; const setChild = props.setChild;

    const [step,setStep]=useState('code');      // 'code' | 'creds'
    const [code,setCode]=useState('BHA-204');
    const [codeErr,setCodeErr]=useState('');
    const [busy,setBusy]=useState(false);
    const [email,setEmail]=useState('anita.sharma@beaconhill.edu');
    const [password,setPassword]=useState('');

    const onContinue=()=>{
      if(!code.trim() || code.trim().toUpperCase()!=='BHA-204'){
        setCodeErr("We couldn't find that school code. Check your welcome email.");
        return;
      }
      setCodeErr('');
      setBusy(true);
      setTimeout(()=>{ setBusy(false); setStep('creds'); }, 450);
    };
    const onSignIn=()=>{
      setBusy(true);
      setTimeout(()=>{ setBusy(false); nav('#/parent/home'); }, 600);
    };

    return (
      <div className="mf-view" data-view="p-parent-login">
        <div className="v-parent-login">
          <Card>
            <div className="auth-card">

              <div className="lockup">
                <span className="lockup__crest"><Icon name="graduation-cap" size={26}/></span>
                <h1 className="lockup__school">Beacon Hill Academy</h1>
                <span className="lockup__portal">Parent Portal</span>
              </div>

              <div className="stepper" role="group" aria-label={'Step '+(step==='code'?'1 of 2: school code':'2 of 2: sign in')}>
                <span className={'stepper__node '+(step==='code'?'stepper__node--active':'stepper__node--done')}>
                  <span className="stepper__dot">{step==='code'?'1':<Icon name="check" size={11}/>}</span>
                  School
                </span>
                <span className="stepper__bar" aria-hidden="true"></span>
                <span className={'stepper__node '+(step==='creds'?'stepper__node--active':'')}>
                  <span className="stepper__dot">2</span>
                  Sign in
                </span>
              </div>

              {step==='code' ? (
                <form className="auth-form" onSubmit={(e)=>{e.preventDefault();onContinue();}}>
                  <Field label="School code" required
                    hint="Found in your welcome email from the school."
                    error={codeErr || undefined}>
                    <Input
                      value={code}
                      onChange={(e)=>{setCode(e.target.value); if(codeErr) setCodeErr('');}}
                      placeholder="BHA-204"
                      autoComplete="off"
                      error={!!codeErr}
                      aria-invalid={!!codeErr}/>
                  </Field>
                  <Button variant="primary" block loading={busy} type="submit"
                    trailingIcon={<Icon name="arrow-right" size={16}/>}
                    onClick={onContinue}>Continue</Button>
                </form>
              ) : (
                <form className="auth-form" onSubmit={(e)=>{e.preventDefault();onSignIn();}}>
                  <div className="ctx-chip">
                    <span className="ctx-chip__ico"><Icon name="check" size={16}/></span>
                    <span className="ctx-chip__main">
                      <div className="ctx-chip__name">Beacon Hill Academy</div>
                      <div className="ctx-chip__code">{code.trim().toUpperCase()}</div>
                    </span>
                    <Button variant="ghost" size="sm" onClick={()=>setStep('code')}>Change</Button>
                  </div>
                  <Field label="Email" required>
                    <Input type="email" value={email} onChange={(e)=>setEmail(e.target.value)}
                      placeholder="you@example.com" autoComplete="email"/>
                  </Field>
                  <Field label="Password" required>
                    <Input type="password" value={password} onChange={(e)=>setPassword(e.target.value)}
                      placeholder="••••••••" autoComplete="current-password"/>
                  </Field>
                  <Button variant="primary" block loading={busy} type="submit"
                    leadingIcon={<Icon name="log-in" size={16}/>}
                    onClick={onSignIn}>Sign in</Button>
                  <div className="auth-foot">
                    <Button variant="ghost" size="sm" onClick={(e)=>{e.preventDefault();}}>Forgot password?</Button>
                  </div>
                </form>
              )}

              <div className="reassure">
                <Icon name="shield-check" size={13}/>
                Released grades only · answer keys never shown
              </div>

            </div>
          </Card>
        </div>
      </div>
    );
  }
  return ViewBody;
})();

Views["progress-analytics"] = (function(){
  const { Button, IconButton, Icon, Input, Textarea, Select, Checkbox, Radio, Switch, Slider, FileDrop, Field, Card, Section, Panel, Tabs, Accordion, Drawer, Modal, Popover, Tooltip, DataTable, DefinitionList, Stat, Timeline, EmptyState, Skeleton, Pagination, Avatar, AvatarGroup, Badge, Chip, ProgressBar, ProgressRing, Toast, Alert, LoadingOverlay, NavItem, Breadcrumb, Kbd, SpaceCard, StoryPointTrack, StoryPointNode, ContentRenderer, QuestionCard, TimerBar, ConfidenceBadge, GradePill, RubricBreakdown, ManualOverrideControl, SubmissionCard, ScanFrame, UploadQueueItem, XPMeter, StreakFlame, LevelBadge, LeaderboardRow, Achievement, AtRiskBadge, InsightCard, TutorChatBubble, AnswerKeyLock } = LU;
  const { useState, useEffect, useRef, useMemo, useCallback } = React;

  const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ---- CountUp (mount only, reduced-motion safe) ---- */
  function CountUp({ end, suffix }) {
    const [val, setVal] = useState(reduceMotion ? end : 0);
    useEffect(() => {
      if (reduceMotion) return;
      let raf, start; const dur = 700;
      const step = (t) => {
        if (start == null) start = t;
        const p = Math.min(1, (t - start) / dur);
        const eased = 1 - Math.pow(1 - p, 3);
        setVal(end * eased);
        if (p < 1) raf = requestAnimationFrame(step); else setVal(end);
      };
      raf = requestAnimationFrame(step);
      return () => cancelAnimationFrame(raf);
    }, [end]);
    return <span className="countup">{Math.round(val)}{suffix || ""}</span>;
  }

  function KpiCard({ icon, spark, label, value, suffix, sub, ariaText }) {
    return (
      <div className="kpi" role="group" aria-label={ariaText}>
        <div className="kpi__top">
          <span className={"kpi__icon" + (spark ? " kpi__icon--spark" : "")}><Icon name={icon} size={16}/></span>
          <span style={{ fontSize:"var(--text-sm)", fontWeight:"var(--weight-medium)" }}>{label}</span>
        </div>
        <div className="kpi__val" aria-hidden="true"><CountUp end={value} suffix={suffix}/></div>
        {sub && <div className="u-caption" style={{ color:"var(--text-muted)" }}>{sub}</div>}
      </div>
    );
  }

  /* ---- SimpleBarChart (composed; tokens only) ---- */
  const TREND_DATA = {
    accuracy: {
      "4w":  { labels:["W1","W2","W3","W4"], values:[66,71,69,76], summary:"Accuracy over the last 4 weeks, trending up from 66 to 76 percent." },
      "12w": { labels:["W1","W3","W5","W7","W9","W11","W12"], values:[61,64,63,68,70,72,76], summary:"Accuracy over the last 12 weeks, trending up from 61 to 76 percent." },
      "all": { labels:["Jan","Feb","Mar","Apr","May","Jun"], values:[54,58,62,66,71,76], summary:"Accuracy across all time, trending up from 54 to 76 percent." },
    },
    completion: {
      "4w":  { labels:["W1","W2","W3","W4"], values:[40,44,46,52], summary:"Completion over the last 4 weeks, trending up from 40 to 52 percent." },
      "12w": { labels:["W1","W3","W5","W7","W9","W11","W12"], values:[33,36,39,42,47,50,52], summary:"Completion over the last 12 weeks, trending up from 33 to 52 percent." },
      "all": { labels:["Jan","Feb","Mar","Apr","May","Jun"], values:[18,27,35,41,47,52], summary:"Completion across all time, trending up from 18 to 52 percent." },
    },
  };

  function RangeToggle({ value, onChange, idBase }) {
    const opts = [["4w","4w"],["12w","12w"],["all","All"]];
    return (
      <div className="seg" role="group" aria-label="Trend range">
        {opts.map(([v,l]) => (
          <button key={v} className="seg__btn" aria-pressed={value===v}
            onClick={() => onChange(v)}>{l}</button>
        ))}
      </div>
    );
  }

  function SimpleBarChart({ series, spark }) {
    const max = Math.max(...series.values, 1);
    return (
      <>
        <div className="bars" role="img" aria-label={series.summary}>
          {series.values.map((v, i) => (
            <div className="bars__col" key={series.labels[i] + i}>
              <div className={"bars__bar" + (spark ? " bars__bar--spark" : "")}
                style={{ height: reduceMotion ? (v/max*100)+"%" : (v/max*100)+"%" }}
                title={series.labels[i] + ": " + v + "%"}/>
              <span className="bars__lbl">{series.labels[i]}</span>
            </div>
          ))}
        </div>
        {/* off-screen data table for screen readers */}
        <table className="sr-table">
          <caption>{series.summary}</caption>
          <thead><tr><th>Period</th><th>Percent</th></tr></thead>
          <tbody>{series.values.map((v,i)=>(<tr key={i}><td>{series.labels[i]}</td><td>{v}%</td></tr>))}</tbody>
        </table>
      </>
    );
  }

  function TrendCard({ title, metric, spark }) {
    const [range, setRange] = useState("12w");

  function CountUp({ end, suffix, decimals }) {
    const [val, setVal] = useState(reduceMotion ? end : 0);
    useEffect(() => {
      if (reduceMotion) return;
      let raf, start;
      const dur = 700;
      const step = (t) => {
        if (start == null) start = t;
        const p = Math.min(1, (t - start) / dur);
        const eased = 1 - Math.pow(1 - p, 3);
        setVal(end * eased);
        if (p < 1) raf = requestAnimationFrame(step);
        else setVal(end);
      };
      raf = requestAnimationFrame(step);
      return () => cancelAnimationFrame(raf);
    }, [end]);
    const shown = decimals ? val.toFixed(decimals) : Math.round(val);
