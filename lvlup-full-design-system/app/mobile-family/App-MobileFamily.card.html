  /* ---- seed: realistic learner test schedule across spaces ---- */
  const TESTS = [
    { id:"arrays",  title:"Arrays & Strings Quiz", space:"DSA",     questions:12, duration:25, status:"available",
      windowLabel:"Closes Jun 22, 6:00 pm", used:1, max:3, best:82, retake:true },
    { id:"resume",  title:"Recursion Checkpoint",  space:"DSA",     questions:8,  duration:20, status:"in_progress",
      windowLabel:"Closes Jun 21, 9:00 pm", used:1, max:2, best:null },
    { id:"bigo",    title:"Big-O Analysis Test",   space:"DSA",     questions:15, duration:35, status:"scheduled",
      windowLabel:"Opens Jun 24, 10:00 am", used:0, max:2, best:null,
      schedDate:"Jun 24", schedTime:"10:00 am" },
    { id:"mock1",   title:"System Design Mock 1",  space:"Sys Design", questions:6,  duration:45, status:"completed",
      windowLabel:"Closed", used:2, max:2, best:91 },
    { id:"midterm", title:"LLD Mid-term",          space:"LLD",     questions:20, duration:40, status:"cooldown",
      windowLabel:null, used:1, max:3, best:64, cooldownSecs:1085 /* 18:05 */ },
    { id:"final",   title:"LLD Final",             space:"LLD",     questions:25, duration:60, status:"locked",
      windowLabel:"—", used:2, max:2, best:88, lockReason:"passed" },
    { id:"behav",   title:"Behavioral Screen",     space:"Behavioral", questions:10, duration:30, status:"closed",
      windowLabel:"Closed", used:0, max:1, best:null },
  ];

  const FILTERS = ["All", "Available", "Upcoming", "Completed", "Locked"];
  const SORT_OPTS = [
    { value:"window", label:"Window" },
    { value:"space",  label:"Space" },
    { value:"status", label:"Status" },
  ];
  const STATUS_ORDER = ["in_progress","available","cooldown","scheduled","completed","closed","locked"];

  /* ----------------------------------------------------------------------- */
  /* Status badge (icon + label — never color alone)                         */
  /* ----------------------------------------------------------------------- */
  function StatusBadge({ status, cooldownLabel }){
    const m = STATUS_META[status];
    const label = status === "cooldown" && cooldownLabel ? ("Retry in " + cooldownLabel) : m.label;
    const inner = (<><Icon name={m.icon} size={12}/> {label}</>);
    if (m.badge) return <Badge variant={m.badge}>{inner}</Badge>;
    // neutral (closed / locked) — text.muted chrome via plain badge
    return <span className="badge" style={{ color:"var(--text-muted)", background:"var(--bg-surface-sunken)" }}>{inner}</span>;
  }

  /* Window cell */
  function WindowCell({ t, cooldownLabel }){
    if (t.status === "cooldown")
      return <span className="win-cell win-cell--mono"><Icon name="refresh-cw" size={13}/> Retry in <span className="u-num">{cooldownLabel}</span></span>;
    if (!t.windowLabel || t.windowLabel === "—")
      return <span className="win-cell" style={{color:"var(--text-muted)"}}>—</span>;
    const icon = t.status === "scheduled" ? "calendar" : (t.status === "available" || t.status === "in_progress") ? "calendar-clock" : "calendar-x";
    return <span className="win-cell"><Icon name={icon} size={13}/> {t.windowLabel}</span>;
  }

  /* ----------------------------------------------------------------------- */
  /* The why-tooltip copy for non-startable rows                             */
  /* ----------------------------------------------------------------------- */
  function whyCopy(t, cooldownLabel){
    switch (t.status){
      case "scheduled": return "This test opens " + t.schedDate + " at " + t.schedTime + ". We'll be ready when it does.";
      case "cooldown":  return "Take a breather — you can retry in " + cooldownLabel + ".";
      case "closed":    return "This test's window has closed.";
      case "locked":    return t.lockReason === "passed"
        ? "Nice work — you've passed this one, so it's locked. Open Review to see how you did."
        : "You've used all your attempts for this test. Open Review to revisit your work.";
      default: return "";
    }
  }

  /* ----------------------------------------------------------------------- */
  /* Mobile test card — primary populated row on phone column                */
  /* ----------------------------------------------------------------------- */
  function MobileTestCard({ t, cooldownLabel, nav, setWhy }){
    const m = STATUS_META[t.status];
    const aria = [t.title, t.space, m.label, t.best!=null ? ("best " + t.best + " percent") : "no attempt yet",
                  t.used + " of " + t.max + " attempts used"].join(", ");
    const onActivate = () => {
      if (m.actionable) nav("#/learner/tests/sp1/gate");
      else setWhy(t.id);
    };
    return (
      <div className="mcard submission" role="button" tabIndex={0} aria-label={aria}
           onClick={onActivate}
           onKeyDown={(e)=>{ if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onActivate(); } }}
           style={{cursor: "pointer"}}>
        <div className="mcard__head">
          <div>
            <h4 className="mcard__title">{t.title}</h4>
            <div className="mcard__line">
              <span>{t.space}</span><span className="dot"></span>
              <span><span className="u-num">{t.questions}</span> questions</span><span className="dot"></span>
              <span><span className="u-num">{t.duration}</span> min</span>
            </div>
          </div>
          <StatusBadge status={t.status} cooldownLabel={cooldownLabel}/>
        </div>
        <div className="mcard__line">
          <WindowCell t={t} cooldownLabel={cooldownLabel}/>
          {!m.actionable && (
            <button className="why-btn" aria-label={"Why is " + t.title + " not available?"}
                    onClick={(e)=>{ e.stopPropagation(); setWhy(t.id); }}>
              <Icon name="help-circle" size={14}/>
            </button>
          )}
        </div>
        <div className="mcard__foot">
          <span className="mcard__line">Attempts <span className="u-num">{t.used} / {t.max}</span></span>
          {t.best != null
            ? <span role="img" aria-label={"Best score " + t.best + " percent"}><GradePill grade={gradeFromPct(t.best)} score={t.best + "%"} /></span>
            : <span style={{fontSize:"var(--text-sm)", color:"var(--text-muted)"}} aria-label="No attempt yet">—</span>}
        </div>
      </div>
    );
  }

  /* ================= Screen content (shell stripped) ================= */
  function ViewBody(props){
    const nav = props.nav;
    const params = props.params || {};
    const role = props.role;
    const child = props.child;
    const setChild = props.setChild;

    const [filter, setFilter] = useState("All");
    const [sort, setSort] = useState("window");
    const [sortOpen, setSortOpen] = useState(false);
    const [why, setWhy] = useState(null);       // test whose "why" tooltip/sheet is open
    const [cooldownSecs, setCooldownSecs] = useState(1085);

    /* server-returned remaining cooldown ticker — DISPLAY ONLY.
       It does NOT gate start; on zero we'd quietly refetch (not auto-flip). */
    useEffect(()=>{
      const id = setInterval(()=> setCooldownSecs(s => s > 0 ? s - 1 : 0), 1000);
      return ()=> clearInterval(id);
    }, []);
    const cooldownLabel = clock(cooldownSecs);

    const rows = useMemo(()=>{
      let list = filter === "All" ? TESTS : TESTS.filter(t => GROUP[t.status] === filter);
      if (sort === "space")  list = [...list].sort((a,b)=> a.space.localeCompare(b.space) || a.title.localeCompare(b.title));
      else if (sort === "status") list = [...list].sort((a,b)=> STATUS_ORDER.indexOf(a.status) - STATUS_ORDER.indexOf(b.status));
      else list = [...list].sort((a,b)=> STATUS_ORDER.indexOf(a.status) - STATUS_ORDER.indexOf(b.status)); // window default ~ time-sensitive first
      return list;
    }, [filter, sort]);

    return (
      <div className="mf-view" data-view="tests-list">
        <div className="page">

          {/* Page header */}
          <div className="page-head">
            <div>
              <div className="head-title-row">
                <h1>Tests</h1>
                <Badge variant="brand">{TESTS.length} tests</Badge>
              </div>
              <p className="page-sub">Your scheduled tests across every space.</p>
            </div>
          </div>

          {/* Filter / sort bar */}
          <div className="toolbar" role="region" aria-label="Filter and sort tests">
            <div className="toolbar__chips" role="group" aria-label="Filter by status">
              {FILTERS.map(f => (
                <button key={f} className="chip-btn" onClick={()=>setFilter(f)} aria-pressed={filter === f}>
                  <Chip active={filter === f}>{f}</Chip>
                </button>
              ))}
            </div>
            <div className="toolbar__right">
              <div className="toolbar__sort">
                <label htmlFor="sortsel">Sort</label>
                <Select id="sortsel" value={sort} onChange={(e)=>setSort(e.target.value)} options={SORT_OPTS} />
              </div>
              {/* mobile sort fallback -> bottom Sheet */}
              <IconButton icon={<Icon name="sliders-horizontal" size={18}/>} label="Sort options"
                          onClick={()=>setSortOpen(true)} />
            </div>
          </div>

          {/* PRIMARY: populated mobile card list (table reflows to stacked cards) */}
          {rows.length > 0 ? (
            <div className="stack">
              {rows.map(t => (
                <MobileTestCard key={t.id} t={t} cooldownLabel={cooldownLabel} nav={nav} setWhy={setWhy}/>
              ))}
            </div>
          ) : (
            <div className="state-box">
              <EmptyState icon="filter" title="No tests match this filter."
                body="Try ‘All’ to see everything."
                action={<Button variant="ghost" leadingIcon={<Icon name="x" size={16}/>}
                          onClick={()=>setFilter("All")}>Clear filter</Button>} />
            </div>
          )}

          {/* in-progress Resume affordance (spark) surfaced under the list */}
          {filter === "All" && (
            <Alert variant="info" title="You have a test in progress">
              Recursion Checkpoint in DSA is still open — pick up right where you left off.
              <div style={{marginTop:"var(--space-3)"}}>
                <Button variant="spark" size="sm" leadingIcon={<Icon name="play" size={16}/>}
                        onClick={()=>nav("#/learner/tests/sp1/gate")}>Resume test</Button>
              </div>
            </Alert>
          )}

          {/* ===================== Spec states (reference) ===================== */}
          <div className="eyebrow">Spec states &amp; mobile divergence (reference)</div>

          <div className="states">

            {/* Partial — score syncing */}
            <div className="state-box state-box--full">
              <p className="state-cap">State: partial · score syncing</p>
              <Alert variant="info" title="Scores syncing…">
                Your tests loaded — attempts and best scores are catching up. We never block the list on attempt history.
              </Alert>
              <div className="stack" style={{marginTop:"var(--space-4)"}}>
                {TESTS.slice(0,2).map(t=>(
                  <div key={t.id} className="mcard submission">
                    <div className="mcard__head">
                      <div>
                        <h4 className="mcard__title">{t.title}</h4>
                        <div className="mcard__line">
                          <span>{t.space}</span><span className="dot"></span>
                          <span><span className="u-num">{t.questions}</span> questions</span><span className="dot"></span>
                          <span><span className="u-num">{t.duration}</span> min</span>
                        </div>
                      </div>
                      <StatusBadge status={t.status} cooldownLabel={cooldownLabel}/>
                    </div>
                    <div className="mcard__line"><WindowCell t={t} cooldownLabel={cooldownLabel}/></div>
                    <div className="mcard__foot">
                      <span className="syncing"><Icon name="loader" size={12}/> Attempts —</span>
                      <span className="syncing"><Icon name="loader" size={12}/> Score syncing…</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Loading skeleton */}
            <div className="state-box state-box--full">
              <p className="state-cap">State: loading skeleton</p>
              <div className="stack">
                {[0,1,2,3].map(i=>(
                  <div key={i} className="mcard submission">
                    <div className="mcard__head">
                      <div style={{display:"flex", flexDirection:"column", gap:"var(--space-2)"}}>
                        <Skeleton width="60%" height="14px"/>
                        <Skeleton width="80%" height="12px"/>
                      </div>
                      <Skeleton width="80px" height="20px"/>
                    </div>
                    <Skeleton width="50%" height="12px"/>
                    <div className="mcard__foot">
                      <Skeleton width="80px" height="14px"/>
                      <Skeleton variant="circle" width="34px" height="34px"/>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Status badge legend — all seven, icon + label */}
            <div className="state-box state-box--full">
              <p className="state-cap">All seven status badges (icon + label)</p>
              <div className="legend">
                {Object.keys(STATUS_META).map(k=>(
                  <div key={k} className="legend__row">
                    <StatusBadge status={k} cooldownLabel={cooldownLabel}/>
                  </div>
                ))}
              </div>
              <div style={{marginTop:"var(--space-4)"}}>
                <AnswerKeyLock title="Answer key never shown">
                  This list shows status, attempts and best score only — item correctness lives on the released results surface.
                </AnswerKeyLock>
              </div>
            </div>

            {/* Empty — no tests */}
            <div className="state-box state-box--full">
              <p className="state-cap">State: empty · no tests</p>
              <EmptyState icon="clipboard-list" title="No tests scheduled"
                body="You don't have any tests right now. When your teacher schedules one, it'll appear here with its dates and details — you'll have plenty of notice." />
            </div>

            {/* Error (distinct from empty) */}
            <div className="state-box state-box--full">
              <p className="state-cap">State: error · load failure</p>
              <EmptyState icon="cloud-off" title="We couldn't load your tests"
                body="Check your connection and try again."
                action={<Button variant="ghost" leadingIcon={<Icon name="refresh-cw" size={16}/>}
                          onClick={(e)=>e.preventDefault()}>Retry</Button>} />
            </div>

          </div>
        </div>

        {/* "Why not available" — Sheet via Drawer (row tap on static cards) */}
        <Drawer open={why != null} onClose={()=>setWhy(null)} title="About this test">
          {why != null && (()=> {
            const t = TESTS.find(x => x.id === why);
            const m = STATUS_META[t.status];
            return (
              <div className="stack">
                <div className="status-cell"><StatusBadge status={t.status} cooldownLabel={cooldownLabel}/></div>
                <h4 className="mcard__title" style={{margin:0}}>{t.title}</h4>
                <p className="page-sub" style={{margin:0}}>{whyCopy(t, cooldownLabel)}</p>
                {(t.status === "completed" || t.status === "locked" || t.status === "closed") &&
                  (t.best != null) && (
                  <div style={{marginTop:"var(--space-2)"}}>
                    <Button variant="secondary" size="sm" leadingIcon={<Icon name="file-text" size={16}/>}
                            onClick={(e)=>e.preventDefault()}>Open Review</Button>
                  </div>
                )}
              </div>
            );
          })()}
        </Drawer>

        {/* Mobile sort fallback — Sheet via Drawer */}
        <Drawer open={sortOpen} onClose={()=>setSortOpen(false)} title="Sort tests">
          <div style={{display:"flex", flexDirection:"column", gap:"var(--space-2)"}}>
            {SORT_OPTS.map(o => (
              <button key={o.value} className="chip-btn"
                      onClick={()=>{ setSort(o.value); setSortOpen(false); }}
                      style={{textAlign:"left"}}>
                <div className="nav-item" aria-current={sort === o.value ? "page" : undefined}>
                  <Icon name={sort === o.value ? "check" : "arrow-down-up"} size={18}/>
                  <span>{o.label}</span>
                </div>
              </button>
            ))}
          </div>
        </Drawer>
      </div>
    );
  }
  return ViewBody;
})();

  // ---- Question Navigator ---------------------------------------------
  function QuestionNavigator({ nodes, current, onJump }){
    const counts = nodes.reduce((a,s)=>{ a[s]=(a[s]||0)+1; return a; },{});
    const answeredTotal = (counts.answered||0)+(counts.answered_marked||0);

          <div className="legend__row"><span className="legend__swatch legend__swatch--answered-marked"><Icon name="flag" size={11}/></span> Answered &amp; marked</div>
          <div className="legend__row"><span className="legend__swatch legend__swatch--not-answered"><Icon name="circle" size={11}/></span> Not answered</div>

  // ---- Active question content ----------------------------------------

          <ContentRenderer math>
            <div>
              <p style={{margin:"0 0 var(--space-3)"}}>

                function <span className="mono">g(x) = x²</span>.
              </p>

  // ---- State gallery (all spec'd secondary states) --------------------
  function LowTimeTimer({ tone, time, percent, text, icon }){
    return (
      <div className="timerwrap" role="timer" aria-label={time+" remaining"}>
        <div className="timerwrap__row">

  function Gallery(){
    return (
      <div className="gallery">
        <div>
          <div className="gallery__title">All runner states</div>
          <div className="gallery__sub">Every state the spec calls for — the active runner above is the primary view.</div>
        </div>

        <div className="gallery__grid">
          {/* Loading skeleton */}
          <div className="tile">
            <div className="eyebrow">State: loading (start / resume)</div>
            <div className="skel-band">

              <span style={{flex:1}} />
              <Skeleton variant="text" width="110px" height="14px" />
            </div>
            <Skeleton width="100%" height="6px" />
            <Skeleton width="100%" height="120px" />
            <div className="skel-grid">
              {Array.from({length:10}).map((_,i)=>(<Skeleton key={i} width="100%" height="38px" />))}
            </div>
            <div className="mono" style={{fontSize:"var(--text-xs)",color:"var(--text-muted)"}}>Setting up your test… (no clock until the server deadline loads)</div>
          </div>

          {/* Low-time warning ≤5 min */}
          <div className="tile">
            <div className="eyebrow">State: low-time warning (≤5 min · status.warning)</div>
            <LowTimeTimer tone="warning" time="04:52" percent={18} icon="alarm-clock" text="5 minutes remaining — finish strong." />
            <div style={{fontSize:"var(--text-xs)",color:"var(--text-secondary)"}}>Announced once (polite aria-live) at the threshold. Icon + text + color — never color alone.</div>

            <div className="eyebrow" style={{marginTop:"var(--space-2)"}}>State: low-time critical (≤1 min · status.error)</div>
            <LowTimeTimer tone="error" time="00:47" percent={3} icon="alarm-clock" text="Under a minute left. Anything you've entered is already being saved." />
          </div>

          {/* Saving / partial */}
          <div className="tile">
            <div className="eyebrow">State: saving (non-blocking, partial)</div>
            <div className="saverow">
              <span className="qcol__save-aff"><Icon name="loader" size={14}/> Saving…</span>

            </div>
            <Toast variant="info" title="Answer saved" body="Question 6 stored. We won't keep nagging you on success." />

            <div className="eyebrow" style={{marginTop:"var(--space-2)"}}>State: save failure (degraded — keeps retrying)</div>
            <Alert variant="warning" title="Still saving in the background">
              We're having trouble saving your last answer, so we'll keep retrying. Your work isn't lost.
            </Alert>
          </div>

          {/* Auto-submit (timeout) */}
          <div className="tile">
            <div className="eyebrow">State: auto-submit (timer reached zero · non-dismissible)</div>
            <LowTimeTimer tone="error" time="00:00" percent={0} icon="alarm-clock-off" text="Time's up." />
            <Alert variant="info" title="Time's up — we're submitting your answers now">
              Hang tight. The server reconciles a 30-second grace window, so nothing you entered is lost.

            <div className="saverow"><span className="qcol__save-aff"><Icon name="loader" size={14}/> Submitting…</span></div>

            <AnswerKeyLock title="Answers are sealed until you submit">

  function ViewBody(props){
    const nav = props.nav; const params = props.params || {}; const role = props.role;
    const child = props.child; const setChild = props.setChild;

    const [nodes, setNodes] = useState(initialNodes);
    const [current, setCurrent] = useState(6); // Q7
    const [marked, setMarked] = useState(false);
    const [saving, setSaving] = useState(false);
    const [submitOpen, setSubmitOpen] = useState(false);
    const [exitOpen, setExitOpen] = useState(false);

    const jump = (i)=>{
      setCurrent(i);
      setNodes(prev=>{
        const next = prev.slice();
        if(next[i]==="not_seen") next[i]="not_answered";
        return next;
      });
      setMarked(nodes[i]==="marked" || nodes[i]==="answered_marked");
    };

    const toggleMark = ()=> setMarked(m=>!m);

    const saveNext = ()=>{
      setSaving(true);
      setNodes(prev=>{
        const next = prev.slice();
        next[current] = marked ? "answered_marked" : "answered";
        return next;
      });
      setTimeout(()=>{
        setSaving(false);
        const ni = Math.min(current+1, TOTAL-1);
        jump(ni);
      }, 650);
    };

    const counts = nodes.reduce((a,s)=>{ a[s]=(a[s]||0)+1; return a; },{});
    const answeredTotal = (counts.answered||0)+(counts.answered_marked||0);
    const markedTotal = (counts.marked||0)+(counts.answered_marked||0);
    const unanswered = TOTAL - answeredTotal;

    const doSubmit = ()=>{ setSubmitOpen(false); nav('#/learner/tests/sp1/results'); };

    return (
      <div className="mf-view" data-view="timed-test-runner">
        <div className="runner">
          <RunnerBand
            qIndex={current}
            onSubmit={()=>setSubmitOpen(true)}
            onExit={()=>setExitOpen(true)}
          />

          <div className="runner__main">
            <ActiveQuestion
              marked={marked}
              onToggleMark={toggleMark}
              onSaveNext={saveNext}
              saving={saving}
            />
            <div className="navrail">
              <QuestionNavigator nodes={nodes} current={current} onJump={jump} />
            </div>
          </div>

          <Gallery />

          {/* Submit confirm dialog */}
          <Modal
            open={submitOpen}
            onClose={()=>setSubmitOpen(false)}
            title="Ready to submit?"
            footer={
              <div style={{display:"flex",gap:"var(--space-3)",justifyContent:"flex-end"}}>
                <Button variant="ghost" onClick={()=>setSubmitOpen(false)}>Keep working</Button>
                <Button variant="primary" leadingIcon={<Icon name="send" size={16}/>} onClick={doSubmit}>Submit test</Button>
              </div>
            }
          >
            <p style={{margin:"0 0 var(--space-4)"}}>
              You've answered <strong>{answeredTotal} of {TOTAL}</strong> questions.
              {markedTotal>0 ? <> <strong>{markedTotal}</strong> are marked for review.</> : null}
              {unanswered>0 ? <> <strong>{unanswered}</strong> are still blank.</> : null}{" "}
              Once you submit, the test is final and we'll score it for you.
            </p>
            <AnswerKeyLock title="Answers are sealed until you submit">
              We score on the server right after — you'll get your results in a moment.
            </AnswerKeyLock>
          </Modal>

          {/* Exit confirm dialog */}
          <Modal
            open={exitOpen}
            onClose={()=>setExitOpen(false)}
            title="Leave the test?"
            footer={
              <div style={{display:"flex",gap:"var(--space-3)",justifyContent:"flex-end"}}>
                <Button variant="ghost" onClick={()=>setExitOpen(false)}>Stay</Button>
                <Button variant="danger" onClick={()=>setExitOpen(false)}>Leave</Button>
              </div>
            }
          >
            <p style={{margin:0}}>
              Your timer keeps running while you're away — it's on the server clock and doesn't pause.
              Your answers stay saved, so you can come right back and pick up where you left off.
            </p>
          </Modal>
        </div>
      </div>
    );
  }
  return ViewBody;
})();

  /* ===================== router ===================== */
  function compile(pattern){
    const keys = [];
    const rx = new RegExp('^' + pattern.replace(/:[^/]+/g, (m) => { keys.push(m.slice(1)); return '([^/]+)'; }) + '$');
    return { rx, keys };
  }
  // [pattern, slug, tabKey, role, fullscreen]  — order: most specific first
  const ROUTES = [
    ['#/auth/login',                       'learner-authentication',      null,       'learner', true],
    ['#/parent/login',                     'p-parent-login',              null,       'parent',  true],

    ['#/learner/tests/:sp/run',            'timed-test-runner',           'tests',    'learner', true],
    ['#/learner/tests/:sp/gate',           'timed-test-landing',          'tests',    'learner', false],
    ['#/learner/tests/:sp/results',        'test-results-review',         'tests',    'learner', false],
    ['#/learner/tests/:sp/analytics',      'test-session-analytics',      'tests',    'learner', false],
    ['#/learner/tests',                    'tests-list',                  'tests',    'learner', false],
    ['#/learner/exams/:id/results',        'exam-results-view',           'tests',    'learner', false],

    ['#/learner/spaces/:id/content/:sp',   'learning-content-view',       'learn',    'learner', false],
    ['#/learner/spaces/:id/practice/:sp',  'practice-mode',               'learn',    'learner', false],
    ['#/learner/spaces/:id',               'space-detail-learning-track', 'learn',    'learner', false],
    ['#/learner/spaces',                   'spaces-list',                 'learn',    'learner', false],
    ['#/learner/store/checkout',           'checkout',                    'learn',    'learner', false],
    ['#/learner/store/:id',                'store-space-detail',          'learn',    'learner', false],
    ['#/learner/store',                    'store-browse',                'learn',    'learner', false],

    ['#/learner/progress/rewards',         'gamification-xp-streaks',     'progress', 'learner', false],
    ['#/learner/progress',                 'progress-analytics',          'progress', 'learner', false],
    ['#/learner/achievements',             'achievements',                'progress', 'learner', false],
    ['#/learner/leaderboard',              'leaderboard',                 'progress', 'learner', false],
    ['#/learner/goals',                    'goals',                       'progress', 'learner', false],

    ['#/learner/profile',                  'profile',                     'profile',  'learner', false],
    ['#/learner/settings',                 'settings',                    'profile',  'learner', false],
    ['#/learner/consumer/profile',         'consumer-profile',            'profile',  'learner', false],

    ['#/learner/notifications',            'notifications',               'home',     'learner', false],
    ['#/learner/tutor',                    'ai-tutor-chat',               'home',     'learner', false],
    ['#/learner/consumer',                 'consumer-dashboard',          'home',     'learner', false],
    ['#/learner/home',                     'student-home-dashboard',      'home',     'learner', false],

    ['#/parent/children/:cid/results/:eid','p-child-exam-result-detail',  'results',  'parent',  false],
    ['#/parent/children/:cid/results',     'p-child-exam-results-released','results', 'parent',  false],
    ['#/parent/children/:cid/progress',    'p-child-progress',            'children', 'parent',  false],
    ['#/parent/children/:cid/spaces',      'p-child-space-progress',      'children', 'parent',  false],
    ['#/parent/children',                  'p-children-roster',           'children', 'parent',  false],
    ['#/parent/compare',                   'p-child-comparison',          'home',     'parent',  false],
    ['#/parent/notifications',             'p-notifications',             'home',     'parent',  false],
    ['#/parent/alerts',                    'p-performance-alerts',        'alerts',   'parent',  false],
    ['#/parent/announcements',             'p-announcements',             'alerts',   'parent',  false],

    ['#/parent/home',                      'p-parent-dashboard',          'home',     'parent',  false],
  ].map(([pattern, slug, tab, role, full]) => ({ ...compile(pattern), pattern, slug, tab, role, full: !!full }));

  function matchRoute(hash){
    for (const r of ROUTES){ const m = r.rx.exec(hash); if (m){ const params = {}; r.keys.forEach((k,i)=>params[k]=m[i+1]); return { r, params }; } }
    return null;
  }

  const TABS = {
    learner: [
      { key:'home',     icon:'home',      label:'Home',     hash:'#/learner/home' },
      { key:'learn',    icon:'book-open', label:'Learn',    hash:'#/learner/spaces' },
      { key:'tests',    icon:'file-check',label:'Tests',    hash:'#/learner/tests' },
      { key:'progress', icon:'trophy',    label:'Progress', hash:'#/learner/progress' },
      { key:'profile',  icon:'user',      label:'Profile',  hash:'#/learner/profile' },
    ],
    parent: [
      { key:'home',     icon:'home',              label:'Home',     hash:'#/parent/home' },
      { key:'children', icon:'users',             label:'Children', hash:'#/parent/children' },
      { key:'results',  icon:'file-check',        label:'Results',  hash:'#/parent/children/aarav/results' },
      { key:'alerts',   icon:'bell-ring',         label:'Alerts',   hash:'#/parent/alerts' },
      { key:'account',  icon:'sliders-horizontal',label:'Account',  hash:'#/parent/account' },
    ],
  };

  function activeTab(hash, role){
    if (role === 'learner'){
      if (/^#\/learner\/(spaces|store)/.test(hash)) return 'learn';
      if (/^#\/learner\/(tests|exams)/.test(hash)) return 'tests';
      if (/^#\/learner\/(progress|achievements|leaderboard|goals)/.test(hash)) return 'progress';
      if (/^#\/learner\/(profile|settings|consumer\/profile)/.test(hash)) return 'profile';
      return 'home';
    } else {
      if (/^#\/parent\/children\/[^/]+\/results/.test(hash)) return 'results';
      if (/^#\/parent\/children/.test(hash)) return 'children';
      if (/^#\/parent\/(alerts|announcements)/.test(hash)) return 'alerts';
      if (/^#\/parent\/account/.test(hash)) return 'account';
      return 'home';
    }
  }

  function navTo(h){ window.location.hash = h; }
  function useHash(){
    const [hash, setHash] = useState(window.location.hash || '#/learner/home');
    useEffect(() => {
      const on = () => setHash(window.location.hash || '#/learner/home');
      window.addEventListener('hashchange', on);
      return () => window.removeEventListener('hashchange', on);
    }, []);
    return hash;
  }

                <Avatar initials={child.split(' ').map(s=>s[0]).join('')} size="sm"/>
                {child.split(' ')[0]}<Icon name="chevron-down" size={14}/>
              </button>
            </>)}
        <button className="mf-iconbtn" aria-label="Notifications" onClick={onBell}><Icon name="bell" size={20}/><span className="mf-iconbtn__dot"/></button>
        <button className="mf-iconbtn" aria-label="Switch view" onClick={onRole}><Icon name="arrow-left-right" size={20}/></button>
      </header>
    );
  }

  function NotFound({ nav, role, slug }){
    return (
      <div className="mf-view" data-view="notfound">
        <div className="mf-notfound">
          <Icon name="compass" size={40}/>
          <h2>Coming together</h2>
          <p style={{ margin: 0 }}>{slug ? ('“' + slug + '” isn’t wired yet.') : 'This screen isn’t wired yet.'}</p>
          <Button variant="primary" onClick={() => nav(role === 'parent' ? '#/parent/home' : '#/learner/home')}>Back to home</Button>
        </div>
      </div>
    );
  }

  /* ===================== app ===================== */
  function App(){
    const hashRaw = useHash();
    useEffect(() => { if (!window.location.hash || window.location.hash === '#/') window.location.replace('#/learner/home'); }, []);
    const hash = (hashRaw === '#/' || hashRaw === '') ? '#/learner/home' : hashRaw;
    const matched = matchRoute(hash);
    const role = matched ? matched.r.role : (hash.indexOf('#/parent') === 0 ? 'parent' : 'learner');
    const full = matched ? matched.r.full : false;

    const [roleSheet, setRoleSheet] = useState(false);
    const [childSheet, setChildSheet] = useState(false);
    const [child, setChild] = useState('Aarav Sharma');

    let body;
    if (matched){
      const View = Views[matched.r.slug];
      body = View
        ? React.createElement(View, { nav: navTo, params: matched.params, role, child, setChild })
        : <NotFound nav={navTo} role={role} slug={matched.r.slug}/>;
    } else {
      body = <NotFound nav={navTo} role={role}/>;
    }

    if (full){
      return (<div className="mf-app"><div className="mf-main mf-main--full">{body}</div></div>);
    }

    const tabs = TABS[role];
    const curTab = activeTab(hash, role);
    return (
      <div className="mf-app">
        <TopBar role={role} child={child}
                onBell={() => navTo(role === 'learner' ? '#/learner/notifications' : '#/parent/notifications')}
                onRole={() => setRoleSheet(true)}
                onChild={() => setChildSheet(true)} />
        <div className="mf-main">{body}</div>
        {role === 'learner' && hash === '#/learner/home' &&
          <button className="mf-fab" aria-label="AI Tutor" onClick={() => navTo('#/learner/tutor')}><Icon name="sparkles" size={22}/></button>}
        <nav className="mf-tabbar" role="tablist">
          {tabs.map((t) => (
            <button key={t.key} className="mf-tab" aria-current={curTab === t.key ? 'page' : undefined} onClick={() => navTo(t.hash)}>
              <Icon name={t.icon} size={22}/><span>{t.label}</span>
            </button>
          ))}
        </nav>
        <Drawer open={roleSheet} onClose={() => setRoleSheet(false)} title="Switch view">
          <div className="mf-sheet">
            <button className="mf-roleopt" aria-current={role === 'learner'} onClick={() => { setRoleSheet(false); navTo('#/learner/home'); }}>
              <span className="mf-roleopt__icon"><Icon name="graduation-cap" size={20}/></span>
              <span><div className="mf-roleopt__t">Learning</div><div className="mf-roleopt__s">Your spaces, tests &amp; progress</div></span>
            </button>
            <button className="mf-roleopt" aria-current={role === 'parent'} onClick={() => { setRoleSheet(false); navTo('#/parent/home'); }}>
              <span className="mf-roleopt__icon"><Icon name="users" size={20}/></span>
              <span><div className="mf-roleopt__t">Parent</div><div className="mf-roleopt__s">Your children&apos;s progress</div></span>
            </button>
          </div>
        </Drawer>
        <Drawer open={childSheet} onClose={() => setChildSheet(false)} title="Switch child">
          {Views['p-multi-child-switcher']
            ? React.createElement(Views['p-multi-child-switcher'], { nav: (h) => { setChildSheet(false); if (h) navTo(h); }, params: {}, role: 'parent', child, setChild: (c) => { setChild(c); setChildSheet(false); } })
            : (<div className="mf-sheet">
                {['Aarav Sharma','Diya Sharma'].map((c) => (
                  <button key={c} className="mf-roleopt" aria-current={child === c} onClick={() => { setChild(c); setChildSheet(false); }}>
                    <span className="mf-roleopt__icon"><Icon name="user" size={20}/></span>
                    <span><div className="mf-roleopt__t">{c}</div></span>
                  </button>
                ))}
              </div>)}
        </Drawer>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
