.vw--overview .btn--primary{background:var(--brand-primary);color:var(--text-on-accent);}

.vw--overview .btn--secondary{background:var(--bg-surface);color:var(--text-primary);border-color:var(--border-strong);}

.vw--llm .brk .r{display:flex;flex-direction:column;gap:6px;}

.vw--llm .brk .rl{font-size:var(--text-sm);color:var(--text-primary);font-weight:var(--weight-medium);margin-right:auto;}
.vw--llm .brk .rv{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary);font-variant-numeric:tabular-nums;}
.vw--llm .track{height:8px;border-radius:var(--radius-pill);background:var(--bg-inset);overflow:hidden;}
.vw--llm .fill{height:100%;border-radius:var(--radius-pill);background:var(--brand-primary);transition:width var(--dur-base) var(--ease-entrance);}
.vw--llm .fill.warn{background:var(--status-warning);}
.vw--llm .fill.err{background:var(--status-error);}
/* table */
.vw--llm .tbl{width:100%;border-collapse:collapse;font-size:var(--text-sm);}
.vw--llm .tbl thead th{text-align:left;padding:var(--space-3) var(--space-5);border-bottom:1px solid var(--border-subtle);color:var(--text-muted);font-size:var(--text-xs);font-weight:var(--weight-semibold);letter-spacing:.04em;text-transform:uppercase;background:var(--bg-surface-sunken);}
.vw--llm .tbl thead th.num{text-align:right;}
.vw--llm .tbl thead th button{display:inline-flex;align-items:center;gap:4px;border:none;background:none;color:inherit;font:inherit;letter-spacing:inherit;text-transform:inherit;cursor:pointer;padding:0;}
.vw--llm .tbl thead th button i{width:13px;height:13px;}
.vw--llm .tbl tbody td{padding:var(--space-3) var(--space-5);border-bottom:1px solid var(--border-subtle);vertical-align:middle;}
.vw--llm .tbl tbody td.num{text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.vw--llm .tbl tbody tr{cursor:pointer;transition:background var(--dur-instant) var(--ease-standard);}
.vw--llm .tbl tbody tr:hover{background:var(--bg-surface-sunken);}
.vw--llm .tbl tbody tr:last-child td{border-bottom:none;}
.vw--llm .tn{display:flex;flex-direction:column;gap:1px;}
.vw--llm .tn .tnn{font-weight:var(--weight-medium);color:var(--text-primary);display:inline-flex;align-items:center;gap:6px;}
.vw--llm .tn .tnn i{width:13px;height:13px;color:var(--text-muted);}
.vw--llm .tn .tnc{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.vw--llm .ubar{display:flex;align-items:center;gap:var(--space-3);justify-content:flex-end;}
.vw--llm .ubar .ut{width:88px;}
.vw--llm .ubar .up{font-family:var(--font-mono);font-size:var(--text-xs);font-variant-numeric:tabular-nums;min-width:62px;display:inline-flex;align-items:center;gap:4px;justify-content:flex-end;}
.vw--llm .ubar .up i{width:13px;height:13px;}
.vw--llm .up.warn{color:var(--status-warning);}
.vw--llm .up.err{color:var(--status-error);}
/* badge */
.vw--llm .badge{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-medium);border:1px solid transparent;white-space:nowrap;}
.vw--llm .badge i{width:12px;height:12px;}
.vw--llm .badge.suc{background:var(--status-success-subtle);color:var(--status-success);}
.vw--llm .badge.inf{background:var(--status-info-subtle);color:var(--status-info);}
.vw--llm .badge.err{background:var(--status-error-subtle);color:var(--status-error);}
.vw--llm .badge.warn{background:var(--status-warning-subtle);color:var(--status-warning);}
.vw--llm .badge.mut{background:var(--bg-surface-sunken);color:var(--text-muted);}
/* alert */
.vw--llm .alert{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);font-size:var(--text-sm);border:1px solid var(--border-subtle);}
.vw--llm .alert i.lead{width:18px;height:18px;flex:none;margin-top:1px;}
.vw--llm .alert .ab{flex:1;}
.vw--llm .alert .at{font-weight:var(--weight-semibold);}
.vw--llm .alert.warn{border-color:var(--status-warning);background:var(--status-warning-subtle);}
.vw--llm .alert.warn i.lead{color:var(--status-warning);}
.vw--llm .alert.err{border-color:var(--status-error);background:var(--status-error-subtle);}
.vw--llm .alert.err i.lead{color:var(--status-error);}
.vw--llm .alert .act{margin-left:auto;}
/* buttons */
.vw--llm .btn{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:var(--weight-medium);font-family:var(--font-ui);cursor:pointer;border:1px solid transparent;transition:background var(--dur-fast) var(--ease-standard);}
.vw--llm .btn i{width:15px;height:15px;}
.vw--llm .btn.sec{background:var(--bg-surface);border-color:var(--border-strong);color:var(--text-primary);}
.vw--llm .btn.sec:hover{background:var(--bg-surface-sunken);}
.vw--llm .btn.ghost{background:none;color:var(--text-secondary);}
.vw--llm .btn.ghost:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.vw--llm .btn.sm{padding:var(--space-1) var(--space-3);font-size:var(--text-xs);}
/* skeleton */
.vw--llm .sk{background:var(--bg-inset);border-radius:var(--radius-sm);animation:pulse-llm 1.4s var(--ease-standard) infinite;}
@keyframes pulse-llm{0%,100%{opacity:1}50%{opacity:.5}}
/* empty */
.vw--llm .empty{display:flex;flex-direction:column;align-items:center;gap:var(--space-3);text-align:center;padding:var(--space-12) var(--space-8);}
.vw--llm .empty .ec{width:56px;height:56px;border-radius:var(--radius-pill);background:var(--bg-surface-sunken);display:grid;place-items:center;color:var(--text-muted);}
.vw--llm .empty .ec i{width:26px;height:26px;}
.vw--llm .empty .et{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.vw--llm .empty .eb{font-size:var(--text-sm);color:var(--text-secondary);max-width:var(--reading-max);}
/* loading overlay */
.vw--llm .lov{position:absolute;inset:0;background:var(--bg-surface);opacity:.55;display:grid;place-items:center;z-index:4;border-radius:var(--radius-lg);}
.vw--llm .lov .lc{font-size:var(--text-xs);color:var(--text-secondary);font-family:var(--font-mono);display:inline-flex;align-items:center;gap:6px;background:var(--bg-surface);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);box-shadow:var(--shadow-e1);}
.vw--llm .lov .lc i{width:14px;height:14px;animation:spin-llm 1s linear infinite;}
@keyframes spin-llm{to{transform:rotate(360deg)}}
.vw--llm .icon-btn{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}
.vw--llm .icon-btn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.vw--llm .toast{position:fixed;bottom:var(--space-6);right:var(--space-6);z-index:50;display:flex;align-items:center;gap:var(--space-3);background:var(--bg-surface);border:1px solid var(--border-subtle);border-left:3px solid var(--status-success);border-radius:var(--radius-md);box-shadow:var(--shadow-e3);padding:var(--space-3) var(--space-4);font-size:var(--text-sm);max-width:360px;}
.vw--llm .toast i{width:17px;height:17px;color:var(--status-success);flex:none;}
.vw--llm .statebar{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;font-weight:var(--weight-semibold);margin:var(--space-2) 0 calc(var(--space-1) * -1);}
.vw--llm .statebar::before{content:"";height:1px;flex:1;background:var(--border-subtle);}
.vw--llm .statebar::after{content:"";height:1px;flex:1;background:var(--border-subtle);}

/* ===== system ===== */
.vw--system .ax-shell{display:grid;grid-template-columns:264px 1fr;min-height:100vh;}
.vw--system .ax-side{position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-5);background:var(--bg-surface);border-right:1px solid var(--border-subtle);padding:var(--space-5) var(--space-4);}
.vw--system .ax-brand{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-1) var(--space-2);}
.vw--system .ax-brand .mk{width:34px;height:34px;border-radius:var(--radius-md);background:var(--brand-primary);color:var(--text-on-accent);display:grid;place-items:center;font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);}
.vw--system .ax-brand .nm{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-base);line-height:1.1;}
.vw--system .ax-brand .sc{font-size:var(--text-2xs);color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;}
.vw--system .ax-navgrp{display:flex;flex-direction:column;gap:2px;}
.vw--system .ax-navlbl{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);padding:var(--space-2) var(--space-2) var(--space-1);}
.vw--system .ax-nav{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--text-secondary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;position:relative;transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard);}
.vw--system .ax-nav i{width:18px;height:18px;}
.vw--system .ax-nav .ct{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.vw--system .ax-nav:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.vw--system .ax-nav.on{background:var(--brand-subtle);color:var(--brand-primary);font-weight:var(--weight-semibold);}
.vw--system .ax-nav.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:58%;border-radius:var(--radius-pill);background:var(--brand-primary);}
.vw--system .ax-side .foot{margin-top:auto;display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-4);border-top:1px solid var(--border-subtle);}
.vw--system .ax-rs{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;}
.vw--system .ax-rs i:last-child{margin-left:auto;}
.vw--system .ax-uc{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2);border-radius:var(--radius-md);cursor:pointer;}
.vw--system .ax-uc:hover{background:var(--bg-surface-sunken);}
.vw--system .ax-uc .av{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.vw--system .ax-uc .nm{font-size:var(--text-sm);font-weight:var(--weight-medium);line-height:1.1;}
.vw--system .ax-uc .rl{font-size:var(--text-2xs);color:var(--text-muted);}
.vw--system .ax-main{display:flex;flex-direction:column;min-width:0;}
.vw--system .ax-top{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-8);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;top:0;z-index:20;}
.vw--system .ax-bc{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-muted);}
.vw--system .ax-bc b{color:var(--text-primary);font-weight:var(--weight-medium);}
.vw--system .ax-top .sp{flex:1;}
.vw--system .ax-platpill{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-pill);background:var(--bg-surface-sunken);color:var(--text-secondary);font-size:var(--text-xs);font-weight:var(--weight-medium);}
.vw--system .ax-platpill i{width:14px;height:14px;}
.vw--system .ax-search{display:flex;align-items:center;gap:var(--space-2);width:240px;max-width:28vw;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-muted);font-size:var(--text-sm);}
.vw--system .ax-search kbd{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:0 var(--space-1);}
.vw--system .ax-body{flex:1;overflow-y:auto;padding:var(--space-8);display:flex;flex-direction:column;gap:var(--space-6);width:100%;max-width:1232px;}
.vw--system .ax-head{display:flex;align-items:flex-start;gap:var(--space-4);flex-wrap:wrap;}
.vw--system .ax-head .tx{display:flex;flex-direction:column;gap:var(--space-1);}
.vw--system .ax-h1{font-family:var(--font-display);font-size:var(--text-2xl);line-height:var(--leading-2xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);}
.vw--system .ax-sub{font-size:var(--text-sm);color:var(--text-secondary);}
.vw--system .ax-cap{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-muted);font-variant-numeric:tabular-nums;}
.vw--system .ax-head .ac{margin-left:auto;display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;}
.vw--system .ax-grid{display:grid;gap:var(--space-4);}
.vw--system .ax-g2{grid-template-columns:1fr 1fr;}
.vw--system .ax-g3{grid-template-columns:repeat(3,1fr);}
.vw--system .ax-row{display:flex;align-items:center;gap:var(--space-3);}
.vw--system .ax-col{display:flex;flex-direction:column;gap:var(--space-3);}
.vw--system .ax-wrap{flex-wrap:wrap;}
.vw--system .ax-mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.vw--system .ax-muted{color:var(--text-muted);}
.vw--system .ax-sec{color:var(--text-secondary);}
.vw--system .ax-sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
/* card / panel */
.vw--system .card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-5);}
.vw--system .panel{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;}
.vw--system .panel .ph{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border-subtle);}
.vw--system .panel .ph .pt{font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);margin-right:auto;}
.vw--system .panel .pb{padding:var(--space-5);}
/* overall status banner */
.vw--system .banner{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-5);border-radius:var(--radius-lg);border:1px solid var(--border-subtle);background:var(--bg-surface);}
.vw--system .banner .bi{width:22px;height:22px;flex:none;}
.vw--system .banner .bt{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.vw--system .banner .bk{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-muted);font-variant-numeric:tabular-nums;}
.vw--system .banner.suc{border-color:var(--status-success);background:var(--status-success-subtle);}
.vw--system .banner.suc .bi,.vw--system .banner.suc .bt{color:var(--status-success);}
.vw--system .banner.warn{border-color:var(--status-warning);background:var(--status-warning-subtle);}
.vw--system .banner.warn .bi,.vw--system .banner.warn .bt{color:var(--status-warning);}
.vw--system .banner.err{border-color:var(--status-error);background:var(--status-error-subtle);}
.vw--system .banner.err .bi,.vw--system .banner.err .bt{color:var(--status-error);}
/* probe card */
.vw--system .probe{display:flex;align-items:flex-start;gap:var(--space-4);}
.vw--system .probe .tile{width:40px;height:40px;flex:none;border-radius:var(--radius-lg);display:grid;place-items:center;background:var(--bg-surface-sunken);color:var(--text-secondary);border:1px solid var(--border-subtle);}
.vw--system .probe .tile i{width:20px;height:20px;}
.vw--system .probe .pn{font-size:var(--text-base);font-weight:var(--weight-semibold);}
.vw--system .probe .pd{font-size:var(--text-xs);color:var(--text-muted);}
.vw--system .probe .lat{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-secondary);font-variant-numeric:tabular-nums;}
.vw--system .probe.warn{border-color:var(--status-warning);}
.vw--system .probe.err{border-color:var(--status-error);}
/* status indicator atom: dot + icon + label */
.vw--system .si{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);font-weight:var(--weight-medium);}
.vw--system .si .dot{width:8px;height:8px;border-radius:var(--radius-pill);flex:none;}
.vw--system .si i{width:15px;height:15px;}
.vw--system .si.ok{color:var(--status-success);} .vw--system .si.ok .dot{background:var(--status-success);}
.vw--system .si.deg{color:var(--status-warning);} .vw--system .si.deg .dot{background:var(--status-warning);}
.vw--system .si.dn{color:var(--status-error);} .vw--system .si.dn .dot{background:var(--status-error);}
.vw--system .si.nd{color:var(--text-muted);} .vw--system .si.nd .dot{background:var(--border-strong);}
/* probe detail row */
.vw--system .pdetail{margin-top:var(--space-3);display:grid;grid-template-columns:auto 1fr;gap:var(--space-1) var(--space-4);padding-top:var(--space-3);border-top:1px solid var(--border-subtle);font-size:var(--text-xs);}
.vw--system .pdetail dt{color:var(--text-muted);}
.vw--system .pdetail dd{margin:0;color:var(--text-primary);}
/* uptime strip */
.vw--system .strip{display:flex;align-items:flex-end;gap:var(--space-1);padding:var(--space-2) 0 var(--space-4);}
.vw--system .bar{width:8px;height:32px;border-radius:var(--radius-sm);flex:none;cursor:pointer;position:relative;}
.vw--system .bar.h{background:var(--status-success);}
.vw--system .bar.d{background:var(--status-warning);}
.vw--system .bar.x{background:var(--status-error);}
.vw--system .bar.n{background:var(--bg-inset);border:1px solid var(--border-subtle);}
.vw--system .bar:focus-visible{outline:2px solid var(--border-focus);outline-offset:2px;}
.vw--system .legend{display:flex;align-items:center;gap:var(--space-4);flex-wrap:wrap;padding-top:var(--space-3);border-top:1px solid var(--border-subtle);}
.vw--system .lg{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--text-secondary);}
.vw--system .lg .sw{width:10px;height:10px;border-radius:var(--radius-sm);}
.vw--system .lg i{width:13px;height:13px;}
.vw--system .upt{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-primary);font-variant-numeric:tabular-nums;}
/* metric stat */
.vw--system .stat{display:flex;flex-direction:column;gap:var(--space-2);}
.vw--system .stat .sl{display:flex;align-items:center;gap:var(--space-2);color:var(--text-muted);font-size:var(--text-xs);font-weight:var(--weight-medium);}
.vw--system .stat .sl i{width:14px;height:14px;}
.vw--system .stat .sv{font-family:var(--font-mono);font-size:var(--text-3xl);font-weight:var(--weight-medium);font-variant-numeric:tabular-nums;line-height:1.05;}
.vw--system .stat .sv.err{color:var(--status-error);}
.vw--system .stat .ss{font-size:var(--text-xs);color:var(--text-secondary);}
/* skeleton helpers */
.vw--system .sk{background:var(--bg-inset);border-radius:var(--radius-sm);overflow:hidden;position:relative;}
.vw--system .sk::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,var(--bg-surface-sunken),transparent);animation:shimmer-system 1.4s infinite;}
@keyframes shimmer-system{100%{transform:translateX(100%)}}
.vw--system .sk-line{height:12px;}
.vw--system .sk-tile{width:40px;height:40px;border-radius:var(--radius-lg);flex:none;}
.vw--system .icon-btn{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}

    <div className="alert info" role="status">

      <div className="ab"><span className="ax-sec">Couldn't refresh metrics — showing last known values.</span></div>

    {/* §8 RBAC — defense-in-depth: super-admin is the only cross-tenant role; the server re-checks. */}
    <div className="alert info" role="note">

    {/* §5 Empty — fresh platform: charts and recent tenants replaced by an onboarding EmptyState. */}

    <div className="panel"><div className="empty quiet">

      <div className="et">No recent activity</div>
      <div className="eb">No platform activity in the last 24 hours.</div>

    <div role="status" aria-label="Loading platform overview">

        {[0,1,2,3].map(i=> <div className="card kpi" key={i}>
          <div className="skl" style={{width:96,height:12}}></div>
          <div className="skl" style={{width:120,height:26,marginTop:"var(--space-1)"}}></div>
          <div className="skl" style={{width:140,height:12}}></div>
        </div>)}
      </div>
    </div>

    {/* ===== Sign out — the only mutation; lightweight ConfirmDialog before logout() ===== */}
    {signOutOpen && <React.Fragment>
      <div className="overlay" onClick={()=>setSignOutOpen(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label="Sign out of the control plane">
        <div className="box">
          <div className="mh"><div className="mt">Sign out of the control plane?</div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setSignOutOpen(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="alert info" role="note"><i data-lucide="log-out" className="lead"></i>
              <div className="ab"><span className="ax-sec">You'll end your super-admin session and return to the sign-in screen. Any unsaved work on other screens is not affected.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setSignOutOpen(false)}>Cancel</Button>
            <Button variant="danger" leadingIcon="log-out" onClick={()=>setSignOutOpen(false)}>Sign out</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

  </div>;
}
return View;
})();

const TenantsView = (function(){
const Button = ({children,leadingIcon,trailingIcon,variant,size,disabled,onClick})=>

/* ---- status helper: icon + label + color, never color alone (§4 / §8) ---- */
function StatusBadge({status}){
  if(status==="active")      return <span className="badge suc"><i data-lucide="check-circle-2"></i>Active</span>;
  if(status==="trial")       return <span className="badge inf"><i data-lucide="clock"></i>Trial</span>;

  if(status==="expired")     return <span className="badge err"><i data-lucide="x-circle"></i>Expired</span>;
  return <span className="badge mut"><i data-lucide="ban"></i>Deactivated</span>;
}

              <div className="ab"><span className="ax-sec">Features, quotas, status, and the tenant code reservation are seeded server-side. Credentials and any secret keys are never shown here — this action is audit-logged.</span></div></div>

            <Button variant="primary" leadingIcon={pending?"loader":"check"} disabled={pending} onClick={submit}>{pending?"Creating…":"Create tenant"}</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

  </div>;
}
return View;
})();

function Avatar({name,email}){
  const s=(name||email||"?").replace(/[^A-Za-z]/g,"");
  const init=(name?name.split(" ").map(w=>w[0]).slice(0,2).join(""):s.slice(0,2)).toUpperCase();
  return <div className="av" aria-hidden="true">{init}</div>;
}

function RowMenu({row,onAction,onClose}){
  const isSelf=row.uid===ME_UID;
  const isOtherSA=row.isSuperAdmin && !isSelf;
  // backend callables not shipped yet → reset/disable/impersonate disabled with tooltip (§4.3 / self-protection §8.4)
  const disableReason = isSelf ? "You cannot disable your own account" : "Backend action coming soon";
  const impReason = isSelf ? "You cannot impersonate yourself" : isOtherSA ? "Cannot impersonate another super admin" : "Backend action coming soon";
  return <div className="menu" role="menu" aria-label={"Actions for "+(row.displayName||row.email)} onClick={e=>e.stopPropagation()}>
    <button className="mi" role="menuitem" onClick={()=>onAction("open",row)}>
      <i data-lucide="log-in"></i>Open in tenant…</button>
    <div className="msep"></div>
    <div className="mlbl">Elevated · audited</div>
    <button className={"mi danger"+(true?" dis":"")} role="menuitem" aria-disabled="true" title={disableReason}>
      <i data-lucide={row.status==="disabled"?"user-check":"user-x"}></i>{row.status==="disabled"?"Re-enable account":"Disable account"}<span className="tip">soon</span></button>
    <button className="mi dis" role="menuitem" aria-disabled="true" title="Backend action coming soon">
      <i data-lucide="key-round"></i>Force password reset<span className="tip">soon</span></button>
    <button className={"mi danger"+((isSelf||isOtherSA)?" dis":"")} role="menuitem"
      aria-disabled={(isSelf||isOtherSA)||undefined}
      title={(isSelf||isOtherSA)?impReason:undefined}
      onClick={()=>{ if(!(isSelf||isOtherSA)) onAction("impersonate",row); }}>
      <i data-lucide="venetian-mask"></i>Impersonate-scope…{(isSelf||isOtherSA)&&<span className="tip">blocked</span>}</button>
  </div>;
}

function MembershipChips({memberships,onPivot}){
  if(!memberships.length) return <div className="chips"><span className="mchip none"><i data-lucide="circle-slash" style={{width:11,height:11}}></i>No active memberships</span></div>;
  return <div className="chips">{memberships.map(m=>
    <a key={m.tenantId} className="mchip" role="link" tabIndex="0"
       aria-label={"Open tenant "+m.tenantCode+" ("+m.role+")"} onClick={()=>onPivot(m)}>
      <span className="role">{m.role} @</span><span className="tc">{m.tenantCode}</span></a>)}</div>;
}

function Row({row,busy,onPivot,onMenuAction}){
  const [open,setOpen]=React.useState(false);
  React.useEffect(()=>{ if(!open) return; const h=()=>setOpen(false); window.addEventListener("click",h); return ()=>window.removeEventListener("click",h); },[open]);
  return <tr className={busy?"dim":undefined}>
    <td>
      <div className="uname"><Avatar name={row.displayName} email={row.email}/>
        <div className="nmw"><span className="pn">
          {row.isSuperAdmin && <span aria-hidden="true" style={{color:"var(--text-secondary)"}}>◆</span>}
          {row.displayName||<span className="ax-muted">—</span>}
          {row.isSuperAdmin && <span className="badge sa"><i data-lucide="shield"></i>Super Admin</span>}
          {row.status==="active"
            ? <span className="badge suc"><i data-lucide="check"></i>Active</span>
            : <span className="badge dis"><i data-lucide="ban"></i>Disabled</span>}
        </span></div></div>
    </td>
    <td><span className="uemail">{row.email}</span></td>
    <td><MembershipChips memberships={row.memberships} onPivot={onPivot}/></td>
    <td><span className="llt" title={row.lastAbs}>{row.last}</span></td>
    <td>
      <div className="rowact">
        <button className="icon-btn" aria-haspopup="menu" aria-expanded={open} aria-label={"Actions for "+(row.displayName||row.email)}
          onClick={e=>{e.stopPropagation();setOpen(o=>!o);}}>
          {busy?<i data-lucide="loader-2" className="spin"></i>:<i data-lucide="more-horizontal"></i>}</button>
        {open && <RowMenu row={row} onAction={(a,r)=>{setOpen(false);onMenuAction(a,r);}} onClose={()=>setOpen(false)}/>}
      </div>
    </td>
  </tr>;
}

      <td><div className="uname"><div className="sk circ" style={{width:32,height:32}}></div>
        <div className="nmw"><div className="sk" style={{width:120,height:11}}></div><div className="sk" style={{width:80,height:9}}></div></div></div></td>
      <td><div className="sk" style={{width:160,height:11}}></div></td>

      <td><div className="sk" style={{width:52,height:11}}></div></td>
      <td><div className="sk circ" style={{width:24,height:24,marginLeft:"auto"}}></div></td>

/* ---- impersonate-scope modal: required tenant + reason + consent (§6/§7) ---- */
function ImpersonateModal({row,onClose,onConfirm}){
  const [tenant,setTenant]=React.useState(row.memberships[0]?row.memberships[0].tenantId:"");
  const [reason,setReason]=React.useState("");
  const [ack,setAck]=React.useState(false);
  React.useEffect(()=>{ const h=e=>{ if(e.key==="Escape") onClose(); }; window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h); },[onClose]);
  const code=(row.memberships.find(m=>m.tenantId===tenant)||{}).tenantCode||"—";
  const ready=tenant && reason.trim().length>0 && ack;
  return <div className="overlay" role="dialog" aria-modal="true" aria-labelledby="imp-t" onClick={onClose}>
    <div className="dlg" onClick={e=>e.stopPropagation()}>
      <div className="dh"><div className="ic danger"><i data-lucide="venetian-mask"></i></div>
        <div><div className="dt" id="imp-t">Enter a tenant as this user</div>
          <div className="helper" style={{marginTop:4}}>Acting as <b style={{color:"var(--text-primary)"}}>{row.email}</b></div></div></div>
      <div className="db">
        <div className="fld"><label htmlFor="imp-ten">Tenant</label>
          <select id="imp-ten" className="sel" value={tenant} onChange={e=>setTenant(e.target.value)}>
            {row.memberships.map(m=><option key={m.tenantId} value={m.tenantId}>{m.role} @ {m.tenantCode}</option>)}</select></div>
        <div className="fld"><label htmlFor="imp-rsn">Reason <span className="rq">(required)</span></label>
          <textarea id="imp-rsn" className="ta" placeholder="e.g. Investigating login failure — ticket No. 1234"
            value={reason} onChange={e=>setReason(e.target.value)}></textarea></div>
        <label className="gate"><input type="checkbox" checked={ack} onChange={e=>setAck(e.target.checked)}/>
          <span>I understand this session is time-boxed and audited.</span></label>
        <div className="helper">You will act inside <b style={{color:"var(--text-primary)"}}>{code}</b> only. Ends automatically in 30 min.</div>
      </div>
      <div className="df">
        <button className="btn sec" onClick={onClose}>Cancel</button>
        <button className="btn danger" disabled={!ready} onClick={()=>onConfirm(row,code)}>Start scoped session</button>
      </div>
    </div>
  </div>;
}

/* ---- open-in-tenant picker (>1 membership chooses which first, §6) ---- */

  React.useEffect(()=>{ const h=e=>{ if(e.key==="Escape") onClose(); }; window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h); },[onClose]);
  return <div className="overlay" role="dialog" aria-modal="true" aria-labelledby="opn-t" onClick={onClose}>
    <div className="dlg" onClick={e=>e.stopPropagation()}>
      <div className="dh"><div className="ic info"><i data-lucide="log-in"></i></div>
        <div><div className="dt" id="opn-t">Open which tenant?</div>
          <div className="helper" style={{marginTop:4}}>{row.email} holds {row.memberships.length} active memberships.</div></div></div>
      <div className="db">
        <div className="fld"><label htmlFor="opn-ten">Tenant</label>
          <select id="opn-ten" className="sel" value={tenant} onChange={e=>setTenant(e.target.value)}>
            {row.memberships.map(m=><option key={m.tenantId} value={m.tenantId}>{m.role} @ {m.tenantCode}</option>)}</select></div>
      </div>
      <div className="df">
        <button className="btn sec" onClick={onClose}>Cancel</button>

}

const COLS=[
  {k:"name",label:"Name",so:true},
  {k:"email",label:"Email"},

function View(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const [q,setQ]=React.useState("a");          // primary success state seeds a query
  const [foc,setFoc]=React.useState(false);
  const [phase,setPhase]=React.useState("success"); // success | loading | refetch | empty | error
  const [busyUid,setBusyUid]=React.useState(null);
  const [impRow,setImpRow]=React.useState(null);
  const [openRow,setOpenRow]=React.useState(null);
  const [toast,setToast]=React.useState(null);
  const inputRef=React.useRef(null);

  React.useEffect(()=>{ inputRef.current && inputRef.current.focus(); },[]); // autofocus on mount (§3)
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  React.useEffect(()=>{ if(!toast) return; const t=setTimeout(()=>setToast(null),3200); return ()=>clearTimeout(t); },[toast]);

  const rows = q ? ROWS.filter(r=>(r.email||"").toLowerCase().startsWith(q.toLowerCase())||(r.displayName||"").toLowerCase().startsWith(q.toLowerCase())) : [];
  const showRows = phase==="success"||phase==="refetch";

  function pivot(m){ window.location.hash = "#/tenants/t1"; }
  function menuAction(a,row){
    if(a==="open"){ if(row.memberships.length>1) setOpenRow(row); else if(row.memberships.length===1) pivot(row.memberships[0]); else setToast({ok:false,t:"No tenant to open",b:"This user holds no active memberships."}); }
    if(a==="impersonate"){ setImpRow(row); }
  }

  return <div className="vw vw--users">
    {/* PAGE HEADER — deliberately sparse: lookup tool, not a CRUD roster (§3) */}
    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Global Users</h1>
        <div className="ax-sub">Search and act on users across every tenant</div></div>
    </div>

    {/* ELEVATED-SCOPE BANNER — persistent on this route; cross-tenant + audited (§8.1) */}
    <div className="alert" role="status">
      <i data-lucide="shield-alert" className="lead"></i>
      <div className="ab"><span className="at">Cross-tenant view. </span>
        <span className="ax-sec">You are operating outside any single tenant — every action here is platform-level and written to the audit log.</span></div>
    </div>

    {/* SEARCH CARD */}
    <div className="card pad">
      <div className={"srch"+(foc?" foc":"")}>
        <i data-lucide="search"></i>
        <input ref={inputRef} type="text" value={q} aria-label="Search users by email or name"
          placeholder="Search by email or name…" autoComplete="off" spellCheck="false"
          onFocus={()=>setFoc(true)} onBlur={()=>setFoc(false)}
          onChange={e=>{ const v=e.target.value; setQ(v); setPhase(v.trim().length<1?"initial":(v==="zzz"?"empty":(v==="err"?"error":"success"))); }}/>
        {phase==="refetch" && <span className="statelbl">updating…</span>}
      </div>
      <div className="hint">Prefix match — searches the start of an email or display name.</div>
    </div>

    {/* RESULTS CARD */}
    <div className="panel" aria-label="User search results">
      {phase==="refetch" && <div className="shim" aria-hidden="true"></div>}
      <table className="utbl">
        <caption className="ax-sr">User search results</caption>
        <thead><tr>{COLS.map(c=>
          <th key={c.k} className={c.so?"so":undefined} scope="col"
              aria-sort={c.k==="name"?"ascending":(c.so?"none":undefined)}>
            {c.label}{c.so&&<i data-lucide={c.k==="name"?"chevron-up":"chevrons-up-down"}></i>}</th>)}</tr></thead>

        {phase==="loading" && <SkeletonRows/>}

        {phase==="initial" &&
          <tbody><tr><td colSpan="5"><div className="empty">
            <i data-lucide="user-circle-2"></i>
            <div className="et">Search the platform</div>
            <div className="eb">Type an email or name to find a user across every tenant.</div>
          </div></td></tr></tbody>}

        {phase==="empty" &&
          <tbody><tr><td colSpan="5"><div className="empty">
            <i data-lucide="search-x"></i>
            <div className="et">No users found</div>
            <div className="eb">Nothing matches “{q}”. Search matches the start of an email or name — try the full email.</div>
          </div></td></tr></tbody>}

        {phase==="error" &&
          <tbody><tr><td colSpan="5" style={{padding:"var(--space-5)"}}>
            <div className="alert err" role="alert">
              <i data-lucide="alert-octagon" className="lead"></i>
              <div className="ab"><span className="at">Couldn’t search users. </span>
                <span className="ax-sec">The lookup service is unavailable. Try again.</span></div>
              <button className="btn sec" onClick={()=>setPhase("success")}><i data-lucide="rotate-ccw"></i>Retry</button>
            </div></td></tr></tbody>}

        {showRows &&
          <tbody>{rows.map(r=>
            <Row key={r.uid} row={r} busy={busyUid===r.uid} onPivot={pivot} onMenuAction={menuAction}/>)}
          </tbody>}
      </table>

      <div className="pf">
        <span aria-live="polite">
          {showRows ? `Showing ${rows.length} result${rows.length===1?"":"s"}` : phase==="loading" ? "Searching…" : "—"}
          {phase==="refetch" && <span className="ax-muted"> (updating…)</span>}
        </span>
        {showRows && <nav className="pgn" aria-label="Pagination">
          <button className="pgbtn" disabled aria-label="Previous page">‹ Prev</button>
          <button className="pgbtn" onClick={()=>setPhase("refetch")}>Load more</button>
        </nav>}
      </div>
    </div>

    {/* ---------- secondary labelled state examples (so each §5 state is present) ---------- */}
    <div style={{marginTop:"var(--space-2)"}}>
      <div className="statelbl" style={{marginBottom:"var(--space-3)"}}>State reference · loading · empty · error</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"var(--space-4)"}}>
        <div className="panel">
          <div className="pf" style={{borderTop:"none",borderBottom:"1px solid var(--border-subtle)"}}><i data-lucide="loader-2" className="spin" style={{width:14,height:14}}></i>Loading (skeleton)</div>
          <table className="utbl"><SkeletonRows/></table>
        </div>
        <div className="panel">
          <div className="pf" style={{borderTop:"none",borderBottom:"1px solid var(--border-subtle)"}}><i data-lucide="search-x" style={{width:14,height:14}}></i>Empty (no matches)</div>
          <div className="empty" style={{padding:"var(--space-8)"}}>
            <i data-lucide="search-x"></i><div className="et">No users found</div>
            <div className="eb">Nothing matches “joanna”. Try the full email.</div></div>
        </div>
      </div>
    </div>

    {/* modals */}
    {impRow && <ImpersonateModal row={impRow} onClose={()=>setImpRow(null)}
      onConfirm={(r,code)=>{ setImpRow(null); setBusyUid(r.uid);
        setTimeout(()=>{ setBusyUid(null); setToast({ok:true,t:"Scoped session started · audit logged",b:"Operating in "+code+" as "+r.email+". Ends in 30 min."}); },700); }}/>}
    {openRow && <OpenModal row={openRow} onClose={()=>setOpenRow(null)}
      onConfirm={(r,tid)=>{ setOpenRow(null); const m=r.memberships.find(x=>x.tenantId===tid); pivot(m); }}/>}

    {/* toast */}
    {toast && <div className={"toast"+(toast.ok?"":" err")} role="status">
      <i data-lucide={toast.ok?"check-circle-2":"alert-triangle"}></i>
      <div><div className="tt">{toast.t}</div><div className="tb">{toast.b}</div></div></div>}
  </div>;
}
return View;
})();

const AnalyticsView = (function(){
  const Button = L.Button || (({children,leadingIcon,trailingIcon,variant})=> <button className={"btn btn--"+(variant||"primary")}>{leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}{trailingIcon&&<i data-lucide={trailingIcon}></i>}</button>);

  const RANGES = [["7d","Last 7 days"],["30d","Last 30 days"],["90d","Last 90 days"],["custom","Custom range…"]];

  const KPI=({icon,label,value,delta,sub})=> (
    <div className="card kpi" role="group" aria-label={label+", "+value+(delta?", "+delta.aria:"")}>
      <div className="lh"><i data-lucide={icon}></i><span>{label}</span></div>
      <div className="vv">{value}</div>
      {delta && <div className="tr" style={{color:delta.tone}}><i data-lucide={delta.icon}></i><span>{delta.label}</span></div>}
      {sub && <div className="sub">{sub}</div>}
    </div>);

  // signups area chart series (server-authoritative buckets, render-only)
  const SIGNUPS=[18,26,22,31,28,40,44,38,52,49,61,58,72,68];
  const ACTIVE=[3100,3260,3210,3380,3420,3540,3610,3580,3760,3700,3880,3920,4080,4210];
  const RETAIN=[58,60,59,62,63,64,63,65,66,65,67,68,69,71];

  function Area({data,stroke}){
    const w=300,h=120,mx=Math.max(...data),mn=Math.min(...data);
    const pts=data.map((v,i)=>[i/(data.length-1)*w, h-((v-mn)/(mx-mn||1))*h]);
    const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
    const area=line+` L ${w} ${h} L 0 ${h} Z`;
    return <svg className="chartsvg" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" role="img"
        aria-label="Signups over time, fourteen daily buckets, rising from 18 to 68 new signups per day.">
      {[0,.25,.5,.75,1].map(g=><line key={g} className="gln" x1="0" x2={w} y1={h*g} y2={h*g}/>)}
      <path d={area} fill={stroke} fillOpacity=".12"/>
      <path d={line} fill="none" stroke={stroke} strokeWidth="2"/>
      {pts.filter((_,i)=>i===pts.length-1).map((p,i)=><circle key={i} className="dot" cx={p[0]} cy={p[1]} r="3.5" stroke={stroke}/>)}
    </svg>;
  }
  function Line({a,b,sa,sb}){
    const w=300,h=120;
    const norm=(d)=>{const mx=Math.max(...d),mn=Math.min(...d);return d.map((v,i)=>[i/(d.length-1)*w, h-((v-mn)/(mx-mn||1))*h]);};
    const pa=norm(a),pb=norm(b);
    const path=(p)=>p.map((q,i)=>(i?"L":"M")+q[0].toFixed(1)+" "+q[1].toFixed(1)).join(" ");
    return <svg className="chartsvg" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" role="img"
        aria-label="Active users and retention over time. Active users rising from 3,100 to 4,210; retention rising from 58 percent to 71 percent.">
      {[0,.25,.5,.75,1].map(g=><line key={g} className="gln" x1="0" x2={w} y1={h*g} y2={h*g}/>)}
      <path d={path(pa)} fill="none" stroke={sa} strokeWidth="2"/>
      <path d={path(pb)} fill="none" stroke={sb} strokeWidth="2" strokeDasharray="4 3"/>
    </svg>;

    {id:"t_brt",name:"Brightpath Institute",code:"BRT-0309",students:640,teachers:132,total:772,active:36,status:"active"},
    {id:"t_mer",name:"Meridian School",code:"MER-0512",students:498,teachers:96,total:594,active:29,status:"trial"},
    {id:"t_oak",name:"Oakridge Learning",code:"OAK-0244",students:410,teachers:88,total:498,active:33,status:"active"},
    {id:"t_sum",name:"Summit Tutorials",code:"SUM-0677",students:286,teachers:54,total:340,active:21,status:"suspended"},
    {id:"t_vrd",name:"Verdant College Prep",code:"VRD-0801",students:204,teachers:41,total:245,active:18,status:"expired"},
    {id:"t_lkv",name:"Lakeview Academy",code:"LKV-0356",students:178,teachers:36,total:214,active:27,status:"trial"},

  function StatusBadge({s}){const c=STATUS[s];return <span className={"badge "+c.cls}><i data-lucide={c.icon}></i>{c.label}</span>;}

  function View(){

      {/* PLAN MIX */}

                <div className={"bar-fill"+(alt?" alt":"")} style={{width:pct+"%"}}></div></div>
              <span className="pv ax-mono">{n.toLocaleString()} · {pct}%</span>
            </div>)}

      {/* PER-TENANT COMPARISON — read-only; each row deep-links into /tenants/:id (which tenant is named per row) */}
      <div className="panel">
        <div className="ph">

      <div className="sec-h" style={{marginTop:"var(--space-4)"}}><span className="st">States</span><span className="sca">Loading · empty · error · permission-gated</span></div>
      <div className="ax-grid ax-g2">
        <div className="panel">
          <div className="ph"><span className="pt">Loading (skeleton)</span></div>
          <div className="pb ax-col">
            <div className="ax-row" style={{gap:"var(--space-3)"}}>
              {[0,1,2,3].map(i=><div key={i} className="card kpi" style={{flex:1}}>
                <div className="sk" style={{height:10,width:"60%"}}></div>
                <div className="sk" style={{height:22,width:"50%"}}></div>
                <div className="sk" style={{height:9,width:"70%"}}></div></div>)}
            </div>
            {[0,1,2].map(i=><div key={i} className="ax-row" style={{gap:"var(--space-3)"}}>
              <div className="sk" style={{height:12,width:120}}></div>
              <div className="sk" style={{height:10,flex:1}}></div>
              <div className="sk" style={{height:12,width:80}}></div></div>)}
          </div>
        </div>
        <div className="panel">
          <div className="ph"><span className="pt">Empty</span></div>
          <div className="empty">
            <div className="gl"><i data-lucide="users"></i></div>
            <div className="et">No platform users yet</div>
            <div className="eb">Once tenants onboard students and teachers, signups, engagement, and per-tenant comparisons will appear here.</div>
          </div>
        </div>
      </div>
      <div className="ax-grid ax-g2">
        <div className="panel">
          <div className="ph"><span className="pt">Error</span></div>
          <div className="pb">
            <div className="alert err" role="alert">
              <i data-lucide="circle-alert" className="lead"></i>
              <div className="ab"><div className="at">Failed to load analytics</div>
                <div className="ax-sec">An unexpected error occurred while loading platform analytics.</div>
                <div style={{marginTop:"var(--space-2)"}}><Button variant="ghost" leadingIcon="rotate-cw">Try again</Button></div></div>
            </div>
          </div>
        </div>
        <div className="panel">
          <div className="ph"><span className="pt">Permission-gated (server re-check)</span></div>
          <div className="pb">
            <div className="alert err" role="alert">
              <i data-lucide="shield-x" className="lead"></i>
              <div className="ab"><div className="at">Restricted</div>
                <div className="ax-sec">Platform analytics are restricted to platform administrators. The server independently re-verifies super-admin; the client gate is never trusted alone.</div></div>
            </div>
          </div>
        </div>
      </div>

      {/* Export toast (audited side-effect) */}
      {toast && <div style={{position:"fixed",right:24,bottom:24,zIndex:50}}>
        <div className="toast"><i data-lucide={toast.icon} style={{color:toast.tone}}></i><span>{toast.msg}</span>
          {toast.action && <span className="lnk" style={{marginLeft:"var(--space-2)"}} onClick={()=>setToast(null)}>{toast.action}</span>}</div>
      </div>}
    </div>;
  }
  return View;
})();

/* ===== flags ===== */
const FlagsView = (function(){

/* ---------- canonical flag registry (server-returned; UI never invents it) ---------- */
const PLAN_RANK = {free:0,trial:1,basic:2,premium:3,enterprise:4};
const REGISTRY = [
  {key:"autoGradeEnabled",  label:"AutoGrade",       abbr:"AGrd", desc:"Automated exam grading system.",     minPlan:"basic"},
  {key:"levelUpEnabled",    label:"LevelUp Spaces",  abbr:"LvUp", desc:"Interactive learning spaces.",        minPlan:"basic"},
  {key:"scannerAppEnabled", label:"Scanner App",     abbr:"Scan", desc:"Mobile exam scanning.",               minPlan:"premium"},
  {key:"aiChatEnabled",     label:"AI Chat Tutor",   abbr:"Chat", desc:"AI-powered student chat tutoring.",    minPlan:"premium"},
  {key:"aiGradingEnabled",  label:"AI Grading",      abbr:"AIGr", desc:"AI-powered answer evaluation.",        minPlan:"premium"},
  {key:"analyticsEnabled",  label:"Analytics",       abbr:"Anly", desc:"Advanced analytics dashboards.",       minPlan:"basic"},
  {key:"parentPortalEnabled",label:"Parent Portal",  abbr:"Prnt", desc:"Parent dashboard access.",             minPlan:"basic"},
  {key:"bulkImportEnabled", label:"Bulk Import",     abbr:"Bulk", desc:"CSV / Excel bulk data import.",        minPlan:"premium"},
  {key:"apiAccessEnabled",  label:"API Access",      abbr:"API",  desc:"External API access.",                 minPlan:"enterprise"},
];
const CONFIRM_OFF = new Set(["levelUpEnabled","autoGradeEnabled","apiAccessEnabled"]);
const planLabel = p => ({free:"Free",trial:"Trial",basic:"Basic",premium:"Premium",enterprise:"Enterprise"}[p]||p);
const planGateChip = p => p==="enterprise" ? "Enterprise" : planLabel(p)+"+";

/* server-authoritative tenant projection (render-only) */
const TENANTS = [
  {id:"t_acme",   name:"Acme High School",     code:"SUB001", plan:"premium",    status:"active",
    f:{autoGradeEnabled:true, levelUpEnabled:true,  scannerAppEnabled:false, aiChatEnabled:true,  aiGradingEnabled:true,  analyticsEnabled:true,  parentPortalEnabled:true,  bulkImportEnabled:false, apiAccessEnabled:false}},
  {id:"t_bright", name:"Bright Academy",       code:"BRT114", plan:"basic",      status:"active",
    f:{autoGradeEnabled:true, levelUpEnabled:true,  scannerAppEnabled:false, aiChatEnabled:false, aiGradingEnabled:false, analyticsEnabled:true,  parentPortalEnabled:true,  bulkImportEnabled:false, apiAccessEnabled:false}},
  {id:"t_north",  name:"Northwood Institute",  code:"NWI228", plan:"enterprise", status:"active",
    f:{autoGradeEnabled:true, levelUpEnabled:true,  scannerAppEnabled:true,  aiChatEnabled:true,  aiGradingEnabled:true,  analyticsEnabled:true,  parentPortalEnabled:true,  bulkImportEnabled:true,  apiAccessEnabled:true}},
  {id:"t_summit", name:"Summit Coaching",      code:"SMT071", plan:"trial",      status:"trial",
    f:{autoGradeEnabled:true, levelUpEnabled:true,  scannerAppEnabled:false, aiChatEnabled:false, aiGradingEnabled:false, analyticsEnabled:false, parentPortalEnabled:false, bulkImportEnabled:false, apiAccessEnabled:false}},
  {id:"t_delta",  name:"Delta Public School",  code:"DLT309", plan:"basic",      status:"suspended",
    f:{autoGradeEnabled:true, levelUpEnabled:false, scannerAppEnabled:false, aiChatEnabled:false, aiGradingEnabled:false, analyticsEnabled:true,  parentPortalEnabled:true,  bulkImportEnabled:false, apiAccessEnabled:false}},
];

const STATUS_BADGE = {
  active:    {cls:"suc",  icon:"check",         label:"Active"},
  trial:     {cls:"info", icon:"clock",         label:"Trial"},
  suspended: {cls:"err",  icon:"ban",           label:"Suspended"},
  expired:   {cls:"warn", icon:"calendar-x",    label:"Expired"},
};
const StatusBadge = ({status})=>{ const s=STATUS_BADGE[status]||STATUS_BADGE.active;
  return <span className={"badge "+s.cls}><i data-lucide={s.icon}></i>{s.label}</span>; };

const isGated = (flag,plan)=> PLAN_RANK[flag.minPlan] > PLAN_RANK[plan];

/* ---------- a real switch (role=switch, aria-checked, never color-only) ---------- */
function FlagSwitch({on,locked,onToggle,name}){
  if(locked) return (
    <span className="swlock" role="img" aria-label={name+" — Locked"} title="Plan-gated">
      <i data-lucide="lock"></i></span>);
  return (
    <button type="button" className={"sw"+(on?" on":"")} role="switch" aria-checked={on}
      aria-label={name+" — "+(on?"Enabled":"Disabled")} onClick={onToggle}>
      <span className="trk"><span className="thb"></span></span></button>);
}

/* ---------- main screen ---------- */
function View(){
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const [view,setView]=React.useState("matrix");
  const [pending,setPending]=React.useState({}); // {tenantId:{flagKey:bool}}
  const [saving,setSaving]=React.useState(null);
  const [savedId,setSavedId]=React.useState(null);
  const [toast,setToast]=React.useState(null);
  const [confirm,setConfirm]=React.useState(null); // {tenant,flag}
  const [live,setLive]=React.useState("");

  const effective = (t,key)=> (pending[t.id]&&key in pending[t.id]) ? pending[t.id][key] : t.f[key];
  const dirtyOf = id => pending[id] && Object.keys(pending[id]).length>0;
  const dirtyCount = Object.keys(pending).filter(id=>dirtyOf(id)).length;

  function applyToggle(t,flag){
    const cur=effective(t,flag.key); const next=!cur;
    setPending(p=>{ const tp={...(p[t.id]||{})};
      if(next===t.f[flag.key]){ delete tp[flag.key]; } else { tp[flag.key]=next; }
      const np={...p}; if(Object.keys(tp).length) np[t.id]=tp; else delete np[t.id]; return np; });
    setLive(t.name+(next?" — "+flag.label+" enabled (unsaved)":" — "+flag.label+" disabled (unsaved)"));
  }
  function onToggle(t,flag){
    if(t.status!=="active"&&t.status!=="trial") return;       // suspended/expired = read-only
    if(isGated(flag,t.plan)) return;                          // plan-gated, blocked client-side
    const cur=effective(t,flag.key);
    if(cur && CONFIRM_OFF.has(flag.key)){ setConfirm({tenant:t,flag}); return; } // high-impact disable
    applyToggle(t,flag);
  }
  function save(t){
    setSaving(t.id);
    setTimeout(()=>{                       // optimistic; server is the authority
      setSaving(null);
      setPending(p=>{ const np={...p}; delete np[t.id]; return np; });
      setSavedId(t.id); setToast({tenant:t.name});
      setLive("Feature flags saved for "+t.name);
      setTimeout(()=>setSavedId(s=>s===t.id?null:s),2000);
      setTimeout(()=>setToast(null),3200);
    },700);
  }
  function discard(t){ setPending(p=>{ const np={...p}; delete np[t.id]; return np; });
    setLive("Discarded unsaved changes for "+t.name); }

  const adoption = REGISTRY.map(fl=>{
    const total=TENANTS.length;
    const enabled=TENANTS.filter(t=>t.f[fl.key]).length;
    return {fl,enabled,total,pct:Math.round(enabled/total*100)};
  });

  return <div className="vw vw--flags">
    <div className="ax-sr" aria-live="polite">{live}</div>

    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Feature Flags</h1>
        <div className="ax-sub">Per-tenant feature toggles across the platform.</div></div>
    </div>

    {/* Flag adoption — server-computed rollup (render-only) */}
    <div className="panel">
      <div className="ph"><span className="pt">Flag adoption</span>
        <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Enabled tenants per flag · server-computed</span></div>
      <div className="pb"><div className="ax-grid ax-g3">
        {adoption.map(({fl,enabled,total,pct})=>(
          <div className="atile" key={fl.key}>
            <div className="ah"><span className="al">{fl.label}</span>
              <span className="gchip"><i data-lucide="badge-check"></i>{planGateChip(fl.minPlan)}</span></div>
            <div className="bar-track" role="progressbar" aria-label={fl.label+" adoption: "+enabled+" of "+total+" tenants"}
              aria-valuenow={pct} aria-valuemin="0" aria-valuemax="100">
              <div className="bar-fill" style={{width:pct+"%"}}></div></div>
            <div className="av">{enabled}/{total}</div>
          </div>))}
      </div></div>
    </div>

    {/* Toolbar */}
    <div className="tbar">
      <div className="srch"><i data-lucide="search"></i>
        <input placeholder="Search tenants by name or code…" aria-label="Search tenants by name or code"/></div>
      <button className="sel"><i data-lucide="layers"></i>Plan<i data-lucide="chevron-down"></i></button>
      <button className="sel"><i data-lucide="flag"></i>Flag<i data-lucide="chevron-down"></i></button>
      <div className="vtoggle" role="tablist" aria-label="View">
        <button className={view==="matrix"?"on":""} role="tab" aria-selected={view==="matrix"} onClick={()=>setView("matrix")}><i data-lucide="grid-3x3"></i>Matrix</button>
        <button className={view==="cards"?"on":""} role="tab" aria-selected={view==="cards"} onClick={()=>setView("cards")}><i data-lucide="rows-3"></i>Cards</button>
      </div>
    </div>

    {/* ===== MATRIX (lg+ default) ===== */}
    {view==="matrix" && <div className="panel">
      <div className="mtx-wrap">
        <table className="mtx">
          <thead><tr>
            <th className="tcol lft" scope="col">Tenant</th>
            <th scope="col">Plan</th>
            {REGISTRY.map(fl=><th key={fl.key} scope="col" title={fl.desc}>{fl.label}</th>)}
            <th scope="col" style={{textAlign:"right"}}>Save</th>
          </tr></thead>
          <tbody>
            {TENANTS.map(t=>{
              const ro = t.status!=="active"&&t.status!=="trial";
              const d = dirtyOf(t.id);
              return <tr key={t.id} className={(d?"dirty ":"")+(ro?"ro":"")}>
                <td className="tcell" scope="row">
                  <div className="tname"><span className="nn">{t.name}</span>
                    <span className="cc">{t.code}</span></div></td>
                <td><span className="badge brd">{planLabel(t.plan)}</span></td>
                {REGISTRY.map(fl=>{
                  const gated=isGated(fl,t.plan);
                  return <td key={fl.key}>
                    <FlagSwitch on={effective(t,fl.key)} locked={gated||ro}
                      name={fl.label+" — "+t.name}
                      onToggle={()=>onToggle(t,fl)}/></td>;
                })}
                <td>
                  {ro
                    ? <span className="ax-muted ax-mono" title="Tenant is read-only">—</span>

/* ===== presets ===== */
const PresetsView = (function(){
const Button = L.Button || (({children,leadingIcon,trailingIcon,variant,disabled,onClick})=>
  <button className={"btn btn--"+(variant||"primary")} disabled={disabled} onClick={onClick}>
    {leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}{trailingIcon&&<i data-lucide={trailingIcon}></i>}</button>);

/* ---- Server-canonical dimension catalog (render-only; would come from getEvaluationDimensionCatalog) ---- */

];

  {id:"p1",name:"Standard RELMS Rubric",description:"Balanced rubric for written long-answer grading.",isDefault:true,isPublic:true,

    display:{strengths:true,key:true,priority:false}},
  {id:"p2",name:"Concise Feedback Rubric",description:"Short-form responses; rewards precision over length.",isDefault:false,isPublic:true,
    dims:{clarity:2,accuracy:1,depth:0,grammar:1,relevance:1,critical:0},
    display:{strengths:false,key:true,priority:true}},
  {id:"p3",name:"Critical Reasoning (STEM)",description:"Weights reasoning and accuracy for analytical subjects.",isDefault:false,isPublic:false,
    dims:{clarity:1,accuracy:2,depth:2,grammar:0,relevance:1,critical:3},
    display:{strengths:true,key:false,priority:true}},
  {id:"p4",name:"Language & Grammar Focus",description:"",isDefault:false,isPublic:false,legacy:true,

function DimChips({dims}){
  return <div className="dimset">
    {CATALOG.map(c=>{const w=dims[c.id]||0;const on=w>0;
      return <span key={c.id} className={"dim"+(on?"":" off")}>

  </div>;
}
function Dots({display}){
  const row=(on,icon,label)=> <span className={"dot "+(on?"on":"off")}>

  return <div className="dots">

    {row(display.key,"key-round","Key takeaway")}
    {row(display.priority,"arrow-down-up","Priority sort")}

}

function PresetCard({p,onEdit,onDelete}){

      </div>
      <div className="ax">
        <button className="icon-btn" aria-label="Edit preset" onClick={()=>onEdit(p)}><i data-lucide="pencil"></i></button>

}

function SkeletonCard(){
  return <div className="preset" aria-hidden="true">
    <div className="ph"><div className="tt" style={{gap:"var(--space-2)",width:"100%"}}>
      <div className="sk" style={{height:20,width:200}}></div>
      <div className="sk" style={{height:14,width:300,borderRadius:"var(--radius-sm)"}}></div></div></div>
    <div className="dimset">{[64,72,56,80].map((w,i)=><div key={i} className="sk" style={{height:22,width:w}}></div>)}</div>
  </div>;
}

function Stepper({value,disabled,onChange}){
  return <div className={"stepper"+(disabled?" dis":"")}>
    <button type="button" aria-label="Decrease weight" disabled={disabled||value<=1} onClick={()=>onChange(Math.max(1,value-1))}>−</button>
    <span className="vv">{disabled?"–":value}</span>
    <button type="button" aria-label="Increase weight" disabled={disabled||value>=5} onClick={()=>onChange(Math.min(5,value+1))}>+</button>
  </div>;
}

function Drawer({open,editing,onClose,onSaved}){
  const blank={name:"",description:"",isDefault:false,isPublic:false,
    dims:{clarity:1,accuracy:2,depth:1,grammar:1,relevance:1,critical:0},
    display:{strengths:true,key:true,priority:false}};
  const [form,setForm]=React.useState(blank);
  const [nameErr,setNameErr]=React.useState(false);
  const [saving,setSaving]=React.useState(false);
  const [submitErr,setSubmitErr]=React.useState("");
  const nameRef=React.useRef(null);
  React.useEffect(()=>{
    if(open){
      setForm(editing?{name:editing.name,description:editing.description,isDefault:editing.isDefault,isPublic:editing.isPublic,
        dims:{...editing.dims},display:{...editing.display}}:blank);
      setNameErr(false);setSubmitErr("");setSaving(false);
      setTimeout(()=>nameRef.current&&nameRef.current.focus(),30);
    }
  },[open,editing]);
  if(!open) return null;
  const setDim=(id,w)=>setForm(f=>({...f,dims:{...f.dims,[id]:w}}));
  const toggleDim=(id)=>setForm(f=>({...f,dims:{...f.dims,[id]:(f.dims[id]||0)>0?0:1}}));
  const enabled=CATALOG.filter(c=>(form.dims[c.id]||0)>0);
  const totalW=enabled.reduce((s,c)=>s+(form.dims[c.id]||0),0)||1;
  const otherDefault=PRESETS.find(p=>p.isDefault && (!editing||p.id!==editing.id));
  const save=()=>{
    if(!form.name.trim()){setNameErr(true);nameRef.current&&nameRef.current.focus();return;}
    setSaving(true);setSubmitErr("");
    // server-authoritative, audited write via v1.identity.saveGlobalEvaluationPreset — simulate then re-read
    setTimeout(()=>{ setSaving(false); onSaved(); },650);
  };
  return <>
    <div className="scrim" onClick={()=>!saving&&onClose()}></div>
    <aside className="drawer" role="dialog" aria-modal="true" aria-labelledby="dw-title">
      <div className="dw-h">
        <div className="tt">
          <div className="ti" id="dw-title">{editing?'Edit "'+editing.name+'"':"Create preset"}</div>
          <div className="si">{editing?"Update this evaluation preset.":"Configure a reusable evaluation rubric."}</div>
        </div>
        <button className="icon-btn x" aria-label="Close" onClick={()=>!saving&&onClose()}><i data-lucide="x"></i></button>
      </div>
      <div className="dw-b">
        <div className="fld">
          <label htmlFor="f-name">Name <span className="req">*</span></label>
          <input id="f-name" ref={nameRef} value={form.name} placeholder="e.g. Standard RELMS Rubric"
            aria-invalid={nameErr} onChange={e=>{setForm(f=>({...f,name:e.target.value}));setNameErr(false);}}/>
          {nameErr&&<div className="err"><i data-lucide="alert-circle"></i>Preset name is required.</div>}
        </div>
        <div className="fld">
          <label htmlFor="f-desc">Description</label>
          <textarea id="f-desc" rows="2" placeholder="Optional — when to use this rubric"
            value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}></textarea>
        </div>

        <label className="chk"><input type="checkbox" checked={form.isDefault} onChange={e=>setForm(f=>({...f,isDefault:e.target.checked}))}/>
          <span className="ct"><span className="h">Set as default preset</span>
            <span className="s">Platform-wide fallback rubric. At most one default — server enforced.</span></span></label>
        {form.isDefault&&otherDefault&&<div className="alert warn" role="status" style={{marginTop:"calc(var(--space-2) * -1)"}}>
          <i data-lucide="info" className="lead"></i><div className="ab">This will replace "{otherDefault.name}" as the platform default.</div></div>}

        <label className="chk"><input type="checkbox" checked={form.isPublic} onChange={e=>setForm(f=>({...f,isPublic:e.target.checked}))}/>
          <span className="ct"><span className="h">Public (visible to all tenants)</span>
            <span className="s">Selectable by every tenant's grading config. Audited.</span></span></label>

        <div className="dpanel">
          <div className="pl">Display settings</div>
          <label className="chk"><input type="checkbox" checked={form.display.strengths} onChange={e=>setForm(f=>({...f,display:{...f.display,strengths:e.target.checked}}))}/>
            <span className="ct"><span className="h">Show strengths</span></span></label>
          <label className="chk"><input type="checkbox" checked={form.display.key} onChange={e=>setForm(f=>({...f,display:{...f.display,key:e.target.checked}}))}/>
            <span className="ct"><span className="h">Show key takeaway</span></span></label>
          <label className="chk"><input type="checkbox" checked={form.display.priority} onChange={e=>setForm(f=>({...f,display:{...f.display,priority:e.target.checked}}))}/>
            <span className="ct"><span className="h">Prioritize by importance</span></span></label>
        </div>

        <div className="dpanel">
          <div className="pl">Evaluation dimensions</div>
          {CATALOG.map(c=>{const w=form.dims[c.id]||0;const on=w>0;
            return <div key={c.id} className={"dimrow"+(on?"":" off")}>
              <input type="checkbox" checked={on} aria-label={"Enable "+c.name} onChange={()=>toggleDim(c.id)}/>
              <div className="nx"><span className="h">{c.name} <span className="ax-muted">— {c.description}</span></span></div>
              <Stepper value={on?w:1} disabled={!on} onChange={(nv)=>setDim(c.id,nv)}/>
            </div>;})}
          {enabled.length===0&&<div className="err" style={{color:"var(--status-warning)",fontSize:"var(--text-xs)"}}>
            <i data-lucide="triangle-alert" style={{width:12,height:12}}></i>No dimensions enabled — grading will fall back to platform defaults.</div>}
        </div>

        <div className="dpanel">
          <div className="pl">Preview · how this surfaces in results</div>
          <div className="rprev" role="img" aria-label="Rubric breakdown preview by weighted dimension">
            {enabled.length===0?<div className="ax-muted" style={{fontSize:"var(--text-sm)"}}>Enable a dimension to preview the rubric.</div>:
              enabled.map(c=><div key={c.id} className="rr">
                <span className="rl">{c.name}</span>
                <span className="rt"><span className="rf" style={{width:Math.round((form.dims[c.id]/totalW)*100)+"%"}}></span></span>
                <span className="rw">{form.dims[c.id]}×</span></div>)}
          </div>
        </div>

        {submitErr&&<div className="alert" role="alert"><i data-lucide="alert-circle" className="lead"></i>
          <div className="ab"><span className="at">Couldn't save preset. </span>{submitErr}</div></div>}
      </div>
      <div className="dw-f">
        <Button variant="ghost" disabled={saving} onClick={onClose}>Cancel</Button>
        <Button variant="primary" leadingIcon={saving?undefined:"check"} disabled={saving} onClick={save}>{saving?"Saving…":"Save preset"}</Button>
      </div>
    </aside>
  </>;
}

function ConfirmDelete({target,onClose,onConfirm}){
  const [busy,setBusy]=React.useState(false);
  const cancelRef=React.useRef(null);
  React.useEffect(()=>{ if(target){setBusy(false);setTimeout(()=>cancelRef.current&&cancelRef.current.focus(),30);} },[target]);
  if(!target) return null;
  const run=()=>{ setBusy(true); setTimeout(()=>{ setBusy(false); onConfirm(); },550); };
  return <>
    <div className="cd-scrim" onClick={()=>!busy&&onClose()}></div>
    <div className="cd" role="alertdialog" aria-modal="true" aria-labelledby="cd-title" aria-describedby="cd-body">
      <div className="ci"><i data-lucide="trash-2"></i></div>
      <div className="ct" id="cd-title">Delete preset?</div>
      <div className="cb" id="cd-body">Delete "{target.name}"? Tenants currently using it will fall back to their own rubric. This preset will be archived and hidden from new tenants.</div>
      <div className="cf">
        <Button variant="ghost" disabled={busy} onClick={onClose}><span ref={cancelRef} tabIndex={-1}>Cancel</span></Button>
        <Button variant="danger" leadingIcon={busy?undefined:"trash-2"} disabled={busy} onClick={run}>{busy?"Deleting…":"Delete"}</Button>
      </div>
    </div>
  </>;
}

function View(){
  const [loading,setLoading]=React.useState(false);
  const [drawer,setDrawer]=React.useState({open:false,editing:null});
  const [delTarget,setDelTarget]=React.useState(null);
  const [toast,setToast]=React.useState("");
  const [query,setQuery]=React.useState("");
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  React.useEffect(()=>{ if(toast){const t=setTimeout(()=>setToast(""),2600);return ()=>clearTimeout(t);} },[toast]);

  const rows=PRESETS.filter(p=>p.name.toLowerCase().includes(query.toLowerCase()));
  const defaults=PRESETS.filter(p=>p.isDefault).length;

  return <div className="vw vw--presets">
    <div className="ax-head">
      <div className="tx">
        <h1 className="ax-h1">Global Evaluation Presets</h1>
        <div className="ax-sub">Reusable AI-grading rubric presets available to every tenant. Mark one as the platform default and choose which presets are public.</div>
      </div>
      <div className="ac">
        <Button variant="primary" leadingIcon="plus" onClick={()=>setDrawer({open:true,editing:null})}>Create preset</Button>
      </div>
    </div>

    {/* List-load error state (secondary example — re-runs the read) */}
    <div className="alert" role="alert">
      <i data-lucide="alert-circle" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load evaluation presets. </span>
        <span className="ax-sec">The platform read endpoint returned an error.</span></div>
      <button className="lnk" onClick={()=>{setLoading(true);setTimeout(()=>setLoading(false),900);}}>Try again</button>
    </div>

    <div className="ax-toolbar">
      <div className="ax-inp"><i data-lucide="search"></i>
        <input placeholder="Search presets…" aria-label="Search presets" value={query} onChange={e=>setQuery(e.target.value)}/></div>
      <div className="ax-meta"><b>{PRESETS.length} presets</b> · {defaults} default</div>
    </div>

    {loading ? <div className="ax-col">{[0,1,2].map(i=><SkeletonCard key={i}/>)}</div>
      : rows.length===0 ?
        <div className="empty">
          <div className="ec"><i data-lucide="sliders-horizontal"></i></div>
          <div className="et">No global presets yet</div>
          <div className="eb">Create an evaluation preset to give tenants a consistent, ready-to-use grading rubric.</div>
          <Button variant="secondary" leadingIcon="plus" onClick={()=>setDrawer({open:true,editing:null})}>Create preset</Button>
        </div>
      : <div className="ax-col">
          {rows.map(p=><PresetCard key={p.id} p={p}
            onEdit={(pp)=>setDrawer({open:true,editing:pp})}
            onDelete={(pp)=>setDelTarget(pp)}/>)}
        </div>}

    <Drawer open={drawer.open} editing={drawer.editing}
      onClose={()=>setDrawer({open:false,editing:null})}
      onSaved={()=>{setDrawer({open:false,editing:null});setToast("Preset saved.");}}/>

    <ConfirmDelete target={delTarget}
      onClose={()=>setDelTarget(null)}
      onConfirm={()=>{setDelTarget(null);setToast("Preset deleted.");}}/>

    {toast&&<div className="toast" role="status"><i data-lucide="check-circle-2"></i>{toast}</div>}
  </div>;
}
return View;
})();

const LlmView = (function(){

/* ---- server-authoritative rollup (render-only sample data) ---- */

const fmt$=n=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});

function View(){
  const [monthIdx,setMonthIdx]=React.useState(0); // 0 = current month (June 2026)
  const [sortDir,setSortDir]=React.useState("desc");
  const [tenantFilter,setTenantFilter]=React.useState(null);

    {/* KPI ROW — server-authoritative, render-only */}

      <KPI icon="arrow-down-to-line" label="Input Tokens" value="91.4M" sub="total input"/>
      <KPI icon="arrow-up-from-line" label="Output Tokens" value="22.7M" sub="total output"/>
    </div>

    {/* TREND + BREAKDOWN */}
    <div className="ax-grid ax-gmain">
      <div className="panel">
        {busy && <div className="lov" aria-busy="true"><span className="lc"><i data-lucide="loader-2"></i>Loading {monthLabel}…</span></div>}
        <div className="ph"><span className="pt">Daily Cost Trend</span><span className="psc ax-mono">{monthLabel}</span></div>
        <div className="pb">
          <div className="chart" role="img" aria-label={"Daily LLM cost for "+monthLabel+". Peak $91 on day 13, low $18 on day 1."}>

    {/* PER-TENANT TABLE — drill-through, budget bars, status+budget badges */}

        <thead><tr>

          <th scope="col" className="num">Calls</th>

            <button onClick={()=>setSortDir(sortDir==="desc"?"asc":"desc")}>Cost<i data-lucide={sortDir==="desc"?"chevron-down":"chevron-up"}></i></button></th>
          <th scope="col" className="num">Budget</th>
          <th scope="col" className="num" style={{minWidth:200}}>Usage</th>
        </tr></thead>
        <tbody>{rows.map(([name,code,status,calls,cost,budget,used])=><tr key={code} tabIndex="0"

          <td><div className="tn"><span className="tnn">{name}<i data-lucide="arrow-up-right"></i></span><span className="tnc">{code}</span></div></td>

          <td className="num">{fmtN(calls)}</td>
          <td className="num">{fmt$(cost)}</td>
          <td className="num">{budget==null? <span className="ax-muted">—</span> : fmt$(budget)}</td>
          <td className="num">

                  <div className="ut"><div className="track">
                    <div className={"fill"+(used>=100?" err":used>=80?" warn":"")} style={{width:Math.min(used,100)+"%"}}></div></div></div>
                  <span className={"up"+(used>=100?" err":used>=80?" warn":"")}>
                    {(used>=80)&&<i data-lucide={used>=100?"alert-octagon":"alert-triangle"}></i>}{used}%</span>
                </div>}
          </td>
        </tr>)}</tbody>
      </table>
      <div className="pf">
        <span>Showing {rows.length} of 14 tenants · budgets are configured on each tenant record, observed here</span>
        <span className="ax-row" style={{gap:"var(--space-1)"}}>
          <button className="btn ghost sm" disabled><i data-lucide="chevron-left"></i>Prev</button>
          <span className="ax-mono ax-muted" style={{fontSize:"var(--text-xs)",padding:"0 var(--space-2)"}}>1 / 3</span>
          <button className="btn ghost sm"><i data-lucide="chevron-right"></i>Next</button>
        </span>
      </div>
    </div>

    {/* ============ SECONDARY STATE EXEMPLARS (spec §5) ============ */}
    <div className="statebar">Other states</div>

    {/* Partial / N+1 fallback warning */}
    <div className="alert warn" role="status">
      <i data-lucide="triangle-alert" className="lead"></i>
      <div className="ab"><span className="at">Showing partial data — 12 of 14 tenants rolled up. </span>
        <span className="ax-sec">The platform cost rollup is the authoritative source; per-tenant client aggregation is a fallback. Unrolled: SMMT02, CDR0099.</span></div>
    </div>

    {/* Error state */}
    <div className="alert err" role="alert">
      <i data-lucide="alert-circle" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load platform LLM usage. </span>
        <span className="ax-sec">getSummary timed out. This view reads a nightly cost rollup — if the problem persists, the aggregation job may not have run.</span></div>
      <button className="btn ghost sm act"><i data-lucide="rotate-cw"></i>Try again</button>
    </div>

    {/* Loading skeleton example */}
    <div className="ax-grid ax-g4">
      <KPI skeleton/><KPI skeleton/><KPI skeleton/><KPI skeleton/>
    </div>
    <div className="panel">
      <div className="ph"><span className="pt">Per-Tenant Usage</span><span className="psc ax-muted">Loading…</span></div>
      <div className="pb ax-col">
        {[0,1,2].map(i=><div key={i} className="ax-row" style={{gap:"var(--space-5)"}}>
          <div className="sk" style={{height:16,width:180}}></div>
          <div className="sk" style={{height:16,width:70}}></div>
          <div className="sk" style={{height:16,width:80,marginLeft:"auto"}}></div>
          <div className="sk" style={{height:16,width:80}}></div>
          <div className="sk" style={{height:16,width:120}}></div></div>)}
      </div>
    </div>

    {/* Empty state (zero-usage month) */}

      <div className="ec"><i data-lucide="dollar-sign"></i></div>
