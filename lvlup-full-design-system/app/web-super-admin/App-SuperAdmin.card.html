      <div className="eb">No tenant recorded any LLM activity for {monthLabel}. Usage appears here once tenants use AI grading, tutoring, or question extraction. Cost data aggregates nightly.</div>
    </div></div>

    {/* RBAC note — this screen has no scoped variant; non-super-admins are blocked at the route */}
    <div className="alert" role="note" style={{background:"var(--bg-surface-sunken)"}}>
      <i data-lucide="shield-check" className="lead" style={{color:"var(--text-muted)"}}></i>
      <div className="ab"><span className="at">Super-admin only. </span>
        <span className="ax-sec">Tenant isolation is the hard boundary — only a super-admin reads cross-tenant cost. Tenant admins are redirected to their own AI Usage &amp; Cost screen. Server authorization (isSuperAdmin claim) is the real gate; this UI guard is UX-only. No prompts, completions, student answers, or answer keys are present in this payload.</span></div>
    </div>

    {toast && <div className="toast" role="status"><i data-lucide="check-circle"></i>
      <span>Exported {monthLabel} LLM usage ({rows.length} tenants).</span></div>}
  </div>;
}

return View;
})();

/* ===== system ===== */
const SystemView = (function(){
const Button = L.Button || (({children,leadingIcon,variant,onClick,disabled})=>
  <button className={"btn btn--"+(variant||"primary")} onClick={onClick} disabled={disabled}>
    {leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}</button>);

/* ---- StatusIndicator [PROPOSED FOUNDATION ADDITION]: dot + icon + label, never color-only ---- */
const SI_MAP={operational:["ok","circle-check","Operational"],degraded:["deg","triangle-alert","Degraded"],down:["dn","circle-x","Down"],"no-data":["nd","minus","No data"]};
function StatusIndicator({status}){
  const [cls,icon,label]=SI_MAP[status]||SI_MAP["no-data"];
  return <span className={"si "+cls}><span className="dot" aria-hidden="true"></span>
    <i data-lucide={icon} aria-hidden="true"></i><span>{label}</span></span>;
}

/* ---- probe card ---- */
const PROBE_ICONS={"Firebase Auth":"key-round","Firestore":"database","Cloud Functions":"server","AI Grading Pipeline":"sparkles"};
function ProbeCard({name,desc,status,latencyMs,detail,dim}){
  const tone=status==="down"?"err":status==="degraded"?"warn":"";
  return <div className={"card "+tone} style={dim?{opacity:.6}:null}>
    <div className="probe">
      <div className="tile"><i data-lucide={PROBE_ICONS[name]}></i></div>
      <div className="ax-col" style={{gap:"4px",minWidth:0}}>
        <span className="pn">{name}</span><span className="pd">{desc}</span>
        <div style={{marginTop:"var(--space-2)"}}><StatusIndicator status={status}/></div>
      </div>
      {latencyMs!=null && <span className="lat">{latencyMs} ms</span>}
    </div>
    {detail && <dl className="pdetail"><dt>Detail</dt><dd>{detail}</dd></dl>}
  </div>;
}

/* ---- 30-day uptime ---- */
const today=new Date(2026,5,20);
function dstr(daysAgo){const d=new Date(today);d.setDate(d.getDate()-daysAgo);return d.toISOString().slice(0,10);}
// 30 days, index 0 = 29 days ago … index 29 = today. Mostly healthy, one degraded, one down, one no-data.
const DAYS=Array.from({length:30},(_,i)=>{
  let s="h"; if(i===6)s="d"; if(i===17)s="x"; if(i===24)s="n"; return s;
});
const STATUS_LABEL={h:"Healthy",d:"Degraded",x:"Down",n:"No data"};
function UptimeStrip(){
  return <div className="strip" role="group" aria-label="30-day uptime history">
    {DAYS.map((s,i)=>{const date=dstr(29-i);const label=date+" · "+STATUS_LABEL[s];
      return <span className={"bar "+s+" tip"} key={i} tabIndex="0" role="img" aria-label={label}>
        <span className="tt" role="tooltip">{label}</span></span>;})}
  </div>;
}

/* ---- empty (no snapshots) variant block ---- */
function EmptyHistory({onProbe}){
  return <div className="empty">
    <div className="ei"><i data-lucide="database-zap"></i></div>
    <div className="et">No health data yet</div>
    <div className="eb">The platform health probe hasn't recorded a snapshot. Run a probe to capture the first reading.</div>
    <Button variant="secondary" leadingIcon="refresh-cw" onClick={onProbe}>Re-probe now</Button>
  </div>;
}

const PROBES=[
  {name:"Firebase Auth",desc:"Authentication service",status:"operational",latencyMs:38},
  {name:"Firestore",desc:"Primary database",status:"operational",latencyMs:142},
  {name:"Cloud Functions",desc:"Serverless compute",status:"operational",latencyMs:96},
  {name:"AI Grading Pipeline",desc:"Gemini AI evaluation",status:"degraded",latencyMs:null,detail:"No tenants with AI configured"},
];
const BANNER={operational:["suc","circle-check","All Systems Operational"],degraded:["warn","triangle-alert","Some Services Degraded"],down:["err","circle-x","Service Disruption Detected"]};
const worst=(probes)=>probes.some(p=>p.status==="down")?"down":probes.some(p=>p.status==="degraded")?"degraded":"operational";

function View(){
  const [loading,setLoading]=React.useState(false);
  const [probing,setProbing]=React.useState(false);
  const [checkedAt,setCheckedAt]=React.useState("14:32:07");
  const [toast,setToast]=React.useState(null);
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });

  const overall=worst(PROBES);
  const [bCls,bIcon,bLabel]=BANNER[overall];

  function reprobe(){
    if(probing) return;
    setProbing(true); setToast(null);
    // server-authoritative: never optimistic; cards stay last-known (dimmed) until server confirms
    setTimeout(()=>{ setProbing(false); setCheckedAt("14:37:55");
      setToast({tone:"warn",msg:"Health re-probed — Some services degraded"});
      setTimeout(()=>setToast(null),4200);
    },1400);
  }

  return <div className="vw vw--system">
    {/* ERROR-state example (secondary block) — health read itself fails; role=status */}
    <div className="banner err" role="status" aria-live="polite" style={{display:"flex"}}>
      <i data-lucide="circle-alert" className="bi" aria-hidden="true"></i>
      <div className="ax-col" style={{gap:"2px"}}>
        <span className="bt" style={{fontSize:"var(--text-base)"}}>Couldn't load system health</span>
        <span className="ax-sec" style={{fontSize:"var(--text-sm)"}}>Health service is temporarily unavailable.</span>
      </div>
      <div style={{marginLeft:"auto"}}><Button variant="ghost" leadingIcon="rotate-cw">Try again</Button></div>
    </div>

    {/* PAGE HEADER */}
    <div className="ax-head">
      <div className="tx">
        <h1 className="ax-h1">System Health</h1>
        <div className="ax-sub">Live platform service and infrastructure status</div>
        <div className="ax-cap" aria-live="polite">{probing?"Probing… · auto every 5 min":"Last checked "+checkedAt.slice(0,5)+" · auto every 5 min"}</div>
      </div>
      <div className="ac">
        <Button variant="secondary" disabled={probing} onClick={reprobe}>
          <i data-lucide="refresh-cw" className={probing?"spin":""} style={{width:15,height:15}}></i>
          {probing?"Probing…":"Re-probe now"}
        </Button>
      </div>
    </div>

    {/* OVERALL STATUS BANNER (derived from worst probe) — role=status aria-live=polite */}
    <div className={"banner "+bCls} role="status" aria-live="polite">
      <i data-lucide={bIcon} className="bi" aria-hidden="true"></i>
      <span className="bt">{bLabel}</span>
      <span className="bk">checked {checkedAt}</span>
    </div>

    {/* SERVICE PROBES — 2-col grid */}
    <div>
      <div className="sec-h"><span className="st">Service probes</span></div>
      <div className="ax-grid ax-g2">
        {PROBES.map(p=> <ProbeCard key={p.name} {...p} dim={probing}/>)}
      </div>
    </div>

    {/* 30-DAY UPTIME */}
    <div className="panel">
      <div className="ph"><span className="pt">30-Day Uptime History</span>
        <span className="ax-cap">Server-authoritative · read-only</span></div>
      <div className="pb">
        <UptimeStrip/>
        <div className="legend">
          <span className="lg"><span className="sw" style={{background:"var(--status-success)"}}></span><i data-lucide="circle-check" style={{color:"var(--status-success)"}}></i>Healthy</span>
          <span className="lg"><span className="sw" style={{background:"var(--status-warning)"}}></span><i data-lucide="triangle-alert" style={{color:"var(--status-warning)"}}></i>Degraded</span>
          <span className="lg"><span className="sw" style={{background:"var(--status-error)"}}></span><i data-lucide="circle-x" style={{color:"var(--status-error)"}}></i>Down</span>
          <span className="lg"><span className="sw" style={{background:"var(--bg-inset)",border:"1px solid var(--border-subtle)"}}></span><i data-lucide="minus"></i>No data</span>
          <span className="upt">99.2% uptime · last 30 days</span>
        </div>
        {/* sr-only table fallback */}
        <table className="ax-sr"><caption>30-day uptime history</caption><thead><tr><th>Date</th><th>Status</th></tr></thead>
          <tbody>{DAYS.map((s,i)=><tr key={i}><td>{dstr(29-i)}</td><td>{STATUS_LABEL[s]}</td></tr>)}</tbody></table>
      </div>
    </div>

    {/* PLATFORM METRICS — 3 stats */}
    <div className="panel">
      <div className="ph"><span className="pt">Platform Metrics</span></div>
      <div className="pb"><div className="ax-grid ax-g3">
        <div className="stat">
          <span className="sl"><i data-lucide="gauge"></i>Avg Response Time
            <span className="tip" tabIndex="0" style={{display:"inline-flex"}}><i data-lucide="info" style={{width:13,height:13}}></i><span className="tt" role="tooltip">Firestore read latency</span></span></span>
          <span className="sv">142<span className="ax-muted" style={{fontSize:"var(--text-lg)"}}> ms</span></span>
          <span className="ss">Firestore read latency</span>
        </div>
        <div className="stat">
          <span className="sl"><i data-lucide="users"></i>Total Users</span>
          <span className="sv">12,480</span>
          <span className="ss">across 24 active tenants</span>
        </div>
        <div className="stat">
          <span className="sl"><i data-lucide="alert-triangle"></i>Errors (24h)
            <span className="tip" tabIndex="0" style={{display:"inline-flex"}}><i data-lucide="info" style={{width:13,height:13}}></i><span className="tt" role="tooltip">gradingDeadLetter + llmCallLogs status==error, 24h</span></span></span>
          <span className="sv err">3</span>
          <span className="ss">3 errors in the last 24 hours</span>
        </div>
      </div></div>
    </div>

    {/* ===== SECONDARY STATE EXAMPLES (each spec'd state present in markup) ===== */}
    <div className="sec-h"><span className="st">State references — loading · empty · stale</span></div>

    {/* LOADING (skeleton) */}
    <div className="ax-grid ax-g2">
      <div className="panel">
        <div className="ph"><span className="pt">Loading skeleton</span><span className="ax-cap">aria-busy</span></div>
        <div className="pb" aria-busy="true">
          <div className="card" style={{marginBottom:"var(--space-3)"}}>

        </div>
        <dl className="deflist">
          <dt>Provider</dt><dd>Gemini <span className="ax-muted" style={{fontSize:"var(--text-2xs)"}}>(read-only)</span></dd>
          <dt>Default API key</dt><dd className="ax-mono">•••• (stored in Secret Manager)</dd>
        </dl>
        <span className="hint" style={{display:"flex",alignItems:"center",gap:6}}>
          <i data-lucide="lock" style={{width:13,height:13}}></i>Keys are write-only and never displayed.</span>

        <div className="sec-lbl">Other AI-status states</div>
        <div className="ax-row ax-wrap" style={{flexWrap:"wrap",gap:"var(--space-3)"}}>
          <span className="bdg warn"><i data-lucide="circle-alert"></i>Not configured</span>
          <span className="bdg info"><i data-lucide="loader"></i>Checking…</span>
        </div>
      </SCard>

      {/* 4 — Platform Contact & Branding */}
      <SCard icon="globe" title="Platform Contact & Branding"
        desc="Shown on the platform sign-in surface and in system emails.">
        <div className="grid2">
          <div className="fld">
            <label htmlFor="sup">Support email</label>
            <input id="sup" type="email" value={supportEmail} onChange={e=>{setSupportEmail(e.target.value);mark();}}
              aria-invalid={emailErr} aria-describedby={emailErr?"sup-e":undefined}/>
            {emailErr && <span className="err" id="sup-e"><i data-lucide="circle-alert"></i>Support email must be a valid address.</span>}
          </div>
          <div className="fld">
            <label htmlFor="pn">Platform name</label>
            <input id="pn" type="text" value={platformName} onChange={e=>{setPlatformName(e.target.value);mark();}}/>
          </div>
        </div>
        <div className="fld">
          <label>Logo</label>
          <div style={{display:"flex",alignItems:"center",gap:"var(--space-3)",padding:"var(--space-5)",border:"1px dashed var(--border-strong)",borderRadius:"var(--radius-md)",color:"var(--text-muted)",background:"var(--bg-surface-sunken)"}}>
            <i data-lucide="upload-cloud" style={{width:20,height:20}}></i>
            <div><div style={{fontSize:"var(--text-sm)",color:"var(--text-secondary)",fontWeight:"var(--weight-medium)"}}>Drop logo here or browse</div>
              <div style={{fontSize:"var(--text-xs)"}}>PNG or SVG, up to 1 MB</div></div>
          </div>
        </div>
      </SCard>

      {/* 5 — Provisioning Defaults */}
      <SCard icon="settings-2" title="Provisioning Defaults"
        desc="Applied to every newly provisioned tenant. Enforced server-side at create time.">
        <div className="grid2">
          <div className="fld">
            <label htmlFor="plan">Default plan</label>
            <select id="plan" value={plan} onChange={e=>{setPlan(e.target.value);mark();}}>
              <option value="trial">Trial</option>
              <option value="starter">Starter</option>
              <option value="pro">Pro</option>
              <option value="enterprise">Enterprise</option>
            </select>
          </div>
          <div className="fld">
            <label htmlFor="mt">Max tenants allowed</label>
            <input id="mt" type="number" min="0" value={maxTenants} placeholder="Unlimited"
              onChange={e=>{setMaxTenants(e.target.value);mark();}}/>
            <span className="hint">Leave empty for Unlimited.</span>
          </div>
        </div>
      </SCard>

      {/* 6 — Maintenance Mode (danger framing + ConfirmDialog) */}
      <SCard icon="power" title="Maintenance Mode" danger
        desc="When enabled, all non-admin users see a maintenance page and cannot access the platform.">
        <div className="frow" style={{borderTop:"none",padding:0}}>
          <div className="ft">
            <div className="fn">Lock out all non-admin users
              {maint && <span className="bdg warn" style={{marginLeft:6}}><i data-lucide="lock"></i>Active</span>}</div>
            <div className="fd">Records intent. Lockout is enforced server-side and honored by every app.</div>
          </div>
          <Switch on={maint} danger label="Maintenance mode"
            onToggle={()=> setConfirm(maint?"off":"on")}/>
        </div>
      </SCard>

      {/* 7 — Admin Account */}
      <SCard icon="shield" title="Admin Account" desc="Your platform super-admin session.">
        <div className="ax-row" style={{justifyContent:"space-between"}}>
          <div className="ax-row">
            <div style={{width:40,height:40,borderRadius:"var(--radius-pill)",background:"var(--brand-subtle)",color:"var(--brand-primary)",display:"grid",placeItems:"center",fontWeight:"var(--weight-semibold)",fontSize:"var(--text-sm)"}}>SA</div>
            <div><div style={{fontSize:"var(--text-sm)",fontWeight:"var(--weight-medium)"}}>Sam Avery · Super Admin</div>
              <div style={{fontSize:"var(--text-xs)",color:"var(--text-muted)"}}>sam.avery@levelup.io</div></div>
          </div>
          <button className="btn btn--secondary"><i data-lucide="log-out"></i>Sign out</button>
        </div>
      </SCard>

      {/* ---- Secondary state examples (labelled, for spec §5 coverage) ---- */}
      <div className="sec-lbl">Loading state · 4 card skeletons (shown before config resolves)</div>
      <section className="scard" aria-label="Loading skeleton example">
        <div className="sb" style={{paddingTop:"var(--space-5)"}}>
          <div className="sk sk-sh" style={{height:18,width:160}}></div>
          <div className="sk sk-sh" style={{height:12,width:260}}></div>
          <div className="sk sk-sh" style={{height:40,width:"100%"}}></div>
          <div className="sk sk-sh" style={{height:40,width:"100%"}}></div>
        </div>
      </section>

      <div className="sec-lbl">Error state · load failure (role=alert)</div>
      <div className="alert err" role="alert">
        <i data-lucide="circle-x" className="lead"></i>
        <div className="ab"><span className="at">Couldn't load platform settings. </span>
          <span className="ax-sec">The request to identity.getPlatformConfig failed.</span></div>
        <span className="lnk">Try again</span>
      </div>

    </div>

    {/* Maintenance ConfirmDialog */}
    {confirm && <div className="ov" role="presentation" onClick={()=>setConfirm(null)}>
      <div className="dlg" role="alertdialog" aria-modal="true" aria-labelledby="cf-t" aria-describedby="cf-b" onClick={e=>e.stopPropagation()}>
        <div className="dh"><div className="ic"><i data-lucide="triangle-alert"></i></div>
          <div className="dt" id="cf-t">{confirm==="on"?"Enable maintenance mode?":"Disable maintenance mode?"}</div></div>
        <div className="db" id="cf-b">{confirm==="on"
          ? "This will prevent all non-admin users from accessing the platform. They will see a maintenance page instead."
          : "This will restore access for all users."}</div>
        <div className="df">
          <button className="btn btn--ghost" onClick={()=>setConfirm(null)}>Cancel</button>
          {confirm==="on"
            ? <button className="btn btn--danger" onClick={armMaint}><i data-lucide="power"></i>Enable maintenance mode</button>
            : <button className="btn btn--primary" onClick={disarmMaint}>Restore access</button>}
        </div>
      </div>
    </div>}

    {/* Save Toast */}
    {toast && <div className={"toast "+toast.kind} role="status">
      <i data-lucide={toast.kind==="suc"?"circle-check":"circle-x"}></i>
      <div><div style={{fontWeight:"var(--weight-semibold)"}}>{toast.msg}</div></div>
    </div>}

  </div>;
}

return View;
})();

/* ============ hash router ============ */
const ROUTES = [
  {pattern:/^\/?$/,                 view:OverviewView,      active:"/",              crumb:["Dashboard"]},
  {pattern:/^\/tenants\/[^/]+$/,    view:TenantDetailView,  active:"/tenants",       crumb:["Tenants","Northwood Academy"]},
  {pattern:/^\/tenants\/?$/,        view:TenantsView,       active:"/tenants",       crumb:["Platform","Tenants"]},
  {pattern:/^\/users\/?$/,          view:UsersView,         active:"/users",         crumb:["Platform","Users"]},
  {pattern:/^\/analytics\/?$/,      view:AnalyticsView,     active:"/analytics",     crumb:["Platform","Analytics"]},
  {pattern:/^\/feature-flags\/?$/,  view:FlagsView,         active:"/feature-flags", crumb:["Control","Feature Flags"]},
  {pattern:/^\/presets\/?$/,        view:PresetsView,       active:"/presets",       crumb:["Control","Evaluation Presets"]},
  {pattern:/^\/llm-usage\/?$/,      view:LlmView,           active:"/llm-usage",     crumb:["Platform","LLM Usage & Cost"]},
  {pattern:/^\/system\/?$/,         view:SystemView,        active:"/system",        crumb:["Control","System Health"]},
  {pattern:/^\/billing\/?$/,        view:BillingView,       active:"/billing",       crumb:["Control","Billing"]},
  {pattern:/^\/announcements\/?$/,  view:AnnouncementsView, active:"/announcements", crumb:["Broadcast","Announcements"]},
  {pattern:/^\/settings\/?$/,       view:SettingsView,      active:"/settings",      crumb:["Platform","Settings"]},
];
function getPath(){ let h=window.location.hash.replace(/^#/,""); if(!h) return "/"; return h; }
function resolve(path){
  for(const r of ROUTES){ if(r.pattern.test(path)) return r; }
  return ROUTES[0];
}
function App(){
  const [path,setPath]=React.useState(getPath());
  React.useEffect(()=>{ const on=()=>setPath(getPath()); window.addEventListener("hashchange",on); return ()=>window.removeEventListener("hashchange",on); },[]);
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
  const r=resolve(path); const View=r.view;
  return <Shell active={r.active} crumb={r.crumb}><View/></Shell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
