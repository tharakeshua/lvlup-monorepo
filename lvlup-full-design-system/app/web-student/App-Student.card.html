  }
` );
function View_Goals({ go, params, query, ctx }) {
  const {
    Button, IconButton, Icon, Input, Select, Field,
    Avatar, Badge, Chip, Timeline,
    EmptyState, Alert, ProgressBar,
    Modal, Accordion, Toast
  } = LU;
  const { useState, useEffect, useRef, useCallback } = React;
  const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ============ TARGET TYPE META ============ */
  const TYPE_META = {
    spaces:       { label: "Spaces",   unit: "spaces",   icon: "layout-grid" },
    story_points: { label: "Sections", unit: "sections", icon: "git-branch" },
    items:        { label: "Items",    unit: "items",    icon: "list-checks" },
    exams:        { label: "Exams",    unit: "exams",    icon: "file-check" },
    minutes:      { label: "Minutes",  unit: "min",      icon: "timer" },
  };
  const TYPE_OPTIONS = [
    { value: "spaces", label: "Spaces" },
    { value: "story_points", label: "Sections" },
    { value: "items", label: "Items" },
    { value: "exams", label: "Exams" },
    { value: "minutes", label: "Study minutes" },
  ];

  /* ============ SEED DATA ============ */
  const INITIAL_GOALS = [
    { id: "g1", title: "Finish the Math spaces", targetType: "spaces",  targetCount: 5,   currentCount: 3,   endDate: "2026-06-26", due: "Fri", proximity: "info" },
    { id: "g2", title: "Study this week",        targetType: "minutes", targetCount: 300, currentCount: 180, endDate: "2026-06-28", due: "Sun", proximity: "info", linear: true },
    { id: "g3", title: "Practice DSA items",     targetType: "items",   targetCount: 20,  currentCount: 18,  endDate: "2026-06-21", due: "tomorrow", proximity: "warning" },
    { id: "g4", title: "Wrap up Recursion",      targetType: "story_points", targetCount: 4, currentCount: 1, endDate: "2026-06-18", due: "past", proximity: "error" },
  ];
  const COMPLETED = [
    { id: "c1", title: "Pass 2 exams",          when: "Jun 14" },
    { id: "c2", title: "10 items in DSA",       when: "Jun 11" },
    { id: "c3", title: "Study 200 min last wk", when: "Jun 08" },
    { id: "c4", title: "Finish Arrays space",   when: "Jun 02" },
  ];
  const HEAT = [
    [0,1,2,1,0,0,0],[1,2,3,2,1,0,1],[2,1,0,1,2,3,1],[0,0,1,2,1,1,0],
    [1,2,2,1,3,2,1],[2,3,1,0,1,2,2],[0,1,2,3,2,1,0],[1,2,3,2,2,3,0],
  ];
  const HEAT_MIN = { 0: 0, 1: 20, 2: 45, 3: 75 };
  const SESSIONS = [
    { date: "Jun 19", time: "Fri", min: 45, items: 8, pts: 60, spaces: "Recursion, Arrays", variant: "success" },
    { date: "Jun 18", time: "Thu", min: 30, items: 5, pts: 40, spaces: "Sorting", variant: "success" },
    { date: "Jun 17", time: "Wed", min: 50, items: 9, pts: 70, spaces: "Hash Maps", variant: "success" },
    { date: "Jun 16", time: "Tue", min: 25, items: 4, pts: 30, spaces: "Trees", variant: "muted" },
  ];
  const WEEK = [
    { dow: "Mon", num: 16, due: 0 },
    { dow: "Tue", num: 17, due: 0 },
    { dow: "Wed", num: 18, due: 0, today: true },
    { dow: "Thu", num: 19, due: 0 },
    { dow: "Fri", num: 20, due: 1 },
    { dow: "Sat", num: 21, due: 2 },
    { dow: "Sun", num: 22, due: 1 },
  ];

  const dueChip = (g) => {
    if (g.proximity === "error")
      return <Badge variant="error" icon={<Icon name="flag" size={12}/>}>Past your date — finish strong</Badge>;
    if (g.proximity === "warning")
      return <Badge variant="warning" icon={<Icon name="alarm-clock" size={12}/>}>Due {g.due}</Badge>;
    return <Badge variant="info" icon={<Icon name="calendar" size={12}/>}>Due {g.due}</Badge>;
  };

  /* ============ CELEBRATION ============ */
  function CelebrationBurst({ active, anchor }) {
    if (!active || reduceMotion) return null;
    const particles = Array.from({ length: 14 }, (_, i) => {
      const ang = (i / 14) * Math.PI * 2;
      const r = 70 + (i % 3) * 24;
      return { dx: Math.cos(ang) * r + "px", dy: Math.sin(ang) * r + "px", delay: (i % 4) * 30 };
    });
    const style = anchor ? { position: "fixed", left: anchor.x, top: anchor.y, width: 0, height: 0 } : {};
    return (
      <div className="gol-burst-overlay" aria-hidden="true">
        <div style={style}>
          {particles.map((p, i) => (
            <span key={i} className="gol-spark-particle"
              style={{ "--dx": p.dx, "--dy": p.dy, animationDelay: p.delay + "ms" }}/>
          ))}
        </div>
      </div>
    );
  }
  function BurstBanner({ active }) {
    if (!active || reduceMotion) return null;
    return (
      <div className="gol-burst-banner" aria-hidden="true">
        <div className="gol-burst-card"><Icon name="party-popper" size={18}/> Goal met! You set it, you crushed it.</div>
      </div>
    );
  }

  /* ============ GOAL CARD ============ */
  function GoalCard({ g, celebrating, justInserted, onEdit, onRemove }) {
    const [menu, setMenu] = useState(false);
    const meta = TYPE_META[g.targetType];
    const pct = Math.min(100, Math.round((g.currentCount / g.targetCount) * 100));
    const done = g.currentCount >= g.targetCount || celebrating;
    const ringVal = done ? 100 : pct;
    const aLabel = g.currentCount + " of " + g.targetCount + " " + meta.unit + " · " + pct + "%";
    return (
      <div className={"gol-card-surface gol-goalcard" + (justInserted ? " gol-listin" : "") + (celebrating ? " gol-spark-ring" : "")}>
        <div className="gol-goalcard__ring-wrap">
          <div className={"ring gol-ringbig" + (celebrating ? " gol-spring-pop" : "")}
            role="img" aria-label={aLabel}
            style={{ "--ring-pct": ringVal, "--ring-size": "92px" }}>
            <span className="ring__label">
              {done ? <Icon name="check" size={22}/> : <span className="gol-mono">{pct}%</span>}
            </span>
          </div>
          <span className="gol-goalcard__counts gol-mono">{g.currentCount} / {g.targetCount}</span>
        </div>

        <div className="gol-goalcard__body">
          <span className="gol-goalcard__title">{g.title}</span>
          <div className="gol-goalcard__meta">
            <Chip><Icon name={meta.icon} size={12}/> {meta.label}</Chip>
            {dueChip(g)}
          </div>
          {g.linear && (
            <div style={{ marginTop: "var(--space-1)" }}>
              <ProgressBar value={pct} variant="spark"/>
            </div>
          )}
          <span className="gol-goalcard__num-line">
            <strong>{g.currentCount}</strong> of <strong>{g.targetCount}</strong> {meta.unit} done
          </span>
        </div>

        <div className="gol-goalcard__menu gol-ddmenu-wrap">
          <IconButton size="sm" icon={<Icon name="more-horizontal" size={18}/>}
            label={"Options for " + g.title}
            aria-haspopup="menu" aria-expanded={menu}
            onClick={() => setMenu(m => !m)}/>
          {menu && (
            <div className="gol-ddmenu" role="menu" onMouseLeave={() => setMenu(false)}>
              <button className="gol-ddmenu__item" role="menuitem" onClick={() => { setMenu(false); onEdit(g); }}>
                <Icon name="pencil" size={15}/> Edit goal
              </button>
              <button className="gol-ddmenu__item gol-ddmenu__item--danger" role="menuitem" onClick={() => { setMenu(false); onRemove(g); }}>
                <Icon name="trash-2" size={15}/> Remove
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ============ HEATMAP ============ */
  function Heatmap() {
    const [pop, setPop] = useState(null);
    const dows = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
    return (
      <div className="gol-heatmap" style={{ position: "relative" }}>
        <div className="gol-heatmap__weeks">
          {HEAT.map((week, wi) => (
            <div className="gol-heatmap__week" key={wi}>
              {week.map((lvl, di) => {
                const min = HEAT_MIN[lvl];
                const label = dows[di] + " wk" + (wi+1) + " — " + (min ? min + " minutes studied" : "no study logged");
                return (
                  <div key={di} tabIndex={0} className={"gol-heatcell gol-heatcell--l" + lvl}
                    role="img" aria-label={label}
                    onMouseEnter={(e) => { const r = e.currentTarget.getBoundingClientRect(); setPop({ x: r.left + r.width/2, y: r.top, min, dow: dows[di], wi }); }}
                    onFocus={(e) => { const r = e.currentTarget.getBoundingClientRect(); setPop({ x: r.left + r.width/2, y: r.top, min, dow: dows[di], wi }); }}
                    onMouseLeave={() => setPop(null)}
                    onBlur={() => setPop(null)}/>
                );
              })}
            </div>
          ))}
        </div>
        <div className="gol-heatmap__legend">
          Less
          <span className="gol-heatmap__legend-swatch gol-heatcell--l0"/>
          <span className="gol-heatmap__legend-swatch gol-heatcell--l1"/>
          <span className="gol-heatmap__legend-swatch gol-heatcell--l2"/>
          <span className="gol-heatmap__legend-swatch gol-heatcell--l3"/>
          More
        </div>
        {pop && (
          <div className="gol-heatpop" style={{ left: pop.x, top: pop.y, position: "fixed" }} role="status">
            {pop.dow} · {pop.min ? <span className="gol-mono">{pop.min} min studied</span> : "No study logged"}
          </div>
        )}
        <div className="gol-streakline">
          <span className="gol-streakline__flame"><Icon name="flame" size={18}/></span>
          You studied <strong style={{ margin: "0 4px" }}>6 of the last 7 days</strong> — keep the spark going.
        </div>
      </div>
    );
  }

  /* ============ SESSIONS TIMELINE ============ */
  function SessionTimeline() {
    return (
      <Timeline items={SESSIONS.map(s => ({
        time: s.date,
        variant: s.variant,
        label: (
          <div className="gol-sessrow">
            <div className="gol-sessrow__head">
              <span style={{ fontWeight: "var(--weight-semibold)", color: "var(--text-primary)" }}>{s.time}</span>
              <span className="gol-sessmeta">
                <strong className="gol-mono">{s.min} min</strong> · {s.items} items · {s.pts} pts
              </span>
            </div>
            <div className="gol-sesssub">{s.spaces}</div>
          </div>
        ),
      }))}/>
    );
  }

  /* ============ CREATE / EDIT MODAL ============ */
  function GoalModal({ open, mode, initial, onClose, onSave }) {
    const [title, setTitle] = useState("");
    const [type, setType] = useState("spaces");
    const [count, setCount] = useState("");
    const [endDate, setEndDate] = useState("");
    const [errors, setErrors] = useState({});

    useEffect(() => {
      if (open) {
        setTitle(initial ? initial.title : "");
        setType(initial ? initial.targetType : "spaces");
        setCount(initial ? String(initial.targetCount) : "");
        setEndDate(initial ? initial.endDate : "");
        setErrors({});
      }
    }, [open, initial]);

    const today = "2026-06-20";
    const submit = () => {
      const e = {};
      if (!title.trim()) e.title = "Give your goal a name.";
      if (!count || Number(count) < 1) e.count = "Aim for at least 1.";
      if (!endDate) e.date = "Pick a date in the future.";
      else if (endDate < today) e.date = "Pick a date in the future.";
      setErrors(e);
      if (Object.keys(e).length) return;
      onSave({ title: title.trim(), targetType: type, targetCount: Number(count), endDate });
    };

    return (
      <Modal open={open} onClose={onClose}
        title={mode === "edit" ? "Edit goal" : "Set a study goal"}
        footer={
          <React.Fragment>
            <Button variant="ghost" onClick={onClose}>Cancel</Button>
            <Button variant="spark" leadingIcon={<Icon name="target" size={15}/>} onClick={submit}>
              {mode === "edit" ? "Save changes" : "Set goal"}
            </Button>
          </React.Fragment>
        }>
        <div className="gol-formgrid">
          <Field label="What are you aiming for?" required htmlFor="g-title" error={errors.title}>
            <Input id="g-title" value={title} error={!!errors.title}
              onChange={(e) => setTitle(e.target.value)}
              placeholder="e.g. Finish the Recursion space"
              aria-required="true" aria-describedby={errors.title ? "g-title-err" : undefined}/>
          </Field>

          <div className="gol-form-row2">
            <Field label="Track by" required htmlFor="g-type"
              hint="Spaces, sections, items, exams, or study minutes.">
              <Select id="g-type" options={TYPE_OPTIONS} value={type}
                onChange={(e) => setType(e.target.value)} aria-required="true"/>
            </Field>
            <Field label="How many?" required htmlFor="g-count" error={errors.count}>
              <Input id="g-count" type="number" min="1" value={count} error={!!errors.count}
                onChange={(e) => setCount(e.target.value)} placeholder="e.g. 5"
                aria-required="true"/>
            </Field>
          </div>

          <div className="gol-form-row2">
            <Field label="Starts" htmlFor="g-start" hint="Today — we start tracking now.">
              <span className="gol-startchip" id="g-start">
                <Icon name="calendar-check" size={15}/> Thu, Jun 20
              </span>
            </Field>
            <Field label="By when?" required htmlFor="g-end" error={errors.date}>
              <Input id="g-end" type="date" min={today} value={endDate} error={!!errors.date}
                onChange={(e) => setEndDate(e.target.value)} aria-required="true"/>
            </Field>
          </div>
        </div>
      </Modal>
    );
  }

  /* ============ CONFIRM DELETE MODAL ============ */
  function ConfirmRemove({ open, goal, onClose, onConfirm }) {
    return (
      <Modal open={open} onClose={onClose} title="Remove this goal?"
        footer={
          <React.Fragment>
            <Button variant="ghost" onClick={onClose}>Keep it</Button>
            <Button variant="danger" leadingIcon={<Icon name="trash-2" size={15}/>} onClick={onConfirm}>Remove</Button>
          </React.Fragment>
        }>
        <p style={{ margin: 0, color: "var(--text-secondary)", fontSize: "var(--text-sm)", lineHeight: "var(--leading-sm)" }}>
          {goal ? <span><strong style={{ color: "var(--text-primary)" }}>“{goal.title}”</strong> will be removed from your planner. Your study history stays.</span> : null}
        </p>
      </Modal>
    );
  }

  /* ============ SCREEN BODY ============ */
  const [goals, setGoals] = useState(INITIAL_GOALS);
  const [filterDay, setFilterDay] = useState(null);
  const [modal, setModal] = useState({ open: false, mode: "create", initial: null });
  const [confirm, setConfirm] = useState({ open: false, goal: null });
  const [toast, setToast] = useState(null);
  const [insertedId, setInsertedId] = useState(null);
  const [celebrateId, setCelebrateId] = useState(null);
  const [announce, setAnnounce] = useState("");
  const toastTimer = useRef(null);

  const flashToast = useCallback((t) => {
    setToast(t);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2600);
  }, []);

  const activeCount = goals.length;
  const dueThisWeek = goals.filter(g => g.proximity !== "error").length;

  const dueByNum = { 20: ["g1"], 21: ["g3"], 22: ["g2"] };
  const filtered = filterDay == null ? goals
    : goals.filter(g => (dueByNum[filterDay] || []).includes(g.id));

  const openCreate = () => setModal({ open: true, mode: "create", initial: null });
  const openEdit = (g) => setModal({ open: true, mode: "edit", initial: g });

  const handleSave = (data) => {
    if (modal.mode === "edit") {
      setGoals(gs => gs.map(g => g.id === modal.initial.id ? { ...g, ...data } : g));
      flashToast({ variant: "success", title: "Goal updated." });
    } else {
      const id = "new-" + Date.now();
      const newGoal = { id, ...data, currentCount: 0, due: "soon", proximity: "info", linear: data.targetType === "minutes" };
      setGoals(gs => [newGoal, ...gs]);
      setInsertedId(id);
      setTimeout(() => setInsertedId(null), 700);
      flashToast({ variant: "success", title: "Goal set — you’ve got this." });
    }
    setModal({ open: false, mode: "create", initial: null });
  };

  const handleRemoveConfirm = () => {
    const g = confirm.goal;
    setGoals(gs => gs.filter(x => x.id !== g.id));
    setConfirm({ open: false, goal: null });
    flashToast({ variant: "info", title: "Goal removed." });
  };

  const fireCelebration = () => {
    setGoals(gs => gs.map(g => g.id === "g3" ? { ...g, currentCount: g.targetCount } : g));
    setCelebrateId("g3");
    setAnnounce("Goal met! You set it, you crushed it. Practice DSA items is complete.");
    flashToast({ variant: "success", title: "Goal met! 🎉 You set it, you crushed it." });
    setTimeout(() => setCelebrateId(null), 2000);
  };

  return (
    <div className="gol-root">
      <div aria-live="polite" className="gol-sr-only">{announce}</div>

      {/* HEADER */}
      <header className="gol-gh">
        <div>
          <h1 className="gol-gh__title">Your goals</h1>
          <p className="gol-gh__sub">You set the pace.</p>
        </div>
        <Button variant="spark" leadingIcon={<Icon name="plus" size={16}/>} onClick={openCreate}>New goal</Button>

        <div className="gol-card-surface gol-rollup-tile">
          <span className="gol-rollup-tile__icon gol-rollup-tile__icon--active"><Icon name="target" size={22}/></span>

            <div className="gol-rollup-tile__num">{activeCount}</div>
            <div className="gol-rollup-tile__label">Active goals</div>
          </div>
        </div>
        <div className="gol-card-surface gol-rollup-tile">
          <span className="gol-rollup-tile__icon gol-rollup-tile__icon--due"><Icon name="calendar-clock" size={22}/></span>
          <div>
            <div className="gol-rollup-tile__num">{dueThisWeek}</div>
            <div className="gol-rollup-tile__label">Due this week</div>
          </div>
        </div>
        <div className="gol-card-surface gol-rollup-tile">
          <span className="gol-rollup-tile__icon gol-rollup-tile__icon--done"><Icon name="check-check" size={22}/></span>
          <div>
            <div className="gol-rollup-tile__num">{COMPLETED.length + (celebrateId ? 1 : 0)}</div>
            <div className="gol-rollup-tile__label">Completed</div>
          </div>
        </div>
      </div>

      {/* WEEK STRIP */}
      <div className="gol-card-surface gol-weekstrip">
        <div className="gol-weekstrip__head">
          <span className="gol-weekstrip__title">This week · tap a day to filter by due date</span>
          {filterDay != null && (
            <Button variant="ghost" size="sm" trailingIcon={<Icon name="x" size={14}/>}
              onClick={() => setFilterDay(null)}>Clear filter</Button>
          )}
        </div>
        <div className="gol-weekstrip__rail" role="group" aria-label="Week of June 16">
          {WEEK.map(d => (
            <button key={d.num}
              className={"gol-daycell" + (d.today ? " gol-daycell--today" : "")}
              aria-pressed={filterDay === d.num}
              aria-label={d.dow + ", Jun " + d.num + (d.due ? " — " + d.due + " goal" + (d.due > 1 ? "s" : "") + " due" : " — no goals due") + (d.today ? ", today" : "")}
              onClick={() => setFilterDay(filterDay === d.num ? null : d.num)}>
              <span className="gol-daycell__dow">{d.dow}</span>
              <span className="gol-daycell__num gol-mono">{d.num}</span>
              <span className="gol-daycell__dots">

        <div className="ntf-head">
          <div>
            <h1 className="ntf-title">Notifications</h1>
            <div className="ntf-summary" role="status">
              {unreadCount > 0
                ? <>You're almost caught up · <b>{unreadCount} new</b></>
                : <>You're all caught up — nothing new right now.</>}
            </div>
          </div>
          <Button variant="secondary" leadingIcon={<Icon name="check-check" size={16} />}
            onClick={markAll} disabled={unreadCount === 0}
            aria-label="Mark all notifications as read">
            Mark all read
          </Button>
        </div>

        {/* Filter row */}
        <div className="ntf-filter" role="tablist" aria-label="Filter notifications">
          <span className="ntf-chip" role="tab" aria-selected={filter === "all"}
            onClick={() => setFilter("all")}>
            <Chip active={filter === "all"}>All</Chip>
          </span>
          <span className="ntf-chip" role="tab" aria-selected={filter === "unread"}
            onClick={() => setFilter("unread")}>
            <Chip active={filter === "unread"}>Unread · {unreadCount}</Chip>
          </span>
        </div>

        {/* aria-live region for live deltas */}
        <div aria-live="polite" aria-atomic="true" className="ntf-sr-only">
          {newPill ? "1 new notification" : ""}
        </div>

        {/* New-arrival pill (non-jarring, no auto-reorder) */}
        {newPill && filter === "all" && (
          <div className="ntf-new-pill" role="status" onClick={showNew}>
            <Icon name="arrow-up" size={14} /> 1 new notification — show
          </div>
        )}

        {/* Timeline */}
        {grouped.length === 0 ? (
          <div style={{ padding: "var(--space-8) 0" }}>
            <EmptyState icon="check-circle"
              title="You're all caught up"
              body="No unread notifications. Nice and tidy."
              action={<Button variant="ghost" size="sm" onClick={() => setFilter("all")}>View all</Button>} />
          </div>
        ) : (
          <div role="list" aria-label="Notifications">
            {grouped.map(({ g, rows }) => (
              <div key={g}>
                <div className="ntf-group-label">{g}</div>
                {rows.map((n) => (
                  <NotificationRow key={n.id} n={n} onOpen={openRow} onMarkRead={markRead} />
                ))}
              </div>
            ))}

            {/* Pagination footer (partial → nextCursor present) */}
            {filter === "all" && (
              <div style={{ textAlign: "center", padding: "var(--space-4) 0 var(--space-8)" }}>
                <Button variant="ghost" loading={loadingMore}
                  leadingIcon={loadingMore ? null : <Icon name="rotate-ccw" size={14} />}
                  onClick={() => { setLoadingMore(true); setTimeout(() => setLoadingMore(false), 900); }}>
                  Load earlier notifications
                </Button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Toast — mark-all-read confirmation + Undo */}
      {toast && (
        <div className="ntf-toast-host">
          <Toast variant="success" title="Marked all as read"
            body={
              <div className="ntf-toast-actions">
                <span>Your inbox is clear.</span>
                <Button variant="ghost" size="sm" onClick={undoAll}>Undo</Button>
              </div>
            } />
        </div>
      )}
    </div>
  );
}
VIEWS["notifications"] = View_Notifications;

      <div className="log-form log-reveal" key="b2b">

            <div className="log-row-between">
              <label className="log-check-row" htmlFor="b2b-remember">

              <a className="log-foot" style={{display:"inline"}} onClick={()=>setB2bStep("code")} role="button" tabIndex={0}>Forgot password?</a>

            <button type="button" role="tab" aria-selected={mode===0}
                    className={"log-seg__btn"+(mode===0?" is-active":"")}
                    onClick={()=>{ setMode(0); }}>
              Personal account
            </button>
            <button type="button" role="tab" aria-selected={mode===1}
                    className={"log-seg__btn"+(mode===1?" is-active":"")}
                    onClick={()=>{ setMode(1); setB2bStep("code"); }}>
              I have a school code
            </button>
          </div>
          <div className="log-seg-panel" role="tabpanel">
            {mode===0 ? PersonalForm : SchoolForm}
          </div>
          <span className="log-a11y-sr" aria-live="polite">
            {mode===1 ? "School code mode" : "Personal account mode"}
          </span>
        </div>
      </Card>
    );
  }

  return (
    <div className="log-root">
      <section className="log-editorial" aria-hidden="true">
        <div className="log-ed-top">
          <div className="log-ed-brand">
            <span className="log-mk">L</span>
            <span className="log-nm">Lyceum</span>
          </div>
        </div>
        <div className="log-ed-mid">
          <h1 className="log-ed-hero">Welcome back to your learning.</h1>
          <p className="log-ed-sub">One front door for school students and self-paced learners — pick up your streak, your spaces, and your story points right where you left them.</p>
          <div className="log-ed-marks">
            <div className="log-ed-mark"><Icon name="flame" size={18}/> Keep your daily streak alive</div>
            <div className="log-ed-mark"><Icon name="layout-grid" size={18}/> Jump back into your spaces</div>
            <div className="log-ed-mark"><Icon name="shield-check" size={18}/> School or personal — your choice</div>
          </div>
        </div>
        <div className="log-ed-foot">© Auto-LevelUp · Learn at your own pace</div>
      </section>

      <section className="log-rail">
        <PrimaryAuthCard />
      </section>
    </div>
  );
}

function View_Store({ go, params, query, ctx }) {
  const { Icon, IconButton, Input, Select, Button, Badge, Chip, Drawer, Toast, Radio } = LU;

    Advanced:     { icon: "mountain" },

  /* price always rendered as text, currency explicit */

    const sym = currency === "INR" ? "₹" : (currency === "USD" ? "$" : currency + " ");
    return sym + price.toLocaleString();
  }

  /* ---- catalog seed (platform_public mirror — StoreSpace projections) ---- */
  const SPACES = [
    { id:"calc",  title:"Calculus Foundations", subject:"Mathematics", diff:"Intermediate", price:499, currency:"INR",
      labels:["Limits","Derivatives","Self-paced"], students:1204, lessons:12, rating:4.6, reviews:213, owned:false,

    { id:"dsa", title:"Data Structures & Algorithms", subject:"Computer Science", diff:"Advanced", price:899, currency:"INR",

    { id:"world", title:"World History: 1900–Now", subject:"History", diff:"Intermediate", price:0, currency:"INR",

  function RatingRow({ rating, reviews }){

    return (
      <div className="stb-sc__rating">
        <span className="stb-sc__stars" aria-hidden="true">
          {[1,2,3,4,5].map(n => (
            <Icon key={n} name="star" size={13} className={n <= full ? "" : "star-empty"} />
          ))}
        </span>
        <span className="stb-sc__rating-num" aria-label={aria}>{rating} ({reviews.toLocaleString()})</span>
      </div>
    );
  }

  /* ===================== Store SpaceCard ===================== */
  function StoreCard({ s, cartIds, onAdd, onRemove }){
    const dm = DIFF_META[s.diff];
    const inCart = cartIds.includes(s.id);

    const ratingAria = (s.rating == null || s.reviews === 0)

    const ariaName = s.title + ", " + priceText(s.price, s.currency) + ", " + ratingAria;

    function actionButton(){
      if (s.owned) {
        return <Button variant="secondary" size="sm"
                 leadingIcon={<Icon name="play" size={15}/>}
                 onClick={(e)=>{ e.preventDefault(); e.stopPropagation(); }}>Continue learning</Button>;
      }
      if (inCart) {
        return <Button variant="ghost" size="sm"
                 leadingIcon={<Icon name="check" size={15}/>}
                 onClick={(e)=>{ e.preventDefault(); e.stopPropagation(); onRemove(s); }}>In cart — remove</Button>;
      }
      return <Button variant="spark" size="sm"
               leadingIcon={<Icon name={free ? "unlock" : "shopping-cart"} size={15}/>}

               {free ? "Enroll free" : "Add to cart"}</Button>;
    }

    return (

        </div>
        <div className="stb-sc__body">
          <div className="stb-sc__tags">
            <Badge variant="brand">{s.subject}</Badge>
            <Chip><Icon name={dm.icon} size={12}/> {s.diff}</Chip>
          </div>
          <h3 className="stb-sc__title">{s.title}</h3>
          <p className="stb-sc__desc">{s.desc}</p>

    });

    return list;

    for (const [pat, key] of ROUTE_TABLE) {
      if (pat === "/") { if (path === "/") return { key, params: {} }; else continue; }

      const xs = path.split("/").filter(Boolean);
      if (ps.length !== xs.length) continue;
      let ok = true; const params = {};
      for (let i = 0; i < ps.length; i++) {
        if (ps[i].charAt(0) === ":") params[ps[i].slice(1)] = decodeURIComponent(xs[i]);
        else if (ps[i] !== xs[i]) { ok = false; break; }

              <div style={{ position: "relative" }}>
                <div className="sb-roleswitch" onClick={() => setRoleOpen(o => !o)}
                     role="button" aria-haspopup="menu" aria-expanded={roleOpen}>
                  <Icon name="repeat" size={16} />
                  <div className="sb-meta" style={{ flex: 1 }}>
                    <b>{mode === "b2c" ? "Personal account" : "Crestwood Academy"}</b>
                    <span>{mode === "b2c" ? "Switch to school" : "Switch account"}</span>
                  </div>
                  <Icon name="chevrons-up-down" size={14} />
                </div>
                {roleOpen && (
                  <div className="popover" style={{ position: "absolute", bottom: "calc(100% + var(--space-2))",
                    left: 0, right: 0, padding: "var(--space-2)", zIndex: 50 }}>
                    <div className="menu-item" aria-current={mode==="b2b"?"true":undefined}
                         style={mode==="b2b"?{ color:"var(--brand-primary)", fontWeight:"var(--weight-semibold)" }:undefined}
                         onClick={() => { setRoleOpen(false); go("#/"); }}>
                      <Icon name="building-2" size={16} /> Crestwood Academy (school)
                    </div>
                    <div className="menu-item" aria-current={mode==="b2c"?"true":undefined}
                         style={mode==="b2c"?{ color:"var(--brand-primary)", fontWeight:"var(--weight-semibold)" }:undefined}
                         onClick={() => { setRoleOpen(false); go("#/consumer"); }}>
                      <Icon name="user-round" size={16} /> Personal account (LevelUp)
                    </div>
                  </div>
                )}
              </div>
              {/* Avatar menu */}
              <div style={{ position: "relative" }}>
                <div className="sb-avatar-row" onClick={() => setAvatarOpen(o => !o)}
                     role="button" aria-haspopup="menu" aria-expanded={avatarOpen}>
                  <Avatar initials={who.initials} />
                  <div className="sb-meta" style={{ flex: 1 }}>
                    <b>{who.name}</b><span>{who.email}</span>
                  </div>
                  <Icon name="chevron-up" size={16} />
                </div>
                {avatarOpen && (
                  <div className="popover avatar-menu" style={{ padding: "var(--space-2)" }}>
                    <div className="menu-item" onClick={() => { setAvatarOpen(false); go(mode==="b2c"?"#/consumer/profile":"#/profile"); }}>
                      <Icon name="user" size={16} /> Profile</div>
                    <div className="menu-item" onClick={() => { setAvatarOpen(false); go("#/settings"); }}>
                      <Icon name="settings" size={16} /> Settings</div>
                    <div className="menu-item" style={{ color: "var(--status-error)" }}
                         onClick={() => { setAvatarOpen(false); go("#/login"); }}>
                      <Icon name="log-out" size={16} /> Sign Out</div>
                  </div>
                )}
              </div>
            </div>
          </nav>

          {/* TOPBAR */}
          <header className="appshell__topbar">
            <Breadcrumb items={[{ label: brand.name, href: "#/" }, { label: route.crumb || "Home" }]} />
            <div className="topbar__spacer" />
            <div className="tb-kbd" onClick={() => setCmdkOpen(true)} role="button" aria-label="Search, command menu">
              <Icon name="search" size={16} /> Search <Kbd>⌘K</Kbd>
            </div>
            <IconButton icon={<Icon name="sparkles" size={20} />} label="Ask the AI tutor" onClick={openTutor} />
            <div className="bell-wrap">
              <div className="tb-bell">
                <IconButton icon={<Icon name="bell" size={20} />} label={unread + " unread updates"}
                  onClick={() => setBellOpen(o => !o)} />
                {unread > 0 && <span className="tb-bell-badge"><Badge variant="spark">{unread > 9 ? "9+" : unread}</Badge></span>}
              </div>
              {bellOpen && (
                <div className="bell-pop">
                  <Panel title="Updates" actions={<Button variant="ghost" size="sm" onClick={markAll}>Mark all read</Button>}>
                    <div>
                      {notifs.map((n) => (
                        <div key={n.id} className="notif-row" onClick={() => markRead(n.id)}>
                          <span className={"notif-dot" + (n.read ? " notif-dot--read" : "")} aria-hidden="true" />
                          <div className="notif-row__body"><b>{n.title}</b>
                            <span>{n.read ? "Read · " : "New · "}{n.time}</span></div>
                        </div>
                      ))}
                      <div style={{ paddingTop: "var(--space-2)", borderTop: "1px solid var(--border-subtle)", marginTop: "var(--space-2)" }}>
                        <Button variant="ghost" size="sm" block onClick={() => { setBellOpen(false); go("#/notifications"); }}>See all updates</Button>
                      </div>
                    </div>
                  </Panel>
                </div>
              )}
            </div>
            <Avatar initials={who.initials} />
          </header>

          {/* MAIN — the routed view */}
          <main className="appshell__main" id="main-content">
            <div className="view-host">
              {View
                ? <View go={go} params={route.params} query={route.query} ctx={ctx} />
                : <EmptyState icon="compass" title="Page not found"
                    body="That route doesn't exist yet."
                    action={<Button variant="primary" size="sm" onClick={() => go("#/")}>Back to Dashboard</Button>} />}
            </div>
          </main>
        </div>

        {/* ⌘K Command Palette */}
        <Modal open={cmdkOpen} onClose={() => setCmdkOpen(false)} title="Jump to">
          <CommandPalette selected={0} placeholder="Search spaces, tests, or pages…" items={[
            { icon: "layout-dashboard", label: "Dashboard", kbd: "G D" },
            { icon: "book-open", label: "My Spaces", kbd: "G S" },
            { icon: "file-check", label: "Tests", kbd: "G T" },
            { icon: "trophy", label: "Leaderboard", kbd: "G L" },
            { icon: "user", label: "Profile" },
          ]} />
        </Modal>

        {/* In-context AI Tutor side panel */}
        <Drawer open={tutorOpen} onClose={() => setTutorOpen(false)} side="right" title="AI Tutor">
          {VIEWS["tutor"]
            ? React.createElement(VIEWS["tutor"], { go, params: {}, query: "panel", ctx, panel: true })
            : <div style={{ padding: "var(--space-4)" }}>Ask the tutor anything about this step.</div>}
        </Drawer>
      </div>
    );
  }

  /* crumb labels per route key */
  const CRUMBS = {
    dashboard: "Dashboard", spaces: "My Spaces", "space-detail": "Space",
    content: "Story Point", practice: "Practice", tests: "Tests",
    "test-landing": "Timed Test", "test-runner": "Timed Test", "test-results": "Results",
    "test-analytics": "Analytics", "exam-results": "Exam Results", tutor: "AI Tutor",
    progress: "Progress", achievements: "Achievements", leaderboard: "Leaderboard",
    goals: "Goals", profile: "Profile", settings: "Settings", notifications: "Notifications",
    consumer: "My Learning", "consumer-profile": "Account", store: "Store",
    "store-detail": "Store", checkout: "Checkout",
  };

  function App() {
    const [, setTickState] = useState(0);
    _tick = setTickState;
    useEffect(() => {
      const onHash = () => setTickState(x => x + 1);
      window.addEventListener("hashchange", onHash);
      return () => window.removeEventListener("hashchange", onHash);
    }, []);
    // inject all view-scoped CSS once
    useEffect(() => {
      const el = document.createElement("style");
      el.setAttribute("data-views", "");
      el.textContent = STYLES.join("\n");
      document.head.appendChild(el);
      return () => el.remove();
    }, []);

    const { path, query } = parseHash();
    const m = matchRoute(path);
    const route = { key: m.key, params: m.params, query, crumb: CRUMBS[m.key] };

    // login renders full-screen, no shell
    if (route.key === "login") {
      const LoginView = VIEWS["login"];
      return <div className="auth-host">{LoginView
        ? <LoginView go={go} params={{}} query={query} ctx={{ mode: "auth" }} />
        : <EmptyState icon="log-in" title="Sign in" />}</div>;
    }
    return <Shell route={route} />;
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
