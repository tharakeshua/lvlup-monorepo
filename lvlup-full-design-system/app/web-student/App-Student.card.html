  function CountUp({ end, suffix, decimals }) {
    const [val, setVal] = useState(reduceMotion ? end : 0);
    useEffect(() => {
      if (reduceMotion) return;
      let raf, start;
      const dur = 700;
      const step = (t) => {
        if (start == null) start = t;
        const p = Math.min(1, (t - start) / dur);
        const eased = 1 - Math.pow(1 - p, 3);
        setVal(end * eased);
        if (p < 1) raf = requestAnimationFrame(step);
        else setVal(end);
      };
      raf = requestAnimationFrame(step);
      return () => cancelAnimationFrame(raf);
    }, [end]);
    const shown = decimals ? val.toFixed(decimals) : Math.round(val);

        <div className="lcv-lightbox-img"><Icon name="image" size={40}/></div>
        <p className="lcv-muted" style={{fontSize:"var(--text-sm)",marginBottom:0}}>

function View_Practice({ go, params, query, ctx }) {
  const {
    Button, IconButton, Icon, Avatar, Badge, Chip,
    Card, Drawer, ProgressBar, QuestionCard, Option, TutorChatBubble, Toast, Input, Textarea
  } = LU;
  const { useState } = React;

  /* ---- practice item model (question-type only) ---- */
  const ITEMS = [
    { id: "q1", diff: "Easy",   type: "Multiple choice", det: true,
      prompt: "What is the time complexity of a binary search over a sorted array of n elements?",
      opts: ["O(n)", "O(log n)", "O(n log n)", "O(1)"], correct: 1,
      explain: "Each comparison halves the remaining search interval, so the number of steps grows with the base-2 logarithm of n.",
      foci: ["You nailed the halving intuition — that's the heart of it."] },
    { id: "q2", diff: "Medium", type: "Multiple choice", det: true,
      prompt: "Which data structure gives you average O(1) insert, delete, and lookup by key?",
      opts: ["Balanced BST", "Hash table", "Sorted array", "Min-heap"], correct: 1,
      explain: "A hash table maps keys to buckets via a hash function, giving expected constant-time operations when the load factor is kept low.",
      foci: ["Revisit how collisions are resolved — that's where the 'average' caveat comes from.",
             "Compare against a balanced BST's guaranteed O(log n)."] },
    { id: "q3", diff: "Hard",   type: "Short answer", det: false,
      prompt: "In one sentence, explain why the sliding-window technique reduces a naive O(n·k) subarray scan to O(n).",
      opts: null,
      explain: "Instead of recomputing each window from scratch, you reuse the previous window's result and adjust only for the element entering and the element leaving — so each element is visited a constant number of times.",
      foci: ["You captured the reuse idea — strong.", "Tighten the phrasing around 'each element enters and leaves the window once.'"] },
    { id: "q4", diff: "Medium", type: "Multiple choice", det: true,
      prompt: "A stack is best described as which access pattern?",
      opts: ["FIFO", "LIFO", "Random access", "Priority order"], correct: 1,
      explain: "Stacks are last-in, first-out: the most recently pushed element is the first one popped.",
      foci: [] },
    { id: "q5", diff: "Easy",   type: "Multiple choice", det: true, prompt: "—", opts: [], correct: 0, explain: "", foci: [] },
    { id: "q6", diff: "Hard",   type: "Short answer", det: false, prompt: "—", opts: null, explain: "", foci: [] },
    { id: "q7", diff: "Medium", type: "Multiple choice", det: true, prompt: "—", opts: [], correct: 0, explain: "", foci: [] },
    { id: "q8", diff: "Easy",   type: "Multiple choice", det: true, prompt: "—", opts: [], correct: 0, explain: "", foci: [] },
  ];

  const TOTAL = 12;

  /* initial evaluation state (restored from cache) */
  const INIT_EVALS = {
    q1: { correct: true,  attempts: 1 },
    q2: { correct: false, attempts: 2 },
    q4: { correct: true,  attempts: 1 },
  };

  function DiffChip({ diff }) {
    return <Chip>{diff}</Chip>;
  }

  function NodeGlyph({ status }) {
    if (status === "solved")  return <Icon name="check" size={13} />;
    if (status === "missed")  return <Icon name="minus-circle" size={13} />;
    return <Icon name="minus" size={11} />;
  }

  const [index, setIndex] = useState(1);          // q2 is current (missed → shows retry)
  const [filter, setFilter] = useState("All");
  const [evals, setEvals] = useState(INIT_EVALS);
  const [tutorOpen, setTutorOpen] = useState(false);
  const [checking, setChecking] = useState(false);
  const [selected, setSelected] = useState(null);
  const [showToast, setShowToast] = useState(false);

  const item = ITEMS[index];
  const ev = evals[item.id];

  const statusOf = (it) => {
    const e = evals[it.id];
    if (!e) return "none";
    return e.correct ? "solved" : "missed";
  };
  const solvedCount = Object.values(evals).filter((e) => e.correct).length;
  const pct = Math.round((solvedCount / TOTAL) * 100);

  const retry = () => {
    setEvals((m) => { const c = { ...m }; delete c[item.id]; return c; });
    setSelected(null);
  };

  const check = () => {
    if (!item.det) {
      setChecking(true);
      setTimeout(() => {
        setChecking(false);
        setEvals((m) => ({ ...m, [item.id]: { correct: false, attempts: (m[item.id]?.attempts || 0) + 1 } }));
      }, 600);
      return;
    }
    const ok = selected === item.correct;
    setEvals((m) => ({ ...m, [item.id]: { correct: ok, attempts: (m[item.id]?.attempts || 0) + 1 } }));
    if (ok && solvedCount + 1 >= 4) setShowToast(true);
  };

  return (
    <div className="prc-root">
      {/* aria-live region for solved count + verdict */}
      <div aria-live="polite" style={{ position: "absolute", width: 1, height: 1,
        overflow: "hidden", clip: "rect(0 0 0 0)" }}>
        Solved {solvedCount} of {TOTAL}
      </div>

      {/* HEADER */}
      <div className="prc-p-header">
        <div className="prc-p-title-wrap">
          <div className="prc-p-dumbbell"><Icon name="dumbbell" size={22} /></div>
          <div style={{ minWidth: 0 }}>
            <h1 className="prc-p-h1">Binary Search &amp; Hashing</h1>
            <div className="prc-p-sub">Practice — retry as many times as you like.</div>
          </div>
        </div>
        <div className="prc-p-solved">
          <div className="prc-num">{solvedCount} / {TOTAL}</div>
          <div className="prc-lbl">Solved</div>
        </div>
      </div>

      {/* PROGRESS */}
      <div className="prc-prog-wrap">
        <div className="prc-prog-row">
          <span className="prc-l">Progress</span>
          <span className="prc-r">{pct}%</span>
        </div>
        <ProgressBar value={pct} variant="success" />
      </div>

      {/* DIFFICULTY FILTER */}
      <div className="prc-filter-row" role="group" aria-label="Filter by difficulty">
        <span className="prc-flbl">Difficulty</span>
        {["All", "Easy", "Medium", "Hard"].map((d) => (
          <button key={d} className="prc-chip-btn" aria-pressed={filter === d}
            onClick={() => { setFilter(d); }}>
            <Chip active={filter === d}>{d}</Chip>
          </button>
        ))}
      </div>

      {/* QUESTION NAVIGATOR */}
      <div className="prc-nav-wrap">
        <div className="prc-eyebrow" style={{ margin: 0 }}>Questions</div>
        <div className="prc-nav-grid" role="navigation" aria-label="Question navigator">
          {ITEMS.map((it, i) => {
            const st = statusOf(it);
            const isCur = i === index;
            const lbl = st === "solved" ? "Solved" : st === "missed" ? "Needs another look" : "Not attempted";
            return (
              <button key={it.id}
                className={"prc-qnode" + (isCur ? " prc-qnode--current" : "") +
                  (st === "solved" ? " prc-qnode--solved" : st === "missed" ? " prc-qnode--missed" : "")}
                aria-label={"Question " + (i + 1) + ": " + lbl}
                aria-current={isCur ? "step" : undefined}
                onClick={() => { setIndex(i); setSelected(null); }}>
                <span>{i + 1}</span>
                <span className="prc-qnode__glyph"><NodeGlyph status={st} /></span>
              </button>
            );
          })}
          <span style={{ alignSelf: "center", fontSize: "var(--text-xs)", color: "var(--text-muted)",
            fontFamily: "var(--font-mono)", marginLeft: "var(--space-1)" }}>…of {TOTAL}</span>
        </div>
      </div>

      {/* CURRENT QUESTION */}
      <Card>
        <div className="prc-q-card">
          <div className="prc-q-top">
            <span className="prc-q-counter">Question {index + 1} of {TOTAL}</span>
            <div className="prc-q-top-right">
              <DiffChip diff={item.diff} />
              {ev && (ev.correct
                ? <Badge variant="success" icon={<Icon name="check" size={12} />}>Solved</Badge>
                : <Badge variant="warning" icon={<Icon name="minus-circle" size={12} />}>Needs another look</Badge>)}
            </div>
          </div>

          <QuestionCard type={item.type} points={item.diff === "Hard" ? 3 : item.diff === "Medium" ? 2 : 1}
            prompt={item.prompt}>
            <div className="prc-q-opts" style={{ marginTop: "var(--space-4)" }}>
              {item.opts ? item.opts.map((o, oi) => (
                <Option key={oi}
                  selected={selected === oi}
                  marker={String.fromCharCode(65 + oi)}>
                  <span onClick={() => !ev && setSelected(oi)} style={{ cursor: ev ? "default" : "pointer" }}>{o}</span>
                </Option>
              )) : (
                <Textarea placeholder="Type your answer — there's no wrong attempt here, just reps."
                  rows={3} defaultValue="" />
              )}
            </div>

            <div className="prc-q-actions">
              <Button variant="primary" loading={checking} disabled={!!ev || (item.opts && selected === null)}
                onClick={check}>
                {checking ? "Checking…" : "Check answer"}
              </Button>
              <Button variant="ghost" leadingIcon={<Icon name="message-circle-question" size={16} />}
                onClick={() => { setTutorOpen(true); ctx.openTutor && ctx.openTutor(); }}>Ask tutor</Button>
            </div>
          </QuestionCard>

          {/* FEEDBACK PANEL (post-submit) */}
          {ev && ev.correct && (
            <div className="prc-fb prc-fb--ok" role="status">
              <div className="prc-fb-head"><Icon name="check-circle" size={18} /> Got it!</div>
              <div className="prc-fb-body">{item.explain}</div>
              {item.foci.length > 0 && (
                <ul className="prc-fb-foci">
                  {item.foci.map((f, fi) => (
                    <li key={fi}><Icon name="check" size={15} style={{ color: "var(--status-success)" }} /> {f}</li>
                  ))}
                </ul>
              )}
              <div className="prc-fb-actions">
                <span className="prc-fb-attempts">Solved on attempt {ev.attempts}</span>
              </div>
            </div>
          )}
          {ev && !ev.correct && (
            <div className="prc-fb prc-fb--miss" role="status">
              <div className="prc-fb-head"><Icon name="alert-triangle" size={18} /> Let's look at this one again</div>
              <div className="prc-fb-body">{item.explain}</div>
              {item.foci.length > 0 && (
                <ul className="prc-fb-foci">
                  {item.foci.map((f, fi) => (
                    <li key={fi}><Icon name="target" size={15} style={{ color: "var(--status-warning)" }} /> {f}</li>
                  ))}
                </ul>
              )}
              <div className="prc-fb-actions">
                <Button variant="secondary" leadingIcon={<Icon name="rotate-ccw" size={16} />} onClick={retry}>
                  Try again
                </Button>
                <span className="prc-fb-attempts">{ev.attempts} attempts so far · unlimited</span>
              </div>
            </div>
          )}
        </div>
      </Card>

      {/* FOOTER NAV */}
      <div className="prc-footnav">
        <Button variant="secondary" leadingIcon={<Icon name="arrow-left" size={16} />}
          disabled={index === 0} onClick={() => { setIndex(Math.max(0, index - 1)); setSelected(null); }}>
          Previous
        </Button>
        <Button variant="secondary" trailingIcon={<Icon name="arrow-right" size={16} />}
          disabled={index === ITEMS.length - 1}
          onClick={() => { setIndex(Math.min(ITEMS.length - 1, index + 1)); setSelected(null); }}>
          Next
        </Button>
      </div>

      {/* secondary CTAs: timed test / back to space */}
      <div className="prc-footnav">
        <Button variant="ghost" leadingIcon={<Icon name="arrow-left" size={16} />}
          onClick={() => go("#/spaces/dsa")}>
          Back to space
        </Button>
        <Button variant="primary" trailingIcon={<Icon name="timer" size={16} />}
          onClick={() => go("#/spaces/dsa/test/2")}>
          Take the timed test
        </Button>
      </div>

      {/* quiet encouraging Toast on clearing a set (NO celebration burst) */}
      {showToast && (
        <div className="prc-toast-host">
          <Toast variant="success" title="Nice — that's the Easy set cleared!"
            body="Keep the reps going whenever you like." />
        </div>
      )}

      {/* TUTOR DRAWER (right side, default closed) */}
      <Drawer open={tutorOpen} onClose={() => setTutorOpen(false)} title="Ask the tutor">
        <div className="prc-tutor-stack">
          <TutorChatBubble from="tutor" author="Tutor">
            Stuck on this one? Ask away — no wrong questions here.
          </TutorChatBubble>
          <TutorChatBubble from="user" author="You">
            Why isn't a balanced BST also O(1) for lookups?
          </TutorChatBubble>
          <TutorChatBubble from="tutor" author="Tutor">
            Good question. A balanced BST guarantees O(log n) because every lookup walks down the tree's
            height. A hash table can hit O(1) on average — but only because it trades that guarantee for
            the chance of collisions. What do you think happens to lookups when many keys land in the same bucket?
          </TutorChatBubble>
          <div className="prc-tutor-input">
            <Input placeholder="Type your question…" />
            <Button variant="primary"><Icon name="send" size={16} /></Button>
          </div>
        </div>
      </Drawer>
    </div>
  );
}
VIEWS["practice"] = View_Practice;

    { id:"s3", name:"Hash collisions, simply", preview:"Picture two keys landing in the same bucket — what could we store instead?", count:4, updated:"Yesterday" },

    );

  function Turn({ from, children, error, onRetry }){

      {Composer}

  if (isPanel) {
    return (

        <div>

          <p className="tut-sub" style={{margin:0}}>A patient mentor keyed to whatever you're working on.</p>
        </div>
        {Conversation}
      </div>
    );
  }

  return (

      <h1 className="tut-h2" style={{marginTop:"var(--space-4)"}}>Your tutor</h1>

      <div className="tut-page">
        {/* sessions rail */}
        <div className="tut-rail">
          <div className="tut-rail__head">
            <h2 className="tut-rail__title">Threads</h2>
            <Button variant="secondary" size="sm" block leadingIcon={<Icon name="plus" size={15}/>}
              onClick={()=>{ setActiveSession("new"); setTurns([]); setStreaming(false); }}>New conversation</Button>
          </div>
          <div className="tut-rail__list">
            {SESSIONS.map((s)=>(
              <button key={s.id} className="tut-srow" data-active={s.id===activeSession}
                onClick={()=>setActiveSession(s.id)}>
                <div className="tut-srow__top">
                  <span className="tut-srow__name">{s.name}</span>
                  <span className="tut-srow__meta">{s.count} msgs</span>
                </div>

              </button>

        {/* conversation column */}
        {Conversation}

      <div className="tut-section-eyebrow">After the session · encouraging next-steps, never grades</div>
      <div className="tut-insightrow">
        <InsightCard icon="lightbulb" title="What we touched">

        <InsightCard icon="compass" title="Where to revisit">
          Try the same pattern on <em>reverse a string</em> to lock it in.

      </div>

  );

    { label:"Space", key:"space", render:(t)=> <span style={{fontSize:"var(--text-sm)", color:"var(--text-secondary)"}}>{t.space}</span> },
    { label:"Status", key:"status", sortable:true, render:(t)=> {
        const m = STATUS_META[t.status];
        return (
          <span className="ttl-status-cell">
            <StatusBadge status={t.status} cooldownLabel={cooldownLabel}/>
            {!m.actionable && (
              <button className="ttl-why-btn" aria-label={"Why is " + t.title + " not available?"}
                      onClick={(e)=>{ e.stopPropagation(); setWhy(t.id); }}>
                <Icon name="help-circle" size={14}/>
              </button>
            )}
          </span>);
      } },
    { label:"Window", key:"window", sortable:true, render:(t)=> <WindowCell t={t} cooldownLabel={cooldownLabel}/> },
    { label:"Attempts", key:"attempts", numeric:true, render:(t)=>
        <span className="u-num" title={"You've used " + t.used + " of " + t.max + " attempts."}>{t.used} / {t.max}</span> },
    { label:"Best", key:"best", sortable:true, render:(t)=>
        t.best != null

    const m = STATUS_META[t.status];
    const best = t.best!=null ? ("best " + t.best + " percent") : "no attempt yet";
    return [t.title, t.space, m.label, t.windowLabel || "", best, t.used + " of " + t.max + " attempts"].join(", ");
  }

  return (
    <div className="ttl-root">
      <div className="ttl-page">

        {/* Page header */}
        <div className="ttl-page-head">
          <div>
            <div className="ttl-head-title-row">
              <h1>Tests</h1>
              <Badge variant="brand">{TESTS.length} tests</Badge>
            </div>
            <p className="ttl-page-sub">Your scheduled tests across every space.</p>
          </div>
        </div>

        {/* Filter / sort bar */}
        <div className="ttl-toolbar" role="region" aria-label="Filter and sort tests">
          <div className="ttl-toolbar__chips" role="group" aria-label="Filter by status">
            {FILTERS.map(f => (
              <button key={f} className="ttl-chip-btn" onClick={()=>setFilter(f)} aria-pressed={filter === f}>
                <Chip active={filter === f}>{f}</Chip>
              </button>
            ))}
          </div>
          <div className="ttl-toolbar__right">
            <div className="ttl-toolbar__sort">
              <label htmlFor="sortsel">Sort</label>
              <Select id="sortsel" value={sort} onChange={(e)=>setSort(e.target.value)} options={SORT_OPTS} />
            </div>
            <IconButton icon={<Icon name="sliders-horizontal" size={18}/>} label="Sort options"
                        onClick={()=>setSortOpen(true)} />
          </div>
        </div>

        {/* PRIMARY: populated web DataTable */}
        {rows.length > 0 ? (
          <div className="ttl-table-wrap">
            <table className="ttl-table table" aria-label="Your tests">
              <thead>
                <tr>
                  {columns.map((c,i)=>(
                    <th key={i} scope="col" aria-sort={c.sortable ? (sort === c.key ? "ascending" : "none") : undefined}
                        className={c.numeric ? "num" : undefined}>
                      {c.label}
                      {c.sortable && sort === c.key && <span className="ttl-sort-ind"><Icon name="arrow-down" size={12}/></span>}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((t,ri)=>{
                  const m = STATUS_META[t.status];
                  return (
                    <tr key={t.id} tabIndex={0}
                        className={m.actionable ? "ttl-is-actionable" : "ttl-is-static"}
                        aria-label={rowAriaName(t)}
                        onClick={()=> activateRow(t)}>
                      {columns.map((c,ci)=>(
                        <td key={ci} className={c.numeric ? "num" : undefined}>{c.render(t)}</td>
                      ))}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        ) : (
          <div className="ttl-state-box">
            <EmptyState icon="filter" title="No tests match this filter."
              body="Try ‘All’ to see everything."
              action={<Button variant="ghost" leadingIcon={<Icon name="x" size={16}/>}
                        onClick={()=>setFilter("All")}>Clear filter</Button>} />
          </div>
        )}

        {/* in-progress Resume affordance surfaced under the table */}
        {filter === "All" && (
          <Alert variant="info" title="You have a test in progress">
            Recursion Checkpoint in DSA is still open — pick up right where you left off.
            <div style={{marginTop:"var(--space-3)"}}>
              <Button variant="spark" size="sm" leadingIcon={<Icon name="play" size={16}/>}
                      onClick={()=> go("#/spaces/dsa/test/2")}>Resume test</Button>
            </div>
          </Alert>
        )}

      </div>

      {/* "Why not available" — Sheet via Drawer */}
      <Drawer open={why != null} onClose={()=>setWhy(null)} title="About this test">
        {why != null && (()=> {
          const t = TESTS.find(x => x.id === why);
          const m = STATUS_META[t.status];
          return (
            <div className="ttl-stack">
              <div className="ttl-status-cell"><StatusBadge status={t.status} cooldownLabel={cooldownLabel}/></div>
              <h4 className="ttl-mcard__title" style={{margin:0}}>{t.title}</h4>
              <p className="ttl-page-sub" style={{margin:0}}>{whyCopy(t, cooldownLabel)}</p>
              {(t.status === "completed" || t.status === "locked" || t.status === "closed") &&
                (t.best != null) && (
                <div style={{marginTop:"var(--space-2)"}}>
                  <Button variant="secondary" size="sm" leadingIcon={<Icon name="file-text" size={16}/>}
                          onClick={()=> go("#/spaces/dsa/test/2/results")}>Open Review</Button>
                </div>
              )}
            </div>
          );
        })()}
      </Drawer>

      {/* Mobile sort fallback — Sheet via Drawer */}
      <Drawer open={sortOpen} onClose={()=>setSortOpen(false)} title="Sort tests">
        <div style={{display:"flex", flexDirection:"column", gap:"var(--space-2)"}}>
          {SORT_OPTS.map(o => (
            <button key={o.value} className="ttl-chip-btn"
                    onClick={()=>{ setSort(o.value); setSortOpen(false); }}
                    style={{textAlign:"left"}}>
              <div className="nav-item" aria-current={sort === o.value ? "page" : undefined}>
                <Icon name={sort === o.value ? "check" : "arrow-down-up"} size={18}/>
                <span>{o.label}</span>
              </div>
            </button>
          ))}
        </div>
      </Drawer>
    </div>
  );
}
VIEWS["tests"] = View_Tests;

function View_TestLanding({ go, params, query, ctx }) {
  const {
    Button, Icon, Badge, Breadcrumb, Chip,
    Panel, Accordion, Alert, ContentRenderer, AnswerKeyLock, GradePill
  } = LU;
  const { useState } = React;

  /* ---- the assessment "contract" ---- */
  const TEST = {
    title: "Trees, Tries & Balanced Search",

    durationMinutes: 45,

    attemptsUsed: 1,
    maxAttempts: 3,

  };

  /* prior attempts — sub-passing framed as "Keep going", never "Failed" */
  const ATTEMPTS = [
    { n: 2, pct: 72, passed: true },
    { n: 1, pct: 48, passed: false },
  ];

  const LEAD_LINES = [
    { icon: "timer", text: "The clock starts on the server the moment you press Start." },
    { icon: "pause-circle", text: "It can't be paused — give yourself one uninterrupted sitting." },
    { icon: "lock", text: "Answers stay sealed during the test; you'll get feedback right after you submit." },
  ];

  const AUTHORED_HTML =
    "<p>Work through all <strong>20 questions</strong>. You can move freely between them and change answers until you submit.</p>" +

    "<code>O(log n)</code> for n keys.</p>" +
    "<p>Show brief reasoning on the short-answer items; partial credit is awarded for correct method.</p>";

  const [tip, setTip] = useState(false);
  const [failed, setFailed] = useState(false);

  const onStart = () => {
    if (starting) return;
    setFailed(false);
    setStarting(true);

      setStarting(false);
      go("#/spaces/dsa/test/2/run");
    }, 600);
  };

                  </div>
                ))}
              </div>
            ),
          }]}
        />
      </div>
    </div>
  );
}

  .trr-qnode--marked { background: var(--status-info-subtle); border-color: var(--status-info); color: var(--text-primary); }
  .trr-qnode--answered-marked { background: var(--status-info-subtle); border-color: var(--status-info); color: var(--text-primary); }
  .trr-qnode--current { box-shadow: 0 0 0 2px var(--border-focus); border-color: var(--border-focus); }

  .trr-legend { display: flex; flex-direction: column; gap: var(--space-2); }
  .trr-legend__row { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs); color: var(--text-secondary); }
  .trr-legend__swatch { width: 18px; height: 18px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); display: inline-flex; align-items: center; justify-content: center; flex: none; }

function View_TestRunner({ go, params, query, ctx }) {
  const {
    Button, IconButton, Icon, Radio,
    Panel, Modal,
    Chip, Badge, Tooltip,
    QuestionCard, Option, AnswerKeyLock, ContentRenderer, TimerBar
  } = LU;
  const { useState } = React;

  // ---- realistic session data ----------------------------------------
  const STORY_TITLE = "Functions & Graphs · Timed Test";
  const TOTAL = 20;

  // 5-status taxonomy: not_seen | not_answered | answered | marked | answered_marked
  const initialNodes = [
    "answered","answered","marked","answered","answered_marked",
    "answered","current","not_answered","not_seen","not_seen",
    "not_seen","not_seen","not_seen","not_seen","not_seen",
    "not_seen","not_seen","not_seen","not_seen","not_seen"
  ];

  const GLYPH = {
    answered:        { icon: "dot", label: "Answered" },
    marked:          { icon: "flag", label: "Marked for review" },
    answered_marked: { icon: "flag", label: "Answered & marked" },
    not_answered:    { icon: "circle", label: "Not answered" },
    not_seen:        { icon: "circle-dashed", label: "Not seen" },
  };
  const NODE_CLASS = {
    answered: "trr-qnode--answered",
    marked: "trr-qnode--marked",
    answered_marked: "trr-qnode--answered-marked",
    not_answered: "trr-qnode--not-answered",
    not_seen: "",
  };

  // ---- Question Navigator ---------------------------------------------
  function QuestionNavigator({ nodes, current, onJump }){
    const counts = nodes.reduce((a,s)=>{ a[s]=(a[s]||0)+1; return a; },{});
    const answeredTotal = (counts.answered||0)+(counts.answered_marked||0);
    const markedTotal = (counts.marked||0)+(counts.answered_marked||0);
    const notAnswered = (counts.not_answered||0);
    const notSeen = (counts.not_seen||0);

    return (
      <Panel title="Questions">
        <div className="trr-nav-sec-label">Section · Functions &amp; Graphs</div>
        <div className="trr-nav-grid" role="grid" aria-label="Question navigator">
          {nodes.map((s,i)=>{
            const isCur = i===current;
            const g = GLYPH[s] || GLYPH.not_seen;
            const ans = s==="answered"||s==="answered_marked" ? "answered" : s==="not_answered" ? "not answered" : s==="not_seen" ? "not seen" : "marked for review";
            const mk = (s==="marked"||s==="answered_marked");
            const aria = "Question "+(i+1)+", "+ans+(mk && s!=="marked" ? " and marked for review":"")+(isCur?", current question":"");
            return (
              <button
                key={i}
                role="gridcell"
                tabIndex={isCur?0:-1}
                aria-label={aria}
                aria-current={isCur ? "true" : undefined}
                className={["trr-qnode", NODE_CLASS[s], isCur && "trr-qnode--current"].filter(Boolean).join(" ")}
                onClick={()=>onJump(i)}
              >
                <span className="trr-qnode__glyph"><Icon name={g.icon} size={11} /></span>
                {i+1}
              </button>
            );
          })}
        </div>

        <div style={{height:"var(--space-4)"}} />
        <div className="trr-nav-sec-label">Legend</div>
        <div className="trr-legend">
          <div className="trr-legend__row"><span className="trr-legend__swatch trr-legend__swatch--answered"><Icon name="dot" size={12}/></span> Answered</div>
          <div className="trr-legend__row"><span className="trr-legend__swatch trr-legend__swatch--marked"><Icon name="flag" size={11}/></span> Marked for review</div>
          <div className="trr-legend__row"><span className="trr-legend__swatch trr-legend__swatch--answered-marked"><Icon name="flag" size={11}/></span> Answered &amp; marked</div>
          <div className="trr-legend__row"><span className="trr-legend__swatch trr-legend__swatch--not-answered"><Icon name="circle" size={11}/></span> Not answered</div>
          <div className="trr-legend__row"><span className="trr-legend__swatch trr-legend__swatch--not-seen"><Icon name="circle-dashed" size={11}/></span> Not seen</div>
        </div>

        <div style={{height:"var(--space-4)"}} />
        <div className="trr-nav-sec-label">Your progress</div>
        <div className="trr-counts">
          <div className="trr-counts__item">Answered <span className="trr-counts__num">{answeredTotal}</span></div>
          <div className="trr-counts__item">Marked <span className="trr-counts__num">{markedTotal}</span></div>
          <div className="trr-counts__item">Not answered <span className="trr-counts__num">{notAnswered}</span></div>
          <div className="trr-counts__item">Not seen <span className="trr-counts__num">{notSeen}</span></div>
        </div>
      </Panel>
    );
  }

  // ---- Sticky band w/ server-authoritative timer ----------------------
  function RunnerBand({ qIndex, onSubmit, onExit }){
    const remaining = "24:13";
    return (
      <div className="trr-runner__band">
        <div className="trr-runner__band-left">
          <Tooltip>
            <IconButton icon={<Icon name="arrow-left" size={18}/>} label="Exit test" onClick={onExit} />
          </Tooltip>
          <div className="trr-runner__crumb">
            <span className="trr-runner__crumb-title">{STORY_TITLE}</span>
            <span className="trr-runner__crumb-meta">QUESTION {qIndex+1} OF {TOTAL}</span>
          </div>
        </div>

        <div className="trr-runner__band-timer">
          <div className="trr-timerwrap" role="timer" aria-live="off" aria-label={remaining+" remaining"}>
            <div className="trr-timerwrap__row">
              <span className="trr-mono" style={{fontWeight:"var(--weight-medium)"}}>{remaining} remaining</span>
              <span className="trr-timerwrap__remaining" style={{display:"inline-flex",alignItems:"center",gap:"var(--space-1)"}}>
                <Icon name="server" size={11}/> server clock
              </span>
            </div>
            <TimerBar time={remaining} percent={72} />
          </div>
        </div>

        <div className="trr-runner__band-right">
          <Button variant="primary" onClick={onSubmit} leadingIcon={<Icon name="send" size={16}/>}>Submit</Button>
        </div>
      </div>
    );
  }

  // ---- Active question content ----------------------------------------
  function ActiveQuestion({ marked, onToggleMark, onSaveNext, saving }){
    const [choice, setChoice] = useState("b");
    const opts = [
      { v:"a", marker:"A", text:"The graph shifts 3 units to the right." },
      { v:"b", marker:"B", text:"The graph shifts 3 units to the left." },
      { v:"c", marker:"C", text:"The graph shifts 3 units upward." },
      { v:"d", marker:"D", text:"The graph is reflected across the y-axis." },
    ];
    return (
      <div className="trr-qcol">
        <div className="trr-qcol__chips">
          <Chip>Multiple choice</Chip>
          <Badge variant="info">Medium</Badge>
          <span style={{flex:1}} />
          <AnswerKeyLock title="Answers are sealed">Hidden until you submit — scored fairly.</AnswerKeyLock>
        </div>

        <QuestionCard type="Q7 · Multiple choice" points={2} prompt={
          <ContentRenderer math>
            <div>
              <p style={{margin:"0 0 var(--space-3)"}}>
                Consider the function <span className="trr-mono">f(x) = (x + 3)²</span> obtained from the parent
                function <span className="trr-mono">g(x) = x²</span>.
              </p>
              <p style={{margin:0}}>Which transformation correctly describes the relationship between the two graphs?</p>
            </div>
          </ContentRenderer>
        }>
          <div className="trr-answers" role="radiogroup" aria-label="Answer choices">
            {opts.map(o=>(
              <div key={o.v} onClick={()=>setChoice(o.v)} style={{cursor:"pointer"}}>
                <Option selected={choice===o.v} marker={o.marker}>
                  <span style={{display:"inline-flex",alignItems:"center",gap:"var(--space-3)"}}>
                    <Radio name="q7" checked={choice===o.v} onChange={()=>setChoice(o.v)} />
                    {o.text}
                  </span>
                </Option>
              </div>
            ))}
          </div>
        </QuestionCard>

        <div className="trr-qcol__actions">
          <Button
            variant={marked ? "secondary" : "ghost"}
            onClick={onToggleMark}
            leadingIcon={<Icon name="flag" size={16}/>}
          >
            {marked ? "Marked — I'll come back" : "Mark for review"}
          </Button>

          <div style={{display:"flex",alignItems:"center",gap:"var(--space-4)"}}>
            {saving && (
              <span className="trr-qcol__save-aff"><Icon name="loader" size={13}/> Saving…</span>
            )}
            <Button variant="primary" onClick={onSaveNext} trailingIcon={<Icon name="arrow-right" size={16}/>}>
              Save &amp; Next
            </Button>
          </div>
        </div>
      </div>
    );
  }

  // ---- Screen ----------------------------------------------------------
  const [nodes, setNodes] = useState(initialNodes);
  const [current, setCurrent] = useState(6); // Q7
  const [marked, setMarked] = useState(false);
  const [saving, setSaving] = useState(false);
  const [submitOpen, setSubmitOpen] = useState(false);
  const [exitOpen, setExitOpen] = useState(false);

  const jump = (i)=>{
    setCurrent(i);
    setNodes(prev=>{
      const next = prev.slice();
      if(next[i]==="not_seen") next[i]="not_answered";
      return next;
    });
    setMarked(nodes[i]==="marked" || nodes[i]==="answered_marked");
  };

  const toggleMark = ()=> setMarked(m=>!m);

  const saveNext = ()=>{
    setSaving(true);
    setNodes(prev=>{
      const next = prev.slice();
      next[current] = marked ? "answered_marked" : "answered";
      return next;
    });
    setTimeout(()=>{
      setSaving(false);
      const ni = Math.min(current+1, TOTAL-1);
      jump(ni);
    }, 650);
  };

  const counts = nodes.reduce((a,s)=>{ a[s]=(a[s]||0)+1; return a; },{});
  const answeredTotal = (counts.answered||0)+(counts.answered_marked||0);
  const markedTotal = (counts.marked||0)+(counts.answered_marked||0);
  const unanswered = TOTAL - answeredTotal;

  return (
    <div className="trr-root">
      <RunnerBand
        qIndex={current}
        onSubmit={()=>setSubmitOpen(true)}
        onExit={()=>setExitOpen(true)}
      />

      <div className="trr-runner__main">
        <ActiveQuestion
          marked={marked}
          onToggleMark={toggleMark}
          onSaveNext={saveNext}
          saving={saving}
        />
        <div className="trr-navrail">
          <QuestionNavigator nodes={nodes} current={current} onJump={jump} />
        </div>
      </div>

      {/* Submit confirm dialog */}
      <Modal
        open={submitOpen}
        onClose={()=>setSubmitOpen(false)}
        title="Ready to submit?"
        footer={
          <div style={{display:"flex",gap:"var(--space-3)",justifyContent:"flex-end"}}>
            <Button variant="ghost" onClick={()=>setSubmitOpen(false)}>Keep working</Button>
            <Button variant="primary" leadingIcon={<Icon name="send" size={16}/>} onClick={()=>go("#/spaces/dsa/test/2/results")}>Submit test</Button>
          </div>
        }
      >
        <p style={{margin:"0 0 var(--space-4)"}}>
          You've answered <strong>{answeredTotal} of {TOTAL}</strong> questions.
          {markedTotal>0 ? <> <strong>{markedTotal}</strong> are marked for review.</> : null}
          {unanswered>0 ? <> <strong>{unanswered}</strong> are still blank.</> : null}{" "}
          Once you submit, the test is final and we'll score it for you.
        </p>
        <AnswerKeyLock title="Answers are sealed until you submit">
          We score on the server right after — you'll get your results in a moment.
        </AnswerKeyLock>
      </Modal>

      {/* Exit confirm dialog */}
      <Modal
        open={exitOpen}
        onClose={()=>setExitOpen(false)}
        title="Leave the test?"
        footer={
          <div style={{display:"flex",gap:"var(--space-3)",justifyContent:"flex-end"}}>
            <Button variant="ghost" onClick={()=>setExitOpen(false)}>Stay</Button>
            <Button variant="danger" onClick={()=>setExitOpen(false)}>Leave</Button>
          </div>
        }
      >
        <p style={{margin:0}}>
          Your timer keeps running while you're away — it's on the server clock and doesn't pause.
          Your answers stay saved, so you can come right back and pick up where you left off.
        </p>
      </Modal>
    </div>
  );
}

function View_TestResults({ go, params, query, ctx }) {
  const {

    Card, Panel, Section, Accordion, Drawer,
    ContentRenderer, ConfidenceBadge, RubricBreakdown, AnswerKeyLock, InsightCard, TutorChatBubble,
    Input
  } = LU;
  const { useState, useEffect, useRef } = React;

  /* ── server-graded result payload (sanitized — NO answer key) ── */
  const RESULT = {
    percentage: 78, score: 39, total: 50, passMark: 70, passed: true,
    priorBest: 71, personalBest: true,
    difficulty: [
      { label: "Easy",   got: 8, max: 9 },
      { label: "Medium", got: 6, max: 10 },
      { label: "Hard",   got: 2, max: 8 },

    bloom: [
      { label: "Remember", got: 5, max: 6 },
      { label: "Apply",    got: 3, max: 7 },
      { label: "Analyze",  got: 2, max: 6 },
    ],
    section: [
      { label: "A · Basics", got: 9, max: 10 },
      { label: "B · Proofs", got: 4, max: 10 },
    ],
    topic: [

      { q: 7, diff: "hard", correct: false },
      { q: 8, diff: "med",  correct: true },

  const QUESTIONS = [
    {
      n: 1, section: "A · Basics", diff: "Medium", type: "Multiple choice", correct: true,
      prompt: "Two angles of a triangle measure 50° and 60°. What is the measure of the third angle?",
      your: "70°",
      feedback: "Exactly right — you used the angle-sum property (interior angles total 180°) and subtracted cleanly. Solid foundation work.",
      ai: false,
    },
    {
      n: 2, section: "B · Proofs", diff: "Hard", type: "Short answer", correct: false,
      prompt: "Explain why two triangles with the same three angle measures are *similar* but not necessarily *congruent*.",
      your: "Because they have the same angles, so they must be the same triangle.",
      feedback: "You're close on the similarity idea — equal angles do guarantee the same shape. The gap is the *congruence* claim: equal angles fix the shape but not the size, so the triangles can be scaled copies. Revisit the AA-similarity vs. SAS-congruence distinction.",
      ai: true, confidence: "high",
      rubric: [
        { label: "Identifies similarity (AA)", desc: "Equal angles → same shape", score: 2, max: 2 },
        { label: "Explains size independence", desc: "Why congruence isn't implied", score: 1, max: 3 },
        { label: "Uses precise terminology", desc: "similar / congruent / scale factor", score: 1, max: 2 },
      ],
    },
    {
      n: 3, section: "B · Proofs", diff: "Hard", type: "Proof / free response", correct: false,
      prompt: "Given triangle ABC with a midsegment DE parallel to BC, prove that DE = ½·BC.",
      your: "DE is parallel so it's half of BC by the triangle.",
      feedback: "You named the right theorem in spirit, but a proof needs the steps. A teacher will take a second look at this one — your reasoning shows promise and deserves a careful read.",
      ai: true, confidence: "low",
      rubric: [
        { label: "States midsegment theorem", desc: "DE ∥ BC and DE = ½ BC", score: 1, max: 2 },
        { label: "Justifies with similarity", desc: "△ADE ~ △ABC, ratio 1:2", score: 0, max: 4 },
        { label: "Logical structure", desc: "Given → steps → conclusion", score: 1, max: 2 },
      ],
    },
    {
      n: 4, section: "A · Basics", diff: "Easy", type: "Multiple choice", correct: true,
      prompt: "Which of these is always true for an equilateral triangle?",
      your: "All three interior angles equal 60°.",
      feedback: "Correct, and well reasoned — equal sides force equal angles, and three equal angles summing to 180° gives 60° each.",
      ai: false,
    },
  ];

  function pct(got, max) { return Math.round((got / max) * 100); }

  /* ── animated count-up ring (respects reduced motion) ── */
  function CountUpRing({ value, passed }) {
    const reduce = typeof window !== "undefined" &&
      window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const [n, setN] = useState(reduce ? value : 0);
    useEffect(() => {
      if (reduce) return;
      let raf, start;
      const dur = 900;
      const step = (t) => {
        if (!start) start = t;
        const p = Math.min(1, (t - start) / dur);
        const eased = 1 - Math.pow(1 - p, 3);
        setN(Math.round(eased * value));
        if (p < 1) raf = requestAnimationFrame(step);
      };
      raf = requestAnimationFrame(step);
      return () => cancelAnimationFrame(raf);
    }, [value, reduce]);
    return (
      <div className="ring trv-hero__ring" style={{ "--ring-pct": n, "--ring-size": "132px" }}
           role="img" aria-label={"Score " + value + " percent, " + (passed ? "passed" : "not yet passed")}>
        <span className="ring__label">{n}%</span>
      </div>
    );
  }

  /* ── celebration burst — fires ONCE on pass/personal-best only ── */
  function CelebrationBurst({ active }) {
    if (!active) return null;
    const pieces = [];
    const cols = ["var(--spark)", "var(--spark-hover)", "var(--marigold-400)", "var(--marigold-500)", "var(--brand-primary)"];
    for (let i = 0; i < 22; i++) {
      pieces.push(
        <i key={i} aria-hidden="true" style={{
          left: (8 + (i * 4.1) % 84) + "%",
          background: cols[i % cols.length],
          animationDelay: ((i % 6) * 60) + "ms",
        }} />
      );
    }
    return <div className="trv-burst" aria-hidden="true">{pieces}</div>;
  }

  function BreakdownRows({ rows, icon }) {
    const { ProgressBar } = LU;
    return rows.map((r, i) => {
      const p = pct(r.got, r.max);
      return (
        <div className="trv-bk-row" key={i}>
          <div className="trv-bk-row__top">
            <span className="trv-bk-row__label"><Icon name={icon} size={15} /> {r.label}</span>
            <span className="trv-bk-row__nums">{r.got} / {r.max} · {p}%</span>
          </div>
          <ProgressBar value={p} variant={p >= RESULT.passMark ? "success" : undefined} />
        </div>
      );
    });
  }

  function ProgressionChart() {
    const bandClass = { easy: "trv-prog-dot--easy", med: "trv-prog-dot--med", hard: "trv-prog-dot--hard" };
    const bandOffset = { easy: 0, med: 36, hard: 72 };
    return (
      <div>
        <p className="trv-prog-cap">
          How the test adapted to you — each step shows the difficulty you reached. Correct and

        </p>
        <div className="trv-prog-chart" role="img"

            <div className="trv-prog-col" key={s.q}>

                <div style={{ height: bandOffset[s.diff] }} />
                <div className={"trv-prog-dot " + bandClass[s.diff] +

                  <Icon name={s.correct ? "check" : "rotate-ccw"} size={15} />
                </div>
              </div>
              <span className="trv-prog-q">Q{s.q}</span>
              <span className={"trv-prog-mark " + (s.correct ? "trv-prog-mark--correct" : "trv-prog-mark--miss")}>
                {s.correct ? "Correct" : "Review"}
              </span>
            </div>
          ))}
        </div>
        <div className="trv-prog-legend">
          <span className="trv-prog-leg"><span className="trv-leg-swatch" style={{ borderColor: "var(--mastery-mastered)" }} /> Easy</span>

          <span className="trv-prog-leg"><Icon name="check" size={14} style={{ color: "var(--status-success)" }} /> Correct</span>

        </div>

  function QuestionReviewItem({ q }) {

        <div className={"trv-fb " + (q.correct ? "trv-fb--ok" : "trv-fb--miss")} role="status">

            {q.correct ? "Correct" : "Let's look at this one again"}
          </div>
          <div className="trv-fb-intro">Here's what the grader noted:</div>
          <div className="trv-fb-body"><ContentRenderer math>{q.feedback}</ContentRenderer></div>

          {q.ai && (
            <div className="trv-fb-confrow">
              <ConfidenceBadge level={q.confidence}
                value={q.confidence === "high" ? "High confidence" :
                       q.confidence === "med" ? "Medium confidence" : "Low confidence"} />
              {q.confidence === "low" && (
                <span className="trv-fb-confnote">A teacher will take a second look at this one.</span>
              )}
            </div>
          )}
        </div>

        {q.rubric && (
          <div>
            <div className="trv-eyebrow" style={{ marginBottom: "var(--space-2)" }}>Rubric breakdown</div>

  const [burst, setBurst] = useState(false);
  const reviewRef = useRef(null);

  const celebrate = RESULT.passed || RESULT.personalBest;

  useEffect(() => {
    if (!celebrate || reduce) return;
    setBurst(true);
    const t = setTimeout(() => setBurst(false), 1400); // fire once, then clear
    return () => clearTimeout(t);
  }, []);

  const scrollToReview = () => {
    if (reviewRef.current) {
      reviewRef.current.scrollIntoView({ behavior: reduce ? "auto" : "smooth", block: "start" });
      reviewRef.current.focus({ preventScroll: true });
    }
  };

  const accItems = QUESTIONS.map((q) => ({
    title: (
      <div className="trv-qhead">
        <div className="trv-qhead__left">
          <span className="trv-qhead__qno">Q{q.n}</span>
          {q.correct
            ? <Badge variant="success" icon={<Icon name="check" size={12} />}>Correct</Badge>

        <div style={{ marginBottom: "var(--space-4)" }}>
          <ContentRenderer math>{q.prompt}</ContentRenderer>
        </div>
        <QuestionReviewItem q={q} />

        <div aria-live="polite" className="trv-sr-only">

            <div className="trv-hero__cta">
              <Button variant="secondary" leadingIcon={<Icon name="list-checks" size={16} />}

              <Button variant="spark" trailingIcon={<Icon name="arrow-right" size={16} />}
                onClick={() => go("#/spaces/dsa/test/2/analytics")}>
                Session analytics
              </Button>
              <Button variant="ghost" leadingIcon={<Icon name="message-circle-question" size={16} />}
                onClick={() => setTutorOpen(true)}>Ask the tutor</Button>
            </div>

            <div className="trv-keylock-chip">
              <AnswerKeyLock title="Answer keys stay sealed">

              </AnswerKeyLock>

        {/* BREAKDOWN GRID 2×2 */}
        <div className="trv-bk-grid">

            <Button variant="ghost" size="sm" leadingIcon={<Icon name="message-circle-question" size={14} />}

          </div>
        </InsightCard>

        {/* PER-QUESTION REVIEW */}
        <section ref={reviewRef} tabIndex={-1} aria-label="Per-question review"
          style={{ outline: "none" }}>
          <Section title="Per-question review"
            actions={<span style={{ fontSize: "var(--text-xs)", color: "var(--text-muted)",
              fontFamily: "var(--font-mono)" }}>4 questions · feedback only, no answer key</span>}>
            <Accordion defaultOpen={0} items={accItems} />
          </Section>
        </section>

        {/* DONE */}
        <div style={{ display: "flex", justifyContent: "center", paddingTop: "var(--space-2)" }}>
          <Button variant="ghost" leadingIcon={<Icon name="arrow-left" size={16} />}
            onClick={() => go("#/tests")}>Back to tests</Button>
        </div>
      </div>

      {/* TUTOR DRAWER (right side, default closed) */}
      <Drawer open={tutorOpen} onClose={() => setTutorOpen(false)} title="Ask the tutor — Proofs">
        <div style={{ display: "flex", flexDirection: "column", gap: "var(--space-4)" }}>
          <TutorChatBubble from="tutor" author="Tutor">
            Proofs were the toughest part today — want to start with why equal angles don't make
            triangles congruent?
          </TutorChatBubble>
          <TutorChatBubble from="user" author="You">
            Yes — I thought same angles meant same triangle.
          </TutorChatBubble>
          <TutorChatBubble from="tutor" author="Tutor">
            Close! Equal angles fix the *shape* (that's AA similarity), but not the *size*. Picture a

            <Input placeholder="Type your question…" />
            <Button variant="primary"><Icon name="send" size={16} /></Button>
          </div>
        </div>
      </Drawer>
    </div>
  );
}

function View_TestAnalytics({ go, params, query, ctx }) {
  const {
    Button, Icon, Select, Section, Panel, Badge, Chip,
    ProgressBar, InsightCard, StoryPointNode, Breadcrumb
  } = LU;
  const { useState } = React;

  /* ---- Real, sanitized cross-attempt data (server-computed analytics) ---- */
  const PASSING = 70;
  const ATTEMPTS = [
    { n: 1, pct: 58, answered: 18, total: 20, secPerQ: 71 },
    { n: 2, pct: 66, answered: 19, total: 20, secPerQ: 63 },
    { n: 3, pct: 71, answered: 20, total: 20, secPerQ: 54 },
    { n: 4, pct: 84, answered: 20, total: 20, secPerQ: 49 },
  ];
  const best = ATTEMPTS.reduce((a, b) => (b.pct > a.pct ? b : a));
  const latest = ATTEMPTS[ATTEMPTS.length - 1];

  /* delta helper: returns {dir, label, aria} */
  function deltaOf(curr, prev, unit, invertGood) {
    const d = curr - prev;
    if (d === 0) return { dir: "flat", label: "about the same", aria: "no change" };
    const up = d > 0;
    const sign = up ? "+" : "−";
    const mag = Math.abs(d);
    return {
      dir: up ? "up" : "down",
      label: sign + mag + unit,
      aria: (up ? "up " : "down ") + mag + " " + unit,
    };
  }

  function DeltaTag({ d }) {
    const icon = d.dir === "up" ? "arrow-up" : d.dir === "down" ? "arrow-down" : "minus";
    return (
      <span className={"tra-delta tra-delta--" + d.dir} aria-label={d.aria}>
        <Icon name={icon} size={12} aria-hidden="true" />
        <span className="tra-mono">{d.label}</span>

  }

  function KpiCard({ icon, iconMod, label, value, sub, ariaText, delta }) {

      <div className={"tra-kpi" + (iconMod === "mastered" ? " tra-kpi--best" : "")} role="group" aria-label={ariaText}>
        <div className="tra-kpi__top">
          <span className={"tra-kpi__icon" + (iconMod ? " tra-kpi__icon--" + iconMod : "")}>
            <Icon name={icon} size={16} />
          </span>
          <span className="tra-kpi__label">{label}</span>
        </div>
        <div className="tra-kpi__value tra-mono" aria-hidden="true">{value}</div>
        <div className="tra-kpi__sub">
          {delta && <DeltaTag d={delta} />}
          <span>{sub}</span>
        </div>
      </div>
    );
  }

  /* ================= Bar chart ================= */
  function ScoreProgression() {
    const max = 100;
    return (
      <Panel title="Score progression">
        <div className="tra-chart">
          <figure
            className="tra-bars"
            role="img"
            aria-label={"Score progression across attempts: " + ATTEMPTS.map(a => "attempt " + a.n + " " + a.pct + " percent").join(", ") + ". Passing line at " + PASSING + " percent."}
            style={{ margin: 0 }}
          >
            <div className="tra-passline" style={{ bottom: "calc(" + (PASSING / max * 100) + "% + " + "0px)" }}>
              <span className="tra-passline__lbl"><Icon name="flag" size={11} aria-hidden="true" /> Passing {PASSING}%</span>
            </div>
            {ATTEMPTS.map((a) => {
              const isBest = a.pct === best.pct;
              const hgt = (a.pct / max) * 100;
              return (
                <div className="tra-bar-col" key={a.n}>
                  <div className="tra-bar-col__track">
                    <div
                      className={"tra-bar" + (isBest ? " tra-bar--best" : "")}
                      style={{ height: hgt + "%" }}
                      title={"Attempt " + a.n + " · " + a.pct + "% · " + a.secPerQ + "s/Q · 2 days ago"}
                    >
                      <span className="tra-bar__val tra-mono">{a.pct}%{isBest ? " ★" : ""}</span>
                    </div>
                  </div>
                  <div className="tra-bar-col__x tra-mono">#{a.n}</div>
                </div>
              );

          <div className="tra-chart__caption">Your scores across attempts. Passing: {PASSING}%. Best bar shown in mastered green.</div>

            <Badge variant="success" icon={<Icon name="sparkles" size={12} />}>You're at your best right now — keep it up.</Badge>
          </div>
        </div>
      </Panel>
    );
  }

  function PaceTrend() {
    const maxSec = Math.max(...ATTEMPTS.map(a => a.secPerQ));
    return (
      <Panel title="Pace trend">
        <div className="tra-chart">
          <figure
            className="tra-bars"
            role="img"
            aria-label={"Average time per question by attempt: " + ATTEMPTS.map(a => "attempt " + a.n + " " + a.secPerQ + " seconds").join(", ") + "."}
            style={{ margin: 0 }}
          >
            {ATTEMPTS.map((a) => {
              const hgt = (a.secPerQ / maxSec) * 100;
              return (
                <div className="tra-bar-col" key={a.n}>
                  <div className="tra-bar-col__track">
                    <div className="tra-bar tra-bar--pace" style={{ height: hgt + "%" }} title={"Attempt " + a.n + " · " + a.secPerQ + "s per question"}>
                      <span className="tra-bar__val tra-mono">{a.secPerQ}s</span>
                    </div>
                  </div>
                  <div className="tra-bar-col__x tra-mono">#{a.n}</div>
                </div>
              );
            })}
          </figure>
          <div className="tra-chart__caption">Time per question, attempt by attempt. Faster isn't always better — accuracy first.</div>
        </div>
      </Panel>
    );
  }

  /* ================= Difficulty progression ================= */
  const DIFF = [
    { key: "Easy", icon: "circle", first: 70, latest: 95 },
    { key: "Medium", icon: "circle-dot", first: 52, latest: 78 },
    { key: "Hard", icon: "circle-slash", first: 33, latest: 61 },
  ];
  function DifficultyDeltas() {
    return (
      <Panel title="Difficulty mastery">
        <div className="tra-chart">
          <div
            role="img"
            aria-label={"Accuracy by difficulty, first attempt to latest: " + DIFF.map(d => d.key + " from " + d.first + " to " + d.latest + " percent").join(", ") + "."}
          >
            {DIFF.map((d) => {
              const delta = deltaOf(d.latest, d.first, "%");
              return (
                <div className="tra-diff-row" key={d.key}>
                  <div className="tra-diff-row__label"><Icon name={d.icon} size={14} aria-hidden="true" /> {d.key}</div>
                  <div className="tra-diff-bars">
                    <div className="tra-diff-bars__line">

                      <ProgressBar value={d.first} />
                      <span className="tra-mono" style={{ fontSize: "var(--text-2xs)", color: "var(--text-muted)", width: 34 }}>{d.first}%</span>
                    </div>
                    <div className="tra-diff-bars__line">
                      <span className="tra-diff-bars__tag">Latest</span>
                      <ProgressBar value={d.latest} variant="success" />
                      <span className="tra-mono" style={{ fontSize: "var(--text-2xs)", color: "var(--text-secondary)", width: 34 }}>{d.latest}%</span>
                    </div>
                  </div>
                  <DeltaTag d={{ ...delta, label: delta.label + " since #1" }} />
                </div>
              );
            })}
          </div>
          <div className="tra-chart__caption">How you're doing by difficulty — and how much you've grown since your first attempt.</div>
        </div>
      </Panel>
    );
  }

  /* ================= Topic mastery ================= */
  const TOPICS = [
    { name: "Arrays", acc: 92, first: 80, strong: true },
    { name: "Two Pointers", acc: 81, first: 64 },
    { name: "Recursion", acc: 74, first: 60 },
    { name: "Dynamic Programming", acc: 40, first: 31, weak: true },
    { name: "Graphs", acc: 56, first: 56, steady: true },
  ];
  function TopicMastery() {
    return (
      <Panel title="Topic mastery">
        <div>
          {TOPICS.map((t) => {
            const delta = t.steady
              ? { dir: "flat", label: "steady", aria: "steady, no change since attempt 1" }
              : (() => { const d = deltaOf(t.acc, t.first, "%"); return { ...d, label: d.label + " since #1" }; })();
            return (
              <div className="tra-topic-row" key={t.name}>
                <div className="tra-topic-row__name">{t.name}</div>

              </div>
            );
          })}
        </div>
      </Panel>
    );
  }

  /* ================= Attempt comparison ================= */

    const dScore = deltaOf(B.pct, A.pct, "%");
    const dAns = deltaOf(B.answered, A.answered, "");
    const dPace = deltaOf(B.secPerQ, A.secPerQ, "s");

    return (
      <Panel title="Compare two attempts">
        <div className="tra-cmp">
          <div className="tra-cmp__selects">
            <div className="tra-cmp__field">
              <label className="tra-cmp__field-label" htmlFor="cmp-a">Attempt A</label>

            </div>

            <div className="tra-cmp__field">
              <label className="tra-cmp__field-label" htmlFor="cmp-b">Attempt B</label>
              <Select id="cmp-b" options={opts} value={String(bIdx)} onChange={(e) => setBIdx(Number(e.target.value))} />
            </div>
          </div>

          <div className="tra-cmp__deltas" aria-live="polite">
            <div className="tra-cmp-card">
              <span className="tra-cmp-card__label">Score</span>
              <div className="tra-cmp-card__nums">
                <span className="tra-mono">{A.pct}%</span>
                <Icon name="arrow-right" size={14} className="tra-cmp-card__arrow" aria-hidden="true" />
                <span className="tra-mono">{B.pct}%</span>
              </div>
              <DeltaTag d={dScore} />
            </div>
            <div className="tra-cmp-card">
              <span className="tra-cmp-card__label">Questions answered</span>
              <div className="tra-cmp-card__nums">
                <span className="tra-mono">{A.answered}/{A.total}</span>
                <Icon name="arrow-right" size={14} className="tra-cmp-card__arrow" aria-hidden="true" />
                <span className="tra-mono">{B.answered}/{B.total}</span>

            <div className="tra-cmp-card">

              <div className="tra-cmp-card__nums">
                <span className="tra-mono">{A.secPerQ}s</span>
                <Icon name="arrow-right" size={14} className="tra-cmp-card__arrow" aria-hidden="true" />
                <span className="tra-mono">{B.secPerQ}s</span>
              </div>
              <DeltaTag d={dPace} />
            </div>

        </div>
      </Panel>
    );
  }

    return (
      <Section title="Your next focus" actions={<Badge variant="brand" icon={<Icon name="sparkles" size={12} />}>From your analytics</Badge>}>
        <div className="tra-focus-list">

              Graphs held steady at 56% — it hasn't moved across attempts. A short refresher could unlock the next jump.
            </InsightCard>
            <div className="tra-focus-item__cta">
              <Button variant="secondary" size="sm" trailingIcon={<Icon name="arrow-right" size={14} />} onClick={() => go("#/spaces/dsa/test/2")}>Practice this</Button>
              <Button variant="ghost" size="sm" onClick={() => go("#/spaces/dsa")}>Review story point</Button>
            </div>
          </div>
          <div className="tra-focus-item">
            <InsightCard icon="thumbs-up" title="Arrays are a strength — you're at 92%">

            </InsightCard>
            <div className="tra-focus-item__cta">
              <Button variant="ghost" size="sm" trailingIcon={<Icon name="arrow-right" size={14} />} onClick={() => go("#/spaces/dsa")}>Review story point</Button>
            </div>
          </div>
          <div className="tra-focus-item">
            <InsightCard icon="trending-up" title="Your pacing is settling in">
              You've trimmed from 71s to 49s per question while accuracy rose — that's confidence, not rushing. Hold this rhythm.
            </InsightCard>
            <div className="tra-focus-item__cta">
              <Button variant="ghost" size="sm" trailingIcon={<Icon name="arrow-right" size={14} />} onClick={() => go("#/spaces/dsa")}>See attempt details</Button>
            </div>
          </div>
        </div>
      </Section>
    );
  }

  const dLatest = deltaOf(latest.pct, ATTEMPTS[ATTEMPTS.length - 2].pct, "%");
  const dPaceKpi = deltaOf(latest.secPerQ, ATTEMPTS[0].secPerQ, "s");

  return (
    <div className="tra-root">
      {/* Header band */}
      <div className="tra-hdr">
        <Breadcrumb items={[
          { label: "Spaces", href: "#/spaces" },
          { label: "Data Structures & Algorithms", href: "#/spaces/dsa" },
          { label: "Dynamic Programming", href: "#/spaces/dsa" },
          { label: "Progress" },
        ]} />
        <div className="tra-hdr__row">
          <span className="tra-hdr__icon"><Icon name="trending-up" size={22} /></span>
          <div style={{ flex: 1, minWidth: 0 }}>
            <h1 className="tra-hdr__title">Dynamic Programming — Your Progress</h1>
            <p className="tra-hdr__sub tra-mono" style={{ fontFamily: "var(--font-ui)" }}>
              <span className="tra-mono">4</span> attempts · last attempt 2 days ago
            </p>
          </div>
          <div className="tra-hdr__chips">
            <StoryPointNode state="mastered" index={5} label="DP" />
            <Chip active><Icon name="arrow-up-right" size={12} /> In progress → Mastered</Chip>
            <Badge variant="success" icon={<Icon name="sparkles" size={12} />}>Nice climb.</Badge>
          </div>
        </div>
      </div>

      {/* KPI strip */}
      <section aria-label="Your key stats" className="tra-kpi-strip">
        <KpiCard icon="award" iconMod="mastered" label="Best Score" value="84%" sub="attempt 4" ariaText="Best score 84 percent, attempt 4" />
        <KpiCard icon="gauge" label="Latest Score" value="84%" delta={dLatest} sub="vs attempt 3" ariaText="Latest score 84 percent, up 13 percentage points versus attempt 3" />

      {/* Score progression */}

      {/* Two-up: pace + difficulty */}
      <div className="tra-row-2">

        <DifficultyDeltas />
      </div>

      {/* Topic mastery */}
      <TopicMastery />

      {/* Attempt comparison */}

      {/* Next focus */}

    const reduce = typeof window !== "undefined" &&
      window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const [n, setN] = useState(reduce ? value : 0);
    useEffect(() => {
      if (reduce) return;
      let raf, start;
      const dur = 1000;
      const step = (t) => {
        if (!start) start = t;
        const p = Math.min(1, (t - start) / dur);
        const eased = 1 - Math.pow(1 - p, 3);
        setN(Math.round(eased * value));
        if (p < 1) raf = requestAnimationFrame(step);
      };
      raf = requestAnimationFrame(step);
      return () => cancelAnimationFrame(raf);
    }, [value, reduce]);
    return (

          <Button variant="ghost" leadingIcon={<Icon name="arrow-left" size={16} />}

function View_Achievements({ go, params, query, ctx }) {

  /* ========================== DATA ========================== */
  const CATEGORIES = [

  ];

  const LOCKED = [
    { id:"mastery", cat:"learning", icon:"award", title:"Polymath", desc:"Master story points across every active space.", rarity:"epic", tier:"gold", xp:300, progress:7, threshold:10, unit:"story points", criteria:"Complete 10 story points in any space.", remain:<span>Just <strong>3 more story points</strong> to unlock Polymath</span> },
    { id:"streak14", cat:"consistency", icon:"flame", title:"Unstoppable", desc:"Keep your streak alive for 14 days.", rarity:"epic", tier:"gold", xp:280, progress:7, threshold:14, unit:"days", criteria:"Maintain a 14-day streak.", remain:<span>Keep your streak <strong>7 more days</strong></span> },
    { id:"perfect3", cat:"excellence", icon:"crosshair", title:"Sharpshooter", desc:"Score 100% on three exams.", rarity:"legendary", tier:"diamond", xp:400, progress:2, threshold:3, unit:"perfect exams", criteria:"Score 100% on 3 exams.", remain:<span><strong>1 more perfect exam</strong> to go</span> },
    { id:"tenexam", cat:"excellence", icon:"file-check", title:"Battle-Tested", desc:"Complete 10 graded exams.", rarity:"rare", tier:"silver", xp:160, progress:9, threshold:10, unit:"exams", criteria:"Complete 10 graded exams.", remain:<span><strong>1 more exam</strong> and it's yours</span> },

    { id:"points5k", cat:"milestone", icon:"coins", title:"High Roller", desc:"Earn 5,000 total points.", rarity:"epic", tier:"gold", xp:260, progress:1840, threshold:5000, unit:"points", criteria:"Earn 5,000 total points.", remain:<span><strong>3,160 more points</strong> to bank</span> },
    { id:"social5", cat:"social", icon:"users", title:"Study Buddy", desc:"Help five classmates in discussions.", rarity:"rare", tier:"bronze", xp:130, progress:1, threshold:5, unit:"helpful replies", criteria:"Post 5 helpful replies.", remain:<span><strong>4 more helpful replies</strong> to go</span> },
    { id:"weekperfect", cat:"consistency", icon:"calendar-heart", title:"Perfect Week", desc:"Learn every day for a full week.", rarity:"epic", tier:"gold", xp:240, progress:0, threshold:7, unit:"days", criteria:"Learn 7 days in a row.", start:true, remain:<span>Start this one with <strong>a study session today</strong></span> },
  ];

  /* ====================== small pieces ====================== */
  function RarityTier({ rarity, tier }) {
    const r = rarityMap[rarity], t = tierMap[tier];
    return (
      <div className="ach-badge-card__labels">
        <Badge icon={<Icon name={r.icon} size={12}/>}>{r.label}</Badge>
        <Badge variant="spark" icon={<Icon name={t.icon} size={12}/>}>{t.label}</Badge>
      </div>
    );
  }

  function Burst({ on }) {
    const parts = [];
    for (let i = 0; i < 10; i++) {
      const ang = (i / 10) * Math.PI * 2;
      const dist = 46 + (i % 3) * 10;
      parts.push(
        <span key={i} className="ach-burst__spark"
          style={{ "--bx": Math.cos(ang)*dist + "px", "--by": Math.sin(ang)*dist + "px", animationDelay: (i*12) + "ms" }}/>
      );
    }
    return <div className={"ach-burst" + (on ? " ach-burst--on" : "")} aria-hidden="true">{parts}</div>;
  }

  /* ====================== badge cards ====================== */
  function EarnedCard({ a, isNew, popping, onOpen }) {

    return (
      <button
        className={"ach-badge-card" + (isNew ? " ach-badge-card--new" : "") + (popping ? " ach-badge-card--popping" : "")}
        aria-label={aria}
        onClick={() => onOpen(a, false)}
      >
        {isNew && <span className="ach-badge-card__new-dot"><Icon name="sparkles" size={11}/> New</span>}
        <div className="ach-badge-card__medal" style={{ position:"relative" }}>
          {isNew && <Burst on={popping}/>}
          <Achievement icon={a.icon} name=""/>
        </div>
        <h3 className="ach-badge-card__title">{a.title}</h3>
        <RarityTier rarity={a.rarity} tier={a.tier}/>
        <div style={{ display:"flex", alignItems:"center", gap:"var(--space-2)", marginTop:"auto" }}>
          <span className="ach-badge-card__date"><Icon name="calendar-check" size={12}/> Earned {a.date}</span>
        </div>
        <Badge variant="spark" icon={<Icon name="zap" size={12}/>}>+{a.xp} XP</Badge>
      </button>
    );
  }

  function LockedCard({ a, indeterminate, onOpen }) {
    const pct = Math.round((a.progress / a.threshold) * 100);
    const aria = a.title + ", locked, " + rarityMap[a.rarity].label + ", " + tierMap[a.tier].label + " tier"

    return (
      <button className="ach-badge-card" aria-label={aria} onClick={() => onOpen(a, true)}>
        <div className="ach-badge-card__medal">
          <Achievement icon={a.icon} name="" locked/>
        </div>
        <h3 className="ach-badge-card__title">{a.title}</h3>
        <RarityTier rarity={a.rarity} tier={a.tier}/>
        <div className="ach-badge-card__prog">
          {indeterminate ? (
            <>
              <div className="ach-badge-card__prog-num"><span>Progress</span><span className="ach-u-mono">—</span></div>
              <ProgressBar value={0} variant="success"/>
              <div className="ach-badge-card__remain ach-badge-card__remain--indet">We'll show your progress in a moment</div>
            </>
          ) : (
            <>
              <div className="ach-badge-card__prog-num">
                <span>{a.start ? "Not started" : "Progress"}</span>

                aria-valuemin={0} aria-valuemax={a.threshold} aria-valuenow={a.progress}

    useEffect(() => { if (ref.current) ref.current.focus(); }, []);
    useEffect(() => {
      const onKey = (e) => { if (e.key === "Escape") onClose(); };
      window.addEventListener("keydown", onKey);
      return () => window.removeEventListener("keydown", onKey);
    }, [onClose]);
    if (!data) return null;
    const { a, locked } = data;
    return (
      <div className="modal-scrim" onClick={onClose}>
        <div className="ach-detail" role="dialog" aria-modal="true" aria-label={a.title + " details"}
          tabIndex={-1} ref={ref} onClick={(e)=>e.stopPropagation()}>

            <IconButton icon={<Icon name="x" size={18}/>} label="Close details" onClick={onClose}/>

              <h2 className="ach-detail__title">{a.title}</h2>
              <div style={{ color:"var(--text-secondary)", fontSize:"var(--text-sm)", marginTop:2 }}>{a.desc}</div>
            </div>
          </div>
          <div className="ach-detail__row">
            <RarityTier rarity={a.rarity} tier={a.tier}/>
            <Badge variant="spark" icon={<Icon name="zap" size={12}/>}>+{a.xp} XP</Badge>
          </div>
          <div className="ach-detail__crit">
            <Icon name="check-circle" size={13}/> <strong>How to earn it: </strong>{a.criteria}

                <Icon name="calendar-check" size={14}/> Earned on <span className="ach-u-mono">{a.date}</span> — nicely done.
              </div>}
        </div>
      </div>
    );
  }

  const [cat, setCat] = useState("all");

  const [seenMap, setSeenMap] = useState(() => {
    const m = {}; EARNED.forEach(a => m[a.id] = a.seen); return m;
  });
  const [popping, setPopping] = useState(false);
  const [announce, setAnnounce] = useState("");
  const chipRefs = useRef([]);

  const newOnes = EARNED.filter(a => !seenMap[a.id]);

  useEffect(() => {
    if (newOnes.length === 0) return;

      setPopping(true);
      t1 = setTimeout(() => setPopping(false), 900);

    <div className="ach-root">

      <div className="ach-head">
        <div>
          <div style={{ marginBottom:"var(--space-3)" }}>
            <Button variant="ghost" leadingIcon={<Icon name="arrow-left" size={16}/>} onClick={() => go("#/progress")}>Back to progress</Button>
          </div>
          <h1 className="ach-head__title">Your Achievements</h1>
          <p className="ach-head__sub">
            <span className="ach-mono">12</span> of <span className="ach-mono">40</span> earned
            {newCount > 0 && <> · <span className="ach-head__new"><span className="ach-mono">{newCount}</span> new this week</span></>}
          </p>
        </div>
        <div className="ach-level-strip" role="group" aria-label="Level 7, 1,240 of 1,800 XP, 7-day streak">
          <LevelBadge level={7} spark/>
          <div className="ach-level-strip__xp"><XPMeter level={7} xp={1240} next={1800}/></div>
          <div className="ach-level-strip__sep"/>
          <StreakFlame days={7}/>
        </div>
      </div>

      {/* CATEGORY FILTER */}
      <div className="ach-chips" role="radiogroup" aria-label="Filter by category">
        {CATEGORIES.map((c, i) => (
          <button
            key={c.key}
            ref={el => chipRefs.current[i] = el}
            role="radio"
            aria-checked={cat === c.key}
            tabIndex={cat === c.key ? 0 : -1}
            onClick={() => setCat(c.key)}
            onKeyDown={(e) => onChipKey(e, i)}
          >
            <Chip active={cat === c.key}>{c.label}<span className="ach-chip-count">{c.count}</span></Chip>
          </button>
        ))}
      </div>

      {/* EARNED */}
      {earnedShown.length > 0 && (
        <Section title={"Earned (" + earnedShown.length + ")"}>
          <div className="ach-grid">
            {earnedShown.map(a => (
              <EarnedCard key={a.id} a={a} isNew={!seenMap[a.id]} popping={popping && !seenMap[a.id]} onOpen={openDetail}/>
            ))}
          </div>
        </Section>
      )}

      {/* KEEP GOING */}
      <Section title={"Keep going (" + lockedShown.length + ")"}>
        <div className="ach-grid">
          {lockedShown.map(a => (
            <LockedCard key={a.id} a={a} onOpen={openDetail}/>
          ))}
        </div>
      </Section>

      <div style={{ height:"var(--space-6)" }}/>

      {/* DETAIL POPOVER (default closed; opens on badge click) */}
      {detail && <DetailPopover data={detail} onClose={() => setDetail(null)}/>}
    </div>
  );
}

  @keyframes golBannerPop { 0% { transform: translateX(-50%) scale(0.7); opacity: 0; } 60% { transform: translateX(-50%) scale(1.06); } 100% { transform: translateX(-50%) scale(1); opacity: 1; } }

  @keyframes golFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* COMPLETED / MILESTONE */
  .gol-milestone { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); border-radius: var(--radius-md); background: var(--bg-surface-sunken); border: 1px solid var(--border-subtle); }

  .gol-startchip { display: inline-flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); background: var(--bg-surface-sunken); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); font-size: var(--text-sm); color: var(--text-secondary); }

  .gol-toast-stack { position: fixed; bottom: var(--space-6); right: var(--space-6); z-index: 200; display: flex; flex-direction: column; gap: var(--space-3); }

  @media (prefers-reduced-motion: reduce) {
