    border:1px solid var(--border-subtle); border-radius:var(--radius-pill); background:var(--bg-surface-sunken);
    font-size:var(--text-xs); font-weight:var(--weight-semibold); cursor:pointer; min-width:0; }

  .tb-spacer{ flex:1; }

  .tb-bell-badge{ position:absolute; top:-2px; right:-2px; }

  /* ---- sub-header (for sub-routes/detail: back chevron + title) ---- */
  .subhead { display:flex; align-items:center; gap:var(--space-2); padding:var(--space-3) var(--space-4);

  .page-sub{ color:var(--text-secondary); font-size:var(--text-sm); margin-top:2px; }
  .eyebrow{ font-family:var(--font-mono); font-size:var(--text-2xs); letter-spacing:.06em; text-transform:uppercase;
    color:var(--text-muted); }

  .mrow{ display:flex; align-items:center; gap:var(--space-3); padding:var(--space-3);
    border:1px solid var(--border-subtle); border-radius:var(--radius-md); background:var(--bg-surface); cursor:pointer; }
  .mrow:active{ background:var(--bg-surface-sunken); }
  .mrow__body{ flex:1; min-width:0; }
  .mrow__title{ font-weight:var(--weight-semibold); font-size:var(--text-sm); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mrow__meta{ color:var(--text-muted); font-size:var(--text-xs); margin-top:2px; }

  .kpi__l{ font-size:var(--text-2xs); color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; }
  .row-gap{ display:flex; align-items:center; gap:var(--space-2); }
  .between{ display:flex; align-items:center; justify-content:space-between; gap:var(--space-2); }
  .web-note{ display:flex; align-items:center; gap:var(--space-2); padding:var(--space-3); border:1px dashed var(--border-strong);

  /* ---- bottom sheet (role switcher / tenant / authoring-defer) ---- */
  .sheet-scrim{ position:absolute; inset:0; background:var(--ink-900); opacity:.42; z-index:70; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; z-index:71; background:var(--bg-surface);

  .sheet__title{ font-family:var(--font-display); font-size:var(--text-lg); font-weight:var(--weight-semibold); margin:0 0 var(--space-3); }

  .opt__body{ flex:1; min-width:0; }
  .opt__t{ font-weight:var(--weight-semibold); font-size:var(--text-sm); }
  .opt__s{ font-size:var(--text-2xs); color:var(--text-muted); }

  /* ---- modal host (over device only) ---- */
  .modal-host{ position:absolute; inset:0; z-index:72; display:grid; place-items:center; padding:var(--space-4); }
  .modal-host__scrim{ position:absolute; inset:0; background:var(--ink-900); opacity:.42; }
  .modal-card{ position:relative; width:100%; max-height:82%; overflow-y:auto; background:var(--bg-surface);

  /* ---- bottom tabbar pinned ---- */
  .tabwrap{ flex:0 0 auto; z-index:40; }
  .menu-list{ display:flex; flex-direction:column; gap:var(--space-1); }
  .menu-item{ display:flex; align-items:center; gap:var(--space-3); padding:var(--space-3) var(--space-3);

  .menu-item:active{ background:var(--bg-surface-sunken); color:var(--text-primary); }
  .menu-item__chev{ margin-left:auto; color:var(--text-muted); }

  /* ---------- shared status helpers (lifted from source cards) ---------- */
  function t2RosterStatusBadge(s){
    if (s === 'Active')   return <Badge variant="success" icon={<Icon name="check-circle" size={12}/>}>Active</Badge>;
    if (s === 'Inactive') return <Badge icon={<Icon name="moon" size={12}/>}>Inactive</Badge>;
    return <Badge variant="warning" icon={<Icon name="circle-dashed" size={12}/>}>Draft</Badge>;
  }
  function t2ExamStatusBadge(s){
    if (s === 'Graded')  return <Badge variant="success" icon={<Icon name="check-circle" size={12}/>}>Graded</Badge>;
    if (s === 'Grading') return <Badge variant="info" icon={<Icon name="loader" size={12}/>}>Grading</Badge>;
    return <Badge variant="warning" icon={<Icon name="calendar-clock" size={12}/>}>Scheduled</Badge>;
  }
  function t2KindBadge({ kind }){
    return kind === 'exam'
      ? <Badge variant="brand" icon={<Icon name="file-text" size={12}/>}>Exam</Badge>
      : <Badge variant="info" icon={<Icon name="orbit" size={12}/>}>Space</Badge>;
  }
  function t2ContentStatusBadge({ status, variant }){
    const ic = status==='Published' ? 'check-circle-2' : status==='Scheduled' ? 'clock' : 'pencil';
    return <Badge variant={variant} icon={<Icon name={ic} size={12}/>}>{status}</Badge>;
  }

  /* ManualOverrideModal <- manual-override (non-destructive override + score input) */
  function ManualOverrideModal({ openModal, q }) {
    const item = q || { qno:3, points:10, score:6, conf:0.62 };
    const [score, setScore] = useState(item.score != null ? String(item.score) : "");
    const [reason, setReason] = useState("");
    const base = item.score == null ? 0 : item.score;
    const next = Math.max(0, Math.min(item.points, Number(score) || 0));
    const lower = next < base;
    return (
      <div style={{ padding:"var(--space-5)", display:"flex", flexDirection:"column", gap:"var(--space-4)" }}>
        <div className="between">
          <div>
            <div className="eyebrow">Manual override · non-destructive</div>

          </div>
          <IconButton icon={<Icon name="x" size={18} />} label="Close override" onClick={()=>openModal(null)} />
        </div>

        <ManualOverrideControl label={"Keeps the original AI score " + base + " / " + item.points + " in the audit trail"} />

        <div className="between" style={{ padding:"var(--space-3)", background:"var(--bg-surface-sunken)", border:"1px solid var(--border-subtle)", borderRadius:"var(--radius-md)" }}>

          </div>
        </div>

        <Field label="New score" hint={"0–" + item.points} required>
          <Input type="number" min={0} max={item.points} value={score} onChange={(e)=>setScore(e.target.value)} aria-label="Override score" />
        </Field>

        <div className="between" style={{ padding:"var(--space-3) var(--space-4)", border:"1px solid var(--border-subtle)", borderRadius:"var(--radius-md)" }}>
          <span style={{ fontFamily:"var(--font-mono)", color:"var(--text-muted)", textDecoration:"line-through" }}>{base}</span>
          <Icon name="arrow-right" size={16} />
          <span style={{ fontFamily:"var(--font-mono)", fontSize:"var(--text-lg)", fontWeight:"var(--weight-semibold)", color: lower ? "var(--status-error)" : next > base ? "var(--status-success)" : "var(--text-primary)" }}>{next}</span>
        </div>

        <Field label="Reason" required>
          <Textarea rows={3} value={reason} onChange={(e)=>setReason(e.target.value)}
            placeholder="Why are you changing this score? (visible in the audit timeline)" />
        </Field>

        {lower && <Alert variant="warning" title="This lowers the student's result">Confirmed on save and recorded in the audit timeline.</Alert>}

        <div className="row-gap" style={{ justifyContent:"flex-end" }}>
          <Button variant="ghost" onClick={()=>openModal(null)}>Cancel</Button>
          <Button variant={lower ? "danger" : "primary"} leadingIcon={<Icon name={lower ? "arrow-down" : "save"} size={15} />} onClick={()=>openModal(null)}>
            {lower ? "Lower score" : "Save override"}
          </Button>
        </div>
      </div>
    );
  }

  /* =====================================================================

      if (r.status === "grading_complete" || r.status === "reviewed") c.graded++;
      if (r.status === "manual_review_needed" || r.status === "ready_for_review") c.review++;
      if (r.status === "grading_failed") c.failed++;
      return c;
    }, { total:0, graded:0, review:0, failed:0, released:0 });

    return (
      <React.Fragment>
        <Subhead title="Grading queue" sub="Physics — Unit III Mid-Term · live" onBack={()=>nav('#/teacher/review')} />
        <div className="page">
          <div className="row-gap between">
            <div className="page-sub" style={{ fontFamily:"var(--font-mono)" }}>50 marks · pass at 20 · exm_8KQ2dR4mN</div>
            <span className="row-gap" style={{ fontFamily:"var(--font-mono)", fontSize:"var(--text-2xs)", color:"var(--status-success)", background:"var(--status-success-subtle)", padding:"var(--space-1) var(--space-3)", borderRadius:"var(--radius-pill)" }}>
              <span style={{ width:7, height:7, borderRadius:"var(--radius-pill)", background:"var(--status-success)" }} />live · 14:32
            </span>
          </div>

          <StatStrip items={[
            { v:String(counts.total), l:"Total" },
            { v:String(counts.graded), l:"Graded", tone:"status-success" },
            { v:String(counts.review), l:"Needs review", tone:"status-warning" },
            { v:String(counts.failed), l:"Failed", tone:"status-error" },
          ]} />

          <Panel title="Confidence routing">
            <div className="stack">
              <div className="between"><span className="row-gap"><span style={{ width:8, height:8, borderRadius:"50%", background:"var(--confidence-high)" }} />High · auto-accepted</span><span style={{ fontFamily:"var(--font-mono)" }}>{counts.graded}</span></div>
              <div className="between"><span className="row-gap"><span style={{ width:8, height:8, borderRadius:"50%", background:"var(--confidence-med)" }} />Spot-check</span><span style={{ fontFamily:"var(--font-mono)" }}>1</span></div>
              <div className="between"><span className="row-gap"><span style={{ width:8, height:8, borderRadius:"50%", background:"var(--confidence-low)" }} />Review required</span><span style={{ fontFamily:"var(--font-mono)" }}>{counts.review}</span></div>
            </div>
          </Panel>

          <Panel title="Submissions" actions={<Button variant="primary" size="sm" leadingIcon={<Icon name="clipboard-check" size={14} />} onClick={()=>nav('#/teacher/review/grading/ex_1')}>Review</Button>}>
            <div className="stack">
              {T3_SUBS.map(r => {
                const p = T3_PIPE[r.status];
                const pct = r.total ? Math.round(r.graded / r.total * 100) : 0;
                return (
                  <div className="mrow" key={r.id} onClick={()=>nav('#/teacher/review/grading/ex_1')}>
                    <Avatar initials={r.initials} size="sm" />
                    <div className="mrow__body">
                      <div className="mrow__title">{r.name} · <span style={{ fontFamily:"var(--font-mono)", color:"var(--text-muted)", fontWeight:"var(--weight-regular)" }}>{r.roll}</span></div>
                      <div className="row-gap" style={{ marginTop:"var(--space-1)", flexWrap:"wrap" }}>
                        <span className="row-gap" style={{ color:"var(--" + p.tone + ")", fontSize:"var(--text-xs)" }}><Icon name={p.icon} size={12} />{p.label}</span>
                        {r.conf && <ConfidenceBadge level={r.conf} value="0.58" />}

  /* =====================================================================
     View_GradingReview  (#/teacher/review/grading/:examId) <- grading-review
     ===================================================================== */
  function View_GradingReview({ nav, params, openModal }) {
    const examId = params.examId || "ex_1";

              <span key={f.k} onClick={()=>setFilter(f.k)}><Chip active={filter === f.k}>{f.l}</Chip></span>
            ))}
          </div>

          <Panel title="Submissions">
            <div className="stack">
              {view.map(r => {
                const p = T3_PIPE[r.status];
                return (
                  <div className="mrow" key={r.id} onClick={()=>nav('#/teacher/review/grading/' + examId + '/' + r.id)}>

                      <div className="row-gap" style={{ justifyContent:"flex-end" }}>

  /* =====================================================================
     View_SubmissionDetail (#/teacher/review/grading/:examId/:submissionId)
       <- submission-detail
     ===================================================================== */
  function View_SubmissionDetail({ nav, params, openModal, openSheet }) {
    const examId = params.examId || "ex_1";
    const sub = T3_SUBS.find(r => r.id === params.submissionId) || T3_SUBS[1];
    const maxScore = T3_QS.reduce((s, q) => s + q.points, 0);
    const totalScore = T3_QS.reduce((s, q) => s + (q.score != null ? q.score : 0), 0);
    const pct = Math.round((totalScore / maxScore) * 100);
    const grade = pct >= 85 ? "A" : pct >= 70 ? "B" : pct >= 55 ? "C" : pct >= 40 ? "D" : "F";
    const needs = T3_QS.filter(q => q.status === "needs_review" || q.status === "failed").length;

    return (
      <React.Fragment>
        <Subhead title={sub.name} sub={sub.roll + " · " + sub.cls + " · submission"} onBack={()=>nav('#/teacher/review/grading/' + examId)} />
        <div className="page">
          {/* ResultSummary */}
          <Panel>
            <div className="between">
              <div>
                <div className="row-gap" style={{ alignItems:"baseline" }}>
                  <span style={{ fontFamily:"var(--font-mono)", fontSize:"var(--text-2xl)", fontWeight:"var(--weight-semibold)" }}>{totalScore}</span>
                  <span style={{ fontFamily:"var(--font-mono)", color:"var(--text-muted)" }}>/ {maxScore}</span>
                  <span style={{ fontFamily:"var(--font-mono)", color:"var(--text-secondary)" }}>{pct}%</span>
                </div>
                <div className="kpi__l" style={{ marginTop:"var(--space-1)" }}>Total score</div>
              </div>
              <GradePill grade={grade} />
            </div>
            <div className="row-gap" style={{ marginTop:"var(--space-2)", flexWrap:"wrap" }}>
              {needs > 0 && <span className="row-gap" style={{ color:"var(--status-error)", fontSize:"var(--text-xs)" }}><Icon name="alert-triangle" size={13} />{needs} need review</span>}
              <span className="row-gap" style={{ color:"var(--text-secondary)", fontSize:"var(--text-2xs)", fontFamily:"var(--font-mono)" }}><Icon name="lock" size={11} />Results held</span>
            </div>
          </Panel>

          <div className="eyebrow">Per-question breakdown · {T3_QS.length} questions</div>

          <div className="stack">
            {T3_QS.map(q => {
              const route = t3Route(q.conf);
              const isFailed = q.status === "failed";
              return (
                <div key={q.id} className="kpi" style={{ borderLeft: (q.status === "needs_review" || isFailed) ? "3px solid var(--confidence-low)" : route === "med" ? "3px solid var(--confidence-med)" : undefined }}>
                  <div className="between">
                    <div style={{ minWidth:0 }}>
                      <div className="eyebrow">Q{q.qno} · {q.type} · {q.points} pts</div>
                      <div className="mrow__title" style={{ whiteSpace:"normal" }}>{q.prompt}</div>
                    </div>
                    {q.score != null
                      ? <GradePill grade={q.score >= q.points * 0.5 ? "B" : "F"} score={q.score + "/" + q.points} />
                      : <span style={{ fontFamily:"var(--font-mono)", color:"var(--text-muted)" }}>—</span>}
                  </div>
                  <div className="row-gap" style={{ marginTop:"var(--space-2)", flexWrap:"wrap" }}>
                    {q.conf != null
                      ? <React.Fragment><ConfidenceBadge level={route} value={q.conf.toFixed(2)} /><span style={{ fontSize:"var(--text-2xs)", color:"var(--text-muted)" }}>{T3_CONF_LABEL[route]}</span></React.Fragment>
                      : <Badge variant="error" icon={<Icon name="x" size={11} />}>No AI result</Badge>}
                    {(q.status === "needs_review" || isFailed) && <Badge variant="error" icon={<Icon name="flag" size={11} />}>Needs review</Badge>}
                  </div>
                  <div className="row-gap" style={{ marginTop:"var(--space-3)", flexWrap:"wrap" }}>
                    <Button variant="ghost" size="sm" leadingIcon={<Icon name="list-tree" size={14} />} onClick={()=>openSheet(<RubricSheet openSheet={openSheet} q={q} />)}>Rubric</Button>
                    <Button variant="secondary" size="sm" leadingIcon={<Icon name="edit-3" size={14} />} onClick={()=>openModal(<ManualOverrideModal openModal={openModal} q={{ qno:q.qno, points:q.points, score:q.score, conf:q.conf }} />)}>Override</Button>
                    <Button variant="primary" size="sm" leadingIcon={<Icon name="check" size={14} />}
                      onClick={()=>openSheet(<div><div className="sheet__title">Q{q.qno} approved</div><div className="page-sub">AI score accepted.</div><div style={{ marginTop:"var(--space-3)", textAlign:"right" }}><Button variant="secondary" size="sm" onClick={()=>openSheet(null)}>Dismiss</Button></div></div>)}>Approve</Button>
                  </div>
                </div>
              );
            })}
          </div>

          <div className="web-note">
            <Icon name="lock" size={14} />
            <span style={{ flex:1 }}>Model answer, AI cost &amp; confidence are staff-only — never in student payloads (AnswerKeyLock).</span>
          </div>
        </div>
      </React.Fragment>
    );
  }

  /* =====================================================================

  function View_ExamAnalytics({ nav, params }) {
    const EXAM = { title:"Midterm — Data Structures & Algorithms", totalMarks:80, passingMarks:40, releasedOn:"Jun 14, 2026" };
    const A = { avgScore:62, avgPercentage:78, medianScore:64, passRate:71, totalSubmissions:134, gradedSubmissions:128 };
    const BUCKETS = [
      { min:0, count:1 }, { min:10, count:3 }, { min:20, count:6 }, { min:30, count:13 },
      { min:40, count:21 }, { min:50, count:28 }, { min:60, count:32 }, { min:70, count:24 },
    ];
    const maxB = Math.max(...BUCKETS.map(b => b.count));
    const GRADES = [
      { g:"A", cls:"a", count:31 }, { g:"B", cls:"b", count:38 }, { g:"C", cls:"c", count:34 },
      { g:"D", cls:"d", count:16 }, { g:"F", cls:"f", count:9 },
    ];
    const gTot = GRADES.reduce((s, g) => s + g.count, 0);
    const maxG = Math.max(...GRADES.map(g => g.count));
    const QUESTIONS = [
      { n:1, prompt:"Time complexity of binary search", avgPct:91, diff:0.91 },
      { n:2, prompt:"In-order traversal (iterative)", avgPct:74, diff:0.74 },
      { n:3, prompt:"Detect a cycle via DFS colouring", avgPct:58, diff:0.58 },
      { n:4, prompt:"Amortised analysis of array push", avgPct:46, diff:0.46 },
      { n:5, prompt:"Min-heap sift-down complexity", avgPct:69, diff:0.69 },
      { n:6, prompt:"Shortest path on a weighted DAG", avgPct:38, diff:0.38 },
    ];
    const diffTone = (d) => d < 0.5 ? "status-error" : d < 0.75 ? "status-warning" : "status-success";

    return (
      <React.Fragment>
        <Subhead title="Exam analytics" sub={EXAM.title} onBack={()=>nav('#/teacher/review')} />
        <div className="page">
          <div className="page-sub" style={{ fontFamily:"var(--font-mono)" }}>Released {EXAM.releasedOn} · pass {EXAM.passingMarks}/{EXAM.totalMarks}</div>

          <StatStrip items={[
            { v:A.avgScore + "/" + EXAM.totalMarks, l:"Average · " + A.avgPercentage + "%" },
            { v:A.medianScore + "/" + EXAM.totalMarks, l:"Median" },
            { v:A.passRate + "%", l:"Pass rate", tone:"status-success" },
            { v:A.gradedSubmissions + "/" + A.totalSubmissions, l:"Graded" },
          ]} />

          <Panel title="Score distribution">
            <div style={{ display:"flex", alignItems:"flex-end", gap:"var(--space-2)", height:120 }}>
              {BUCKETS.map((b, i) => (
                <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:"var(--space-1)", justifyContent:"flex-end", height:"100%" }} title={b.min + "+ marks: " + b.count}>
                  <span style={{ fontFamily:"var(--font-mono)", fontSize:"var(--text-2xs)", color:"var(--text-secondary)" }}>{b.count}</span>
                  <div style={{ width:"100%", borderRadius:"var(--radius-sm) var(--radius-sm) 0 0", height:Math.max(4, (b.count / maxB) * 96), background: b.min < EXAM.passingMarks ? "var(--status-error-subtle)" : "var(--brand-muted)" }} />
                  <span style={{ fontFamily:"var(--font-mono)", fontSize:"var(--text-2xs)", color:"var(--text-muted)" }}>{b.min}</span>
                </div>
              ))}
            </div>
            <div className="row-gap" style={{ marginTop:"var(--space-3)", flexWrap:"wrap" }}>
              <span className="row-gap" style={{ fontSize:"var(--text-2xs)", color:"var(--text-secondary)" }}><span style={{ width:12, height:12, borderRadius:"var(--radius-sm)", background:"var(--status-error-subtle)" }} />Below pass</span>
              <span className="row-gap" style={{ fontSize:"var(--text-2xs)", color:"var(--text-secondary)" }}><span style={{ width:12, height:12, borderRadius:"var(--radius-sm)", background:"var(--brand-muted)" }} />At or above pass</span>
            </div>
          </Panel>

          <Panel title="Grade distribution">
            <div className="stack">
              {GRADES.map(g => {
                const gp = Math.round((g.count / gTot) * 100);
                return (
                  <div key={g.g} className="row-gap">
                    <GradePill grade={g.g} />
                    <div style={{ flex:1, height:20, background:"var(--bg-surface-sunken)", borderRadius:"var(--radius-pill)", overflow:"hidden" }}>
                      <div style={{ height:"100%", width:Math.max(4, (g.count / maxG) * 100) + "%", borderRadius:"var(--radius-pill)", background:"var(--grade-" + g.cls + ")" }} />
                    </div>
                    <span style={{ fontFamily:"var(--font-mono)", fontSize:"var(--text-sm)", minWidth:72, textAlign:"right" }}>{g.count} · {gp}%</span>
                  </div>
                );
              })}
            </div>
          </Panel>

          <Panel title="Question difficulty" actions={<LU.AnswerKeyLock title="Keys hidden" />}>
            <div className="page-sub" style={{ marginBottom:"var(--space-2)" }}>Lower index = harder (fewer marks earned on average).</div>
            <div className="stack">
              {QUESTIONS.map(q => (
                <div key={q.n} className="mrow" style={{ cursor:"default" }}>
                  <span style={{ fontFamily:"var(--font-mono)", color:"var(--text-muted)", minWidth:28 }}>Q{q.n}</span>
                  <div className="mrow__body">
                    <div className="mrow__title" style={{ whiteSpace:"normal" }}>{q.prompt}</div>
                    <div style={{ marginTop:"var(--space-2)" }}><ProgressBar value={Math.round(q.diff * 100)} variant={q.diff < 0.5 ? "warning" : q.diff < 0.75 ? undefined : "success"} /></div>
                  </div>
                  <span style={{ fontFamily:"var(--font-mono)", fontSize:"var(--text-sm)", color:"var(--" + diffTone(q.diff) + ")" }}>{q.diff.toFixed(2)}</span>
                </div>
              ))}
            </div>
          </Panel>

          <div className="web-note">
            <Icon name="scale" size={14} />
            <span style={{ flex:1 }}>Need to change grades? Grading lives in the review queue.</span>
            <Button variant="ghost" size="sm" trailingIcon={<Icon name="arrow-up-right" size={14} />} onClick={()=>nav('#/teacher/review/grading/' + (params.examId || "ex_1"))}>Open grading</Button>
          </div>
        </div>
      </React.Fragment>
    );
  }

const T4_CLASSES = [
  { value:'cls_dsa_11a', label:'DSA · Grade 11-A' },

/* ---------- mini horizontal bar (token colors only) ---------- */
function T4Bar({ pct, tone }) {
  return (
    <div style={{ height:10, borderRadius:'var(--radius-pill)', background:'var(--bg-surface-sunken)', overflow:'hidden' }}>
      <div style={{ height:'100%', width:pct+'%', borderRadius:'var(--radius-pill)',
        background: tone ? `var(--${tone})` : 'var(--brand-primary)' }} />
    </div>
  );
}

/* ================================================================

   ================================================================ */
function View_AtRisk({ nav, openSheet }) {
  const REASONS = {
    low_exam_score:        { label:'Low score',          icon:'alert-triangle', tone:'status-error'   },
    declining_performance: { label:'Declining',          icon:'trending-down',  tone:'status-warning' },
    low_space_completion:  { label:'Low completion',     icon:'bar-chart-2',    tone:'status-warning' },
    zero_streak:           { label:'No recent activity', icon:'clock',          tone:'status-warning' },
  };
  const ROSTER = [
    { id:'stu_8841', name:'Aisha Khan',   initials:'AK', cls:'10-A', score:38,   reasons:['low_exam_score','declining_performance'], trend:'down', last:'2d ago',  flagged:'Flagged 14d' },
    { id:'stu_2207', name:'Rohan Mehta',  initials:'RM', cls:'10-B', score:null, reasons:['zero_streak'],                            trend:'na',   last:'9d ago',  flagged:'Flagged 9d' },
    { id:'stu_5613', name:'Sara Iqbal',   initials:'SI', cls:'9-C',  score:24,   reasons:['low_exam_score','low_space_completion'],   trend:'up',   last:'1d ago',  flagged:'Flagged 11d', followed:true },
    { id:'stu_4490', name:'Devansh Rao',  initials:'DR', cls:'10-A', score:33,   reasons:['low_space_completion'],                    trend:'down', last:'3d ago',  flagged:'Flagged 6d' },
    { id:'stu_7028', name:'Meera Nair',   initials:'MN', cls:'9-B',  score:36,   reasons:['declining_performance'],                   trend:'down', last:'4d ago',  flagged:'Flagged 5d' },
    { id:'stu_3155', name:'Kabir Anand',  initials:'KA', cls:'10-B', score:null, reasons:['zero_streak','low_space_completion'],      trend:'na',   last:'12d ago', flagged:'Flagged 12d' },
    { id:'stu_9902', name:'Tanvi Desai',  initials:'TD', cls:'9-C',  score:39,   reasons:['low_space_completion'],                    trend:'flat', last:'2d ago',  flagged:'Flagged 4d' },
    { id:'stu_6677', name:'Yusuf Sheikh', initials:'YS', cls:'9-B',  score:31,   reasons:['low_exam_score'],                          trend:'up',   last:'1d ago',  flagged:'Flagged 8d' },
  ];
  function reasonMeta(k){
    return REASONS[k] || { label:k.replace(/_/g,' '), icon:'tag', tone:'status-info' };
  }
  function trend(t){
    if (t==='up')   return <span style={{ color:'var(--status-success)', fontFamily:'var(--font-mono)', fontSize:'var(--text-2xs)' }}><Icon name="arrow-up-right" size={12} /> Improving</span>;
    if (t==='down') return <span style={{ color:'var(--status-error)', fontFamily:'var(--font-mono)', fontSize:'var(--text-2xs)' }}><Icon name="arrow-down-right" size={12} /> Declining</span>;
    if (t==='flat') return <span style={{ color:'var(--text-muted)', fontFamily:'var(--font-mono)', fontSize:'var(--text-2xs)' }}><Icon name="minus" size={12} /> Stable</span>;
    return <span style={{ color:'var(--text-muted)', fontFamily:'var(--font-mono)', fontSize:'var(--text-2xs)' }}>—</span>;
  }

  function openCompose(){
    openSheet(
      <div>
        <div className="sheet__title">Message students</div>
        <p style={{ fontSize:'var(--text-sm)', color:'var(--text-secondary)', marginTop:0 }}>
          Sending to <span style={{ fontFamily:'var(--font-mono)', color:'var(--text-primary)' }}>8</span> flagged students via the notification path.
        </p>
        <Field label="Subject" required>
          <Input placeholder="Checking in on your progress" />
        </Field>
        <Field label="Message" hint="A supportive nudge — this won't change anyone's at-risk status.">
          <Textarea rows={4} placeholder="Hi — I noticed you've fallen a little behind. Let's find a time to catch up." />
        </Field>
        <div style={{ display:'flex', gap:'var(--space-2)', justifyContent:'flex-end', marginTop:'var(--space-3)' }}>
          <Button variant="spark" leadingIcon={<Icon name="send" size={16} />}>Send message</Button>
        </div>
      </div>
    );
  }

  return (
    <React.Fragment>
      <Subhead title="At-risk students" sub="Flagged by the nightly review · sorted by severity" onBack={()=>nav('#/teacher/insights')} />
      <div className="page">
        <div className="between">
          <span style={{ fontSize:'var(--text-sm)', color:'var(--text-secondary)' }}>
            <span style={{ fontFamily:'var(--font-mono)', color:'var(--text-primary)' }}>12</span> of <span style={{ fontFamily:'var(--font-mono)', color:'var(--text-primary)' }}>184</span> students
          </span>
          <span className="row-gap" style={{ fontSize:'var(--text-2xs)', color:'var(--text-muted)' }}>
            <Icon name="clock" size={12} /> Updated 6 hours ago
          </span>
        </div>

        <div className="row-gap" style={{ flexWrap:'wrap' }}>
          <Button variant="secondary" size="sm" leadingIcon={<Icon name="mail" size={15} />} onClick={openCompose}>Message</Button>
          <Button variant="secondary" size="sm" leadingIcon={<Icon name="refresh-cw" size={15} />}>Refresh</Button>
        </div>

        <div className="stack">
          {ROSTER.map(r=>(
            <div className="mrow" key={r.id} onClick={()=>nav('#/teacher/students/'+r.id)} style={{ alignItems:'flex-start' }}>
              <Avatar initials={r.initials} size="sm" />
              <div className="mrow__body">
                <div className="row-gap" style={{ flexWrap:'wrap', marginBottom:4 }}>
                  <AtRiskBadge level="watch">At-risk</AtRiskBadge>
                  <span className="mrow__title">{r.name}</span>
                  {r.followed && <span style={{ fontFamily:'var(--font-mono)', fontSize:'var(--text-2xs)', color:'var(--status-info)' }}><Icon name="check" size={10} /> Followed up</span>}
                </div>
                <div className="mrow__meta">
                  {r.cls} · {r.score==null ? 'Score —' : r.score+'%'} · {r.flagged}
                </div>
                <div className="row-gap" style={{ flexWrap:'wrap', gap:'var(--space-1)', marginTop:'var(--space-2)' }}>
                  {r.reasons.map((k,i)=>{ const m=reasonMeta(k); return (
                    <span key={i} className="row-gap" style={{ fontSize:'var(--text-2xs)', color:`var(--${m.tone})`,
                      border:'1px solid var(--border-subtle)', borderRadius:'var(--radius-pill)', padding:'1px var(--space-2)' }}>
                      <Icon name={m.icon} size={11} /> {m.label}
                    </span>
                  ); })}
                  {trend(r.trend)}
                </div>
              </div>
              <Icon name="chevron-right" size={18} style={{ alignSelf:'center', color:'var(--text-muted)' }} />
            </div>
          ))}
        </div>

        <div className="between" style={{ fontSize:'var(--text-xs)', color:'var(--text-muted)' }}>
          <span><span style={{ fontFamily:'var(--font-mono)' }}>8</span> of <span style={{ fontFamily:'var(--font-mono)' }}>12</span> flagged students shown</span>
          <Button variant="ghost" size="sm" trailingIcon={<Icon name="chevron-right" size={14} />}>More</Button>
        </div>
      </div>
    </React.Fragment>
  );
}

      { id:'n5', type:'submission_graded',     title:'Submission graded: Priya Menon', body:'System Design · score 84%', time:'Yesterday', group:'Yesterday', read:true },
      { id:'n6', type:'deadline_reminder',     title:'Deadline approaching: Recursion Set', body:'Due in 2 days · Class 9-B', time:'Yesterday', group:'Yesterday', read:true },
      { id:'n7', type:'space_published',       title:'Space published: Linked Lists', body:'12 story points · DSA track', time:'3 days ago', group:'Earlier', read:true },
      { id:'n8', type:'bulk_import_complete',  title:'Student import complete', body:'142 added · 3 skipped', time:'4 days ago', group:'Earlier', read:true },
      { id:'n9', type:'system_announcement',   title:'Platform maintenance window', body:'Sunday 02:00–04:00 IST', time:'6 days ago', group:'Earlier', read:true },
    ];
    const [items, setItems] = React.useState(SEED);
    const [filter, setFilter] = React.useState('all');
    const unread = items.filter((n) => !n.read).length;
    const total = items.length;
    let view = filter === 'unread' ? items.filter((n) => !n.read) : items;
    const open = (n) => { if (!n.read) setItems(items.map((x) => x.id === n.id ? { ...x, read: true } : x)); };
    const markAll = () => setItems(items.map((x) => ({ ...x, read: true })));
    const groups = ['Today', 'Yesterday', 'Earlier'];

    return (
      <React.Fragment>
        <Subhead title="Notifications" sub={unread > 0 ? `${unread} unread · ${total} total` : `All caught up · ${total} total`} onBack={() => nav('#/teacher/more')} />
        <div className="page">

            <div className="row-gap">

            <Button variant="spark" size="sm" disabled={unread === 0} onClick={markAll} leadingIcon={<Icon name="check-check" size={14} />}>Mark all</Button>
          </div>

          {view.length === 0 ? (
            <EmptyState icon="inbox" title="You're all caught up" body="No unread notifications." action={<Button variant="secondary" size="sm" onClick={() => setFilter('all')}>Show all</Button>} />

            if (rows.length === 0) return null;
            return (
              <div key={g} className="stack">
                <div className="eyebrow">{g}</div>
                {rows.map((n) => {
                  const t = TYPE[n.type] || { icon:'bell', tone:'info' };
                  return (
                    <div
                      className="mrow"
                      key={n.id}
                      style={{ alignItems:"flex-start", background: n.read ? "var(--bg-surface)" : "var(--bg-surface-sunken)" }}
                      onClick={() => open(n)}
                    >
                      <span style={{ flex:"0 0 auto", width:32, height:32, borderRadius:"var(--radius-pill)", display:"grid", placeItems:"center", background:`var(--status-${t.tone}-subtle)`, color:`var(--status-${t.tone})` }}>
                        <Icon name={t.icon} size={16} />

                      <div className="mrow__body">
                        <div className="between">
                          <div className="mrow__title" style={{ fontWeight: n.read ? "var(--weight-medium)" : "var(--weight-semibold)", whiteSpace:"normal" }}>{n.title}</div>

                        </div>

                        <div className="mrow__meta" style={{ fontFamily:"var(--font-mono)" }}>{n.time}</div>

  function a2UserStatusBadge(st){

    if (st === 'archived') return <Badge icon={<Icon name="archive" size={12}/>}>Archived</Badge>;

    return <Badge variant="info" icon={<Icon name="mail" size={12}/>}>Invited</Badge>;
  }

  /* ---------- LinkChildrenSheet (<- parent-linking Drawer + confirm) ---------- */
  function LinkChildrenSheet({ parent, students, sName, openSheet, openModal }){
    const linkedIds = parent.children;
    const [staged, setStaged] = useState({ add:[], remove:[] });
    const [q, setQ] = useState('');

    const isRem = (id)=> staged.remove.includes(id);
    const addChild = (id)=> setStaged(s=>({ ...s, add:[...s.add, id] }));
    const undoAdd  = (id)=> setStaged(s=>({ ...s, add:s.add.filter(x=>x!==id) }));
    const toggleRemove = (id)=> setStaged(s=> s.remove.includes(id)
      ? { ...s, remove:s.remove.filter(x=>x!==id) }
      : { ...s, remove:[...s.remove, id] });

    const stagedCount = staged.add.length + staged.remove.length;
    const effLinked = linkedIds.filter(id=>!staged.remove.includes(id));
    const excluded = new Set([...linkedIds, ...staged.add]);
    const results = students.filter(s=> s.name.toLowerCase().includes(q.toLowerCase()) || s.roll.includes(q));

    return (
      <div>
        <div className="sheet__title">Link children to {parent.name}</div>
        <p className="page-sub" style={{marginTop:0}}>{parent.email}</p>

        <Alert variant="info" title="Guardian access scope">
          Linked parents can view these children's progress, exam results, and attendance in the parent portal. They cannot see other students.
        </Alert>

        <span className="eyebrow" style={{display:'block',marginTop:'var(--space-4)'}}>Currently linked ({effLinked.length})</span>
        {linkedIds.length===0 && staged.add.length===0 && (
          <div className="web-note" style={{marginTop:'var(--space-2)'}}>
            <Icon name="users-round" size={16}/><span style={{flex:1}}>No children linked. Search below to add one.</span>
          </div>
        )}
        <div className="stack" style={{marginTop:'var(--space-2)'}}>
          {linkedIds.map(id=>{
            const s = students.find(x=>x.id===id);
            return (
              <div className="mrow" key={id} style={isRem(id)?{borderColor:'var(--status-error)',background:'var(--status-error-subtle)',cursor:'default'}:{cursor:'default'}}>
                <Avatar initials={s.name.split(' ').map(w=>w[0]).join('').slice(0,2)} size="sm"/>
                <div className="mrow__body">
                  <div className="mrow__title" style={isRem(id)?{textDecoration:'line-through',color:'var(--text-muted)'}:undefined}>{s.name}</div>
                  <div className="mrow__meta" style={{fontFamily:'var(--font-mono)'}}>{s.cls} · Roll {s.roll}</div>
                </div>
                {isRem(id)
                  ? <Button variant="ghost" size="sm" onClick={()=>toggleRemove(id)}>Undo</Button>
                  : <Button variant="ghost" size="sm" leadingIcon={<Icon name="link-2-off" size={14}/>} onClick={()=>toggleRemove(id)}>Unlink</Button>}
              </div>
            );
          })}
          {staged.add.map(id=>{
            const s = students.find(x=>x.id===id);
            return (
              <div className="mrow" key={id} style={{borderColor:'var(--status-success)',background:'var(--status-success-subtle)',cursor:'default'}}>
                <Avatar initials={s.name.split(' ').map(w=>w[0]).join('').slice(0,2)} size="sm"/>
                <div className="mrow__body">
                  <div className="mrow__title">{s.name}</div>
                  <div className="mrow__meta" style={{fontFamily:'var(--font-mono)'}}>{s.cls} · Roll {s.roll}</div>
                </div>
                <Badge variant="success" icon={<Icon name="check" size={11}/>}>to add</Badge>
                <Button variant="ghost" size="sm" onClick={()=>undoAdd(id)}>Undo</Button>
              </div>
            );
          })}
        </div>

        <span className="eyebrow" style={{display:'block',marginTop:'var(--space-4)'}}>Add a child</span>
        <div style={{marginTop:'var(--space-2)'}}>
          <Input type="search" value={q} onChange={e=>setQ(e.target.value)} placeholder="Search students by name or roll number" aria-label="Search students" />
        </div>
        <div className="stack" style={{marginTop:'var(--space-2)'}}>
          {results.length===0 && (
            <div className="web-note"><Icon name="search-x" size={16}/><span style={{flex:1}}>No students match "{q}". Check the Students tab.</span></div>
          )}
          {results.map(s=>{
            const dis = excluded.has(s.id);
            return (
              <div className="mrow" key={s.id} style={dis?{opacity:.6,cursor:'default'}:undefined} onClick={()=>!dis && addChild(s.id)}>
                <Avatar initials={s.name.split(' ').map(w=>w[0]).join('').slice(0,2)} size="sm"/>
                <div className="mrow__body">
                  <div className="mrow__title">{s.name}</div>
                  <div className="mrow__meta" style={{fontFamily:'var(--font-mono)'}}>{s.cls} · Roll {s.roll}</div>
                </div>
                {dis
                  ? <Badge variant="info" icon={<Icon name="link" size={11}/>}>Linked</Badge>
                  : <Button variant="ghost" size="sm" leadingIcon={<Icon name="plus" size={14}/>}>Add</Button>}
              </div>
            );
          })}
        </div>

        {stagedCount>0 && (
          <div className="web-note" style={{marginTop:'var(--space-3)'}}>
            <Icon name="git-compare" size={16}/>
            <span style={{flex:1}}>Pending changes: <span style={{fontFamily:'var(--font-mono)'}}>{staged.add.length}</span> to add · <span style={{fontFamily:'var(--font-mono)'}}>{staged.remove.length}</span> to remove</span>
          </div>
        )}

        <div className="row-gap" style={{marginTop:'var(--space-4)',gap:'var(--space-2)',justifyContent:'flex-end'}}>
          <Button variant="ghost" onClick={()=>openSheet(null)}>Cancel</Button>
          <Button variant="primary" trailingIcon={<Icon name="arrow-right" size={16}/>} disabled={stagedCount===0}
            onClick={()=>openModal(<ConfirmLinksModal parent={parent} staged={staged} sName={sName} openModal={openModal} openSheet={openSheet}/>)}>Review &amp; confirm</Button>
        </div>
      </div>
    );
  }

  function a4MasteryColor(key){

         : key==='ip' ? 'var(--mastery-in-progress)'
         : 'var(--mastery-mastered)';

  function a4InsightTone(tone){
    return tone==='err' ? 'status-error' : tone==='warn' ? 'status-warning' : 'status-info';

  function a4ReportStatusBadge(status){
    if (status==='results_released') return <Badge variant="success" icon={<Icon name="badge-check" size={12}/>}>Results released</Badge>;

    return <Badge variant="warning" icon={<Icon name="loader" size={12}/>}>Grading</Badge>;
  }

  /* =====================================================================================
     ReportBuilderSheet  —  overlay (<- reports builder)
     type -> params -> generate; result strip with signed-URL deflist.
     ===================================================================================== */
  function ReportBuilderSheet({ openSheet, openModal, type, prefillExam, types, exams, classes }){
    const [rtype, setRtype] = useState(type || 'exam-result');
    const [examId, setExamId] = useState(prefillExam || exams[0].id);
    const [scope, setScope] = useState('class');
    const [classId, setClassId] = useState(classes[0].label);
    const [generating, setGenerating] = useState(false);

    const examLabel = (exams.find(e=>e.id===examId)||{}).label || '—';

    function generate(){
      setGenerating(true);
      const meta = rtype==='exam-result'
        ? { type:'Exam result', scope: scope==='class'?'Whole class':'One student', subject: examLabel }
        : rtype==='class'
        ? { type:'Class report card', scope:'Whole class', subject: classId }
        : { type:'Student progress', scope:'One student', subject:'Priya Nair' };
      setTimeout(()=>{ setGenerating(false); openSheet(null); openModal(<ReportResultModal openModal={openModal} meta={meta}/>); }, 700);
    }

    return (
      <div>
        <div className="sheet__title">New report</div>
        <p className="page-sub" style={{marginTop:0}}>Tenant-scoped · content computed server-side · answer keys never included.</p>

        <span className="eyebrow" style={{display:'block'}}>1 · Report type</span>
        <div className="stack" style={{marginTop:'var(--space-2)',marginBottom:'var(--space-4)'}}>
          {types.map(rt=>(
            <div className="opt" key={rt.id} style={rtype===rt.id?{borderColor:'var(--brand-primary)'}:undefined} onClick={()=>setRtype(rt.id)}>
              <Icon name={rt.icon} size={18}/>
              <div className="opt__body"><div className="opt__t">{rt.label}</div><div className="opt__s">{rt.help}</div></div>
              {rtype===rt.id
                ? <Icon name="check" size={18} style={{color:'var(--brand-primary)'}}/>
                : <Icon name="circle" size={16} style={{color:'var(--text-muted)'}}/>}
            </div>
          ))}
        </div>

        <span className="eyebrow" style={{display:'block'}}>2 · Parameters</span>
        <div className="stack" style={{marginTop:'var(--space-2)',marginBottom:'var(--space-4)'}}>
          {rtype==='exam-result' && (
            <React.Fragment>
              <Field label="Exam">
                <Select value={examId} onChange={e=>setExamId(e.target.value)}>
                  {exams.map(e=><option key={e.id} value={e.id}>{e.label}</option>)}
                </Select>
              </Field>
              <Field label="Scope">
                <div className="row-gap" style={{gap:'var(--space-2)'}}>
                  <Chip active={scope==='class'} onClick={()=>setScope('class')} style={{cursor:'pointer'}}>Whole class</Chip>
                  <Chip active={scope==='student'} onClick={()=>setScope('student')} style={{cursor:'pointer'}}>One student</Chip>
                </div>
              </Field>
            </React.Fragment>
          )}
          {rtype==='class' && (
            <Field label="Class">
              <Select value={classId} onChange={e=>setClassId(e.target.value)}>
                {classes.map(c=><option key={c.label} value={c.label}>{c.label}</option>)}
              </Select>
            </Field>
          )}
          {rtype==='progress' && (
            <React.Fragment>
              <Field label="Class">
                <Select value={classId} onChange={e=>setClassId(e.target.value)}>
                  {classes.map(c=><option key={c.label} value={c.label}>{c.label}</option>)}
                </Select>
              </Field>
              <Field label="Student">
                <Select defaultValue="st1">
                  <option value="st1">Priya Nair</option>
                  <option value="st2">Rohan Das</option>
                  <option value="st3">Mei Lin</option>
                </Select>
              </Field>
            </React.Fragment>
          )}
          <Field label="Export format">
            <Select defaultValue="pdf"><option value="pdf">PDF document</option></Select>
          </Field>
        </div>

        <div className="web-note">
          <Icon name="shield" size={16}/><span style={{flex:1}}>Content is computed server-side. Answer keys are never included.</span>
        </div>

        <div className="row-gap" style={{marginTop:'var(--space-4)',justifyContent:'flex-end',gap:'var(--space-2)'}}>
          <Button variant="ghost" onClick={()=>openSheet(null)}>Cancel</Button>
          <Button variant="primary" leadingIcon={<Icon name="file-down" size={16}/>} disabled={generating} onClick={generate}>
            {generating?'Generating…':'Generate report'}
          </Button>
        </div>
      </div>
    );
  }

      student_at_risk:       { icon:'alert-octagon',  tone:'error',   label:'At Risk Alert' },

      space_published:       { icon:'book-open',      tone:'info',    label:'Space Published' },
      system_announcement:   { icon:'megaphone',      tone:'info',    label:'Announcement' },
    };
    const SEED = [
      { id:'n1', group:'Today', type:'ai_budget_alert', title:'AI budget alert', body:'Tenant spend reached 80% of the monthly cap. Review usage on the AI Usage page before the cap is hit.', time:'12 min ago', read:false },
      { id:'n2', group:'Today', type:'bulk_import_complete', title:'Bulk import complete', body:'248 students imported into Grade 9. 3 rows were skipped as duplicates.', time:'2 hours ago', read:true },
      { id:'n3', group:'Today', type:'grading_complete', title:'Grading complete', body:'Auto-grading finished for Mid-Term Mathematics (Class 8A). 31 of 31 submissions scored.', time:'4 hours ago', read:false },
      { id:'n4', group:'Yesterday', type:'student_at_risk', title:'Student at risk', body:'3 students flagged in Class 10-B from this week’s analytics run. Falling mastery and missed deadlines.', time:'Yesterday', read:false },
      { id:'n5', group:'Yesterday', type:'exam_results_released', title:'Exam results released', body:'Results for End-Term Physics (Grade 11) were released to students and parents.', time:'Yesterday', read:true },
      { id:'n6', group:'Earlier', type:'space_published', title:'Space published', body:'The space “Data Structures — Foundations” was published and assigned to 4 classes.', time:'3 days ago', read:true },
      { id:'n7', group:'Earlier', type:'deadline_reminder', title:'Deadline approaching', body:'The submission window for Quarterly Chemistry closes in 24 hours for Grade 12.', time:'3 days ago', read:true },
      { id:'n8', group:'Earlier', type:'system_announcement', title:'Scheduled maintenance', body:'Platform maintenance is planned for 28 Jun, 02:00–04:00 local time. Brief read-only windows expected.', time:'5 days ago', read:true },
    ];
    const [items, setItems] = React.useState(SEED);
    const [filter, setFilter] = React.useState('all');
    const unread = items.filter((n) => !n.read).length;
    const total = items.length;
    const view = filter === 'unread' ? items.filter((n) => !n.read) : items;
    const open = (n) => { if (!n.read) setItems(items.map((x) => x.id === n.id ? { ...x, read: true } : x)); };
    const markAll = () => setItems(items.map((x) => ({ ...x, read: true })));
    const groups = ['Today', 'Yesterday', 'Earlier'];

    return (
      <React.Fragment>
        <Subhead title="Notifications" sub={unread > 0 ? `${unread} unread · ${total} total` : `All caught up · ${total} total`} onBack={() => nav('#/admin/more')} />
        <div className="page">

          <Alert variant="info" title="Tenant-scoped inbox">
            This inbox shows only your notifications in Northwood Academy. Notifications are system-created — you can read and mark them read.
          </Alert>

          <div className="between">
            <div className="row-gap">
              <Chip active={filter === 'all'} onClick={() => setFilter('all')}>All</Chip>
              <Chip active={filter === 'unread'} onClick={() => setFilter('unread')}>Unread {unread > 0 ? `(${unread})` : ''}</Chip>
            </div>
            <Button variant="secondary" size="sm" disabled={unread === 0} onClick={markAll} leadingIcon={<Icon name="check-check" size={14} />}>Mark all</Button>
          </div>

          {view.length === 0 ? (
            <EmptyState icon={filter === 'unread' ? 'check-circle' : 'inbox'}
              title={filter === 'unread' ? "You're all caught up" : 'No notifications yet'}
              body={filter === 'unread' ? 'No unread notifications.' : 'New updates about imports, budgets, and student activity will appear here.'}
              action={filter === 'unread' ? <Button variant="ghost" size="sm" onClick={() => setFilter('all')}>View all</Button> : undefined} />
          ) : groups.map((g) => {
            const rows = view.filter((n) => n.group === g);
            if (rows.length === 0) return null;
            return (
              <div key={g} className="stack">
                <div className="eyebrow">{g}</div>
                {rows.map((n) => {
                  const t = TYPE[n.type] || { icon:'bell', tone:'info', label:'Update' };
                  return (

  /* =================== ROUTE TABLE ===================

     A route entry: { test(p):bool, tab:'home'|..., render(ctx):JSX }  ctx={nav,go,params,openSheet,openModal,role}
     Ordered most-specific first. */
  const ROUTES = [
    /* ---- most-specific first ---- */

    /* TEACHER · review (4-seg → 3-seg) */
    { match:(p)=>p.role==='teacher'&&p.seg[0]==='review'&&p.seg[1]==='grading'&&p.seg.length===4, tab:'review', render:(ctx)=> <View_SubmissionDetail {...ctx}/> },
    { match:(p)=>p.role==='teacher'&&p.seg[0]==='review'&&p.seg[1]==='exams'&&p.seg[3]==='analytics', tab:'review', render:(ctx)=> <View_ExamAnalytics {...ctx}/> },

    /* ADMIN · academics class detail (3-seg) */
    { match:(p)=>p.role==='admin'&&p.seg[0]==='academics'&&p.seg[1]==='classes'&&p.seg.length===3, tab:'academics', render:(ctx)=> <View_AdminClassDetail {...ctx}/> },

    { match:(p)=>p.role==='teacher'&&p.seg[0]==='classes'&&p.seg[1]&&p.seg.length===2, tab:'classes', render:(ctx)=> <View_TeacherClassDetail {...ctx}/> },
    { match:(p)=>p.role==='teacher'&&p.seg[0]==='students'&&p.seg[1]&&p.seg.length===2, tab:'classes', render:(ctx)=> <View_TeacherStudentDetail {...ctx}/> },

    { match:(p)=>p.role==='teacher'&&p.seg[0]==='review'&&p.seg[1]==='grading'&&p.seg.length===2, tab:'review', render:(ctx)=> <View_GradingQueue {...ctx}/> },

    { match:(p)=>p.role==='teacher'&&p.seg[0]==='insights'&&p.seg[1]==='spaces', tab:'insights', render:(ctx)=> <View_SpaceAnalytics {...ctx}/> },

    /* ADMIN · people sub-routes (2-seg) */
    { match:(p)=>p.role==='admin'&&p.seg[0]==='people'&&p.seg[1]==='staff', tab:'people', render:(ctx)=> <View_AdminStaff {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='people'&&p.seg[1]==='roles', tab:'people', render:(ctx)=> <View_AdminRoles {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='people'&&p.seg[1]==='parents', tab:'people', render:(ctx)=> <View_AdminParents {...ctx}/> },

    /* ADMIN · academics sub-routes (2-seg) */
    { match:(p)=>p.role==='admin'&&p.seg[0]==='academics'&&p.seg[1]==='content', tab:'academics', render:(ctx)=> <View_AdminContent {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='academics'&&p.seg[1]==='courses', tab:'academics', render:(ctx)=> <View_AdminCourses {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='academics'&&p.seg[1]==='exams', tab:'academics', render:(ctx)=> <View_AdminExams {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='academics'&&p.seg[1]==='sessions', tab:'academics', render:(ctx)=> <View_AdminSessions {...ctx}/> },

    /* ADMIN · insights sub-routes (2-seg) */
    { match:(p)=>p.role==='admin'&&p.seg[0]==='insights'&&p.seg[1]==='reports'&&p.seg.length===2, tab:'insights', render:(ctx)=> <View_AdminReports {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='insights'&&p.seg[1]==='ai-usage'&&p.seg.length===2, tab:'insights', render:(ctx)=> <View_AdminAIUsage {...ctx}/> },

    /* TEACHER · primary tabs + 1-seg sub-routes */
    { match:(p)=>p.role==='teacher'&&p.seg[0]==='review'&&p.seg.length===1, tab:'review', render:(ctx)=> <View_TeacherReview {...ctx}/> },
    { match:(p)=>p.role==='teacher'&&p.seg[0]==='classes'&&p.seg.length===1, tab:'classes', render:(ctx)=> <View_TeacherClasses {...ctx}/> },
    { match:(p)=>p.role==='teacher'&&p.seg[0]==='students'&&p.seg.length===1, tab:'classes', render:(ctx)=> <View_TeacherStudents {...ctx}/> },
    { match:(p)=>p.role==='teacher'&&p.seg[0]==='insights'&&p.seg.length===1, tab:'insights', render:(ctx)=> <View_TeacherInsights {...ctx}/> },
    { match:(p)=>p.role==='teacher'&&p.seg[0]==='assignments'&&p.seg.length===1, tab:'review', render:(ctx)=> <View_TeacherAssignments {...ctx}/> },
    { match:(p)=>p.role==='teacher'&&p.seg[0]==='announcements'&&p.seg.length===1, tab:'more', render:(ctx)=> <View_TeacherAnnouncements {...ctx}/> },
    { match:(p)=>p.role==='teacher'&&p.seg[0]==='notifications'&&p.seg.length===1, tab:'more', render:(ctx)=> <View_TeacherNotifications {...ctx}/> },
    { match:(p)=>p.role==='teacher'&&p.seg[0]==='settings'&&p.seg.length===1, tab:'more', render:(ctx)=> <View_TeacherSettings {...ctx}/> },
    { match:(p)=>p.role==='teacher'&&p.seg[0]==='more'&&p.seg.length===1, tab:'more', render:(ctx)=> <View_TeacherMore {...ctx}/> },
    { match:(p)=>p.role==='teacher'&&p.seg[0]==='home'&&p.seg.length===1, tab:'home', render:(ctx)=> <View_TeacherHome {...ctx}/> },

    /* ADMIN · primary tabs + 1-seg sub-routes */
    { match:(p)=>p.role==='admin'&&p.seg[0]==='people'&&p.seg.length===1, tab:'people', render:(ctx)=> <View_AdminPeople {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='academics'&&p.seg.length===1, tab:'academics', render:(ctx)=> <View_AdminAcademics {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='insights'&&p.seg.length===1, tab:'insights', render:(ctx)=> <View_AdminInsights {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='announcements'&&p.seg.length===1, tab:'more', render:(ctx)=> <View_AdminAnnouncements {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='notifications'&&p.seg.length===1, tab:'more', render:(ctx)=> <View_AdminNotifications {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='settings'&&p.seg.length===1, tab:'more', render:(ctx)=> <View_AdminSettings {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='data-export'&&p.seg.length===1, tab:'more', render:(ctx)=> <View_AdminDataExport {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='more'&&p.seg.length===1, tab:'more', render:(ctx)=> <View_AdminMore {...ctx}/> },
    { match:(p)=>p.role==='admin'&&p.seg[0]==='home'&&p.seg.length===1, tab:'home', render:(ctx)=> <View_AdminHome {...ctx}/> },
  ];

  /* =================== HASH ROUTER =================== */
  function parseHash() {
    let h = (window.location.hash || "").replace(/^#\/?/, "");
    const [path, flag] = h.split("#");          // support secondary "#override" / "#rubric" flags
    const seg = path.split("/").filter(Boolean);
    let role = seg[0] === "admin" ? "admin" : "teacher";
    if (seg[0] === "teacher" || seg[0] === "admin") seg.shift();
    return { role, seg, hashFlag: flag || null,
      examId: extract(seg,"grading",1) || extract(seg,"exams",1),
      classId: extract(seg,"classes",1),
      studentId: extract(seg,"students",1),
      submissionId: seg.length>=3 && seg[0]==='review'&&seg[1]==='grading'? seg[3] : null };
  }
  function extract(seg, key, off){ const i=seg.indexOf(key); return i>=0? seg[i+off] : null; }

  function App() {
    const [route, setRoute] = useState(parseHash());
    const [sheet, setSheet] = useState(null);
    const [modal, setModal] = useState(null);
    const [bell, setBell] = useState(false);

    useEffect(() => {
      const on = () => { setRoute(parseHash()); setSheet(null); setModal(null); };
      window.addEventListener("hashchange", on);
      if (!window.location.hash) window.location.hash = "#/teacher/home";
      return () => window.removeEventListener("hashchange", on);
    }, []);

    const nav = useCallback((hash) => { window.location.hash = hash; }, []);
    const go  = useCallback((seg) => { window.location.hash = `#/${route.role}/${seg}`; }, [route.role]);
    const ctx = { nav, go, params: route, role: route.role,
      openSheet: setSheet, openModal: setModal };

    const tabs = TABS[route.role];
    const activeTab = (ROUTES.find(r => r.match(route)) || {}).tab || route.seg[0] || "home";

    const entry = ROUTES.find(r => r.match(route));
    const body = entry ? entry.render(ctx)
      : <div className="page"><EmptyState icon="compass" title="Page not found"
          body="That screen isn't here." action={<Button variant="primary" size="sm"
          onClick={()=>nav(`#/${route.role}/home`)}>Back to Home</Button>} /></div>;

    return (
      <div className="device">
        <div className="notch" />
        {/* TOP BAR */}
        <header className="topbar">
          <div className="brandmark">LU</div>
          <div className="role-pill" role="button" aria-haspopup="dialog"
               onClick={()=>setSheet(<RoleSwitchSheet role={route.role} nav={nav} close={()=>setSheet(null)} />)}>
            <Icon name={route.role==='admin'?'shield':'graduation-cap'} size={14} />
            <span className="role-pill__t">{route.role==='admin'?'Admin':'Teacher'} · Crestwood</span>
            <Icon name="chevrons-up-down" size={12} />
          </div>
          <div className="tb-spacer" />
          <IconButton icon={<Icon name="search" size={20} />} label="Search" />
          <div className="tb-bell">
            <IconButton icon={<Icon name="bell" size={20} />} label="Notifications"
              onClick={()=>nav(`#/${route.role}/notifications`)} />
            <span className="tb-bell-badge"><Badge variant="spark">3</Badge></span>
          </div>
          <Avatar initials="MR" size="sm" />
        </header>

        {/* ROUTED MAIN */}
        <main className="main" id="main-content" key={window.location.hash}>{body}</main>

        {/* BOTTOM TABBAR (role-aware) */}
        <div className="tabwrap">
          <Tabbar items={tabs.map(t => ({ icon:t.icon, label:t.label, href:t.hash, active:t.key===activeTab }))} />
        </div>

        {/* SHEET HOST */}
        {sheet && (<>
          <div className="sheet-scrim" onClick={()=>setSheet(null)} />
          <div className="sheet"><div className="sheet__grip" />{sheet}</div>
        </>)}
        {/* MODAL HOST */}
        {modal && (
          <div className="modal-host">
            <div className="modal-host__scrim" onClick={()=>setModal(null)} />
            <div className="modal-card">{modal}</div>
          </div>
        )}
      </div>
    );
  }

  function RoleSwitchSheet({ role, nav, close }) {
    const Opt = ({ r, icon, t, s }) => (
      <div className={"opt" + (r===role?" opt--active":"")} onClick={()=>{ nav(`#/${r}/home`); close(); }}>
        <div className="brandmark" style={{background:"var(--bg-surface-sunken)",color:"var(--text-primary)"}}><Icon name={icon} size={16}/></div>
        <div className="opt__body"><div className="opt__t">{t}</div><div className="opt__s">{s}</div></div>
        {r===role ? <Icon name="check" size={18} style={{color:"var(--brand-primary)"}}/> : <Icon name="chevron-right" size={16}/>}
      </div>
    );
    return (<div>
      <div className="sheet__title">Switch role</div>
      <Opt r="teacher" icon="graduation-cap" t="Teacher" s="Crestwood Academy · class ops, grading" />
      <Opt r="admin"   icon="shield"        t="Admin"    s="Crestwood Academy · tenant operations" />
      <div className="u-caption" style={{padding:"var(--space-2) var(--space-1) 0", color:"var(--text-muted)", fontSize:"var(--text-2xs)"}}>
        You hold both memberships at Crestwood Academy. Switching refreshes your access.
      </div>
    </div>);
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
