<style>
/* ---- global / body reset (from teacher shell) ---- */

.v-parent-login .stepper__node--active .stepper__dot{background:var(--brand-primary);border-color:var(--brand-primary);color:var(--text-on-accent)}
.v-parent-login .stepper__node--active{color:var(--text-primary);font-weight:var(--weight-medium)}
.v-parent-login .stepper__node--done .stepper__dot{background:var(--status-success-subtle);border-color:var(--status-success);color:var(--status-success)}

.v-parent-login .auth-form{display:flex;flex-direction:column;gap:var(--space-4)}
.v-parent-login .ctx-chip{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-md)}
.v-parent-login .ctx-chip__ico{flex:0 0 auto;width:28px;height:28px;border-radius:var(--radius-md);display:grid;place-items:center;background:var(--status-success-subtle);color:var(--status-success)}
.v-parent-login .ctx-chip__main{flex:1 1 auto;min-width:0}

/* ============================ SPA-STYLE: parent-dashboard ============================ */
.v-parent-dashboard{max-width:var(--content-max);margin:0 auto;display:flex;flex-direction:column;gap:var(--space-8)}

.v-parent-dashboard .pagehead__sub{font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-2);display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}

.v-parent-dashboard .kidcard__progrow{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:var(--space-2)}
.v-parent-dashboard .kidcard__proglab{font-size:var(--text-xs);color:var(--text-secondary)}
.v-parent-dashboard .kidcard__progval{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-primary)}

.v-parent-dashboard .kidcard__risk{display:flex}

.v-parent-dashboard .act-list{display:flex;flex-direction:column;margin:0;padding:0;list-style:none}
.v-parent-dashboard .act-row{display:flex;align-items:flex-start;gap:var(--space-3);width:100%;text-align:left;background:transparent;border:none;border-top:1px solid var(--border-subtle);padding:var(--space-3) var(--space-5);cursor:pointer;color:inherit;font-family:var(--font-ui);transition:background-color var(--dur-fast) var(--ease-standard)}
.v-parent-dashboard .act-row:first-child{border-top:none}

/* ============================ SPA-STYLE: performance-alerts ============================ */

.v-performance-alerts .pa-list{display:flex;flex-direction:column;gap:var(--space-3);list-style:none;margin:0;padding:0}
.v-performance-alerts .pa-row{display:flex;align-items:center;gap:var(--space-4);width:100%;text-align:left;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-4) var(--space-5);cursor:pointer;color:inherit;font-family:var(--font-ui);transition:box-shadow var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard)}

.v-performance-alerts .pa-row__ico--ok{background:var(--status-success-subtle);color:var(--status-success)}
.v-performance-alerts .pa-row__main{flex:1 1 auto;min-width:0}

.v-announcements .acc-main{flex:1 1 auto;min-width:0}

<body><div id="root"></div>
<script type="text/babel">
const {
  Icon, IconButton, Avatar, Badge, Chip, Button, Stat, ProgressBar, ProgressRing,
  GradePill, RubricBreakdown, ConfidenceBadge, AtRiskBadge, StreakFlame, Alert, EmptyState,
  Tabs, Accordion, DataTable, DefinitionList, Switch, Select, Field, Input, Card, Panel,
  Timeline, NavItem, Drawer, SpaceCard, StoryPointTrack, Skeleton, Toast
} = window.LvlupV0DesignSystem_5d0725;

const { useState, useEffect } = React;
const go = (h)=>{ window.location.hash = h; };

/* =====================================================================
   VIEW MODULES — each card's helpers/data + view, isolated in an IIFE
   so per-card consts (CHILDREN, FILTERS, SUBJECTS, KIDS, QuestionCard…)
   never collide. Each IIFE returns the marker-delimited *View function.
   ===================================================================== */

/* ---------------------------- parent-login ---------------------------- */
const ParentLoginView = (function(){
/* ==SPA-VIEW:parent-login== */
function ParentLoginView(){
  const [step,setStep]=useState('code');      // 'code' | 'creds'
  const [code,setCode]=useState('BHA-204');
  const [codeErr,setCodeErr]=useState('');
  const [busy,setBusy]=useState(false);
  const [email,setEmail]=useState('anita.sharma@beaconhill.edu');
  const [password,setPassword]=useState('');

  const onContinue=()=>{
    if(!code.trim() || code.trim().toUpperCase()!=='BHA-204'){
      setCodeErr("We couldn't find that school code. Check your welcome email.");
      return;
    }
    setCodeErr('');
    setBusy(true);
    setTimeout(()=>{ setBusy(false); setStep('creds'); }, 450);
  };
  const onSignIn=()=>{
    setBusy(true);
    setTimeout(()=>{ setBusy(false); go('#/'); }, 600);
  };

  return (
    <div className="v-parent-login">
      <Card>
        <div className="auth-card">

          <div className="lockup">
            <span className="lockup__crest"><Icon name="graduation-cap" size={26}/></span>
            <h1 className="lockup__school">Beacon Hill Academy</h1>
            <span className="lockup__portal">Parent Portal</span>
          </div>

          <div className="stepper" role="group" aria-label={'Step '+(step==='code'?'1 of 2: school code':'2 of 2: sign in')}>
            <span className={'stepper__node '+(step==='code'?'stepper__node--active':'stepper__node--done')}>
              <span className="stepper__dot">{step==='code'?'1':<Icon name="check" size={11}/>}</span>
              School
            </span>
            <span className="stepper__bar" aria-hidden="true"></span>
            <span className={'stepper__node '+(step==='creds'?'stepper__node--active':'')}>
              <span className="stepper__dot">2</span>
              Sign in
            </span>
          </div>

          {step==='code' ? (
            <form className="auth-form" onSubmit={(e)=>{e.preventDefault();onContinue();}}>
              <Field label="School code" required
                hint="Found in your welcome email from the school."
                error={codeErr || undefined}>
                <Input
                  value={code}
                  onChange={(e)=>{setCode(e.target.value); if(codeErr) setCodeErr('');}}
                  placeholder="BHA-204"
                  autoComplete="off"
                  error={!!codeErr}
                  aria-invalid={!!codeErr}/>
              </Field>
              <Button variant="primary" block loading={busy} type="submit"
                trailingIcon={<Icon name="arrow-right" size={16}/>}
                onClick={onContinue}>Continue</Button>
            </form>
          ) : (
            <form className="auth-form" onSubmit={(e)=>{e.preventDefault();onSignIn();}}>
              <div className="ctx-chip">
                <span className="ctx-chip__ico"><Icon name="check" size={16}/></span>
                <span className="ctx-chip__main">
                  <div className="ctx-chip__name">Beacon Hill Academy</div>
                  <div className="ctx-chip__code">{code.trim().toUpperCase()}</div>
                </span>
                <Button variant="ghost" size="sm" onClick={()=>setStep('code')}>Change</Button>
              </div>
              <Field label="Email" required>
                <Input type="email" value={email} onChange={(e)=>setEmail(e.target.value)}
                  placeholder="you@example.com" autoComplete="email"/>
              </Field>
              <Field label="Password" required>
                <Input type="password" value={password} onChange={(e)=>setPassword(e.target.value)}
                  placeholder="••••••••" autoComplete="current-password"/>
              </Field>
              <Button variant="primary" block loading={busy} type="submit"
                leadingIcon={<Icon name="log-in" size={16}/>}
                onClick={onSignIn}>Sign in</Button>
              <div className="auth-foot">
                <Button variant="ghost" size="sm" onClick={()=>go('#/login')}>Forgot password?</Button>
              </div>
            </form>
          )}

          <div className="reassure">
            <Icon name="shield-check" size={13}/>
            Released grades only · answer keys never shown
          </div>

        </div>
      </Card>
    </div>
  );
}
/* ==/SPA-VIEW== */
return ParentLoginView;
})();

/* ---------------------------- parent-dashboard ---------------------------- */
const DashboardView = (function(){
const CHILDREN = [
  { id:'aarav', name:'Aarav Sharma', initials:'AS', grade:'Grade 9', avg:82, streak:12, completion:78, atRisk:false, subjects:'DSA · Mathematics · Physics' },
  { id:'diya',  name:'Diya Sharma',  initials:'DS', grade:'Grade 7', avg:61, streak:0,  completion:44, atRisk:true,  subjects:'Mathematics · Science · English' },
];
const ACTIVITY = [
  { id:'ac1', tone:'warn', ico:'alert-triangle', title:'Diya Sharma was flagged at-risk by the nightly review.', time:'2h ago' },
  { id:'ac2', tone:'ok',   ico:'clipboard-check', title:'Results released for Aarav — "Midterm · Data Structures".', time:'5h ago' },
  { id:'ac3', tone:'info', ico:'trending-up',     title:'Aarav reached a 12-day learning streak.', time:'Yesterday' },
  { id:'ac4', tone:'info', ico:'megaphone',       title:'Beacon Hill Academy posted a new announcement.', time:'2 days ago' },
];
/* ==SPA-VIEW:parent-dashboard== */
function DashboardView(){
  return (
    <div className="v-parent-dashboard">

      <div className="pagehead">
        <div>
          <h1>Good morning, Anita.</h1>
          <div className="pagehead__sub">
            <Icon name="server" size={14}/> Updated · <span className="u-mono">Saturday, June 20</span>
          </div>
        </div>
        <Button variant="ghost" trailingIcon={<Icon name="bell" size={16}/>} onClick={()=>go('#/notifications')}>Notifications</Button>
      </div>

      <div className="kpis" role="group" aria-label="Key metrics">
        <div className="kpi" aria-label="Children linked: 2">
          <Stat label="Children" value="2"/>
          <div className="kpi__cap"><Icon name="users" size={12}/> linked to you</div>
        </div>

          <div className="kpi__cap"><Icon name="server" size={12}/> released results only</div>

          <Stat label="At-risk" value="1"/>
          <div className="kpi__cap kpi__cap--warn"><Icon name="alert-triangle" size={12}/> needs attention</div>
        </div>
        <div className="kpi" aria-label="School code BHA-204">
          <Stat label="School code" value="BHA-204"/>
          <div className="kpi__cap"><Icon name="school" size={12}/> Beacon Hill Academy</div>
        </div>
      </div>

      <Alert variant="warning" title="Diya Sharma flagged at-risk">
        Recent scores and inactivity triggered an at-risk flag.{' '}
        <button className="btn btn--ghost btn--sm" style={{padding:0,height:'auto',color:'var(--status-warning)'}} onClick={()=>go('#/alerts')}>View alerts</button>
      </Alert>

      <div className="quickrow" role="group" aria-label="Quick actions">
        <Button variant="secondary" leadingIcon={<Icon name="alert-triangle" size={16}/>} onClick={()=>go('#/alerts')}>View alerts</Button>
        <Button variant="secondary" leadingIcon={<Icon name="git-compare" size={16}/>} onClick={()=>go('#/compare')}>Compare children</Button>
        <Button variant="ghost" leadingIcon={<Icon name="bell" size={16}/>} onClick={()=>go('#/notifications')}>Notifications</Button>

      <section aria-labelledby="kids-title">
        <div className="sechead">
          <div>
            <h2 className="sechead__title" id="kids-title">Your children</h2>
            <div className="sechead__sub"><span className="u-mono">2</span> linked · released scores only</div>
          </div>
          <Button variant="ghost" size="sm" trailingIcon={<Icon name="arrow-right" size={15}/>} onClick={()=>go('#/children')}>All children</Button>
        </div>
        <div className="kidgrid" role="list">
          {CHILDREN.map(k=>(
            <article key={k.id} className={'kidcard'+(k.atRisk?' kidcard--risk':'')} role="listitem"
              aria-label={k.name+', '+k.grade+', average '+k.avg+' percent'+(k.atRisk?', at risk':'')}>
              <div className="kidcard__top">
                <Avatar initials={k.initials} size="lg"/>
                <div className="kidcard__id">
                  <div className="kidcard__name">{k.name}</div>
                  <div className="kidcard__meta">
                    <span>{k.grade}</span>
                    <span className="u-mono">·</span>
                    <span>{k.subjects}</span>
                  </div>
                </div>
                {k.atRisk && <div className="kidcard__risk"><AtRiskBadge level="watch">Watch</AtRiskBadge></div>}
              </div>

              <div className="kidcard__stats">
                <div className="kidstat">
                  <span className="kidstat__lab">Avg</span>
                  <span className="kidstat__val">{k.avg}%</span>
                </div>
                <div className="kidstat">
                  <span className="kidstat__lab">Streak</span>
                  <span className="kidstat__val">{k.streak>0 ? <StreakFlame days={k.streak}/> : <Chip><Icon name="flame" size={12}/> 0 days</Chip>}</span>
                </div>
              </div>

              <div>
                <div className="kidcard__progrow">
                  <span className="kidcard__proglab">Space completion</span>
                  <span className="kidcard__progval">{k.completion}%</span>
                </div>
                <ProgressBar value={k.completion} variant={k.atRisk ? 'warning' : 'success'}/>
              </div>

              <div className="kidcard__cta">
                <Button variant="secondary" size="sm" leadingIcon={<Icon name="trending-up" size={15}/>} onClick={()=>go('#/children/'+k.id+'/progress')}>Progress</Button>
                <Button variant="ghost" size="sm" leadingIcon={<Icon name="clipboard-check" size={15}/>} onClick={()=>go('#/children/'+k.id+'/results')}>Results</Button>
              </div>
            </article>
          ))}
        </div>
      </section>

      <section className="dcard" aria-labelledby="act-title">
        <div className="dcard__head">
          <h2 className="dcard__title" id="act-title">Recent activity</h2>
          <Badge variant="brand">{ACTIVITY.length} new</Badge>
        </div>
        <ul className="act-list" role="list">
          {ACTIVITY.map(a=>(
            <li key={a.id} role="listitem">
              <button className="act-row" onClick={()=>go('#/notifications')} aria-label={a.title+' '+a.time}>
                <span className={'act-row__ico act-row__ico--'+a.tone}><Icon name={a.ico} size={15}/></span>

        <div className="dcard__foot">

})();

/* ---------------------------- performance-alerts ---------------------------- */
const AlertsView = (function(){
const ALERTS = [
  { id:'al1', child:'diya', sev:'err', ico:'alert-triangle', sevLabel:'At risk',
    title:'Diya is at risk', badge:'watch',
    meta:'Declining scores · 0-day streak · 44% space completion',
    actLabel:'View progress', actIco:'trending-up', href:'#/children/diya/progress' },
  { id:'al2', child:'diya', sev:'warn', ico:'circle-alert', sevLabel:'Low score',
    title:'Diya — Mathematics', badge:null,
    meta:'Released exam score 48% · below 60% threshold',
    actLabel:'View results', actIco:'clipboard-check', href:'#/children/diya/results' },
  { id:'al3', child:'diya', sev:'warn', ico:'bar-chart-2', sevLabel:'Low completion',
    title:'Diya — Science space', badge:null,
    meta:'44% complete · pace behind class average',
    actLabel:'View space', actIco:'orbit', href:'#/progress' },
  { id:'al4', child:'diya', sev:'info', ico:'clock', sevLabel:'No activity',
    title:'Diya — 0-day streak', badge:null,
    meta:'No learning activity recorded in the last 7 days',
    actLabel:'View progress', actIco:'trending-up', href:'#/children/diya/progress' },
  { id:'al5', child:'aarav', sev:'ok', ico:'check-circle', sevLabel:'On track',
    title:'Aarav is on track', badge:null,
    meta:'82% average · 12-day streak · 78% space completion',
    actLabel:'View progress', actIco:'trending-up', href:'#/children/aarav/progress' },
];
const FILTERS = [
  { id:'all',   label:'All' },
  { id:'aarav', label:'Aarav' },
  { id:'diya',  label:'Diya' },
];
/* ==SPA-VIEW:performance-alerts== */
function AlertsView(){
  const [filter, setFilter] = useState('all');
  const rows = ALERTS.filter(function(r){ return filter==='all' || r.child===filter; });
  const actionable = ALERTS.filter(function(r){ return r.sev!=='ok'; }).length;

  return (
    <div className="v-performance-alerts">

      <header className="pa-head">
        <div>
          <h1 className="pa-head__title">Alerts</h1>
          <p className="pa-head__sub">Performance alerts across your children, derived from the nightly review.</p>
          <div className="pa-head__meta">
            <span className="pa-lastupd"><Icon name="clock" size={13}/>Updated <span className="u-mono">6 hours ago</span></span>
            <span className="pa-dot">·</span>
            <span className="pa-servertag"><Icon name="server" size={10}/>Nightly</span>
            <span className="pa-dot">·</span>
            <Badge variant="error"><Icon name="alert-triangle" size={12}/> {actionable} need attention</Badge>
          </div>
        </div>
        <Button variant="secondary" leadingIcon={<Icon name="refresh-cw" size={16}/>} onClick={function(){ go('#/alerts'); }}>Refresh</Button>
      </header>

      <div className="pa-filters" role="group" aria-label="Filter alerts by child">
        <span className="pa-filters__lbl">Child</span>
        {FILTERS.map(function(f){
          return <Chip key={f.id} active={filter===f.id} aria-pressed={filter===f.id}
            onClick={function(){ setFilter(f.id); }}>{f.label}</Chip>;
        })}
      </div>

      {rows.length>0 ? (
        <ul className="pa-list" role="list">
          {rows.map(function(r){
            return (
              <li key={r.id} role="listitem">
                <button className="pa-row" onClick={function(){ go(r.href); }}
                  aria-label={r.title+' — '+r.sevLabel+'. '+r.meta}>
                  <span className={'pa-row__ico pa-row__ico--'+r.sev} aria-hidden="true"><Icon name={r.ico} size={20}/></span>
                  <span className="pa-row__main">
                    <span className="pa-row__title">
                      {r.title}
                      {r.badge==='watch' && <AtRiskBadge level="watch">At-risk</AtRiskBadge>}
                      <span className={'pa-row__sev pa-row__sev--'+r.sev}><Icon name={r.ico} size={11}/>{r.sevLabel}</span>
                    </span>
                    <span className="pa-row__meta">{r.meta}</span>
                  </span>
                  <span className="pa-row__act">
                    <Button variant="ghost" size="sm" trailingIcon={<Icon name={r.actIco} size={15}/>}
                      onClick={function(e){ e.stopPropagation(); go(r.href); }}>{r.actLabel}</Button>
                  </span>
                  <span className="pa-row__chev" aria-hidden="true"><Icon name="chevron-right" size={18}/></span>
                </button>
              </li>
            );
          })}
        </ul>
      ) : (
        <div className="pa-empty">
          <EmptyState icon="shield-check"
            title={'No alerts for '+(filter==='aarav'?'Aarav':'Diya')}
            body="Nothing flagged right now. We'll surface anything the nightly review picks up."/>
        </div>
      )}

      <section aria-labelledby="pa-states-title">
        <h2 className="pa-head__title" id="pa-states-title" style={{fontSize:'var(--text-xl)',marginBottom:'var(--space-2)'}}>States</h2>
        <div className="pa-states__grid">

          <div className="pa-states__mini">
            <span className="u-caption">Loading · skeleton</span>
            <div className="pa-skelrow"><Skeleton variant="circle" width="40px" height="40px"/><div className="pa-skelrow__col"><Skeleton width="48%"/><Skeleton width="68%" height="0.6rem"/></div><Skeleton width="96px"/></div>
            <div className="pa-skelrow"><Skeleton variant="circle" width="40px" height="40px"/><div className="pa-skelrow__col"><Skeleton width="40%"/><Skeleton width="56%" height="0.6rem"/></div><Skeleton width="96px"/></div>
          </div>

          <div className="pa-states__mini">
            <span className="u-caption">Empty · no alerts (happy path)</span>
            <EmptyState icon="shield-check" title="All clear — no alerts"
              body="Neither child is flagged by the nightly review right now."/>
          </div>

          <div className="pa-states__mini">
            <span className="u-caption">Empty · filtered child on track</span>
            <EmptyState icon="check-circle" title="No alerts for Aarav"
              body="Aarav is on track. Nothing needs your attention."/>
          </div>

          <div className="pa-states__mini">
            <span className="u-caption">Error · alerts read failed</span>
            <Alert variant="error" title="Couldn't load alerts">
              Something went wrong fetching alerts.
              <div style={{marginTop:'var(--space-3)'}}><Button variant="secondary" size="sm" leadingIcon={<Icon name="refresh-cw" size={14}/>} onClick={function(){ go('#/alerts'); }}>Retry</Button></div>
            </Alert>
          </div>

        </div>
      </section>

    </div>
  );
}
/* ==/SPA-VIEW== */
return AlertsView;
})();

/* ---------------------------- announcements ---------------------------- */
const AnnouncementsView = (function(){
const FEATURED = {

function statusMeta(pct, mastered, total){
  if(pct >= 100 || mastered >= total) return { variant:'success', icon:'check-circle', label:'Mastered' };
  if(pct > 0)                         return { variant:'info',    icon:'circle-dot',   label:'In progress' };
  return { variant:'neutral', icon:'circle', label:'Not started' };
}
function trackNodes(pct, mastered, total){
  const nodes = [];
  for(let i=0;i<total;i++){
    if(i < mastered) nodes.push({ state:'mastered', label:'SP '+(i+1) });
    else if(i === mastered && pct > 0 && mastered < total) nodes.push({ state:'in-progress', label:'SP '+(i+1) });
    else nodes.push({ state:'not-started', label:'SP '+(i+1) });
  }
  return nodes;
}

const NotificationsView = (function(){
const TYPE = {
  'exam-result':  { icon:'graduation-cap', tone:'ok',   action:'View results',      href:'#/children/aarav/results/ex_midterm' },
  'at-risk':      { icon:'alert-triangle', tone:'warn',  action:'View alerts',       href:'#/alerts' },
  'announcement': { icon:'megaphone',      tone:'info',  action:'View announcement', href:'#/announcements' },
  'digest':       { icon:'mail',           tone:'info',  action:'Open progress',     href:'#/progress' },
};
const SEED = [
  { id:'n1', type:'exam-result',  read:false, title:'Midterm results released for Aarav — "Data Structures".', time:'2h ago' },
  { id:'n2', type:'at-risk',      read:false, title:'Diya Sharma was flagged at-risk by the nightly review.',   time:'5h ago', risk:true },
  { id:'n3', type:'announcement', read:false, title:'Parent–Teacher Meeting announced for Grade 9.',            time:'1d ago' },
  { id:'n4', type:'exam-result',  read:true,  title:'Unit Test results released for Diya — "Mathematics".',     time:'2d ago' },
  { id:'n5', type:'digest',       read:true,  title:'Your weekly progress digest for Aarav and Diya is ready.', time:'3d ago' },
  { id:'n6', type:'announcement', read:true,  title:'Beacon Hill Academy posted a holiday calendar update.',    time:'5d ago' },
];
/* ==SPA-VIEW:notifications== */
function NotificationsView(){
  const [items,setItems] = useState(SEED);
  const [filter,setFilter] = useState('all'); // all | unread

  const unread = items.filter(n=>!n.read).length;
  const markRead = (id)=> setItems(prev=>prev.map(n=> n.id===id ? {...n, read:true} : n));
  const markAll  = ()=> setItems(prev=>prev.map(n=> ({...n, read:true})));
  const openRow  = (n)=>{ markRead(n.id); go(TYPE[n.type].href); };

  const shown = filter==='unread' ? items.filter(n=>!n.read) : items;

  return (
    <div className="v-notifications">

      <div className="pagehead">
        <div className="pagehead__l">
          <h1>Notifications {unread>0 && <Badge variant="brand">{unread} new</Badge>}</h1>
          <div className="pagehead__sub">
            <Icon name="server" size={14}/> Updates about Aarav and Diya · released results only · school <span className="u-mono">BHA-204</span>
          </div>
        </div>
        <Button variant="ghost" leadingIcon={<Icon name="check-check" size={16}/>} disabled={unread===0} onClick={markAll}>Mark all read</Button>
      </div>

      <div className="filterrow" role="group" aria-label="Filter notifications">
        <button type="button" className={'fchip'+(filter==='all'?' fchip--on':'')} aria-pressed={filter==='all'} onClick={()=>setFilter('all')}>
          <Icon name="inbox" size={14}/> All <span className="u-mono" style={{fontFamily:'var(--font-mono)',color:'var(--text-muted)'}}>{items.length}</span>
        </button>
        <button type="button" className={'fchip'+(filter==='unread'?' fchip--on':'')} aria-pressed={filter==='unread'} onClick={()=>setFilter('unread')}>
          <Icon name="circle-dot" size={14}/> Unread {unread>0 && <Badge variant="brand">{unread}</Badge>}
        </button>
      </div>

      <div className="feed" aria-live="polite">
        {shown.length===0 ? (
          <div className="feed__empty">
            <EmptyState icon="check-circle-2" title="You're all caught up"
              body="No unread notifications about Aarav or Diya right now."/>
          </div>
        ) : (
          <ul role="list" style={{margin:0,padding:0,listStyle:'none'}}>
            {shown.map(n=>{
              const t = TYPE[n.type];
              const label = (n.read?'':'Unread — ')+n.title+' '+t.action+'. '+n.time;
              return (
                <li key={n.id} role="listitem">
                  <button type="button" className={'nrow '+(n.read?'nrow--read':'nrow--unread')} aria-label={label} onClick={()=>openRow(n)}>
                    <span className="nrow__dotcol" aria-hidden="true">{!n.read && <span className="ndot"/>}</span>
                    <span className={'nrow__chip nrow__chip--'+t.tone} aria-hidden="true"><Icon name={t.icon} size={17}/></span>
                    <span className="nrow__main">
                      <span className="nrow__title">{n.title}</span>
                      <span className="nrow__meta">
                        {n.risk && <AtRiskBadge level="watch">Watch</AtRiskBadge>}
                        <span className="nrow__time">{n.time}</span>
                        <span className="nrow__act">{t.action} <Icon name="arrow-right" size={13}/></span>
                      </span>
                    </span>
                    <span className="nrow__right" aria-hidden="true"><Icon name="chevron-right" size={18}/></span>
                  </button>
                </li>
              );
            })}
          </ul>
        )}
      </div>

    </div>
  );
}
/* ==/SPA-VIEW== */
return NotificationsView;
})();

function parseHash(){
  let h = (window.location.hash || '').replace(/^#/,'');
  if(h==='' || h==='/') return { name:'dashboard' };
  const parts = h.split('/').filter(Boolean);   // strip leading slash → segments
  const p0 = parts[0];

  if(p0==='login')         return { name:'login' };
  if(p0==='alerts')        return { name:'alerts' };
  if(p0==='announcements') return { name:'announcements' };
  if(p0==='progress')      return { name:'spaces' };
  if(p0==='compare')       return { name:'compare' };
  if(p0==='notifications') return { name:'notifications' };
  if(p0==='settings')      return { name:'settings' };

  if(p0==='children'){
    if(parts.length===1) return { name:'children' };
    const childId = parts[1];
    const sub = parts[2];
    if(sub==='progress') return { name:'progress', childId };
    if(sub==='results'){
      if(parts[3]) return { name:'resultDetail', childId, examId:parts[3] };
      return { name:'results', childId };
    }
    return { name:'children' };
  }
  return { name:'dashboard' };
}

/* =====================================================================
   ROUTER-ENABLED PARENT SHELL — sidebar + topbar; active from route name;
   Progress/Results deep-link the active child; bell → notifications;
   active-child chip toggles a popover rendering ChildSwitcherView.
   ===================================================================== */
function ParentShell(props){
  const a = props.active;
  const activeChildId = props.activeChildId || 'aarav';
  const [popOpen,setPopOpen] = useState(false);
  const activeName = activeChildId==='diya' ? 'Diya Sharma' : 'Aarav Sharma';
  const activeInitials = activeChildId==='diya' ? 'DS' : 'AS';

  const pick = (id)=>{ if(props.onPickChild) props.onPickChild(id); setPopOpen(false); };

  return (
    <div className="appshell" style={{height:'100vh',position:'relative'}}>
      <aside className="appshell__sidebar">
        <div className="sidebar__brand"><div className="sidebar__brand-mark">B</div><div className="sidebar__brand-name">Beacon Hill</div></div>
        <nav className="sidebar__nav" aria-label="Primary">
          <div className="sidebar__section-label">Overview</div>
          <NavItem icon="layout-dashboard" href="#/" active={a==='dashboard'}>Dashboard</NavItem>
          <NavItem icon="alert-triangle" href="#/alerts" active={a==='alerts'} badge={<Badge variant="error">1</Badge>}>Alerts</NavItem>
          <NavItem icon="megaphone" href="#/announcements" active={a==='announcements'}>Announcements</NavItem>
          <div className="sidebar__section-label">My Children</div>
          <NavItem icon="users" href="#/children" active={a==='children'}>Children</NavItem>
          <NavItem icon="trending-up" href={'#/children/'+activeChildId+'/progress'} active={a==='progress'}>Progress</NavItem>
          <NavItem icon="clipboard-check" href={'#/children/'+activeChildId+'/results'} active={a==='results' || a==='resultDetail'}>Exam Results</NavItem>
          <NavItem icon="orbit" href="#/progress" active={a==='spaces'}>Space Progress</NavItem>
          <NavItem icon="git-compare" href="#/compare" active={a==='compare'}>Compare</NavItem>
          <div className="sidebar__section-label">Account</div>
          <NavItem icon="bell" href="#/notifications" active={a==='notifications'}>Notifications</NavItem>
          <NavItem icon="settings" href="#/settings" active={a==='settings'}>Settings</NavItem>
        </nav>
      </aside>
      <header className="appshell__topbar">
        <button className="chip" aria-haspopup="menu"><Avatar initials="BH" size="sm"/>Beacon Hill Academy<Icon name="chevron-down" size={14}/></button>
        <div className="spa-topchip__wrap">
          <button className="chip" aria-haspopup="menu" aria-expanded={popOpen}
            onClick={()=>setPopOpen(o=>!o)}>
            <Avatar initials={activeInitials} size="sm"/>{activeName}<Icon name="chevron-down" size={14}/>
          </button>
        </div>
        <div style={{flex:1}}></div>
        <IconButton icon={<Icon name="bell" size={20}/>} label="Notifications" onClick={()=>go('#/notifications')}/>
        <IconButton icon={<Icon name="sun" size={20}/>} label="Toggle theme"/>
        <Avatar initials="AS"/>
      </header>
      {popOpen && (
        <React.Fragment>
          <div className="spa-childpop__scrim" onClick={()=>setPopOpen(false)} aria-hidden="true"></div>
          <div className="spa-childpop">
            <ChildSwitcherView activeChildId={activeChildId} onPick={pick}/>
          </div>
        </React.Fragment>
      )}
      <main className="appshell__main" id="main">{props.children}</main>
    </div>
  );
}

/* =====================================================================
   APP — route state + hashchange listener; switch <main> by route name.
   ===================================================================== */
function App(){
  const [route,setRoute] = useState(parseHash());
  const [activeChildId,setActiveChildId] = useState('aarav');

  useEffect(()=>{
    const onHash = ()=> setRoute(parseHash());
    window.addEventListener('hashchange', onHash);
    return ()=> window.removeEventListener('hashchange', onHash);
  },[]);

  /* keep active child synced with child-scoped deep links */
  useEffect(()=>{
    if(route.childId && route.childId!==activeChildId) setActiveChildId(route.childId);
  },[route.childId]);

  const pickChild = (id)=>{ setActiveChildId(id); go('#/children/'+id+'/progress'); };

  if(route.name==='login'){
    return (
      <div className="spa-bare"><ParentLoginView/></div>
    );
  }

  const childId = route.childId || activeChildId;
  let main = null;
  switch(route.name){
    case 'dashboard':     main = <DashboardView/>; break;
    case 'alerts':        main = <AlertsView/>; break;
    case 'announcements': main = <AnnouncementsView/>; break;
    case 'children':      main = <ChildrenView/>; break;
    case 'progress':      main = <ChildProgressView childId={childId}/>; break;
    case 'results':       main = <ExamResultsView childId={childId}/>; break;
    case 'resultDetail':  main = <ExamResultsView childId={childId}/>; break;
    case 'spaces':        main = <SpaceProgressView/>; break;
    case 'compare':       main = <CompareView/>; break;
    case 'notifications': main = <NotificationsView/>; break;
    case 'settings':      main = <SettingsView/>; break;
    default:              main = <DashboardView/>;
  }

  return (
    <ParentShell active={route.name} activeChildId={activeChildId} onPickChild={pickChild}>
      {main}
      {route.name==='resultDetail' && (
        <Drawer open title="Exam result" onClose={()=>go('#/children/'+childId+'/results')}>
          <ExamResultDetailView childId={childId}/>
        </Drawer>
      )}
    </ParentShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if(!window.location.hash) window.location.hash='#/';
</script>
</body></html>
