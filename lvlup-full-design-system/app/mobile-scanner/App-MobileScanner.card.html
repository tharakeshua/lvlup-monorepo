<style>
  /* ===== SPA shell — LAYOUT ONLY, tokens only, no hex ===== */

  .select-statusbadge { display:inline-flex; align-items:center; gap:var(--space-1); }
  .select-count { font-size:var(--text-2xs); color:var(--text-muted); font-family:var(--font-mono);

  /* select-exam's .select-list is a flex column with gap; select-student also uses .select-list.

  .select-list { display:flex; flex-direction:column; gap:var(--space-3); }

  .select-head { position:sticky; top:0; z-index:3; background:var(--bg-surface);

  .select-row:hover { background:var(--bg-surface-sunken); }

  .select-row + .select-row { border-top:1px solid var(--border-subtle); }
  .select-row__main { min-width:0; flex:1; display:flex; flex-direction:column; gap:3px; }

  .select-state { padding:var(--space-6) var(--space-4); }

  /* ── camera-capture ── */

  .camera-header__txt { min-width:0; }

  .camera-seg { display:flex; padding:3px; gap:3px; margin:var(--space-4); border-radius:var(--radius-pill);

  .camera-seg__btn { flex:1; display:inline-flex; align-items:center; justify-content:center; gap:var(--space-2);

        color:var(--text-secondary); transition:all var(--dur-fast) var(--ease-standard); }
  .camera-seg__btn[aria-selected="true"] { background:var(--bg-surface); color:var(--text-primary);
        box-shadow:var(--shadow-e1); font-weight:var(--weight-semibold); }
  .camera-panel { padding:0 var(--space-4) var(--space-4); display:flex; flex-direction:column; gap:var(--space-4); }
  .camera-frame-wrap { border-radius:var(--radius-lg); overflow:hidden; }
  .camera-strip-head { display:flex; align-items:center; justify-content:space-between; }
  .camera-strip-label { font-size:var(--text-xs); font-weight:var(--weight-semibold); color:var(--text-secondary);
        text-transform:uppercase; letter-spacing:0.04em; }
  .camera-strip { display:flex; gap:var(--space-2); overflow-x:auto; padding-bottom:var(--space-1); }
  .camera-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:var(--space-2); }
  .camera-thumb { position:relative; flex:0 0 auto; width:64px; height:84px; border-radius:var(--radius-md);
        overflow:hidden; border:1px solid var(--border-subtle); background:var(--bg-surface-sunken);
        display:grid; place-items:center; color:var(--text-muted); }
  .camera-grid .camera-thumb { width:auto; height:96px; }
  .camera-thumb__n { position:absolute; left:4px; top:4px; font-size:var(--text-2xs); font-family:var(--font-mono);
        background:var(--bg-surface); color:var(--text-secondary); border-radius:var(--radius-sm); padding:0 4px;
        line-height:1.5; }
  .camera-thumb__x { position:absolute; right:3px; top:3px; width:22px; height:22px; border-radius:var(--radius-pill);

        color:var(--text-secondary); box-shadow:var(--shadow-e1); }
  .camera-thumb--in { animation:camera-pop var(--dur-fast) var(--ease-entrance); }

  .camera-shutter { width:72px; height:72px; border-radius:var(--radius-pill); border:0; cursor:pointer;

  .camera-shutter:hover { background:var(--spark-hover); }

  .camera-denied-link { display:flex; justify-content:center; padding-bottom:var(--space-2); }
  .camera-submit { position:sticky; bottom:0; z-index:8; padding:var(--space-3) var(--space-4) var(--space-4);

  .camera-submit__cap { font-size:var(--text-2xs); color:var(--text-muted); text-align:center;

  .camera-modal-foot { display:flex; flex-direction:column; gap:var(--space-2); }

  /* ── capture-review ── */
  .capture-review__scroll{ position:absolute; inset:0; bottom:76px; overflow-y:auto; padding:var(--space-4); }
  .capture-review__header{ display:flex; align-items:flex-start; gap:var(--space-3); margin-bottom:var(--space-4); }
  .capture-review__htext{ min-width:0; }
  .capture-review__exam{ font-family:var(--font-display); font-size:var(--text-lg); font-weight:var(--weight-semibold);

  .capture-review__tile:hover{ border-color:var(--border-strong); box-shadow:var(--shadow-e1); }

    margin-top:var(--space-3); padding:var(--space-3); border-radius:var(--radius-md);

    font-size:var(--text-xs); color:var(--text-primary); line-height:var(--leading-normal); }
  .capture-review__offline-ico{ color:var(--status-warning); flex:0 0 auto; margin-top:2px; }

    gap:var(--space-3); padding:var(--space-12) var(--space-4); color:var(--text-secondary); }
  .capture-review__empty-ico{ color:var(--text-muted); }
  .capture-review__empty-title{ font-family:var(--font-display); font-size:var(--text-base);
    font-weight:var(--weight-semibold); color:var(--text-primary); }
  .capture-review__bar{ position:absolute; left:0; right:0; bottom:0; z-index:5;
    display:flex; align-items:center; gap:var(--space-3); padding:var(--space-3) var(--space-4);
    background:var(--bg-surface); border-top:1px solid var(--border-subtle); box-shadow:var(--shadow-e2); }
  .capture-review__bar-count{ flex:1; min-width:0; }
  .capture-review__bar-n{ font-family:var(--font-display); font-size:var(--text-base);
    font-weight:var(--weight-semibold); color:var(--text-primary); }
  .capture-review__bar-help{ font-size:var(--text-2xs); color:var(--status-error); margin-top:2px; }

  .capture-review__viewer-head{ display:flex; align-items:center; justify-content:space-between; gap:var(--space-2); }

  function parseRoute(hash, authed){
    const h = (hash || '').replace(/^#/, '') || '/scan';
    const parts = h.split('/').filter(Boolean); // e.g. ['scan','e','EX1','s','ST1','capture']
    if (parts[0] === 'login') return { name:'login', params:{} };
    if (parts[0] === 'queue') return { name:'queue', params:{} };
    if (parts[0] === 'history') return { name:'history', params:{} };
    if (parts[0] === 'settings') return { name:'settings', params:{} };
    if (parts[0] === 'scan'){
      if (parts.length === 1) return { name:'selectExam', params:{} };
      if (parts[1] === 'e' && parts[2]){
        const examId = parts[2];
        if (parts.length === 3) return { name:'selectStudent', params:{ examId } };
        if (parts[3] === 's' && parts[4]){
          const studentId = parts[4];
          const leaf = parts[5];
          if (leaf === 'capture') return { name:'capture', params:{ examId, studentId } };
          if (leaf === 'review')  return { name:'review',  params:{ examId, studentId } };
          if (leaf === 'done')    return { name:'submitConfirm', params:{ examId, studentId } };
        }
      }
      return { name:'selectExam', params:{} };
    }
    return { name: authed ? 'selectExam' : 'login', params:{} };
  }

        setBanner({ title: "Invalid credentials", body: "Enter your school code, username, and password." });
        return;
      }
      setErrors({});
      setBanner(null);
      setLoading(true);

      setTimeout(function () {
        setLoading(false);
        if (code.trim().toUpperCase() === "BAD") {
          setErrors({ code: "No school matches this code" });
          setBanner({ title: "School code not found", body: "Check the code with your admin and try again." });
          return;
        }
        if (user.trim().toLowerCase() === "wrong" || pass === "wrong") {
          setBanner({ title: "Invalid credentials", body: "That username or password didn't match." });
          return;
        }
        if (safeCtx.setScanner) {
          safeCtx.setScanner({ name: "Scan Desk", initials: "SD", school: "Crestford School", code: code.trim().toUpperCase() });
        }
        toast({ variant: "success", title: "Signed in", body: "Welcome back — ready to scan." });
        if (nav && nav.go) nav.go("#/scan");
      }, 1100);
    }

    return (
      <form className="scanner-login-wrap" onSubmit={submit} noValidate>

          {banner && (
            <Alert variant="error" title={banner.title}>{banner.body}</Alert>
          )}

          <Field label="School code" htmlFor="sl-code" required
                 hint={errors.code ? undefined : "Ask your admin"} error={errors.code}>
            <div className="scanner-login-mono">
              <Input id="sl-code" name="code" placeholder="CRST" autoComplete="off"
                     value={code} error={!!errors.code} disabled={loading}
                     onChange={function (e) { setCode(e.target.value); clearErr("code"); }} />
            </div>
          </Field>

          <Field label="Username" htmlFor="sl-user" required error={errors.user}>

          <Field label="Password" htmlFor="sl-pass" required error={errors.pass}>

              <span className="scanner-login-eye">
                <IconButton size="sm"
                  label={showPass ? "Hide password" : "Show password"}

  function CaptureView({ nav, params, ctx }) {
    ctx = ctx || {};

    const exam = ctx.selectedExam || { name: "Mid-term · Physics" };

    const studentRoll = student.roll || student.rollNumber || student.id;

    const [mode, setMode] = useState("camera");
    const [images, setLocalImages] = useState(ctx.images && ctx.images.length ? ctx.images : []);
    const [lastId, setLastId] = useState(null);
    const [denied, setDenied] = useState(false);

    const sync = (next) => {
      setLocalImages(next);
      if (typeof ctx.setImages === "function") ctx.setImages(() => next);
    };

    const addImage = (source) => {

      setLastId(id);
      sync(next);
      if (typeof ctx.toast === "function") ctx.toast({ variant: "success", title: "Page added", body: source === "camera" ? "Captured" : "Imported from file" });
    };
    const removeImage = (id) => sync(images.filter((i) => i.id !== id));

    const reviewRoute = "#/scan/e/" + (params.examId || "EX1") + "/s/" + (params.studentId || "S1") + "/review";

    return (
      <>

            ) : (

  /* ═══════════════════════ VIEW 5 · ReviewView ═══════════════════════ */
  const MOCK_IMAGES = [
    { id:'p1', name:'page-01.jpg' },
    { id:'p2', name:'page-02.jpg' },
    { id:'p3', name:'page-03.jpg' },
    { id:'p4', name:'page-04.jpg' },
  ];

  function PageViewer({ images, index, onIndex, onClose, onRemove }){
    const n = images.length;
    useEffect(()=>{
      const h = (e)=>{
        if(e.key==='Escape') onClose();
        else if(e.key==='ArrowLeft') onIndex(Math.max(0,index-1));
        else if(e.key==='ArrowRight') onIndex(Math.min(n-1,index+1));
      };
      window.addEventListener('keydown',h);
      return ()=>window.removeEventListener('keydown',h);
    },[index,n,onClose,onIndex]);
    const cur = images[index] || {};
    return (
      <Modal open={true} onClose={onClose}
        title={<span className="capture-review__viewer-head">
          <span>Page {index+1}</span>
          <IconButton icon="x" label="Close viewer" size="sm" onClick={onClose} />
        </span>}
        footer={<Button variant="danger" size="sm" leadingIcon={<Icon name="trash-2" size={15}/>}
          onClick={()=>onRemove(cur.id)}>Remove page</Button>}>
        <div className="capture-review__viewer">

          <div className="capture-review__viewer-stage">

              <span className="capture-review__viewer-nav capture-review__viewer-nav--l">
                <IconButton icon="chevron-left" label="Previous page" solid onClick={()=>onIndex(index-1)} />
              </span>}
            {index<n-1 &&
              <span className="capture-review__viewer-nav capture-review__viewer-nav--r">
                <IconButton icon="chevron-right" label="Next page" solid onClick={()=>onIndex(index+1)} />
              </span>}
          </div>
          <div className="capture-review__viewer-strip">
            {images.map((im,i)=>(
              <button key={im.id} type="button" aria-label={'Go to page '+(i+1)}

                onClick={()=>onIndex(i)}>
                <Icon name="file-image" size={18} className="capture-review__thumb-ico" />
                <span className="capture-review__thumb-no">{i+1}</span>
              </button>
            ))}
          </div>
        </div>

  function ReviewView({ nav, params, ctx }){
    ctx = ctx || {};
    const examId = (params && params.examId) || (ctx.selectedExam && ctx.selectedExam.id) || 'EX1';
    const studentId = (params && params.studentId) || (ctx.selectedStudent && ctx.selectedStudent.id) || 'ST1';
    const examName = (ctx.selectedExam && (ctx.selectedExam.title || ctx.selectedExam.name)) || 'Calculus Midterm';
    const studentName = (ctx.selectedStudent && ctx.selectedStudent.name) || 'Aanya Rao';

    const ctxImages = (ctx.images && ctx.images.length) ? ctx.images : null;
    const [local, setLocal] = useState(ctxImages || MOCK_IMAGES);
    const images = ctxImages || local;

    const [viewer, setViewer] = useState(-1);
    const online = ctx.online !== false;
    const count = images.length;

    function applyRemove(id){
      const next = (imgs)=> imgs.filter(i=>i.id!==id);
      if(ctx.setImages) ctx.setImages(next);
      setLocal(prev=> next(prev));
      if(ctx.toast) ctx.toast({ variant:'info', title:'Page removed', body:'Remaining pages keep their order.' });
    }
    function removeAt(id){
      const idx = images.findIndex(i=>i.id===id);
      applyRemove(id);
      if(viewer>=0){
        const newLen = count-1;
        if(newLen<=0) setViewer(-1);
        else if(viewer>=newLen) setViewer(newLen-1);
        else if(idx<viewer) setViewer(viewer-1);
      }
    }
    function submit(){
      if(count===0) return;
      nav.go('#/scan/e/'+examId+'/s/'+studentId+'/done');
    }

    return (
      <>
        <div className="capture-review__scroll">
          <div className="capture-review__header">
            <IconButton icon="arrow-left" label="Back to capture" size="sm" onClick={()=>nav.back()} />
            <div className="capture-review__htext">
              <div className="capture-review__exam">{examName}</div>
              <div className="capture-review__meta">{studentName}</div>
              <div className="capture-review__count">{count} {count===1?'page':'pages'} captured</div>
            </div>
          </div>

          {count===0 ? (
            <div className="capture-review__empty">
              <Icon name="image-off" size={40} className="capture-review__empty-ico" />
              <div className="capture-review__empty-title">No pages yet</div>
              <div>Go back to capture and add at least one answer-sheet page.</div>
              <Button variant="secondary" size="sm" leadingIcon={<Icon name="camera" size={15}/>}
                onClick={()=>nav.back()}>Capture pages</Button>
            </div>
          ) : (
            <>
              <div className="capture-review__grid">
                {images.map((im,i)=>(
                  <div key={im.id} className="capture-review__tile" role="button" tabIndex={0}
                    aria-label={'Open page '+(i+1)+' '+im.name}
                    onClick={()=>setViewer(i)}
                    onKeyDown={(e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); setViewer(i); } }}>
                    <Icon name="file-image" size={30} className="capture-review__tile-ico" />
                    <span className="capture-review__page-no"><Badge>{i+1}</Badge></span>
                    <span className="capture-review__tile-remove" onClick={(e)=>e.stopPropagation()}>
                      <IconButton icon="x" label={'Remove page '+(i+1)} size="sm" solid
                        onClick={()=>removeAt(im.id)} />
                    </span>
                  </div>
                ))}
              </div>

              <div className="capture-review__hint">
                <Icon name="info" size={15} className="capture-review__hint-ico" />
                <span>Pages upload in the order shown. Remove and re-capture any blurry or duplicate page before submitting.</span>
              </div>

              {!online &&
                <div className="capture-review__offline">
                  <Icon name="wifi-off" size={15} className="capture-review__offline-ico" />
                  <span>You are offline. Pages are saved on this device and will upload automatically when you reconnect.</span>
                </div>}
            </>
          )}
        </div>

        <div className="capture-review__bar">
          <div className="capture-review__bar-count">
            <div className="capture-review__bar-n">{count} {count===1?'page':'pages'}</div>
            {count===0 && <div className="capture-review__bar-help">Add at least one page</div>}
          </div>
          <Button variant="primary" size="lg" disabled={count===0}
            leadingIcon={<Icon name={online?'send':'cloud-off'} size={16}/>}
            onClick={submit}>
            {online ? 'Submit to AutoGrade' : 'Queue for upload'}
          </Button>
        </div>

        {viewer>=0 && images[viewer] &&
          <PageViewer images={images} index={viewer}
            onIndex={setViewer} onClose={()=>setViewer(-1)} onRemove={removeAt} />}
      </>
    );
  }

  /* ═══════════════════════ VIEW 6 · SubmitConfirmView ═══════════════════════ */
  const SUBMIT_MOCK_EXAM = { id: 'EX1', title: 'Mid-term · Algebra II' };
  const SUBMIT_MOCK_STUDENT = { id: 'R-014', name: 'R. Sharma', roll: 'R-014' };
  const SUBMIT_MOCK_IMAGES = [{ id: 'p1' }, { id: 'p2' }, { id: 'p3' }, { id: 'p4' }];

  const PIPELINE = [
    { id: 'compress', label: 'Compressing images' },
    { id: 'upload',   label: 'Uploading to storage' },
    { id: 'create',   label: 'Creating submission' },
  ];

  function StepRow({ step, state }) {
    const dotCls = 'submit-step__dot--' + state;
    return (
      <div className={'submit-step' + (state === 'active' ? ' submit-step--active' : '') + (state === 'pending' ? ' submit-step--pending' : '')}
           aria-busy={state === 'active' || undefined}>
        <span className={'submit-step__dot ' + dotCls}>
          {state === 'done'
            ? <Icon name="check" size={16} />
            : state === 'active'
              ? <span className="submit-spin"><Icon name="loader-2" size={16} /></span>
              : <Icon name="circle" size={14} />}
        </span>
        <span className="submit-step__label">{step.label}</span>
      </div>
    );
  }

  function SummaryRow({ k, v, mono }) {
    return (
      <div className="submit-srow">
        <span className="submit-srow__k">{k}</span>
        <span className={'submit-srow__v' + (mono ? ' submit-srow__v--mono' : '')}>{v}</span>
      </div>
    );
  }

  function SubmitConfirmView({ nav, params, ctx }) {
    ctx = ctx || {};
    params = params || {};
    nav = nav || { go: () => {}, back: () => {} };

    const exam = ctx.selectedExam || SUBMIT_MOCK_EXAM;
    const student = ctx.selectedStudent || SUBMIT_MOCK_STUDENT;
    const images = (ctx.images && ctx.images.length) ? ctx.images : SUBMIT_MOCK_IMAGES;
    const pageCount = images.length;
    const examId = params.examId || (exam && exam.id) || 'EX1';
    const examTitle = exam.title || exam.name || 'Selected exam';

    const [stepIdx, setStepIdx] = useState(0);
    const [outcome, setOutcome] = useState('pending');
    const [submittedAt] = useState(() => {
      const d = new Date();
      const p = (n) => String(n).padStart(2, '0');
      return p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
    });

    const toast = (ctx.toast) || (() => {});

    useEffect(() => {
      const offline = ctx.online === false;
      const timers = [];
      PIPELINE.forEach((s, i) => {
        timers.push(setTimeout(() => {
          setStepIdx(i + 1);
          toast({ variant: 'info', title: s.label, body: 'Step ' + (i + 1) + ' of ' + PIPELINE.length });
        }, 600 * (i + 1)));
      });
      timers.push(setTimeout(() => {
        if (offline) {
          setOutcome('offline');
        } else {
          setOutcome('success');
          toast({ variant: 'success', title: 'Submitted for grading', body: student.name + ' · ' + pageCount + ' pages' });
        }
      }, 600 * (PIPELINE.length + 1)));
      return () => timers.forEach(clearTimeout);
      // eslint-disable-next-line
    }, []);

    const running = outcome === 'pending';

    const overlay = running && (
      <div className="submit-overlay" role="status" aria-live="polite">
        <div className="submit-overlay__halo"><Icon name="upload-cloud" size={30} /></div>
        <div>
          <div className="submit-overlay__cap">Submitting answer sheet</div>
          <div className="submit-overlay__sub">{pageCount} pages · {student.name}</div>
        </div>
        <div className="submit-steps">
          {PIPELINE.map((s, i) => (
            <StepRow key={s.id} step={s}
              state={i < stepIdx ? 'done' : i === stepIdx ? 'active' : 'pending'} />
          ))}
        </div>
      </div>
    );

    const successBody = (
      <>
        <div className="submit-hero">
          <span className="submit-hero__ring"><Icon name="check-circle" size={38} /></span>
          <div className="submit-hero__title">Submitted for grading</div>
          <div className="submit-hero__sub">The answer sheet is in the queue. Grading runs on the server — nothing else to do here.</div>
          <Badge variant="success" icon={<Icon name="shield-check" size={12} />}>Server received · {pageCount} pages</Badge>
        </div>

        <div>
          <div className="submit-eyebrow" style={{ marginBottom: 'var(--space-2)' }}>Submission</div>
          <div className="submit-summary">
            <SummaryRow k="Exam" v={examTitle} />
            <SummaryRow k="Student" v={student.name + ' · ' + (student.roll || student.rollNumber || student.id)} />
            <SummaryRow k="Pages" v={pageCount + ' pages'} />
            <SummaryRow k="Submitted" v={submittedAt} mono />
          </div>
        </div>

        <div className="submit-actions">
          <Button variant="primary" size="lg" block
            leadingIcon={<Icon name="scan-line" size={18} />}
            onClick={() => nav.go('#/scan/e/' + examId)}>Scan another student</Button>
          <Button variant="secondary" size="lg" block
            leadingIcon={<Icon name="arrow-left" size={18} />}
            onClick={() => nav.go('#/scan')}>Back to exams</Button>
        </div>
      </>
    );

    const duplicateBody = (
      <div className="submit-errwrap">
        <Alert variant="warning" title="Already submitted">
          This student was already scanned for this exam. No new copy was created.
        </Alert>
        <button className="submit-link" onClick={() => nav.go('#/history')}>
          <Icon name="history" size={16} /> View in history
        </button>
        <div className="submit-actions">
          <Button variant="secondary" size="lg" block
            leadingIcon={<Icon name="arrow-left" size={18} />}
            onClick={() => nav.go('#/scan')}>Back to exams</Button>
        </div>
      </div>
    );

    const offlineBody = (
      <div className="submit-errwrap">
        <Alert variant="info" title="You're offline">
          Saved to the upload queue. It'll send automatically when you reconnect.
        </Alert>
        <button className="submit-link" onClick={() => nav.go('#/queue')}>
          <Icon name="upload-cloud" size={16} /> View queue
        </button>
        <div className="submit-actions">
          <Button variant="primary" size="lg" block
            leadingIcon={<Icon name="scan-line" size={18} />}
            onClick={() => nav.go('#/scan/e/' + examId)}>Scan another student</Button>
        </div>
      </div>
    );

    const failedBody = (
      <div className="submit-errwrap">
        <Alert variant="error" title="Exam isn't open">
          This exam isn't open for scanning right now. Ask the teacher to publish it, then try again.
        </Alert>
        <div className="submit-actions">
          <Button variant="secondary" size="lg" block
            leadingIcon={<Icon name="arrow-left" size={18} />}
            onClick={() => nav.go('#/scan')}>Back to exams</Button>
        </div>
      </div>
    );

    let body = null;
    if (outcome === 'success') body = successBody;
    else if (outcome === 'duplicate') body = duplicateBody;
    else if (outcome === 'offline') body = offlineBody;
    else if (outcome === 'failed') body = failedBody;

    return (
      <>
        {overlay}
        {!running && (
          <div className="submit-wrap">
            {body}

            <div className="submit-tray" role="group" aria-label="Preview outcome states">
              <Chip active={outcome === 'success'} onClick={() => setOutcome('success')}>Success</Chip>
              <Chip active={outcome === 'duplicate'} onClick={() => setOutcome('duplicate')}>Duplicate</Chip>
              <Chip active={outcome === 'offline'} onClick={() => setOutcome('offline')}>Offline</Chip>
              <Chip active={outcome === 'failed'} onClick={() => setOutcome('failed')}>Exam closed</Chip>
            </div>
          </div>
        )}
      </>
    );
  }

  /* ═══════════════════════ VIEW 7 · QueueView ═══════════════════════ */
  const UPLOAD_QUEUE_MOCK = [
    { id:'q1', status:'uploading', progress:64, exam:'Calculus Midterm', student:'Aanya Rao', pages:4 },
    { id:'q2', status:'queued', exam:'Calculus Midterm', student:'Vikram Iyer', pages:3 },
    { id:'q3', status:'failed', exam:'Physics Unit Test', student:'Meera Nair', pages:5, error:'Network timeout' },
    { id:'q4', status:'failed', exam:'Physics Unit Test', student:'Rohan Das', pages:2, error:'Storage upload interrupted' },
    { id:'q5', status:'done', exam:'Calculus Midterm', student:'Priya Sharma', pages:4 },
  ];

  const UQ_STATUS = {
    queued:    { icon:'clock',          label:'Queued' },
    uploading: { icon:'loader',         label:'Uploading' },
    done:      { icon:'check-circle-2', label:'Uploaded' },
    failed:    { icon:'alert-triangle', label:'Failed' },
  };

  function uqMeta(it){
    const p = it.pages || 0;
    return it.exam + ' · ' + it.student + ' · ' + p + (p===1?' page':' pages');
  }

  function QueueDetailModal({ item, online, onRetry, onRemove, onClose }){
    if(!item) return null;
    const s = UQ_STATUS[item.status] || UQ_STATUS.queued;
    return (
      <Modal open={true} onClose={onClose}
        title={<span style={{display:'flex',alignItems:'center',gap:'var(--space-2)'}}>
          <Icon name={s.icon} size={16} /> Upload {s.label.toLowerCase()}
        </span>}
        footer={item.status==='failed'
          ? (<span style={{display:'flex',gap:'var(--space-2)',width:'100%'}}>
              <Button variant="ghost" size="sm" leadingIcon={<Icon name="trash-2" size={15}/>}
                onClick={()=>onRemove(item.id)}>Discard</Button>
              <span style={{flex:1}} />
              <Button variant="primary" size="sm" disabled={!online}
                leadingIcon={<Icon name="rotate-cw" size={15}/>}
                onClick={()=>onRetry(item.id)}>Retry now</Button>
            </span>)
          : (<Button variant="secondary" size="sm" onClick={onClose}>Close</Button>)}>
        <div className="upload-queue__detail">
          <div className="upload-queue__detail-meta">
            <div className="upload-queue__detail-exam">{item.exam}</div>
            <div className="upload-queue__detail-sub">
              {item.student} · {item.pages} {item.pages===1?'page':'pages'}
            </div>
          </div>

          {item.status==='failed' &&
            <div className="upload-queue__detail-err">
              <Icon name="alert-triangle" size={15} className="upload-queue__detail-err-ico" />
              <span><strong>{item.error || 'Upload failed'}.</strong> The pages are still saved on this
                device. Retry when you have a stable connection, or discard to remove this submission.</span>
            </div>}

          {item.status==='uploading' &&
            <div className="upload-queue__detail-sub">
              Uploading page images to AutoGrade ({item.progress||0}% done). The server allocates the
              submission once all pages arrive.
            </div>}

          {item.status==='queued' &&
            <div className="upload-queue__detail-sub">
              Waiting in line. Pages will upload automatically{online ? '' : ' once you reconnect'}.
            </div>}

          {item.status==='done' &&
            <div className="upload-queue__detail-sub">
              Submitted. AutoGrade has received all {item.pages} pages and will grade them.
            </div>}

          {!online && item.status==='failed' &&
            <div className="upload-queue__detail-label">Retry is disabled while offline.</div>}
        </div>
      </Modal>
    );
  }

  function QueueView({ nav, params, ctx }){
    ctx = ctx || {};
    const ctxQueue = (ctx.queue && ctx.queue.length) ? ctx.queue : null;
    const [local, setLocal] = useState(ctxQueue || UPLOAD_QUEUE_MOCK);
    const items = ctxQueue || local;
    const online = ctx.online !== false;

    const [detailId, setDetailId] = useState(null);
    const detail = items.find(i=>i.id===detailId) || null;

    const counts = items.reduce((a,i)=>{ a[i.status]=(a[i.status]||0)+1; return a; }, {});
    const nQueued = counts.queued || 0;
    const nUploading = counts.uploading || 0;
    const nFailed = counts.failed || 0;
    const nDone = counts.done || 0;
    const retryable = nFailed + nQueued;

    function update(fn){
      if(ctx.setQueue) ctx.setQueue(fn);
      setLocal(prev=> fn(prev));
    }
    function retry(id){
      update(list => list.map(i => i.id===id ? { ...i, status:'queued', error:undefined } : i));
      setDetailId(null);
      if(ctx.toast) ctx.toast({ variant:'info', title:'Re-queued', body:'Will upload when a connection is available.' });
    }
    function remove(id){
      update(list => list.filter(i => i.id!==id));
      setDetailId(null);
      if(ctx.toast) ctx.toast({ variant:'info', title:'Removed from queue', body:'These pages were discarded from this device.' });
    }
    function retryAll(){
      if(!online){
        if(ctx.toast) ctx.toast({ variant:'warning', title:'You are offline', body:'Items will retry automatically when you reconnect.' });
        return;
      }
      update(list => list.map(i => (i.status==='failed') ? { ...i, status:'queued', error:undefined } : i));
      if(ctx.toast) ctx.toast({ variant:'info', title:'Retrying all', body:'Failed uploads were re-queued.' });
    }

    if(items.length===0){
      return (
        <div className="upload-queue__scroll">
          <div className="upload-queue__head">
            <h1 className="upload-queue__title">Upload queue</h1>
            <Badge variant={online?'success':'warning'} icon={online?'wifi':'wifi-off'}>
              {online ? 'Online' : 'Offline'}
            </Badge>
          </div>
          <div className="upload-queue__empty">
            <Icon name="cloud-check" size={44} className="upload-queue__empty-ico" />
            <div className="upload-queue__empty-title">Queue is clear</div>
            <div>Everything's uploaded. New captures will appear here until they reach AutoGrade.</div>
            <Button variant="secondary" size="sm" leadingIcon={<Icon name="camera" size={15}/>}
              onClick={()=>nav.go('#/scan')}>Scan a sheet</Button>
          </div>
        </div>
      );
    }

    return (
      <>
        <div className="upload-queue__scroll">
          <div className="upload-queue__head">
            <h1 className="upload-queue__title">Upload queue</h1>
            <Badge variant={online?'success':'warning'} icon={online?'wifi':'wifi-off'}>
              {online ? 'Online' : 'Offline'}
            </Badge>
          </div>

          <div className="upload-queue__summary">
            <span>{nQueued} queued</span><span className="upload-queue__dot" />
            <span>{nUploading} uploading</span><span className="upload-queue__dot" />
            <span>{nFailed} failed</span>
            {nDone>0 && <><span className="upload-queue__dot" /><span>{nDone} done</span></>}
          </div>

          <div className="upload-queue__actions">
            <Button variant="secondary" size="sm" block disabled={retryable===0}
              leadingIcon={<Icon name="rotate-cw" size={15}/>} onClick={retryAll}>
              Retry all{nFailed>0 ? ' ('+nFailed+' failed)' : ''}
            </Button>
          </div>

          <div className="upload-queue__note">
            <Icon name="hard-drive" size={15} className="upload-queue__note-ico" />
            <span>Saved on this device — survives closing the app. Items upload automatically when online.</span>
          </div>

          <div className="upload-queue__list">
            {items.map(it=>{
              const failed = it.status==='failed';
              const s = UQ_STATUS[it.status] || UQ_STATUS.queued;
              const interactive = failed;
              return (
                <div key={it.id}
                  className={'upload-queue__row'+(failed?' upload-queue__row--failed':'')}>
                  {interactive ? (
                    <button type="button" className="upload-queue__hit"
                      aria-label={'Open details for '+it.student+' — '+s.label}
                      onClick={()=>setDetailId(it.id)}>
                      <UploadQueueItem status={it.status} name={uqMeta(it)}
                        progress={it.progress} meta={s.label} />
                    </button>
                  ) : (
                    <div className="upload-queue__static">
                      <UploadQueueItem status={it.status} name={uqMeta(it)}
                        progress={it.progress} meta={s.label} />
                    </div>
                  )}
                  {failed &&
                    <div className="upload-queue__rowbar">
                      <span className="upload-queue__rowbar-status">
                        <Icon name="alert-triangle" size={14} style={{color:'var(--status-error)'}} />
                        <span style={{fontSize:'var(--text-xs)',color:'var(--status-error)'}}>
                          {it.error || 'Upload failed'}
                        </span>
                      </span>
                      <Button variant="ghost" size="sm" disabled={!online}
                        leadingIcon={<Icon name="rotate-cw" size={14}/>}
                        onClick={()=>retry(it.id)}>Retry</Button>
                      <IconButton icon="trash-2" label={'Remove '+it.student+' from queue'}
                        size="sm" onClick={()=>remove(it.id)} />
                    </div>}
                </div>
              );
            })}
          </div>
        </div>

        <QueueDetailModal item={detail} online={online}
          onRetry={retry} onRemove={remove} onClose={()=>setDetailId(null)} />
      </>
    );
  }

  /* ═══════════════════════ VIEW 8 · HistoryView ═══════════════════════ */
  const STATUS_META = {
    uploaded: { icon:'clock',        label:'Uploaded', variant:undefined,  spin:false },

  const MOCK_HISTORY = [
    { id:'s1', initials:'AK', student:'Aarav Kumar',   roll:'R-2041', exam:'Math UT3',          pages:3, day:'2026-06-20', time:'09:14', status:'grading'  },

      return {
        time: done ? 'Done' : (current ? 'In progress' : 'Pending'),
        label: m.label,
        variant: (done || (current && key==='graded')) ? 'success' : (current ? undefined : 'muted'),

            <span>{g.label}</span><span className="scan-history__group-rule" />

            {g.rows.map(r=> <HistoryRow key={r.id} row={r} onOpen={setOpenId} />)}

        </div>

    return (
      <>
        <div className="scan-history__scroll">

    function toggleGuides(e){
      const v = e.target.checked; setGuides(v);
      toast({ variant:'success', title:'Preference saved', body:'Alignment guides ' + (v?'on':'off') + '.' });

      toast({ variant:'success', title:'Saved', body:'Image quality: ' + (v==='high'?'High':'Standard') + '.' });

    function changeTheme(v){
      setTheme(v);

      if (v === 'system') root.setAttribute('data-theme','light'); else root.setAttribute('data-theme', v);
      toast({ variant:'success', title:'Theme updated', body:THEME_OPTS.find(o=>o.value===v).label + ' theme.' });

      if (nDone === 0) return;
      if (safeCtx.setQueue) safeCtx.setQueue(list => (list||[]).filter(q => q.status !== 'done'));

            <Field label="Image quality" htmlFor="ss-quality">
              <Select id="ss-quality" value={quality} onChange={changeQuality}

            </Field>
            <div className="scanner-settings-note">
              <Icon name="image" size={15} className="scanner-settings-note-ico" />
              <span>Compressed to max 1920px, 85% before upload — smaller, faster, still readable.</span>

              leadingIcon={<Icon name="trash-2" size={16}/>} onClick={clearCompleted}>
              Clear completed{nDone>0 ? ' ('+nDone+')' : ''}

    };

    const section = route.name === 'queue' ? 'queue'
      : route.name === 'history' ? 'history'
      : route.name === 'settings' ? 'none'
      : 'scan';

    const tabs = [
      { icon:'scan-line',    label:'Scan',    active:section==='scan',    href:'#/scan' },
      { icon:'cloud-upload', label:'Queue',   active:section==='queue',   href:'#/queue' },
      { icon:'history',      label:'History', active:section==='history', href:'#/history' },
    ];

    function renderView(){
      switch(route.name){
        case 'login':         return <LoginView nav={nav} params={route.params} ctx={ctx} />;
        case 'selectExam':    return <SelectExamView nav={nav} params={route.params} ctx={ctx} />;
        case 'selectStudent': return <SelectStudentView nav={nav} params={route.params} ctx={ctx} />;
        case 'capture':       return <CaptureView nav={nav} params={route.params} ctx={ctx} />;
        case 'review':        return <ReviewView nav={nav} params={route.params} ctx={ctx} />;
        case 'submitConfirm': return <SubmitConfirmView nav={nav} params={route.params} ctx={ctx} />;
        case 'queue':         return <QueueView nav={nav} params={route.params} ctx={ctx} />;
        case 'history':       return <HistoryView nav={nav} params={route.params} ctx={ctx} />;
        case 'settings':      return <SettingsView nav={nav} params={route.params} ctx={ctx} />;
        default:              return <SelectExamView nav={nav} params={route.params} ctx={ctx} />;
      }
    }

    const ToastHost = (
      <div className="app-toasts" role="region" aria-label="Notifications">
        {toasts.map(t => (
          <Toast key={t.id} variant={t.variant || 'info'} title={t.title}
            onClose={() => setToasts(list => list.filter(x => x.id !== t.id))}>
            {t.body}
          </Toast>
        ))}
      </div>
    );

    if (route.name === 'login') {
      return (
        <div className="app-ph">
          <div className="app-ph__top">
            <div className="app-brand">
              <div className="app-mark"><Icon name="scan-line" size={16} /></div>
              <span className="app-name">AutoGrade Scan</span>
            </div>
            <span className="app-title">Sign in</span>
          </div>
          <div className="app-ph__body">
            {ToastHost}
            <LoginView nav={nav} params={route.params} ctx={ctx} />
          </div>
        </div>
      );
    }

    return (
      <div className="app-ph">
        <Topbar
          title={ROUTE_TITLES[route.name] || 'Scan'}
          online={online}
          onToggleOnline={() => setOnline(o => !o)}
          onGear={() => nav.go('#/settings')} />
        <div className="app-ph__body">
          {ToastHost}
          {renderView()}
        </div>
        <div className="app-ph__tabs">
          <Tabbar items={tabs} />
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
