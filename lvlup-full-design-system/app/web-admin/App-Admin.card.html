<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="utf-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
html,body{margin:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-ui);}
#root{min-height:100vh;}
.ax-shell{display:grid;grid-template-columns:264px 1fr;min-height:100vh;}
.ax-side{position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-5);background:var(--bg-surface);border-right:1px solid var(--border-subtle);padding:var(--space-5) var(--space-4);}
.ax-brand{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-1) var(--space-2);}
.ax-brand .mk{width:34px;height:34px;border-radius:var(--radius-md);background:var(--brand-primary);color:var(--text-on-accent);display:grid;place-items:center;font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-lg);}
.ax-brand .nm{font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-base);line-height:1.1;}
.ax-brand .sc{font-size:var(--text-2xs);color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;}
.ax-navgrp{display:flex;flex-direction:column;gap:2px;}
.ax-navlbl{font-size:var(--text-2xs);font-weight:var(--weight-semibold);letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);padding:var(--space-2) var(--space-2) var(--space-1);}
.ax-nav{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--text-secondary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;position:relative;transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard);}
.ax-nav i{width:18px;height:18px;}
.ax-nav .ct{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
.ax-nav:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.ax-nav.on{background:var(--brand-subtle);color:var(--brand-primary);font-weight:var(--weight-semibold);}
.ax-nav.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:58%;border-radius:var(--radius-pill);background:var(--brand-primary);}
.ax-side .foot{margin-top:auto;display:flex;flex-direction:column;gap:var(--space-2);padding-top:var(--space-4);border-top:1px solid var(--border-subtle);}
.ax-rs{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;}
.ax-rs i:last-child{margin-left:auto;}
.ax-uc{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2);border-radius:var(--radius-md);cursor:pointer;}
.ax-uc:hover{background:var(--bg-surface-sunken);}
.ax-uc .av{width:30px;height:30px;border-radius:var(--radius-pill);background:var(--brand-subtle);color:var(--brand-primary);display:grid;place-items:center;font-size:var(--text-xs);font-weight:var(--weight-semibold);}
.ax-uc .nm{font-size:var(--text-sm);font-weight:var(--weight-medium);line-height:1.1;}
.ax-uc .rl{font-size:var(--text-2xs);color:var(--text-muted);}
.ax-main{display:flex;flex-direction:column;min-width:0;}
.ax-top{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-8);border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);position:sticky;top:0;z-index:20;}
.ax-bc{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-muted);}
.ax-bc b{color:var(--text-primary);font-weight:var(--weight-medium);}
.ax-top .sp{flex:1;}
.ax-search{display:flex;align-items:center;gap:var(--space-2);width:280px;max-width:32vw;padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-muted);font-size:var(--text-sm);}
.ax-search kbd{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-2xs);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:0 var(--space-1);}
.ax-body{flex:1;overflow-y:auto;padding:var(--space-8);display:flex;flex-direction:column;gap:var(--space-6);width:100%;max-width:1264px;}
.ax-head{display:flex;align-items:flex-start;gap:var(--space-4);flex-wrap:wrap;}
.ax-head .tx{display:flex;flex-direction:column;gap:var(--space-1);}
.ax-h1{font-family:var(--font-display);font-size:var(--text-2xl);line-height:var(--leading-2xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);}
.ax-sub{font-size:var(--text-sm);color:var(--text-secondary);}
.ax-head .ac{margin-left:auto;display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;}
.ax-grid{display:grid;gap:var(--space-4);}
.ax-g6{grid-template-columns:repeat(6,1fr);}
.ax-gmain{grid-template-columns:2fr 1fr;align-items:start;}
.ax-row{display:flex;align-items:center;gap:var(--space-3);}
.ax-col{display:flex;flex-direction:column;gap:var(--space-3);}
.ax-mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.ax-muted{color:var(--text-muted);}
.ax-sec{color:var(--text-secondary);}
.ax-sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.ax-onboarding{min-height:100vh;display:flex;flex-direction:column;background:var(--bg-canvas);}
@media (prefers-reduced-motion: reduce){*{transition-duration:.001ms !important;animation-duration:.001ms !important;}}
/* ===== admin-dashboard.css ===== */
/* layout utilities used inside the view body (re-added scoped) */
.vw-dashboard .ax-grid{display:grid;gap:var(--space-4);}
.vw-dashboard .ax-g6{grid-template-columns:repeat(6,1fr);}
.vw-dashboard .ax-gmain{grid-template-columns:2fr 1fr;align-items:start;}
.vw-dashboard .ax-row{display:flex;align-items:center;gap:var(--space-3);}
.vw-dashboard .ax-col{display:flex;flex-direction:column;gap:var(--space-3);}
.vw-dashboard .ax-mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.vw-dashboard .ax-muted{color:var(--text-muted);}
.vw-dashboard .ax-sec{color:var(--text-secondary);}
.vw-dashboard .ax-sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

/* KPI */
.vw-dashboard .kpi{display:flex;flex-direction:column;gap:var(--space-2);}
.vw-dashboard .kpi .lh{display:flex;align-items:center;gap:var(--space-2);color:var(--text-muted);font-size:var(--text-xs);font-weight:var(--weight-medium);}
.vw-dashboard .kpi .lh i{width:15px;height:15px;}
.vw-dashboard .kpi .vv{font-family:var(--font-mono);font-size:var(--text-2xl);font-weight:var(--weight-medium);font-variant-numeric:tabular-nums;line-height:1.1;}
.vw-dashboard .kpi .tr{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-xs);}
.vw-dashboard .kpi .tr i{width:13px;height:13px;}
/* mini bar chart */
.vw-dashboard .chart{display:flex;align-items:flex-end;gap:var(--space-3);height:180px;padding-top:var(--space-4);border-bottom:1px solid var(--border-subtle);}
.vw-dashboard .chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:var(--space-2);height:100%;justify-content:flex-end;}
.vw-dashboard .chart .bar{width:100%;max-width:46px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:var(--brand-primary);}
.vw-dashboard .chart .vl{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-secondary);}
.vw-dashboard .chart .xl{font-size:var(--text-2xs);color:var(--text-muted);text-align:center;}
/* meter */
.vw-dashboard .meter{display:flex;flex-direction:column;gap:var(--space-2);}
.vw-dashboard .meter .mt{display:flex;align-items:baseline;justify-content:space-between;}
.vw-dashboard .meter .ml{font-size:var(--text-sm);color:var(--text-secondary);}
.vw-dashboard .meter .mv{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-primary);}
.vw-dashboard .bar-track{height:8px;border-radius:var(--radius-pill);background:var(--bg-inset);overflow:hidden;}
.vw-dashboard .bar-fill{height:100%;border-radius:var(--radius-pill);background:var(--brand-primary);}
.vw-dashboard .bar-fill.warn{background:var(--status-warning);}
.vw-dashboard .bar-fill.err{background:var(--status-error);}
.vw-dashboard .deflist{display:grid;grid-template-columns:auto 1fr;gap:var(--space-3) var(--space-5);font-size:var(--text-sm);}
.vw-dashboard .deflist dt{color:var(--text-muted);}
.vw-dashboard .deflist dd{color:var(--text-primary);text-align:right;margin:0;}
.vw-dashboard .badge{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:var(--weight-medium);border:1px solid transparent;}
.vw-dashboard .badge i{width:12px;height:12px;}
.vw-dashboard .badge.suc{background:var(--status-success-subtle);color:var(--status-success);}
.vw-dashboard .badge.brd{background:var(--brand-subtle);color:var(--brand-primary);}
.vw-dashboard .chip{display:inline-flex;align-items:center;gap:6px;padding:3px var(--space-3);border-radius:var(--radius-pill);font-size:var(--text-xs);background:var(--bg-surface-sunken);border:1px solid var(--border-subtle);color:var(--text-secondary);}
.vw-dashboard .chip .d{width:7px;height:7px;border-radius:var(--radius-pill);background:var(--brand-primary);}
.vw-dashboard .chip.off{color:var(--text-muted);}
.vw-dashboard .chip.off .d{background:var(--border-strong);}
.vw-dashboard .card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);padding:var(--space-5);}
.vw-dashboard .card.lk{cursor:pointer;transition:box-shadow var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard);}
.vw-dashboard .card.lk:hover{box-shadow:var(--shadow-e2);border-color:var(--border-strong);}
.vw-dashboard .panel{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;}
.vw-dashboard .panel .ph{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border-subtle);}
.vw-dashboard .panel .ph .pt{font-size:var(--text-base);font-weight:var(--weight-semibold);margin-right:auto;}
.vw-dashboard .panel .pb{padding:var(--space-5);}
.vw-dashboard .panel .pf{padding:var(--space-3) var(--space-5);border-top:1px solid var(--border-subtle);color:var(--text-muted);font-size:var(--text-xs);}
.vw-dashboard .alert{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--status-warning);background:var(--status-warning-subtle);font-size:var(--text-sm);}
.vw-dashboard .alert i.lead{width:18px;height:18px;color:var(--status-warning);flex:none;margin-top:1px;}
.vw-dashboard .alert .ab{flex:1;}
.vw-dashboard .alert .at{font-weight:var(--weight-semibold);}
.vw-dashboard .sec-h{display:flex;align-items:baseline;gap:var(--space-3);margin-bottom:var(--space-3);}
.vw-dashboard .sec-h .st{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);}
.vw-dashboard .sec-h .sca{font-size:var(--text-xs);color:var(--text-muted);}
.vw-dashboard .lnk{color:var(--brand-primary);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;}
.vw-dashboard .icon-btn{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}
.vw-dashboard .icon-btn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}

/* ===== onboarding-wizard.css ===== */
.vw-onboarding .ow-body{flex:1;overflow-y:auto;padding:var(--space-10) var(--space-8) var(--space-16);display:flex;justify-content:center;}
.vw-onboarding .ow-col{width:100%;max-width:720px;display:flex;flex-direction:column;gap:var(--space-8);}
.vw-onboarding .ow-hero{display:flex;flex-direction:column;gap:var(--space-2);}
.vw-onboarding .ow-h1{font-family:var(--font-display);font-size:var(--text-3xl);line-height:var(--leading-3xl);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-display);}
.vw-onboarding .ow-sub{font-size:var(--text-base);color:var(--text-secondary);}
.vw-onboarding .ax-mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.vw-onboarding .ax-muted{color:var(--text-muted);}
.vw-onboarding .ax-sec{color:var(--text-secondary);}
.vw-onboarding .ax-sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.vw-onboarding .icon-btn{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:var(--radius-md);color:var(--text-secondary);cursor:pointer;background:none;border:none;}
.vw-onboarding .icon-btn:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
/* stepper (proposed foundation addition: Stepper) */
.vw-onboarding .stepper{display:flex;align-items:flex-start;gap:0;list-style:none;margin:0;padding:0;}
.vw-onboarding .stepper li{display:flex;align-items:center;flex:1;min-width:0;}
.vw-onboarding .stepper li:last-child{flex:none;}
.vw-onboarding .snode{display:flex;flex-direction:column;align-items:center;gap:var(--space-2);text-align:center;}
.vw-onboarding .snode .dot{width:32px;height:32px;border-radius:var(--radius-pill);display:grid;place-items:center;font-family:var(--font-mono);font-size:var(--text-sm);font-weight:var(--weight-semibold);border:1.5px solid var(--border-strong);background:var(--bg-inset);color:var(--text-muted);transition:background var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard),box-shadow var(--dur-instant) var(--ease-standard);}
.vw-onboarding .snode .dot i{width:16px;height:16px;}
.vw-onboarding .snode .lb{font-size:var(--text-2xs);font-weight:var(--weight-medium);color:var(--text-muted);max-width:88px;}
.vw-onboarding .snode.done .dot{background:var(--brand-subtle);border-color:var(--brand-primary);color:var(--brand-primary);}
.vw-onboarding .snode.done .lb{color:var(--text-secondary);}
.vw-onboarding .snode.cur .dot{background:var(--brand-primary);border-color:var(--brand-primary);color:var(--text-on-accent);}
.vw-onboarding .snode.cur .lb{color:var(--text-primary);font-weight:var(--weight-semibold);}
.vw-onboarding .snode.skip .dot{border-style:dashed;}
.vw-onboarding .snode.clickable{cursor:pointer;}
.vw-onboarding .snode.clickable:hover .dot{box-shadow:var(--shadow-e2);}
.vw-onboarding .sconn{flex:1;height:2px;margin:16px var(--space-2) 0;border-radius:var(--radius-pill);background:var(--border-subtle);}
.vw-onboarding .sconn.fill{background:var(--brand-primary);}
.vw-onboarding .scount{font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--space-3);text-align:center;}
/* card */
.vw-onboarding .ow-card{position:relative;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-e1);overflow:hidden;}
.vw-onboarding .ow-ch{padding:var(--space-5) var(--space-6) var(--space-3);display:flex;flex-direction:column;gap:var(--space-1);}
.vw-onboarding .ow-ch h2{font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--weight-semibold);margin:0;}
.vw-onboarding .ow-ch .desc{font-size:var(--text-sm);color:var(--text-secondary);}
.vw-onboarding .ow-cc{padding:var(--space-2) var(--space-6) var(--space-5);display:flex;flex-direction:column;gap:var(--space-4);}
.vw-onboarding .ow-cf{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-6);border-top:1px solid var(--border-subtle);background:var(--bg-surface-sunken);}
.vw-onboarding .ow-cf .sp{flex:1;}
.vw-onboarding .frow{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);}
.vw-onboarding .field{display:flex;flex-direction:column;gap:var(--space-2);}
.vw-onboarding .field label{font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-primary);}
.vw-onboarding .field .req{color:var(--status-error);}
.vw-onboarding .field input{font-family:var(--font-ui);font-size:var(--text-sm);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);color:var(--text-primary);}
.vw-onboarding .field input:focus{outline:none;border-color:var(--border-focus);box-shadow:var(--ring-focus);}
.vw-onboarding .field input.err{border-color:var(--status-error);}
.vw-onboarding .field .ferr{display:flex;align-items:center;gap:4px;font-size:var(--text-xs);color:var(--status-error);}
.vw-onboarding .field .ferr i{width:13px;height:13px;}
.vw-onboarding .field .hint{font-size:var(--text-xs);color:var(--text-muted);}
.vw-onboarding .btn{display:inline-flex;align-items:center;gap:var(--space-2);font-family:var(--font-ui);font-size:var(--text-sm);font-weight:var(--weight-semibold);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);border:1px solid transparent;cursor:pointer;transition:background var(--dur-fast) var(--ease-standard);}
.vw-onboarding .btn i{width:16px;height:16px;}
.vw-onboarding .btn--primary{background:var(--brand-primary);color:var(--text-on-accent);}
.vw-onboarding .btn--primary:hover{background:var(--brand-primary-hover);}
.vw-onboarding .btn--secondary{background:var(--bg-surface);color:var(--text-secondary);border-color:var(--border-subtle);}
.vw-onboarding .btn--secondary:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.vw-onboarding .btn--ghost{background:none;color:var(--text-secondary);}
.vw-onboarding .btn--ghost:hover{background:var(--bg-surface-sunken);color:var(--text-primary);}
.vw-onboarding .btn--spark{background:var(--spark);color:var(--ink-900);box-shadow:var(--glow-spark);}
.vw-onboarding .btn--spark:hover{background:var(--spark-hover);}
.vw-onboarding .btn:disabled{opacity:.5;cursor:not-allowed;}
/* filedrop / swatches */
.vw-onboarding .filedrop{display:flex;flex-direction:column;align-items:center;gap:var(--space-2);padding:var(--space-6);border:1.5px dashed var(--border-strong);border-radius:var(--radius-md);background:var(--bg-surface-sunken);color:var(--text-secondary);text-align:center;cursor:pointer;}
.vw-onboarding .filedrop:hover{border-color:var(--brand-primary);}
.vw-onboarding .filedrop i{width:24px;height:24px;color:var(--text-muted);}
.vw-onboarding .swatch{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface);cursor:pointer;}
.vw-onboarding .swatch .sw{width:20px;height:20px;border-radius:var(--radius-sm);border:1px solid var(--border-subtle);}
.vw-onboarding .swatch .hx{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary);}
.vw-onboarding .preview{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-surface-sunken);}
.vw-onboarding .preview .lg{width:28px;height:28px;border-radius:var(--radius-sm);display:grid;place-items:center;color:var(--text-on-accent);font-family:var(--font-display);font-weight:var(--weight-semibold);font-size:var(--text-sm);}
/* alert / banner */
.vw-onboarding .alert{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid;font-size:var(--text-sm);}
.vw-onboarding .alert i.lead{width:18px;height:18px;flex:none;margin-top:1px;}
.vw-onboarding .alert .ab{flex:1;}
.vw-onboarding .alert .at{font-weight:var(--weight-semibold);}
.vw-onboarding .alert.info{border-color:var(--status-info);background:var(--status-info-subtle);}
.vw-onboarding .alert.info i.lead{color:var(--status-info);}
.vw-onboarding .alert.error{border-color:var(--status-error);background:var(--status-error-subtle);}

                 title={done?("Step "+(i+1)+": "+lb+", completed"):cur?("Step "+(i+1)+": "+lb+", current"):("Step "+(i+1)+": "+lb+", upcoming")}>
              <div className="dot">{done?<i data-lucide="check"></i>:(i+1)}</div>
              <span className="lb">{lb}</span>
            </div>
            {i<STEPS.length-1 && <div className={"sconn"+(completed.includes(i)?" fill":"")}></div>}
          </li>;
        })}
      </ol>
      <div className="scount">Step {current+1} of 4 · {STEPS[current]}</div>
    </div>);
  }

  function Field({label,req,placeholder,hint,error,defaultValue,type}){
    const id="f-"+label.replace(/\s/g,"-").toLowerCase();
    return <div className="field">
      <label htmlFor={id}>{label}{req&&<span className="req"> *</span>}</label>
      <input id={id} type={type||"text"} placeholder={placeholder} defaultValue={defaultValue}
        className={error?"err":""} aria-required={req?"true":undefined} aria-invalid={error?"true":undefined}
        aria-describedby={error?id+"-err":undefined}/>
      {error && <div className="ferr" id={id+"-err"}><i data-lucide="alert-circle"></i>{error}</div>}
      {hint && !error && <div className="hint">{hint}</div>}
    </div>;
  }

  function StepSchool({errors}){
    return <>
      <Field label="School name" req placeholder="e.g. Springfield Academy" defaultValue={TENANT} error={errors.name}/>
      <Field label="Contact email" req type="email" placeholder="admin@school.edu" defaultValue="admin@northwood.edu" error={errors.email}/>
      <div className="frow">
        <Field label="Phone" placeholder="+91 98765 43210"/>
        <Field label="Website" type="url" placeholder="https://school.edu"/>
      </div>
    </>;
  }
  function StepBranding(){
    return <>
      <div className="alert info"><i data-lucide="info" className="lead"></i><div className="ab">
        Your brand colors style student- and parent-facing screens. The admin console keeps the standard theme.</div></div>
      <div className="field"><label>Logo</label>
        <div className="filedrop" tabIndex={0} role="button"><i data-lucide="upload-cloud"></i>
          <div>Drop a logo here, or browse</div>
          <div className="hint">PNG or SVG, up to 2 MB. Square works best.</div></div></div>
      <div className="frow">
        <div className="field"><label>Primary color</label>
          <div className="swatch"><span className="sw" style={{background:"var(--brand-primary)"}}></span><span className="hx">brand.primary</span></div></div>
        <div className="field"><label>Accent color</label>
          <div className="swatch"><span className="sw" style={{background:"var(--spark)"}}></span><span className="hx">spark</span></div></div>
      </div>
      <div className="field"><label className="ax-muted" style={{fontWeight:"var(--weight-regular)",fontSize:"var(--text-xs)"}}>Preview · student topbar</label>
        <div className="preview"><span className="lg" style={{background:"var(--brand-primary)"}}>N</span>
          <span style={{fontWeight:"var(--weight-semibold)"}}>{TENANT}</span></div></div>
    </>;
  }
  function StepSession({errors}){
    return <>
      <Field label="Session name" req placeholder="e.g. 2026-2027" defaultValue="2026-2027" error={errors.name}/>
      <div className="frow">
        <Field label="Start date" type="date"/>
        <Field label="End date" type="date" error={errors.end}/>
      </div>
    </>;
  }
  function StepClass({errors}){
    return <>
      <Field label="Class name" req placeholder="e.g. Class 10-A" error={errors.name}/>
      <div className="frow">
        <Field label="Grade" req placeholder="e.g. 10" error={errors.grade}/>
        <Field label="Section" placeholder="e.g. A"/>
      </div>
      <div className="hint ax-muted" style={{display:"flex",alignItems:"center",gap:6}}>
        <i data-lucide="link" style={{width:14,height:14}}></i>
        Auto-linked to the 2026-2027 academic session created in the previous step.</div>
    </>;
  }

  function Done({copied,onCopy,inviteOpen,setInviteOpen}){
    return <div className="ow-card"><div className="ow-cc" style={{padding:"var(--space-6) var(--space-6) var(--space-6)",gap:"var(--space-5)"}}>
      <div className="medallion"><i data-lucide="check"></i></div>
      <div style={{textAlign:"center"}}>
        <h2 style={{fontFamily:"var(--font-display)",fontSize:"var(--text-2xl)",fontWeight:"var(--weight-semibold)",margin:0}}>You're all set.</h2>
        <div className="ax-sec" style={{marginTop:"var(--space-2)"}}>{TENANT} is ready. Share your join code so staff and students can get in.</div>
      </div>
      <div>
        <div style={{fontSize:"var(--text-sm)",fontWeight:"var(--weight-semibold)",marginBottom:"var(--space-2)"}}>What we set up</div>
        <dl className="deflist">
          <dt>School</dt><dd>{TENANT}</dd>
          <dt>Academic session</dt><dd>2026-2027 <span className="badge suc"><i data-lucide="check"></i>Current</span></dd>
          <dt>First class</dt><dd><span className="badge mut"><i data-lucide="minus"></i>Not set up yet</span></dd>
        </dl>
        <div className="ax-muted" style={{fontSize:"var(--text-xs)",marginTop:"var(--space-2)"}}>First class — not set up yet · Add later in Settings.</div>
      </div>
      <div>
        <div style={{fontSize:"var(--text-sm)",fontWeight:"var(--weight-medium)",marginBottom:"var(--space-2)"}}>Your join code</div>
        <div className="codebox"><span className="cv">{TENANT_CODE}</span>
          <button className="icon-btn" onClick={onCopy} aria-label="Copy join code"><i data-lucide={copied?"check":"copy"}></i></button></div>
        <div className="ax-muted" style={{fontSize:"var(--text-xs)",marginTop:"var(--space-2)"}}>Staff and students enter this code on the sign-in screen to join {TENANT}.</div>
        <div aria-live="polite" className="ax-sr">{copied?"Join code copied":""}</div>
      </div>
      <div className="expander">
        <div className="eh" onClick={()=>setInviteOpen(!inviteOpen)} role="button" aria-expanded={inviteOpen}>
          <i data-lucide="user-plus" style={{width:16,height:16,marginLeft:0}}></i>Invite teachers now
          <i data-lucide={inviteOpen?"chevron-up":"chevron-down"}></i></div>
        {inviteOpen && <div className="eb">
          <div className="frow"><Field label="Name" placeholder="e.g. Ravi Menon"/><Field label="Email" type="email" placeholder="teacher@northwood.edu"/></div>
          <div style={{display:"flex",gap:"var(--space-2)"}}>
            <button className="btn btn--secondary"><i data-lucide="mail"></i>Send invite</button>
            <button className="btn btn--ghost">Skip — share the code instead</button></div>
        </div>}
      </div>
      <button className="btn btn--spark" style={{justifyContent:"center"}} data-go="#/"><i data-lucide="arrow-right"></i>Go to dashboard</button>
    </div></div>;
  }

  function SkipDialog({onCancel,onConfirm}){
    return <div className="scrim" role="dialog" aria-modal="true" aria-labelledby="skd-h">
      <div className="dlg">
        <div className="dh" id="skd-h">Finish without a class?</div>
        <div className="db">You can add classes later in Management, but you'll need at least one before enrolling students.</div>
        <div className="df"><button className="btn btn--ghost" onClick={onCancel}>Cancel</button>
          <button className="btn btn--primary" onClick={onConfirm}>Finish anyway</button></div>
      </div>
    </div>;
  }

  // resume state: School + Branding already completed; opens at Academic session
  const [step,setStep]=React.useState(2);
  const [completed,setCompleted]=React.useState([0,1]);
  const [saving,setSaving]=React.useState(false);
  const [done,setDone]=React.useState(false);
  const [copied,setCopied]=React.useState(false);
  const [inviteOpen,setInviteOpen]=React.useState(false);
  const [askSkip,setAskSkip]=React.useState(false);
  const errors={};

  const titles=[
    {h:"School information",d:"Confirm how your academy is identified across the platform."},
    {h:"Branding",d:"Add your logo and colors. These appear to your students and parents."},
    {h:"Academic session",d:"Create your current school year. Students, classes, and exams are organized under it."},
    {h:"Create your first class",d:"One class is enough to start enrolling students."},
  ];
  const isLast=step===3;

  function advance(){
    setSaving(true);
    setTimeout(()=>{ // simulates server-confirmed append to completedSteps, then advance
      setSaving(false);
      setCompleted(c=>c.includes(step)?c:[...c,step]);
      if(isLast){ setDone(true); } else { setStep(step+1); }
    },900);
  }
  function onContinue(){ if(isLast){ setAskSkip(false); advance(); } else advance(); }
  function onBack(){ if(step>0) setStep(step-1); }
  function onSkip(){ if(isLast){ setAskSkip(true); return; } setStep(step+1); }
  function onCopy(){ setCopied(true); setTimeout(()=>setCopied(false),2000); }

  if(done) return (<div className="vw-onboarding">
    <div className="ow-col">
      <div className="ow-hero"><h1 className="ow-h1">Welcome to {TENANT}</h1></div>
      <Stepper current={3} completed={[0,1,2,3]}/>
      <Done copied={copied} onCopy={onCopy} inviteOpen={inviteOpen} setInviteOpen={setInviteOpen}/>
      <div className="smallprint">You can change all of this later in Settings.</div>
    </div>
  </div>);

  return (<div className="vw-onboarding">
    <div className="ow-col">
      <div className="ow-hero">
        <h1 className="ow-h1">Welcome to {TENANT}</h1>
        <div className="ow-sub">Let's get your academy set up — a few minutes, and you can change everything later.</div>
      </div>

      {/* RESUME state banner — completedSteps non-empty, not yet complete */}
      <div className="alert info" role="status"><i data-lucide="history" className="lead"></i>
        <div className="ab">Picking up where you left off.</div></div>

      <Stepper current={step} completed={completed}/>

      <div className="ow-card" aria-busy={saving?"true":undefined}>
        {saving && <div className="ovl" role="status"><div className="spinner"></div>
          <span className="ax-sec" style={{fontSize:"var(--text-sm)"}}>Saving…</span></div>}
        <div className="ow-ch"><h2>{titles[step].h}</h2><div className="desc">{titles[step].d}</div></div>
        <div className="ow-cc">
          {step===0 && <StepSchool errors={errors}/>}
          {step===1 && <StepBranding/>}
          {step===2 && <StepSession errors={errors}/>}
          {step===3 && <StepClass errors={errors}/>}
        </div>
        <div className="ow-cf">
          <button className="btn btn--ghost" onClick={onBack} disabled={step===0||saving}><i data-lucide="arrow-left"></i>Back</button>
          <div className="sp"></div>
          {step>0 && <button className="btn btn--secondary" onClick={onSkip} disabled={saving}>{isLast?"Skip":"Skip for now"}</button>}
          <button className="btn btn--primary" onClick={onContinue} disabled={saving}>
            {isLast?"Finish setup":"Continue"}<i data-lucide={isLast?"check":"chevron-right"}></i></button>
        </div>
      </div>

      <div className="smallprint">You can change all of this later in Settings.</div>

      {/* ──────────── Additional spec'd states (rendered as labelled examples) ──────────── */}
      <div className="example-lbl">Other states</div>

      {/* ERROR — callable rejected (VALIDATION_ERROR): banner + per-field errors */}
      <div className="ow-card">
        <div className="ow-ch"><h2 style={{fontSize:"var(--text-lg)"}}>School information</h2>
          <div className="desc">Error state · save rejected</div></div>
        <div className="ow-cc">
          <div className="alert error" role="alert"><i data-lucide="alert-triangle" className="lead"></i>
            <div className="ab"><span className="at">We couldn't save this step. </span>
              Check the highlighted fields and try again.</div></div>
          <Field label="School name" req defaultValue="" placeholder="e.g. Springfield Academy" error="Enter a school name."/>
          <Field label="Contact email" req defaultValue="admin@" error="Enter a valid contact email."/>
        </div>
      </div>

      {/* QUOTA / SUSPENDED governance banners */}
      <div className="alert warn"><i data-lucide="gauge" className="lead"></i><div className="ab">
        <span className="at">Class limit reached on the Starter plan. </span>
        Upgrade to add more classes, or continue without one for now.</div></div>
      <div className="alert error"><i data-lucide="shield-alert" className="lead"></i><div className="ab">
        <span className="at">This academy is currently suspended. </span>
        Contact your platform administrator before continuing setup.</div></div>

      {/* SUPER-ADMIN cross-tenant audited banner (tenant isolation) */}
      <div className="alert info"><i data-lucide="user-cog" className="lead"></i><div className="ab">
        You're editing {TENANT}'s onboarding as a super-admin. Changes are audited.</div></div>

      {/* LOADING skeleton — initial tenant subscription resolving */}
      <div className="ow-card">
        <div className="ow-ch"><div className="skel" style={{height:20,width:"40%"}}></div>
          <div className="skel" style={{height:13,width:"60%",marginTop:8}}></div></div>
        <div className="ow-cc">
          <div className="skel" style={{height:38}}></div>
          <div className="skel" style={{height:38}}></div>
          <div className="skel" style={{height:38,width:"60%"}}></div>
        </div>
      </div>

      {/* ALREADY-COMPLETE terminal (primary, not spark — celebration spent) */}
      <div className="ow-card"><div className="ow-cc" style={{flexDirection:"row",alignItems:"center",gap:"var(--space-4)"}}>
        <span className="badge suc"><i data-lucide="check-circle"></i>Set up</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:"var(--weight-semibold)"}}>Your academy is set up.</div>
          <div className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Join code <span className="ax-mono">{TENANT_CODE}</span></div></div>
        <button className="btn btn--primary" data-go="#/"><i data-lucide="arrow-right"></i>Go to dashboard</button>
      </div></div>
    </div>

    {askSkip && <SkipDialog onCancel={()=>setAskSkip(false)} onConfirm={()=>{setAskSkip(false);advance();}}/>}
  </div>);
}

              <td><div className="chip-row">{r.children.map(c=><span className="chip" key={c}>{c}</span>)}</div></td>
              <td><StatusBadge status={r.status}/></td>
              <td className="relpos" style={{textAlign:"right"}}>
                <button className="icon-btn" aria-label={"Actions for "+r.name} onClick={()=>setMenuId(menuId===r.id?null:r.id)}><i data-lucide="more-horizontal"></i></button>
                {menuId===r.id && <RowMenu role="parents" status={r.status}/>}
              </td>
            </tr>))}
        </tbody>
      </table>
    </div>

    {/* Pagination */}
    <div className="pag">
      <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Showing <span className="ax-mono">1–25</span> of <span className="ax-mono">{meta.count}</span> {meta.label.toLowerCase()}</span>
      <div className="nums">
        <button className="pg" aria-label="Previous page"><i data-lucide="chevron-left" style={{width:14,height:14}}></i></button>
        <button className="pg on" aria-current="page">1</button>
        <button className="pg">2</button>
        <button className="pg">3</button>
        <button className="pg" aria-label="Next page"><i data-lucide="chevron-right" style={{width:14,height:14}}></i></button>
      </div>
      <button className="tb-sel">Rows: 25<i data-lucide="chevron-down"></i></button>
    </div>

    {/* Floating bulk action bar — appears when ≥1 row selected; destructive = confirm-then-commit */}
    {selCount>0 &&
      <div className="bulkbar" role="region" aria-live="polite" aria-label={selCount+" selected"}>
        <span className="bn">{selCount} selected</span>
        <span className="sepl"></span>
        <Button variant="danger" size="sm" leadingIcon="archive" onClick={()=>setConfirmOpen(true)}>Archive</Button>
        <Button variant="secondary" size="sm" leadingIcon="undo-2">Reactivate</Button>
        <button className="icon-btn" aria-label="Clear selection" onClick={()=>setSel({})}><i data-lucide="x"></i></button>
      </div>}

    {/* ===== Secondary stacked examples: the spec's other distinctive §5 states ===== */}
    <div className="sec-label" style={{marginTop:"var(--space-4)"}}><i data-lucide="layers-2"></i>Other states (reference)</div>

    {/* Partial import result Banner (§5 Partial) */}
    <div className="alert info" role="status">
      <i data-lucide="info" className="lead"></i>
      <div className="ab"><span className="at">Import complete — 284 imported · 12 skipped · 4 errors. </span>
        <span className="ax-sec">Successful rows were committed; failed rows were not.</span></div>
      <span className="lnk">View details →</span>
    </div>

    {/* Stale-claims propagation note (§5 / §8 rule 5) */}
    <div className="alert info" role="status">
      <i data-lucide="clock" className="lead"></i>
      <div className="ab"><span className="at">Class reassignment saved. </span>
        <span className="ax-sec">Access changes may take a moment to propagate as membership claims re-sync.</span></div>
    </div>

    {/* List-load error (§5 Error) */}
    <div className="alert err" role="alert">
      <i data-lucide="alert-octagon" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load students. </span>
        <span className="ax-sec">The directory service timed out. Your selection is preserved.</span></div>
      <span className="lnk">Retry →</span>
    </div>

    {/* Tenant-suspended read-only banner (§5 / §8 rule 8) */}
    <div className="alert warn" role="status">
      <i data-lucide="lock" className="lead"></i>
      <div className="ab"><span className="at">This academy is suspended. </span>
        <span className="ax-sec">User management is read-only until it's reactivated.</span></div>
    </div>

    {/* Permission-gated (staff.canManageUsers = false → actions hidden, not just disabled) */}
    <div className="alert info" role="status">
      <i data-lucide="eye" className="lead"></i>
      <div className="ab"><span className="at">You have view-only access to users. </span>
        <span className="ax-sec">Add, Import, Edit, Assign, Link, and bulk actions are hidden for your role.</span></div>
    </div>

    {/* Loading skeleton row example */}
    <div className="tbl-wrap" aria-busy="true" aria-label="Loading users">
      <table className="tbl"><tbody>
        {[0,1,2].map(i=>(
          <tr key={i}>
            <td style={{width:40}}><div className="skl" style={{width:16,height:16,borderRadius:"var(--radius-sm)"}}></div></td>
            <td><div className="cell-name"><div className="skl" style={{width:30,height:30,borderRadius:"var(--radius-pill)"}}></div><div className="skl" style={{width:160,height:12}}></div></div></td>
            <td><div className="skl" style={{width:120,height:12}}></div></td>
            <td><div className="skl" style={{width:80,height:12}}></div></td>
            <td><div className="skl" style={{width:48,height:12}}></div></td>
            <td><div className="skl" style={{width:64,height:18,borderRadius:"var(--radius-pill)"}}></div></td>
            <td></td>
          </tr>))}
      </tbody></table>
    </div>

    {/* Filtered-empty (distinct from true-empty; no onboarding CTA) */}
    <div className="panel"><div className="empty">
      <div className="ei"><i data-lucide="search-x"></i></div>
      <div className="et">No teachers match your filters</div>
      <div className="eb">Try a different search or clear your filters to see everyone.</div>
      <div className="ea"><Button variant="ghost" leadingIcon="x">Clear filters</Button></div>
    </div></div>

    {/* True-empty onboarding (§5 / §7) */}
    <div className="panel"><div className="empty">
      <div className="ei"><i data-lucide="user-plus"></i></div>
      <div className="et">No teachers yet</div>
      <div className="eb">Add your first teacher, or import a roster from CSV.</div>
      <div className="ea">
        <Button variant="primary" leadingIcon="plus">Add teacher</Button>
        <Button variant="secondary" leadingIcon="upload">Import CSV</Button>
      </div>
    </div></div>

    {/* ===== Create-user Modal (fields adapt by role; credentials NEVER rendered) ===== */}
    {createOpen && <React.Fragment>
      <div className="overlay" onClick={()=>setCreateOpen(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label={addLabel}>
        <div className="box">
          <div className="mh"><div><div className="mt">{addLabel}</div>
            <div className="ms">A welcome email with sign-in instructions is sent automatically.</div></div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setCreateOpen(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="g2">
              <div className="field"><label className="fl">Full name <span className="req">*</span></label><input placeholder="e.g. Arjun Rao"/></div>
              <div className="field bad"><label className="fl">Email <span className="req">*</span></label><input defaultValue="a.rao@northwood.edu"/>
                <div className="fe"><i data-lucide="alert-circle"></i>That email is already in use in this academy.</div></div>
            </div>
            {tab==="teachers" && <div className="g2">
              <div className="field"><label className="fl">Designation</label><select><option>Teacher</option><option>Senior Teacher</option><option>HOD</option></select></div>
              <div className="field"><label className="fl">Primary subject</label><select><option>Mathematics</option><option>Physics</option><option>Biology</option></select></div>
            </div>}
            {tab==="students" && <div className="g2">
              <div className="field"><label className="fl">Roll number <span className="req">*</span></label><input placeholder="NWA-2256"/>
                <div className="fh">A synthetic sign-in is generated for roll-number students.</div></div>
              <div className="field"><label className="fl">Class</label><select><option>8A</option><option>8C</option><option>7B</option></select></div>
            </div>}
            {tab==="parents" && <div className="field"><label className="fl">Link to child</label><select><option>Leah Fernandes</option><option>Omar Haddad</option></select></div>}
            <div className="alert info" role="note"><i data-lucide="shield" className="lead"></i>
              <div className="ab"><span className="ax-sec">Passwords are never shown here. The server delivers any temporary credential through a short-lived, out-of-band link.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setCreateOpen(false)}>Cancel</Button>
            <Button variant="primary" leadingIcon="check">Create {meta.singular}</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

    {/* ===== Two-phase CSV Import Dialog (FileDrop → dry-run validation) ===== */}
    {importOpen && <React.Fragment>
      <div className="overlay" onClick={()=>setImportOpen(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label={"Import "+meta.label.toLowerCase()}>
        <div className="box">
          <div className="mh"><div><div className="mt">Import {meta.label.toLowerCase()}</div>
            <div className="ms">Required columns: name, email{tab==="students"?", roll_number, class":""}. We validate before importing.</div></div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setImportOpen(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="filedrop"><i data-lucide="file-up"></i>
              <div className="ft">Drop a .csv file or browse</div>
              <div className="fhi">roster_2026.csv · 312 rows detected</div></div>
            <div className="alert warn" role="status"><i data-lucide="alert-triangle" className="lead"></i>
              <div className="ab"><span className="at">300 valid · 12 rows have errors. </span>
                <span className="ax-sec">Fix them in your CSV, or import the valid rows only.</span></div></div>
            <div className="tbl-wrap"><table className="tbl"><thead><tr><th>Row</th><th>Field</th><th>Message</th></tr></thead>
              <tbody>
                <tr><td className="ax-mono">14</td><td>email</td><td className="ax-sec">Duplicate of an existing student</td></tr>
                <tr><td className="ax-mono">29</td><td>roll_number</td><td className="ax-sec">Missing required value</td></tr>
                <tr><td className="ax-mono">57</td><td>class</td><td className="ax-sec">Class "9Z" not found in this academy</td></tr>
              </tbody></table></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setImportOpen(false)}>Cancel</Button>
            <Button variant="primary" leadingIcon="upload">Import 300 valid rows</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

    {/* ===== ConfirmDialog — bulk archive (never optimistic; explicit consequence copy) ===== */}
    {confirmOpen && <React.Fragment>
      <div className="overlay" onClick={()=>setConfirmOpen(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label="Archive selected">
        <div className="box" style={{maxWidth:440}}>
          <div className="mh"><div><div className="mt">Archive {selCount} {meta.singular}{selCount>1?"s":""}?</div></div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setConfirmOpen(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="alert warn" role="note"><i data-lucide="archive" className="lead"></i>
              <div className="ab"><span className="ax-sec">Archived {meta.singular}s are hidden from active views and lose portal access. You can reactivate them later. This action is logged.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setConfirmOpen(false)}>Cancel</Button>
            <Button variant="danger" leadingIcon="archive" onClick={()=>{setConfirmOpen(false);setSel({});}}>Archive {selCount}</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

  </div>);
}

function View_ParentLinking(){
  const Button = L.Button || (({children,variant,leadingIcon})=> <button className={"btn btn--"+(variant||"primary")}>{leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}</button>);

  /* ---- sample data (server-authoritative; render-only) ---- */
  const STUDENTS = [
    {id:"s1",name:"Maya Rao",cls:"Class 8-A",roll:"14"},
    {id:"s2",name:"Arjun Rao",cls:"Class 6-B",roll:"09"},
    {id:"s3",name:"Ishaan Rao",cls:"Class 4-A",roll:"22"},
    {id:"s4",name:"Diya Mehta",cls:"Class 8-A",roll:"07"},
    {id:"s5",name:"Kabir Shah",cls:"Class 7-C",roll:"31"},
    {id:"s6",name:"Aanya Verma",cls:"Class 5-B",roll:"18"},
  ];
  const PARENTS = [
    {id:"p1",name:"Asha Rao",email:"asha.rao@email.com",status:"active",children:["s1","s2","s3"]},
    {id:"p2",name:"Junaid Khan",email:"junaid.khan@email.com",status:"active",children:[]},
    {id:"p3",name:"Priya Mehta",email:"priya.mehta@email.com",status:"active",children:["s4"]},
    {id:"p4",name:"Vikram Shah",email:"vikram.shah@email.com",status:"archived",children:["s5"]},
  ];
  const init = (n)=> n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const sName = (id)=> (STUDENTS.find(s=>s.id===id)||{}).name||"—";

  function Drawer({parent, onClose}){
    const linkedIds = parent.children;
    const [staged, setStaged] = React.useState({add:[], remove:[]}); // arrays of student ids
    const [q, setQ] = React.useState("");
    const [confirm, setConfirm] = React.useState(false);
    const [committing, setCommitting] = React.useState(false);

    const effLinked = linkedIds.filter(id=>!staged.remove.includes(id));
    const isRem = (id)=> staged.remove.includes(id);
    const addChild = (id)=> setStaged(s=>({...s, add:[...s.add, id]}));
    const toggleRemove = (id)=> setStaged(s=> s.remove.includes(id)
      ? {...s, remove:s.remove.filter(x=>x!==id)} : {...s, remove:[...s.remove, id]});
    const undoAdd = (id)=> setStaged(s=>({...s, add:s.add.filter(x=>x!==id)}));

    const stagedCount = staged.add.length + staged.remove.length;
    const excluded = new Set([...linkedIds, ...staged.add]);
    const results = STUDENTS.filter(s=> s.name.toLowerCase().includes(q.toLowerCase()) || s.roll.includes(q));

    return (<>
      <div className="scrim" onClick={onClose}></div>
      <aside className="drw" role="dialog" aria-modal="true" aria-labelledby="drw-title" aria-describedby="drw-scope">
        <div className="drw-h">
          <div className="top">
            <div style={{flex:1}}>
              <div id="drw-title" className="tt">Link children to {parent.name}</div>
              <div className="ss">{parent.email}</div>
            </div>
            <button className="iconbtn" aria-label="Close" onClick={onClose}><i data-lucide="x"></i></button>
          </div>
          <div id="drw-scope" className="ial inf">
            <i data-lucide="shield" className="lead"></i>
            <div className="ab"><span className="at">Guardian access scope. </span>
              Linked parents can view these children's progress, exam results, and attendance in the parent portal. They cannot see other students.</div>
          </div>
        </div>
        <div className="drw-b">
          <div className="drw-sec">
            <div className="sh">Currently linked ({effLinked.length})</div>
            {linkedIds.length===0 && staged.add.length===0 && (
              <div className="empty" style={{padding:"var(--space-6)"}}>
                <div className="ec"><i data-lucide="users-round"></i></div>
                <div className="eb">No children linked. Search below to add one.</div>
              </div>)}
            {linkedIds.map(id=>{ const s=STUDENTS.find(x=>x.id===id); return (
              <div className={"lrow"+(isRem(id)?" rem":"")} key={id}>
                <div className="av">{init(s.name)}</div>
                <div className="meta"><div className="nn">{s.name}</div><div className="mm">{s.cls} · Roll {s.roll}</div></div>
                {isRem(id)
                  ? (<><span className="tag rem"><i data-lucide="minus"></i>to remove</span>
                      <button className="btn ghost" onClick={()=>toggleRemove(id)}>Undo</button></>)
                  : <button className="btn dghost" onClick={()=>toggleRemove(id)}><i data-lucide="link-2-off"></i>Unlink</button>}
              </div>); })}
            {staged.add.map(id=>{ const s=STUDENTS.find(x=>x.id===id); return (
              <div className="lrow add" key={id}>
                <div className="av">{init(s.name)}</div>
                <div className="meta"><div className="nn">{s.name}</div><div className="mm">{s.cls} · Roll {s.roll}</div></div>
                <span className="tag add"><i data-lucide="check"></i>to add</span>
                <button className="btn ghost" onClick={()=>undoAdd(id)}>Undo</button>
              </div>); })}
          </div>

          <div className="drw-sec">
            <div className="sh">Add a child</div>
            <div className="combo">
              <div className="combo-in" role="combobox" aria-expanded="true" aria-controls="cl-list">
                <i data-lucide="search"></i>
                <input placeholder="Search students by name or roll number" value={q} onChange={e=>setQ(e.target.value)} aria-label="Search students"/>
              </div>
              <div className="combo-list" id="cl-list" role="listbox">
                {results.length===0 && <div className="cres dis" style={{cursor:"default"}}>
                  <div className="meta" style={{flex:1}}><div className="mm">No students match "{q}". Check the Students tab.</div></div></div>}
                {results.map(s=>{ const dis = excluded.has(s.id); return (
                  <div className={"cres"+(dis?" dis":"")} key={s.id} role="option" aria-disabled={dis}
                       onClick={()=>!dis&&addChild(s.id)}>
                    <div className="av">{init(s.name)}</div>
                    <div className="meta" style={{flex:1}}><div className="nn">{s.name}</div><div className="mm">{s.cls} · Roll {s.roll}</div></div>
                    {dis ? <span className="badge inf"><i data-lucide="link"></i>Linked</span>
                         : <button className="btn sec" style={{padding:"4px 12px"}} onClick={()=>addChild(s.id)}>Add</button>}
                  </div>); })}
              </div>
            </div>
          </div>

          {stagedCount>0 && (
            <div className="ial inf" role="status" aria-live="polite">
              <i data-lucide="git-compare" className="lead"></i>
              <div className="ab">Pending changes: {staged.add.length} to add · {staged.remove.length} to remove</div>
            </div>)}
        </div>
        <div className="drw-f">
          {committing && <div className="overlay-mini"><i data-lucide="loader-circle" style={{width:22,height:22,color:"var(--brand-primary)"}}></i></div>}
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          <div className="sp"></div>
          <button className="btn pri" disabled={stagedCount===0} onClick={()=>setConfirm(true)}>
            Review &amp; confirm<i data-lucide="arrow-right"></i></button>
        </div>
      </aside>

      {confirm && (<>
        <div className="mscrim" onClick={()=>setConfirm(false)}></div>
        <div className="modal" role="dialog" aria-modal="true" aria-labelledby="cf-title">
          <div className="mh"><div className="ic"><i data-lucide="shield-question"></i></div>
            <div id="cf-title" className="mt">Confirm guardian links</div></div>
          <div className="mb">
            You're about to update guardian access for <b style={{color:"var(--text-primary)"}}>{parent.name}</b>. Linked guardians can view these children's progress and results.
            <div className="deltas">
              {staged.add.map(id=> <div className="dl a" key={id}><i data-lucide="plus"></i>Grant access to {sName(id)}</div>)}
              {staged.remove.map(id=> <div className="dl r" key={id}><i data-lucide="minus"></i>Remove access to {sName(id)}</div>)}
            </div>
            Unlink takes effect immediately server-side; a removed guardian is signed out and loses access. Continue?
          </div>
          <div className="mf">
            <button className="btn sec" onClick={()=>setConfirm(false)}>Go back</button>
            <button className="btn pri" onClick={()=>{setConfirm(false);setCommitting(true);setTimeout(onClose,650);}}>Confirm links</button>
          </div>
        </div>
      </>)}
    </>);
  }

  const [drawer, setDrawer] = React.useState(null); // parent object or null

  const linkedCount = PARENTS.filter(p=>p.children.length>0).length;
  const unlinkedCount = PARENTS.length - linkedCount;

  return (
    <div className="vw-parentlinking">
      <div className="ax-head">
        <div className="tx"><h1 className="ax-h1">Users</h1>
          <div className="ax-sub">Manage teachers, students, and parents in Northwood Academy <span className="ax-mono ax-muted">· NWA-0421</span></div></div>
        <div className="ac">
          <button className="btn sec"><i data-lucide="upload"></i>Import CSV</button>
          <button className="btn pri" data-go="#/users/parents/link" style={{cursor:'pointer'}} onClick={()=>setDrawer({id:"new",name:"new parent",email:"invite-then-link",status:"active",children:[]})}>
            <i data-lucide="user-plus"></i>Invite parent</button>
        </div>
      </div>

      {/* Parent portal feature-flag hint (§8.7) — icon + label, not color-only */}
      <div className="ial warn" role="status">
        <i data-lucide="triangle-alert" className="lead"></i>
        <div className="ab"><span className="at">Parent portal is on for this tenant. </span>
          <span className="ax-sec">Links grant parent-portal access as soon as claims re-sync (up to 1 hour).</span></div>
        <button className="lnk" data-go="#/settings" style={{cursor:'pointer'}}>Open Settings →</button>
      </div>

      <div className="ptabs" role="tablist">
        <div className="ptab" role="tab">Teachers<span className="ct">18</span></div>
        <div className="ptab" role="tab">Students<span className="ct">142</span></div>
        <div className="ptab on" role="tab" aria-selected="true">Parents<span className="ct">96</span></div>
      </div>

      <div className="toolbar">
        <div className="tb-search"><i data-lucide="search"></i>
          <input placeholder="Search parents by name, email, or phone" aria-label="Search parents"/></div>
        <div className="tb-sel"><i data-lucide="circle-dot"></i>Status: All<i data-lucide="chevron-down"></i></div>
        <div className="tb-sel"><i data-lucide="link"></i>Linked? All<i data-lucide="chevron-down"></i></div>
        <div className="tb-stat">
          <div className="statpill"><span className="l">Linked</span><span className="v">{linkedCount}</span></div>
          <div className="statpill"><span className="l">Not linked</span><span className="v">{unlinkedCount}</span></div>
        </div>
      </div>

      {/* Primary state — the Parents DataTable */}
      <div className="panel">
        <table className="ptbl">
          <thead><tr><th>Name</th><th>Linked children</th><th>Status</th><th style={{textAlign:"right"}}>Actions</th></tr></thead>
          <tbody>
            {PARENTS.map(p=>{
              const shown = p.children.slice(0,2), extra = p.children.length-shown.length;
              return <tr className="lk" key={p.id}>
                <td><div className="pname"><div className="av">{init(p.name)}</div>
                  <div><div className="nn">{p.name}</div><div className="em">{p.email}</div></div></div></td>
                <td>
                  {p.children.length===0
                    ? <span className="badge neu"><i data-lucide="circle-dashed"></i>Not linked</span>
                    : <button className="cellbtn" onClick={()=>setDrawer(p)} aria-label={"Manage links for "+p.name}>
                        {shown.map(id=>{ const s=STUDENTS.find(x=>x.id===id); return (
                          <span className="rchip" key={id}><span className="ca">{init(s.name)}</span>{s.name}</span>); })}
                        {extra>0 && <span className="rchip more">+{extra}</span>}
                      </button>}
                </td>
                <td>{p.status==="active"
                  ? <span className="badge suc"><i data-lucide="check"></i>Active</span>
                  : <span className="badge neu"><i data-lucide="archive"></i>Archived</span>}</td>
                <td style={{textAlign:"right"}}>
                  <div className="ax-row" style={{justifyContent:"flex-end"}}>
                    <button className="iconbtn" aria-label={"Manage links for "+p.name} onClick={()=>setDrawer(p)}><i data-lucide="link"></i></button>
                    <button className="iconbtn" aria-label="More actions"><i data-lucide="ellipsis-vertical"></i></button>
                  </div>
                </td>
              </tr>;
            })}
          </tbody>
        </table>
        <div className="pag"><span>Showing 1–4 of 96 parents</span><div className="sp"></div>

        <div className="panel" style={{padding:"var(--space-5)"}}>
          <div className="gatebox">
            <div className="ax-row" style={{gap:"var(--space-3)",alignItems:"flex-start"}}>
              <div style={{width:36,height:36,borderRadius:"var(--radius-pill)",background:"var(--bg-inset)",display:"grid",placeItems:"center",flex:"none",color:"var(--text-muted)"}}><i data-lucide="lock"></i></div>

            </div>
          </div>
        </div>
      </div>

      {drawer && <Drawer parent={drawer} onClose={()=>setDrawer(null)}/>}
    </div>
  );
}

        <button className="btn btn--primary" disabled={!name||!grade} onClick={close}>
          {dialog.kind==="create"?"Create":"Save Changes"}</button></div>
    </div>}

    {dialog && (dialog.kind==="teachers"||dialog.kind==="students") && <div className="modal" role="dialog" aria-modal="true" aria-label={dialog.kind==="teachers"?"Assign Teachers":"Assign Students"}>
      <div className="mh"><div className="mt">{dialog.kind==="teachers"?"Assign Teachers":"Assign Students"}</div>
        <div className="md">{dialog.kind==="teachers"

      <div className="mb">
        {dialog.kind==="teachers"
          ? <EntityPicker items={TEACHERS} selected={picked} onToggle={id=>setPicked(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id])} searchPlaceholder="Search teachers…"/>
          : <div className="picker"><div className="ps"><i data-lucide="search"></i><input placeholder="Search students…" aria-label="Search students"/></div>

        <div className="selchips">{dialog.kind==="teachers" && picked.map(id=>{const t=TEACHERS.find(x=>x.id===id);return t&&<span className="chip" key={id}>{t.name} <i data-lucide="x"></i></span>;})}</div>
      </div>
      <div className="mf"><button className="btn btn--ghost" onClick={close}>Cancel</button>
        <button className="btn btn--primary" onClick={close}>Save</button></div>
    </div>}

    {dialog && dialog.kind==="archive" && <div className="modal" role="alertdialog" aria-modal="true" aria-label="Archive class">
      <div className="mh"><div className="mt">Archive class?</div></div>
      <div className="mb"><div className="ax-sec" style={{fontSize:"var(--text-sm)"}}>
        Archive "{dialog.row?dialog.row.name:""}"? It will be hidden from active views. You can restore it later.</div></div>
      <div className="mf"><button className="btn btn--ghost" onClick={close}>Cancel</button>
        <button className="btn btn--danger" onClick={()=>{setBusy(false);close();}}><i data-lucide="archive"></i>Archive</button></div>
    </div>}

    {dialog && (dialog.kind==="bulkArchive"||dialog.kind==="bulkActivate") && <div className="modal" role="alertdialog" aria-modal="true" aria-label="Bulk status change">
      <div className="mh"><div className="mt">{dialog.kind==="bulkArchive"?("Archive "+sel.length+" class(es)?"):("Activate "+sel.length+" class(es)?")}</div></div>
      <div className="mb"><div className="ax-sec" style={{fontSize:"var(--text-sm)"}}>
        {dialog.kind==="bulkArchive"?"Archived classes are hidden from active views.":"Activated classes reappear in active views."}</div>
        <div className="ax-muted" style={{fontSize:"var(--text-xs)"}}>This action is recorded in the tenant audit log.</div></div>
      <div className="mf"><button className="btn btn--ghost" onClick={close}>Cancel</button>
        {dialog.kind==="bulkArchive"
          ? <button className="btn btn--danger" onClick={()=>{setSel([]);close();}}><i data-lucide="archive"></i>Archive</button>
          : <button className="btn btn--primary" onClick={()=>{setSel([]);close();}}><i data-lucide="circle-check"></i>Activate</button>}</div>
    </div>}
  </div>);
}
