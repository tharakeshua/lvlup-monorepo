    if(status==="draft")return <span className="badge neut"><i data-lucide="pencil"></i>Draft</span>;
    return <span className="badge neut">{status}</span>;
  }

  /* ---- Students tab (select → bulk bar, row popover, pagination) ---- */
  function StudentsTab({archived,canManage,students,onRemove,pendingIds}){
    const [sel,setSel]=React.useState([]);
    const [menu,setMenu]=React.useState(null);
    const allOn=students.length>0&&sel.length===students.length;
    const toggle=id=>setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
    React.useEffect(()=>{const h=()=>setMenu(null);if(menu){document.addEventListener("click",h);return()=>document.removeEventListener("click",h);}},[menu]);
    if(students.length===0)return <EmptyStudents archived={archived} canManage={canManage}/>;
    return <div style={{position:"relative"}}>
      {sel.length>0 && <div className="bulkbar" role="region" aria-label="Bulk actions">
        <span className="bn">{sel.length} selected</span><div className="sp"></div>
        {canManage && !archived && <>
          <button className="bb"><i data-lucide="arrow-right-left"></i>Move…</button>
          <button className="bb dng" onClick={()=>{onRemove(sel);setSel([]);}}><i data-lucide="user-minus"></i>Remove</button>
        </>}
        <button className="bb" onClick={()=>setSel([])}><i data-lucide="x"></i>Clear</button>
      </div>}
      <table className="tbl"><caption className="ax-sr">Students enrolled in Grade 9 — Section A</caption>
        <thead><tr>
          <th className="col-chk"><input className="cbx" type="checkbox" aria-label="Select all students"
            checked={allOn} onChange={()=>setSel(allOn?[]:students.map(s=>s.id))} disabled={!canManage||archived}/></th>
          <th className="sortable" aria-sort="ascending"><span className="si">Name <i data-lucide="arrow-up"></i></span></th>
          <th>Roll Number</th><th>Grade</th><th>Status</th><th className="col-act"></th>
        </tr></thead>
        <tbody>{students.map(s=>(
          <tr key={s.id} className={(sel.includes(s.id)?"sel ":"")+(pendingIds.includes(s.id)?"pending":"")}>
            <td><input className="cbx" type="checkbox" aria-label={"Select "+s.name}
              checked={sel.includes(s.id)} onChange={()=>toggle(s.id)} disabled={!canManage||archived}/></td>
            <td><div className="nm-cell"><span className="av">{initials(s.name)}</span><span>{s.name}</span>
              {s.risk && <span className="badge warn"><i data-lucide="triangle-alert"></i>At risk</span>}
              {pendingIds.includes(s.id) && <span className="ax-muted" style={{fontSize:"var(--text-2xs)"}}>Saving…</span>}</div></td>
            <td className="ax-mono ax-sec">{s.roll}</td>
            <td className="ax-mono">{s.grade}</td>
            <td><StatusBadge status={s.status}/></td>
            <td className="col-act" style={{position:"relative"}}>
              <button className="icon-btn" aria-haspopup="menu" aria-label={"Actions for "+s.name}
                onClick={e=>{e.stopPropagation();setMenu(menu===s.id?null:s.id);}}><i data-lucide="ellipsis-vertical"></i></button>
              {menu===s.id && <div className="rowmenu" role="menu" onClick={e=>e.stopPropagation()}>
                <button role="menuitem"><i data-lucide="eye"></i>View profile</button>
                <button role="menuitem" disabled={!canManage||archived}><i data-lucide="arrow-right-left"></i>Move to class…</button>
                <div className="div"></div>
                <button role="menuitem" className="dng" disabled={!canManage||archived}
                  onClick={()=>{onRemove([s.id]);setMenu(null);}}><i data-lucide="user-minus"></i>Remove from class</button>
              </div>}
            </td>
          </tr>))}
        </tbody>
      </table>
      <div className="pgn"><span>Showing <span className="ax-mono">{students.length}</span> of <span className="ax-mono">28</span> students</span>
        <div className="sp"></div>
        <button aria-label="Previous page"><i data-lucide="chevron-left" style={{width:13,height:13}}></i></button>
        <button className="on" aria-current="page">1</button><button>2</button><button>3</button>
        <button aria-label="Next page"><i data-lucide="chevron-right" style={{width:13,height:13}}></i></button>
      </div>
    </div>;
  }
  function EmptyStudents({archived,canManage}){
    return <div className="empty"><div className="ic"><i data-lucide="users"></i></div>
      <div className="et">No students enrolled yet</div>
      <div className="eb">Add students to this class or import a roster from CSV.</div>
      {canManage && !archived && <div className="ax-row"><Button variant="primary" leadingIcon="user-plus">Add students</Button>
        <Button variant="secondary" leadingIcon="upload">Import CSV</Button></div>}
    </div>;
  }

  function TeachersTab(){
    return <table className="tbl"><caption className="ax-sr">Teachers assigned to this class</caption>
      <thead><tr><th>Name</th><th>Subjects</th><th>Designation</th><th>Status</th><th className="col-act"></th></tr></thead>
      <tbody>{TEACHERS.map(t=>(<tr key={t.id}>
        <td><div className="nm-cell"><span className="av">{initials(t.name)}</span><span>{t.name}</span></div></td>
        <td><div className="ax-row ax-wrap" style={{gap:"var(--space-1)"}}>{t.subjects.map(s=><span className="chip" key={s}>{s}</span>)}</div></td>
        <td className="ax-sec">{t.designation}</td>
        <td><StatusBadge status={t.status}/></td>
        <td className="col-act"><button className="icon-btn" aria-label={"Actions for "+t.name}><i data-lucide="ellipsis-vertical"></i></button></td>
      </tr>))}</tbody></table>;
  }
  function ExamsTab(){
    return <table className="tbl"><caption className="ax-sr">Exams linked to this class</caption>
      <thead><tr><th>Title</th><th>Subject</th><th>Date</th><th>Total Marks</th><th>Status</th></tr></thead>
      <tbody>{EXAMS.map((e,i)=>(<tr key={i}>
        <td>{e.title}</td><td className="ax-sec">{e.subject}</td><td className="ax-mono ax-sec">{e.date}</td>
        <td className="ax-mono">{e.marks}</td><td><StatusBadge status={e.status}/></td>
      </tr>))}</tbody></table>;
  }
  function SpacesTab(){
    return <table className="tbl"><caption className="ax-sr">Spaces linked to this class</caption>
      <thead><tr><th>Title</th><th>Type</th><th>Subject</th><th>Status</th></tr></thead>
      <tbody>{SPACES.map((s,i)=>(<tr key={i}>
        <td>{s.title}</td><td><span className="chip">{s.type}</span></td><td className="ax-sec">{s.subject}</td>
        <td><StatusBadge status={s.status}/></td>
      </tr>))}</tbody></table>;
  }

  /* ---- Settings tab (read ⇄ inline edit) ---- */
  function SettingsTab({archived,canManage,onToast}){
    const [edit,setEdit]=React.useState(false);
    if(edit) return <div style={{padding:"var(--space-5)",maxWidth:720}}>
      <div className="sec-title" style={{marginBottom:"var(--space-4)"}}>Class settings</div>
      <div className="ax-grid" style={{gridTemplateColumns:"1fr 1fr",gap:"var(--space-4)"}}>
        <div className="field" style={{gridColumn:"1 / -1"}}><label>Class name</label><input defaultValue="Grade 9 — Section A"/></div>
        <div className="field"><label>Grade</label><select defaultValue="9"><option>8</option><option>9</option><option>10</option></select></div>
        <div className="field"><label>Section</label><select defaultValue="A"><option>A</option><option>B</option><option>C</option></select></div>
        <div className="field"><label>Academic session</label><select defaultValue="2025–26"><option>2024–25</option><option>2025–26</option></select></div>
        <div className="field"><label>Status</label><select defaultValue="active"><option value="active">Active</option><option value="archived">Archived</option></select></div>
      </div>
      <div className="statelbl" style={{margin:"var(--space-5) 0 var(--space-3)"}}>Schedule</div>
      <div className="empty" style={{padding:"var(--space-8) var(--space-6)"}}><div className="ic"><i data-lucide="calendar-clock"></i></div>
        <div className="et" style={{fontSize:"var(--text-base)"}}>No schedule configured</div>
        <div className="eb">Add class timings to show them here.</div></div>
      <div className="ax-row" style={{justifyContent:"flex-end",marginTop:"var(--space-5)"}}>
        <Button variant="ghost" onClick={()=>setEdit(false)}>Cancel</Button>
        <Button variant="primary" leadingIcon="check" onClick={()=>{setEdit(false);onToast("Class settings updated.");}}>Save changes</Button>
      </div>
    </div>;
    return <div style={{padding:"var(--space-5)",maxWidth:720}}>
      <div className="ax-row" style={{justifyContent:"space-between",marginBottom:"var(--space-4)"}}>
        <div className="sec-title">Class settings</div>
        {canManage && <Button variant="secondary" size="sm" leadingIcon="pencil" disabled={archived}
          title={archived?"Restore the class to make changes":undefined} onClick={()=>setEdit(true)}>Edit</Button>}
      </div>
      <dl className="deflist">
        <dt>Class name</dt><dd>Grade 9 — Section A</dd>
        <dt>Grade</dt><dd className="ax-mono">9</dd>
        <dt>Section</dt><dd className="ax-mono">A</dd>
        <dt>Academic session</dt><dd>2025–26 Session</dd>
        <dt>Status</dt><dd>{archived?<span className="badge warn"><i data-lucide="archive"></i>Archived</span>:<span className="badge suc"><i data-lucide="check"></i>Active</span>}</dd>
        <dt>Schedule</dt><dd className="ax-muted">— Not configured</dd>
      </dl>
    </div>;
  }

  /* ---- Add students modal ---- */
  function AddStudentsModal({open,onClose,onConfirm}){
    const [picked,setPicked]=React.useState([]);
    React.useEffect(()=>{ if(open) setPicked([]); },[open]);
    if(!open) return null;
    const toggle=id=>setPicked(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
    return <>
      <div className="scrim" onClick={onClose}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby="add-t">
        <div className="box">
          <div className="mh"><div><div className="mt" id="add-t">Add students</div>
            <div className="md">Add students to Grade 9 — Section A. Their class access updates after they are saved.</div></div>
            <button className="icon-btn" style={{marginLeft:"auto"}} aria-label="Close" onClick={onClose}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="cbox"><div className="cf"><i data-lucide="search"></i><span>Search students not in this class…</span></div>
              {PICKER.map(p=>(<div key={p.id} className={"copt"+(picked.includes(p.id)?" on":"")} onClick={()=>toggle(p.id)}>
                <span className="av">{initials(p.name)}</span><div><div>{p.name}</div>
                  <div className="ax-muted ax-mono" style={{fontSize:"var(--text-2xs)"}}>{p.roll}</div></div>
                {picked.includes(p.id)&&<span className="rl"><i data-lucide="check"></i></span>}</div>))}
            </div>
            {picked.length>0 && <div className="selchips">{picked.map(id=>{const p=PICKER.find(x=>x.id===id);
              return <span className="chip" key={id} style={{background:"var(--brand-subtle)",borderColor:"var(--brand-primary)",color:"var(--brand-primary)"}}>{p.name}
                <i data-lucide="x" style={{width:12,height:12,cursor:"pointer"}} onClick={()=>toggle(id)}></i></span>;})}</div>}
            <div className="statelbl">or import a roster</div>
            <div className="filedrop"><i data-lucide="upload-cloud"></i><span>Drop a CSV file or click to browse</span>
              <span className="ax-muted" style={{fontSize:"var(--text-2xs)"}}>Name, Roll Number, Email · idempotent, batched</span></div>
          </div>
          <div className="mf"><Button variant="ghost" onClick={onClose}>Cancel</Button>
            <Button variant="primary" leadingIcon="user-plus" disabled={picked.length===0}
              onClick={()=>onConfirm(picked)}>Add {picked.length>0?picked.length+" ":""}students</Button></div>
        </div>
      </div>
    </>;
  }

  /* ---- Confirm archive ---- */
  function ArchiveModal({open,onClose,onConfirm}){
    if(!open) return null;
    return <>
      <div className="scrim" onClick={onClose}></div>
      <div className="modal" role="alertdialog" aria-modal="true" aria-labelledby="arc-t" aria-describedby="arc-b">
        <div className="box" style={{maxWidth:460}}>
          <div className="mh"><div className="danger-ic"><i data-lucide="archive"></i></div>
            <div><div className="mt" id="arc-t">Archive Grade 9 — Section A?</div>
              <div className="md" id="arc-b">Students and teachers stay assigned, but the class becomes read-only. This action is audit-logged. You can restore it later.</div></div></div>
          <div className="mf"><Button variant="ghost" onClick={onClose}>Cancel</Button>
            <Button variant="danger" leadingIcon="archive" onClick={onConfirm}>Archive class</Button></div>
        </div>
      </div>
    </>;
  }

  const KPI=({icon,label,value,hint})=>(
    <div className="card kpi"><div className="lh"><i data-lucide={icon}></i><span>{label}</span></div>
      <div className="vv">{value}</div>{hint&&<div className="hint">{hint}</div>}</div>);

  const [tab,setTab]=React.useState(0);
  const [archived,setArchived]=React.useState(false);
  const [addOpen,setAddOpen]=React.useState(false);
  const [archOpen,setArchOpen]=React.useState(false);
  const [students,setStudents]=React.useState(STUDENTS);
  const [pending,setPending]=React.useState([]);
  const [toast,setToast]=React.useState(null);
  const canManage=true; // tenantAdmin: full write. (staff w/o canManageUsers → controls hidden, see secondary block)

  const showToast=msg=>{ setToast(msg); setTimeout(()=>setToast(null),3200); };
  const addStudents=ids=>{
    const added=ids.map(id=>{const p=PICKER.find(x=>x.id===id);return {id,name:p.name,roll:p.roll,grade:"9",status:"active"};});
    setStudents(s=>[...added,...s]); setPending(ids); setAddOpen(false);
    setTimeout(()=>{ setPending([]); showToast("Added "+ids.length+" student"+(ids.length>1?"s":"")+" to Grade 9 — Section A."); },900);
  };
  const removeStudents=ids=>{ setStudents(s=>s.filter(x=>!ids.includes(x.id))); showToast("Removed "+ids.length+" student"+(ids.length>1?"s":"")+" from this class."); };

  const tabs=[
    {label:"Students",cnt:students.length},
    {label:"Teachers",cnt:TEACHERS.length},
    {label:"Exams",cnt:null},
    {label:"Spaces",cnt:null},
    {label:"Settings",cnt:null},
  ];

  return (
    <div className="vw-classdetail">
      {/* aria-live region for optimistic mutation results */}
      <div className="ax-sr" aria-live="polite">{toast||""}</div>

      {archived && <div className="alert warn" role="status">
        <i data-lucide="archive" className="lead"></i>
        <div className="ab"><span className="at">This class is archived. </span>
          <span className="ax-sec">Restore it to make changes. All write actions are disabled while archived.</span></div>
        <Button variant="primary" size="sm" leadingIcon="rotate-ccw" onClick={()=>{setArchived(false);showToast("Restored Grade 9 — Section A.");}}>Restore class</Button>
      </div>}

      {/* Header band */}
      <div className="ax-head">
        <div className="tx">
          <button className="ax-back" data-go="#/classes" style={{cursor:"pointer"}}><i data-lucide="chevron-left"></i>Back to Classes</button>
          <h1 className="ax-h1">Grade 9 — Section A
            {archived?<span className="badge warn"><i data-lucide="archive"></i>Archived</span>
                     :<span className="badge suc"><i data-lucide="check"></i>Active</span>}</h1>
          <div className="ax-sub">Grade 9 · Section A · 2025–26 Session · <span className="ax-mono ax-muted">CLS-09A-2526</span></div>
        </div>
        <div className="ac">
          {canManage && <Button variant="secondary" leadingIcon="pencil" disabled={archived}
            title={archived?"Restore the class to make changes":undefined} onClick={()=>setTab(4)}>Edit</Button>}
          {canManage && (archived
            ? <Button variant="primary" leadingIcon="rotate-ccw" onClick={()=>{setArchived(false);showToast("Restored Grade 9 — Section A.");}}>Restore class</Button>
            : <Button variant="danger" leadingIcon="archive" onClick={()=>setArchOpen(true)}>Archive class</Button>)}
        </div>
      </div>

      {/* KPI strip — server-authoritative counts (render-only) */}
      <div className="ax-grid ax-g4">
        <KPI icon="graduation-cap" label="Students" value={String(students.length===6?28:26+students.length-6)} hint="Server total · 28 enrolled"/>
        <KPI icon="users" label="Teachers" value="3"/>
        <KPI icon="file-check" label="Exams" value="5"/>
        <KPI icon="layers" label="Spaces" value="4"/>
      </div>

      {/* Tabs + active panel */}
      <div className="panel">
        <div role="tablist" aria-label="Class sections" className="tabs" style={{padding:"0 var(--space-2)"}}>
          {tabs.map((t,i)=>(<button key={t.label} role="tab" id={"tab-"+i} aria-controls={"panel-"+i}
            aria-selected={tab===i} className="tab" onClick={()=>setTab(i)}>
            {t.label}{t.cnt!=null&&<span className="cnt">{t.cnt}</span>}</button>))}
        </div>

        {tab===0 && <div role="tabpanel" id="panel-0" aria-labelledby="tab-0">
          <div className="toolbar">
            <label className="tb-search"><i data-lucide="search"></i>
              <input placeholder="Search students…" aria-label="Search students"/></label>
            <div className="sp" style={{flex:1}}></div>
            {canManage && !archived && <>
              <Button variant="primary" leadingIcon="user-plus" onClick={()=>setAddOpen(true)}>Add students</Button>
              <Button variant="secondary" leadingIcon="upload">Import CSV</Button></>}
          </div>
          <StudentsTab archived={archived} canManage={canManage} students={students} onRemove={removeStudents} pendingIds={pending}/>
        </div>}

        {tab===1 && <div role="tabpanel" id="panel-1" aria-labelledby="tab-1">
          <div className="toolbar"><div style={{flex:1}}></div>
            {canManage && !archived && <Button variant="primary" leadingIcon="user-plus">Assign teacher</Button>}</div>
          <TeachersTab/>
        </div>}

        {tab===2 && <div role="tabpanel" id="panel-2" aria-labelledby="tab-2"><ExamsTab/></div>}
        {tab===3 && <div role="tabpanel" id="panel-3" aria-labelledby="tab-3"><SpacesTab/></div>}
        {tab===4 && <div role="tabpanel" id="panel-4" aria-labelledby="tab-4">
          <SettingsTab archived={archived} canManage={canManage} onToast={showToast}/></div>}
      </div>

      {/* ───────────── Secondary state gallery (the spec's other §5 states) ───────────── */}
      <div className="statelbl">Other states (per spec §5)</div>
      <div className="sub-grid">
        {/* partial-load error scoped to a tab */}
        <div className="card" style={{padding:0}}>
          <div className="toolbar" style={{borderBottom:"1px solid var(--border-subtle)"}}><span className="sec-title" style={{fontSize:"var(--text-sm)"}}>Partial load</span></div>
          <div style={{padding:"var(--space-5)"}}><div className="alert err" role="alert">
            <i data-lucide="circle-alert" className="lead"></i>
            <div className="ab"><span className="at">Couldn't load teachers. </span><span className="ax-sec">Other panels are unaffected.</span></div>
            <Button variant="secondary" size="sm" leadingIcon="rotate-cw">Retry</Button></div>
          </div>
        </div>
        {/* empty: no exams */}
        <div className="card" style={{padding:0}}>
          <div className="toolbar" style={{borderBottom:"1px solid var(--border-subtle)"}}><span className="sec-title" style={{fontSize:"var(--text-sm)"}}>Empty · Exams</span></div>
          <div className="empty" style={{padding:"var(--space-8) var(--space-6)"}}><div className="ic"><i data-lucide="file-check"></i></div>
            <div className="et" style={{fontSize:"var(--text-base)"}}>No exams linked</div>
            <div className="eb">Exams created for this class will appear here.</div></div>
        </div>
        {/* loading skeleton */}
        <div className="card" style={{padding:0}}>
          <div className="toolbar" style={{borderBottom:"1px solid var(--border-subtle)"}}><span className="sec-title" style={{fontSize:"var(--text-sm)"}}>Loading</span></div>
          <div style={{padding:"var(--space-5)",display:"flex",flexDirection:"column",gap:"var(--space-3)"}}>
            <div className="sk" style={{height:14,width:"40%"}}></div>
            {[0,1,2].map(i=>(<div key={i} className="ax-row" style={{gap:"var(--space-3)"}}>
              <div className="sk" style={{width:30,height:30,borderRadius:"var(--radius-pill)"}}></div>
              <div className="sk" style={{height:12,flex:1}}></div>
              <div className="sk" style={{height:12,width:64}}></div></div>))}
          </div>
        </div>
        {/* RBAC: staff without canManageUsers — write controls hidden, read-only notice */}
        <div className="card" style={{padding:0}}>
          <div className="toolbar" style={{borderBottom:"1px solid var(--border-subtle)"}}><span className="sec-title" style={{fontSize:"var(--text-sm)"}}>RBAC · Staff (no roster permission)</span></div>
          <div style={{padding:"var(--space-5)"}}><div className="alert info" role="status" style={{borderColor:"var(--status-info)",background:"var(--status-info-subtle)"}}>
            <i data-lucide="lock" className="lead" style={{color:"var(--status-info)"}}></i>
            <div className="ab"><span className="at">View only. </span>
              <span className="ax-sec">You don't have permission to change the roster. Add / Remove / Import controls are hidden.</span></div></div>
          </div>
        </div>
      </div>

      <AddStudentsModal open={addOpen} onClose={()=>setAddOpen(false)} onConfirm={addStudents}/>
      <ArchiveModal open={archOpen} onClose={()=>setArchOpen(false)} onConfirm={()=>{setArchOpen(false);setArchived(true);showToast("Archived Grade 9 — Section A.");}}/>

      {toast && <div className="toast" role="status"><i data-lucide="check-circle"></i><span>{toast}</span></div>}
    </div>
  );
}

/* ---- Switch (role=switch, aria-checked, bound label) ---- */

/* ---- Staff & Permissions view body ---- */
function View_Staff(){
  const [tab,setTab] = React.useState("staff");
  const [query,setQuery] = React.useState("");
  const [staff,setStaff] = React.useState(View_Staff_staffSeed);
  const [teachers,setTeachers] = React.useState(View_Staff_teacherSeed);
  const [menu,setMenu] = React.useState(null);
  const [permFor,setPermFor] = React.useState(null);
  const [invite,setInvite] = React.useState(false);
  const [confirm,setConfirm] = React.useState(null);
  const [toast,setToast] = React.useState(null);
  React.useEffect(()=>{ if(toast){ const t=setTimeout(()=>setToast(null),2600); return ()=>clearTimeout(t);} }, [toast]);

  const fire = (msg)=> setToast(msg);
  const kind = tab==="teacher"?"teacher":"staff";
  const rows = tab==="teacher"?teachers:staff;
  const setRows = tab==="teacher"?setTeachers:setStaff;
  const q = query.trim().toLowerCase();
  const filtered = rows.filter(p=> !q || (p.first+" "+p.last).toLowerCase().includes(q) || p.email.toLowerCase().includes(q));
  const seatLimit = true; // tenant at staff-seat cap → Invite disabled + banner

  const savePerms = (draft)=>{ setRows(rs=>rs.map(r=>r.id===permFor.id?{...r,perms:draft}:r)); setPermFor(null); fire("Permissions updated"); };
  const doConfirm = ()=>{
    const {person,action}=confirm;
    if(action==="deactivate"){ setRows(rs=>rs.map(r=>r.id===person.id?{...r,status:"inactive"}:r)); fire(person.first+" "+person.last+" deactivated"); }
    else { setRows(rs=>rs.map(r=>r.id===person.id?{...r,status:"active"}:r)); fire(person.first+" "+person.last+" reactivated"); }
    setConfirm(null);
  };
  const onAction = (p,action)=>{ if(action==="copy"){ fire("Invite link copied"); } else { setConfirm({person:p,action}); } };
  const createStaff = (f)=>{
    setStaff(s=>[{id:"new"+Date.now(),first:f.first,last:f.last,email:f.email,dept:"Unassigned",status:"active",
      perms:{canViewAnalytics:true}},...s]);
    setInvite(false); fire("Staff member "+f.first+" "+f.last+" invited");
  };

  return (
    <div className="vw-staff">
      <div className="ax-head">
        <div className="tx">
          <h1 className="ax-h1">Staff &amp; Permissions</h1>
          <div className="ax-sub">Invite teachers and administrators and control what each person can do in your school.</div>
        </div>
      </div>

      {/* QuotaWarningBanner — staff-seat limit reached (icon + label, not color-only) */}
      {seatLimit && (
        <div className="alert" role="status">
          <i data-lucide="triangle-alert" className="lead"></i>
          <div className="ab"><span className="at">You've reached your plan's staff-seat limit. </span>
            <span className="ax-sec">Contact your account owner to add more seats before inviting new staff.</span></div>
        </div>)}

      {/* Tabs */}
      <div role="tablist" aria-label="Staff cohorts" className="tabbar">
        <button role="tab" aria-selected={tab==="teacher"} className={"tabtrig"+(tab==="teacher"?" on":"")}
          onClick={()=>{setTab("teacher");setQuery("");setMenu(null);}}>Teachers <span className="ct">{teachers.length}</span></button>
        <button role="tab" aria-selected={tab==="staff"} className={"tabtrig"+(tab==="staff"?" on":"")}
          onClick={()=>{setTab("staff");setQuery("");setMenu(null);}}>Staff <span className="ct">{staff.length}</span></button>
      </div>

      {/* Toolbar */}
      <div className="tbar" role="search">
        <div className="srch">
          <i data-lucide="search"></i>
          <input value={query} onChange={e=>setQuery(e.target.value)}
            placeholder={tab==="teacher"?"Search teachers by name or email…":"Search staff by name or email…"}
            aria-label={tab==="teacher"?"Search teachers":"Search staff"}/>
          {query && <span className="clr" role="button" aria-label="Clear search" onClick={()=>setQuery("")}><i data-lucide="x" style={{width:15,height:15}}></i></span>}
        </div>
        {tab==="staff" && (
          <button className="btn btn--primary" disabled={seatLimit}
            title={seatLimit?"You've reached your plan's staff-seat limit":undefined}
            onClick={()=>setInvite(true)}><i data-lucide="plus"></i>Invite Staff</button>)}
      </div>

      {/* List region (one tab's content; switching never jumps layout) */}
      <ul className="ax-col" role="list" style={{gap:"var(--space-2)",listStyle:"none",margin:0,padding:0}} onClick={()=>menu&&setMenu(null)}>
        {filtered.length>0
          ? filtered.map(p=> <View_Staff_PersonRow key={p.id} p={p} kind={kind}
              menuOpen={menu===p.id} onMenu={setMenu}
              onPerms={(x)=>setPermFor(x)} onAction={onAction}/>)
          : q
            ? (<div className="empty">
                <div className="ei"><i data-lucide="search-x"></i></div>
                <div className="et">No matches</div>
                <div className="eb">No {tab==="teacher"?"teachers":"staff"} match &ldquo;{query}&rdquo;.</div>
                <button className="btn btn--ghost" onClick={()=>setQuery("")}>Clear search</button>
              </div>)
            : tab==="staff"
              ? (<div className="empty">
                  <div className="ei"><i data-lucide="user-cog"></i></div>
                  <div className="et">No staff members</div>
                  <div className="eb">Invite administrators and coordinators to help you run your school.</div>
                  <button className="btn btn--primary" disabled={seatLimit} onClick={()=>setInvite(true)}><i data-lucide="plus"></i>Invite Staff</button>
                </div>)
              : (<div className="empty">
                  <div className="ei"><i data-lucide="user-cog"></i></div>
                  <div className="et">No teachers found</div>
                  <div className="eb">Add teachers on the Users page, then manage their permissions here.</div>
                  <button className="btn btn--secondary" data-go="#/users" style={{cursor:'pointer'}}><i data-lucide="arrow-up-right"></i>Go to Users</button>
                </div>)}
      </ul>

      {/* ── Secondary stacked state examples (other §5 states present in markup) ── */}
      <div className="ax-col" style={{gap:"var(--space-3)",marginTop:"var(--space-4)"}}>
        <div className="seclbl">Other states (reference)</div>

        {/* Loading skeleton */}
        <div>
          <div className="helper" style={{marginBottom:"var(--space-2)"}}>Loading — skeleton rows (search &amp; Invite render present but disabled)</div>
          <div className="ax-col" style={{gap:"var(--space-2)"}}>
            <div className="skel"></div><div className="skel"></div><div className="skel"></div>
          </div>
        </div>

        {/* Inline retryable error */}
        <div>
          <div className="helper" style={{marginBottom:"var(--space-2)"}}>Error — list read failed (inline, retryable)</div>
          <div className="alert err" role="alert">
            <i data-lucide="circle-x" className="lead"></i>
            <div className="ab"><span className="at">Couldn't load staff. </span>
              <span className="ax-sec">The membership join could not be resolved.</span></div>
            <button className="btn btn--secondary" style={{padding:"var(--space-1) var(--space-3)"}}><i data-lucide="rotate-cw"></i>Retry</button>
          </div>
        </div>

        {/* Partial — permission join missing */}
        <div>
          <div className="helper" style={{marginBottom:"var(--space-2)"}}>Partial — legacy membership unlinked (count shows em-dash, not a misleading 0/6)</div>
          <li className="prow" style={{listStyle:"none"}}>
            <div className="pav off">RT</div>
            <div className="pbody">
              <div className="pname"><span>Rohan Tata</span>
                <span className="badge neu"><i data-lucide="circle-help"></i>Unresolved</span></div>
              <div className="pmeta"><span>rohan.tata@northwood.edu</span><span className="dot"></span><span>Logistics</span><span className="dot"></span>
                <span className="ax-row" style={{gap:"4px"}}><i data-lucide="key-round" style={{width:12,height:12,color:"var(--text-muted)"}}></i>
                <span className="ax-mono ax-muted">—</span> permissions</span></div>
            </div>
            <div className="pact"><button className="btn btn--secondary"><i data-lucide="shield"></i>Permissions</button></div>
          </li>
        </div>

        {/* Permission-gated / sub-admin role variant */}
        <div>
          <div className="helper" style={{marginBottom:"var(--space-2)"}}>Role variant — staff with <span className="ax-mono">canManageUsers</span> (view + edit a subset they hold; Invite/Deactivate hidden, un-held toggles disabled)</div>
          <div className="alert" role="note" style={{borderColor:"var(--border-subtle)",background:"var(--bg-surface-sunken)"}}>
            <i data-lucide="shield-half" className="lead" style={{color:"var(--text-muted)"}}></i>
            <div className="ab ax-sec">A sub-admin may only grant capabilities they themselves hold. Toggles for <span className="ax-mono">Manage Billing</span> appear locked with the tooltip &ldquo;You can't grant a permission you don't have.&rdquo; — no privilege escalation.</div>
          </div>
        </div>
      </div>

      {/* ── Dialogs (wired via state) ── */}
      {permFor && <View_Staff_PermDialog person={permFor} kind={kind} onClose={()=>setPermFor(null)} onSave={savePerms}/>}
      {invite && <View_Staff_InviteDialog onClose={()=>setInvite(false)} onCreate={createStaff}/>}
      {confirm && <View_Staff_ConfirmDialog person={confirm.person} action={confirm.action} onClose={()=>setConfirm(null)} onConfirm={doConfirm}/>}

      {/* Toast (polite live region) */}
      {toast && (<div className="toast" role="status"><i data-lucide="check-circle"></i><span>{toast}</span></div>)}
    </div>);
}

function View_Exams(){
  const Button = L.Button || (({children,leadingIcon,variant,size,disabled,onClick})=>
    <button className={"btn btn--"+(variant||"primary")+(size?" btn--"+size:"")} disabled={disabled} onClick={onClick}>
      {leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}</button>);

  /* ---- Status badge: real ExamStatus enum; icon + label, never color-only ---- */
  const STATUS_META={
    draft:{cls:"neu",icon:"file-pen-line",label:"Draft"},
    question_paper_uploaded:{cls:"inf",icon:"file-up",label:"Question paper uploaded"},
    question_paper_extracted:{cls:"inf",icon:"scan-text",label:"Questions extracted"},
    published:{cls:"inf",icon:"calendar-check",label:"Published"},
    grading:{cls:"wrn",icon:"loader",label:"Grading"},
    completed:{cls:"suc",icon:"clipboard-check",label:"Completed"},
    results_released:{cls:"suc",icon:"check-circle-2",label:"Results released"},
    archived:{cls:"arc",icon:"archive",label:"Archived"},
  };
  function StatusBadge({status}){
    const m=STATUS_META[status]||STATUS_META.draft;
    return <span className={"badge "+m.cls}><i data-lucide={m.icon}></i>{m.label}</span>;
  }

  /* ---- Confidence summary badge (per-exam AI-grading posture) ---- */
  function ConfBadge({level,n}){
    if(level==="na") return <span className="conf na" title="AI grading is not enabled for this exam."><i data-lucide="minus"></i>N/A</span>;
    if(level==="lo") return <span className="conf lo" role="link" tabIndex="0" title={"AI-grading confidence: "+n+" answers need human review."}><i data-lucide="alert-triangle"></i>{n} need review</span>;
    if(level==="me") return <span className="conf me" role="link" tabIndex="0" title="Spot-check recommended."><i data-lucide="search-check"></i>Spot-check</span>;
    return <span className="conf hi" role="link" tabIndex="0" title="High confidence — auto-accepted."><i data-lucide="shield-check"></i>High</span>;
  }

  /* ---- Results cell: Released grade pill / Held / pending dash ---- */
  function ResultsCell({results}){
    if(results==="held") return <span className="gpill held"><i data-lucide="lock" style={{width:12,height:12}}></i>Held</span>;
    if(results&&results.grade) return <span className="gpill rel"><i data-lucide="check" style={{width:12,height:12}}></i>Released · <span className="g">{results.grade}</span> avg · {results.pass}% pass</span>;
    return <span className="dash" aria-label="Not yet available">—</span>;
  }

  /* ---- Grading progress cell ---- */
  function GradingCell({graded,total,enabled}){
    if(!enabled) return <span className="dash" title="AI grading not enabled" aria-label="Not applicable">N/A</span>;

    const pct=Math.round((graded/total)*100), done=graded===total;
    return <div className="gprog">
      <div className="gt"><span className="ax-muted">{done?"All graded":pct+"%"}</span><span className="gn">{graded}/{total}</span></div>
      <div className="bar-track" role="progressbar" aria-label="Grading progress" aria-valuenow={pct} aria-valuemin="0" aria-valuemax="100" aria-valuetext={graded+" of "+total+" submissions graded"}>
        <div className={"bar-fill"+(done?" done":(pct<50?" warn":""))} style={{width:pct+"%"}}></div></div>
    </div>;
  }

  /* ---- Sample exam data (server-authoritative; render-only — Exam.stats from grading pipeline) ---- */
  const EXAMS=[
    {id:"e1",title:"Unit 3 — Kinematics",subject:"Physics",cls:"10-A",date:"24 Jun 2026",sort:20260624,status:"grading",graded:18,total:24,enabled:true,conf:{level:"lo",n:12},results:null,by:"Arjun Rao"},
    {id:"e2",title:"Algebra Quiz 2",subject:"Mathematics",cls:"9-B",date:"20 Jun 2026",sort:20260620,status:"results_released",graded:30,total:30,enabled:true,conf:{level:"hi"},results:{grade:"B",pass:88},by:"Sara Lindqvist"},
    {id:"e3",title:"Cell Biology Test",subject:"Biology",cls:"9-A",date:"18 Jun 2026",sort:20260618,status:"completed",graded:28,total:28,enabled:true,conf:{level:"me"},results:"held",by:"Priya Menon"},
    {id:"e4",title:"Periodic Trends",subject:"Chemistry",cls:"10-B",date:"26 Jun 2026",sort:20260626,status:"published",graded:0,total:0,enabled:true,conf:{level:"na"},results:null,by:"David Okafor"},
    {id:"e5",title:"Reading Comprehension",subject:"English",cls:"8-A",date:"15 Jun 2026",sort:20260615,status:"completed",graded:31,total:31,enabled:true,conf:{level:"lo",n:5},results:"held",by:"Sara Lindqvist"},
    {id:"e6",title:"Mid-term — Data Structures",subject:"Computer Science",cls:"11-A",date:"12 Jun 2026",sort:20260612,status:"results_released",graded:22,total:22,enabled:true,conf:{level:"hi"},results:{grade:"A",pass:95},by:"Marcus Bell"},
    {id:"e7",title:"World War II Essay",subject:"History",cls:"10-A",date:"28 Jun 2026",sort:20260628,status:"draft",graded:0,total:0,enabled:false,conf:{level:"na"},results:null,by:"Sara Lindqvist"},
    {id:"e8",title:"Trigonometry Worksheet",subject:"Mathematics",cls:"10-A",date:"22 Jun 2026",sort:20260622,status:"question_paper_extracted",graded:0,total:0,enabled:true,conf:{level:"na"},results:null,by:"Arjun Rao"},
    {id:"e9",title:"Organic Chemistry Final",subject:"Chemistry",cls:"12-A",date:"10 Jun 2026",sort:20260610,status:"grading",graded:9,total:26,enabled:true,conf:{level:"me"},results:null,by:"David Okafor"},
    {id:"e10",title:"Poetry Analysis",subject:"English",cls:"9-B",date:"08 Jun 2026",sort:20260608,status:"archived",graded:27,total:27,enabled:true,conf:{level:"hi"},results:{grade:"B",pass:81},by:"Sara Lindqvist"},
  ];

  const STATUS_FILTER=[
    {value:"all",label:"All statuses"},
    {value:"draft",label:"Draft"},
    {value:"question_paper_uploaded",label:"Question paper uploaded"},
    {value:"question_paper_extracted",label:"Questions extracted"},
    {value:"published",label:"Published"},
    {value:"grading",label:"Grading"},
    {value:"completed",label:"Completed"},
    {value:"results_released",label:"Results released"},
    {value:"archived",label:"Archived"},
  ];
  const SUBJECT_FILTER=[{value:"all",label:"All subjects"},{value:"Physics",label:"Physics"},{value:"Mathematics",label:"Mathematics"},{value:"Biology",label:"Biology"},{value:"Chemistry",label:"Chemistry"},{value:"English",label:"English"},{value:"History",label:"History"},{value:"Computer Science",label:"Computer Science"}];
  const CLASS_FILTER=[{value:"all",label:"All classes"},{value:"8-A",label:"8-A"},{value:"9-A",label:"9-A"},{value:"9-B",label:"9-B"},{value:"10-A",label:"10-A"},{value:"10-B",label:"10-B"},{value:"11-A",label:"11-A"},{value:"12-A",label:"12-A"}];
  const SESSION_FILTER=[{value:"all",label:"All sessions"},{value:"2025-26",label:"2025–26"},{value:"2024-25",label:"2024–25"}];

  /* ---- Filter Select (sentinel "all" value, never empty-string — Radix rule) ---- */
  function FilterSelect({icon,options,value,onChange,openId,setOpenId,id}){
    const open=openId===id;
    const cur=options.find(o=>o.value===value)||options[0];
    const active=value!=="all";
    return <div className="relpos">
      <button className={"tb-sel"+(active?" act":"")} aria-haspopup="listbox" aria-expanded={open}
        onClick={()=>setOpenId(open?null:id)}>
        <i data-lucide={icon}></i>{cur.label}<i data-lucide="chevron-down"></i></button>
      {open && <div className="selmenu" role="listbox">
        {options.map(o=>(
          <button key={o.value} role="option" aria-selected={o.value===value}
            className={o.value===value?"on":""}
            onClick={()=>{onChange(o.value);setOpenId(null);}}>
            {o.label}{o.value===value&&<i data-lucide="check"></i>}</button>))}
      </div>}
    </div>;
  }

  const [status,setStatus]=React.useState("all");
  const [subject,setSubject]=React.useState("all");
  const [klass,setKlass]=React.useState("all");
  const [session,setSession]=React.useState("all");
  const [query,setQuery]=React.useState("");
  const [openId,setOpenId]=React.useState(null);
  const [sort,setSort]=React.useState({key:"date",dir:"desc"});
  const [partialOpen,setPartialOpen]=React.useState(true);

  const toggleSort=(key)=>setSort(s=> s.key===key ? {key,dir:s.dir==="asc"?"desc":"asc"} : {key,dir:"asc"});
  const ariaSort=(key)=> sort.key===key ? (sort.dir==="asc"?"ascending":"descending") : "none";

  const clearAll=()=>{setStatus("all");setSubject("all");setKlass("all");setSession("all");setQuery("");};
  const activeFilters=[
    status!=="all"&&{k:"status",label:STATUS_FILTER.find(o=>o.value===status).label,reset:()=>setStatus("all")},
    subject!=="all"&&{k:"subject",label:subject,reset:()=>setSubject("all")},
    klass!=="all"&&{k:"class",label:"Class "+klass,reset:()=>setKlass("all")},
    session!=="all"&&{k:"session",label:SESSION_FILTER.find(o=>o.value===session).label,reset:()=>setSession("all")},
  ].filter(Boolean);
  const anyFilter=activeFilters.length>0||query.trim()!=="";

  let rows=EXAMS.filter(e=>
    (status==="all"||e.status===status)&&
    (subject==="all"||e.subject===subject)&&
    (klass==="all"||e.cls===klass)&&
    (query.trim()===""||e.title.toLowerCase().includes(query.trim().toLowerCase())||e.subject.toLowerCase().includes(query.trim().toLowerCase()))
  );
  const cmp={
    date:(a,b)=>a.sort-b.sort,
    title:(a,b)=>a.title.localeCompare(b.title),
    subject:(a,b)=>a.subject.localeCompare(b.subject),
    status:(a,b)=>STATUS_META[a.status].label.localeCompare(STATUS_META[b.status].label),
  }[sort.key]||((a,b)=>a.sort-b.sort);
  rows=[...rows].sort((a,b)=> sort.dir==="asc"?cmp(a,b):-cmp(a,b));

  const SortTh=({label,k,num})=>(
    <th className={num?"num":""} aria-sort={ariaSort(k)}>

  );

  return (<div className="vw-exams">

    {/* Page header */}

      <div className="ac">
        <Button variant="secondary" leadingIcon="download">Export CSV</Button>
      </div>
    </div>

    {/* Partial-data banner (§5 Partial) — dismissible, role=status (polite) */}

      <div className="alert info" role="status">
        <i data-lucide="clock" className="lead"></i>
        <div className="ab"><span className="at">Some grading stats are still being computed. </span>
          <span className="ax-sec">Affected cells show a dash and will refresh shortly.</span></div>
        <button className="icon-btn x" aria-label="Dismiss" onClick={()=>setPartialOpen(false)}><i data-lucide="x"></i></button>
      </div>}

    {/* KPI strip — server-aggregated (v1.analytics.getSummary); render-only */}
    <div className="ax-grid ax-g4">
      <div className="card kpi" role="group" aria-label="Total exams: 142">
        <div className="lh"><i data-lucide="file-check"></i><span>Total exams</span></div>
        <div className="vv">142</div>
        <div className="tr ax-muted"><i data-lucide="layers"></i><span>across the academy</span></div>
      </div>
      <div className="card kpi" role="group" aria-label="Awaiting grading: 7 exams">
        <div className="lh"><i data-lucide="loader"></i><span>Awaiting grading</span></div>
        <div className="vv">7</div>
        <div className="tr" style={{color:"var(--status-warning)"}}><i data-lucide="hourglass"></i><span>ungraded submissions remain</span></div>
      </div>
      <div className="card kpi" role="group" aria-label="Needs review: 4 exams with low-confidence answers">
        <div className="lh"><i data-lucide="alert-triangle"></i><span>Needs review</span></div>
        <div className="vv">4</div>
        <div className="tr" style={{color:"var(--confidence-low)"}}><i data-lucide="user-check"></i><span>low-confidence answers</span></div>
      </div>
      <div className="card kpi" role="group" aria-label="Overdue results: 3 exams finished grading but not released">
        <div className="lh"><i data-lucide="calendar-x"></i><span>Overdue results</span></div>
        <div className="vv">3</div>
        <div className="tr" style={{color:"var(--status-warning)"}}><i data-lucide="bell-ring"></i><span>graded, not released</span></div>
      </div>
    </div>

    {/* Toolbar — search + filter Selects ("all" sentinel) + Clear filters */}
    <div className="toolbar" role="search">
      <label className="tb-search"><i data-lucide="search"></i>
        <input placeholder="Search exams…" aria-label="Search exams by title or subject"
          value={query} onChange={e=>setQuery(e.target.value)}/></label>
      <FilterSelect id="f-status" icon="filter" options={STATUS_FILTER} value={status} onChange={setStatus} openId={openId} setOpenId={setOpenId}/>
      <FilterSelect id="f-subject" icon="book-open" options={SUBJECT_FILTER} value={subject} onChange={setSubject} openId={openId} setOpenId={setOpenId}/>
      <FilterSelect id="f-class" icon="school" options={CLASS_FILTER} value={klass} onChange={setKlass} openId={openId} setOpenId={setOpenId}/>
      <FilterSelect id="f-session" icon="calendar-range" options={SESSION_FILTER} value={session} onChange={setSession} openId={openId} setOpenId={setOpenId}/>
      {anyFilter && <Button variant="ghost" leadingIcon="x" onClick={clearAll}>Clear filters</Button>}
    </div>

    {/* Active filter chips */}
    {activeFilters.length>0 &&
      <div className="fchips" aria-label="Active filters">
        {activeFilters.map(f=>(
          <span className="fchip" key={f.k}>{f.label}
            <button aria-label={"Remove "+f.label+" filter"} onClick={f.reset}><i data-lucide="x"></i></button></span>))}
      </div>}

    {/* Primary success state — DataTable, or filtered-empty */}
    {rows.length>0 ?
      <div className="tbl-wrap">
        <table className="tbl">
          <caption className="ax-sr">Exams across Northwood Academy. Read-only oversight.</caption>
          <thead><tr>
            <SortTh label="Exam" k="title"/>
            <SortTh label="Subject" k="subject"/>
            <th scope="col">Class</th>
            <SortTh label="Schedule" k="date"/>
            <SortTh label="Status" k="status"/>
            <th scope="col">Grading</th>
            <th scope="col">Confidence</th>
            <th scope="col">Results</th>
          </tr></thead>
          <tbody>
            {rows.map(e=>(
              <tr key={e.id} tabIndex="0" aria-label={"Open "+e.title} data-go="#/classes/c1" style={{cursor:"pointer"}}>
                <td><div className="ex-title">{e.title}</div><div className="ex-by">Created by {e.by}</div></td>
                <td className="ax-sec">{e.subject}</td>
                <td className="ax-sec">{e.cls}</td>
                <td className="ax-mono ax-sec">{e.date}</td>
                <td><StatusBadge status={e.status}/></td>
                <td><GradingCell graded={e.graded} total={e.total} enabled={e.enabled}/></td>
                <td><ConfBadge level={e.conf.level} n={e.conf.n}/></td>
                <td><ResultsCell results={e.results}/></td>
              </tr>))}
          </tbody>
        </table>
      </div>
      :
      <div className="tbl-wrap"><div className="empty">
        <div className="ei"><i data-lucide="search-x"></i></div>
        <div className="et">No exams match these filters</div>
        <div className="eb">Try a different status, subject, class, or search term.</div>
        <div className="ea"><Button variant="ghost" leadingIcon="x" onClick={clearAll}>Clear filters</Button></div>
      </div></div>}

    {/* Pagination — cursor-based; page size selector */}
    <div className="pag">
      <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Showing <span className="ax-mono">1–{rows.length}</span> of <span className="ax-mono">142</span> exams</span>
      <div className="nums">
        <button className="pg" aria-label="Previous page"><i data-lucide="chevron-left" style={{width:14,height:14}}></i></button>
        <button className="pg on" aria-current="page">1</button>
        <button className="pg">2</button>
        <button className="pg">3</button>
        <span className="ax-muted ax-mono" style={{fontSize:"var(--text-xs)",padding:"0 4px"}}>…</span>
        <button className="pg">6</button>
        <button className="pg" aria-label="Next page"><i data-lucide="chevron-right" style={{width:14,height:14}}></i></button>
      </div>
      <button className="tb-sel">Rows: 25<i data-lucide="chevron-down"></i></button>
    </div>

    {/* ===== Secondary stacked examples: the spec's other distinctive §5 states ===== */}
    <div className="sec-label" style={{marginTop:"var(--space-4)"}}><i data-lucide="layers-2"></i>Other states (reference)</div>

    {/* Loading skeleton (§5 Loading) — KPI cards + table rows mirror final layout */}
    <div className="ax-grid ax-g4" aria-busy="true" aria-label="Loading summary">
      {[0,1,2,3].map(i=>(
        <div className="card kpi" key={i}>
          <div className="skl" style={{width:96,height:11}}></div>
          <div className="skl" style={{width:54,height:26,marginTop:6}}></div>
          <div className="skl" style={{width:120,height:10,marginTop:6}}></div>
        </div>))}
    </div>
    <div className="tbl-wrap" aria-busy="true" aria-label="Loading exams">
      <table className="tbl"><tbody>
        {[0,1,2].map(i=>(
          <tr key={i}>
            <td><div className="skl" style={{width:180,height:12}}></div><div className="skl" style={{width:110,height:9,marginTop:6}}></div></td>
            <td><div className="skl" style={{width:80,height:12}}></div></td>
            <td><div className="skl" style={{width:40,height:12}}></div></td>
            <td><div className="skl" style={{width:74,height:12}}></div></td>
            <td><div className="skl" style={{width:88,height:18,borderRadius:"var(--radius-pill)"}}></div></td>
            <td><div className="skl" style={{width:108,height:18}}></div></td>
            <td><div className="skl" style={{width:84,height:18,borderRadius:"var(--radius-pill)"}}></div></td>
            <td><div className="skl" style={{width:96,height:18,borderRadius:"var(--radius-pill)"}}></div></td>
          </tr>))}
      </tbody></table>
    </div>

    {/* Error (§5 Error) — load failure, icon+text, Retry; copy from ERROR_MESSAGES/HINTS */}
    <div className="alert err" role="alert">
      <i data-lucide="alert-octagon" className="lead"></i>
      <div className="ab"><span className="at">We couldn't load exams. </span>
        <span className="ax-sec">Check your connection and try again. Your filters are preserved.</span></div>
      <span className="lnk">Retry →</span>
    </div>

    {/* KPI degrade (§5 Partial) — analytics summary failed but table still renders */}
    <div className="alert info" role="status">
      <i data-lucide="info" className="lead"></i>
      <div className="ab"><span className="at">Summary unavailable. </span>
        <span className="ax-sec">The KPI strip could not load; the table below is the source of truth.</span></div>
    </div>

    {/* Feature-gated (§8 rule 7) — aiGrading disabled → grading & confidence degrade to N/A */}
    <div className="alert info" role="status">
      <i data-lucide="sparkles" className="lead"></i>
      <div className="ab"><span className="at">AI grading is off for this academy. </span>
        <span className="ax-sec">Grading-progress and Confidence columns show N/A until the feature is enabled. </span>
        <span className="lnk" data-go="#/ai-usage" style={{cursor:"pointer"}}>View AI usage →</span></div>
    </div>

    {/* Answer-key guard (§8 rule 3) — credentials/keys never rendered; server-only */}
    <div className="alert info" role="note">
      <i data-lucide="lock" className="lead"></i>
      <div className="ab"><span className="at">Answer keys are never shown here. </span>
        <span className="ax-sec">Confidence is an aggregate over grading certainty, not correct answers. Keys stay server-only.</span></div>
    </div>

    {/* Permission-gated (§5) — staff without canViewExams: nav hidden, direct visit denied */}
    <div className="alert warn" role="status">
      <i data-lucide="shield-off" className="lead"></i>
      <div className="ab"><span className="at">Access denied. </span>
        <span className="ax-sec">Your staff role doesn't include exam oversight. Ask an administrator to grant the Exams permission. </span>
        <span className="lnk" data-go="#/staff/roles" style={{cursor:"pointer"}}>Manage roles →</span></div>
    </div>

    {/* Super-admin cross-tenant context (§5 / §8 rule 1) — audited impersonation banner */}
    <div className="alert warn" role="status">
      <i data-lucide="user-cog" className="lead"></i>
      <div className="ab"><span className="at">Viewing as Northwood Academy. </span>
        <span className="ax-sec">You're a super-admin operating inside this tenant. This cross-tenant view is audit-logged.</span></div>
      <span className="lnk">Exit tenant →</span>
    </div>

    {/* Tenant-suspended (§5 / §8) */}
    <div className="alert warn" role="status">
      <i data-lucide="ban" className="lead"></i>
      <div className="ab"><span className="at">This academy is currently inactive. </span>
        <span className="ax-sec">Contact your platform administrator.</span></div>
    </div>

    {/* True-empty (§5 / §7) — zero exams; no authoring CTA (admin doesn't author) */}
    <div className="tbl-wrap"><div className="empty">
      <div className="ei"><i data-lucide="clipboard-list"></i></div>
      <div className="et">No exams yet</div>
      <div className="eb">Exams created by your teachers will appear here for oversight. Authoring happens in the teacher app.</div>
      <div className="ea"><Button variant="ghost" leadingIcon="book-open">Learn about exam oversight</Button></div>
    </div></div>

  </div>);
}

  function SpaceCard({sp, canManage, onAction, busy}){
