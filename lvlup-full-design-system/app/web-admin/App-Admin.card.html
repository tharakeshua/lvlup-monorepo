      <div className={kind==="combo"?"combo":"sel"} role={kind==="combo"?"combobox":"button"} tabIndex="0"
        aria-expanded={open} aria-invalid={error?"true":undefined}
        onClick={()=>setOpen(o=>!o)} onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();setOpen(o=>!o);}}}>
        <i data-lucide={leadIcon||(kind==="combo"?"search":"chevron-down")} className="lead"></i>
        <span className={"cv"+(sel?"":" ph")}>{sel?sel.label:placeholder}</span>
        <i data-lucide="chevron-down" className="caret"></i>
      </div>
      {open && <div className="menu" role="listbox">
        {options.map(o=><button key={o.id} role="option" aria-selected={o.id===value}
          onClick={()=>{onPick(o.id);setOpen(false);}}>
          {o.id===value&&<i data-lucide="check"></i>}<span>{o.label}</span></button>)}
      </div>}
    </div>;
  }

  function Builder({onGenerate,generating}){
    const [type,setType]=React.useState("exam-result");
    const [examId,setExamId]=React.useState("ex_alg2");
    const [scope,setScope]=React.useState("class"); // class | student
    const [studentId,setStudentId]=React.useState(null);
    const [classId,setClassId]=React.useState(null);
    const [progStudent,setProgStudent]=React.useState(null);
    const [session,setSession]=React.useState("none");
    const [touched,setTouched]=React.useState(false);

    // switching type clears unrelated params (§6)
    function pickType(t){ setType(t); setTouched(false);
      setExamId(t==="exam-result"?"ex_alg2":null); setScope("class"); setStudentId(null);
      setClassId(null); setProgStudent(null); }

    const missing = type==="exam-result" ? (!examId || (scope==="student" && !studentId))
      : type==="class" ? !classId : !progStudent;
    const studentErr = touched && type==="exam-result" && scope==="student" && !studentId;

    function handleGenerate(){
      setTouched(true);
      if(missing) return;
      const meta = type==="exam-result"
        ? {type:"Exam result", scope: scope==="class"?"Whole class":"One student",
           subject: (EXAMS.find(e=>e.id===examId)||{}).label + (scope==="student"? " · "+(STUDENTS.find(s=>s.id===studentId)||{}).label : "")}
        : type==="class"
        ? {type:"Class report card", scope:"Whole class", subject:(CLASSES.find(c=>c.id===classId)||{}).label}
        : {type:"Student progress", scope:"One student", subject:(STUDENTS.find(s=>s.id===progStudent)||{}).label};
      onGenerate(meta);
    }

    return <div className="card builder" aria-busy={generating?"true":undefined}>
      {/* REPORT TYPE */}
      <div className="bsec">
        <div className="bsec-lbl"><i data-lucide="layers"></i>Report type</div>
        <div className="rtgrid" role="radiogroup" aria-label="Report type">
          {REPORT_TYPES.map(rt=>
            <button key={rt.id} role="radio" aria-checked={type===rt.id}
              className={"rtcard"+(type===rt.id?" on":"")} onClick={()=>pickType(rt.id)}>
              <div className="rth"><i data-lucide={rt.icon}></i><span>{rt.label}</span><span className="rtdot"></span></div>
              <div className="rthelp">{rt.help}</div>
            </button>)}
        </div>
      </div>

      {/* PARAMETERS — swap by type */}
      <div className="bsec">
        <div className="bsec-lbl"><i data-lucide="sliders-horizontal"></i>Parameters</div>
        <div className="pgrid">
          {type==="exam-result" && <>
            <div className="field col6">
              <label className="fl">Exam<span className="req">*</span></label>
              <Picker kind="combo" value={examId} placeholder="Search exams…" options={EXAMS} onPick={setExamId} leadIcon="search"/>
              <span className="fh">Only exams in grading, completed, or released states appear.</span>
            </div>
            <div className="field col6">
              <label className="fl" id="scope-lbl">Scope<span className="req">*</span></label>
              <div className="scope" role="radiogroup" aria-labelledby="scope-lbl">
                <button role="radio" aria-checked={scope==="class"} className={scope==="class"?"on":""}
                  onClick={()=>{setScope("class");setStudentId(null);}}><i data-lucide="users"></i>Whole class</button>
                <button role="radio" aria-checked={scope==="student"} className={scope==="student"?"on":""}
                  onClick={()=>setScope("student")}><i data-lucide="user"></i>One student</button>
              </div>
              <span className="fh">A student makes this an individual result; whole class is the summary PDF.</span>
            </div>
            {scope==="student" && <div className="field col6">
              <label className="fl">Student<span className="req">*</span></label>
              <Picker kind="combo" value={studentId} placeholder="Search students in 8A…" options={STUDENTS} onPick={setStudentId} leadIcon="search" error={studentErr}/>
              {studentErr && <span className="fe"><i data-lucide="alert-circle"></i>Select a student to generate an individual result.</span>}
            </div>}
            <div className="field col4">
              <label className="fl">Academic session (optional)</label>
              <Picker kind="sel" value={session} placeholder="All time" options={SESSIONS} onPick={setSession} leadIcon="calendar-range"/>
            </div>
          </>}
          {type==="class" && <>
            <div className="field col6">
              <label className="fl">Class<span className="req">*</span></label>
              <Picker kind="combo" value={classId} placeholder="Search classes…" options={CLASSES} onPick={setClassId} leadIcon="search"/>
            </div>
            <div className="field col4">
              <label className="fl">Academic session (optional)</label>
              <Picker kind="sel" value={session} placeholder="All time" options={SESSIONS} onPick={setSession} leadIcon="calendar-range"/>
            </div>
          </>}
          {type==="progress" && <>
            <div className="field col6">
              <label className="fl">Class<span className="req">*</span></label>
              <Picker kind="combo" value={classId} placeholder="Search classes…" options={CLASSES} onPick={(v)=>{setClassId(v);setProgStudent(null);}} leadIcon="search"/>
              <span className="fh">The student list is scoped to the chosen class.</span>
            </div>
            <div className="field col6">
              <label className="fl">Student<span className="req">*</span></label>
              <Picker kind="combo" value={progStudent} placeholder={classId?"Search students…":"Choose a class first"} options={classId?STUDENTS:[]} onPick={setProgStudent} leadIcon="search"/>
            </div>
            <div className="field col4">
              <label className="fl">Academic session (optional)</label>
              <Picker kind="sel" value={session} placeholder="All time" options={SESSIONS} onPick={setSession} leadIcon="calendar-range"/>
            </div>
          </>}
        </div>
      </div>

      {/* EXPORT FORMAT + GENERATE */}
      <div className="bsec">
        <div className="genrow">
          <div className="field" style={{width:200}}>
            <label className="fl">Export format</label>
            <Picker kind="sel" value="pdf" placeholder="PDF" options={[{id:"pdf",label:"PDF document"}]} onPick={()=>{}} leadIcon="file-text"/>
          </div>
          <span className="gh"><i data-lucide="shield"></i>Content is computed server-side. Answer keys are never included.</span>
          <Button variant="primary" leadingIcon={generating?undefined:"file-down"} loading={generating}
            disabled={missing&&!generating} onClick={handleGenerate}>
            {generating?"Generating…":"Generate report"}</Button>
        </div>
      </div>
    </div>;
  }

  /* ---- quick-pick tables ---- */
  function ExamRows({onUse}){
    const [menu,setMenu]=React.useState(null);
    return <table className="tbl"><thead><tr><th>Exam</th><th>Class</th><th>Status</th><th>Date</th><th></th></tr></thead>
      <tbody>{EXAMS.map(e=><tr key={e.id}>
        <td className="nm">{e.label}</td>
        <td className="ax-mono ax-sec">{e.cls}</td>
        <td><StatusBadge status={e.status}/></td>
        <td className="ax-mono ax-sec">{e.when}</td>
        <td style={{textAlign:"right"}}>
          <div className="relpos" style={{display:"inline-flex",gap:"var(--space-2)"}}>
            <Button variant="secondary" size="sm" leadingIcon="wand-2" onClick={()=>onUse("exam-result")}>Use</Button>
            <button className="icon-btn" aria-label="Row actions" onClick={()=>setMenu(menu===e.id?null:e.id)}><i data-lucide="more-horizontal"></i></button>
            {menu===e.id && <div className="menu" onMouseLeave={()=>setMenu(null)}>
              <button onClick={()=>{onUse("exam-result");setMenu(null);}}><i data-lucide="wand-2"></i>Use in builder</button>
              <button data-go="#/exams" style={{cursor:'pointer'}} onClick={()=>setMenu(null)}><i data-lucide="external-link"></i>Open exam</button>
            </div>}
          </div>
        </td></tr>)}
      </tbody></table>;
  }
  function ClassRows({onUse}){
    return <table className="tbl"><thead><tr><th>Class</th><th>Students</th><th>Avg score</th><th></th></tr></thead>
      <tbody>{[["Grade 8A",32,"82%"],["Grade 8C",29,"71%"],["Grade 9B",27,"68%"]].map(([n,s,a])=><tr key={n}>
        <td className="nm">{n}</td><td className="ax-mono ax-sec">{s}</td><td className="ax-mono ax-sec">{a}</td>
        <td style={{textAlign:"right"}}><Button variant="secondary" size="sm" leadingIcon="wand-2" onClick={()=>onUse("class")}>Use</Button></td>
      </tr>)}</tbody></table>;
  }

  const [generating,setGenerating]=React.useState(false);
  const [result,setResult]=React.useState(null);
  const [toast,setToast]=React.useState(null);
  const [tab,setTab]=React.useState("exams");
  const [pulse,setPulse]=React.useState(false);
  const stripRef=React.useRef(null);

  React.useEffect(()=>{ if(toast){const t=setTimeout(()=>setToast(null),4200);return ()=>clearTimeout(t);} },[toast]);

  function onGenerate(meta){
    setGenerating(true); setResult(null);
    setTimeout(()=>{
      setGenerating(false);
      setResult({...meta, until:"14:32", file:"algebra-unit-2-summary.pdf"});
      setToast({variant:"suc",icon:"check-circle",title:"Report generated",body:"Your PDF is ready to download."});
      requestAnimationFrame(()=>{stripRef.current && stripRef.current.scrollIntoView({block:"nearest",behavior:"smooth"});});
    },900);
  }
  function onUse(t){ setPulse(true); setTimeout(()=>setPulse(false),320);
    window.scrollTo({top:0,behavior:"smooth"});
    setToast({variant:"suc",icon:"wand-2",title:"Builder pre-filled",body:"Confirm scope and session, then generate."}); }

  return (<div className="vw-reports">
    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Reports</h1>
        <div className="ax-sub">Generate and download PDF reports for this academy.</div>
        <div className="ax-sub ax-muted ax-row" style={{gap:"var(--space-2)"}}>
          <span>Northwood Academy</span><span>·</span>
          <span className="badge brd"><i data-lucide="badge-check"></i>Analytics enabled</span></div>
      </div>
      <div className="ac">
        <span className="ax-row ax-muted" style={{fontSize:"var(--text-xs)",gap:"var(--space-2)"}}>
          <i data-lucide="lock" style={{width:14,height:14}}></i>Tenant-scoped · no cross-tenant targeting</span>
      </div>
    </div>

    {/* aria-live announcement for SR users */}
    <div className="ax-sr" role="status" aria-live="polite">{result?"Report ready. Download available.":""}</div>

    {/* PRIMARY: builder */}
    <div className={pulse?"builder focuspulse":""} style={{borderRadius:"var(--radius-lg)"}}>
      <Builder onGenerate={onGenerate} generating={generating}/>
    </div>

    {/* PRIMARY success: result strip (renders after generate) */}
    {result && <div className="strip" ref={stripRef} role="region" aria-label="Generated report">
      <div className="sh">
        <i data-lucide="check-circle"></i>
        <span className="sht">Report ready</span>
        <span className="sa">
          <Button variant="primary" leadingIcon="download" onClick={()=>setToast({variant:"suc",icon:"download",title:"Downloading",body:result.file})}>Download PDF</Button>
          <Button variant="ghost" leadingIcon="external-link" onClick={()=>{}}>Open</Button>
          <Button variant="ghost" leadingIcon="refresh-cw" onClick={()=>onGenerate(result)}>Regenerate</Button>
        </span>
      </div>
      <dl className="deflist">
        <dt>Type</dt><dd>{result.type}</dd>
        <dt>Scope</dt><dd>{result.scope}</dd>
        <dt>Subject of report</dt><dd>{result.subject}</dd>
        <dt>Link valid until</dt><dd className="ax-mono">{result.until} <span className="ax-muted">(≈1 hr)</span></dd>
      </dl>
    </div>}

    {/* quick-pick tables */}
    <div className="panel">
      <div className="tabs" role="tablist" aria-label="Quick pick">
        <button role="tab" aria-selected={tab==="exams"} className={tab==="exams"?"on":""} onClick={()=>setTab("exams")}>
          Reportable exams <span className="cnt">3</span></button>
        <button role="tab" aria-selected={tab==="classes"} className={tab==="classes"?"on":""} onClick={()=>setTab("classes")}>
          Classes <span className="cnt">3</span></button>
      </div>
      <div style={{padding:"var(--space-1) 0"}}>
        {tab==="exams" ? <ExamRows onUse={onUse}/> : <ClassRows onUse={onUse}/>}
      </div>
    </div>

    {/* ============ SECONDARY §5 STATES — present in markup ============ */}
    <div className="statelbl">Other states (spec §5) — rendered for reference</div>

    {/* error: integrity / not-found → inline alert in result strip */}
    <div className="alert err" role="alert">
      <i data-lucide="alert-octagon" className="lead"></i>
      <div className="ab"><span className="at">Couldn't generate</span><br/>
        <span className="ax-sec">This report couldn't be built — some underlying records are missing or invalid. Try a different exam, or contact support if this persists.</span></div>
    </div>

    {/* rate limited → warning toast preview + cooldown */}
    <div className="toast warn" role="status">
      <i data-lucide="timer" className="lead"></i>
      <div><div className="tt">Slow down</div>
        <div className="ax-sec">You're generating reports quickly. Please wait a moment and try again.</div></div>
    </div>

    {/* partial: analytics feature flag off → disabled builder under info banner */}
    <div className="alert info" role="status">
      <i data-lucide="info" className="lead"></i>
      <div className="ab"><span className="at">Reporting is part of the Analytics feature, which isn't enabled for this academy. </span>
        <span className="ax-sec">Contact your administrator.</span></div>
    </div>
    <div className="card dis" aria-disabled="true">
      <div className="bsec"><div className="bsec-lbl"><i data-lucide="lock"></i>Builder disabled — Analytics off</div>
        <div className="rtgrid">{REPORT_TYPES.map(rt=>
          <div key={rt.id} className="rtcard"><div className="rth"><i data-lucide={rt.icon}></i><span>{rt.label}</span></div>
            <div className="rthelp">{rt.help}</div></div>)}</div></div>
    </div>

    {/* loading skeleton: picker state */}
    <div className="card"><div className="bsec">
      <div className="bsec-lbl"><i data-lucide="loader"></i>Loading pickers</div>
      <div className="pgrid">
        <div className="field col6"><div className="skl" style={{height:12,width:64}}></div><div className="skl" style={{height:40}}></div></div>
        <div className="field col6"><div className="skl" style={{height:12,width:48}}></div><div className="skl" style={{height:40}}></div></div>
      </div>
    </div></div>

    {/* empty: no reportable exams */}
    <div className="panel"><div className="empty">
      <div className="ei"><i data-lucide="file-x"></i></div>
      <div className="et">No exams ready to report</div>
      <div className="eb">Reports become available once an exam reaches grading, completion, or released results.</div>
    </div></div>

    {/* permission / role variant */}
    <div className="alert" role="status" style={{borderColor:"var(--border-strong)"}}>
      <i data-lucide="shield-off" className="lead" style={{color:"var(--text-muted)"}}></i>
      <div className="ab"><span className="at">Role variant — staff without reporting permission</span><br/>
        <span className="ax-sec">The Reports nav entry is hidden and the route is denied via StaffPermissions. A tenantAdmin (or impersonating superAdmin acting as this tenant) sees the full builder above.</span></div>
    </div>

    {/* live toast (success) */}
    {toast && <div style={{position:"fixed",right:"var(--space-6)",bottom:"var(--space-6)",zIndex:60}}>
      <div className={"toast "+(toast.variant||"suc")} role="status">
        <i data-lucide={toast.icon} className="lead"></i>
        <div><div className="tt">{toast.title}</div><div className="ax-sec">{toast.body}</div></div>
      </div></div>}
  </div>);
}

function View_Announcements(){
  const Button = L.Button || (({children,leadingIcon,variant,size,disabled,onClick})=>
    <button className={"btn btn--"+(variant||"primary")+(size?" btn--"+size:"")} disabled={disabled} onClick={onClick}>
      {leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}</button>);

  /* ---- status helper: icon + label, never color-only ---- */
  function StatusBadge({status}){
    if(status==="published") return <span className="badge suc"><i data-lucide="check-circle-2"></i>Published</span>;
    if(status==="archived")  return <span className="badge arc"><i data-lucide="archive"></i>Archived</span>;
    return <span className="badge drf"><i data-lucide="pencil-line"></i>Draft</span>;
  }

  /* ---- audience cell: role + class chips (icon+label), default "Everyone", "+N classes" overflow ---- */
  function Audience({roles,classes}){
    if((!roles||!roles.length)&&(!classes||!classes.length))
      return <span className="chip"><i data-lucide="globe"></i>Everyone</span>;
    const shown = classes ? classes.slice(0,2) : [];
    const extra = classes ? classes.length-shown.length : 0;
    return <div className="chip-row">
      {(roles||[]).map(r=><span className="chip" key={r}><i data-lucide="user"></i>{r}</span>)}
      {shown.map(c=><span className="chip" key={c}><i data-lucide="school"></i>{c}</span>)}
      {extra>0 && <span className="chip">+{extra} classes</span>}
    </div>;
  }

  /* ---- sample data (server-authoritative; render-only) ---- */
  const PLATFORM=[
    {id:"pn1",title:"Scheduled maintenance window",body:"Auto-LevelUp will be read-only on 22 Jun 02:00–03:00 UTC for a database upgrade. No data loss is expected.",date:"12 Jun · Platform",author:"Platform Operations"},
    {id:"pn2",title:"New: KaTeX in announcements",body:"Announcement bodies now render inline math, e.g. the quadratic root x = −b±√(b²−4ac)/2a.",date:"09 Jun · Platform",author:"Product"},
  ];
  const ROWS=[
    {id:"a1",title:"End-of-term exam timetable",preview:"Grade 8 mathematics and science exams begin Monday 24 June. See the attached schedule by class.",status:"published",roles:["Students"],classes:["Grade 8 – A","Grade 8 – C","Grade 7 – B"],author:"Arjun Rao",init:"AR",created:"12 Jun 2026"},
    {id:"a2",title:"Summer holiday notice",preview:"The academy closes for the summer break from 1 July. Portals remain available for revision.",status:"draft",roles:[],classes:[],author:"Anita Kapoor",init:"AK",created:"11 Jun 2026"},
    {id:"a3",title:"Parent–teacher meeting reschedule",preview:"The PTM originally set for 18 June moves to 21 June, 4–6 pm, in the main hall.",status:"published",roles:["Parents","Teachers"],classes:[],author:"Anita Kapoor",init:"AK",created:"09 Jun 2026"},
    {id:"a4",title:"Library policy update",preview:"Borrowing limits increase to five titles per student from the new term.",status:"archived",roles:["Students"],classes:["Grade 10 – A"],author:"Sara Lindqvist",init:"SL",created:"02 Jun 2026"},
    {id:"a5",title:"Lab safety induction (drafting)",preview:"All Grade 9 students must complete the safety induction before the first chemistry practical.",status:"draft",roles:["Students"],classes:["Grade 9 – A","Grade 9 – B"],author:"David Okafor",init:"DO",created:"31 May 2026"},
  ];
  const TABS=[
    {key:"all",label:"All",count:18},
    {key:"draft",label:"Draft",count:5},
    {key:"published",label:"Published",count:11},
    {key:"archived",label:"Archived",count:2},
  ];

  /* ---- row actions popover: only valid lifecycle transitions per status ---- */
  function RowMenu({status,onPublish,onArchive,onDelete}){
    return <div className="menu" role="menu" onClick={e=>e.stopPropagation()}>
      {status!=="archived" && <button role="menuitem"><i data-lucide="pencil"></i>Edit</button>}
      {status==="draft" && <button role="menuitem" onClick={onPublish}><i data-lucide="send"></i>Publish</button>}
      {status==="published" && <button role="menuitem"><i data-lucide="eye"></i>View</button>}
      {status==="published" && <button role="menuitem" onClick={onArchive}><i data-lucide="archive"></i>Archive</button>}
      {status==="archived" && <button role="menuitem"><i data-lucide="eye"></i>View</button>}
      {status==="archived" && <button role="menuitem"><i data-lucide="undo-2"></i>Restore to draft</button>}
      {(status==="draft"||status==="archived") && <React.Fragment>
        <div className="div"></div>
        <button role="menuitem" className="danger" onClick={onDelete}><i data-lucide="trash-2"></i>Delete</button>
      </React.Fragment>}
    </div>;
  }

  const [tab,setTab]=React.useState("all");
  const [menuId,setMenuId]=React.useState(null);
  const [editorOpen,setEditorOpen]=React.useState(false);
  const [bodyTab,setBodyTab]=React.useState("write");

  const showToast=(t)=>{ setToast(t); };

  const switchTab=(k)=>{ setTab(k); setMenuId(null); };

  // editor audience summary (optimistic / local)
  const selRoles = Object.keys(roles).filter(k=>roles[k]);
  const selClasses = Object.keys(classSel).filter(k=>classSel[k]);
  let audText;
  if(!selRoles.length && !selClasses.length) audText="Everyone in this academy";
  else {
    const parts=[];
    if(selRoles.length) parts.push(selRoles.join(", "));
    if(selClasses.length) parts.push(selClasses.length+" class"+(selClasses.length>1?"es":""));
    audText=parts.join(" · ");
  }

  const doSave=()=>{ setSaving(true); setTimeout(()=>{ setSaving(false); setEditorOpen(false); showToast({icon:"check-circle-2",label:"Draft saved."}); },800); };
  const runConfirm=()=>{
    const k=confirm.kind; setConfirm(null);
    if(k==="publish") showToast({icon:"check-circle-2",label:"Announcement published."});
    else if(k==="archive") showToast({icon:"check-circle-2",label:"Announcement archived."});
    else if(k==="delete") showToast({icon:"check-circle-2",label:"Announcement deleted.",undo:true});
  };

  return (<div className="vw-announcements">

    {/* Page header — single spark CTA (foundation §2.2) */}

      <div className="tx"><h1 className="ax-h1">Announcements</h1>
        <div className="ax-sub">Broadcast notices to your academy.</div></div>
      <div className="ac">
        <Button variant="spark" leadingIcon="plus" onClick={()=>{setEditorOpen(true);setBodyTab("write");}}>New announcement</Button>
      </div>
    </div>

    {/* Platform notices band — read-only context; OMITTED entirely when none (§5) */}
    <div className="pn-band" aria-label="Platform notices">
      <div className="pn-head"><i data-lucide="info"></i>Platform notices</div>
      <div className="pn-grid">
        {PLATFORM.map(p=>(
          <div className="pn-card" key={p.id}>
            <div className="ct"><i data-lucide="radio" style={{width:14,height:14,color:"var(--status-info)"}}></i>{p.title}
              <span className="ro"><i data-lucide="lock"></i>Read-only</span></div>
            {/* ContentRenderer (md + KaTeX) — read-only render of the notice body */}
            <div className="cb">{p.body}</div>
            <div className="mt">{p.date} · {p.author}</div>
          </div>))}
      </div>
    </div>

    {/* Status filter tabs with count chips */}
    <div className="ax-row" style={{justifyContent:"space-between",flexWrap:"wrap"}}>
      <div className="tabs" role="tablist" aria-label="Filter announcements by status">
        {TABS.map(t=>(
          <button key={t.key} role="tab" aria-selected={tab===t.key} aria-label={t.label+", "+t.count}
            className={"tab"+(tab===t.key?" on":"")} onClick={()=>switchTab(t.key)}>
            {t.label}<span className="pill">{t.count}</span></button>
        ))}
      </div>
      <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Scoped to <b className="ax-sec">Northwood Academy</b> only</span>
    </div>

    {/* Primary success state — DataTable */}
    {rows.length>0 ? <div className="tbl-wrap">
      <table className="tbl" aria-label="Announcements">
        <thead><tr>
          <th className="so">Title <i data-lucide="chevrons-up-down"></i></th>
          <th className="so">Status</th>
          <th>Audience</th>
          <th>Author</th>
          <th className="so">Created <i data-lucide="chevron-down"></i></th>
          <th style={{width:48}}><span className="ax-sr">Actions</span></th>
        </tr></thead>
        <tbody>
          {rows.map(r=>(
            <tr key={r.id}>
              <td><div className="cell-title"><span className="tt">{r.title}</span><span className="bp">{r.preview}</span></div></td>
              <td><StatusBadge status={r.status}/></td>
              <td><Audience roles={r.roles} classes={r.classes}/></td>
              <td><div className="cell-author"><div className="av-sm">{r.init}</div><span className="ax-sec">{r.author}</span></div></td>
              <td className="ax-mono ax-sec" style={{whiteSpace:"nowrap"}}>{r.created}</td>
              <td className="relpos" style={{textAlign:"right"}}>
                <button className="icon-btn" aria-label={"Actions for "+r.title} onClick={()=>setMenuId(menuId===r.id?null:r.id)}><i data-lucide="more-horizontal"></i></button>
                {menuId===r.id && <RowMenu status={r.status}
                  onPublish={()=>{setMenuId(null);setConfirm({kind:"publish",row:r});}}
                  onArchive={()=>{setMenuId(null);setConfirm({kind:"archive",row:r});}}
                  onDelete={()=>{setMenuId(null);setConfirm({kind:"delete",row:r});}}/>}
              </td>
            </tr>))}
        </tbody>
      </table>
    </div>
    : /* Filtered-empty variant (§5) */ <div className="tbl-wrap"><div className="empty">
        <div className="ei"><i data-lucide="filter-x"></i></div>
        <div className="et">No {tab} announcements</div>
        <div className="eb">No announcements match this filter.</div>
        <div className="ea"><Button variant="ghost" leadingIcon="x" onClick={()=>setTab("all")}>Clear filter</Button></div>
      </div></div>}

    {/* Pagination */}
    <div className="pag">
      <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Showing <span className="ax-mono">1–{rows.length}</span> of <span className="ax-mono">18</span> announcements</span>
      <div className="nums">
        <button className="pg" aria-label="Previous page"><i data-lucide="chevron-left" style={{width:14,height:14}}></i></button>
        <button className="pg on" aria-current="page">1</button>
        <button className="pg">2</button>
        <button className="pg">3</button>
        <button className="pg" aria-label="Next page"><i data-lucide="chevron-right" style={{width:14,height:14}}></i></button>
      </div>
      <button className="tb-sel">Rows: 20<i data-lucide="chevron-down"></i></button>
    </div>

    {/* ===== Secondary stacked examples: the spec's other distinctive §5 states ===== */}
    <div className="sec-label" style={{marginTop:"var(--space-4)"}}><i data-lucide="layers-2"></i>Other states (reference)</div>

    {/* Error: list-load failure inside the card region + Retry (§5 Error) */}
    <div className="alert err" role="alert">
      <i data-lucide="alert-octagon" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load announcements. </span>
        <span className="ax-sec">The directory service timed out.</span></div>
      <span className="lnk">Retry →</span>
    </div>

    {/* Quota-blocked publish (§8 cost/quota — publish blocked server-side, surfaced as toast/banner) */}
    <div className="alert warn" role="status">
      <i data-lucide="bell-off" className="lead"></i>
      <div className="ab"><span className="at">Notification quota reached for this billing cycle. </span>
        <span className="ax-sec">Publishing is paused until the quota resets. Drafts can still be saved.</span></div>
      <span className="lnk" data-go="#/ai-usage" style={{cursor:'pointer'}}>Review plan →</span>
    </div>

    {/* Permission-gated (useCan('manageAnnouncements')=false → actions hidden, not just disabled — §8 RBAC) */}
    <div className="alert info" role="status">
      <i data-lucide="eye" className="lead"></i>
      <div className="ab"><span className="at">You have view-only access to announcements. </span>
        <span className="ax-sec">New announcement, Edit, Publish, Archive, and Delete are hidden for your role.</span></div>
    </div>

    {/* Loading skeleton — 5 placeholder rows (§5 Loading) */}
    <div className="tbl-wrap" aria-busy="true" aria-label="Loading announcements">
      <table className="tbl"><tbody>
        {[0,1,2,3,4].map(i=>(
          <tr key={i}>
            <td><div className="ax-col" style={{gap:6}}><div className="skl" style={{width:200,height:13}}></div><div className="skl" style={{width:280,height:10}}></div></div></td>
            <td><div className="skl" style={{width:78,height:18,borderRadius:"var(--radius-pill)"}}></div></td>
            <td><div className="skl" style={{width:96,height:18,borderRadius:"var(--radius-sm)"}}></div></td>
            <td><div className="cell-author"><div className="skl" style={{width:26,height:26,borderRadius:"var(--radius-pill)"}}></div><div className="skl" style={{width:80,height:11}}></div></div></td>
            <td><div className="skl" style={{width:74,height:11}}></div></td>
            <td></td>
          </tr>))}
      </tbody></table>
    </div>

    {/* True-empty onboarding state (§5 / §7) — Megaphone glyph + spark CTA */}
    <div className="tbl-wrap"><div className="empty">
      <div className="ei"><i data-lucide="megaphone"></i></div>
      <div className="et">No announcements yet</div>
      <div className="eb">Create your first announcement to reach students, parents, and teachers.</div>
      <div className="ea"><Button variant="spark" leadingIcon="plus" onClick={()=>setEditorOpen(true)}>New announcement</Button></div>
    </div></div>

    {/* ===== Editor Modal (create/edit) ===== */}
    {editorOpen && <React.Fragment>
      <div className="overlay" onClick={()=>!saving&&setEditorOpen(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label="New announcement">
        <div className="box">
          <div className="mh"><div><div className="mt">New announcement</div>
            <div className="ms">Compose a notice for your academy. It will be saved as a draft.</div></div>
            <button className="icon-btn" aria-label="Close" onClick={()=>!saving&&setEditorOpen(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            {saving && <div className="loadover" aria-hidden="true"><div className="spinner"></div></div>}

            <div className="field">
              <label className="fl" htmlFor="an-title">Title <span className="req">*</span><span className="ct">23 / 200</span></label>
              <input id="an-title" defaultValue="End-of-term exam timetable" autoFocus/>
            </div>

            <div className="field">
              <label className="fl">Body <span className="req">*</span>
                <span style={{marginLeft:"auto"}}><div className="subtabs" role="tablist" aria-label="Body editor mode">
                  <button role="tab" aria-selected={bodyTab==="write"} className={"subtab"+(bodyTab==="write"?" on":"")} onClick={()=>setBodyTab("write")}><i data-lucide="pencil"></i>Write</button>
                  <button role="tab" aria-selected={bodyTab==="preview"} className={"subtab"+(bodyTab==="preview"?" on":"")} onClick={()=>setBodyTab("preview")}><i data-lucide="eye"></i>Preview</button>
                </div></span>
              </label>
              {bodyTab==="write"
                ? <textarea aria-label="Announcement body (Markdown and KaTeX)" defaultValue={"## Exam timetable\n\nGrade 8 exams begin **Monday 24 June**. Grading uses the weighted mean $\\bar{x}=\\frac{1}{n}\\sum x_i$.\n\nSee the attached schedule by class."}></textarea>
                : <div className="preview"><h3>Exam timetable</h3>
                    <p>Grade 8 exams begin <b>Monday 24 June</b>. Grading uses the weighted mean <code>x̄ = (1/n)·Σxᵢ</code>.</p>
                    <p>See the attached schedule by class.</p></div>}
              <span className="fh">Markdown + math supported. Source is stored, not raw HTML.</span>
            </div>

            <div className="field" style={{maxWidth:240}}>
              <label className="fl" htmlFor="an-exp">Expiry date (optional)</label>
              <input id="an-exp" type="date" defaultValue="2026-06-30"/>
            </div>

            <div className="divh">Audience</div>

            <div className="field">
              <label className="fl">Target roles (optional)</label>
              <div className="opts" role="group" aria-label="Target roles">
                {["Students","Parents","Teachers"].map(rk=>(
                  <button key={rk} className={"opt"+(roles[rk]?" on":"")} aria-pressed={roles[rk]}
                    onClick={()=>setRoles(s=>({...s,[rk]:!s[rk]}))}>
                    <i data-lucide={roles[rk]?"check-square":"square"}></i>{rk}</button>
                ))}
              </div>
              <span className="fh">Leave unchecked to send to everyone.</span>
            </div>

            <div className="field">
              <label className="fl">Target classes (optional)</label>
              <div className="classlist">
                <div className="cs"><i data-lucide="search"></i><input placeholder="Search classes…" aria-label="Search classes"/></div>
                {Object.keys(classSel).map(c=>(
                  <label className="ci" key={c}>
                    <input type="checkbox" className="chk" checked={classSel[c]} onChange={()=>setClassSel(s=>({...s,[c]:!s[c]}))}/>
                    <span>{c}</span></label>
                ))}
              </div>
              <span className="fh">Leave unchecked to send to all classes.</span>
            </div>

            {/* AudienceSummary — recomputes locally; recipient count omitted (server-computed, §8) */}
            <div className="audsum" aria-live="polite"><i data-lucide="users"></i><span>{audText}</span></div>
          </div>
          <div className="mf">
            <div className="gr ax-row" style={{gap:6,fontSize:"var(--text-2xs)",color:"var(--text-muted)"}}>
              <i data-lucide="shield" style={{width:13,height:13}}></i>Author and timestamps are recorded automatically.</div>
            <Button variant="ghost" disabled={saving} onClick={()=>setEditorOpen(false)}>Cancel</Button>
            <Button variant="secondary" disabled={saving} leadingIcon="save" onClick={doSave}>{saving?"Saving…":"Save draft"}</Button>
            <Button variant="primary" disabled={saving} leadingIcon="send" onClick={()=>{setEditorOpen(false);setConfirm({kind:"publish",row:{title:"this announcement"}});}}>Publish</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

    {/* ===== ConfirmDialog — Publish / Archive / Delete (explicit consequence copy; audit-logged) ===== */}
    {confirm && <React.Fragment>
      <div className="overlay" onClick={()=>setConfirm(null)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label="Confirm action">
        <div className="box sm">
          <div className="mh"><div><div className="mt">
            {confirm.kind==="publish" && "Publish this announcement?"}
            {confirm.kind==="archive" && "Archive this announcement?"}
            {confirm.kind==="delete"  && "Delete this announcement?"}
          </div></div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setConfirm(null)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            {confirm.kind==="publish" && <div className="alert info" role="note"><i data-lucide="send" className="lead"></i>
              <div className="ab"><span className="ax-sec">It will be visible to <b className="ax-sec">{(selRoles.length||selClasses.length)?audText:"everyone in this academy"}</b> and can only be archived afterward — not unpublished. This action is logged.</span></div></div>}
            {confirm.kind==="archive" && <div className="alert warn" role="note"><i data-lucide="archive" className="lead"></i>
              <div className="ab"><span className="ax-sec">It will stop being shown to recipients. You can restore it to a draft later. This action is logged.</span></div></div>}
            {confirm.kind==="delete" && <div className="alert err" role="note"><i data-lucide="trash-2" className="lead"></i>
              <div className="ab"><span className="ax-sec">This permanently deletes the announcement. This can't be undone. This action is logged.</span></div></div>}
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setConfirm(null)}>Cancel</Button>
            {confirm.kind==="publish" && <Button variant="primary" leadingIcon="send" onClick={runConfirm}>Publish</Button>}
            {confirm.kind==="archive" && <Button variant="secondary" leadingIcon="archive" onClick={runConfirm}>Archive</Button>}
            {confirm.kind==="delete"  && <Button variant="danger" leadingIcon="trash-2" onClick={runConfirm}>Delete permanently</Button>}
          </div>
        </div>
      </div>
    </React.Fragment>}

    {/* ===== Toast (sonner) — save / publish / archive / delete results ===== */}
    {toast && <div className="toastwrap"><div className="toast suc" role="status" aria-live="polite">
      <i data-lucide={toast.icon} className="lead"></i>
      <span className="tl">{toast.label}</span>
      {toast.undo && <span className="undo" onClick={()=>setToast(null)}>Undo</span>}
      <button className="icon-btn" aria-label="Dismiss" onClick={()=>setToast(null)}><i data-lucide="x" style={{width:14,height:14}}></i></button>
    </div></div>}

  </div>);
}

function View_Notifications(){
  const Button = L.Button || (({children,leadingIcon,variant,size,disabled,onClick,busy,...rest})=>
    <button className={"btn btn--"+(variant||"primary")+(size?" btn--"+size:"")} disabled={disabled||busy} onClick={onClick} aria-busy={busy?"true":undefined} {...rest}>
      {busy?<span className="spin"></span>:(leadingIcon&&<i data-lucide={leadingIcon}></i>)}{children}</button>);

  /* ---- Notification type → semantic-status map (icon + label + tone) ---- */
  const TYPE_MAP = {
    ai_budget_alert:      {icon:"alert-triangle", label:"Budget Alert",     tone:"warn"},
    student_at_risk:      {icon:"alert-octagon",   label:"At Risk Alert",   tone:"err"},
    grading_complete:     {icon:"check-circle",    label:"Grading Complete",tone:"suc"},
    exam_results_released:{icon:"check-circle",    label:"Exam Results",    tone:"suc"},
    bulk_import_complete: {icon:"download",        label:"Import Complete", tone:"info"},
    deadline_reminder:    {icon:"clock",           label:"Deadline",        tone:"warn"},
    space_published:      {icon:"book-open",       label:"Space Published", tone:"info"},
    new_exam_assigned:    {icon:"file-text",       label:"New Exam",        tone:"info"},
    system_announcement:  {icon:"megaphone",       label:"Announcement",    tone:"brand"},
  };

  /* ---- sample data (server-authoritative; CF-created; render-only) ---- */
  const SEED = [
    {id:"n1", grp:"Today", type:"ai_budget_alert",       title:"AI budget alert",          body:"Tenant spend reached 80% of the monthly cap. Review usage on the AI Usage page before the cap is hit.", time:"12 min ago", at:"20 Jun 2026, 09:14", read:false, url:"#/ai-usage"},
    {id:"n2", grp:"Today", type:"bulk_import_complete",   title:"Bulk import complete",     body:"248 students imported into Grade 9. 3 rows were skipped as duplicates.", time:"2 hours ago", at:"20 Jun 2026, 07:31", read:true, url:"#/users"},
    {id:"n3", grp:"Today", type:"grading_complete",       title:"Grading complete",         body:"Auto-grading finished for Mid-Term Mathematics (Class 8A). 31 of 31 submissions scored.", time:"4 hours ago", at:"20 Jun 2026, 05:50", read:false, url:"#/exams"},
    {id:"n4", grp:"Yesterday", type:"student_at_risk",    title:"Student at risk",          body:"3 students flagged in Class 10-B from this week's analytics run. Falling mastery and missed deadlines.", time:"Yesterday", at:"19 Jun 2026, 18:02", read:false, url:"#/analytics"},
    {id:"n5", grp:"Yesterday", type:"exam_results_released", title:"Exam results released", body:"Results for End-Term Physics (Grade 11) were released to students and parents.", time:"Yesterday", at:"19 Jun 2026, 16:20", read:true, url:"#/exams"},
    {id:"n6", grp:"Earlier", type:"space_published",      title:"Space published",          body:"The space “Data Structures — Foundations” was published and assigned to 4 classes.", time:"3 days ago", at:"17 Jun 2026, 11:09", read:true, url:"#/spaces"},
    {id:"n7", grp:"Earlier", type:"deadline_reminder",    title:"Deadline approaching",     body:"The submission window for Quarterly Chemistry closes in 24 hours for Grade 12.", time:"3 days ago", at:"17 Jun 2026, 09:00", read:true, url:"#/exams"},
    {id:"n8", grp:"Earlier", type:"system_announcement",  title:"Scheduled maintenance",    body:"Platform maintenance is planned for 28 Jun, 02:00–04:00 local time. Brief read-only windows expected.", time:"5 days ago", at:"15 Jun 2026, 08:00", read:true, url:null},
  ];
  const GROUPS = ["Today","Yesterday","Earlier"];

  function NRow({n, onOpen, onMarkRead, busy}){
    const m = TYPE_MAP[n.type];
    return (
      <article className={"nrow"+(n.read?"":" unread")} role="article" tabIndex="0"
        aria-label={n.title+", "+n.time+(n.read?"":", unread")}
        data-go={n.url||undefined}
        onClick={()=>onOpen(n)}
        onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();onOpen(n);}}}>
        <div className={"nicon "+m.tone}><i data-lucide={m.icon}></i></div>
        <div className="nbody">
          <div className="ntop">
            <span className="ntitle">{n.title}</span>
            {!n.read && <span className="udot" aria-hidden="true"></span>}
            {!n.read && <span className="ax-sr">Unread</span>}
            {!n.read &&
              <button className="btn btn--ghost btn--sm markread"
                aria-label={"Mark “"+n.title+"” as read"}
                disabled={busy}
                onClick={e=>{e.stopPropagation();onMarkRead(n.id);}}>
                {busy?<span className="spin"></span>:<i data-lucide="check"></i>}Mark read</button>}
          </div>
          <div className="nexcerpt">{n.body}</div>
          <div className="nmeta">
            <span className="ntime" title={n.at}>{n.time}</span>
            <span className={"tagbadge "+m.tone} aria-label={"Type: "+m.label}><i data-lucide={m.icon}></i>{m.label}</span>
          </div>
        </div>
      </article>
    );
  }

  const [items,setItems]=React.useState(SEED);
  const [tab,setTab]=React.useState("all");        // all | unread
  const [rowBusy,setRowBusy]=React.useState(null);  // id mid-markRead
  const [allBusy,setAllBusy]=React.useState(false);
  const [toast,setToast]=React.useState(null);
  const live=React.useRef(null);

  const unreadCount = items.filter(i=>!i.read).length;
  const announce=(msg)=>{ if(live.current) live.current.textContent=msg; };

  const markRead=(id)=>{
    setRowBusy(id);
    setTimeout(()=>{ setItems(xs=>xs.map(x=>x.id===id?{...x,read:true}:x)); setRowBusy(null); announce("Marked as read"); },420);
  };
  const openRow=(n)=>{
    if(!n.read){ setItems(xs=>xs.map(x=>x.id===n.id?{...x,read:true}:x)); announce("Marked as read"); }
    /* deep-link out handled by global data-go delegated handler */
  };
  const markAll=()=>{
    if(unreadCount===0) return;
    setAllBusy(true);
    const cnt=unreadCount;
    setItems(xs=>xs.map(x=>({...x,read:true})));   // optimistic flip-in-place
    setTimeout(()=>{ setAllBusy(false); setToast({n:cnt}); announce("All marked as read"); setTimeout(()=>setToast(null),3200); },520);
  };

  const visible = tab==="unread" ? items.filter(i=>!i.read) : items;

  return (
    <div className="vw-notifications">

      {/* Page header — Mark all as read is GHOST/secondary (no hero CTA in admin chrome) */}
      <div className="ax-head">
        <div className="tx"><h1 className="ax-h1">Notifications</h1>
          <div className="ax-sub">Updates addressed to you in this academy.</div></div>
        <div className="ac">
          <Button variant="secondary" leadingIcon={allBusy?null:"check-check"} busy={allBusy}
            disabled={unreadCount===0} onClick={markAll}>Mark all as read</Button>
        </div>
      </div>

      {/* Scope / domain note: tenant-isolated + recipient-scoped, server-derived */}
      <div className="alert info" role="note">
        <i data-lucide="shield" className="lead"></i>
        <div className="ab"><span className="ax-sec">This inbox shows only your own notifications in Northwood Academy. Scope is derived server-side from your claims — switching tenants re-scopes it entirely. Notifications are created by the system; you can read and mark them read, nothing else.</span></div>
      </div>

      {/* Filter Tabs — All / Unread (count chip) */}
      <div className="tabs" role="tablist" aria-label="Filter notifications">
        <button role="tab" aria-selected={tab==="all"} className={"tab"+(tab==="all"?" on":"")} onClick={()=>setTab("all")}>All</button>
        <button role="tab" aria-selected={tab==="unread"} aria-label={"Unread, "+unreadCount}
          className={"tab"+(tab==="unread"?" on":"")} onClick={()=>setTab("unread")}>Unread{unreadCount>0&&<span className="pill">{unreadCount}</span>}</button>
      </div>

      {/* live region for SR mark-read announcements */}
      <div ref={live} className="ax-sr" role="status" aria-live="polite"></div>

      {/* PRIMARY SUCCESS STATE — grouped reading list */}
      <div className="reading">
        {visible.length===0
          ? (tab==="unread"
              ? <div className="listcard"><div className="empty">
                  <div className="ei"><i data-lucide="check-circle"></i></div>
                  <div className="et">You're all caught up</div>
                  <div className="eb">No unread notifications.</div>
                  <div className="ea"><Button variant="ghost" leadingIcon="list" onClick={()=>setTab("all")}>View all</Button></div>
                </div></div>
              : <div className="listcard"><div className="empty">
                  <div className="ei"><i data-lucide="inbox"></i></div>
                  <div className="et">No notifications yet</div>
                  <div className="eb">You're all caught up. New updates about imports, budgets, and student activity will appear here.</div>
                </div></div>)
          : <div className="listcard" role="feed" aria-label="Notifications">
              {GROUPS.map(g=>{
                const rows=visible.filter(n=>n.grp===g);
                if(rows.length===0) return null;
                return <React.Fragment key={g}>
                  <h2 className="grp-h">{g}</h2>
                  {rows.map(n=><NRow key={n.id} n={n} onOpen={openRow} onMarkRead={markRead} busy={rowBusy===n.id}/>)}
                </React.Fragment>;
              })}
              {/* Cursor pagination — Load more */}
              <div className="listfoot">
                <Button variant="ghost" leadingIcon="chevron-down">Load more</Button>
              </div>
            </div>}
      </div>

      {/* ===== Secondary stacked examples: this spec's other §5 states (present in markup) ===== */}
      <div className="sec-label" style={{marginTop:"var(--space-2)"}}><i data-lucide="layers-2"></i>Other states (reference)</div>

      {/* Loading skeleton — 5 rows on first load / filter change */}
      <div className="reading">
        <div className="listcard" aria-busy="true" aria-label="Loading notifications">
          <h2 className="grp-h">Loading</h2>
          {[0,1,2,3,4].map(i=>(
            <div className="nrow" key={i}>
              <div className="skl" style={{width:34,height:34,borderRadius:"var(--radius-md)"}}></div>
              <div className="nbody">
                <div className="skl" style={{width:i%2?180:220,height:13}}></div>
                <div className="skl" style={{width:i%2?320:420,height:11,marginTop:6}}></div>
                <div className="nmeta">
                  <div className="skl" style={{width:64,height:10}}></div>
                  <div className="skl" style={{width:88,height:16,borderRadius:"var(--radius-pill)"}}></div>
                </div>
              </div>
            </div>))}
        </div>
      </div>

      {/* Load error → InlineAlert banner (NOT empty state); code-driven copy + Retry */}
      <div className="reading">
        <div className="alert err" role="alert">
          <i data-lucide="alert-triangle" className="lead"></i>
          <div className="ab"><span className="at">Couldn't load notifications. </span>
            <span className="ax-sec">The service didn't respond. PERMISSION_DENIED → you don't have access to these notifications; RATE_LIMITED → try again shortly; TENANT_SUSPENDED → this academy is suspended.</span></div>
          <button className="lnk" aria-label="Retry loading notifications">Retry</button>
        </div>
      </div>

      {/* Empty — Unread filter (with View all ghost) */}
      <div className="reading">
        <div className="listcard"><div className="empty">
          <div className="ei"><i data-lucide="check-circle"></i></div>
          <div className="et">You're all caught up</div>
          <div className="eb">No unread notifications.</div>
          <div className="ea"><Button variant="ghost" leadingIcon="list" onClick={()=>setTab("all")}>View all</Button></div>
        </div></div>
      </div>

      {/* Empty — All filter (no CTA; receiving surface) */}
      <div className="reading">
        <div className="listcard"><div className="empty">
          <div className="ei"><i data-lucide="inbox"></i></div>
          <div className="et">No notifications yet</div>
          <div className="eb">You're all caught up. New updates about imports, budgets, and student activity will appear here.</div>
        </div></div>
      </div>

      {/* Mobile variant — inline "Mark read" collapses to a trailing check IconButton (≥44px tap target) */}
      <div className="reading">
        <div className="sec-label" style={{marginBottom:"var(--space-2)"}}><i data-lucide="smartphone"></i>Mobile row — Mark read becomes a trailing icon button</div>
        <div className="listcard">
          <article className="nrow unread" role="article">
            <div className="nicon warn"><i data-lucide="alert-triangle"></i></div>
            <div className="nbody">
              <div className="ntop"><span className="ntitle">AI budget alert</span><span className="udot" aria-hidden="true"></span><span className="ax-sr">Unread</span></div>
              <div className="nexcerpt">Tenant spend reached 80% of the monthly cap.</div>
              <div className="nmeta"><span className="ntime">12 min ago</span><span className="tagbadge warn"><i data-lucide="alert-triangle"></i>Budget Alert</span></div>
            </div>
            <button className="icon-btn" style={{width:44,height:44,marginLeft:"auto",alignSelf:"center"}} aria-label="Mark as read"><i data-lucide="check"></i></button>
          </article>
        </div>
      </div>

      {/* Permission / access note — non-tenantAdmin never renders this screen (RequireAuth), stale token denied server-side */}
      <div className="reading">
        <div className="alert info" role="note">
          <i data-lucide="lock" className="lead"></i>
          <div className="ab"><span className="at">Tenant-admin only. </span>
            <span className="ax-sec">Any non-tenant-admin reaching /notifications is blocked at RequireAuth and this screen never renders. A stale token is denied server-side (PERMISSION_DENIED → error banner above).</span></div>
        </div>
      </div>

      {/* Success Toast — Mark all as read (server-authoritative markedCount) */}
      {toast && <div className="toastwrap">
        <div className="toast" role="status">
          <i data-lucide="check-circle"></i>
          <span>All caught up.</span>
          <span className="tc">{toast.n} marked</span>
        </div>
      </div>}

    </div>
  );
}

function View_Settings(){

    {key:"parent",label:"Parent portal",hint:"Parents see linked children's progress.",on:true,inplan:true},

  const [tab,setTab]=React.useState("general");

  const [editColor,setEditColor]=React.useState(false);
  const [saving,setSaving]=React.useState(false);
  const [color,setColor]=React.useState("indigo");
  const [feat,setFeat]=React.useState(()=>{const o={};FEATURES.forEach(f=>o[f.key]=f.on);return o;});
  const [evalDims,setEvalDims]=React.useState({clarity:true,depth:true,structure:false,relevance:true});
  const [evalSw,setEvalSw]=React.useState({strengths:true,takeaway:true});

  const [removeKey,setRemoveKey]=React.useState(false);
  const [toast,setToast]=React.useState(null);
  const [hasKey,setHasKey]=React.useState(true);

  const fire=(tt,tb)=>{ setToast({tt,tb}); setTimeout(()=>setToast(null),2600); };
  const saveSchool=()=>{ setSaving(true); setTimeout(()=>{ setSaving(false); setEditSchool(false); fire("Changes saved.","School information updated for "+TENANT+"."); },900); };
  const saveColor=()=>{ setSaving(true); setTimeout(()=>{ setSaving(false); setEditColor(false); fire("Changes saved.","Brand color applied. Students and staff will see it shortly."); },900); };

  const previewBg = color==="indigo"?"var(--brand-primary)" : color==="spark"?"var(--spark)" : color==="sky"?"var(--sky-500)" : "var(--ink-900)";
  const previewFg = color==="spark"?"var(--ink-900)":"var(--text-on-accent)";

  return (
    <div className="vw-settings">

      {/* Page header — plan Badge + mono tenantCode chip + copy */}
      <div className="ax-head">
        <div className="tx">
          <h1 className="ax-h1">Tenant settings
            <span className="badge brd"><i data-lucide="award"></i>{PLAN}</span>
            <span className="badge mut ax-mono">{TENANT_CODE}
              <button className="icon-btn" style={{width:22,height:22}} aria-label="Copy tenant code"
                onClick={()=>fire("Tenant code copied.","NWA-0421 is on your clipboard.")}><i data-lucide="copy"></i></button>
            </span>
          </h1>
          <div className="ax-sub">Configure how {TENANT} appears and behaves across LevelUp.</div>
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs" role="tablist" aria-label="Settings sections">
        {TABS.map(t=>(
          <button key={t.key} role="tab" aria-selected={tab===t.key}
            className={"tab"+(tab===t.key?" on":"")} onClick={()=>setTab(t.key)}>
            <i data-lucide={t.icon}></i>{t.label}</button>
        ))}
      </div>

      {/* ============ GENERAL ============ */}
      {tab==="general" && <div role="tabpanel" aria-label="General" className="ax-col" style={{display:"flex",flexDirection:"column",gap:"var(--space-6)"}}>
        <div className="card">
          <div className="ch">
            <div className="ct"><div className="ctt">School information</div>
              <div className="css">Name and contact details shown to students, parents, and staff.</div></div>
            <div className="ca">
              {!editSchool
                ? <Button variant="ghost" size="sm" leadingIcon="pencil" onClick={()=>setEditSchool(true)}>Edit</Button>
                : <React.Fragment>
                    <Button variant="ghost" size="sm" onClick={()=>setEditSchool(false)} disabled={saving}>Cancel</Button>
                    <Button variant="primary" size="sm" leadingIcon="check" loading={saving} onClick={saveSchool}>Save</Button>
                  </React.Fragment>}
            </div>
          </div>
          <div className="cb">
            <div className="g2">
              <div className="field"><label className="fl" htmlFor="f-name">School name <span className="req">*</span></label>
                <input id="f-name" defaultValue={TENANT} readOnly={!editSchool}/></div>
              <div className="field"><label className="fl" htmlFor="f-code">Tenant code</label>
                <div className="ro-inp">
                  <input id="f-code" className="ax-mono" defaultValue={TENANT_CODE} readOnly/>
                  <button className="icon-btn" aria-label="Copy tenant code" onClick={()=>fire("Tenant code copied.","NWA-0421 is on your clipboard.")}><i data-lucide="copy"></i></button>
                </div>
                <div className="fh">Students and staff use this code to join your academy. It can't be changed.</div></div>
              <div className="field"><label className="fl" htmlFor="f-email">Contact email</label>
                <input id="f-email" type="email" defaultValue="admin@northwood.edu" readOnly={!editSchool}/></div>
              <div className="field"><label className="fl" htmlFor="f-phone">Contact phone</label>
                <input id="f-phone" defaultValue="+44 20 7946 0421" readOnly={!editSchool}/></div>
              <div className="field"><label className="fl" htmlFor="f-person">Contact person</label>
                <input id="f-person" defaultValue="Anita Kapoor" readOnly={!editSchool}/></div>
              <div className="field"><label className="fl" htmlFor="f-web">Website</label>
                <input id="f-web" defaultValue="https://northwood.edu" readOnly={!editSchool}/></div>
            </div>
            <div className="field"><label className="fl">Address</label>
              <input defaultValue="14 Elm Row, Camden, London, United Kingdom, NW1 7AE" readOnly={!editSchool}/></div>
          </div>
        </div>

        {/* Subscription — server-authoritative, read-only */}
        <div className="card">
          <div className="ch"><div className="ct"><div className="ctt">Subscription</div>
            <div className="css">Plan limits are set by your platform provider.</div></div></div>
          <div className="cb">
            <div className="stat-grid">
              <div className="stat"><div className="sl"><i data-lucide="award"></i>Plan</div><div className="sv" style={{fontFamily:"var(--font-ui)"}}>Pro</div></div>
              <div className="stat"><div className="sl"><i data-lucide="graduation-cap"></i>Max students</div><div className="sv">200</div></div>
              <div className="stat"><div className="sl"><i data-lucide="users"></i>Max teachers</div><div className="sv">30</div></div>
              <div className="stat"><div className="sl"><i data-lucide="layers"></i>Max spaces</div><div className="sv">25</div></div>
            </div>
            <div className="alert info" role="note"><i data-lucide="info" className="lead"></i>
              <div className="ab"><span className="ax-sec">Your plan and limits are managed by your platform provider. Contact support to change them.</span></div></div>
          </div>
        </div>
      </div>}

      {/* ============ BRANDING ============ */}
      {tab==="branding" && <div role="tabpanel" aria-label="Branding" className="ax-col" style={{display:"flex",flexDirection:"column",gap:"var(--space-6)"}}>
        <div className="card">
          <div className="ch"><div className="ct"><div className="ctt">Logo & assets</div>
            <div className="css">Your logo appears in every student, parent, and teacher shell.</div></div></div>
          <div className="cb">
            <div className="brand-2col">
              <div className="logo-tile"><div className="mono-logo">N</div></div>
              <div className="ax-col" style={{gap:"var(--space-3)"}}>
                <div className="filedrop" role="button" tabIndex="0" aria-label="Upload logo">
                  <i data-lucide="upload-cloud"></i>
                  <div className="ft">Drop your logo here, or click to browse.</div>
                  <div className="fhi">PNG, JPEG, SVG, or WebP — max 2 MB. Square works best.</div>
                </div>
                <div className="upbar" aria-hidden="true">
                  <div className="ut"><span>northwood-logo.svg</span><span className="ax-mono">100%</span></div>
                  <div className="bar-track"><div className="bar-fill" style={{width:"100%"}}></div></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="ch"><div className="ct"><div className="ctt">Brand color</div>
            <div className="css">Choose an accent within the LevelUp palette. Custom colors must stay legible — we check contrast before saving.</div></div>
            <div className="ca">
              {!editColor
                ? <Button variant="ghost" size="sm" leadingIcon="pencil" onClick={()=>setEditColor(true)}>Edit</Button>
                : <React.Fragment>
                    <Button variant="ghost" size="sm" onClick={()=>setEditColor(false)} disabled={saving}>Cancel</Button>
                    <Button variant="primary" size="sm" leadingIcon="check" loading={saving} onClick={saveColor}>Save</Button>
                  </React.Fragment>}
            </div>
          </div>
          <div className="cb">
            <div className="swatches" role="radiogroup" aria-label="Brand accent color">
              {[["indigo","Indigo","sw-indigo"],["spark","Marigold","sw-spark"],["sky","Sky","sw-sky"],["auto","Lyceum default","sw-auto"]].map(([k,lbl,cls])=>(
                <button key={k} role="radio" aria-checked={color===k} aria-label={lbl}
                  className={"swatch"+(color===k?" on":"")} disabled={!editColor}
                  onClick={()=>editColor&&setColor(k)} style={{background:"none",border:"none",cursor:editColor?"pointer":"default"}}>
                  <span className={"dot "+cls}><i data-lucide="check"></i></span>
                  <span className="lbl">{lbl}</span>
                </button>
              ))}
            </div>
            <div className="field" style={{maxWidth:280}}>
              <label className="fl">Advanced — custom hex (validated to AA)</label>
              <input className="ax-mono" placeholder="auto" disabled aria-label="Custom hex color, advanced"/>
              <div className="fh">Custom values are contrast-checked against the surface before they can be saved.</div>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="ch"><div className="ct"><div className="ctt">Preview</div>
            <div className="css">How your branding appears to students and staff.</div></div></div>
          <div className="cb">
            <div className="preview-shell">
              <div className="preview-top" style={{background:previewBg,color:previewFg}}>
                <div className="pl">N</div><div className="pn">{TENANT}</div>
              </div>
              <div className="preview-body">
                <div className="ax-sub">Welcome back — here's today's work.</div>
                <span className="preview-btn" style={{background:previewBg,color:previewFg}}>Continue space</span>
                <div className="preview-prog"><div className="pf" style={{background:previewBg}}></div></div>
              </div>
            </div>
          </div>
        </div>
      </div>}

      {/* ============ EVALUATION ============ */}
      {tab==="evaluation" && <div role="tabpanel" aria-label="Evaluation" className="ax-col" style={{display:"flex",flexDirection:"column",gap:"var(--space-6)"}}>
        <div className="alert info" role="note"><i data-lucide="info" className="lead"></i>
          <div className="ab"><span className="ax-sec">Control which feedback dimensions and summaries students see on their results.</span></div></div>

        <div className="card">
          <div className="ch"><div className="ct"><div className="ctt">Default feedback policy</div>
            <div className="css">Applied when grading runs without a space-specific override.</div></div>
            <div className="ca"><span className="badge brd"><i data-lucide="star"></i>Default</span></div></div>
          <div className="cb">
            <div className="field"><label className="fl">Feedback dimensions students see</label>
              <div className="dim-row">
                {[["clarity","Clarity"],["depth","Depth"],["structure","Structure"],["relevance","Relevance"]].map(([k,lbl])=>(
                  <button key={k} className={"dim-chip"+(evalDims[k]?" on":"")} aria-pressed={!!evalDims[k]}
                    onClick={()=>setEvalDims(d=>({...d,[k]:!d[k]}))}>
                    {evalDims[k]&&<i data-lucide="check"></i>}{lbl}</button>
                ))}
              </div>
            </div>
            <div>
              <div className="sw-row"><div className="swt"><div className="swtt">Show strengths summary</div>
                <div className="swth">A short list of what the student did well.</div></div>
                <span className="state">{evalSw.strengths?"On":"Off"}</span>
                <Toggle checked={evalSw.strengths} onChange={()=>setEvalSw(s=>({...s,strengths:!s.strengths}))} label="Show strengths summary"/></div>
              <div className="sw-row"><div className="swt"><div className="swtt">Show key takeaway</div>
                <div className="swth">A single most-important next step per submission.</div></div>
                <span className="state">{evalSw.takeaway?"On":"Off"}</span>
                <Toggle checked={evalSw.takeaway} onChange={()=>setEvalSw(s=>({...s,takeaway:!s.takeaway}))} label="Show key takeaway"/></div>
            </div>
          </div>
        </div>

        <div className="sec-label"><i data-lucide="layers-2"></i>Empty state (reference)</div>
        <div className="card"><div className="empty">
          <div className="ei"><i data-lucide="clipboard-list"></i></div>
          <div className="et">No evaluation policy yet</div>
          <div className="eb">A default feedback configuration is created automatically the first time grading runs.</div>

      {/* ============ FEATURES ============ */}
      {tab==="features" && <div role="tabpanel" aria-label="Features" className="ax-col" style={{display:"flex",flexDirection:"column",gap:"var(--space-6)"}}>
        <div className="alert info" role="note"><i data-lucide="info" className="lead"></i>
          <div className="ab"><span className="ax-sec">Turn academy features on or off. Greyed-out features aren't included in your current plan.</span></div></div>
        <div className="card">
          <div className="ch"><div className="ct"><div className="ctt">Tenant features</div>
            <div className="css">Toggles apply across {TENANT}. Plan-excluded features can't be enabled.</div></div></div>
          <div className="cb" style={{gap:0}}>
            {FEATURES.map(f=>(
              <div className="sw-row" key={f.key}>
                <div className="swt"><div className="swtt">{f.label}</div>
                  <div className="swth">{f.inplan? f.hint : "Not available on the "+PLAN+" plan."}</div></div>

                  ? <span className="badge mut"><i data-lucide="lock"></i>Plan-gated</span>
                  : <span className="state">{feat[f.key]?"On":"Off"}</span>}
                <Toggle checked={!!feat[f.key]} disabled={!f.inplan}
                  onChange={()=>setFeat(s=>({...s,[f.key]:!s[f.key]}))} label={f.label}/>
              </div>
            ))}
          </div>
        </div>
      </div>}

      {/* ============ AI & API ============ */}
      {tab==="ai" && <div role="tabpanel" aria-label="AI and API" className="ax-col" style={{display:"flex",flexDirection:"column",gap:"var(--space-6)"}}>
        <div className="card">
          <div className="ch"><div className="ct"><div className="ctt">Gemini API key</div>
            <div className="css">Used for AI grading and chat. Your key is stored securely and never shown again after you save it.</div></div>

              {hasKey
                ? <React.Fragment>
                    <Button variant="secondary" size="sm" leadingIcon="key-round" onClick={()=>setKeyModal(true)}>Update key</Button>
