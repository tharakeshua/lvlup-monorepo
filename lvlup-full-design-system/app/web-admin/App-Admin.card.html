                  </React.Fragment>
                : <Button variant="primary" size="sm" leadingIcon="plus" onClick={()=>setKeyModal(true)}>Set key</Button>}
            </div>
          </div>
          <div className="cb">
            <div className="keyfield">
              <i data-lucide={hasKey?"lock":"key-round"} style={{width:16,height:16,color:"var(--text-muted)"}}></i>
              <span className="km">{hasKey? "•••••••••••••• (key set)" : "No key configured."}</span>
              {hasKey && <span className="badge suc"><i data-lucide="check"></i>Key set</span>}
            </div>
            <div className="alert info" role="note"><i data-lucide="shield" className="lead"></i>
              <div className="ab"><span className="ax-sec">The key is stored server-side as a secret reference and is never returned to this screen. We only show whether a key is set.</span></div></div>
          </div>
        </div>
      </div>}

      {/* ===== Secondary stacked §5 states (reference, always present in markup) ===== */}
      <div className="sec-label"><i data-lucide="layers-2"></i>Other states (reference)</div>

      {/* Loading skeleton (tenant doc hydrating) */}
      <div className="card" aria-busy="true" aria-label="Loading settings">
        <div className="ch"><div className="skl" style={{width:180,height:16}}></div></div>
        <div className="cb"><div className="g2">
          {[0,1,2,3].map(i=><div className="field" key={i}><div className="skl" style={{width:90,height:10}}></div><div className="skl" style={{width:"100%",height:36}}></div></div>)}
        </div></div>
      </div>

      {/* Read error — page-level, with retry (never blank) */}
      <div className="alert err" role="alert"><i data-lucide="alert-octagon" className="lead"></i>
        <div className="ab"><span className="at">Couldn't load your subscription. </span>
          <span className="ax-sec">The settings service timed out. Your unsaved edits are preserved.</span></div>
        <span className="lnk" style={{cursor:'pointer'}} onClick={()=>fire("Retrying…","Re-fetching subscription details.")}>Retry →</span></div>

      {/* Field-scoped write error (representative) */}
      <div className="alert warn" role="status"><i data-lucide="alert-triangle" className="lead"></i>
        <div className="ab"><span className="at">Couldn't save your changes. </span>
          <span className="ax-sec">Enter a valid email address — the contact email was rejected by the server.</span></div></div>

      {/* Permission-gated variant — AI/key tab hidden for staff without billing permission */}
      <div className="alert info" role="status"><i data-lucide="eye-off" className="lead"></i>
        <div className="ab"><span className="at">Some sections are hidden for your role. </span>
          <span className="ax-sec">The AI & API key tab requires the manage-billing permission, so it isn't shown — not just disabled.</span></div></div>

      {/* ===== Set/Update key Modal (write-only; key never round-trips) ===== */}
      {keyModal && <React.Fragment>
        <div className="overlay" onClick={()=>setKeyModal(false)}></div>
        <div className="modal" role="dialog" aria-modal="true" aria-label="Set Gemini API key">
          <div className="box">
            <div className="mh"><div className="mt">{hasKey?"Update":"Set"} Gemini API key</div>
              <button className="icon-btn" aria-label="Close" onClick={()=>setKeyModal(false)}><i data-lucide="x"></i></button></div>
            <div className="mb">
              <div className="field"><label className="fl" htmlFor="k-in">API key <span className="req">*</span></label>
                <input id="k-in" type="password" placeholder="Paste your Gemini API key"/>
                <div className="fh">Stored server-side as a secret reference. It won't be shown again after you save.</div></div>
              <div className="alert info" role="note"><i data-lucide="shield" className="lead"></i>
                <div className="ab"><span className="ax-sec">We never display or log the key. This change is attributed to you and audit-logged.</span></div></div>
            </div>
            <div className="mf">
              <Button variant="ghost" onClick={()=>setKeyModal(false)}>Cancel</Button>
              <Button variant="primary" leadingIcon="check" onClick={()=>{setKeyModal(false);setHasKey(true);fire("API key saved.","AI grading and chat are now active for "+TENANT+".");}}>Save key</Button>
            </div>
          </div>
        </div>
      </React.Fragment>}

      {/* ===== Remove key ConfirmDialog (destructive; explicit consequence + audit) ===== */}
      {removeKey && <React.Fragment>
        <div className="overlay" onClick={()=>setRemoveKey(false)}></div>
        <div className="modal" role="dialog" aria-modal="true" aria-label="Remove Gemini API key">
          <div className="box" style={{maxWidth:440}}>
            <div className="mh"><div className="mt">Remove Gemini API key?</div>
              <button className="icon-btn" aria-label="Close" onClick={()=>setRemoveKey(false)}><i data-lucide="x"></i></button></div>
            <div className="mb">
              <div className="alert warn" role="note"><i data-lucide="alert-triangle" className="lead"></i>
                <div className="ab"><span className="ax-sec">AI grading and chat will stop working for {TENANT} until a new key is added. This action is logged.</span></div></div>
            </div>
            <div className="mf">
              <Button variant="ghost" onClick={()=>setRemoveKey(false)}>Cancel</Button>
              <Button variant="danger" leadingIcon="trash-2" onClick={()=>{setRemoveKey(false);setHasKey(false);fire("API key removed.","AI grading and chat are paused until a new key is added.");}}>Remove key</Button>
            </div>
          </div>
        </div>
      </React.Fragment>}

      {/* ===== Neutral success toast (no celebration) ===== */}
      {toast && <div className="toast" role="status" aria-live="polite">
        <i data-lucide="check-circle-2" className="lead"></i>
        <div><div className="tt">{toast.tt}</div><div className="tb">{toast.tb}</div></div>
      </div>}

    </div>
  );
}

function View_DataExport(){
  const Button = L.Button || (({children,leadingIcon,trailingIcon,variant,disabled,loading,onClick})=>
    <button className={"btn btn--"+(variant||"primary")+(loading?" btn--loading":"")} disabled={disabled||loading} onClick={onClick}>
      {leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}{trailingIcon&&<i data-lucide={trailingIcon}></i>}</button>);

  const TENANT = "Northwood Academy";

  const StatusBadge = ({status})=>{
    if(status==="ready")    return <span className="badge suc"><i data-lucide="check-circle-2"></i>Ready</span>;
    if(status==="preparing")return <span className="badge inf"><i data-lucide="loader"></i>Preparing</span>;
    if(status==="failed")   return <span className="badge err"><i data-lucide="alert-circle"></i>Failed</span>;
    return <span className="badge exp"><i data-lucide="ban"></i>Expired</span>;
  };

  // Collection definitions — sensitive scopes flagged for ConfirmDialog gate (§6, §8)
  const COLLECTIONS = [
    {key:"students",   label:"Students"},
    {key:"teachers",   label:"Teachers"},
    {key:"parents",    label:"Parents"},
    {key:"classes",    label:"Classes"},
    {key:"exams",      label:"Exams",       hint:"no keys"},
    {key:"submissions",label:"Submissions", sensitive:true},
    {key:"analytics",  label:"Analytics",   sensitive:true, disabled:true}, // FEATURE_DISABLED on this tenant
  ];
  const SENSITIVE = new Set(["submissions","analytics"]);

  const [sel,setSel] = React.useState(()=>new Set(["students","classes"]));
  const [format,setFormat] = React.useState("csv");
  const [confirmOpen,setConfirmOpen] = React.useState(false);
  const [busy,setBusy] = React.useState(false);
  const [toast,setToast] = React.useState(false);
  const [forced,setForced] = React.useState(false); // validation: submit forced with nothing selected
  const liveRef = React.useRef(null);

  // server-authoritative history — client renders, never fabricates (§8.3)
  const [history,setHistory] = React.useState([
    {id:"x1",scope:"Students, Classes",fmt:"CSV",size:"2.4 MB",status:"ready",expires:"14:32",by:"Anita Kapoor · 20 Jun"},
    {id:"x2",scope:"Submissions",fmt:"JSON",size:"—",status:"preparing",by:"Anita Kapoor · 20 Jun"},
    {id:"x3",scope:"Teachers, Parents",fmt:"CSV",size:"0.8 MB",status:"ready",expires:"13:58",by:"Anita Kapoor · 20 Jun",partial:"Parents had no records."},
    {id:"x4",scope:"Exams",fmt:"CSV",size:"—",status:"expired",by:"Anita Kapoor · 19 Jun"},
    {id:"x5",scope:"Submissions, Analytics",fmt:"JSON",size:"—",status:"failed",by:"Anita Kapoor · 18 Jun"},
  ]);

  const count = sel.size;
  const fmtLabel = format.toUpperCase();
  const toggle = (k,disabled)=>{ if(disabled) return; setForced(false);
    setSel(p=>{const n=new Set(p); n.has(k)?n.delete(k):n.add(k); return n;}); };

  const announce = (msg)=>{ if(liveRef.current) liveRef.current.textContent = msg; };

  const enqueue = ()=>{
    setBusy(true); announce("Preparing export");
    const scopeNames = COLLECTIONS.filter(c=>sel.has(c.key)).map(c=>c.label).join(", ");
    // optimistic Preparing row — the FILE is never optimistic, only the row (§6)
    const id = "x"+Date.now();
    setHistory(h=>[{id,scope:scopeNames,fmt:fmtLabel,size:"—",status:"preparing",by:"Anita Kapoor · 20 Jun"},...h]);
    setTimeout(()=>{ // server returns downloadUrl/size/expiresAt — render-only
      setHistory(h=>h.map(r=>r.id===id?{...r,status:"ready",size:"1.9 MB",expires:"15:07"}:r));
      setBusy(false); setToast(true); announce("Export ready — download expires in 1 hour");
      setTimeout(()=>setToast(false),4200);
    },2000);
  };

  const onExport = ()=>{
    if(count===0){ setForced(true); announce("Select at least one collection to export."); return; }
    const hasSensitive = [...sel].some(k=>SENSITIVE.has(k));
    if(hasSensitive){ setConfirmOpen(true); return; }
    enqueue();
  };
  const confirmExport = ()=>{ setConfirmOpen(false); enqueue(); };

  const sensitiveScopeNames = COLLECTIONS.filter(c=>sel.has(c.key)&&SENSITIVE.has(c.key)).map(c=>c.label).join(" and ");

  return (
  <div className="vw-dataexport">
    <span ref={liveRef} aria-live="polite" className="ax-sr"></span>

    <div className="ax-head">
      <div className="tx">
        <h1 className="ax-h1">Data Export</h1>
        <div className="ax-sub">Export this school's records as JSON or CSV.</div>
      </div>
    </div>

    <div className="ax-work">
      {/* Tenant-isolation + expiry guarantee — names the tenant (§8.1) */}
      <div className="alert info" role="note">
        <i data-lucide="info" className="lead"></i>
        <div>Scoped to <b>{TENANT}</b> only. Exports never include data from other schools.
          Download links are signed and expire 1 hour after the file is ready.</div>
      </div>

      {/* Validation warning — surfaced when submit forced with nothing selected (§5) */}
      {forced && count===0 &&
        <div className="alert warn" role="alert">
          <i data-lucide="triangle-alert" className="lead"></i>
          <div><span className="at">Select at least one collection to export. </span>
            <span className="ax-sec">Choose one or more scopes below to continue.</span></div>
        </div>}

      {/* Configure export */}
      <div className="card">
        <div className="panel-h"><span className="pt">Configure export</span></div>
        <div className="panel-b">
          {/* Section 1 — collections */}
          <div role="group" aria-labelledby="sel-lbl">
            <div className="sec-lbl" id="sel-lbl">Select data to export</div>
            <div className="col-grid" style={{marginTop:"var(--space-3)"}}>
              {COLLECTIONS.map(c=>{
                const on = sel.has(c.key);
                const dis = !!c.disabled;
                return <div key={c.key}
                  className={"col-card"+(on?" sel":"")+(dis?" dis":"")+(dis?" tip":"")}
                  role="checkbox" aria-checked={on} aria-disabled={dis||undefined} tabIndex={dis?-1:0}
                  onClick={()=>toggle(c.key,dis)}
                  onKeyDown={e=>{if((e.key===" "||e.key==="Enter")&&!dis){e.preventDefault();toggle(c.key,dis);}}}>
                  <span className="box">{on&&<i data-lucide="check"></i>}</span>
                  <span className="cl">{c.label}</span>
                  {c.hint && <span className="ch">{c.hint}</span>}
                  {dis && <span className="tt">Analytics export isn't enabled for this school.</span>}
                </div>;
              })}
            </div>
            <div className="sec-help">Submissions includes released results only. Exam exports never include answer keys.
              Analytics includes progress and exam summaries.</div>
          </div>

          {/* Section 2 — format */}
          <div role="radiogroup" aria-labelledby="fmt-lbl">
            <div className="sec-lbl" id="fmt-lbl">Format</div>
            <div className="fmt-row" style={{marginTop:"var(--space-3)"}}>
              {[["csv","CSV","One file per collection — best for spreadsheets."],
                ["json","JSON","Structured export — best for migration and developers."]].map(([v,t,h])=>{
                const on = format===v;
                return <div key={v} className={"fmt-chip"+(on?" sel":"")} role="radio" aria-checked={on} tabIndex={0}
                  onClick={()=>setFormat(v)}
                  onKeyDown={e=>{if(e.key===" "||e.key==="Enter"){e.preventDefault();setFormat(v);}}}>
                  <span className="ft"><span className="dot"></span>{t}</span>
                  <span className="fh">{h}</span>
                </div>;
              })}
            </div>
          </div>

          <div className="divider"></div>

          {/* CTA — brand.primary (not spark): operational, not celebratory (§Register) */}
          <div className="cta-row">
            <Button variant="primary" leadingIcon={busy?"loader":"download"}
              disabled={count===0} loading={busy} onClick={onExport}>
              {busy?"Preparing export…":"Export data"}</Button>
            <span className="cta-cap ax-mono ax-muted">{count} collections · {fmtLabel}</span>
          </div>
        </div>
      </div>

      {/* Export history — server-authoritative, auditable reflection (§8.8) */}
      <div className="card">
        <div className="panel-h"><span className="pt">Export history</span>
          <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}><i data-lucide="shield-check" style={{width:13,height:13,verticalAlign:"-2px"}}></i> Audit-logged</span></div>
        <div style={{padding:"var(--space-4) var(--space-5)"}}>
          <table className="htable">
            <caption className="ax-sr">Prior export jobs for {TENANT}</caption>
            <thead><tr><th>Scope</th><th>Format</th><th className="num">Size</th><th>Status</th><th>Expiry</th><th style={{textAlign:"right"}}>Action</th></tr></thead>
            <tbody>
              {history.map(r=>(
                <tr key={r.id}>
                  <td><div className="scope">{r.scope}</div>
                    {r.partial && <div className="submeta">{r.partial}</div>}
                    <div className="submeta">Requested by {r.by}</div></td>
                  <td className="ax-mono">{r.fmt}</td>
                  <td className="num">{r.size}</td>
                  <td>
                    <StatusBadge status={r.status}/>
                    {r.status==="preparing" && <div className="bar-track" role="progressbar" aria-label="Preparing export" aria-valuenow="46" aria-valuemin="0" aria-valuemax="100" style={{marginTop:"var(--space-2)"}}><div className="bar-fill"></div></div>}
                  </td>
                  <td className="ax-mono ax-sec">{r.status==="ready"?("Expires "+r.expires):(r.status==="expired"?"Expired":"—")}</td>
                  <td style={{textAlign:"right"}}>
                    {r.status==="ready" &&
                      <div style={{display:"inline-flex",gap:"var(--space-2)",alignItems:"center"}}>
                        <span className="tip"><button className="icon-btn" aria-label={"Copy link for "+r.scope+" "+r.fmt} onClick={()=>{setToast(true);setTimeout(()=>setToast(false),3000);}}><i data-lucide="link"></i></button><span className="tt">Copy link</span></span>
                        <Button variant="secondary" leadingIcon="download" onClick={()=>{}}>Download</Button>
                      </div>}
                    {r.status==="expired" && <Button variant="secondary" leadingIcon="rotate-cw">Re-export</Button>}
                    {r.status==="failed"  && <Button variant="secondary" leadingIcon="rotate-cw">Try again</Button>}
                    {r.status==="preparing" && <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>—</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* ── Secondary state examples (§5) — labelled, distinct from primary above ── */}

      {/* Quota / rate error (report tier) */}
      <div className="example-lbl">State · quota / rate limit (report tier)</div>
      <div className="alert warn" role="alert">
        <i data-lucide="gauge" className="lead"></i>
        <div><span className="at">Your export quota for today is used up. </span>
          <span className="ax-sec">Try again tomorrow or contact support. Export is disabled until the cap resets.</span></div>
      </div>

      {/* Tenant suspended — whole form disabled */}
      <div className="example-lbl">State · tenant suspended</div>
      <div className="alert err" role="alert">
        <i data-lucide="octagon-x" className="lead"></i>
        <div><span className="at">This school is suspended. </span>
          <span className="ax-sec">Exports are unavailable — contact platform support.</span></div>
      </div>

      {/* Empty history */}
      <div className="example-lbl">State · no exports yet (empty history)</div>
      <div className="card">
        <div className="empty">
          <i data-lucide="file-down" className="ei"></i>
          <div className="et">No exports yet</div>
          <div className="eb">Choose what to export above. Your generated files appear here.</div>
        </div>
      </div>

      {/* Permission-denied — full EmptyState, no form */}
      <div className="example-lbl">State · permission denied (role-gated)</div>
      <div className="card">
        <div className="empty">
          <i data-lucide="lock" className="ei"></i>
          <div className="et" style={{fontFamily:"var(--font-display)"}}>Data Export</div>
          <div className="eb">You don't have permission to export data. Ask a school administrator with export rights.</div>
          <div className="alert info" role="note" style={{marginTop:"var(--space-2)",textAlign:"left"}}>
            <i data-lucide="info" className="lead"></i>
            <div>Access is controlled server-side. The server returns a permission error even if this screen is reached directly.</div>
          </div>
        </div>
      </div>
    </div>

    {/* ConfirmDialog — sensitive-scope friction (§6) with explicit consequence copy */}
    {confirmOpen &&
      <div className="modal-scrim cd-scrim" role="presentation" onClick={()=>setConfirmOpen(false)}>
        <div className="modal" role="dialog" aria-modal="true" aria-labelledby="cd-t" onClick={e=>e.stopPropagation()}>
          <div className="modal__head"><div className="cd-title"><i data-lucide="shield-alert"></i><span className="modal__title" id="cd-t">Export sensitive data?</span></div></div>
          <div className="modal__body">This export includes {sensitiveScopeNames}. The file may contain personal results.
            It stays scoped to <b>{TENANT}</b> and the download link expires in 1 hour.</div>
          <div className="modal__foot">
            <Button variant="ghost" onClick={()=>setConfirmOpen(false)}>Cancel</Button>
            <Button variant="primary" leadingIcon="download" onClick={confirmExport}>Export</Button>
          </div>
        </div>
      </div>}

    {/* Toast — success, no celebration motion (§6) */}
    {toast &&
      <div className="toast" role="status">
        <i data-lucide="check-circle-2" className="lead"></i>
        <div>Export ready — download expires in 1 hour.</div>
      </div>}
  </div>
  );
}


/* ============================================================
   SPA RUNTIME — nav, routing, shell, app
   ============================================================ */

/* (c) NAV config — 4 groups, 15 items */
const NAV = [
  { group:"Overview", items:[
    { route:"#/", icon:"layout-dashboard", label:"Dashboard" },
  ]},
  { group:"Management", items:[
    { route:"#/users", icon:"users", label:"Users" },
    { route:"#/classes", icon:"school", label:"Classes" },
    { route:"#/staff", icon:"shield-check", label:"Staff & Permissions" },
    { route:"#/exams", icon:"file-check", label:"Exams" },
    { route:"#/spaces", icon:"layers", label:"Spaces" },
    { route:"#/courses", icon:"book-open", label:"Courses" },
    { route:"#/academic-sessions", icon:"calendar-range", label:"Academic Sessions" },
    { route:"#/announcements", icon:"megaphone", label:"Announcements" },
  ]},
  { group:"Analytics", items:[
    { route:"#/analytics", icon:"bar-chart-3", label:"Analytics" },
    { route:"#/reports", icon:"file-text", label:"Reports" },
    { route:"#/ai-usage", icon:"sparkles", label:"AI Usage" },
  ]},
  { group:"Configuration", items:[
    { route:"#/notifications", icon:"bell", label:"Notifications" },
    { route:"#/data-export", icon:"download", label:"Data Export" },
    { route:"#/settings", icon:"settings", label:"Settings" },
  ]},
];

/* (d) ROUTE registry — hash -> { view, title, navMatch } */
const ROUTES = {
  "#/":                    { view: View_Dashboard,        title: "Dashboard",                       navMatch: "#/" },
  "#/users":               { view: View_Users,            title: "Users",                           navMatch: "#/users" },
  "#/users/parents/link":  { view: View_ParentLinking,    title: "Users › Parent Linking",          navMatch: "#/users" },
  "#/classes":             { view: View_Classes,          title: "Classes",                         navMatch: "#/classes" },
  "#/staff":               { view: View_Staff,            title: "Staff & Permissions",             navMatch: "#/staff" },
  "#/staff/roles":         { view: View_MembershipsRoles, title: "Staff › Roles & Permissions",     navMatch: "#/staff" },
  "#/exams":               { view: View_Exams,            title: "Exams",                           navMatch: "#/exams" },
  "#/spaces":              { view: View_Spaces,           title: "Spaces",                          navMatch: "#/spaces" },
  "#/courses":             { view: View_Courses,          title: "Courses",                         navMatch: "#/courses" },
  "#/academic-sessions":   { view: View_AcademicSessions, title: "Academic Sessions",               navMatch: "#/academic-sessions" },
  "#/announcements":       { view: View_Announcements,    title: "Announcements",                   navMatch: "#/announcements" },
  "#/analytics":           { view: View_Analytics,        title: "Analytics",                       navMatch: "#/analytics" },
  "#/reports":             { view: View_Reports,          title: "Reports",                         navMatch: "#/reports" },
  "#/ai-usage":            { view: View_AIUsage,          title: "AI Usage",                        navMatch: "#/ai-usage" },
  "#/notifications":       { view: View_Notifications,    title: "Notifications",                    navMatch: "#/notifications" },
  "#/data-export":         { view: View_DataExport,       title: "Data Export",                      navMatch: "#/data-export" },
  "#/settings":            { view: View_Settings,         title: "Settings",                        navMatch: "#/settings" },
};
/* dynamic: #/classes/<id> -> ClassDetail */
const CLASS_DETAIL = { view: View_ClassDetail, title: "Classes › 8A", navMatch: "#/classes" };
/* outside-shell: #/onboarding */
const ONBOARDING = { view: View_Onboarding, title: "Onboarding", navMatch: null, fullscreen: true };

/* (e) navigation helper + ONE delegated click handler for data-go CTAs */
function go(r){ window.location.hash = r; }
let __goHandlerInstalled = false;
function installGoHandler(){
  if (__goHandlerInstalled) return;
  __goHandlerInstalled = true;
  document.addEventListener("click", function(e){
    const el = e.target.closest && e.target.closest("[data-go]");
    if (el){ e.preventDefault(); go(el.getAttribute("data-go")); }
  });
}

/* resolve a raw hash to a route entry */
function resolveRoute(hash){
  if (!hash || hash === "#" || hash === "") hash = "#/";
  if (hash === "#/onboarding") return ONBOARDING;
  if (ROUTES[hash]) return ROUTES[hash];
  // #/classes/<id> (id present, not the bare list)
  const m = hash.match(/^#\/classes\/[^/]+$/);
  if (m) return CLASS_DETAIL;
  return null; // unknown
}

/* (f) useHashRoute hook */
function useHashRoute(){
  const get = ()=> window.location.hash || "#/";
  const [hash, setHash] = React.useState(get());
  React.useEffect(()=>{
    const onChange = ()=> setHash(window.location.hash || "#/");
    window.addEventListener("hashchange", onChange);
    return ()=> window.removeEventListener("hashchange", onChange);
  }, []);
  const entry = resolveRoute(hash);
  React.useEffect(()=>{ if (entry === null) go("#/"); }, [entry, hash]);
  return { hash, entry };
}

/* (g) Shell — generalized from admin-dashboard */
function Shell({active, title, children}){
  // LONGEST-PREFIX match: pick the nav item whose route is the longest prefix of `active`.
  const allRoutes = NAV.reduce((a,g)=>a.concat(g.items.map(i=>i.route)),[]);
  let bestRoute = null;
  allRoutes.forEach(r=>{
    const isPrefix = r==="#/"
      ? active==="#/"
      : (active===r || (active && active.indexOf(r)===0 && active.charAt(r.length)==="/"));
    if (isPrefix && (bestRoute===null || r.length>bestRoute.length)) bestRoute = r;
  });
  return <div className="ax-shell">
    <aside className="ax-side">
      <div className="ax-brand"><div className="mk">L</div>
        <div><div className="nm">Auto-LevelUp</div><div className="sc">Northwood Academy · Admin</div></div></div>
      <nav aria-label="Primary" style={{display:"flex",flexDirection:"column",gap:"var(--space-5)"}}>
        {NAV.map(grp=>
          <div className="ax-navgrp" key={grp.group}>
            <div className="ax-navlbl">{grp.group}</div>
            {grp.items.map(it=>{
              const isActive = it.route===bestRoute;
              return <a key={it.route}
                className={"ax-nav"+(isActive?" on":"")}
                aria-current={isActive?"page":undefined}
                onClick={()=>go(it.route)} style={{cursor:"pointer"}}>
                <i data-lucide={it.icon}></i><span>{it.label}</span></a>;
            })}
          </div>
        )}
      </nav>
      <div className="foot">
        <div className="ax-rs"><i data-lucide="building"></i><span>Switch tenant</span><i data-lucide="chevrons-up-down"></i></div>
        <div className="ax-uc"><div className="av">AK</div>
          <div><div className="nm">Anita Kapoor</div><div className="rl">Tenant Admin</div></div></div>
      </div>
    </aside>
    <div className="ax-main">
      <header className="ax-top">
        <nav className="ax-bc" aria-label="Breadcrumb"><b>{title}</b></nav>
        <div className="sp"></div>
        <div className="ax-search"><i data-lucide="search"></i><span>Search…</span><kbd>⌘K</kbd></div>
        <button className="icon-btn" aria-label="Toggle theme"><i data-lucide="sun"></i></button>
        <button className="icon-btn" aria-label="Notifications, 3 unread" onClick={()=>go("#/notifications")}><i data-lucide="bell"></i></button>
      </header>
      <main id="main-content" className="ax-body">{children}</main>
    </div>
  </div>;
}

/* (h) App */
function App(){
  const { hash, entry } = useHashRoute();
  React.useEffect(()=>{ installGoHandler(); }, []);
  React.useEffect(()=>{ window.lucide && window.lucide.createIcons(); }, [hash]);
  if (!entry) return null; // unknown -> redirect handled in hook
  if (entry === ONBOARDING){
    return <div className="ax-onboarding">{React.createElement(View_Onboarding)}</div>;
  }
  return <Shell active={entry.navMatch} title={entry.title}>{React.createElement(entry.view)}</Shell>;
}

/* (i) render */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
