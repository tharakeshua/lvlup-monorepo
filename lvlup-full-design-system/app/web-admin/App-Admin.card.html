        <div className="ax-row ax-wrap" style={{gap:"var(--space-2)"}}>
          <StatusBadge status={sp.status}/>
          <span className="tchip"><i data-lucide="shapes" style={{width:12,height:12}}></i>{sp.type}</span>
          <span className="tchip">{sp.subject}</span>
        </div>
        <p className="desc">{sp.desc}</p>
        <div className="div"></div>
        <div className="metrics">
          <div className="m"><span className="ml">Story points</span><span className="mv">{sp.sp}</span></div>
          <div className="m"><span className="ml">Items</span><span className="mv">{sp.items}</span></div>
          <div className="m"><span className="ml">Students</span><span className="mv">{sp.students||"—"}</span></div>
        </div>
        <div className="cmp">
          <div className="ch"><span className="cl">Avg. completion</span>
            <span className="cv">{sp.comp==null?<span className="ax-muted" title="Metrics unavailable">— No data</span>:sp.comp+"%"}</span></div>
          {sp.comp!=null
            ? <div className="btrack" role="progressbar" aria-label={"Average completion for "+sp.title} aria-valuenow={sp.comp} aria-valuemin="0" aria-valuemax="100">
                <div className={"bfill"+(sp.comp>=85?" full":"")} style={{width:sp.comp+"%"}}></div></div>
            : <div className="btrack" aria-hidden="true"></div>}
        </div>
        <div className="div"></div>
        <div className="foot">
          <span className="fi" data-go="#/classes/c1" style={{cursor:"pointer"}}><i data-lucide="school"></i>{sp.classes} classes</span><span className="sep"></span>
          <span className="fi"><i data-lucide="user-cog"></i>{sp.teachers} teachers</span><span className="sep"></span>
          <span className="fi"><i data-lucide="history"></i>Updated {sp.updated}</span>
        </div>
      </article>
    );
  }

  function SkeletonCard(){
    return <div className="skcard" aria-hidden="true">
      <div className="sk" style={{height:22,width:"70%"}}></div>
      <div className="ax-row" style={{gap:"var(--space-2)"}}><div className="sk" style={{height:18,width:76,borderRadius:"var(--radius-pill)"}}></div><div className="sk" style={{height:18,width:64,borderRadius:"var(--radius-pill)"}}></div></div>
      <div className="sk" style={{height:32,width:"100%"}}></div>
      <div className="sk" style={{height:1,width:"100%"}}></div>
      <div className="sk" style={{height:20,width:"55%"}}></div>
      <div className="sk" style={{height:8,width:"100%",borderRadius:"var(--radius-pill)"}}></div>
    </div>;
  }

  function TableView({rows, canManage}){
    return <div role="region" aria-label="Spaces table">
      <table className="tbl">
        <thead><tr>
          <th scope="col">Space</th><th scope="col">Status</th><th scope="col">Subject</th>
          <th scope="col" className="num">Story pts</th><th scope="col" className="num">Items</th><th scope="col" className="num">Students</th>
          <th scope="col">Avg completion</th><th scope="col" className="num">Classes</th><th scope="col">Updated</th><th scope="col"><span className="ax-sr">Actions</span></th>
        </tr></thead>
        <tbody>{rows.map(s=>(
          <tr key={s.id}>
            <td><div className="tt">{s.title}</div><span className="ax-muted" style={{fontSize:"var(--text-2xs)"}}>{s.type}</span></td>
            <td><StatusBadge status={s.status}/></td>
            <td className="ax-sec">{s.subject}</td>
            <td className="num">{s.sp}</td><td className="num">{s.items}</td><td className="num">{s.students||"—"}</td>
            <td>{s.comp==null?<span className="ax-muted">— No data</span>:<span className="minibar"><span className="bt"><span className="bf" style={{width:s.comp+"%"}}></span></span><span className="ax-mono" style={{fontSize:"var(--text-xs)"}}>{s.comp}%</span></span>}</td>
            <td className="num">{s.classes}</td>
            <td className="ax-muted" style={{fontSize:"var(--text-xs)"}}>{s.updated}</td>
            <td><button className="ovbtn" aria-label={"Actions for "+s.title}><i data-lucide="more-horizontal"></i></button></td>
          </tr>))}
        </tbody>
      </table>
    </div>;
  }

  const STATUS_OPTS=["All","Draft","Published","Archived"];
  const TYPE_OPTS=["All","Learning","Practice","Assessment","Resource","Hybrid"];

  const [view,setView]=React.useState("grid");
  const [status,setStatus]=React.useState("All");
  const [type,setType]=React.useState("All");
  const [query,setQuery]=React.useState("");
  const [readonly,setReadonly]=React.useState(false);
  const [confirm,setConfirm]=React.useState(null); // {kind, sp}
  const [busyId,setBusyId]=React.useState(null);
  const [toast,setToast]=React.useState(null);
  const canManage=!readonly;

  React.useEffect(()=>{ if(!toast) return; const t=setTimeout(()=>setToast(null),2600); return ()=>clearTimeout(t); },[toast]);

  const filtered = SPACES.filter(s=>
    (status==="All"||s.status===status.toLowerCase()) &&
    (type==="All"||s.type===type) &&
    (query.trim()===""||(s.title+" "+s.subject).toLowerCase().includes(query.trim().toLowerCase()))
  );
  const counts={
    total:SPACES.length,
    published:SPACES.filter(s=>s.status==="published").length,
    draft:SPACES.filter(s=>s.status==="draft").length,
    archived:SPACES.filter(s=>s.status==="archived").length,
  };
  const cleared = status==="All"&&type==="All"&&query.trim()==="";

  function requestAction(kind,sp){ setConfirm({kind,sp}); }
  function runConfirm(){
    const {kind,sp}=confirm; setConfirm(null); setBusyId(sp.id);
    setTimeout(()=>{ // server-authoritative — simulated round-trip
      setBusyId(null);
      const verb=kind==="publish"?"Published":kind==="archive"?"Archived":"Restored";
      const tail=kind==="restore"?" to draft":"";
      setToast(verb+' "'+sp.title+'"'+tail+".");
    },900);
  }
  const cfgCopy={
    publish:{t:'Publish "'+(confirm&&confirm.sp.title)+'"?',b:"Students in assigned classes will gain access to this space.",btn:"Publish",v:"primary"},
    archive:{t:'Archive "'+(confirm&&confirm.sp.title)+'"?',b:"It will be hidden from students. Existing progress and content are retained and can be restored.",btn:"Archive",v:"danger"},
    restore:{t:'Restore "'+(confirm&&confirm.sp.title)+'" to draft?',b:"It returns to draft and is removed from students until republished.",btn:"Restore",v:"primary"},
  };

  return (
    <div className="vw-spaces">
      <div className="ax-head">
        <div className="tx">
          <h1 className="ax-h1">Learning Spaces</h1>
          <div className="ax-sub">All subject tracks across your academy · Northwood Academy</div>
        </div>
        <div className="ac">
          <button className="sel" onClick={()=>setReadonly(r=>!r)} aria-pressed={readonly} title="Preview the limited-staff (read-only) variant">
            <i data-lucide={readonly?"eye":"shield-check"}></i>{readonly?"Read-only staff view":"Tenant Admin view"}</button>
          {canManage && <Button variant="primary" leadingIcon="plus">New space</Button>}
        </div>
      </div>

      {/* RBAC note — write affordances hidden, not disabled, for limited staff */}
      {readonly && <div className="alert warn" role="status">
        <i data-lucide="lock" className="lead"></i>
        <div className="ab"><span className="at">Read-only access. </span>
          <span className="ax-sec">Your role can view spaces but not publish, archive, or reassign. Lifecycle actions are hidden, not just disabled.</span></div>
      </div>}

      {/* Toolbar — sticky */}
      <div className="tbar" role="search">
        <label className="tin">
          <i data-lucide="search"></i>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search spaces by title or subject…" aria-label="Search spaces by title or subject"/>
        </label>
        <button className={"sel"+(status!=="All"?" act":"")} onClick={()=>setStatus(STATUS_OPTS[(STATUS_OPTS.indexOf(status)+1)%STATUS_OPTS.length])}>
          <span className="ax-muted">Status:</span> {status} <i data-lucide="chevron-down"></i></button>
        <button className={"sel"+(type!=="All"?" act":"")} onClick={()=>setType(TYPE_OPTS[(TYPE_OPTS.indexOf(type)+1)%TYPE_OPTS.length])}>
          <span className="ax-muted">Type:</span> {type} <i data-lucide="chevron-down"></i></button>
        <button className="sel"><span className="ax-muted">Class:</span> All <i data-lucide="chevron-down"></i></button>
        <div className="seg" role="group" aria-label="View toggle">
          <button aria-label="Grid view" aria-pressed={view==="grid"} onClick={()=>setView("grid")}><i data-lucide="layout-grid"></i></button>
          <button aria-label="Table view" aria-pressed={view==="table"} onClick={()=>setView("table")}><i data-lucide="list"></i></button>
        </div>
      </div>

      {/* Count strip — aria-live */}
      <div className="cstrip" aria-live="polite">
        {cleared
          ? <><b>{counts.total}</b> spaces<span className="dot"></span><b>{counts.published}</b> published<span className="dot"></span><b>{counts.draft}</b> draft<span className="dot"></span><b>{counts.archived}</b> archived</>
          : <><b>{filtered.length}</b> of <b>{counts.total}</b> spaces</>}
      </div>

      {/* RESULTS — success (grid or table) or filtered-empty */}
      {filtered.length===0
        ? <div className="empty">
            <div className="ei"><i data-lucide="filter-x"></i></div>
            <div className="et">No spaces match your filters</div>
            <div className="eb">Try a different status, type, or search term.</div>
            <Button variant="ghost" leadingIcon="x" onClick={()=>{setStatus("All");setType("All");setQuery("");}}>Clear filters</Button>
          </div>
        : view==="grid"
          ? <div className="ax-grid ax-g3" role="list" aria-label="Learning spaces">
              {filtered.map(s=><SpaceCard key={s.id} sp={s} canManage={canManage} busy={busyId===s.id} onAction={requestAction}/>)}
            </div>
          : <TableView rows={filtered} canManage={canManage}/>}

      {cleared && <div className="ax-row" style={{justifyContent:"center"}}>
        <Button variant="secondary" leadingIcon="chevron-down">Load more</Button>
      </div>}

      {/* ── Other spec'd states, shown as labelled reference blocks ── */}
      <div className="div" style={{height:1,background:"var(--border-subtle)",margin:"var(--space-2) 0"}}></div>
      <div className="sec-h"><span className="st">Other states</span><span className="sca">Loading · error · empty — rendered for spec coverage</span></div>

      {/* Loading skeleton grid */}
      <div>
        <div className="ax-muted" style={{fontSize:"var(--text-xs)",marginBottom:"var(--space-2)"}}>Loading (skeleton grid · aria-busy)</div>
        <div className="ax-grid ax-g3" aria-busy="true" aria-label="Loading spaces"><SkeletonCard/><SkeletonCard/><SkeletonCard/></div>
      </div>

      {/* Error */}
      <div>
        <div className="ax-muted" style={{fontSize:"var(--text-xs)",marginBottom:"var(--space-2)"}}>Error (listSpaces failed · filters persist)</div>
        <div className="alert" role="alert">
          <i data-lucide="alert-octagon" className="lead"></i>
          <div className="ab"><span className="at">Couldn't load spaces. </span>
            <span className="ax-sec">Request timed out. Check your connection and retry.</span></div>
          <Button variant="secondary" leadingIcon="refresh-cw">Retry</Button>
        </div>
      </div>

      {/* Empty — no spaces at all */}
      <div>
        <div className="ax-muted" style={{fontSize:"var(--text-xs)",marginBottom:"var(--space-2)"}}>Empty (no spaces in tenant)</div>
        <div className="empty">
          <div className="ei"><i data-lucide="layers"></i></div>
          <div className="et">No learning spaces yet</div>
          <div className="eb">Teachers create spaces in the Teacher Portal. Once published, they'll appear here for oversight.</div>
          <Button variant="secondary" leadingIcon="external-link">Open Teacher Portal</Button>
        </div>
      </div>

      {/* ConfirmDialog — lifecycle, audit-logged, explicit consequence copy */}
      {confirm && <>
        <div className="ov" onClick={()=>setConfirm(null)}></div>
        <div className="mdl" role="dialog" aria-modal="true" aria-labelledby="cfg-t">
          <div className="mbox">
            <div className="mt" id="cfg-t">{cfgCopy[confirm.kind].t}</div>
            <div className="mc">{cfgCopy[confirm.kind].b}</div>
            <div className="mc ax-muted" style={{fontSize:"var(--text-xs)"}}><i data-lucide="history" style={{width:12,height:12,verticalAlign:"-1px"}}></i> This action is recorded in the space's version history.</div>
            <div className="mf">
              <Button variant="ghost" onClick={()=>setConfirm(null)}>Cancel</Button>
              <Button variant={cfgCopy[confirm.kind].v} onClick={runConfirm}>{cfgCopy[confirm.kind].btn}</Button>
            </div>
          </div>
        </div>
      </>}

      {/* Toast */}
      {toast && <div className="toast" role="status"><i data-lucide="check-circle-2"></i>{toast}</div>}
    </div>
  );
}

function View_Courses(){
  const Button = L.Button || (({children,leadingIcon,variant,size,disabled,onClick})=>
    <button className={"btn btn--"+(variant||"primary")+(size?" btn--"+size:"")} disabled={disabled} onClick={onClick}>
      {leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}</button>);

  /* ---- status badge: icon + label, never color-only ---- */
  function StatusBadge({status}){
    if(status==="published") return <span className="badge pub"><i data-lucide="check-circle-2"></i>Published</span>;
    if(status==="archived")  return <span className="badge arc"><i data-lucide="archive"></i>Archived</span>;
    return <span className="badge draft"><i data-lucide="circle-dashed"></i>Draft</span>;
  }
  const TYPE_ICON={learning:"book-open",practice:"dumbbell",assessment:"file-check",resource:"folder",hybrid:"layers"};
  function TypeBadge({type}){
    return <span className="type-badge"><i data-lucide={TYPE_ICON[type]||"file"}></i>{type[0].toUpperCase()+type.slice(1)}</span>;
  }

  /* ---- sample catalog (server-authoritative stats; render-only) ---- */
  const COURSES=[
    {id:"sp1",title:"Algebra I",desc:"Linear equations, inequalities & graphing",type:"learning",subject:"Mathematics",status:"published",classes:["7A","7B"],teachers:2,items:148,updated:"2 days ago",sp:14,students:62,completion:71},
    {id:"sp2",title:"Kinematics",desc:"Motion in one and two dimensions",type:"assessment",subject:"Physics",status:"draft",classes:[],teachers:1,items:36,updated:"5 hours ago",sp:6,students:0,completion:null},
    {id:"sp3",title:"Cell Biology",desc:"Structure & function of the cell",type:"learning",subject:"Biology",status:"published",classes:["8A","8C","8B"],teachers:2,items:122,updated:"1 week ago",sp:11,students:88,completion:64},
    {id:"sp4",title:"Intro to Python",desc:"Variables, loops & functions",type:"hybrid",subject:"Computer Science",status:"published",classes:["9A"],teachers:1,items:96,updated:"3 days ago",sp:9,students:31,completion:58},
    {id:"sp5",title:"Organic Chemistry Drills",desc:"Practice set — nomenclature & reactions",type:"practice",subject:"Chemistry",status:"published",classes:["9B"],teachers:1,items:74,updated:"4 days ago",sp:7,students:27,completion:49},
    {id:"sp6",title:"World History Reader",desc:"Source pack — 1900 to present",type:"resource",subject:"History",status:"archived",classes:[],teachers:1,items:18,updated:"3 weeks ago",sp:3,students:0,completion:null},
    {id:"sp7",title:"Trigonometry",desc:"Ratios, identities & the unit circle",type:"learning",subject:"Mathematics",status:"draft",classes:[],teachers:2,items:54,updated:"yesterday",sp:8,students:0,completion:null},
  ];
  const COVERAGE=[
    {subject:"Mathematics",icon:"sigma",total:12,pub:9},
    {subject:"Physics",icon:"atom",total:8,pub:6},
    {subject:"Computer Science",icon:"code",total:6,pub:6},
    {subject:"Biology",icon:"dna",total:5,pub:4},
  ];

  function RowMenu({status}){
    // server-authoritative ALLOWED_TRANSITIONS pre-disable (client UX only)
    const canPublish = status==="draft";
    const canArchive = status==="published" || status==="draft";
    const canRestore = status==="archived";
    return <div className="menu" role="menu" onClick={e=>e.stopPropagation()}>
      <button role="menuitem"><i data-lucide="panel-right-open"></i>View details</button>
      <button role="menuitem"><i data-lucide="users"></i>Reassign classes</button>
      <div className="div"></div>
      <button role="menuitem" disabled={!canPublish}><i data-lucide="upload-cloud"></i>Publish</button>
      {!canPublish && <div className="mhint">Only draft courses can be published.</div>}
      <div className="div"></div>
      {canRestore
        ? <button role="menuitem"><i data-lucide="undo-2"></i>Restore to draft</button>
        : <button role="menuitem" className="danger" disabled={!canArchive}><i data-lucide="archive"></i>Archive</button>}
    </div>;
  }

  function CoverageCard({c}){
    return <div className="kpi" role="group" aria-label={c.subject+": "+c.total+" total, "+c.pub+" published"}>
      <div className="kh"><i data-lucide={c.icon}></i><span>{c.subject}</span></div>
      <div className="kv">{c.total}</div>
      <div className="km"><b>{c.pub} published</b> · {c.total-c.pub} draft/archived</div>
    </div>;
  }

  const [view,setView]=React.useState("table");
  const [statusFilter,setStatusFilter]=React.useState("all");
  const [sel,setSel]=React.useState({});
  const [menuId,setMenuId]=React.useState(null);
  const [drawer,setDrawer]=React.useState(null);     // course object
  const [editMap,setEditMap]=React.useState(false);
  const [createOpen,setCreateOpen]=React.useState(false);
  const [confirmArchive,setConfirmArchive]=React.useState(false);
  const [toast,setToast]=React.useState(null);

  const rows = COURSES;
  const toggle=(id)=>setSel(s=>({...s,[id]:!s[id]}));
  const allOn = rows.length>0 && rows.every(r=>sel[r.id]);
  const toggleAll=()=>{ const n={}; if(!allOn) rows.forEach(r=>n[r.id]=true); setSel(n); };
  const selCount=Object.values(sel).filter(Boolean).length;
  const openDrawer=(c)=>{ setDrawer(c); setEditMap(false); };
  const fireToast=(msg)=>{ setToast(msg); };

  return (<div className="vw-courses">

    {/* Super-admin tenant-context banner (§5 / §8 tenant isolation) */}
    <div className="alert info" role="status">
      <i data-lucide="shield-alert" className="lead"></i>
      <div className="ab"><span className="at">Viewing as super-admin — tenant: Northwood Academy. </span>
        <span className="ax-sec">Every action here is scoped to this tenant and is audit-logged.</span></div>
      <span className="lnk">Exit tenant →</span>
    </div>

    {/* Page header */}
    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Courses</h1>
        <div className="ax-sub">Audit and govern every learning space in your academy — status, class mapping, and structure.</div></div>
      <div className="ac">
        <Button variant="primary" leadingIcon="plus" onClick={()=>setCreateOpen(true)}>New course</Button>
      </div>
    </div>

    {/* Subject coverage strip — server-authoritative counts (render-only), sorted by count desc */}
    <div className="kpi-grid" role="group" aria-label="Subject coverage">
      {COVERAGE.map(c=><CoverageCard key={c.subject} c={c}/>)}
    </div>

    {/* Toolbar */}
    <div className="toolbar" role="search">
      <label className="tb-search"><i data-lucide="search"></i>
        <input placeholder="Search courses by title, subject, or description" aria-label="Search courses"/></label>
      <button className="tb-sel"><i data-lucide="school"></i>All classes<i data-lucide="chevron-down"></i></button>
      <button className={"tb-sel"+(statusFilter!=="all"?" act":"")} onClick={()=>setStatusFilter(statusFilter==="all"?"published":"all")}>
        <i data-lucide="circle-dot"></i>{statusFilter==="all"?"All statuses":"Published"}<i data-lucide="chevron-down"></i></button>
      <button className="tb-sel"><i data-lucide="shapes"></i>All types<i data-lucide="chevron-down"></i></button>
      <div className="seg" role="group" aria-label="View mode">
        <button className={view==="table"?"on":""} aria-pressed={view==="table"} aria-label="Table view" onClick={()=>setView("table")}><i data-lucide="table-2"></i></button>
        <button className={view==="grouped"?"on":""} aria-pressed={view==="grouped"} aria-label="Grouped view" onClick={()=>setView("grouped")}><i data-lucide="layout-grid"></i></button>
      </div>
    </div>

    {/* Active filter chips (web) */}
    {statusFilter!=="all" &&
      <div className="fchips" aria-live="polite">
        <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Filters:</span>
        <span className="fchip">Status: Published<button aria-label="Remove status filter" onClick={()=>setStatusFilter("all")}><i data-lucide="x"></i></button></span>
      </div>}

    {/* Primary success state — DataTable (sort/filter/select/paginate) */}
    <div className="tbl-wrap">
      <table className="tbl" aria-label="Courses catalog">
        <thead>
          <tr>
            <th style={{width:40}}><input type="checkbox" className="chk" checked={allOn} onChange={toggleAll} aria-label="Select all courses on this page"/></th>
            <th scope="col" aria-sort="none"><button className="sortbtn">Course<i data-lucide="chevrons-up-down"></i></button></th>
            <th scope="col">Status</th>
            <th scope="col">Type</th>
            <th scope="col">Subject</th>
            <th scope="col">Classes</th>
            <th scope="col" aria-sort="none"><button className="sortbtn">Teachers<i data-lucide="chevrons-up-down"></i></button></th>
            <th scope="col" aria-sort="none"><button className="sortbtn">Items<i data-lucide="chevrons-up-down"></i></button></th>
            <th scope="col" aria-sort="descending"><button className="sortbtn">Updated<i data-lucide="chevron-down"></i></button></th>
            <th style={{width:48}}><span className="ax-sr">Actions</span></th>
          </tr>
        </thead>
        <tbody>
          {rows.map(r=>(
            <tr key={r.id} className={sel[r.id]?"sel":""} onClick={()=>openDrawer(r)} tabIndex="0"
                aria-label={r.title+", "+r.status} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();openDrawer(r);}}}>
              <td onClick={e=>e.stopPropagation()}><input type="checkbox" className="chk" checked={!!sel[r.id]} onChange={()=>toggle(r.id)} aria-label={"Select "+r.title}/></td>
              <td><div className="cell-course"><div className="cc-ic"><i data-lucide={TYPE_ICON[r.type]}></i></div>
                <div><div className="nm">{r.title}</div><div className="ds">{r.desc}</div></div></div></td>
              <td><StatusBadge status={r.status}/></td>
              <td><TypeBadge type={r.type}/></td>
              <td><span className="subj-badge">{r.subject}</span></td>
              <td>{r.classes.length
                ? <div className="chip-row">{r.classes.slice(0,2).map(c=><span className="chip" key={c}>{c}</span>)}{r.classes.length>2&&<span className="chip" title={r.classes.join(", ")}>+{r.classes.length-2}</span>}</div>
                : <span className="chip na">Not assigned</span>}</td>
              <td><span className="cnt-pill">{r.teachers}</span></td>
              <td><span className="cnt-pill">{r.items}</span></td>
              <td className="ax-sec">{r.updated}</td>
              <td className="relpos" style={{textAlign:"right"}} onClick={e=>e.stopPropagation()}>
                <button className="icon-btn" aria-label={"Actions for "+r.title} onClick={()=>setMenuId(menuId===r.id?null:r.id)}><i data-lucide="more-horizontal"></i></button>
                {menuId===r.id && <RowMenu status={r.status}/>}
              </td>
            </tr>))}
        </tbody>
      </table>
    </div>

    {/* Pagination */}
    <div className="pag">
      <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Showing <span className="ax-mono">1–7</span> of <span className="ax-mono">36</span> courses</span>
      <div className="nums">
        <button className="pg" aria-label="Previous page"><i data-lucide="chevron-left" style={{width:14,height:14}}></i></button>
        <button className="pg on" aria-current="page">1</button>
        <button className="pg">2</button>
        <button className="pg">3</button>
        <button className="pg" aria-label="Next page"><i data-lucide="chevron-right" style={{width:14,height:14}}></i></button>
      </div>
      <button className="tb-sel">Rows: 25<i data-lucide="chevron-down"></i></button>
    </div>

    {/* Floating selection bar — appears when ≥1 row selected; destructive = confirm-then-commit */}
    {selCount>0 &&
      <div className="bulkbar" role="region" aria-live="polite" aria-label={selCount+" selected"}>
        <span className="bn">{selCount} selected</span>
        <span className="sepl"></span>
        <Button variant="secondary" size="sm" leadingIcon="users">Reassign class</Button>
        <Button variant="secondary" size="sm" leadingIcon="undo-2">Restore</Button>
        <Button variant="danger" size="sm" leadingIcon="archive" onClick={()=>setConfirmArchive(true)}>Archive</Button>
        <button className="icon-btn" aria-label="Clear selection" onClick={()=>setSel({})}><i data-lucide="x"></i></button>
      </div>}

    {/* ===== Secondary stacked examples: the spec's other distinctive §5 states ===== */}
    <div className="sec-label" style={{marginTop:"var(--space-4)"}}><i data-lucide="layers-2"></i>Other states (reference)</div>

    {/* Partial — class/teacher name resolution failed (§5 Partial) */}
    <div className="alert info" role="status">
      <i data-lucide="info" className="lead"></i>
      <div className="ab"><span className="at">Some class names couldn't be loaded. </span>
        <span className="ax-sec">Affected cells show the raw class id until resolution retries. Course data is unaffected.</span></div>
      <span className="lnk">Dismiss</span>
    </div>

    {/* Error — read failure (§5 Error; never a misleading empty state) */}
    <div className="alert err" role="alert">
      <i data-lucide="alert-octagon" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load courses. </span>
        <span className="ax-sec">The catalog service timed out. Check your connection, then try again.</span></div>
      <span className="lnk">Retry →</span>
    </div>

    {/* Feature-disabled (§5 / §7) */}
    <div className="alert warn" role="status">
      <i data-lucide="lock" className="lead"></i>
      <div className="ab"><span className="at">Courses aren't enabled for your academy. </span>
        <span className="ax-sec">Contact your platform administrator.</span></div>
    </div>

    {/* Permission-gated — staff read-only (write actions hidden, not just disabled) */}
    <div className="alert info" role="status">
      <i data-lucide="eye" className="lead"></i>
      <div className="ab"><span className="at">View-only access. </span>
        <span className="ax-sec">New course, lifecycle, and reassign actions are hidden for your role. Teachers author courses in the Teacher Portal.</span></div>
    </div>

    {/* Loading skeleton rows */}
    <div className="tbl-wrap" aria-busy="true" aria-label="Loading courses">
      <table className="tbl"><tbody>
        {[0,1,2].map(i=>(
          <tr key={i}>
            <td style={{width:40}}><div className="skl" style={{width:16,height:16,borderRadius:"var(--radius-sm)"}}></div></td>
            <td><div className="cell-course"><div className="skl" style={{width:32,height:32,borderRadius:"var(--radius-md)"}}></div><div className="skl" style={{width:170,height:12}}></div></div></td>
            <td><div className="skl" style={{width:78,height:18,borderRadius:"var(--radius-pill)"}}></div></td>
            <td><div className="skl" style={{width:72,height:18,borderRadius:"var(--radius-sm)"}}></div></td>
            <td><div className="skl" style={{width:80,height:12}}></div></td>
            <td><div className="skl" style={{width:60,height:12}}></div></td>
            <td><div className="skl" style={{width:24,height:12}}></div></td>
            <td><div className="skl" style={{width:32,height:12}}></div></td>
            <td><div className="skl" style={{width:64,height:12}}></div></td>
            <td></td>
          </tr>))}
      </tbody></table>
    </div>

    {/* Filtered-empty (distinct from no-data) */}
    <div className="panel"><div className="empty">
      <div className="ei"><i data-lucide="search-x"></i></div>
      <div className="et">No courses match these filters</div>
      <div className="eb">Try a different search or reset the filters to see your full catalog.</div>
      <div className="ea"><Button variant="ghost" leadingIcon="x">Clear filters</Button></div>
    </div></div>

    {/* True-empty onboarding (§5 / §7 — admin variant) */}
    <div className="panel"><div className="empty">
      <div className="ei"><i data-lucide="book-open"></i></div>
      <div className="et">No courses yet</div>
      <div className="eb">Courses are learning spaces your teachers build in the Teacher Portal. Create one here to map it to classes, or ask a teacher to publish theirs.</div>
      <div className="ea">
        <Button variant="primary" leadingIcon="plus">New course</Button>
        <Button variant="ghost" leadingIcon="external-link">Learn how teachers build courses</Button>
      </div>
    </div></div>

    {/* ===== Row-detail Drawer — DefinitionList of structure; admin "Edit mapping" reveals pickers ===== */}
    {drawer && <React.Fragment>
      <div className="dw-ov" onClick={()=>setDrawer(null)}></div>
      <aside className="drawer" role="dialog" aria-modal="true" aria-label={drawer.title+" details"}>
        <div className="dh">
          <div><div className="dt">{drawer.title}</div>
            <div className="chip-row" style={{marginTop:"var(--space-2)"}}><StatusBadge status={drawer.status}/><TypeBadge type={drawer.type}/></div></div>
          <button className="icon-btn" aria-label="Close" onClick={()=>setDrawer(null)}><i data-lucide="x"></i></button>
        </div>
        <div className="db">
          <p className="ax-sec" style={{margin:0,fontSize:"var(--text-sm)"}}>{drawer.desc}</p>
          <div>
            <div className="sec-label" style={{marginBottom:"var(--space-3)"}}><i data-lucide="info"></i>Structure</div>
            <dl className="deflist">
              <dt>Subject</dt><dd>{drawer.subject}</dd>
              <dt>Access type</dt><dd>Class-assigned</dd>
              <dt>Story points</dt><dd className="ax-mono">{drawer.sp}</dd>
              <dt>Items</dt><dd className="ax-mono">{drawer.items}</dd>
              <dt>Enrolled students</dt><dd className="ax-mono">{drawer.students}</dd>
              <dt>Avg. completion</dt><dd className="ax-mono">{drawer.completion!=null?drawer.completion+"%":"—"}</dd>
              <dt>Version</dt><dd className="ax-mono">v4</dd>
              <dt>Created by</dt><dd>Arjun Rao</dd>
              <dt>Last updated</dt><dd>{drawer.updated}</dd>
            </dl>
          </div>
          <div>
            <div className="sec-label" style={{marginBottom:"var(--space-3)"}}><i data-lucide="users"></i>Class & teacher mapping</div>
            {!editMap ? <React.Fragment>
              <div className="chip-row" style={{marginBottom:"var(--space-2)"}}>
                {drawer.classes.length ? drawer.classes.map(c=><span className="chip" key={c}>{c}</span>) : <span className="chip na">Not assigned</span>}
              </div>
              <Button variant="secondary" size="sm" leadingIcon="pencil" onClick={()=>setEditMap(true)}>Edit mapping</Button>
            </React.Fragment> : <React.Fragment>
              <div className="field" style={{marginBottom:"var(--space-3)"}}><label className="fl">Assigned classes</label>
                <select multiple style={{minHeight:80}} defaultValue={drawer.classes}>
                  <option value="7A">7A</option><option value="7B">7B</option><option value="8A">8A</option><option value="8B">8B</option><option value="8C">8C</option><option value="9A">9A</option><option value="9B">9B</option>
                </select>
                <div className="fh">Reassigning classes changes which students can see this course. Re-publish to make changes visible.</div>
              </div>
              <div className="field"><label className="fl">Teachers</label>
                <select multiple style={{minHeight:64}} defaultValue={["Arjun Rao"]}>
                  <option>Arjun Rao</option><option>Priya Menon</option><option>Sara Lindqvist</option>
                </select></div>
            </React.Fragment>}
          </div>
          {/* answer keys never shown — surfaced by absence */}
          <div className="alert info" role="note"><i data-lucide="key-round" className="lead"></i>
            <div className="ab"><span className="ax-sec">Question content, rubrics, and answer keys are authored in the Teacher Portal and are never shown here.</span></div></div>
        </div>
        <div className="df">
          <Button variant="ghost" onClick={()=>setDrawer(null)}>Close</Button>
          {editMap && <Button variant="primary" leadingIcon="check" onClick={()=>{setEditMap(false);setDrawer(null);fireToast("Course mapping updated");}}>Save mapping</Button>}
        </div>
      </aside>
    </React.Fragment>}

    {/* ===== Create-course Modal — mirrors the space-create contract (create branch, no id) ===== */}
    {createOpen && <React.Fragment>
      <div className="overlay" onClick={()=>setCreateOpen(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label="New course">
        <div className="box">
          <div className="mh"><div><div className="mt">New course</div>
            <div className="ms">Creates a draft space. Teachers add story points and content from the Teacher Portal.</div></div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setCreateOpen(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="field"><label className="fl">Course title <span className="req">*</span></label><input placeholder="e.g. Algebra I"/></div>
            <div className="field"><label className="fl">Description</label><textarea rows="2" placeholder="One line on what this course covers"></textarea></div>
            <div className="g2">
              <div className="field"><label className="fl">Type</label><select><option>Learning</option><option>Practice</option><option>Assessment</option><option>Resource</option><option>Hybrid</option></select></div>
              <div className="field"><label className="fl">Subject <span className="req">*</span></label><select><option>Mathematics</option><option>Physics</option><option>Biology</option><option>Chemistry</option><option>Computer Science</option><option>History</option></select></div>
            </div>
            <div className="field"><label className="fl">Assign classes</label>
              <select multiple style={{minHeight:72}}>
                <option>7A</option><option>7B</option><option>8A</option><option>8B</option><option>9A</option><option>9B</option>
              </select>
              <div className="fh">Optional. You can map classes now or later. New courses start in Draft.</div></div>
            <div className="alert info" role="note"><i data-lucide="info" className="lead"></i>
              <div className="ab"><span className="ax-sec">Counts and completion are computed by the server once teachers add content — they aren't set here.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setCreateOpen(false)}>Cancel</Button>
            <Button variant="primary" leadingIcon="check" onClick={()=>{setCreateOpen(false);fireToast("Course created");}}>Create course</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

    {/* ===== ConfirmDialog — bulk archive (danger; explicit consequence; audit-logged) ===== */}
    {confirmArchive && <React.Fragment>
      <div className="overlay" onClick={()=>setConfirmArchive(false)}></div>
      <div className="modal" role="dialog" aria-modal="true" aria-label="Archive this course">
        <div className="box" style={{maxWidth:440}}>
          <div className="mh"><div><div className="mt">Archive {selCount} course{selCount>1?"s":""}?</div></div>
            <button className="icon-btn" aria-label="Close" onClick={()=>setConfirmArchive(false)}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="alert warn" role="note"><i data-lucide="archive" className="lead"></i>
              <div className="ab"><span className="ax-sec">Selected courses will be hidden from students. Teachers can restore them to draft later. Already-archived courses are skipped. This action is logged.</span></div></div>
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={()=>setConfirmArchive(false)}>Keep course</Button>
            <Button variant="danger" leadingIcon="archive" onClick={()=>{setConfirmArchive(false);setSel({});fireToast(selCount+" archived");}}>Archive</Button>
          </div>
        </div>
      </div>
    </React.Fragment>}

    {/* Toast (sonner-style confirm) */}
    {toast && <div className="toast" role="status"><i data-lucide="check-circle-2"></i><span>{toast}</span>
      <button className="icon-btn" aria-label="Dismiss" onClick={()=>setToast(null)}><i data-lucide="x"></i></button></div>}

  </div>);
}

function View_AcademicSessions(){
  const Button = L.Button || (({children,leadingIcon,trailingIcon,variant,size,disabled,onClick})=>
    <button className={"btn btn--"+(variant||"primary")+(size?" btn--"+size:"")} disabled={disabled} onClick={onClick}>
      {leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}{trailingIcon&&<i data-lucide={trailingIcon}></i>}</button>);

  /* ---- status helper: icon + label, never color-only ---- */
  function StatusBadge({status}){
    if(status==="active") return <span className="badge suc"><i data-lucide="circle-check"></i>Active</span>;
    return <span className="badge arc"><i data-lucide="archive"></i>Archived</span>;
  }

  /* ---- sample data: server-authoritative sessions (render-only). tenantId is server-derived, never surfaced. ---- */
  const SESSIONS=[
    {id:"as_2526",name:"2025–2026",start:"01 Jun 2025",end:"31 May 2026",current:true, status:"active"},
    {id:"as_2425",name:"2024–2025",start:"01 Jun 2024",end:"31 May 2025",current:false,status:"archived"},
    {id:"as_2324",name:"2023–2024",start:"01 Jun 2023",end:"31 May 2024",current:false,status:"archived"},
    {id:"as_2223",name:"2022–2023",start:"01 Jun 2022",end:"31 May 2023",current:false,status:"archived"},
  ];
  const CURRENT = SESSIONS.find(s=>s.current);

  /* ---- rollover Configure → Review → Confirm dialog ---- */
  function RolloverDialog({source,onClose}){
    const [name,setName]=React.useState("2026–2027");
    const [start,setStart]=React.useState("2026-06-01");
    const [end,setEnd]=React.useState("2027-05-31");
    const [copyClasses,setCopyClasses]=React.useState(true);
    const [copyTeachers,setCopyTeachers]=React.useState(true);
    const [promote,setPromote]=React.useState(true);
    const [confirm,setConfirm]=React.useState(false);
    const [busy,setBusy]=React.useState(false);
    const dateBad = end <= start;
    const nameBad = !name.trim();
    // dependency cascade: copyClasses is the parent
    const toggleParent=()=>{ const next=!copyClasses; setCopyClasses(next); if(!next){ setCopyTeachers(false); setPromote(false);} };
    const Opt=({checked,onClick,disabled,title,hint,child})=>(
      <div className={"opt"+(child?" child":"")+(checked?" checked":"")+(disabled?" disabled":"")}
        role="checkbox" aria-checked={checked} aria-disabled={disabled||undefined} tabIndex={disabled?-1:0}
        onClick={disabled?undefined:onClick}>
        <span className="cbx">{checked&&<i data-lucide="check"></i>}</span>
        <span><span className="ot">{title}</span>{hint&&<span className="oh">{hint}</span>}</span>
      </div>);
    const dlgName = name.trim()||"new session";
    return <React.Fragment>
      <div className="overlay" onClick={busy?undefined:onClose}></div>
      <div className="modal">
        <div className="box lg" role="dialog" aria-modal="true" aria-labelledby="ro-title" aria-describedby="ro-desc" aria-busy={busy||undefined}>
          {busy && <div className="dlg-busy" role="status" aria-label="Processing rollover"><div className="spin"></div></div>}
          <div className="mh"><div><div className="mt" id="ro-title">Roll Over Session</div>
            <div className="ms" id="ro-desc">Create a new academic session from «{source.name}» and carry forward your classes, teachers, and students.</div></div>
            <button className="icon-btn" aria-label="Close" disabled={busy} onClick={busy?undefined:onClose}><i data-lucide="x"></i></button></div>
          <div className="mb">
            {/* Configure — source session (read-only) */}
            <div>
              <div className="modal-sec-h" style={{marginBottom:"var(--space-2)"}}>Source session</div>
              <div className="src-block">
                <dl className="deflist">
                  <dt>Name</dt><dd><span style={{display:"inline-flex",alignItems:"center",gap:"var(--space-2)"}}>{source.name}<span className="chip"><span className="d"></span>Current</span></span></dd>
                  <dt>Date range</dt><dd className="ax-mono">{source.start} — {source.end}</dd>
                </dl>
              </div>
            </div>
            {/* new-session fields */}
            <div className="field">
              <label className="fl" htmlFor="ro-name">New Session Name <span className="req">*</span></label>
              <input id="ro-name" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. 2026–2027"/>
            </div>
            <div className="g2">
              <div className="field"><label className="fl" htmlFor="ro-start">Start Date</label><input id="ro-start" className="mono" type="date" value={start} onChange={e=>setStart(e.target.value)}/></div>
              <div className={"field"+(dateBad?" bad":"")}>
                <label className="fl" htmlFor="ro-end">End Date</label>
                <input id="ro-end" className="mono" type="date" value={end} onChange={e=>setEnd(e.target.value)} aria-invalid={dateBad||undefined} aria-describedby={dateBad?"ro-end-err":undefined}/>
                {dateBad && <div className="fe" id="ro-end-err"><i data-lucide="circle-alert"></i>End date must be after the start date.</div>}
              </div>
            </div>
            {/* options with dependency cascade */}
            <div>
              <div className="modal-sec-h" style={{marginBottom:"var(--space-2)"}}>What to carry forward</div>
              <Opt checked={copyClasses} onClick={toggleParent} title="Copy classes to the new session"/>
              <Opt child checked={copyTeachers} disabled={!copyClasses} onClick={()=>setCopyTeachers(v=>!v)}
                title="Copy teacher assignments" hint={!copyClasses?"Requires copying classes.":null}/>
              <Opt child checked={promote} disabled={!copyClasses} onClick={()=>setPromote(v=>!v)}
                title="Promote students" hint={copyClasses?"Increment grade and reassign to the new classes.":"Requires copying classes."}/>
            </div>
            {/* Review — live consequence preview (status.warning emphasis) */}
            <div className="alert warn" role="region" aria-live="polite" aria-label="What will happen">
              <i data-lucide="triangle-alert" className="lead"></i>
              <div className="ab">
                <span className="at">What will happen</span>
                <div className="conseq">
                  <div className="ci"><i data-lucide="calendar-plus"></i><span>A new session «{dlgName}» will be created and set as the current session.</span></div>
                  {copyClasses
                    ? <div className="ci"><i data-lucide="copy"></i><span>Active classes from «{source.name}» will be duplicated into the new session.</span></div>
                    : <div className="ci off"><i data-lucide="minus"></i><span>No classes will be copied.</span></div>}
                  {copyClasses && copyTeachers && <div className="ci"><i data-lucide="user-check"></i><span>Teacher assignments will be preserved in the new classes.</span></div>}
                  {copyClasses && promote && <div className="ci"><i data-lucide="graduation-cap"></i><span>Students will be promoted to the next grade and reassigned.</span></div>}
                  <div className="ci"><i data-lucide="archive"></i><span>«{source.name}» will be archived.</span></div>
                </div>
              </div>
            </div>
          </div>
          <div className="mf">
            <Button variant="ghost" disabled={busy} onClick={busy?undefined:onClose}>Cancel</Button>
            {/* primary, NOT danger — rollover creates a year; consequence carried by copy + confirm gate */}
            <Button variant="primary" leadingIcon="rotate-ccw" disabled={busy||dateBad||nameBad} onClick={()=>setConfirm(true)}>
              {busy?"Processing…":"Start Rollover"}</Button>
          </div>
        </div>
      </div>

      {/* Confirm — final commit gate (audit-logged, roster-wide) */}
      {confirm && <React.Fragment>
        <div className="overlay" style={{opacity:.5}} onClick={busy?undefined:()=>setConfirm(false)}></div>
        <div className="modal">
          <div className="box sm" role="alertdialog" aria-modal="true" aria-labelledby="cf-title" aria-describedby="cf-desc">
            <div className="mh"><div className="mt" id="cf-title">Roll over to a new academic year?</div>
              <button className="icon-btn" aria-label="Close" disabled={busy} onClick={busy?undefined:()=>setConfirm(false)}><i data-lucide="x"></i></button></div>
            <div className="mb">
              <div className="alert warn" role="note"><i data-lucide="triangle-alert" className="lead"></i>
                <div className="ab" id="cf-desc"><span className="ax-sec">This will create «{dlgName}», set it as the current session, and archive «{source.name}». Classes will be duplicated and students will be promoted to the next grade. This affects your entire roster and is not undone automatically.</span></div></div>
            </div>
            <div className="mf">
              <Button variant="ghost" disabled={busy} onClick={()=>setConfirm(false)}>Cancel</Button>
              <Button variant="primary" leadingIcon="rotate-ccw" disabled={busy}
                onClick={()=>{ setBusy(true); /* idempotencyKey sent; counts are server-authoritative */ }}>
                {busy?"Processing…":"Roll over"}</Button>
            </div>
          </div>
        </div>
      </React.Fragment>}
    </React.Fragment>;
  }

  /* ---- Create / Edit dialog ---- */
  function SessionFormDialog({mode,session,onClose}){
    const isEdit = mode==="edit";
    const [name,setName]=React.useState(isEdit?session.name:"");
    const [start,setStart]=React.useState("2026-06-01");
    const [end,setEnd]=React.useState("2025-05-31"); // intentionally bad to show inline validation
    const [makeCurrent,setMakeCurrent]=React.useState(isEdit?session.current:false);
    const dateBad = end <= start;
    const nameBad = !name.trim();
    return <React.Fragment>
      <div className="overlay" onClick={onClose}></div>
      <div className="modal">
        <div className="box" role="dialog" aria-modal="true" aria-labelledby="sf-title" aria-describedby="sf-desc">
          <div className="mh"><div><div className="mt" id="sf-title">{isEdit?"Edit Academic Session":"Create Academic Session"}</div>
            <div className="ms" id="sf-desc">{isEdit?"Update session details.":"Add a new academic year or term."}</div></div>
            <button className="icon-btn" aria-label="Close" onClick={onClose}><i data-lucide="x"></i></button></div>
          <div className="mb">
            <div className="field">
              <label className="fl" htmlFor="sf-name">Session Name <span className="req">*</span></label>
              <input id="sf-name" autoFocus value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. 2025–2026"/>
            </div>
            <div className="g2">
              <div className="field"><label className="fl" htmlFor="sf-start">Start Date</label><input id="sf-start" className="mono" type="date" value={start} onChange={e=>setStart(e.target.value)}/></div>
              <div className={"field"+(dateBad?" bad":"")}>
                <label className="fl" htmlFor="sf-end">End Date</label>
                <input id="sf-end" className="mono" type="date" value={end} onChange={e=>setEnd(e.target.value)} aria-invalid={dateBad||undefined} aria-describedby={dateBad?"sf-end-err":undefined}/>
                {dateBad && <div className="fe" id="sf-end-err"><i data-lucide="circle-alert"></i>End date must be after the start date.</div>}
              </div>
            </div>
            <div className={"switch"+(makeCurrent?" on":"")} role="switch" aria-checked={makeCurrent} tabIndex={0} onClick={()=>setMakeCurrent(v=>!v)}>
              <span className="tk"></span><span className="sl">Set as current session</span>
            </div>
            {makeCurrent && <div className="alert info" role="note"><i data-lucide="info" className="lead"></i>
              <div className="ab"><span className="ax-sec">The current session is enforced server-side — making this current will demote the previous one in the same transaction.</span></div></div>}
          </div>
          <div className="mf">
            <Button variant="ghost" onClick={onClose}>Cancel</Button>
            <Button variant="primary" leadingIcon="check" disabled={dateBad||nameBad}>{isEdit?"Save Changes":"Create"}</Button>
          </div>
        </div>
      </div>
    </React.Fragment>;
  }

  const [rollover,setRollover]=React.useState(null);   // source session or null
  const [form,setForm]=React.useState(null);           // {mode, session}

  return (<div className="vw-sessions">

    {/* Partial-result warning (§5 Partial) — a prior rollover left students unassigned */}
    <div className="alert warn" role="status">
      <i data-lucide="triangle-alert" className="lead"></i>
      <div className="ab"><span className="at">3 students couldn't be auto-assigned to a class. </span>
        <span className="ax-sec">Assign them in Classes to complete the rollover.</span></div>
      <span className="lnk" data-go="#/classes" style={{cursor:'pointer'}}>Go to Classes →</span>
    </div>

    {/* Region A — page header */}
    <div className="ax-head">
      <div className="tx"><h1 className="ax-h1">Academic Sessions</h1>

          <th><button className="sort">Start Date<i data-lucide="chevron-down"></i></button></th>
          <th>End Date</th>
          <th>Current</th>
          <th>Status</th>
          <th style={{textAlign:"right"}}><span className="ax-sr">Actions</span></th>
        </tr></thead>
        <tbody>
          {SESSIONS.map(s=>(
            <tr key={s.id}>
              <td><div className="nm-cell"><i data-lucide="calendar"></i>{s.name}</div></td>
              <td className="ax-mono ax-sec">{s.start}</td>
              <td className="ax-mono ax-sec">{s.end}</td>

                ? <span className="chip"><span className="d"></span>Current</span>
                : <button className="btn btn--ghost btn--sm"><i data-lucide="circle-dot"></i>Set as current</button>}</td>
              <td><StatusBadge status={s.status}/></td>
              <td>
                <div className="row-acts">
                  <button className="icon-btn" aria-label={"Roll over "+s.name} onClick={()=>setRollover(s)}><i data-lucide="rotate-ccw"></i></button>

                </div>
              </td>
            </tr>))}
        </tbody>
      </table>
    </div>

    {/* Pagination */}
    <div className="pag">
      <span className="ax-muted" style={{fontSize:"var(--text-xs)"}}>Showing <span className="ax-mono">1–4</span> of <span className="ax-mono">4</span> sessions</span>
      <div className="nums">
        <button className="pg" aria-label="Previous page"><i data-lucide="chevron-left" style={{width:14,height:14}}></i></button>
        <button className="pg on" aria-current="page">1</button>
        <button className="pg" aria-label="Next page"><i data-lucide="chevron-right" style={{width:14,height:14}}></i></button>
      </div>
    </div>

    {/* ===== Secondary stacked examples: the spec's other §5 states ===== */}
    <div className="sec-label" style={{marginTop:"var(--space-4)"}}><i data-lucide="layers-2"></i>Other states (reference)</div>

    {/* Loading skeleton (§5 Loading) */}
    <div className="tbl-wrap" aria-busy="true" aria-label="Loading sessions">
      <div className="tbl-head"><div className="skl" style={{width:120,height:13}}></div></div>
      <table className="tbl"><tbody>
        {[0,1,2].map(i=>(
          <tr key={i}>
            <td><div className="skl" style={{width:120,height:13}}></div></td>
            <td><div className="skl" style={{width:90,height:13}}></div></td>
            <td><div className="skl" style={{width:90,height:13}}></div></td>
            <td><div className="skl" style={{width:64,height:20,borderRadius:"var(--radius-pill)"}}></div></td>
            <td><div className="skl" style={{width:64,height:20,borderRadius:"var(--radius-pill)"}}></div></td>
            <td></td>
          </tr>))}
      </tbody></table>
    </div>

    {/* Empty (§5 Empty / §7) */}
    <div className="panel"><div className="empty">
      <div className="ei"><i data-lucide="calendar-x"></i></div>
      <div className="et">No academic sessions yet</div>
      <div className="eb">Create your first session to organize your school year — classes, exams, and rollover all key off it.</div>
      <div className="ea"><Button variant="primary" leadingIcon="plus" onClick={()=>setForm({mode:"create"})}>Create session</Button></div>
    </div></div>

    {/* Read error (§5 Error) */}
    <div className="alert err" role="alert">
      <i data-lucide="octagon-alert" className="lead"></i>
      <div className="ab"><span className="at">Couldn't load academic sessions. </span>
        <span className="ax-sec">The service didn't respond. Your view is unchanged.</span></div>
      <span className="lnk">Retry →</span>
    </div>

    {/* Permission-gated read-only (§5 / §8 RBAC — mutating controls hidden, not disabled) */}
    <div className="alert info" role="status">
      <i data-lucide="eye" className="lead"></i>
      <div className="ab"><span className="at">You have view-only access to academic sessions. </span>
        <span className="ax-sec">New Session, Edit, Roll over, and Set as current are hidden for your role.</span></div>
    </div>

    {/* Dialogs */}
    {rollover && <RolloverDialog source={rollover} onClose={()=>setRollover(null)}/>}
    {form && <SessionFormDialog mode={form.mode} session={form.session} onClose={()=>setForm(null)}/>}

  </div>);
}

        </div>
        <div className="bar-track" role="progressbar" aria-label="Monthly AI budget: $412.00 of $2,000.00 used, on track" aria-valuenow="21" aria-valuemin="0" aria-valuemax="100">

        <span className="ax-sec" style={{fontSize:"var(--text-sm)"}}><span className="ax-mono">21%</span> of monthly budget used.</span>
      </div>

      {/* Partial — no budget configured (info) */}
      <div className="card ax-col" style={{gap:"var(--space-3)"}}>
        <span style={{fontFamily:"var(--font-display)",fontSize:"var(--text-base)",fontWeight:"var(--weight-semibold)"}}>Monthly Budget Usage — no budget set</span>
        <div className="alert info" role="status"><i data-lucide="info" className="lead"></i>
          <div className="ab"><span className="at">No monthly AI budget set. </span>
            <span className="ax-sec">Spend is unlimited and unmonitored. Set a budget in Settings to enable quota warnings and projections.</span></div>
          <span className="lnk" data-go="#/settings" style={{cursor:'pointer'}}>Set budget</span></div>
      </div>

      {/* Error — read failure (status.error InlineAlert with Retry) */}
      <div className="panel"><div className="pb">
        <div className="alert err" role="alert"><i data-lucide="alert-octagon" className="lead"></i>
          <div className="ab"><span className="at">Couldn't load AI usage. </span>
            <span className="ax-sec">The analytics service didn't respond. No figures were changed.</span></div>
          <span className="lnk">Retry</span></div>
      </div></div>

      {/* Error — permission / tenant isolation (reveals no data) */}
      <div className="panel"><div className="pb">
        <div className="alert err" role="alert"><i data-lucide="shield-x" className="lead"></i>
          <div className="ab"><span className="at">You don't have access to this tenant's usage. </span>
            <span className="ax-sec">This screen is scoped to your academy only. No data is shown.</span></div></div>
      </div></div>

      {/* Empty — no usage this month */}
      <div className="panel"><div className="empty">
        <div className="ei"><i data-lucide="receipt"></i></div>
        <div className="et">No AI usage this month</div>
        <div className="eb">No AI grading, extraction, or tutoring ran in 2026-05. Costs will appear here once activity is recorded.</div>
      </div></div>

      {/* Loading — skeleton (no layout shift) */}
      <div className="ax-grid ax-g4" aria-busy="true" aria-label="Loading KPI strip">
        {[0,1,2,3].map(i=>(
          <div className="card kpi" key={i}>
            <div className="skl" style={{width:96,height:12}}></div>
            <div className="skl" style={{width:120,height:26,marginTop:"var(--space-2)"}}></div>
            <div className="skl" style={{width:72,height:10,marginTop:"var(--space-1)"}}></div>
          </div>))}
      </div>
      <div className="panel" aria-busy="true" aria-label="Loading chart">
        <div className="ph"><div className="skl" style={{width:150,height:14}}></div></div>
        <div className="pb"><div className="skl" style={{width:"100%",height:180,borderRadius:"var(--radius-md)"}}></div></div>
      </div>

      {/* Export LoadingOverlay (during PDF/CSV generation) */}
      {exporting && <React.Fragment>
        <div className="lov"></div>
        <div className="lov-box"><div className="lov-card"><div className="spin"></div><span>Generating export…</span></div></div>
      </React.Fragment>}

      {/* Export success Toast (signed-URL download, 1-hour expiry) */}
      {toast && <div className="toast" role="status">
        <i data-lucide="check-circle-2" className="lead"></i>
        <div className="ab"><div className="tt">Export ready</div>
          <div className="ax-sec" style={{fontSize:"var(--text-xs)"}}>{toast==="pdf"?"AI-usage-2026-06.pdf":"AI-usage-2026-06.csv"} · download link expires in 1 hour.</div></div>
      </div>}

    </div>
  );
}

  </div>);
}

function View_Reports(){
  const Button = L.Button || (({children,leadingIcon,trailingIcon,variant,size,disabled,loading,onClick,...rest})=>
    <button className={"btn btn--"+(variant||"primary")+(size?" btn--"+size:"")+(loading?" btn--loading":"")}
      disabled={disabled||loading} onClick={onClick} {...rest}>
      {leadingIcon&&<i data-lucide={leadingIcon}></i>}{children}{trailingIcon&&<i data-lucide={trailingIcon}></i>}</button>);

  /* ---- sample data (server-authoritative; render-only) ---- */
  const REPORT_TYPES=[
    {id:"exam-result",icon:"file-check",label:"Exam result",help:"Per-exam results, for the whole class or one student."},
    {id:"class",icon:"school",label:"Class report card",help:"A class-level summary card."},
    {id:"progress",icon:"line-chart",label:"Student progress",help:"A learner's cross-space progress over time."},
  ];
  const EXAMS=[
    {id:"ex_alg2",label:"Algebra Unit 2",status:"completed",cls:"8A",when:"Mar 12"},

    grading:{cls:"warn",icon:"loader",label:"Grading"},
    completed:{cls:"info",icon:"check-check",label:"Completed"},
    results_released:{cls:"suc",icon:"badge-check",label:"Results released"},
