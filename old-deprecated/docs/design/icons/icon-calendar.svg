<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Calendar body -->
  <rect x="3" y="5" width="18" height="16" rx="1.5"/>
  <!-- Binding rings -->
  <line x1="8" y1="3" x2="8" y2="7"/>
  <line x1="16" y1="3" x2="16" y2="7"/>
  <!-- Horizontal divider -->
  <line x1="3" y1="10" x2="21" y2="10"/>
  <!-- Date dots (3x3 grid) -->
  <circle cx="8" cy="13.5" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="12" cy="13.5" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="16" cy="13.5" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="8" cy="17" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="12" cy="17" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="16" cy="17" r="0.8" fill="currentColor" stroke="none"/>
</svg>
