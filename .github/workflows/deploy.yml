name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FIREBASE_PROJECT: lvlup-ff6fa

jobs:
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Require Firebase credentials
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "${FIREBASE_TOKEN}" ] && [ -z "${FIREBASE_SERVICE_ACCOUNT}" ]; then
            echo "::error::Missing Firebase credentials. Set repository/environment secret FIREBASE_TOKEN (firebase login:ci) or FIREBASE_SERVICE_ACCOUNT (JSON) on the production environment."
            exit 1
          fi
          if [ -n "${FIREBASE_SERVICE_ACCOUNT}" ]; then
            echo "${FIREBASE_SERVICE_ACCOUNT}" > "${RUNNER_TEMP}/firebase-sa.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/firebase-sa.json" >> "$GITHUB_ENV"
          fi

      - name: Deploy Functions
        run: pnpm run deploy:functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  deploy-hosting:
    name: Deploy Hosting (All Apps)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web apps for hosting
        run: >
          pnpm exec turbo run build
          --filter=@levelup/admin-web
          --filter=@levelup/teacher-web
          --filter=@levelup/student-web
          --filter=@levelup/parent-web
          --filter=@levelup/super-admin
          --filter=website

      - name: Require Firebase credentials
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "${FIREBASE_TOKEN}" ] && [ -z "${FIREBASE_SERVICE_ACCOUNT}" ]; then
            echo "::error::Missing Firebase credentials. Set repository/environment secret FIREBASE_TOKEN (firebase login:ci) or FIREBASE_SERVICE_ACCOUNT (JSON) on the production environment."
            exit 1
          fi
          if [ -n "${FIREBASE_SERVICE_ACCOUNT}" ]; then
            echo "${FIREBASE_SERVICE_ACCOUNT}" > "${RUNNER_TEMP}/firebase-sa.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/firebase-sa.json" >> "$GITHUB_ENV"
          fi

      - name: Deploy to Firebase Hosting
        run: pnpm exec firebase deploy --only hosting --project "$FIREBASE_PROJECT" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  preview-deploy:
    name: Preview Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web apps for hosting
        run: >
          pnpm exec turbo run build
          --filter=@levelup/admin-web
          --filter=@levelup/teacher-web
          --filter=@levelup/student-web
          --filter=@levelup/parent-web
          --filter=@levelup/super-admin
          --filter=website

      - name: Require Firebase credentials
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "${FIREBASE_TOKEN}" ] && [ -z "${FIREBASE_SERVICE_ACCOUNT}" ]; then
            echo "::error::Missing Firebase credentials for preview. Set repo secret FIREBASE_TOKEN or FIREBASE_SERVICE_ACCOUNT."
            exit 1
          fi
          if [ -n "${FIREBASE_SERVICE_ACCOUNT}" ]; then
            echo "${FIREBASE_SERVICE_ACCOUNT}" > "${RUNNER_TEMP}/firebase-sa.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/firebase-sa.json" >> "$GITHUB_ENV"
          fi

      - name: Deploy preview channel
        run: |
          pnpm exec firebase hosting:channel:deploy \
            "pr-${{ github.event.pull_request.number }}" \
            --expires 7d \
            --project "$FIREBASE_PROJECT" \
            --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
